- File:
    Path: linux/opensource_packages/gardener-kupid.md
  Params:
    category: Containers and Orchestration
    description: Gardener kupid is a scheduling policy controller from the Gardener
      ecosystem that declaratively manages and dynamically injects pod scheduling
      criteria (such as affinity, tolerations, node selectors, and scheduler settings)
      into Kubernetes workloads, enabling centralized and orthogonal enforcement of
      scheduling policies.
    download_url: https://console.cloud.google.com/artifacts/docker/gardener-project/europe/releases/gardener%2Fkupid
    name: Gardener Kupid
