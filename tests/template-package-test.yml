# Package Test Template
#
# This template is stored in tests/ and will not run directly.
# Copy it to .github/workflows/test-<package>.yml and customize:
# 1. Replace <PACKAGE> with the display name.
# 2. Replace <package> with the exact basename used in content/opensource_packages/<package>.md.
#    Preserve the page's case and punctuation so result slugs match package pages exactly.
# 3. Replace install/version commands with package-specific logic.
# 4. Keep Tests 1-5 as baseline smoke checks.
# 5. Add Test 6 - Regression Validation only for packages whose tested artifact is
#    installed through a non-package-manager path (source build, direct tarball,
#    manual binary, custom image, etc.).
# 6. If Tests 1-5 install the tested package via a package manager/package ecosystem
#    (apt, yum, dnf, zypper, apk, snap, pip, npm, cargo, etc.), do not perform a
#    real next-version regression check. Instead, emit a not-applicable decision such as:
#    echo "current_version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
#    echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
#    echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
#    echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
#    echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
#    echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
#    echo "status=skipped" >> "$GITHUB_OUTPUT"
#
# Reusable workflow output contract:
# Contract version: 2.0
# - package_slug, package_name, package_version
# - run_status, badge_status, core_failed
# - tests_passed, tests_failed, tests_skipped, duration_seconds
# - regression_status, regression_decision, regression_result, regression_comparison
# - regression_current_version, regression_latest_version, regression_next_installed_version
# - run_id, run_attempt, job_name, dashboard_link, timestamp, contract_version
#
# Production architecture note:
# - package workflows own testing truth only
# - batch collectors build per-package JSON centrally
# - exact job URL resolution happens centrally in batch/global collection
# - package workflows do not own final artifact publishing

name: Test <PACKAGE> on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-<package>.outputs.package_slug }}
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-<package>.outputs.contract_version }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-<package>.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-<package>.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-<package>.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-<package>.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-<package>.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-<package>.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-<package>.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-<package>.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-<package>.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-<package>.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-<package>.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-<package>.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-<package>.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-<package>.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-<package>.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-<package>.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.template-package-test.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-<package>.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-<package>.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-<package>.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-<package>.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-<package>.outputs.timestamp }}
jobs:
  test-<package>:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: <PACKAGE>
      package_version: ${{ steps.version.outputs.version }}
      run_status: ${{ steps.summary.outputs.overall_status }}
      badge_status: ${{ steps.summary.outputs.badge_status }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=<package>" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/<package>" >> "$GITHUB_OUTPUT"

      - name: Install <PACKAGE>
        id: install
        run: |
          set -euo pipefail
          echo "Installing <PACKAGE>..."

          # Example for apt packages:
          sudo apt-get update
          sudo apt-get install -y <package>

          # Example for direct-download packages:
          # VERSION="REPLACE_ME"
          # curl -L -o <package>.tar.gz "https://example.com/<package>-${VERSION}-linux-arm64.tar.gz"
          # tar -xzf <package>.tar.gz
          # sudo install -m 0755 <package> /usr/local/bin/<package>

          if command -v <package> > /dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get <PACKAGE> version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(<package> --version 2>&1 | grep -oE '[0-9]+([.][0-9]+)+' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected <PACKAGE> version: $VERSION"

      - name: Test 1 - Check <package> binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v <package> > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check <package> version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if <package> --version > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check <package> help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if <package> --help > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          # Replace this with a package-specific real execution check.
          # Python packages should usually import the module instead.
          if <package> --version > /dev/null 2>&1 || <package> --help > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      # Required only for non-package-manager tested packages:
      # - add "Test 6 - Regression Validation"
      # - CURRENT / BASELINE = the version validated by Tests 1-5 in this run
      # - NEXT / UPGRADE CANDIDATE = the latest stable version selected for comparison
      # - Test 6 should attempt to download/install NEXT on Arm64
      # - Test 6 does not need a full smoke rerun unless a package needs it
      # - keep Tests 1-5 as the badge-deciding smoke checks for the pinned baseline
      # - if Tests 1-5 install the tested package through a package manager/package ecosystem,
      #   emit not_applicable_package_manager instead of a real Test 6
      #
      # Example outputs to emit from Test 6:
      # echo "current_version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
      # echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
      # echo "next_installed_version=$INSTALLED_NEXT_VERSION" >> "$GITHUB_OUTPUT"
      # echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
      # echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
      # echo "comparison=Current pinned version ${CURRENT_VERSION} passed smoke tests in this run. The next candidate ${NEXT_VERSION} downloaded and installed successfully on Arm64, and the installed artifact reported version ${INSTALLED_NEXT_VERSION}." >> "$GITHUB_OUTPUT"
      # echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          TEST1_STATUS="${{ steps.test1.outputs.status || 'skipped' }}"
          TEST2_STATUS="${{ steps.test2.outputs.status || 'skipped' }}"
          TEST3_STATUS="${{ steps.test3.outputs.status || 'skipped' }}"
          TEST4_STATUS="${{ steps.test4.outputs.status || 'skipped' }}"
          TEST5_STATUS="${{ steps.test5.outputs.status || 'skipped' }}"

          TEST1_DURATION="${{ steps.test1.outputs.duration || 0 }}"
          TEST2_DURATION="${{ steps.test2.outputs.duration || 0 }}"
          TEST3_DURATION="${{ steps.test3.outputs.duration || 0 }}"
          TEST4_DURATION="${{ steps.test4.outputs.duration || 0 }}"
          TEST5_DURATION="${{ steps.test5.outputs.duration || 0 }}"

          TOTAL_DURATION=$((TOTAL_DURATION + TEST1_DURATION + TEST2_DURATION + TEST3_DURATION + TEST4_DURATION + TEST5_DURATION))

          for STATUS in "$TEST1_STATUS" "$TEST2_STATUS" "$TEST3_STATUS" "$TEST4_STATUS" "$TEST5_STATUS"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          TEST6_DECISION="${{ steps.test6.outputs.decision || 'not_configured' }}"
          TEST6_DURATION="${{ steps.test6.outputs.duration || 0 }}"
          TOTAL_DURATION=$((TOTAL_DURATION + TEST6_DURATION))

          TEST6_COUNTS_AS_FAILURE=0
          case "$TEST6_DECISION" in
            metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|no_newer_stable_available|manual_review_needed|not_applicable_package_manager|hold_current_arm_dependency_gap|not_configured)
              ;;
            *)
              if [ "$TEST6_STATUS" = "failed" ]; then
                TEST6_COUNTS_AS_FAILURE=1
              fi
              ;;
          esac

          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_COUNTS_AS_FAILURE" -eq 1 ]; then
            FAILED=$((FAILED + 1))
          else
            SKIPPED=$((SKIPPED + 1))
          fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_COUNTS_AS_FAILURE" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## <PACKAGE> Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Skipped:** ${{ steps.summary.outputs.skipped || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check <package> binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check <package> version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check <package> help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.test6.outputs.decision || 'not_configured' }}" = "not_applicable_package_manager" ]; then
            echo "6. Regression applicability: package-manager installed (not applicable)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test6.outputs.decision || 'not_configured' }}" = "not_configured" ]; then
            echo "6. Regression applicability: not configured" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce failure status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.overall_status }}" != "success" ]; then
            exit 1
          fi
