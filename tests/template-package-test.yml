# Package Test Template
#
# This file lives in tests/ and is a starter only.
# Copy it to .github/workflows/test-<package>.yml and customize it.
#
# Current production architecture:
# - package workflows emit reusable workflow outputs only
# - batch summary jobs convert those outputs into canonical batch JSON
# - the global summary republishes data/test-results/*.json and data/test-results-index.json
# - package workflows do not publish production JSON directly
#
# Checklist when creating a new package workflow:
# 1. Replace <PACKAGE> with the display name.
# 2. Replace <package> with the exact page basename from content/linux/opensource_packages/<package>.md
#    (or the legacy content/opensource_packages/<package>.md path in older trees).
# 3. Implement baseline install, version detection, and Tests 1-5.
# 4. Decide Test 6 policy:
#    - applicable for source builds, direct tarballs, manual binaries, custom images, and similar non-package-manager lanes
#    - not_applicable_package_manager for package-manager/package-ecosystem installs
# 5. Add the new workflow to exactly one batch workflow file and its summary.needs list.
# 6. Do not edit the orchestrator for a normal package add; it already triggers all batch workflows.
#
# Reusable workflow output contract (v2.0):
# - package_slug, package_name, package_version
# - run_status, badge_status, core_failed
# - tests_passed, tests_failed, tests_skipped, duration_seconds
# - regression_status, regression_decision, regression_result, regression_comparison
# - regression_current_version, regression_latest_version, regression_next_installed_version
# - regression_policy
# - run_id, run_attempt, job_name, dashboard_link, timestamp, contract_version
#
# Package-manager-installed policy example:
# echo "current_version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
# echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
# echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
# echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
# echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
# echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
# echo "status=skipped" >> "$GITHUB_OUTPUT"

name: Test <PACKAGE> on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-<package>.outputs.package_slug }}
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-<package>.outputs.contract_version }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-<package>.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-<package>.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-<package>.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-<package>.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-<package>.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-<package>.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-<package>.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-<package>.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-<package>.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-<package>.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-<package>.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-<package>.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-<package>.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-<package>.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-<package>.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-<package>.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-<package>.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-<package>.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-<package>.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-<package>.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-<package>.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-<package>.outputs.timestamp }}

jobs:
  test-<package>:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: <PACKAGE>
      package_version: ${{ steps.version.outputs.version }}
      run_status: ${{ steps.summary.outputs.overall_status }}
      badge_status: ${{ steps.summary.outputs.badge_status }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=<package>" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/<package>" >> "$GITHUB_OUTPUT"

      - name: Bootstrap apt dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "<package-apt-name>"

      - name: Install <PACKAGE>
        id: install
        run: |
          set -euo pipefail
          PACKAGE_APT_NAME="<package-apt-name>"
          PACKAGE_CMD="<package-command>"
          echo "Installing <PACKAGE>..."

          # Example for apt packages:
          # Bootstrap apt dependencies already handled package installation.

          # Example for direct-download packages:
          # VERSION="REPLACE_ME"
          # curl -L -o <package>.tar.gz "https://example.com/<package>-${VERSION}-linux-arm64.tar.gz"
          # tar -xzf <package>.tar.gz
          # sudo install -m 0755 <package> /usr/local/bin/<package>

          if command -v "$PACKAGE_CMD" > /dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get <PACKAGE> version
        id: version
        run: |
          set -euo pipefail
          PACKAGE_CMD="<package-command>"
          VERSION=$("$PACKAGE_CMD" --version 2>&1 | grep -oE '[0-9]+([.][0-9]+)+' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected <PACKAGE> version: $VERSION"

      - name: Test 1 - Check <package> binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v "$PACKAGE_CMD" > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check <package> version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          PACKAGE_CMD="<package-command>"
          START_TIME=$(date +%s)
          if "$PACKAGE_CMD" --version > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check <package> help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          PACKAGE_CMD="<package-command>"
          START_TIME=$(date +%s)
          if "$PACKAGE_CMD" --help > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          PACKAGE_CMD="<package-command>"
          START_TIME=$(date +%s)
          # Replace this with a package-specific real execution check.
          # Python packages should usually import the module instead.
          if "$PACKAGE_CMD" --version > /dev/null 2>&1 || "$PACKAGE_CMD" --help > /dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      # Required only for non-package-manager tested packages:
      # - add "Test 6 - Regression Validation"
      # - CURRENT / BASELINE = the version validated by Tests 1-5 in this run
      # - NEXT / UPGRADE CANDIDATE = the latest stable version selected for comparison
      # - Test 6 should attempt to download/install NEXT on Arm64
      # - Test 6 does not need a full smoke rerun unless a package needs it
      # - keep Tests 1-5 as the badge-deciding smoke checks for the pinned baseline
      # - if Tests 1-5 install the tested package through a package manager/package ecosystem,
      #   emit not_applicable_package_manager instead of a real Test 6
      #
      # Example outputs to emit from Test 6:
      # echo "current_version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
      # echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
      # echo "next_installed_version=$INSTALLED_NEXT_VERSION" >> "$GITHUB_OUTPUT"
      # echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
      # echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
      # echo "comparison=Current pinned version ${CURRENT_VERSION} passed smoke tests in this run. The next candidate ${NEXT_VERSION} downloaded and installed successfully on Arm64, and the installed artifact reported version ${INSTALLED_NEXT_VERSION}." >> "$GITHUB_OUTPUT"
      # echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "<PACKAGE>"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install.outputs.install_status || 'success' }}
          test1_label: "Test 1 - Check <package> binary exists"
          test2_label: "Test 2 - Check <package> version command"
          test3_label: "Test 3 - Check <package> help output"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Enforce failure status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
