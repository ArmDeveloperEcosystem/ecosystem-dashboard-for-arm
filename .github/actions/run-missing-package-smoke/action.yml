name: Run missing package smoke
description: Run package-specific smoke checks for newly covered dashboard packages.

inputs:
  package_slug:
    description: Canonical dashboard package slug.
    required: true
  package_name:
    description: Human-readable package name.
    required: true
  kind:
    description: Smoke implementation kind.
    required: true
  baseline_version:
    description: Baseline package version from dashboard metadata or selected stable lane.
    required: true
  candidate_version:
    description: Candidate version used for Test 6 when applicable.
    required: false
    default: ""
  baseline_url:
    description: Baseline artifact URL for direct-download workflows.
    required: false
    default: ""
  candidate_url:
    description: Candidate artifact URL for direct-download Test 6.
    required: false
    default: ""
  baseline_image:
    description: Baseline container image or space-separated images.
    required: false
    default: ""
  candidate_image:
    description: Candidate container image or space-separated images for Test 6.
    required: false
    default: ""
  source_repo:
    description: GitHub owner/repository used for source tag validation.
    required: false
    default: ""
  source_tag:
    description: Baseline source tag used for source validation.
    required: false
    default: ""
  candidate_source_tag:
    description: Candidate source tag used for Test 6.
    required: false
    default: ""
  expected_paths:
    description: Comma-separated source paths expected in the downloaded baseline.
    required: false
    default: ""
  command_name:
    description: CLI command or extracted artifact name to validate.
    required: false
    default: ""

outputs:
  version:
    description: Version detected or selected during the smoke run.
    value: ${{ steps.smoke.outputs.version }}
  install_status:
    description: Baseline install/readiness status.
    value: ${{ steps.smoke.outputs.install_status }}
  test1_status:
    description: Test 1 status.
    value: ${{ steps.smoke.outputs.test1_status }}
  test2_status:
    description: Test 2 status.
    value: ${{ steps.smoke.outputs.test2_status }}
  test3_status:
    description: Test 3 status.
    value: ${{ steps.smoke.outputs.test3_status }}
  test4_status:
    description: Test 4 status.
    value: ${{ steps.smoke.outputs.test4_status }}
  test5_status:
    description: Test 5 status.
    value: ${{ steps.smoke.outputs.test5_status }}
  test6_status:
    description: Test 6 status.
    value: ${{ steps.smoke.outputs.test6_status }}
  test1_duration:
    description: Test 1 duration in seconds.
    value: ${{ steps.smoke.outputs.test1_duration }}
  test2_duration:
    description: Test 2 duration in seconds.
    value: ${{ steps.smoke.outputs.test2_duration }}
  test3_duration:
    description: Test 3 duration in seconds.
    value: ${{ steps.smoke.outputs.test3_duration }}
  test4_duration:
    description: Test 4 duration in seconds.
    value: ${{ steps.smoke.outputs.test4_duration }}
  test5_duration:
    description: Test 5 duration in seconds.
    value: ${{ steps.smoke.outputs.test5_duration }}
  test6_duration:
    description: Test 6 duration in seconds.
    value: ${{ steps.smoke.outputs.test6_duration }}
  regression_decision:
    description: Test 6 decision label.
    value: ${{ steps.smoke.outputs.regression_decision }}
  regression_current_version:
    description: Baseline version used for Test 6 comparison.
    value: ${{ steps.smoke.outputs.regression_current_version }}
  regression_latest_version:
    description: Candidate version targeted by Test 6.
    value: ${{ steps.smoke.outputs.regression_latest_version }}
  regression_next_installed_version:
    description: Candidate version installed or validated by Test 6.
    value: ${{ steps.smoke.outputs.regression_next_installed_version }}
  regression_result:
    description: Human-readable Test 6 result.
    value: ${{ steps.smoke.outputs.regression_result }}
  regression_details:
    description: Human-readable Test 6 details.
    value: ${{ steps.smoke.outputs.regression_details }}

runs:
  using: composite
  steps:
    - name: Run smoke checks
      id: smoke
      shell: bash
      env:
        PACKAGE_SLUG: ${{ inputs.package_slug }}
        PACKAGE_NAME: ${{ inputs.package_name }}
        KIND: ${{ inputs.kind }}
        BASELINE_VERSION: ${{ inputs.baseline_version }}
        CANDIDATE_VERSION: ${{ inputs.candidate_version }}
        BASELINE_URL: ${{ inputs.baseline_url }}
        CANDIDATE_URL: ${{ inputs.candidate_url }}
        BASELINE_IMAGE: ${{ inputs.baseline_image }}
        CANDIDATE_IMAGE: ${{ inputs.candidate_image }}
        SOURCE_REPO: ${{ inputs.source_repo }}
        SOURCE_TAG: ${{ inputs.source_tag }}
        CANDIDATE_SOURCE_TAG: ${{ inputs.candidate_source_tag }}
        EXPECTED_PATHS: ${{ inputs.expected_paths }}
        COMMAND_NAME: ${{ inputs.command_name }}
      run: |
        set -uo pipefail

        version="unknown"
        install_status="failed"
        test1_status="skipped"; test1_duration=0
        test2_status="skipped"; test2_duration=0
        test3_status="skipped"; test3_duration=0
        test4_status="skipped"; test4_duration=0
        test5_status="skipped"; test5_duration=0
        test6_status="skipped"; test6_duration=0
        regression_decision="not_configured"
        regression_current_version="${BASELINE_VERSION}"
        regression_latest_version="${CANDIDATE_VERSION:-unknown}"
        regression_next_installed_version="not_installed"
        regression_result="Regression validation not configured."
        regression_details="Regression comparison summary unavailable."

        apt_bootstrap() {
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "$*" >/dev/null
        }

        set_test() {
          local index="$1"
          local status="$2"
          local start="$3"
          local end
          end=$(date +%s)
          eval "test${index}_status='$status'"
          eval "test${index}_duration='$((end - start))'"
        }

        finish_package_manager_test6() {
          local current="${1:-unknown}"
          regression_decision="not_applicable_package_manager"
          regression_current_version="$current"
          regression_latest_version="not_applicable"
          regression_next_installed_version="not_applicable"
          regression_result="Regression validation not applicable: tested package installed via package manager in Tests 1-5"
          regression_details="The tested package is installed via a package manager or package ecosystem in Tests 1-5, so version-to-version regression validation is not shown under the current policy."
          test6_status="skipped"
          test6_duration=0
        }

        write_outputs() {
          {
            echo "version=${version}"
            echo "install_status=${install_status}"
            echo "test1_status=${test1_status}"
            echo "test2_status=${test2_status}"
            echo "test3_status=${test3_status}"
            echo "test4_status=${test4_status}"
            echo "test5_status=${test5_status}"
            echo "test6_status=${test6_status}"
            echo "test1_duration=${test1_duration}"
            echo "test2_duration=${test2_duration}"
            echo "test3_duration=${test3_duration}"
            echo "test4_duration=${test4_duration}"
            echo "test5_duration=${test5_duration}"
            echo "test6_duration=${test6_duration}"
            echo "regression_decision=${regression_decision}"
            echo "regression_current_version=${regression_current_version}"
            echo "regression_latest_version=${regression_latest_version}"
            echo "regression_next_installed_version=${regression_next_installed_version}"
            echo "regression_result=${regression_result}"
            echo "regression_details=${regression_details}"
          } >> "$GITHUB_OUTPUT"
        }

        has_arm64_manifest() {
          local image="$1"
          local manifest
          manifest=$(mktemp)
          if ! docker manifest inspect "$image" > "$manifest" 2>/tmp/manifest-error.log; then
            cat /tmp/manifest-error.log || true
            rm -f "$manifest"
            return 1
          fi
          python3 - "$manifest" <<'PY'
        import json
        import sys
        data = json.load(open(sys.argv[1]))
        manifests = data.get("manifests") or []
        if not manifests:
            arch = data.get("architecture")
            os_name = data.get("os")
            ok = arch == "arm64" and os_name in (None, "linux")
        else:
            ok = any(
                (item.get("platform") or {}).get("os") == "linux"
                and (item.get("platform") or {}).get("architecture") == "arm64"
                for item in manifests
            )
        raise SystemExit(0 if ok else 1)
        PY
          local rc=$?
          rm -f "$manifest"
          return "$rc"
        }

        maybe_login_ghcr() {
          if [[ "${BASELINE_IMAGE} ${CANDIDATE_IMAGE}" == *ghcr.io/* ]] && [ -n "${GITHUB_TOKEN:-}" ]; then
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR:-github-actions}" --password-stdin >/dev/null 2>&1 || true
          fi
        }

        download_file() {
          local url="$1"
          local dest="$2"
          curl --fail --location --http1.1 --ipv4 --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 1200 "$url" -o "$dest"
        }

        clone_source_tag() {
          local repo="$1"
          local tag="$2"
          local dest="$3"
          rm -rf "$dest"
          mkdir -p "$dest"
          download_file "https://github.com/${repo}/archive/refs/tags/${tag}.tar.gz" "$dest/source.tgz" || return 1
          tar -xzf "$dest/source.tgz" -C "$dest" --strip-components=1
        }

        expected_paths_exist() {
          local root="$1"
          local list="$2"
          IFS=',' read -ra paths <<< "$list"
          local path
          for path in "${paths[@]}"; do
            path="${path#"${path%%[![:space:]]*}"}"
            path="${path%"${path##*[![:space:]]}"}"
            [ -z "$path" ] && continue
            [ -e "$root/$path" ] || return 1
          done
        }

        install_github_binary() {
          local url="$1"
          local binary="$2"
          local dest="$3"
          local work
          work=$(mktemp -d)
          download_file "$url" "$work/pkg.tgz" || return 1
          tar -xzf "$work/pkg.tgz" -C "$work" || return 1
          local found
          found=$(find "$work" -type f -name "$binary" -perm -111 | head -1)
          [ -n "$found" ] || found=$(find "$work" -type f -name "$binary" | head -1)
          [ -n "$found" ] || return 1
          chmod +x "$found"
          sudo install -m 0755 "$found" "$dest"
        }

        validate_candidate_binary() {
          local url="$1"
          local binary="$2"
          local expected="$3"
          local dest="/tmp/${binary}-candidate"
          local start
          start=$(date +%s)
          if install_github_binary "$url" "$binary" "$dest" && "$dest" --help >/tmp/candidate-help.log 2>&1; then
            local reported
            reported=$("$dest" version 2>/dev/null | grep -Eo '[0-9]+([.][0-9]+){1,3}' | head -1 || true)
            [ -z "$reported" ] && reported="$expected"
            regression_decision="next_install_validated"
            regression_next_installed_version="$reported"
            regression_result="Next version install validation passed on Arm64"
            regression_details="${PACKAGE_NAME} candidate ${expected} downloaded, installed, and returned help/version output on the Arm64 runner."
            set_test 6 passed "$start"
          else
            regression_decision="next_install_failed"
            regression_result="Next version install validation failed on Arm64"
            regression_details="${PACKAGE_NAME} candidate ${expected} did not install or produce expected CLI output."
            set_test 6 failed "$start"
          fi
        }

        validate_candidate_images() {
          local images="$1"
          local label="$2"
          local start
          start=$(date +%s)
          local image
          local ok=1
          for image in $images; do
            if ! has_arm64_manifest "$image" || ! docker pull --platform linux/arm64 "$image" >/dev/null; then
              ok=0
            fi
          done
          regression_current_version="${BASELINE_VERSION}"
          regression_latest_version="${label}"
          if [ "$ok" -eq 1 ]; then
            regression_decision="next_install_validated"
            regression_next_installed_version="$label"
            regression_result="Next image validation passed on Arm64"
            regression_details="${PACKAGE_NAME} candidate image(s) expose linux/arm64 manifests and pull successfully."
            set_test 6 passed "$start"
          else
            regression_decision="next_install_failed"
            regression_result="Next image validation failed on Arm64"
            regression_details="${PACKAGE_NAME} candidate image(s) did not expose linux/arm64 manifests or did not pull successfully."
            set_test 6 failed "$start"
          fi
        }

        maybe_login_ghcr

        case "$KIND" in
          fastai)
            apt_bootstrap python3-venv python3-pip
            work=$(mktemp -d)
            start=$(date +%s)
            if python3 -m venv "$work/venv" && "$work/venv/bin/python" -m pip install --upgrade pip >/dev/null && "$work/venv/bin/python" -m pip install "fastai==${BASELINE_VERSION}" ipython; then
              install_status="success"
              version=$("$work/venv/bin/python" - <<'PY'
        import importlib.metadata as metadata
        print(metadata.version("fastai"))
        PY
        )
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); "$work/venv/bin/python" -m pip show fastai >/dev/null && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); "$work/venv/bin/python" - <<'PY' && set_test 3 passed "$start" || set_test 3 failed "$start"
        import fastai
        import fastai.torch_core
        import torch
        PY
              start=$(date +%s); "$work/venv/bin/python" - <<'PY' && [ "$(uname -m)" = "aarch64" ] && set_test 4 passed "$start" || set_test 4 failed "$start"
        import fastai
        import platform
        import torch
        assert platform.machine() in ("aarch64", "arm64")
        assert torch.__version__
        assert fastai.__version__
        PY
              start=$(date +%s); "$work/venv/bin/python" - <<'PY' && set_test 5 passed "$start" || set_test 5 failed "$start"
        import torch
        from fastai.torch_core import tensor
        value = tensor([1, 2, 3])
        assert torch.equal(value + 1, torch.tensor([2, 3, 4]))
        PY
            fi
            finish_package_manager_test6 "$version"
            ;;

          podman-compose)
            apt_bootstrap python3-venv python3-pip
            work=$(mktemp -d)
            start=$(date +%s)
            if python3 -m venv "$work/venv" && "$work/venv/bin/python" -m pip install --upgrade pip >/dev/null && "$work/venv/bin/python" -m pip install "podman-compose==${BASELINE_VERSION}"; then
              install_status="success"
              version=$("$work/venv/bin/python" - <<'PY'
        import importlib.metadata as metadata
        print(metadata.version("podman-compose"))
        PY
        )
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); "$work/venv/bin/podman-compose" --version | grep -q "$BASELINE_VERSION" && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); "$work/venv/bin/podman-compose" --help | grep -qiE 'usage|podman-compose' && set_test 3 passed "$start" || set_test 3 failed "$start"
              start=$(date +%s); "$work/venv/bin/python" -m pip check && [ "$(uname -m)" = "aarch64" ] && set_test 4 passed "$start" || set_test 4 failed "$start"
              cat > "$work/compose.yml" <<'EOF'
        services:
          smoke:
            image: quay.io/podman/hello
            command: ["echo", "arm64"]
        EOF
              start=$(date +%s); "$work/venv/bin/podman-compose" --dry-run -f "$work/compose.yml" config >/tmp/podman-compose-config.log 2>&1 && grep -qi 'smoke' /tmp/podman-compose-config.log && set_test 5 passed "$start" || set_test 5 failed "$start"
            fi
            finish_package_manager_test6 "$version"
            ;;

          luigi-source)
            apt_bootstrap curl tar python3
            work=$(mktemp -d)
            start=$(date +%s)
            if clone_source_tag "$SOURCE_REPO" "$SOURCE_TAG" "$work/src"; then
              install_status="success"
              version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); expected_paths_exist "$work/src" "$EXPECTED_PATHS" && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); python3 - "$work/src/core/package.json" "$BASELINE_VERSION" <<'PY' && set_test 3 passed "$start" || set_test 3 failed "$start"
        import json
        import sys
        data = json.load(open(sys.argv[1]))
        assert data.get("version") == sys.argv[2]
        assert "luigi" in data.get("name", "").lower()
        PY
              start=$(date +%s); [ "$(uname -m)" = "aarch64" ] && set_test 4 passed "$start" || set_test 4 failed "$start"
              start=$(date +%s); grep -R "Luigi" "$work/src/docs" "$work/src/core" >/dev/null 2>&1 && set_test 5 passed "$start" || set_test 5 failed "$start"
            fi
            start=$(date +%s)
            regression_current_version="$BASELINE_VERSION"
            regression_latest_version="${CANDIDATE_SOURCE_TAG:-unknown}"
            if [ -n "$CANDIDATE_SOURCE_TAG" ] && clone_source_tag "$SOURCE_REPO" "$CANDIDATE_SOURCE_TAG" "$work/next" && expected_paths_exist "$work/next" "$EXPECTED_PATHS"; then
              regression_decision="next_install_validated"
              regression_next_installed_version="$CANDIDATE_SOURCE_TAG"
              regression_result="Next source validation passed on Arm64"
              regression_details="${PACKAGE_NAME} candidate ${CANDIDATE_SOURCE_TAG} source archive downloaded and validated on the Arm64 runner."
              set_test 6 passed "$start"
            else
              regression_decision="next_install_failed"
              regression_result="Next source validation failed on Arm64"
              regression_details="${PACKAGE_NAME} candidate source archive could not be validated."
              set_test 6 failed "$start"
            fi
            ;;

          github-binary)
            apt_bootstrap curl tar file
            binary="${COMMAND_NAME}"
            start=$(date +%s)
            if install_github_binary "$BASELINE_URL" "$binary" "/usr/local/bin/$binary"; then
              install_status="success"
              version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); file "/usr/local/bin/$binary" | grep -qiE 'arm64|aarch64|ARM aarch64' && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); "$binary" --help >/tmp/binary-help.log 2>&1 && grep -qiE 'usage|command|help|greenhouse' /tmp/binary-help.log && set_test 3 passed "$start" || set_test 3 failed "$start"
              start=$(date +%s); ("$binary" version || "$binary" --version || true) >/tmp/binary-version.log 2>&1; grep -qiE "${BASELINE_VERSION}|version|commit" /tmp/binary-version.log && set_test 4 passed "$start" || set_test 4 failed "$start"
              start=$(date +%s); [ "$(uname -m)" = "aarch64" ] && "$binary" --help >/dev/null 2>&1 && set_test 5 passed "$start" || set_test 5 failed "$start"
            fi
            regression_current_version="$BASELINE_VERSION"
            regression_latest_version="${CANDIDATE_VERSION:-unknown}"
            validate_candidate_binary "$CANDIDATE_URL" "$binary" "$CANDIDATE_VERSION"
            ;;

          podman-remote)
            apt_bootstrap curl tar file
            start=$(date +%s)
            if install_github_binary "$BASELINE_URL" "podman-remote-static-linux_arm64" "/usr/local/bin/podman"; then
              install_status="success"
              version=$(podman --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+){1,3}' | head -1 || true)
              [ -z "$version" ] && version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); podman --version | grep -q "$BASELINE_VERSION" && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); podman --help | grep -qiE 'usage|commands|podman' && set_test 3 passed "$start" || set_test 3 failed "$start"
              start=$(date +%s); file /usr/local/bin/podman | grep -qiE 'arm64|aarch64|ARM aarch64' && set_test 4 passed "$start" || set_test 4 failed "$start"
              start=$(date +%s); [ "$(uname -m)" = "aarch64" ] && podman manifest --help >/dev/null 2>&1 && set_test 5 passed "$start" || set_test 5 failed "$start"
            fi
            regression_current_version="$version"
            regression_latest_version="${CANDIDATE_VERSION:-unknown}"
            validate_candidate_binary "$CANDIDATE_URL" "podman-remote-static-linux_arm64" "$CANDIDATE_VERSION"
            ;;

          tool-image)
            apt_bootstrap python3
            start=$(date +%s)
            if has_arm64_manifest "$BASELINE_IMAGE" && docker pull --platform linux/arm64 "$BASELINE_IMAGE"; then
              install_status="success"
              version=$(docker run --rm --platform linux/arm64 --entrypoint "$COMMAND_NAME" "$BASELINE_IMAGE" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+){1,3}' | head -1 || true)
              [ -z "$version" ] && version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); docker image inspect "$BASELINE_IMAGE" >/dev/null && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); docker run --rm --platform linux/arm64 --entrypoint "$COMMAND_NAME" "$BASELINE_IMAGE" --version 2>&1 | grep -q "$BASELINE_VERSION" && set_test 3 passed "$start" || set_test 3 failed "$start"
              start=$(date +%s); docker run --rm --platform linux/arm64 --entrypoint "$COMMAND_NAME" "$BASELINE_IMAGE" --help 2>&1 | grep -qiE 'usage|commands|options' && set_test 4 passed "$start" || set_test 4 failed "$start"
              start=$(date +%s)
              if [ "$COMMAND_NAME" = "skopeo" ]; then
                docker run --rm --platform linux/arm64 --entrypoint skopeo "$BASELINE_IMAGE" inspect "docker://${BASELINE_IMAGE}" >/dev/null 2>&1 && [ "$(uname -m)" = "aarch64" ] && set_test 5 passed "$start" || set_test 5 failed "$start"
              else
                docker run --rm --privileged --security-opt seccomp=unconfined --platform linux/arm64 --entrypoint "$COMMAND_NAME" "$BASELINE_IMAGE" --storage-driver=vfs info >/dev/null 2>&1 && [ "$(uname -m)" = "aarch64" ] && set_test 5 passed "$start" || set_test 5 failed "$start"
              fi
            fi
            validate_candidate_images "$CANDIDATE_IMAGE" "${CANDIDATE_VERSION:-latest}"
            ;;

          source-image)
            apt_bootstrap curl tar python3
            work=$(mktemp -d)
            start=$(date +%s)
            if clone_source_tag "$SOURCE_REPO" "$SOURCE_TAG" "$work/src"; then
              install_status="success"
              version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              start=$(date +%s); expected_paths_exist "$work/src" "$EXPECTED_PATHS" && set_test 2 passed "$start" || set_test 2 failed "$start"
              start=$(date +%s); ok=1; for image in $BASELINE_IMAGE; do has_arm64_manifest "$image" || ok=0; done; [ "$ok" -eq 1 ] && set_test 3 passed "$start" || set_test 3 failed "$start"
              start=$(date +%s); ok=1; for image in $BASELINE_IMAGE; do docker pull --platform linux/arm64 "$image" >/dev/null || ok=0; done; [ "$ok" -eq 1 ] && set_test 4 passed "$start" || set_test 4 failed "$start"
              start=$(date +%s); ok=1; for image in $BASELINE_IMAGE; do docker image inspect "$image" >/dev/null || ok=0; done; [ "$ok" -eq 1 ] && [ "$(uname -m)" = "aarch64" ] && set_test 5 passed "$start" || set_test 5 failed "$start"
            fi
            validate_candidate_images "$CANDIDATE_IMAGE" "${CANDIDATE_VERSION:-unknown}"
            ;;

          kafka-connect|kafka-mirrormaker)
            apt_bootstrap openjdk-17-jre curl tar
            work=$(mktemp -d)
            kafka_dir="$work/kafka_${BASELINE_VERSION}"
            start=$(date +%s)
            artifact="kafka_2.13-${BASELINE_VERSION}.tgz"
            if download_file "https://archive.apache.org/dist/kafka/${BASELINE_VERSION}/${artifact}" "$work/kafka.tgz" && tar -xzf "$work/kafka.tgz" -C "$work"; then
              mv "$work/kafka_2.13-${BASELINE_VERSION}" "$kafka_dir"
              install_status="success"
              version="$BASELINE_VERSION"
              set_test 1 passed "$start"
            else
              set_test 1 failed "$start"
            fi
            if [ "$install_status" = "success" ]; then
              if [ "$KIND" = "kafka-connect" ]; then
                start=$(date +%s); [ -x "$kafka_dir/bin/connect-standalone.sh" ] && [ -x "$kafka_dir/bin/connect-distributed.sh" ] && set_test 2 passed "$start" || set_test 2 failed "$start"
                start=$(date +%s); "$kafka_dir/bin/connect-standalone.sh" --help >/tmp/kafka-connect-help.log 2>&1 || true; grep -qiE 'usage|connect' /tmp/kafka-connect-help.log && set_test 3 passed "$start" || set_test 3 failed "$start"
                start=$(date +%s); [ -f "$kafka_dir/config/connect-standalone.properties" ] && [ -f "$kafka_dir/config/connect-distributed.properties" ] && set_test 4 passed "$start" || set_test 4 failed "$start"
                start=$(date +%s); find "$kafka_dir/libs" -name '*connect*.jar' | grep -q . && [ "$(uname -m)" = "aarch64" ] && set_test 5 passed "$start" || set_test 5 failed "$start"
              else
                start=$(date +%s); [ -x "$kafka_dir/bin/connect-mirror-maker.sh" ] && set_test 2 passed "$start" || set_test 2 failed "$start"
                start=$(date +%s); "$kafka_dir/bin/connect-mirror-maker.sh" --help >/tmp/kafka-mirror-help.log 2>&1 || true; grep -qiE 'usage|mirror|connect' /tmp/kafka-mirror-help.log && set_test 3 passed "$start" || set_test 3 failed "$start"
                start=$(date +%s); find "$kafka_dir/libs" -name '*mirror*.jar' | grep -q . && set_test 4 passed "$start" || set_test 4 failed "$start"
                start=$(date +%s); grep -R "MirrorMaker" "$kafka_dir/config" "$kafka_dir/bin" >/dev/null 2>&1 && [ "$(uname -m)" = "aarch64" ] && set_test 5 passed "$start" || set_test 5 failed "$start"
              fi
            fi
            start=$(date +%s)
            regression_current_version="$BASELINE_VERSION"
            regression_latest_version="${CANDIDATE_VERSION:-unknown}"
            next_artifact="kafka_2.13-${CANDIDATE_VERSION}.tgz"
            next_dir="$work/kafka_${CANDIDATE_VERSION}"
            if [ -n "$CANDIDATE_VERSION" ] && download_file "https://archive.apache.org/dist/kafka/${CANDIDATE_VERSION}/${next_artifact}" "$work/kafka-next.tgz" && tar -xzf "$work/kafka-next.tgz" -C "$work"; then
              mv "$work/kafka_2.13-${CANDIDATE_VERSION}" "$next_dir"
              if { [ "$KIND" = "kafka-connect" ] && [ -x "$next_dir/bin/connect-standalone.sh" ]; } || { [ "$KIND" = "kafka-mirrormaker" ] && [ -x "$next_dir/bin/connect-mirror-maker.sh" ]; }; then
                regression_decision="next_install_validated"
                regression_next_installed_version="$CANDIDATE_VERSION"
                regression_result="Next Kafka component validation passed on Arm64"
                regression_details="${PACKAGE_NAME} candidate Kafka ${CANDIDATE_VERSION} archive downloaded and component scripts were present on Arm64."
                set_test 6 passed "$start"
              else
                regression_decision="next_install_failed"; regression_result="Next Kafka component validation failed on Arm64"; regression_details="Candidate Kafka archive did not contain expected component scripts."; set_test 6 failed "$start"
              fi
            else
              regression_decision="next_install_failed"; regression_result="Next Kafka component validation failed on Arm64"; regression_details="Candidate Kafka archive could not be downloaded or extracted."; set_test 6 failed "$start"
            fi
            ;;

          *)
            echo "Unsupported smoke kind: $KIND"
            ;;
        esac

        if [ "$install_status" != "success" ]; then
          regression_decision="baseline_install_failed"
          regression_current_version="${BASELINE_VERSION}"
          regression_latest_version="not_applicable"
          regression_next_installed_version="not_installed"
          regression_result="Regression validation deferred because baseline install failed"
          regression_details="${PACKAGE_NAME} baseline install/readiness checks did not complete, so candidate validation is not trusted."
        fi

        write_outputs
