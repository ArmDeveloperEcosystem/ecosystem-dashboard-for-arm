name: Emit package result
description: Compute one canonical package result, write the GitHub step summary, and expose a single fail/no-fail output.

inputs:
  package_slug:
    description: Stable package slug.
    required: false
    default: ""
  package_name:
    description: Display package name.
    required: true
  version:
    description: Baseline version tested in this run.
    required: false
    default: unknown
  install_status:
    description: Resolved baseline install state for this workflow.
    required: false
    default: success
  runner_label:
    description: Runner label to show in the summary.
    required: false
    default: ubuntu-24.04 (arm64)
  summary_style:
    description: Built-in test label set. Supported values are baseline-artifact and python-package.
    required: false
    default: baseline-artifact
  test1_label:
    description: Optional override label for Test 1.
    required: false
    default: ""
  test2_label:
    description: Optional override label for Test 2.
    required: false
    default: ""
  test3_label:
    description: Optional override label for Test 3.
    required: false
    default: ""
  test4_label:
    description: Optional override label for Test 4.
    required: false
    default: ""
  test5_label:
    description: Optional override label for Test 5.
    required: false
    default: ""
  test1_status:
    description: Status for Test 1.
    required: false
    default: skipped
  test2_status:
    description: Status for Test 2.
    required: false
    default: skipped
  test3_status:
    description: Status for Test 3.
    required: false
    default: skipped
  test4_status:
    description: Status for Test 4.
    required: false
    default: skipped
  test5_status:
    description: Status for Test 5.
    required: false
    default: skipped
  test6_status:
    description: Status for Test 6.
    required: false
    default: skipped
  test1_duration:
    description: Duration for Test 1 in seconds.
    required: false
    default: "0"
  test2_duration:
    description: Duration for Test 2 in seconds.
    required: false
    default: "0"
  test3_duration:
    description: Duration for Test 3 in seconds.
    required: false
    default: "0"
  test4_duration:
    description: Duration for Test 4 in seconds.
    required: false
    default: "0"
  test5_duration:
    description: Duration for Test 5 in seconds.
    required: false
    default: "0"
  test6_duration:
    description: Duration for Test 6 in seconds.
    required: false
    default: "0"
  regression_decision:
    description: Decision output from Test 6.
    required: false
    default: not_configured
  regression_current_version:
    description: Current version validated by Tests 1-5.
    required: false
    default: unknown
  regression_latest_version:
    description: Latest stable version targeted for Test 6.
    required: false
    default: unknown
  regression_next_installed_version:
    description: Installed version reported by the Test 6 candidate install.
    required: false
    default: not_installed
  regression_result:
    description: Human-readable Test 6 result.
    required: false
    default: Regression result unavailable.
  regression_details:
    description: Human-readable Test 6 details.
    required: false
    default: Regression comparison summary unavailable.
  result_path:
    description: Path for the canonical JSON result file.
    required: false
    default: .package-result.json
  fail_on_test6:
    description: Treat a failed Test 6 as an overall workflow failure.
    required: false
    default: "true"

outputs:
  passed:
    description: Number of passed tests.
    value: ${{ steps.emit.outputs.passed }}
  failed:
    description: Number of failed tests.
    value: ${{ steps.emit.outputs.failed }}
  skipped:
    description: Number of skipped tests.
    value: ${{ steps.emit.outputs.skipped }}
  core_failed:
    description: Number of failed core tests (Tests 1-5).
    value: ${{ steps.emit.outputs.core_failed }}
  duration:
    description: Total test duration in seconds.
    value: ${{ steps.emit.outputs.duration }}
  overall_status:
    description: Overall workflow status.
    value: ${{ steps.emit.outputs.overall_status }}
  badge_status:
    description: Support badge status.
    value: ${{ steps.emit.outputs.badge_status }}
  should_fail:
    description: 1 when the workflow should fail, else 0.
    value: ${{ steps.emit.outputs.should_fail }}
  result_path:
    description: Path to the emitted canonical JSON result.
    value: ${{ steps.emit.outputs.result_path }}

runs:
  using: composite
  steps:
    - name: Emit canonical package result
      id: emit
      shell: bash
      env:
        PACKAGE_SLUG: ${{ inputs.package_slug }}
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION: ${{ inputs.version }}
        INSTALL_STATUS: ${{ inputs.install_status }}
        RUNNER_LABEL: ${{ inputs.runner_label }}
        SUMMARY_STYLE: ${{ inputs.summary_style }}
        TEST1_LABEL: ${{ inputs.test1_label }}
        TEST2_LABEL: ${{ inputs.test2_label }}
        TEST3_LABEL: ${{ inputs.test3_label }}
        TEST4_LABEL: ${{ inputs.test4_label }}
        TEST5_LABEL: ${{ inputs.test5_label }}
        TEST1_STATUS: ${{ inputs.test1_status }}
        TEST2_STATUS: ${{ inputs.test2_status }}
        TEST3_STATUS: ${{ inputs.test3_status }}
        TEST4_STATUS: ${{ inputs.test4_status }}
        TEST5_STATUS: ${{ inputs.test5_status }}
        TEST6_STATUS: ${{ inputs.test6_status }}
        TEST1_DURATION: ${{ inputs.test1_duration }}
        TEST2_DURATION: ${{ inputs.test2_duration }}
        TEST3_DURATION: ${{ inputs.test3_duration }}
        TEST4_DURATION: ${{ inputs.test4_duration }}
        TEST5_DURATION: ${{ inputs.test5_duration }}
        TEST6_DURATION: ${{ inputs.test6_duration }}
        REGRESSION_DECISION: ${{ inputs.regression_decision }}
        REGRESSION_CURRENT_VERSION: ${{ inputs.regression_current_version }}
        REGRESSION_LATEST_VERSION: ${{ inputs.regression_latest_version }}
        REGRESSION_NEXT_INSTALLED_VERSION: ${{ inputs.regression_next_installed_version }}
        REGRESSION_RESULT: ${{ inputs.regression_result }}
        REGRESSION_DETAILS: ${{ inputs.regression_details }}
        RESULT_PATH: ${{ inputs.result_path }}
        FAIL_ON_TEST6: ${{ inputs.fail_on_test6 }}
      run: |
        set -euo pipefail

        normalize_status() {
          case "$(printf '%s' "${1:-}" | tr '[:upper:]' '[:lower:]')" in
            passed|pass|success) printf 'passed\n' ;;
            failed|fail|failure|cancelled|canceled|timed_out|timedout) printf 'failed\n' ;;
            skipped|skip|neutral|"") printf 'skipped\n' ;;
            *) printf 'skipped\n' ;;
          esac
        }

        as_int() {
          if [[ "${1:-0}" =~ ^[0-9]+$ ]]; then
            printf '%s\n' "$1"
          else
            printf '0\n'
          fi
        }

        test1_status="$(normalize_status "$TEST1_STATUS")"
        test2_status="$(normalize_status "$TEST2_STATUS")"
        test3_status="$(normalize_status "$TEST3_STATUS")"
        test4_status="$(normalize_status "$TEST4_STATUS")"
        test5_status="$(normalize_status "$TEST5_STATUS")"
        test6_status="$(normalize_status "$TEST6_STATUS")"

        passed=0
        failed=0
        skipped=0
        core_failed=0

        if [ "${INSTALL_STATUS}" != "success" ] || \
           [ "${REGRESSION_DECISION}" = "baseline_failed" ] || \
           [ "${REGRESSION_DECISION}" = "baseline_install_failed" ]; then
          passed=0
          failed=1
          skipped=5
          core_failed=1
          duration="$(as_int "$TEST6_DURATION")"
          overall_status="failure"
          badge_status="failing"
          should_fail=1
        else
          for status in "$test1_status" "$test2_status" "$test3_status" "$test4_status" "$test5_status"; do
            case "$status" in
              passed) passed=$((passed + 1)) ;;
              failed)
                failed=$((failed + 1))
                core_failed=$((core_failed + 1))
                ;;
              *) skipped=$((skipped + 1)) ;;
            esac
          done

          case "$test6_status" in
            passed) passed=$((passed + 1)) ;;
            failed) failed=$((failed + 1)) ;;
            *) skipped=$((skipped + 1)) ;;
          esac

          duration=$(( \
            $(as_int "$TEST1_DURATION") + \
            $(as_int "$TEST2_DURATION") + \
            $(as_int "$TEST3_DURATION") + \
            $(as_int "$TEST4_DURATION") + \
            $(as_int "$TEST5_DURATION") + \
            $(as_int "$TEST6_DURATION") \
          ))

          should_fail=0
          if [ "$core_failed" -ne 0 ]; then
            should_fail=1
          elif [ "$FAIL_ON_TEST6" = "true" ] && [ "$test6_status" = "failed" ]; then
            should_fail=1
          fi

          if [ "$should_fail" -eq 0 ]; then
            overall_status="success"
            badge_status="passing"
          else
            overall_status="failure"
            badge_status="failing"
          fi
        fi

        case "${SUMMARY_STYLE}" in
          python-package)
            default_test1_label="Test 1 - Package installed"
            default_test2_label="Test 2 - Version metadata matches baseline"
            default_test3_label="Test 3 - Installed files metadata"
            default_test4_label="Test 4 - Architecture Verification"
            default_test5_label="Test 5 - Functional Validation"
            ;;
          *)
            default_test1_label="Test 1 - Baseline artifact exists"
            default_test2_label="Test 2 - Baseline metadata check"
            default_test3_label="Test 3 - Source or documentation presence"
            default_test4_label="Test 4 - Architecture Verification"
            default_test5_label="Test 5 - Bounded functional validation"
            ;;
        esac

        test1_label="${TEST1_LABEL:-$default_test1_label}"
        test2_label="${TEST2_LABEL:-$default_test2_label}"
        test3_label="${TEST3_LABEL:-$default_test3_label}"
        test4_label="${TEST4_LABEL:-$default_test4_label}"
        test5_label="${TEST5_LABEL:-$default_test5_label}"

        if [ "${REGRESSION_DECISION}" = "not_applicable_package_manager" ]; then
          test6_line="6. Regression applicability: package-manager installed (not applicable)"
        elif [ "${REGRESSION_DECISION}" = "not_configured" ]; then
          test6_line="6. Regression applicability: not configured"
        else
          test6_line="6. Test 6 - Regression Validation: ${test6_status}"
        fi

        {
          printf '%s\n' "## ${PACKAGE_NAME} Test Results"
          printf '\n'
          printf '%s\n' "- **Version:** ${VERSION}"
          printf '%s\n' "- **Status:** ${overall_status}"
          printf '%s\n' "- **Tests Passed:** ${passed}"
          printf '%s\n' "- **Tests Failed:** ${failed}"
          printf '%s\n' "- **Tests Skipped:** ${skipped}"
          printf '%s\n' "- **Duration:** ${duration}s"
          printf '%s\n' "- **Runner:** ${RUNNER_LABEL}"
          printf '\n'
          printf '%s\n' "### Test Details"
          printf '%s\n' "1. ${test1_label}: ${test1_status}"
          printf '%s\n' "2. ${test2_label}: ${test2_status}"
          printf '%s\n' "3. ${test3_label}: ${test3_status}"
          printf '%s\n' "4. ${test4_label}: ${test4_status}"
          printf '%s\n' "5. ${test5_label}: ${test5_status}"
          printf '%s\n' "${test6_line}"
          printf '\n'
          printf '%s\n' "### Regression Validation (Next Version Install)"
          printf '%s\n' "- **Current version tested in Tests 1-5:** ${REGRESSION_CURRENT_VERSION}"
          printf '%s\n' "- **Next version targeted for install validation:** ${REGRESSION_LATEST_VERSION}"
          printf '%s\n' "- **Next version installed on Arm64:** ${REGRESSION_NEXT_INSTALLED_VERSION}"
          printf '%s\n' "- **Regression install result:** ${REGRESSION_RESULT}"
          printf '%s\n' "- **Details:** ${REGRESSION_DETAILS}"
          printf '\n'
          printf '%s\n' "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64."
        } >> "${GITHUB_STEP_SUMMARY}"

        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = {
            "contract_version": "2.0",
            "metadata": {
                "package_slug": os.environ.get("PACKAGE_SLUG", "").strip(),
                "package_name": os.environ["PACKAGE_NAME"],
                "version": os.environ["VERSION"],
                "runner": os.environ["RUNNER_LABEL"],
            },
            "run": {
                "status": os.environ["overall_status"],
                "badge_status": os.environ["badge_status"],
            },
            "tests": {
                "passed": int(os.environ["passed"]),
                "failed": int(os.environ["failed"]),
                "skipped": int(os.environ["skipped"]),
                "core_failed": int(os.environ["core_failed"]),
                "duration_seconds": int(os.environ["duration"]),
                "details": {
                    "test1": os.environ["test1_status"],
                    "test2": os.environ["test2_status"],
                    "test3": os.environ["test3_status"],
                    "test4": os.environ["test4_status"],
                    "test5": os.environ["test5_status"],
                    "test6": os.environ["test6_status"],
                },
            },
            "regression": {
                "decision": os.environ["REGRESSION_DECISION"],
                "current_version": os.environ["REGRESSION_CURRENT_VERSION"],
                "latest_version": os.environ["REGRESSION_LATEST_VERSION"],
                "next_installed_version": os.environ["REGRESSION_NEXT_INSTALLED_VERSION"],
                "result": os.environ["REGRESSION_RESULT"],
                "details": os.environ["REGRESSION_DETAILS"],
            },
        }
        result_path = Path(os.environ["RESULT_PATH"])
        result_path.parent.mkdir(parents=True, exist_ok=True)
        result_path.write_text(json.dumps(payload, indent=2) + "\n")
        PY

        {
          echo "passed=$passed"
          echo "failed=$failed"
          echo "skipped=$skipped"
          echo "core_failed=$core_failed"
          echo "duration=$duration"
          echo "overall_status=$overall_status"
          echo "badge_status=$badge_status"
          echo "should_fail=$should_fail"
          echo "result_path=$RESULT_PATH"
        } >> "$GITHUB_OUTPUT"

        export passed failed skipped core_failed duration overall_status badge_status test1_status test2_status test3_status test4_status test5_status test6_status
