name: Hardened Apt Bootstrap
description: Retry apt index refreshes on transient Ubuntu mirror sync issues and optionally install packages.

inputs:
  packages:
    description: Space-separated apt packages to install after a successful update.
    required: false
    default: ""
  extra_packages:
    description: Optional additional packages appended to the base install list.
    required: false
    default: ""
  retries:
    description: Number of apt-get update attempts before failing.
    required: false
    default: "5"
  initial_backoff_seconds:
    description: Initial sleep duration between retries. Doubles after each failed attempt.
    required: false
    default: "5"
  quiet:
    description: Suppress apt output when set to true.
    required: false
    default: "false"
  update_only:
    description: Skip package installation and only refresh apt indices.
    required: false
    default: "false"
  no_install_recommends:
    description: Install packages with --no-install-recommends when set to true.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Harden apt update and install
      shell: bash
      run: |
        set -euo pipefail
        bash "${{ github.action_path }}/bootstrap.sh" \
          --packages "${{ inputs.packages }}" \
          --extra-packages "${{ inputs.extra_packages }}" \
          --retries "${{ inputs.retries }}" \
          --initial-backoff-seconds "${{ inputs.initial_backoff_seconds }}" \
          --quiet "${{ inputs.quiet }}" \
          --update-only "${{ inputs.update_only }}" \
          --no-install-recommends "${{ inputs.no_install_recommends }}"
