name: Generic Source Regression Check
description: Validate next stable source/release tag availability for generic repo-backed workflows.

inputs:
  baseline_version:
    description: Baseline version already validated in Tests 1-5
    required: true
  github_repo:
    description: owner/repo used to resolve tags from GitHub
    required: true
  lane_kind:
    description: Workflow lane description for messaging
    required: false
    default: ""
  next_version_override:
    description: Manually pinned next stable version display value
    required: false
    default: ""
  candidate_tag_override:
    description: Manually pinned upstream tag/ref to clone for the next stable candidate
    required: false
    default: ""
  limited_cpu_probe:
    description: Optional bounded Arm64 CPU/source/import/help proof script to run after the candidate source resolves.
    required: false
    default: ""
  limited_cpu_description:
    description: Human-readable caveat for the bounded CPU proof.
    required: false
    default: "A bounded CPU-side proof completed on the Arm64 runner. This is not a full specialized runtime validation."

outputs:
  status:
    description: Regression status
    value: ${{ steps.regress.outputs.status }}
  decision:
    description: Regression decision
    value: ${{ steps.regress.outputs.decision }}
  current_version:
    description: Baseline version
    value: ${{ steps.regress.outputs.current_version }}
  latest_version:
    description: Next candidate version
    value: ${{ steps.regress.outputs.latest_version }}
  next_installed_version:
    description: Candidate version validated
    value: ${{ steps.regress.outputs.next_installed_version }}
  regression_result:
    description: Human readable result
    value: ${{ steps.regress.outputs.regression_result }}
  comparison:
    description: Human readable comparison note
    value: ${{ steps.regress.outputs.comparison }}
  note:
    description: Alias for comparison, retained for workflows that still use note fallback expressions
    value: ${{ steps.regress.outputs.comparison }}
  duration:
    description: Duration in seconds
    value: ${{ steps.regress.outputs.duration }}

runs:
  using: composite
  steps:
    - id: regress
      shell: bash
      env:
        INPUT_LIMITED_CPU_PROBE: ${{ inputs.limited_cpu_probe }}
        INPUT_LIMITED_CPU_DESCRIPTION: ${{ inputs.limited_cpu_description }}
      run: |
        set -euo pipefail

        START_TIME=$(date +%s)
        CURRENT="${{ inputs.baseline_version }}"
        REPO="${{ inputs.github_repo }}"
        LANE_KIND="${{ inputs.lane_kind }}"
        OVERRIDE_VERSION="${{ inputs.next_version_override }}"
        OVERRIDE_TAG="${{ inputs.candidate_tag_override }}"
        LIMITED_CPU_PROBE="${INPUT_LIMITED_CPU_PROBE:-}"
        LIMITED_CPU_DESCRIPTION="${INPUT_LIMITED_CPU_DESCRIPTION:-A bounded CPU-side proof completed on the Arm64 runner. This is not a full specialized runtime validation.}"

        echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

        emit_runtime_not_automated() {
          local latest_version="${1:-runtime_review}"
          local candidate_version="${2:-not_installed}"
          local result="${3:-Package-specific runtime validation is not automated}"
          local details="${4:-This generic source workflow can resolve source metadata, but it does not install and execute the package on Arm64. A package-specific runtime lane is required before this can be treated as a fully validated smoke test.}"
          echo "latest_version=${latest_version}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${candidate_version}" >> "$GITHUB_OUTPUT"
          echo "decision=runtime_validation_not_automated" >> "$GITHUB_OUTPUT"
          echo "regression_result=${result}" >> "$GITHUB_OUTPUT"
          echo "comparison=${details}" >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
        }

        run_limited_cpu_probe() {
          local latest_version="${1:-unknown}"
          local candidate_version="${2:-unknown}"
          if [ -z "$LIMITED_CPU_PROBE" ]; then
            return 1
          fi

          export CURRENT_VERSION="$CURRENT"
          export LATEST_VERSION="$latest_version"
          export CANDIDATE_TAG="$candidate_version"
          export GITHUB_REPO="$REPO"
          export LANE_KIND="$LANE_KIND"

          if bash -euo pipefail -c "$LIMITED_CPU_PROBE"; then
            echo "latest_version=${latest_version}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${latest_version}" >> "$GITHUB_OUTPUT"
            echo "decision=limited_cpu_smoke_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Arm preflight proof passed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${LIMITED_CPU_DESCRIPTION}" >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "latest_version=${latest_version}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=limited_cpu_probe_failed" >> "$GITHUB_OUTPUT"
            echo "decision=limited_cpu_smoke_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Arm preflight proof failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${LIMITED_CPU_DESCRIPTION}" >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          return 0
        }

        if [ -z "$REPO" ]; then
          emit_runtime_not_automated \
            "manual_review" \
            "manual_review" \
            "Package-specific runtime validation is not automated" \
            "This workflow does not declare a GitHub source repository and does not install and execute the package on Arm64. A dedicated package runtime lane is required before this can be treated as a fully validated smoke test."
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -n "$OVERRIDE_VERSION" ] && [ -n "$OVERRIDE_TAG" ]; then
          STATUS_KIND="FOUND_OVERRIDE"
          LATEST_VERSION="$OVERRIDE_VERSION"
          CANDIDATE_TAG="$OVERRIDE_TAG"
        else
          mapfile -t RAW_TAGS < <(git ls-remote --tags --refs "https://github.com/${REPO}.git" 2>/dev/null | awk '{print $2}' | sed 's#refs/tags/##')

          TAG_RESULT=$(RAW_TAGS="$(printf '%s\n' "${RAW_TAGS[@]-}")" python3 - "$CURRENT" <<'PY'
        import os
        import re
        import sys

        current = sys.argv[1].strip()
        raw_tags = [line.strip() for line in os.environ.get("RAW_TAGS", "").splitlines() if line.strip()]

        drop_prefix_re = re.compile(r"^(?:release[-_/]|rel[-_/]|version[-_/])", re.I)
        pre_re = re.compile(r"(?:alpha|beta|rc|preview|pre|nightly|dev)", re.I)

        def normalize(value: str):
            original = value.strip()
            value = original.split("/")[-1]
            value = value.rstrip("^{}")
            value = value.lstrip("vV")
            value = drop_prefix_re.sub("", value)
            if pre_re.search(value):
                return None
            m = re.match(r"^(\d+(?:[._-]\d+)*)$", value)
            if not m:
                return None
            display = m.group(1)
            parts = tuple(int(x) for x in re.split(r"[._-]", display))
            return parts, display, original

        current_norm = normalize(current)
        parsed = []
        for tag in raw_tags:
            norm = normalize(tag)
            if norm is not None:
                parsed.append(norm)

        if not parsed:
            print("UNRESOLVED\t\t")
            raise SystemExit(0)

        parsed.sort(key=lambda item: item[0])
        latest = parsed[-1]

        if current_norm is None:
            print(f"METADATA_REVIEW\t{latest[1]}\t{latest[2]}")
            raise SystemExit(0)

        newer = [item for item in parsed if item[0] > current_norm[0]]
        if not newer:
            print(f"NONE\t{current_norm[1]}\t{current}")
            raise SystemExit(0)

        candidate = newer[-1]
        print(f"FOUND\t{candidate[1]}\t{candidate[2]}")
        PY
          )

          STATUS_KIND=$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $1}')
          LATEST_VERSION=$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $2}')
          CANDIDATE_TAG=$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $3}')
        fi

        case "$STATUS_KIND" in
          NONE)
            if [ -n "$LIMITED_CPU_PROBE" ]; then
              echo "latest_version=${LATEST_VERSION:-$CURRENT}" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=n/a" >> "$GITHUB_OUTPUT"
              echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
              echo "regression_result=No newer stable public release is available" >> "$GITHUB_OUTPUT"
              echo "comparison=The current version ${CURRENT} is already the latest stable source tag we could resolve from ${REPO}. Tests 1-5 remain the bounded Arm64 proof for this package; no newer candidate exists for Test 6. ${LIMITED_CPU_DESCRIPTION}" >> "$GITHUB_OUTPUT"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
            else
              emit_runtime_not_automated \
                "${LATEST_VERSION:-$CURRENT}" \
                "n/a" \
                "No newer stable source tag is available, but runtime validation is not automated" \
                "The current version ${CURRENT} is already the latest stable source tag we could resolve from ${REPO}. However, this generic workflow only validates source/artifact evidence; it does not install and execute the package on Arm64."
            fi
            ;;
          UNRESOLVED)
            emit_runtime_not_automated \
              "metadata_review" \
              "metadata_review" \
              "Automatic next-version resolution needs manual review and runtime validation is not automated" \
              "The workflow could not derive comparable stable version tags automatically from ${REPO}. It also does not install and execute the package on Arm64, so a package-specific runtime lane is required."
            ;;
          METADATA_REVIEW)
            emit_runtime_not_automated \
              "${LATEST_VERSION:-metadata_review}" \
              "metadata_review" \
              "Automatic next-version resolution needs manual review and runtime validation is not automated" \
              "The baseline version ${CURRENT} does not parse cleanly for automatic ordering, while ${REPO} exposes newer stable-looking tags such as ${LATEST_VERSION}. This workflow also does not install and execute the package on Arm64."
            ;;
          FOUND_OVERRIDE)
            rm -rf next-src
            if git clone --depth 1 --branch "$CANDIDATE_TAG" "https://github.com/${REPO}.git" next-src >/dev/null 2>&1; then
              if find next-src -maxdepth 2 -type f \( -name 'README*' -o -name 'LICENSE*' -o -name 'Makefile' -o -name 'pyproject.toml' -o -name 'go.mod' -o -name 'Cargo.toml' -o -name 'pom.xml' -o -name 'CMakeLists.txt' -o -name 'package.json' \) -print -quit | grep -q . || [ -n "$(find next-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
                run_limited_cpu_probe "${LATEST_VERSION}" "${CANDIDATE_TAG}" || \
                  emit_runtime_not_automated \
                    "${LATEST_VERSION}" \
                    "${LATEST_VERSION}" \
                    "Next stable source tag resolved, but runtime validation is not automated" \
                    "A package-specific next stable candidate was pinned manually for ${REPO}: baseline ${CURRENT} vs candidate ${LATEST_VERSION} (${CANDIDATE_TAG}). The candidate source resolved, but this generic workflow still does not install and execute the package on Arm64."
              else
                echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
                echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next source release could not satisfy bounded validation on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=A package-specific next stable candidate was pinned manually for ${REPO}, but the candidate checkout ${CANDIDATE_TAG} did not contain the expected bounded artifact structure used by this workflow." >> "$GITHUB_OUTPUT"
                echo "status=failed" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next source release clone failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=A package-specific next stable candidate was pinned manually for ${REPO}, but cloning ${CANDIDATE_TAG} failed on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi
            ;;
          FOUND)
            rm -rf next-src
            if git clone --depth 1 --branch "$CANDIDATE_TAG" "https://github.com/${REPO}.git" next-src >/dev/null 2>&1; then
              if find next-src -maxdepth 2 -type f \( -name 'README*' -o -name 'LICENSE*' -o -name 'Makefile' -o -name 'pyproject.toml' -o -name 'go.mod' -o -name 'Cargo.toml' -o -name 'pom.xml' -o -name 'CMakeLists.txt' -o -name 'package.json' \) -print -quit | grep -q . || [ -n "$(find next-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
                if echo "$LANE_KIND" | grep -qi 'gpu\|specialized'; then
                  NOTE="Baseline source/artifact checks passed for ${CURRENT}, and the next stable source tag ${LATEST_VERSION} from ${REPO} also resolved. Specialized runtime smoke still requires the package-specific GPU/accelerator environment."
                else
                  NOTE="Baseline source/artifact checks passed for ${CURRENT}, and the next stable source tag ${LATEST_VERSION} from ${REPO} also resolved. This generic workflow still does not install and execute the package on Arm64."
                fi
                run_limited_cpu_probe "${LATEST_VERSION}" "${CANDIDATE_TAG}" || \
                  emit_runtime_not_automated \
                    "${LATEST_VERSION}" \
                    "${LATEST_VERSION}" \
                    "Next stable source tag resolved, but runtime validation is not automated" \
                    "$NOTE"
              else
                echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
                echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next source release could not satisfy bounded validation on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=The next stable source tag ${LATEST_VERSION} from ${REPO} resolved, but the candidate checkout did not contain the expected bounded artifact structure used by this workflow." >> "$GITHUB_OUTPUT"
                echo "status=failed" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next source release clone failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=The baseline version ${CURRENT} passed bounded source/artifact checks, but cloning the next stable tag ${LATEST_VERSION} from ${REPO} failed on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi
            ;;
          *)
            echo "latest_version=metadata_review" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=metadata_review" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Automatic next-version resolution needs manual review" >> "$GITHUB_OUTPUT"
            echo "comparison=The workflow could not classify the next-version lookup result for ${REPO}; package-specific review is required." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            ;;
        esac

        END_TIME=$(date +%s)
        echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
