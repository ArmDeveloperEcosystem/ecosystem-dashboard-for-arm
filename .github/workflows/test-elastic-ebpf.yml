name: Test Elastic eBPF on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-elastic-ebpf.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-elastic-ebpf.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-elastic-ebpf.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-elastic-ebpf.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-elastic-ebpf.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-elastic-ebpf.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-elastic-ebpf.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-elastic-ebpf.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-elastic-ebpf.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-elastic-ebpf.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-elastic-ebpf.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-elastic-ebpf.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-elastic-ebpf.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-elastic-ebpf.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-elastic-ebpf.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-elastic-ebpf.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-elastic-ebpf.outputs.timestamp }}
jobs:
  test-elastic-ebpf:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    env:
      BASELINE_VERSION: "8.4.0"
      NEXT_VERSION: "8.5.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Elastic eBPF'
      package_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BASELINE_VERSION }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=elastic-ebpf" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/elastic-ebpf" >> "$GITHUB_OUTPUT"
      - name: Install Elastic eBPF source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          BUILD_DEPS=(git clang llvm cmake bmake zlib1g-dev m4 gcc g++ make file)
          # Upstream's generic README includes libc6-dev-i386 for x86 environments,
          # but that package does not exist on Ubuntu arm64 runners and is not needed
          # for the native Arm64 CMake build we validate here.
          if [ "$(dpkg --print-architecture)" != "arm64" ]; then
            BUILD_DEPS+=(libc6-dev-i386)
          fi
          sudo apt-get install -y "${BUILD_DEPS[@]}"
          MULTIARCH_INCLUDE="/usr/include/$(gcc -dumpmachine)"
          if [ -d "$MULTIARCH_INCLUDE/bits" ] && [ ! -e /usr/include/bits ]; then
            sudo ln -s "$MULTIARCH_INCLUDE/bits" /usr/include/bits
          fi
          echo "ELASTIC_EBPF_MULTIARCH_INCLUDE=$MULTIARCH_INCLUDE" >> "$GITHUB_ENV"

          CURRENT_VERSION="${BASELINE_VERSION}"
          SRC_DIR="/tmp/elastic-ebpf-${CURRENT_VERSION}"
          rm -rf "$SRC_DIR"
          git clone --depth 1 --branch "v${CURRENT_VERSION}" https://github.com/elastic/ebpf.git "$SRC_DIR"
          CHECKED_OUT_TAG=$(git -C "$SRC_DIR" describe --tags --exact-match 2>/dev/null || true)

          if [ -d "$SRC_DIR" ] && [ -f "$SRC_DIR/CMakeLists.txt" ] && [ -n "$CHECKED_OUT_TAG" ]; then
            echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
            echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "checked_out_tag=${CHECKED_OUT_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Elastic eBPF version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.checked_out_tag || steps.install.outputs.baseline_version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Source Tree and Version Metadata
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TAG=$(git -C "${{ steps.install.outputs.source_dir }}" describe --tags --exact-match 2>/dev/null | sed 's/^v//')
          if [ -d "${{ steps.install.outputs.source_dir }}" ] \
            && [ -f "${{ steps.install.outputs.source_dir }}/CMakeLists.txt" ] \
            && [ "$TAG" = "${{ steps.install.outputs.baseline_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Build Elastic eBPF
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.source_dir }}"
          rm -rf build
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            ARCH="aarch64"
          fi
          MULTIARCH_INCLUDE="${ELASTIC_EBPF_MULTIARCH_INCLUDE:-/usr/include/$(gcc -dumpmachine)}"
          if [ -d "$MULTIARCH_INCLUDE" ]; then
            export CPATH="$MULTIARCH_INCLUDE${CPATH:+:$CPATH}"
          fi
          cmake -S . -B build -DTARGET_DIR="$PWD/build/target" -DARCH="$ARCH" -DEBPF_EXTERNAL_ENV_FLAGS=BUILD_STATIC_ONLY=1
          cmake --build build -j"$(nproc)"
          if [ -f "$PWD/build/target/libeBPF.a" ] \
            && [ -n "$(find "$PWD/build/target/ebpf" -maxdepth 1 -name '*.bpf.o' | head -n 1)" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Build Output Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TARGET_DIR="${{ steps.install.outputs.source_dir }}/build/target"
          BPF_OBJ_COUNT=$(find "$TARGET_DIR/ebpf" -maxdepth 1 -name '*.bpf.o' | wc -l | tr -d ' ')
          TEST_BIN=$(find "$TARGET_DIR/test" -maxdepth 1 -type f -name 'BPFTcFilterTests' | head -n 1)
          if [ "${BPF_OBJ_COUNT:-0}" -gt 0 ] \
            && [ -f "$TARGET_DIR/libeBPF.a" ] \
            && [ -n "$TEST_BIN" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            find "$TARGET_DIR" -maxdepth 3 -type f | sed -n '1,40p' || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TEST_BIN=$(find "${{ steps.install.outputs.source_dir }}/build/target/test" -maxdepth 1 -type f -name 'BPFTcFilterTests' | head -n 1)
          if [ "$(uname -m)" = "aarch64" ] \
            && [ -n "$TEST_BIN" ] \
            && file "$TEST_BIN" | grep -Eqi 'ELF .*aarch64|ELF .*ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$TEST_BIN" ]; then
              file "$TEST_BIN" || true
            else
              echo "BPFTcFilterTests binary not found under ${{ steps.install.outputs.source_dir }}/build/target/test"
            fi
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Package Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TARGET_DIR="${{ steps.install.outputs.source_dir }}/build/target"
          TEST_BIN=$(find "$TARGET_DIR/test" -maxdepth 1 -type f -name 'BPFTcFilterTests' | head -n 1)
          if [ -n "$TEST_BIN" ]; then
            HELP_OUTPUT=$("$TEST_BIN" --help 2>&1 || true)
          else
            HELP_OUTPUT="BPFTcFilterTests binary not found under $TARGET_DIR/test"
          fi
          if [ -n "$TEST_BIN" ] \
            && [ -f "$TARGET_DIR/libeBPF.a" ] \
            && printf '%s\n' "$HELP_OUTPUT" | grep -Eqi 'test|gtest|Google Test'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$HELP_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.install.outputs.baseline_version }}"
          LATEST="${NEXT_VERSION}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run, but the latest stable release tag could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run, but the latest stable release tag could not be resolved for Arm64 regression validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Elastic eBPF version ${CURRENT} matches the latest stable release tag ${LATEST}. Regression validation re-used the successful Arm64 source build and package outputs from Tests 1-5."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR=$(mktemp -d)
          git clone --depth 1 --branch "v${LATEST}" https://github.com/elastic/ebpf.git "$NEXT_DIR"
          NEXT_TAG=$(git -C "$NEXT_DIR" describe --tags --exact-match 2>/dev/null | sed 's/^v//')
          cd "$NEXT_DIR"
          rm -rf build
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            ARCH="aarch64"
          fi
          MULTIARCH_INCLUDE="${ELASTIC_EBPF_MULTIARCH_INCLUDE:-/usr/include/$(gcc -dumpmachine)}"
          if [ -d "$MULTIARCH_INCLUDE" ]; then
            export CPATH="$MULTIARCH_INCLUDE${CPATH:+:$CPATH}"
          fi
          cmake -S . -B build -DTARGET_DIR="$PWD/build/target" -DARCH="$ARCH" -DEBPF_EXTERNAL_ENV_FLAGS=BUILD_STATIC_ONLY=1
          cmake --build build -j"$(nproc)"
          cmake --install build --prefix "$PWD/build/package" >/dev/null 2>&1 || true
          NEXT_TEST_BIN=$(find "$NEXT_DIR/build" -type f -name 'BPFTcFilterTests' | head -n 1)
          NEXT_BPF_OBJ=$(find "$NEXT_DIR/build" -type f -name '*.bpf.o' | head -n 1)
          NEXT_LIB=$(find "$NEXT_DIR/build" -type f \( -name 'libeBPF.a' -o -name 'libbpf.a' \) | head -n 1)
          NEXT_REPORTED="${NEXT_TAG:-$LATEST}"

          if [ -n "$NEXT_LIB" ] \
            && [ -n "$NEXT_REPORTED" ] \
            && [ -n "$NEXT_BPF_OBJ" ] \
            && [ -n "$NEXT_TEST_BIN" ] \
            && file "$NEXT_TEST_BIN" | grep -Eqi 'ELF .*aarch64|ELF .*ARM aarch64'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run. Regression validation configured and built candidate release ${LATEST} on Arm64 successfully, and the checked-out git tag resolved to ${NEXT_REPORTED}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run. Regression validation configured and built candidate release ${LATEST} on Arm64 successfully, and the checked-out git tag resolved to ${NEXT_REPORTED}."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not configure and build successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Elastic eBPF version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not configure and build successfully on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_core_test() {
            local status="$1"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}"

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Elastic eBPF Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Source Tree and Version Metadata: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Build Elastic eBPF: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Build Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Package Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
