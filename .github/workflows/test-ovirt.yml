name: Test OVirt on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ovirt.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ovirt.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ovirt.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ovirt.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ovirt.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ovirt.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ovirt.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ovirt.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ovirt.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ovirt.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ovirt.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ovirt.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ovirt.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ovirt.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-ovirt.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ovirt.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ovirt.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ovirt.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ovirt.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ovirt.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ovirt.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ovirt.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ovirt.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ovirt.outputs.timestamp }}
jobs:
  test-ovirt:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    env:
      OVIRT_BASELINE_TAG: "ovirt-engine-4.5.6"
      OVIRT_NEXT_TAG: "ovirt-engine-4.5.7"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OVirt'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ovirt" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ovirt" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"

      - name: Install OVirt
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl tar bash python3"
          RELEASE_TAG="${OVIRT_BASELINE_TAG}"
          rm -rf /tmp/ovirt-src
          mkdir -p /tmp/ovirt-src
          curl -fsSL "https://api.github.com/repos/oVirt/ovirt-engine/tarball/${RELEASE_TAG}" -o /tmp/ovirt-engine.tar.gz
          tar -xzf /tmp/ovirt-engine.tar.gz -C /tmp/ovirt-src
          INSTALL_DIR=$(find /tmp/ovirt-src -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)
          SETUP_DIR="$INSTALL_DIR/packaging/setup/bin"
          SETUP_BIN="$SETUP_DIR/ovirt-engine-setup"
          REMOVE_BIN="$SETUP_DIR/ovirt-engine-remove"
          RENAME_BIN="$SETUP_DIR/ovirt-engine-rename"

          mkdir -p /tmp/ovirt-empty-env
          cat > "$SETUP_DIR/ovirt-engine-setup.env" <<EOF
          DEV_PYTHON_DIR=""
          DEV_SETUP_ENV_DIR="/tmp/ovirt-empty-env"
          DEVMODE=1
          EOF
          chmod +x "$SETUP_BIN" "$REMOVE_BIN" "$RENAME_BIN"

          if [ -x "$SETUP_BIN" ] && [ -x "$REMOVE_BIN" ] && [ -x "$RENAME_BIN" ]; then
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
            echo "setup_bin=$SETUP_BIN" >> "$GITHUB_OUTPUT"
            echo "remove_bin=$REMOVE_BIN" >> "$GITHUB_OUTPUT"
            echo "rename_bin=$RENAME_BIN" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get OVirt version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.release_tag }}"
          VERSION="${VERSION#ovirt-engine-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${OVIRT_NEXT_TAG#ovirt-engine-}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check setup script exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.setup_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check setup help output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if bash "${{ steps.install.outputs.setup_bin }}" --help 2>&1 | tee /tmp/ovirt-setup-help.log | grep -qi "Usage:"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ovirt-setup-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check remove helper help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if bash "${{ steps.install.outputs.remove_bin }}" --help 2>&1 | tee /tmp/ovirt-remove-help.log | grep -qi "Usage:"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ovirt-remove-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check rename helper help output
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if bash "${{ steps.install.outputs.rename_bin }}" --help 2>&1 | tee /tmp/ovirt-rename-help.log | grep -qi "Usage:"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ovirt-rename-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST_TAG="${OVIRT_NEXT_TAG}"
          LATEST="${LATEST_TAG#ovirt-engine-}"
          NEXT_INSTALLED="not_installed"
          DECISION=""
          REGRESSION_RESULT=""
          COMPARISON=""
          STATUS="failed"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          NEXT_ROOT="$(mktemp -d)"
          trap 'rm -rf "$NEXT_ROOT"' EXIT
          if ! curl -fsSL "https://api.github.com/repos/oVirt/ovirt-engine/tarball/${LATEST_TAG}" -o "$NEXT_ROOT/ovirt-engine.tar.gz"; then
            NEXT_INSTALLED="not_installed"
            DECISION="next_lookup_failed"
            REGRESSION_RESULT="Next version lookup failed on Arm64"
            COMPARISON="Current pinned oVirt Engine version ${CURRENT} passed smoke tests in this run, but the next stable release tag ${LATEST} could not be downloaded for Arm64 regression validation."
            STATUS="failed"
          else
            tar -xzf "$NEXT_ROOT/ovirt-engine.tar.gz" -C "$NEXT_ROOT"
            NEXT_DIR="$(find "$NEXT_ROOT" -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)"
            NEXT_SETUP_DIR="$NEXT_DIR/packaging/setup/bin"
            NEXT_SETUP_BIN="$NEXT_SETUP_DIR/ovirt-engine-setup"
            NEXT_REMOVE_BIN="$NEXT_SETUP_DIR/ovirt-engine-remove"
            NEXT_RENAME_BIN="$NEXT_SETUP_DIR/ovirt-engine-rename"

            if [ -n "$NEXT_DIR" ] && [ -x "$NEXT_SETUP_BIN" ] && [ -x "$NEXT_REMOVE_BIN" ] && [ -x "$NEXT_RENAME_BIN" ] \
               && bash "$NEXT_SETUP_BIN" --help >/tmp/ovirt-next-setup-help.log 2>&1 \
               && bash "$NEXT_REMOVE_BIN" --help >/tmp/ovirt-next-remove-help.log 2>&1 \
               && bash "$NEXT_RENAME_BIN" --help >/tmp/ovirt-next-rename-help.log 2>&1; then
              NEXT_INSTALLED="$LATEST"
              DECISION="next_install_validated"
              REGRESSION_RESULT="Next version installed successfully on Arm64"
              COMPARISON="Current pinned oVirt Engine version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release ${LATEST}, confirmed the setup/remove/rename helper binaries, and verified all candidate help paths on Arm64."
              STATUS="passed"
            else
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned oVirt Engine version ${CURRENT} passed smoke tests in this run, but candidate release ${LATEST} did not expose the expected setup helper scripts or help paths on Arm64."
              STATUS="failed"
            fi
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            DECISION="metadata_review_required"
            REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
            COMPARISON="Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release."
            STATUS="failed"
            NEXT_INSTALLED="$CURRENT"
          fi

          echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "regression_result=$REGRESSION_RESULT" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## oVirt Engine Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
