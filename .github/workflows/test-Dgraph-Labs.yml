name: Test Dgraph Labs on Arm64

# When you copy this file, uncomment the appropriate triggers below:
on:
  workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-dgraph-labs.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-dgraph-labs.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-dgraph-labs.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-dgraph-labs.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-dgraph-labs.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-dgraph-labs.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-dgraph-labs.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-dgraph-labs.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-dgraph-labs.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-dgraph-labs.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-dgraph-labs.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-dgraph-labs.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-dgraph-labs.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-dgraph-labs.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-dgraph-labs.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-dgraph-labs.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-dgraph-labs.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-dgraph-labs.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-dgraph-labs.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-dgraph-labs.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-dgraph-labs.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-dgraph-labs.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-dgraph-labs.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-dgraph-labs.outputs.timestamp }}
jobs:
  test-dgraph-labs:
    runs-on: ubuntu-24.04-arm
    env:
      DGRAPH_NEXT_VERSION: "24.1.1"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Dgraph Labs'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=Dgraph-Labs" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/Dgraph-Labs" >> "$GITHUB_OUTPUT"
          echo "current_version=24.1.0" >> "$GITHUB_OUTPUT"
      - name: Install Dgraph Labs
        id: install
        run: |
          set -euo pipefail
          echo "Installing Dgraph Labs..."
          BASELINE_TAG="v${{ steps.metadata.outputs.current_version }}"
          echo "Downloading pinned Dgraph baseline ${BASELINE_TAG} for ARM64..."
          URL="https://github.com/dgraph-io/dgraph/releases/download/${BASELINE_TAG}/dgraph-linux-arm64.tar.gz"
          curl -L -o dgraph.tar.gz "$URL"
          
          if file dgraph.tar.gz | grep -q "gzip compressed data"; then
             tar -xzf dgraph.tar.gz
             # Binaries are usually in the root of the tarball or a folder
             if [ -f "dgraph" ]; then
                sudo mv dgraph /usr/local/bin/
                sudo chmod +x /usr/local/bin/dgraph
                echo "Dgraph installed successfully to /usr/local/bin/dgraph"
                echo "install_status=success" >> $GITHUB_OUTPUT
             else
                # sometimes it might include other tools like dgraph-ratel, dgraph-zero etc.
                # Just looking for 'dgraph' binary
                chmod +x dgraph*
                sudo mv dgraph* /usr/local/bin/
                echo "Dgraph binaries installed"
                echo "install_status=success" >> $GITHUB_OUTPUT
             fi
          else
             echo "Failed to download valid Dgraph tarball from $URL"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Dgraph Labs version
        id: version
        run: |
          VERSION=$(dgraph version 2>&1 | grep "Dgraph version" | awk '{print $4}' | sed 's/^v//' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Dgraph Labs version: $VERSION"
      
      - name: Test 1 - Check dgraph binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v dgraph &> /dev/null; then
            echo "✓ dgraph binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ dgraph binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if dgraph version 2>&1 | grep -qi "Dgraph version"; then
            echo "✓ version command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if dgraph --help 2>&1 | grep -qi "usage"; then
            echo "✓ help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Basic functional check: try to run with version or --help and check exit code
          if dgraph version > /dev/null 2>&1 || dgraph --help > /dev/null 2>&1; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          START_TIME=$(date +%s)
          CURRENT="$(echo "${{ steps.version.outputs.version || 'unknown' }}" | tr -d '[:space:]' | sed 's/^v//')"
          LATEST="${DGRAPH_NEXT_VERSION}"
          NEXT_INSTALLED="not_installed"
          DECISION="next_lookup_failed"
          REGRESSION_RESULT="Next version install failed on Arm64"
          COMPARISON="Current pinned Dgraph Labs version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically."
          STATUS="failed"

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            NEXT_INSTALLED="lookup_failed"
          elif [ "$CURRENT" = "$LATEST" ]; then
            NEXT_INSTALLED="$CURRENT"
            DECISION="no_newer_stable_available"
            REGRESSION_RESULT="No newer stable release available for Test 6"
            COMPARISON="Current pinned baseline already matches the newest public stable upstream release, so there is no newer stable Arm64 candidate for a genuine Test 6 upgrade check."
            STATUS="skipped"
          else
            NEXT_DIR=$(mktemp -d /tmp/dgraph-next-XXXXXX)
            NEXT_TARBALL="$NEXT_DIR/dgraph.tar.gz"
            NEXT_URL="https://github.com/dgraph-io/dgraph/releases/download/v${LATEST}/dgraph-linux-arm64.tar.gz"
            if curl -fsSL -o "$NEXT_TARBALL" "$NEXT_URL"; then
              tar -xzf "$NEXT_TARBALL" -C "$NEXT_DIR"
              NEXT_BIN=$(find "$NEXT_DIR" -type f -name dgraph | head -1)
              if [ -n "$NEXT_BIN" ] && [ -f "$NEXT_BIN" ]; then
                chmod +x "$NEXT_BIN"
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" version 2>&1 | grep "Dgraph version" | awk '{print $4}' | sed 's/^v//' || true)
                if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                  NEXT_INSTALLED="$NEXT_INSTALLED_VERSION"
                  DECISION="next_install_validated"
                  REGRESSION_RESULT="Next version installed successfully on Arm64"
                  COMPARISON="Current pinned Dgraph Labs version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the extracted binary reported version ${NEXT_INSTALLED_VERSION}."
                  STATUS="passed"
                else
                  NEXT_INSTALLED="${NEXT_INSTALLED_VERSION:-unknown}"
                  DECISION="next_install_failed"
                  REGRESSION_RESULT="Next version installed but reported a version mismatch on Arm64"
                  COMPARISON="Current pinned Dgraph Labs version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} extracted on Arm64 and reported version ${NEXT_INSTALLED} instead of the expected ${LATEST}."
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                fi
              else
                NEXT_INSTALLED="install_failed"
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned Dgraph Labs version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Arm64 binary."
                echo "status=failed" >> "$GITHUB_OUTPUT"
              fi
            else
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned Dgraph Labs version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "regression_result=$REGRESSION_RESULT" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"
          echo "Next version installed on Arm64: $NEXT_INSTALLED"
          echo "Regression install result: $REGRESSION_RESULT"
          echo "Details: $COMPARISON"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          # Check dgraph binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          COMPARISON="${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          echo "## Dgraph Labs Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check dgraph binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check dgraph version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check dgraph help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "${COMPARISON}" >> $GITHUB_STEP_SUMMARY
