name: Test Corosync on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-corosync.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-corosync.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-corosync.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-corosync.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-corosync.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-corosync.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-corosync.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-corosync.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-corosync.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-corosync.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-corosync.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-corosync.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-corosync.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-corosync.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-corosync.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-corosync.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-corosync.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-corosync.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-corosync.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-corosync.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-corosync.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-corosync.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-corosync.outputs.timestamp }}
jobs:
  test-corosync:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Corosync'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=corosync" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/corosync" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y corosync
      
      - name: Get Corosync version
        id: version
        run: |
          # corosync -v output example: "Corosync Cluster Engine, version '3.1.7'"
          # We use head -n 1 to avoid copyright lines and grep/sed to extract just the version
          VERSION=$(corosync -v 2>&1 | head -n 1 | grep -oP "version '\K[^']+" || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Corosync version: $VERSION"
      
      - name: Test 1 - Check corosync binary exists and architecture
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v corosync &> /dev/null; then
            echo "✓ corosync binary found"
            # Check architecture
            if file $(which corosync) | grep -qi "aarch64"; then
               echo "✓ corosync binary is ARM64"
               echo "status=passed" >> $GITHUB_OUTPUT
            else
               echo "✗ corosync binary is NOT ARM64"
               file $(which corosync)
               echo "status=failed" >> $GITHUB_OUTPUT
               exit 1
            fi
          else
            echo "✗ corosync binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check corosync-cfgtool
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v corosync-cfgtool &> /dev/null; then
            echo "✓ corosync-cfgtool binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ corosync-cfgtool binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run corosync-keygen
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v corosync-keygen &> /dev/null; then
            echo "✓ corosync-keygen binary found"
            # Run keygen to verify it executes on ARM64
            # Use -l to avoid waiting for entropy if supported, or just run it with a timeout
            if sudo corosync-keygen -l -k /tmp/authkey 2>&1 | grep -qi "Writing corosync key"; then
               echo "✓ corosync-keygen executed successfully"
               echo "status=passed" >> $GITHUB_OUTPUT
            else
               # Fallback if -l is not supported
               if sudo timeout 5s corosync-keygen -k /tmp/authkey 2>&1 | grep -qi "Writing corosync key"; then
                  echo "✓ corosync-keygen executed successfully (fallback)"
                  echo "status=passed" >> $GITHUB_OUTPUT
              else
                  echo "✗ corosync-keygen failed or timed out"
                  echo "status=failed" >> $GITHUB_OUTPUT
                  exit 1
            fi
            fi
          else
            echo "✗ corosync-keygen binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Check Config Validity (Dry Run)
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # We can't easily start corosync without full HA setup, but we can check if config parser works
          # or just check if the service is installed
          
          if systemctl list-unit-files | grep -q corosync; then
             echo "✓ corosync service unit found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ corosync service unit not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 5 - Check Keygen Binary
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          
          if which corosync-keygen; then
             echo "✓ corosync-keygen binary found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ corosync-keygen binary not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check corosync binary exists and architecture
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check corosync-cfgtool
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run corosync-keygen
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check Config Validity (Dry Run)
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Check Keygen Binary
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Corosync Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check corosync binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check corosync-cfgtool: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Run corosync-keygen: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Check Config Validity: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Check Keygen Binary: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

