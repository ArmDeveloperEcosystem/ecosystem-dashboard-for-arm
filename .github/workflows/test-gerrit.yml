name: Test Gerrit on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/gerrit.md"
      - ".github/workflows/test-gerrit.yml"

jobs:
  test-gerrit:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gerrit" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gerrit" >> "$GITHUB_OUTPUT"

      - name: Install Gerrit
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless git curl

          CURRENT_VERSION="3.9.1"
          WORK_DIR="/tmp/gerrit-${CURRENT_VERSION}"
          WAR_PATH="${WORK_DIR}/gerrit-${CURRENT_VERSION}.war"
          SITE_DIR="${WORK_DIR}/site"

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          curl -fsSL "https://gerrit-releases.storage.googleapis.com/gerrit-${CURRENT_VERSION}.war" -o "$WAR_PATH"

          if ! timeout 180s java -jar "$WAR_PATH" init --batch --dev -d "$SITE_DIR" >/tmp/gerrit-init.log 2>&1; then
            cat /tmp/gerrit-init.log || true
            exit 1
          fi

          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "war_path=$WAR_PATH" >> "$GITHUB_OUTPUT"
          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Gerrit version
        id: version
        run: |
          set -euo pipefail
          RAW_VERSION=$(java -jar "${{ steps.install.outputs.war_path }}" version 2>&1 || true)
          VERSION=$(printf '%s\n' "$RAW_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Gerrit version: $VERSION"

      - name: Test 1 - Check Gerrit WAR exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${{ steps.install.outputs.war_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Gerrit version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_version }}"
          RAW_VERSION=$(java -jar "${{ steps.install.outputs.war_path }}" version 2>&1 || true)
          REPORTED=$(printf '%s\n' "$RAW_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          if printf '%s\n' "$RAW_VERSION" | grep -qi "gerrit version" && [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$RAW_VERSION" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check site initialization created gerrit.sh
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${{ steps.install.outputs.site_dir }}/bin/gerrit.sh" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Gerrit config files exist
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${{ steps.install.outputs.site_dir }}/etc/gerrit.config" ] \
            && [ -f "${{ steps.install.outputs.site_dir }}/etc/secure.config" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -R "${{ steps.install.outputs.site_dir }}/etc" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Gerrit script usage and Arm64 runtime
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          timeout 20s "${{ steps.install.outputs.site_dir }}/bin/gerrit.sh" --help >/tmp/gerrit-help.log 2>&1 || true
          if grep -q "Usage: gerrit.sh" /tmp/gerrit-help.log \
            && [ "$(uname -m)" = "aarch64" ] \
            && java -XshowSettings:properties -version 2>&1 | grep -q "os.arch = aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/gerrit-help.log || true
            java -XshowSettings:properties -version 2>&1 | grep "os.arch" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="$(
            python3 - <<'PY'
          import re
          import urllib.request

          req = urllib.request.Request(
              "https://gerrit-releases.storage.googleapis.com/",
              headers={"User-Agent": "github-actions"},
          )
          html = urllib.request.urlopen(req, timeout=30).read().decode("utf-8", "ignore")
          versions = sorted(
              {tuple(map(int, m.split("."))): m for m in re.findall(r"gerrit-(\d+\.\d+\.\d+)\.war", html)}.items()
          )
          print(versions[-1][1] if versions else "")
          PY
          )"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the latest stable Gerrit WAR could not be resolved for candidate validation." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the latest stable Gerrit WAR could not be resolved for candidate validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Gerrit version ${CURRENT} passed smoke tests in this run and is already the latest stable Gerrit WAR published upstream." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Current pinned Gerrit version ${CURRENT} passed smoke tests in this run and is already the latest stable Gerrit WAR published upstream."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_WAR="${NEXT_DIR}/gerrit-${LATEST}.war"
          NEXT_SITE="${NEXT_DIR}/site"
          curl -fsSL "https://gerrit-releases.storage.googleapis.com/gerrit-${LATEST}.war" -o "$NEXT_WAR"

          NEXT_RAW=$(java -jar "$NEXT_WAR" version 2>&1 || true)
          NEXT_REPORTED=$(printf '%s\n' "$NEXT_RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          if timeout 180s java -jar "$NEXT_WAR" init --batch --dev -d "$NEXT_SITE" >/tmp/gerrit-next-init.log 2>&1; then
            timeout 20s "${NEXT_SITE}/bin/gerrit.sh" --help >/tmp/gerrit-next-help.log 2>&1 || true
            if printf '%s\n' "$NEXT_RAW" | grep -qi "gerrit version" \
              && [ "$NEXT_REPORTED" = "$LATEST" ] \
              && [ -f "${NEXT_SITE}/bin/gerrit.sh" ] \
              && [ -f "${NEXT_SITE}/etc/gerrit.config" ] \
              && [ -f "${NEXT_SITE}/etc/secure.config" ] \
              && grep -q "Usage: gerrit.sh" /tmp/gerrit-next-help.log; then
              echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Gerrit version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate version ${LATEST}, the WAR reported version ${NEXT_REPORTED}, and a separate development site initialized successfully on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_REPORTED"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Gerrit version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate version ${LATEST}, the WAR reported version ${NEXT_REPORTED}, and a separate development site initialized successfully on Arm64."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              printf '%s\n' "$NEXT_RAW" || true
              cat /tmp/gerrit-next-help.log || true
              echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Gerrit installation on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Gerrit installation on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            cat /tmp/gerrit-next-init.log || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} failed to initialize a development site on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Gerrit version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} failed to initialize a development site on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/gerrit.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Gerrit",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Gerrit WAR exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Gerrit version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check site initialization created gerrit.sh",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check Gerrit config files exist",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Check Gerrit script usage and Arm64 runtime",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gerrit-test-results
          path: test-results/gerrit.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Gerrit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Gerrit WAR exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Gerrit version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check site initialization created gerrit.sh: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Gerrit config files exist: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check Gerrit script usage and Arm64 runtime: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
