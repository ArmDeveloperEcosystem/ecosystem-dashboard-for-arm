name: Test CJSON on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cjson.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cjson.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cjson.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cjson.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cjson.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cjson.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cjson.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cjson.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cjson.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cjson.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cjson.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cjson.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cjson.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cjson.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cjson.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cjson.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cjson.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cjson.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cjson.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cjson.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cjson.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cjson.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cjson.outputs.timestamp }}
jobs:
  test-cjson:
    runs-on: ubuntu-24.04-arm
    env:
      CJSON_BASELINE_VERSION: "v1.7.18"
      CJSON_NEXT_VERSION: "v1.7.19"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'CJSON'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cjson" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cjson" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git pkg-config
      
      - name: Build CJSON from Source
        id: build
        run: |
          echo "Cloning cJSON..."
          git clone --depth 1 --branch "$CJSON_BASELINE_VERSION" https://github.com/DaveGamble/cJSON.git
          cd cJSON
          echo "CJSON_SOURCE_DIR=$PWD" >> "$GITHUB_ENV"
          
          echo "Building..."
          mkdir build
          cd build
          cmake .. -DENABLE_CJSON_TEST=On
          make
          sudo make install
          sudo ldconfig
          
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get CJSON version
        id: version
        run: |
          VERSION=$(git -C "${CJSON_SOURCE_DIR:-cJSON}" describe --tags --exact-match 2>/dev/null | sed 's/^v//' || pkg-config --modversion libcjson 2>/dev/null | head -n 1 || git -C "${CJSON_SOURCE_DIR:-cJSON}" describe --tags --always 2>/dev/null | sed 's/^v//' || echo "unknown")
          VERSION=${VERSION:-unknown}
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected CJSON version: $VERSION"
      
      - name: Test 1 - Check Header File
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "/usr/local/include/cjson/cJSON.h" ]; then
             echo "✓ cJSON.h found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cJSON.h not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          VERSION=$(pkg-config --modversion libcjson 2>&1)
          echo "$VERSION"

          if echo "$VERSION" | grep -Eq '^[0-9]'; then
             echo "✓ pkg-config reported the installed cJSON version"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cJSON version metadata lookup failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check pkg-config flags
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          FLAGS=$(pkg-config --cflags --libs libcjson 2>&1)
          echo "$FLAGS"

          if echo "$FLAGS" | grep -q "cjson"; then
             echo "✓ pkg-config returned cJSON compile flags"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cJSON compile flags lookup failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
             echo "✓ Running on Arm64"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Expected aarch64 runner"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Compile and run test program
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation

          cat > test.c << EOF
          #include <stdio.h>
          #include <stdlib.h>
          #include <cjson/cJSON.h>

          int main(void) {
              cJSON *root = cJSON_CreateObject();
              char *out;

              if (root == NULL) {
                  return 1;
              }

              cJSON_AddStringToObject(root, "name", "test");
              out = cJSON_PrintUnformatted(root);

              if (out == NULL) {
                  cJSON_Delete(root);
                  return 1;
              }

              printf("%s\n", out);
              free(out);
              cJSON_Delete(root);
              return 0;
          }
          EOF

          gcc test.c -o test $(pkg-config --cflags --libs libcjson)

          if ./test | grep -q '{"name":"test"}'; then
             echo "✓ cJSON compiled and executed successfully"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cJSON functional validation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_VERSION="${CJSON_NEXT_VERSION#v}"
          NEXT_TAG="${CJSON_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          if ! git clone --depth 1 --branch "$NEXT_TAG" https://github.com/DaveGamble/cJSON.git "$TMPDIR/cJSON-next" >/tmp/cjson-regression-clone.log 2>&1; then
            cat /tmp/cjson-regression-clone.log || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned cJSON version $CURRENT passed smoke tests in this run, but the candidate source tag $NEXT_TAG could not be cloned for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cd "$TMPDIR/cJSON-next"
          mkdir build
          cd build
          cmake .. -DENABLE_CJSON_TEST=On -DCMAKE_INSTALL_PREFIX="$TMPDIR/install" >/tmp/cjson-regression-cmake.log 2>&1
          if ! make >/tmp/cjson-regression-make.log 2>&1; then
            cat /tmp/cjson-regression-make.log || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned cJSON version $CURRENT passed smoke tests in this run, but the candidate source tag $NEXT_TAG failed to build on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cmake --install . >/tmp/cjson-regression-install.log 2>&1
          export PKG_CONFIG_PATH="$TMPDIR/install/lib/pkgconfig:$TMPDIR/install/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          NEXT_INSTALLED_VERSION=$(pkg-config --modversion libcjson 2>/dev/null | head -n 1 || git -C "$TMPDIR/cJSON-next" describe --tags --exact-match 2>/dev/null | sed 's/^v//' || echo "$NEXT_VERSION")

          cat > "$TMPDIR/test.c" <<'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <cjson/cJSON.h>
          int main(void) {
            cJSON *root = cJSON_CreateObject();
            char *out;
            if (root == NULL) return 1;
            cJSON_AddStringToObject(root, "name", "regression");
            out = cJSON_PrintUnformatted(root);
            if (out == NULL) { cJSON_Delete(root); return 1; }
            printf("%s\n", out);
            free(out);
            cJSON_Delete(root);
            return 0;
          }
          EOF

          gcc "$TMPDIR/test.c" -o "$TMPDIR/test-next" $(pkg-config --cflags --libs libcjson) -Wl,-rpath,"$TMPDIR/install/lib" >/tmp/cjson-regression-gcc.log 2>&1
          if [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ] || ! "$TMPDIR/test-next" | grep -q '{"name":"regression"}'; then
            cat /tmp/cjson-regression-gcc.log || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=$( [ \"$CURRENT\" = \"$NEXT_INSTALLED_VERSION\" ] && echo 'Tests 1-5 baseline must be older than the latest stable release' || echo 'Next version install failed on Arm64')" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ]; then
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            else
              echo "comparison=Current pinned cJSON version $CURRENT passed smoke tests in this run, but the candidate Arm64 build from source tag $NEXT_TAG did not complete the expected install-plus-compile validation." >> "$GITHUB_OUTPUT"
            fi
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned cJSON version $CURRENT passed smoke tests in this run. Regression validation built, installed, and compiled against candidate version $NEXT_INSTALLED_VERSION from source tag $NEXT_TAG on Arm64." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## CJSON Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Header File: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check version metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check pkg-config flags: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Compile and run test program: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
