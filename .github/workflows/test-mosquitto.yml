name: Test Mosquitto on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-mosquitto.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-mosquitto.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-mosquitto.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-mosquitto.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-mosquitto.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-mosquitto.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-mosquitto.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-mosquitto.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-mosquitto.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-mosquitto.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-mosquitto.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-mosquitto.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-mosquitto.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-mosquitto.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-mosquitto.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-mosquitto.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-mosquitto.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-mosquitto.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-mosquitto.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-mosquitto.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-mosquitto.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-mosquitto.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-mosquitto.outputs.timestamp }}
jobs:
  test-mosquitto:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Mosquitto'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mosquitto" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mosquitto" >> "$GITHUB_OUTPUT"
      - name: Install Mosquitto
        id: install
        run: |
          echo "Installing Mosquitto..."
          sudo apt-get update
          if sudo apt-get install -y mosquitto mosquitto-clients; then
            echo "Mosquitto installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Mosquitto installation failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Get Mosquitto version
        id: version
        run: |
          HELP_OUTPUT=$(mosquitto -h 2>&1 || true)
          VERSION=$(printf "%s\n" "$HELP_OUTPUT" | awk '/^mosquitto version / { print $3; exit }')
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Mosquitto version: $VERSION"

      - name: Test 1 - Check broker and client binaries
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v mosquitto > /dev/null 2>&1 && command -v mosquitto_pub > /dev/null 2>&1 && command -v mosquitto_sub > /dev/null 2>&1; then
            echo "✓ Mosquitto broker and client binaries found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Required Mosquitto binaries were not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          HELP_OUTPUT=$(mosquitto -h 2>&1 || true)
          if printf "%s\n" "$HELP_OUTPUT" | grep -q "^mosquitto version "; then
            echo "✓ Mosquitto version output works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Mosquitto version output failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          PUB_HELP=$(mosquitto_pub --help 2>&1 || true)
          SUB_HELP=$(mosquitto_sub --help 2>&1 || true)
          if printf "%s\n" "$PUB_HELP" | grep -q "^Usage:" && printf "%s\n" "$SUB_HELP" | grep -q "^Usage:"; then
            echo "✓ Mosquitto client help output works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Mosquitto client help output failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ Running on Arm64"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Expected aarch64 runner"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional publish and subscribe
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation

          rm -f received.txt broker.log

          cleanup() {
            if [ -n "${SUB_PID:-}" ]; then
              kill "$SUB_PID" > /dev/null 2>&1 || true
              wait "$SUB_PID" > /dev/null 2>&1 || true
            fi
            if [ -n "${BROKER_PID:-}" ]; then
              kill "$BROKER_PID" > /dev/null 2>&1 || true
              wait "$BROKER_PID" > /dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          PORT=$(python3 -c 'import socket; s = socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')
          echo "Using Mosquitto test port: $PORT"

          mosquitto -p "$PORT" -v > broker.log 2>&1 &
          BROKER_PID=$!
          sleep 2

          if ! kill -0 "$BROKER_PID" > /dev/null 2>&1; then
            echo "✗ Mosquitto broker failed to stay running"
            cat broker.log
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          mosquitto_sub -h 127.0.0.1 -p "$PORT" -t smoke/test -C 1 > received.txt &
          SUB_PID=$!
          sleep 1

          if ! mosquitto_pub -h 127.0.0.1 -p "$PORT" -t smoke/test -m "hello arm64"; then
            echo "✗ Mosquitto publish command failed"
            cat broker.log
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          if ! wait "$SUB_PID"; then
            echo "✗ Mosquitto subscribe command failed"
            cat broker.log
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          if grep -qx "hello arm64" received.txt; then
            echo "✓ Mosquitto functional pub/sub validation passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Mosquitto message payload did not match"
            cat received.txt || true
            cat broker.log || true
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Mosquitto Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check broker and client binaries: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional publish and subscribe: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
