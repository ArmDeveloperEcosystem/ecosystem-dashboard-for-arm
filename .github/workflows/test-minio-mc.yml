name: Test MinIO Client (mc) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-minio-mc.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-minio-mc.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-minio-mc.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-minio-mc.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-minio-mc.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-minio-mc.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-minio-mc.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-minio-mc.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-minio-mc.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-minio-mc.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-minio-mc.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-minio-mc.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-minio-mc.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-minio-mc.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-minio-mc.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-minio-mc.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-minio-mc.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-minio-mc.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-minio-mc.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-minio-mc.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-minio-mc.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-minio-mc.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-minio-mc.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-minio-mc.outputs.timestamp }}
jobs:
  test-minio-mc:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'MinIO Client (mc)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || 'applicable' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=minio-mc" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/minio-mc" >> "$GITHUB_OUTPUT"
          echo "current_version=2017-02-02T22:38:48Z" >> "$GITHUB_OUTPUT"
      - name: Install MinIO Client
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          ARCHIVE_VERSION="${VERSION//:/-}"
          URL="https://dl.min.io/client/mc/release/linux-arm64/archive/mc.RELEASE.${ARCHIVE_VERSION}"

          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "wget file"
          wget -q -O /tmp/mc "$URL"
          chmod +x /tmp/mc
          sudo install /tmp/mc /usr/local/bin/mc

          if [ -x /usr/local/bin/mc ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get MinIO Client version
        id: version
        run: |
          set -euo pipefail
          RAW_VERSION=$(mc --version 2>&1 | awk 'NR==1 {for (i=1; i<=NF; i++) if ($i ~ /^RELEASE\./ || $i ~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}T/) {print $i; exit}}')
          VERSION="${RAW_VERSION#RELEASE.}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected MinIO Client version: ${VERSION}"

      - name: Test 1 - Check mc binary exists and architecture
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v mc >/dev/null 2>&1 && file "$(command -v mc)" | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$(command -v mc)" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check mc version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPORTED=$(mc --version 2>&1 | awk 'NR==1 {for (i=1; i<=NF; i++) if ($i ~ /^RELEASE\./ || $i ~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}T/) {print $i; exit}}')
          REPORTED="${REPORTED#RELEASE.}"
          if [ "$REPORTED" = "${{ steps.metadata.outputs.current_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            mc --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check mc help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mc --help >/tmp/mc-help.log 2>&1 || true
          if grep -Eiq "NAME:|USAGE:|COMMANDS:|\\bmc\\b" /tmp/mc-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mc-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check mc config host add/list
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CFG_DIR=$(mktemp -d)
          cleanup() {
            rm -rf "$CFG_DIR"
          }
          trap cleanup EXIT
          if mc --config-folder "$CFG_DIR" config host add local http://127.0.0.1:9000 minioadmin minioadmin >/dev/null 2>&1 && \
             mc --config-folder "$CFG_DIR" config host list | grep -q "local"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            mc --config-folder "$CFG_DIR" config --help || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check ls help output
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          LS_HELP="$(mc ls --help 2>&1 || true)"
          if [ "$(uname -m)" = "aarch64" ] && printf '%s\n' "$LS_HELP" | grep -Eqi "mc ls|USAGE|list|objects|files"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$LS_HELP" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          CURRENT_ARCHIVE="${CURRENT//:/-}"
          ARCHIVE_INDEX_URL="https://dl.min.io/client/mc/release/linux-arm64/archive/"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"

          INDEX_HTML="$(curl -fsSL "${ARCHIVE_INDEX_URL}" || true)"
          NEXT_ARCHIVE="$(printf '%s\n' "${INDEX_HTML}" \
            | grep -Eo 'mc\.RELEASE\.[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9-]+Z' \
            | sed 's/^mc\.RELEASE\.//' \
            | sort -u \
            | awk -v current="${CURRENT_ARCHIVE}" '$0 > current {print; exit}')"

          if [ -z "${NEXT_ARCHIVE}" ]; then
            EXIT_CODE=0
            echo "latest_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            if [ -z "${INDEX_HTML}" ]; then
              echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current baseline MinIO Client ${CURRENT} passed Tests 1-5, but the archive index could not be fetched from ${ARCHIVE_INDEX_URL}." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              EXIT_CODE=1
            else
              echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
              echo "regression_result=No newer stable public release is available" >> "$GITHUB_OUTPUT"
              echo "comparison=Current baseline MinIO Client version ${CURRENT} is already the newest archive candidate discoverable for linux-arm64." >> "$GITHUB_OUTPUT"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
            fi
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit $EXIT_CODE
          fi

          NEXT_VERSION="$(printf '%s\n' "${NEXT_ARCHIVE}" | sed -E 's/T([0-9]{2})-([0-9]{2})-([0-9]{2})Z$/T\1:\2:\3Z/')"
          NEXT_URL="${ARCHIVE_INDEX_URL}mc.RELEASE.${NEXT_ARCHIVE}"
          echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

          NEXT_BIN="$(mktemp)"
          if ! curl -fsSL -o "${NEXT_BIN}" "${NEXT_URL}"; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline MinIO Client ${CURRENT} passed Tests 1-5, but candidate ${NEXT_VERSION} could not be downloaded from ${NEXT_URL}." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          chmod +x "${NEXT_BIN}"

          NEXT_VERSION_REPORTED="$("${NEXT_BIN}" --version 2>&1 | awk 'NR==1 {for (i=1; i<=NF; i++) if ($i ~ /^RELEASE\\./ || $i ~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}T/) {print $i; exit}}' || true)"
          NEXT_VERSION_REPORTED="${NEXT_VERSION_REPORTED#RELEASE.}"
          [ -z "${NEXT_VERSION_REPORTED}" ] && NEXT_VERSION_REPORTED="${NEXT_VERSION}"
          NEXT_HELP="$("${NEXT_BIN}" --help 2>&1 || true)"

          if printf '%s\n' "${NEXT_HELP}" | grep -Eqi "NAME:|USAGE:|COMMANDS:|\\bmc\\b"; then
            echo "next_installed_version=${NEXT_VERSION_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline MinIO Client ${CURRENT} passed Tests 1-5. Regression validation downloaded candidate ${NEXT_VERSION} and confirmed CLI help/version output on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_VERSION_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline MinIO Client ${CURRENT} passed Tests 1-5, but candidate ${NEXT_VERSION} did not provide expected CLI help output on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
            check_test "passed" "${{ steps.test6.outputs.duration || 0 }}"
          elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then
            check_test "failed" "${{ steps.test6.outputs.duration || 0 }}"
          else
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          fi

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## MinIO Client (mc) Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check mc binary exists and architecture: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check mc version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check mc help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Check mc config host add/list: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Check ls help output: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
