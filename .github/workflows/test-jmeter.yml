name: Test JMeter on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-jmeter.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-jmeter.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-jmeter.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-jmeter.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-jmeter.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-jmeter.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-jmeter.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-jmeter.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-jmeter.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-jmeter.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-jmeter.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-jmeter.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-jmeter.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-jmeter.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-jmeter.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-jmeter.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-jmeter.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-jmeter.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-jmeter.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-jmeter.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-jmeter.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-jmeter.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-jmeter.outputs.timestamp }}
jobs:
  test-jmeter:
    runs-on: ubuntu-24.04-arm

    env:
      BASELINE_VERSION: "5.6.2"
      JMETER_HOME: /opt/jmeter

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'JMeter'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=jmeter" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/jmeter" >> "$GITHUB_OUTPUT"
      - name: Install JMeter
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-17-jre-headless wget tar curl"
          download_with_fallback() {
            local url="$1"
            local dest="$2"
            if curl --fail --location --http1.1 --ipv4 --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 1800 --progress-bar "$url" -o "$dest"; then
              return 0
            fi
            wget -4 --tries=5 --timeout=30 -O "$dest" "$url"
          }

          URL="https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${BASELINE_VERSION}.tgz"
          FALLBACK_URL="https://downloads.apache.org/jmeter/binaries/apache-jmeter-${BASELINE_VERSION}.tgz"
          rm -rf "$JMETER_HOME" apache-jmeter-"${BASELINE_VERSION}".tgz
          if ! download_with_fallback "$URL" "apache-jmeter-${BASELINE_VERSION}.tgz"; then
            if ! download_with_fallback "$FALLBACK_URL" "apache-jmeter-${BASELINE_VERSION}.tgz"; then
              echo "install_status=failed" >> "$GITHUB_OUTPUT"
              echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          sudo mkdir -p "$JMETER_HOME"
          if ! sudo tar -xzf "apache-jmeter-${BASELINE_VERSION}.tgz" -C "$JMETER_HOME" --strip-components=1; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=extract_failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -x "$JMETER_HOME/bin/jmeter" ]; then
            echo "$JMETER_HOME/bin" >> "$GITHUB_PATH"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=binary_missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get JMeter version
        id: version
        if: always()
        run: |
          set -euo pipefail
          VERSION="${BASELINE_VERSION}"
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" = "success" ] && [ -x "$JMETER_HOME/bin/jmeter" ]; then
            DETECTED=$("$JMETER_HOME/bin/jmeter" --version 2>&1 | grep -oE '[0-9]+(\.[0-9]+)+' | head -n 1 || true)
            if [ -n "${DETECTED:-}" ]; then
              VERSION="$DETECTED"
            fi
          fi
          LATEST=""
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" = "success" ]; then
            LATEST=$(CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import urllib.request

          current = os.environ.get("CURRENT_VERSION", "")
          current_parts = tuple(int(x) for x in current.split(".")) if re.fullmatch(r"\d+\.\d+(?:\.\d+)?", current) else ()
          html = urllib.request.urlopen("https://downloads.apache.org/jmeter/binaries/", timeout=20).read().decode()
          stable = []
          for version in re.findall(r'apache-jmeter-([0-9][0-9A-Za-z.\-]+)\.tgz', html):
              if "-rc" in version.lower():
                  continue
              if re.fullmatch(r"\d+\.\d+(?:\.\d+)?", version):
                  stable.append(tuple(int(x) for x in version.split(".")))
          next_versions = sorted(set(version for version in stable if version > current_parts))
          print(".".join(str(x) for x in next_versions[0]) if next_versions else "")
          PY
            )
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -x "$JMETER_HOME/bin/jmeter" ] && command -v jmeter >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if jmeter --version 2>&1 | grep -qiE 'Apache JMeter|[0-9]+\.[0-9]+'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HELP_OUTPUT=$(jmeter -? 2>&1 || true)
          if grep -qiE 'print usage information|--help|--version' <<< "$HELP_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$HELP_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > smoke.jmx <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <jmeterTestPlan version="1.2" properties="5.0" jmeter="5.6.3">
            <hashTree>
              <TestPlan guiclass="TestPlanGui" testclass="TestPlan" testname="Smoke Plan" enabled="true"/>
              <hashTree/>
            </hashTree>
          </jmeterTestPlan>
          EOF

          if jmeter -n -t smoke.jmx -l results.jtl >/tmp/jmeter-smoke.log 2>&1 && [ -f results.jtl ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/jmeter-smoke.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          CORE_FAILURES=0
          for status in \
            "${{ steps.test1.outcome || 'skipped' }}" \
            "${{ steps.test2.outcome || 'skipped' }}" \
            "${{ steps.test3.outcome || 'skipped' }}" \
            "${{ steps.test4.outcome || 'skipped' }}" \
            "${{ steps.test5.outcome || 'skipped' }}"; do
            if [ "$status" = "failure" ]; then
              CORE_FAILURES=1
              break
            fi
          done

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ] || [ "$CORE_FAILURES" -ne 0 ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned JMeter version ${CURRENT} could not complete baseline install or core smoke validation in this run, so next-version install validation on Arm64 was deferred." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned JMeter version $CURRENT passed smoke tests in this run, but the next stable Apache JMeter release could not be resolved from the official downloads directory." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          WORKDIR=$(mktemp -d)
          ARCHIVE_URL="https://downloads.apache.org/jmeter/binaries/apache-jmeter-${LATEST}.tgz"
          FALLBACK_URL="https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${LATEST}.tgz"
          if ! curl --fail --location --http1.1 --ipv4 --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30 --max-time 1800 --progress-bar "$ARCHIVE_URL" -o "$WORKDIR/jmeter.tgz"; then
            wget -4 --tries=5 --timeout=30 -O "$WORKDIR/jmeter.tgz" "$FALLBACK_URL"
          fi
          tar -xzf "$WORKDIR/jmeter.tgz" -C "$WORKDIR"
          NEXT_HOME="$WORKDIR/apache-jmeter-${LATEST}"
          REPORTED=$("$NEXT_HOME/bin/jmeter" --version 2>&1 | grep -oE '[0-9]+(\.[0-9]+)+' | head -n 1 || true)
          cat > "$WORKDIR/smoke.jmx" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <jmeterTestPlan version="1.2" properties="5.0" jmeter="5.6.3">
            <hashTree>
              <TestPlan guiclass="TestPlanGui" testclass="TestPlan" testname="Smoke Plan" enabled="true"/>
              <hashTree/>
            </hashTree>
          </jmeterTestPlan>
          EOF

          if [ "$REPORTED" = "$LATEST" ] && "$NEXT_HOME/bin/jmeter" -n -t "$WORKDIR/smoke.jmx" -l "$WORKDIR/results.jtl" >/tmp/jmeter-regression.log 2>&1 && [ -f "$WORKDIR/results.jtl" ]; then
            echo "next_installed_version=$REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned JMeter version $CURRENT passed smoke tests in this run. Regression validation downloaded candidate Apache JMeter $LATEST on Arm64, the candidate reported version $REPORTED, and the candidate smoke plan executed successfully." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/jmeter-regression.log || true
            echo "next_installed_version=${REPORTED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned JMeter version $CURRENT passed smoke tests in this run, but candidate Apache JMeter $LATEST did not complete bounded install validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          SKIPPED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_test() {
            local status=$1
            local duration=$2
            local is_core="${3:-0}"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ] || [ -z "$status" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$is_core" = "1" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            CORE_FAILED=1
          fi

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" 1
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" 1
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" 1
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" 1
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" 1
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}" 0

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression comparison summary unavailable.' }}"
          echo "## JMeter Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ env.BASELINE_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Skipped:** ${{ steps.summary.outputs.skipped || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Or Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
