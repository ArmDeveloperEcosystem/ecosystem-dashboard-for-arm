name: Test Godot on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-godot.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-godot.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-godot.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-godot.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-godot.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-godot.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-godot.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-godot.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-godot.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-godot.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-godot.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-godot.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-godot.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-godot.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-godot.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-godot.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-godot.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-godot.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-godot.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-godot.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-godot.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-godot.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-godot.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-godot.outputs.timestamp }}

jobs:
  test-godot:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "4.2"
      PACKAGE_SLUG: "godot"
      LANE_KIND: "apt package / CPU runtime"
      DOWNLOAD_URL: "https://github.com/godotengine/godot/releases"
      HOMEPAGE_URL: "https://docs.godotengine.org/en/stable/"
      OFFICIAL_DOCS: "https://docs.godotengine.org/en/latest/engine_details/development/compiling/"
      GITHUB_REPO: "godotengine/godot"
      PACKAGE_PAGE: "content/linux/opensource_packages/godot.md"
      APT_PACKAGES: "godot3-server"
      COMMAND_CANDIDATES: "godot3-server godot3 godot"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Godot'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=godot" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/godot" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "${{ env.APT_PACKAGES }}"
          quiet: "true"

      - name: Locate installed Godot command
        id: install
        run: |
          set -euo pipefail
          COMMAND_PATH=""
          for CANDIDATE in $COMMAND_CANDIDATES; do
            if command -v "$CANDIDATE" >/dev/null 2>&1; then
              COMMAND_PATH=$(command -v "$CANDIDATE")
              break
            fi
          done
          test -n "$COMMAND_PATH"
          echo "command_path=$COMMAND_PATH" >> "$GITHUB_OUTPUT"
          echo "install_mode=package_manager" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get baseline version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg-query -W -f='${Version}\n' godot3-server 2>/dev/null | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION=$("${{ steps.install.outputs.command_path }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -1 || true)
          fi
          [ -n "$VERSION" ] || VERSION="unknown"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Godot version: $VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMMAND_PATH="${{ steps.install.outputs.command_path || '' }}"
          test "${{ steps.install.outputs.install_status || 'failed' }}" = "success"
          test -x "$COMMAND_PATH"
          dpkg-query -W godot3-server >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Installed runtime version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION="${{ steps.version.outputs.version || 'unknown' }}"
          test "$VERSION" != "unknown"
          ("${{ steps.install.outputs.command_path }}" --version 2>&1 || true) | grep -Eiq 'Godot|[0-9]+[.][0-9]+'
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Godot headless help
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ("${{ steps.install.outputs.command_path }}" --help 2>&1 || true) | grep -Eiq 'headless|no-window|script'
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 support gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$(dpkg --print-architecture)" != "arm64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PROJECT=/tmp/godot-smoke-project
          mkdir -p "$PROJECT/home" "$PROJECT/cache"
          cat > "$PROJECT/project.godot" <<'EOF'
          ; Engine configuration file.
          [application]
          config/name="Arm64Smoke"
          EOF
          cat > "$PROJECT/smoke.gd" <<'EOF'
          extends SceneTree
          func _init():
              var f = File.new()
              var err = f.open("user://smoke.txt", File.WRITE)
              if err != OK:
                  quit(2)
                  return
              f.store_string("arm64-smoke")
              f.close()
              quit(0)
          EOF
          HEADLESS_FLAG="--no-window"
          if "${{ steps.install.outputs.command_path }}" --help 2>&1 | grep -q -- '--headless'; then
            HEADLESS_FLAG="--headless"
          fi
          HOME="$PROJECT/home" XDG_CACHE_HOME="$PROJECT/cache" "${{ steps.install.outputs.command_path }}" "$HEADLESS_FLAG" --path "$PROJECT" --script "$PROJECT/smoke.gd"
          test -s "$PROJECT/home/.local/share/godot/app_userdata/Arm64Smoke/smoke.txt"
          echo "note=Ran a minimal Godot project script in headless/no-window mode on the Arm64 runner." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested Godot runtime is installed via apt in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"
