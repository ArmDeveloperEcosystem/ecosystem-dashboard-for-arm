name: Test TimescaleDB on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-timescaledb.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-timescaledb.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-timescaledb.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-timescaledb.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-timescaledb.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-timescaledb.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-timescaledb.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-timescaledb.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-timescaledb.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-timescaledb.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-timescaledb.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-timescaledb.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-timescaledb.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-timescaledb.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-timescaledb.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-timescaledb.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-timescaledb.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-timescaledb.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-timescaledb.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-timescaledb.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-timescaledb.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-timescaledb.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-timescaledb.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-timescaledb.outputs.timestamp }}
jobs:
  test-timescaledb:
    runs-on: ubuntu-24.04-arm
    env:
      PG_MAJOR: "17"
      TIMESCALEDB_VERSION: "2.26.4"
      TIMESCALEDB_PACKAGE: "timescaledb-2-postgresql-17"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'TimescaleDB'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=timescaledb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/timescaledb" >> "$GITHUB_OUTPUT"
          echo "current_version=${TIMESCALEDB_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install TimescaleDB
        id: install
        run: |
          echo "Installing TimescaleDB..."
          export DEBIAN_FRONTEND=noninteractive

          sudo rm -f /etc/apt/sources.list.d/pgdg.list /etc/apt/sources.list.d/timescaledb.list
          sudo rm -f /usr/share/keyrings/postgresql.gpg /usr/share/keyrings/timescaledb.gpg

          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates lsb-release postgresql-common

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null

          curl -fsSL https://packagecloud.io/timescale/timescaledb/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/timescaledb.gpg
          echo "deb [signed-by=/usr/share/keyrings/timescaledb.gpg] https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/timescaledb.list >/dev/null

          sudo apt-get update

          BASELINE_PACKAGE=$(apt-cache madison "${TIMESCALEDB_PACKAGE}" | awk -v want="${TIMESCALEDB_VERSION}" '$3 ~ "^"want { print $3; exit }')
          if [ -z "${BASELINE_PACKAGE}" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "Baseline package ${TIMESCALEDB_VERSION} is not available for PostgreSQL ${PG_MAJOR} on this Arm64 apt repository."
            exit 1
          fi

          sudo apt-get install -y "postgresql-${PG_MAJOR}" "postgresql-client-${PG_MAJOR}" "${TIMESCALEDB_PACKAGE}=${BASELINE_PACKAGE}"

          if [ -f "/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control" ] && [ -f "/usr/lib/postgresql/${PG_MAJOR}/lib/timescaledb.so" ]; then
            echo "baseline_package=${BASELINE_PACKAGE}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get TimescaleDB version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg-query -W -f='${Version}\n' "${TIMESCALEDB_PACKAGE}" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=not_applicable" >> "$GITHUB_OUTPUT"
          echo "Detected TimescaleDB version: $VERSION"
          echo "Detected regression applicability: package manager installed"

      - name: Test 1 - Check extension assets exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control" ] && [ -f "/usr/lib/postgresql/${PG_MAJOR}/lib/timescaledb.so" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check package version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if dpkg-query -W -f='${Version}\n' "${TIMESCALEDB_PACKAGE}" | grep -q "${TIMESCALEDB_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            dpkg-query -W -f='${Version}\n' "${TIMESCALEDB_PACKAGE}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check control metadata
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CONTROL_FILE="/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control"
          CONTROL_DEFAULT=$(awk -F"'" '/^default_version[[:space:]]*=/{print $2; exit}' "$CONTROL_FILE")
          SQL_FILE="/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb--${CONTROL_DEFAULT}.sql"
          if [ -n "$CONTROL_DEFAULT" ] && [ -f "$SQL_FILE" ] && psql --help >/dev/null 2>&1; then
            echo "control_default_version=${CONTROL_DEFAULT}" >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$CONTROL_FILE" || true
            ls -l "/usr/share/postgresql/${PG_MAJOR}/extension"/timescaledb--*.sql || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TEST_PORT=$(python3 - <<'PY'
          import socket
          with socket.socket() as s:
              s.bind(("", 0))
              print(s.getsockname()[1])
          PY
          )

          cleanup() {
            sudo pg_dropcluster --stop "${PG_MAJOR}" tsdbtest >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sudo pg_dropcluster --stop "${PG_MAJOR}" tsdbtest >/dev/null 2>&1 || true
          sudo rm -rf "/etc/postgresql/${PG_MAJOR}/tsdbtest" "/var/lib/postgresql/${PG_MAJOR}/tsdbtest" "/var/log/postgresql/postgresql-${PG_MAJOR}-tsdbtest.log"
          sudo pg_createcluster "${PG_MAJOR}" tsdbtest -p "${TEST_PORT}" --start >/tmp/timescaledb-cluster.log 2>&1
          echo "shared_preload_libraries = 'timescaledb'" | sudo tee "/etc/postgresql/${PG_MAJOR}/tsdbtest/conf.d/timescaledb.conf" >/dev/null
          sudo systemctl restart "postgresql@${PG_MAJOR}-tsdbtest" >/tmp/timescaledb-restart.log 2>&1

          sudo -u postgres psql -p "${TEST_PORT}" -d postgres -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" >/tmp/timescaledb-create-extension.txt
          sudo -u postgres psql -p "${TEST_PORT}" -d postgres -c "SELECT extversion FROM pg_extension WHERE extname = 'timescaledb';" >/tmp/timescaledb-extversion.txt
          sudo -u postgres psql -p "${TEST_PORT}" -d postgres -c "CREATE TABLE IF NOT EXISTS metrics(time timestamptz NOT NULL, value double precision);" >/tmp/timescaledb-create-table.txt
          sudo -u postgres psql -p "${TEST_PORT}" -d postgres -c "SELECT create_hypertable('metrics', 'time', if_not_exists => TRUE);" >/tmp/timescaledb-hypertable.txt

          EXPECTED_VERSION="${{ steps.test3.outputs.control_default_version || env.TIMESCALEDB_VERSION }}"
          if grep -q "${EXPECTED_VERSION}" /tmp/timescaledb-extversion.txt && grep -q "metrics" /tmp/timescaledb-hypertable.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/timescaledb-cluster.log || true
            cat /tmp/timescaledb-restart.log || true
            cat /tmp/timescaledb-extversion.txt || true
            cat /tmp/timescaledb-hypertable.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || env.TIMESCALEDB_VERSION }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              not_applicable_package_manager)
                REGRESSION_RESULT="Regression validation not applicable: tested package installed via package manager in Tests 1-5"
                ;;
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Applicability ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_applicable' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_applicable' }}"
          echo "Regression result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## TimescaleDB Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check extension assets exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check package version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check control metadata: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Applicability" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression status:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
