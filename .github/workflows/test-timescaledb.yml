name: Test TimescaleDB on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/timescaledb.md'
      - '.github/workflows/test-timescaledb.yml'

jobs:
  test-timescaledb:
    runs-on: ubuntu-24.04-arm
    env:
      PG_MAJOR: "17"
      PG_PORT: "5433"
      TIMESCALEDB_VERSION: "2.25.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=timescaledb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/timescaledb" >> "$GITHUB_OUTPUT"

      - name: Install TimescaleDB
        id: install
        run: |
          echo "Installing TimescaleDB..."
          export DEBIAN_FRONTEND=noninteractive

          sudo rm -f /etc/apt/sources.list.d/pgdg.list /etc/apt/sources.list.d/timescaledb.list
          sudo rm -f /usr/share/keyrings/postgresql.gpg /usr/share/keyrings/timescaledb.gpg

          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates lsb-release postgresql-common

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null

          curl -fsSL https://packagecloud.io/timescale/timescaledb/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/timescaledb.gpg
          echo "deb [signed-by=/usr/share/keyrings/timescaledb.gpg] https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/timescaledb.list >/dev/null

          sudo apt-get update

          # arm_recommended_minimum_version is 2.16.0 (2024-07-31). Applying the
          # release-selection rule, pin the current latest stable TimescaleDB
          # release within the supported yearly window.
          sudo apt-get install -y "postgresql-${PG_MAJOR}" "postgresql-client-${PG_MAJOR}" "postgresql-${PG_MAJOR}-timescaledb"

          if [ -f "/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control" ] && [ -f "/usr/lib/postgresql/${PG_MAJOR}/lib/timescaledb.so" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get TimescaleDB version
        id: version
        run: |
          VERSION=$(dpkg-query -W -f='${Version}\n' "postgresql-${PG_MAJOR}-timescaledb" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected TimescaleDB version: $VERSION"

      - name: Test 1 - Check extension assets exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control" ] && [ -f "/usr/lib/postgresql/${PG_MAJOR}/lib/timescaledb.so" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check package version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if dpkg-query -W -f='${Version}\n' "postgresql-${PG_MAJOR}-timescaledb" | grep -q "${TIMESCALEDB_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            dpkg-query -W -f='${Version}\n' "postgresql-${PG_MAJOR}-timescaledb" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check control metadata
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CONTROL_FILE="/usr/share/postgresql/${PG_MAJOR}/extension/timescaledb.control"
          if grep -q "default_version = '${TIMESCALEDB_VERSION}'" "$CONTROL_FILE" && psql --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$CONTROL_FILE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          cleanup() {
            sudo pg_dropcluster --stop "${PG_MAJOR}" tsdbtest >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sudo pg_dropcluster --stop "${PG_MAJOR}" tsdbtest >/dev/null 2>&1 || true
          sudo rm -rf "/etc/postgresql/${PG_MAJOR}/tsdbtest" "/var/lib/postgresql/${PG_MAJOR}/tsdbtest" "/var/log/postgresql/postgresql-${PG_MAJOR}-tsdbtest.log"
          sudo pg_createcluster "${PG_MAJOR}" tsdbtest -p "${PG_PORT}" --start >/tmp/timescaledb-cluster.log 2>&1
          echo "shared_preload_libraries = 'timescaledb'" | sudo tee "/etc/postgresql/${PG_MAJOR}/tsdbtest/conf.d/timescaledb.conf" >/dev/null
          sudo systemctl restart "postgresql@${PG_MAJOR}-tsdbtest" >/tmp/timescaledb-restart.log 2>&1

          sudo -u postgres psql -p "${PG_PORT}" -d postgres -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" >/tmp/timescaledb-create-extension.txt
          sudo -u postgres psql -p "${PG_PORT}" -d postgres -c "SELECT extversion FROM pg_extension WHERE extname = 'timescaledb';" >/tmp/timescaledb-extversion.txt
          sudo -u postgres psql -p "${PG_PORT}" -d postgres -c "CREATE TABLE IF NOT EXISTS metrics(time timestamptz NOT NULL, value double precision);" >/tmp/timescaledb-create-table.txt
          sudo -u postgres psql -p "${PG_PORT}" -d postgres -c "SELECT create_hypertable('metrics', 'time', if_not_exists => TRUE);" >/tmp/timescaledb-hypertable.txt

          if grep -q "${TIMESCALEDB_VERSION}" /tmp/timescaledb-extversion.txt && grep -q "metrics" /tmp/timescaledb-hypertable.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/timescaledb-cluster.log || true
            cat /tmp/timescaledb-restart.log || true
            cat /tmp/timescaledb-extversion.txt || true
            cat /tmp/timescaledb-hypertable.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          echo "current_version=${{ steps.version.outputs.version || env.TIMESCALEDB_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "latest_version=2.25.2" >> "$GITHUB_OUTPUT"
          echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned TimescaleDB 2.25.2 was smoke-tested in this run and it already matches the latest stable extension package published for PostgreSQL 17 during validation." >> "$GITHUB_OUTPUT"
          echo "note=TimescaleDB metadata recommends 2.16.0 for Arm, and the workflow now pins the latest stable extension release within the current supported release window." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results
          cat > test-results/timescaledb.json <<JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "TimescaleDB",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Databases - noSQL"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check extension assets exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check package version", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check control metadata", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          JSON
          cat test-results/timescaledb.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timescaledb-test-results
          path: test-results/timescaledb.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## TimescaleDB Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check extension assets exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check package version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check control metadata: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests.' }}" >> "$GITHUB_STEP_SUMMARY"
