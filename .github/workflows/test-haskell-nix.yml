name: Test Haskell.nix on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-haskell-nix.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-haskell-nix.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-haskell-nix.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-haskell-nix.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-haskell-nix.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-haskell-nix.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-haskell-nix.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-haskell-nix.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-haskell-nix.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-haskell-nix.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-haskell-nix.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-haskell-nix.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-haskell-nix.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-haskell-nix.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-haskell-nix.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-haskell-nix.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-haskell-nix.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-haskell-nix.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-haskell-nix.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-haskell-nix.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-haskell-nix.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-haskell-nix.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-haskell-nix.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-haskell-nix.outputs.timestamp }}
jobs:
  test-haskell-nix:
    runs-on: ubuntu-24.04-arm
    env:
      NIX_TOOLS_VERSION: "0.3.1"
      NIX_TOOLS_NEXT_VERSION: "0.3.2"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Haskell.nix'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=haskell-nix" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/haskell-nix" >> "$GITHUB_OUTPUT"
      - name: Install Haskell.nix tools
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "wget unzip"
          cd /tmp
          rm -rf nix-tools nix-tools.zip
          wget -q "https://github.com/input-output-hk/haskell.nix/releases/download/nix-tools-${NIX_TOOLS_VERSION}/aarch64-linux-nix-tools-static.zip" -O nix-tools.zip
          unzip -q nix-tools.zip -d nix-tools
          sudo install -m 0755 nix-tools/plan-to-nix /usr/local/bin/plan-to-nix
          sudo install -m 0755 nix-tools/cabal-to-nix /usr/local/bin/cabal-to-nix
          sudo install -m 0755 nix-tools/stack-to-nix /usr/local/bin/stack-to-nix
          sudo install -m 0755 nix-tools/hpack /usr/local/bin/hpack
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Haskell.nix version
        id: version
        run: |
          set -euo pipefail
          echo "version=${NIX_TOOLS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NIX_TOOLS_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v plan-to-nix >/dev/null 2>&1 && command -v cabal-to-nix >/dev/null 2>&1 && command -v stack-to-nix >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          hpack --version 2>&1 | tee /tmp/haskell-nix-version.log >/dev/null
          if grep -Fq "hpack version" /tmp/haskell-nix-version.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          plan-to-nix --help 2>&1 | tee /tmp/haskell-nix-help.log >/dev/null
          if grep -Fq "Generate a Nix expression for a Haskell package using Cabal" /tmp/haskell-nix-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          rm -rf /tmp/sample-hs
          mkdir -p /tmp/sample-hs/src
          cat > /tmp/sample-hs/sample-hs.cabal <<'EOF_CABAL'
          cabal-version: 2.4
          name: sample-hs
          version: 0.1.0.0
          build-type: Simple

          library
            exposed-modules: Sample
            hs-source-dirs: src
            build-depends: base >=4.14 && <5
            default-language: Haskell2010
          EOF_CABAL
          cat > /tmp/sample-hs/src/Sample.hs <<'EOF_HS'
          module Sample where
          sample :: String
          sample = "ok"
          EOF_HS
          (cd /tmp/sample-hs && cabal-to-nix .) 2>&1 | tee /tmp/haskell-nix-run.log >/dev/null
          if grep -Fq '{ "src" = {}; }' /tmp/haskell-nix-run.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"

          NEXT_INSTALLED="not_installed"
          DECISION=""
          REGRESSION_RESULT=""
          COMPARISON=""
          STATUS="failed"

          if [ "$CURRENT" = "$LATEST" ]; then
            DECISION="no_newer_stable_available"
            REGRESSION_RESULT="No newer stable release available for Test 6"
            COMPARISON="Current pinned baseline already matches the newest public stable upstream release, so there is no newer stable Arm64 candidate for a genuine Test 6 upgrade check."
            STATUS="skipped"
          else
            NEXT_DIR=$(mktemp -d /tmp/haskell-nix-next-XXXXXX)
            NEXT_ZIP=$(mktemp /tmp/haskell-nix-next-XXXXXX.zip)

            if wget -q "https://github.com/input-output-hk/haskell.nix/releases/download/nix-tools-${LATEST}/aarch64-linux-nix-tools-static.zip" -O "$NEXT_ZIP"; then
              unzip -q "$NEXT_ZIP" -d "$NEXT_DIR"
              if [ -x "$NEXT_DIR/plan-to-nix" ] && \
                 [ -x "$NEXT_DIR/cabal-to-nix" ] && \
                 [ -x "$NEXT_DIR/stack-to-nix" ] && \
                 [ -x "$NEXT_DIR/hpack" ] && \
                 "$NEXT_DIR/plan-to-nix" --help >/tmp/haskell-nix-next-help.log 2>&1 && \
                 "$NEXT_DIR/hpack" --version >/tmp/haskell-nix-next-version.log 2>&1; then
                NEXT_INSTALLED="$LATEST"
                DECISION="next_install_validated"
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned Haskell.nix nix-tools release ${CURRENT} passed smoke tests in this run. Regression validation downloaded bundle ${LATEST} on Arm64 and executed the candidate plan-to-nix and hpack binaries successfully from the isolated release archive."
                STATUS="passed"
              else
                NEXT_INSTALLED="install_failed"
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned Haskell.nix nix-tools release ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not execute the expected plan-to-nix and hpack binaries successfully from the isolated Arm64 release archive."
                STATUS="failed"
              fi
            else
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned Haskell.nix nix-tools release ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64."
              STATUS="failed"
            fi
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "regression_result=$REGRESSION_RESULT" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"
          echo "Next version installed on Arm64: $NEXT_INSTALLED"
          echo "Regression install result: $REGRESSION_RESULT"
          echo "Details: $COMPARISON"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Haskell.nix Test Results"
            echo ""
            echo "- Installed version: \`${{ steps.version.outputs.version }}\`"
            echo "- Overall status: \`${{ steps.summary.outputs.overall_status || 'failure' }}\`"
            echo ""
            echo "| Test | Status | Duration (s) |"
            echo "| --- | --- | ---: |"
            echo "| Test 1 - Binary Existence | ${{ steps.test1.outputs.status || 'skipped' }} | ${{ steps.test1.outputs.duration || 0 }} |"
            echo "| Test 2 - Version Check | ${{ steps.test2.outputs.status || 'skipped' }} | ${{ steps.test2.outputs.duration || 0 }} |"
            echo "| Test 3 - Help Output Validation | ${{ steps.test3.outputs.status || 'skipped' }} | ${{ steps.test3.outputs.duration || 0 }} |"
            echo "| Test 4 - Architecture Verification | ${{ steps.test4.outputs.status || 'skipped' }} | ${{ steps.test4.outputs.duration || 0 }} |"
            echo "| Test 5 - Functional Validation | ${{ steps.test5.outputs.status || 'skipped' }} | ${{ steps.test5.outputs.duration || 0 }} |"
            echo "| Test 6 - Regression Validation | ${{ steps.test6.outputs.status || 'skipped' }} | ${{ steps.test6.outputs.duration || 0 }} |"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo ""
            echo "- Current version tested in Tests 1-5: \`${{ steps.test6.outputs.current_version || 'unknown' }}\`"
            echo "- Next version targeted for install validation: \`${{ steps.test6.outputs.latest_version || 'unknown' }}\`"
            echo "- Next version installed on Arm64: \`${{ steps.test6.outputs.next_installed_version || 'not_installed' }}\`"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- Details: ${{ steps.test6.outputs.comparison || 'Regression validation summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
