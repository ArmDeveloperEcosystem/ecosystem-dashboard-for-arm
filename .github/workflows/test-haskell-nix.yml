name: Test Haskell.nix on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/haskell-nix.md"
      - ".github/workflows/test-haskell-nix.yml"

jobs:
  test-haskell-nix:
    runs-on: ubuntu-24.04-arm
    env:
      NIX_TOOLS_VERSION: "0.1.6"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=haskell-nix" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/haskell-nix" >> "$GITHUB_OUTPUT"

      - name: Install Haskell.nix tools
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget unzip
          cd /tmp
          rm -rf nix-tools nix-tools.zip
          wget -q "https://github.com/input-output-hk/haskell.nix/releases/download/nix-tools-${NIX_TOOLS_VERSION}/aarch64-linux-nix-tools-static.zip" -O nix-tools.zip
          unzip -q nix-tools.zip -d nix-tools
          sudo install -m 0755 nix-tools/plan-to-nix /usr/local/bin/plan-to-nix
          sudo install -m 0755 nix-tools/cabal-to-nix /usr/local/bin/cabal-to-nix
          sudo install -m 0755 nix-tools/stack-to-nix /usr/local/bin/stack-to-nix
          sudo install -m 0755 nix-tools/hpack /usr/local/bin/hpack
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Haskell.nix version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(
              urllib.request.urlopen(
                  "https://api.github.com/repos/input-output-hk/haskell.nix/releases/tags/nix-tools-0.1.6",
                  timeout=20,
              )
          )
          print(data["tag_name"].split("nix-tools-")[-1])
          PY
          )
          echo "version=${NIX_TOOLS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v plan-to-nix >/dev/null 2>&1 && command -v cabal-to-nix >/dev/null 2>&1 && command -v stack-to-nix >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          hpack --version 2>&1 | tee /tmp/haskell-nix-version.log >/dev/null
          if grep -Fq "hpack version" /tmp/haskell-nix-version.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          plan-to-nix --help 2>&1 | tee /tmp/haskell-nix-help.log >/dev/null
          if grep -Fq "Generate a Nix expression for a Haskell package using Cabal" /tmp/haskell-nix-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          rm -rf /tmp/sample-hs
          mkdir -p /tmp/sample-hs/src
          cat > /tmp/sample-hs/sample-hs.cabal <<'EOF_CABAL'
          cabal-version: 2.4
          name: sample-hs
          version: 0.1.0.0
          build-type: Simple

          library
            exposed-modules: Sample
            hs-source-dirs: src
            build-depends: base >=4.14 && <5
            default-language: Haskell2010
          EOF_CABAL
          cat > /tmp/sample-hs/src/Sample.hs <<'EOF_HS'
          module Sample where
          sample :: String
          sample = "ok"
          EOF_HS
          (cd /tmp/sample-hs && cabal-to-nix .) 2>&1 | tee /tmp/haskell-nix-run.log >/dev/null
          if grep -Fq '{ "src" = {}; }' /tmp/haskell-nix-run.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=pinned_is_latest" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Haskell.nix nix-tools release ${CURRENT} matches the latest published upstream release, so this run is already exercising the newest Arm64 static tool bundle." >> "$GITHUB_OUTPUT"
          else
            echo "decision=hold_current_until_regression_run" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Haskell.nix nix-tools release ${CURRENT} passed the Arm64 smoke tests in this run. The newer upstream release ${LATEST} still needs an explicit side-by-side regression run before the pin is advanced." >> "$GITHUB_OUTPUT"
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/haskell-nix.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Haskell.nix",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Haskell",
              "category": "Compilers/Tools"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Help Output Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression validation summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Haskell.nix Test Results"
            echo ""
            echo "- Installed version: \`${{ steps.version.outputs.version }}\`"
            echo "- Overall status: \`${{ steps.summary.outputs.overall_status || 'failure' }}\`"
            echo ""
            echo "| Test | Status | Duration (s) |"
            echo "| --- | --- | ---: |"
            echo "| Test 1 - Binary Existence | ${{ steps.test1.outputs.status || 'skipped' }} | ${{ steps.test1.outputs.duration || 0 }} |"
            echo "| Test 2 - Version Check | ${{ steps.test2.outputs.status || 'skipped' }} | ${{ steps.test2.outputs.duration || 0 }} |"
            echo "| Test 3 - Help Output Validation | ${{ steps.test3.outputs.status || 'skipped' }} | ${{ steps.test3.outputs.duration || 0 }} |"
            echo "| Test 4 - Architecture Verification | ${{ steps.test4.outputs.status || 'skipped' }} | ${{ steps.test4.outputs.duration || 0 }} |"
            echo "| Test 5 - Functional Validation | ${{ steps.test5.outputs.status || 'skipped' }} | ${{ steps.test5.outputs.duration || 0 }} |"
            echo "| Test 6 - Regression Validation | ${{ steps.test6.outputs.status || 'skipped' }} | ${{ steps.test6.outputs.duration || 0 }} |"
            echo ""
            echo "### Current vs Next"
            echo ""
            echo "- Current pinned version: \`${{ steps.test6.outputs.current_version || 'unknown' }}\`"
            echo "- Latest published version checked: \`${{ steps.test6.outputs.latest_version || 'unknown' }}\`"
            echo "- Decision: \`${{ steps.test6.outputs.decision || 'manual_review_needed' }}\`"
            echo "- Comparison: ${{ steps.test6.outputs.comparison || 'Regression validation summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: haskell-nix-test-results
          path: test-results/haskell-nix.json
          retention-days: 90
