name: Test FastAI on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version: { value: "${{ jobs.test-fastai.outputs.contract_version }}" }
      package_slug: { value: "${{ jobs.test-fastai.outputs.package_slug }}" }
      package_name: { value: "${{ jobs.test-fastai.outputs.package_name }}" }
      package_version: { value: "${{ jobs.test-fastai.outputs.package_version }}" }
      run_status: { value: "${{ jobs.test-fastai.outputs.run_status }}" }
      badge_status: { value: "${{ jobs.test-fastai.outputs.badge_status }}" }
      core_failed: { value: "${{ jobs.test-fastai.outputs.core_failed }}" }
      tests_passed: { value: "${{ jobs.test-fastai.outputs.tests_passed }}" }
      tests_failed: { value: "${{ jobs.test-fastai.outputs.tests_failed }}" }
      tests_skipped: { value: "${{ jobs.test-fastai.outputs.tests_skipped }}" }
      duration_seconds: { value: "${{ jobs.test-fastai.outputs.duration_seconds }}" }
      regression_status: { value: "${{ jobs.test-fastai.outputs.regression_status }}" }
      regression_decision: { value: "${{ jobs.test-fastai.outputs.regression_decision }}" }
      regression_result: { value: "${{ jobs.test-fastai.outputs.regression_result }}" }
      regression_comparison: { value: "${{ jobs.test-fastai.outputs.regression_comparison }}" }
      regression_current_version: { value: "${{ jobs.test-fastai.outputs.regression_current_version }}" }
      regression_latest_version: { value: "${{ jobs.test-fastai.outputs.regression_latest_version }}" }
      regression_next_installed_version: { value: "${{ jobs.test-fastai.outputs.regression_next_installed_version }}" }
      regression_policy: { value: "${{ jobs.test-fastai.outputs.regression_policy }}" }
      run_id: { value: "${{ jobs.test-fastai.outputs.run_id }}" }
      run_attempt: { value: "${{ jobs.test-fastai.outputs.run_attempt }}" }
      job_name: { value: "${{ jobs.test-fastai.outputs.job_name }}" }
      dashboard_link: { value: "${{ jobs.test-fastai.outputs.dashboard_link }}" }
      timestamp: { value: "${{ jobs.test-fastai.outputs.timestamp }}" }

jobs:
  test-fastai:
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: fastai
      package_name: FastAI
      package_version: ${{ steps.smoke.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.smoke.outputs.test6_status || 'skipped' }}
      regression_decision: ${{ steps.smoke.outputs.regression_decision || 'not_configured' }}
      regression_result: ${{ steps.smoke.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.smoke.outputs.regression_details || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.smoke.outputs.regression_current_version || steps.smoke.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.smoke.outputs.regression_latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.smoke.outputs.regression_next_installed_version || 'not_installed' }}
      regression_policy: package_manager_installed
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: /opensource_packages/fastai
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
      - id: metadata
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: smoke
        uses: ./.github/actions/run-missing-package-smoke
        with:
          package_slug: fastai
          package_name: FastAI
          kind: fastai
          baseline_version: 2.8.7
      - name: "Test 1 - Install FastAI Python package"
        if: ${{ always() && (steps.smoke.outputs.test1_status == 'passed' || steps.smoke.outputs.test1_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test1_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 2 - Verify FastAI package metadata"
        if: ${{ always() && (steps.smoke.outputs.test2_status == 'passed' || steps.smoke.outputs.test2_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test2_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 3 - Import FastAI and Torch modules"
        if: ${{ always() && (steps.smoke.outputs.test3_status == 'passed' || steps.smoke.outputs.test3_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test3_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 4 - Verify Arm64 Python runtime"
        if: ${{ always() && (steps.smoke.outputs.test4_status == 'passed' || steps.smoke.outputs.test4_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test4_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 5 - Run bounded FastAI tensor smoke"
        if: ${{ always() && (steps.smoke.outputs.test5_status == 'passed' || steps.smoke.outputs.test5_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test5_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 6 - Regression Validation"
        if: ${{ always() && (steps.smoke.outputs.test6_status == 'passed' || steps.smoke.outputs.test6_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test6_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - id: summary
        if: always()
        uses: ./.github/actions/emit-package-result
        with:
          package_slug: fastai
          package_name: FastAI
          version: ${{ steps.smoke.outputs.version || 'unknown' }}
          install_status: ${{ steps.smoke.outputs.install_status || 'failed' }}
          summary_style: python-package
          test1_label: "Install FastAI Python package"
          test2_label: "Verify FastAI package metadata"
          test3_label: "Import FastAI and Torch modules"
          test4_label: "Verify Arm64 Python runtime"
          test5_label: "Run bounded FastAI tensor smoke"
          test1_status: ${{ steps.smoke.outputs.test1_status || 'skipped' }}
          test2_status: ${{ steps.smoke.outputs.test2_status || 'skipped' }}
          test3_status: ${{ steps.smoke.outputs.test3_status || 'skipped' }}
          test4_status: ${{ steps.smoke.outputs.test4_status || 'skipped' }}
          test5_status: ${{ steps.smoke.outputs.test5_status || 'skipped' }}
          test6_status: ${{ steps.smoke.outputs.test6_status || 'skipped' }}
          test1_duration: ${{ steps.smoke.outputs.test1_duration || 0 }}
          test2_duration: ${{ steps.smoke.outputs.test2_duration || 0 }}
          test3_duration: ${{ steps.smoke.outputs.test3_duration || 0 }}
          test4_duration: ${{ steps.smoke.outputs.test4_duration || 0 }}
          test5_duration: ${{ steps.smoke.outputs.test5_duration || 0 }}
          test6_duration: ${{ steps.smoke.outputs.test6_duration || 0 }}
          regression_decision: ${{ steps.smoke.outputs.regression_decision || 'not_configured' }}
          regression_current_version: ${{ steps.smoke.outputs.regression_current_version || steps.smoke.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.smoke.outputs.regression_latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.smoke.outputs.regression_next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.smoke.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.smoke.outputs.regression_details || 'Regression comparison summary unavailable.' }}
      - if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
