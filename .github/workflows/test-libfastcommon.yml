name: Test Libfastcommon on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-libfastcommon.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-libfastcommon.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-libfastcommon.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-libfastcommon.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-libfastcommon.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-libfastcommon.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-libfastcommon.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-libfastcommon.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-libfastcommon.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-libfastcommon.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-libfastcommon.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-libfastcommon.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-libfastcommon.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-libfastcommon.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-libfastcommon.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-libfastcommon.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-libfastcommon.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-libfastcommon.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-libfastcommon.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-libfastcommon.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-libfastcommon.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-libfastcommon.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-libfastcommon.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-libfastcommon.outputs.timestamp }}
jobs:
  test-libfastcommon:
    runs-on: ubuntu-24.04-arm
    env:
      LIBFASTCOMMON_TAG: "V1.0.84"
      LIBFASTCOMMON_REPO: "https://github.com/happyfish100/libfastcommon.git"
      LIBFASTCOMMON_SRC_DIR: "/tmp/libfastcommon-source"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Libfastcommon'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libfastcommon" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libfastcommon" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${LIBFASTCOMMON_TAG#V}" >> "$GITHUB_OUTPUT"
      - name: Install Libfastcommon
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git
          rm -rf "${LIBFASTCOMMON_SRC_DIR}"
          git clone --depth 1 --branch "${LIBFASTCOMMON_TAG}" "${LIBFASTCOMMON_REPO}" "${LIBFASTCOMMON_SRC_DIR}"
          cd "${LIBFASTCOMMON_SRC_DIR}"
          ./make.sh
          sudo ./make.sh install
          sudo ldconfig
          echo "source_dir=${LIBFASTCOMMON_SRC_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Libfastcommon version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(git -C "${{ steps.install.outputs.source_dir }}" describe --tags --exact-match 2>/dev/null | sed 's/^[Vv]//')
          if [ -z "${CURRENT}" ]; then
            CURRENT="${LIBFASTCOMMON_TAG#V}"
          fi
          export CURRENT
          NEXT_TAG=$(python3 - <<'PY'
          import os
          import re
          import subprocess

          current = os.environ.get("CURRENT", "")
          repo = os.environ.get("LIBFASTCOMMON_REPO", "")
          if not re.fullmatch(r"\d+\.\d+\.\d+", current) or not repo:
              print("")
              raise SystemExit(0)

          raw = subprocess.check_output(
              ["git", "ls-remote", "--tags", "--refs", repo],
              text=True,
          )

          def parse(name):
              cleaned = name.lstrip("Vv")
              if not re.fullmatch(r"\d+\.\d+\.\d+", cleaned):
                  return None
              return tuple(int(part) for part in cleaned.split("."))

          current_tuple = tuple(int(part) for part in current.split("."))
          parsed = []
          for line in raw.splitlines():
              ref = line.strip().split()[-1]
              name = ref.rsplit("/", 1)[-1]
              key = parse(name)
              if key is not None:
                  parsed.append((key, name))

          parsed = sorted(set(parsed), key=lambda x: x[0])
          next_tag = next((name for key, name in parsed if key > current_tuple), "")
          print(next_tag)
          PY
          )
          if [ -n "${NEXT_TAG}" ]; then
            TARGET_TAG="${NEXT_TAG}"
          else
            TARGET_TAG="V${CURRENT}"
          fi
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${TARGET_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${TARGET_TAG#V}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Library Artifacts
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          LIBRARY_PATH=$(find /usr /usr/local -name 'libfastcommon.so*' 2>/dev/null | head -n 1 || true)
          if [ -n "${LIBRARY_PATH}" ] && \
             { [ -f /usr/include/fastcommon/logger.h ] || [ -f /usr/local/include/fastcommon/logger.h ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Provenance
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(git -C "${{ steps.install.outputs.source_dir }}" describe --tags --exact-match 2>/dev/null | sed 's/^[Vv]//')
          if [ "${VERSION}" = "${{ steps.version.outputs.version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Header Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > /tmp/libfastcommon-preprocess.c <<'C'
          #include <fastcommon/logger.h>
          int main(void) { return 0; }
          C
          if cc -E -I/usr/include -I/usr/local/include /tmp/libfastcommon-preprocess.c >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > /tmp/libfastcommon-smoke.c <<'C'
          #include <stdio.h>
          #include <fastcommon/logger.h>
          int main(void) {
            printf("libfastcommon-ok\n");
            return 0;
          }
          C
          cc /tmp/libfastcommon-smoke.c \
            -I/usr/include -I/usr/local/include \
            -L/usr/lib -L/usr/lib64 -L/usr/local/lib -L/usr/local/lib64 \
            -lfastcommon -o /tmp/libfastcommon-smoke
          if LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:/usr/lib:/usr/lib64 /tmp/libfastcommon-smoke | grep -q 'libfastcommon-ok'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_TAG="${{ steps.version.outputs.next_tag || '' }}"
          LATEST_TAG="${{ steps.version.outputs.latest_tag || '' }}"
          LATEST="${{ steps.version.outputs.latest || '' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST_TAG}" ] || [ -z "${LATEST}" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libfastcommon version ${CURRENT} passed smoke tests in this run, but the next stable source tag could not be resolved automatically from upstream tags." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "${NEXT_TAG}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libfastcommon version ${CURRENT} already matches the newest stable upstream release, so there is no newer Arm64 candidate to validate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          NEXT_SRC="${TMPDIR}/libfastcommon-next"
          NEXT_DESTDIR="${TMPDIR}/install-root"

          git clone --depth 1 --branch "${LATEST_TAG}" "${LIBFASTCOMMON_REPO}" "${NEXT_SRC}" >/tmp/libfastcommon-next-clone.log 2>&1
          (
            cd "${NEXT_SRC}"
            ./make.sh >/tmp/libfastcommon-next-build.log 2>&1
            DESTDIR="${NEXT_DESTDIR}" ./make.sh install >/tmp/libfastcommon-next-install.log 2>&1
          )

          NEXT_INCLUDE_ROOT=$(find "${NEXT_DESTDIR}/usr" -path '*/fastcommon/logger.h' | head -n 1 | sed 's#/fastcommon/logger.h##')
          NEXT_LIB_DIR=$(find "${NEXT_DESTDIR}/usr" -type f -name 'libfastcommon.so*' | head -n 1 | xargs -r dirname)
          NEXT_INSTALLED_VERSION=$(git -C "${NEXT_SRC}" describe --tags --exact-match 2>/dev/null | sed 's/^[Vv]//')

          cat > "${TMPDIR}/libfastcommon-next-smoke.c" <<'C'
          #include <stdio.h>
          #include <fastcommon/logger.h>
          int main(void) {
            printf("libfastcommon-regression-ok\n");
            return 0;
          }
          C

          if [ -n "${NEXT_INCLUDE_ROOT}" ] && [ -n "${NEXT_LIB_DIR}" ]; then
            cc "${TMPDIR}/libfastcommon-next-smoke.c" \
              -I"${NEXT_INCLUDE_ROOT}" \
              -L"${NEXT_LIB_DIR}" \
              -lfastcommon -o "${TMPDIR}/libfastcommon-next-smoke"
          else
            cat /tmp/libfastcommon-next-clone.log || true
            cat /tmp/libfastcommon-next-build.log || true
            cat /tmp/libfastcommon-next-install.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libfastcommon version ${CURRENT} passed smoke tests in this run, but the candidate source tag ${LATEST} did not install usable headers and shared libraries into the isolated Arm64 prefix." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if LD_LIBRARY_PATH="${NEXT_LIB_DIR}" "${TMPDIR}/libfastcommon-next-smoke" | grep -q 'libfastcommon-regression-ok' && \
             [ "${NEXT_INSTALLED_VERSION}" = "${LATEST}" ]; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libfastcommon version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt the next newer source tag ${LATEST} in an isolated Arm64 prefix, and the rebuilt library passed a real compile-and-link smoke check." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
          else
            cat /tmp/libfastcommon-next-clone.log || true
            cat /tmp/libfastcommon-next-build.log || true
            cat /tmp/libfastcommon-next-install.log || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libfastcommon version ${CURRENT} passed smoke tests in this run, but the candidate source tag ${LATEST} did not complete the expected compile-and-link validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          else
            SKIPPED=$((SKIPPED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Libfastcommon Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check Library Artifacts: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check Version Provenance: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check Header Configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
