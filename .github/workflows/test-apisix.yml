name: Test Apache APISIX on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/apisix.md'
      - '.github/workflows/test-apisix.yml'

jobs:
  test-apisix:
    runs-on: ubuntu-24.04-arm
    env:
      APISIX_BASELINE_TAG: "3.12.0-debian"
      APISIX_NEXT_TAG: "3.13.0-debian"
      APISIX_NEXT_VERSION: "3.13.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=apisix" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/apisix" >> "$GITHUB_OUTPUT"
      - name: Install Apache APISIX
        id: install
        run: |
          echo "Installing Apache APISIX via Docker..."

          # Clean up any old containers from previous runs
          docker rm -f apisix etcd httpbin 2>/dev/null || true

          ######################################################
          # 1) Start etcd on host network so 127.0.0.1:2379 works
          ######################################################
          echo "Starting etcd (gcr.io/etcd-development/etcd:v3.5.10) on host network..."
          docker run -d --name etcd \
            --network host \
            gcr.io/etcd-development/etcd:v3.5.10 \
            /usr/local/bin/etcd \
              --name s1 \
              --data-dir=/etcd-data \
              --listen-client-urls=http://0.0.0.0:2379 \
              --advertise-client-urls=http://127.0.0.1:2379 \
              --listen-peer-urls=http://0.0.0.0:2380 \
              --initial-advertise-peer-urls=http://127.0.0.1:2380 \
              --initial-cluster=s1=http://127.0.0.1:2380 \
              --initial-cluster-state=new

          echo "Waiting for etcd to start..."
          ETCD_OK=0
          for _ in $(seq 1 30); do
            ETCD_STATUS=$(curl -sS --connect-timeout 2 --max-time 5 http://127.0.0.1:2379/health || true)
            if printf '%s' "$ETCD_STATUS" | grep -q '"health":"true"'; then
              ETCD_OK=1
              break
            fi
            sleep 2
          done
          if [ "$ETCD_OK" -ne 1 ]; then
            docker logs etcd || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          ######################################################
          # 2) Start a LOCAL upstream instead of real httpbin.org
          ######################################################
          echo "Starting local httpbin upstream (mccutchen/go-httpbin) on host network..."
          docker run -d --name httpbin \
            --network host \
            mccutchen/go-httpbin

          echo "Waiting for httpbin upstream to start..."
          sleep 10

          ######################################################
          # 3) Start APISIX on host network
          ######################################################
          BASELINE_TAG="${APISIX_BASELINE_TAG}"
          echo "Starting APISIX (apache/apisix:${BASELINE_TAG}) on host network..."
          docker run -d --name apisix \
            --network host \
            -e APISIX_STAND_ALONE=false \
            "apache/apisix:${BASELINE_TAG}"

          echo "Waiting for APISIX to start..."
          sleep 35

          ADMIN_KEY=""
          for _ in $(seq 1 30); do
            ADMIN_KEY=$(docker exec apisix sh -lc "awk '
              /^[[:space:]]*admin_key:/ { in_admin=1; next }
              in_admin && /^[[:space:]]*admin_listen:/ { exit }
              in_admin && \$1 == \"key:\" { print \$2; exit }
            ' /usr/local/apisix/conf/config.yaml" | tr -d '[:space:]') || true
            if [ -n "$ADMIN_KEY" ]; then
              break
            fi
            sleep 2
          done
          if [ -z "$ADMIN_KEY" ]; then
            echo "Unable to determine live APISIX admin key"
            docker exec apisix sh -lc 'sed -n "1,200p" /usr/local/apisix/conf/config.yaml' || true
            docker logs apisix || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "APISIX_ADMIN_KEY=$ADMIN_KEY" >> "$GITHUB_ENV"
          echo "admin_key=$ADMIN_KEY" >> "$GITHUB_OUTPUT"
          ADMIN_READY=0
          for _ in $(seq 1 60); do
            HTTP_CODE=$(curl -sS --connect-timeout 2 --max-time 5 -o /tmp/apisix-install-routes.json -w "%{http_code}" \
              -H "X-API-KEY: ${ADMIN_KEY}" \
              http://127.0.0.1:9180/apisix/admin/routes || true)
            if [ "$HTTP_CODE" = "200" ]; then
              ADMIN_READY=1
              break
            fi
            sleep 2
          done
          if [ "$ADMIN_READY" -ne 1 ]; then
            echo "APISIX admin API did not become ready"
            cat /tmp/apisix-install-routes.json || true
            docker logs apisix || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "baseline_tag=${BASELINE_TAG}" >> $GITHUB_OUTPUT
          echo "install_status=success" >> $GITHUB_OUTPUT

      - name: Get APISIX version
        id: version
        run: |
          # Extract version number from the pinned baseline container.
          RAW_VERSION=$(docker exec apisix apisix version)
          VERSION=$(echo "$RAW_VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          VERSION=$(echo "$RAW_VERSION" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -n1)
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          
          if [ -z "$VERSION" ]; then 
            echo "Could not detect version from output: $RAW_VERSION"
            VERSION="${{ steps.install.outputs.baseline_tag }}"
            VERSION="${VERSION%-debian}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "latest=${APISIX_NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "Detected APISIX version: $VERSION"

      - name: Test 1 - Check container running
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if docker ps | grep -q "apisix"; then
            echo "✓ apisix container running"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ apisix container not running"
            echo "=== docker ps ==="
            docker ps || true
            echo "=== apisix logs ==="
            docker logs apisix || true
            echo "=== etcd logs ==="
            docker logs etcd || true
            echo "=== httpbin logs ==="
            docker logs httpbin || true
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check Admin API
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          OK=0
          for _ in $(seq 1 60); do
            HTTP_CODE=$(curl -sS --connect-timeout 2 --max-time 5 -o /tmp/apisix-admin-routes.json -w "%{http_code}" \
              -H "X-API-KEY: ${APISIX_ADMIN_KEY}" \
              http://127.0.0.1:9180/apisix/admin/routes || true)
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/apisix-admin-routes.json ] && grep -Eqi '^\s*[\{\[]|"list"|"total"|"value"|"key"' /tmp/apisix-admin-routes.json; then
              OK=1
              break
            fi
            sleep 2
          done

          if [ "$OK" -eq 1 ]; then
            echo "✓ admin api works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ admin api failed"
            cat /tmp/apisix-admin-routes.json || true
            docker logs apisix || true
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Create a Route
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          # Create a route that forwards /get to LOCAL httpbin upstream on 127.0.0.1:8080
          HTTP_CODE=$(curl -sS -o /tmp/apisix-route-put.json -w "%{http_code}" -X PUT \
            -H "X-API-KEY: ${APISIX_ADMIN_KEY}" \
            http://127.0.0.1:9180/apisix/admin/routes/1 \
            -d '{
              "uri": "/get",
              "upstream": {
                "type": "roundrobin",
                "nodes": {
                  "127.0.0.1:8080": 1
                }
              }
            }' || true)

          if { [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; } && grep -Eqi '"key"|"/get"' /tmp/apisix-route-put.json; then
             echo "✓ route creation works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ route creation failed"
             echo "HTTP code: $HTTP_CODE"
             cat /tmp/apisix-route-put.json || true
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Access the Route
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          # Give it a moment to sync
          sleep 5

          OK=0
          STATUS_CODE="000"
          for _ in $(seq 1 20); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9080/get || true)
            if [ "$STATUS_CODE" = "200" ]; then
              OK=1
              break
            fi
            sleep 2
          done

          if [ "$OK" -eq 1 ]; then
             echo "✓ route access works (HTTP 200)"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ route access failed (status: $STATUS_CODE)"
             echo "=== APISIX logs ==="
             docker logs apisix || true
             echo "=== httpbin logs ==="
             docker logs httpbin || true
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Check Admin Routes Again
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation

          # Simple, known-good endpoint: list routes again
          RESPONSE=$(curl -sS -o /tmp/apisix_routes.json -w "%{http_code}" \
            -H "X-API-KEY: ${APISIX_ADMIN_KEY}" \
            http://127.0.0.1:9180/apisix/admin/routes || true)

          HTTP_CODE="$RESPONSE"
          OK=0
          if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/apisix_routes.json ]; then
            OK=1
          else
            for _ in $(seq 1 20); do
              sleep 2
              HTTP_CODE=$(curl -sS -o /tmp/apisix_routes.json -w "%{http_code}" \
                -H "X-API-KEY: ${APISIX_ADMIN_KEY}" \
                http://127.0.0.1:9180/apisix/admin/routes || true)
              if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/apisix_routes.json ]; then
                OK=1
                break
              fi
            done
          fi

          echo "HTTP code from /apisix/admin/routes: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/apisix_routes.json || true

          if [ "$OK" -eq 1 ]; then
            echo "✓ admin routes endpoint healthy"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ admin routes endpoint returned HTTP $HTTP_CODE"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi

          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_TAG="${APISIX_NEXT_TAG}"
          LATEST="${APISIX_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$NEXT_TAG" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the next Arm64 image candidate could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the next Arm64 image candidate could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured Apache APISIX Tests 1-5 baseline ${CURRENT} matches the configured Test 6 candidate ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned release so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run and is already the latest stable Arm64 image candidate for this workflow."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if docker pull "apache/apisix:${NEXT_TAG}" >/dev/null 2>&1; then
            NEXT_OUTPUT=$(docker run --rm --entrypoint apisix "apache/apisix:${NEXT_TAG}" version 2>&1 || true)
            NEXT_INSTALLED_VERSION=$(printf '%s' "$NEXT_OUTPUT" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
            if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
              echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run. Regression validation pulled candidate image tag ${NEXT_TAG} on Arm64, and the APISIX binary reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run. Regression validation pulled candidate image tag ${NEXT_TAG} on Arm64, and the APISIX binary reported version ${NEXT_INSTALLED_VERSION}."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "$NEXT_OUTPUT"
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_TAG} did not report a matching Arm64 version." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_TAG} did not report a matching Arm64 version."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_TAG} could not be pulled on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Apache APISIX version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_TAG} could not be pulled on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check container running
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Admin API
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Create a Route
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Access the Route
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Check Admin Routes Again
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))


          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          # Fetch the direct job URL for deep-linking
          JOB_ID="${{ github.job }}"
          # Using GH_TOKEN to find the exact job URL. 
          # Reusable workflows are often named "JobID / JobID" or just "JobID"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          
          # Fallback if URL calculation fails
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results

          cat > test-results/apisix.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Apache APISIX",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Lua",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check container running",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Admin API",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Create a Route",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Access the Route",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Check Admin Routes Again",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

          echo "Generated test results:"
          cat test-results/apisix.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apisix-test-results
          path: test-results/apisix.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "## Apache APISIX Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check container running: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Admin API: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Create a Route: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Access the Route: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Check Admin Routes Again: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Support badge is based on Tests 1-5:** yes" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY
