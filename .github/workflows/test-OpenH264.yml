name: Test OpenH264 on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-openh264.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-openh264.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-openh264.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-openh264.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-openh264.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-openh264.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-openh264.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-openh264.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-openh264.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-openh264.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-openh264.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-openh264.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-openh264.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-openh264.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-openh264.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-openh264.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-openh264.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-openh264.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-OpenH264.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-openh264.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-openh264.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-openh264.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-openh264.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-openh264.outputs.timestamp }}
jobs:
  test-openh264:
    runs-on: ubuntu-24.04-arm
    env:
      OPENH264_VERSION: "2.5.1"
      OPENH264_SOURCE_URL: "https://github.com/cisco/openh264/archive/refs/tags/2.5.1.tar.gz"
      OPENH264_NEXT_VERSION: "2.6.0"
      OPENH264_NEXT_SOURCE_URL: "https://github.com/cisco/openh264/archive/refs/tags/v2.6.0.tar.gz"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OpenH264'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=OpenH264" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/OpenH264" >> "$GITHUB_OUTPUT"
          echo "current_version=${OPENH264_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install OpenH264
        id: install
        run: |
          set -euo pipefail
          echo "Installing OpenH264..."
          sudo apt-get update
          sudo apt-get install -y curl make g++ nasm

          # arm_recommended_minimum_version is 2.5.0 (2024-11-08). Apply the
          # agreed rule by pinning an aged stable release above that anchor.
          VERSION="${OPENH264_VERSION}"
          SOURCE_URL="${OPENH264_SOURCE_URL}"
          curl -fsSL -o openh264.tar.gz "${SOURCE_URL}"
          EXTRACT_DIR="openh264-${VERSION}"
          tar -xzf openh264.tar.gz
          mv "$EXTRACT_DIR" openh264-src
          echo "OPENH264_DIR=$PWD/openh264-src" >> "$GITHUB_ENV"

          make -C openh264-src -j"$(nproc)"
          sudo install -m 0755 openh264-src/h264enc /usr/local/bin/h264enc
          sudo install -m 0755 openh264-src/h264dec /usr/local/bin/h264dec
          sudo install -m 0755 "openh264-src/libopenh264.so.${VERSION}" "/usr/local/lib/libopenh264.so.${VERSION}"
          sudo ln -sf "/usr/local/lib/libopenh264.so.${VERSION}" /usr/local/lib/libopenh264.so.8
          sudo ln -sf "/usr/local/lib/libopenh264.so.${VERSION}" /usr/local/lib/libopenh264.so
          sudo ldconfig

          if command -v h264enc >/dev/null 2>&1 && command -v h264dec >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get OpenH264 version
        id: version
        run: |
          VERSION=$(find "$OPENH264_DIR" -maxdepth 1 -name 'libopenh264.so.*' | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${OPENH264_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected OpenH264 version: $VERSION"

      - name: Test 1 - Check encoder and decoder binaries exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v h264enc >/dev/null 2>&1 && command -v h264dec >/dev/null 2>&1 && [ -f "/usr/local/lib/libopenh264.so.${{ steps.metadata.outputs.current_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check versioned library install
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if ls "/usr/local/lib/libopenh264.so.${{ steps.metadata.outputs.current_version }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if h264enc 2>&1 | grep -q 'Wels SVC Encoder Usage' && h264dec 2>&1 | grep -qi 'usage'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if h264dec "$OPENH264_DIR/res/test_qcif_cabac.264" /tmp/openh264-decoded.yuv >/tmp/openh264-decode.log 2>&1 && [ -s /tmp/openh264-decoded.yuv ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openh264-decode.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          STATUS="failed"
          LATEST="${OPENH264_NEXT_VERSION}"
          if [ -z "$LATEST" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Failed to resolve the latest stable OpenH264 release from GitHub during regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured OpenH264 Tests 1-5 baseline ${CURRENT} matches the configured Test 6 candidate ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned release so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            cd /tmp
            rm -rf openh264-next openh264-next.tar.gz
            NEXT_URL="${OPENH264_NEXT_SOURCE_URL}"
            curl -fsSL "$NEXT_URL" -o openh264-next.tar.gz
            NEXT_EXTRACT_DIR=$(python3 - <<'PY'
            import tarfile

            with tarfile.open("openh264-next.tar.gz", "r:gz") as tar:
                print(tar.getmembers()[0].name.split("/", 1)[0])
            PY
            )
            tar -xzf openh264-next.tar.gz
            mv "$NEXT_EXTRACT_DIR" openh264-next
            make -C openh264-next -j"$(nproc)"
            if [ -x /tmp/openh264-next/h264enc ] && [ -x /tmp/openh264-next/h264dec ] && [ -f "/tmp/openh264-next/libopenh264.so.${LATEST}" ]; then
              echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Candidate OpenH264 ${LATEST} built successfully on Arm64 and exposed the expected encoder, decoder, and versioned shared library." >> "$GITHUB_OUTPUT"
              STATUS="passed"
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Candidate OpenH264 ${LATEST} could be downloaded on Arm64 but did not build the expected versioned binaries and library." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "note=OpenH264 regression validation uses the official source tarball path on Arm64." >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then PASSED=$((PASSED + 1)); elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "## OpenH264 Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check encoder and decoder binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check versioned library install: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests.' }}" >> "$GITHUB_STEP_SUMMARY"
