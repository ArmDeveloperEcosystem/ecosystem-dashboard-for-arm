name: Test Elastic Enterprise Search on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-elastic-enterprise-search.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-elastic-enterprise-search.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-elastic-enterprise-search.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-elastic-enterprise-search.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-elastic-enterprise-search.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-elastic-enterprise-search.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-elastic-enterprise-search.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-elastic-enterprise-search.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-elastic-enterprise-search.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-elastic-enterprise-search.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-elastic-enterprise-search.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-elastic-enterprise-search.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-elastic-enterprise-search.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-elastic-enterprise-search.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-elastic-enterprise-search.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-elastic-enterprise-search.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-elastic-enterprise-search.outputs.timestamp }}
jobs:
  test-elastic-enterprise-search:
    runs-on: ubuntu-24.04-arm
    env:
      ELASTIC_ENTERPRISE_SEARCH_VERSION: "8.19.12"
      ELASTIC_ENTERPRISE_SEARCH_IMAGE: "docker.elastic.co/enterprise-search/enterprise-search:8.19.12-arm64"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Elastic Enterprise Search'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=elastic-enterprise-search" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/elastic-enterprise-search" >> "$GITHUB_OUTPUT"
      - name: Install Elastic Enterprise Search
        id: install
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || sudo service docker start || true
          sudo docker pull "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Elastic Enterprise Search version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sudo docker run --rm "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}" --version 2>&1 | sed -n 's/^ - version: //p' | head -n 1)
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request

          html = urllib.request.urlopen(
              "https://www.docker.elastic.co/r/enterprise-search/enterprise-search",
              timeout=20,
          ).read().decode("utf-8", "ignore")
          seen = []
          for tag in re.findall(r"enterprise-search:([0-9]+\.[0-9]+\.[0-9]+)-arm64", html):
              if tag not in seen:
                  seen.append(tag)
          print(seen[0] if seen else "unknown")
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker run --rm "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}" --version 2>&1 | grep -q "version: ${ELASTIC_ENTERPRISE_SEARCH_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker run --rm "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}" --help 2>&1 | grep -q '^Usage: bin/enterprise-search-internal'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          OUTPUT=$(timeout 45 sudo docker run --rm "${ELASTIC_ENTERPRISE_SEARCH_IMAGE}" 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/elastic-enterprise-search.log
          if printf '%s\n' "$OUTPUT" | grep -q 'Enterprise Search is starting' && printf '%s\n' "$OUTPUT" | grep -q 'Elastic Enterprise Search'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/elastic-enterprise-search.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          {
            echo "## Elastic Enterprise Search Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Help Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          echo "6. Regression applicability: package-manager installed (not applicable)"
            echo ""

            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
            echo ""
            echo "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64."
          } >> "$GITHUB_STEP_SUMMARY"
