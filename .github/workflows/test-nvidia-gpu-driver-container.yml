      - name: Test 1 - Check package-specific baseline markers
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          SOURCE_MARKERS="${{ steps.expectations.outputs.source_markers }}"
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=Baseline source or external metadata could not be acquired." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$SOURCE_MARKERS"
            for marker in "${MARKERS[@]}"; do
              if [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            if [ "$FOUND" -ge 2 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Found package-specific baseline markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected at least two package-specific markers from: $SOURCE_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "download=$DOWNLOAD_URL" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external baseline metadata for the published source links." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External baseline metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check published package metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ -f "$CONTENT_PAGE" ]
          grep -Fx "download_url: $DOWNLOAD_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    version_number: $BASELINE_VERSION" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    homepage_url: $HOMEPAGE_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "        official_docs: $OFFICIAL_DOCS" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Validated the checked-in package page against the workflow baseline, homepage, and docs metadata." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check package-specific docs and manifests
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          DOC_MARKERS="${{ steps.expectations.outputs.doc_markers }}"
          IDENTITY_TARGET="${{ steps.expectations.outputs.identity_target }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$DOC_MARKERS"
            for marker in "${MARKERS[@]}"; do
              if [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            [ -e "$IDENTITY_TARGET" ]
            if [ "$FOUND" -ge 1 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Validated package-specific documentation or manifest markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected at least one package-specific documentation marker from: $DOC_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "docs=$OFFICIAL_DOCS" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external documentation and homepage metadata for the baseline package." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External documentation metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify Arm64 runner and lane assumptions
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ "$(uname -m)" = "aarch64" ]
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          if echo "$LANE_KIND" | grep -Eiq 'gpu|specialized|manual-review'; then
            echo "note=Validated Arm64 support metadata on a generic Arm runner; deeper runtime checks for this lane still require the package-specific environment: $LANE_KIND." >> "$GITHUB_OUTPUT"
          else
            echo "note=Validated Arm64 runner architecture and published Arm support metadata." >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run scoped Arm preflight proof
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export PREFLIGHT_SOURCE_DIR=baseline-src
          if bash -euo pipefail -c "$SCOPED_ARM_PREFLIGHT_PROBE"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Arm preflight smoke passed; completed package-specific source/compile/import/help/manifest proof on Arm64. Full GPU/CUDA/RAPIDS runtime remains scoped and was not claimed." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=Scoped Arm preflight failed; this workflow does not treat metadata-only checks as green." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
          PAGE_HTML="$(mktemp)"
          trap 'rm -f "$PAGE_HTML"' EXIT
          curl -fsSL "$DOWNLOAD_URL" -o "$PAGE_HTML"

          TAG_RESULT="$(python3 - "$CURRENT" "$IMAGE_VARIANT" "$PAGE_HTML" <<'PY'
          import pathlib
          import re
          import sys

          current = tuple(int(part) for part in sys.argv[1].split("."))
          variant = sys.argv[2]
          html = pathlib.Path(sys.argv[3]).read_text(encoding="utf-8", errors="ignore")

          pattern = re.compile(rf'([0-9]+\.[0-9]+\.[0-9]+)-{re.escape(variant)}')
          tags = sorted({match.group(1) for match in pattern.finditer(html)}, key=lambda value: tuple(int(part) for part in value.split(".")))
          newer = [value for value in tags if tuple(int(part) for part in value.split(".")) > current]
          if not newer:
              print("NONE\t\t")
              raise SystemExit(0)

          latest = newer[-1]
          full_tag = f"{latest}-{variant}"
          positions = [match.start() for match in re.finditer(re.escape(full_tag), html)]
          multi = False
          for pos in positions:
              window = html[max(0, pos - 1400):pos + 1400]
              if ('isMultiArchitecture\\":true' in window) or ('"isMultiArchitecture":true' in window):
                  multi = True
                  break
          print(("FOUND" if multi else "TAG_ONLY"), latest, full_tag, sep="\t")
          PY
          )"

          STATUS_KIND="$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $1}')"
          LATEST_VERSION="$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $2}')"
          FULL_TAG="$(printf '%s' "$TAG_RESULT" | awk -F '\t' '{print $3}')"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

          case "$STATUS_KIND" in
            NONE)
              echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=n/a" >> "$GITHUB_OUTPUT"
              echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
              echo "regression_result=No newer stable public Arm64 image tag is available" >> "$GITHUB_OUTPUT"
              echo "comparison=Tests 1-5 validated the scoped NVIDIA GPU Driver Container multi-architecture image/catalog preflight, and the public NGC tag stream does not currently expose a newer stable ${IMAGE_VARIANT} image tag than ${CURRENT}. No kernel driver load, privileged container launch, CUDA driver, GPU runtime, or live GPU execution is claimed." >> "$GITHUB_OUTPUT"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
              ;;
            FOUND)
              echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=$FULL_TAG" >> "$GITHUB_OUTPUT"
              echo "decision=limited_cpu_smoke_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Arm preflight proof passed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Test 6 limited_cpu_smoke_validated: reran the bounded scoped NVIDIA GPU Driver Container image tag/catalog proof for ${FULL_TAG} on the Arm64 runner. This validates published multi-architecture driver-container payload evidence only; no kernel driver load, privileged container launch, CUDA driver, GPU runtime, or live GPU execution is claimed." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "latest_version=metadata_review" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=metadata_review" >> "$GITHUB_OUTPUT"
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Automatic next-version resolution needs manual review" >> "$GITHUB_OUTPUT"
              echo "comparison=The public NGC page exposes newer NVIDIA GPU Driver Container tags, but the workflow could not verify a trustworthy multi-architecture candidate object for the ${IMAGE_VARIANT} line automatically." >> "$GITHUB_OUTPUT"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
              ;;
          esac
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Create test summary
        if: always()
        uses: ./.github/actions/write-package-job-summary
        with:
          package_name: 'NVIDIA GPU Driver Container'
          version: ${{ steps.version.outputs.version || 'unknown' }}
          overall_status: ${{ steps.summary.outputs.overall_status || 'unknown' }}
          tests_passed: ${{ steps.summary.outputs.passed || '0' }}
          tests_failed: ${{ steps.summary.outputs.failed || '0' }}
          tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
          duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test6_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}
