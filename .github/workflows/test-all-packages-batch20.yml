name: Test All Packages (Batch 20) on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - smoke_tests
    paths:
      - '.github/workflows/test-all-packages-batch20.yml'

jobs:

  test-mig-parted:
    uses: ./.github/workflows/test-mig-parted.yml

  test-migen:
    uses: ./.github/workflows/test-migen.yml

  test-mindspore:
    uses: ./.github/workflows/test-mindspore.yml

  test-mlflow:
    uses: ./.github/workflows/test-mlflow.yml

  test-mlnet:
    uses: ./.github/workflows/test-mlnet.yml

  test-ms-openjdk:
    uses: ./.github/workflows/test-ms-openjdk.yml

  test-msquic:
    uses: ./.github/workflows/test-msquic.yml

  test-myhdl:
    uses: ./.github/workflows/test-myhdl.yml

  test-nemo-agent-toolkit:
    uses: ./.github/workflows/test-nemo-agent-toolkit.yml

  test-neuralforecast:
    uses: ./.github/workflows/test-neuralforecast.yml

  test-ngspice:
    uses: ./.github/workflows/test-ngspice.yml

  test-notebook:
    uses: ./.github/workflows/test-notebook.yml

  test-nvidia-container-toolkit:
    uses: ./.github/workflows/test-nvidia-container-toolkit.yml

  test-nvidia-gpu-driver-container:
    uses: ./.github/workflows/test-nvidia-gpu-driver-container.yml

  test-nvidia-gpu-operator:
    uses: ./.github/workflows/test-nvidia-gpu-operator.yml

  test-nvimagecodec:
    uses: ./.github/workflows/test-nvimagecodec.yml

  test-nvsentinel:
    uses: ./.github/workflows/test-nvsentinel.yml

  test-nvshmem:
    uses: ./.github/workflows/test-nvshmem.yml

  test-nx-cugraph:
    uses: ./.github/workflows/test-nx-cugraph.yml

  test-ocm:
    uses: ./.github/workflows/test-ocm.yml

  test-ollama:
    uses: ./.github/workflows/test-ollama.yml

  test-open-webui:
    uses: ./.github/workflows/test-open-webui.yml

  test-openfpgaloader:
    uses: ./.github/workflows/test-openfpgaloader.yml

  test-openlane:
    uses: ./.github/workflows/test-openlane.yml

  test-opennow:
    uses: ./.github/workflows/test-opennow.yml

  test-optuna:
    uses: ./.github/workflows/test-optuna.yml

  test-ord-provider-server:
    uses: ./.github/workflows/test-ord-provider-server.yml

  test-oregano:
    uses: ./.github/workflows/test-oregano.yml

  test-osmo:
    uses: ./.github/workflows/test-osmo.yml

  test-owncast:
    uses: ./.github/workflows/test-owncast.yml

  test-pcb-rnd:
    uses: ./.github/workflows/test-pcb-rnd.yml

  test-physics-nemo:
    uses: ./.github/workflows/test-physics-nemo.yml

  test-playit:
    uses: ./.github/workflows/test-playit.yml

  test-playwright:
    uses: ./.github/workflows/test-playwright.yml

  test-prophet:
    uses: ./.github/workflows/test-prophet.yml

  test-pycaret:
    uses: ./.github/workflows/test-pycaret.yml

  test-pyspice:
    uses: ./.github/workflows/test-pyspice.yml

  test-qflow:
    uses: ./.github/workflows/test-qflow.yml

  test-qrouter:
    uses: ./.github/workflows/test-qrouter.yml

  test-raft:
    uses: ./.github/workflows/test-raft.yml

  test-ragflow:
    uses: ./.github/workflows/test-ragflow.yml

  test-rav1e:
    uses: ./.github/workflows/test-rav1e.yml

  test-resiliency-extension:
    uses: ./.github/workflows/test-resiliency-extension.yml

  test-restreamer:
    uses: ./.github/workflows/test-restreamer.yml

  test-ringdove-eda:
    uses: ./.github/workflows/test-ringdove-eda.yml

  test-rmm:
    uses: ./.github/workflows/test-rmm.yml

  summary:
    needs:
      [
        test-mig-parted,
        test-migen,
        test-mindspore,
        test-mlflow,
        test-mlnet,
        test-ms-openjdk,
        test-msquic,
        test-myhdl,
        test-nemo-agent-toolkit,
        test-neuralforecast,
        test-ngspice,
        test-notebook,
        test-nvidia-container-toolkit,
        test-nvidia-gpu-driver-container,
        test-nvidia-gpu-operator,
        test-nvimagecodec,
        test-nvsentinel,
        test-nvshmem,
        test-nx-cugraph,
        test-ocm,
        test-ollama,
        test-open-webui,
        test-openfpgaloader,
        test-openlane,
        test-opennow,
        test-optuna,
        test-ord-provider-server,
        test-oregano,
        test-osmo,
        test-owncast,
        test-pcb-rnd,
        test-physics-nemo,
        test-playit,
        test-playwright,
        test-prophet,
        test-pycaret,
        test-pyspice,
        test-qflow,
        test-qrouter,
        test-raft,
        test-ragflow,
        test-rav1e,
        test-resiliency-extension,
        test-restreamer,
        test-ringdove-eda,
        test-rmm
      ]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect batch results
        id: collect
        uses: ./.github/actions/collect-batch-results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          batch_number: "20"
          batch_title: "Batch 20"

      - name: Upload batch test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch20-test-results
          path: test-results
          retention-days: 90
