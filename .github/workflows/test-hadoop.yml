name: Test Hadoop on Arm64

on:
  workflow_dispatch:
    inputs:
      prefetch_run_id:
        description: Orchestrator run id holding prefetched heavy archives
        required: false
        type: string
      prefetch_artifact_name:
        description: Artifact name containing prefetched heavy archives
        required: false
        type: string
  workflow_call:
    inputs:
      prefetch_run_id:
        required: false
        type: string
      prefetch_artifact_name:
        required: false
        type: string
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-hadoop.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-hadoop.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-hadoop.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-hadoop.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-hadoop.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-hadoop.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-hadoop.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-hadoop.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-hadoop.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-hadoop.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-hadoop.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-hadoop.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-hadoop.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-hadoop.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-hadoop.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-hadoop.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-hadoop.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-hadoop.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-hadoop.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-hadoop.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-hadoop.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-hadoop.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-hadoop.outputs.timestamp }}
jobs:
  test-hadoop:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    env:
      BASELINE_VERSION: "3.3.6"
      NEXT_VERSION: "3.4.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Hadoop'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore warm Hadoop baseline cache
        id: restore_hadoop_baseline_cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/prefetch-heavy/hadoop/hadoop-3.3.6.tar.gz
          key: heavy-baseline-hadoop-3.3.6-runtime-arm64-v1

      - name: Download prefetched heavy baselines
        if: ${{ inputs.prefetch_run_id != '' && inputs.prefetch_artifact_name != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          repository: ${{ github.repository }}
          run-id: ${{ inputs.prefetch_run_id }}
          github-token: ${{ github.token }}
          name: ${{ inputs.prefetch_artifact_name }}
          path: ${{ runner.temp }}/prefetch-heavy

      - name: Resolve prefetched heavy baselines
        if: always()
        run: |
          echo "PREFETCH_HEAVY_ROOT=${RUNNER_TEMP}/prefetch-heavy" >> "$GITHUB_ENV"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=hadoop" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/hadoop" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Hadoop
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-11-jdk curl tar"
          VERSION="${{ steps.metadata.outputs.current_version }}"
          DLCDN_URL="https://dlcdn.apache.org/hadoop/common/hadoop-${VERSION}/hadoop-${VERSION}.tar.gz"
          PRIMARY_URL="https://downloads.apache.org/hadoop/common/hadoop-${VERSION}/hadoop-${VERSION}.tar.gz"
          ARCHIVE_URL="https://archive.apache.org/dist/hadoop/common/hadoop-${VERSION}/hadoop-${VERSION}.tar.gz"
          ARCHIVE_HTTP_URL="http://archive.apache.org/dist/hadoop/common/hadoop-${VERSION}/hadoop-${VERSION}.tar.gz"

          download_hadoop_tarball() {
            local dest="$1"
            shift
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=2 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=360 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$dest" "${urls[@]}"
          }

          echo "Downloading Hadoop baseline from Apache mirrors"
          CACHE_FILE="${PREFETCH_HEAVY_ROOT:-${RUNNER_TEMP}/prefetch-heavy}/hadoop/hadoop-${VERSION}.tar.gz"
          if [ -f "$CACHE_FILE" ]; then
            cp "$CACHE_FILE" /tmp/hadoop-current.tar.gz
          else
            if ! download_hadoop_tarball /tmp/hadoop-current.tar.gz "$DLCDN_URL" "$PRIMARY_URL" "$ARCHIVE_URL" "$ARCHIVE_HTTP_URL"; then
              echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "install_status=failed" >> "$GITHUB_OUTPUT"
              echo "install_blocker=baseline_download_failed" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          mkdir -p "$(dirname "$CACHE_FILE")"
          if [ ! -f "$CACHE_FILE" ]; then
            cp /tmp/hadoop-current.tar.gz "$CACHE_FILE"
          fi
          ls -lh /tmp/hadoop-current.tar.gz
          sudo rm -rf /opt/hadoop "/opt/hadoop-${VERSION}"
          echo "Extracting Hadoop baseline..."
          if ! timeout 15m sudo tar -xzf /tmp/hadoop-current.tar.gz -C /opt; then
            echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo mv "/opt/hadoop-${VERSION}" /opt/hadoop
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64" >> "$GITHUB_ENV"
          echo "HADOOP_HOME=/opt/hadoop" >> "$GITHUB_ENV"
          echo "/opt/hadoop/bin" >> "$GITHUB_PATH"
          echo "/opt/hadoop/sbin" >> "$GITHUB_PATH"
          sudo sed -i '/^export JAVA_HOME=/d' /opt/hadoop/etc/hadoop/hadoop-env.sh
          echo "export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64" | sudo tee -a /opt/hadoop/etc/hadoop/hadoop-env.sh >/dev/null

          if [ -x /opt/hadoop/bin/hadoop ] && [ -x /opt/hadoop/bin/hdfs ]; then
            echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Save warm Hadoop baseline cache
        if: ${{ steps.install.outputs.install_status == 'success' && steps.restore_hadoop_baseline_cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/prefetch-heavy/hadoop/hadoop-3.3.6.tar.gz
          key: heavy-baseline-hadoop-3.3.6-runtime-arm64-v1

      - name: Resolve Hadoop install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          ROOT="/opt/hadoop"
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          if [ -x "$ROOT/bin/hadoop" ] && [ -x "$ROOT/bin/hdfs" ]; then
            STATUS="success"
            BLOCKER=""
          fi
          echo "HADOOP_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "HADOOP_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"

      - name: Get Hadoop version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "version=${{ steps.install.outputs.baseline_version || steps.metadata.outputs.current_version || 'unknown' }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          export HADOOP_HOME=/opt/hadoop
          export PATH="$HADOOP_HOME/bin:$HADOOP_HOME/sbin:$PATH"
          VERSION=$(hadoop version | awk 'NR==1 {print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check hadoop binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -x /opt/hadoop/bin/hadoop ] && command -v hadoop >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check hadoop version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          export HADOOP_HOME=/opt/hadoop
          export PATH="$HADOOP_HOME/bin:$HADOOP_HOME/sbin:$PATH"
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(hadoop version | awk 'NR==1 {print $2}')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            hadoop version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check hdfs version output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          export HADOOP_HOME=/opt/hadoop
          export PATH="$HADOOP_HOME/bin:$HADOOP_HOME/sbin:$PATH"
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(hdfs version | awk 'NR==1 {print $2}')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            hdfs version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Hadoop classpath and examples
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          export HADOOP_HOME=/opt/hadoop
          export PATH="$HADOOP_HOME/bin:$HADOOP_HOME/sbin:$PATH"
          EXAMPLE_JAR=$(find "$HADOOP_HOME/share/hadoop/mapreduce" -maxdepth 1 -name 'hadoop-mapreduce-examples-*.jar' | head -n 1)
          if [ -n "$EXAMPLE_JAR" ] && [ -f "$EXAMPLE_JAR" ] && [ -n "$(timeout 30s hadoop classpath --glob)" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            find "$HADOOP_HOME/share/hadoop/mapreduce" -maxdepth 1 -name 'hadoop-mapreduce-examples-*.jar' || true
            timeout 30s hadoop classpath --glob || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check native loader output and architecture
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${HADOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          export HADOOP_HOME=/opt/hadoop
          export PATH="$HADOOP_HOME/bin:$HADOOP_HOME/sbin:$PATH"
          ARCH=$(uname -m)
          NATIVE_OUTPUT=$(hadoop checknative -a 2>&1 || true)
          if [ "$ARCH" = "aarch64" ] && grep -q "Native library checking" <<< "$NATIVE_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NATIVE_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_version || steps.metadata.outputs.current_version || 'unknown' }}"
          INSTALL_STATUS="${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          CORE_FAILURES=0
          for conclusion in \
            "${{ steps.test1.conclusion || 'skipped' }}" \
            "${{ steps.test2.conclusion || 'skipped' }}" \
            "${{ steps.test3.conclusion || 'skipped' }}" \
            "${{ steps.test4.conclusion || 'skipped' }}" \
            "${{ steps.test5.conclusion || 'skipped' }}"; do
            if [ "$conclusion" = "failure" ]; then
              CORE_FAILURES=$((CORE_FAILURES + 1))
            fi
          done
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="${NEXT_VERSION}"

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$INSTALL_STATUS" != "success" ] || [ "$CORE_FAILURES" -gt 0 ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hadoop version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Regression validation deferred because baseline install or core smoke checks failed"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Hadoop version ${CURRENT} passed smoke tests in this run and the official latest stable release is also ${LATEST}, so current stable remains validated on Arm64."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/hadoop-next.tar.gz"
          download_hadoop_tarball() {
            local dest="$1"
            shift
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=2 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=360 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$dest" "${urls[@]}"
          }
          echo "Downloading Hadoop candidate ${LATEST}"
          if ! download_hadoop_tarball "$NEXT_TAR" \
            "https://dlcdn.apache.org/hadoop/common/hadoop-${LATEST}/hadoop-${LATEST}.tar.gz" \
            "https://downloads.apache.org/hadoop/common/hadoop-${LATEST}/hadoop-${LATEST}.tar.gz" \
            "https://archive.apache.org/dist/hadoop/common/hadoop-${LATEST}/hadoop-${LATEST}.tar.gz" \
            "http://archive.apache.org/dist/hadoop/common/hadoop-${LATEST}/hadoop-${LATEST}.tar.gz"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hadoop version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ls -lh "$NEXT_TAR"
          echo "Extracting Hadoop candidate..."
          timeout 15m tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
          NEXT_HOME="$NEXT_DIR/hadoop-${LATEST}"
          echo "export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64" >> "$NEXT_HOME/etc/hadoop/hadoop-env.sh"
          unset HADOOP_HOME HADOOP_PREFIX HADOOP_COMMON_HOME HADOOP_HDFS_HOME YARN_HOME MAPRED_HOME HADOOP_CONF_DIR
          NEXT_REPORTED=$(env -i PATH="/usr/bin:/bin" JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64 HADOOP_HOME="$NEXT_HOME" HADOOP_PREFIX="$NEXT_HOME" "$NEXT_HOME/bin/hadoop" version | awk 'NR==1 {print $2}')
          NEXT_HDFS=$(env -i PATH="/usr/bin:/bin" JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64 HADOOP_HOME="$NEXT_HOME" HADOOP_PREFIX="$NEXT_HOME" "$NEXT_HOME/bin/hdfs" version | awk 'NR==1 {print $2}')

          NEXT_EXAMPLE_JAR=$(find "$NEXT_HOME/share/hadoop/mapreduce" -maxdepth 1 -name 'hadoop-mapreduce-examples-*.jar' | head -n 1)
          if [ "$NEXT_REPORTED" = "$LATEST" ] && [ "$NEXT_HDFS" = "$LATEST" ] && [ -n "$NEXT_EXAMPLE_JAR" ] && [ -f "$NEXT_EXAMPLE_JAR" ]; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hadoop version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and both hadoop and hdfs reported ${NEXT_REPORTED} while the candidate classpath resolved successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Hadoop version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and both hadoop and hdfs reported ${NEXT_REPORTED} while the candidate classpath resolved successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hadoop version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not report the expected version outputs or usable classpath on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Hadoop version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not report the expected version outputs or usable classpath on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Hadoop"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Test 1 - Check hadoop binary exists"
          test2_label: "Test 2 - Check hadoop version output"
          test3_label: "Test 3 - Check hdfs version output"
          test4_label: "Test 4 - Check Hadoop classpath and examples"
          test5_label: "Test 5 - Check native loader output and architecture"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
