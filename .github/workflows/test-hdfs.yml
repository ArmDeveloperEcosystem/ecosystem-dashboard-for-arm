name: Test HDFS on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-hdfs.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-hdfs.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-hdfs.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-hdfs.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-hdfs.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-hdfs.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-hdfs.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-hdfs.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-hdfs.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-hdfs.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-hdfs.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-hdfs.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-hdfs.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-hdfs.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-hdfs.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-hdfs.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-hdfs.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-hdfs.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-hdfs.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-hdfs.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-hdfs.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-hdfs.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-hdfs.outputs.timestamp }}
jobs:
  test-hdfs:
    runs-on: ubuntu-24.04-arm

    env:
      BASELINE_VERSION: "3.3.6"
      NEXT_VERSION: "3.4.3"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'HDFS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=hdfs" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/hdfs" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Hadoop for HDFS baseline
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-11-jdk tar wget curl"
          VERSION="${{ steps.metadata.outputs.current_version }}"
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"

          download_hadoop_tarball() {
            local version="$1"
            local output="$2"
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=900 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "$HELPER" "$output" \
                "https://dlcdn.apache.org/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "https://downloads.apache.org/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "https://archive.apache.org/dist/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "http://archive.apache.org/dist/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz"
          }

          rm -rf hadoop hadoop.tar.gz
          if ! download_hadoop_tarball "$VERSION" hadoop.tar.gz; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! tar -xzf hadoop.tar.gz; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mv "hadoop-${VERSION}" hadoop

          JAVA_HOME=$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "HADOOP_HOME=$PWD/hadoop" >> "$GITHUB_ENV"
          echo "$PWD/hadoop/bin" >> "$GITHUB_PATH"
          echo "$PWD/hadoop/sbin" >> "$GITHUB_PATH"
          sed -i '/^export JAVA_HOME=/d' hadoop/etc/hadoop/hadoop-env.sh
          echo "export JAVA_HOME=$JAVA_HOME" >> hadoop/etc/hadoop/hadoop-env.sh

          cat > hadoop/etc/hadoop/core-site.xml <<EOF
          <configuration>
            <property>
              <name>fs.defaultFS</name>
              <value>hdfs://localhost:9000</value>
            </property>
          </configuration>
          EOF

          if [ -x "hadoop/bin/hdfs" ] && [ -f "hadoop/share/hadoop/hdfs/hadoop-hdfs-${VERSION}.jar" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Get HDFS version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "version=${{ steps.metadata.outputs.current_version }}" >> "$GITHUB_OUTPUT"
            echo "Detected HDFS/Hadoop version: ${{ steps.metadata.outputs.current_version }}"
            exit 0
          fi
          REPORTED=$(hadoop/bin/hdfs version 2>&1 | awk '/^Hadoop / {print $2; exit}')
          if [ -z "$REPORTED" ]; then
            REPORTED="${{ steps.metadata.outputs.current_version }}"
          fi
          echo "version=$REPORTED" >> "$GITHUB_OUTPUT"
          echo "Detected HDFS/Hadoop version: $REPORTED"

      - name: Test 1 - Check hdfs binary exists
        id: test1
        if: ${{ steps.install.outputs.install_status == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -x "hadoop/bin/hdfs" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact hdfs version
        id: test2
        if: ${{ steps.install.outputs.install_status == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(hadoop/bin/hdfs version 2>&1 | awk '/^Hadoop / {print $2; exit}')

          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            hadoop/bin/hdfs version || true
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check HDFS jar layout
        id: test3
        if: ${{ steps.install.outputs.install_status == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_version }}"

          if [ -f "hadoop/share/hadoop/hdfs/hadoop-hdfs-${EXPECTED}.jar" ] \
            && [ -f "hadoop/share/hadoop/hdfs/hadoop-hdfs-client-${EXPECTED}.jar" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -1 hadoop/share/hadoop/hdfs | head -n 30 || true
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check hdfs config and classpath
        id: test4
        if: ${{ steps.install.outputs.install_status == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if hadoop/bin/hdfs getconf -confKey fs.defaultFS >/tmp/hdfs-fs.txt 2>&1 \
            && grep -q 'hdfs://localhost:9000' /tmp/hdfs-fs.txt \
            && [ -n "$(hadoop/bin/hdfs classpath 2>/dev/null)" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/hdfs-fs.txt || true
            hadoop/bin/hdfs classpath || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check namenode help and architecture
        id: test5
        if: ${{ steps.install.outputs.install_status == 'success' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ] \
            && hadoop/bin/hdfs namenode -help 2>&1 | grep -qi 'Usage'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            hadoop/bin/hdfs namenode -help || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="${NEXT_VERSION}"
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"

          download_hadoop_tarball() {
            local version="$1"
            local output="$2"
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=900 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "$HELPER" "$output" \
                "https://dlcdn.apache.org/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "https://downloads.apache.org/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "https://archive.apache.org/dist/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz" \
                "http://archive.apache.org/dist/hadoop/common/hadoop-${version}/hadoop-${version}-aarch64.tar.gz"
          }

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64, and the current stable Hadoop release line remains ${LATEST}."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/hadoop-next.tar.gz"
          if ! download_hadoop_tarball "$LATEST" "$NEXT_TAR"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64, but the official candidate release ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
          NEXT_HOME="$NEXT_DIR/hadoop-${LATEST}"
          sed -i '/^export JAVA_HOME=/d' "$NEXT_HOME/etc/hadoop/hadoop-env.sh"
          echo "export JAVA_HOME=$JAVA_HOME" >> "$NEXT_HOME/etc/hadoop/hadoop-env.sh"
          cat > "$NEXT_HOME/etc/hadoop/core-site.xml" <<EOF
          <configuration>
            <property>
              <name>fs.defaultFS</name>
              <value>hdfs://localhost:9000</value>
            </property>
          </configuration>
          EOF
          NEXT_JAR="$NEXT_HOME/share/hadoop/hdfs/hadoop-hdfs-${LATEST}.jar"
          NEXT_JAR_VERSION="$LATEST"
          if [ ! -f "$NEXT_JAR" ]; then
            NEXT_JAR=$(find "$NEXT_HOME/share/hadoop/hdfs" -maxdepth 1 -name 'hadoop-hdfs-*.jar' | head -n 1 || true)
            NEXT_JAR_VERSION=$(basename "$NEXT_JAR" | sed -E 's/^hadoop-hdfs-(.*)\.jar$/\1/' || true)
          fi
          NEXT_REPORTED=$(HADOOP_HOME="$NEXT_HOME" "$NEXT_HOME/bin/hdfs" version 2>&1 | awk '/^Hadoop / {print $2; exit}' || true)
          if [ -z "$NEXT_REPORTED" ] && [ -n "$NEXT_JAR_VERSION" ]; then
            NEXT_REPORTED="$NEXT_JAR_VERSION"
          fi

          if [ "$NEXT_REPORTED" = "$LATEST" ] \
            && [ "$NEXT_JAR_VERSION" = "$LATEST" ] \
            && HADOOP_HOME="$NEXT_HOME" "$NEXT_HOME/bin/hdfs" getconf -confKey fs.defaultFS >/tmp/hdfs-next-fs.txt 2>&1 \
            && grep -q 'hdfs://localhost:9000' /tmp/hdfs-next-fs.txt \
            && [ -n "$(HADOOP_HOME="$NEXT_HOME" "$NEXT_HOME/bin/hdfs" classpath 2>/dev/null)" ]; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64. Regression validation downloaded the official Hadoop ${LATEST} aarch64 distribution, and the candidate HDFS binary reported version ${NEXT_REPORTED} while exposing the expected HDFS JAR layout, config, and classpath." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64. Regression validation downloaded the official Hadoop ${LATEST} aarch64 distribution, and the candidate HDFS binary reported version ${NEXT_REPORTED} while exposing the expected HDFS JAR layout, config, and classpath."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            HADOOP_HOME="$NEXT_HOME" "$NEXT_HOME/bin/hdfs" version || true
            [ -f /tmp/hdfs-next-fs.txt ] && cat /tmp/hdfs-next-fs.txt || true
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64, but the official candidate release ${LATEST} did not expose the expected HDFS binary, config, and classpath layout on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned HDFS version ${CURRENT} passed the baseline CLI validation on Arm64, but the official candidate release ${LATEST} did not expose the expected HDFS binary, config, and classpath layout on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || '' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Regression validation status unavailable"
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          TEST6_DECISION="${{ steps.test6.outputs.decision || '' }}"

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ] || \
             [ "$TEST6_DECISION" = "baseline_failed" ]; then
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=1" >> "$GITHUB_OUTPUT"
            echo "skipped=5" >> "$GITHUB_OUTPUT"
            echo "core_failed=1" >> "$GITHUB_OUTPUT"
            echo "duration=${{ steps.test6.outputs.duration || 0 }}" >> "$GITHUB_OUTPUT"
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ] || [ -z "$status" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'failed' }}" = "skipped" ]; then
            SKIPPED=$((SKIPPED + 1))
          elif [ "${{ steps.test6.outputs.status || 'failed' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || '' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Regression validation status unavailable"
                ;;
            esac
          fi

          echo "## HDFS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Skipped:** ${{ steps.summary.outputs.skipped || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check hdfs binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check exact hdfs version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check HDFS jar layout: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check hdfs groups and classpath: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check namenode help and architecture: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
