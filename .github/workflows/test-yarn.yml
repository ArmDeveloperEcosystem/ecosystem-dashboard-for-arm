name: Test Yarn on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-yarn.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-yarn.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-yarn.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-yarn.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-yarn.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-yarn.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-yarn.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-yarn.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-yarn.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-yarn.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-yarn.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-yarn.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-yarn.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-yarn.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-yarn.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-yarn.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-yarn.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-yarn.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-yarn.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-yarn.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-yarn.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-yarn.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-yarn.outputs.timestamp }}
jobs:
  test-yarn:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "4.9.0"
      CANDIDATE_VERSION: "4.9.1"
      NODE_VERSION: "20"
      WORKROOT: "/tmp/yarn-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Yarn'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=yarn" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/yarn" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Yarn baseline
        id: install
        run: |
          set -euo pipefail
          rm -rf "${WORKROOT}"
          mkdir -p "${WORKROOT}"
          corepack enable
          corepack prepare "yarn@${BASELINE_VERSION}" --activate
          hash -r || true

          sudo tee /usr/local/bin/yarn-arm >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if command -v yarn >/dev/null 2>&1; then
            exec yarn "$@"
          fi
          exec corepack yarn "$@"
          EOF
          sudo chmod +x /usr/local/bin/yarn-arm

          command -v node >/dev/null 2>&1
          command -v corepack >/dev/null 2>&1
          command -v yarn-arm >/dev/null 2>&1
          yarn-arm --version | tee /tmp/yarn-baseline-version.log
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Yarn version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(yarn-arm --version | head -1)
          LATEST="${CANDIDATE_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Launcher availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v node >/dev/null 2>&1 && command -v corepack >/dev/null 2>&1 && command -v yarn-arm >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION=$(yarn-arm --version | head -1)
          if [ "${VERSION}" = "${BASELINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${BASELINE_VERSION}, got ${VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help output validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          yarn-arm --help 2>&1 | tee /tmp/yarn-help.log
          if grep -Eqi 'usage|help|commands' /tmp/yarn-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PROJECT_DIR="${WORKROOT}/current"
          rm -rf "${PROJECT_DIR}"
          mkdir -p "${PROJECT_DIR}"
          cd "${PROJECT_DIR}"
          printf '{"name":"arm-yarn-current","packageManager":"yarn@%s"}\n' "${BASELINE_VERSION}" > package.json
          yarn-arm add is-number 2>&1 | tee /tmp/yarn-current-add.log
          yarn-arm info is-number version >/tmp/yarn-current-info.log 2>&1 || true
          if [ -f yarn.lock ] && \
             grep -Fq '"is-number"' package.json && \
             grep -Fq 'is-number' yarn.lock && \
             ( [ -d node_modules/is-number ] || [ -f .pnp.cjs ] || [ -f .yarn/install-state.gz ] ); then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/yarn-current-add.log || true
            cat /tmp/yarn-current-info.log || true
            ls -la . || true
            find . -maxdepth 2 \( -name 'is-number' -o -name '.pnp.cjs' -o -name 'install-state.gz' \) -print || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Yarn Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Launcher availability: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Help output validation: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'failed' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
