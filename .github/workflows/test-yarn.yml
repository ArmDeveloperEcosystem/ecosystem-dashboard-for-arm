name: Test Yarn on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/yarn.md"
      - ".github/workflows/test-yarn.yml"

jobs:
  test-yarn:
    runs-on: ubuntu-24.04-arm
    env:
      YARN_VERSION: "4.9.0"
      YARN_NEXT_VERSION: "4.9.1"
      NODE_VERSION: "20"
      YARN_WORKROOT: "/tmp/yarn-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=yarn" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/yarn" >> "$GITHUB_OUTPUT"
          echo "current_version=${YARN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Yarn baseline
        id: install
        run: |
          set -euo pipefail
          rm -rf "${YARN_WORKROOT}"
          mkdir -p "${YARN_WORKROOT}"
          corepack enable
          corepack prepare "yarn@${YARN_VERSION}" --activate
          hash -r || true

          sudo tee /usr/local/bin/yarn-arm >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if command -v yarn >/dev/null 2>&1; then
            exec yarn "$@"
          fi
          exec corepack yarn "$@"
          EOF
          sudo chmod +x /usr/local/bin/yarn-arm

          command -v node >/dev/null 2>&1
          command -v corepack >/dev/null 2>&1
          command -v yarn-arm >/dev/null 2>&1
          yarn-arm --version | tee /tmp/yarn-baseline-version.log
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Yarn version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(yarn-arm --version | head -1)
          LATEST="${YARN_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Launcher availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v node >/dev/null 2>&1 && command -v corepack >/dev/null 2>&1 && command -v yarn-arm >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION=$(yarn-arm --version | head -1)
          if [ "${VERSION}" = "${YARN_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${YARN_VERSION}, got ${VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help output validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          yarn-arm --help 2>&1 | tee /tmp/yarn-help.log
          if grep -Eqi 'usage|help|commands' /tmp/yarn-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PROJECT_DIR="${YARN_WORKROOT}/current"
          rm -rf "${PROJECT_DIR}"
          mkdir -p "${PROJECT_DIR}"
          cd "${PROJECT_DIR}"
          printf '{"name":"arm-yarn-current","packageManager":"yarn@%s"}\n' "${YARN_VERSION}" > package.json
          yarn-arm add is-number 2>&1 | tee /tmp/yarn-current-add.log
          yarn-arm info is-number version >/tmp/yarn-current-info.log 2>&1 || true
          if [ -f yarn.lock ] && \
             grep -Fq '"is-number"' package.json && \
             grep -Fq 'is-number' yarn.lock && \
             ( [ -d node_modules/is-number ] || [ -f .pnp.cjs ] || [ -f .yarn/install-state.gz ] ); then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/yarn-current-add.log || true
            cat /tmp/yarn-current-info.log || true
            ls -la . || true
            find . -maxdepth 2 \( -name 'is-number' -o -name '.pnp.cjs' -o -name 'install-state.gz' \) -print || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions"
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
            if job.get("name") in (f"{job_id} / {job_id}", job_id):
              print(job.get("html_url", ""))
              break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/yarn.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Yarn",
              "version": "${{ steps.version.outputs.version }}",
              "language": "JavaScript",
              "category": "Package manager"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Launcher availability", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Exact version check", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Help output validation", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yarn-test-results
          path: test-results/yarn.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Yarn Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Launcher availability: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Help output validation: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'failed' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
