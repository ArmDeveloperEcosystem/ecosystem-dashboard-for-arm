name: Test Percona Server for MYSQL on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/percona.md"
      - ".github/workflows/test-percona.yml"

jobs:
  test-percona:
    runs-on: ubuntu-24.04-arm
    env:
      PERCONA_IMAGE: percona/percona-server:8.0.45-36
      PERCONA_LATEST_IMAGE: percona/percona-server:8.4.8-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=percona" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/percona" >> "$GITHUB_OUTPUT"
      - name: Install Percona Server for MYSQL
        id: install
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl jq
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || true
          sudo docker version >/tmp/percona-docker-version.txt 2>&1 || true
          sudo docker pull "$PERCONA_IMAGE"

          sudo tee /usr/local/bin/percona >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          IMAGE="percona/percona-server:8.0.45-36"
          case "${1:-}" in
            version|--version|-V)
              shift || true
              exec sudo docker run --rm --entrypoint /usr/sbin/mysqld "$IMAGE" --version "$@"
              ;;
            help|--help|-h)
              shift || true
              exec sudo docker run --rm --entrypoint /usr/sbin/mysqld "$IMAGE" --verbose --help "$@"
              ;;
            *)
              exec sudo docker run --rm "$IMAGE" "$@"
              ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/percona

          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Percona version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(percona --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+(\.[0-9]+)?' | head -1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Percona version: $VERSION"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v percona >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(percona --version 2>&1)
          echo "$OUTPUT"
          if printf '%s\n' "$OUTPUT" | grep -q '8.0.45-36'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if percona --help >/tmp/percona-help.txt 2>&1 && grep -qiE 'Default options|mysqld' /tmp/percona-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/percona-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CID=""
          QUERY_OK=0
          cleanup() {
            if [ -n "$CID" ]; then
              sudo docker rm -f "$CID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          CID=$(sudo docker run -d --rm -e MYSQL_ROOT_PASSWORD=arm64pass -e MYSQL_DATABASE=smoketest -p 3307:3306 "$PERCONA_IMAGE")

          for _ in $(seq 1 90); do
            if sudo docker exec "$CID" mysqladmin -uroot -parm64pass ping --silent >/tmp/percona-ping.txt 2>/dev/null; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 20); do
            if sudo docker exec "$CID" sh -lc 'mysql -h127.0.0.1 -uroot -parm64pass -e "select version();"' >/tmp/percona-query.txt 2>&1; then
              QUERY_OK=1
              break
            fi
            sleep 2
          done

          if [ "$QUERY_OK" -eq 1 ] && grep -q '8\.0' /tmp/percona-query.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/percona-query.txt || true
            sudo docker logs "$CID" | tail -80 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="8.0.45-36"
          TARGET="8.4.8-8"
          QUERY_OK=0
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${TARGET}" >> "$GITHUB_OUTPUT"

          sudo docker pull "$PERCONA_LATEST_IMAGE" >/tmp/percona-next-pull.txt 2>&1
          NEXT_VERSION=$(sudo docker run --rm --entrypoint /usr/sbin/mysqld "$PERCONA_LATEST_IMAGE" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+(\.[0-9]+)?' | head -1 || true)

          CID=""
          cleanup() {
            if [ -n "$CID" ]; then
              sudo docker rm -f "$CID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          CID=$(sudo docker run -d --rm -e MYSQL_ROOT_PASSWORD=arm64pass -e MYSQL_DATABASE=regression -p 3308:3306 "$PERCONA_LATEST_IMAGE")

          for _ in $(seq 1 90); do
            if sudo docker exec "$CID" mysqladmin -uroot -parm64pass ping --silent >/tmp/percona-next-ping.txt 2>/dev/null; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 20); do
            if sudo docker exec "$CID" sh -lc 'mysql -h127.0.0.1 -uroot -parm64pass -e "select version();"' >/tmp/percona-next-query.txt 2>&1; then
              QUERY_OK=1
              break
            fi
            sleep 2
          done

          if [ "$QUERY_OK" -eq 1 ] && \
             [ "$NEXT_VERSION" = "$TARGET" ] && \
             grep -q '8\.4' /tmp/percona-next-query.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Percona Server version ${CURRENT} passed smoke tests in this run. Regression validation pulled candidate image ${TARGET} on Arm64, the candidate server binary reported ${NEXT_VERSION}, and a real MySQL query completed successfully from the running candidate container." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/percona-next-query.txt || true
            sudo docker logs "$CID" | tail -80 || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Percona Server version ${CURRENT} passed smoke tests in this run, but the candidate image ${TARGET} did not report the expected version or complete a usable server query on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/percona.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Percona Server for MYSQL",
              "version": "${{ steps.version.outputs.version }}",
              "language": "SQL",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check Version Output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check Help Output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: percona-test-results
          path: test-results/percona.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Percona Server for MYSQL Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
