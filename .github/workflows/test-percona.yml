name: Test Percona Server for MYSQL on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-percona.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-percona.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-percona.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-percona.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-percona.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-percona.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-percona.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-percona.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-percona.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-percona.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-percona.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-percona.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-percona.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-percona.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-percona.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-percona.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-percona.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-percona.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-percona.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-percona.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-percona.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-percona.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-percona.outputs.timestamp }}
jobs:
  test-percona:
    runs-on: ubuntu-24.04-arm
    env:
      PERCONA_IMAGE: percona/percona-server:8.0.45-36
      PERCONA_LATEST_IMAGE: percona/percona-server:8.4.8-8

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Percona Server for MYSQL'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=percona" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/percona" >> "$GITHUB_OUTPUT"
      - name: Install Percona Server for MYSQL
        id: install
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl jq
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || true
          sudo docker version >/tmp/percona-docker-version.txt 2>&1 || true
          sudo docker pull "$PERCONA_IMAGE"

          sudo tee /usr/local/bin/percona >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          IMAGE="percona/percona-server:8.0.45-36"
          case "${1:-}" in
            version|--version|-V)
              shift || true
              exec sudo docker run --rm --entrypoint /usr/sbin/mysqld "$IMAGE" --version "$@"
              ;;
            help|--help|-h)
              shift || true
              exec sudo docker run --rm --entrypoint /usr/sbin/mysqld "$IMAGE" --verbose --help "$@"
              ;;
            *)
              exec sudo docker run --rm "$IMAGE" "$@"
              ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/percona

          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Percona version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(percona --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+(\.[0-9]+)?' | head -1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Percona version: $VERSION"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v percona >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(percona --version 2>&1)
          echo "$OUTPUT"
          if printf '%s\n' "$OUTPUT" | grep -q '8.0.45-36'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if percona --help >/tmp/percona-help.txt 2>&1 && grep -qiE 'Default options|mysqld' /tmp/percona-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/percona-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CID=""
          QUERY_OK=0
          cleanup() {
            if [ -n "$CID" ]; then
              sudo docker rm -f "$CID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          CID=$(sudo docker run -d --rm -e MYSQL_ROOT_PASSWORD=arm64pass -e MYSQL_DATABASE=smoketest -p 3307:3306 "$PERCONA_IMAGE")

          for _ in $(seq 1 90); do
            if sudo docker exec "$CID" mysqladmin -uroot -parm64pass ping --silent >/tmp/percona-ping.txt 2>/dev/null; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 20); do
            if sudo docker exec "$CID" sh -lc 'mysql -h127.0.0.1 -uroot -parm64pass -e "select version();"' >/tmp/percona-query.txt 2>&1; then
              QUERY_OK=1
              break
            fi
            sleep 2
          done

          if [ "$QUERY_OK" -eq 1 ] && grep -q '8\.0' /tmp/percona-query.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/percona-query.txt || true
            sudo docker logs "$CID" | tail -80 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Percona Server for MYSQL Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression applicability: package-manager installed (not applicable)"
            echo ""

          } >> "$GITHUB_STEP_SUMMARY"
