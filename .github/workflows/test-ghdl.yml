name: Test GHDL on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ghdl.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ghdl.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ghdl.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ghdl.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ghdl.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ghdl.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ghdl.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ghdl.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ghdl.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ghdl.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ghdl.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ghdl.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ghdl.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ghdl.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ghdl.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ghdl.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ghdl.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ghdl.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-ghdl.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ghdl.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ghdl.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ghdl.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ghdl.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ghdl.outputs.timestamp }}

jobs:
  test-ghdl:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "0.37+dfsg-1ubuntu1"
      PACKAGE_SLUG: "ghdl"
      LANE_KIND: "github release / source-build-or-tarball"
      DOWNLOAD_URL: "https://github.com/ghdl/ghdl/tags"
      HOMEPAGE_URL: "https://ghdl.github.io/ghdl/about.html#what-is-ghdl"
      OFFICIAL_DOCS: "https://ghdl.github.io/ghdl/getting.html"
      GITHUB_REPO: "ghdl/ghdl"
      PACKAGE_PAGE: "content/linux/opensource_packages/ghdl.md"
      SOURCE_GLOBS: "src|libraries|testsuite|configure|README*"
      EVIDENCE_RE: "GHDL|VHDL|simulator|synthesizer"
      TEST5_MODE: "source"
      PYTHON_TARGETS: ""

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'GHDL'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          {
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "package_slug=ghdl"
            echo "dashboard_link=/linux/opensource_packages/ghdl"
          } >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          set -euo pipefail
          emit_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              emit_output "resolved_tag" "$RESOLVED_TAG"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              emit_output "resolved_tag" "default_branch"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              emit_output "install_mode" "github_source"
              emit_output "install_status" "success"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            emit_output "resolved_tag" "external_artifact"
            emit_output "install_mode" "external_artifact"
            emit_output "install_status" "success"
            exit 0
          fi
          emit_output "install_mode" "unresolved"
          emit_output "install_status" "failed"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ ! -f "$PACKAGE_PAGE" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            FOUND=0
            IFS='|' read -r -a PATTERNS <<< "$SOURCE_GLOBS"
            for PATTERN in "${PATTERNS[@]}"; do
              [ -z "$PATTERN" ] && continue
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                FOUND=1
                break
              fi
            done
            if [ "$FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline version and release alignment
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if ! grep -Fq "version_number: $BASELINE_VERSION" "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            RESOLVED="${{ steps.install.outputs.resolved_tag || '' }}"
            if [ -z "$RESOLVED" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [ "$RESOLVED" != "default_branch" ] && [ "$RESOLVED" != "$BASELINE_VERSION" ] && [ "$RESOLVED" != "v$BASELINE_VERSION" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ] || ! grep -Fq "$DOWNLOAD_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Package-specific source or docs evidence
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" = "github_source" ]; then
            if ! grep -R -I -Eiq "$EVIDENCE_RE" baseline-src 2>/dev/null; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            DOC_FOUND=0
            for PATTERN in README* docs examples; do
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                DOC_FOUND=1
                break
              fi
            done
            if [ "$DOC_FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if ! grep -Eiq "$EVIDENCE_RE" "$PACKAGE_PAGE"; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if ! grep -Fq "$HOMEPAGE_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 support gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ghdl
          ghdl --version | head -20
          cat > smoke.vhdl <<'EOF'
          entity smoke is
          end entity;

          architecture rtl of smoke is
          begin
            process
            begin
              assert 1 + 1 = 2 report "arithmetic failed" severity failure;
              report "ghdl smoke passed";
              wait;
            end process;
          end architecture;
          EOF
          ghdl -a --std=08 smoke.vhdl
          ghdl -e --std=08 smoke
          ghdl -r --std=08 smoke --assert-level=error
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Installed ghdl from Ubuntu packages and analyzed, elaborated, and ran a tiny VHDL design." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
          {
            echo "current_version=$CURRENT"
            echo "latest_version=not_applicable"
            echo "next_installed_version=not_applicable"
            echo "decision=not_applicable_package_manager"
            echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5"
            echo "comparison=Tests 1-5 install and execute the Ubuntu Arm ghdl package. Test 6 is intentionally skipped because this workflow does not add non-Ubuntu package repositories or build newer GHDL toolchains, so it cannot honestly compare a newer package-manager candidate on a generic Ubuntu Arm runner."
            echo "status=skipped"
          } >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      - name: Calculate test summary
        id: summary
        if: always()
        uses: ./.github/actions/emit-package-result
        with:
          package_slug: ${{ steps.metadata.outputs.package_slug || 'ghdl' }}
          package_name: GHDL
          version: ${{ steps.version.outputs.version || 'unknown' }}
          install_status: ${{ steps.install.outputs.install_status || 'failed' }}
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
