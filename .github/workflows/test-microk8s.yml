name: Test MicroK8s on Arm64
on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-microk8s.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-microk8s.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-microk8s.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-microk8s.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-microk8s.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-microk8s.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-microk8s.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-microk8s.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-microk8s.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-microk8s.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-microk8s.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-microk8s.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-microk8s.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-microk8s.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-microk8s.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-microk8s.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-microk8s.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-microk8s.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-microk8s.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-microk8s.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-microk8s.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-microk8s.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-microk8s.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/microk8s.md'
      - '.github/workflows/test-microk8s.yml'
jobs:
  test-microk8s:
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'MicroK8s'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=microk8s" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/microk8s" >> "$GITHUB_OUTPUT"
      - name: Install MicroK8s
        id: install
        run: |
          set -euo pipefail
          echo "Installing MicroK8s..."
          
          # Ensure snapd is running
          sudo systemctl start snapd || echo "snapd already running or not available"
          
          # Install via snap with retries
          MAX_RETRIES=3
          COUNT=0
          SUCCESS=false
          
          while [ $COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((COUNT + 1)) to install MicroK8s..."
            if sudo snap install microk8s --classic; then
              SUCCESS=true
              break
            fi
            COUNT=$((COUNT + 1))
            echo "Installation failed, retrying in 10 seconds..."
            sleep 10
          done
          
          if [ "$SUCCESS" = true ]; then
            echo "MicroK8s installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
            
            # Add user to microk8s group
            sudo usermod -a -G microk8s $USER
            sudo chown -f -R $USER ~/.kube || true
            sudo microk8s status --wait-ready --timeout 300 >/tmp/microk8s-status-install.txt 2>&1 || true
            sudo snap services microk8s || true
          else
            echo "MicroK8s installation failed after $MAX_RETRIES attempts"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get MicroK8s version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(snap list microk8s 2>/dev/null | awk 'NR==2 {print $2; exit}')
          if [ -z "${VERSION:-}" ] || [ "$VERSION" = "Version" ]; then
            VERSION=$(sudo snap info microk8s 2>/dev/null | awk -F': ' '/^installed:/ {print $2; exit}' | awk '{print $1}')
          fi
          if [ -z "${VERSION:-}" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected MicroK8s version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check microk8s binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v microk8s &> /dev/null; then
            echo "✓ microk8s binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ microk8s binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check status command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          STATUS_OUTPUT=$(sudo microk8s status --wait-ready --timeout 300 2>&1 || sudo microk8s status 2>&1 || true)
          if printf '%s\n' "$STATUS_OUTPUT" | grep -Eqi "microk8s is running|high-availability|datastore master nodes|addons:"; then
            echo "✓ status command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ status command failed"
            printf '%s\n' "$STATUS_OUTPUT"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check kubectl command
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          KUBECTL_OUTPUT=$(sudo microk8s kubectl get --raw=/version 2>&1 || true)
          if printf '%s\n' "$KUBECTL_OUTPUT" | grep -q '"gitVersion"'; then
             echo "✓ kubectl command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ kubectl command failed"
             printf '%s\n' "$KUBECTL_OUTPUT"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check inspect command
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          INSPECT_OUTPUT=$(sudo microk8s inspect 2>&1 || true)
          if printf '%s\n' "$INSPECT_OUTPUT" | grep -Eqi "Inspecting|inspection-report|tarball"; then
             echo "✓ inspect command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ inspect command failed"
             printf '%s\n' "$INSPECT_OUTPUT"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Check services and architecture
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          SERVICES_OUTPUT=$(sudo snap services microk8s 2>&1 || true)
          
          if ! printf '%s\n' "$SERVICES_OUTPUT" | grep -Eq 'microk8s|daemon-kubelite'; then
            printf '%s\n' "$SERVICES_OUTPUT"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "status=passed" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check microk8s binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check status command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check kubectl command
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check inspect command
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Check start/stop commands (dry run)
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## MicroK8s Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check microk8s binary: ${{ steps.test1.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check status command: ${{ steps.test2.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check kubectl command: ${{ steps.test3.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check inspect command: ${{ steps.test4.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Check start/stop commands (dry run): ${{ steps.test5.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY

