name: Test K3os on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/k3os.md"
      - ".github/workflows/test-k3os.yml"

jobs:
  test-k3os:
    runs-on: ubuntu-24.04-arm
    env:
      K3OS_RELEASE: "v0.21.5-k3s2r1"
      K3OS_VERSION: "0.21.5-k3s2r1"
      K3OS_DIR: /tmp/k3os-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=k3os" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/k3os" >> "$GITHUB_OUTPUT"

      - name: Install K3os release artifacts
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl file qemu-system-arm
          rm -rf "${K3OS_DIR}"
          mkdir -p "${K3OS_DIR}"
          cd "${K3OS_DIR}"
          curl -fsSL "https://api.github.com/repos/rancher/k3os/releases/tags/${K3OS_RELEASE}" -o release.json
          curl -fsSLO "https://github.com/rancher/k3os/releases/download/${K3OS_RELEASE}/k3os-vmlinuz-arm64"
          curl -fsSLO "https://github.com/rancher/k3os/releases/download/${K3OS_RELEASE}/k3os-initrd-arm64"
          curl -fsSLO "https://github.com/rancher/k3os/releases/download/${K3OS_RELEASE}/k3os-rootfs-arm64.tar.gz"
          curl -fsSLO "https://github.com/rancher/k3os/releases/download/${K3OS_RELEASE}/sha256sum-arm64.txt"
          if [ -s release.json ] && [ -s k3os-vmlinuz-arm64 ] && [ -s k3os-initrd-arm64 ] && [ -s k3os-rootfs-arm64.tar.gz ] && [ -s sha256sum-arm64.txt ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get K3os version
        id: version
        run: |
          set -euo pipefail
          echo "version=${K3OS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Arm64 Release Artifacts Exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${K3OS_DIR}"
          if [ -s release.json ] && [ -s k3os-vmlinuz-arm64 ] && [ -s k3os-initrd-arm64 ] && [ -s k3os-rootfs-arm64.tar.gz ] && [ -s sha256sum-arm64.txt ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Release Version Mapping
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${K3OS_DIR}"
          TAG=$(python3 -c 'import json; print(json.load(open("release.json")).get("tag_name", ""))')
          if [ "${TAG}" = "${K3OS_RELEASE}" ] && grep -Fq "k3os-vmlinuz-arm64" sha256sum-arm64.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Artifact Inspection Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${K3OS_DIR}"
          FILE_OUTPUT=$(file k3os-vmlinuz-arm64 k3os-initrd-arm64)
          ROOTFS_OUTPUT=$(tar -tzf k3os-rootfs-arm64.tar.gz | sed -n '1,20p')
          if printf '%s\n' "${FILE_OUTPUT}" | grep -q "compressed data" && printf '%s\n' "${ROOTFS_OUTPUT}" | grep -Eq '(^|/)bin/|(^|/)etc/'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${FILE_OUTPUT}"
            printf '%s\n' "${ROOTFS_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${K3OS_DIR}"
          timeout 25s qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a72 \
            -m 2048 \
            -nographic \
            -kernel k3os-vmlinuz-arm64 \
            -initrd k3os-initrd-arm64 \
            -append "console=ttyAMA0" \
            2>&1 | tee /tmp/k3os-qemu.log || true
          if grep -Eq "Linux version|Kernel command line|Run /init as init process|Freeing initrd memory" /tmp/k3os-qemu.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          LATEST_TAG=$(curl -fsSL "https://api.github.com/repos/rancher/k3os/releases/latest" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name", "not_yet_checked"))' 2>/dev/null || echo "not_yet_checked")
          LATEST_VERSION="${LATEST_TAG#v}"
          if [ "${LATEST_TAG}" = "${K3OS_RELEASE}" ]; then
            DECISION="pinned_is_latest"
            COMPARISON="Current pinned K3os release ${K3OS_RELEASE} was smoke-tested in this run and it already matches the latest stable upstream release."
          else
            DECISION="hold_current_until_regression_run"
            COMPARISON="Current pinned K3os release ${K3OS_RELEASE} was smoke-tested in this run. A newer upstream candidate ${LATEST_TAG} exists but was not automatically boot-tested in this run, so the version should stay pinned until an explicit regression comparison is completed."
          fi
          echo "current_version=${K3OS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/k3os.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "K3os",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Linux",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Arm64 Release Artifacts Exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Release Version Mapping", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Artifact Inspection Output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k3os-test-results
          path: test-results/k3os.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## K3os Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current pinned version:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest stable candidate:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Comparison:** ${{ steps.test6.outputs.comparison || 'Current pinned version was smoke-tested in this run.' }}" >> "$GITHUB_STEP_SUMMARY"
