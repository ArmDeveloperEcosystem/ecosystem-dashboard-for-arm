name: Test Alfresco on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-alfresco.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-alfresco.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-alfresco.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-alfresco.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-alfresco.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-alfresco.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-alfresco.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-alfresco.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-alfresco.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-alfresco.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-alfresco.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-alfresco.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-alfresco.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-alfresco.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-alfresco.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-alfresco.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-alfresco.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-alfresco.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-alfresco.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-alfresco.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-alfresco.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-alfresco.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-alfresco.outputs.timestamp }}
jobs:
  test-alfresco:
    runs-on: ubuntu-24.04-arm
    env:
      ALFRESCO_BASELINE_VERSION: "25.2.0"
      ALFRESCO_NEXT_VERSION: "25.3.0"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Alfresco'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=alfresco" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/alfresco" >> "$GITHUB_OUTPUT"
          echo "alfresco_tag=${ALFRESCO_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Alfresco (Docker)
        id: install
        run: |
          echo "Installing Alfresco via Docker..."
          
          # Install Docker if not present (usually present on runners)
          if ! command -v docker &> /dev/null; then
            echo "Docker not found, installing..."
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          
          # Pull the Alfresco Content Repository image (stable GA, multi-arch)
          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          if sudo docker pull alfresco/alfresco-content-repository-community:${ALFRESCO_TAG}; then
            echo "Alfresco image pulled successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Alfresco image pull failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Alfresco version
        id: version
        run: |
          VERSION="${ALFRESCO_BASELINE_VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Alfresco version: $VERSION"
      
      - name: Test 1 - Check Docker image exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if sudo docker images | grep -q "alfresco/alfresco-content-repository-community"; then
            echo "✓ Docker image found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Docker image not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Inspect Image Architecture (Verify Arm64 Support)
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          # This test verifies if the pulled image explicitly supports Arm64.
          ARCH=$(sudo docker inspect --format='{{.Architecture}}' alfresco/alfresco-content-repository-community:${ALFRESCO_TAG})
          if echo "$ARCH" | grep -qE "arm64|aarch64"; then
            echo "✓ Image architecture is $ARCH"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "arch_supported=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Image architecture is $ARCH (expected arm64/aarch64)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            echo "arch_supported=false" >> $GITHUB_OUTPUT
            # Hard fail: image is not arm64, so this package is not OK on Arm
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Image Labels/Env
        id: test3
        continue-on-error: true
        if: steps.test2.outputs.arch_supported == 'true'
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          # Check for a known environment variable or label in the image
          if sudo docker inspect alfresco/alfresco-content-repository-community:${ALFRESCO_TAG} | grep -q "JAVA_HOME"; then
            echo "✓ Image configuration verified (JAVA_HOME found)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Image configuration verification failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Dry Run Container Start
        id: test4
        continue-on-error: true
        if: steps.test2.outputs.arch_supported == 'true'
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"

          # Run a very light command inside the container and check exit code.
          # This verifies that the image can actually run on arm64, without
          # doing a full repository startup.
          if sudo docker run --rm \
               --entrypoint sh \
               alfresco/alfresco-content-repository-community:${ALFRESCO_TAG} \
               -c "echo 'Alfresco Entrypoint Check'; uname -m"; then
             echo "✓ Container started and basic commands ran successfully"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Container failed to start or run basic commands"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${ALFRESCO_BASELINE_VERSION}"
          NEXT_VERSION="${ALFRESCO_NEXT_VERSION}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          if sudo docker pull alfresco/alfresco-content-repository-community:${NEXT_VERSION}; then
            CANDIDATE_ARCH=$(sudo docker inspect --format='{{.Architecture}}' alfresco/alfresco-content-repository-community:${NEXT_VERSION})
            if ! echo "$CANDIDATE_ARCH" | grep -qE "arm64|aarch64"; then
              RESULT="candidate_image_not_arm64"
              DETAILS="Candidate image architecture ${CANDIDATE_ARCH} is not Arm64"
              echo "status=failed" >> $GITHUB_OUTPUT
            elif sudo docker run --rm --entrypoint sh alfresco/alfresco-content-repository-community:${NEXT_VERSION} -c "echo candidate-ok && uname -m"; then
              RESULT="next_install_validated"
              DETAILS="Candidate Alfresco ${NEXT_VERSION} pulled and ran successfully on Arm64"
              echo "status=passed" >> $GITHUB_OUTPUT
            else
              RESULT="candidate_runtime_failed"
              DETAILS="Candidate Alfresco ${NEXT_VERSION} image pulled but failed a basic runtime check"
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          else
            RESULT="candidate_pull_failed"
            DETAILS="Failed to pull candidate Alfresco image ${NEXT_VERSION}"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "result=${RESULT}" >> $GITHUB_OUTPUT
          echo "details=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'n/a' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.next_version || 'n/a' }}"
          echo "Regression install result: ${{ steps.test6.outputs.result || 'n/a' }}"
          echo "Details: ${{ steps.test6.outputs.details || 'n/a' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          # Check Docker image exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Inspect Image Architecture (Verify Arm64 Support)
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check Image Labels/Env
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Dry Run Container Start
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Alfresco Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Docker image exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Inspect Image Architecture (Verify Arm64 Support): ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Image Labels/Env: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Dry Run Container Start: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version:** ${{ steps.test6.outputs.next_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.details || 'n/a' }}" >> $GITHUB_STEP_SUMMARY

