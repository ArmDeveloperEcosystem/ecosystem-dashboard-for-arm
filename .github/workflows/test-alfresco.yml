name: Test Alfresco on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/alfresco.md'
      - '.github/workflows/test-alfresco.yml'

jobs:
  test-alfresco:
    runs-on: ubuntu-24.04-arm
    env:
      ALFRESCO_BASELINE_VERSION: "25.2.0"
      ALFRESCO_NEXT_VERSION: "25.3.0"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=alfresco" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/alfresco" >> "$GITHUB_OUTPUT"
          echo "alfresco_tag=${ALFRESCO_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Alfresco (Docker)
        id: install
        run: |
          echo "Installing Alfresco via Docker..."
          
          # Install Docker if not present (usually present on runners)
          if ! command -v docker &> /dev/null; then
            echo "Docker not found, installing..."
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          
          # Pull the Alfresco Content Repository image (stable GA, multi-arch)
          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          if sudo docker pull alfresco/alfresco-content-repository-community:${ALFRESCO_TAG}; then
            echo "Alfresco image pulled successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Alfresco image pull failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Alfresco version
        id: version
        run: |
          VERSION="${ALFRESCO_BASELINE_VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Alfresco version: $VERSION"
      
      - name: Test 1 - Check Docker image exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if sudo docker images | grep -q "alfresco/alfresco-content-repository-community"; then
            echo "✓ Docker image found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Docker image not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Inspect Image Architecture (Verify Arm64 Support)
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          # This test verifies if the pulled image explicitly supports Arm64.
          ARCH=$(sudo docker inspect --format='{{.Architecture}}' alfresco/alfresco-content-repository-community:${ALFRESCO_TAG})
          if echo "$ARCH" | grep -qE "arm64|aarch64"; then
            echo "✓ Image architecture is $ARCH"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "arch_supported=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Image architecture is $ARCH (expected arm64/aarch64)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            echo "arch_supported=false" >> $GITHUB_OUTPUT
            # Hard fail: image is not arm64, so this package is not OK on Arm
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Image Labels/Env
        id: test3
        continue-on-error: true
        if: steps.test2.outputs.arch_supported == 'true'
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"
          
          # Check for a known environment variable or label in the image
          if sudo docker inspect alfresco/alfresco-content-repository-community:${ALFRESCO_TAG} | grep -q "JAVA_HOME"; then
            echo "✓ Image configuration verified (JAVA_HOME found)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Image configuration verification failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Dry Run Container Start
        id: test4
        continue-on-error: true
        if: steps.test2.outputs.arch_supported == 'true'
        run: |
          START_TIME=$(date +%s)

          ALFRESCO_TAG="${{ steps.metadata.outputs.alfresco_tag }}"

          # Run a very light command inside the container and check exit code.
          # This verifies that the image can actually run on arm64, without
          # doing a full repository startup.
          if sudo docker run --rm \
               --entrypoint sh \
               alfresco/alfresco-content-repository-community:${ALFRESCO_TAG} \
               -c "echo 'Alfresco Entrypoint Check'; uname -m"; then
             echo "✓ Container started and basic commands ran successfully"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Container failed to start or run basic commands"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${ALFRESCO_BASELINE_VERSION}"
          NEXT_VERSION="${ALFRESCO_NEXT_VERSION}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          if sudo docker pull alfresco/alfresco-content-repository-community:${NEXT_VERSION}; then
            CANDIDATE_ARCH=$(sudo docker inspect --format='{{.Architecture}}' alfresco/alfresco-content-repository-community:${NEXT_VERSION})
            if ! echo "$CANDIDATE_ARCH" | grep -qE "arm64|aarch64"; then
              RESULT="candidate_image_not_arm64"
              DETAILS="Candidate image architecture ${CANDIDATE_ARCH} is not Arm64"
              echo "status=failed" >> $GITHUB_OUTPUT
            elif sudo docker run --rm --entrypoint sh alfresco/alfresco-content-repository-community:${NEXT_VERSION} -c "echo candidate-ok && uname -m"; then
              RESULT="next_install_validated"
              DETAILS="Candidate Alfresco ${NEXT_VERSION} pulled and ran successfully on Arm64"
              echo "status=passed" >> $GITHUB_OUTPUT
            else
              RESULT="candidate_runtime_failed"
              DETAILS="Candidate Alfresco ${NEXT_VERSION} image pulled but failed a basic runtime check"
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          else
            RESULT="candidate_pull_failed"
            DETAILS="Failed to pull candidate Alfresco image ${NEXT_VERSION}"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "result=${RESULT}" >> $GITHUB_OUTPUT
          echo "details=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'n/a' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.next_version || 'n/a' }}"
          echo "Regression install result: ${{ steps.test6.outputs.result || 'n/a' }}"
          echo "Details: ${{ steps.test6.outputs.details || 'n/a' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          # Check Docker image exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Inspect Image Architecture (Verify Arm64 Support)
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check Image Labels/Env
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Dry Run Container Start
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          # Fetch the direct job URL for deep-linking
          JOB_ID="${{ github.job }}"
          # Using GH_TOKEN to find the exact job URL. 
          # Reusable workflows are often named "JobID / JobID" or just "JobID"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          
          # Fallback if URL calculation fails
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results
          
          cat > test-results/alfresco.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Alfresco Content Services",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Content mgmt platforms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Docker image exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Inspect Image Architecture (Verify Arm64 Support)",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Image Labels/Env",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Dry Run Container Start",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "regression": {
                "current_version": "${{ steps.test6.outputs.current_version || '' }}",
                "next_version": "${{ steps.test6.outputs.next_version || '' }}",
                "result": "${{ steps.test6.outputs.result || '' }}",
                "details": "${{ steps.test6.outputs.details || '' }}"
              }
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/alfresco.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alfresco-test-results
          path: test-results/alfresco.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Alfresco Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Docker image exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Inspect Image Architecture (Verify Arm64 Support): ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Image Labels/Env: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Dry Run Container Start: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version:** ${{ steps.test6.outputs.next_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.details || 'n/a' }}" >> $GITHUB_STEP_SUMMARY


