name: Test RethinkDB on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-rethinkdb.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-rethinkdb.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-rethinkdb.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-rethinkdb.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-rethinkdb.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-rethinkdb.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-rethinkdb.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-rethinkdb.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-rethinkdb.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-rethinkdb.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-rethinkdb.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-rethinkdb.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-rethinkdb.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-rethinkdb.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-rethinkdb.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-rethinkdb.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-rethinkdb.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-rethinkdb.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-rethinkdb.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-rethinkdb.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-rethinkdb.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-rethinkdb.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-rethinkdb.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-rethinkdb.outputs.timestamp }}
jobs:
  test-rethinkdb:
    runs-on: ubuntu-24.04-arm
    env:
      RETHINKDB_VERSION: "2.4.4"
      RETHINKDB_NEXT_VERSION: ""
      RETHINKDB_WORKDIR: "/tmp/rethinkdb-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'RethinkDB'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rethinkdb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rethinkdb" >> "$GITHUB_OUTPUT"
      - name: Install RethinkDB baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            python3 \
            python-is-python3 \
            m4 \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libjemalloc-dev \
            libboost-dev \
            zlib1g-dev \
            libncurses5-dev \
            file

          rm -rf "${RETHINKDB_WORKDIR}"
          mkdir -p "${RETHINKDB_WORKDIR}"
          curl -fsSL -o "${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}.tar.gz" \
            "https://github.com/rethinkdb/rethinkdb/archive/refs/tags/v${RETHINKDB_VERSION}.tar.gz"
          tar -xzf "${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}.tar.gz" -C "${RETHINKDB_WORKDIR}"

          BASE_DIR="${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}"
          cd "${BASE_DIR}"
          perl -0pi -e 's@#include "errors\.hpp"@#include "errors.hpp"\n#include <cstdint>@' src/utils.hpp
          perl -0pi -e 's@#include <boost/detail/endian\.hpp>@#include <boost/predef/other/endian.h>@' src/rdb_protocol/datum.cc
          perl -0pi -e 's/\bBOOST_LITTLE_ENDIAN\b/BOOST_ENDIAN_LITTLE_BYTE/g; s/\bBOOST_BIG_ENDIAN\b/BOOST_ENDIAN_BIG_BYTE/g' src/rdb_protocol/datum.cc
          if ! PYTHON=python3 ./configure --allow-fetch >/tmp/rethinkdb-configure-baseline.log 2>&1; then
            cat /tmp/rethinkdb-configure-baseline.log >&2 || true
            echo "RethinkDB baseline configure failed on Arm64." >&2
            exit 1
          fi

          if ! make -j2 rethinkdb NO_COMPILE_JS=1 >/tmp/rethinkdb-make-baseline.log 2>&1; then
            cat /tmp/rethinkdb-make-baseline.log >&2 || true
            if grep -Fq "Host architecture was not detected as supported by protobuf" /tmp/rethinkdb-make-baseline.log; then
              echo "RethinkDB baseline build is blocked on Arm64 by bundled protobuf_2.5.0 architecture support." >&2
            fi
            echo "RethinkDB baseline build failed on Arm64." >&2
            exit 1
          fi

          BASE_BIN=$(find build -type f -name rethinkdb | head -n 1)
          test -n "${BASE_BIN}"
          test -x "${BASE_BIN}"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_bin=${BASE_BIN}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get RethinkDB version
        id: version
        run: |
          set -euo pipefail
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          LATEST="$(git ls-remote --tags --refs https://github.com/rethinkdb/rethinkdb.git \
            | awk -F/ '{print $3}' \
            | sed 's/^v//' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | awk -v current="${RETHINKDB_VERSION}" '
                $0 == current { found=1; next }
                found { print; exit }
              ' || true)"
          if [ -z "${LATEST}" ]; then
            LATEST="${RETHINKDB_NEXT_VERSION}"
          fi
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected RethinkDB version: ${VERSION:-unknown}"
          echo "Detected next stable release: ${LATEST:-none}"

      - name: Test 1 - Check built rethinkdb binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ -x "${BASE_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          if [ "${VERSION}" = "${RETHINKDB_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_BIN}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if "${BASE_BIN}" --help > /tmp/rethinkdb-help.txt 2>&1 && grep -Eqi "usage|serve|create|rethinkdb" /tmp/rethinkdb-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rethinkdb-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_BIN}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_BIN}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          ROOT="/tmp/rethinkdb-functional"
          DATA_DIR="${ROOT}/data"
          HTTP_PORT=18080
          DRIVER_PORT=28015
          CLUSTER_PORT=29015
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          "${BASE_BIN}" create -d "${DATA_DIR}" >/tmp/rethinkdb-create.txt 2>&1

          PID=""
          cleanup() {
            if [ -n "${PID}" ]; then
              kill "${PID}" >/dev/null 2>&1 || true
              wait "${PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "${BASE_BIN}" serve -d "${DATA_DIR}" \
            --bind all \
            --http-port "${HTTP_PORT}" \
            --driver-port "${DRIVER_PORT}" \
            --cluster-port "${CLUSTER_PORT}" >/tmp/rethinkdb-run.txt 2>&1 &
          PID=$!

          for _ in $(seq 1 30); do
            if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-run.txt; then
              break
            fi
            sleep 1
          done

          if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-run.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rethinkdb-create.txt || true
            cat /tmp/rethinkdb-run.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/rethinkdb-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT:-${RETHINKDB_VERSION}}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ] || [ "${LATEST}" = "${CURRENT}" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable version available for Arm64 regression validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run and already matches the newest stable release available for the current source-build Arm64 lane." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: No newer stable version available for Arm64 regression validation"
            echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run and already matches the newest stable release available for the current source-build Arm64 lane."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/rethinkdb-${LATEST}.tar.gz" \
            "https://github.com/rethinkdb/rethinkdb/archive/refs/tags/v${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/rethinkdb-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/rethinkdb-${LATEST}"
          cd "${NEXT_DIR}"
          perl -0pi -e 's@#include "errors\.hpp"@#include "errors.hpp"\n#include <cstdint>@' src/utils.hpp
          perl -0pi -e 's@#include <boost/detail/endian\.hpp>@#include <boost/predef/other/endian.h>@' src/rdb_protocol/datum.cc
          perl -0pi -e 's/\bBOOST_LITTLE_ENDIAN\b/BOOST_ENDIAN_LITTLE_BYTE/g; s/\bBOOST_BIG_ENDIAN\b/BOOST_ENDIAN_BIG_BYTE/g' src/rdb_protocol/datum.cc
          if ! PYTHON=python3 ./configure --allow-fetch >/tmp/rethinkdb-configure-next.log 2>&1; then
            cat /tmp/rethinkdb-configure-next.log >&2 || true
            echo "RethinkDB next-version configure failed on Arm64." >&2
            exit 1
          fi

          if ! make -j2 rethinkdb NO_COMPILE_JS=1 >/tmp/rethinkdb-make-next.log 2>&1; then
            cat /tmp/rethinkdb-make-next.log >&2 || true
            if grep -Fq "Host architecture was not detected as supported by protobuf" /tmp/rethinkdb-make-next.log; then
              echo "RethinkDB next-version build is blocked on Arm64 by bundled protobuf_2.5.0 architecture support." >&2
            fi
            echo "RethinkDB next-version build failed on Arm64." >&2
            exit 1
          fi

          NEXT_BIN=$(find build -type f -name rethinkdb | head -n 1)
          test -n "${NEXT_BIN}"
          NEXT_INSTALLED=$("${NEXT_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          ROOT="/tmp/rethinkdb-regression-functional"
          DATA_DIR="${ROOT}/data"
          HTTP_PORT=18081
          DRIVER_PORT=28016
          CLUSTER_PORT=29016
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"
          "${NEXT_BIN}" create -d "${DATA_DIR}" >/tmp/rethinkdb-create-next.txt 2>&1

          PID=""
          cleanup() {
            if [ -n "${PID}" ]; then
              kill "${PID}" >/dev/null 2>&1 || true
              wait "${PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "${NEXT_BIN}" serve -d "${DATA_DIR}" \
            --bind all \
            --http-port "${HTTP_PORT}" \
            --driver-port "${DRIVER_PORT}" \
            --cluster-port "${CLUSTER_PORT}" >/tmp/rethinkdb-next-run.txt 2>&1 &
          PID=$!

          for _ in $(seq 1 30); do
            if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-next-run.txt; then
              break
            fi
            sleep 1
          done

          if [ "${NEXT_INSTALLED}" = "${LATEST}" ] && grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-next-run.txt; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and the server reached the expected Arm64 startup state." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and the server reached the expected Arm64 startup state."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            STATUS="passed"
          else
            cat /tmp/rethinkdb-create-next.txt || true
            cat /tmp/rethinkdb-next-run.txt || true
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build-and-startup validation." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build-and-startup validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "${STATUS}" != "passed" ]; then
            exit 1
          fi
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## RethinkDB Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check built rethinkdb binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
