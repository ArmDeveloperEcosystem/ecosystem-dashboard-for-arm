name: Test RethinkDB on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/rethinkdb.md"
      - ".github/workflows/test-rethinkdb.yml"

jobs:
  test-rethinkdb:
    runs-on: ubuntu-24.04-arm
    env:
      RETHINKDB_VERSION: "2.4.0"
      RETHINKDB_NEXT_VERSION: "2.4.4"
      RETHINKDB_WORKDIR: "/tmp/rethinkdb-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rethinkdb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rethinkdb" >> "$GITHUB_OUTPUT"

      - name: Install RethinkDB baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            python3 \
            python-is-python3 \
            m4 \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libjemalloc-dev \
            libboost-dev \
            zlib1g-dev \
            libncurses5-dev \
            file

          rm -rf "${RETHINKDB_WORKDIR}"
          mkdir -p "${RETHINKDB_WORKDIR}"
          curl -fsSL -o "${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}.tar.gz" \
            "https://github.com/rethinkdb/rethinkdb/archive/refs/tags/v${RETHINKDB_VERSION}.tar.gz"
          tar -xzf "${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}.tar.gz" -C "${RETHINKDB_WORKDIR}"

          BASE_DIR="${RETHINKDB_WORKDIR}/rethinkdb-${RETHINKDB_VERSION}"
          cd "${BASE_DIR}"
          perl -0pi -e 's/#include "errors\\.hpp"/#include "errors.hpp"\\n#include <cstdint>/' src/utils.hpp
          perl -0pi -e 's/#include <boost\\/detail\\/endian\\.hpp>/#include <boost\\/predef\\/other\\/endian.h>/' src/rdb_protocol/datum.cc
          perl -0pi -e 's/BOOST_LITTLE_ENDIAN/BOOST_ENDIAN_LITTLE_BYTE/g; s/BOOST_BIG_ENDIAN/BOOST_ENDIAN_BIG_BYTE/g' src/rdb_protocol/datum.cc
          PYTHON=python3 ./configure --allow-fetch >/tmp/rethinkdb-configure-baseline.log 2>&1
          make -j2 rethinkdb NO_COMPILE_JS=1 >/tmp/rethinkdb-make-baseline.log 2>&1

          BASE_BIN=$(find build -type f -name rethinkdb | head -n 1)
          test -n "${BASE_BIN}"
          test -x "${BASE_BIN}"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_bin=${BASE_BIN}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get RethinkDB version
        id: version
        run: |
          set -euo pipefail
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "latest=${RETHINKDB_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected RethinkDB version: ${VERSION:-unknown}"
          echo "Detected next stable release: ${RETHINKDB_NEXT_VERSION}"

      - name: Test 1 - Check built rethinkdb binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ -x "${BASE_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          if [ "${VERSION}" = "${RETHINKDB_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_BIN}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if "${BASE_BIN}" --help > /tmp/rethinkdb-help.txt 2>&1 && grep -Eqi "usage|serve|create|rethinkdb" /tmp/rethinkdb-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rethinkdb-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_BIN}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_BIN}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          ROOT="/tmp/rethinkdb-functional"
          DATA_DIR="${ROOT}/data"
          HTTP_PORT=18080
          DRIVER_PORT=28015
          CLUSTER_PORT=29015
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          "${BASE_BIN}" create -d "${DATA_DIR}" >/tmp/rethinkdb-create.txt 2>&1

          PID=""
          cleanup() {
            if [ -n "${PID}" ]; then
              kill "${PID}" >/dev/null 2>&1 || true
              wait "${PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "${BASE_BIN}" serve -d "${DATA_DIR}" \
            --bind all \
            --http-port "${HTTP_PORT}" \
            --driver-port "${DRIVER_PORT}" \
            --cluster-port "${CLUSTER_PORT}" >/tmp/rethinkdb-run.txt 2>&1 &
          PID=$!

          for _ in $(seq 1 30); do
            if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-run.txt; then
              break
            fi
            sleep 1
          done

          if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-run.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rethinkdb-create.txt || true
            cat /tmp/rethinkdb-run.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/rethinkdb-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/rethinkdb-${LATEST}.tar.gz" \
            "https://github.com/rethinkdb/rethinkdb/archive/refs/tags/v${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/rethinkdb-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/rethinkdb-${LATEST}"
          cd "${NEXT_DIR}"
          perl -0pi -e 's/#include "errors\\.hpp"/#include "errors.hpp"\\n#include <cstdint>/' src/utils.hpp
          perl -0pi -e 's/#include <boost\\/detail\\/endian\\.hpp>/#include <boost\\/predef\\/other\\/endian.h>/' src/rdb_protocol/datum.cc
          perl -0pi -e 's/BOOST_LITTLE_ENDIAN/BOOST_ENDIAN_LITTLE_BYTE/g; s/BOOST_BIG_ENDIAN/BOOST_ENDIAN_BIG_BYTE/g' src/rdb_protocol/datum.cc
          PYTHON=python3 ./configure --allow-fetch >/tmp/rethinkdb-configure-next.log 2>&1
          make -j2 rethinkdb NO_COMPILE_JS=1 >/tmp/rethinkdb-make-next.log 2>&1

          NEXT_BIN=$(find build -type f -name rethinkdb | head -n 1)
          test -n "${NEXT_BIN}"
          NEXT_INSTALLED=$("${NEXT_BIN}" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          ROOT="/tmp/rethinkdb-regression-functional"
          DATA_DIR="${ROOT}/data"
          HTTP_PORT=18081
          DRIVER_PORT=28016
          CLUSTER_PORT=29016
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"
          "${NEXT_BIN}" create -d "${DATA_DIR}" >/tmp/rethinkdb-create-next.txt 2>&1

          PID=""
          cleanup() {
            if [ -n "${PID}" ]; then
              kill "${PID}" >/dev/null 2>&1 || true
              wait "${PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "${NEXT_BIN}" serve -d "${DATA_DIR}" \
            --bind all \
            --http-port "${HTTP_PORT}" \
            --driver-port "${DRIVER_PORT}" \
            --cluster-port "${CLUSTER_PORT}" >/tmp/rethinkdb-next-run.txt 2>&1 &
          PID=$!

          for _ in $(seq 1 30); do
            if grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-next-run.txt; then
              break
            fi
            sleep 1
          done

          if [ "${NEXT_INSTALLED}" = "${LATEST}" ] && grep -Eq "Listening for client driver connections|Our server ID is|Listening for intracluster connections" /tmp/rethinkdb-next-run.txt; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            if [ "${LATEST}" = "${CURRENT}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release. Regression validation rebuilt the same release in an isolated Arm64 environment, the candidate binary reported version ${NEXT_INSTALLED}, and the server reached the expected Arm64 startup state."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and the server reached the expected Arm64 startup state." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and the server reached the expected Arm64 startup state."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            STATUS="passed"
          else
            cat /tmp/rethinkdb-create-next.txt || true
            cat /tmp/rethinkdb-next-run.txt || true
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build-and-startup validation." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned RethinkDB version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build-and-startup validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "${STATUS}" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/rethinkdb.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "RethinkDB",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Databases - noSQL"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check built rethinkdb binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check exact version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rethinkdb-test-results
          path: test-results/rethinkdb.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## RethinkDB Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check built rethinkdb binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}" >> "$GITHUB_STEP_SUMMARY"
