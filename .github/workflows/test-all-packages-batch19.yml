name: Test All Packages (Batch 19) on Arm64

on:
  workflow_dispatch:
  workflow_call:

jobs:

  test-chef-infra:
    uses: ./.github/workflows/test-chef-infra.yml

  test-miniforge:
    uses: ./.github/workflows/test-miniforge.yml

  test-spdlog:
