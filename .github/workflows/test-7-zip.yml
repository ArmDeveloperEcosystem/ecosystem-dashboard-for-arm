name: Test 7-zip on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-7-zip.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-7-zip.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-7-zip.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-7-zip.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-7-zip.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-7-zip.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-7-zip.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-7-zip.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-7-zip.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-7-zip.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-7-zip.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-7-zip.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-7-zip.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-7-zip.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-7-zip.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-7-zip.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-7-zip.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-7-zip.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-7-zip.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-7-zip.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-7-zip.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-7-zip.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-7-zip.outputs.timestamp }}
jobs:
  test-7-zip:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: '7-zip'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=7-zip" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/7-zip" >> "$GITHUB_OUTPUT"
      - name: Install 7-zip
        id: install
        run: |
          echo "Installing 7-zip (modern package)..."
          
          # '7zip' package on Ubuntu 22.04+ (provides '7zz' binary)
          sudo apt-get update
          if sudo apt-get install -y 7zip; then
             echo "7zip installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          elif sudo apt-get install -y p7zip-full; then
             # Fallback to p7zip-full if 7zip not available
             echo "p7zip-full installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "7-zip installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get 7-zip version
        id: version
        run: |
          # Try 7zz first, then 7z, then 7za
          if command -v 7zz &> /dev/null; then
             CMD=7zz
          elif command -v 7z &> /dev/null; then
             CMD=7z
          else
             CMD=7za
          fi
          
          # 7z version output: "7-Zip [64] 16.02 : ..." or "7-Zip (z) 21.07 ..."
          VERSION=$($CMD --help | head -2 | grep "7-Zip" | grep -oP '\d+\.\d+' | head -1 || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected 7-zip version: $VERSION (using $CMD)"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # ============================================================
      
      - name: Test 1 - Check 7-zip binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v 7zz &> /dev/null || command -v 7z &> /dev/null || command -v 7za &> /dev/null; then
            echo "✓ 7-zip binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ 7-zip binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check 7-zip version/help command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v 7zz &> /dev/null; then CMD=7zz; elif command -v 7z &> /dev/null; then CMD=7z; else CMD=7za; fi
          
          # 7z doesn't have a dedicated --version flag in older versions, shows version in headers
          if $CMD --help | grep -q "7-Zip"; then
            echo "✓ 7-zip version/help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ 7-zip version/help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check 7-zip help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v 7zz &> /dev/null; then CMD=7zz; elif command -v 7z &> /dev/null; then CMD=7z; else CMD=7za; fi
          
          if $CMD --help | grep -qi "usage"; then
            echo "✓ 7-zip help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ 7-zip help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v 7zz &> /dev/null; then CMD=7zz; elif command -v 7z &> /dev/null; then CMD=7z; else CMD=7za; fi
          
          # Create a dummy file and zip it
          echo "test content" > test_file.txt
          if $CMD a test.zip test_file.txt > /dev/null; then
             echo "✓ Basic functional check (archive creation) passed"
             if $CMD l test.zip | grep -q "test_file.txt"; then
                echo "✓ Archive listing passed"
                echo "status=passed" >> $GITHUB_OUTPUT
             else
                echo "✗ Archive listing failed"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
             fi
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check 7-zip binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check 7-zip version/help command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check 7-zip help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## 7-zip Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check 7-zip binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check 7-zip version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check 7-zip help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

