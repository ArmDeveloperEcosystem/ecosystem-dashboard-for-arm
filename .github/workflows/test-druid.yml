name: Test Druid on Arm64

on:
  workflow_dispatch:
    inputs:
      prefetch_run_id:
        description: Orchestrator run id holding prefetched heavy archives
        required: false
        type: string
      prefetch_artifact_name:
        description: Artifact name containing prefetched heavy archives
        required: false
        type: string
  workflow_call:
    inputs:
      prefetch_run_id:
        required: false
        type: string
      prefetch_artifact_name:
        required: false
        type: string
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-druid.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-druid.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-druid.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-druid.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-druid.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-druid.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-druid.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-druid.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-druid.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-druid.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-druid.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-druid.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-druid.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-druid.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-druid.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-druid.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-druid.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-druid.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-druid.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-druid.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-druid.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-druid.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-druid.outputs.timestamp }}
jobs:
  test-druid:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Druid'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore warm Druid baseline cache
        id: restore_druid_baseline_cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/prefetch-heavy/druid
          key: heavy-baseline-druid-31.0.0-arm64-v1

      - name: Download prefetched heavy baselines
        if: ${{ inputs.prefetch_run_id != '' && inputs.prefetch_artifact_name != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          repository: ${{ github.repository }}
          run-id: ${{ inputs.prefetch_run_id }}
          github-token: ${{ github.token }}
          name: ${{ inputs.prefetch_artifact_name }}
          path: ${{ runner.temp }}/prefetch-heavy

      - name: Resolve prefetched heavy baselines
        if: always()
        run: |
          echo "PREFETCH_HEAVY_ROOT=${RUNNER_TEMP}/prefetch-heavy" >> "$GITHUB_ENV"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=druid" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/druid" >> "$GITHUB_OUTPUT"
      - name: Install Druid
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl wget openjdk-17-jre-headless"
          BASELINE_VERSION="31.0.0"
          BASELINE_PRIMARY_URL="https://archive.apache.org/dist/druid/${BASELINE_VERSION}/apache-druid-${BASELINE_VERSION}-bin.tar.gz"
          BASELINE_MIRROR_URL="http://archive.apache.org/dist/druid/${BASELINE_VERSION}/apache-druid-${BASELINE_VERSION}-bin.tar.gz"
          BASELINE_ARCHIVE_URL="https://archive.apache.org/dist/druid/${BASELINE_VERSION}/apache-druid-${BASELINE_VERSION}-bin.tar.gz"
          BASELINE_ARCHIVE_HTTP_URL="http://archive.apache.org/dist/druid/${BASELINE_VERSION}/apache-druid-${BASELINE_VERSION}-bin.tar.gz"
          WORKDIR=$(mktemp -d)

          echo "baseline_version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Downloading Druid baseline from ${BASELINE_ARCHIVE_URL}"
          CACHE_FILE="${PREFETCH_HEAVY_ROOT:-${RUNNER_TEMP}/prefetch-heavy}/druid/apache-druid-${BASELINE_VERSION}-bin.tar.gz"
          if [ -f "$CACHE_FILE" ]; then
            cp "$CACHE_FILE" "$WORKDIR/druid.tar.gz"
          else
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=45 \
            DOWNLOAD_MAX_TIME=480 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=90 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$WORKDIR/druid.tar.gz" "$BASELINE_PRIMARY_URL" "$BASELINE_MIRROR_URL" "$BASELINE_ARCHIVE_URL" "$BASELINE_ARCHIVE_HTTP_URL" || {
                echo "install_status=failed" >> "$GITHUB_OUTPUT"
                echo "install_blocker=baseline_download_failed" >> "$GITHUB_OUTPUT"
                exit 0
              }
          fi
          mkdir -p "$(dirname "$CACHE_FILE")"
          if [ ! -f "$CACHE_FILE" ]; then
            cp "$WORKDIR/druid.tar.gz" "$CACHE_FILE"
          fi
          ls -lh "$WORKDIR/druid.tar.gz"
          echo "Extracting Druid baseline..."
          if ! timeout 15m tar -xzf "$WORKDIR/druid.tar.gz" -C "$WORKDIR"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mv "$WORKDIR/apache-druid-${BASELINE_VERSION}" "$GITHUB_WORKSPACE/druid"

          if [ -d "$GITHUB_WORKSPACE/druid" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Save warm Druid baseline cache
        if: ${{ steps.install.outputs.install_status == 'success' && steps.restore_druid_baseline_cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/prefetch-heavy/druid
          key: heavy-baseline-druid-31.0.0-arm64-v1

      - name: Resolve Druid install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE/druid"
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          if [ -f "$ROOT/bin/start-micro-quickstart" ] && [ -d "$ROOT/conf" ] && find "$ROOT/lib" -type f -name '*.jar' -print -quit | grep -q .; then
            STATUS="success"
            BLOCKER=""
          fi
          echo "DRUID_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "DRUID_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "DRUID_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"

      - name: Get Druid version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "version=${{ steps.install.outputs.baseline_version || '31.0.0' }}" >> "$GITHUB_OUTPUT"
            echo "Detected Druid version: ${{ steps.install.outputs.baseline_version || '31.0.0' }} (baseline install unavailable)"
            exit 0
          fi
          VERSION="${{ steps.install.outputs.baseline_version || '31.0.0' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Druid version: $VERSION"

      - name: Test 1 - Check quickstart script exists
        id: test1
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "druid/bin/start-micro-quickstart" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check configuration directory exists
        id: test2
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -d "druid/conf" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check library directory contains jars
        id: test3
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if find "druid/lib" -type f -name '*.jar' | grep -q .; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation (script syntax and runtime helpers)
        id: test5
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${DRUID_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if bash -n "druid/bin/start-micro-quickstart" && [ -f "druid/bin/run-java" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_version || 'unknown' }}"
          LATEST_VERSION="36.0.0"
          INSTALL_STATUS="${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'failed' }}"
          CORE_FAILURES=0
          for conclusion in \
            "${{ steps.test1.conclusion || 'skipped' }}" \
            "${{ steps.test2.conclusion || 'skipped' }}" \
            "${{ steps.test3.conclusion || 'skipped' }}" \
            "${{ steps.test4.conclusion || 'skipped' }}" \
            "${{ steps.test5.conclusion || 'skipped' }}"; do
            if [ "$conclusion" = "failure" ]; then
              CORE_FAILURES=$((CORE_FAILURES + 1))
            fi
          done

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST_VERSION"

          if [ "$INSTALL_STATUS" != "success" ] || [ "$CORE_FAILURES" -gt 0 ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Druid version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Regression validation deferred because baseline install or core smoke checks failed"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT" = "$LATEST_VERSION" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Druid version ${CURRENT} passed smoke tests in this run and already matches the latest published Apache binary distribution."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_PRIMARY_URL="https://dlcdn.apache.org/druid/${LATEST_VERSION}/apache-druid-${LATEST_VERSION}-bin.tar.gz"
          NEXT_MIRROR_URL="https://downloads.apache.org/druid/${LATEST_VERSION}/apache-druid-${LATEST_VERSION}-bin.tar.gz"
          NEXT_ARCHIVE_URL="https://archive.apache.org/dist/druid/${LATEST_VERSION}/apache-druid-${LATEST_VERSION}-bin.tar.gz"
          NEXT_ARCHIVE_HTTP_URL="http://archive.apache.org/dist/druid/${LATEST_VERSION}/apache-druid-${LATEST_VERSION}-bin.tar.gz"
          NEXT_DIR=$(mktemp -d)
          echo "Downloading Druid candidate ${LATEST_VERSION}"
          if ! DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=45 \
            DOWNLOAD_MAX_TIME=480 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=90 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$NEXT_DIR/druid.tar.gz" "$NEXT_PRIMARY_URL" "$NEXT_MIRROR_URL" "$NEXT_ARCHIVE_URL" "$NEXT_ARCHIVE_HTTP_URL"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned package version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ls -lh "$NEXT_DIR/druid.tar.gz"
          echo "Extracting Druid candidate..."
          if ! timeout 15m tar -xzf "$NEXT_DIR/druid.tar.gz" -C "$NEXT_DIR"; then
            echo "next_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned package version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} could not be extracted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          CANDIDATE_DIR="$NEXT_DIR/apache-druid-${LATEST_VERSION}"

          if [ -f "$CANDIDATE_DIR/bin/start-micro-quickstart" ] && \
             [ -d "$CANDIDATE_DIR/conf" ] && \
             find "$CANDIDATE_DIR/lib" -type f -name '*.jar' | grep -q . && \
             bash -n "$CANDIDATE_DIR/bin/start-micro-quickstart" && \
             [ -f "$CANDIDATE_DIR/bin/run-java" ]; then
            echo "next_installed_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Druid version ${CURRENT} passed smoke tests in this run. Regression validation downloaded and extracted candidate version ${LATEST_VERSION} on Arm64, and the staged distribution exposed the quickstart script, runtime helper script, configuration directory, and library layout expected by this workflow." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $LATEST_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Druid version ${CURRENT} passed smoke tests in this run. Regression validation downloaded and extracted candidate version ${LATEST_VERSION} on Arm64, and the staged distribution exposed the quickstart script, runtime helper script, configuration directory, and library layout expected by this workflow."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Druid version ${CURRENT} passed smoke tests in this run, but the candidate ${LATEST_VERSION} did not expose the expected staged distribution layout on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Druid version ${CURRENT} passed smoke tests in this run, but the candidate ${LATEST_VERSION} did not expose the expected staged distribution layout on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Druid"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Test 1 - Check quickstart script exists"
          test2_label: "Test 2 - Check configuration directory exists"
          test3_label: "Test 3 - Check library directory contains jars"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation (script syntax and runtime helpers)"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
