name: Test RMBlast on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/rmblast.md"
      - ".github/workflows/test-rmblast.yml"

jobs:
  test-rmblast:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      RMBLAST_VERSION: "2.14.1"
      RMBLAST_PREFIX: "/tmp/rmblast-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rmblast" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rmblast" >> "$GITHUB_OUTPUT"
      - name: Install RMBlast baseline from source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config curl ca-certificates patch file zlib1g-dev libbz2-dev liblzma-dev

          BUILD_ROOT=$(mktemp -d)
          BASELINE_URL="https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/${RMBLAST_VERSION}/ncbi-blast-${RMBLAST_VERSION}+-src.tar.gz"
          PATCH_URL="https://www.repeatmasker.org/rmblast/isb-${RMBLAST_VERSION}+-rmblast.patch.gz"

          curl --fail --location --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 900 --progress-bar "$BASELINE_URL" -o "$BUILD_ROOT/ncbi-blast-src.tgz"
          curl --fail --location --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 900 --progress-bar "$PATCH_URL" -o "$BUILD_ROOT/rmblast.patch.gz"
          ls -lh "$BUILD_ROOT"/ncbi-blast-src.tgz "$BUILD_ROOT"/rmblast.patch.gz
          timeout 10m tar -xzf "$BUILD_ROOT/ncbi-blast-src.tgz" -C "$BUILD_ROOT"
          gunzip "$BUILD_ROOT/rmblast.patch.gz"

          SRC_DIR="$BUILD_ROOT/ncbi-blast-${RMBLAST_VERSION}+-src"
          patch -d "$SRC_DIR" -p1 < "$BUILD_ROOT/rmblast.patch"

          cd "$SRC_DIR/c++"
          timeout 10m ./configure --with-mt --without-debug --without-krb5 --without-openssl --with-projects=scripts/projects/rmblastn/project.lst --prefix="$RMBLAST_PREFIX" 2>&1 | tee /tmp/rmblast-configure-baseline.log
          timeout --signal=TERM --kill-after=60s 25m make -j2 2>&1 | tee /tmp/rmblast-make-baseline.log
          rm -rf "$RMBLAST_PREFIX"
          timeout 10m make install 2>&1 | tee /tmp/rmblast-install-baseline.log

          echo "$RMBLAST_PREFIX/bin" >> "$GITHUB_PATH"
          if [ -x "$RMBLAST_PREFIX/bin/rmblastn" ] && [ -x "$RMBLAST_PREFIX/bin/makeblastdb" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get RMBlast version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("$RMBLAST_PREFIX/bin/rmblastn" -version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected RMBlast version: ${VERSION}"

      - name: Test 1 - Check RMBlast binaries exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "$RMBLAST_PREFIX/bin/rmblastn" ] && [ -x "$RMBLAST_PREFIX/bin/makeblastdb" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check pinned release version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$("$RMBLAST_PREFIX/bin/rmblastn" -version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          if [ "$VERSION" = "$RMBLAST_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$RMBLAST_PREFIX/bin/rmblastn" -help >/tmp/rmblast-help.out 2>&1 && "$RMBLAST_PREFIX/bin/makeblastdb" -help >/tmp/rmblast-makeblastdb-help.out 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if file "$RMBLAST_PREFIX/bin/rmblastn" | grep -Eq 'aarch64|ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          WORK_DIR=$(mktemp -d)
          cat > "$WORK_DIR/db.fa" <<'EOF'
          >db1
          ACGTACGTACGTACGTACGTACGTACGT
          EOF
          cat > "$WORK_DIR/query.fa" <<'EOF'
          >query1
          ACGTACGTACGTACGTACGTACGTACGT
          EOF

          "$RMBLAST_PREFIX/bin/makeblastdb" -in "$WORK_DIR/db.fa" -dbtype nucl -out "$WORK_DIR/db" >/tmp/rmblast-makeblastdb-baseline.out 2>&1
          "$RMBLAST_PREFIX/bin/rmblastn" \
            -query "$WORK_DIR/query.fa" \
            -db "$WORK_DIR/db" \
            -task megablast \
            -dust no \
            -soft_masking false \
            -outfmt '6 qseqid sseqid length' > "$WORK_DIR/result.tsv" 2>/tmp/rmblast-run-baseline.out

          if grep -q $'^query1\tdb1\t' "$WORK_DIR/result.tsv"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rmblast-makeblastdb-baseline.out || true
            cat /tmp/rmblast-run-baseline.out || true
            cat "$WORK_DIR/result.tsv" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="$RMBLAST_VERSION"
          LATEST=$(python3 - <<'PY'
          import re, urllib.request
          html = urllib.request.urlopen("https://www.repeatmasker.org/rmblast/").read().decode()
          match = re.search(r"Latest Release:\s*([0-9]+\.[0-9]+\.[0-9]+)", html)
          if not match:
              raise SystemExit("Unable to determine latest RMBlast release")
          print(match.group(1))
          PY
          )

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          NEXT_ROOT=$(mktemp -d)
          NEXT_PREFIX="$NEXT_ROOT/install"
          BASELINE_URL="https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/${LATEST}/ncbi-blast-${LATEST}+-src.tar.gz"
          PATCH_URL="https://www.repeatmasker.org/rmblast/isb-${LATEST}+-rmblast.patch.gz"

          if curl --fail --location --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 900 --progress-bar "$BASELINE_URL" -o "$NEXT_ROOT/ncbi-blast-src.tgz" && \
             curl --fail --location --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 900 --progress-bar "$PATCH_URL" -o "$NEXT_ROOT/rmblast.patch.gz"; then
            echo "Next version download status: passed"
            ls -lh "$NEXT_ROOT"/ncbi-blast-src.tgz "$NEXT_ROOT"/rmblast.patch.gz
            timeout 10m tar -xzf "$NEXT_ROOT/ncbi-blast-src.tgz" -C "$NEXT_ROOT"
            gunzip "$NEXT_ROOT/rmblast.patch.gz"
            SRC_DIR="$NEXT_ROOT/ncbi-blast-${LATEST}+-src"
            patch -d "$SRC_DIR" -p1 < "$NEXT_ROOT/rmblast.patch"

            cd "$SRC_DIR/c++"
            timeout 10m ./configure --with-mt --without-debug --without-krb5 --without-openssl --with-projects=scripts/projects/rmblastn/project.lst --prefix="$NEXT_PREFIX" 2>&1 | tee /tmp/rmblast-configure-next.log
            timeout --signal=TERM --kill-after=60s 25m make -j2 2>&1 | tee /tmp/rmblast-make-next.log
            timeout 10m make install 2>&1 | tee /tmp/rmblast-install-next.log

            NEXT_RMBLASTN="$NEXT_PREFIX/bin/rmblastn"
            NEXT_MAKEBLASTDB="$NEXT_PREFIX/bin/makeblastdb"
            NEXT_INSTALLED_VERSION=$("$NEXT_RMBLASTN" -version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)

            if [ -x "$NEXT_RMBLASTN" ] && [ -x "$NEXT_MAKEBLASTDB" ] && [ -n "${NEXT_INSTALLED_VERSION:-}" ]; then
              WORK_DIR=$(mktemp -d)
              printf '%s\n' '>db1' 'ACGTACGTACGTACGTACGTACGTACGT' > "$WORK_DIR/db.fa"
              printf '%s\n' '>query1' 'ACGTACGTACGTACGTACGTACGTACGT' > "$WORK_DIR/query.fa"

              "$NEXT_MAKEBLASTDB" -in "$WORK_DIR/db.fa" -dbtype nucl -out "$WORK_DIR/db" >/tmp/rmblast-makeblastdb-next.out 2>&1
              "$NEXT_RMBLASTN" \
                -query "$WORK_DIR/query.fa" \
                -db "$WORK_DIR/db" \
                -task megablast \
                -dust no \
                -soft_masking false \
                -outfmt '6 qseqid sseqid length' > "$WORK_DIR/result.tsv" 2>/tmp/rmblast-run-next.out

              if grep -q $'^query1\tdb1\t' "$WORK_DIR/result.tsv" && [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
                if [ "$LATEST" = "$CURRENT" ]; then
                  echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
                  echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned RMBlast release ${CURRENT} already matches the newest public stable release. Tests 1-5 validate the real Arm64 source build and self-hit smoke, but there is no newer stable upstream release for a genuine Test 6 upgrade check." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: No newer stable release available for Test 6"
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                else
                  echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned RMBlast release ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate ${LATEST} from the official NCBI Blast source plus the RepeatMasker patch, the Arm64 rmblastn binary reported ${NEXT_INSTALLED_VERSION}, and the candidate completed the makeblastdb plus rmblastn megablast self-hit smoke." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Next version installed successfully on Arm64"
                  echo "status=passed" >> "$GITHUB_OUTPUT"
                  echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
                fi
              else
                cat /tmp/rmblast-makeblastdb-next.out || true
                cat /tmp/rmblast-run-next.out || true
                cat "$WORK_DIR/result.tsv" || true
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned RMBlast release ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not complete the rebuilt makeblastdb/rmblastn smoke successfully on Arm64." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned RMBlast release ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not build a usable Arm64 rmblastn toolchain." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RMBlast release ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} source bundle or patch could not be downloaded from the official paths." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/rmblast.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "RMBlast",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Bioinformatics"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Check RMBlast binaries exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Check pinned release version", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Regression Validation", "status": "${{ steps.test6.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          cat test-results/rmblast.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rmblast-test-results
          path: test-results/rmblast.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression comparison summary unavailable.' }}"
          echo "## RMBlast Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check RMBlast binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check pinned release version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
