name: Test Rundeck on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-rundeck.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-rundeck.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-rundeck.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-rundeck.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-rundeck.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-rundeck.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-rundeck.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-rundeck.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-rundeck.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-rundeck.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-rundeck.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-rundeck.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-rundeck.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-rundeck.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-rundeck.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-rundeck.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-rundeck.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-rundeck.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-rundeck.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-rundeck.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-rundeck.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-rundeck.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-rundeck.outputs.timestamp }}
jobs:
  test-rundeck:
    runs-on: ubuntu-24.04-arm
    env:
      RUNDECK_VERSION: "5.11.0"
      RUNDECK_NEXT_VERSION: "5.11.1"
      RUNDECK_BASELINE_URL: "https://packagecloud.io/pagerduty/rundeck/packages/java/org.rundeck/rundeck-5.11.0-20250409.war/artifacts/rundeck-5.11.0-20250409.war/download?distro_version_id=167"
      RUNDECK_NEXT_URL: "https://packagecloud.io/pagerduty/rundeck/packages/java/org.rundeck/rundeck-5.11.1-20250415.war/artifacts/rundeck-5.11.1-20250415.war/download?distro_version_id=167"
      RUNDECK_WAR: "/tmp/rundeck-5.11.0.war"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Rundeck'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rundeck" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rundeck" >> "$GITHUB_OUTPUT"
      - name: Install Rundeck baseline from official community downloads
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-17-jre-headless curl unzip python3"
          curl -fsSL "${RUNDECK_BASELINE_URL}" -o "${RUNDECK_WAR}"

          if [ ! -s "${RUNDECK_WAR}" ]; then
            echo "Failed to download the baseline Rundeck launcher war" >&2
            exit 1
          fi

          echo "war_path=${RUNDECK_WAR}" >> "$GITHUB_OUTPUT"
          echo "baseline_url=${RUNDECK_BASELINE_URL}" >> "$GITHUB_OUTPUT"

      - name: Get Rundeck versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="${RUNDECK_VERSION}"
          LATEST="${RUNDECK_NEXT_VERSION}"
          LATEST_WAR_URL="${RUNDECK_NEXT_URL}"

          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_war_url=${LATEST_WAR_URL}" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: ${CURRENT}"
          echo "Detected latest version: ${LATEST:-unknown}"

      - name: Test 1 - Check Rundeck launcher exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -s "${{ steps.install.outputs.war_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check pinned release artifact metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if echo "${{ steps.install.outputs.baseline_url }}" | grep -q "rundeck-${RUNDECK_VERSION}-" && \
             unzip -l "${{ steps.install.outputs.war_path }}" WEB-INF/classes/application.yml >/tmp/rundeck-baseline-list.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rundeck-baseline-list.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check launcher help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          timeout 45s java -jar "${{ steps.install.outputs.war_path }}" --help > /tmp/rundeck-help.txt 2>&1
          if grep -qiE 'Run the rundeck server|rundeck-launcher\.war|--help' /tmp/rundeck-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rundeck-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ] && java -XshowSettings:properties -version 2>&1 | grep -q 'os.arch = aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            java -XshowSettings:properties -version 2>&1 | grep 'os.arch' || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          timeout 45s java -jar "${{ steps.install.outputs.war_path }}" --help > /tmp/rundeck-functional-help.txt 2>&1
          if unzip -l "${{ steps.install.outputs.war_path }}" WEB-INF/classes/application.yml >/tmp/rundeck-functional-list.txt 2>&1 && \
             grep -qiE 'Run the rundeck server|rundeck-launcher\.war' /tmp/rundeck-functional-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rundeck-functional-list.txt || true
            cat /tmp/rundeck-functional-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          NEXT_URL="${{ steps.version.outputs.latest_war_url }}"
          NEXT_WAR="/tmp/rundeck-${LATEST}.war"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ] || [ -z "${NEXT_URL}" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rundeck version ${CURRENT} passed smoke tests in this run, but the latest stable public launcher war could not be resolved from the official community downloads page." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          curl -fsSL "${NEXT_URL}" -o "${NEXT_WAR}"
          timeout 45s java -jar "${NEXT_WAR}" --help > /tmp/rundeck-next-help.txt 2>&1

          if [ -s "${NEXT_WAR}" ] && \
             unzip -l "${NEXT_WAR}" WEB-INF/classes/application.yml >/tmp/rundeck-next-list.txt 2>&1 && \
             grep -qiE 'Run the rundeck server|rundeck-launcher\.war|--help' /tmp/rundeck-next-help.txt; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Rundeck version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the official community launcher war for ${LATEST}, confirmed the expected application resources are present, and ran the bounded launcher help output successfully on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: ${LATEST}"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rundeck-next-list.txt || true
            cat /tmp/rundeck-next-help.txt || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rundeck version ${CURRENT} passed smoke tests in this run, but the latest public launcher war for ${LATEST} did not complete the bounded Arm64 install validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); CORE_FAILED=1; fi
          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Rundeck Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Rundeck launcher exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check pinned release artifact metadata: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check launcher help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
