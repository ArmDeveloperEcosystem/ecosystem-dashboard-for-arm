name: Test Wireshark on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-wireshark.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-wireshark.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-wireshark.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-wireshark.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-wireshark.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-wireshark.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-wireshark.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-wireshark.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-wireshark.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-wireshark.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-wireshark.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-wireshark.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-wireshark.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-wireshark.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-wireshark.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-wireshark.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-wireshark.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-wireshark.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-wireshark.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-wireshark.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-wireshark.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-wireshark.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-wireshark.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-wireshark.outputs.timestamp }}
jobs:
  test-wireshark:
    runs-on: ubuntu-24.04-arm
    env:
      WIRESHARK_VERSION: "4.6.3"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Wireshark'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=wireshark" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/wireshark" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${WIRESHARK_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Wireshark baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            flex \
            bison \
            curl \
            python3-dev \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-multimedia-dev \
            libbrotli-dev \
            libc-ares-dev \
            libcap-dev \
            libgcrypt20-dev \
            libglib2.0-dev \
            libgnutls28-dev \
            libkrb5-dev \
            liblua5.4-dev \
            libmaxminddb-dev \
            libminizip-dev \
            libnghttp2-dev \
            libnl-3-dev \
            libnl-genl-3-dev \
            libpcap-dev \
            libsbc-dev \
            libsnappy-dev \
            libspeexdsp-dev \
            libssh-gcrypt-dev \
            libsystemd-dev \
            libxml2-dev

          BASE_DIR="${RUNNER_TEMP}/wireshark-current"
          rm -rf "$BASE_DIR"
          mkdir -p "$BASE_DIR"
          curl -fsSLo "$BASE_DIR/wireshark.tar.xz" "https://www.wireshark.org/download/src/wireshark-${WIRESHARK_VERSION}.tar.xz"
          tar -xf "$BASE_DIR/wireshark.tar.xz" -C "$BASE_DIR"
          SRC_DIR="$BASE_DIR/wireshark-${WIRESHARK_VERSION}"

          cmake -S "$SRC_DIR" -B "$SRC_DIR/build" -G Ninja -DBUILD_wireshark=OFF -DBUILD_tshark=ON -DENABLE_QT6=OFF >/tmp/wireshark-configure.log 2>&1
          cmake --build "$SRC_DIR/build" --target tshark capinfos -j"$(nproc)" >/tmp/wireshark-build.log 2>&1

          test -x "$SRC_DIR/build/run/tshark"
          test -x "$SRC_DIR/build/run/capinfos"

          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Wireshark version
        id: version
        run: |
          set -euo pipefail
          SRC_DIR="${{ steps.install.outputs.source_dir }}"
          VERSION=$("$SRC_DIR/build/run/tshark" -v 2>&1 | awk 'NR==1 {print $3; exit}')
          LATEST="$(
            CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import urllib.request

          current = os.environ.get("CURRENT_VERSION", "").strip()
          try:
              current_tuple = tuple(int(part) for part in current.split("."))
          except Exception:
              print("unknown")
              raise SystemExit(0)

          html = urllib.request.urlopen("https://www.wireshark.org/download/src/", timeout=20).read().decode("utf-8", "ignore")
          versions = sorted(
              {
                  tuple(int(part) for part in match.split("."))
                  for match in re.findall(r'wireshark-([0-9]+\\.[0-9]+\\.[0-9]+)\\.tar\\.xz', html)
              }
          )
          next_newer = next((version for version in versions if version > current_tuple), None)
          if next_newer is None:
              print(current)
          else:
              print(".".join(str(x) for x in next_newer))
          PY
          )"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Wireshark version: $VERSION"
          echo "Detected next newer stable source candidate: $LATEST"

      - name: Test 1 - Check tshark binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if [ -x "$SRC_DIR/build/run/tshark" ] && [ -x "$SRC_DIR/build/run/capinfos" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"
          VERSION=$("$SRC_DIR/build/run/tshark" -v 2>&1 | awk 'NR==1 {print $3; exit}')

          if [ "$VERSION" = "${WIRESHARK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$SRC_DIR/build/run/tshark" -v || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if "$SRC_DIR/build/run/tshark" -h 2>&1 | grep -qi 'Dump and analyze network traffic'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if [ "$(uname -m)" = "aarch64" ] && file "$SRC_DIR/build/run/tshark" | grep -Eqi 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          python3 - <<'PY'
          from pathlib import Path
          hdr = bytes.fromhex("d4c3b2a1020004000000000000000000ffff000001000000")
          Path("/tmp/empty.pcap").write_bytes(hdr)
          PY

          "$SRC_DIR/build/run/capinfos" /tmp/empty.pcap >/tmp/wireshark-capinfos.txt 2>&1
          "$SRC_DIR/build/run/tshark" -r /tmp/empty.pcap >/tmp/wireshark-read.txt 2>&1

          if grep -q 'File type' /tmp/wireshark-capinfos.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/wireshark-capinfos.txt || true
            cat /tmp/wireshark-read.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.WIRESHARK_VERSION }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Wireshark source version ${CURRENT} passed smoke tests in this run, but the next newer stable source release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Wireshark release is available for Arm64 validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Wireshark ${CURRENT} is both the pinned Arm64 source baseline and the newest stable public Wireshark source release currently published, so there is no newer stable source tarball to validate in Test 6 yet." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR="${RUNNER_TEMP}/wireshark-next"
          rm -rf "$NEXT_DIR"
          mkdir -p "$NEXT_DIR"
          curl -fsSLo "$NEXT_DIR/wireshark-next.tar.xz" "https://www.wireshark.org/download/src/wireshark-${LATEST}.tar.xz"
          tar -xf "$NEXT_DIR/wireshark-next.tar.xz" -C "$NEXT_DIR"
          NEXT_SRC="$NEXT_DIR/wireshark-${LATEST}"

          cmake -S "$NEXT_SRC" -B "$NEXT_SRC/build" -G Ninja -DBUILD_wireshark=OFF -DBUILD_tshark=ON -DENABLE_QT6=OFF >/tmp/wireshark-next-configure.log 2>&1
          cmake --build "$NEXT_SRC/build" --target tshark capinfos -j"$(nproc)" >/tmp/wireshark-next-build.log 2>&1
          NEXT_REPORTED=$("$NEXT_SRC/build/run/tshark" -v 2>&1 | awk 'NR==1 {print $3; exit}')

          python3 - <<'PY'
          from pathlib import Path
          hdr = bytes.fromhex("d4c3b2a1020004000000000000000000ffff000001000000")
          Path("/tmp/empty-next.pcap").write_bytes(hdr)
          PY

          "$NEXT_SRC/build/run/capinfos" /tmp/empty-next.pcap >/tmp/wireshark-next-capinfos.txt 2>&1
          "$NEXT_SRC/build/run/tshark" -r /tmp/empty-next.pcap >/tmp/wireshark-next-read.txt 2>&1

          if [ "$NEXT_REPORTED" = "$LATEST" ] && grep -q 'File type' /tmp/wireshark-next-capinfos.txt; then
            echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Wireshark source version ${CURRENT} passed smoke tests in this run. Regression validation built candidate source version ${LATEST} on Arm64, candidate tshark reported ${NEXT_REPORTED}, and capinfos/tshark pcap smoke checks passed." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/wireshark-next-configure.log || true
            cat /tmp/wireshark-next-build.log || true
            cat /tmp/wireshark-next-capinfos.txt || true
            cat /tmp/wireshark-next-read.txt || true
            echo "next_installed_version=${NEXT_REPORTED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Wireshark source version ${CURRENT} passed smoke tests in this run, but candidate source version ${LATEST} did not complete Arm64 build-and-smoke validation successfully." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"
          echo "Next version installed on Arm64: ${NEXT_REPORTED:-not_installed}"
          echo "Regression install result: $([ \"$NEXT_REPORTED\" = \"$LATEST\" ] && echo 'Next version installed successfully on Arm64' || echo 'Next version install failed on Arm64')"
          echo "Details: Candidate version ${LATEST} was built and smoke-checked on Arm64."
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_review_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              if [ "$status" = "failed" ]; then
                FAILED=$((FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          add_review_any "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Wireshark Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.WIRESHARK_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.WIRESHARK_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
