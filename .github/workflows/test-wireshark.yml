name: Test Wireshark on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/wireshark.md"
      - ".github/workflows/test-wireshark.yml"

jobs:
  test-wireshark:
    runs-on: ubuntu-24.04-arm
    env:
      WIRESHARK_VERSION: "4.6.4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=wireshark" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/wireshark" >> "$GITHUB_OUTPUT"
          echo "current_version=${WIRESHARK_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Wireshark baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            flex \
            bison \
            curl \
            python3-dev \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-multimedia-dev \
            libbrotli-dev \
            libc-ares-dev \
            libcap-dev \
            libgcrypt20-dev \
            libglib2.0-dev \
            libgnutls28-dev \
            libkrb5-dev \
            liblua5.4-dev \
            libmaxminddb-dev \
            libminizip-dev \
            libnghttp2-dev \
            libnl-3-dev \
            libnl-genl-3-dev \
            libpcap-dev \
            libsbc-dev \
            libsnappy-dev \
            libspeexdsp-dev \
            libssh-gcrypt-dev \
            libsystemd-dev \
            libxml2-dev

          BASE_DIR="${RUNNER_TEMP}/wireshark-current"
          rm -rf "$BASE_DIR"
          mkdir -p "$BASE_DIR"
          curl -fsSLo "$BASE_DIR/wireshark.tar.xz" "https://www.wireshark.org/download/src/wireshark-${WIRESHARK_VERSION}.tar.xz"
          tar -xf "$BASE_DIR/wireshark.tar.xz" -C "$BASE_DIR"
          SRC_DIR="$BASE_DIR/wireshark-${WIRESHARK_VERSION}"

          cmake -S "$SRC_DIR" -B "$SRC_DIR/build" -G Ninja -DBUILD_wireshark=OFF -DBUILD_tshark=ON -DENABLE_QT6=OFF >/tmp/wireshark-configure.log 2>&1
          cmake --build "$SRC_DIR/build" --target tshark capinfos -j"$(nproc)" >/tmp/wireshark-build.log 2>&1

          test -x "$SRC_DIR/build/run/tshark"
          test -x "$SRC_DIR/build/run/capinfos"

          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Wireshark version
        id: version
        run: |
          set -euo pipefail
          SRC_DIR="${{ steps.install.outputs.source_dir }}"
          VERSION=$("$SRC_DIR/build/run/tshark" -v 2>&1 | awk 'NR==1 {print $3; exit}')
          LATEST="${WIRESHARK_VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Wireshark version: $VERSION"
          echo "Detected latest stable source release: $LATEST"

      - name: Test 1 - Check tshark binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if [ -x "$SRC_DIR/build/run/tshark" ] && [ -x "$SRC_DIR/build/run/capinfos" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"
          VERSION=$("$SRC_DIR/build/run/tshark" -v 2>&1 | awk 'NR==1 {print $3; exit}')

          if [ "$VERSION" = "${WIRESHARK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$SRC_DIR/build/run/tshark" -v || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if "$SRC_DIR/build/run/tshark" -h 2>&1 | grep -qi 'Dump and analyze network traffic'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          if [ "$(uname -m)" = "aarch64" ] && file "$SRC_DIR/build/run/tshark" | grep -Eqi 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SRC_DIR="${{ steps.install.outputs.source_dir }}"

          python3 - <<'PY'
          from pathlib import Path
          hdr = bytes.fromhex("d4c3b2a1020004000000000000000000ffff000001000000")
          Path("/tmp/empty.pcap").write_bytes(hdr)
          PY

          "$SRC_DIR/build/run/capinfos" /tmp/empty.pcap >/tmp/wireshark-capinfos.txt 2>&1
          "$SRC_DIR/build/run/tshark" -r /tmp/empty.pcap >/tmp/wireshark-read.txt 2>&1

          if grep -q 'File type' /tmp/wireshark-capinfos.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/wireshark-capinfos.txt || true
            cat /tmp/wireshark-read.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${WIRESHARK_VERSION}"
          LATEST="${{ steps.version.outputs.latest || env.WIRESHARK_VERSION }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
          echo "regression_result=No newer stable Wireshark release is available for Arm64 validation" >> "$GITHUB_OUTPUT"
          echo "comparison=Wireshark ${CURRENT} is both the pinned Arm64 source baseline and the newest stable public Wireshark source release currently published, so there is no newer stable source tarball to validate in Test 6 yet." >> "$GITHUB_OUTPUT"
          echo "status=review" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"
          echo "Next version installed on Arm64: ${CURRENT}"
          echo "Regression install result: No newer stable Wireshark release is available for Arm64 validation"
          echo "Details: Wireshark ${CURRENT} is both the pinned Arm64 source baseline and the newest stable public Wireshark source release currently published, so there is no newer stable source tarball to validate in Test 6 yet."
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_review_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              if [ "$status" = "failed" ]; then
                FAILED=$((FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          add_review_any "${{ steps.test6.outputs.status || 'review' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'review' }}" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Resolve job URL
        if: always()
        id: job_url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=""
          if command -v gh >/dev/null 2>&1; then
            JOB_URL=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID\" or (.name | endswith(\" / $JOB_ID\"))) | .html_url" | head -n 1)
          fi
          if [ -z "$JOB_URL" ] && command -v python3 >/dev/null 2>&1; then
            JOB_URL=$(JOB_ID="$JOB_ID" python3 -c 'import json, os, urllib.request; repo=os.environ["GITHUB_REPOSITORY"]; run_id=os.environ["GITHUB_RUN_ID"]; token=os.environ["GH_TOKEN"]; job_id=os.environ["JOB_ID"]; req=urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"}); data=json.load(urllib.request.urlopen(req, timeout=30)); print(next((j.get("html_url", "") for j in data.get("jobs", []) if j.get("name", "") == job_id or j.get("name", "").endswith(f" / {job_id}")), ""))')
          fi
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=$JOB_URL" >> "$GITHUB_OUTPUT"

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          JOB_URL="${JOB_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          cat > test-results/wireshark.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Wireshark",
              "version": "${{ steps.version.outputs.version || env.WIRESHARK_VERSION }}",
              "language": "C",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.job_url.outputs.url }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check tshark binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check exact version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'review' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || env.WIRESHARK_VERSION }}", "latest_version": "${{ steps.test6.outputs.latest_version || env.WIRESHARK_VERSION }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || env.WIRESHARK_VERSION }}", "decision": "${{ steps.test6.outputs.decision || 'no_newer_stable_available' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wireshark-test-results
          path: test-results/wireshark.json
          retention-days: 10
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Wireshark Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.WIRESHARK_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.WIRESHARK_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
