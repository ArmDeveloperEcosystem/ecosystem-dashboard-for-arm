name: Test Spring Cloud Task on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-spring_cloud_task.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-spring_cloud_task.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-spring_cloud_task.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-spring_cloud_task.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-spring_cloud_task.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-spring_cloud_task.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-spring_cloud_task.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-spring_cloud_task.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-spring_cloud_task.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-spring_cloud_task.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-spring_cloud_task.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-spring_cloud_task.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-spring_cloud_task.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-spring_cloud_task.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-spring_cloud_task.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-spring_cloud_task.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-spring_cloud_task.outputs.timestamp }}
jobs:
  test-spring_cloud_task:
    runs-on: ubuntu-24.04-arm
    env:
      SPRING_CLOUD_TASK_VERSION: "3.0.0"
      SPRING_CLOUD_TASK_NEXT_VERSION: "5.0.1"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Spring Cloud Task'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spring_cloud_task" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spring_cloud_task" >> "$GITHUB_OUTPUT"
      - name: Install Spring Cloud Task (Verification)
        id: install
        run: |
          set -euo pipefail
          echo "Verifying Spring Cloud Task availability..."
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "maven openjdk-17-jdk"
          mkdir -p /tmp/spring-task-smoke/src/main/java/smoke /tmp/spring-task-smoke/src/test/java/smoke
          cat >/tmp/spring-task-smoke/pom.xml <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>smoke</groupId>
            <artifactId>spring-task-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <java.version>17</java.version>
              <spring-boot.version>3.0.13</spring-boot.version>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <dependencyManagement>
              <dependencies>
                <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-dependencies</artifactId>
                  <version>\${spring-boot.version}</version>
                  <type>pom</type>
                  <scope>import</scope>
                </dependency>
              </dependencies>
            </dependencyManagement>
            <dependencies>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-starter-task</artifactId>
                <version>${SPRING_CLOUD_TASK_VERSION}</version>
              </dependency>
              <dependency>
                <groupId>com.h2database</groupId>
                <artifactId>h2</artifactId>
                <scope>runtime</scope>
              </dependency>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-test</artifactId>
                <scope>test</scope>
              </dependency>
            </dependencies>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-compiler-plugin</artifactId>
                  <version>3.12.1</version>
                  <configuration>
                    <release>17</release>
                  </configuration>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF
          cat >/tmp/spring-task-smoke/src/main/java/smoke/TaskSmokeApplication.java <<'EOF'
          package smoke;

          import java.util.concurrent.atomic.AtomicBoolean;
          import org.springframework.boot.CommandLineRunner;
          import org.springframework.boot.SpringApplication;
          import org.springframework.boot.autoconfigure.SpringBootApplication;
          import org.springframework.cloud.task.configuration.EnableTask;

          @EnableTask
          @SpringBootApplication
          public class TaskSmokeApplication implements CommandLineRunner {
            static final AtomicBoolean RAN = new AtomicBoolean(false);

            public static void main(String[] args) {
              SpringApplication.run(TaskSmokeApplication.class, args);
            }

            @Override
            public void run(String... args) {
              RAN.set(true);
              System.out.println("task-ok");
            }
          }
          EOF
          cat >/tmp/spring-task-smoke/src/test/java/smoke/TaskSmokeTest.java <<'EOF'
          package smoke;

          import org.junit.jupiter.api.Test;
          import org.springframework.beans.factory.annotation.Autowired;
          import org.springframework.boot.test.context.SpringBootTest;
          import org.springframework.context.ApplicationContext;

          import static org.assertj.core.api.Assertions.assertThat;

          @SpringBootTest(args = "--spring.cloud.task.name=arm64-smoke")
          class TaskSmokeTest {
            @Autowired
            ApplicationContext context;

            @Test
            void startsTaskEnabledApplication() {
              assertThat(context.getBean(TaskSmokeApplication.class)).isNotNull();
              assertThat(TaskSmokeApplication.RAN.get()).isTrue();
            }
          }
          EOF
          cd /tmp/spring-task-smoke
          if mvn -B -q dependency:resolve -DincludeArtifactIds=spring-cloud-starter-task; then
            echo "Spring Cloud Task dependencies resolved successfully"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Dependency resolution failed"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      
      - name: Get Spring Cloud Task version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(awk '
            /<dependency>/ { in_dep=1; dep_match=0; art_match=0; next }
            /<\/dependency>/ {
              if (in_dep && dep_match && art_match) exit
              in_dep=0; dep_match=0; art_match=0; next
            }
            in_dep && /<groupId>org.springframework.cloud<\/groupId>/ { dep_match=1; next }
            in_dep && /<artifactId>spring-cloud-starter-task<\/artifactId>/ { art_match=1; next }
            in_dep && dep_match && art_match && /<version>/ {
              line=$0
              sub(/^.*<version>/, "", line)
              sub(/<\/version>.*$/, "", line)
              gsub(/[[:space:]]/, "", line)
              print line
              exit
            }
          ' /tmp/spring-task-smoke/pom.xml || true)
          if [ -z "$VERSION" ]; then
            VERSION="${SPRING_CLOUD_TASK_VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Spring Cloud Task version: $VERSION"
      
      - name: Test 1 - Check jar files exist in local repo
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if find ~/.m2/repository/org/springframework/cloud/spring-cloud-starter-task -name "spring-cloud-starter-task-${SPRING_CLOUD_TASK_VERSION}.jar" | grep -q ".jar"; then
            echo "✓ JAR files found in local repository"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ JAR files not found"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 2 - Check dependency tree
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/spring-task-smoke
          if mvn -B -q dependency:tree | grep -q "spring-cloud-starter-task"; then
            echo "✓ dependency tree verified"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ dependency tree verification failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 3 - Compile Spring Cloud Task app
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/spring-task-smoke
          if mvn -B -q test-compile; then
            echo "✓ project compiled successfully with Spring Cloud Task"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ build failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      # Architecture Verification
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/spring-task-smoke
          if mvn -B -q test; then
            echo "✓ Spring Cloud Task tiny app unit test passed"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Spring Cloud Task unit test failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${SPRING_CLOUD_TASK_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured Spring Cloud Task baseline ${CURRENT} matches the Test 6 candidate ${LATEST}; repin baseline older than the candidate to validate an upgrade." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          NEXT_PROJECT=$(mktemp -d)
          cp -R /tmp/spring-task-smoke/. "$NEXT_PROJECT/"
          SPRING_CLOUD_TASK_VERSION="${SPRING_CLOUD_TASK_VERSION}" LATEST="${LATEST}" perl -0pi -e 'BEGIN { $from = "<version>$ENV{SPRING_CLOUD_TASK_VERSION}</version>"; $to = "<version>$ENV{LATEST}</version>"; } s/\Q$from\E/$to/ or die "starter version not replaced\n";' "$NEXT_PROJECT/pom.xml"
          if (cd "$NEXT_PROJECT" && mvn -B -q test); then
            echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed and ran successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current Spring Cloud Task ${CURRENT} completed a tiny @EnableTask Spring unit test. Test 6 installed starter ${LATEST} in a copied smoke project and ran the same Maven unit test on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install/runtime failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current Spring Cloud Task ${CURRENT} passed baseline smoke tests, but starter ${LATEST} did not complete the same Maven unit test on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Test 1 - Check jar files exist in local repo
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Test 2 - Check dependency tree
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Test 3 - Compile Spring Cloud Task app
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Test 4 - Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Test 5 - Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Spring Cloud Task Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check jar files exist in local repo: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check dependency tree: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Compile Spring Cloud Task app: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
