name: Test Apache Portable Runtime (APR) on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-apr.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-apr.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-apr.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-apr.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-apr.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-apr.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-apr.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-apr.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-apr.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-apr.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-apr.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-apr.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-apr.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-apr.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-apr.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-apr.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-apr.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-apr.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-apr.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-apr.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-apr.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-apr.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-apr.outputs.timestamp }}
jobs:
  test-apr:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache Portable Runtime (APR)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=apr" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/apr" >> "$GITHUB_OUTPUT"
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf
      
      - name: Install APR
        id: install
        run: |
          echo "Installing APR..."
          
          # Dashboard-aligned aged stable baseline
          APR_VERSION=1.7.5
          wget https://archive.apache.org/dist/apr/apr-${APR_VERSION}.tar.gz
          tar -xzf apr-${APR_VERSION}.tar.gz
          
          # Set APR_SRC
          echo "APR_SRC=$PWD/apr-${APR_VERSION}" >> $GITHUB_ENV
          
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get APR version
        id: version
        run: |
          VERSION="1.7.5"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected APR version: $VERSION"
      
      - name: Test 1 - Configure
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd $APR_SRC
          if ./configure; then
            echo "✓ configure works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ configure failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Compile (Make)
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd $APR_SRC
          if make; then
             echo "✓ make works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ make failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run Tests (Make Test)
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd $APR_SRC
          # make test runs a suite of tests
          if make test; then
             echo "✓ make test works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ make test failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Install (Dry Run)
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd $APR_SRC
          # We don't want to actually install to system if not needed, but we can try to install to a local dir
          if make install DESTDIR=$PWD/install_test; then
             echo "✓ make install works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ make install failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Check Installed Libs
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          
          cd $APR_SRC
          if [ -f "install_test/usr/local/apr/lib/libapr-1.so" ] || [ -f "install_test/usr/local/apr/lib/libapr-1.a" ]; then
             echo "✓ installed libs found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ installed libs not found"
             find install_test
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_VERSION=$(CURRENT="$CURRENT" python3 - <<'PY'
          import re, urllib.request
          import os
          current = os.environ['CURRENT']
          html = urllib.request.urlopen('https://archive.apache.org/dist/apr/').read().decode()
          versions = sorted(
              set(re.findall(r'apr-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz', html)),
              key=lambda s: [int(x) for x in s.split('.')]
          )
          current_key = [int(x) for x in current.split('.')]
          candidates = [v for v in versions if [int(x) for x in v.split('.')] > current_key]
          print(candidates[0] if candidates else '')
          PY
          )
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$NEXT_VERSION" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned APR version ${CURRENT} passed smoke tests in this run, but the next regression candidate could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned APR version ${CURRENT} passed smoke tests in this run, but the next regression candidate could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/apr-${NEXT_VERSION}.tar.gz"
          NEXT_SRC="$NEXT_DIR/apr-${NEXT_VERSION}"
          NEXT_PREFIX="/usr/local/apr-regression"
          NEXT_URL="https://archive.apache.org/dist/apr/apr-${NEXT_VERSION}.tar.gz"
          if curl -fsSLo "$NEXT_TAR" "$NEXT_URL"; then
            tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
            (
              cd "$NEXT_SRC"
              ./configure --prefix="$NEXT_PREFIX" >/tmp/apr-next-configure.log 2>&1
              make -j"$(nproc)" >/tmp/apr-next-make.log 2>&1
              make install DESTDIR="$NEXT_DIR/install_test" >/tmp/apr-next-install.log 2>&1
            )
            NEXT_CONFIG="$NEXT_DIR/install_test${NEXT_PREFIX}/bin/apr-1-config"
            if [ -x "$NEXT_CONFIG" ]; then
              NEXT_INSTALLED_VERSION=$("$NEXT_CONFIG" --version 2>/dev/null || true)
            else
              NEXT_INSTALLED_VERSION=""
            fi
            if [ "$NEXT_INSTALLED_VERSION" = "$NEXT_VERSION" ]; then
              echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned APR version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate version ${NEXT_VERSION} on Arm64, built it successfully, and the installed apr-1-config reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned APR version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate version ${NEXT_VERSION} on Arm64, built it successfully, and the installed apr-1-config reported version ${NEXT_INSTALLED_VERSION}."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/apr-next-configure.log || true
              cat /tmp/apr-next-make.log || true
              cat /tmp/apr-next-install.log || true
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned APR version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} did not build/install into a usable Arm64 prefix." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned APR version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} did not build/install into a usable Arm64 prefix."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned APR version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned APR version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Configure
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Compile (Make)
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run Tests (Make Test)
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Install (Dry Run)
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Check Installed Libs
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.test1.outputs.status }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status }}" != "passed" ] || \
             [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "## Apache Portable Runtime (APR) Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Configure: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Compile (Make): ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Run Tests (Make Test): ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Install (Dry Run): ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Check Installed Libs: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Support badge is based on Tests 1-5:** yes" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY

