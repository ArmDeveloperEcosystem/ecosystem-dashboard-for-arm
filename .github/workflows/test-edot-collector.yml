name: Test Elastic Distribution of OpenTelemetry (EDOT) Collector on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-edot-collector.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-edot-collector.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-edot-collector.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-edot-collector.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-edot-collector.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-edot-collector.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-edot-collector.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-edot-collector.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-edot-collector.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-edot-collector.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-edot-collector.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-edot-collector.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-edot-collector.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-edot-collector.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-edot-collector.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-edot-collector.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-edot-collector.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-edot-collector.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-edot-collector.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-edot-collector.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-edot-collector.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-edot-collector.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-edot-collector.outputs.timestamp }}
jobs:
  test-edot-collector:
    runs-on: ubuntu-24.04-arm
    env:
      EDOT_VERSION: "9.2.0"
      EDOT_NEXT_VERSION: "9.2.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Elastic Distribution of OpenTelemetry (EDOT) Collector'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=edot-collector" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/edot-collector" >> "$GITHUB_OUTPUT"
      - name: Install EDOT Collector bundle
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="${EDOT_VERSION}"
          INSTALL_DIR="/opt/edot-collector-${CURRENT_VERSION}"
          sudo rm -rf "$INSTALL_DIR"
          sudo mkdir -p "$INSTALL_DIR"
          curl -fsSL "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-${CURRENT_VERSION}-linux-arm64.tar.gz" -o "/tmp/elastic-agent-${CURRENT_VERSION}-linux-arm64.tar.gz"
          sudo tar -xzf "/tmp/elastic-agent-${CURRENT_VERSION}-linux-arm64.tar.gz" --strip-components=1 -C "$INSTALL_DIR"
          sudo tee /usr/local/bin/edot-collector >/dev/null <<EOF
          #!/usr/bin/env bash
          exec "${INSTALL_DIR}/otelcol" "\$@"
          EOF
          sudo chmod +x /usr/local/bin/edot-collector
          if [ -x "$INSTALL_DIR/otelcol" ] && [ -x "$INSTALL_DIR/elastic-agent" ] && [ -x "/usr/local/bin/edot-collector" ]; then
            echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
            echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get EDOT Collector version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.install_dir }}/elastic-agent" version --binary-only 2>&1 | sed -n 's/.*Binary: \([0-9.]*\).*/\1/p' | head -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check EDOT wrapper exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "/usr/local/bin/edot-collector" ] && [ -x "${{ steps.install.outputs.install_dir }}/otelcol" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check embedded package version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.install_dir }}/elastic-agent" version --binary-only 2>&1 | grep -q "Binary: ${EDOT_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.install_dir }}/elastic-agent" version --binary-only 2>&1 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check collector help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if /usr/local/bin/edot-collector --help >/tmp/edot-help.log 2>&1 && grep -Eqi 'usage|collector|otlp' /tmp/edot-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/edot-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMPONENT=$(find "${{ steps.install.outputs.install_dir }}/data" -path '*/components/pf-elastic-collector' -type f | head -n 1)
          if [ "$(uname -m)" = "aarch64" ] && [ -n "$COMPONENT" ] && file "$COMPONENT" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$COMPONENT" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMPONENT=$(find "${{ steps.install.outputs.install_dir }}/data" -path '*/components/pf-elastic-collector' -type f | head -n 1)
          if [ -x "$COMPONENT" ] \
            && [ -f "${{ steps.install.outputs.install_dir }}/otel.yml" ] \
            && [ -f "${{ steps.install.outputs.install_dir }}/otel_samples/gateway.yml" ] \
            && grep -q '^service:' "${{ steps.install.outputs.install_dir }}/otel_samples/gateway.yml" \
            && /usr/local/bin/edot-collector --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.install.outputs.baseline_version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          LATEST="${EDOT_NEXT_VERSION}"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_DIR=$(mktemp -d)
          curl -fsSL "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-${LATEST}-linux-arm64.tar.gz" -o "$NEXT_DIR/elastic-agent-${LATEST}-linux-arm64.tar.gz"
          tar -xzf "$NEXT_DIR/elastic-agent-${LATEST}-linux-arm64.tar.gz" --strip-components=1 -C "$NEXT_DIR"
          COMPONENT=$(find "$NEXT_DIR/data" -path '*/components/pf-elastic-collector' -type f | head -n 1)
          NEXT_REPORTED=$("$NEXT_DIR/elastic-agent" version --binary-only 2>&1 | sed -n 's/.*Binary: \([0-9.]*\).*/\1/p' | head -n 1 || true)

          if [ -x "$NEXT_DIR/otelcol" ] \
            && [ -x "$NEXT_DIR/elastic-agent" ] \
            && [ -x "$COMPONENT" ] \
            && file "$COMPONENT" | grep -Eqi 'aarch64|arm64' \
            && "$NEXT_DIR/otelcol" --help >/tmp/edot-next-help.log 2>&1 \
            && grep -Eqi 'usage|collector|otlp' /tmp/edot-next-help.log \
            && [ -n "$NEXT_REPORTED" ]; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned EDOT Collector bundle version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the latest Elastic Agent Arm64 bundle ${LATEST}, and the embedded collector wrapper plus pf-elastic-collector component validated successfully while the bundle reported version ${NEXT_REPORTED}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned EDOT Collector bundle version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the latest Elastic Agent Arm64 bundle ${LATEST}, and the embedded collector wrapper plus pf-elastic-collector component validated successfully while the bundle reported version ${NEXT_REPORTED}."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/edot-next-help.log || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned EDOT Collector bundle version ${CURRENT} passed smoke tests in this run, but the latest Elastic Agent Arm64 bundle ${LATEST} did not validate a usable embedded collector path on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned EDOT Collector bundle version ${CURRENT} passed smoke tests in this run, but the latest Elastic Agent Arm64 bundle ${LATEST} did not validate a usable embedded collector path on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## EDOT Collector Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check EDOT wrapper exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check embedded package version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check collector help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64." >> "$GITHUB_STEP_SUMMARY"
