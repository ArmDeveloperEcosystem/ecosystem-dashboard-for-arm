name: Test Live Syncing Daemon(Lsyncd) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-lsyncd.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-lsyncd.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-lsyncd.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-lsyncd.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-lsyncd.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-lsyncd.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-lsyncd.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-lsyncd.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-lsyncd.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-lsyncd.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-lsyncd.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-lsyncd.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-lsyncd.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-lsyncd.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-lsyncd.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-lsyncd.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-lsyncd.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-lsyncd.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-lsyncd.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-lsyncd.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-lsyncd.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-lsyncd.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-lsyncd.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/lsyncd.md"
      - ".github/workflows/test-lsyncd.yml"

jobs:
  test-lsyncd:
    runs-on: ubuntu-24.04-arm
    env:
      LSYNCD_VERSION: "2.3.0"
      LSYNCD_NEXT_VERSION: "2.3.1"
      LSYNCD_WORKDIR: "/tmp/lsyncd-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Live Syncing Daemon(Lsyncd)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=lsyncd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/lsyncd" >> "$GITHUB_OUTPUT"
      - name: Install Live Syncing Daemon(Lsyncd)
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config lua5.4 liblua5.4-dev rsync curl ca-certificates
          rm -rf "${LSYNCD_WORKDIR}"
          mkdir -p "${LSYNCD_WORKDIR}/bin"
          ln -sf /usr/bin/lua5.4 "${LSYNCD_WORKDIR}/bin/lua"
          ln -sf /usr/bin/luac5.4 "${LSYNCD_WORKDIR}/bin/luac"
          export PATH="${LSYNCD_WORKDIR}/bin:${PATH}"

          curl -fsSL -o "${LSYNCD_WORKDIR}/lsyncd-${LSYNCD_VERSION}.tar.gz" \
            "https://github.com/lsyncd/lsyncd/archive/refs/tags/v${LSYNCD_VERSION}.tar.gz"
          tar -xzf "${LSYNCD_WORKDIR}/lsyncd-${LSYNCD_VERSION}.tar.gz" -C "${LSYNCD_WORKDIR}"

          BASE_DIR="${LSYNCD_WORKDIR}/lsyncd-${LSYNCD_VERSION}"
          cmake -S "${BASE_DIR}" -B "${BASE_DIR}/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA_EXECUTABLE="${LSYNCD_WORKDIR}/bin/lua" \
            -DLUA_COMPILER="${LSYNCD_WORKDIR}/bin/luac"
          cmake --build "${BASE_DIR}/build" -j"$(nproc)"

          test -x "${BASE_DIR}/build/lsyncd"
          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "tool_dir=${LSYNCD_WORKDIR}/bin" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Live Syncing Daemon(Lsyncd) version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/build/lsyncd" --version | awk '/Version:/ {print $2; exit}')
          LATEST="${LSYNCD_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Lsyncd version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check lsyncd binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -x "${BASE_DIR}/build/lsyncd" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/build/lsyncd" --version | awk '/Version:/ {print $2; exit}')
          if [ "$VERSION" = "${LSYNCD_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_DIR}/build/lsyncd" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if timeout 5s "${BASE_DIR}/build/lsyncd" --help > /tmp/lsyncd-help.txt 2>&1 || true; then
            :
          fi
          if grep -Eq "USAGE:|Usage:|usage:" /tmp/lsyncd-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/lsyncd-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_DIR}/build/lsyncd" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_DIR}/build/lsyncd" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/lsyncd-functional"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}/src" "${ROOT}/dst"
          printf 'baseline-sync\n' > "${ROOT}/src/file.txt"
          cat > "${ROOT}/lsyncd.lua" <<CFG
          settings { nodaemon = true }
          sync {
            default.rsync,
            source = "${ROOT}/src",
            target = "${ROOT}/dst",
            delay = 1,
          }
          CFG

          timeout 8s "${BASE_DIR}/build/lsyncd" "${ROOT}/lsyncd.lua" > "${ROOT}/lsyncd.log" 2>&1 || true
          sleep 2

          if [ -f "${ROOT}/dst/file.txt" ] && cmp -s "${ROOT}/src/file.txt" "${ROOT}/dst/file.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${ROOT}/lsyncd.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          TOOL_DIR="${{ steps.install.outputs.tool_dir }}"
          REGRESSION_WORKDIR="/tmp/lsyncd-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          export PATH="${TOOL_DIR}:${PATH}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/lsyncd-${LATEST}.tar.gz" \
            "https://github.com/lsyncd/lsyncd/archive/refs/tags/v${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/lsyncd-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/lsyncd-${LATEST}"
          cmake -S "${NEXT_DIR}" -B "${NEXT_DIR}/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA_EXECUTABLE="${TOOL_DIR}/lua" \
            -DLUA_COMPILER="${TOOL_DIR}/luac" >/dev/null
          cmake --build "${NEXT_DIR}/build" -j"$(nproc)" >/dev/null
          NEXT_VERSION=$("${NEXT_DIR}/build/lsyncd" --version | awk '/Version:/ {print $2; exit}' || true)

          ROOT="/tmp/lsyncd-regression-functional"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}/src" "${ROOT}/dst"
          printf 'candidate-sync\n' > "${ROOT}/src/file.txt"
          cat > "${ROOT}/lsyncd.lua" <<CFG
          settings { nodaemon = true }
          sync {
            default.rsync,
            source = "${ROOT}/src",
            target = "${ROOT}/dst",
            delay = 1,
          }
          CFG

          timeout 8s "${NEXT_DIR}/build/lsyncd" "${ROOT}/lsyncd.lua" > "${ROOT}/lsyncd.log" 2>&1 || true
          sleep 2

          if [ "$NEXT_VERSION" = "$LATEST" ] && [ -f "${ROOT}/dst/file.txt" ] && cmp -s "${ROOT}/src/file.txt" "${ROOT}/dst/file.txt"; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, the candidate binary reported version ${NEXT_VERSION}, and a real local rsync sync completed successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, the candidate binary reported version ${NEXT_VERSION}, and a real local rsync sync completed successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${ROOT}/lsyncd.log" || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not report the expected version or complete a usable local rsync sync on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Lsyncd version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not report the expected version or complete a usable local rsync sync on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Live Syncing Daemon(Lsyncd) Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check lsyncd binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
