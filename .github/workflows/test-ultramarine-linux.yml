name: Test Ultramarine Linux on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/ultramarine-linux.md"
      - ".github/workflows/test-ultramarine-linux.yml"

jobs:
  test-ultramarine-linux:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "43"
      DOWNLOAD_PAGE: "https://ultramarine-linux.org/download/"
      IMAGE_ROOT: "https://images.fyralabs.com/images/ultramarine"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ultramarine-linux" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ultramarine-linux" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Ultramarine Linux test dependencies
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl python3
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Resolve Ultramarine Linux versions
        id: version
        run: |
          set -euo pipefail
          LATEST=$(curl -fsSL -A 'Mozilla/5.0' "$DOWNLOAD_PAGE" | grep -Eo 'Latest Release:[[:space:]]*[0-9]+' | grep -Eo '[0-9]+' | head -n 1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="$BASELINE_VERSION"
          fi
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "baseline_image=${IMAGE_ROOT}/${BASELINE_VERSION}/base-base-disk-aarch64.img.zst" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${IMAGE_ROOT}/${BASELINE_VERSION}/base-base-disk-aarch64.img.zst.sha256sum" >> "$GITHUB_OUTPUT"
          echo "latest_image=${IMAGE_ROOT}/${LATEST}/base-base-disk-aarch64.img.zst" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${IMAGE_ROOT}/${LATEST}/base-base-disk-aarch64.img.zst.sha256sum" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Baseline artifact existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsIL "${{ steps.version.outputs.baseline_image }}" >/tmp/ultramarine-image.head
          curl -fsIL "${{ steps.version.outputs.baseline_sha }}" >/tmp/ultramarine-sha.head
          if grep -q '200' /tmp/ultramarine-image.head && grep -q '200' /tmp/ultramarine-sha.head; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline index validation
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${IMAGE_ROOT}/${BASELINE_VERSION}/" -o /tmp/ultramarine-index.html
          if grep -q 'base-base-disk-aarch64.img.zst' /tmp/ultramarine-index.html && \
             grep -q 'base-base-disk-aarch64.img.zst.sha256sum' /tmp/ultramarine-index.html; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Baseline checksum manifest validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o /tmp/ultramarine.sha256sum
          if grep -q 'base-base-disk-aarch64.img.zst' /tmp/ultramarine.sha256sum; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Baseline image validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SAMPLE=/tmp/ultramarine.sample
          curl -fsSL --range 0-4095 "${{ steps.version.outputs.baseline_image }}" -o "$SAMPLE"
          python3 - <<'PY'
          from pathlib import Path
          sample = Path("/tmp/ultramarine.sample").read_bytes()
          if len(sample) < 4 or sample[:4] != bytes.fromhex("28b52ffd"):
              raise SystemExit(1)
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          JOB_URL="${JOB_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          cat > test-results/ultramarine-linux.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Ultramarine Linux",
              "version": "${{ steps.version.outputs.version || env.BASELINE_VERSION }}",
              "language": "Operating System",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Baseline artifact existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Baseline index validation", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Baseline checksum manifest validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Baseline image validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultramarine-linux-test-results
          path: test-results/ultramarine-linux.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ultramarine Linux Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
