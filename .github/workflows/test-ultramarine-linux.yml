name: Test Ultramarine Linux on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ultramarine-linux.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ultramarine-linux.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ultramarine-linux.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ultramarine-linux.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ultramarine-linux.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ultramarine-linux.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ultramarine-linux.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ultramarine-linux.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ultramarine-linux.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ultramarine-linux.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ultramarine-linux.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ultramarine-linux.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ultramarine-linux.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ultramarine-linux.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ultramarine-linux.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ultramarine-linux.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ultramarine-linux.outputs.timestamp }}
jobs:
  test-ultramarine-linux:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "43"
      DOWNLOAD_PAGE: "https://ultramarine-linux.org/download/"
      IMAGE_ROOT: "https://images.fyralabs.com/images/ultramarine"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Ultramarine Linux'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ultramarine-linux" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ultramarine-linux" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Ultramarine Linux test dependencies
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl python3"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Resolve Ultramarine Linux versions
        id: version
        run: |
          set -euo pipefail
          LATEST_STABLE=$(curl -fsSL -A 'Mozilla/5.0' "$DOWNLOAD_PAGE" | grep -Eo 'Latest Release:[[:space:]]*[0-9]+' | grep -Eo '[0-9]+' | head -n 1 || true)
          if [ -z "$LATEST_STABLE" ]; then
            LATEST_STABLE="$BASELINE_VERSION"
          fi

          CANDIDATE="$BASELINE_VERSION"
          if [[ "$BASELINE_VERSION" =~ ^[0-9]+$ ]] && [[ "$LATEST_STABLE" =~ ^[0-9]+$ ]] && [ "$LATEST_STABLE" -gt "$BASELINE_VERSION" ]; then
            CANDIDATE="$((BASELINE_VERSION + 1))"
            if [ "$CANDIDATE" -gt "$LATEST_STABLE" ]; then
              CANDIDATE="$LATEST_STABLE"
            fi
          fi

          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${CANDIDATE}" >> "$GITHUB_OUTPUT"
          echo "latest_stable=${LATEST_STABLE}" >> "$GITHUB_OUTPUT"
          echo "baseline_image=${IMAGE_ROOT}/${BASELINE_VERSION}/base-base-disk-aarch64.img.zst" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${IMAGE_ROOT}/${BASELINE_VERSION}/base-base-disk-aarch64.img.zst.sha256sum" >> "$GITHUB_OUTPUT"
          echo "latest_image=${IMAGE_ROOT}/${CANDIDATE}/base-base-disk-aarch64.img.zst" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${IMAGE_ROOT}/${CANDIDATE}/base-base-disk-aarch64.img.zst.sha256sum" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Baseline artifact existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsIL "${{ steps.version.outputs.baseline_image }}" >/tmp/ultramarine-image.head
          curl -fsIL "${{ steps.version.outputs.baseline_sha }}" >/tmp/ultramarine-sha.head
          if grep -q '200' /tmp/ultramarine-image.head && grep -q '200' /tmp/ultramarine-sha.head; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline index validation
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${IMAGE_ROOT}/${BASELINE_VERSION}/" -o /tmp/ultramarine-index.html
          if grep -q 'base-base-disk-aarch64.img.zst' /tmp/ultramarine-index.html && \
             grep -q 'base-base-disk-aarch64.img.zst.sha256sum' /tmp/ultramarine-index.html; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Baseline checksum manifest validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o /tmp/ultramarine.sha256sum
          if grep -q 'base-base-disk-aarch64.img.zst' /tmp/ultramarine.sha256sum; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Baseline image validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SAMPLE=/tmp/ultramarine.sample
          curl -fsSL --range 0-4095 "${{ steps.version.outputs.baseline_image }}" -o "$SAMPLE"
          python3 - <<'PY'
          from pathlib import Path
          sample = Path("/tmp/ultramarine.sample").read_bytes()
          if len(sample) < 4 or sample[:4] != bytes.fromhex("28b52ffd"):
              raise SystemExit(1)
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          CURRENT="${{ steps.version.outputs.version || env.BASELINE_VERSION || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=manual_review_needed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Latest Ultramarine Linux release could not be resolved automatically in this run." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT}; latest release lookup unavailable." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer Ultramarine Linux release is available beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} matches latest ${LATEST}; next-version regression is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          NEXT_IMAGE="${{ steps.version.outputs.latest_image }}"
          NEXT_SHA="${{ steps.version.outputs.latest_sha }}"
          curl -fsIL "${NEXT_IMAGE}" >/tmp/ultramarine-next-image.head
          curl -fsIL "${NEXT_SHA}" >/tmp/ultramarine-next-sha.head
          curl -fsSL "${NEXT_SHA}" -o "$TMPDIR/next.sha256sum"
          grep "base-base-disk-aarch64.img.zst" "$TMPDIR/next.sha256sum" > "$TMPDIR/next.sha"
          curl -fsSL --range 0-4095 "${NEXT_IMAGE}" -o "$TMPDIR/next.sample"
          export NEXT_SAMPLE_PATH="$TMPDIR/next.sample"
          python3 - <<'PY'
          import os
          from pathlib import Path
          sample = Path(os.environ["NEXT_SAMPLE_PATH"]).read_bytes()
          if len(sample) < 4 or sample[:4] != bytes.fromhex("28b52ffd"):
              raise SystemExit(1)
          PY

          if grep -q '200' /tmp/ultramarine-next-image.head && grep -q '200' /tmp/ultramarine-next-sha.head; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=validated_next_release_metadata" >> "$GITHUB_OUTPUT"
            echo "regression_result=Validated latest Ultramarine Linux image artifacts and checksum metadata for the next release." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed full baseline checks; next ${LATEST} artifact presence, checksum listing, and image-header sanity checks passed." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_artifact_validation_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next Ultramarine Linux artifact metadata validation failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed, but next ${LATEST} artifact or checksum validation did not pass." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ultramarine Linux Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
