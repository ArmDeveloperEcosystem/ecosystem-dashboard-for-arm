name: Test BeeGFS on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/beegfs.md'
      - '.github/workflows/test-beeGFS.yml'

jobs:
  test-beegfs:
    runs-on: ubuntu-24.04-arm
    env:
      BEEGFS_VERSION: "7.4.5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=beegfs" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/beeGFS" >> "$GITHUB_OUTPUT"

      - name: Install BeeGFS
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg2

          wget -qO- "https://www.beegfs.io/release/beegfs_${BEEGFS_VERSION}/gpg/GPG-KEY-beegfs" \
            | gpg --dearmor --batch --yes \
            | sudo tee /usr/share/keyrings/beegfs-archive-keyring.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/beegfs-archive-keyring.gpg] https://www.beegfs.io/release/beegfs_${BEEGFS_VERSION} noble non-free" \
            | sudo tee /etc/apt/sources.list.d/beegfs.list >/dev/null

          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y beegfs-utils beegfs-common

      - name: Get BeeGFS version
        id: version
        run: |
          VERSION=$(beegfs-fsck --help 2>&1 | awk '/Version:/ {print $2; exit}')
          echo "version=${VERSION:-$BEEGFS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v beegfs-ctl >/dev/null 2>&1 && command -v beegfs-fsck >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if beegfs-fsck --help 2>&1 | grep -q "Version: ${{ steps.version.outputs.version }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -d /etc/beegfs ] && beegfs-fsck --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          beegfs-net 2>&1 | tee /tmp/beegfs-net.out
          if grep -Eq "No active BeeGFS mounts found|df: no file systems processed" /tmp/beegfs-net.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.BEEGFS_VERSION || 'unknown' }}"
          NEXT_INSTALLED="not_installed"
          DECISION="next_lookup_failed"
          REGRESSION_RESULT="Next version lookup failed on Arm64"
          COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run, but the next stable upstream BeeGFS release family could not be resolved automatically."

          LATEST_FAMILY=$(python3 - <<'PY'
          import re, urllib.request
          html = urllib.request.urlopen("https://www.beegfs.io/release/", timeout=30).read().decode()
          family = ""
          for line in html.splitlines():
              if "[LATEST STABLE]" in line:
                  match = re.search(r'beegfs_([0-9]+\.[0-9]+)/', line)
                  if match:
                      family = match.group(1)
                      break
          if not family:
              families = sorted(
                  set(re.findall(r'beegfs_([0-9]+\.[0-9]+)/', html)),
                  key=lambda s: [int(x) for x in s.split('.')]
              )
              family = families[-1] if families else ""
          print(family)
          PY
          )

          if [ -n "$LATEST_FAMILY" ]; then
            KEYRING="/usr/share/keyrings/beegfs-regression-archive-keyring.gpg"
            LIST_FILE="/etc/apt/sources.list.d/beegfs-regression.list"

            sudo rm -f "$KEYRING" "$LIST_FILE"
            wget -qO- "https://www.beegfs.io/release/beegfs_${LATEST_FAMILY}/gpg/GPG-KEY-beegfs" \
              | gpg --dearmor --batch --yes \
              | sudo tee "$KEYRING" >/dev/null

            echo "deb [signed-by=${KEYRING}] https://www.beegfs.io/release/beegfs_${LATEST_FAMILY} noble non-free" \
              | sudo tee "$LIST_FILE" >/dev/null

            if sudo apt-get update >/tmp/beegfs-regression-apt-update.log 2>&1; then
              LATEST_RAW=$(apt-cache show beegfs-tools 2>/dev/null | awk '/^Version:/ {print $2; exit}')
              LATEST="${LATEST_RAW#*:}"
              if [ -n "$LATEST" ] && [ "$LATEST" != "$LATEST_RAW" ]; then
                if [ "$CURRENT" = "$LATEST" ]; then
                  NEXT_INSTALLED="$CURRENT"
                  DECISION="baseline_matches_latest_stable"
                  REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                  COMPARISON="Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release."
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                else
                  NEXT_WORKDIR=$(mktemp -d)
                  if (cd "$NEXT_WORKDIR" && apt download "beegfs-utils=${LATEST_RAW}" "beegfs-tools=${LATEST_RAW}" >/tmp/beegfs-regression-download.log 2>&1); then
                    NEXT_ROOT=$(mktemp -d)
                    find "$NEXT_WORKDIR" -maxdepth 1 -name '*.deb' -print0 | while IFS= read -r -d '' deb; do
                      dpkg-deb -x "$deb" "$NEXT_ROOT"
                    done

                    NEXT_BIN="$NEXT_ROOT/opt/beegfs/sbin/beegfs"
                    NEXT_FSCK="$NEXT_ROOT/opt/beegfs/sbin/beegfs-fsck"
                    if [ -x "$NEXT_BIN" ] && [ -x "$NEXT_FSCK" ]; then
                      NEXT_INSTALLED=$("$NEXT_BIN" version 2>&1 | sed -n 's/^Version: \([0-9][0-9.]*\).*/\1/p' | head -n 1 || true)
                      if [ -n "$NEXT_INSTALLED" ] && [ "$NEXT_INSTALLED" = "$LATEST" ]; then
                        DECISION="next_install_validated"
                        REGRESSION_RESULT="Next version installed successfully on Arm64"
                        COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run. Regression validation downloaded and extracted the latest stable BeeGFS ${LATEST_FAMILY} packages on Arm64, and the candidate CLI reported version ${NEXT_INSTALLED}."
                        echo "status=passed" >> "$GITHUB_OUTPUT"
                      else
                        NEXT_INSTALLED="${NEXT_INSTALLED:-unknown}"
                        DECISION="next_install_failed"
                        REGRESSION_RESULT="Next version installed but reported a version mismatch on Arm64"
                        COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run, but the regression candidate from BeeGFS ${LATEST_FAMILY} reported version ${NEXT_INSTALLED} instead of the expected ${LATEST} on Arm64."
                        echo "status=failed" >> "$GITHUB_OUTPUT"
                      fi
                    else
                      NEXT_INSTALLED="install_failed"
                      DECISION="next_install_failed"
                      REGRESSION_RESULT="Next version install failed on Arm64"
                      COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run, but the latest stable BeeGFS ${LATEST_FAMILY} candidate did not extract the expected Arm64 CLI binaries."
                      echo "status=failed" >> "$GITHUB_OUTPUT"
                    fi
                  else
                    NEXT_INSTALLED="install_failed"
                    DECISION="next_install_failed"
                    REGRESSION_RESULT="Next version install failed on Arm64"
                    COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run, but the latest stable BeeGFS ${LATEST_FAMILY} candidate packages could not be downloaded for Arm64."
                    echo "status=failed" >> "$GITHUB_OUTPUT"
                  fi
                fi
              else
                LATEST="lookup_failed"
              fi
            else
              LATEST="lookup_failed"
            fi
          else
            LATEST="lookup_failed"
          fi

          if [ "$LATEST" = "lookup_failed" ]; then
            NEXT_INSTALLED="lookup_failed"
            DECISION="next_lookup_failed"
            REGRESSION_RESULT="Next version lookup failed on Arm64"
            COMPARISON="Current pinned BeeGFS version ${CURRENT} passed smoke tests in this run, but the latest stable upstream BeeGFS candidate could not be resolved into a usable Arm64 package version automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          STATUS="passed"
          if [ "$DECISION" = "next_lookup_failed" ] || [ "$DECISION" = "next_install_failed" ]; then
            STATUS="failed"
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "regression_result=$REGRESSION_RESULT" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"
          echo "Next version installed on Arm64: $NEXT_INSTALLED"
          echo "Regression install result: $REGRESSION_RESULT"
          echo "Details: $COMPARISON"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          mkdir -p test-results
          cat > test-results/beeGFS.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "BeeGFS",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Storage"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Help Or Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'unknown' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable.' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beegfs-test-results
          path: test-results/beeGFS.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "## BeeGFS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"


          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge status is determined by Tests 1-5. Test 6 reports next-version install readiness separately." >> "$GITHUB_STEP_SUMMARY"
