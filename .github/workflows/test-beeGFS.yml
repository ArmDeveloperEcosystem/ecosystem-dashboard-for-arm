name: Test BeeGFS on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-beegfs.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-beegfs.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-beegfs.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-beegfs.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-beegfs.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-beegfs.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-beegfs.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-beegfs.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-beegfs.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-beegfs.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-beegfs.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-beegfs.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-beegfs.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-beegfs.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-beegfs.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-beegfs.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-beegfs.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-beegfs.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-beegfs.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-beegfs.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-beegfs.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-beegfs.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-beegfs.outputs.timestamp }}
jobs:
  test-beegfs:
    runs-on: ubuntu-24.04-arm
    env:
      BEEGFS_VERSION: "8.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'BeeGFS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=beeGFS" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/beeGFS" >> "$GITHUB_OUTPUT"
      - name: Install BeeGFS
        id: install
        run: |
          sudo rm -f /etc/apt/sources.list.d/beegfs*.list /usr/share/keyrings/beegfs*.gpg
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg2

          wget -qO- "https://www.beegfs.io/release/beegfs_${BEEGFS_VERSION}/gpg/GPG-KEY-beegfs" \
            | gpg --dearmor --batch --yes \
            | sudo tee /usr/share/keyrings/beegfs-archive-keyring.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/beegfs-archive-keyring.gpg] https://www.beegfs.io/release/beegfs_${BEEGFS_VERSION} noble non-free" \
            | sudo tee /etc/apt/sources.list.d/beegfs.list >/dev/null

          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y beegfs-utils beegfs-tools

      - name: Get BeeGFS version
        id: version
        run: |
          VERSION=$(dpkg-query -W -f='${Version}' beegfs-utils 2>/dev/null | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(beegfs-fsck --help 2>&1 | awk '/Version:/ {print $2; exit}')
          fi
          echo "version=${VERSION:-$BEEGFS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v beegfs-fsck >/dev/null 2>&1 && { command -v beegfs-ctl >/dev/null 2>&1 || [ -x /opt/beegfs/sbin/beegfs ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(beegfs-fsck --help 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/beegfs-version-check.out
          if printf '%s\n' "$OUTPUT" | grep -Eq "Version:[[:space:]]*${{ steps.version.outputs.version }}|BeeGFS|beegfs-fsck|fsck" \
            || { command -v beegfs-ctl >/dev/null 2>&1 && beegfs-ctl --version >/tmp/beegfs-ctl-version.out 2>&1; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/beegfs-version-check.out || true
            cat /tmp/beegfs-ctl-version.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          beegfs-fsck --help > /tmp/beegfs-fsck-help.out 2>&1 || true
          { /opt/beegfs/sbin/beegfs --help > /tmp/beegfs-main-help.out 2>&1 \
            || /opt/beegfs/sbin/beegfs-ctl --help > /tmp/beegfs-main-help.out 2>&1 \
            || beegfs-ctl --help > /tmp/beegfs-main-help.out 2>&1; } || true
          if grep -Eqi 'beegfs|BeeGFS|usage|version|beegfs-fsck|fsck' /tmp/beegfs-fsck-help.out \
            || grep -Eqi 'beegfs|BeeGFS|usage|version|beegfs-ctl|ctl' /tmp/beegfs-main-help.out \
            || { command -v beegfs-fsck >/dev/null 2>&1 && command -v beegfs-ctl >/dev/null 2>&1; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/beegfs-fsck-help.out || true
            cat /tmp/beegfs-main-help.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          { beegfs-fsck --help 2>&1 | tee /tmp/beegfs-version.out; } || true
          if grep -q "Version: ${{ steps.version.outputs.version }}" /tmp/beegfs-version.out \
            || grep -Eqi 'BeeGFS|beegfs-fsck|usage' /tmp/beegfs-version.out \
            || { command -v beegfs-ctl >/dev/null 2>&1 && beegfs-ctl --help >/tmp/beegfs-ctl-help.out 2>&1 && grep -Eqi 'BeeGFS|beegfs-ctl|usage' /tmp/beegfs-ctl-help.out; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/beegfs-version.out || true
            cat /tmp/beegfs-ctl-help.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## BeeGFS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
