name: Test Anolis OS on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-anolis-os.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-anolis-os.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-anolis-os.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-anolis-os.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-anolis-os.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-anolis-os.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-anolis-os.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-anolis-os.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-anolis-os.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-anolis-os.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-anolis-os.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-anolis-os.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-anolis-os.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-anolis-os.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-anolis-os.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-anolis-os.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-anolis-os.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-anolis-os.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-anolis-os.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-anolis-os.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-anolis-os.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-anolis-os.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-anolis-os.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/anolis-os.md'
      - '.github/workflows/test-anolis-os.yml'

jobs:
  test-anolis-os:
    runs-on: ubuntu-24.04-arm
    env:
      ANOLIS_BASELINE_TAG: "23"
      ANOLIS_NEXT_TAG: "23.4"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Anolis OS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=anolis-os" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/anolis-os" >> "$GITHUB_OUTPUT"
      - name: Pull Anolis OS Docker Image
        id: install
        run: |
          set -euo pipefail
          ANOLIS_TAG="${ANOLIS_BASELINE_TAG}"
          docker pull "openanolis/anolisos:${ANOLIS_TAG}"
          echo "baseline_tag=${ANOLIS_TAG}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Anolis OS version
        id: version
        run: |
          set -euo pipefail
          ANOLIS_TAG="${{ steps.install.outputs.baseline_tag }}"
          VERSION=$(docker run --rm "openanolis/anolisos:${ANOLIS_TAG}" sh -lc '. /etc/os-release && printf "%s" "${VERSION_ID:-unknown}"')
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "latest=${ANOLIS_NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected Anolis OS version: ${VERSION:-unknown}"

      - name: Test 1 - Check Image Architecture
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(docker inspect "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" --format '{{.Architecture}}')
          if [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check OS Release File
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" sh -lc "grep -q 'Anolis OS' /etc/os-release"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" cat /etc/os-release || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Install Package (yum/dnf)
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" sh -lc '(yum install -y which || dnf install -y which) >/tmp/pkg.log 2>&1 && { command -v which >/dev/null 2>&1 || test -x /usr/bin/which || test -x /bin/which; }'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" sh -lc 'cat /tmp/pkg.log 2>/dev/null || true' || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Kernel/Arch inside container
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH_INSIDE=$(docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" uname -m)
          if [ "$ARCH_INSIDE" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Simple Command Execution
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(docker run --rm "openanolis/anolisos:${{ steps.install.outputs.baseline_tag }}" echo "Hello Arm64")
          if [ "$OUTPUT" = "Hello Arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_tag || 'unknown' }}"
          LATEST="${ANOLIS_NEXT_TAG}"
          NEXT_INSTALLED="not_installed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          docker pull "openanolis/anolisos:${LATEST}"
          NEXT_INSTALLED=$(docker run --rm "openanolis/anolisos:${LATEST}" sh -lc '. /etc/os-release && printf "%s" "${VERSION_ID:-unknown}"')

          if docker inspect "openanolis/anolisos:${LATEST}" --format '{{.Architecture}}' | grep -qx 'arm64' \
            && [ "$NEXT_INSTALLED" = "$LATEST" ] \
            && docker run --rm "openanolis/anolisos:${LATEST}" sh -lc "grep -q 'Anolis OS' /etc/os-release" \
            && docker run --rm "openanolis/anolisos:${LATEST}" sh -lc '(yum install -y which || dnf install -y which) >/tmp/pkg.log 2>&1 && { command -v which >/dev/null 2>&1 || test -x /usr/bin/which || test -x /bin/which; }' \
            && [ "$(docker run --rm "openanolis/anolisos:${LATEST}" uname -m)" = "aarch64" ] \
            && [ "$(docker run --rm "openanolis/anolisos:${LATEST}" echo "Hello Arm64")" = "Hello Arm64" ]; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Anolis OS ${CURRENT} passed the Arm64 container smoke in this run, and candidate image tag ${LATEST} also pulled successfully, reported VERSION_ID ${NEXT_INSTALLED}, completed in-container package-manager smoke, and passed architecture plus command validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Baseline Anolis OS ${CURRENT} passed the Arm64 container smoke in this run, and candidate image tag ${LATEST} also pulled successfully, reported VERSION_ID ${NEXT_INSTALLED}, completed in-container package-manager smoke, and passed architecture plus command validation on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Anolis OS ${CURRENT} passed the Arm64 container smoke in this run, but candidate image tag ${LATEST} did not complete equivalent version, architecture, or in-container package-manager validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Anolis OS ${CURRENT} passed the Arm64 container smoke in this run, but candidate image tag ${LATEST} did not complete equivalent version, architecture, or in-container package-manager validation on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Anolis OS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline tag:** ${{ steps.install.outputs.baseline_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Image Architecture: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check OS Release File: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Install Package (yum/dnf): ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Kernel/Arch inside container: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Simple Command Execution: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
