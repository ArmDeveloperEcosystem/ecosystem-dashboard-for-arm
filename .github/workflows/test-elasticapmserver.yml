# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Elastic APM Server placeholders with your package name (e.g., "Redis")
# 3. Replace all elasticapmserver placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
