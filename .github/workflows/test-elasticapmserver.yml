name: Test Elastic APM Server on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-elasticapmserver.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-elasticapmserver.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-elasticapmserver.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-elasticapmserver.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-elasticapmserver.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-elasticapmserver.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-elasticapmserver.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-elasticapmserver.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-elasticapmserver.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-elasticapmserver.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-elasticapmserver.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-elasticapmserver.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-elasticapmserver.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-elasticapmserver.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-elasticapmserver.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-elasticapmserver.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-elasticapmserver.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-elasticapmserver.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-elasticapmserver.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-elasticapmserver.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-elasticapmserver.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-elasticapmserver.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-elasticapmserver.outputs.timestamp }}
jobs:
  test-elasticapmserver:
    runs-on: ubuntu-24.04-arm
    env:
      ELASTIC_APM_SERVER_VERSION: "9.2.0"
      ELASTIC_APM_SERVER_NEXT_VERSION: "9.2.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Elastic APM Server'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=elasticapmserver" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/elasticapmserver" >> "$GITHUB_OUTPUT"
      - name: Install Elastic APM Server
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="${ELASTIC_APM_SERVER_VERSION}"
          INSTALL_DIR="/opt/elastic-apm-server-${CURRENT_VERSION}"
          sudo rm -rf "$INSTALL_DIR"
          sudo mkdir -p "$INSTALL_DIR"
          curl -fsSL "https://artifacts.elastic.co/downloads/apm-server/apm-server-${CURRENT_VERSION}-linux-arm64.tar.gz" -o "/tmp/apm-server-${CURRENT_VERSION}-linux-arm64.tar.gz"
          sudo tar -xzf "/tmp/apm-server-${CURRENT_VERSION}-linux-arm64.tar.gz" --strip-components=1 -C "$INSTALL_DIR"
          sudo chown -R root:root "$INSTALL_DIR"
          sudo tee /usr/local/bin/elasticapmserver >/dev/null <<EOF
          #!/usr/bin/env bash
          exec "${INSTALL_DIR}/apm-server" "\$@"
          EOF
          sudo chmod +x /usr/local/bin/elasticapmserver
          if [ -x "$INSTALL_DIR/apm-server" ] && [ -f "$INSTALL_DIR/apm-server.yml" ] && [ -x /usr/local/bin/elasticapmserver ]; then
            echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
            echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Elastic APM Server version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(elasticapmserver version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v elasticapmserver >/dev/null 2>&1 && [ -x "${{ steps.install.outputs.install_dir }}/apm-server" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if elasticapmserver version 2>&1 | grep -q "${ELASTIC_APM_SERVER_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            elasticapmserver version 2>&1 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if elasticapmserver help >/tmp/elastic-apm-help.log 2>&1 && grep -Eqi 'usage|commands|help' /tmp/elastic-apm-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/elastic-apm-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.install_dir }}/apm-server" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.install_dir }}/apm-server" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONFIG_TMP="$(mktemp -d)"
          CONFIG_PATH="${CONFIG_TMP}/apm-server.yml"
          DATA_PATH="${CONFIG_TMP}/data"
          LOGS_PATH="${CONFIG_TMP}/logs"
          cleanup() {
            rm -rf "${CONFIG_TMP}"
          }
          trap cleanup EXIT
          mkdir -p "${DATA_PATH}" "${LOGS_PATH}"
          sudo cp "${{ steps.install.outputs.install_dir }}/apm-server.yml" "$CONFIG_PATH"
          sudo chown "$(id -u):$(id -g)" "$CONFIG_PATH"
          chmod 0644 "$CONFIG_PATH"
          if { elasticapmserver test config -c "$CONFIG_PATH" --path.home "${{ steps.install.outputs.install_dir }}" --path.data "${DATA_PATH}" --path.logs "${LOGS_PATH}" --strict.perms=false >/tmp/elastic-apm-config.log 2>&1 \
            || elasticapmserver test config -c "$CONFIG_PATH" -path.home "${{ steps.install.outputs.install_dir }}" -path.data "${DATA_PATH}" -path.logs "${LOGS_PATH}" -E strict.perms=false >/tmp/elastic-apm-config.log 2>&1 \
            || elasticapmserver test config -c "$CONFIG_PATH" --path.home "${{ steps.install.outputs.install_dir }}" --path.data "${DATA_PATH}" --path.logs "${LOGS_PATH}" >/tmp/elastic-apm-config.log 2>&1 \
            || elasticapmserver test config -c "$CONFIG_PATH" -path.home "${{ steps.install.outputs.install_dir }}" -path.data "${DATA_PATH}" -path.logs "${LOGS_PATH}" >/tmp/elastic-apm-config.log 2>&1; } \
            && [ -s "$CONFIG_PATH" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/elastic-apm-config.log || true
            cat "$CONFIG_PATH" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.install.outputs.baseline_version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="${ELASTIC_APM_SERVER_NEXT_VERSION}"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run, but the next Arm64 tarball could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run, but the next Arm64 tarball could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_DATA="${NEXT_DIR}/data"
          NEXT_LOGS="${NEXT_DIR}/logs"
          mkdir -p "${NEXT_DATA}" "${NEXT_LOGS}"
          curl -fsSL "https://artifacts.elastic.co/downloads/apm-server/apm-server-${LATEST}-linux-arm64.tar.gz" -o "$NEXT_DIR/apm-server-${LATEST}-linux-arm64.tar.gz"
          tar -xzf "$NEXT_DIR/apm-server-${LATEST}-linux-arm64.tar.gz" --strip-components=1 -C "$NEXT_DIR"
          chown -R "$(id -u):$(id -g)" "$NEXT_DIR"
          NEXT_BIN="$NEXT_DIR/apm-server"
          NEXT_REPORTED=$("$NEXT_BIN" version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          if [ -x "$NEXT_BIN" ] \
            && [ -f "$NEXT_DIR/apm-server.yml" ] \
            && file "$NEXT_BIN" | grep -Eqi 'aarch64|arm64' \
            && "$NEXT_BIN" help >/tmp/elastic-apm-next-help.log 2>&1 \
            && grep -Eqi 'usage|commands|help' /tmp/elastic-apm-next-help.log \
            && { "$NEXT_BIN" test config -c "$NEXT_DIR/apm-server.yml" --path.home "$NEXT_DIR" --path.data "$NEXT_DATA" --path.logs "$NEXT_LOGS" --strict.perms=false >/tmp/elastic-apm-next-config.log 2>&1 \
              || "$NEXT_BIN" test config -c "$NEXT_DIR/apm-server.yml" -path.home "$NEXT_DIR" -path.data "$NEXT_DATA" -path.logs "$NEXT_LOGS" -E strict.perms=false >/tmp/elastic-apm-next-config.log 2>&1 \
              || "$NEXT_BIN" test config -c "$NEXT_DIR/apm-server.yml" --path.home "$NEXT_DIR" --path.data "$NEXT_DATA" --path.logs "$NEXT_LOGS" >/tmp/elastic-apm-next-config.log 2>&1 \
              || "$NEXT_BIN" test config -c "$NEXT_DIR/apm-server.yml" -path.home "$NEXT_DIR" -path.data "$NEXT_DATA" -path.logs "$NEXT_LOGS" >/tmp/elastic-apm-next-config.log 2>&1; } \
            && [ -n "$NEXT_REPORTED" ]; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned Elastic APM Server version ${CURRENT} matches the latest downloadable Arm64 tarball ${LATEST}. Regression validation re-confirmed the candidate binary, config, and help output on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run. Regression validation installed the candidate Arm64 tarball ${LATEST}, and the candidate binary reported version ${NEXT_REPORTED} while config and help validation also passed." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run. Regression validation installed the candidate Arm64 tarball ${LATEST}, and the candidate binary reported version ${NEXT_REPORTED} while config and help validation also passed."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: $NEXT_REPORTED"
          else
            cat /tmp/elastic-apm-next-help.log || true
            cat /tmp/elastic-apm-next-config.log || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run, but the latest Arm64 tarball ${LATEST} did not validate successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Elastic APM Server version ${CURRENT} passed smoke tests in this run, but the latest Arm64 tarball ${LATEST} did not validate successfully on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Normalize Test 5 result
        if: always()
        id: test5_result
        run: |
          set -euo pipefail
          STATUS="${{ steps.test5.outputs.status || '' }}"
          if [ -z "$STATUS" ]; then
            if [ "${{ steps.test5.conclusion }}" = "success" ]; then
              STATUS="passed"
            else
              STATUS="failed"
            fi
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=${{ steps.test5.outputs.duration || 0 }}" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5_result.outputs.status || 'failed' }}" "${{ steps.test5_result.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Elastic APM Server Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5_result.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
