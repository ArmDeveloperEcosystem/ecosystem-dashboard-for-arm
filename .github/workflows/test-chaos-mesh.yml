name: Test Chaos Mesh on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/chaos-mesh.md'
      - '.github/workflows/test-chaos-mesh.yml'

jobs:
  test-chaos-mesh:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_TAG: "v2.7.1"
      NEXT_VERSION: "2.7.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=chaos-mesh" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/chaos-mesh" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git build-essential

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
          cache: false

      - name: Install chaosctl
        id: install
        run: |
          set -euo pipefail
          CURRENT_TAG="${BASELINE_TAG}"
          CURRENT_VERSION="${CURRENT_TAG#v}"
          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          rm -rf chaos-mesh
          git clone --depth 1 --branch "$CURRENT_TAG" https://github.com/chaos-mesh/chaos-mesh.git
          (
            cd chaos-mesh
            export CGO_ENABLED=0
            go build -v -o chaosctl ./cmd/chaosctl/main.go
          )

          sudo install -m 0755 chaos-mesh/chaosctl /usr/local/bin/chaosctl
          if command -v chaosctl >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get chaosctl version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Chaos Mesh source tag version: $VERSION"

      - name: Test 1 - Check binary
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if command -v chaosctl >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Run help
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if timeout 10s chaosctl --help >/tmp/chaos-mesh-help.log 2>&1 && grep -q "Interacting with chaos mesh" /tmp/chaos-mesh-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/chaos-mesh-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check completion generation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if timeout 10s chaosctl completion bash >/tmp/chaos-mesh-completion.log 2>&1 && [ -s /tmp/chaos-mesh-completion.log ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/chaos-mesh-completion.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check debug subcommand availability
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if timeout 10s chaosctl --help >/tmp/chaos-mesh-subcommands.log 2>&1 && grep -Eq "debug|logs" /tmp/chaos-mesh-subcommands.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/chaos-mesh-subcommands.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Architecture verification
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_VERSION="${NEXT_VERSION}"

          if [ -z "$NEXT_VERSION" ]; then
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Chaos Mesh source tag ${CURRENT} already matches the newest public stable Chaos Mesh source tag found by this workflow. Tests 1-5 validate the real Arm64 build path, but there is no newer stable upstream candidate for a genuine Test 6 upgrade check." >> "$GITHUB_OUTPUT"
            echo "=== Regression Validation (Next Version Install) ==="
            echo "Current version tested in Tests 1-5: $CURRENT"
            echo "Next version targeted for install validation: $CURRENT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "Details: Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run and no newer stable source tag is currently published."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          NEXT_DIR=$(mktemp -d)
          git clone --depth 1 --branch "v${NEXT_VERSION}" https://github.com/chaos-mesh/chaos-mesh.git "$NEXT_DIR/repo"
          if [ ! -f "$NEXT_DIR/repo/cmd/chaosctl/main.go" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run, but the next source tag ${NEXT_VERSION} no longer includes the chaosctl build entrypoint expected by this workflow." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run, but the next source tag ${NEXT_VERSION} no longer includes the chaosctl build entrypoint expected by this workflow."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          (
            cd "$NEXT_DIR/repo"
            export CGO_ENABLED=0
            go build -v -o chaosctl ./cmd/chaosctl/main.go >/tmp/chaos-mesh-regression-build.log 2>&1
          )

          if [ -x "$NEXT_DIR/repo/chaosctl" ] \
            && timeout 10s "$NEXT_DIR/repo/chaosctl" --help >/tmp/chaos-mesh-next-help.log 2>&1 \
            && grep -q "Interacting with chaos mesh" /tmp/chaos-mesh-next-help.log \
            && timeout 10s "$NEXT_DIR/repo/chaosctl" completion bash >/tmp/chaos-mesh-next-completion.log 2>&1 \
            && [ -s /tmp/chaos-mesh-next-completion.log ]; then
            echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run. Regression validation built the next published source tag ${NEXT_VERSION} on Arm64 and verified the resulting chaosctl binary with real help and completion probes. chaosctl does not expose a clean self-reported semver banner, so the validated version is anchored to the official source tag that was built." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run. Regression validation built the next published source tag ${NEXT_VERSION} on Arm64 and verified the resulting chaosctl binary with real help and completion probes. chaosctl does not expose a clean self-reported semver banner, so the validated version is anchored to the official source tag that was built."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/chaos-mesh-regression-build.log || true
            cat /tmp/chaos-mesh-next-help.log || true
            cat /tmp/chaos-mesh-next-completion.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run, but the next source tag ${NEXT_VERSION} could not be built into a usable Arm64 chaosctl binary." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Chaos Mesh source tag ${CURRENT} passed smoke tests in this run, but the next source tag ${NEXT_VERSION} could not be built into a usable Arm64 chaosctl binary."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}"
          fi

          mkdir -p test-results
          cat > test-results/chaos-mesh.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Chaos Mesh",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check binary",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Run help",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check completion generation",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check debug subcommand availability",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture verification",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

          echo "Generated test results:"
          cat test-results/chaos-mesh.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-mesh-test-results
          path: test-results/chaos-mesh.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Chaos Mesh Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Run help: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check completion generation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check debug subcommand availability: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Architecture verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
