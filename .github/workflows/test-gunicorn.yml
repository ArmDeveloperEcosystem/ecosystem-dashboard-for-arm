name: Test Gunicorn on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/gunicorn.md"
      - ".github/workflows/test-gunicorn.yml"

jobs:
  test-gunicorn:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gunicorn" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gunicorn" >> "$GITHUB_OUTPUT"
          echo "current_version=22.0.0" >> "$GITHUB_OUTPUT"

      - name: Install Gunicorn
        id: install
        run: |
          set -euo pipefail
          BASELINE_VERSION="${{ steps.metadata.outputs.current_version }}"
          VENV_DIR=$(mktemp -d)/gunicorn-baseline
          python3 -m venv "$VENV_DIR"
          "$VENV_DIR/bin/python" -m pip install -q --upgrade pip
          "$VENV_DIR/bin/pip" install -q "gunicorn==${BASELINE_VERSION}"

          echo "baseline_version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "venv_dir=$VENV_DIR" >> "$GITHUB_OUTPUT"
          echo "python_path=$VENV_DIR/bin/python" >> "$GITHUB_OUTPUT"
          echo "pip_path=$VENV_DIR/bin/pip" >> "$GITHUB_OUTPUT"
          echo "gunicorn_path=$VENV_DIR/bin/gunicorn" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Gunicorn version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.python_path }}" -c "import importlib.metadata as md; print(md.version('gunicorn'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Gunicorn version: $VERSION"

      - name: Test 1 - Check pip installation
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.pip_path }}" show gunicorn >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Import Gunicorn in Python
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.python_path }}" -c "import gunicorn"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Gunicorn version output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_version }}"
          REPORTED="${{ steps.version.outputs.version }}"
          if [ "$REPORTED" = "$EXPECTED" ] && "${{ steps.install.outputs.gunicorn_path }}" --version 2>&1 | grep -q "$EXPECTED"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.gunicorn_path }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Functional validation with WSGI app
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cat > "$WORKDIR/myapp.py" <<'EOF'
          def app(environ, start_response):
              data = b"Hello, World!\n"
              start_response("200 OK", [
                  ("Content-Type", "text/plain"),
                  ("Content-Length", str(len(data)))
              ])
              return [data]
          EOF

          cleanup() {
            pkill -f "gunicorn.*myapp:app" >/dev/null 2>&1 || true
            rm -rf "$WORKDIR"
          }
          trap cleanup EXIT

          "${{ steps.install.outputs.gunicorn_path }}" -w 1 -b 127.0.0.1:8000 myapp:app --chdir "$WORKDIR" --daemon
          timeout 20s bash -c 'until curl -fsS http://127.0.0.1:8000 >/tmp/gunicorn-response.txt; do sleep 1; done'

          if grep -q "Hello, World!" /tmp/gunicorn-response.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/gunicorn-response.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Request context and architecture verification
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export EXPECTED_VERSION="${{ steps.install.outputs.baseline_version }}"
          "${{ steps.install.outputs.python_path }}" - <<'PY'
          import platform
          import os
          import gunicorn

          assert gunicorn.__version__ == os.environ["EXPECTED_VERSION"]
          machine = platform.machine()
          assert machine in ("aarch64", "arm64"), machine
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="$(
            python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://pypi.org/pypi/gunicorn/json", timeout=20))
          print(data["info"]["version"])
          PY
          )"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the latest stable PyPI release could not be resolved for candidate validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the latest stable PyPI release could not be resolved for candidate validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run and is already the latest stable release, so there is no newer candidate to install in Test 6."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)/gunicorn-next
          python3 -m venv "$NEXT_DIR"
          "$NEXT_DIR/bin/python" -m pip install -q --upgrade pip
          "$NEXT_DIR/bin/pip" install -q "gunicorn==${LATEST}"
          NEXT_REPORTED=$("$NEXT_DIR/bin/python" -c "import importlib.metadata as md; print(md.version('gunicorn'))" || true)

          cat > "$NEXT_DIR/myapp.py" <<'EOF'
          def app(environ, start_response):
              data = b"Hello, World!\n"
              start_response("200 OK", [
                  ("Content-Type", "text/plain"),
                  ("Content-Length", str(len(data)))
              ])
              return [data]
          EOF

          cleanup() {
            pkill -f "gunicorn.*myapp:app" >/dev/null 2>&1 || true
            rm -rf "$NEXT_DIR"
          }
          trap cleanup EXIT

          if [ "$NEXT_REPORTED" = "$LATEST" ]; then
            "$NEXT_DIR/bin/gunicorn" -w 1 -b 127.0.0.1:8010 myapp:app --chdir "$NEXT_DIR" --daemon
            timeout 20s bash -c 'until curl -fsS http://127.0.0.1:8010 >/tmp/gunicorn-next-response.txt; do sleep 1; done'
            if grep -q "Hello, World!" /tmp/gunicorn-next-response.txt; then
              echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} in an isolated environment on Arm64, and the candidate package passed CLI, import, and WSGI serving checks." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_REPORTED"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} in an isolated environment on Arm64, and the candidate package passed CLI, import, and WSGI serving checks."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/gunicorn-next-response.txt || true
              echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Arm64 install." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Arm64 install."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not install with the expected version on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Gunicorn version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not install with the expected version on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/gunicorn.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Gunicorn",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check pip installation",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Import Gunicorn in Python",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Gunicorn version output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Functional validation with WSGI app",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Request context and architecture verification",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gunicorn-test-results
          path: test-results/gunicorn.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Gunicorn Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check pip installation: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Import Gunicorn in Python: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Gunicorn version output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Functional validation with WSGI app: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Request context and architecture verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
