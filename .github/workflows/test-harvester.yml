name: Test Harvester on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/harvester.md"
      - ".github/workflows/test-harvester.yml"

jobs:
  test-harvester:
    runs-on: ubuntu-24.04-arm
    env:
      HARVESTER_VERSION: "1.3.0"
      HARVESTER_RELEASE: "v1.3.0"
      HARVESTER_DIR: /tmp/harvester-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=harvester" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/harvester" >> "$GITHUB_OUTPUT"

      - name: Install Harvester release artifacts
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl file qemu-system-arm
          rm -rf "${HARVESTER_DIR}"
          mkdir -p "${HARVESTER_DIR}"
          cd "${HARVESTER_DIR}"
          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${HARVESTER_RELEASE}/harvester-images-list-arm64.txt"
          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${HARVESTER_RELEASE}/harvester-${HARVESTER_RELEASE}-vmlinuz-arm64"
          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${HARVESTER_RELEASE}/harvester-${HARVESTER_RELEASE}-initrd-arm64"
          if [ -s "harvester-images-list-arm64.txt" ] && [ -s "harvester-${HARVESTER_RELEASE}-vmlinuz-arm64" ] && [ -s "harvester-${HARVESTER_RELEASE}-initrd-arm64" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Harvester version
        id: version
        run: |
          set -euo pipefail
          echo "version=${HARVESTER_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Arm64 Release Artifacts Exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${HARVESTER_DIR}"
          if [ -s "harvester-images-list-arm64.txt" ] && [ -s "harvester-${HARVESTER_RELEASE}-vmlinuz-arm64" ] && [ -s "harvester-${HARVESTER_RELEASE}-initrd-arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Release Version Mapping
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${HARVESTER_DIR}"
          if grep -Fq "docker.io/rancher/harvester:${HARVESTER_RELEASE}" "harvester-images-list-arm64.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Artifact Inspection Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${HARVESTER_DIR}"
          FILE_OUTPUT=$(file "harvester-${HARVESTER_RELEASE}-vmlinuz-arm64" "harvester-${HARVESTER_RELEASE}-initrd-arm64")
          if printf '%s\n' "${FILE_OUTPUT}" | grep -q "Linux kernel ARM64 boot executable Image" && printf '%s\n' "${FILE_OUTPUT}" | grep -q "compressed data"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${FILE_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${HARVESTER_DIR}"
          timeout 25s qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a72 \
            -m 2048 \
            -nographic \
            -kernel "harvester-${HARVESTER_RELEASE}-vmlinuz-arm64" \
            -initrd "harvester-${HARVESTER_RELEASE}-initrd-arm64" \
            -append "console=ttyAMA0" \
            2>&1 | tee /tmp/harvester-qemu.log || true
          if grep -Eq "Linux version|Run /init as init process|Running in initial RAM disk" /tmp/harvester-qemu.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${HARVESTER_VERSION}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"

          LATEST_TAG=$(curl -fsSL "https://api.github.com/repos/harvester/harvester/releases/latest" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name", "not_yet_checked"))' 2>/dev/null || echo "not_yet_checked")
          LATEST_VERSION="${LATEST_TAG#v}"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: ${LATEST_VERSION}"

          if [ "${LATEST_TAG}" = "${HARVESTER_RELEASE}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run and already matches the latest stable upstream Arm64 release artifacts." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run and already matches the latest stable upstream Arm64 release artifacts."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR="${RUNNER_TEMP}/harvester-regression"
          rm -rf "${NEXT_DIR}"
          mkdir -p "${NEXT_DIR}"
          cd "${NEXT_DIR}"

          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${LATEST_TAG}/harvester-images-list-arm64.txt"
          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${LATEST_TAG}/harvester-${LATEST_TAG}-vmlinuz-arm64"
          curl -fsSLO "https://github.com/harvester/harvester/releases/download/${LATEST_TAG}/harvester-${LATEST_TAG}-initrd-arm64"

          FILE_OUTPUT=$(file "harvester-${LATEST_TAG}-vmlinuz-arm64" "harvester-${LATEST_TAG}-initrd-arm64")
          timeout 25s qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a72 \
            -m 2048 \
            -nographic \
            -kernel "harvester-${LATEST_TAG}-vmlinuz-arm64" \
            -initrd "harvester-${LATEST_TAG}-initrd-arm64" \
            -append "console=ttyAMA0" \
            2>&1 | tee "${NEXT_DIR}/harvester-qemu.log" || true

          if [ -s "harvester-images-list-arm64.txt" ] && \
             printf '%s\n' "${FILE_OUTPUT}" | grep -q "Linux kernel ARM64 boot executable Image" && \
             printf '%s\n' "${FILE_OUTPUT}" | grep -q "compressed data" && \
             grep -Eq "Linux version|Run /init as init process|Running in initial RAM disk" "${NEXT_DIR}/harvester-qemu.log"; then
            echo "next_installed_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run. Regression validation downloaded the upstream Arm64 release artifacts for ${LATEST_TAG}, verified the kernel/initrd asset types, and observed a real Arm64 QEMU boot log from the candidate initrd." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${LATEST_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run. Regression validation downloaded the upstream Arm64 release artifacts for ${LATEST_TAG}, verified the kernel/initrd asset types, and observed a real Arm64 QEMU boot log from the candidate initrd."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${FILE_OUTPUT}" || true
            tail -80 "${NEXT_DIR}/harvester-qemu.log" || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run, but the candidate ${LATEST_TAG} did not complete the expected Arm64 artifact and QEMU boot validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Harvester release ${HARVESTER_RELEASE} passed smoke tests in this run, but the candidate ${LATEST_TAG} did not complete the expected Arm64 artifact and QEMU boot validation path."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi
          cat > test-results/harvester.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Harvester",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Arm64 Release Artifacts Exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Release Version Mapping", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Artifact Inspection Output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvester-test-results
          path: test-results/harvester.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Harvester Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Current pinned version was smoke-tested in this run.' }}" >> "$GITHUB_STEP_SUMMARY"
