name: Test Madoguchi on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-madoguchi.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-madoguchi.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-madoguchi.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-madoguchi.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-madoguchi.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-madoguchi.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-madoguchi.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-madoguchi.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-madoguchi.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-madoguchi.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-madoguchi.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-madoguchi.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-madoguchi.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-madoguchi.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-madoguchi.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-madoguchi.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-madoguchi.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-madoguchi.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-madoguchi.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-madoguchi.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-madoguchi.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-madoguchi.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-madoguchi.outputs.timestamp }}
jobs:
  test-madoguchi:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      BASELINE_VERSION: v0.5.4
      NEXT_VERSION: v0.6.0
      DISCORD_WEBHOOK: "https://discord.com/api/webhooks/dummy/dummy"
      ROCKET_PORT: "8000"
      ROCKET_ADDRESS: "127.0.0.1"
      ROCKET_DATABASES: '{madoguchi={url="postgres://postgres:postgres@127.0.0.1:5432/postgres"}}'
      JWT_KEY: "dummy_key_for_smoke_test"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Madoguchi'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=madoguchi" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/madoguchi" >> "$GITHUB_OUTPUT"
      - name: Install baseline Madoguchi from source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git pkg-config libssl-dev libpq-dev
          rm -rf madoguchi
          git clone --depth 1 --branch "${BASELINE_VERSION}" https://github.com/terrapkg/madoguchi.git
          cargo build --release --manifest-path madoguchi/Cargo.toml
          sudo install -m 0755 madoguchi/target/release/madoguchi /usr/local/bin/madoguchi
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get pinned versions
        id: version
        run: |
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Madoguchi baseline: ${BASELINE_VERSION}"
          echo "Detected Madoguchi next version: ${NEXT_VERSION}"

      - name: Test 1 - Check madoguchi binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v madoguchi >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Verify binary linkage
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if file /usr/local/bin/madoguchi | grep -qiE "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file /usr/local/bin/madoguchi || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check source tree contents
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "madoguchi/Cargo.toml" ] && [ -f "madoguchi/src/main.rs" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Start server briefly
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export ROCKET_PORT=8010
          STATUS_CODE=""
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          madoguchi >/tmp/madoguchi.log 2>&1 &
          PID=$!
          READY=0
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-start.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/health || true)
            if [ "$STATUS_CODE" = "200" ]; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Last health status code: ${STATUS_CODE:-none}"
            cat /tmp/madoguchi-start.out || true
            cat /tmp/madoguchi.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export ROCKET_PORT=8011
          EXPECTED_VERSION="${BASELINE_VERSION#v}"
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
          }
          madoguchi >/tmp/madoguchi-func.log 2>&1 &
          PID=$!
          trap cleanup EXIT
          STATUS_CODE=""
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-http.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/health || true)
            if [ "$STATUS_CODE" = "200" ]; then
              break
            fi
            sleep 1
          done
          OBSERVED_VERSION=$(tr -d '\r\n' < /tmp/madoguchi-http.out 2>/dev/null || true)
          if [ "$STATUS_CODE" = "200" ] && [ "$OBSERVED_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected /health version: ${EXPECTED_VERSION}, observed: ${OBSERVED_VERSION:-none}"
            echo "Last health status code: ${STATUS_CODE:-none}"
            cat /tmp/madoguchi-http.out || true
            cat /tmp/madoguchi-func.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${NEXT_VERSION}"
          NEXT_DIR=$(mktemp -d)
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
            rm -rf "$NEXT_DIR"
          }
          trap cleanup EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          git clone --depth 1 --branch "${NEXT_VERSION}" https://github.com/terrapkg/madoguchi.git "$NEXT_DIR/repo"
          cargo build --release --manifest-path "$NEXT_DIR/repo/Cargo.toml"
          NEXT_BIN="$NEXT_DIR/repo/target/release/madoguchi"
          EXPECTED_NEXT="${LATEST#v}"
          export ROCKET_PORT=8012
          "$NEXT_BIN" >/tmp/madoguchi-next.log 2>&1 &
          PID=$!
          STATUS_CODE=""
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-next-http.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/health || true)
            if [ "$STATUS_CODE" = "200" ]; then
              break
            fi
            sleep 1
          done
          NEXT_HEALTH=$(tr -d '\r\n' < /tmp/madoguchi-next-http.out 2>/dev/null || true)

          if [ -x "$NEXT_BIN" ] && \
             file "$NEXT_BIN" | grep -qiE "aarch64|arm64" && \
             [ "$STATUS_CODE" = "200" ] && \
             [ "$NEXT_HEALTH" = "$EXPECTED_NEXT" ]; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Madoguchi baseline ${CURRENT} built from source and passed /health runtime validation on Arm64, and candidate ${LATEST} also built successfully and returned the expected /health version on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected next /health version: ${EXPECTED_NEXT}, observed: ${NEXT_HEALTH:-none}"
            echo "Last next health status code: ${STATUS_CODE:-none}"
            cat /tmp/madoguchi-next-http.out || true
            cat /tmp/madoguchi-next.log || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Madoguchi candidate ${LATEST} did not preserve the expected Arm64 build or server startup behavior." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_regression() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_regression "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Madoguchi Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check madoguchi binary: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Verify binary linkage: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check source tree contents: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Start server briefly: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
