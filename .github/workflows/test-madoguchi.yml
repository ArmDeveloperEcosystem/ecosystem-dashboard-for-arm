name: Test Madoguchi on Arm64

on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/madoguchi.md"
      - ".github/workflows/test-madoguchi.yml"

jobs:
  test-madoguchi:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      BASELINE_VERSION: v0.5.4
      NEXT_VERSION: v0.6.0
      DISCORD_WEBHOOK: "https://discord.com/api/webhooks/dummy/dummy"
      ROCKET_PORT: "8000"
      ROCKET_ADDRESS: "127.0.0.1"
      ROCKET_DATABASES: '{madoguchi={url="postgres://postgres:postgres@127.0.0.1:5432/postgres"}}'
      JWT_KEY: "dummy_key_for_smoke_test"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=madoguchi" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/madoguchi" >> "$GITHUB_OUTPUT"
      - name: Install baseline Madoguchi from source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git pkg-config libssl-dev libpq-dev
          rm -rf madoguchi
          git clone --depth 1 --branch "${BASELINE_VERSION}" https://github.com/terrapkg/madoguchi.git
          cargo build --release --manifest-path madoguchi/Cargo.toml
          sudo install -m 0755 madoguchi/target/release/madoguchi /usr/local/bin/madoguchi
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get pinned versions
        id: version
        run: |
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Madoguchi baseline: ${BASELINE_VERSION}"
          echo "Detected Madoguchi next version: ${NEXT_VERSION}"

      - name: Test 1 - Check madoguchi binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v madoguchi >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Verify binary linkage
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if file /usr/local/bin/madoguchi | grep -qiE "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file /usr/local/bin/madoguchi || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check source tree contents
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "madoguchi/Cargo.toml" ] && [ -f "madoguchi/src/main.rs" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Start server briefly
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export ROCKET_PORT=8010
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          madoguchi >/tmp/madoguchi.log 2>&1 &
          PID=$!
          READY=0
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-start.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/ || true)
            if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "401" ]; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/madoguchi.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export ROCKET_PORT=8011
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
          }
          madoguchi >/tmp/madoguchi-func.log 2>&1 &
          PID=$!
          trap cleanup EXIT
          STATUS_CODE=""
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-http.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/ || true)
            if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "401" ]; then
              break
            fi
            sleep 1
          done
          cat /tmp/madoguchi-http.out || true
          if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "401" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/madoguchi-func.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${NEXT_VERSION}"
          NEXT_DIR=$(mktemp -d)
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" >/dev/null 2>&1 || true
              wait "$PID" >/dev/null 2>&1 || true
            fi
            rm -rf "$NEXT_DIR"
          }
          trap cleanup EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          git clone --depth 1 --branch "${NEXT_VERSION}" https://github.com/terrapkg/madoguchi.git "$NEXT_DIR/repo"
          cargo build --release --manifest-path "$NEXT_DIR/repo/Cargo.toml"
          NEXT_BIN="$NEXT_DIR/repo/target/release/madoguchi"
          export ROCKET_PORT=8012
          "$NEXT_BIN" >/tmp/madoguchi-next.log 2>&1 &
          PID=$!
          STATUS_CODE=""
          for _ in $(seq 1 60); do
            if ! ps -p "$PID" >/dev/null 2>&1; then
              break
            fi
            STATUS_CODE=$(curl -s -o /tmp/madoguchi-next-http.out -w "%{http_code}" http://127.0.0.1:${ROCKET_PORT}/ || true)
            if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "401" ]; then
              break
            fi
            sleep 1
          done

          if [ -x "$NEXT_BIN" ] && \
             file "$NEXT_BIN" | grep -qiE "aarch64|arm64" && \
             { [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "401" ]; }; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Madoguchi baseline ${CURRENT} built from source and passed server startup plus HTTP smoke validation on Arm64, and candidate ${LATEST} also built successfully and passed the same Arm64 runtime checks." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/madoguchi-next.log || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Madoguchi candidate ${LATEST} did not preserve the expected Arm64 build or server startup behavior." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_regression() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_regression "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          JOB_URL="${JOB_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          cat > test-results/madoguchi.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Madoguchi",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Rust",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check madoguchi binary", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Verify binary linkage", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check source tree contents", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Start server briefly", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}", "latest_version": "${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: madoguchi-test-results
          path: test-results/madoguchi.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Madoguchi Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check madoguchi binary: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Verify binary linkage: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check source tree contents: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Start server briefly: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
