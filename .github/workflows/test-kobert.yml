name: Test KoBERT on Arm64
on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-kobert.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-kobert.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-kobert.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-kobert.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-kobert.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-kobert.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-kobert.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-kobert.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-kobert.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-kobert.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-kobert.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-kobert.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-kobert.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-kobert.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-kobert.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-kobert.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-kobert.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-kobert.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-kobert.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-kobert.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-kobert.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-kobert.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-kobert.outputs.timestamp }}
jobs:
  test-kobert:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'KoBERT'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=kobert" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/kobert" >> "$GITHUB_OUTPUT"
      - name: Install KoBERT
        id: install
        run: |
          set -euo pipefail
          echo "Installing KoBERT..."
          
          sudo apt-get update
          sudo apt-get install -y git curl ca-certificates
          . /etc/os-release
          ARM_REPO_DIST="${NAME,,}-${VERSION_ID%%.*}"
          curl -fsSL "https://developer.arm.com/packages/arm-toolchains:${ARM_REPO_DIST}/${VERSION_CODENAME}/Release.key" | sudo tee /etc/apt/trusted.gpg.d/developer-arm-com.asc >/dev/null
          echo "deb https://developer.arm.com/packages/arm-toolchains:${ARM_REPO_DIST}/${VERSION_CODENAME}/ ./" | sudo tee /etc/apt/sources.list.d/developer-arm-com.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y arm-performance-libraries
          
          python -m venv venv
          source venv/bin/activate
          
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            "numpy==1.23.5" \
            "mxnet==1.9.1" \
            "gluonnlp==0.10.0" \
            sentencepiece \
            torch \
            transformers \
            onnxruntime \
            accelerate \
            datasets \
            protobuf
          ARMPL_LIB=$(find /opt/arm -name 'libarmpl_lp64_mp.so' 2>/dev/null | head -n 1 || true)
          if [ -z "${ARMPL_LIB}" ]; then
            echo "KoBERT installation failed"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ARMPL_LIB_DIR=$(dirname "${ARMPL_LIB}")
          echo "LD_LIBRARY_PATH=${ARMPL_LIB_DIR}:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "armpl_lib_dir=${ARMPL_LIB_DIR}" >> "$GITHUB_OUTPUT"
          
          # Install KoBERT without downgrading mxnet to the older broken wheel line.
          if python -m pip install --no-deps git+https://github.com/SKTBrain/KoBERT.git@master; then
             echo "KoBERT installed successfully"
             echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
             echo "KoBERT installation failed"
             echo "install_status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get KoBERT version
        id: version
        run: |
          set -euo pipefail
          source venv/bin/activate
          VERSION=$(pip show kobert 2>/dev/null | awk '/^Version:/ {print $2; exit}' || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(pip show kobert-transformers 2>/dev/null | awk '/^Version:/ {print $2; exit}' || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected KoBERT version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check top-level import
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source venv/bin/activate
          
          if python3 - <<'PY'
          import kobert
          print(tuple(kobert.__all__))
          PY
          then
            echo "✓ KoBERT import passed"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ KoBERT import failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exported utility helpers
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source venv/bin/activate

          if python3 - <<'PY'
          from kobert import download, get_tokenizer_path
          print(callable(download))
          print(callable(get_tokenizer_path))
          PY
          then
            echo "✓ KoBERT utils import passed"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ KoBERT utils import failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Download tokenizer asset
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source venv/bin/activate

          if python3 - <<'PY'
          import os
          from kobert import get_tokenizer_path
          path = get_tokenizer_path(cachedir=".cache")
          print(path)
          assert path and os.path.exists(path) and path.endswith(".spiece")
          PY
          then
             echo "✓ Tokenizer asset download passed"
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "✗ Tokenizer asset download failed"
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check PyTorch integration
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source venv/bin/activate

          if python3 - <<'PY'
          import torch
          from kobert import get_pytorch_kobert_model
          print(torch.__version__)
          print(callable(get_pytorch_kobert_model))
          PY
          then
             echo "✓ PyTorch integration check passed"
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "✗ PyTorch integration check failed"
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check import
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check utils import
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Download tokenizer (if possible)
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check PyTorch integration
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## KoBERT Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check top-level import: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check exported utility helpers: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Download tokenizer asset: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check PyTorch integration: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
