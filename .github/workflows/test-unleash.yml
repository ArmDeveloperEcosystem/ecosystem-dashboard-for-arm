name: Test Unleash on Arm64

on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/unleash.md'
      - '.github/workflows/test-unleash.yml'

jobs:
  test-unleash:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=unleash" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/unleash" >> "$GITHUB_OUTPUT"

      - name: Install Unleash
        id: install
        run: |
          set -euo pipefail

          VERSION="7.5.1"

          sudo apt-get update
          sudo apt-get install -y docker.io curl jq
          sudo systemctl start docker || true

          sudo docker manifest inspect "unleashorg/unleash-server:${VERSION}" > /tmp/unleash-manifest.json
          if ! grep -q '"architecture":[[:space:]]*"arm64"' /tmp/unleash-manifest.json; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "Pinned Unleash image ${VERSION} does not publish an arm64 manifest."
            exit 1
          fi

          sudo tee /usr/local/bin/unleash > /dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          IMAGE="unleashorg/unleash-server:7.5.1"
          if [ "${1:-}" = "--version" ]; then
            exec sudo docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'node -p "require(\"./package.json\").version"'
          elif [ "${1:-}" = "--help" ]; then
            exec sudo docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'node --help'
          else
            exec sudo docker run --rm "$IMAGE" "$@"
          fi
          EOF
          sudo chmod +x /usr/local/bin/unleash

          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Unleash version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(unleash --version | tr -d '\r')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v unleash >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "$(unleash --version | tr -d '\r')" = "7.5.1" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if unleash --help 2>&1 | grep -q 'Usage: node'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION="7.5.1"
          NETWORK="unleash-test-net"
          DB_CONTAINER="unleash-postgres"
          APP_CONTAINER="unleash-server"
          cleanup() {
            sudo docker rm -f "$APP_CONTAINER" "$DB_CONTAINER" >/dev/null 2>&1 || true
            sudo docker network rm "$NETWORK" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sudo docker network create "$NETWORK" >/dev/null
          sudo docker run -d --network "$NETWORK" --name "$DB_CONTAINER" \
            -e POSTGRES_PASSWORD=unleash \
            -e POSTGRES_USER=unleash \
            -e POSTGRES_DB=unleash \
            postgres:14-alpine >/dev/null

          for attempt in $(seq 1 30); do
            if sudo docker exec "$DB_CONTAINER" pg_isready -U unleash -d unleash >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          sudo docker run -d --network "$NETWORK" --name "$APP_CONTAINER" -p 4242:4242 \
            -e DATABASE_URL=postgres://unleash:unleash@"$DB_CONTAINER":5432/unleash \
            -e DATABASE_SSL=false \
            -e LOG_LEVEL=warn \
            "unleashorg/unleash-server:${VERSION}" >/dev/null

          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:4242/health > /tmp/unleash-health.json 2>/dev/null; then
              break
            fi
            sleep 3
          done

          if grep -q '"health":"GOOD"' /tmp/unleash-health.json; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker logs "$APP_CONTAINER" | tail -80 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST_TAG="$(curl -fsSL https://api.github.com/repos/Unleash/unleash/releases/latest | jq -r '.tag_name')"
          LATEST="${LATEST_TAG#v}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "decision=already_current" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned version ${CURRENT} is already the latest stable Unleash release and was smoke-tested successfully on Arm64 in this run." >> "$GITHUB_OUTPUT"
          elif sudo docker manifest inspect "unleashorg/unleash-server:${LATEST}" | grep -q '"architecture":[[:space:]]*"arm64"'; then
            echo "decision=upgrade_candidate_available" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned version ${CURRENT} passed smoke tests in this run. Latest stable ${LATEST} also publishes an arm64 image and is a candidate for the next version-bump validation." >> "$GITHUB_OUTPUT"
          else
            echo "decision=hold_current" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned version ${CURRENT} passed smoke tests in this run. Latest stable ${LATEST} does not currently expose a usable arm64 image manifest, so the workflow should remain pinned." >> "$GITHUB_OUTPUT"
          fi

          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}
          check_test "${{ steps.test6.outputs.status || 'failed' }}" ${{ steps.test6.outputs.duration || 0 }}

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/unleash.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Unleash",
              "version": "${{ steps.version.outputs.version }}",
              "language": "JavaScript",
              "category": "DevOps"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Binary Existence",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Help Output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unleash-test-results
          path: test-results/unleash.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Unleash Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}" >> "$GITHUB_STEP_SUMMARY"
