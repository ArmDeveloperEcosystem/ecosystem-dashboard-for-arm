name: Test ChaosSearch Terraform Provider on Arm64
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/chaossearch.md'
      - '.github/workflows/test-chaossearch.yml'

jobs:
  test-chaossearch:
    runs-on: ubuntu-24.04-arm
    env:
      CHAOSSEARCH_VERSION: "1.0.20"
      CHAOSSEARCH_NEXT_VERSION: "1.0.21"
      TERRAFORM_VERSION: "1.10.5"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "package_slug=chaossearch" >> $GITHUB_OUTPUT
          echo "dashboard_link=/opensource_packages/chaossearch" >> $GITHUB_OUTPUT
      
      - name: Install ChaosSearch Terraform Provider
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip file
          echo "Installing ChaosSearch Terraform Provider..."
          CURRENT_VERSION="${CHAOSSEARCH_VERSION}"
          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          ZIP_PATH="/tmp/terraform-provider-chaossearch_${CURRENT_VERSION}_linux_arm64.zip"
          curl -fsSL -o "$ZIP_PATH" "https://github.com/chaossearch/terraform-provider-chaossearch/releases/download/v${CURRENT_VERSION}/terraform-provider-chaossearch_${CURRENT_VERSION}_linux_arm64.zip"
          TMP_DIR=$(mktemp -d)
          unzip -q "$ZIP_PATH" -d "$TMP_DIR"
          BINARY=$(find "$TMP_DIR" -type f -name 'terraform-provider-chaossearch*' | head -n 1)
          if [ -z "$BINARY" ]; then
            echo "Terraform-provider-chaossearch installation failed"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          chmod +x "$BINARY"
          sudo mv "$BINARY" /usr/local/bin/terraform-provider-chaossearch
          TF_ZIP="/tmp/terraform_${TERRAFORM_VERSION}_linux_arm64.zip"
          curl -fsSL -o "$TF_ZIP" "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_arm64.zip"
          unzip -q "$TF_ZIP" -d /tmp/terraform-bin
          sudo install -m 0755 /tmp/terraform-bin/terraform /usr/local/bin/terraform
          if command -v terraform-provider-chaossearch >/dev/null 2>&1; then
            echo "Terraform-provider-chaossearch installed successfully"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform-provider-chaossearch installation failed"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      
      - name: Get ChaosSearch Terraform Provider version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Terraform-provider-chaossearch version: $VERSION"
      
      - name: Test 1 - Check chaossearch binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v terraform-provider-chaossearch &> /dev/null; then
            echo "✓ binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Validate with Terraform init
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TF_HOME=$(mktemp -d)
          mkdir -p "$TF_HOME/.terraform.d/plugins/registry.terraform.io/chaossearch/chaossearch/${CHAOSSEARCH_VERSION}/linux_arm64"
          cp /usr/local/bin/terraform-provider-chaossearch "$TF_HOME/.terraform.d/plugins/registry.terraform.io/chaossearch/chaossearch/${CHAOSSEARCH_VERSION}/linux_arm64/terraform-provider-chaossearch_v${CHAOSSEARCH_VERSION}"
          cd "$TF_HOME"
          cat > main.tf << EOF
          terraform {
            required_providers {
              chaossearch = {
                source = "chaossearch/chaossearch"
                version = "${CHAOSSEARCH_VERSION}"
              }
            }
          }
          provider "chaossearch" {}
          EOF

          if HOME="$TF_HOME" timeout 120s terraform init >/tmp/chaossearch-terraform-init.log 2>&1; then
            echo "✓ terraform init with chaossearch provider passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ terraform init failed"
            cat /tmp/chaossearch-terraform-init.log
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check provider binary info
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if file /usr/local/bin/terraform-provider-chaossearch | grep -q "ELF 64-bit LSB executable, ARM aarch64"; then
            echo "✓ binary is valid ARM64 executable"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ binary info check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Provider startup message
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if timeout 5s /usr/local/bin/terraform-provider-chaossearch 2>&1 | grep -qi "This binary is a plugin"; then
            echo "✓ Basic functional check passed (plugin message detected)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${CHAOSSEARCH_NEXT_VERSION}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Terraform-provider-chaossearch release ${CURRENT} passed smoke tests in this run and already matches the latest stable official Arm64 release asset."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            NEXT_DIR=$(mktemp -d)
            NEXT_ZIP="$NEXT_DIR/terraform-provider-chaossearch_${LATEST}_linux_arm64.zip"
            curl -fsSL -o "$NEXT_ZIP" "https://github.com/chaossearch/terraform-provider-chaossearch/releases/download/v${LATEST}/terraform-provider-chaossearch_${LATEST}_linux_arm64.zip"
            unzip -q "$NEXT_ZIP" -d "$NEXT_DIR/extracted"
            NEXT_BIN=$(find "$NEXT_DIR/extracted" -type f -name 'terraform-provider-chaossearch*' | head -n 1)
            NEXT_HOME=$(mktemp -d)
            mkdir -p "$NEXT_HOME/.terraform.d/plugins/registry.terraform.io/chaossearch/chaossearch/${LATEST}/linux_arm64"
            cp "$NEXT_BIN" "$NEXT_HOME/.terraform.d/plugins/registry.terraform.io/chaossearch/chaossearch/${LATEST}/linux_arm64/terraform-provider-chaossearch_v${LATEST}"
            cd "$NEXT_HOME"
            cat > main.tf <<EOF
          terraform {
            required_providers {
              chaossearch = {
                source = "chaossearch/chaossearch"
                version = "${LATEST}"
              }
            }
          }
          provider "chaossearch" {}
          EOF
            if [ -n "$NEXT_BIN" ] \
              && file "$NEXT_BIN" | grep -q 'ARM aarch64' \
              && timeout 5s "$NEXT_BIN" 2>&1 | grep -qi "This binary is a plugin" \
              && HOME="$NEXT_HOME" timeout 120s terraform init >/tmp/chaossearch-next-terraform-init.log 2>&1; then
              echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Terraform-provider-chaossearch release ${CURRENT} passed smoke tests in this run. Regression validation downloaded the official Arm64 release asset for ${LATEST}, verified the candidate binary is an ARM64 executable, confirmed it exposes the expected Terraform plugin startup message, and completed a bounded terraform init on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $LATEST"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Terraform-provider-chaossearch release ${CURRENT} passed smoke tests in this run. Regression validation downloaded the official Arm64 release asset for ${LATEST}, verified the candidate binary is an ARM64 executable, confirmed it exposes the expected Terraform plugin startup message, and completed a bounded terraform init on Arm64."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/chaossearch-next-terraform-init.log || true
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Terraform-provider-chaossearch release ${CURRENT} passed smoke tests in this run, but the candidate Arm64 release asset ${LATEST} could not be validated successfully." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Terraform-provider-chaossearch release ${CURRENT} passed smoke tests in this run, but the candidate Arm64 release asset ${LATEST} could not be validated successfully."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          # Check chaossearch binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check chaossearch version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check chaossearch help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))


          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          mkdir -p test-results
          
          cat > test-results/chaossearch.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Terraform-provider-chaossearch",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Monitoring/Observability",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check chaossearch binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": "${{ steps.test1.outputs.duration || 0 }}"
                },
                {
                  "name": "Validate with Terraform Init",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": "${{ steps.test2.outputs.duration || 0 }}"
                },
                {
                  "name": "Check provider binary info",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": "${{ steps.test3.outputs.duration || 0 }}"
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": "${{ steps.test4.outputs.duration || 0 }}"
                },
                {
                  "name": "Provider Validation (Force run)",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": "${{ steps.test5.outputs.duration || 0 }}"
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/chaossearch.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaossearch-test-results
          path: test-results/chaossearch.json
          retention-days: 90
      
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "## Terraform-provider-chaossearch Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check chaossearch binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Validate with Terraform init: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check provider binary info: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Provider startup message: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
