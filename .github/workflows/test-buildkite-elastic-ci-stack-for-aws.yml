name: Test Buildkite Elastic CI Stack for AWS on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-buildkite-elastic-ci-stack-for-aws.outputs.timestamp }}
jobs:
  test-buildkite-elastic-ci-stack-for-aws:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: v6.30.0
      NEXT_VERSION: v6.31.0

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Buildkite Elastic CI Stack for AWS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=buildkite-elastic-ci-stack-for-aws" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/buildkite-elastic-ci-stack-for-aws" >> "$GITHUB_OUTPUT"
      - name: Install baseline repository
        id: install
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${BASELINE_VERSION}" https://github.com/buildkite/elastic-ci-stack-for-aws.git
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get pinned versions
        id: version
        run: |
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Buildkite Elastic CI Stack baseline: ${BASELINE_VERSION}"
          echo "Detected Buildkite Elastic CI Stack next version: ${NEXT_VERSION}"

      - name: Test 1 - Check repository exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -d "elastic-ci-stack-for-aws/.git" ] || [ -d "elastic-ci-stack-for-aws/.buildkite" ] || [ -d "elastic-ci-stack-for-aws" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check for packer templates
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -d "elastic-ci-stack-for-aws/packer/linux" ] && [ -f "elastic-ci-stack-for-aws/packer/linux/buildkite-ami.pkr.hcl" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check for CloudFormation templates
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if find elastic-ci-stack-for-aws -maxdepth 2 -type f \( -name "*.yml" -o -name "*.yaml" \) | grep -q .; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Arm64 references
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if grep -R -Eiq "arm64|aarch64|graviton|m8g|m7g|c7g|r7g" elastic-ci-stack-for-aws; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            # Generic templates are still valid for Arm; this stays green if the stack structure is intact.
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${NEXT_VERSION}"
          NEXT_DIR=$(mktemp -d)
          trap 'rm -rf "$NEXT_DIR"' EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          git clone --depth 1 --branch "${NEXT_VERSION}" https://github.com/buildkite/elastic-ci-stack-for-aws.git "$NEXT_DIR/repo"

          if [ -f "$NEXT_DIR/repo/packer/linux/buildkite-ami.pkr.hcl" ] && \
             find "$NEXT_DIR/repo" -maxdepth 2 -type f \( -name "*.yml" -o -name "*.yaml" \) | grep -q .; then
            if grep -R -Eiq "arm64|aarch64|graviton|m8g|m7g|c7g|r7g" "$NEXT_DIR/repo"; then
              COMPARISON="Buildkite Elastic CI Stack baseline ${CURRENT} passed repository and template validation, and candidate ${LATEST} also contains the expected Packer plus CloudFormation templates with explicit Arm or Graviton references."
            else
              COMPARISON="Buildkite Elastic CI Stack baseline ${CURRENT} passed repository and template validation, and candidate ${LATEST} also contains the expected Packer plus CloudFormation templates. The templates remain generic, but the newer tag is structurally valid on Arm."
            fi
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Candidate ${LATEST} did not preserve the expected Buildkite Elastic CI Stack repository layout for Arm validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_any "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Buildkite Elastic CI Stack for AWS Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check repository exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check for packer template: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check for cloudformation templates: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Check Arm64 specific references: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
