name: Test RepeatMasker on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/repeatmasker.md"
      - ".github/workflows/test-repeatmasker.yml"

jobs:
  test-repeatmasker:
    runs-on: ubuntu-24.04-arm
    env:
      REPEATMASKER_VERSION: "4.1.0"
      REPEATMASKER_WORKDIR: "/tmp/repeatmasker-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=repeatmasker" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/repeatmasker" >> "$GITHUB_OUTPUT"
      - name: Install RepeatMasker baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y perl wget file libtext-soundex-perl

          rm -rf "${REPEATMASKER_WORKDIR}"
          mkdir -p "${REPEATMASKER_WORKDIR}/baseline"
          wget -q "https://www.repeatmasker.org/RepeatMasker/RepeatMasker-${REPEATMASKER_VERSION}.tar.gz" \
            -O "${REPEATMASKER_WORKDIR}/baseline/RepeatMasker.tar.gz"
          tar -xzf "${REPEATMASKER_WORKDIR}/baseline/RepeatMasker.tar.gz" -C "${REPEATMASKER_WORKDIR}/baseline"
          BASE_DIR="${REPEATMASKER_WORKDIR}/baseline/RepeatMasker"
          test -f "${BASE_DIR}/RepeatMasker"
          test -f "${BASE_DIR}/ProcessRepeats"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get RepeatMasker version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          OUTPUT=$(perl -I"${BASE_DIR}" "${BASE_DIR}/RepeatMasker" 2>&1 || true)
          VERSION=$(echo "$OUTPUT" | sed -n 's/.*RepeatMasker version \([0-9.]\+\(-p[0-9]\+\)\?\).*/\1/p' | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="${REPEATMASKER_VERSION}"
          fi
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request

          def key(version):
              m = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)(?:-p(\d+))?", version)
              if not m:
                  return (-1, -1, -1, -1)
              a, b, c, p = m.groups()
              return (int(a), int(b), int(c), int(p or 0))

          html = urllib.request.urlopen("https://www.repeatmasker.org/RepeatMasker/", timeout=20).read().decode("utf-8", "ignore")
          versions = set(re.findall(r"RepeatMasker-(\d+\.\d+\.\d+(?:-p\d+)?)\.tar\.gz", html))
          if versions:
              print(sorted(versions, key=key)[-1])
          else:
              print("unknown")
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected RepeatMasker version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check RepeatMasker files exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -f "${BASE_DIR}/RepeatMasker" ] && [ -f "${BASE_DIR}/ProcessRepeats" ] && [ -d "${BASE_DIR}/Libraries" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check RepeatMasker version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          OUTPUT=$(perl -I"${BASE_DIR}" "${BASE_DIR}/RepeatMasker" 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "RepeatMasker version ${{ steps.version.outputs.version }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check RepeatMasker help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          OUTPUT=$(perl -I"${BASE_DIR}" "${BASE_DIR}/RepeatMasker" -help 2>&1 || true)
          if grep -Eqi 'RepeatMasker version|RepeatMasker - Mask repetitive DNA|RepeatMasker is a program|This help file discusses the following topics|SYNOPSIS' <<< "$OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          cd "${BASE_DIR}"
          perl -I"${BASE_DIR}" -c ./RepeatMasker >/tmp/repeatmasker_syntax.txt 2>&1
          HELP_OUTPUT=$(perl -I"${BASE_DIR}" ./RepeatMasker -help 2>&1 || true)
          if grep -q "syntax OK" /tmp/repeatmasker_syntax.txt && grep -Eqi 'RepeatMasker version|RepeatMasker - Mask repetitive DNA|RepeatMasker is a program|This help file discusses the following topics|SYNOPSIS' <<< "$HELP_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/repeatmasker_syntax.txt || true
            printf '%s\n' "$HELP_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/repeatmasker-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}/candidate"
          wget -q "https://www.repeatmasker.org/RepeatMasker/RepeatMasker-${LATEST}.tar.gz" \
            -O "${REGRESSION_WORKDIR}/candidate/RepeatMasker.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/candidate/RepeatMasker.tar.gz" -C "${REGRESSION_WORKDIR}/candidate"
          NEXT_DIR="${REGRESSION_WORKDIR}/candidate/RepeatMasker"

          OUTPUT=$(perl -I"${NEXT_DIR}" "${NEXT_DIR}/RepeatMasker" 2>&1 || true)
          NEXT_INSTALLED=$(echo "$OUTPUT" | sed -n 's/.*RepeatMasker version \([0-9.]\+\(-p[0-9]\+\)\?\).*/\1/p' | head -n 1)
          if [ -z "$NEXT_INSTALLED" ]; then
            NEXT_INSTALLED="not_installed"
          fi

          cd "${NEXT_DIR}"
          perl -I"${NEXT_DIR}" -c ./RepeatMasker >/tmp/repeatmasker_candidate_syntax.txt 2>&1
          HELP_OUTPUT=$(perl -I"${NEXT_DIR}" ./RepeatMasker -help 2>&1 || true)

          if [ -f "${NEXT_DIR}/RepeatMasker" ] && [ -f "${NEXT_DIR}/ProcessRepeats" ] && [ -d "${NEXT_DIR}/Libraries" ] && \
             grep -q "RepeatMasker version ${LATEST}" <<< "$OUTPUT" && \
             grep -q "syntax OK" /tmp/repeatmasker_candidate_syntax.txt && \
             grep -Eqi 'RepeatMasker version|RepeatMasker - Mask repetitive DNA|RepeatMasker is a program|This help file discusses the following topics|SYNOPSIS' <<< "$HELP_OUTPUT"; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned RepeatMasker version ${CURRENT} already matches the latest stable public source bundle. Regression validation re-extracted the same release on Arm64 and confirmed exact version output, Perl syntax validity, and noninteractive help output. External search-engine and library configuration remain outside this public install-validation scope."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              STATUS="failed"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run. Regression validation extracted candidate version ${LATEST} on Arm64 and confirmed exact version output, Perl syntax validity, and noninteractive help output. External search-engine and library configuration remain outside this public install-validation scope." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run. Regression validation extracted candidate version ${LATEST} on Arm64 and confirmed exact version output, Perl syntax validity, and noninteractive help output. External search-engine and library configuration remain outside this public install-validation scope."
              echo "status=passed" >> "$GITHUB_OUTPUT"
              STATUS="passed"
            fi
          else
            cat /tmp/repeatmasker_candidate_syntax.txt || true
            printf '%s\n' "$HELP_OUTPUT" || true
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-bundle validation." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned RepeatMasker version ${CURRENT} passed public source-bundle smoke checks in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-bundle validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/repeatmasker.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "RepeatMasker",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Perl",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check RepeatMasker files exist",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check RepeatMasker version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check RepeatMasker help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repeatmasker-test-results
          path: test-results/repeatmasker.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## RepeatMasker Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check RepeatMasker files exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check RepeatMasker version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check RepeatMasker help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}" >> "$GITHUB_STEP_SUMMARY"
