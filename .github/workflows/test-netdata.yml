name: Test Netdata on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-netdata.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-netdata.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-netdata.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-netdata.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-netdata.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-netdata.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-netdata.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-netdata.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-netdata.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-netdata.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-netdata.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-netdata.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-netdata.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-netdata.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-netdata.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-netdata.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-netdata.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-netdata.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-netdata.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-netdata.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-netdata.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-netdata.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-netdata.outputs.timestamp }}
jobs:
  test-netdata:
    runs-on: ubuntu-24.04-arm
    env:
      NETDATA_VERSION: "2.2.6"
      NETDATA_NEXT_VERSION: "2.3.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Netdata'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=netdata" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/netdata" >> "$GITHUB_OUTPUT"
          echo "current_version=${NETDATA_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Netdata
        id: install
        run: |
          set -euo pipefail
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT
          RUN_FILE="$TMP_DIR/netdata.run"
          URL="https://github.com/netdata/netdata/releases/download/v${NETDATA_VERSION}/netdata-aarch64-v${NETDATA_VERSION}.gz.run"

          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl ca-certificates file binutils"
          sudo pkill -f /opt/netdata/bin/netdata >/dev/null 2>&1 || true
          sudo rm -rf /opt/netdata /etc/logrotate.d/netdata /lib/systemd/system/netdata.service /etc/init.d/netdata

          curl -L --fail --silent --show-error "$URL" -o "$RUN_FILE"
          chmod +x "$RUN_FILE"
          sudo "$RUN_FILE" --accept -- --disable-telemetry --dont-start-it >/tmp/netdata-install.log 2>&1
          BINARY_PATH=$(readlink -f /opt/netdata/bin/netdata || true)
          if [ -x /opt/netdata/usr/sbin/netdata ] && { [ ! -x "$BINARY_PATH" ] || ! file "$BINARY_PATH" 2>/dev/null | grep -qi 'ELF'; }; then
            BINARY_PATH="/opt/netdata/usr/sbin/netdata"
          fi

          if [ -x /opt/netdata/bin/netdata ] && [ -x "$BINARY_PATH" ]; then
            echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/netdata-install.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Netdata version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.binary_path }}" -v 2>&1 | awk '{print $2}' | head -n 1 | sed 's/^v//' || true)
          LATEST="${NETDATA_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check netdata binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x /opt/netdata/bin/netdata ] && [ -f /opt/netdata/etc/netdata/netdata.conf ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l /opt/netdata/bin/netdata /opt/netdata/etc/netdata/netdata.conf || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(/opt/netdata/bin/netdata -v 2>&1 | tee /tmp/netdata-version.log | awk '{print $2}' | head -n 1 | sed 's/^v//' || true)
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/netdata-version.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if /opt/netdata/bin/netdata -h 2>&1 | tee /tmp/netdata-help.log | grep -qi "netdata"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/netdata-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BINARY="${{ steps.install.outputs.binary_path }}"
          FILE_OUT=$(file "$BINARY" 2>/dev/null || true)
          ARM64_ELF=$(find /opt/netdata -type f -perm -111 -exec file {} + 2>/dev/null | grep -Eim1 'ELF.*(ARM aarch64|AArch64|arm64|aarch64)' || true)
          if [ "$(uname -m)" = "aarch64" ] && [ -n "$ARM64_ELF" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            printf '%s\n' "$FILE_OUT"
            printf '%s\n' "$ARM64_ELF"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cleanup() {
            sudo pkill -f /opt/netdata/bin/netdata >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sudo pkill -f /opt/netdata/bin/netdata >/dev/null 2>&1 || true
          sudo /opt/netdata/bin/netdata -D >/tmp/netdata.log 2>&1 &

          READY=0
          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:19999/api/v1/info >/tmp/netdata-info.json 2>/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done

          API_VERSION=$(python3 - <<'PY'
          import json
          try:
              with open('/tmp/netdata-info.json') as f:
                  data = json.load(f)
              print(str(data.get('version', '')).removeprefix('v'))
          except Exception:
              print('')
          PY
          )

          if [ "$READY" -eq 1 ] && [ "$API_VERSION" = "${{ steps.metadata.outputs.current_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ss -tuln | grep 19999 || true
            cat /tmp/netdata.log || true
            cat /tmp/netdata-info.json || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cleanup
          trap - EXIT
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Netdata Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check netdata binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check help command: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          echo "6. Regression applicability: package-manager installed (not applicable)"
            echo ""

            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
