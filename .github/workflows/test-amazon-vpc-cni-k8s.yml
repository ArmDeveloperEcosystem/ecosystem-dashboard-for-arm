name: Test Nutanix Amazon-vpc-cni-k8s on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-amazon-vpc-cni-k8s.outputs.timestamp }}

jobs:
  test-amazon-vpc-cni-k8s:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.4.0"
      PACKAGE_SLUG: "amazon-vpc-cni-k8s"
      LANE_KIND: "github release / source-build-or-tarball"
      DOWNLOAD_URL: "https://github.com/nutanix/amazon-vpc-cni-k8s/tags"
      HOMEPAGE_URL: "https://github.com/nutanix/amazon-vpc-cni-k8s"
      OFFICIAL_DOCS: "https://github.com/nutanix/amazon-vpc-cni-k8s#building"
      GITHUB_REPO: "nutanix/amazon-vpc-cni-k8s"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Nutanix Amazon-vpc-cni-k8s'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=amazon-vpc-cni-k8s" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/amazon-vpc-cni-k8s" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          set -euo pipefail
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=default_branch" >> "$GITHUB_OUTPUT"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              echo "install_mode=github_source" >> "$GITHUB_OUTPUT"
              echo "install_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            echo "resolved_tag=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_mode=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "install_mode=unresolved" >> "$GITHUB_OUTPUT"
          echo "install_status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Define package-specific expectations
        id: expectations
        uses: ./.github/actions/derive-package-source-expectations
        with:
          package_slug: ${{ env.PACKAGE_SLUG }}

      - name: Test 1 - Check package-specific baseline markers
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          SOURCE_MARKERS="${{ steps.expectations.outputs.source_markers }}"
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=Baseline source or external metadata could not be acquired." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$SOURCE_MARKERS"
            REQUIRED=${#MARKERS[@]}
            if [ "$REQUIRED" -gt 2 ]; then
              REQUIRED=2
            fi
            if [ "$REQUIRED" -lt 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=No package-specific source markers were derived for the baseline." >> "$GITHUB_OUTPUT"
              exit 1
            fi
            for marker in "${MARKERS[@]}"; do
              if [ -n "$marker" ] && [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            if [ "$FOUND" -ge "$REQUIRED" ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Found package-specific baseline markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected at least $REQUIRED package-specific markers from: $SOURCE_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "download=$DOWNLOAD_URL" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external baseline metadata for the published source links." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External baseline metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check package-specific version and release evidence
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ -f "$CONTENT_PAGE" ]
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          grep -Fx "download_url: $DOWNLOAD_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    homepage_url: $HOMEPAGE_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "        official_docs: $OFFICIAL_DOCS" "$CONTENT_PAGE" >/dev/null
          grep -F "version_number: $BASELINE_VERSION" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Validated package metadata, baseline version, homepage, and docs alignment from the checked-in package page." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check package-specific docs and entrypoints
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          DOC_MARKERS="${{ steps.expectations.outputs.doc_markers }}"
          ENTRYPOINT_MARKERS="${{ steps.expectations.outputs.entrypoint_markers }}"
          IDENTITY_TARGET="${{ steps.expectations.outputs.identity_target }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$DOC_MARKERS"
            for marker in "${MARKERS[@]}"; do
              if [ -n "$marker" ] && [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            if [ -n "$IDENTITY_TARGET" ]; then
              [ -e "$IDENTITY_TARGET" ]
            fi
            ENTRY_OK=0
            if [ -n "$ENTRYPOINT_MARKERS" ]; then
              IFS='|' read -r -a ENTRYPOINTS <<< "$ENTRYPOINT_MARKERS"
              for marker in "${ENTRYPOINTS[@]}"; do
                if [ -n "$marker" ] && [ -e "$marker" ]; then
                  ENTRY_OK=1
                  break
                fi
              done
            else
              ENTRY_OK=1
            fi
            if [ "$FOUND" -ge 1 ] && [ "$ENTRY_OK" -eq 1 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Validated package-specific docs and entrypoint markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected package-specific docs and entrypoint markers from: $DOC_MARKERS / $ENTRYPOINT_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "docs=$OFFICIAL_DOCS" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external documentation and homepage metadata for the baseline package." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External documentation metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify Arm64 runner and lane assumptions
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ "$(uname -m)" = "aarch64" ]
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          if echo "$LANE_KIND" | grep -Eiq 'gpu|specialized|manual-review'; then
            echo "note=Validated Arm64 support metadata on a generic Arm runner; deeper runtime checks for this lane still require the package-specific environment: $LANE_KIND." >> "$GITHUB_OUTPUT"
          else
            echo "note=Validated Arm64 runner architecture and published Arm support metadata." >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          RESULT=""

          compile_python_targets() {
            FOUND=0
            for target in "$@"; do
              [ -z "$target" ] && continue
              if [ -e "$target" ]; then
                python3 -m compileall -q "$target"
                FOUND=1
              fi
            done
            [ "$FOUND" -eq 1 ]
          }

          source_contains() {
            grep -R -I -Eiq "$1" . 2>/dev/null
          }

          github_release_has_asset() {
            TAG="${{ steps.install.outputs.resolved_tag || '' }}"
            [ -n "$TAG" ] && [ "$TAG" != "default_branch" ]
            curl -fsSL "https://api.github.com/repos/$GITHUB_REPO/releases/tags/$TAG"               | jq -e --arg re "$1" '.assets[].name | test($re; "i")' >/dev/null
          }

          helm_or_manifest_proof() {
            CHART="$(find . -path '*/Chart.yaml' -print -quit 2>/dev/null || true)"
            if [ -n "$CHART" ] && command -v helm >/dev/null 2>&1; then
              helm template smoke "$(dirname "$CHART")" >/tmp/${PACKAGE_SLUG}-helm.yaml
              grep -Eq '^kind: (DaemonSet|Deployment|ServiceAccount|ClusterRole|CustomResourceDefinition)' /tmp/${PACKAGE_SLUG}-helm.yaml
              return 0
            fi
            find . -type f \( -name '*.yaml' -o -name '*.yml' -o -name 'Chart.yaml' \) -print0               | xargs -0 grep -Eiq 'kind: (DaemonSet|Deployment|ServiceAccount|ClusterRole|CustomResourceDefinition)|apiVersion: apps/|nvidia.com/gpu|helm'
          }

          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            case "$PACKAGE_SLUG" in
              amazon-vpc-cni-k8s)
                go list ./... >/tmp/amazon-vpc-cni-go-packages.txt
                BUILT=0
                for target in ./cmd/*; do
                  [ -f "$target/main.go" ] || continue
                  name="$(basename "$target")"
                  GOOS=linux GOARCH=arm64 go build -o "/tmp/${name}-arm64" "$target"
                  file "/tmp/${name}-arm64" | grep -Eiq 'aarch64|ARM aarch64|ARM64'
                  BUILT=$((BUILT + 1))
                done
                [ "$BUILT" -ge 1 ]
                if [ -d config ]; then
                  find config -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 | xargs -0 grep -Eiq 'DaemonSet|amazon-k8s-cni|aws-node|CNI'
                fi
                RESULT="Built Amazon VPC CNI Go command binaries for linux/arm64, verified AArch64 ELF output, and validated bundled Kubernetes/CNI manifest content. Real pod networking still requires Kubernetes plus AWS VPC/ENI infrastructure."
                ;;
              azurelinux)
                test -d toolkit || test -d SPECS || test -f README.md
                source_contains 'aarch64|arm64|image|ISO|toolkit'
                RESULT="Validated Azure Linux image-build source and Arm architecture markers; OS image boot/runtime was not validated."
                ;;
              bionemo-framework)
                compile_python_targets src bionemo sub-packages || source_contains 'bionemo|biomolecular|lightning|model'
                RESULT="Compiled BioNeMo Python sources or verified package source markers on Arm64; CUDA/model training runtime remains scoped."
                ;;
              chiaki-ng)
                if github_release_has_asset 'aarch64|arm64'; then
                  RESULT="Verified a release asset advertises Arm64/aarch64 architecture; streaming runtime was not exercised."
                else
                  test -f CMakeLists.txt || test -f pyproject.toml || test -f package.json
                  source_contains 'chiaki|remote play|PlayStation|Qt|CMake'
                  RESULT="Validated Chiaki-ng source/build markers on Arm64; GUI/streaming runtime was not exercised."
                fi
                ;;
              clara-viz)
                compile_python_targets src python || source_contains 'Clara|viz|render|CUDA|CMake'
                RESULT="Validated Clara Viz source/Python surface on Arm64; CUDA rendering runtime remains scoped."
                ;;
              cloud-native-stack)
                helm_or_manifest_proof || source_contains 'helm|kubernetes|operator|gpu-operator|cloud native'
                RESULT="Validated Kubernetes/Helm manifest evidence for Cloud Native Stack; no cluster deployment was claimed."
                ;;
              nvidia-gpu-driver-container)
                cd ..
                grep -Fq "version_number: $BASELINE_VERSION" "content/linux/opensource_packages/${PACKAGE_SLUG}.md"
                curl -fsSL "$HOMEPAGE_URL" | grep -Eiq 'driver container|NVIDIA|GPU'
                RESULT="Validated NVIDIA GPU driver container source/catalog identity and Arm metadata; driver load, DKMS, and GPU runtime remain deferred."
                ;;
              nvidia-gpu-operator)
                helm_or_manifest_proof || source_contains 'ClusterPolicy|gpu-operator|nvidia.com/gpu|DaemonSet'
                RESULT="Validated GPU Operator Helm/Kubernetes manifests on Arm64; no cluster reconciliation or GPU runtime was claimed."
                ;;
              nvimagecodec)
                compile_python_targets python src || source_contains 'nvImageCodec|nvimgcodec|decode|encode|CUDA'
                RESULT="Validated nvImageCodec source/Python surface on Arm64; GPU codec execution remains scoped."
                ;;
              nvsentinel)
                helm_or_manifest_proof || source_contains 'NVSentinel|sentinel|remediation|DaemonSet|operator'
                RESULT="Validated NVSentinel Kubernetes/source evidence on Arm64; no cluster remediation runtime was claimed."
                ;;
              nvshmem)
                test -f CMakeLists.txt || test -f Makefile || test -d src
                source_contains 'NVSHMEM|OpenSHMEM|PGAS|CUDA'
                RESULT="Validated NVSHMEM source/build markers on Arm64; CUDA/NVLink/InfiniBand runtime remains scoped."
                ;;
              opennow)
                if github_release_has_asset 'aarch64|arm64|linux'; then
                  RESULT="Verified OpenNOW release asset evidence for Linux/Arm architecture; GeForce NOW session runtime was not exercised."
                else
                  test -f package.json || test -f Cargo.toml || test -f pyproject.toml || test -f CMakeLists.txt
                  source_contains 'OpenNOW|GeForce NOW|gaming|client'
                  RESULT="Validated OpenNOW source/build markers on Arm64; desktop/cloud-gaming runtime was not exercised."
                fi
                ;;
              physics-nemo)
                compile_python_targets src physicsnemo examples || source_contains 'PhysicsNeMo|physics|model|training'
                RESULT="Compiled PhysicsNeMo Python sources or verified package markers on Arm64; CUDA/model runtime remains scoped."
                ;;
              raft|rmm|cudf|cugraph|cuml|cuopt|cuvs|cv-cuda|dali|dask-cuda|tensorrt|tensorrt-llm)
                compile_python_targets python src pylibraft pylibrmm dask_cuda tensorrt_llm || source_contains 'CUDA|RAPIDS|NVIDIA|TensorRT|DALI|RAFT|RMM|cuDF|cuGraph|cuML|cuVS|cuOpt'
                RESULT="Validated package source/Python compile surface on Arm64; CUDA/GPU runtime remains scoped."
                ;;
              dcgm-exporter)
                if [ -f go.mod ]; then
                  GOOS=linux GOARCH=arm64 go list ./... >/tmp/dcgm-exporter-go-packages.txt
                fi
                helm_or_manifest_proof || source_contains 'DCGM|Prometheus|metrics|exporter'
                RESULT="Validated DCGM Exporter Go/Kubernetes source evidence on Arm64; GPU/DCGM runtime was not exercised."
                ;;
              dcgm)
                test -f CMakeLists.txt || test -d dcgmlib || test -d hostengine
                source_contains 'DCGM|diagnostics|telemetry|hostengine|GPU'
                RESULT="Validated DCGM source/build markers on Arm64; GPU management runtime was not exercised."
                ;;
              garden-linux)
                if github_release_has_asset 'arm64|aarch64'; then
                  RESULT="Verified Garden Linux release artifact advertises Arm64/aarch64 architecture; OS boot was not validated."
                else
                  test -d features || test -d platforms || test -d docs
                  source_contains 'arm64|aarch64|image|platform|Garden Linux'
                  RESULT="Validated Garden Linux image-build source and architecture markers; OS boot was not validated."
                fi
                ;;
              gdrcopy)
                test -f Makefile || test -d src || test -d include
                source_contains 'GDRCopy|GPUDirect|RDMA|gdrdrv|GPU memory'
                RESULT="Validated GDRCopy source/build markers on Arm64; kernel module and GPU RDMA runtime remain scoped."
                ;;
              k8s-device-plugin)
                if [ -f go.mod ]; then
                  GOOS=linux GOARCH=arm64 go list ./... >/tmp/k8s-device-plugin-go-packages.txt
                fi
                helm_or_manifest_proof || grep -R -Eiq 'nvidia.com/gpu|DaemonSet|device-plugin' .
                RESULT="Validated NVIDIA device plugin Go/Kubernetes manifests on Arm64; no cluster scheduling or GPU runtime was claimed."
                ;;
              llm-d)
                compile_python_targets scripts || true
                helm_or_manifest_proof || source_contains 'Kubernetes-native|inference|llm-d|gateway|modelservice'
                RESULT="Validated llm-d scripts and Kubernetes/source evidence on Arm64; no cluster inference runtime was claimed."
                ;;
              microcloud)
                if [ -f go.mod ]; then
                  GOOS=linux GOARCH=arm64 go list ./cmd/... >/tmp/microcloud-go-packages.txt
                fi
                source_contains 'microcloud init|microcloudd|LXD|MicroCeph|MicroOVN'
                RESULT="Validated MicroCloud Go CLI package graph and command markers on Arm64; clustered service runtime was not started."
                ;;
              mig-parted)
                if [ -f go.mod ]; then
                  GOOS=linux GOARCH=arm64 go list ./cmd/... >/tmp/mig-parted-go-packages.txt
                fi
                grep -R -Eiq 'mig-configs|nvidia-mig-parted|MIG' .
                RESULT="Validated MIG-Parted Go CLI/config source on Arm64; GPU MIG mutation runtime was not exercised."
                ;;
              sparks-rapids)
                test -f pom.xml || test -f build.sbt || test -d sql-plugin
                source_contains 'spark|rapids|cuDF|GPU|plugin'
                RESULT="Validated Spark RAPIDS build/source markers on Arm64; Spark cluster and GPU acceleration runtime remain scoped."
                ;;
              sunshine)
                if github_release_has_asset 'aarch64|arm64|linux'; then
                  RESULT="Verified Sunshine release asset evidence for Linux/Arm architecture; streaming service runtime was not exercised."
                else
                  test -f CMakeLists.txt || test -f package.json
                  source_contains 'Sunshine|Moonlight|stream|encoder|CMake'
                  RESULT="Validated Sunshine source/build markers on Arm64; game-streaming service runtime was not exercised."
                fi
                ;;
              ubuntudesktop)
                cd ..
                grep -Fq "version_number: $BASELINE_VERSION" "content/linux/opensource_packages/${PACKAGE_SLUG}.md"
                curl -fsSL "$DOWNLOAD_URL" | grep -Eiq 'Ubuntu|Desktop|download'
                RESULT="Validated Ubuntu Desktop release/download metadata on Arm64 runner; desktop OS artifact boot/runtime was not validated."
                ;;
              wsl)
                if github_release_has_asset 'arm64|aarch64'; then
                  RESULT="Verified WSL release asset advertises Arm64/aarch64 architecture; Windows/WSL runtime was not validated."
                else
                  source_contains 'WSL|Windows Subsystem for Linux|arm64|aarch64'
                  RESULT="Validated WSL source/release markers on Arm64 runner; Windows/WSL runtime was not validated."
                fi
                ;;
              *)
                SLUG_RE="$(printf '%s' "$PACKAGE_SLUG" | sed 's/[-_]/[-_ ]/g')"
                TARGET="$(find . -maxdepth 3 -type f \( -name 'README*' -o -name 'go.mod' -o -name 'pyproject.toml' -o -name 'package.json' -o -name 'Cargo.toml' -o -name 'Chart.yaml' \) -print -quit 2>/dev/null || true)"
                [ -n "$TARGET" ]
                grep -Eiq "$SLUG_RE" "$TARGET" || source_contains "$SLUG_RE"
                RESULT="Verified package-specific source identity for $PACKAGE_SLUG."
                ;;
            esac
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=$RESULT" >> "$GITHUB_OUTPUT"
          else
            case "$PACKAGE_SLUG" in
              nvidia-gpu-driver-container)
                curl -fsSL "$HOMEPAGE_URL" | grep -Eiq 'driver container|NVIDIA|GPU'
                grep -Fq "version_number: $BASELINE_VERSION" "content/linux/opensource_packages/${PACKAGE_SLUG}.md"
                RESULT="Validated NVIDIA driver-container catalog/source evidence and Arm metadata; driver load, DKMS, and GPU runtime remain deferred."
                ;;
              ubuntudesktop)
                curl -fsSL "$DOWNLOAD_URL" | grep -Eiq 'Ubuntu|Desktop|download'
                grep -Fq "version_number: $BASELINE_VERSION" "content/linux/opensource_packages/${PACKAGE_SLUG}.md"
                RESULT="Validated Ubuntu Desktop release/download metadata; desktop OS boot/runtime was not validated."
                ;;
              nvshmem|nvimagecodec)
                curl -fsSL "$DOWNLOAD_URL" | grep -Eiq 'arm64|aarch64|sbsa|NVIDIA|CUDA'
                RESULT="Validated NVIDIA external download page for Arm/CUDA package evidence; GPU runtime remains scoped."
                ;;
              bionemo-framework|physics-nemo|dcgm-exporter)
                curl -fsSL "$DOWNLOAD_URL" | grep -Eiq 'arm64|aarch64|NVIDIA|container|tag|CUDA|GPU'
                RESULT="Validated external NVIDIA container/catalog evidence; CUDA/GPU runtime remains scoped."
                ;;
              *)
                TEMP_PAGE=$(mktemp)
                trap 'rm -f "$TEMP_PAGE"' EXIT
                if curl -fsSL "$OFFICIAL_DOCS" -o "$TEMP_PAGE" || curl -fsSL "$HOMEPAGE_URL" -o "$TEMP_PAGE" || curl -fsSL "$DOWNLOAD_URL" -o "$TEMP_PAGE"; then
                  SLUG_RE="$(printf '%s' "$PACKAGE_SLUG" | sed 's/[-_]/[-_ ]/g')"
                  grep -Eiq "$SLUG_RE|$PACKAGE_SLUG" "$TEMP_PAGE"
                  RESULT="Verified external package identity from published docs/homepage; no unsupported runtime claim was made."
                else
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                  echo "note=Could not fetch published docs or homepage content for bounded external validation." >> "$GITHUB_OUTPUT"
                  exit 1
                fi
                ;;
            esac
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=$RESULT" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
          limited_cpu_probe: |
            cd next-src
            go list ./... >/tmp/amazon-vpc-cni-next-go-packages.txt
            BUILT=0
            for target in ./cmd/*; do
              [ -f "$target/main.go" ] || continue
              name="$(basename "$target")"
              GOOS=linux GOARCH=arm64 go build -o "/tmp/${name}-next-arm64" "$target"
              file "/tmp/${name}-next-arm64" | grep -Eiq 'aarch64|ARM aarch64|ARM64'
              BUILT=$((BUILT + 1))
            done
            [ "$BUILT" -ge 1 ]
            find config -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 2>/dev/null | xargs -0 grep -Eiq 'DaemonSet|amazon-k8s-cni|aws-node|CNI'
          limited_cpu_description: "Test 6 reran the scoped Amazon VPC CNI Arm preflight against the next stable source tag: Go package discovery, linux/arm64 command builds, AArch64 binary checks, and Kubernetes/CNI manifest validation. Full pod networking still requires Kubernetes plus AWS VPC/ENI infrastructure."
          defer_on_limited_cpu_probe_failure: "true"
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"
