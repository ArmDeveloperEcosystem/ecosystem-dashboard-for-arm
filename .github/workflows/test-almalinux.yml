name: Test Alma Linux on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-almalinux.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-almalinux.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-almalinux.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-almalinux.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-almalinux.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-almalinux.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-almalinux.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-almalinux.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-almalinux.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-almalinux.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-almalinux.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-almalinux.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-almalinux.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-almalinux.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-almalinux.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-almalinux.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-almalinux.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-almalinux.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-almalinux.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-almalinux.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-almalinux.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-almalinux.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-almalinux.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-almalinux.outputs.timestamp }}
jobs:
  test-almalinux:
    runs-on: ubuntu-24.04-arm
    env:
      ALMALINUX_BASELINE_TAG: "10.0"
      ALMALINUX_NEXT_TAG: "10.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Alma Linux'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=almalinux" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/almalinux" >> "$GITHUB_OUTPUT"
      - name: Install Alma Linux container image
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

          BASELINE_TAG="${ALMALINUX_BASELINE_TAG}"
          sudo docker pull "docker.io/library/almalinux:${BASELINE_TAG}"

          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Alma Linux version
        id: version
        run: |
          VERSION=$(sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'" || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Image Availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker image inspect "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'")

          if printf '%s\n' "$VERSION" | grep -Eq '^10(\.|$)'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc 'dnf --help | head -n 1' | grep -q '^usage: dnf'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" \
            bash -lc 'dnf install -y which >/dev/null && command -v which' > alma-functional.txt

          if grep -q '^/usr/bin/which$' alma-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat alma-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_tag || env.ALMALINUX_BASELINE_TAG }}"
          NEXT_TAG="${ALMALINUX_NEXT_TAG}"
          NEXT_VERSION="unknown"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_TAG}" >> "$GITHUB_OUTPUT"

          if ! sudo docker pull "docker.io/library/almalinux:${NEXT_TAG}" >/tmp/almalinux-next-pull.log 2>&1; then
            cat /tmp/almalinux-next-pull.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline AlmaLinux ${CURRENT} passed Tests 1-5, but candidate image tag ${NEXT_TAG} could not be pulled on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION=$(sudo docker run --rm "docker.io/library/almalinux:${NEXT_TAG}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'" || echo "unknown")
          NEXT_DNF_HELP=$(sudo docker run --rm "docker.io/library/almalinux:${NEXT_TAG}" bash -lc 'dnf --help | head -n 1' || true)
          echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$NEXT_VERSION" "$CURRENT" | sort -V -C && [ "$NEXT_VERSION" = "$CURRENT" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the selected next candidate" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline AlmaLinux ${CURRENT} and candidate ${NEXT_VERSION} resolved to the same effective version in this run. Repin baseline and next tags to a strictly newer pair for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          REGRESSION_RESULT=""
          COMPARISON=""
          if printf '%s\n' "$CURRENT" "$NEXT_VERSION" | sort -V -C && echo "$NEXT_DNF_HELP" | grep -q '^usage: dnf'; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            REGRESSION_RESULT="Next version installed successfully on Arm64"
            COMPARISON="Baseline AlmaLinux ${CURRENT} passed Tests 1-5. Regression validation pulled candidate tag ${NEXT_TAG} (version ${NEXT_VERSION}) and validated package-manager functionality inside the Arm64 container."
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            REGRESSION_RESULT="Next version install failed on Arm64"
            COMPARISON="Baseline AlmaLinux ${CURRENT} passed Tests 1-5, but candidate tag ${NEXT_TAG} did not provide a clean newer-version Arm64 validation path."
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${NEXT_TAG}"
          echo "Next version installed on Arm64: ${NEXT_VERSION}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${COMPARISON}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status || 'review' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'review' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Alma Linux Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline tag:** ${{ steps.install.outputs.baseline_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Image Availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'review' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Regression result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
