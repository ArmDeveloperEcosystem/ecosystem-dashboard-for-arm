name: Test Alma Linux on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/almalinux.md'
      - '.github/workflows/test-almalinux.yml'

jobs:
  test-almalinux:
    runs-on: ubuntu-24.04-arm
    env:
      ALMALINUX_BASELINE_TAG: "10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=almalinux" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/almalinux" >> "$GITHUB_OUTPUT"
      - name: Install Alma Linux container image
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

          BASELINE_TAG="${ALMALINUX_BASELINE_TAG}"
          sudo docker pull "docker.io/library/almalinux:${BASELINE_TAG}"

          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Alma Linux version
        id: version
        run: |
          VERSION=$(sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'" || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Image Availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker image inspect "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'")

          if printf '%s\n' "$VERSION" | grep -Eq '^10(\.|$)'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" bash -lc 'dnf --help | head -n 1' | grep -q '^usage: dnf'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          sudo docker run --rm "docker.io/library/almalinux:${{ steps.install.outputs.baseline_tag }}" \
            bash -lc 'dnf install -y which >/dev/null && command -v which' > alma-functional.txt

          if grep -q '^/usr/bin/which$' alma-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat alma-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_tag || env.ALMALINUX_BASELINE_TAG }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
          echo "regression_result=No newer stable AlmaLinux release is available for Arm64 validation" >> "$GITHUB_OUTPUT"
          echo "comparison=AlmaLinux ${CURRENT} is the dashboard-recommended Arm baseline and the newest stable AlmaLinux container line currently published, so there is no newer stable image tag to validate in Test 6 yet." >> "$GITHUB_OUTPUT"
          echo "status=review" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${CURRENT}"
          echo "Next version installed on Arm64: ${CURRENT}"
          echo "Regression install result: No newer stable AlmaLinux release is available for Arm64 validation"
          echo "Details: AlmaLinux ${CURRENT} is the dashboard-recommended Arm baseline and the newest stable AlmaLinux container line currently published, so there is no newer stable image tag to validate in Test 6 yet."

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status || 'review' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'review' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results

          cat > test-results/almalinux.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Alma Linux",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Shell",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Image Availability",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Help Output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'review' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: almalinux-test-results
          path: test-results/almalinux.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Alma Linux Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline tag:** ${{ steps.install.outputs.baseline_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Image Availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'review' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Regression result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
