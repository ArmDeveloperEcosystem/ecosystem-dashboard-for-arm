name: Test RoaringBitmap on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-roaringbitmap.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-roaringbitmap.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-roaringbitmap.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-roaringbitmap.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-roaringbitmap.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-roaringbitmap.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-roaringbitmap.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-roaringbitmap.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-roaringbitmap.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-roaringbitmap.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-roaringbitmap.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-roaringbitmap.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-roaringbitmap.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-roaringbitmap.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-roaringbitmap.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-roaringbitmap.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-roaringbitmap.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-roaringbitmap.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-roaringbitmap.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-roaringbitmap.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-roaringbitmap.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-roaringbitmap.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-roaringbitmap.outputs.timestamp }}
jobs:
  test-roaringbitmap:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_VERSION: "1.3.0"
      CURRENT_JAR: "/tmp/RoaringBitmap-1.3.0.jar"
      NEXT_VERSION: "1.6.13"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'RoaringBitmap'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=RoaringBitmap" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/RoaringBitmap" >> "$GITHUB_OUTPUT"
      - name: Install RoaringBitmap
        id: install
        run: |
          set -euo pipefail
          timeout 15m sudo apt-get -o Acquire::Retries=5 update
          timeout 20m sudo apt-get -o Acquire::Retries=5 install -y openjdk-17-jdk-headless curl unzip
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --connect-timeout 20 --max-time 180 -o "${CURRENT_JAR}" \
            "https://repo1.maven.org/maven2/org/roaringbitmap/RoaringBitmap/${CURRENT_VERSION}/RoaringBitmap-${CURRENT_VERSION}.jar"
          if [ -s "${CURRENT_JAR}" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get RoaringBitmap version
        id: version
        run: |
          set -euo pipefail
          VERSION="${CURRENT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected RoaringBitmap version from Maven artifact path: ${VERSION}"

      - name: Test 1 - Check JAR Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -s "${CURRENT_JAR}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Versioned Artifact Coordinate
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -s "${CURRENT_JAR}" ] && basename "${CURRENT_JAR}" | grep -q "${CURRENT_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l "${CURRENT_JAR}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Compile Java Smoke Program
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mkdir -p /tmp/roaringbitmap-smoke
          cat >/tmp/roaringbitmap-smoke/TestRoaringBitmap.java <<'EOF'
          import org.roaringbitmap.RoaringBitmap;
          public class TestRoaringBitmap {
            public static void main(String[] args) {
              RoaringBitmap bitmap = new RoaringBitmap();
              for (int i = 0; i < 50; i++) {
                bitmap.add(i);
              }
              for (int i = 8; i < 16; i++) {
                bitmap.remove(i);
              }
              if (!bitmap.contains(7) || bitmap.contains(8) || bitmap.getCardinality() != 42) {
                throw new IllegalStateException("unexpected bitmap contents");
              }
              System.out.println("contains-cardinality-ok:" + bitmap.getCardinality());
            }
          }
          EOF
          if javac -cp "${CURRENT_JAR}" -d /tmp/roaringbitmap-smoke /tmp/roaringbitmap-smoke/TestRoaringBitmap.java; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          java -cp "${CURRENT_JAR}:/tmp/roaringbitmap-smoke" TestRoaringBitmap >/tmp/roaringbitmap-out.txt
          if grep -Eq '^contains-cardinality-ok:42[[:space:]]*$' /tmp/roaringbitmap-out.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/roaringbitmap-out.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"

          LATEST="${NEXT_VERSION}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"

          if [ -z "${LATEST}" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but the next candidate version could not be resolved from Maven Central metadata." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but the next candidate version could not be resolved from Maven Central metadata."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured RoaringBitmap Tests 1-5 baseline ${CURRENT} matches the configured Test 6 candidate ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned release so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Workflow metadata review required"
            echo "Details: Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but the configured Test 6 candidate is not newer than the baseline."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_JAR=$(mktemp /tmp/RoaringBitmap-next-XXXXXX.jar)
          if curl --fail --silent --show-error --location --retry 5 --retry-all-errors --connect-timeout 20 --max-time 180 -o "${NEXT_JAR}" \
            "https://repo1.maven.org/maven2/org/roaringbitmap/RoaringBitmap/${LATEST}/RoaringBitmap-${LATEST}.jar"; then
            NEXT_INSTALLED_VERSION="${LATEST}"
            NEXT_SMOKE_DIR=$(mktemp -d)
            if [ -s "${NEXT_JAR}" ] && \
               javac -cp "${NEXT_JAR}" -d "${NEXT_SMOKE_DIR}" /tmp/roaringbitmap-smoke/TestRoaringBitmap.java && \
               java -cp "${NEXT_JAR}:${NEXT_SMOKE_DIR}" TestRoaringBitmap >/tmp/roaringbitmap-next-out.txt && \
               grep -Eq '^contains-cardinality-ok:42[[:space:]]*$' /tmp/roaringbitmap-next-out.txt; then
              echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed and ran successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned RoaringBitmap version ${CURRENT} passed bitmap compile/runtime smoke tests in this run. Regression validation downloaded candidate version ${LATEST} from Maven Central on Arm64, compiled the same bitmap cardinality smoke against the candidate JAR, and ran it successfully." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
              echo "Regression install result: Next version installed and ran successfully on Arm64"
              echo "Details: Current pinned RoaringBitmap version ${CURRENT} passed bitmap compile/runtime smoke tests in this run. Regression validation downloaded candidate version ${LATEST} from Maven Central on Arm64, compiled the same bitmap cardinality smoke against the candidate JAR, and ran it successfully."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/roaringbitmap-next-out.txt 2>/dev/null || true
              echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install/runtime failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the same bitmap compile/runtime validation on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: unknown"
              echo "Regression install result: Next version install/runtime failed on Arm64"
              echo "Details: Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the same bitmap compile/runtime validation on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from Maven Central on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned RoaringBitmap version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from Maven Central on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            REGRESSION_RESULT="Regression validation result unavailable"
          fi
          echo "## RoaringBitmap Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check JAR Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Versioned Artifact Coordinate: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Compile Java Smoke Program: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
