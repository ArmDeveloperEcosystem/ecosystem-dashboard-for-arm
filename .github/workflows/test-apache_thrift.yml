name: Test Apache Thrift on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-apache_thrift.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-apache_thrift.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-apache_thrift.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-apache_thrift.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-apache_thrift.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-apache_thrift.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-apache_thrift.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-apache_thrift.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-apache_thrift.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-apache_thrift.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-apache_thrift.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-apache_thrift.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-apache_thrift.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-apache_thrift.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-apache_thrift.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-apache_thrift.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-apache_thrift.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-apache_thrift.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-apache_thrift.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-apache_thrift.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-apache_thrift.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-apache_thrift.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-apache_thrift.outputs.timestamp }}
jobs:
  test-apache_thrift:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache Thrift'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=apache_thrift" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/apache_thrift" >> "$GITHUB_OUTPUT"
      - name: Install Apache Thrift
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "flex bison cmake g++ make libssl-dev pkg-config curl wget"
          THRIFT_VERSION="0.21.0"
          THRIFT_TAR="/tmp/thrift-${THRIFT_VERSION}.tar.gz"
          THRIFT_ROOT="$PWD/thrift-${THRIFT_VERSION}"
          THRIFT_BUILD="$THRIFT_ROOT/codex-build"

          download_thrift_tarball() {
            local version="$1"
            local dest="$2"
            local primary_url="https://downloads.apache.org/thrift/${version}/thrift-${version}.tar.gz"
            local archive_url="https://archive.apache.org/dist/thrift/${version}/thrift-${version}.tar.gz"
            DOWNLOAD_ATTEMPTS=2 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=900 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=30 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$dest" "$primary_url" "$archive_url"
          }

          if ! download_thrift_tarball "$THRIFT_VERSION" "$THRIFT_TAR"; then
            echo "baseline_version=${THRIFT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! tar -xzf "$THRIFT_TAR" -C "$PWD"; then
            echo "baseline_version=${THRIFT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$THRIFT_BUILD"
          (
            cd "$THRIFT_BUILD"
            cmake .. \
              -DBUILD_COMPILER=ON \
              -DBUILD_LIBRARIES=OFF \
              -DBUILD_TESTING=OFF \
              -DBUILD_TUTORIALS=OFF >/tmp/thrift-baseline-cmake.log 2>&1
            cmake --build . --target thrift-compiler -j"$(nproc)" >/tmp/thrift-baseline-build.log 2>&1
          )
          THRIFT_BIN="$THRIFT_BUILD/compiler/cpp/bin/thrift"
          if [ -x "$THRIFT_BIN" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            echo "baseline_version=${THRIFT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "thrift_bin=${THRIFT_BIN}" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/thrift-baseline-cmake.log || true
            cat /tmp/thrift-baseline-build.log || true
            echo "baseline_version=${THRIFT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=build_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Get Apache Thrift version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "version=${{ steps.install.outputs.baseline_version || 'unknown' }}" >> "$GITHUB_OUTPUT"
            echo "Detected Apache Thrift version: ${{ steps.install.outputs.baseline_version || 'unknown' }}"
            exit 0
          fi
          VERSION=$("${{ steps.install.outputs.thrift_bin }}" --version 2>&1 | grep -oP '[0-9]+(\.[0-9]+)+' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Apache Thrift version: $VERSION"

      - name: Test 1 - Check thrift binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -x "${{ steps.install.outputs.thrift_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check thrift version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if "${{ steps.install.outputs.thrift_bin }}" --version 2>&1 | grep -qE 'Thrift version|[0-9]+\.[0-9]+'; then
            "${{ steps.install.outputs.thrift_bin }}" --version
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check thrift help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HELP_OUTPUT=$("${{ steps.install.outputs.thrift_bin }}" --help 2>&1 || true)
          if printf '%s\n' "$HELP_OUTPUT" | grep -qiE 'usage|options|help'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$HELP_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/out"
          cat > "$WORKDIR/simple.thrift" <<'EOF'
          namespace cpp codex

          struct Ping {
            1: string message
          }

          service Echo {
            Ping ping(1: Ping request)
          }
          EOF
          "${{ steps.install.outputs.thrift_bin }}" --gen cpp -out "$WORKDIR/out" "$WORKDIR/simple.thrift" >/tmp/apache-thrift-functional.log 2>&1
          if [ -f "$WORKDIR/out/Echo.cpp" ] && find "$WORKDIR/out" -maxdepth 1 -type f -name '*_types.h' | grep -q .; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            cat /tmp/apache-thrift-functional.log || true
            find "$WORKDIR" -maxdepth 3 -type f | sort
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          INSTALL_STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          if [ "$INSTALL_STATUS" != "success" ]; then
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache Thrift version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LISTING="$(curl -fsSL --retry 2 --retry-delay 5 --retry-all-errors --connect-timeout 20 --max-time 60 https://downloads.apache.org/thrift/ \
            || curl -fsSL --retry 2 --retry-delay 5 --retry-all-errors --connect-timeout 20 --max-time 60 https://archive.apache.org/dist/thrift/ \
            || true)"
          NEXT_VERSION="$(CURRENT="$CURRENT" LISTING="$LISTING" python3 - <<'PY'
          import os
          import re

          current = os.environ['CURRENT']
          listing = os.environ.get('LISTING', '')
          versions = sorted(
              set(re.findall(r'>([0-9]+\.[0-9]+\.[0-9]+)/<', listing)),
              key=lambda s: [int(x) for x in s.split('.')]
          )
          current_key = [int(x) for x in current.split('.')]
          candidates = [v for v in versions if [int(x) for x in v.split('.')] > current_key]
          print(candidates[0] if candidates else '')
          PY
          )"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$NEXT_VERSION" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the next regression candidate could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the next regression candidate could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "flex bison cmake g++ make libssl-dev pkg-config curl wget"

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/thrift-${NEXT_VERSION}.tar.gz"
          NEXT_SRC="$NEXT_DIR/thrift-${NEXT_VERSION}"
          NEXT_BUILD="$NEXT_SRC/codex-build"
          CMAKE_LOG="$NEXT_DIR/thrift-next-cmake.log"
          BUILD_LOG="$NEXT_DIR/thrift-next-build.log"

          download_thrift_tarball() {
            local version="$1"
            local dest="$2"
            local primary_url="https://downloads.apache.org/thrift/${version}/thrift-${version}.tar.gz"
            local archive_url="https://archive.apache.org/dist/thrift/${version}/thrift-${version}.tar.gz"
            DOWNLOAD_ATTEMPTS=2 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=900 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=30 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$dest" "$primary_url" "$archive_url"
          }

          if download_thrift_tarball "$NEXT_VERSION" "$NEXT_TAR"; then
            tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
            mkdir -p "$NEXT_BUILD"
            if (
              cd "$NEXT_BUILD"
              cmake .. \
                -DBUILD_COMPILER=ON \
                -DBUILD_LIBRARIES=OFF \
                -DBUILD_TESTING=OFF \
                -DBUILD_TUTORIALS=OFF >"$CMAKE_LOG" 2>&1
              timeout 30m cmake --build . --target thrift-compiler -j"$(nproc)" >"$BUILD_LOG" 2>&1
            ); then
              NEXT_BIN="$NEXT_BUILD/compiler/cpp/bin/thrift"
              NEXT_INSTALLED_VERSION=""
              if [ -x "$NEXT_BIN" ]; then
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version 2>&1 | grep -oP '[0-9]+(\.[0-9]+)+' | head -1 || true)
              fi

              if [ -n "$NEXT_INSTALLED_VERSION" ] && [ "$NEXT_INSTALLED_VERSION" = "$NEXT_VERSION" ]; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${NEXT_VERSION} from source on Arm64, and the generated thrift compiler reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "Details: Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${NEXT_VERSION} from source on Arm64, and the generated thrift compiler reported version ${NEXT_INSTALLED_VERSION}."
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                cat "$CMAKE_LOG" || true
                cat "$BUILD_LOG" || true
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} built on Arm64 and reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
                echo "Details: Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} built on Arm64 and reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target."
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              cat "$CMAKE_LOG" || true
              cat "$BUILD_LOG" || true
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} did not build into a usable Arm64 compiler." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} did not build into a usable Arm64 compiler."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Apache Thrift version ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Apache Thrift"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install.outputs.install_status || 'success' }}
          test1_label: "Check thrift binary exists"
          test2_label: "Check thrift version command"
          test3_label: "Check thrift help output"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression comparison summary unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
