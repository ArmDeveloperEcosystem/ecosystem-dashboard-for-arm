name: Test Mayastor on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/mayastor.md"
      - ".github/workflows/test-mayastor.yml"

jobs:
  test-mayastor:
    runs-on: ubuntu-24.04-arm
    env:
      MAYASTOR_VERSION: "2.5.0"
      MAYASTOR_BINARY: "/usr/local/bin/kubectl-mayastor"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mayastor" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mayastor" >> "$GITHUB_OUTPUT"
          echo "current_version=${MAYASTOR_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Mayastor
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar file binutils

          TMPDIR=$(mktemp -d)
          BASE_URL="https://github.com/openebs/mayastor/releases/download/v${MAYASTOR_VERSION}/kubectl-mayastor-aarch64-linux-musl.tar.gz"
          curl -fsSL "${BASE_URL}" -o "${TMPDIR}/kubectl-mayastor.tgz"
          tar -xzf "${TMPDIR}/kubectl-mayastor.tgz" -C "${TMPDIR}"
          sudo install -m 0755 "${TMPDIR}/kubectl-mayastor" "${MAYASTOR_BINARY}"

          if [ -x "${MAYASTOR_BINARY}" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Mayastor version
        id: version
        run: |
          set -euo pipefail
          EMBEDDED_VERSIONS=$(strings "${MAYASTOR_BINARY}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -u | tr '\n' ' ' || true)
          LATEST=$(
            python3 - <<'PY'
          import json
          import re
          import urllib.request

          data = json.load(
              urllib.request.urlopen(
                  "https://api.github.com/repos/openebs/mayastor/releases?per_page=20",
                  timeout=20,
              )
          )
          versions = []
          for release in data:
              if release.get("draft") or release.get("prerelease"):
                  continue
              tag = release.get("tag_name", "").lstrip("v")
              if not re.fullmatch(r"\d+\.\d+\.\d+", tag):
                  continue
              if not any(
                  asset.get("name") == "kubectl-mayastor-aarch64-linux-musl.tar.gz"
                  for asset in release.get("assets", [])
              ):
                  continue
              versions.append(tuple(map(int, tag.split("."))))
          print(".".join(map(str, max(versions))))
          PY
          )
          echo "version=${MAYASTOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "embedded_versions=${EMBEDDED_VERSIONS}" >> "$GITHUB_OUTPUT"
          echo "Detected Mayastor baseline release tag: v${MAYASTOR_VERSION}"
          echo "Embedded version-like strings: ${EMBEDDED_VERSIONS}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check kubectl-mayastor binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${MAYASTOR_BINARY}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check help output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${MAYASTOR_BINARY}" --help > /tmp/mayastor-help.txt 2>&1 && \
             grep -Eqi "Usage: kubectl-mayastor|Commands:|types of operations" /tmp/mayastor-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mayastor-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check embedded release tag provenance
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if strings "${MAYASTOR_BINARY}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -u | grep -Fx "v${MAYASTOR_VERSION}" >/dev/null; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            strings "${MAYASTOR_BINARY}" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -u || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${MAYASTOR_BINARY}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${MAYASTOR_BINARY}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$("${MAYASTOR_BINARY}" get nodes 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/mayastor-functional.txt
          if printf '%s\n' "$OUTPUT" | grep -Eqi "failed to infer config|failed to read kubeconfig|environment variable not found|No such file or directory"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mayastor-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          NEXT_URL="https://github.com/openebs/mayastor/releases/download/v${LATEST}/kubectl-mayastor-aarch64-linux-musl.tar.gz"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run, but the latest stable Arm64 kubectl-mayastor release could not be resolved for regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run, but the latest stable Arm64 kubectl-mayastor release could not be resolved for regression validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "${TMPDIR}"
          }
          trap cleanup EXIT
          curl -fsSL "${NEXT_URL}" -o "${TMPDIR}/kubectl-mayastor.tgz"
          tar -xzf "${TMPDIR}/kubectl-mayastor.tgz" -C "${TMPDIR}"
          chmod +x "${TMPDIR}/kubectl-mayastor"

          EMBEDDED=$(
            strings "${TMPDIR}/kubectl-mayastor" | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -u | grep -Fx "v${LATEST}" || true
          )
          HELP_OK=0
          GET_OK=0
          if "${TMPDIR}/kubectl-mayastor" --help > /tmp/mayastor-next-help.txt 2>&1 && \
             grep -Eqi "Usage: kubectl-mayastor|Commands:|types of operations" /tmp/mayastor-next-help.txt; then
            HELP_OK=1
          fi
          GET_OUTPUT=$("${TMPDIR}/kubectl-mayastor" get nodes 2>&1 || true)
          if printf '%s\n' "$GET_OUTPUT" | grep -Eqi "failed to infer config|failed to read kubeconfig|environment variable not found|No such file or directory"; then
            GET_OK=1
          fi

          if [ -n "$EMBEDDED" ] && [ "$HELP_OK" -eq 1 ] && [ "$GET_OK" -eq 1 ]; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Mayastor release tag ${CURRENT} matches the latest stable upstream Arm64 kubectl-mayastor asset. Regression validation re-downloaded the candidate artifact from ${NEXT_URL}, confirmed the embedded release tag ${LATEST}, and re-ran real help plus kubeconfig-graceful-failure checks on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${LATEST}"
              echo "Regression install result: Current stable version already validated on Arm64"
              echo "Details: Current pinned Mayastor release tag ${CURRENT} matches the latest stable upstream Arm64 kubectl-mayastor asset. Regression validation re-downloaded the candidate artifact from ${NEXT_URL}, confirmed the embedded release tag ${LATEST}, and re-ran real help plus kubeconfig-graceful-failure checks on Arm64."
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run. Regression validation downloaded the candidate Arm64 kubectl-mayastor asset ${NEXT_URL}, confirmed the embedded release tag ${LATEST}, and verified that the candidate binary reached real help output and kubeconfig-graceful-failure paths on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${LATEST}"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run. Regression validation downloaded the candidate Arm64 kubectl-mayastor asset ${NEXT_URL}, confirmed the embedded release tag ${LATEST}, and verified that the candidate binary reached real help output and kubeconfig-graceful-failure paths on Arm64."
            fi
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mayastor-next-help.txt || true
            printf '%s\n' "$GET_OUTPUT" || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run, but the candidate Arm64 asset from ${NEXT_URL} did not preserve the expected embedded release tag or usable CLI behavior on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Mayastor release tag ${CURRENT} passed smoke tests in this run, but the candidate Arm64 asset from ${NEXT_URL} did not preserve the expected embedded release tag or usable CLI behavior on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/mayastor.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Mayastor",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Rust",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check kubectl-mayastor binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check help output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check embedded release tag provenance", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mayastor-test-results
          path: test-results/mayastor.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Mayastor Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check kubectl-mayastor binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check help output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check embedded release tag provenance: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
