name: Test Kylin on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-kylin.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-kylin.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-kylin.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-kylin.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-kylin.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-kylin.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-kylin.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-kylin.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-kylin.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-kylin.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-kylin.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-kylin.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-kylin.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-kylin.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-kylin.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-kylin.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-kylin.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-kylin.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-kylin.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-kylin.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-kylin.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-kylin.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-kylin.outputs.timestamp }}
jobs:
  test-kylin:
    runs-on: ubuntu-24.04-arm
    env:
      KYLIN_VERSION: "5.0.0"
      KYLIN_TAG: "kylin-5.0.0"
      KYLIN_NEXT_VERSION: "5.0.2"
      KYLIN_NEXT_TAG: "kylin-5.0.2"
      KYLIN_DIR: /tmp/kylin-smoke

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Kylin'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=kylin" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/kylin" >> "$GITHUB_OUTPUT"
          echo "current_version=${KYLIN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Kylin
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl tar openjdk-21-jre-headless"
          rm -rf "${KYLIN_DIR}"
          mkdir -p "${KYLIN_DIR}"
          cd "${KYLIN_DIR}"
          curl -fsSL -o "apache-kylin-${KYLIN_VERSION}-bin.tar.gz" \
            "https://github.com/apache/kylin/releases/download/${KYLIN_TAG}/apache-kylin-${KYLIN_VERSION}-bin.tar.gz"
          tar -xzf "apache-kylin-${KYLIN_VERSION}-bin.tar.gz"
          test -x "${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin/bin/kylin.sh"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Kylin version
        id: version
        run: |
          set -euo pipefail
          echo "version=${KYLIN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${KYLIN_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Kylin scripts exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASE="${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin"
          if [ -x "${BASE}/bin/kylin.sh" ] && \
             [ -x "${BASE}/bin/check-env.sh" ] && \
             [ -x "${BASE}/bin/sample.sh" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check release version mapping
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE="${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin"
          ARCHIVE_LIST="/tmp/kylin-archive-list.txt"
          JAR_LIST="/tmp/kylin-jar-list.txt"
          tar -tzf "${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin.tar.gz" > "${ARCHIVE_LIST}"
          find "${BASE}" -maxdepth 8 -type f -name '*.jar' > "${JAR_LIST}" || true
          if [ -d "${BASE}" ] && \
             [ -f "${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin.tar.gz" ] && \
             grep -Eq "^apache-kylin-${KYLIN_VERSION}-bin/|^apache-kylin-[^/]+-bin/" "${ARCHIVE_LIST}" && \
             [ -x "${BASE}/bin/kylin.sh" ] && \
             { [ -s "${JAR_LIST}" ] || [ -d "${BASE}/lib" ] || [ -d "${BASE}/server" ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sed -n '1,20p' "${ARCHIVE_LIST}" || true
            sed -n '1,20p' "${JAR_LIST}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Kylin help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASE="${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin"
          OUTPUT=$(bash "${BASE}/bin/kylin.sh" 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/kylin-help.log
          if printf '%s\n' "$OUTPUT" | grep -Eq "Usage: 'kylin.sh|Usage: kylin.sh|Apache Kylin"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/kylin-help.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASE="${KYLIN_DIR}/apache-kylin-${KYLIN_VERSION}-bin"
          OUTPUT=$(cd "${BASE}" && bash bin/check-env.sh 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/kylin-check-env.log
          if printf '%s\n' "$OUTPUT" | grep -Eq "Kylin is checking installation environment|Command 'hadoop' is not accessible|Checking OS Commands"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/kylin-check-env.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run, but the next stable release could not be resolved automatically from upstream releases." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          NEXT_TAG="kylin-${LATEST}"
          NEXT_ARCHIVE="${TMPDIR}/apache-kylin-${LATEST}-bin.tar.gz"
          NEXT_URL="https://github.com/apache/kylin/releases/download/${NEXT_TAG}/apache-kylin-${LATEST}-bin.tar.gz"
          if curl -fsSL -o "${NEXT_ARCHIVE}" "${NEXT_URL}"; then
            echo "Next version download status: passed"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run, but the candidate tarball for ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          tar -xzf "${NEXT_ARCHIVE}" -C "${TMPDIR}"
          NEXT_BASE="${TMPDIR}/apache-kylin-${LATEST}-bin"
          if [ ! -x "${NEXT_BASE}/bin/kylin.sh" ] || [ ! -x "${NEXT_BASE}/bin/check-env.sh" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not extract a usable Arm64 distribution." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          HELP_OUTPUT=$(bash "${NEXT_BASE}/bin/kylin.sh" 2>&1 || true)
          ENV_OUTPUT=$(cd "${NEXT_BASE}" && bash bin/check-env.sh 2>&1 || true)
          if ! printf '%s\n' "${HELP_OUTPUT}" | grep -Eq "Usage: 'kylin.sh|Usage: kylin.sh|Apache Kylin"; then
            printf '%s\n' "${HELP_OUTPUT}"
            echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not expose the expected Kylin launcher usage output on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! printf '%s\n' "${ENV_OUTPUT}" | grep -Eq "Kylin is checking installation environment|Command 'hadoop' is not accessible|Checking OS Commands"; then
            printf '%s\n' "${ENV_OUTPUT}"
            echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not complete the expected bounded environment-check path on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Next version installed on Arm64: ${LATEST}"
          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Kylin version ${CURRENT} passed smoke tests in this run. Regression validation downloaded and extracted candidate version ${LATEST} on Arm64 successfully, and the candidate scripts completed the expected bounded usage and environment-check paths." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Kylin Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Kylin scripts exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check release version mapping: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Kylin help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
