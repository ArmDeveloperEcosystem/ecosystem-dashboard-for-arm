name: Test Spark on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-spark.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-spark.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-spark.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-spark.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-spark.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-spark.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-spark.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-spark.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-spark.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-spark.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-spark.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-spark.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-spark.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-spark.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-spark.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-spark.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-spark.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-spark.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-spark.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-spark.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-spark.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-spark.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-spark.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-spark.outputs.timestamp }}
jobs:
  test-spark:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "3.5.3"
      HADOOP_VERSION: "3"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Spark'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spark" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spark" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Apache Spark
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk python3 python3-pip wget curl

          JAVA_BIN=$(readlink -f "$(which java)")
          echo "JAVA_HOME=$(dirname "$(dirname "$JAVA_BIN")")" >> "$GITHUB_ENV"

          cd /tmp
          ARCHIVE="spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}.tgz"
          URL="https://archive.apache.org/dist/spark/spark-${BASELINE_VERSION}/${ARCHIVE}"
          wget -q "$URL"

          sudo rm -rf "/opt/spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}"
          sudo rm -f /opt/spark
          sudo tar -xzf "$ARCHIVE" -C /opt/
          sudo ln -s "/opt/spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}" /opt/spark

          echo "SPARK_HOME=/opt/spark" >> "$GITHUB_ENV"
          echo "/opt/spark/bin" >> "$GITHUB_PATH"

          if [ -x /opt/spark/bin/spark-submit ] && [ -x /opt/spark/bin/pyspark ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Detect Spark version
        id: version
        run: |
          set -euo pipefail
          if [ -f /opt/spark/RELEASE ]; then
            VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' /opt/spark/RELEASE | head -n 1)
          else
            VERSION="${BASELINE_VERSION}"
          fi

          LATEST="$(
            CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import json
          import os
          import urllib.request

          current = os.environ.get("CURRENT_VERSION", "").strip()
          try:
              current_tuple = tuple(int(part) for part in current.split("."))
          except Exception:
              print("unknown")
              raise SystemExit(0)

          data = json.load(urllib.request.urlopen("https://api.github.com/repos/apache/spark/tags?per_page=100", timeout=20))
          stable = []
          for result in data:
              name = (result.get("name") or "").lstrip("v")
              lowered = name.lower()
              if any(marker in lowered for marker in ("preview", "rc")):
                  continue
              parts = name.split(".")
              if all(part.isdigit() for part in parts):
                  stable.append((tuple(int(part) for part in parts), name))

          if not stable:
              print("unknown")
              raise SystemExit(0)

          stable.sort(key=lambda item: item[0])
          next_newer = next((name for version_tuple, name in stable if version_tuple > current_tuple), "")
          print(next_newer if next_newer else current)
          PY
          )"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v spark-submit >/dev/null 2>&1 && \
             command -v spark-shell >/dev/null 2>&1 && \
             command -v pyspark >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          VERSION_OUTPUT=$(/opt/spark/bin/spark-submit --version 2>&1 || true)
          if grep -q "${{ steps.version.outputs.version }}" <<< "$VERSION_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$VERSION_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if /opt/spark/bin/spark-submit --help >/dev/null 2>&1 && \
             /opt/spark/bin/pyspark --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          cat > /tmp/pyspark_test.py <<'EOF'
          from pyspark.sql import SparkSession

          spark = SparkSession.builder \
              .appName("ARM64 PySpark Test") \
              .master("local[1]") \
              .getOrCreate()

          data = [("ARM64", 1), ("PySpark", 2), ("Test", 3)]
          df = spark.createDataFrame(data, ["name", "value"])

          print("PySpark DataFrame created successfully:")
          df.show()
          count = df.count()
          print(f"Row count: {count}")

          spark.stop()
          raise SystemExit(0 if count == 3 else 1)
          EOF

          if /opt/spark/bin/run-example SparkPi 10 > /tmp/sparkpi.txt 2>&1 && \
             grep -q "Pi is roughly" /tmp/sparkpi.txt && \
             /opt/spark/bin/spark-submit /tmp/pyspark_test.py > /tmp/pyspark.txt 2>&1 && \
             grep -q "PySpark DataFrame created successfully" /tmp/pyspark.txt && \
             grep -q "Row count: 3" /tmp/pyspark.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sparkpi.txt || true
            cat /tmp/pyspark.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the next newer stable Spark release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Spark version ${CURRENT} already matches the newest stable upstream Spark release visible to this workflow, so there is no newer stable candidate for Arm64 Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_TGZ="/tmp/spark-regression-${LATEST}.tgz"
          NEXT_DIR=$(mktemp -d)
          NEXT_ARCHIVE="spark-${LATEST}-bin-hadoop${HADOOP_VERSION}.tgz"
          NEXT_URL_PRIMARY="https://downloads.apache.org/spark/spark-${LATEST}/${NEXT_ARCHIVE}"
          NEXT_URL_FALLBACK="https://archive.apache.org/dist/spark/spark-${LATEST}/${NEXT_ARCHIVE}"

          if wget -q -O "$NEXT_TGZ" "$NEXT_URL_PRIMARY" || wget -q -O "$NEXT_TGZ" "$NEXT_URL_FALLBACK"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TGZ" -C "$NEXT_DIR"
            NEXT_ROOT="$NEXT_DIR/spark-${LATEST}-bin-hadoop${HADOOP_VERSION}"
            NEXT_BIN="$NEXT_ROOT/bin/spark-submit"
            if [ -x "$NEXT_BIN" ] && [ -x "$NEXT_ROOT/bin/pyspark" ] && [ -x "$NEXT_ROOT/bin/run-example" ]; then
              if [ -f "$NEXT_ROOT/RELEASE" ]; then
                NEXT_INSTALLED_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' "$NEXT_ROOT/RELEASE" | head -n 1 || true)
              else
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version 2>&1 | grep -Eo 'version [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' | head -n 1 || true)
              fi
          cat > /tmp/pyspark_regression_test.py <<'PYSPARK_EOF'
          from pyspark.sql import SparkSession
          
          spark = SparkSession.builder \
              .appName("ARM64 PySpark Regression Test") \
              .master("local[1]") \
              .getOrCreate()
          
          data = [("candidate", 1), ("arm64", 2), ("spark", 3)]
          df = spark.createDataFrame(data, ["name", "value"])
          
          print("PySpark candidate DataFrame created successfully:")
          df.show()
          count = df.count()
          print(f"Candidate row count: {count}")
          
          spark.stop()
          raise SystemExit(0 if count == 3 else 1)
          PYSPARK_EOF

              export SPARK_HOME="$NEXT_ROOT"
              if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ] && \
                 "$NEXT_BIN" --help >/tmp/spark-regression-help.txt 2>&1 && \
                 "$NEXT_ROOT/bin/pyspark" --help >/tmp/pyspark-regression-help.txt 2>&1 && \
                 "$NEXT_ROOT/bin/run-example" SparkPi 10 >/tmp/sparkpi-regression.txt 2>&1 && \
                 grep -q "Pi is roughly" /tmp/sparkpi-regression.txt && \
                 "$NEXT_BIN" /tmp/pyspark_regression_test.py >/tmp/pyspark-regression.txt 2>&1 && \
                 grep -q "PySpark candidate DataFrame created successfully" /tmp/pyspark-regression.txt && \
                 grep -q "Candidate row count: 3" /tmp/pyspark-regression.txt; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                if [ "$LATEST" = "$CURRENT" ]; then
                  echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
                  echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned Spark version ${CURRENT} already matches the newest stable upstream Spark release visible to this workflow, so there is no newer stable candidate for Arm64 Test 6." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: No newer stable release available for Test 6"
                  echo "status=skipped" >> "$GITHUB_OUTPUT"
                else
                  echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, the extracted Spark distribution reported version ${NEXT_INSTALLED_VERSION}, and the isolated candidate runtime completed both SparkPi and PySpark DataFrame smoke successfully." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Next version installed successfully on Arm64"
                  echo "status=passed" >> "$GITHUB_OUTPUT"
                fi
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
              else
                cat /tmp/spark-regression-help.txt || true
                cat /tmp/pyspark-regression-help.txt || true
                cat /tmp/sparkpi-regression.txt || true
                cat /tmp/pyspark-regression.txt || true
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not complete the isolated version, help, SparkPi, and PySpark runtime validation successfully on Arm64. The extracted candidate reported version ${NEXT_INSTALLED_VERSION:-unknown}." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Spark distribution on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded from the official Apache distribution paths." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable release available for Test 6"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Apache Spark Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.version.outputs.latest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression decision:** ${{ steps.test6.outputs.decision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression note:** ${{ steps.test6.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Or Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
