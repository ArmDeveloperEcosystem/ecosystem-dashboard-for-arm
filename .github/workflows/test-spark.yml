name: Test Spark on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/spark.md'
      - '.github/workflows/test-spark.yml'

jobs:
  test-spark:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "3.5.3"
      HADOOP_VERSION: "3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spark" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spark" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Apache Spark
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk python3 python3-pip wget curl

          JAVA_BIN=$(readlink -f "$(which java)")
          echo "JAVA_HOME=$(dirname "$(dirname "$JAVA_BIN")")" >> "$GITHUB_ENV"

          cd /tmp
          ARCHIVE="spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}.tgz"
          URL="https://archive.apache.org/dist/spark/spark-${BASELINE_VERSION}/${ARCHIVE}"
          wget -q "$URL"

          sudo rm -rf "/opt/spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}"
          sudo rm -f /opt/spark
          sudo tar -xzf "$ARCHIVE" -C /opt/
          sudo ln -s "/opt/spark-${BASELINE_VERSION}-bin-hadoop${HADOOP_VERSION}" /opt/spark

          echo "SPARK_HOME=/opt/spark" >> "$GITHUB_ENV"
          echo "/opt/spark/bin" >> "$GITHUB_PATH"

          if [ -x /opt/spark/bin/spark-submit ] && [ -x /opt/spark/bin/pyspark ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Detect Spark version
        id: version
        run: |
          set -euo pipefail
          if [ -f /opt/spark/RELEASE ]; then
            VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' /opt/spark/RELEASE | head -n 1)
          else
            VERSION="${BASELINE_VERSION}"
          fi

          LATEST="$(
            python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(urllib.request.urlopen("https://api.github.com/repos/apache/spark/tags?per_page=100", timeout=20))
          stable = []
          for result in data:
              name = (result.get("name") or "").lstrip("v")
              lowered = name.lower()
              if any(marker in lowered for marker in ("preview", "rc")):
                  continue
              parts = name.split(".")
              if all(part.isdigit() for part in parts):
                  stable.append(name)
          print(max(stable, key=lambda value: tuple(int(part) for part in value.split("."))) if stable else "unknown")
          PY
          )"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v spark-submit >/dev/null 2>&1 && \
             command -v spark-shell >/dev/null 2>&1 && \
             command -v pyspark >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          VERSION_OUTPUT=$(/opt/spark/bin/spark-submit --version 2>&1 || true)
          if grep -q "${{ steps.version.outputs.version }}" <<< "$VERSION_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$VERSION_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if /opt/spark/bin/spark-submit --help >/dev/null 2>&1 && \
             /opt/spark/bin/pyspark --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          cat > /tmp/pyspark_test.py <<'EOF'
          from pyspark.sql import SparkSession

          spark = SparkSession.builder \
              .appName("ARM64 PySpark Test") \
              .master("local[1]") \
              .getOrCreate()

          data = [("ARM64", 1), ("PySpark", 2), ("Test", 3)]
          df = spark.createDataFrame(data, ["name", "value"])

          print("PySpark DataFrame created successfully:")
          df.show()
          count = df.count()
          print(f"Row count: {count}")

          spark.stop()
          raise SystemExit(0 if count == 3 else 1)
          EOF

          if /opt/spark/bin/run-example SparkPi 10 > /tmp/sparkpi.txt 2>&1 && \
             grep -q "Pi is roughly" /tmp/sparkpi.txt && \
             /opt/spark/bin/spark-submit /tmp/pyspark_test.py > /tmp/pyspark.txt 2>&1 && \
             grep -q "PySpark DataFrame created successfully" /tmp/pyspark.txt && \
             grep -q "Row count: 3" /tmp/pyspark.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sparkpi.txt || true
            cat /tmp/pyspark.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_TGZ="/tmp/spark-regression-${LATEST}.tgz"
          NEXT_DIR=$(mktemp -d)
          NEXT_ARCHIVE="spark-${LATEST}-bin-hadoop${HADOOP_VERSION}.tgz"
          NEXT_URL_PRIMARY="https://downloads.apache.org/spark/spark-${LATEST}/${NEXT_ARCHIVE}"
          NEXT_URL_FALLBACK="https://archive.apache.org/dist/spark/spark-${LATEST}/${NEXT_ARCHIVE}"

          if wget -q -O "$NEXT_TGZ" "$NEXT_URL_PRIMARY" || wget -q -O "$NEXT_TGZ" "$NEXT_URL_FALLBACK"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TGZ" -C "$NEXT_DIR"
            NEXT_ROOT="$NEXT_DIR/spark-${LATEST}-bin-hadoop${HADOOP_VERSION}"
            NEXT_BIN="$NEXT_ROOT/bin/spark-submit"
            if [ -x "$NEXT_BIN" ] && [ -x "$NEXT_ROOT/bin/pyspark" ] && [ -x "$NEXT_ROOT/bin/run-example" ]; then
              if [ -f "$NEXT_ROOT/RELEASE" ]; then
                NEXT_INSTALLED_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' "$NEXT_ROOT/RELEASE" | head -n 1 || true)
              else
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version 2>&1 | grep -Eo 'version [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' | head -n 1 || true)
              fi
              cat > /tmp/pyspark_regression_test.py <<'EOF'
              from pyspark.sql import SparkSession

              spark = SparkSession.builder \
                  .appName("ARM64 PySpark Regression Test") \
                  .master("local[1]") \
                  .getOrCreate()

              data = [("candidate", 1), ("arm64", 2), ("spark", 3)]
              df = spark.createDataFrame(data, ["name", "value"])

              print("PySpark candidate DataFrame created successfully:")
              df.show()
              count = df.count()
              print(f"Candidate row count: {count}")

              spark.stop()
              raise SystemExit(0 if count == 3 else 1)
              EOF

              export SPARK_HOME="$NEXT_ROOT"
              if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ] && \
                 "$NEXT_BIN" --help >/tmp/spark-regression-help.txt 2>&1 && \
                 "$NEXT_ROOT/bin/pyspark" --help >/tmp/pyspark-regression-help.txt 2>&1 && \
                 "$NEXT_ROOT/bin/run-example" SparkPi 10 >/tmp/sparkpi-regression.txt 2>&1 && \
                 grep -q "Pi is roughly" /tmp/sparkpi-regression.txt && \
                 "$NEXT_BIN" /tmp/pyspark_regression_test.py >/tmp/pyspark-regression.txt 2>&1 && \
                 grep -q "PySpark candidate DataFrame created successfully" /tmp/pyspark-regression.txt && \
                 grep -q "Candidate row count: 3" /tmp/pyspark-regression.txt; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                if [ "$LATEST" = "$CURRENT" ]; then
                  echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
                  echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                else
                  echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, the extracted Spark distribution reported version ${NEXT_INSTALLED_VERSION}, and the isolated candidate runtime completed both SparkPi and PySpark DataFrame smoke successfully." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Next version installed successfully on Arm64"
                  echo "status=passed" >> "$GITHUB_OUTPUT"
                fi
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                cat /tmp/spark-regression-help.txt || true
                cat /tmp/pyspark-regression-help.txt || true
                cat /tmp/sparkpi-regression.txt || true
                cat /tmp/pyspark-regression.txt || true
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not complete the isolated version, help, SparkPi, and PySpark runtime validation successfully on Arm64. The extracted candidate reported version ${NEXT_INSTALLED_VERSION:-unknown}." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Spark distribution on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Spark version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded from the official Apache distribution paths." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || \'skipped\' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results

          cat > test-results/spark.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Apache Spark",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Scala",
              "category": "Databases - Big-data"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Binary Existence",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Version Check",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Help Or Configuration Validation",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spark-test-results
          path: test-results/spark.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Apache Spark Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.version.outputs.latest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression decision:** ${{ steps.test6.outputs.decision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression note:** ${{ steps.test6.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Or Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> "$GITHUB_STEP_SUMMARY"
