name: Test PopIns2 on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-popins2.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-popins2.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-popins2.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-popins2.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-popins2.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-popins2.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-popins2.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-popins2.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-popins2.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-popins2.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-popins2.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-popins2.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-popins2.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-popins2.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-popins2.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-popins2.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-popins2.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-popins2.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-popins2.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-popins2.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-popins2.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-popins2.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-popins2.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-popins2.outputs.timestamp }}
jobs:
  test-popins2:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      POPINS2_TAG: "v0.13.0"
      POPINS2_VERSION: "0.13.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'PopIns2'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=popins2" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/popins2" >> "$GITHUB_OUTPUT"
          echo "current_version=${POPINS2_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build PopIns2 baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git zlib1g-dev libbz2-dev liblzma-dev libbifrost-dev bwa samtools ca-certificates

          BUILD_ROOT="${RUNNER_TEMP}/popins2-${POPINS2_VERSION}"
          rm -rf "$BUILD_ROOT"
          git clone --recursive --depth 1 --branch "${POPINS2_TAG}" https://github.com/kehrlab/PopIns2.git "$BUILD_ROOT"
          mkdir -p "$BUILD_ROOT/build"
          cd "$BUILD_ROOT"
          if ! grep -q '^#include <cstdint>$' src/Traceback.h; then
            sed -i '13i #include <cstdint>' src/Traceback.h
          fi
          make -j2

          test -x "$BUILD_ROOT/popins2"
          echo "build_root=$BUILD_ROOT" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get PopIns2 version
        id: version
        run: |
          set -euo pipefail
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          VERSION=$(git -C "$BUILD_ROOT" describe --tags --exact-match | sed 's/^v//')
          NEXT_TAG=$(python3 - "$VERSION" <<'PY'
          import json
          import re
          import sys
          import urllib.request

          current = (sys.argv[1] or "").strip()
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", current):
              print("")
              raise SystemExit(0)

          tags = json.loads(urllib.request.urlopen("https://api.github.com/repos/kehrlab/PopIns2/tags?per_page=100", timeout=20).read().decode("utf-8"))
          versions = set()
          for tag in tags:
              name = (tag.get("name") or "").strip()
              match = re.fullmatch(r"v?([0-9]+\.[0-9]+\.[0-9]+)", name)
              if match:
                  versions.add(match.group(1))

          def key(value: str):
              return tuple(int(part) for part in value.split("."))

          current_key = key(current)
          candidates = sorted((v for v in versions if key(v) > current_key), key=key)
          print(f"v{candidates[0]}" if candidates else "")
          PY
          )
          NEXT_VERSION=$(printf '%s' "$NEXT_TAG" | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION:-$VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected PopIns2 release tag: $VERSION"
          echo "Next newer release candidate tag: ${NEXT_TAG:-none}"

      - name: Test 1 - Check binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"

          if [ -x "$BUILD_ROOT/popins2" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact release provenance
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          VERSION=$(git -C "$BUILD_ROOT" describe --tags --exact-match | sed 's/^v//')

          if [ "$VERSION" = "${POPINS2_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"

          "$BUILD_ROOT/popins2" --help >/tmp/popins2-help.log 2>&1 || true
          if grep -Eqi 'SYNOPSIS|COMMAND|VERSION|Try .*COMMAND --help|merge|contigmap|genotype' /tmp/popins2-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/popins2-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"

          "$BUILD_ROOT/popins2" >/tmp/popins2-command.log 2>&1 || true
          if grep -Eqi 'SYNOPSIS|COMMAND|merge|assemble|multik|contigmap|genotype' /tmp/popins2-command.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/popins2-command.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${POPINS2_VERSION}"
          LATEST_TAG="${{ steps.version.outputs.next_tag || '' }}"
          LATEST_VERSION=$(printf '%s' "$LATEST_TAG" | sed 's/^v//')
          NEXT_INSTALLED="not_installed"
          DECISION=""
          REGRESSION_RESULT=""
          COMPARISON=""
          STATUS="failed"

          if [ -z "$LATEST_TAG" ]; then
            DECISION="no_newer_stable_available"
            REGRESSION_RESULT="No newer stable release available for Test 6"
            COMPARISON="Current pinned baseline already matches the newest public stable upstream release, so there is no newer stable Arm64 candidate for a genuine Test 6 upgrade check."
            NEXT_INSTALLED="${CURRENT_VERSION}"
            LATEST_VERSION="${CURRENT_VERSION}"
            STATUS="skipped"
          else
            NEXT_ROOT="${RUNNER_TEMP}/popins2-${LATEST_VERSION}-next"
            rm -rf "$NEXT_ROOT"
            git clone --recursive --depth 1 --branch "${LATEST_TAG}" https://github.com/kehrlab/PopIns2.git "$NEXT_ROOT"
            mkdir -p "$NEXT_ROOT/build"
            cd "$NEXT_ROOT"
            if ! grep -q '^#include <cstdint>$' src/Traceback.h; then
              sed -i '13i #include <cstdint>' src/Traceback.h
            fi

            if make -j2 >/tmp/popins2-next.log 2>&1; then
              NEXT_INSTALLED=$(git -C "$NEXT_ROOT" describe --tags --exact-match | sed 's/^v//')
              "$NEXT_ROOT/popins2" >/tmp/popins2-next-help.log 2>&1 || true
              if [ "$NEXT_INSTALLED" = "$LATEST_VERSION" ] && grep -Eqi 'SYNOPSIS|COMMAND|merge|assemble|multik|contigmap|genotype' /tmp/popins2-next-help.log; then
                DECISION="next_install_validated"
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned PopIns2 version ${CURRENT_VERSION} passed smoke tests in this run. Regression validation built candidate ${LATEST_VERSION} on Arm64, and the candidate binary executed the root command/help path while exposing the expected command table."
                STATUS="passed"
              else
                cat /tmp/popins2-next-help.log || true
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned PopIns2 version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} did not expose the expected root command/help output on Arm64."
                STATUS="failed"
              fi
            else
              cat /tmp/popins2-next.log || true
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned PopIns2 version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} could not be built on Arm64."
              STATUS="failed"
            fi
          fi

          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${LATEST_VERSION}"
          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${COMPARISON}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" != "skipped" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          CORE_FAILED=0
          for status in \
            "${{ steps.test1.outputs.status || 'skipped' }}" \
            "${{ steps.test2.outputs.status || 'skipped' }}" \
            "${{ steps.test3.outputs.status || 'skipped' }}" \
            "${{ steps.test4.outputs.status || 'skipped' }}" \
            "${{ steps.test5.outputs.status || 'skipped' }}"; do
            if [ "$status" != "passed" ]; then
              CORE_FAILED=1
              break
            fi
          done
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## PopIns2 Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact release provenance: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
