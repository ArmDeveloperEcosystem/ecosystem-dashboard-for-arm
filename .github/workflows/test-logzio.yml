name: Test Logzio-agent-manifest on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-logzio.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-logzio.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-logzio.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-logzio.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-logzio.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-logzio.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-logzio.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-logzio.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-logzio.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-logzio.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-logzio.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-logzio.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-logzio.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-logzio.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-logzio.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-logzio.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-logzio.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-logzio.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-logzio.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-logzio.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-logzio.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-logzio.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-logzio.outputs.timestamp }}
jobs:
  test-logzio:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Logzio-agent-manifest'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=logzio" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/logzio" >> "$GITHUB_OUTPUT"
      - name: Install Logzio-agent-manifest
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "python3-pip python3-venv"
          VENV_DIR="$GITHUB_WORKSPACE/.venv-logzio"
          python3 -m venv "$VENV_DIR"
          "$VENV_DIR/bin/python" -m pip install --upgrade pip
          "$VENV_DIR/bin/pip" install logzio-python-handler

          echo "venv_dir=$VENV_DIR" >> "$GITHUB_OUTPUT"
          echo "python_path=$VENV_DIR/bin/python" >> "$GITHUB_OUTPUT"
          echo "pip_path=$VENV_DIR/bin/pip" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Logzio-agent-manifest version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.python_path }}" -c "from importlib.metadata import version; print(version('logzio-python-handler'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Logzio-agent-manifest version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Import Logzio handler module
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if "${{ steps.install.outputs.python_path }}" - <<'PY'
          import logzio
          from logzio.handler import LogzioHandler
          assert callable(LogzioHandler)
          PY
          then
            echo "✓ logzio python module found"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ logzio python module not found"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 2 - Format a LogRecord payload
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if "${{ steps.install.outputs.python_path }}" - <<'PY'
          import logging
          from logzio.handler import LogzioHandler

          handler = LogzioHandler(token="test-token", logzio_type="arm-smoke", logs_drain_timeout=0, backup_logs=False)
          record = logging.LogRecord("arm-smoke", logging.INFO, __file__, 12, "hello %s", ("world",), None)
          payload = handler.format_message(record)
          assert payload["logger"] == "arm-smoke"
          assert payload["type"] == "arm-smoke"
          assert payload["message"] == "hello world"
          PY
          then
            echo "✓ logzio formatted a log payload"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ logzio payload formatting failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 3 - Emit through handler without network
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if "${{ steps.install.outputs.python_path }}" - <<'PY'
          import logging
          from logzio.handler import LogzioHandler

          class MemorySender:
              def __init__(self):
                  self.events = []
              def append(self, payload):
                  self.events.append(payload)
              def flush(self):
                  pass

          handler = LogzioHandler(token="test-token", logs_drain_timeout=0, backup_logs=False)
          handler.logzio_sender = MemorySender()
          record = logging.LogRecord("arm-smoke", logging.WARNING, __file__, 34, "warning %s", ("event",), None)
          handler.emit(record)
          assert handler.logzio_sender.events[0]["message"] == "warning event"
          assert handler.logzio_sender.events[0]["log_level"] == "WARNING"
          PY
          then
            echo "✓ logzio handler emitted an in-memory event"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ logzio handler emit failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Preserve structured extra fields
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if "${{ steps.install.outputs.python_path }}" - <<'PY'
          import logging
          from logzio.handler import LogzioHandler

          handler = LogzioHandler(token="test-token", logs_drain_timeout=0, backup_logs=False)
          record = logging.LogRecord("arm-smoke", logging.INFO, __file__, 56, "metric", (), None)
          record.customer_id = "arm"
          record.measurements = {"latency_ms": 7}
          payload = handler.format_message(record)
          assert payload["customer_id"] == "arm"
          assert payload["measurements"] == {"latency_ms": 7}
          PY
          then
            echo "✓ logzio preserved structured extra fields"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ logzio extra field handling failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Flush handler sender
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if "${{ steps.install.outputs.python_path }}" - <<'PY'
          from logzio.handler import LogzioHandler

          class MemorySender:
              def __init__(self):
                  self.flushed = False
              def flush(self):
                  self.flushed = True

          handler = LogzioHandler(token="test-token", logs_drain_timeout=0, backup_logs=False)
          sender = MemorySender()
          handler.logzio_sender = sender
          handler.flush()
          assert sender.flushed
          PY
          then
            echo "✓ logzio handler flush called sender"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ logzio handler flush failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Import Logzio handler module
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Format a LogRecord payload
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Emit through handler without network
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Preserve structured extra fields
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Flush handler sender
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Logzio-agent-manifest Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Import Logzio handler module: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Format a LogRecord payload: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Emit through handler without network: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Preserve structured extra fields: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Flush handler sender: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
