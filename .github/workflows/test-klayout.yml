name: Test Klayout on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-klayout.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-klayout.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-klayout.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-klayout.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-klayout.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-klayout.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-klayout.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-klayout.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-klayout.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-klayout.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-klayout.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-klayout.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-klayout.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-klayout.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-klayout.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-klayout.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-klayout.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-klayout.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-klayout.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-klayout.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-klayout.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-klayout.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-klayout.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-klayout.outputs.timestamp }}

jobs:
  test-klayout:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "0.30.2"
      PACKAGE_SLUG: "klayout"
      APT_PACKAGES: "klayout"
      PRIMARY_DEB: "klayout"
      PRIMARY_COMMAND: "klayout"
      DOWNLOAD_URL: "https://github.com/KLayout/klayout/tags"
      HOMEPAGE_URL: "https://www.klayout.de/"
      OFFICIAL_DOCS: "https://www.klayout.de/doc.html"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Klayout'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_applicable_package_manager' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Package-manager runtime smoke; source regression is not applicable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'not_applicable' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_applicable' }}
      regression_policy: ${{ steps.test6.outputs.policy || 'not_applicable_package_manager' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=klayout" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/klayout" >> "$GITHUB_OUTPUT"

      - name: Install package from Ubuntu apt
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $APT_PACKAGES
          command -v "$PRIMARY_COMMAND"
          echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Get installed package version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(dpkg-query -W -f='${Version}' "$PRIMARY_DEB")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected apt package version: $VERSION"

      - name: Test 1 - Package-manager install evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          dpkg-query -W -f='${Package} ${Architecture} ${Version}\n' $APT_PACKAGES
          command -v "$PRIMARY_COMMAND"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Installed Arm64 package metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          DOC_PATH="content/linux/opensource_packages/${PACKAGE_SLUG}.md"
          test "$(dpkg-query -W -f='${Architecture}' "$PRIMARY_DEB")" = "arm64"
          grep -Fq "works_on_arm: true" "$DOC_PATH"
          grep -Fq "download_url: $DOWNLOAD_URL" "$DOC_PATH"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - CLI version starts on Arm
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          klayout -v
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 runner gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          test "$(uname -m)" = "aarch64"
          test "$(dpkg --print-architecture)" = "arm64"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - KLayout batch layout smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat > smoke.rb <<'RUBY'
          layout = RBA::Layout::new
          top = layout.create_cell("TOP")
          layer = layout.layer(1, 0)
          top.shapes(layer).insert(RBA::Box::new(0, 0, 1000, 1000))
          layout.write("smoke.gds")
          raise "GDS was not written" unless File.size("smoke.gds") > 0
          RUBY
          klayout -b -r smoke.rb
          test -s smoke.gds
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression validation applicability
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Source/artifact regression is not applicable to this apt package-manager runtime smoke." >> "$GITHUB_OUTPUT"
          echo "comparison=Installed $PRIMARY_DEB from Ubuntu apt on Arm64 and ran CPU-side runtime smokes; no separate next source artifact is selected." >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "policy=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"
