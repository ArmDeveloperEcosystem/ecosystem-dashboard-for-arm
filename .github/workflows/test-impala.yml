name: Test Impala on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-impala.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-impala.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-impala.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-impala.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-impala.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-impala.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-impala.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-impala.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-impala.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-impala.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-impala.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-impala.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-impala.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-impala.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-impala.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-impala.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-impala.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-impala.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-impala.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-impala.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-impala.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-impala.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-impala.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-impala.outputs.timestamp }}

jobs:
  test-impala:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      IMPALA_VERSION: "4.5.0"
      IMPALA_RELEASE_URL: "https://github.com/apache/impala/releases/download/4.5.0/apache-impala-4.5.0-RELEASE_hive-3.1.3-aarch64.ubuntu-20.04.deb"
      IMPALA_WORKDIR: "/tmp/impala-smoke"
      IMPALA_IMAGE: "ubuntu:20.04"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Impala'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=impala" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/impala" >> "$GITHUB_OUTPUT"

      - name: Install Impala baseline
        id: install
        run: |
          set -euo pipefail
          docker --version >/dev/null

          rm -rf "${IMPALA_WORKDIR}"
          mkdir -p "${IMPALA_WORKDIR}/image" "${IMPALA_WORKDIR}/work"

          curl -fsSL -o "${IMPALA_WORKDIR}/work/impala.deb" "${IMPALA_RELEASE_URL}"
          dpkg-deb -x "${IMPALA_WORKDIR}/work/impala.deb" "${IMPALA_WORKDIR}/work/extracted"

          test -x "${IMPALA_WORKDIR}/work/extracted/opt/impala/sbin/impalad"
          test -x "${IMPALA_WORKDIR}/work/extracted/opt/impala/shell/impala-shell"

          cat > "${IMPALA_WORKDIR}/image/Dockerfile" <<'EOF'
          FROM ubuntu:20.04
          RUN apt-get update \
            && DEBIAN_FRONTEND=noninteractive apt-get install -y \
              ca-certificates \
              curl \
              file \
              openjdk-11-jre-headless \
              python3 \
              locales \
            && locale-gen en_US.UTF-8 \
            && rm -rf /var/lib/apt/lists/*
          ENV LC_ALL=C.UTF-8
          ENV LANG=C.UTF-8
          ENV JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64
          EOF

          docker build --platform linux/arm64 -t "impala-arm64-smoke:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" "${IMPALA_WORKDIR}/image"

          cat > "${IMPALA_WORKDIR}/work/run_impala_command.sh" <<'EOF'
          set -euo pipefail
          ROOT="$1"
          shift
          export LD_LIBRARY_PATH="${ROOT}/opt/impala/lib/native:${ROOT}/opt/impala/lib:${ROOT}/opt/impala/lib64:${JAVA_HOME}/lib/server:${LD_LIBRARY_PATH:-}"
          exec "$@"
          EOF
          chmod +x "${IMPALA_WORKDIR}/work/run_impala_command.sh"

          docker run --rm --platform linux/arm64 \
            -v "${IMPALA_WORKDIR}/work:/work" \
            "impala-arm64-smoke:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash /work/run_impala_command.sh /work/extracted \
            /work/extracted/opt/impala/shell/impala-shell --version | tee /tmp/impala-shell-version.txt

          docker run --rm --platform linux/arm64 \
            -v "${IMPALA_WORKDIR}/work:/work" \
            "impala-arm64-smoke:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            bash /work/run_impala_command.sh /work/extracted \
            /work/extracted/opt/impala/sbin/impalad --version | tee /tmp/impalad-version.txt

          grep -q "${IMPALA_VERSION}" /tmp/impala-shell-version.txt
          grep -q "${IMPALA_VERSION}" /tmp/impalad-version.txt

          echo "image_tag=impala-arm64-smoke:${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "work_dir=${IMPALA_WORKDIR}/work" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Impala version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' /tmp/impala-shell-version.txt | head -n 1 || true)
          if [ -z "${VERSION}" ]; then
            VERSION="${IMPALA_VERSION}"
          fi

          LATEST="$(python3 - <<'PY'
          import json, urllib.request
          current = "4.5.0"
          data = json.load(urllib.request.urlopen('https://api.github.com/repos/apache/impala/releases?per_page=20'))
          versions = []
          for rel in data:
              tag = rel.get('tag_name', '')
              if tag and tag[0].isdigit() and all(part.isdigit() for part in tag.split('.')):
                  versions.append(tag)
          versions = sorted(set(versions), key=lambda v: [int(part) for part in v.split('.')])
          next_version = ''
          found = False
          for version in versions:
              if found:
                  next_version = version
                  break
              if version == current:
                  found = True
          print(next_version)
          PY
          )"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Impala version: ${VERSION}"
          echo "Detected next stable release: ${LATEST:-none}"

      - name: Test 1 - Check Impala server binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ROOT="${{ steps.install.outputs.work_dir }}/extracted/opt/impala"

          if [ -x "${ROOT}/sbin/impalad" ] && [ -x "${ROOT}/sbin/catalogd" ] && [ -x "${ROOT}/sbin/statestored" ] && [ -x "${ROOT}/shell/impala-shell" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check impala-shell version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if grep -q "${IMPALA_VERSION}" /tmp/impala-shell-version.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/impala-shell-version.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check impala-shell help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image_tag }}"
          WORK_DIR="${{ steps.install.outputs.work_dir }}"

          if docker run --rm --platform linux/arm64 -v "${WORK_DIR}:/work" "${IMAGE}" \
            bash /work/run_impala_command.sh /work/extracted \
            /work/extracted/opt/impala/shell/impala-shell --help 2>&1 | tee /tmp/impala-shell-help.txt | grep -Eqi 'usage|options|impala-shell'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/impala-shell-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ROOT="${{ steps.install.outputs.work_dir }}/extracted/opt/impala"

          if [ "$(uname -m)" = "aarch64" ] && file "${ROOT}/sbin/impalad" | grep -qi 'ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${ROOT}/sbin/impalad" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check impalad version output
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if grep -q "${IMPALA_VERSION}" /tmp/impalad-version.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/impalad-version.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          IMAGE="${{ steps.install.outputs.image_tag }}"
          WORK_DIR="${{ steps.install.outputs.work_dir }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT:-${IMPALA_VERSION}}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ] || [ "${LATEST}" = "${CURRENT}" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable version available for Arm64 regression validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Impala version ${CURRENT} passed smoke tests in this run and already matches the newest stable Arm64 package release in the tested lane." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_URL="https://github.com/apache/impala/releases/download/${LATEST}/apache-impala-${LATEST}-RELEASE_hive-3.1.3-aarch64.ubuntu-20.04.deb"
          rm -rf "${WORK_DIR}/next-extracted"
          curl -fsSL -o "${WORK_DIR}/impala-next.deb" "${NEXT_URL}"
          dpkg-deb -x "${WORK_DIR}/impala-next.deb" "${WORK_DIR}/next-extracted"

          NEXT_SHELL=$(docker run --rm --platform linux/arm64 -v "${WORK_DIR}:/work" "${IMAGE}" \
            bash /work/run_impala_command.sh /work/next-extracted \
            /work/next-extracted/opt/impala/shell/impala-shell --version 2>&1 | tee /tmp/impala-next-shell-version.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)

          if docker run --rm --platform linux/arm64 -v "${WORK_DIR}:/work" "${IMAGE}" \
            bash /work/run_impala_command.sh /work/next-extracted \
            /work/next-extracted/opt/impala/sbin/impalad --version 2>&1 | tee /tmp/impala-next-impalad-version.txt | grep -q "${LATEST}" && [ "${NEXT_SHELL}" = "${LATEST}" ]; then
            echo "next_installed_version=${NEXT_SHELL}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Impala version ${CURRENT} passed smoke tests in this run. Regression validation unpacked candidate version ${LATEST} from the official Arm64 package lane, and both impala-shell and impalad reported the expected version inside an Ubuntu 20.04 Arm64 container." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_SHELL:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Impala version ${CURRENT} passed smoke tests in this run, but the candidate Arm64 package lane for ${LATEST} did not complete the expected version validation in the Ubuntu 20.04 container." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          if [ "$TEST6_STATUS" = "skipped" ]; then
            SKIPPED=1
          else
            SKIPPED=0
          fi

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "skipped=${SKIPPED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Impala Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check Impala server binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check impala-shell version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check impala-shell help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Check impalad version output: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
