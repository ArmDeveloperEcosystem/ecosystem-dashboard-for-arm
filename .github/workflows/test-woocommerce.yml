name: Test WooCommerce on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/woocommerce.md"
      - ".github/workflows/test-woocommerce.yml"

jobs:
  test-woocommerce:
    runs-on: ubuntu-24.04-arm
    env:
      WORDPRESS_VERSION: "6.9.4"
      WORDPRESS_URL: "https://wordpress.org/wordpress-6.9.4.tar.gz"
      WC_VERSION: "9.5.1"
      WC_NEXT_VERSION: "9.5.2"
      WC_URL: "https://github.com/woocommerce/woocommerce/releases/download/9.5.1/woocommerce.zip"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=woocommerce" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/woocommerce" >> "$GITHUB_OUTPUT"
      - name: Install WooCommerce
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y php-cli php-curl php-xml php-mbstring php-zip php-mysql curl unzip tar

          TMP_DIR=$(mktemp -d)
          cleanup() {
            rm -rf "${TMP_DIR}"
          }
          trap cleanup EXIT

          curl -fsSL -o "${TMP_DIR}/wordpress.tar.gz" "${WORDPRESS_URL}"
          tar -xzf "${TMP_DIR}/wordpress.tar.gz" -C "${TMP_DIR}"
          rm -rf wordpress
          mv "${TMP_DIR}/wordpress" wordpress
          mkdir -p wordpress/wp-content/plugins

          curl -fsSL -o "${TMP_DIR}/woocommerce.zip" "${WC_URL}"
          unzip -q "${TMP_DIR}/woocommerce.zip" -d wordpress/wp-content/plugins

          if [ -f wordpress/wp-content/plugins/woocommerce/woocommerce.php ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get WooCommerce version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(php -r '
          $plugin = file_get_contents("wordpress/wp-content/plugins/woocommerce/woocommerce.php");
          if (preg_match("/^\\s*\\*?\\s*Version:\\s*(.+)$/mi", $plugin, $m)) {
              echo trim($m[1]);
          } else {
              echo "unknown";
          }')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${WC_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Plugin File Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f wordpress/wp-content/plugins/woocommerce/woocommerce.php ] && [ -f wordpress/wp-content/plugins/woocommerce/readme.txt ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(php -r '
          $plugin = file_get_contents("wordpress/wp-content/plugins/woocommerce/woocommerce.php");
          if (preg_match("/^\\s*\\*?\\s*Version:\\s*(.+)$/mi", $plugin, $m)) {
              echo trim($m[1]);
          }')
          if [ "${VERSION_OUTPUT}" = "${WC_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${VERSION_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - PHP Lint And Plugin Metadata Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if php -l wordpress/wp-content/plugins/woocommerce/woocommerce.php >/tmp/woocommerce-lint.txt 2>&1 && \
             grep -q "Plugin Name: WooCommerce" wordpress/wp-content/plugins/woocommerce/woocommerce.php; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/woocommerce-lint.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - WordPress And Plugin Smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          nohup php -S 127.0.0.1:18083 -t wordpress >/tmp/woocommerce-server.log 2>&1 &
          WP_PID=$!
          READY=0
          for _ in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18083/wp-admin/install.php >/tmp/woocommerce-body.txt 2>/dev/null; then
              READY=1
              break
            fi
            sleep 2
          done

          if kill -0 "$WP_PID" 2>/dev/null; then
            kill "$WP_PID" || true
            wait "$WP_PID" || true
          fi

          if [ "$READY" -eq 1 ] && \
             grep -qi 'WordPress' /tmp/woocommerce-body.txt && \
             [ -f wordpress/wp-content/plugins/woocommerce/includes/class-woocommerce.php ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/woocommerce-server.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned WooCommerce version ${CURRENT} passed source-zip validation in this run, but the latest stable WooCommerce release could not be resolved for isolated Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          cleanup() {
            if [ -n "${WP_PID:-}" ] && kill -0 "${WP_PID}" 2>/dev/null; then
              kill "${WP_PID}" 2>/dev/null || true
              wait "${WP_PID}" 2>/dev/null || true
            fi
            rm -rf "${TMP_DIR}"
          }
          trap cleanup EXIT

          curl -fsSL -o "${TMP_DIR}/wordpress.tar.gz" "${WORDPRESS_URL}"
          tar -xzf "${TMP_DIR}/wordpress.tar.gz" -C "${TMP_DIR}"
          mkdir -p "${TMP_DIR}/wordpress/wp-content/plugins"
          curl -fsSL -o "${TMP_DIR}/woocommerce.zip" "https://github.com/woocommerce/woocommerce/releases/download/${LATEST}/woocommerce.zip"
          unzip -q "${TMP_DIR}/woocommerce.zip" -d "${TMP_DIR}/wordpress/wp-content/plugins"

          NEXT_PLUGIN="${TMP_DIR}/wordpress/wp-content/plugins/woocommerce/woocommerce.php"
          NEXT_INSTALLED_VERSION=$(php -r '
          $plugin = file_get_contents($argv[1]);
          if (preg_match("/^\\s*\\*?\\s*Version:\\s*(.+)$/mi", $plugin, $m)) {
              echo trim($m[1]);
          } else {
              echo "unknown";
          }' "${NEXT_PLUGIN}")

          php -l "${NEXT_PLUGIN}" >/tmp/woocommerce-next-lint.log 2>&1
          php -S 127.0.0.1:18084 -t "${TMP_DIR}/wordpress" >/tmp/woocommerce-next-server.log 2>&1 &
          WP_PID=$!
          READY=0
          for _ in $(seq 1 20); do
            if curl -fsSL http://127.0.0.1:18084/wp-admin/install.php >/tmp/woocommerce-next-body.txt 2>/dev/null; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -eq 1 ] && \
             [ "$NEXT_INSTALLED_VERSION" != "unknown" ] && \
             [ -f "${TMP_DIR}/wordpress/wp-content/plugins/woocommerce/includes/class-woocommerce.php" ]; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned WooCommerce version ${CURRENT} passed source-zip validation in this run, and candidate release ${LATEST} also passed exact version, PHP lint, and WordPress installer-page smoke on Arm64 from a fresh isolated install." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            cat /tmp/woocommerce-next-lint.log || true
            cat /tmp/woocommerce-next-server.log || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned WooCommerce version ${CURRENT} passed source-zip validation in this run, but candidate release ${LATEST} did not complete the isolated exact version, PHP lint, and WordPress installer-page smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
            if job.get("name") in (f"{job_id} / {job_id}", job_id):
              print(job.get("html_url", ""))
              break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/woocommerce.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "WooCommerce",
              "version": "${{ steps.version.outputs.version }}",
              "language": "PHP",
              "category": "E-commerce platforms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Plugin file existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Exact version check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "PHP lint and plugin metadata validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "WordPress and plugin smoke", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: woocommerce-test-results
          path: test-results/woocommerce.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## WooCommerce Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Plugin file existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. PHP lint and plugin metadata validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. WordPress and plugin smoke: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
