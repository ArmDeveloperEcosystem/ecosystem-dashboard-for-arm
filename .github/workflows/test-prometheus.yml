name: Test Prometheus on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/prometheus.md"
      - ".github/workflows/test-prometheus.yml"

jobs:
  test-prometheus:
    runs-on: ubuntu-24.04-arm
    env:
      PROMETHEUS_VERSION: "3.1.0"
      PROMETHEUS_NEXT_VERSION: "3.2.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=prometheus" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/prometheus" >> "$GITHUB_OUTPUT"
          echo "current_version=${PROMETHEUS_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Prometheus
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          WORKDIR="/tmp/prometheus-current"
          URL="https://github.com/prometheus/prometheus/releases/download/v${VERSION}/prometheus-${VERSION}.linux-arm64.tar.gz"

          sudo apt-get update
          sudo apt-get install -y curl ca-certificates jq file

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          curl -fsSL "$URL" -o "$WORKDIR/prometheus.tar.gz"
          tar -xzf "$WORKDIR/prometheus.tar.gz" -C "$WORKDIR"

          BASE_DIR=$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d -name "prometheus-*.linux-arm64" | head -n 1)
          if [ -z "$BASE_DIR" ] || [ ! -x "$BASE_DIR/prometheus" ] || [ ! -x "$BASE_DIR/promtool" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "base_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Prometheus version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("$BASE_DIR/prometheus" --version 2>&1 | sed -n 's/^prometheus, version \([^ ]*\).*/\1/p' | head -n 1)
          LATEST="${PROMETHEUS_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -x "$BASE_DIR/prometheus" ] && [ -x "$BASE_DIR/promtool" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$("$BASE_DIR/prometheus" --version 2>&1 | sed -n 's/^prometheus, version \([^ ]*\).*/\1/p' | head -n 1)
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$BASE_DIR/prometheus" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Config Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/prometheus-config-check"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          cat > "$ROOT/prometheus.yml" <<'EOF'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: "self"
              static_configs:
                - targets: ["127.0.0.1:19090"]
          EOF
          if "$BASE_DIR/promtool" check config "$ROOT/prometheus.yml" >/tmp/prometheus-promtool.out 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/prometheus-promtool.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ "$(uname -m)" = "aarch64" ] && file "$BASE_DIR/prometheus" | grep -qiE "ARM aarch64|aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "$BASE_DIR/prometheus" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/prometheus-functional"
          rm -rf "$ROOT"
          mkdir -p "$ROOT/data"
          cat > "$ROOT/prometheus.yml" <<'EOF'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: "self"
              static_configs:
                - targets: ["127.0.0.1:19090"]
          EOF

          cleanup() {
            if [ -n "${PROM_PID:-}" ]; then
              kill "$PROM_PID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "$BASE_DIR/prometheus" \
            --config.file="$ROOT/prometheus.yml" \
            --storage.tsdb.path="$ROOT/data" \
            --web.listen-address=127.0.0.1:19090 \
            >/tmp/prometheus-functional.log 2>&1 &
          PROM_PID=$!

          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:19090/-/healthy >/tmp/prometheus-health.txt 2>/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:19090/api/v1/status/buildinfo >/tmp/prometheus-buildinfo.json
          REPORTED=$(jq -r '.data.version' /tmp/prometheus-buildinfo.json)
          if grep -q "Healthy" /tmp/prometheus-health.txt && [ "$REPORTED" = "${{ steps.metadata.outputs.current_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/prometheus-functional.log || true
            cat /tmp/prometheus-buildinfo.json || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Prometheus version $CURRENT passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          ROOT="/tmp/prometheus-regression"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          curl -fsSL \
            "https://github.com/prometheus/prometheus/releases/download/v${LATEST}/prometheus-${LATEST}.linux-arm64.tar.gz" \
            -o "$ROOT/prometheus.tar.gz"
          tar -xzf "$ROOT/prometheus.tar.gz" -C "$ROOT"
          NEXT_DIR=$(find "$ROOT" -mindepth 1 -maxdepth 1 -type d -name "prometheus-*.linux-arm64" | head -n 1)
          NEXT_PROM="$NEXT_DIR/prometheus"
          NEXT_TOOL="$NEXT_DIR/promtool"

          if [ ! -x "$NEXT_PROM" ] || [ ! -x "$NEXT_TOOL" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Prometheus version $CURRENT passed smoke tests in this run, but the candidate release $LATEST did not extract a usable Arm64 binary set." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION=$("$NEXT_PROM" --version 2>&1 | sed -n 's/^prometheus, version \([^ ]*\).*/\1/p' | head -n 1)
          if [ -z "$NEXT_VERSION" ]; then
            NEXT_VERSION="$LATEST"
          fi

          cat > "$ROOT/prometheus.yml" <<'EOF'
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: "self"
              static_configs:
                - targets: ["127.0.0.1:19091"]
          EOF

          cleanup() {
            if [ -n "${PROM_PID:-}" ]; then
              kill "$PROM_PID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          "$NEXT_TOOL" check config "$ROOT/prometheus.yml" >/tmp/prometheus-regression-promtool.out 2>&1
          "$NEXT_PROM" \
            --config.file="$ROOT/prometheus.yml" \
            --storage.tsdb.path="$ROOT/data" \
            --web.listen-address=127.0.0.1:19091 \
            >/tmp/prometheus-regression.log 2>&1 &
          PROM_PID=$!

          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:19091/-/healthy >/tmp/prometheus-regression-health.txt 2>/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:19091/api/v1/status/buildinfo >/tmp/prometheus-regression-buildinfo.json
          RUNTIME_VERSION=$(jq -r '.data.version' /tmp/prometheus-regression-buildinfo.json)

          if [ "$NEXT_VERSION" = "$LATEST" ] && [ "$RUNTIME_VERSION" = "$LATEST" ] && grep -q "Healthy" /tmp/prometheus-regression-health.txt; then
            echo "next_installed_version=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Prometheus version $CURRENT passed smoke tests in this run. Regression validation installed candidate version $LATEST on Arm64, and the candidate binary reported runtime version $RUNTIME_VERSION while passing config and health checks." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $RUNTIME_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/prometheus-regression-promtool.out || true
            cat /tmp/prometheus-regression.log || true
            cat /tmp/prometheus-regression-buildinfo.json || true
            echo "next_installed_version=${RUNTIME_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Prometheus version $CURRENT passed smoke tests in this run, but the candidate release $LATEST did not complete a healthy Arm64 startup with the expected runtime version." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${RUNTIME_VERSION:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/prometheus.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Prometheus",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Config Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-test-results
          path: test-results/prometheus.json
          retention-days: 90
