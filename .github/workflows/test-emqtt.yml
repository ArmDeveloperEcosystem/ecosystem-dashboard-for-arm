# 2. Replace all EMQTT (Erlang Message Queue Telemetry Transport) placeholders with your package name (e.g., "Redis")
# 3. Replace all emqtt placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the appropriate trigger(s) in the 'on:' section
#
# See .github/workflows/test-nginx.yml and test-envoy.yml for real examples. Template
#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all EMQTT (Erlang Message Queue Telemetry Transport) placeholders with your package name (e.g., "Redis")
# 3. Replace all emqtt placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the 'push:' trigger section below (remove the workflow_dispatch if desired)
#
# See test-nginx.yml and test-envoy.yml for real examples.

name: Test EMQTT (Erlang Message Queue Telemetry Transport) on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-emqtt.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-emqtt.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-emqtt.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-emqtt.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-emqtt.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-emqtt.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-emqtt.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-emqtt.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-emqtt.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-emqtt.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-emqtt.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-emqtt.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-emqtt.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-emqtt.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-emqtt.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-emqtt.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-emqtt.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-emqtt.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-emqtt.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-emqtt.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-emqtt.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-emqtt.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-emqtt.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-emqtt.outputs.timestamp }}
jobs:
  test-emqtt:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      EMQTT_VERSION: "1.4.4"
      EMQTT_REPO: "https://github.com/emqx/emqtt"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'EMQTT (Erlang Message Queue Telemetry Transport)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=emqtt" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/emqtt" >> "$GITHUB_OUTPUT"
      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '25.3'
          rebar3-version: '3.20'

      - name: Install EMQTT client from source
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "git curl make build-essential ca-certificates"

          BUILD_ROOT="${RUNNER_TEMP}/emqtt-${EMQTT_VERSION}"
          rm -rf "$BUILD_ROOT"
          git clone --depth 1 --branch "${EMQTT_VERSION}" "${EMQTT_REPO}.git" "$BUILD_ROOT"
          cd "$BUILD_ROOT"

          cp "$(command -v rebar3)" ./rebar3
          chmod +x ./rebar3
          ./rebar3 version
          export CFLAGS="${CFLAGS:-} -Wno-error=dangling-pointer -Wno-dangling-pointer"
          export CMAKE_C_FLAGS="${CMAKE_C_FLAGS:-} -Wno-error=dangling-pointer -Wno-dangling-pointer"
          make escript

          if [ -x "_build/escript/bin/emqtt_cli" ]; then
             sudo cp _build/escript/bin/emqtt_cli /usr/local/bin/emqtt_cli
          else
             find . -name emqtt_cli -type f
             BIN=$(find . -name emqtt_cli -type f | head -n 1)
             if [ -n "$BIN" ]; then
                sudo cp "$BIN" /usr/local/bin/emqtt_cli
             else
                echo "Build failed to produce emqtt_cli binary"
                exit 1
             fi
          fi

          sudo chmod +x /usr/local/bin/emqtt_cli
          if command -v emqtt_cli >/dev/null 2>&1; then
            echo "source_dir=$BUILD_ROOT" >> "$GITHUB_OUTPUT"
            echo "binary_path=/usr/local/bin/emqtt_cli" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "emqtt_cli installation failed"
            exit 1
          fi
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get EMQTT version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(git -C "${{ steps.install.outputs.source_dir }}" describe --tags --exact-match | sed 's/^v//')"
          NEXT="$(git ls-remote --tags --refs "${EMQTT_REPO}.git" \
            | awk -F/ '{print $3}' \
            | sed 's/^v//' \
            | grep -E '^[0-9]+(\.[0-9]+){2}$' \
            | sort -V \
            | awk -v current="$VERSION" '$0 == current { found=1; next } found { print; exit }' || true)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT:-$VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected EMQTT version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check emqtt_cli binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          STATUS="failed"
          if command -v emqtt_cli >/dev/null 2>&1; then
            echo "emqtt_cli binary found"
            STATUS="passed"
          else
            echo "emqtt_cli binary not found"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failed" ]; then exit 1; fi

      
      - name: Test 2 - Check EMQTT root help output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          STATUS="failed"
          if emqtt_cli 2>&1 | grep -Eqi "Usage: emqtt pub|sub"; then
            echo "emqtt_cli root command prints expected usage"
            STATUS="passed"
          else
            emqtt_cli 2>&1 || true
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failed" ]; then exit 1; fi

      
      - name: Test 3 - Check EMQTT publish help
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          STATUS="failed"
          if emqtt_cli pub --help 2>&1 | grep -Eqi "Usage: emqtt pub|--payload|--topic"; then
             echo "emqtt_cli pub help works"
             STATUS="passed"
          else
             emqtt_cli pub --help 2>&1 || true
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failed" ]; then exit 1; fi

      
      - name: Test 4 - Check EMQTT subscribe help
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          STATUS="failed"
          if emqtt_cli sub --help 2>&1 | grep -Eqi "Usage: emqtt sub|--topic|--qos"; then
             echo "emqtt_cli sub help works"
             STATUS="passed"
          else
             emqtt_cli sub --help 2>&1 || true
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failed" ]; then exit 1; fi

      
      - name: Test 5 - Publish command handles missing broker
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          STATUS="failed"
          OUTPUT=$(timeout 20 emqtt_cli pub -h 127.0.0.1 -p 1883 -t arm64/smoke --payload hello 2>&1 || true)
          
          if echo "$OUTPUT" | grep -Eqi "failed to sent CONNECT|econnrefused|nxdomain|refused|timeout"; then
             echo "emqtt_cli attempted MQTT publish path and failed gracefully without a broker"
             STATUS="passed"
          else
             echo "Unexpected emqtt_cli output: $OUTPUT"
             STATUS="failed"
          fi
          
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failed" ]; then exit 1; fi

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || env.EMQTT_VERSION || 'unknown' }}"

          export CURRENT_VERSION
          NEXT_LOOKUP="$(
          python3 - <<'PY'
          import os
          import re
          import subprocess
          
          current = os.environ.get("CURRENT_VERSION", "").strip()
          match = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)', current.strip())
          if not match:
              print("__lookup_failed__")
              raise SystemExit(0)
          
          current_tuple = tuple(int(x) for x in match.groups())
          try:
              out = subprocess.check_output(
                  ['git', 'ls-remote', '--tags', 'https://github.com/emqx/emqtt.git'],
                  text=True,
              )
          except Exception:
              print("__lookup_failed__")
              raise SystemExit(0)
          
          candidates = set()
          for line in out.splitlines():
              ref = line.split('\t')[-1]
              if not ref.startswith('refs/tags/'):
                  continue
              tag = ref.replace('refs/tags/', '').replace('^{}', '')
              m = re.fullmatch(r'v?(\d+)\.(\d+)\.(\d+)', tag)
              if not m:
                  continue
              tup = tuple(int(x) for x in m.groups())
              if tup > current_tuple:
                  candidates.add((tup, '.'.join(m.groups())))
          
          if not candidates:
              print("")
          else:
              print(sorted(candidates)[0][1])
          PY
          )"

          if [ "${NEXT_LOOKUP}" = "__lookup_failed__" ]; then
            DECISION="next_lookup_failed"
            REGRESSION_RESULT="Next version lookup failed on Arm64"
            DETAILS="Baseline EMQTT version from Tests 1-5 could not be parsed or upstream tags could not be queried, so Test 6 could not resolve a deterministic next newer candidate."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "next_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "result=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "details=${DETAILS}" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION="${NEXT_LOOKUP}"

          if [ -z "${NEXT_VERSION}" ]; then
            DECISION="no_newer_stable_available"
            REGRESSION_RESULT="No newer stable EMQTT release is available for Test 6"
            DETAILS="Current baseline EMQTT ${CURRENT_VERSION} already matches the newest stable semver tag available for Arm64 build validation."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "next_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "result=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "details=${DETAILS}" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Running next-version validation for EMQTT ${NEXT_VERSION}"
          WORKDIR="$(mktemp -d)"
          git clone --depth 1 --branch "${NEXT_VERSION}" "${EMQTT_REPO}.git" "${WORKDIR}/emqtt-next"
          (
            cd "${WORKDIR}/emqtt-next"
            cp "$(command -v rebar3)" ./rebar3
            chmod +x ./rebar3
            ./rebar3 version
            export CFLAGS="${CFLAGS:-} -Wno-error=dangling-pointer -Wno-dangling-pointer"
            export CMAKE_C_FLAGS="${CMAKE_C_FLAGS:-} -Wno-error=dangling-pointer -Wno-dangling-pointer"
            make escript
          )

          NEXT_BIN=""
          if [ -f "${WORKDIR}/emqtt-next/_build/escript/bin/emqtt_cli" ]; then
            NEXT_BIN="${WORKDIR}/emqtt-next/_build/escript/bin/emqtt_cli"
          elif [ -f "${WORKDIR}/emqtt-next/emqtt_cli" ]; then
            NEXT_BIN="${WORKDIR}/emqtt-next/emqtt_cli"
          fi

          if [ -n "${NEXT_BIN}" ] && \
             "${NEXT_BIN}" pub --help >/tmp/emqtt-next-pub-help.log 2>&1 && \
             grep -Eqi "Usage: emqtt pub|--payload|--topic" /tmp/emqtt-next-pub-help.log; then
            DECISION="next_install_validated"
            REGRESSION_RESULT="Next version installed successfully on Arm64"
            DETAILS="Baseline EMQTT ${CURRENT_VERSION} passed Tests 1-5. Regression validation built candidate ${NEXT_VERSION} and executed the EMQTT publish help path on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "result=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "details=${DETAILS}" >> "$GITHUB_OUTPUT"
          else
            DECISION="next_install_failed"
            REGRESSION_RESULT="Next version install failed on Arm64"
            DETAILS="Baseline EMQTT ${CURRENT_VERSION} passed Tests 1-5, but candidate ${NEXT_VERSION} failed to produce a runnable emqtt_cli binary or publish help output on Arm64."
            cat /tmp/emqtt-next-pub-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "result=${DECISION}" >> "$GITHUB_OUTPUT"
            echo "details=${DETAILS}" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${DETAILS}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          CORE_FAILED=0
          for status in \
            "${{ steps.test1.outputs.status || 'skipped' }}" \
            "${{ steps.test2.outputs.status || 'skipped' }}" \
            "${{ steps.test3.outputs.status || 'skipped' }}" \
            "${{ steps.test4.outputs.status || 'skipped' }}" \
            "${{ steps.test5.outputs.status || 'skipped' }}"; do
            if [ "$status" != "passed" ]; then
              CORE_FAILED=1
              break
            fi
          done

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'skipped' }}" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## EMQTT (Erlang Message Queue Telemetry Transport) Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check emqtt_cli binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check EMQTT root help output: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check EMQTT publish help: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Check EMQTT subscribe help: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
