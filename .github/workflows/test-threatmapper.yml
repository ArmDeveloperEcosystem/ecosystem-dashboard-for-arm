name: Test ThreatMapper on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/threatmapper.md"
      - ".github/workflows/test-threatmapper.yml"

jobs:
  test-threatmapper:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "2.1.1"
      BASELINE_AGENT_IMAGE: "docker.io/deepfenceio/deepfence_agent_ce:2.1.1-multiarch"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=threatmapper" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/threatmapper" >> "$GITHUB_OUTPUT"

      - name: Install ThreatMapper runtime dependencies
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq curl

          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi

          if ! docker info >/dev/null 2>&1; then
            sudo systemctl start docker || sudo service docker start || true
          fi

          docker pull "${BASELINE_AGENT_IMAGE}" >/dev/null
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get ThreatMapper version
        id: version
        run: |
          set -euo pipefail
          LATEST_VERSION=$(curl -fsSL https://api.github.com/repos/deepfence/ThreatMapper/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          docker manifest inspect "${BASELINE_AGENT_IMAGE}" >/tmp/threatmapper-manifest.json

          if jq -e '.manifests[]?.platform | select(.architecture=="arm64")' /tmp/threatmapper-manifest.json >/dev/null; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TAG=$(docker image inspect "${BASELINE_AGENT_IMAGE}" --format '{{index .RepoTags 0}}' 2>/dev/null || true)

          if printf '%s\n' "$TAG" | grep -q "${BASELINE_VERSION}-multiarch"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE_CONFIG=$(docker image inspect "${BASELINE_AGENT_IMAGE}" --format '{{json .Config.Entrypoint}} {{json .Config.Cmd}}')

          if printf '%s\n' "$IMAGE_CONFIG" | grep -q '\['; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          docker run --rm --entrypoint /bin/sh "${BASELINE_AGENT_IMAGE}" -c 'uname -m' | tee /tmp/threatmapper-agent-arch.out

          if grep -Eq 'aarch64|arm64' /tmp/threatmapper-agent-arch.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          NEXT_IMAGE="docker.io/deepfenceio/deepfence_agent_ce:${{ steps.version.outputs.latest }}-multiarch"
          DECISION="hold_current"
          NOTE="Latest stable ThreatMapper release does not currently publish an Arm64 multi-arch agent image."

          if [ "${{ steps.version.outputs.latest }}" = "${BASELINE_VERSION}" ]; then
            DECISION="current_is_latest_stable"
            NOTE="Pinned ThreatMapper version already matches the latest stable upstream release."
          elif docker manifest inspect "${NEXT_IMAGE}" >/tmp/threatmapper-next-manifest.json 2>/tmp/threatmapper-next.err; then
            if jq -e '.manifests[]?.platform | select(.architecture=="arm64")' /tmp/threatmapper-next-manifest.json >/dev/null; then
              DECISION="safe_to_upgrade"
              NOTE="Latest stable ThreatMapper release also publishes an Arm64 multi-arch agent image."
            fi
          fi

          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${{ steps.version.outputs.latest }}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned version ${BASELINE_VERSION} was smoke-tested against the official multi-arch Deepfence agent image. Latest stable release ${{ steps.version.outputs.latest }} was checked for an Arm64 multi-arch agent image before any version bump decision." >> "$GITHUB_OUTPUT"
          echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/threatmapper.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "ThreatMapper",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Containers",
              "category": "Security applications"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threatmapper-test-results
          path: test-results/threatmapper.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          echo "## ThreatMapper Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current (Pinned):** ${{ steps.test6.outputs.current_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next (Latest Stable):** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Summary:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Notes:** ${{ steps.test6.outputs.note || 'No additional notes.' }}" >> "$GITHUB_STEP_SUMMARY"
