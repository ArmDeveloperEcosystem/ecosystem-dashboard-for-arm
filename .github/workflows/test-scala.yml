name: Test Scala on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/scala.md"
      - ".github/workflows/test-scala.yml"

jobs:
  test-scala:
    runs-on: ubuntu-24.04-arm
    env:
      SCALA_VERSION: "3.6.4"
      SCALA_WORKDIR: "/tmp/scala-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=scala" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/scala" >> "$GITHUB_OUTPUT"

      - name: Install Scala baseline from official Arm64 tarball
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y curl file openjdk-17-jdk-headless tar

          rm -rf "${SCALA_WORKDIR}"
          mkdir -p "${SCALA_WORKDIR}"
          curl -fsSL -o "${SCALA_WORKDIR}/scala3-${SCALA_VERSION}-aarch64-pc-linux.tar.gz" \
            "https://github.com/scala/scala3/releases/download/${SCALA_VERSION}/scala3-${SCALA_VERSION}-aarch64-pc-linux.tar.gz"
          tar -xzf "${SCALA_WORKDIR}/scala3-${SCALA_VERSION}-aarch64-pc-linux.tar.gz" -C "${SCALA_WORKDIR}"

          BASE_DIR=$(find "${SCALA_WORKDIR}" -mindepth 1 -maxdepth 1 -type d -name "scala3-${SCALA_VERSION}*" | head -n 1)
          test -n "${BASE_DIR}"
          test -x "${BASE_DIR}/bin/scala"
          test -x "${BASE_DIR}/bin/scalac"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Scala versions
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/bin/scala" -version 2>&1 | sed -n 's/.*version \([0-9][0-9A-Za-z.+-]*\).*/\1/p' | head -n 1)
          LATEST="$(
            python3 - <<'PY'
          import json
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/scala/scala3/releases?per_page=50",
              headers={"Accept": "application/vnd.github+json", "User-Agent": "codex"},
          )
          with urllib.request.urlopen(req, timeout=20) as response:
              releases = json.load(response)

          for release in releases:
              if release.get("draft") or release.get("prerelease"):
                  continue
              print(release.get("tag_name", "unknown"))
              break
          else:
              print("unknown")
          PY
          )"
          LATEST_URL="$(
            python3 - <<'PY'
          import json
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/scala/scala3/releases?per_page=50",
              headers={"Accept": "application/vnd.github+json", "User-Agent": "codex"},
          )
          with urllib.request.urlopen(req, timeout=20) as response:
              releases = json.load(response)

          for release in releases:
              if release.get("draft") or release.get("prerelease"):
                  continue
              for asset in release.get("assets", []):
                  name = asset.get("name", "")
                  if name.endswith("aarch64-pc-linux.tar.gz"):
                      print(asset.get("browser_download_url", ""))
                      raise SystemExit
              break
          print("")
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_url=${LATEST_URL}" >> "$GITHUB_OUTPUT"
          echo "Detected Scala version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check scala and scalac exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if [ -x "${BASE_DIR}/bin/scala" ] && [ -x "${BASE_DIR}/bin/scalac" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/bin/scala" -version 2>&1 | sed -n 's/.*version \([0-9][0-9A-Za-z.+-]*\).*/\1/p' | head -n 1)

          if [ "${VERSION}" = "${SCALA_VERSION}" ] && "${BASE_DIR}/bin/scalac" -version 2>&1 | grep -q "${SCALA_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_DIR}/bin/scala" -version || true
            "${BASE_DIR}/bin/scalac" -version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if "${BASE_DIR}/bin/scala" -help >/tmp/scala-help.txt 2>&1 && \
             "${BASE_DIR}/bin/scalac" -help >/tmp/scalac-help.txt 2>&1 && \
             grep -q "Usage: scala" /tmp/scala-help.txt && \
             grep -q "Usage: scalac" /tmp/scalac-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scala-help.txt || true
            cat /tmp/scalac-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if [ "$(uname -m)" = "aarch64" ] && basename "${BASE_DIR}" | grep -q "aarch64-pc-linux"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            basename "${BASE_DIR}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/scala-functional"

          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"
          cat > "${ROOT}/Hello.scala" <<'EOF'
          object Hello extends App {
            println("scala-ok")
          }
          EOF

          cd "${ROOT}"
          "${BASE_DIR}/bin/scalac" Hello.scala >/tmp/scala-compile.txt 2>&1
          if "${BASE_DIR}/bin/scala" run --server=false Hello.scala >/tmp/scala-run.txt 2>&1 && grep -q "scala-ok" /tmp/scala-run.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scala-compile.txt || true
            cat /tmp/scala-run.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          LATEST_URL="${{ steps.version.outputs.latest_url }}"
          REGRESSION_WORKDIR="/tmp/scala-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ] || [ -z "${LATEST_URL}" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Scala version ${CURRENT} passed smoke tests in this run, but the latest stable official Arm64 tarball could not be resolved for install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Scala version ${CURRENT} passed smoke tests in this run, but the latest stable official Arm64 tarball could not be resolved for install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/scala3-${LATEST}-aarch64-pc-linux.tar.gz" "${LATEST_URL}"
          tar -xzf "${REGRESSION_WORKDIR}/scala3-${LATEST}-aarch64-pc-linux.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR=$(find "${REGRESSION_WORKDIR}" -mindepth 1 -maxdepth 1 -type d -name "scala3-${LATEST}*" | head -n 1)
          test -n "${NEXT_DIR}"
          NEXT_VERSION=$("${NEXT_DIR}/bin/scala" -version 2>&1 | sed -n 's/.*version \([0-9][0-9A-Za-z.+-]*\).*/\1/p' | head -n 1)

          ROOT="/tmp/scala-regression-functional"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"
          cat > "${ROOT}/Hello.scala" <<'EOF'
          object Hello extends App {
            println("scala-next-ok")
          }
          EOF

          cd "${ROOT}"
          "${NEXT_DIR}/bin/scalac" Hello.scala >/tmp/scala-next-compile.txt 2>&1

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && "${NEXT_DIR}/bin/scala" run --server=false Hello.scala >/tmp/scala-next-run.txt 2>&1 && grep -q "scala-next-ok" /tmp/scala-next-run.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Scala version ${CURRENT} passed smoke tests in this run and already matches the latest stable official Arm64 tarball. Regression validation reinstalled the same release and reran the bounded compile-and-run smoke successfully." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Current stable version already validated on Arm64"
              echo "Details: Current pinned Scala version ${CURRENT} passed smoke tests in this run and already matches the latest stable official Arm64 tarball. Regression validation reinstalled the same release and reran the bounded compile-and-run smoke successfully."
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Scala version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} from the official Arm64 tarball, the candidate launcher reported version ${NEXT_VERSION}, and the compile-and-run Hello World smoke completed successfully." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Scala version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} from the official Arm64 tarball, the candidate launcher reported version ${NEXT_VERSION}, and the compile-and-run Hello World smoke completed successfully."
            fi
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scala-next-compile.txt || true
            cat /tmp/scala-next-run.txt || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Scala version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 compile-and-run validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Scala version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 compile-and-run validation path."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/scala.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Scala",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Scala",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check scala and scalac exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check exact version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scala-test-results
          path: test-results/scala.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Scala Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check scala and scalac exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
