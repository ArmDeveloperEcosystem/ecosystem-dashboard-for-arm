name: Test MediaWiki on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/mediawiki.md"
      - ".github/workflows/test-mediawiki.yml"

jobs:
  test-mediawiki:
    runs-on: ubuntu-24.04-arm
    env:
      MEDIAWIKI_VERSION: "1.43.2"
      MEDIAWIKI_SERIES: "1.43"
      MEDIAWIKI_HOME: /opt/mediawiki-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mediawiki" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mediawiki" >> "$GITHUB_OUTPUT"
      - name: Install MediaWiki
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar php-cli php-xml php-mbstring php-intl

          curl -fsSL -A "Mozilla/5.0" -o /tmp/mediawiki.tar.gz "https://releases.wikimedia.org/mediawiki/1.43/mediawiki-${MEDIAWIKI_VERSION}.tar.gz"
          sudo rm -rf "${MEDIAWIKI_HOME}"
          sudo mkdir -p "${MEDIAWIKI_HOME}"
          sudo tar -xzf /tmp/mediawiki.tar.gz -C /tmp
          sudo mv "/tmp/mediawiki-${MEDIAWIKI_VERSION}"/* "${MEDIAWIKI_HOME}/"

          if [ -f "${MEDIAWIKI_HOME}/index.php" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get MediaWiki version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -E "MW_VERSION" "${MEDIAWIKI_HOME}/includes/Defines.php" | sed -E "s/.*'([^']+)'.*/\\1/" | head -1)
          LATEST=$(
            CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import urllib.request

          req = urllib.request.Request(
              "https://releases.wikimedia.org/mediawiki/1.43/",
              headers={"User-Agent": "Mozilla/5.0"},
          )
          html = urllib.request.urlopen(req, timeout=20).read().decode("utf-8", "ignore")
          current = os.environ.get("CURRENT_VERSION", "")
          current_parts = tuple(map(int, current.split("."))) if re.fullmatch(r"1\.\d+\.\d+", current) else ()
          versions = sorted(
              {
                  tuple(map(int, match.split(".")))
                  for match in re.findall(r"mediawiki-(1\.43\.[0-9]+)\.tar\.gz", html)
              }
          )
          next_versions = [version for version in versions if version > current_parts]
          print(".".join(map(str, next_versions[0])) if next_versions else "")
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "${MEDIAWIKI_HOME}/index.php" ] && [ -f "${MEDIAWIKI_HOME}/maintenance/install.php" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if grep -q "MW_VERSION', '${MEDIAWIKI_VERSION}'" "${MEDIAWIKI_HOME}/includes/Defines.php"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if php "${MEDIAWIKI_HOME}/maintenance/install.php" --help 2>&1 | grep -qiE "usage|install|options"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "${MEDIAWIKI_HOME}"
          timeout 20 php -S 127.0.0.1:8088 -t . >/tmp/mediawiki-smoke.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 4

          STATUS_LINE=$(curl -I -s http://127.0.0.1:8088/ | head -n 1 || true)
          BODY=$(curl -s http://127.0.0.1:8088/ || true)

          if echo "$STATUS_LINE" | grep -q "MediaWiki configuration Error" || echo "$BODY" | grep -qi "MediaWiki"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mediawiki-smoke.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${MEDIAWIKI_VERSION}"
          LATEST="${{ steps.version.outputs.latest }}"
          SERIES="${MEDIAWIKI_SERIES}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MediaWiki version ${CURRENT} passed smoke tests in this run, but the latest stable patch release for the pinned series could not be resolved from the official release directory." >> "$GITHUB_OUTPUT"
            echo "note=MediaWiki is validated as an unpacked tarball install without a database, so the functional probe intentionally checks the first-run web experience rather than a completed wiki setup." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "note=MediaWiki is validated as an unpacked tarball install without a database, so the functional probe intentionally checks the first-run web experience rather than a completed wiki setup." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REG_HOME="/tmp/mediawiki-regression"
          rm -rf "${REG_HOME}"
          mkdir -p "${REG_HOME}"
          curl -fsSL -A "Mozilla/5.0" -o /tmp/mediawiki-regression.tar.gz "https://releases.wikimedia.org/mediawiki/${SERIES}/mediawiki-${LATEST}.tar.gz"
          tar -xzf /tmp/mediawiki-regression.tar.gz -C /tmp
          mv "/tmp/mediawiki-${LATEST}"/* "${REG_HOME}/"

          NEXT_VERSION=$(grep -E "MW_VERSION" "${REG_HOME}/includes/Defines.php" | sed -E "s/.*'([^']+)'.*/\\1/" | head -1)
          php "${REG_HOME}/maintenance/install.php" --help >/tmp/mediawiki-regression-help.txt 2>&1
          timeout 20 php -S 127.0.0.1:8089 -t "${REG_HOME}" >/tmp/mediawiki-regression-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          STATUS_LINE=""
          BODY=""
          for _ in $(seq 1 20); do
            STATUS_LINE=$(curl -I -s http://127.0.0.1:8089/ | head -n 1 || true)
            BODY=$(curl -s http://127.0.0.1:8089/ || true)
            if echo "$STATUS_LINE" | grep -q "^HTTP/" && [ -n "$BODY" ]; then
              break
            fi
            sleep 1
          done

          if [ "$NEXT_VERSION" = "$LATEST" ] && grep -qiE "usage|install|options" /tmp/mediawiki-regression-help.txt && \
             (echo "$STATUS_LINE" | grep -q "^HTTP/" && echo "$BODY" | grep -qiE "MediaWiki|LocalSettings\\.php|install\\.php"); then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MediaWiki version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the official ${SERIES} patch candidate ${LATEST}, verified the unpacked source tree reports version ${NEXT_VERSION}, validated maintenance installer help output, and confirmed the first-run web response over the built-in PHP web server on Arm64." >> "$GITHUB_OUTPUT"
            echo "note=MediaWiki is validated as an unpacked tarball install without a database, so the functional probe intentionally checks the first-run web experience rather than a completed wiki setup." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mediawiki-regression-help.txt || true
            cat /tmp/mediawiki-regression-server.log || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MediaWiki version ${CURRENT} passed smoke tests in this run, but the ${SERIES} patch candidate ${LATEST} did not complete the expected unpacked-tarball validation path on Arm64." >> "$GITHUB_OUTPUT"
            echo "note=MediaWiki is validated as an unpacked tarball install without a database, so the functional probe intentionally checks the first-run web experience rather than a completed wiki setup." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          cat > test-results/mediawiki.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "MediaWiki",
              "version": "${{ steps.version.outputs.version }}",
              "language": "PHP",
              "category": "Content mgmt platforms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Help Output Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}" }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## MediaWiki Arm64 Smoke Test Summary"
            echo ""
            echo "- Version tested: \`${{ steps.version.outputs.version }}\`"
            echo "- Overall status: \`${{ steps.summary.outputs.overall_status }}\`"
            echo "- Runner: \`ubuntu-24.04 (arm64)\`"
            echo ""
            echo "| Test | Status | Duration (s) |"
            echo "| --- | --- | ---: |"
            echo "| Test 1 - Artifact Existence | ${{ steps.test1.outputs.status || 'skipped' }} | ${{ steps.test1.outputs.duration || 0 }} |"
            echo "| Test 2 - Version Check | ${{ steps.test2.outputs.status || 'skipped' }} | ${{ steps.test2.outputs.duration || 0 }} |"
            echo "| Test 3 - Help Output Validation | ${{ steps.test3.outputs.status || 'skipped' }} | ${{ steps.test3.outputs.duration || 0 }} |"
            echo "| Test 4 - Architecture Verification | ${{ steps.test4.outputs.status || 'skipped' }} | ${{ steps.test4.outputs.duration || 0 }} |"
            echo "| Test 5 - Functional Validation | ${{ steps.test5.outputs.status || 'skipped' }} | ${{ steps.test5.outputs.duration || 0 }} |"
            echo "| Test 6 - Regression Validation | ${{ steps.test6.outputs.status || 'skipped' }} | ${{ steps.test6.outputs.duration || 0 }} |"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo ""
            echo "- Current version tested in Tests 1-5: \`${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}\`"
            echo "- Next version targeted for install validation: \`${{ steps.test6.outputs.latest_version }}\`"
            echo "- Next version installed on Arm64: \`${{ steps.test6.outputs.next_installed_version || 'not_installed' }}\`"
            echo "- Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mediawiki-test-results
          path: test-results/mediawiki.json
          retention-days: 90
