name: Test Valgrind on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/valgrind.md"
      - ".github/workflows/test-valgrind.yml"

jobs:
  test-valgrind:
    runs-on: ubuntu-24.04-arm
    env:
      VALGRIND_VERSION: "3.23.0"
      VALGRIND_WORKDIR: "/tmp/valgrind-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=valgrind" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/valgrind" >> "$GITHUB_OUTPUT"
          echo "current_version=${VALGRIND_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Valgrind baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y build-essential curl bzip2 file libc6-dbg

          rm -rf "${VALGRIND_WORKDIR}"
          mkdir -p "${VALGRIND_WORKDIR}"

          curl -fsSL -o "${VALGRIND_WORKDIR}/valgrind-${VALGRIND_VERSION}.tar.bz2" \
            "https://sourceware.org/pub/valgrind/valgrind-${VALGRIND_VERSION}.tar.bz2"
          tar -xjf "${VALGRIND_WORKDIR}/valgrind-${VALGRIND_VERSION}.tar.bz2" -C "${VALGRIND_WORKDIR}"

          BASE_SRC="${VALGRIND_WORKDIR}/valgrind-${VALGRIND_VERSION}"
          BASE_PREFIX="${VALGRIND_WORKDIR}/install"
          cd "${BASE_SRC}"
          ./configure --prefix="${BASE_PREFIX}" >/dev/null
          make -j2 >/dev/null
          make install >/dev/null

          test -x "${BASE_PREFIX}/bin/valgrind"
          test -x "${BASE_SRC}/coregrind/valgrind"

          echo "base_src=${BASE_SRC}" >> "$GITHUB_OUTPUT"
          echo "base_prefix=${BASE_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Valgrind version
        id: version
        run: |
          set -euo pipefail
          BASE_PREFIX="${{ steps.install.outputs.base_prefix }}"
          VERSION=$("${BASE_PREFIX}/bin/valgrind" --version 2>&1 | sed 's/^valgrind-//')
          LATEST="$(
            curl -fsSL https://sourceware.org/pub/valgrind/ \
            | grep -oE 'valgrind-[0-9]+\.[0-9]+\.[0-9]+\.tar\.bz2' \
            | sed 's/^valgrind-//; s/\.tar\.bz2$//' \
            | sort -V \
            | tail -n 1
          )"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Valgrind version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check valgrind binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_PREFIX="${{ steps.install.outputs.base_prefix }}"

          if [ -x "${BASE_PREFIX}/bin/valgrind" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_PREFIX="${{ steps.install.outputs.base_prefix }}"
          VERSION=$("${BASE_PREFIX}/bin/valgrind" --version 2>&1 | sed 's/^valgrind-//')

          if [ "${VERSION}" = "${VALGRIND_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_PREFIX}/bin/valgrind" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_PREFIX="${{ steps.install.outputs.base_prefix }}"

          if "${BASE_PREFIX}/bin/valgrind" --help > /tmp/valgrind-help.txt 2>&1 && grep -Eqi "usage|tool options|memcheck" /tmp/valgrind-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/valgrind-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_SRC="${{ steps.install.outputs.base_src }}"

          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_SRC}/coregrind/valgrind" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_SRC}/coregrind/valgrind" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_PREFIX="${{ steps.install.outputs.base_prefix }}"
          ROOT="/tmp/valgrind-functional"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          cat > "${ROOT}/leak.c" <<'EOF_C'
          #include <stdlib.h>
          int main(void) {
            char *ptr = malloc(16);
            if (!ptr) return 1;
            ptr[0] = 'A';
            return 0;
          }
          EOF_C

          cc -O0 -g -o "${ROOT}/leak" "${ROOT}/leak.c"
          "${BASE_PREFIX}/bin/valgrind" --tool=memcheck --leak-check=full --error-exitcode=0 "${ROOT}/leak" \
            > "${ROOT}/stdout.log" 2> "${ROOT}/stderr.log"

          if grep -q "definitely lost: 16 bytes in 1 blocks" "${ROOT}/stderr.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${ROOT}/stderr.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/valgrind-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Valgrind version ${CURRENT} passed smoke tests in this run, but the latest stable upstream release could not be resolved for Arm64 source validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Valgrind version ${CURRENT} passed smoke tests in this run, but the latest stable upstream release could not be resolved for Arm64 source validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/valgrind-${LATEST}.tar.bz2" \
            "https://sourceware.org/pub/valgrind/valgrind-${LATEST}.tar.bz2"
          tar -xjf "${REGRESSION_WORKDIR}/valgrind-${LATEST}.tar.bz2" -C "${REGRESSION_WORKDIR}"

          NEXT_DIR="${REGRESSION_WORKDIR}/valgrind-${LATEST}"
          NEXT_PREFIX="${REGRESSION_WORKDIR}/install"
          cd "${NEXT_DIR}"
          ./configure --prefix="${NEXT_PREFIX}" >/dev/null
          make -j2 >/dev/null
          make install >/dev/null

          NEXT_INSTALLED=$("${NEXT_PREFIX}/bin/valgrind" --version 2>&1 | sed 's/^valgrind-//')
          ROOT="/tmp/valgrind-regression-functional"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          cat > "${ROOT}/leak.c" <<'EOF_C'
          #include <stdlib.h>
          int main(void) {
            char *ptr = malloc(24);
            if (!ptr) return 1;
            ptr[0] = 'B';
            return 0;
          }
          EOF_C

          cc -O0 -g -o "${ROOT}/leak" "${ROOT}/leak.c"
          "${NEXT_PREFIX}/bin/valgrind" --tool=memcheck --leak-check=full --error-exitcode=0 "${ROOT}/leak" \
            > "${ROOT}/stdout.log" 2> "${ROOT}/stderr.log"

          if [ "${NEXT_INSTALLED}" = "${LATEST}" ] && grep -q "definitely lost: 24 bytes in 1 blocks" "${ROOT}/stderr.log"; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned Valgrind version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release. Regression validation rebuilt the same release in an isolated Arm64 environment and confirmed memcheck still reports the expected leak summary."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Valgrind version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and memcheck still reported the expected leak summary." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Valgrind version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and memcheck still reported the expected leak summary."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            STATUS="passed"
          else
            cat "${ROOT}/stderr.log" || true
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Valgrind version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 build-and-memcheck validation." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Valgrind version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 build-and-memcheck validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "${STATUS}" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/valgrind.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Valgrind",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check valgrind binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check exact version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-test-results
          path: test-results/valgrind.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## Valgrind Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check valgrind binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}" >> "$GITHUB_STEP_SUMMARY"
