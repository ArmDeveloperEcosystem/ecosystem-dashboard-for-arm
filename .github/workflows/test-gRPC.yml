name: Test gRPC on Arm64
on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-gRPC.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-gRPC.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-gRPC.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-gRPC.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-gRPC.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-gRPC.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-gRPC.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-gRPC.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-gRPC.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-gRPC.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-gRPC.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-gRPC.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-gRPC.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-gRPC.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-gRPC.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-gRPC.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-gRPC.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-gRPC.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-gRPC.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-gRPC.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-gRPC.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-gRPC.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-gRPC.outputs.timestamp }}
jobs:
  test-gRPC:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'gRPC'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gRPC" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gRPC" >> "$GITHUB_OUTPUT"
      - name: Install gRPC
        id: install
        run: |
          set -euo pipefail
          echo "Installing gRPC..."
          sudo apt-get update
          if sudo apt-get install -y libgrpc-dev libgrpc++-dev protobuf-compiler-grpc protobuf-compiler cmake g++ libabsl-dev pkg-config; then
             echo "gRPC installed successfully"
             echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
             echo "gRPC installation failed"
             echo "install_status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi

      - name: Get gRPC version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg -s libgrpc-dev | grep Version | awk '{print $2}' || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected gRPC version: $VERSION"

      - name: Test 1 - Check header file exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "/usr/include/grpc/grpc.h" ]; then
            echo "✓ grpc.h found"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ grpc.h not found"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check C++ header file exists
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "/usr/include/grpcpp/grpcpp.h" ]; then
            echo "✓ grpcpp.h found"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ grpcpp.h not found"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check plugin binary exists
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v grpc_cpp_plugin >/dev/null 2>&1; then
            echo "✓ grpc_cpp_plugin found"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ grpc_cpp_plugin not found"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Generate and compile gRPC loopback sample
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mkdir -p /tmp/grpc-loopback
          cd /tmp/grpc-loopback
          cat > helloworld.proto <<'EOF'
          syntax = "proto3";
          package smoke;
          service Greeter {
            rpc SayHello (HelloRequest) returns (HelloReply) {}
          }
          message HelloRequest {
            string name = 1;
          }
          message HelloReply {
            string message = 1;
          }
          EOF
          protoc --cpp_out=. helloworld.proto
          protoc --grpc_out=. --plugin=protoc-gen-grpc="$(command -v grpc_cpp_plugin)" helloworld.proto
          cat > grpc_loopback.cpp <<'EOF'
          #include <grpcpp/grpcpp.h>
          #include "helloworld.grpc.pb.h"

          #include <chrono>
          #include <iostream>
          #include <memory>
          #include <string>
          #include <thread>

          class GreeterService final : public smoke::Greeter::Service {
            grpc::Status SayHello(grpc::ServerContext* context,
                                  const smoke::HelloRequest* request,
                                  smoke::HelloReply* reply) override {
              (void)context;
              reply->set_message("hello " + request->name());
              return grpc::Status::OK;
            }
          };

          int main() {
            GreeterService service;
            grpc::ServerBuilder builder;
            builder.AddListeningPort("127.0.0.1:50051", grpc::InsecureServerCredentials());
            builder.RegisterService(&service);
            std::unique_ptr<grpc::Server> server(builder.BuildAndStart());
            if (!server) {
              std::cerr << "server failed to start" << std::endl;
              return 1;
            }
            std::thread shutdown_thread([&server]() {
              std::this_thread::sleep_for(std::chrono::seconds(5));
              server->Shutdown();
            });

            auto channel = grpc::CreateChannel("127.0.0.1:50051", grpc::InsecureChannelCredentials());
            auto stub = smoke::Greeter::NewStub(channel);
            smoke::HelloRequest request;
            request.set_name("arm64");
            smoke::HelloReply reply;
            grpc::ClientContext context;
            grpc::Status status = stub->SayHello(&context, request, &reply);
            server->Shutdown();
            shutdown_thread.join();
            if (!status.ok() || reply.message() != "hello arm64") {
              std::cerr << "unexpected response: " << reply.message() << std::endl;
              return 1;
            }
            std::cout << reply.message() << std::endl;
            return 0;
          }
          EOF
          CXXFLAGS="$(pkg-config --cflags grpc++ protobuf)"
          LDLIBS="$(pkg-config --libs grpc++ protobuf)"
          if g++ -std=c++17 ${CXXFLAGS} -pthread helloworld.pb.cc helloworld.grpc.pb.cc grpc_loopback.cpp ${LDLIBS} -o grpc_loopback; then
            echo "✓ gRPC sample generated and compiled"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ gRPC sample compile failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run gRPC loopback request
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if /tmp/grpc-loopback/grpc_loopback | tee /tmp/grpc-loopback.out | grep -qx "hello arm64"; then
            echo "✓ gRPC loopback request passed"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/grpc-loopback.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check header file exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check C++ header file exists
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check plugin binary exists
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Generate and compile gRPC loopback sample
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Run gRPC loopback request
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## gRPC Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check header file exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check C++ header file exists: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check plugin binary exists: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Generate and compile gRPC loopback sample: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Run gRPC loopback request: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
