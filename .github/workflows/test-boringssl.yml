name: Test BoringSSL on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-boringssl.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-boringssl.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-boringssl.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-boringssl.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-boringssl.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-boringssl.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-boringssl.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-boringssl.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-boringssl.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-boringssl.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-boringssl.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-boringssl.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-boringssl.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-boringssl.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-boringssl.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-boringssl.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-boringssl.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-boringssl.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-boringssl.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-boringssl.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-boringssl.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-boringssl.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-boringssl.outputs.timestamp }}
jobs:
  test-boringssl:
    runs-on: ubuntu-24.04-arm
    env:
      BORINGSSL_BASELINE_VERSION: "fips-20220613"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'BoringSSL'
      package_version: ${{ steps.version.outputs.version || env.BORINGSSL_BASELINE_VERSION }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BORINGSSL_BASELINE_VERSION }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=boringssl" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/boringssl" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake golang-go ninja-build libssl-dev pkg-config python3 python3-setuptools clang llvm lld
      
      - name: Install BoringSSL
        id: install
        run: |
          set -euo pipefail
          set -x
          echo "Installing BoringSSL..."

          GO_BIN="$(command -v go || true)"
          if [ -z "${GO_BIN}" ]; then
            echo "Go toolchain not found in PATH" >&2
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          git clone --depth 1 --branch "${BORINGSSL_BASELINE_VERSION}" https://boringssl.googlesource.com/boringssl
          
          cd boringssl
          mkdir build && cd build
          
          # Build with CMake
          # Disable tests to avoid linking issues on some arm64 runners with strict linking
          # Use Clang as recommended for BoringSSL
          cmake -GNinja -DGO_EXECUTABLE="${GO_BIN}" -DBUILD_SHARED_LIBS=0 -DRUN_TESTS=0 -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON ..
          ninja -j 2 -v bssl
          
          # Find where the binary actually is
          BSSL_PATH=$(find . -name bssl -type f | head -n 1)
          
          if [ -n "$BSSL_PATH" ]; then
             echo "Found bssl binary at: $BSSL_PATH"
             # Copy to workspace root for easy access in later steps
             cp "$BSSL_PATH" "$GITHUB_WORKSPACE/bssl"
             echo "BoringSSL built successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "BoringSSL build failed - binary not found"
             find . -name "bssl*" # Debug output
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get BoringSSL version
        id: version
        run: |
          cd boringssl
          VERSION=$(git describe --tags --always)
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected BoringSSL version: $VERSION"
      
      - name: Test 1 - Check bssl binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "bssl" ]; then
            echo "âś“ bssl binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "âś— bssl binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Run bssl help
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # bssl usually takes a command. Running without args might error or show help.
          # Let's try 'bssl version' if it exists, or just check basic execution.
          
          OUTPUT=$(./bssl 2>&1 || true)
          
          # It usually lists commands like "client", "server", "genrsa" etc.
          if echo "$OUTPUT" | grep -q "unknown command" || echo "$OUTPUT" | grep -q "Usage"; then
             echo "âś“ bssl runs (showed usage or error as expected)"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             # Try a valid command
             if ./bssl speed 2>&1 | grep -q "Did you mean"; then
                # 'speed' might not be a command in bssl tool, but 'client' is.
                echo "âś“ bssl runs"
                echo "status=passed" >> $GITHUB_OUTPUT
             elif ./bssl client -help 2>&1 | grep -q "connect"; then
                echo "âś“ bssl client command works"
                echo "status=passed" >> $GITHUB_OUTPUT
             else
                echo "âś— bssl failed to run properly"
                echo "Output: $OUTPUT"
                echo "status=failed" >> $GITHUB_OUTPUT
                END_TIME=$(date +%s)
                echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
                exit 1
             fi
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Generate RSA Key
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # bssl genrsa might not support -out, so use redirection
          if ./bssl genrsa > key.pem; then
             echo "âś“ RSA key generated"
             if [ -f "key.pem" ]; then
                echo "âś“ key.pem exists"
                echo "status=passed" >> $GITHUB_OUTPUT
             else
                echo "âś— key.pem missing"
                echo "status=failed" >> $GITHUB_OUTPUT
                END_TIME=$(date +%s)
                echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
                exit 1
             fi
          else
             echo "âś— Failed to generate RSA key"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "âś“ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "âś— System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Basic functional check: try to run with --help (bssl doesn't have --version)
          if ./bssl help > /dev/null 2>&1 || ./bssl rand 16 > /dev/null 2>&1; then
            echo "âś“ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "âś— Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${BORINGSSL_BASELINE_VERSION}"
          NEXT_VERSION="${CURRENT_VERSION}"
          RESULT="No newer stable public release is available"
          DETAILS="Public stable BoringSSL tags for this dashboard path currently stop at ${BORINGSSL_BASELINE_VERSION}; there is no newer stable FIPS tag for a real Test 6 upgrade validation"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"
          echo "Regression install result: ${RESULT}"
          echo "Details: ${DETAILS}"

          echo "status=skipped" >> $GITHUB_OUTPUT
          echo "decision=no_newer_stable_available" >> $GITHUB_OUTPUT
          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "latest_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_installed_version=not_installed" >> $GITHUB_OUTPUT
          echo "regression_result=${RESULT}" >> $GITHUB_OUTPUT
          echo "comparison=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          # Check bssl binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Run bssl help
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Generate RSA Key
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## BoringSSL Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check bssl binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Run bssl help: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Generate RSA Key: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
