name: Test MongoDB Server on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/mongodb.md"
      - ".github/workflows/test-mongodb.yml"

jobs:
  test-mongodb:
    runs-on: ubuntu-24.04-arm
    env:
      MONGODB_VERSION: "7.0.31"
      MONGODB_NEXT_SERIES: "8.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mongodb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mongodb" >> "$GITHUB_OUTPUT"
          echo "current_version=${MONGODB_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install MongoDB Server
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar file python3-venv
          ROOT="$HOME/mongodb-smoke"
          ARCHIVE="$ROOT/mongodb-${MONGODB_VERSION}.tgz"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          curl -fsSL -o "$ARCHIVE" "https://fastdl.mongodb.org/linux/mongodb-linux-aarch64-ubuntu2204-${MONGODB_VERSION}.tgz"
          tar -xzf "$ARCHIVE" -C "$ROOT"
          MONGO_HOME=$(find "$ROOT" -maxdepth 1 -type d -name 'mongodb-linux-aarch64-ubuntu2204-*' | head -n 1)
          TEST_VENV="$ROOT/test-venv"
          python3 -m venv "$TEST_VENV"
          . "$TEST_VENV/bin/activate"
          python -m pip install -q --upgrade pip >/dev/null
          python -m pip install -q pymongo >/dev/null
          echo "mongo_home=$MONGO_HOME" >> "$GITHUB_OUTPUT"
          echo "venv=$TEST_VENV" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get MongoDB version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.mongo_home }}/bin/mongod" --version | awk '/db version/{print $3; exit}' | sed 's/^v//')
          LATEST=$(python3 - <<'PY'
          import gzip
          import re
          import urllib.request

          url = "https://repo.mongodb.org/apt/ubuntu/dists/jammy/mongodb-org/8.0/multiverse/binary-arm64/Packages.gz"
          data = gzip.decompress(urllib.request.urlopen(url, timeout=30).read()).decode("utf-8", "replace")
          versions = re.findall(r"^Version: (.+)$", data, re.M)
          print(versions[0])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected MongoDB version: $VERSION"

      - name: Test 1 - Binary Existence and Architecture
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.mongo_home }}/bin/mongod" ] && file "${{ steps.install.outputs.mongo_home }}/bin/mongod" | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.mongo_home }}/bin/mongod" --version 2>&1 | grep -Fq "db version v${MONGODB_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.mongo_home }}/bin/mongod" --help 2>&1 | grep -qi "options"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Functional Validation (Ping)
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          DBPATH="$HOME/mongodb-smoke/db-test4"
          LOGFILE="$HOME/mongodb-smoke/mongod-test4.log"
          PIDFILE="$HOME/mongodb-smoke/mongod-test4.pid"
          rm -rf "$DBPATH"
          mkdir -p "$DBPATH"
          "${{ steps.install.outputs.mongo_home }}/bin/mongod" --dbpath "$DBPATH" --bind_ip 127.0.0.1 --port 27017 --fork --logpath "$LOGFILE" --pidfilepath "$PIDFILE" >/dev/null
          cleanup() {
            if [ -f "$PIDFILE" ]; then
              kill "$(cat "$PIDFILE")" >/dev/null 2>&1 || true
              rm -f "$PIDFILE"
            fi
          }
          trap cleanup EXIT
          OK=0
          for _ in $(seq 1 20); do
            if "${{ steps.install.outputs.venv }}/bin/python" - <<'PY'
          from pymongo import MongoClient
          c = MongoClient("mongodb://127.0.0.1:27017", serverSelectionTimeoutMS=2000)
          c.admin.command("ping")
          print("ping-ok")
          PY
            then
              OK=1
              break
            fi
            sleep 1
          done
          if [ "$OK" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$LOGFILE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation (Insert and Find)
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          DBPATH="$HOME/mongodb-smoke/db-test5"
          LOGFILE="$HOME/mongodb-smoke/mongod-test5.log"
          PIDFILE="$HOME/mongodb-smoke/mongod-test5.pid"
          rm -rf "$DBPATH"
          mkdir -p "$DBPATH"
          "${{ steps.install.outputs.mongo_home }}/bin/mongod" --dbpath "$DBPATH" --bind_ip 127.0.0.1 --port 27017 --fork --logpath "$LOGFILE" --pidfilepath "$PIDFILE" >/dev/null
          cleanup() {
            if [ -f "$PIDFILE" ]; then
              kill "$(cat "$PIDFILE")" >/dev/null 2>&1 || true
              rm -f "$PIDFILE"
            fi
          }
          trap cleanup EXIT
          OK=0
          for _ in $(seq 1 20); do
            if "${{ steps.install.outputs.venv }}/bin/python" - <<'PY'
          from pymongo import MongoClient
          c = MongoClient("mongodb://127.0.0.1:27017", serverSelectionTimeoutMS=2000)
          c.admin.command("ping")
          c.test.items.insert_one({"name": "ok"})
          doc = c.test.items.find_one({"name": "ok"})
          print(doc["name"])
          PY
            then
              OK=1
              break
            fi
            sleep 1
          done
          if [ "$OK" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$LOGFILE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MongoDB version $CURRENT passed smoke tests in this run, but the next stable Arm64 series package could not be resolved for regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned MongoDB version $CURRENT passed smoke tests in this run, but the next stable Arm64 series package could not be resolved for regression validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          NEXT_ARCHIVE="$TMPDIR/mongodb-${LATEST}.tgz"
          NEXT_URL="https://fastdl.mongodb.org/linux/mongodb-linux-aarch64-ubuntu2204-${LATEST}.tgz"
          curl -fsSL -o "$NEXT_ARCHIVE" "$NEXT_URL"
          tar -xzf "$NEXT_ARCHIVE" -C "$TMPDIR"
          NEXT_HOME=$(find "$TMPDIR" -maxdepth 1 -type d -name 'mongodb-linux-aarch64-ubuntu2204-*' | head -n 1)
          NEXT_BIN="$NEXT_HOME/bin/mongod"
          NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version | awk '/db version/{print $3; exit}' | sed 's/^v//')
          DBPATH="$TMPDIR/db"
          LOGFILE="$TMPDIR/mongod.log"
          PIDFILE="$TMPDIR/mongod.pid"
          mkdir -p "$DBPATH"
          "$NEXT_BIN" --dbpath "$DBPATH" --bind_ip 127.0.0.1 --port 27018 --fork --logpath "$LOGFILE" --pidfilepath "$PIDFILE" >/dev/null
          cleanup() {
            if [ -f "$PIDFILE" ]; then
              kill "$(cat "$PIDFILE")" >/dev/null 2>&1 || true
              rm -f "$PIDFILE"
            fi
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          OK=0
          for _ in $(seq 1 20); do
            if file "$NEXT_BIN" | grep -qiE 'arm aarch64|aarch64' && \
               "$NEXT_BIN" --help >/dev/null 2>&1 && \
               "${{ steps.install.outputs.venv }}/bin/python" - <<'PY'
          from pymongo import MongoClient
          c = MongoClient("mongodb://127.0.0.1:27018", serverSelectionTimeoutMS=2000)
          c.admin.command("ping")
          print("ping-ok")
          PY
            then
              OK=1
              break
            fi
            sleep 1
          done

          if [ "$OK" -eq 1 ] && [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MongoDB version $CURRENT passed smoke tests in this run. Regression validation downloaded the official Arm64 candidate tarball ${LATEST}, and the candidate server reported the exact version and answered a real ping on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned MongoDB version $CURRENT passed smoke tests in this run. Regression validation downloaded the official Arm64 candidate tarball ${LATEST}, and the candidate server reported the exact version and answered a real ping on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$LOGFILE" || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned MongoDB version $CURRENT passed smoke tests in this run, but the official Arm64 candidate tarball ${LATEST} failed version, help, or startup validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned MongoDB version $CURRENT passed smoke tests in this run, but the official Arm64 candidate tarball ${LATEST} failed version, help, or startup validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Regression validation failed"
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            check_test "passed" "${{ steps.test6.outputs.duration || 0 }}"
          elif [ "$TEST6_STATUS" = "failed" ]; then
            check_test "failed" "${{ steps.test6.outputs.duration || 0 }}"
          else
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          fi

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_URL="$RUN_URL"
          JOB_NAME="test-mongodb / test-mongodb"
          RESOLVED_JOB_URL=$(GH_TOKEN=${{ github.token }} gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"${JOB_NAME}\") | .html_url" 2>/dev/null | head -n 1 || true)
          if [ -n "$RESOLVED_JOB_URL" ]; then
            JOB_URL="$RESOLVED_JOB_URL"
          fi

          cat > test-results/mongodb.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "MongoDB",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Databases - noSQL"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Binary Existence and Architecture", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Help Output Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Functional Validation (Ping)", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation (Insert and Find)", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-test-results
          path: test-results/mongodb.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}"
          echo "## MongoDB Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Binary Existence and Architecture: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Functional Validation (Ping): ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation (Insert and Find): ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next installed version:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
