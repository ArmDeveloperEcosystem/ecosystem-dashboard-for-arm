name: Test Eclipse Temurin on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-eclipse-temurin.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-eclipse-temurin.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-eclipse-temurin.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-eclipse-temurin.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-eclipse-temurin.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-eclipse-temurin.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-eclipse-temurin.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-eclipse-temurin.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-eclipse-temurin.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-eclipse-temurin.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-eclipse-temurin.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-eclipse-temurin.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-eclipse-temurin.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-eclipse-temurin.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-eclipse-temurin.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-eclipse-temurin.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-eclipse-temurin.outputs.timestamp }}
jobs:
  test-eclipse-temurin:
    runs-on: ubuntu-24.04-arm
    env:
      TEMURIN_BASE_RELEASE: "jdk-21.0.7+6"
      TEMURIN_NEXT_RELEASE: "jdk-21.0.8+9"
      TEMURIN_API_BASE: "https://api.adoptium.net/v3/binary/version"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Eclipse Temurin'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=eclipse_temurin" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/eclipse_temurin" >> "$GITHUB_OUTPUT"
      - name: Install Eclipse Temurin
        id: install
        run: |
          set -euo pipefail
          BASE_RELEASE="${TEMURIN_BASE_RELEASE}"
          BASE_VERSION="${BASE_RELEASE#jdk-}"
          BASE_URL="${TEMURIN_API_BASE}/${BASE_RELEASE}/linux/aarch64/jdk/hotspot/normal/eclipse?project=jdk"
          BASE_NAME="OpenJDK21U-jdk_aarch64_linux_hotspot_${BASE_VERSION//+/_}.tar.gz"
          INSTALL_DIR="/opt/eclipse-temurin-${BASE_RELEASE#jdk-}"
          sudo rm -rf "$INSTALL_DIR"
          sudo mkdir -p "$INSTALL_DIR"
          curl -fsSL "$BASE_URL" -o "/tmp/${BASE_NAME}"
          sudo tar -xzf "/tmp/${BASE_NAME}" --strip-components=1 -C "$INSTALL_DIR"

          if [ -x "$INSTALL_DIR/bin/java" ] && [ -x "$INSTALL_DIR/bin/javac" ]; then
            echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
            echo "baseline_release=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Eclipse Temurin version
        id: version
        run: |
          set -euo pipefail
          JAVA_BIN="${{ steps.install.outputs.install_dir }}/bin/java"
          VERSION=$("$JAVA_BIN" -version 2>&1 | awk -F '"' '/version/ {print $2; exit}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.install_dir }}/bin/java" ] && [ -x "${{ steps.install.outputs.install_dir }}/bin/javac" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          JAVA_BIN="${{ steps.install.outputs.install_dir }}/bin/java"
          if "$JAVA_BIN" -version 2>&1 | grep -q '"21.0.7"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$JAVA_BIN" -version 2>&1 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          JAVA_BIN="${{ steps.install.outputs.install_dir }}/bin/java"
          if "$JAVA_BIN" --help 2>&1 | grep -q 'Usage: java'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          JAVA_BIN="${{ steps.install.outputs.install_dir }}/bin/java"
          if [ "$(uname -m)" = "aarch64" ] && file "$JAVA_BIN" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$JAVA_BIN" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          JAVA_HOME_CURRENT="${{ steps.install.outputs.install_dir }}"
          TMP_DIR=$(mktemp -d)
          cat > "${TMP_DIR}/Hello.java" <<'EOF'
          public class Hello {
              public static void main(String[] args) {
                  System.out.println("temurin-ok");
              }
          }
          EOF
          "$JAVA_HOME_CURRENT/bin/javac" "${TMP_DIR}/Hello.java"
          if "$JAVA_HOME_CURRENT/bin/java" -cp "${TMP_DIR}" Hello | grep -q '^temurin-ok$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.install.outputs.baseline_release }}"
          NEXT_RELEASE="${TEMURIN_NEXT_RELEASE}"
          NEXT_VERSION="${NEXT_RELEASE#jdk-}"
          NEXT_URL="${TEMURIN_API_BASE}/${NEXT_RELEASE}/linux/aarch64/jdk/hotspot/normal/eclipse?project=jdk"
          NEXT_NAME="OpenJDK21U-jdk_aarch64_linux_hotspot_${NEXT_VERSION//+/_}.tar.gz"
          STATUS="failed"
          NEXT_REPORTED="install_failed"
          DECISION="next_install_failed"
          REGRESSION_RESULT="Next version install failed on Arm64"
          COMPARISON="Current pinned Temurin release ${CURRENT} passed smoke tests in this run, but the latest Linux/Aarch64 Temurin candidate ${NEXT_VERSION} could not be validated successfully on Arm64."

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          NEXT_DIR=$(mktemp -d)
          if curl -fsSL "$NEXT_URL" -o "$NEXT_DIR/${NEXT_NAME}"; then
            tar -xzf "$NEXT_DIR/${NEXT_NAME}" --strip-components=1 -C "$NEXT_DIR"
            NEXT_JAVA="$NEXT_DIR/bin/java"
            NEXT_JAVAC="$NEXT_DIR/bin/javac"
            NEXT_REPORTED=$("$NEXT_JAVA" -version 2>&1 | awk -F '"' '/version/ {print $2; exit}' || true)

            if [ -x "$NEXT_JAVA" ] \
              && [ -x "$NEXT_JAVAC" ] \
              && file "$NEXT_JAVA" | grep -Eqi 'aarch64|arm64' \
              && [ -n "$NEXT_REPORTED" ]; then
              STATUS="passed"
              DECISION="next_install_validated"
              REGRESSION_RESULT="Next version installed successfully on Arm64"
              COMPARISON="Current pinned Temurin release ${CURRENT} passed smoke tests in this run. Regression validation downloaded the Linux/Aarch64 Temurin release ${NEXT_VERSION}, and the candidate JDK reported version ${NEXT_REPORTED} on Arm64."
            fi
          fi

          echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "Next version installed on Arm64: ${NEXT_REPORTED}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${COMPARISON}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_release || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_core_test() {
            local status="$1"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}"

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Eclipse Temurin Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.install.outputs.baseline_release || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64." >> "$GITHUB_STEP_SUMMARY"
