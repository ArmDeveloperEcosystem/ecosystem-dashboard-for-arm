name: Test OpenLiteSpeed on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-litespeed_openlitespeed.outputs.timestamp }}
jobs:
  test-litespeed_openlitespeed:
    runs-on: ubuntu-24.04-arm
    env:
      OPENLITESPEED_VERSION: "1.7.17"
      OPENLITESPEED_TAG: "v1.7.17"
      OPENLITESPEED_ASSET: "openlitespeed-1.7.17-aarch64-linux.tgz"
      OPENLITESPEED_NEXT_VERSION: "1.7.18"
      OPENLITESPEED_NEXT_TAG: "v1.7.18.1"
      OPENLITESPEED_NEXT_ASSET: "openlitespeed-1.7.18-aarch64-linux.tgz"
      OPENLITESPEED_ROOT: "/usr/local/lsws"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OpenLiteSpeed'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=litespeed_openlitespeed" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/litespeed_openlitespeed" >> "$GITHUB_OUTPUT"

      - name: Install OpenLiteSpeed baseline
        id: install
        run: |
          set -euo pipefail
          WORKDIR="$(mktemp -d)"
          URL="https://github.com/litespeedtech/openlitespeed/releases/download/${OPENLITESPEED_TAG}/${OPENLITESPEED_ASSET}"
          GROUP_NAME="nogroup"

          sudo apt-get update
          sudo apt-get install -y curl file lsof
          sudo rm -rf "${OPENLITESPEED_ROOT}"

          curl -fsSL -o "${WORKDIR}/openlitespeed.tgz" "${URL}"
          tar -xzf "${WORKDIR}/openlitespeed.tgz" -C "${WORKDIR}"
          sudo mkdir -p "${OPENLITESPEED_ROOT}"
          sudo cp -a "${WORKDIR}/openlitespeed/." "${OPENLITESPEED_ROOT}/"
          sudo mkdir -p "${OPENLITESPEED_ROOT}/logs" "${OPENLITESPEED_ROOT}/admin/logs" "${OPENLITESPEED_ROOT}/admin/tmp" "${OPENLITESPEED_ROOT}/Example/logs" /tmp/lshttpd
          sudo chown -R nobody:nogroup "${OPENLITESPEED_ROOT}/logs" "${OPENLITESPEED_ROOT}/admin/logs" "${OPENLITESPEED_ROOT}/admin/tmp" "${OPENLITESPEED_ROOT}/Example/logs" /tmp/lshttpd
          if [ ! -e "${OPENLITESPEED_ROOT}/bin/litespeed" ] && [ -e "${OPENLITESPEED_ROOT}/bin/openlitespeed" ]; then
            sudo ln -sf "${OPENLITESPEED_ROOT}/bin/openlitespeed" "${OPENLITESPEED_ROOT}/bin/litespeed"
          fi
          sudo sed \
            -e "s|%USER%|nobody|g" \
            -e "s|%GROUP%|${GROUP_NAME}|g" \
            -e "s|%DEFAULT_TMP_DIR%|/tmp/lshttpd|g" \
            -e "s|%ADMIN_EMAIL%|root@localhost|g" \
            -e "s|%RUBY_BIN%|/usr/bin/ruby|g" \
            -e "s|%HTTP_PORT%|8088|g" \
            "${OPENLITESPEED_ROOT}/conf/httpd_config.conf.in" > /tmp/httpd_config.conf
          sudo sed -i 's/disableWebAdmin                  0/disableWebAdmin                  1/' /tmp/httpd_config.conf
          sudo install -m 0644 /tmp/httpd_config.conf "${OPENLITESPEED_ROOT}/conf/httpd_config.conf"
          sudo sed \
            -e "s|%ADMIN_PORT%|7080|g" \
            "${OPENLITESPEED_ROOT}/admin/conf/admin_config.conf.in" > /tmp/admin_config.conf
          sudo install -m 0644 /tmp/admin_config.conf "${OPENLITESPEED_ROOT}/admin/conf/admin_config.conf"

          test -x "${OPENLITESPEED_ROOT}/bin/openlitespeed"
          test -x "${OPENLITESPEED_ROOT}/bin/lswsctrl"
          test -f "${OPENLITESPEED_ROOT}/conf/httpd_config.conf"
          test -f "${OPENLITESPEED_ROOT}/VERSION"

          echo "baseline_version=${OPENLITESPEED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "binary=${OPENLITESPEED_ROOT}/bin/openlitespeed" >> "$GITHUB_OUTPUT"
          echo "control=${OPENLITESPEED_ROOT}/bin/lswsctrl" >> "$GITHUB_OUTPUT"
          echo "config=${OPENLITESPEED_ROOT}/conf/httpd_config.conf" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OpenLiteSpeed version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n' < "${OPENLITESPEED_ROOT}/VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${VERSION}" ]; then
            VERSION="${OPENLITESPEED_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected OpenLiteSpeed version: ${VERSION}"

      - name: Test 1 - Check OpenLiteSpeed binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.binary }}" ] && [ -x "${{ steps.install.outputs.control }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION="$(tr -d '\r\n' < "${OPENLITESPEED_ROOT}/VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ "${VERSION}" = "${OPENLITESPEED_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${OPENLITESPEED_ROOT}/VERSION" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check configuration exists
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -s "${{ steps.install.outputs.config }}" ] && grep -Eqi 'listener|virtualhost' "${{ steps.install.outputs.config }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sed -n '1,120p' "${{ steps.install.outputs.config }}" 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.binary }}" | grep -Eqi 'ARM aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.binary }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo "${{ steps.install.outputs.control }}" stop >/dev/null 2>&1 || true
          sudo "${{ steps.install.outputs.control }}" start >/tmp/ols-start.log 2>&1 || true

          if timeout 45s bash -lc 'until curl -sI --max-time 5 http://127.0.0.1:8088/ >/tmp/ols-headers.txt 2>&1; do sleep 1; done' && \
             grep -q '^HTTP/' /tmp/ols-headers.txt && \
             pgrep -fa '/usr/local/lsws/bin/(openlitespeed|litespeed)|lshttpd' >/tmp/ols-procs.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ols-start.log || true
            cat /tmp/ols-headers.txt || true
            cat /tmp/ols-procs.txt || true
            sudo "${{ steps.install.outputs.control }}" status || true
            sudo cat "${OPENLITESPEED_ROOT}/logs/error.log" 2>/dev/null || true
            sudo cat "${OPENLITESPEED_ROOT}/admin/logs/error.log" 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_version }}"
          LATEST="${OPENLITESPEED_NEXT_VERSION}"
          WORKDIR="$(mktemp -d)"
          URL="https://github.com/litespeedtech/openlitespeed/releases/download/${OPENLITESPEED_NEXT_TAG}/${OPENLITESPEED_NEXT_ASSET}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          sudo "${{ steps.install.outputs.control }}" stop >/dev/null 2>&1 || true
          sudo rm -rf "${OPENLITESPEED_ROOT}"

          curl -fsSL -o "${WORKDIR}/openlitespeed-next.tgz" "${URL}"
          tar -xzf "${WORKDIR}/openlitespeed-next.tgz" -C "${WORKDIR}"
          sudo mkdir -p "${OPENLITESPEED_ROOT}"
          sudo cp -a "${WORKDIR}/openlitespeed/." "${OPENLITESPEED_ROOT}/"
          sudo mkdir -p "${OPENLITESPEED_ROOT}/logs" "${OPENLITESPEED_ROOT}/admin/logs" "${OPENLITESPEED_ROOT}/admin/tmp" "${OPENLITESPEED_ROOT}/Example/logs" /tmp/lshttpd
          sudo chown -R nobody:nogroup "${OPENLITESPEED_ROOT}/logs" "${OPENLITESPEED_ROOT}/admin/logs" "${OPENLITESPEED_ROOT}/admin/tmp" "${OPENLITESPEED_ROOT}/Example/logs" /tmp/lshttpd
          if [ ! -e "${OPENLITESPEED_ROOT}/bin/litespeed" ] && [ -e "${OPENLITESPEED_ROOT}/bin/openlitespeed" ]; then
            sudo ln -sf "${OPENLITESPEED_ROOT}/bin/openlitespeed" "${OPENLITESPEED_ROOT}/bin/litespeed"
          fi
          sudo sed \
            -e "s|%USER%|nobody|g" \
            -e "s|%GROUP%|nogroup|g" \
            -e "s|%DEFAULT_TMP_DIR%|/tmp/lshttpd|g" \
            -e "s|%ADMIN_EMAIL%|root@localhost|g" \
            -e "s|%RUBY_BIN%|/usr/bin/ruby|g" \
            -e "s|%HTTP_PORT%|8088|g" \
            "${OPENLITESPEED_ROOT}/conf/httpd_config.conf.in" > /tmp/httpd_config-next.conf
          sudo sed -i 's/disableWebAdmin                  0/disableWebAdmin                  1/' /tmp/httpd_config-next.conf
          sudo install -m 0644 /tmp/httpd_config-next.conf "${OPENLITESPEED_ROOT}/conf/httpd_config.conf"
          sudo sed -e "s|%ADMIN_PORT%|7080|g" "${OPENLITESPEED_ROOT}/admin/conf/admin_config.conf.in" > /tmp/admin_config-next.conf
          sudo install -m 0644 /tmp/admin_config-next.conf "${OPENLITESPEED_ROOT}/admin/conf/admin_config.conf"

          NEXT_VERSION="$(tr -d '\r\n' < "${OPENLITESPEED_ROOT}/VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${NEXT_VERSION}" ]; then
            NEXT_VERSION="${LATEST}"
          fi

          sudo "${OPENLITESPEED_ROOT}/bin/lswsctrl" stop >/dev/null 2>&1 || true
          sudo "${OPENLITESPEED_ROOT}/bin/lswsctrl" start >/tmp/ols-next-start.log 2>&1 || true

          if [ -x "${OPENLITESPEED_ROOT}/bin/openlitespeed" ] && \
             [ -x "${OPENLITESPEED_ROOT}/bin/lswsctrl" ] && \
             file "${OPENLITESPEED_ROOT}/bin/openlitespeed" | grep -Eqi 'ARM aarch64|aarch64' && \
             [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             timeout 45s bash -lc 'until curl -sI --max-time 5 http://127.0.0.1:8088/ >/tmp/ols-next-headers.txt 2>&1; do sleep 1; done' && \
             grep -q '^HTTP/' /tmp/ols-next-headers.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenLiteSpeed version ${CURRENT} passed smoke tests in this run. Regression validation installed the newer Arm64 upstream tarball ${OPENLITESPEED_NEXT_TAG}, and the upgraded server started successfully on port 8088 with version ${NEXT_VERSION}." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${OPENLITESPEED_ROOT}/VERSION" || true
            cat /tmp/ols-next-start.log || true
            cat /tmp/ols-next-headers.txt || true
            sudo "${OPENLITESPEED_ROOT}/bin/lswsctrl" status || true
            sudo cat "${OPENLITESPEED_ROOT}/logs/error.log" 2>/dev/null || true
            sudo cat "${OPENLITESPEED_ROOT}/admin/logs/error.log" 2>/dev/null || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenLiteSpeed version ${CURRENT} passed smoke tests in this run, but candidate ${OPENLITESPEED_NEXT_TAG} did not complete the expected Arm64 install and startup validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          REGRESSION_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            local kind="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$kind" = "core" ]; then
                CORE_FAILED=1
              else
                REGRESSION_FAILED=1
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}" "regression"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ] && [ "${REGRESSION_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## OpenLiteSpeed Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check OpenLiteSpeed binaries exist: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Test 3 - Check configuration exists: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}"
            echo
            echo "### Regression Validation"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
