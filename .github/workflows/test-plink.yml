name: Test Plink on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/plink.md"
      - ".github/workflows/test-plink.yml"

jobs:
  test-plink:
    runs-on: ubuntu-24.04-arm
    env:
      PLINK_REF: "2.4.6_as_released"
      PLINK_VERSION: "2.4.6"
      PLINK_NEXT_REF: "2.4.7_as_released"
      PLINK_NEXT_VERSION: "2.4.7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=plink" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/plink" >> "$GITHUB_OUTPUT"
          echo "current_version=${PLINK_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Plink baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-tk xvfb xauth

          BASE_VENV="${RUNNER_TEMP}/plink-current"
          rm -rf "$BASE_VENV"
          python3 -m venv "$BASE_VENV"
          "$BASE_VENV/bin/pip" install -q --upgrade pip "setuptools<81" wheel sphinx
          "$BASE_VENV/bin/pip" install -q --no-build-isolation "git+https://github.com/3-manifolds/PLink@${PLINK_REF}"

          INSTALLED_VERSION=$("$BASE_VENV/bin/python" - <<'PY'
          import plink
          print(plink.__version__)
          PY
          )

          if [ "$INSTALLED_VERSION" = "${PLINK_VERSION}" ]; then
            echo "venv=$BASE_VENV" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Plink version
        id: version
        run: |
          set -euo pipefail
          BASE_VENV="${{ steps.install.outputs.venv }}"
          LATEST="${PLINK_NEXT_REF}"
          VERSION=$("$BASE_VENV/bin/python" - <<'PY'
          import plink
          print(plink.__version__)
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Plink version: $VERSION"
          echo "Latest stable release tag: $LATEST"

      - name: Test 1 - Check package import exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_VENV="${{ steps.install.outputs.venv }}"

          if [ -x "$BASE_VENV/bin/python" ] && "$BASE_VENV/bin/python" - <<'PY'
          import plink
          print(plink.__file__)
          PY
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact release version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_VENV="${{ steps.install.outputs.venv }}"
          VERSION=$("$BASE_VENV/bin/python" - <<'PY'
          import plink
          print(plink.__version__)
          PY
          )

          if [ "$VERSION" = "${PLINK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check package metadata
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_VENV="${{ steps.install.outputs.venv }}"

          if "$BASE_VENV/bin/pip" show plink 2>&1 | grep -q "^Version: ${PLINK_VERSION}$"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_VENV="${{ steps.install.outputs.venv }}"

          if xvfb-run -a "$BASE_VENV/bin/python" - >/tmp/plink-functional.log 2>&1 <<'PY'
          import plink
          from plink.app import LinkEditor
          print(f"plink-ok {plink.__version__}")
          editor = LinkEditor(file_name=None)
          editor.window.destroy()
          PY
          then
            cat /tmp/plink-functional.log
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/plink-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          export JOB_URL
          export RUN_ID="${{ github.run_id }}"
          export RUN_TIMESTAMP="${{ steps.metadata.outputs.timestamp }}"
          export OVERALL_STATUS="${{ steps.summary.outputs.overall_status }}"
          export PASSED_COUNT="${{ steps.summary.outputs.passed }}"
          export FAILED_COUNT="${{ steps.summary.outputs.failed }}"
          export TOTAL_DURATION="${{ steps.summary.outputs.duration || 0 }}"
          export DASHBOARD_LINK="${{ steps.metadata.outputs.dashboard_link }}"
          export BADGE_STATUS="${{ steps.summary.outputs.badge_status }}"
          export PACKAGE_SLUG="${{ steps.metadata.outputs.package_slug }}"
          export VERSION="${{ steps.version.outputs.version || '' }}"
          export TEST1_STATUS="${{ steps.test1.outputs.status || 'skipped' }}"
          export TEST1_DURATION="${{ steps.test1.outputs.duration || 0 }}"
          export TEST2_STATUS="${{ steps.test2.outputs.status || 'skipped' }}"
          export TEST2_DURATION="${{ steps.test2.outputs.duration || 0 }}"
          export TEST3_STATUS="${{ steps.test3.outputs.status || 'skipped' }}"
          export TEST3_DURATION="${{ steps.test3.outputs.duration || 0 }}"
          export TEST4_STATUS="${{ steps.test4.outputs.status || 'skipped' }}"
          export TEST4_DURATION="${{ steps.test4.outputs.duration || 0 }}"
          export TEST5_STATUS="${{ steps.test5.outputs.status || 'skipped' }}"
          export TEST5_DURATION="${{ steps.test5.outputs.duration || 0 }}"
          python3 - <<'PY'
          import json
          import os

          def as_int(name):
              return int(os.environ.get(name, "0") or "0")

          data = {
              "schema_version": "1.0",
              "package": {
                  "name": "Plink",
                  "version": os.environ.get("VERSION", ""),
                  "language": "Python",
                  "category": "HPC",
              },
              "run": {
                  "id": os.environ["RUN_ID"],
                  "url": os.environ["JOB_URL"],
                  "timestamp": os.environ["RUN_TIMESTAMP"],
                  "status": os.environ["OVERALL_STATUS"],
                  "runner": {"os": "ubuntu-24.04", "arch": "arm64"},
              },
              "tests": {
                  "passed": as_int("PASSED_COUNT"),
                  "failed": as_int("FAILED_COUNT"),
                  "skipped": 0,
                  "duration_seconds": as_int("TOTAL_DURATION"),
                  "details": [
                      {"name": "Check package import exists", "status": os.environ["TEST1_STATUS"], "duration_seconds": as_int("TEST1_DURATION")},
                      {"name": "Check exact release version", "status": os.environ["TEST2_STATUS"], "duration_seconds": as_int("TEST2_DURATION")},
                      {"name": "Check package metadata", "status": os.environ["TEST3_STATUS"], "duration_seconds": as_int("TEST3_DURATION")},
                      {"name": "Architecture verification", "status": os.environ["TEST4_STATUS"], "duration_seconds": as_int("TEST4_DURATION")},
                      {"name": "Functional validation", "status": os.environ["TEST5_STATUS"], "duration_seconds": as_int("TEST5_DURATION")},
                  ],
              },
              "metadata": {
                  "dashboard_link": os.environ["DASHBOARD_LINK"],
                  "badge_status": os.environ["BADGE_STATUS"],
                  "package_slug": os.environ["PACKAGE_SLUG"],
              },
          }

          with open("test-results/plink.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh, indent=2)
              fh.write("\n")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plink-test-results
          path: test-results/plink.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Plink Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check package import exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact release version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check package metadata: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
