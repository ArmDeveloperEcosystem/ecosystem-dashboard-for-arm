name: Test Plink on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/plink.md"
      - ".github/workflows/test-plink.yml"

jobs:
  test-plink:
    runs-on: ubuntu-24.04-arm
    env:
      PLINK_REF: "2.4.9_as_released"
      PLINK_VERSION: "2.4.9"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=plink" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/plink" >> "$GITHUB_OUTPUT"

      - name: Install Plink
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-tk xvfb xauth
          python3 -m pip install --user --break-system-packages "git+https://github.com/3-manifolds/PLink@${PLINK_REF}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          if python3 -m pip show plink >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Plink version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://api.github.com/repos/3-manifolds/PLink/releases/latest", timeout=20))
          print(data["tag_name"])
          PY
          )
          VERSION=$(python3 - <<'PY'
          import plink
          print(plink.__version__)
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v plink >/dev/null 2>&1 && python3 -m pip show plink >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(python3 - <<'PY'
          import plink
          print(plink.__version__)
          PY
          )

          if [ "$VERSION" = "${PLINK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if python3 -m pip show plink 2>&1 | grep -q '^Version: 2.4.9$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if xvfb-run -a python3 - >/tmp/plink-functional.log 2>&1 <<'PY'
          import plink
          from plink.app import LinkEditor
          editor = LinkEditor(file_name=None)
          print(f"plink-ok {plink.__version__}")
          editor.window.destroy()
          PY
          then
            cat /tmp/plink-functional.log
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/plink-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.latest }}" = "${PLINK_REF}" ]; then
            DECISION="current_is_latest_stable"
            NOTE="Pinned PLink tag already matches the latest stable GitHub release."
          else
            DECISION="hold_current"
            NOTE="Pinned PLink tag remains the validated Arm64 baseline until the newer stable release is explicitly regression-tested."
          fi
          echo "current_version=${PLINK_REF}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${{ steps.version.outputs.latest }}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned PLink release ${PLINK_REF} was installed from the upstream Git tag, the installed package version ${PLINK_VERSION} was verified, package metadata was validated through pip, and a headless xvfb-backed LinkEditor startup succeeded on Arm64. The latest GitHub release tag was checked before any version bump decision." >> "$GITHUB_OUTPUT"
          echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/plink.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Plink",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Version Output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Help Output or Configuration", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plink-test-results
          path: test-results/plink.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Plink Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "- Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "- Test 3 - Check Help Output or Configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "- Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Current vs Next"
            echo "- Current (Pinned): ${{ steps.test6.outputs.current_version }}"
            echo "- Next (Latest Stable): ${{ steps.test6.outputs.latest_version }}"
            echo "- Decision: ${{ steps.test6.outputs.decision }}"
            echo "- Comparison: ${{ steps.test6.outputs.comparison }}"
            echo "- Note: ${{ steps.test6.outputs.note }}"
          } >> "$GITHUB_STEP_SUMMARY"
