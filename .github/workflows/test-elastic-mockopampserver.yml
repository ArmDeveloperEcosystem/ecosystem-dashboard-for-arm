name: Test Elastic Mockopampserver on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/elastic-mockopampserver.md"
      - ".github/workflows/test-elastic-mockopampserver.yml"

jobs:
  test-elastic-mockopampserver:
    runs-on: ubuntu-24.04-arm
    env:
      PACKAGE_VERSION: "0.4.1"
      PACKAGE_NEXT_VERSION: "0.5.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=elastic-mockopampserver" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/elastic-mockopampserver" >> "$GITHUB_OUTPUT"

      - name: Install Elastic Mockopampserver
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y iproute2
          PACKAGE_DIR="$PWD/mockopampserver-smoke"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cd "$PACKAGE_DIR"
          npm init -y >/dev/null 2>&1
          npm install --no-fund --no-audit "@elastic/mockopampserver@${PACKAGE_VERSION}"
          BIN_PATH="$PACKAGE_DIR/node_modules/.bin/mockopampserver"
          if [ -x "$BIN_PATH" ]; then
            echo "$PACKAGE_DIR/node_modules/.bin" >> "$GITHUB_PATH"
            echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
            echo "bin_path=$BIN_PATH" >> "$GITHUB_OUTPUT"
            echo "baseline_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Elastic Mockopampserver version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('${{ steps.install.outputs.package_dir }}/node_modules/@elastic/mockopampserver/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.bin_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PACKAGE_VERSION=$(node -p "require('${{ steps.install.outputs.package_dir }}/node_modules/@elastic/mockopampserver/package.json').version")
          if [ "$PACKAGE_VERSION" = "${{ env.PACKAGE_VERSION }}" ] && node --version | grep -Eq '^v20\.'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.bin_path }}" --help > /tmp/mockopamp-help.txt 2>&1 \
            && grep -Eqi 'usage|mockopampserver' /tmp/mockopamp-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mockopamp-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -f /tmp/mockopamp.log
          "${{ steps.install.outputs.bin_path }}" --hostname 127.0.0.1 > /tmp/mockopamp.log 2>&1 &
          SERVER_PID=$!
          PORT_READY=0
          for _ in $(seq 1 20); do
            if ss -lnt | grep -q ':4320'; then
              PORT_READY=1
              break
            fi
            sleep 1
          done

          if [ "$PORT_READY" -eq 1 ] && grep -Eqi 'listening|server started|opamp' /tmp/mockopamp.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mockopamp.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            kill "$SERVER_PID" || true
            wait "$SERVER_PID" || true
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          kill "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          for STEP in 1 2 3 4 5; do
            if [ "${{ steps.test1.outputs.status }}" = "passed" ] && [ "$STEP" -eq 1 ] \
              || [ "${{ steps.test2.outputs.status }}" = "passed" ] && [ "$STEP" -eq 2 ] \
              || [ "${{ steps.test3.outputs.status }}" = "passed" ] && [ "$STEP" -eq 3 ] \
              || [ "${{ steps.test4.outputs.status }}" = "passed" ] && [ "$STEP" -eq 4 ] \
              || [ "${{ steps.test5.outputs.status }}" = "passed" ] && [ "$STEP" -eq 5 ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done

          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}"
          fi

          mkdir -p test-results
          cat > test-results/elastic-mockopampserver.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Elastic Mockopampserver",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Node.js",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Binary Existence",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Metadata",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Help Output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elastic-mockopampserver-test-results
          path: test-results/elastic-mockopampserver.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Elastic Mockopampserver Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64." >> "$GITHUB_STEP_SUMMARY"
