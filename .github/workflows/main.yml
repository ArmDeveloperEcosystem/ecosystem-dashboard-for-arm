name: build-and-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy_s3:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.130.0'
          extended: true

      - name: Set up Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Python pre-processing
        run: |
          python --version
          python ./build_steps/update_category_mappings.py
          python ./build_steps/update_recently_added_json.py
          python ./build_steps/validate_package_catagories.py

      - name: Show generated file changes
        run: |
          echo "---- data directory ----"
          ls -l ./data || true
          echo "---- git status ----"
          git status --short

      - name: Commit generated files
        run: |
          git add data/category_data.yml \
                  data/category_data_windows.yml \
                  data/recently_added_packages.yaml

          git diff --cached --quiet && echo "No generated file changes to commit" && exit 0

          git commit -m "Update generated data files [skip ci]"
          git push

      - name: Build
        run: hugo --minify --config config.toml,config.cloudfront.toml

      - name: Deploy to S3
        run: hugo deploy --force --maxDeletes -1 --invalidateCDN --config config.toml,config.cloudfront.toml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
