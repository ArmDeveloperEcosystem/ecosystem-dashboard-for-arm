name: Test Libhelium on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/libhelium.md"
      - ".github/workflows/test-libhelium.yml"

jobs:
  test-libhelium:
    runs-on: ubuntu-24.04-arm
    env:
      LIBHELIUM_VERSION: "1.1.0"
      LIBHELIUM_TAG: "1.1.0"
      LIBHELIUM_REPO: "https://github.com/tau-OS/libhelium"
      LIBHELIUM_SRC_DIR: "/tmp/libhelium-source"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libhelium" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libhelium" >> "$GITHUB_OUTPUT"

      - name: Install Libhelium
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates git meson ninja-build build-essential pkg-config gettext valac libgee-0.8-dev libgtk-4-dev
          rm -rf "${LIBHELIUM_SRC_DIR}"
          git clone --depth 1 --branch "${LIBHELIUM_TAG}" "${LIBHELIUM_REPO}" "${LIBHELIUM_SRC_DIR}"
          meson setup "${LIBHELIUM_SRC_DIR}/build" "${LIBHELIUM_SRC_DIR}" --prefix=/usr/local
          meson compile -C "${LIBHELIUM_SRC_DIR}/build"
          sudo meson install -C "${LIBHELIUM_SRC_DIR}/build"
          pkg-config --exists libhelium-1
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Libhelium version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(
              urllib.request.urlopen(
                  "https://api.github.com/repos/tau-OS/libhelium/releases/latest",
                  timeout=20,
              )
          )
          print(str(data["tag_name"]).lstrip("v"))
          PY
          )
          echo "version=${LIBHELIUM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if pkg-config --exists libhelium-1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(pkg-config --modversion libhelium-1)
          if [ "$VERSION" = "${LIBHELIUM_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          pkg-config --cflags libhelium-1 | tee /tmp/libhelium-cflags.log
          if grep -Eq 'gtk-4.0|helium' /tmp/libhelium-cflags.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > /tmp/libhelium-smoke.vala <<'EOF_VALA'
          using He;

          int main(string[] args) {
              typeof(He.Application).ensure();
              stdout.printf("libhelium-ok\n");
              return 0;
          }
          EOF_VALA
          valac /tmp/libhelium-smoke.vala --pkg libhelium-1 --pkg gtk4 -o /tmp/libhelium-smoke
          GSETTINGS_BACKEND=memory /tmp/libhelium-smoke | tee /tmp/libhelium-functional.log
          if grep -Fq "libhelium-ok" /tmp/libhelium-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_SRC_DIR="/tmp/libhelium-regression-source"
          REGRESSION_PREFIX="/tmp/libhelium-regression-prefix"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          rm -rf "${REGRESSION_SRC_DIR}" "${REGRESSION_PREFIX}"
          git clone --depth 1 --branch "${LATEST}" "${LIBHELIUM_REPO}" "${REGRESSION_SRC_DIR}" >/tmp/libhelium-regression-clone.log 2>&1
          meson setup "${REGRESSION_SRC_DIR}/build" "${REGRESSION_SRC_DIR}" --prefix="${REGRESSION_PREFIX}" >/tmp/libhelium-regression-setup.log 2>&1
          meson compile -C "${REGRESSION_SRC_DIR}/build" >/tmp/libhelium-regression-compile.log 2>&1
          meson install -C "${REGRESSION_SRC_DIR}/build" >/tmp/libhelium-regression-install.log 2>&1
          PKG_CONFIG_PATH=$(find "${REGRESSION_PREFIX}" -type d -name pkgconfig | paste -sd: -)
          NEXT_INSTALLED_VERSION=$(PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" pkg-config --modversion libhelium-1 2>/dev/null || true)

          if [ -n "$NEXT_INSTALLED_VERSION" ]; then
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libhelium version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the installed artifact reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libhelium version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be installed and reported on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/libhelium.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Libhelium",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Vala",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libhelium-test-results
          path: test-results/libhelium.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Libhelium Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Current vs Next"
            echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next installed version:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
            echo "${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
