name: Test Libhelium on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-libhelium.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-libhelium.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-libhelium.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-libhelium.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-libhelium.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-libhelium.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-libhelium.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-libhelium.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-libhelium.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-libhelium.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-libhelium.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-libhelium.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-libhelium.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-libhelium.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-libhelium.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-libhelium.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-libhelium.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-libhelium.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-libhelium.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-libhelium.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-libhelium.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-libhelium.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-libhelium.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-libhelium.outputs.timestamp }}
jobs:
  test-libhelium:
    runs-on: ubuntu-24.04-arm
    env:
      LIBHELIUM_VERSION: "1.1.0"
      LIBHELIUM_TAG: "1.1.0"
      LIBHELIUM_NEXT_VERSION: "1.1.1"
      DART_SASS_VERSION: "1.98.0"
      LIBHELIUM_REPO: "https://github.com/tau-OS/libhelium"
      LIBHELIUM_SRC_DIR: "/tmp/libhelium-source"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Libhelium'
      package_version: ${{ steps.version.outputs.version || steps.install.outputs.current_version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.install.outputs.current_version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libhelium" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libhelium" >> "$GITHUB_OUTPUT"
          echo "current_version=${LIBHELIUM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Libhelium
        id: install
        run: |
          set -euo pipefail
          PKG_PATH_HINT="/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig"
          LD_PATH_HINT="/usr/local/lib/aarch64-linux-gnu:/usr/local/lib"
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl git meson ninja-build build-essential pkg-config gettext valac libgee-0.8-dev libgtk-4-dev gobject-introspection libgirepository1.0-dev
          rm -rf /tmp/dart-sass /tmp/dart-sass.tar.gz
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-arm64.tar.gz" -o /tmp/dart-sass.tar.gz
          tar -xzf /tmp/dart-sass.tar.gz -C /tmp
          sudo ln -sf /tmp/dart-sass/sass /usr/local/bin/sass
          export PATH="/usr/local/bin:${PATH}"
          rm -rf "${LIBHELIUM_SRC_DIR}"
          git clone --depth 1 --branch "${LIBHELIUM_TAG}" "${LIBHELIUM_REPO}" "${LIBHELIUM_SRC_DIR}"
          ABOUT_WINDOW="${LIBHELIUM_SRC_DIR}/lib/Widgets/AboutWindow.vala"
          if grep -q "Gtk.show_uri_full.begin" "${ABOUT_WINDOW}"; then
            sed -i -E 's/Gtk\.show_uri_full\.begin\(([^,]+),[[:space:]]*([^,]+),[[:space:]]*Gdk\.CURRENT_TIME,[[:space:]]*null\)/Gtk.show_uri(\1, \2, Gdk.CURRENT_TIME)/g' "${ABOUT_WINDOW}"
          fi
          if grep -q "Gtk.show_uri_full.begin" "${ABOUT_WINDOW}"; then
            echo "Libhelium compatibility patch failed; legacy Gtk.show_uri_full references remain."
            exit 1
          fi
          meson setup "${LIBHELIUM_SRC_DIR}/build" "${LIBHELIUM_SRC_DIR}" --prefix=/usr/local -Ddocumentation=false
          meson compile -C "${LIBHELIUM_SRC_DIR}/build"
          sudo meson install -C "${LIBHELIUM_SRC_DIR}/build"
          sudo ldconfig
          PKG_CONFIG_PATH="${PKG_PATH_HINT}:${PKG_CONFIG_PATH:-}" pkg-config --exists libhelium-1
          INSTALLED_VERSION="$(PKG_CONFIG_PATH="${PKG_PATH_HINT}:${PKG_CONFIG_PATH:-}" pkg-config --modversion libhelium-1)"
          echo "pkg_config_path=${PKG_PATH_HINT}" >> "$GITHUB_OUTPUT"
          echo "ld_library_path=${LD_PATH_HINT}" >> "$GITHUB_OUTPUT"
          echo "installed_version=${INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Libhelium version
        id: version
        run: |
          set -euo pipefail
          CURRENT="${LIBHELIUM_VERSION}"
          NEXT="$(git ls-remote --tags --refs "${LIBHELIUM_REPO}" \
            | awk -F/ '{print $3}' \
            | sed 's/^v//' \
            | grep -E '^[0-9]+(\.[0-9]+){1,2}$' \
            | sort -V \
            | awk -v current="${CURRENT}" '
                $0 == current { found=1; next }
                found { print; exit }
              ' || true)"
          if [ -z "${NEXT}" ]; then
            NEXT="${LIBHELIUM_NEXT_VERSION}"
          fi
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PKG_PATH="${{ steps.install.outputs.pkg_config_path }}"
          if PKG_CONFIG_PATH="${PKG_PATH}:${PKG_CONFIG_PATH:-}" pkg-config --exists libhelium-1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PKG_PATH="${{ steps.install.outputs.pkg_config_path }}"
          VERSION_RAW="$(PKG_CONFIG_PATH="${PKG_PATH}:${PKG_CONFIG_PATH:-}" pkg-config --modversion libhelium-1)"
          VERSION="$(printf '%s' "${VERSION_RAW}" | sed -E 's/^([0-9]+(\.[0-9]+){1,2}).*/\1/')"
          EXPECTED="$(printf '%s' "${LIBHELIUM_VERSION}" | sed -E 's/^([0-9]+(\.[0-9]+){1,2}).*/\1/')"
          EXPECTED_MAJOR="${EXPECTED%%.*}"
          if [ "${VERSION}" = "${EXPECTED}" ] || [ "${VERSION_RAW}" = "${EXPECTED_MAJOR}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected libhelium baseline version ${EXPECTED} (or ABI major ${EXPECTED_MAJOR}), got ${VERSION_RAW}."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PKG_PATH="${{ steps.install.outputs.pkg_config_path }}"
          PKG_CONFIG_PATH="${PKG_PATH}:${PKG_CONFIG_PATH:-}" pkg-config --cflags libhelium-1 | tee /tmp/libhelium-cflags.log
          if grep -Eq 'gtk-4.0|helium' /tmp/libhelium-cflags.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PKG_PATH="${{ steps.install.outputs.pkg_config_path }}"
          LD_PATH="${{ steps.install.outputs.ld_library_path }}"
          cat > /tmp/libhelium-smoke.vala <<'EOF_VALA'
          using He;

          int main(string[] args) {
              typeof(He.Application).ensure();
              stdout.printf("libhelium-ok\n");
              return 0;
          }
          EOF_VALA
          PKG_CONFIG_PATH="${PKG_PATH}:${PKG_CONFIG_PATH:-}" valac /tmp/libhelium-smoke.vala --pkg libhelium-1 --pkg gtk4 -o /tmp/libhelium-smoke
          LD_LIBRARY_PATH="${LD_PATH}:${LD_LIBRARY_PATH:-}" GSETTINGS_BACKEND=memory /tmp/libhelium-smoke | tee /tmp/libhelium-functional.log
          if grep -Fq "libhelium-ok" /tmp/libhelium-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_SRC_DIR="/tmp/libhelium-regression-source"
          REGRESSION_PREFIX="/tmp/libhelium-regression-prefix"
          export PATH="/usr/local/bin:${PATH}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT:-${LIBHELIUM_VERSION}}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          rm -rf "${REGRESSION_SRC_DIR}" "${REGRESSION_PREFIX}"
          git clone --depth 1 --branch "${LATEST}" "${LIBHELIUM_REPO}" "${REGRESSION_SRC_DIR}" >/tmp/libhelium-regression-clone.log 2>&1
          meson setup "${REGRESSION_SRC_DIR}/build" "${REGRESSION_SRC_DIR}" --prefix="${REGRESSION_PREFIX}" -Ddocumentation=false >/tmp/libhelium-regression-setup.log 2>&1
          meson compile -C "${REGRESSION_SRC_DIR}/build" >/tmp/libhelium-regression-compile.log 2>&1
          meson install -C "${REGRESSION_SRC_DIR}/build" >/tmp/libhelium-regression-install.log 2>&1
          PKG_CONFIG_PATH=$(find "${REGRESSION_PREFIX}" -type d -name pkgconfig | paste -sd: -)
          NEXT_INSTALLED_VERSION=$(PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" pkg-config --modversion libhelium-1 2>/dev/null || true)

          if [ -n "$NEXT_INSTALLED_VERSION" ]; then
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Pending regression install validation" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Libhelium version ${CURRENT} already matches the newest public stable Libhelium release found by this workflow. Tests 1-5 validate the real Arm64 source-build path, but there is no clean dashboard-aligned aged baseline-plus-next-version pair and prior Arm validation exposed toolchain risk, so this package needs metadata or policy review before claiming a genuine Test 6 upgrade step." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Pending regression install validation"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Libhelium version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the installed artifact reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
          else
            cat /tmp/libhelium-regression-clone.log || true
            cat /tmp/libhelium-regression-setup.log || true
            cat /tmp/libhelium-regression-compile.log || true
            cat /tmp/libhelium-regression-install.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Libhelium version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be installed and reported on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Libhelium Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
