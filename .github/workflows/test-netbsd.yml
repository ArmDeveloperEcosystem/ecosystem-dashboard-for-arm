name: Test NetBSD on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-netbsd.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-netbsd.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-netbsd.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-netbsd.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-netbsd.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-netbsd.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-netbsd.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-netbsd.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-netbsd.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-netbsd.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-netbsd.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-netbsd.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-netbsd.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-netbsd.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-netbsd.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-netbsd.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-netbsd.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-netbsd.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-netbsd.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-netbsd.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-netbsd.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-netbsd.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-netbsd.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-netbsd.outputs.timestamp }}
jobs:
  test-netbsd:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_BASELINE_VERSION: "10.0"
      NETBSD_MIRROR: "https://cdn.netbsd.org/pub/NetBSD"
      NETBSD_PLATFORM: "evbarm-aarch64"
      NETBSD_GZIMG: "binary/gzimg/arm64.img.gz"
      NETBSD_WORKROOT: "/tmp/netbsd-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'NetBSD'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=netbsd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/netbsd" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install NetBSD QEMU dependencies
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 gzip curl file fdisk ca-certificates

          BASE_DIR="${NETBSD_WORKROOT}/baseline"
          BASE_URL="${NETBSD_MIRROR}/NetBSD-${CURRENT_BASELINE_VERSION}/${NETBSD_PLATFORM}/${NETBSD_GZIMG}"

          rm -rf "${NETBSD_WORKROOT}"
          mkdir -p "${BASE_DIR}"
          curl -fsSL -o "${BASE_DIR}/arm64.img.gz" "${BASE_URL}"

          echo "baseline_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "baseline_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get NetBSD version
        id: version
        run: |
          set -euo pipefail
          NEXT=$(
            python3 - "${CURRENT_BASELINE_VERSION}" <<'PY'
          import re
          import sys
          import urllib.request

          current = (sys.argv[1] or "").strip()
          if not re.fullmatch(r"[0-9]+\.[0-9]+", current):
              print("")
              raise SystemExit(0)

          html = urllib.request.urlopen("https://www.netbsd.org/releases/formal.html", timeout=20).read().decode("utf-8", "ignore")
          versions = []
          for version in re.findall(r'NetBSD ([0-9]+\.[0-9]+)', html):
              major, minor = map(int, version.split("."))
              versions.append((major, minor, version))
          versions = sorted(set(versions))
          current_key = tuple(map(int, current.split(".")))
          candidates = [entry[2] for entry in versions if (entry[0], entry[1]) > current_key]
          print(candidates[0] if candidates else "")
          PY
          )
          echo "version=${CURRENT_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Detected NetBSD version: ${CURRENT_BASELINE_VERSION}"
          echo "Detected next newer stable release candidate: ${NEXT:-none}"

      - name: Test 1 - Check image archive exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_GZ="${{ steps.install.outputs.baseline_dir }}/arm64.img.gz"

          if [ -s "${BASE_GZ}" ] && gzip -t "${BASE_GZ}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check image format
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.baseline_dir }}"
          BASE_IMG="${BASE_DIR}/arm64.img"

          gzip -dc "${BASE_DIR}/arm64.img.gz" > "${BASE_IMG}"

          if file "${BASE_IMG}" | grep -Eqi 'DOS/MBR boot sector|GPT'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${BASE_IMG}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check QEMU boot prerequisites
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if command -v qemu-system-aarch64 >/dev/null 2>&1 \
            && [ -f /usr/share/qemu-efi-aarch64/QEMU_EFI.fd ] \
            && qemu-system-aarch64 --version >/tmp/netbsd-qemu-version.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/netbsd-qemu-version.txt || true
            ls -l /usr/share/qemu-efi-aarch64 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Boot baseline image
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_IMG="${{ steps.install.outputs.baseline_dir }}/arm64.img"
          BASE_LOG="/tmp/netbsd-baseline-boot.log"

          timeout 90 qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a57 \
            -m 1024 \
            -nographic \
            -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
            -drive file="${BASE_IMG}",if=virtio,format=raw \
            > "${BASE_LOG}" 2>&1 || true

          if grep -q "NetBSD ${CURRENT_BASELINE_VERSION} (GENERIC64)" "${BASE_LOG}" \
            && grep -q "root on dk1" "${BASE_LOG}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${BASE_LOG}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.CURRENT_BASELINE_VERSION || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable NetBSD release is available beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} has no higher stable release candidate from the formal NetBSD release stream, so Test 6 is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable NetBSD release is available beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} matches latest stable ${LATEST}; next-version regression is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_GZ="${NEXT_DIR}/arm64-next.img.gz"
          NEXT_IMG="${NEXT_DIR}/arm64-next.img"
          NEXT_LOG="/tmp/netbsd-next-boot.log"
          NEXT_URL="${NETBSD_MIRROR}/NetBSD-${LATEST}/${NETBSD_PLATFORM}/${NETBSD_GZIMG}"

          if ! curl -fsSL -o "${NEXT_GZ}" "${NEXT_URL}"; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Detected next NetBSD release ${LATEST}, but its ARM64 image could not be downloaded from the formal release path." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! gzip -t "${NEXT_GZ}"; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Downloaded NetBSD ${LATEST} ARM64 image archive is corrupt and cannot be validated for boot regression testing." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          gzip -dc "${NEXT_GZ}" > "${NEXT_IMG}"
          timeout 90 qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a57 \
            -m 1024 \
            -nographic \
            -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
            -drive file="${NEXT_IMG}",if=virtio,format=raw \
            > "${NEXT_LOG}" 2>&1 || true

          if grep -q "NetBSD ${LATEST} (GENERIC64)" "${NEXT_LOG}" \
            && grep -q "root on dk1" "${NEXT_LOG}"; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} booted successfully in Tests 1-5, and next stable NetBSD ${LATEST} also booted successfully under the same QEMU Arm64 validation path." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${NEXT_LOG}" || true
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=boot_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} booted in Tests 1-5, but next stable NetBSD ${LATEST} did not complete equivalent boot smoke checks under QEMU Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## NetBSD Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check image archive exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check image format: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check QEMU boot prerequisites: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Boot baseline image: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
