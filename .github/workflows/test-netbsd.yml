name: Test NetBSD on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/netbsd.md"
      - ".github/workflows/test-netbsd.yml"

jobs:
  test-netbsd:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_BASELINE_VERSION: "10.0"
      NETBSD_MIRROR: "https://cdn.netbsd.org/pub/NetBSD"
      NETBSD_PLATFORM: "evbarm-aarch64"
      NETBSD_GZIMG: "binary/gzimg/arm64.img.gz"
      NETBSD_WORKROOT: "/tmp/netbsd-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=netbsd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/netbsd" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install NetBSD QEMU dependencies
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 gzip curl file fdisk ca-certificates

          BASE_DIR="${NETBSD_WORKROOT}/baseline"
          BASE_URL="${NETBSD_MIRROR}/NetBSD-${CURRENT_BASELINE_VERSION}/${NETBSD_PLATFORM}/${NETBSD_GZIMG}"

          rm -rf "${NETBSD_WORKROOT}"
          mkdir -p "${BASE_DIR}"
          curl -fsSL -o "${BASE_DIR}/arm64.img.gz" "${BASE_URL}"

          echo "baseline_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "baseline_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get NetBSD version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(
            python3 - <<'PY'
          import re
          import urllib.request

          html = urllib.request.urlopen("https://www.netbsd.org/releases/formal.html", timeout=20).read().decode("utf-8", "ignore")
          versions = []
          for version in re.findall(r'NetBSD ([0-9]+\.[0-9]+)', html):
              major, minor = map(int, version.split("."))
              versions.append((major, minor, version))
          versions = sorted(set(versions))
          print(versions[-1][2] if versions else "")
          PY
          )
          echo "version=${CURRENT_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected NetBSD version: ${CURRENT_BASELINE_VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check image archive exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_GZ="${{ steps.install.outputs.baseline_dir }}/arm64.img.gz"

          if [ -s "${BASE_GZ}" ] && gzip -t "${BASE_GZ}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check image format
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.baseline_dir }}"
          BASE_IMG="${BASE_DIR}/arm64.img"

          gzip -dc "${BASE_DIR}/arm64.img.gz" > "${BASE_IMG}"

          if file "${BASE_IMG}" | grep -Eqi 'DOS/MBR boot sector|GPT'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${BASE_IMG}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check QEMU boot prerequisites
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if command -v qemu-system-aarch64 >/dev/null 2>&1 \
            && [ -f /usr/share/qemu-efi-aarch64/QEMU_EFI.fd ] \
            && qemu-system-aarch64 --version >/tmp/netbsd-qemu-version.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/netbsd-qemu-version.txt || true
            ls -l /usr/share/qemu-efi-aarch64 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Boot baseline image
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_IMG="${{ steps.install.outputs.baseline_dir }}/arm64.img"
          BASE_LOG="/tmp/netbsd-baseline-boot.log"

          timeout 90 qemu-system-aarch64 \
            -M virt \
            -cpu cortex-a57 \
            -m 1024 \
            -nographic \
            -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
            -drive file="${BASE_IMG}",if=virtio,format=raw \
            > "${BASE_LOG}" 2>&1 || true

          if grep -q "NetBSD ${CURRENT_BASELINE_VERSION} (GENERIC64)" "${BASE_LOG}" \
            && grep -q "root on dk1" "${BASE_LOG}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${BASE_LOG}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/netbsd.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "NetBSD",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check image archive exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check image format", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check QEMU boot prerequisites", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Boot baseline image", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netbsd-test-results
          path: test-results/netbsd.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## NetBSD Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check image archive exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check image format: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check QEMU boot prerequisites: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Boot baseline image: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
