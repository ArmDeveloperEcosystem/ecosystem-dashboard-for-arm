name: Test ISA-L (Intelligent Storage Acceleration Library) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-isa-l.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-isa-l.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-isa-l.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-isa-l.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-isa-l.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-isa-l.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-isa-l.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-isa-l.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-isa-l.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-isa-l.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-isa-l.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-isa-l.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-isa-l.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-isa-l.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-isa-l.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-isa-l.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-isa-l.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-isa-l.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-isa-l.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-isa-l.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-isa-l.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-isa-l.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-isa-l.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-isa-l.outputs.timestamp }}
jobs:
  test-isa-l:
    runs-on: ubuntu-24.04-arm
    env:
      ISAL_VERSION: "2.31.1"
      ISAL_NEXT_VERSION: "2.32.0"
      ISAL_URL: "https://github.com/intel/isa-l/archive/refs/tags/v2.31.1.tar.gz"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'ISA-L (Intelligent Storage Acceleration Library)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=isa-l" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/isa-l" >> "$GITHUB_OUTPUT"
      - name: Install ISA-L
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential curl libtool pkg-config

          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/isa-l.tar.gz" "${ISAL_URL}"
          tar -xzf "${TMP_DIR}/isa-l.tar.gz" -C "${TMP_DIR}"
          SRC_DIR="${TMP_DIR}/isa-l-${ISAL_VERSION}"
          PREFIX="${TMP_DIR}/isa-l-install"

          cd "${SRC_DIR}"
          ./autogen.sh
          ./configure --prefix="${PREFIX}"
          make -j"$(nproc)"
          make install

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get ISA-L version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(PKG_CONFIG_PATH="${{ steps.install.outputs.prefix }}/lib/pkgconfig" pkg-config --modversion libisal)
          LATEST_TAG="v${ISAL_NEXT_VERSION}"
          LATEST="${LATEST_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Header and Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          if [ -f "${PREFIX}/include/isa-l/crc.h" ] && [ -x "${PREFIX}/bin/igzip" ] && [ -f "${PREFIX}/lib/pkgconfig/libisal.pc" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(pkg-config --define-variable=prefix="${{ steps.install.outputs.prefix }}" --modversion "${{ steps.install.outputs.prefix }}/lib/pkgconfig/libisal.pc")

          if [ "$VERSION" = "${ISAL_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"
          export PKG_CONFIG_PATH="${PREFIX}/lib/pkgconfig"

          if "${PREFIX}/bin/igzip" -h 2>&1 | grep -qi "Usage" && pkg-config --cflags --libs libisal | grep -q "isal"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          cat > /tmp/isa-l-smoke.c <<'EOF'
          #include <stdint.h>
          #include <stdio.h>
          #include <isa-l/crc.h>

          int main(void) {
            const unsigned char payload[] = "arm64";
            uint32_t crc = crc32_ieee(0, payload, sizeof(payload) - 1);
            printf("%u\n", crc);
            return 0;
          }
          EOF

          cc /tmp/isa-l-smoke.c \
            -I"${PREFIX}/include" \
            -L"${PREFIX}/lib" \
            -lisal \
            -Wl,-rpath,"${PREFIX}/lib" \
            -o /tmp/isa-l-smoke

          if [ "$(/tmp/isa-l-smoke)" = "3555340445" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${ISAL_VERSION}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "note=The workflow is already pinned to the latest stable ISA-L release." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            TMP_DIR=$(mktemp -d)
            CANDIDATE_TAG="v${LATEST}"
            CANDIDATE_URL="https://github.com/intel/isa-l/archive/refs/tags/${CANDIDATE_TAG}.tar.gz"
            CANDIDATE_PREFIX="${TMP_DIR}/isa-l-candidate-install"

            curl -fsSL -o "${TMP_DIR}/isa-l-candidate.tar.gz" "${CANDIDATE_URL}"
            tar -xzf "${TMP_DIR}/isa-l-candidate.tar.gz" -C "${TMP_DIR}"
            cd "${TMP_DIR}/isa-l-${LATEST}"
            ./autogen.sh
            ./configure --prefix="${CANDIDATE_PREFIX}"
            make -j"$(nproc)"
            make install

            NEXT_VERSION="$(PKG_CONFIG_PATH="${CANDIDATE_PREFIX}/lib/pkgconfig" pkg-config --modversion libisal)"
            "${CANDIDATE_PREFIX}/bin/igzip" -h >/dev/null 2>&1

            cat > /tmp/isa-l-candidate-smoke.c <<'EOF'
            #include <stdint.h>
            #include <stdio.h>
            #include <isa-l/crc.h>

            int main(void) {
              const unsigned char payload[] = "arm64";
              uint32_t crc = crc32_ieee(0, payload, sizeof(payload) - 1);
              printf("%u\n", crc);
              return 0;
            }
            EOF

            cc /tmp/isa-l-candidate-smoke.c \
              -I"${CANDIDATE_PREFIX}/include" \
              -L"${CANDIDATE_PREFIX}/lib" \
              -lisal \
              -Wl,-rpath,"${CANDIDATE_PREFIX}/lib" \
              -o /tmp/isa-l-candidate-smoke

            CANDIDATE_SMOKE="$("/tmp/isa-l-candidate-smoke")"

            if [ "$NEXT_VERSION" = "$LATEST" ] && [ "$CANDIDATE_SMOKE" = "3555340445" ]; then
              echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned ISA-L source release ${CURRENT} built and passed its Arm64 smoke checks, and regression validation built candidate release ${LATEST} from the official source tarball, installed it into an isolated prefix, validated pkg-config metadata and igzip help output, and compiled and ran the CRC32 consumer program successfully." >> "$GITHUB_OUTPUT"
              echo "note=Regression validation used the official upstream source release path on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned ISA-L source release ${CURRENT} built successfully on Arm64, but candidate release ${LATEST} did not complete the required build/install/smoke validation path." >> "$GITHUB_OUTPUT"
              echo "note=Candidate ISA-L regression validation failed on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          REGRESSION_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            local kind="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
              if [ "$kind" = "core" ]; then
                CORE_FAILED=1
              else
                REGRESSION_FAILED=1
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}" "regression"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ $CORE_FAILED -eq 0 ] && [ $REGRESSION_FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## ISA-L (Intelligent Storage Acceleration Library) Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Header and Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "- Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "- Test 3 - Help Output or Configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "- Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
