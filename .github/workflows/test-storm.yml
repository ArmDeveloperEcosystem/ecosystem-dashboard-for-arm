name: Test Storm on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-storm.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-storm.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-storm.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-storm.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-storm.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-storm.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-storm.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-storm.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-storm.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-storm.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-storm.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-storm.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-storm.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-storm.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-storm.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-storm.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-storm.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-storm.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-storm.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-storm.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-storm.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-storm.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-storm.outputs.timestamp }}
jobs:
  test-storm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    env:
      STORM_VERSION: "2.8.2"
      STORM_NEXT_VERSION: "2.8.3"
      STORM_ARCHIVE: "apache-storm-2.8.2.tar.gz"
      STORM_ARCHIVE_URL: "https://archive.apache.org/dist/storm/apache-storm-2.8.2/apache-storm-2.8.2.tar.gz"
      STORM_ARCHIVE_HTTP_URL: "http://archive.apache.org/dist/storm/apache-storm-2.8.2/apache-storm-2.8.2.tar.gz"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Storm'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=storm" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/storm" >> "$GITHUB_OUTPUT"
          echo "current_version=${STORM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Storm baseline
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl tar openjdk-17-jre-headless openjdk-17-jdk-headless procps"
          TMP_DIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMP_DIR"
          }
          trap cleanup EXIT
          download_storm_tarball() {
            local dest="$1"
            shift
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=4 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=600 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "${GITHUB_WORKSPACE}/.github/scripts/download-with-fallback.sh" "$dest" "${urls[@]}"
          }
          echo "Downloading Storm baseline from ${STORM_ARCHIVE_URL}"
          if ! download_storm_tarball "${TMP_DIR}/${STORM_ARCHIVE}" "${STORM_ARCHIVE_URL}" "${STORM_ARCHIVE_HTTP_URL}"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -lh "${TMP_DIR}/${STORM_ARCHIVE}"
          echo "Extracting Storm baseline..."
          if ! timeout 15m tar -xzf "${TMP_DIR}/${STORM_ARCHIVE}" -C "${TMP_DIR}"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STORM_EXTRACT_DIR=$(find "${TMP_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'apache-storm-*' | head -1)
          sudo rm -rf /opt/apache-storm /opt/apache-storm-${STORM_VERSION}
          sudo mv "${STORM_EXTRACT_DIR}" /opt/apache-storm-${STORM_VERSION}
          sudo ln -sfn /opt/apache-storm-${STORM_VERSION} /opt/apache-storm
          echo "/opt/apache-storm/bin" >> "$GITHUB_PATH"
          export PATH="/opt/apache-storm/bin:$PATH"
          if [ -x /opt/apache-storm/bin/storm ] && command -v storm >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Resolve Storm install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          ROOT="/opt/apache-storm"
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          if [ -x "$ROOT/bin/storm" ] && "$ROOT/bin/storm" version >/tmp/storm-resolve-version.txt 2>&1; then
            STATUS="success"
            BLOCKER=""
          fi
          echo "STORM_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "STORM_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "STORM_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"

      - name: Get Storm version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "version=${STORM_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest=${STORM_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(storm version 2>&1 | awk '/^Storm /{print $2; exit}')
          LATEST="${STORM_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if command -v storm >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if storm version 2>&1 | grep -q "Storm ${STORM_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if storm -h 2>&1 | grep -q '^usage: storm'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${STORM_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STORM_PORT=$(storm localconfvalue storm.zookeeper.port 2>/tmp/storm-port.txt | awk -F': ' 'NF{print $NF}' | tail -1 | tr -d '\r')
          if [ "$STORM_PORT" = "2181" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/storm-port.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${STORM_VERSION}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          INSTALL_STATUS="${{ steps.install_state.outputs.install_status || 'failed' }}"
          CORE_FAILURES=0
          for conclusion in \
            "${{ steps.test1.conclusion || 'skipped' }}" \
            "${{ steps.test2.conclusion || 'skipped' }}" \
            "${{ steps.test3.conclusion || 'skipped' }}" \
            "${{ steps.test4.conclusion || 'skipped' }}" \
            "${{ steps.test5.conclusion || 'skipped' }}"; do
            if [ "$conclusion" = "failure" ]; then
              CORE_FAILURES=$((CORE_FAILURES + 1))
            fi
          done
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "$INSTALL_STATUS" != "success" ] || [ "$CORE_FAILURES" -gt 0 ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Storm version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Regression validation deferred because baseline install or core smoke checks failed"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Storm version ${CURRENT} passed smoke tests in this run, but the latest archived Apache Storm release could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          NEXT_ARCHIVE="${TMP_DIR}/apache-storm-${LATEST}.tar.gz"
          NEXT_ARCHIVE_URL="https://archive.apache.org/dist/storm/apache-storm-${LATEST}/apache-storm-${LATEST}.tar.gz"
          NEXT_ARCHIVE_HTTP_URL="http://archive.apache.org/dist/storm/apache-storm-${LATEST}/apache-storm-${LATEST}.tar.gz"
          cleanup() {
            rm -rf "$TMP_DIR"
          }
          trap cleanup EXIT
          download_storm_tarball() {
            local dest="$1"
            shift
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=4 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=600 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "${GITHUB_WORKSPACE}/.github/scripts/download-with-fallback.sh" "$dest" "${urls[@]}"
          }

          echo "Downloading Storm candidate ${LATEST}"
          if ! download_storm_tarball "$NEXT_ARCHIVE" "$NEXT_ARCHIVE_URL" "$NEXT_ARCHIVE_HTTP_URL"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Storm version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from the Apache archive on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ls -lh "$NEXT_ARCHIVE"
          echo "Extracting Storm candidate..."
          timeout 15m tar -xzf "$NEXT_ARCHIVE" -C "$TMP_DIR"
          NEXT_DIR="${TMP_DIR}/apache-storm-${LATEST}"
          export PATH="${NEXT_DIR}/bin:$PATH"
          NEXT_VERSION=$(storm version 2>&1 | awk '/^Storm /{print $2; exit}' || true)
          NEXT_PORT=$(storm localconfvalue storm.zookeeper.port 2>/tmp/storm-next-conf.txt | awk -F': ' 'NF{print $NF}' | tail -1 | tr -d '\r' || true)

          if [ "$NEXT_VERSION" = "$LATEST" ] && \
             storm -h >/tmp/storm-next-help.txt 2>&1 && \
             [ "$NEXT_PORT" = "2181" ]; then
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Storm version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} from the official Apache archive, and the isolated candidate environment completed the real version, help, and local configuration lookup paths on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
          else
            cat /tmp/storm-next-help.txt || true
            cat /tmp/storm-next-conf.txt || true
            echo "next_installed_version=${NEXT_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Storm version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected archive-based validation path on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Storm"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Test 1 - Check storm binary exists"
          test2_label: "Test 2 - Check storm version command"
          test3_label: "Test 3 - Check storm help output"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
