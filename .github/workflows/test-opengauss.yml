name: Test OpenGauss on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/opengauss.md"
      - ".github/workflows/test-opengauss.yml"

jobs:
  test-opengauss:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      OPENGAUSS_VERSION: "7.0.0-RC2.B014"
      OPENGAUSS_NEXT_VERSION: "7.0.0-RC2.B015"
      OPENGAUSS_IMAGE_REPO: "opengauss/opengauss"
      OPENGAUSS_PASSWORD: "OpenGauss#2026!"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=opengauss" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/opengauss" >> "$GITHUB_OUTPUT"
          echo "current_version=${OPENGAUSS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install OpenGauss baseline container
        id: install
        run: |
          set -euo pipefail
          sudo systemctl start docker || true
          sudo docker version >/dev/null

          IMAGE="${OPENGAUSS_IMAGE_REPO}:${OPENGAUSS_VERSION}"
          CONTAINER="opengauss-baseline-${GITHUB_RUN_ID}"
          sudo docker rm -f "$CONTAINER" >/dev/null 2>&1 || true

          timeout 10m sudo docker pull "$IMAGE"
          sudo docker run -d --name "$CONTAINER" \
            --privileged=true \
            -e GS_PASSWORD="${OPENGAUSS_PASSWORD}" \
            "$IMAGE" >/tmp/opengauss-container-id.txt

          READY=0
          for _ in $(seq 1 60); do
            if sudo docker exec "$CONTAINER" su - omm -c "gsql -d postgres -r -c 'select version();'" >/tmp/opengauss-baseline-version.txt 2>&1; then
              READY=1
              break
            fi
            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            sudo docker logs "$CONTAINER" || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          IMAGE_ARCH=$(sudo docker image inspect "$IMAGE" --format '{{.Architecture}}')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "container_name=$CONTAINER" >> "$GITHUB_OUTPUT"
          echo "image_arch=$IMAGE_ARCH" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OpenGauss image tag
        id: version
        run: |
          set -euo pipefail
          echo "version=${OPENGAUSS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${OPENGAUSS_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected OpenGauss image tag: ${OPENGAUSS_VERSION}"

      - name: Test 1 - Check baseline client tooling
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTAINER="${{ steps.install.outputs.container_name }}"
          if sudo docker exec "$CONTAINER" su - omm -c "command -v gsql >/dev/null"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check SQL version query
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTAINER="${{ steps.install.outputs.container_name }}"
          sudo docker exec "$CONTAINER" su - omm -c "gsql -d postgres -r -c 'select version();'" >/tmp/opengauss-version-query.txt 2>&1
          if grep -qi 'openGauss' /tmp/opengauss-version-query.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opengauss-version-query.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check gsql help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTAINER="${{ steps.install.outputs.container_name }}"
          sudo docker exec "$CONTAINER" su - omm -c "gsql --help" >/tmp/opengauss-help.txt 2>&1
          if grep -Eqi 'usage|gsql' /tmp/opengauss-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opengauss-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && [ "${{ steps.install.outputs.image_arch }}" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Host architecture: $(uname -m)"
            echo "Image architecture: ${{ steps.install.outputs.image_arch }}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional database validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTAINER="${{ steps.install.outputs.container_name }}"
          sudo docker exec "$CONTAINER" su - omm -c "gsql -d postgres -r -c 'select 1;'" >/tmp/opengauss-smoke.txt 2>&1
          if grep -Eq '(^|[^0-9])1([^0-9]|$)' /tmp/opengauss-smoke.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opengauss-smoke.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          LATEST="${OPENGAUSS_NEXT_VERSION}"
          NEXT_IMAGE="${OPENGAUSS_IMAGE_REPO}:${LATEST}"
          NEXT_CONTAINER="opengauss-next-${GITHUB_RUN_ID}"

          cleanup() {
            sudo docker rm -f "$NEXT_CONTAINER" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Official Public Arm64 Image) ==="
          echo "Current image tag tested in Tests 1-5: $CURRENT"
          echo "Next image tag targeted for validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_validated_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the next official public Arm64 image tag" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the newest public OpenGauss Arm64 image tag used by this workflow. Repin Tests 1-5 to an older tag so Test 6 validates a real Arm64 upgrade step." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          timeout 10m sudo docker pull "$NEXT_IMAGE"
          sudo docker run -d --name "$NEXT_CONTAINER" \
            --privileged=true \
            -e GS_PASSWORD="${OPENGAUSS_PASSWORD}" \
            "$NEXT_IMAGE" >/tmp/opengauss-next-container-id.txt

          READY=0
          for _ in $(seq 1 60); do
            if sudo docker exec "$NEXT_CONTAINER" su - omm -c "gsql -d postgres -r -c 'select version();'" >/tmp/opengauss-next-version.txt 2>&1; then
              READY=1
              break
            fi
            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            sudo docker logs "$NEXT_CONTAINER" || true
            echo "next_validated_version=not_validated" >> "$GITHUB_OUTPUT"
            echo "decision=next_image_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next official public Arm64 image validation failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenGauss image tag ${CURRENT} completed the real Arm64 container validation path in this run, but candidate image tag ${LATEST} did not reach a ready state on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_ARCH=$(sudo docker image inspect "$NEXT_IMAGE" --format '{{.Architecture}}')
          sudo docker exec "$NEXT_CONTAINER" su - omm -c "gsql --help" >/tmp/opengauss-next-help.txt 2>&1
          sudo docker exec "$NEXT_CONTAINER" su - omm -c "gsql -d postgres -r -c 'select 1;'" >/tmp/opengauss-next-smoke.txt 2>&1

          if [ "$NEXT_ARCH" = "arm64" ] && \
             grep -qi 'openGauss' /tmp/opengauss-next-version.txt && \
             grep -Eqi 'usage|gsql' /tmp/opengauss-next-help.txt && \
             grep -Eq '(^|[^0-9])1([^0-9]|$)' /tmp/opengauss-next-smoke.txt; then
            echo "next_validated_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "decision=next_image_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next official public Arm64 image validated successfully" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenGauss image tag ${CURRENT} completed the real Arm64 container validation path in this run. Regression validation pulled candidate tag ${LATEST}, verified the Arm64 image architecture, and confirmed SQL client and query functionality inside the container." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opengauss-next-version.txt || true
            cat /tmp/opengauss-next-help.txt || true
            cat /tmp/opengauss-next-smoke.txt || true
            echo "next_validated_version=not_validated" >> "$GITHUB_OUTPUT"
            echo "decision=next_image_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next official public Arm64 image validation failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenGauss image tag ${CURRENT} completed the real Arm64 container validation path in this run, but candidate image tag ${LATEST} did not satisfy the expected SQL and image checks on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Cleanup OpenGauss containers
        if: always()
        run: |
          sudo docker rm -f "${{ steps.install.outputs.container_name || '' }}" >/dev/null 2>&1 || true
          sudo docker rm -f "opengauss-next-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Official Public Arm64 Image) ==="
          echo "Current image tag tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next image tag targeted for validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next image tag validated on Arm64: ${{ steps.test6.outputs.next_validated_version || 'not_validated' }}"
          echo "Regression validation result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" 2>/dev/null | head -n 1 || true)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/opengauss.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenGauss",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Database",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check baseline client tooling",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check SQL version query",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check gsql help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional database validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_validated_version": "${{ steps.test6.outputs.next_validated_version || 'not_validated' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opengauss-test-results
          path: test-results/opengauss.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## OpenGauss Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check baseline client tooling: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check SQL version query: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check gsql help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional database validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Official Public Arm64 Image)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current image tag tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next image tag targeted for validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next image tag validated on Arm64:** ${{ steps.test6.outputs.next_validated_version || 'not_validated' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression validation result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
