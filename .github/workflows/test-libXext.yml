name: Test LibXext on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/libXext.md'
      - '.github/workflows/test-libXext.yml'

jobs:
  test-libxext:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libXext" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libXext" >> "$GITHUB_OUTPUT"

      - name: Install LibXext
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libxext-dev
          test -f /usr/include/X11/extensions/shape.h
          pkg-config --exists xext
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get LibXext version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(pkg-config --modversion xext | head -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check header installation
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f /usr/include/X11/extensions/shape.h ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if pkg-config --modversion xext | grep -Eq '^[0-9]'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check pkg-config flags
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          FLAGS=$(pkg-config --cflags --libs xext)
          if echo "$FLAGS" | grep -q 'Xext'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > /tmp/libxext-test.c <<'C'
          #include <X11/extensions/shape.h>
          #include <stdio.h>
          int main(void) {
            printf("xext-ok:%d\n", ShapeBounding);
            return 0;
          }
          C
          cc /tmp/libxext-test.c $(pkg-config --cflags --libs xext) -o /tmp/libxext-test
          if /tmp/libxext-test | grep -q '^xext-ok:'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/libXext.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "LibXext",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Library"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check header installation", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version metadata", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check pkg-config flags", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libXext-test-results
          path: test-results/libXext.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## LibXext Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check header installation: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version metadata: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check pkg-config flags: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
