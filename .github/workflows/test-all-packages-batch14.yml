name: Test All Packages (Batch 14) on Arm64

on:
  workflow_dispatch:
  workflow_call:
jobs:
  test-musl:
    uses: ./.github/workflows/test-musl.yml
  
  test-igniteui:
    uses: ./.github/workflows/test-igniteui.yml
  
  test-guacamole:
