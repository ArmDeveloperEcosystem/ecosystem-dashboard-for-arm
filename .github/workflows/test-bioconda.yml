name: Test Bioconda on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-bioconda.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-bioconda.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-bioconda.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-bioconda.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-bioconda.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-bioconda.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-bioconda.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-bioconda.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-bioconda.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-bioconda.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-bioconda.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-bioconda.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-bioconda.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-bioconda.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-bioconda.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-bioconda.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-bioconda.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-bioconda.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-bioconda.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-bioconda.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-bioconda.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-bioconda.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-bioconda.outputs.timestamp }}
jobs:
  test-bioconda:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      BASELINE_RELEASE: "24.11.3-0"
      NEXT_RELEASE: "24.11.3-1"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Bioconda'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=bioconda" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/bioconda" >> "$GITHUB_OUTPUT"
      - name: Install Miniforge (Conda)
        id: install
        run: |
          set -euo pipefail
          echo "Installing Miniforge (Conda)..."
          sudo apt-get update
          sudo apt-get install -y curl

          URL="https://github.com/conda-forge/miniforge/releases/download/${BASELINE_RELEASE}/Miniforge3-${BASELINE_RELEASE}-Linux-aarch64.sh"

          curl -fsSL "$URL" -o miniforge.sh
          bash miniforge.sh -b -p "$HOME/miniforge"
          echo "$HOME/miniforge/bin" >> "$GITHUB_PATH"
          echo "baseline_release=$BASELINE_RELEASE" >> "$GITHUB_OUTPUT"

          "$HOME/miniforge/bin/conda" config --add channels defaults
          "$HOME/miniforge/bin/conda" config --add channels bioconda
          "$HOME/miniforge/bin/conda" config --add channels conda-forge
          
          if [ -x "$HOME/miniforge/bin/conda" ]; then
             echo "Conda installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Conda installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Conda version
        id: version
        run: |
          VERSION=$("$HOME/miniforge/bin/conda" --version 2>&1 | awk '{print $2}' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Conda version: $VERSION"
      
      - name: Test 1 - Check Conda Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          if command -v conda &> /dev/null; then
            echo "✓ conda binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ conda binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Channels
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          CHANNELS=$(conda config --show channels)
          echo "Configured channels:"
          echo "$CHANNELS"
          
          if echo "$CHANNELS" | grep -q "bioconda"; then
            echo "✓ bioconda channel is configured"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ bioconda channel missing"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Install Simple Bioconda Package
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          # Install 'seqtk' - a lightweight tool often used in bioinformatics
          echo "Installing seqtk from bioconda..."
          if conda install -y seqtk; then
             echo "✓ seqtk installed successfully"
             
             # Verify it runs
             if seqtk 2>&1 | grep -q "Usage"; then
                echo "✓ seqtk runs correctly"
                echo "status=passed" >> $GITHUB_OUTPUT
            else
                echo "✗ seqtk installed but failed to run"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
            fi
          else
             echo "✗ Failed to install seqtk from bioconda"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate

          # Bioconda is a channel, not a binary. 
          # We validate that we can find a package exclusive to or typical of bioconda.
          # We already installed seqtk, so let's verify we can find another one without installing, 
          # e.g., 'samtools', to prove the channel selection works.
          
          echo "Searching for samtools in enabled channels..."
          if conda search samtools --override-channels -c bioconda > /dev/null 2>&1; then
            echo "✓ Successfully searched bioconda channel"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Failed to search bioconda channel"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Conda Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Channels
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Install Simple Bioconda Package
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |

          echo "## Bioconda Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Conda Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Channels: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Install Simple Bioconda Package: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression applicability: package-manager installed (not applicable)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Support badge is based on Tests 1-5:** yes" >> $GITHUB_STEP_SUMMARY
