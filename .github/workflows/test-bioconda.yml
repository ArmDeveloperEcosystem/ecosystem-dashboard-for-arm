name: Test Bioconda on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-bioconda.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-bioconda.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-bioconda.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-bioconda.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-bioconda.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-bioconda.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-bioconda.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-bioconda.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-bioconda.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-bioconda.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-bioconda.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-bioconda.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-bioconda.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-bioconda.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-bioconda.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-bioconda.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-bioconda.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-bioconda.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-bioconda.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-bioconda.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-bioconda.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-bioconda.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-bioconda.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/bioconda.md'
      - '.github/workflows/test-bioconda.yml'

jobs:
  test-bioconda:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      BASELINE_RELEASE: "24.11.3-0"
      NEXT_RELEASE: "24.11.3-1"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Bioconda'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=bioconda" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/bioconda" >> "$GITHUB_OUTPUT"
      - name: Install Miniforge (Conda)
        id: install
        run: |
          set -euo pipefail
          echo "Installing Miniforge (Conda)..."
          sudo apt-get update
          sudo apt-get install -y curl

          URL="https://github.com/conda-forge/miniforge/releases/download/${BASELINE_RELEASE}/Miniforge3-${BASELINE_RELEASE}-Linux-aarch64.sh"

          curl -fsSL "$URL" -o miniforge.sh
          bash miniforge.sh -b -p "$HOME/miniforge"
          echo "$HOME/miniforge/bin" >> "$GITHUB_PATH"
          echo "baseline_release=$BASELINE_RELEASE" >> "$GITHUB_OUTPUT"

          "$HOME/miniforge/bin/conda" config --add channels defaults
          "$HOME/miniforge/bin/conda" config --add channels bioconda
          "$HOME/miniforge/bin/conda" config --add channels conda-forge
          
          if [ -x "$HOME/miniforge/bin/conda" ]; then
             echo "Conda installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Conda installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Conda version
        id: version
        run: |
          VERSION=$("$HOME/miniforge/bin/conda" --version 2>&1 | awk '{print $2}' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Conda version: $VERSION"
      
      - name: Test 1 - Check Conda Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          if command -v conda &> /dev/null; then
            echo "✓ conda binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ conda binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Channels
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          CHANNELS=$(conda config --show channels)
          echo "Configured channels:"
          echo "$CHANNELS"
          
          if echo "$CHANNELS" | grep -q "bioconda"; then
            echo "✓ bioconda channel is configured"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ bioconda channel missing"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Install Simple Bioconda Package
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate
          
          # Install 'seqtk' - a lightweight tool often used in bioinformatics
          echo "Installing seqtk from bioconda..."
          if conda install -y seqtk; then
             echo "✓ seqtk installed successfully"
             
             # Verify it runs
             if seqtk 2>&1 | grep -q "Usage"; then
                echo "✓ seqtk runs correctly"
                echo "status=passed" >> $GITHUB_OUTPUT
            else
                echo "✗ seqtk installed but failed to run"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
            fi
          else
             echo "✗ Failed to install seqtk from bioconda"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          source $HOME/miniforge/bin/activate

          # Bioconda is a channel, not a binary. 
          # We validate that we can find a package exclusive to or typical of bioconda.
          # We already installed seqtk, so let's verify we can find another one without installing, 
          # e.g., 'samtools', to prove the channel selection works.
          
          echo "Searching for samtools in enabled channels..."
          if conda search samtools --override-channels -c bioconda > /dev/null 2>&1; then
            echo "✓ Successfully searched bioconda channel"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Failed to search bioconda channel"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || 'unknown' }}"
          BASELINE_RELEASE="${{ steps.install.outputs.baseline_release }}"
          NEXT_RELEASE_VALUE="${NEXT_RELEASE}"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_RELEASE_VALUE:-unknown}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT_VERSION"
          echo "Next version targeted for install validation: ${NEXT_RELEASE_VALUE:-unknown}"

          if [ -z "$NEXT_RELEASE_VALUE" ]; then
            echo "next_installed_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Dashboard metadata review required before Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run, but the configured Test 6 candidate release is missing. Review the dashboard-aligned baseline/candidate pair." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT_VERSION"
            echo "Regression install result: Dashboard metadata review required before Test 6"
            echo "Details: Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run, but the configured Test 6 candidate release is missing. The installed conda binary reports version ${CURRENT_VERSION}."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            NEXT_URL="https://github.com/conda-forge/miniforge/releases/download/${NEXT_RELEASE_VALUE}/Miniforge3-${NEXT_RELEASE_VALUE}-Linux-aarch64.sh"
            curl -fsSL "$NEXT_URL" -o Miniforge-next.sh
            bash Miniforge-next.sh -b -p "$RUNNER_TEMP/miniforge-next"
            "$RUNNER_TEMP/miniforge-next/bin/conda" config --add channels defaults
            "$RUNNER_TEMP/miniforge-next/bin/conda" config --add channels bioconda
            "$RUNNER_TEMP/miniforge-next/bin/conda" config --add channels conda-forge
            "$RUNNER_TEMP/miniforge-next/bin/conda" search seqtk --override-channels -c bioconda > next-search.log
            NEXT_CONDA_VERSION=$("$RUNNER_TEMP/miniforge-next/bin/conda" --version 2>&1 | awk '{print $2}' || true)

            if [ -n "$NEXT_CONDA_VERSION" ]; then
              echo "next_installed_version=$NEXT_CONDA_VERSION" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run. Regression validation installed candidate release ${NEXT_RELEASE_VALUE} on Arm64, configured the Bioconda channel, and the installed conda binary reported version ${NEXT_CONDA_VERSION}." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_CONDA_VERSION"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run. Regression validation installed candidate release ${NEXT_RELEASE_VALUE} on Arm64, configured the Bioconda channel, and the installed conda binary reported version ${NEXT_CONDA_VERSION}."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat next-search.log || true
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run, but candidate release ${NEXT_RELEASE_VALUE} did not produce a usable Arm64 Bioconda-capable conda install." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Miniforge release ${BASELINE_RELEASE} passed smoke tests in this run, but candidate release ${NEXT_RELEASE_VALUE} did not produce a usable Arm64 Bioconda-capable conda install."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Conda Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Channels
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Install Simple Bioconda Package
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression comparison summary unavailable.' }}"

          echo "## Bioconda Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Conda Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Channels: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Install Simple Bioconda Package: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Support badge is based on Tests 1-5:** yes" >> $GITHUB_STEP_SUMMARY
