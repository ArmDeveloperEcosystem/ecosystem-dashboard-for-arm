name: Test GitLab on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/gitlab.md"
      - ".github/workflows/test-gitlab.yml"

jobs:
  test-gitlab:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gitlab" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gitlab" >> "$GITHUB_OUTPUT"

      - name: Install GitLab
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl openssh-server ca-certificates perl

          curl -fsSL https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh | sudo bash >/tmp/gitlab-repo.log 2>&1

          CURRENT_VERSION="18.9.2-ce.0"
          if ! sudo EXTERNAL_URL="http://gitlab.example.com" DEBIAN_FRONTEND=noninteractive apt-get install -y "gitlab-ce=${CURRENT_VERSION}" >/tmp/gitlab-install.log 2>&1; then
            cat /tmp/gitlab-install.log || true
            apt-cache madison gitlab-ce || true
            exit 1
          fi

          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get GitLab version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg -s gitlab-ce | grep '^Version:' | awk '{print $2}' || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected GitLab version: $VERSION"

      - name: Test 1 - Check gitlab-ctl binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v gitlab-ctl >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check installed GitLab package version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_version }}"
          REPORTED="${{ steps.version.outputs.version }}"
          if [ "$REPORTED" = "$EXPECTED" ] && dpkg -s gitlab-ce | grep -q "Status: install ok installed"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            dpkg -s gitlab-ce || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check gitlab-rake binary exists
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v gitlab-rake >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check gitlab-rails binary exists
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v gitlab-rails >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check gitlab-ctl help, config file, and Arm64 runtime
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if gitlab-ctl help >/tmp/gitlab-ctl-help.log 2>&1 \
            && grep -q "reconfigure" /tmp/gitlab-ctl-help.log \
            && [ -f /etc/gitlab/gitlab.rb ] \
            && [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/gitlab-ctl-help.log || true
            ls -l /etc/gitlab/gitlab.rb || true
            uname -m || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST=$(apt-cache madison gitlab-ce | awk '{print $3}' | head -n 1 || true)

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the latest stable Arm64 package version could not be resolved from the official package repository." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the latest stable Arm64 package version could not be resolved from the official package repository."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned GitLab version ${CURRENT} passed smoke tests in this run and is already the latest stable Arm64 package version published in the official GitLab CE repository."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          cd "$NEXT_DIR"
          if apt-get download "gitlab-ce=${LATEST}" >/tmp/gitlab-next-download.log 2>&1; then
            NEXT_DEB=$(find "$NEXT_DIR" -maxdepth 1 -name 'gitlab-ce_*.deb' | head -n 1)
            NEXT_REPORTED=$(dpkg-deb -f "$NEXT_DEB" Version 2>/dev/null || true)
            mkdir -p "$NEXT_DIR/rootfs"
            dpkg-deb -x "$NEXT_DEB" "$NEXT_DIR/rootfs"
            if [ "$NEXT_REPORTED" = "$LATEST" ] \
              && [ -f "$NEXT_DIR/rootfs/opt/gitlab/bin/gitlab-ctl" ] \
              && [ -f "$NEXT_DIR/rootfs/opt/gitlab/bin/gitlab-rake" ] \
              && [ -f "$NEXT_DIR/rootfs/opt/gitlab/bin/gitlab-rails" ] \
              && [ -f "$NEXT_DIR/rootfs/opt/gitlab/version-manifest.txt" ]; then
              echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned GitLab version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate package version ${LATEST}, and the extracted Arm64 payload exposed the expected GitLab control, rake, rails, and version-manifest files." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_REPORTED"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned GitLab version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate package version ${LATEST}, and the extracted Arm64 payload exposed the expected GitLab control, rake, rails, and version-manifest files."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              dpkg-deb -I "$NEXT_DEB" || true
              find "$NEXT_DIR/rootfs/opt/gitlab" -maxdepth 2 -type f | head -n 20 || true
              echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the candidate package ${LATEST} did not unpack into the expected GitLab payload layout on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the candidate package ${LATEST} did not unpack into the expected GitLab payload layout on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            cat /tmp/gitlab-next-download.log || true
            echo "next_installed_version=download_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the candidate package ${LATEST} could not be downloaded from the official GitLab CE repository on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: download_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned GitLab version ${CURRENT} passed smoke tests in this run, but the candidate package ${LATEST} could not be downloaded from the official GitLab CE repository on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/gitlab.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "GitLab",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Ruby",
              "category": "DevOps"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check gitlab-ctl binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check installed GitLab package version",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check gitlab-rake binary exists",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check gitlab-rails binary exists",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Check gitlab-ctl help, config file, and Arm64 runtime",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitlab-test-results
          path: test-results/gitlab.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## GitLab Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check gitlab-ctl binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check installed GitLab package version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check gitlab-rake binary exists: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check gitlab-rails binary exists: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check gitlab-ctl help, config file, and Arm64 runtime: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
