name: Test Dubbo-java on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-dubbo-java.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-dubbo-java.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-dubbo-java.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-dubbo-java.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-dubbo-java.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-dubbo-java.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-dubbo-java.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-dubbo-java.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-dubbo-java.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-dubbo-java.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-dubbo-java.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-dubbo-java.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-dubbo-java.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-dubbo-java.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-dubbo-java.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-dubbo-java.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-dubbo-java.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-dubbo-java.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-dubbo-java.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-dubbo-java.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-dubbo-java.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-dubbo-java.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-dubbo-java.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/dubbo-java.md"
      - ".github/workflows/test-dubbo-java.yml"

jobs:
  test-dubbo-java:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: dubbo-3.2.17
      NEXT_VERSION: dubbo-3.2.18
      DUBBO_REPO: https://github.com/apache/dubbo.git

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Dubbo-java'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=dubbo-java" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/dubbo-java" >> "$GITHUB_OUTPUT"
      - name: Install baseline Dubbo-java
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git maven openjdk-11-jdk

          rm -rf dubbo
          git clone --depth 1 --branch "${BASELINE_VERSION}" "${DUBBO_REPO}" dubbo
          mvn -q -f dubbo/pom.xml -pl dubbo-common -am -DskipTests -Dcheckstyle.skip=true -Drat.skip=true -Dspotbugs.skip=true package

          if ls dubbo/dubbo-common/target/dubbo-common-*.jar >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get pinned versions
        id: version
        run: |
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Dubbo-java baseline: ${BASELINE_VERSION}"
          echo "Detected Dubbo-java next version: ${NEXT_VERSION}"

      - name: Test 1 - Check pom.xml exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "dubbo/pom.xml" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check dubbo-common jar exists
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if ls dubbo/dubbo-common/target/dubbo-common-*.jar >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check dubbo-common classes
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          JAR_FILE=$(ls dubbo/dubbo-common/target/dubbo-common-*.jar | head -n 1)
          if jar tf "$JAR_FILE" | grep -q 'org/apache/dubbo/common/URL.class'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          JAR_FILE=$(ls dubbo/dubbo-common/target/dubbo-common-*.jar | head -n 1)
          cat > /tmp/TestDubbo.java <<'EOF'
          import org.apache.dubbo.common.URL;
          public class TestDubbo {
            public static void main(String[] args) {
              URL url = URL.valueOf("dubbo://127.0.0.1:20880/com.example.DemoService");
              System.out.println(url.getProtocol());
            }
          }
          EOF
          javac -cp "$JAR_FILE" /tmp/TestDubbo.java
          OUTPUT=$(java -cp "$JAR_FILE:/tmp" TestDubbo 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qx 'dubbo'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${NEXT_VERSION}"
          NEXT_DIR=$(mktemp -d)
          trap 'rm -rf "$NEXT_DIR"' EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          git clone --depth 1 --branch "${NEXT_VERSION}" "${DUBBO_REPO}" "$NEXT_DIR/dubbo"
          mvn -q -f "$NEXT_DIR/dubbo/pom.xml" -pl dubbo-common -am -DskipTests -Dcheckstyle.skip=true -Drat.skip=true -Dspotbugs.skip=true package

          NEXT_JAR=$(ls "$NEXT_DIR"/dubbo/dubbo-common/target/dubbo-common-*.jar | head -n 1)
          cat > "$NEXT_DIR/TestDubboNext.java" <<'EOF'
          import org.apache.dubbo.common.URL;
          public class TestDubboNext {
            public static void main(String[] args) {
              URL url = URL.valueOf("dubbo://127.0.0.1:20880/com.example.DemoService");
              System.out.println(url.getProtocol());
            }
          }
          EOF

          javac -cp "$NEXT_JAR" "$NEXT_DIR/TestDubboNext.java"
          OUTPUT=$(java -cp "$NEXT_JAR:$NEXT_DIR" TestDubboNext 2>&1)
          echo "$OUTPUT"

          if jar tf "$NEXT_JAR" | grep -q 'org/apache/dubbo/common/URL.class' && \
             echo "$OUTPUT" | grep -qx 'dubbo'; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Dubbo-java baseline ${CURRENT} built dubbo-common successfully and passed a Java URL smoke test, and candidate ${LATEST} also built dubbo-common and passed the same smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Dubbo-java candidate ${LATEST} failed to preserve the expected dubbo-common build or Java smoke behavior on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_any "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Dubbo-java Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check pom.xml exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check dubbo-common jar exists: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check dubbo-common classes: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
