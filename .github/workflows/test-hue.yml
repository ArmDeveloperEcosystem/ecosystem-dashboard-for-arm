name: Test Hue on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-hue.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-hue.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-hue.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-hue.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-hue.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-hue.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-hue.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-hue.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-hue.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-hue.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-hue.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-hue.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-hue.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-hue.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-hue.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-hue.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-hue.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-hue.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-hue.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-hue.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-hue.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-hue.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-hue.outputs.timestamp }}
jobs:
  test-hue:
    runs-on: ubuntu-24.04-arm
    env:
      HUE_BASELINE_TAG: "release-4.10.0"
      HUE_BASELINE_VERSION: "4.10.0"
      HUE_NEXT_TAG: "release-4.11.0"
      HUE_NEXT_VERSION: "4.11.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Hue'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=hue" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/hue" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Hue preflight dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git python3 nodejs"
          quiet: "true"

      - name: Install Hue baseline source
        id: install
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${HUE_BASELINE_TAG}" https://github.com/cloudera/hue.git hue-src

          if [ -f "hue-src/Makefile" ] && [ -d "hue-src/desktop/conf" ] && [ -d "hue-src/tools/container/hue" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            echo "baseline_version=${HUE_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Hue version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(git -C hue-src describe --tags --exact-match | sed 's/^release-//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Hue version: $VERSION"

      - name: Test 1 - Check baseline source tree
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -f "hue-src/Makefile" ] && [ -d "hue-src/desktop/conf" ] && [ -d "hue-src/tools/container/hue" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check release tag version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPORTED=$(git -C hue-src describe --tags --exact-match | sed 's/^release-//')

          if [ "$REPORTED" = "${HUE_BASELINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${HUE_BASELINE_VERSION} but got ${REPORTED:-unknown}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check build and container assets
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if grep -q '^apps:' hue-src/Makefile && [ -f "hue-src/tools/container/build.sh" ] && [ -f "hue-src/tools/container/hue/hue.sh" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional source validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          bash -n hue-src/tools/container/build.sh
          bash -n hue-src/tools/container/hue/hue.sh
          python3 -m compileall -q hue-src/tools/app_reg hue-src/apps/about/src/about hue-src/desktop/core/src/desktop/lib
          python3 - <<'PY'
          import json
          import pathlib
          import platform

          package = json.loads(pathlib.Path("hue-src/package.json").read_text(encoding="utf-8"))
          assert package.get("name") == "gethue", package.get("name")
          assert package.get("version") == "4.10.0", package.get("version")
          assert platform.machine() in ("aarch64", "arm64"), platform.machine()
          assert pathlib.Path("hue-src/desktop/conf.dist/hue.ini").exists()
          PY
          python3 hue-src/tools/app_reg/app_reg.py > /tmp/hue-app-reg.txt 2>&1 || true
          grep -Eiq 'Usage:|Hue applications|--install|--list' /tmp/hue-app-reg.txt

          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Compiled Hue Python app modules and exercised the Hue app registry CLI surface on the Arm64 runner." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST_VERSION="${HUE_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST_VERSION"

          rm -rf hue-next-src
          git clone --filter=blob:none --depth 1 --branch "${HUE_NEXT_TAG}" https://github.com/cloudera/hue.git hue-next-src
          python3 -m compileall -q hue-next-src/tools/app_reg hue-next-src/apps/about/src/about hue-next-src/desktop/core/src/desktop/lib
          python3 - <<'PY'
          import json
          import pathlib
          import platform

          package = json.loads(pathlib.Path("hue-next-src/package.json").read_text(encoding="utf-8"))
          assert package.get("name") == "gethue", package.get("name")
          assert platform.machine() in ("aarch64", "arm64"), platform.machine()
          assert pathlib.Path("hue-next-src/desktop/conf.dist/hue.ini").exists()
          PY
          test "$(git -C hue-next-src describe --tags --exact-match)" = "${HUE_NEXT_TAG}"
          python3 hue-next-src/tools/app_reg/app_reg.py > /tmp/hue-next-app-reg.txt 2>&1 || true
          grep -Eiq 'Usage:|Hue applications|--install|--list' /tmp/hue-next-app-reg.txt

          echo "next_installed_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "decision=limited_cpu_smoke_validated" >> "$GITHUB_OUTPUT"
          echo "regression_result=Arm preflight proof passed on Arm64" >> "$GITHUB_OUTPUT"
          echo "comparison=Hue candidate ${LATEST_VERSION} cloned successfully on Arm64, compiled package-specific Python app modules, and exercised the Hue app registry CLI surface. This is a bounded Hue preflight, not a full Hadoop-backed deployment." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression validation failed' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Hue Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression Result:** ${{ steps.test6.outputs.regression_result || 'Regression validation failed' }}" >> "$GITHUB_STEP_SUMMARY"
