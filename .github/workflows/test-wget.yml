name: Test Wget on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-wget.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-wget.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-wget.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-wget.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-wget.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-wget.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-wget.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-wget.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-wget.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-wget.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-wget.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-wget.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-wget.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-wget.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-wget.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-wget.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-wget.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-wget.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-wget.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-wget.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-wget.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-wget.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-wget.outputs.timestamp }}
jobs:
  test-wget:
    runs-on: ubuntu-24.04-arm
    env:
      WGET_VERSION: "1.24.5"
      WGET_NEXT_VERSION: "1.25.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Wget'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=wget" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/wget" >> "$GITHUB_OUTPUT"
          echo "current_version=${WGET_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Wget build dependencies and baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ca-certificates curl libgnutls28-dev libidn2-dev libpsl-dev pkg-config python3 zlib1g-dev

          rm -rf /tmp/wget-baseline
          DOWNLOAD_OK=false
          for URL in \
            "https://ftp.gnu.org/gnu/wget/wget-${WGET_VERSION}.tar.gz" \
            "https://mirrors.kernel.org/gnu/wget/wget-${WGET_VERSION}.tar.gz"
          do
            if curl --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 20 --max-time 600 -fsSL "$URL" -o /tmp/wget-baseline.tar.gz; then
              DOWNLOAD_OK=true
              break
            fi
            echo "⚠️ Baseline download failed from $URL; trying next mirror..." >&2
          done
          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          tar -xzf /tmp/wget-baseline.tar.gz -C /tmp
          cd "/tmp/wget-${WGET_VERSION}"
          ./configure --disable-nls --with-ssl=gnutls >/tmp/wget-configure.log 2>&1
          make -j"$(nproc)" >/tmp/wget-make.log 2>&1
          sudo install -m 0755 src/wget /usr/local/bin/wget

          if command -v wget >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Wget version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(wget --version | awk '/GNU Wget/ {print $3; exit}')
          LATEST="${WGET_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Wget binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v wget >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if wget --version | grep -q "GNU Wget ${WGET_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            wget --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if wget --help 2>&1 | grep -q '^GNU Wget'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "$(command -v wget)" | grep -Eqi 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TMPDIR=$(mktemp -d)
          cleanup() {
            [ -n "${SERVER_PID:-}" ] && kill "${SERVER_PID}" >/dev/null 2>&1 || true
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          printf 'wget-baseline-ok\n' > "$TMPDIR/payload.txt"
          python3 -m http.server 18081 --directory "$TMPDIR" >/tmp/wget-server.log 2>&1 &
          SERVER_PID=$!
          sleep 1
          wget -qO- "http://127.0.0.1:18081/payload.txt" > "$TMPDIR/output.txt"

          if grep -q '^wget-baseline-ok$' "$TMPDIR/output.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$TMPDIR/output.txt" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${WGET_VERSION}"
          LATEST="${{ steps.version.outputs.latest || '' }}"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-lookup_failed}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST:-lookup_failed}"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, but the latest stable GNU Wget release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, but the latest stable GNU Wget release could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            [ -n "${SERVER_PID:-}" ] && kill "${SERVER_PID}" >/dev/null 2>&1 || true
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          NEXT_DOWNLOAD_OK=false
          for URL in \
            "https://ftp.gnu.org/gnu/wget/wget-${LATEST}.tar.gz" \
            "https://mirrors.kernel.org/gnu/wget/wget-${LATEST}.tar.gz"
          do
            if curl --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 20 --max-time 600 -fsSL "$URL" -o "$TMPDIR/wget-next.tar.gz"; then
              NEXT_DOWNLOAD_OK=true
              break
            fi
            echo "⚠️ Candidate download failed from $URL; trying next mirror..." >&2
          done
          if [ "$NEXT_DOWNLOAD_OK" != "true" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, but the candidate ${LATEST} source tarball could not be downloaded reliably on Arm64 from the tested mirrors." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          tar -xzf "$TMPDIR/wget-next.tar.gz" -C "$TMPDIR"
          cd "$TMPDIR/wget-${LATEST}"
          ./configure --disable-nls --with-ssl=gnutls >/tmp/wget-next-configure.log 2>&1
          make -j"$(nproc)" >/tmp/wget-next-make.log 2>&1
          NEXT_BIN="$TMPDIR/wget-${LATEST}/src/wget"
          NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version | awk '/GNU Wget/ {print $3; exit}')

          printf 'wget-candidate-ok\n' > "$TMPDIR/payload.txt"
          python3 -m http.server 18082 --directory "$TMPDIR" >/tmp/wget-next-server.log 2>&1 &
          SERVER_PID=$!
          sleep 1
          "$NEXT_BIN" -qO- "http://127.0.0.1:18082/payload.txt" > "$TMPDIR/output.txt"

          if [ "$NEXT_INSTALLED_VERSION" != "$LATEST" ] || ! grep -q '^wget-candidate-ok$' "$TMPDIR/output.txt"; then
            cat /tmp/wget-next-configure.log || true
            cat /tmp/wget-next-make.log || true
            cat "$TMPDIR/output.txt" || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, but the candidate ${LATEST} build or download validation failed on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, but the candidate ${LATEST} build or download validation failed on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Baseline Wget ${CURRENT} already matches the latest GNU Wget release, and the isolated Arm64 rebuild plus download smoke both passed in this run."
            STATUS="failed"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, and candidate ${LATEST} also built and completed the real local download smoke successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Baseline Wget ${CURRENT} passed the Arm64 source-build and download smoke in this run, and candidate ${LATEST} also built and completed the real local download smoke successfully."
            STATUS="passed"
          fi

          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          add_any "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Wget Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.WGET_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.WGET_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
