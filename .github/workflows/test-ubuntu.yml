name: Test Ubuntu Server on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/ubuntu.md'
      - '.github/workflows/test-ubuntu.yml'

jobs:
  test-ubuntu:
    runs-on: ubuntu-24.04-arm
    env:
      UBUNTU_BASELINE_TAG: "24.04"
      UBUNTU_NEXT_TAG: "25.10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ubuntu" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ubuntu" >> "$GITHUB_OUTPUT"

      - name: Pull Ubuntu container image
        id: install
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

          BASELINE_TAG="${UBUNTU_BASELINE_TAG}"
          sudo docker pull "docker.io/library/ubuntu:${BASELINE_TAG}"

          echo "baseline_tag=${BASELINE_TAG}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Ubuntu version
        id: version
        run: |
          set -euo pipefail
          UBUNTU_TAG="${{ steps.install.outputs.baseline_tag }}"
          VERSION=$(sudo docker run --rm "docker.io/library/ubuntu:${UBUNTU_TAG}" sh -lc '. /etc/os-release && printf "%s" "${VERSION_ID:-unknown}"')
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "latest=${UBUNTU_NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected Ubuntu version: ${VERSION:-unknown}"

      - name: Test 1 - Check image architecture
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(sudo docker inspect "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" --format '{{.Architecture}}')
          if [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check OS release file
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION=$(sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" sh -lc '. /etc/os-release && printf "%s" "${VERSION_ID:-unknown}"')
          if sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" sh -lc "grep -q 'Ubuntu' /etc/os-release" \
            && [ "$VERSION" = "${UBUNTU_BASELINE_TAG}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" cat /etc/os-release || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Install package with apt
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" sh -lc 'apt-get update >/tmp/pkg.log 2>&1 && DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates >/tmp/pkg.log 2>&1 && dpkg -s ca-certificates | grep -q "^Status: install ok installed"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" sh -lc 'cat /tmp/pkg.log 2>/dev/null || true' || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check architecture inside container
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH_INSIDE=$(sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" uname -m)
          if [ "$ARCH_INSIDE" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Simple command execution
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(sudo docker run --rm "docker.io/library/ubuntu:${{ steps.install.outputs.baseline_tag }}" echo "Hello Arm64")
          if [ "$OUTPUT" = "Hello Arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_tag || 'unknown' }}"
          LATEST="${UBUNTU_NEXT_TAG}"
          NEXT_INSTALLED="not_installed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          sudo docker pull "docker.io/library/ubuntu:${LATEST}"
          NEXT_INSTALLED=$(sudo docker run --rm "docker.io/library/ubuntu:${LATEST}" sh -lc '. /etc/os-release && printf "%s" "${VERSION_ID:-unknown}"')

          if sudo docker inspect "docker.io/library/ubuntu:${LATEST}" --format '{{.Architecture}}' | grep -qx 'arm64' \
            && [ "$NEXT_INSTALLED" = "${LATEST}" ] \
            && sudo docker run --rm "docker.io/library/ubuntu:${LATEST}" sh -lc "grep -q 'Ubuntu' /etc/os-release" \
            && sudo docker run --rm "docker.io/library/ubuntu:${LATEST}" sh -lc 'apt-get update >/tmp/pkg.log 2>&1 && DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates >/tmp/pkg.log 2>&1 && dpkg -s ca-certificates | grep -q "^Status: install ok installed"' \
            && [ "$(sudo docker run --rm "docker.io/library/ubuntu:${LATEST}" uname -m)" = "aarch64" ] \
            && [ "$(sudo docker run --rm "docker.io/library/ubuntu:${LATEST}" echo "Hello Arm64")" = "Hello Arm64" ]; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Ubuntu ${CURRENT} passed the Arm64 container smoke in this run, and candidate image tag ${LATEST} also pulled successfully, reported VERSION_ID ${NEXT_INSTALLED}, completed in-container apt smoke, and passed architecture plus command validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Baseline Ubuntu ${CURRENT} passed the Arm64 container smoke in this run, and candidate image tag ${LATEST} also pulled successfully, reported VERSION_ID ${NEXT_INSTALLED}, completed in-container apt smoke, and passed architecture plus command validation on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Ubuntu ${CURRENT} passed the Arm64 container smoke in this run, but candidate image tag ${LATEST} did not complete equivalent version, architecture, or in-container apt validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Ubuntu ${CURRENT} passed the Arm64 container smoke in this run, but candidate image tag ${LATEST} did not complete equivalent version, architecture, or in-container apt validation on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results

          cat > test-results/ubuntu.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Ubuntu Server",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Shell",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check image architecture", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check OS release file", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Install package with apt", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Check architecture inside container", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Simple command execution", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || env.UBUNTU_NEXT_TAG }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-test-results
          path: test-results/ubuntu.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          echo "## Ubuntu Server Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline tag:** ${{ steps.install.outputs.baseline_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check image architecture: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check OS release file: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Install package with apt: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Check architecture inside container: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Simple command execution: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Regression result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
