name: Test Google Benchmark on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-benchmark.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-benchmark.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-benchmark.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-benchmark.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-benchmark.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-benchmark.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-benchmark.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-benchmark.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-benchmark.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-benchmark.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-benchmark.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-benchmark.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-benchmark.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-benchmark.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-benchmark.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-benchmark.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-benchmark.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-benchmark.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-benchmark.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-benchmark.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-benchmark.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-benchmark.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-benchmark.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/benchmark.md'
      - '.github/workflows/test-benchmark.yml'

jobs:
  test-benchmark:
    runs-on: ubuntu-24.04-arm
    env:
      BENCHMARK_BASELINE_VERSION: "v1.9.3"
      BENCHMARK_NEXT_VERSION: "v1.9.4"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Google Benchmark'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=benchmark" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/benchmark" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git
      
      - name: Install Google Benchmark
        id: install
        run: |
          echo "Installing Google Benchmark..."
          
          git clone --branch "${BENCHMARK_BASELINE_VERSION}" --depth 1 https://github.com/google/benchmark.git
          
          cd benchmark
          cmake -E make_directory "build"
          cmake -E chdir "build" cmake -DBENCHMARK_DOWNLOAD_DEPENDENCIES=on -DCMAKE_BUILD_TYPE=Release ../
          cmake --build "build" --config Release
          sudo cmake --build "build" --config Release --target install
          
          if [ -f "/usr/local/lib/libbenchmark.a" ] || [ -f "/usr/local/lib/libbenchmark.so" ]; then
             echo "Google Benchmark installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Google Benchmark installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Benchmark version
        id: version
        run: |
          echo "version=${BENCHMARK_BASELINE_VERSION#v}" >> $GITHUB_OUTPUT
          echo "Detected Benchmark version: ${BENCHMARK_BASELINE_VERSION#v}"
      
      - name: Test 1 - Check Headers
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "/usr/local/include/benchmark/benchmark.h" ]; then
            echo "✓ benchmark.h found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ benchmark.h not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Compile Simple Benchmark
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cat > my_benchmark.cc << EOF
          #include <benchmark/benchmark.h>
          
          static void BM_StringCreation(benchmark::State& state) {
            for (auto _ : state)
              std::string empty_string;
          }
          // Register the function as a benchmark
          BENCHMARK(BM_StringCreation);
          
          BENCHMARK_MAIN();
          EOF
          
          # Compile linking against benchmark and pthread
          if g++ my_benchmark.cc -std=c++11 -isystem /usr/local/include -L/usr/local/lib -lbenchmark -lpthread -o my_benchmark; then
             echo "✓ Compilation passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Compilation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Run Benchmark
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if ./my_benchmark; then
             echo "✓ Benchmark ran successfully"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Benchmark execution failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Basic functional check: verify library existence since there is no standalone binary
          if [ -f "/usr/local/lib/libbenchmark.a" ]; then
            echo "✓ Benchmark library found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Benchmark library not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${BENCHMARK_BASELINE_VERSION#v}"
          NEXT_VERSION="${BENCHMARK_NEXT_VERSION#v}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          WORKDIR=$(mktemp -d)
          git clone --branch "${BENCHMARK_NEXT_VERSION}" --depth 1 https://github.com/google/benchmark.git "${WORKDIR}/benchmark-next"
          cmake -S "${WORKDIR}/benchmark-next" -B "${WORKDIR}/benchmark-next/build" -DBENCHMARK_DOWNLOAD_DEPENDENCIES=on -DCMAKE_BUILD_TYPE=Release
          cmake --build "${WORKDIR}/benchmark-next/build" --config Release

          cat > "${WORKDIR}/bench_next.cc" <<'EOF'
          #include <benchmark/benchmark.h>
          static void BM_Next(benchmark::State& state) {
            for (auto _ : state) {
              benchmark::DoNotOptimize(state.iterations());
            }
          }
          BENCHMARK(BM_Next);
          BENCHMARK_MAIN();
          EOF

          if g++ "${WORKDIR}/bench_next.cc" -std=c++11 -I"${WORKDIR}/benchmark-next/include" -I"${WORKDIR}/benchmark-next/build/src/generated_include" "${WORKDIR}/benchmark-next/build/src/libbenchmark.a" -lpthread -o "${WORKDIR}/bench_next" && "${WORKDIR}/bench_next" --benchmark_min_time=0.01 > /dev/null; then
            RESULT="next_install_validated"
            DETAILS="Google Benchmark ${NEXT_VERSION} built and ran a real candidate benchmark on Arm64"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            RESULT="candidate_build_or_run_failed"
            DETAILS="Google Benchmark ${NEXT_VERSION} failed build or runtime validation on Arm64"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "result=${RESULT}" >> $GITHUB_OUTPUT
          echo "details=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'n/a' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.next_version || 'n/a' }}"
          echo "Regression install result: ${{ steps.test6.outputs.result || 'n/a' }}"
          echo "Details: ${{ steps.test6.outputs.details || 'n/a' }}"
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          # Check Headers
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Compile Simple Benchmark
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run Benchmark
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Google Benchmark Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Headers: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Compile Simple Benchmark: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Run Benchmark: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version:** ${{ steps.test6.outputs.next_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.details || 'n/a' }}" >> $GITHUB_STEP_SUMMARY

