name: Test Magento on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/magento.md"
      - ".github/workflows/test-magento.yml"

jobs:
  test-magento:
    runs-on: ubuntu-24.04-arm
    env:
      MAGENTO_VERSION: "2.4.4"
      MAGENTO_WORKDIR: "/tmp/magento-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=magento" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/magento" >> "$GITHUB_OUTPUT"

      - name: Install Magento baseline
        id: install
        run: |
          set -euo pipefail

          php_for_version() {
            case "$1" in
              2.4.4*|2.4.5*|2.4.6*) echo "php8.1" ;;
              2.4.7*|2.4.8*) echo "php8.3" ;;
              2.4.9*) echo "php8.4" ;;
              *) echo "php8.3" ;;
            esac
          }

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common curl git unzip ca-certificates
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y composer \
            php8.1-cli php8.1-xml php8.1-curl php8.1-zip php8.1-intl php8.1-mbstring php8.1-bcmath php8.1-gd php8.1-soap php8.1-mysql \
            php8.3-cli php8.3-xml php8.3-curl php8.3-zip php8.3-intl php8.3-mbstring php8.3-bcmath php8.3-gd php8.3-soap php8.3-mysql \
            php8.4-cli php8.4-xml php8.4-curl php8.4-zip php8.4-intl php8.4-mbstring php8.4-bcmath php8.4-gd php8.4-soap php8.4-mysql

          rm -rf "${MAGENTO_WORKDIR}"
          mkdir -p "${MAGENTO_WORKDIR}"
          git clone --depth 1 --branch "${MAGENTO_VERSION}" https://github.com/magento/magento2.git "${MAGENTO_WORKDIR}/baseline"

          BASE_PHP=$(php_for_version "${MAGENTO_VERSION}")
          cd "${MAGENTO_WORKDIR}/baseline"
          COMPOSER_MEMORY_LIMIT=-1 timeout 900 "${BASE_PHP}" /usr/bin/composer install --no-interaction --no-dev --prefer-dist >/tmp/magento-baseline-composer.log 2>&1

          test -f "${MAGENTO_WORKDIR}/baseline/bin/magento"
          test -f "${MAGENTO_WORKDIR}/baseline/vendor/autoload.php"

          echo "base_dir=${MAGENTO_WORKDIR}/baseline" >> "$GITHUB_OUTPUT"
          echo "base_php=${BASE_PHP}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Magento version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          BASE_PHP="${{ steps.install.outputs.base_php }}"

          VERSION=$(cd "${BASE_DIR}" && "${BASE_PHP}" bin/magento --version | awk '{print $3}')
          LATEST=$(
            python3 - <<'PY'
          import json
          import re
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/magento/magento2/releases",
              headers={"User-Agent": "github-actions"},
          )
          releases = json.load(urllib.request.urlopen(req, timeout=20))
          stable = []
          for rel in releases:
              tag = str(rel["tag_name"])
              lower = tag.lower()
              if any(token in lower for token in ("alpha", "beta", "rc")):
                  continue
              if rel.get("draft") or rel.get("prerelease"):
                  continue
              match = re.match(r"^(\d+)\.(\d+)\.(\d+)(?:-p(\d+))?$", tag)
              if not match:
                  continue
              major, minor, patch, patchlevel = match.groups()
              stable.append(((int(major), int(minor), int(patch), int(patchlevel or 0)), tag))
          stable.sort()
          print(stable[-1][1])
          PY
          )

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Magento version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check Magento source layout
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -f "${BASE_DIR}/bin/magento" ] && [ -f "${BASE_DIR}/composer.json" ] && [ -f "${BASE_DIR}/pub/index.php" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact baseline version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          BASE_PHP="${{ steps.install.outputs.base_php }}"
          VERSION=$(cd "${BASE_DIR}" && "${BASE_PHP}" bin/magento --version | awk '{print $3}')
          if [ "${VERSION}" = "${MAGENTO_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cd "${BASE_DIR}" && "${BASE_PHP}" bin/magento --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Magento CLI help
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          BASE_PHP="${{ steps.install.outputs.base_php }}"
          if cd "${BASE_DIR}" && "${BASE_PHP}" bin/magento list 2>&1 | grep -q "cache:clean"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && php -r 'echo php_uname("m");' | grep -q "aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            php -r 'echo php_uname("m"), PHP_EOL;'
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          BASE_PHP="${{ steps.install.outputs.base_php }}"
          if cd "${BASE_DIR}" && php -l pub/index.php >/tmp/magento-php-lint.txt 2>&1 && "${BASE_PHP}" bin/magento --version >/tmp/magento-version.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/magento-php-lint.txt || true
            cat /tmp/magento-version.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail

          php_for_version() {
            case "$1" in
              2.4.4*|2.4.5*|2.4.6*) echo "php8.1" ;;
              2.4.7*|2.4.8*) echo "php8.3" ;;
              2.4.9*) echo "php8.4" ;;
              *) echo "php8.3" ;;
            esac
          }

          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/magento-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Magento version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Magento version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Magento version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Current pinned Magento version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          git clone --depth 1 --branch "${LATEST}" https://github.com/magento/magento2.git "${REGRESSION_WORKDIR}"
          NEXT_PHP=$(php_for_version "${LATEST}")
          cd "${REGRESSION_WORKDIR}"
          COMPOSER_MEMORY_LIMIT=-1 timeout 900 "${NEXT_PHP}" /usr/bin/composer install --no-interaction --no-dev --prefer-dist >/tmp/magento-regression-composer.log 2>&1
          NEXT_VERSION=$(cd "${REGRESSION_WORKDIR}" && "${NEXT_PHP}" bin/magento --version | awk '{print $3}' || true)

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && cd "${REGRESSION_WORKDIR}" && php -l pub/index.php >/tmp/magento-regression-lint.txt 2>&1 && "${NEXT_PHP}" bin/magento list >/tmp/magento-regression-list.txt 2>&1; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Magento version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, Composer completed successfully, and the candidate Magento CLI reported version ${NEXT_VERSION}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Magento version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, Composer completed successfully, and the candidate Magento CLI reported version ${NEXT_VERSION}."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/magento-regression-composer.log || true
            cat /tmp/magento-regression-lint.txt || true
            cat /tmp/magento-regression-list.txt || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Magento version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} could not complete a usable Composer and Magento CLI install path on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Magento version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} could not complete a usable Composer and Magento CLI install path on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/magento.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Magento",
              "version": "${{ steps.version.outputs.version }}",
              "language": "PHP",
              "category": "E-commerce platforms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check Magento source layout", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check exact baseline version", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check Magento CLI help", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magento-test-results
          path: test-results/magento.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Magento Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Magento source layout: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact baseline version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check Magento CLI help: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
