name: Test Iperf on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-iperf.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-iperf.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-iperf.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-iperf.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-iperf.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-iperf.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-iperf.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-iperf.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-iperf.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-iperf.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-iperf.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-iperf.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-iperf.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-iperf.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-iperf.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-iperf.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-iperf.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-iperf.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-iperf.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-iperf.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-iperf.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-iperf.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-iperf.outputs.timestamp }}
jobs:
  test-iperf:
    runs-on: ubuntu-24.04-arm
    env:
      IPERF_VERSION: "3.16"
      IPERF_NEXT_VERSION: "3.20"
      IPERF_WORKDIR: "/tmp/iperf-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Iperf'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=iperf" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/iperf" >> "$GITHUB_OUTPUT"
      - name: Install Iperf
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev curl ca-certificates file binutils
          rm -rf "${IPERF_WORKDIR}"
          mkdir -p "${IPERF_WORKDIR}"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 -o "${IPERF_WORKDIR}/iperf-${IPERF_VERSION}.tar.gz" "https://downloads.es.net/pub/iperf/iperf-${IPERF_VERSION}.tar.gz"
          tar -xzf "${IPERF_WORKDIR}/iperf-${IPERF_VERSION}.tar.gz" -C "${IPERF_WORKDIR}"
          BASE_DIR="${IPERF_WORKDIR}/iperf-${IPERF_VERSION}"
          cd "${BASE_DIR}"
          ./configure
          make -j"$(nproc)"
          test -x "${BASE_DIR}/src/iperf3"
          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Iperf version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/src/iperf3" --version | awk 'NR==1 {print $2}')
          LATEST="${IPERF_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Iperf version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check Iperf binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -x "${BASE_DIR}/src/iperf3" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          OUTPUT=$("${BASE_DIR}/src/iperf3" --version 2>&1 || true)
          VERSION=$(printf '%s\n' "$OUTPUT" | awk 'NR==1 {print $2}')
          if [ "$VERSION" = "${IPERF_VERSION}" ] || printf '%s\n' "$OUTPUT" | grep -Eq "(^|[^0-9])${IPERF_VERSION//./\\.}([^0-9]|$)"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if "${BASE_DIR}/src/iperf3" --help > /tmp/iperf-help.txt 2>&1 && grep -qi "Usage" /tmp/iperf-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/iperf-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          REAL_BIN="${BASE_DIR}/src/.libs/iperf3"
          if [ ! -x "${REAL_BIN}" ]; then
            REAL_BIN=$(readlink -f "${BASE_DIR}/src/iperf3")
          fi
          if [ "$(uname -m)" = "aarch64" ] && { file "${REAL_BIN}" | grep -Eqi 'aarch64|arm64|ARM aarch64' || readelf -h "${REAL_BIN}" 2>/dev/null | grep -Eq 'Machine:[[:space:]]*AArch64'; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${REAL_BIN}" || true
            readelf -h "${REAL_BIN}" 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          IPERF_BIN="${BASE_DIR}/src/.libs/iperf3"
          if [ ! -x "${IPERF_BIN}" ]; then
            IPERF_BIN="${BASE_DIR}/src/iperf3"
          fi
          IPERF_LIB_DIR="${BASE_DIR}/src/.libs"
          if [ -d "${IPERF_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${IPERF_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          fi
          cleanup() {
            pkill -f "${IPERF_BIN} -s -D" >/dev/null 2>&1 || pkill -f iperf3 >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          cleanup
          "${IPERF_BIN}" -s -D
          sleep 2
          if "${IPERF_BIN}" -c 127.0.0.1 -t 1 > /tmp/iperf-functional.txt 2>&1 && grep -Fq "connected to 127.0.0.1" /tmp/iperf-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/iperf-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/iperf-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Iperf version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Iperf version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Iperf version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release on Arm64."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 -o "${REGRESSION_WORKDIR}/iperf-${LATEST}.tar.gz" "https://downloads.es.net/pub/iperf/iperf-${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/iperf-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/iperf-${LATEST}"
          cd "${NEXT_DIR}"
          ./configure
          make -j"$(nproc)"
          NEXT_IPERF_BIN="${NEXT_DIR}/src/.libs/iperf3"
          if [ ! -x "${NEXT_IPERF_BIN}" ]; then
            NEXT_IPERF_BIN="${NEXT_DIR}/src/iperf3"
          fi
          NEXT_LIB_DIR="${NEXT_DIR}/src/.libs"
          if [ -d "${NEXT_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${NEXT_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          fi
          NEXT_VERSION=$("${NEXT_IPERF_BIN}" --version | awk 'NR==1 {print $2}' || true)

          cleanup() {
            pkill -f "${NEXT_IPERF_BIN} -s -D" >/dev/null 2>&1 || pkill -f iperf3 >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          cleanup
          "${NEXT_IPERF_BIN}" -s -D
          sleep 2
          if [ "$NEXT_VERSION" = "$LATEST" ] && "${NEXT_IPERF_BIN}" -c 127.0.0.1 -t 1 > /tmp/iperf-next-functional.txt 2>&1 && grep -Fq "connected to 127.0.0.1" /tmp/iperf-next-functional.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Iperf version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, and the candidate binary reported version ${NEXT_VERSION} and completed a real localhost throughput test successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Iperf version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, and the candidate binary reported version ${NEXT_VERSION} and completed a real localhost throughput test successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/iperf-next-functional.txt || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Iperf version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not report the expected version or complete a usable localhost throughput test on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Iperf version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not report the expected version or complete a usable localhost throughput test on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Iperf Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Iperf binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
