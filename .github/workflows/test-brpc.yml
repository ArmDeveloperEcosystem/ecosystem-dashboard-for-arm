name: Test BRPC on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-brpc.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-brpc.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-brpc.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-brpc.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-brpc.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-brpc.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-brpc.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-brpc.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-brpc.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-brpc.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-brpc.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-brpc.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-brpc.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-brpc.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-brpc.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-brpc.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-brpc.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-brpc.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-brpc.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-brpc.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-brpc.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-brpc.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-brpc.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-brpc.outputs.timestamp }}
jobs:
  test-brpc:
    runs-on: ubuntu-24.04-arm
    env:
      BRPC_BASELINE_VERSION: "1.12.1"
      BRPC_NEXT_VERSION: "1.13.0"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'BRPC'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=brpc" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/brpc" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git g++ make cmake libssl-dev libgflags-dev libprotobuf-dev libprotoc-dev protobuf-compiler libleveldb-dev libgoogle-perftools-dev
      
      - name: Install BRPC
        id: install
        run: |
          echo "Installing BRPC..."
          
          git clone --branch "${BRPC_BASELINE_VERSION}" --depth 1 https://github.com/apache/brpc.git
          
          cd brpc
          mkdir build && cd build
          cmake .. -DWITH_GLOG=OFF
          make -j$(nproc)
          
          # Install headers and libs
          sudo make install
          
          if [ -f "/usr/local/lib/libbrpc.a" ] || [ -f "/usr/local/lib/libbrpc.so" ]; then
             echo "BRPC installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "BRPC installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get BRPC version
        id: version
        run: |
          echo "version=${BRPC_BASELINE_VERSION}" >> $GITHUB_OUTPUT
          echo "Detected BRPC version: ${BRPC_BASELINE_VERSION}"
      
      - name: Test 1 - Check Headers
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -d "/usr/local/include/brpc" ]; then
            echo "✓ brpc headers found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ brpc headers not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Static Library
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "/usr/local/lib/libbrpc.a" ]; then
            echo "✓ libbrpc.a found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ libbrpc.a not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Compile Simple Example
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # Create a minimal file that includes brpc header
          cat > test_brpc.cpp << EOF
          #include <brpc/server.h>
          #include <brpc/channel.h>
          
          int main() {
              brpc::Server server;
              return 0;
          }
          EOF
          
          # Compile linking against brpc and deps
          # Note: linking order matters.
          if g++ test_brpc.cpp -std=c++11 -I/usr/local/include -L/usr/local/lib -lbrpc -lgflags -lprotobuf -lleveldb -lssl -lcrypto -ldl -lpthread -o test_brpc; then
             echo "✓ Compilation passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Compilation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Run Simple Example
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if ./test_brpc; then
             echo "✓ Example ran successfully"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Example execution failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${BRPC_BASELINE_VERSION}"
          NEXT_VERSION="${BRPC_NEXT_VERSION}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          WORKDIR=$(mktemp -d)
          git clone --branch "${NEXT_VERSION}" --depth 1 https://github.com/apache/brpc.git "${WORKDIR}/brpc-next"
          cmake -S "${WORKDIR}/brpc-next" -B "${WORKDIR}/brpc-next/build" -DWITH_GLOG=OFF
          cmake --build "${WORKDIR}/brpc-next/build" --parallel 2

          cat > "${WORKDIR}/test_brpc_next.cpp" <<'EOF'
          #include <brpc/server.h>
          #include <brpc/channel.h>
          int main() {
            brpc::Server server;
            brpc::Channel channel;
            return 0;
          }
          EOF

          if g++ "${WORKDIR}/test_brpc_next.cpp" -std=c++11 -I"${WORKDIR}/brpc-next/src" -I"${WORKDIR}/brpc-next/build/output/include" -L"${WORKDIR}/brpc-next/build/output/lib" -lbrpc -lgflags -lprotobuf -lleveldb -lssl -lcrypto -ldl -lpthread -o "${WORKDIR}/test_brpc_next" && "${WORKDIR}/test_brpc_next"; then
            DECISION="next_install_validated"
            REGRESSION_RESULT="Next version installed successfully on Arm64"
            DETAILS="BRPC ${NEXT_VERSION} built and linked a real candidate example on Arm64"
            NEXT_INSTALLED_VERSION="${NEXT_VERSION}"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            DECISION="next_install_failed"
            REGRESSION_RESULT="Next version install failed on Arm64"
            DETAILS="BRPC ${NEXT_VERSION} failed build or candidate example validation on Arm64"
            NEXT_INSTALLED_VERSION="not_installed"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "latest_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> $GITHUB_OUTPUT
          echo "decision=${DECISION}" >> $GITHUB_OUTPUT
          echo "regression_result=${REGRESSION_RESULT}" >> $GITHUB_OUTPUT
          echo "comparison=${DETAILS}" >> $GITHUB_OUTPUT

          # Backward-compatible fields for older summary snippets.
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "result=${DECISION}" >> $GITHUB_OUTPUT
          echo "details=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'n/a' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.test6.outputs.next_version || 'n/a' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'n/a' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.details || 'n/a' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          # Check Headers
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Static Library
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Compile Simple Example
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Run Simple Example
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## BRPC Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Headers: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Static Library: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Compile Simple Example: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Run Simple Example: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version:** ${{ steps.test6.outputs.latest_version || steps.test6.outputs.next_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.regression_result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.details || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
