name: Test CentOS on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-centos.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-centos.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-centos.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-centos.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-centos.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-centos.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-centos.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-centos.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-centos.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-centos.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-centos.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-centos.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-centos.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-centos.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-centos.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-centos.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-centos.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-centos.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-centos.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-centos.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-centos.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-centos.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-centos.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/centos.md'
      - '.github/workflows/test-centos.yml'

jobs:
  test-centos:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'CentOS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=centos" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/centos" >> "$GITHUB_OUTPUT"
      - name: Install CentOS Stream container image
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

          BASELINE_TAG="stream9"
          sudo docker pull "quay.io/centos/centos:${BASELINE_TAG}"

          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get CentOS Stream version
        id: version
        run: |
          VERSION=$(sudo docker run --rm "quay.io/centos/centos:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'" || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Image Availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker image inspect "quay.io/centos/centos:${{ steps.install.outputs.baseline_tag }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(sudo docker run --rm "quay.io/centos/centos:${{ steps.install.outputs.baseline_tag }}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'")

          if printf '%s\n' "$VERSION" | grep -q '^9$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker run --rm "quay.io/centos/centos:${{ steps.install.outputs.baseline_tag }}" bash -lc 'dnf --help | head -n 1' | grep -q '^usage: dnf'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          sudo docker run --rm "quay.io/centos/centos:${{ steps.install.outputs.baseline_tag }}" \
            bash -lc 'dnf install -y which >/dev/null && command -v which' > centos-functional.txt

          if grep -q '^/usr/bin/which$' centos-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat centos-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST_TAG="stream10"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT_VERSION"

          sudo docker pull "quay.io/centos/centos:${LATEST_TAG}" >/dev/null
          LATEST_VERSION=$(sudo docker run --rm "quay.io/centos/centos:${LATEST_TAG}" bash -lc "grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '\"'")
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST_VERSION"

          sudo docker run --rm "quay.io/centos/centos:${LATEST_TAG}" \
            bash -lc 'dnf install -y which >/dev/null && command -v which' > centos-latest-functional.txt

          if grep -q '^/usr/bin/which$' centos-latest-functional.txt && [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "next_installed_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline tag ${{ steps.install.outputs.baseline_tag }} resolved to CentOS Stream ${CURRENT_VERSION} and passed smoke tests. Regression validation pulled ${LATEST_TAG}, which resolved to CentOS Stream ${LATEST_VERSION} and passed the same package-manager smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $LATEST_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current baseline tag ${{ steps.install.outputs.baseline_tag }} resolved to CentOS Stream ${CURRENT_VERSION} and passed smoke tests. Regression validation pulled ${LATEST_TAG}, which resolved to CentOS Stream ${LATEST_VERSION} and passed the same package-manager smoke on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          elif grep -q '^/usr/bin/which$' centos-latest-functional.txt; then
            echo "next_installed_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $LATEST_VERSION"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current baseline tag ${{ steps.install.outputs.baseline_tag }} resolved to the same CentOS Stream version as the latest stable branch under test."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            cat centos-latest-functional.txt || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline tag ${{ steps.install.outputs.baseline_tag }} resolved to CentOS Stream ${CURRENT_VERSION}, but the next stable branch ${LATEST_TAG} failed the package-manager smoke test on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current baseline tag ${{ steps.install.outputs.baseline_tag }} resolved to CentOS Stream ${CURRENT_VERSION}, but the next stable branch ${LATEST_TAG} failed the package-manager smoke test on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            local core=$3
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" "yes"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" "yes"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" "yes"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" "yes"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" "yes"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}" "no"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## CentOS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Image Availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge remains tied to Tests 1-5. Test 6 reports next-version install readiness on Arm64." >> "$GITHUB_STEP_SUMMARY"
