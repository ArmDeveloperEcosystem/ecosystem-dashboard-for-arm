name: Test OpenSearch Data Prepper on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/opensearch-data-prepper.md"
      - ".github/workflows/test-opensearch-data-prepper.yml"

jobs:
  test-opensearch-data-prepper:
    runs-on: ubuntu-24.04-arm
    env:
      DATA_PREPPER_VERSION: "2.14.1"
      DATA_PREPPER_HOME: /opt/data-prepper-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=opensearch-data-prepper" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/opensearch-data-prepper" >> "$GITHUB_OUTPUT"

      - name: Install OpenSearch Data Prepper
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar jq openjdk-21-jdk-headless

          URL="https://artifacts.opensearch.org/data-prepper/${DATA_PREPPER_VERSION}/opensearch-data-prepper-${DATA_PREPPER_VERSION}-linux-x64.tar.gz"
          curl -fsSL "$URL" -o data-prepper.tgz
          tar -xzf data-prepper.tgz

          sudo rm -rf "$DATA_PREPPER_HOME"
          sudo mv "opensearch-data-prepper-${DATA_PREPPER_VERSION}-linux-x64" "$DATA_PREPPER_HOME"
          sudo ln -sf "$DATA_PREPPER_HOME/bin/data-prepper" /usr/local/bin/data-prepper

          if [ -x "$DATA_PREPPER_HOME/bin/data-prepper" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get OpenSearch Data Prepper version
        id: version
        run: |
          set -euo pipefail
          cat > /tmp/DataPrepperVersionProbe.java <<'EOF'
          public class DataPrepperVersionProbe {
            public static void main(String[] args) {
              System.out.println(new org.opensearch.dataprepper.core.CoreVersionProvider().getVersionString());
            }
          }
          EOF
          javac -cp "$DATA_PREPPER_HOME/lib/*" /tmp/DataPrepperVersionProbe.java
          VERSION=$(java -cp "$DATA_PREPPER_HOME/lib/*:/tmp" DataPrepperVersionProbe | tr -d '\r')
          LATEST=$(curl -fsSL https://api.github.com/repos/opensearch-project/data-prepper/releases | jq -r '[.[] | select(.draft == false and .prerelease == false)][0].tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "$DATA_PREPPER_HOME/bin/data-prepper" ] && ls "$DATA_PREPPER_HOME/lib"/data-prepper-core-*.jar >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat > /tmp/DataPrepperVersionProbe.java <<'EOF'
          public class DataPrepperVersionProbe {
            public static void main(String[] args) {
              System.out.println(new org.opensearch.dataprepper.core.CoreVersionProvider().getVersionString());
            }
          }
          EOF
          javac -cp "$DATA_PREPPER_HOME/lib/*" /tmp/DataPrepperVersionProbe.java
          if java -cp "$DATA_PREPPER_HOME/lib/*:/tmp" DataPrepperVersionProbe | grep -qx "${DATA_PREPPER_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$("$DATA_PREPPER_HOME/bin/data-prepper" 2>&1 || true)
          if printf '%s\n' "$OUTPUT" | grep -q "Pipelines configuration file not found"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          timeout 20s "$DATA_PREPPER_HOME/bin/data-prepper" \
            "$DATA_PREPPER_HOME/examples/log-ingestion-k8s/data-prepper-pipeline-config/example_log_pipeline.yaml" \
            "$DATA_PREPPER_HOME/examples/config/example-data-prepper-config.yaml" \
            >/tmp/data-prepper-functional.log 2>&1 || true

          if grep -q "Started http source on port 2021" /tmp/data-prepper-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/data-prepper-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          DECISION="hold_current"
          NOTE="Pinned Data Prepper version remains the validated baseline pending an explicit upgrade run."
          if [ "${{ steps.version.outputs.latest }}" = "${DATA_PREPPER_VERSION}" ]; then
            DECISION="current_is_latest_stable"
            NOTE="Pinned Data Prepper version already matches the latest stable upstream release."
          fi

          echo "current_version=${DATA_PREPPER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${{ steps.version.outputs.latest }}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned Data Prepper version ${DATA_PREPPER_VERSION} was installed from the official tarball, its Java runtime version was probed successfully, and its example HTTP ingestion pipeline started on Arm in this run. Latest stable Data Prepper release ${{ steps.version.outputs.latest }} was checked before any version bump decision." >> "$GITHUB_OUTPUT"
          echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/opensearch-data-prepper.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenSearch Data Prepper",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensearch-data-prepper-test-results
          path: test-results/opensearch-data-prepper.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          echo "## OpenSearch Data Prepper Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests.' }}" >> "$GITHUB_STEP_SUMMARY"
