name: Test OpenSearch Dashboards on Arm64
on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/opensearch-dashboard.md'
      - '.github/workflows/test-opensearch-dashboard.yml'
jobs:
  test-opensearch-dashboard:
    runs-on: ubuntu-24.04-arm
    env:
      OPENSEARCH_DASHBOARDS_VERSION: "2.11.0"
      OPENSEARCH_DASHBOARDS_BIN: /usr/share/opensearch-dashboards/bin/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_PLUGIN_BIN: /usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "package_slug=opensearch-dashboard" >> $GITHUB_OUTPUT
          echo "dashboard_link=/opensource_packages/opensearch-dashboard" >> $GITHUB_OUTPUT

      # ============================================================
      # CUSTOMIZE THIS: Install your package
      # ============================================================
      - name: Install OpenSearch Dashboards
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget curl file

          VERSION="${OPENSEARCH_DASHBOARDS_VERSION}"
          URL="https://artifacts.opensearch.org/releases/bundle/opensearch-dashboards/${VERSION}/opensearch-dashboards-${VERSION}-linux-arm64.deb"
          wget -q -O /tmp/opensearch-dashboards.deb "$URL"

          if ! sudo dpkg -i /tmp/opensearch-dashboards.deb >/tmp/opensearch-dashboards-install.log 2>&1; then
            sudo apt-get install -f -y >/tmp/opensearch-dashboards-install-fix.log 2>&1
            sudo dpkg -i /tmp/opensearch-dashboards.deb >/tmp/opensearch-dashboards-install.log 2>&1
          fi

          if [ -x "${OPENSEARCH_DASHBOARDS_BIN}" ] && [ -f /etc/opensearch-dashboards/opensearch_dashboards.yml ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opensearch-dashboards-install.log || true
            cat /tmp/opensearch-dashboards-install-fix.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get package version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg-query -W -f='${Version}' opensearch-dashboards 2>/dev/null || echo "unknown")
          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://api.github.com/repos/opensearch-project/OpenSearch-Dashboards/releases/latest", timeout=20))
          print(data["tag_name"].lstrip("v"))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check binary existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -x "${OPENSEARCH_DASHBOARDS_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check configuration file
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if [ -f "/etc/opensearch-dashboards/opensearch_dashboards.yml" ]; then
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check plugin utility
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if [ -x "${OPENSEARCH_DASHBOARDS_PLUGIN_BIN}" ]; then
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${OPENSEARCH_DASHBOARDS_BIN}" --help >/tmp/opensearch-dashboards-help.log 2>&1 \
            && "${OPENSEARCH_DASHBOARDS_PLUGIN_BIN}" --help >/tmp/opensearch-dashboards-plugin-help.log 2>&1 \
            && grep -qi "OpenSearch Dashboards" /tmp/opensearch-dashboards-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opensearch-dashboards-help.log || true
            cat /tmp/opensearch-dashboards-plugin-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenSearch Dashboards version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DEB="/tmp/opensearch-dashboards-regression.deb"
          NEXT_ROOT=$(mktemp -d)
          NEXT_URL="https://artifacts.opensearch.org/releases/bundle/opensearch-dashboards/${LATEST}/opensearch-dashboards-${LATEST}-linux-arm64.deb"

          if wget -q -O "$NEXT_DEB" "$NEXT_URL"; then
            dpkg-deb -x "$NEXT_DEB" "$NEXT_ROOT"
            NEXT_INSTALLED_VERSION=$(dpkg-deb -f "$NEXT_DEB" Version 2>/dev/null || true)
            NEXT_BIN="$NEXT_ROOT/usr/share/opensearch-dashboards/bin/opensearch-dashboards"
            NEXT_PLUGIN_BIN="$NEXT_ROOT/usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin"
            if [ -n "$NEXT_INSTALLED_VERSION" ] \
              && [ "$(dpkg-deb -f "$NEXT_DEB" Architecture)" = "arm64" ] \
              && [ -x "$NEXT_BIN" ] \
              && [ -x "$NEXT_PLUGIN_BIN" ] \
              && "$NEXT_BIN" --help >/tmp/opensearch-dashboards-next-help.log 2>&1 \
              && "$NEXT_PLUGIN_BIN" --help >/tmp/opensearch-dashboards-next-plugin-help.log 2>&1; then
              echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
              if [ "$CURRENT" = "$LATEST" ] || [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ]; then
                echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
                echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned OpenSearch Dashboards version ${CURRENT} matches the latest stable candidate. Regression validation re-downloaded the Arm64 package, and the extracted package metadata reported version ${NEXT_INSTALLED_VERSION} while the candidate binaries passed help validation." >> "$GITHUB_OUTPUT"
                echo "Regression install result: Current stable version already validated on Arm64"
              else
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned OpenSearch Dashboards version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate version ${LATEST} on Arm64, the extracted package metadata reported version ${NEXT_INSTALLED_VERSION}, and the candidate binaries passed help validation." >> "$GITHUB_OUTPUT"
                echo "Regression install result: Next version installed successfully on Arm64"
              fi
              echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/opensearch-dashboards-next-help.log || true
              cat /tmp/opensearch-dashboards-next-plugin-help.log || true
              echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned OpenSearch Dashboards version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not expose a usable package version on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: unknown"
              echo "Regression install result: Next version install failed on Arm64"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenSearch Dashboards version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"


          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)

          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          
          cat > test-results/opensearch-dashboard.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenSearch Dashboards",
              "version": "${{ steps.version.outputs.version }}",
              "language": "TypeScript/Node.js",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check binary existence",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check configuration file",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check plugin utility",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/opensearch-dashboard.json
      # ============================================================
      # STANDARD STEPS - Usually don't need to modify below here
      # ============================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensearch-dashboard-test-results
          path: test-results/opensearch-dashboard.json
          retention-days: 90
      
      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## OpenSearch Dashboards Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check binary existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check configuration file: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check plugin utility: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"

