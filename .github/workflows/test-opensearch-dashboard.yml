name: Test OpenSearch Dashboards on Arm64
on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-opensearch-dashboard.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-opensearch-dashboard.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-opensearch-dashboard.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-opensearch-dashboard.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-opensearch-dashboard.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-opensearch-dashboard.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-opensearch-dashboard.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-opensearch-dashboard.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-opensearch-dashboard.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-opensearch-dashboard.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-opensearch-dashboard.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-opensearch-dashboard.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-opensearch-dashboard.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-opensearch-dashboard.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-opensearch-dashboard.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-opensearch-dashboard.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-opensearch-dashboard.outputs.timestamp }}
jobs:
  test-opensearch-dashboard:
    runs-on: ubuntu-24.04-arm
    env:
      OPENSEARCH_DASHBOARDS_VERSION: "2.19.0"
      OPENSEARCH_DASHBOARDS_NEXT_VERSION: "2.19.1"
      OPENSEARCH_DASHBOARDS_BIN: /usr/share/opensearch-dashboards/bin/opensearch-dashboards
      OPENSEARCH_DASHBOARDS_PLUGIN_BIN: /usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OpenSearch Dashboards'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=opensearch-dashboard" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/opensearch-dashboard" >> "$GITHUB_OUTPUT"
      - name: Install OpenSearch Dashboards
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget curl file ca-certificates

          VERSION="${OPENSEARCH_DASHBOARDS_VERSION}"
          URL="https://artifacts.opensearch.org/releases/bundle/opensearch-dashboards/${VERSION}/opensearch-dashboards-${VERSION}-linux-arm64.deb"
          wget -q -O /tmp/opensearch-dashboards.deb "$URL"

          if ! sudo apt-get install -y /tmp/opensearch-dashboards.deb >/tmp/opensearch-dashboards-install.log 2>&1; then
            cat /tmp/opensearch-dashboards-install.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -x "${OPENSEARCH_DASHBOARDS_BIN}" ] && sudo test -f /etc/opensearch-dashboards/opensearch_dashboards.yml; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opensearch-dashboards-install.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get package version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg-query -W -f='${Version}' opensearch-dashboards 2>/dev/null || echo "unknown")
          LATEST="${OPENSEARCH_DASHBOARDS_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check binary existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -x "${OPENSEARCH_DASHBOARDS_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check configuration file
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if sudo test -f "/etc/opensearch-dashboards/opensearch_dashboards.yml"; then
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check plugin utility
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if [ -x "${OPENSEARCH_DASHBOARDS_PLUGIN_BIN}" ]; then
             echo "status=passed" >> "$GITHUB_OUTPUT"
          else
             echo "status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONFIG_TMP="$(mktemp -d)"
          cleanup() {
            rm -rf "${CONFIG_TMP}"
          }
          trap cleanup EXIT
          sudo cp /etc/opensearch-dashboards/opensearch_dashboards.yml "${CONFIG_TMP}/opensearch_dashboards.yml"
          sudo chown "$(id -u):$(id -g)" "${CONFIG_TMP}/opensearch_dashboards.yml"
          chmod 0644 "${CONFIG_TMP}/opensearch_dashboards.yml"
          export OPENSEARCH_DASHBOARDS_PATH_CONF="${CONFIG_TMP}"
          set +e
          "${OPENSEARCH_DASHBOARDS_BIN}" --help >/tmp/opensearch-dashboards-help.log 2>&1
          DASHBOARDS_RC=$?
          "${OPENSEARCH_DASHBOARDS_PLUGIN_BIN}" --help >/tmp/opensearch-dashboards-plugin-help.log 2>&1
          PLUGIN_RC=$?
          set -e
          if { [ "$DASHBOARDS_RC" -eq 0 ] || [ "$DASHBOARDS_RC" -eq 64 ]; } \
            && { [ "$PLUGIN_RC" -eq 0 ] || [ "$PLUGIN_RC" -eq 64 ]; } \
            && grep -Eqi "OpenSearch Dashboards|Usage:|Starts OpenSearch Dashboards" /tmp/opensearch-dashboards-help.log \
            && grep -Eqi "plugin manager|Usage:|opensearch-dashboards-plugin" /tmp/opensearch-dashboards-plugin-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "dashboards_help_rc=$DASHBOARDS_RC"
            echo "plugin_help_rc=$PLUGIN_RC"
            cat /tmp/opensearch-dashboards-help.log || true
            cat /tmp/opensearch-dashboards-plugin-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## OpenSearch Dashboards Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check binary existence: ${{ steps.test1.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check configuration file: ${{ steps.test2.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check plugin utility: ${{ steps.test3.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
