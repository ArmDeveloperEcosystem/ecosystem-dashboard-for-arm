name: Test Robot Framework on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-robot-framework.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-robot-framework.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-robot-framework.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-robot-framework.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-robot-framework.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-robot-framework.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-robot-framework.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-robot-framework.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-robot-framework.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-robot-framework.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-robot-framework.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-robot-framework.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-robot-framework.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-robot-framework.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-robot-framework.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-robot-framework.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-robot-framework.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-robot-framework.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-robot-framework.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-robot-framework.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-robot-framework.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-robot-framework.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-robot-framework.outputs.timestamp }}
jobs:
  test-robot-framework:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Robot Framework'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=robot-framework" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/robot-framework" >> "$GITHUB_OUTPUT"
      - name: Install Robot Framework
        id: install
        run: |
          echo "Installing Robot Framework..."
          
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "python3-pip python3-venv"
          # Use a virtual environment or --break-system-packages for Ubuntu 24.04
          pip install --break-system-packages robotframework
          
          if command -v robot &> /dev/null; then
            echo "Robot Framework installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Robot Framework installation failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Robot Framework version
        id: version
        run: |
          VERSION=$(robot --version --nostatusrc | awk '{print $2}' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Robot Framework version: $VERSION"
      
      - name: Test 1 - Check robot binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v robot &> /dev/null; then
            echo "✓ robot binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ robot binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check robot version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if robot --version --nostatusrc | grep -q "Robot Framework"; then
            echo "✓ robot version command works"
            robot --version --nostatusrc
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ robot version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check robot help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if robot --help --nostatusrc 2>&1 | grep -qi "usage\|help\|options"; then
            echo "✓ robot help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ robot help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation (Real Test Execution)
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Creating a simple Robot Framework test file..."
          cat > smoke_test.robot << EOF
          *** Settings ***
          Documentation     Simple smoke test for Robot Framework
          
          *** Test Cases ***
          ARM64 Arithmetic Check
              \${result} =    Evaluate    1 + 1
              Should Be Equal As Integers    \${result}    2
          EOF
          
          echo "Executing the test case..."
          if robot --outputdir results smoke_test.robot; then
            echo "✓ Robot Framework test execution passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Robot Framework test execution failed"
            cat results/log.html || true
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set +e # Disable exit on error for this step
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          
          # Helper function to add duration safely
          add_duration() {
            local val=$1
            if [[ "$val" =~ ^[0-9]+$ ]]; then
              TOTAL_DURATION=$((TOTAL_DURATION + val))
            fi
          }

          # Iterate through possible steps to check status
          # We check explicit passed status, everything else is failure if not skipped (but simplification: if not passed, and supposed to run, it failed)
          
          # Check Test 1
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test1.conclusion }}" == "failure" ] || [ "${{ steps.test1.outcome }}" == "failure" ]; then
             FAILED=$((FAILED + 1))
             echo "DEBUG: Test 1 Failed. Status=${{ steps.test1.outputs.status }} Conclusion=${{ steps.test1.conclusion }}"
          fi
          add_duration "${{ steps.test1.outputs.duration }}"

          # Check Test 2
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test2.conclusion }}" == "failure" ] || [ "${{ steps.test2.outcome }}" == "failure" ]; then
             FAILED=$((FAILED + 1))
          fi
          add_duration "${{ steps.test2.outputs.duration }}"

          # Check Test 3
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test3.conclusion }}" == "failure" ] || [ "${{ steps.test3.outcome }}" == "failure" ]; then
             FAILED=$((FAILED + 1))
          fi
          add_duration "${{ steps.test3.outputs.duration }}"

          # Check Test 4 - Architecture
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test4.conclusion }}" == "failure" ] || [ "${{ steps.test4.outcome }}" == "failure" ]; then
             FAILED=$((FAILED + 1))
          fi
          add_duration "${{ steps.test4.outputs.duration }}"

          # Check Test 5 - Functional
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test5.conclusion }}" == "failure" ] || [ "${{ steps.test5.outcome }}" == "failure" ]; then
             FAILED=$((FAILED + 1))
             echo "DEBUG: Test 5 Failed. Status=${{ steps.test5.outputs.status }} Conclusion=${{ steps.test5.conclusion }}"
          fi
          add_duration "${{ steps.test5.outputs.duration }}"

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          
          # Determine overall status
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            # Only exit 1 if we want to fail the job when tests fail
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Robot Framework Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check robot-framework binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check robot-framework version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check robot-framework help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

