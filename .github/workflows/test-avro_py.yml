name: Test Avro on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-avro_py.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-avro_py.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-avro_py.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-avro_py.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-avro_py.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-avro_py.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-avro_py.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-avro_py.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-avro_py.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-avro_py.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-avro_py.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-avro_py.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-avro_py.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-avro_py.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-avro_py.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-avro_py.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-avro_py.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-avro_py.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-avro_py.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-avro_py.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-avro_py.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-avro_py.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-avro_py.outputs.timestamp }}
jobs:
  test-avro_py:
    runs-on: ubuntu-24.04-arm
    env:
      AVRO_BASELINE_VERSION: "1.12.0"
      AVRO_NEXT_VERSION: "1.12.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Avro'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=avro_py" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/avro_py" >> "$GITHUB_OUTPUT"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Avro baseline
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="${AVRO_BASELINE_VERSION}"
          python -m venv .venv-current
          . .venv-current/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "avro==${CURRENT_VERSION}"
          deactivate

          echo "AVRO_PYTHON=$PWD/.venv-current/bin/python" >> "$GITHUB_ENV"
          echo "BASELINE_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Avro version
        id: version
        run: |
          set -euo pipefail
          VERSION="$("$AVRO_PYTHON" -c "import avro; print(getattr(avro, '__version__', 'unknown'))")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Avro version: $VERSION"

      - name: Test 1 - Import Avro
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if "$AVRO_PYTHON" -c "import avro; print('avro imported')" >/dev/null 2>&1; then
            echo "✓ Avro import works"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Avro import failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION="$("$AVRO_PYTHON" -c "import avro; print(getattr(avro, '__version__', 'unknown'))")"

          if [ "$VERSION" = "${BASELINE_VERSION}" ]; then
            echo "✓ Avro version metadata matches baseline ${BASELINE_VERSION}"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Avro version metadata mismatch: got $VERSION expected ${BASELINE_VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Parse schema
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if "$AVRO_PYTHON" - <<'PY'
          import json
          from avro.schema import parse
          schema = parse(json.dumps({
              "type": "record",
              "name": "Telemetry",
              "fields": [{"name": "value", "type": "int"}]
          }))
          assert getattr(schema, "type", "") == "record"
          PY
          then
            echo "✓ Avro schema parsing works"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Avro schema parsing failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if "$AVRO_PYTHON" - <<'PY'
          import io
          import json
          from avro.datafile import DataFileReader, DataFileWriter
          from avro.io import DatumReader, DatumWriter
          from avro.schema import parse

          schema = parse(json.dumps({
              "type": "record",
              "name": "Sample",
              "fields": [{"name": "n", "type": "int"}]
          }))
          buffer = io.BytesIO()
          writer = DataFileWriter(buffer, DatumWriter(), schema)
          writer.append({"n": 7})
          writer.flush()
          buffer.seek(0)
          reader = DataFileReader(buffer, DatumReader())
          rows = list(reader)
          reader.close()
          assert rows == [{"n": 7}]
          PY
          then
            echo "✓ Avro round-trip functional validation passed"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Avro round-trip functional validation failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="${AVRO_NEXT_VERSION}"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Avro version $CURRENT passed smoke tests in this run, but the next regression candidate could not be resolved automatically from PyPI." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Avro version $CURRENT passed smoke tests in this run, but the next regression candidate could not be resolved automatically from PyPI."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Dashboard metadata review required before Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured Avro baseline and Test 6 candidate currently resolve to the same version. Review the dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Dashboard metadata review required before Test 6"
            echo "Details: Current pinned Avro version $CURRENT passed smoke tests in this run, but the configured baseline and Test 6 candidate are identical. Review the dashboard-aligned baseline/candidate pair."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            python -m venv .venv-next
            . .venv-next/bin/activate
            python -m pip install --upgrade pip
            if python -m pip install "avro==${LATEST}"; then
              NEXT_INSTALLED_VERSION="$(python -c "import avro; print(getattr(avro, '__version__', 'unknown'))")"
              deactivate
              if [ -n "$NEXT_INSTALLED_VERSION" ] && [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Avro version $CURRENT passed smoke tests in this run. Regression validation installed candidate version $LATEST on Arm64, and the installed package reported version $NEXT_INSTALLED_VERSION." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "Details: Current pinned Avro version $CURRENT passed smoke tests in this run. Regression validation installed candidate version $LATEST on Arm64, and the installed package reported version $NEXT_INSTALLED_VERSION."
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Avro version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST reported version ${NEXT_INSTALLED_VERSION:-unknown} after installation on Arm64." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "Details: Current pinned Avro version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST reported version ${NEXT_INSTALLED_VERSION:-unknown} after installation on Arm64."
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              deactivate || true
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Avro version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST could not be installed from PyPI on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Avro version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST could not be installed from PyPI on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then PASSED=$((PASSED + 1)); else FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
              REGRESSION_RESULT="Regression validation passed"
            else
              REGRESSION_RESULT="Regression validation failed"
            fi
          fi

          echo "## Avro Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Import Avro: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Parse schema: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge status reflects Tests 1-5. Test 6 reports next-version install readiness separately." >> "$GITHUB_STEP_SUMMARY"
