name: Test All Packages (Batch 9) on Arm64

on:
  workflow_dispatch:
  workflow_call:

jobs:

  test-new-relic:
    uses: ./.github/workflows/test-new-relic.yml

  test-java-openjdk:
    uses: ./.github/workflows/test-java-openjdk.yml

  test-relic:
    uses: ./.github/workflows/test-relic.yml

  test-taskflow:
    uses: ./.github/workflows/test-taskflow.yml

  test-catj:
    uses: ./.github/workflows/test-catj.yml

  test-brpc:
    uses: ./.github/workflows/test-brpc.yml

  test-linstor-server:
    uses: ./.github/workflows/test-linstor-server.yml

  test-visualreview:
    uses: ./.github/workflows/test-visualreview.yml

  test-jax:
    uses: ./.github/workflows/test-JAX.yml

  test-disconf:
    uses: ./.github/workflows/test-disconf.yml

  test-ubuntucore:
    uses: ./.github/workflows/test-ubuntucore.yml

  test-opensuse-tumbleweed:
    uses: ./.github/workflows/test-opensuse-tumbleweed.yml

  test-flask:
    uses: ./.github/workflows/test-flask.yml

  test-glusterfs:
    uses: ./.github/workflows/test-glusterfs.yml

  test-kubewarden-audit-scanner:
    uses: ./.github/workflows/test-kubewarden-audit-scanner.yml

  test-hal:
    uses: ./.github/workflows/test-hal.yml

  test-unixbench:
    uses: ./.github/workflows/test-unixbench.yml

  test-elastic-agent:
    uses: ./.github/workflows/test-elastic-agent.yml

  test-libvirt:
    uses: ./.github/workflows/test-libvirt.yml

  test-magento:
    uses: ./.github/workflows/test-magento.yml

  test-domo-python-sdk:
    uses: ./.github/workflows/test-domo-python-sdk.yml

  test-gradle:
    uses: ./.github/workflows/test-gradle.yml

  test-lz4:
    uses: ./.github/workflows/test-lz4.yml

  test-cgal:
    uses: ./.github/workflows/test-cgal.yml

  test-kubevirt:
    uses: ./.github/workflows/test-kubevirt.yml

  test-qiniu-qshell:
    uses: ./.github/workflows/test-qiniu-qshell.yml

  test-kubewarden-kwctl:
    uses: ./.github/workflows/test-kubewarden-kwctl.yml

  test-xgboost:
    uses: ./.github/workflows/test-xgboost.yml

  test-htop:
    uses: ./.github/workflows/test-htop.yml

  test-opensearch-benchmark:
    uses: ./.github/workflows/test-opensearch-benchmark.yml

  test-re2:
    uses: ./.github/workflows/test-re2.yml

  test-golang:
    uses: ./.github/workflows/test-golang.yml

  test-lsyncd:
    uses: ./.github/workflows/test-lsyncd.yml

  test-drbd:
    uses: ./.github/workflows/test-drbd.yml

  test-barbican:
    uses: ./.github/workflows/test-barbican.yml

  test-ovirt:
    uses: ./.github/workflows/test-ovirt.yml

  test-signoz:
    uses: ./.github/workflows/test-signoz.yml

  test-cuda-q:
    uses: ./.github/workflows/test-cuda-q.yml

  test-cuda-qx:
    uses: ./.github/workflows/test-cuda-qx.yml

  test-cudf:
    uses: ./.github/workflows/test-cudf.yml

  test-cudnn-fe:
    uses: ./.github/workflows/test-cudnn-fe.yml

  test-cugraph:
    uses: ./.github/workflows/test-cugraph.yml

  test-cuml:
    uses: ./.github/workflows/test-cuml.yml

  test-cuopt:
    uses: ./.github/workflows/test-cuopt.yml

  test-cupy:
    uses: ./.github/workflows/test-cupy.yml

  test-cutile-python:
    uses: ./.github/workflows/test-cutile-python.yml

  summary:
    needs:
      [
        test-new-relic,
        test-java-openjdk,
        test-relic,
        test-taskflow,
        test-catj,
        test-brpc,
        test-linstor-server,
        test-visualreview,
        test-jax,
        test-disconf,
        test-ubuntucore,
        test-opensuse-tumbleweed,
        test-flask,
        test-glusterfs,
        test-kubewarden-audit-scanner,
        test-hal,
        test-unixbench,
        test-elastic-agent,
        test-libvirt,
        test-magento,
        test-domo-python-sdk,
        test-gradle,
        test-lz4,
        test-cgal,
        test-kubevirt,
        test-qiniu-qshell,
        test-kubewarden-kwctl,
        test-xgboost,
        test-htop,
        test-opensearch-benchmark,
        test-re2,
        test-golang,
        test-lsyncd,
        test-drbd,
        test-barbican,
        test-ovirt,
        test-signoz,
        test-cuda-q,
        test-cuda-qx,
        test-cudf,
        test-cudnn-fe,
        test-cugraph,
        test-cuml,
        test-cuopt,
        test-cupy,
        test-cutile-python
      ]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect batch results
        id: collect
        uses: ./.github/actions/collect-batch-results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          batch_number: "9"
          batch_title: "Batch 9"

      - name: Upload batch test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch9-test-results
          path: test-results
          retention-days: 90
