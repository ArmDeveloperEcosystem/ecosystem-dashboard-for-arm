name: Test Containerd on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/containerd.md'
      - '.github/workflows/test-containerd.yml'

jobs:
  test-containerd:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=containerd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/containerd" >> "$GITHUB_OUTPUT"

      - name: Install Containerd
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          if sudo apt-get install -y containerd; then
            echo "install_method=apt" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            LATEST_TAG=$(curl -fsSL https://api.github.com/repos/containerd/containerd/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')
            VERSION=${LATEST_TAG#v}
            curl -fsSL -o containerd.tar.gz "https://github.com/containerd/containerd/releases/download/${LATEST_TAG}/containerd-${VERSION}-linux-arm64.tar.gz"
            sudo tar -C /usr/local -xzf containerd.tar.gz
            echo "install_method=binary" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Containerd versions
        id: version
        run: |
          VERSION=$(containerd --version | awk '{print $3}' || echo "unknown")
          LATEST=$(curl -fsSL https://api.github.com/repos/containerd/containerd/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v containerd >/dev/null 2>&1 && command -v ctr >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if containerd --version | grep -q " ${{ steps.version.outputs.version }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if containerd --help >/dev/null 2>&1 && containerd config default > config.toml; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          sudo pkill containerd 2>/dev/null || true
          sudo rm -rf /run/containerd
          sudo mkdir -p /run/containerd

          sudo containerd --config config.toml > containerd.log 2>&1 &
          CONTAINERD_PID=$!
          trap 'sudo kill $CONTAINERD_PID 2>/dev/null || true' EXIT

          for _ in $(seq 1 20); do
            if sudo ctr --address /run/containerd/containerd.sock version > ctr-version.txt 2>&1; then
              break
            fi
            sleep 1
          done

          if grep -q 'Server:' ctr-version.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat ctr-version.txt || true
            cat containerd.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo kill "$CONTAINERD_PID" 2>/dev/null || true
          wait "$CONTAINERD_PID" 2>/dev/null || true
          trap - EXIT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_TAG="v${LATEST}"
          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="/tmp/containerd-regression-${LATEST}.tar.gz"
          NEXT_URL="https://github.com/containerd/containerd/releases/download/${NEXT_TAG}/containerd-${LATEST}-linux-arm64.tar.gz"

          if curl -fsSL "$NEXT_URL" -o "$NEXT_TAR"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
            NEXT_BIN="$NEXT_DIR/bin/containerd"
            if [ -x "$NEXT_BIN" ]; then
              NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version | awk '{print $3}' | head -n 1 || true)
              if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                if [ "$LATEST" = "$CURRENT" ]; then
                  echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned containerd version ${CURRENT} already matches the latest stable release. Regression validation re-downloaded the latest Linux arm64 tarball and the extracted containerd binary reported version ${NEXT_INSTALLED_VERSION} on Arm64." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Current stable version already validated on Arm64"
                else
                  echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned containerd version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} from the official Linux arm64 tarball, and the extracted containerd binary reported version ${NEXT_INSTALLED_VERSION} on Arm64." >> "$GITHUB_OUTPUT"
                  echo "Regression install result: Next version installed successfully on Arm64"
                fi
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned containerd version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} extracted on Arm64 and reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned containerd version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Arm64 containerd binary." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned containerd version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded from the official Linux arm64 release path." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/containerd.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Containerd",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Runtimes"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Help Or Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: containerd-test-results
          path: test-results/containerd.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Containerd Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Installed version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.version.outputs.latest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Install method:** ${{ steps.install.outputs.install_method }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression decision:** ${{ steps.test6.outputs.decision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression note:** ${{ steps.test6.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> "$GITHUB_STEP_SUMMARY"
