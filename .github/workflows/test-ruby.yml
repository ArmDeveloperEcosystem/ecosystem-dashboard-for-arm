name: Test Ruby on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/ruby.md"
      - ".github/workflows/test-ruby.yml"

jobs:
  test-ruby:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "3.4.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ruby" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ruby" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Ruby baseline from official source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y autoconf bison build-essential ca-certificates curl file libdb-dev libffi-dev libgdbm-dev libgmp-dev libncurses5-dev libreadline-dev libssl-dev libyaml-dev rustc uuid-dev xz-utils zlib1g-dev
          WORKDIR=$(mktemp -d)
          URL="https://cache.ruby-lang.org/pub/ruby/${BASELINE_VERSION%.*}/ruby-${BASELINE_VERSION}.tar.gz"
          curl -fsSL "$URL" -o "$WORKDIR/ruby.tar.gz"
          tar -xzf "$WORKDIR/ruby.tar.gz" -C "$WORKDIR"
          SOURCE_DIR="$WORKDIR/ruby-${BASELINE_VERSION}"
          PREFIX="$WORKDIR/install"
          (
            cd "$SOURCE_DIR"
            ./configure --prefix="$PREFIX" --disable-install-doc
            make -j"$(nproc)"
            make install
          )
          RUBY_BIN="$PREFIX/bin/ruby"
          GEM_BIN="$PREFIX/bin/gem"
          IRB_BIN="$PREFIX/bin/irb"
          if [ ! -x "$RUBY_BIN" ] || [ ! -x "$GEM_BIN" ] || [ ! -x "$IRB_BIN" ]; then
            echo "Ruby baseline install did not produce expected binaries under $PREFIX" >&2
            exit 1
          fi
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "source_dir=$SOURCE_DIR" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "ruby_bin=$RUBY_BIN" >> "$GITHUB_OUTPUT"
          echo "gem_bin=$GEM_BIN" >> "$GITHUB_OUTPUT"
          echo "irb_bin=$IRB_BIN" >> "$GITHUB_OUTPUT"

      - name: Get Ruby versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="$("${{ steps.install.outputs.ruby_bin }}" -e 'print RUBY_VERSION')"
          LATEST="$(
            python3 - <<'PY'
          import re, urllib.request
          html = urllib.request.urlopen("https://www.ruby-lang.org/en/downloads/releases/", timeout=30).read().decode()
          versions = set(tuple(map(int, m.groups())) for m in re.finditer(r"Ruby\s+(\d+)\.(\d+)\.(\d+)", html))
          latest = sorted(versions)[-1]
          print("{}.{}.{}".format(*latest))
          PY
          )"
          echo "version=${CURRENT:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: ${CURRENT:-$BASELINE_VERSION}"
          echo "Detected latest version: ${LATEST:-$BASELINE_VERSION}"

      - name: Test 1 - Check Ruby binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.ruby_bin }}" ] && [ -x "${{ steps.install.outputs.gem_bin }}" ] && [ -x "${{ steps.install.outputs.irb_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${BASELINE_VERSION}"
          RUBY_VERSION="$("${{ steps.install.outputs.ruby_bin }}" -e 'print RUBY_VERSION')"
          if [ "$RUBY_VERSION" = "$EXPECTED" ] && "${{ steps.install.outputs.gem_bin }}" --version >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.ruby_bin }}" --version || true
            "${{ steps.install.outputs.gem_bin }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.ruby_bin }}" --help 2>&1 | grep -qiE 'Usage|switches|features'; then
            if "${{ steps.install.outputs.gem_bin }}" help 2>&1 | grep -qiE 'Usage|Commands|Examples'; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if file "${{ steps.install.outputs.ruby_bin }}" | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.ruby_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR"
          }
          trap cleanup EXIT
          cat > "$WORKDIR/smoke.rb" <<'EOF'
          require "json"

          payload = {
            ruby: RUBY_VERSION,
            engine: defined?(RUBY_ENGINE) ? RUBY_ENGINE : "ruby",
            arch: RUBY_PLATFORM,
            sum: [1, 2, 3, 4].sum
          }

          puts JSON.generate(payload)
          EOF

          OUTPUT="$("${{ steps.install.outputs.ruby_bin }}" "$WORKDIR/smoke.rb")"
          if echo "$OUTPUT" | grep -q "\"ruby\":\"${BASELINE_VERSION}\"" && echo "$OUTPUT" | grep -q '"sum":10'; then
            "${{ steps.install.outputs.gem_bin }}" env home >/dev/null
            "${{ steps.install.outputs.irb_bin }}" --version >/dev/null
            echo "note=Baseline Ruby executed a real JSON-based smoke script, gem environment probe, and IRB version check on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Ruby version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from ruby-lang.org." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Ruby version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from ruby-lang.org."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Ruby version ${CURRENT} passed smoke tests in this run and already matches the latest upstream stable release."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_ROOT=$(mktemp -d)
          NEXT_URL="https://cache.ruby-lang.org/pub/ruby/${LATEST%.*}/ruby-${LATEST}.tar.gz"
          curl -fsSL "$NEXT_URL" -o "$NEXT_ROOT/ruby.tar.gz"
          tar -xzf "$NEXT_ROOT/ruby.tar.gz" -C "$NEXT_ROOT"
          NEXT_SOURCE="$NEXT_ROOT/ruby-${LATEST}"
          NEXT_PREFIX="$NEXT_ROOT/install"
          (
            cd "$NEXT_SOURCE"
            ./configure --prefix="$NEXT_PREFIX" --disable-install-doc
            make -j"$(nproc)"
            make install
          )
          NEXT_RUBY="$NEXT_PREFIX/bin/ruby"
          NEXT_GEM="$NEXT_PREFIX/bin/gem"
          NEXT_IRB="$NEXT_PREFIX/bin/irb"
          NEXT_REPORTED="$("$NEXT_RUBY" -e 'print RUBY_VERSION' || true)"

          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR" "$NEXT_ROOT"
          }
          trap cleanup EXIT
          cat > "$WORKDIR/smoke.rb" <<'EOF'
          require "json"
          puts JSON.generate({ ruby: RUBY_VERSION, arch: RUBY_PLATFORM, product: [2, 3, 4].inject(:*) })
          EOF
          OUTPUT="$("$NEXT_RUBY" "$WORKDIR/smoke.rb" || true)"

          if [ -x "$NEXT_RUBY" ] && [ -x "$NEXT_GEM" ] && [ -x "$NEXT_IRB" ] && [ "$NEXT_REPORTED" = "$LATEST" ] && file "$NEXT_RUBY" | grep -qiE 'arm aarch64|aarch64' && echo "$OUTPUT" | grep -q "\"ruby\":\"${LATEST}\"" && echo "$OUTPUT" | grep -q '"product":24'; then
            "$NEXT_GEM" env home >/dev/null
            "$NEXT_IRB" --version >/dev/null
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Ruby version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from the official source tarball on Arm64, confirmed the installed interpreter reports the expected version, and reran the Ruby/gem/irb smoke path successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Ruby version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from the official source tarball on Arm64, confirmed the installed interpreter reports the expected version, and reran the Ruby/gem/irb smoke path successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "$OUTPUT"
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Ruby version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not build or validate as a usable Arm64 toolchain." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Ruby version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not build or validate as a usable Arm64 toolchain."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/ruby.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Ruby",
              "version": "${{ steps.version.outputs.version || 'unknown' }}",
              "language": "Ruby",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Check Ruby binaries exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Check version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}, "note": "${{ steps.test5.outputs.note || '' }}" },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruby-test-results
          path: test-results/ruby.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Ruby Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Ruby binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
