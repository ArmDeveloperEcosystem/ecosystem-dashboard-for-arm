name: Test NSQ on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/nsq.md"
      - ".github/workflows/test-nsq.yml"

jobs:
  test-nsq:
    runs-on: ubuntu-24.04-arm
    env:
      NSQ_VERSION: "1.3.0"
      NSQ_TARBALL_URL: "https://github.com/nsqio/nsq/releases/download/v1.3.0/nsq-1.3.0.linux-arm64.go1.21.5.tar.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=nsq" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/nsq" >> "$GITHUB_OUTPUT"

      - name: Install NSQ
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl tar
          rm -rf /tmp/nsq-source
          mkdir -p /tmp/nsq-source
          curl -fsSL "${NSQ_TARBALL_URL}" -o /tmp/nsq.tar.gz
          tar -xzf /tmp/nsq.tar.gz -C /tmp/nsq-source --strip-components=1
          sudo install -m 0755 /tmp/nsq-source/bin/nsqd /usr/local/bin/nsqd
          sudo install -m 0755 /tmp/nsq-source/bin/nsqlookupd /usr/local/bin/nsqlookupd
          sudo install -m 0755 /tmp/nsq-source/bin/nsqadmin /usr/local/bin/nsqadmin
          command -v nsqd >/dev/null 2>&1
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get NSQ version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(
              urllib.request.urlopen(
                  "https://api.github.com/repos/nsqio/nsq/releases/latest",
                  timeout=20,
              )
          )
          print(str(data["tag_name"]).lstrip("v"))
          PY
          )
          echo "version=${NSQ_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v nsqd >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          nsqd --version 2>&1 | tee /tmp/nsq-version.log
          if grep -Fq "v${NSQ_VERSION}" /tmp/nsq-version.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          nsqd --help 2>&1 | tee /tmp/nsq-help.log
          if grep -Fq "Usage of nsqd:" /tmp/nsq-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          nsqd >/tmp/nsqd.log 2>&1 &
          pid=$!
          cleanup() {
            kill "$pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS -d "hello world" "http://127.0.0.1:4151/pub?topic=test" >/tmp/nsq-pub.out; then
              break
            fi
            sleep 1
          done
          if grep -Fq "OK" /tmp/nsq-pub.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/nsqd.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=pinned_is_latest" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NSQ version ${CURRENT} matches the latest stable upstream Linux Arm64 release, so this workflow is already testing the newest validated baseline." >> "$GITHUB_OUTPUT"
          else
            echo "decision=hold_current_until_regression_run" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NSQ version ${CURRENT} passed smoke tests in this run. The newer stable upstream candidate ${LATEST} still needs an explicit side-by-side regression run before the pin is advanced." >> "$GITHUB_OUTPUT"
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/nsq.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "NSQ",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Messaging/Comms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Help Output Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsq-test-results
          path: test-results/nsq.json
          retention-days: 90
