name: Test Linstor-server on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-linstor-server.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-linstor-server.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-linstor-server.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-linstor-server.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-linstor-server.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-linstor-server.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-linstor-server.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-linstor-server.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-linstor-server.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-linstor-server.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-linstor-server.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-linstor-server.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-linstor-server.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-linstor-server.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-linstor-server.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-linstor-server.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-linstor-server.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-linstor-server.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-linstor-server.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-linstor-server.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-linstor-server.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-linstor-server.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-linstor-server.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-linstor-server.outputs.timestamp }}
jobs:
  test-linstor-server:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      LINSTOR_BASELINE_REF: "87a659de4629bbece4d4399d54706c21ad215863"
      LINSTOR_BASELINE_VERSION: "master"
      LINSTOR_PROTOC_VERSION: "31.1"
      LINSTOR_REPO: "https://github.com/LINBIT/linstor-server.git"
      JAVA_HOME: "/usr/lib/jvm/java-21-openjdk-arm64"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Linstor-server'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=linstor-server" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/linstor-server" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${LINSTOR_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Linstor-server
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "git make gcc g++ pkg-config python3 unzip tar openjdk-21-jdk protobuf-compiler"
          export JAVA_HOME="${JAVA_HOME}"
          export PATH="${JAVA_HOME}/bin:${PATH}"
          java -version
          javac -version
          rm -rf /tmp/linstor-base
          git clone --recursive "${LINSTOR_REPO}" /tmp/linstor-base
          cd /tmp/linstor-base
          git checkout --detach "${LINSTOR_BASELINE_REF}"
          git submodule update --init --recursive
          mkdir -p "tools/protoc-${LINSTOR_PROTOC_VERSION}/bin"
          ln -sf "$(command -v protoc)" "tools/protoc-${LINSTOR_PROTOC_VERSION}/bin/protoc"
          ./gradlew --no-daemon assemble
          CONTROLLER_TAR=$(find /tmp/linstor-base/controller/build/distributions -maxdepth 1 -type f -name 'controller-*.tar' | head -n 1 || true)
          SATELLITE_TAR=$(find /tmp/linstor-base/satellite/build/distributions -maxdepth 1 -type f -name 'satellite-*.tar' | head -n 1 || true)
          if [ -n "$CONTROLLER_TAR" ] && [ -n "$SATELLITE_TAR" ] && [ -f "server/generated-resources/version-info.properties" ]; then
            echo "controller_tar=$CONTROLLER_TAR" >> "$GITHUB_OUTPUT"
            echo "satellite_tar=$SATELLITE_TAR" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Linstor-server version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(awk -F= '/^version=/{print $2; exit}' /tmp/linstor-base/server/generated-resources/version-info.properties || true)
          if [ -z "$VERSION" ]; then
            VERSION="master-$(git -C /tmp/linstor-base rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check recursive build artifacts
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -e /tmp/linstor-base/linstor-common/.git ] && \
             [ -f "${{ steps.install.outputs.controller_tar }}" ] && \
             [ -f "${{ steps.install.outputs.satellite_tar }}" ] && \
             ls /tmp/linstor-base/controller/build/libs/controller-*.jar >/dev/null 2>&1 && \
             ls /tmp/linstor-base/satellite/build/libs/satellite-*.jar >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(awk -F= '/^version=/{print $2; exit}' /tmp/linstor-base/server/generated-resources/version-info.properties)
          if [ -n "$VERSION" ] && [ "$VERSION" = "${{ steps.version.outputs.version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Controller distribution help
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -rf /tmp/linstor-controller-base
          mkdir -p /tmp/linstor-controller-base
          tar -xf "${{ steps.install.outputs.controller_tar }}" -C /tmp/linstor-controller-base
          CONTROLLER_DIR=$(find /tmp/linstor-controller-base -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -n "$CONTROLLER_DIR" ] && timeout 20s "$CONTROLLER_DIR/bin/Controller" --help 2>&1 | tee /tmp/linstor-controller-base.log | grep -q "Usage: Controller"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/linstor-controller-base.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && java -XshowSettings:properties -version 2>&1 | grep -q "os.arch = aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Satellite distribution help
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -rf /tmp/linstor-satellite-base
          mkdir -p /tmp/linstor-satellite-base
          tar -xf "${{ steps.install.outputs.satellite_tar }}" -C /tmp/linstor-satellite-base
          SATELLITE_DIR=$(find /tmp/linstor-satellite-base -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -n "$SATELLITE_DIR" ] && timeout 20s "$SATELLITE_DIR/bin/Satellite" --help 2>&1 | tee /tmp/linstor-satellite-base.log | grep -q "Usage: Satellite"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/linstor-satellite-base.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          CURRENT_REF="${LINSTOR_BASELINE_REF}"
          BASE_DIR="/tmp/linstor-base"

          cd "$BASE_DIR"
          git fetch origin --tags --quiet
          DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH="master"
          fi
          HEAD_REF="$(git rev-parse "origin/${DEFAULT_BRANCH}" 2>/dev/null || true)"

          if [ -z "$HEAD_REF" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Could not resolve the latest commit on the default branch for LINSTOR regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          CURRENT_SHORT="$(git rev-parse --short "$CURRENT_REF")"
          HEAD_SHORT="$(git rev-parse --short "$HEAD_REF")"
          LATEST="master-${HEAD_SHORT}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "$HEAD_REF" = "$CURRENT_REF" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current LINSTOR baseline commit ${CURRENT_SHORT} already matches the latest default-branch commit ${HEAD_SHORT}, so there is no newer source snapshot candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge-base --is-ancestor "$CURRENT_REF" "$HEAD_REF"; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline commit ${CURRENT_SHORT} is not an ancestor of candidate commit ${HEAD_SHORT}, so a deterministic next-newer source candidate cannot be selected safely." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf /tmp/linstor-next
          git clone --recursive --branch "$DEFAULT_BRANCH" "$LINSTOR_REPO" /tmp/linstor-next
          cd /tmp/linstor-next
          git checkout --detach "$HEAD_REF"
          git submodule update --init --recursive
          mkdir -p "tools/protoc-${LINSTOR_PROTOC_VERSION}/bin"
          ln -sf "$(command -v protoc)" "tools/protoc-${LINSTOR_PROTOC_VERSION}/bin/protoc"
          ./gradlew --no-daemon assemble

          NEXT_CONTROLLER_TAR=$(find /tmp/linstor-next/controller/build/distributions -maxdepth 1 -type f -name 'controller-*.tar' | head -n 1 || true)
          NEXT_SATELLITE_TAR=$(find /tmp/linstor-next/satellite/build/distributions -maxdepth 1 -type f -name 'satellite-*.tar' | head -n 1 || true)
          NEXT_VERSION=$(awk -F= '/^version=/{print $2; exit}' /tmp/linstor-next/server/generated-resources/version-info.properties || true)
          if [ -z "$NEXT_VERSION" ]; then
            NEXT_VERSION="master-${HEAD_SHORT}"
          fi

          if [ -n "$NEXT_CONTROLLER_TAR" ] && [ -n "$NEXT_SATELLITE_TAR" ] && [ -f /tmp/linstor-next/server/generated-resources/version-info.properties ]; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current LINSTOR baseline commit ${CURRENT_SHORT} passed Tests 1-5, and the next newer default-branch commit ${HEAD_SHORT} built successfully with controller and satellite distributions on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current LINSTOR baseline commit ${CURRENT_SHORT} passed Tests 1-5, but the next newer default-branch commit ${HEAD_SHORT} did not complete equivalent build artifact validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Add job summary
        if: always()
        run: |
          {
            echo "## Linstor-server Test Results"
            echo
            echo "- Version: ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- Status: ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}"
            echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}"
            echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- Runner: ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check recursive build artifacts: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check exact version metadata: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check Controller distribution help: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Check Satellite distribution help: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo
            echo "### Regression Validation (Next Version Install)"
            echo "- Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
            echo "- Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
