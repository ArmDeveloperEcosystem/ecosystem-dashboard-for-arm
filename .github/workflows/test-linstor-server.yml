name: Test Linstor-server on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/linstor-server.md"
      - ".github/workflows/test-linstor-server.yml"

jobs:
  test-linstor-server:
    runs-on: ubuntu-24.04-arm
    env:
      LINSTOR_BASELINE_TAG: "v1.33.1"
      LINSTOR_BASELINE_VERSION: "1.33.1"
      LINSTOR_REPO: "https://github.com/LINBIT/linstor-server.git"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=linstor-server" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/linstor-server" >> "$GITHUB_OUTPUT"
          echo "current_version=${LINSTOR_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Linstor-server
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git make gcc g++ pkg-config python3 unzip tar openjdk-21-jdk
          rm -rf /tmp/linstor-base
          git clone --depth 1 --branch "${LINSTOR_BASELINE_TAG}" --recursive "${LINSTOR_REPO}" /tmp/linstor-base
          cd /tmp/linstor-base
          ./gradlew getProtoc
          ./gradlew assemble
          if [ -f "controller/build/distributions/controller-${LINSTOR_BASELINE_VERSION}.tar" ] && \
             [ -f "satellite/build/distributions/satellite-${LINSTOR_BASELINE_VERSION}.tar" ] && \
             [ -f "server/generated-resources/version-info.properties" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Linstor-server version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(awk -F= '/^version=/{print $2; exit}' /tmp/linstor-base/server/generated-resources/version-info.properties)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LINSTOR_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check recursive build artifacts
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -e /tmp/linstor-base/linstor-common/.git ] && \
             [ -f "/tmp/linstor-base/controller/build/distributions/controller-${LINSTOR_BASELINE_VERSION}.tar" ] && \
             [ -f "/tmp/linstor-base/satellite/build/distributions/satellite-${LINSTOR_BASELINE_VERSION}.tar" ] && \
             [ -f "/tmp/linstor-base/controller/build/libs/controller-${LINSTOR_BASELINE_VERSION}.jar" ] && \
             [ -f "/tmp/linstor-base/satellite/build/libs/satellite-${LINSTOR_BASELINE_VERSION}.jar" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(awk -F= '/^version=/{print $2; exit}' /tmp/linstor-base/server/generated-resources/version-info.properties)
          if [ "$VERSION" = "${LINSTOR_BASELINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Controller distribution help
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -rf /tmp/linstor-controller-base
          mkdir -p /tmp/linstor-controller-base
          tar -xf "/tmp/linstor-base/controller/build/distributions/controller-${LINSTOR_BASELINE_VERSION}.tar" -C /tmp/linstor-controller-base
          if timeout 20s "/tmp/linstor-controller-base/controller-${LINSTOR_BASELINE_VERSION}/bin/Controller" --help 2>&1 | tee /tmp/linstor-controller-base.log | grep -q "Usage: Controller"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/linstor-controller-base.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && java -XshowSettings:properties -version 2>&1 | grep -q "os.arch = aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Satellite distribution help
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -rf /tmp/linstor-satellite-base
          mkdir -p /tmp/linstor-satellite-base
          tar -xf "/tmp/linstor-base/satellite/build/distributions/satellite-${LINSTOR_BASELINE_VERSION}.tar" -C /tmp/linstor-satellite-base
          if timeout 20s "/tmp/linstor-satellite-base/satellite-${LINSTOR_BASELINE_VERSION}/bin/Satellite" --help 2>&1 | tee /tmp/linstor-satellite-base.log | grep -q "Usage: Satellite"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/linstor-satellite-base.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          NEXT_TAG="v${LATEST}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          sudo apt-get update
          sudo apt-get install -y git make gcc g++ pkg-config python3 unzip tar openjdk-21-jdk
          rm -rf /tmp/linstor-next /tmp/linstor-controller-next /tmp/linstor-satellite-next
          git clone --depth 1 --branch "${NEXT_TAG}" --recursive "${LINSTOR_REPO}" /tmp/linstor-next
          cd /tmp/linstor-next
          ./gradlew getProtoc
          ./gradlew assemble
          NEXT_INSTALLED_VERSION=$(awk -F= '/^version=/{print $2; exit}' server/generated-resources/version-info.properties)
          mkdir -p /tmp/linstor-controller-next /tmp/linstor-satellite-next
          tar -xf "controller/build/distributions/controller-${NEXT_INSTALLED_VERSION}.tar" -C /tmp/linstor-controller-next
          tar -xf "satellite/build/distributions/satellite-${NEXT_INSTALLED_VERSION}.tar" -C /tmp/linstor-satellite-next
          if timeout 20s "/tmp/linstor-controller-next/controller-${NEXT_INSTALLED_VERSION}/bin/Controller" --help 2>&1 | tee /tmp/linstor-controller-next.log | grep -q "Usage: Controller" && \
             timeout 20s "/tmp/linstor-satellite-next/satellite-${NEXT_INSTALLED_VERSION}/bin/Satellite" --help 2>&1 | tee /tmp/linstor-satellite-next.log | grep -q "Usage: Satellite"; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
              echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned LINSTOR Server version ${CURRENT} already matches the newest public stable LINSTOR release. Tests 1-5 validate the real Arm64 recursive source-build and launcher-help path, but there is no newer stable upstream candidate for a genuine Test 6 upgrade check." >> "$GITHUB_OUTPUT"
              echo "Regression install result: No newer stable release available for Test 6"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Linstor-server baseline version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} from a recursive source clone on Arm64, the generated version metadata reported ${NEXT_INSTALLED_VERSION}, and both Controller and Satellite distribution launchers exposed the expected help output on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            cat /tmp/linstor-controller-next.log || true
            cat /tmp/linstor-satellite-next.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Linstor-server baseline version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not complete the same recursive Arm64 source-build and launcher validation path." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi
          cat > test-results/linstor-server.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Linstor-server",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Storage"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check recursive build artifacts", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check exact version metadata", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Controller distribution help", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Check Satellite distribution help", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linstor-server-results
          path: test-results/linstor-server.json

      - name: Add job summary
        if: always()
        run: |
          {
            echo "## Linstor-server Test Results"
            echo
            echo "- Version: ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- Status: ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}"
            echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}"
            echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- Runner: ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check recursive build artifacts: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check exact version metadata: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check Controller distribution help: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Check Satellite distribution help: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo
            echo "### Regression Validation (Next Version Install)"
            echo "- Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
            echo "- Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
