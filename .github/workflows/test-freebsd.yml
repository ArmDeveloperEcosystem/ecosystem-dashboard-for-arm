name: Test FreeBSD on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/freebsd.md'
      - '.github/workflows/test-freebsd.yml'

jobs:
  test-freebsd:
    runs-on: ubuntu-24.04-arm
    env:
      FREEBSD_BASELINE_RELEASE: "15.0-RELEASE"
      FREEBSD_IMAGE_FILENAME: "FreeBSD-15.0-RELEASE-arm64-aarch64-ufs.raw.xz"
      FREEBSD_CHECKSUM_URL: "https://download.freebsd.org/releases/VM-IMAGES/15.0-RELEASE/aarch64/Latest/CHECKSUM.SHA256"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=freebsd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/freebsd" >> "$GITHUB_OUTPUT"
      - name: Locate FreeBSD Arm64 image artifacts
        id: install
        run: |
          set -euo pipefail
          BASE_URL="https://download.freebsd.org/releases/VM-IMAGES/${FREEBSD_BASELINE_RELEASE}/aarch64/Latest"
          IMAGE_URL="${BASE_URL}/${FREEBSD_IMAGE_FILENAME}"

          curl -fsSI "${FREEBSD_CHECKSUM_URL}" >/dev/null
          curl -fsSI "${IMAGE_URL}" >/dev/null

          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "image_url=${IMAGE_URL}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get FreeBSD version
        id: version
        run: |
          set -euo pipefail
          VERSION="${FREEBSD_BASELINE_RELEASE%-RELEASE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected FreeBSD version: ${VERSION}"

      - name: Test 1 - Check checksum file availability
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if curl -fsSI "${FREEBSD_CHECKSUM_URL}" | grep -q '^HTTP/.* 200'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Arm64 image availability
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if curl -fsSI "${{ steps.install.outputs.image_url }}" | grep -q '^HTTP/.* 200'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check checksum entry for Arm64 image
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          CHECKSUM_LINE=$(curl -fsSL "${FREEBSD_CHECKSUM_URL}" | grep "(${FREEBSD_IMAGE_FILENAME})" || true)
          if printf '%s\n' "${CHECKSUM_LINE}" | grep -Eq '^SHA256 \(.+\) = [0-9a-f]{64}$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          ARCH=$(uname -m)
          if [ "${ARCH}" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check image metadata headers
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          HEADERS=$(curl -fsSIL "${{ steps.install.outputs.image_url }}" || true)
          if printf '%s\n' "${HEADERS}" | grep -Eqi '^HTTP/.* (200|301|302|303|307|308)' \
            && ! printf '%s\n' "${HEADERS}" | grep -qi '^content-type: text/html'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${HEADERS}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || '15.0' }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
          echo "regression_result=No newer stable FreeBSD Arm64 VM image release is available for validation" >> "$GITHUB_OUTPUT"
          echo "comparison=FreeBSD ${CURRENT} is the newest public stable Arm64 VM image release line currently published at the official download location, so there is no newer stable image line to validate in Test 6 yet." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${CURRENT}"
          echo "Next version installed on Arm64: ${CURRENT}"
          echo "Regression install result: No newer stable FreeBSD Arm64 VM image release is available for validation"
          echo "Details: FreeBSD ${CURRENT} is the newest public stable Arm64 VM image release line currently published at the official download location, so there is no newer stable image line to validate in Test 6 yet."

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/freebsd.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "FreeBSD",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Shell",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check checksum file availability",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Arm64 image availability",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check checksum entry for Arm64 image",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Check image metadata headers",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-test-results
          path: test-results/freebsd.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## FreeBSD Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline release:** ${{ env.FREEBSD_BASELINE_RELEASE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check checksum file availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Arm64 image availability: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check checksum entry for Arm64 image: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check image metadata headers: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression validation: ${{ steps.test6.outputs.status || 'review' }}" >> "$GITHUB_STEP_SUMMARY"
