name: Test Canonical LXD on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/lxd.md'
      - '.github/workflows/test-lxd.yml'

jobs:
  test-lxd:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=lxd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/lxd" >> "$GITHUB_OUTPUT"
      - name: Install LXD
        id: install
        run: |
          set -euo pipefail
          clear_inflight_lxd_change() {
            local change_id=""
            change_id="$(sudo snap changes --abs-time 2>/dev/null | awk 'NR > 1 && /lxd/ && $2 != "Done" && $2 != "Error" && $2 != "Undone" { print $1; exit }' || true)"
            if [ -n "${change_id}" ]; then
              echo "Found in-flight LXD snap change ${change_id}; waiting briefly before aborting if needed."
              timeout 120 sudo snap watch "${change_id}" >/dev/null 2>&1 || sudo snap abort "${change_id}" >/dev/null 2>&1 || true
            fi
          }

          echo "Installing LXD via Snap..."
          sudo systemctl start snapd.socket snapd.service >/dev/null 2>&1 || true
          sudo snap wait system seed.loaded >/dev/null 2>&1 || true
          install_ok=0
          for attempt in 1 2 3; do
            echo "LXD install attempt ${attempt}/3"
            if snap list lxd >/dev/null 2>&1; then
              install_ok=1
              break
            fi
            clear_inflight_lxd_change
            if timeout 600 sudo snap install lxd --channel=latest/stable; then
              install_ok=1
              break
            fi
            echo "snap install lxd attempt ${attempt} did not complete cleanly"
            clear_inflight_lxd_change
            sudo snap remove --purge lxd >/dev/null 2>&1 || true
            sudo systemctl restart snapd.socket snapd.service >/dev/null 2>&1 || true
            sudo snap wait system seed.loaded >/dev/null 2>&1 || true
            sleep 15
          done
          if [ "$install_ok" -ne 1 ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "LXD snap install did not complete successfully after retries."
            exit 1
          fi

          echo "LXD installed"
          echo "install_status=success" >> "$GITHUB_OUTPUT"
      
      - name: Get LXD version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(lxd --version)
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected LXD version: $VERSION"
      
      - name: Test 1 - Check Binaries Exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v lxd > /dev/null 2>&1 && command -v lxc > /dev/null 2>&1; then
            echo "✓ lxd and lxc binaries found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ lxd or lxc binary missing"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if lxd --version > /dev/null 2>&1; then
             echo "✓ lxd version works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ lxd version failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Initialize (Dry Run)
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if lxd init --help > /dev/null 2>&1; then
             echo "✓ lxd init help works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ lxd init help failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if lxc remote list > /dev/null 2>&1; then
            echo "✓ lxc remote list executed successfully"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ lxc remote list failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Binaries Exist
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Version
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Initialize (Dry Run)
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_NAME="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --paginate --jq '.jobs[] | [.name, .html_url] | @tsv' 2>/dev/null | awk -F '\t' -v job="$JOB_NAME" '$1 == job " / " job || $1 == job || $1 ~ (" / " job "$") { print $2; exit }' || true)
          if [ -z "${JOB_URL:-}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          
          cat > test-results/lxd.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Canonical LXD",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Containers"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Binaries Exist",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Version",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Initialize (Dry Run)",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/lxd.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lxd-test-results
          path: test-results/lxd.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## LXD Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Binaries Exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Version: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Initialize (Dry Run): ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
