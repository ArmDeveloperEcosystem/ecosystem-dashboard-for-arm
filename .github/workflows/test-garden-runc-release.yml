name: Test Garden-runC Release on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/garden-runc-release.md"
      - ".github/workflows/test-garden-runc-release.yml"

jobs:
  test-garden-runc-release:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=garden-runc-release" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/garden-runc-release" >> "$GITHUB_OUTPUT"

      - name: Install Garden-runC Release
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="1.70.0"
          NEXT_VERSION="1.71.0"
          URL="https://github.com/cloudfoundry/garden-runc-release/releases/download/v${CURRENT_VERSION}/gdn-linux-arm64-${CURRENT_VERSION}"
          TMP_BIN="$(mktemp)"

          curl -fsSL "$URL" -o "$TMP_BIN"
          chmod +x "$TMP_BIN"
          sudo install -m 0755 "$TMP_BIN" /usr/local/bin/gdn

          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "binary_path=/usr/local/bin/gdn" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Garden-runC version
        id: version
        run: |
          set -euo pipefail
          BASELINE="${{ steps.install.outputs.baseline_version }}"
          REPORTED=$(gdn -v 2>&1 | tr -d '\r' | head -n 1 || true)
          if [ -z "$REPORTED" ]; then
            REPORTED="unknown"
          fi
          echo "version=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "reported_version=$REPORTED" >> "$GITHUB_OUTPUT"
          echo "Detected Garden-runC release asset version: $BASELINE"
          echo "gdn -v output: $REPORTED"

      - name: Test 1 - Check gdn binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v gdn >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check gdn version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPORTED="${{ steps.version.outputs.reported_version }}"
          if [ -n "$REPORTED" ] && [ "$REPORTED" != "unknown" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            gdn -v || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check gdn help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          gdn --help >/tmp/gdn-help.log 2>&1 || true
          if grep -qiE "usage|gdn" /tmp/gdn-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/gdn-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check gdn server help output
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          gdn server --help >/tmp/gdn-server-help.log 2>&1 || true
          if grep -qi "server" /tmp/gdn-server-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/gdn-server-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Verify architecture
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.binary_path }}" | grep -Eqi "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "${{ steps.install.outputs.binary_path }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.install.outputs.next_version }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run, but the latest stable upstream Arm64 release could not be resolved for candidate validation." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run, but the latest stable upstream Arm64 release could not be resolved for candidate validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run and is already the latest stable Arm64 candidate for this workflow."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_BIN="$(mktemp)"
          NEXT_URL="https://github.com/cloudfoundry/garden-runc-release/releases/download/v${LATEST}/gdn-linux-arm64-${LATEST}"
          curl -fsSL "$NEXT_URL" -o "$NEXT_BIN"
          chmod +x "$NEXT_BIN"

          NEXT_REPORTED=$("$NEXT_BIN" -v 2>&1 | tr -d '\r' | head -n 1 || true)

          if [ -n "$NEXT_REPORTED" ] \
            && { "$NEXT_BIN" --help >/tmp/gdn-next-help.log 2>&1 || true; grep -qiE "usage|gdn" /tmp/gdn-next-help.log; } \
            && { "$NEXT_BIN" server --help >/tmp/gdn-next-server-help.log 2>&1 || true; grep -qi "server" /tmp/gdn-next-server-help.log; } \
            && file "$NEXT_BIN" | grep -Eqi "aarch64|arm64"; then
            echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release asset ${LATEST} for Arm64. The candidate binary only self-reported '${NEXT_REPORTED}' via gdn -v, so version provenance is taken from the validated upstream release asset while help and server-help checks passed on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $LATEST"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release asset ${LATEST} for Arm64. The candidate binary only self-reported '${NEXT_REPORTED}' via gdn -v, so version provenance is taken from the validated upstream release asset while help and server-help checks passed on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$NEXT_BIN" -v || true
            cat /tmp/gdn-next-help.log || true
            cat /tmp/gdn-next-server-help.log || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Arm64 Garden-runC binary." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Garden-runC version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not validate as a usable Arm64 Garden-runC binary."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          for TEST_ID in 1 2 3 4 5; do
            STATUS_VAR="steps.test${TEST_ID}.outputs.status"
            DURATION_VAR="steps.test${TEST_ID}.outputs.duration"
            STATUS="${{ steps.test1.outputs.status }}"
            if [ "$TEST_ID" = "2" ]; then STATUS="${{ steps.test2.outputs.status }}"; fi
            if [ "$TEST_ID" = "3" ]; then STATUS="${{ steps.test3.outputs.status }}"; fi
            if [ "$TEST_ID" = "4" ]; then STATUS="${{ steps.test4.outputs.status }}"; fi
            if [ "$TEST_ID" = "5" ]; then STATUS="${{ steps.test5.outputs.status }}"; fi
            DURATION="${{ steps.test1.outputs.duration || 0 }}"
            if [ "$TEST_ID" = "2" ]; then DURATION="${{ steps.test2.outputs.duration || 0 }}"; fi
            if [ "$TEST_ID" = "3" ]; then DURATION="${{ steps.test3.outputs.duration || 0 }}"; fi
            if [ "$TEST_ID" = "4" ]; then DURATION="${{ steps.test4.outputs.duration || 0 }}"; fi
            if [ "$TEST_ID" = "5" ]; then DURATION="${{ steps.test5.outputs.duration || 0 }}"; fi
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + DURATION))
          done

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          TEST6_DURATION="${{ steps.test6.outputs.duration || 0 }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + TEST6_DURATION))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results
          cat > test-results/garden-runc-release.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Garden-runC Release",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check gdn binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check gdn version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check gdn help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check gdn server help output",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Verify architecture",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garden-runc-release-test-results
          path: test-results/garden-runc-release.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Garden-runC Release Test Results"
            echo
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check gdn binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check gdn version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check gdn help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Check gdn server help output: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Verify architecture: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
