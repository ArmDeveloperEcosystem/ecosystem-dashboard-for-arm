name: Test Nagios Core on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/nagioscore.md'
      - '.github/workflows/test-nagioscore.yml'

jobs:
  test-nagioscore:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=nagioscore" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/nagioscore" >> "$GITHUB_OUTPUT"

      - name: Install Nagios Core
        id: install
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            autoconf \
            apache2 \
            bc \
            build-essential \
            dc \
            gawk \
            gcc \
            libapache2-mod-php \
            libgd-dev \
            libc6 \
            make \
            monitoring-plugins-basic \
            php \
            tar \
            wget

          BASELINE_TAG="nagios-4.5.11"
          ARCHIVE="https://github.com/NagiosEnterprises/nagioscore/releases/download/${BASELINE_TAG}/${BASELINE_TAG}.tar.gz"

          id -u nagios >/dev/null 2>&1 || sudo useradd nagios
          getent group nagcmd >/dev/null 2>&1 || sudo groupadd nagcmd
          sudo usermod -a -G nagcmd nagios
          sudo usermod -a -G nagcmd www-data

          wget -q "$ARCHIVE" -O nagios.tar.gz
          tar -xzf nagios.tar.gz
          cd "${BASELINE_TAG}"

          ./configure --with-command-group=nagcmd >/dev/null
          make all >/dev/null
          sudo make install >/dev/null
          sudo make install-init >/dev/null
          sudo make install-config >/dev/null
          sudo make install-commandmode >/dev/null

          sudo mkdir -p /usr/local/nagios/libexec
          sudo chmod 755 /usr/local/nagios/bin/nagios /usr/local/nagios/bin/nagiostats
          sudo ln -sf /usr/local/nagios/bin/nagios /usr/local/bin/nagios
          sudo ln -sf /usr/local/nagios/bin/nagiostats /usr/local/bin/nagiostats
          sudo ln -sf /usr/lib/nagios/plugins/* /usr/local/nagios/libexec/

          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"

          if command -v nagios >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Nagios Core version
        id: version
        run: |
          VERSION=$(nagios --version 2>&1 | awk '/^Nagios Core /{print $3}' || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v nagios >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if nagios --version 2>&1 | grep -q '^Nagios Core '; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Configuration Parsing
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          nagios -v /usr/local/nagios/etc/nagios.cfg > nagios-verify.log

          if grep -q 'Things look okay' nagios-verify.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat nagios-verify.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          sudo systemctl start nagios
          sleep 5
          systemctl is-active nagios > nagios-active.txt

          if grep -q '^active$' nagios-active.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo systemctl status nagios --no-pager || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo systemctl stop nagios || true

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASELINE_TAG="${{ steps.install.outputs.baseline_tag }}"
          LATEST_TAG=$(python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/NagiosEnterprises/nagioscore/releases/latest") as response:
              data = json.load(response)

          print(data["tag_name"])
          PY
          )

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ "$LATEST_TAG" = "$BASELINE_TAG" ]; then
            echo "comparison=Current baseline ${BASELINE_TAG} already matches the latest stable upstream release." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            WORKDIR="$RUNNER_TEMP/nagios-next"
            rm -rf "$WORKDIR"
            mkdir -p "$WORKDIR"
            cd "$WORKDIR"

            wget -q "https://github.com/NagiosEnterprises/nagioscore/releases/download/${LATEST_TAG}/${LATEST_TAG}.tar.gz" -O nagios-next.tar.gz
            tar -xzf nagios-next.tar.gz
            cd "$LATEST_TAG"
            ./configure --with-command-group=nagcmd >/dev/null
            make all >/dev/null

            if ./base/nagios --version 2>&1 | grep -q '^Nagios Core '; then
              echo "comparison=Current baseline ${BASELINE_TAG} passed; next stable release ${LATEST_TAG} also built and reported a valid Nagios version on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "comparison=Current baseline ${BASELINE_TAG} passed, but next stable release ${LATEST_TAG} did not build cleanly on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/nagioscore.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Nagios Core",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Binary Existence",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Configuration Parsing",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nagioscore-test-results
          path: test-results/nagioscore.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          echo "## Nagios Core Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned baseline tag:** ${{ steps.install.outputs.baseline_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Baseline version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest stable release checked:** ${{ steps.test6.outputs.latest_tag || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Configuration Parsing: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison not available.' }}" >> "$GITHUB_STEP_SUMMARY"
