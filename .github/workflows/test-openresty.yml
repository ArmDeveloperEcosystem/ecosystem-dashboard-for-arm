name: Test OpenResty on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/openresty.md"
      - ".github/workflows/test-openresty.yml"

jobs:
  test-openresty:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openresty" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openresty" >> "$GITHUB_OUTPUT"
          echo "current_version=1.27.1.1" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_yet_checked" >> "$GITHUB_OUTPUT"

      - name: Install OpenResty
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpcre3-dev \
            libssl-dev \
            perl \
            make \
            wget \
            zlib1g-dev \
            libxslt1-dev \
            libgd-dev \
            libgeoip-dev \
            curl
          rm -rf /tmp/openresty-build
          mkdir -p /tmp/openresty-build
          cd /tmp/openresty-build
          wget -q "https://openresty.org/download/openresty-${VERSION}.tar.gz"
          tar -xzf "openresty-${VERSION}.tar.gz"
          cd "openresty-${VERSION}"
          ./configure --prefix=/opt/openresty >/tmp/openresty-configure.txt 2>&1
          make -j"$(nproc)" >/tmp/openresty-make.txt 2>&1
          sudo make install >/tmp/openresty-install.txt 2>&1
          if [ -x /opt/openresty/nginx/sbin/nginx ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openresty-configure.txt || true
            cat /tmp/openresty-make.txt || true
            cat /tmp/openresty-install.txt || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get OpenResty version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(/opt/openresty/nginx/sbin/nginx -V 2>&1 | sed -n 's/.*openresty\/\([^ ]*\).*/\1/p' | head -1)
          LATEST=$(python3 - <<'PY'
          import re, urllib.request
          html = urllib.request.urlopen("https://openresty.org/en/download.html", timeout=20).read().decode("utf-8", "ignore")
          versions = sorted(set(re.findall(r'openresty-(\d+\.\d+\.\d+\.\d+)\.tar\.gz', html)), key=lambda s: [int(x) for x in s.split('.')])
          print(versions[-1] if versions else "unknown")
          PY
          )
          echo "version=${VERSION:-${{ steps.metadata.outputs.current_version }}}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x /opt/openresty/nginx/sbin/nginx ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if /opt/openresty/nginx/sbin/nginx -V 2>&1 | grep -q "openresty/${{ steps.metadata.outputs.current_version }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          mkdir -p /tmp/openresty-config
          cd /tmp/openresty-config
          cat > nginx.conf <<'EOF'
          worker_processes 1;
          events { worker_connections 1024; }
          http {
            server {
              listen 8081;
              location / {
                return 200 "openresty-ok\n";
              }
            }
          }
          EOF
          mkdir -p logs
          if /opt/openresty/nginx/sbin/nginx -t -p "$(pwd)" -c nginx.conf >/tmp/openresty-test.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openresty-test.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd /tmp/openresty-config
          /opt/openresty/nginx/sbin/nginx -p "$(pwd)" -c nginx.conf
          cleanup() {
            /opt/openresty/nginx/sbin/nginx -p "$(pwd)" -s quit >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8081/ >/tmp/openresty-body.txt 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if grep -q "openresty-ok" /tmp/openresty-body.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openresty-body.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenResty version $CURRENT passed smoke tests in this run, but the next stable version could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMPDIR=$(mktemp -d)
          NEXT_ARCHIVE="$TMPDIR/openresty-${LATEST}.tar.gz"
          NEXT_PREFIX="$TMPDIR/install/openresty"
          NEXT_ROOT="$TMPDIR/runtime"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "https://openresty.org/download/openresty-${LATEST}.tar.gz" -o "$NEXT_ARCHIVE"
          tar -xzf "$NEXT_ARCHIVE" -C "$TMPDIR"
          cd "$TMPDIR/openresty-${LATEST}"
          ./configure --prefix="$NEXT_PREFIX" >/tmp/openresty-next-configure.txt 2>&1
          make -j"$(nproc)" >/tmp/openresty-next-make.txt 2>&1
          make install >/tmp/openresty-next-install.txt 2>&1

          NEXT_BIN="$NEXT_PREFIX/nginx/sbin/nginx"
          NEXT_REPORTED=$("$NEXT_BIN" -V 2>&1 | sed -n 's/.*openresty\/\([^ ]*\).*/\1/p' | head -1 || true)
          mkdir -p "$NEXT_ROOT/logs"
          cat > "$NEXT_ROOT/nginx.conf" <<'EOF'
          worker_processes 1;
          events { worker_connections 1024; }
          http {
            server {
              listen 8082;
              location / {
                return 200 "openresty-next-ok\n";
              }
            }
          }
          EOF

          if [ -x "$NEXT_BIN" ] \
            && [ "$NEXT_REPORTED" = "$LATEST" ] \
            && "$NEXT_BIN" -t -p "$NEXT_ROOT" -c nginx.conf >/tmp/openresty-next-test.txt 2>&1 \
            && file "$NEXT_BIN" | grep -Eqi 'aarch64|arm64|ARM aarch64'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenResty version $CURRENT passed smoke tests in this run. Regression validation built and installed candidate version $LATEST in an isolated Arm64 prefix, and the candidate nginx binary reported version $NEXT_REPORTED while passing configuration validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openresty-next-configure.txt || true
            cat /tmp/openresty-next-make.txt || true
            cat /tmp/openresty-next-install.txt || true
            cat /tmp/openresty-next-test.txt || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenResty version $CURRENT passed smoke tests in this run, but the candidate source release $LATEST did not complete a clean Arm64 build/install/config validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)

          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results
          cat > test-results/openresty.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenResty",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Version Output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Configuration", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openresty-test-results
          path: test-results/openresty.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## OpenResty Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Current pinned version was smoke-tested in this run.' }}" >> "$GITHUB_STEP_SUMMARY"
