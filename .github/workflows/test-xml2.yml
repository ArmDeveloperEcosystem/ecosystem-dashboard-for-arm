name: Test Xml2 on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/xml2.md"
      - ".github/workflows/test-xml2.yml"

jobs:
  test-xml2:
    runs-on: ubuntu-24.04-arm
    env:
      XML2_VERSION: "1.3.6"
      XML2_LIB: "/tmp/xml2-r-lib"
      XML2_USER_LIB: "/tmp/xml2-r-user-lib"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=xml2" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/xml2" >> "$GITHUB_OUTPUT"

      - name: Install Xml2
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y r-base build-essential libxml2-dev libcurl4-openssl-dev pkg-config

          mkdir -p "${XML2_LIB}" "${XML2_USER_LIB}"
          Rscript -e '.libPaths(c(Sys.getenv("XML2_USER_LIB"), .libPaths())); install.packages("remotes", repos = "https://cloud.r-project.org", lib = Sys.getenv("XML2_USER_LIB"))'
          Rscript -e '
            dir.create(Sys.getenv("XML2_LIB"), showWarnings = FALSE, recursive = TRUE)
            dir.create(Sys.getenv("XML2_USER_LIB"), showWarnings = FALSE, recursive = TRUE)
            .libPaths(c(Sys.getenv("XML2_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths()))
            remotes::install_version(
              "xml2",
              version = Sys.getenv("XML2_VERSION"),
              lib = Sys.getenv("XML2_LIB"),
              upgrade = "never",
              quiet = TRUE
            )'

          if command -v Rscript >/dev/null 2>&1 && [ -f "${XML2_LIB}/xml2/DESCRIPTION" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Xml2 version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(Rscript -e '.libPaths(c(Sys.getenv("XML2_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths())); cat(as.character(packageVersion("xml2")))' | tr -d '\n' || echo "unknown")
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request

          text = urllib.request.urlopen("https://cloud.r-project.org/src/contrib/PACKAGES", timeout=20).read().decode()
          match = re.search(r"Package: xml2\nVersion: ([^\n]+)", text)
          print(match.group(1) if match else "unknown")
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Package Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v R >/dev/null 2>&1 && command -v Rscript >/dev/null 2>&1 && [ -f "${XML2_LIB}/xml2/DESCRIPTION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(Rscript -e '.libPaths(c(Sys.getenv("XML2_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths())); cat(as.character(packageVersion("xml2")))' | tr -d '\n')
          if [ "${VERSION_OUTPUT}" = "${XML2_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${VERSION_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          HELP_OUTPUT=$(Rscript -e '.libPaths(c(Sys.getenv("XML2_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths())); library(help = "xml2")' 2>&1)
          if printf '%s\n' "${HELP_OUTPUT}" | grep -qi "Information on package"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${HELP_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          LIB_PATH=$(find "${XML2_LIB}" -path '*/xml2/libs/xml2.so' | head -n 1)
          if [ -n "${LIB_PATH}" ] && file "${LIB_PATH}" | grep -qi 'aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${LIB_PATH}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional XML And HTML Smoke
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          OUTPUT=$(Rscript - <<'RS'
          .libPaths(c(Sys.getenv("XML2_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths()))
          suppressPackageStartupMessages(library(xml2))
          doc <- read_xml("<root><item id='a'>arm64</item></root>")
          html <- read_html("<html><body><p>Hello</p></body></html>")
          node_text <- xml_text(xml_find_first(doc, ".//item"))
          html_text <- xml_text(xml_find_first(html, ".//p"))
          stopifnot(node_text == "arm64")
          stopifnot(html_text == "Hello")
          cat(node_text, html_text, "\n")
          RS
          )
          if printf '%s\n' "${OUTPUT}" | grep -q 'arm64 Hello'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          XML2_NEXT_LIB="/tmp/xml2-r-lib-next"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned xml2 version ${CURRENT} passed smoke tests in this run, but the latest stable xml2 release could not be resolved for isolated Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${XML2_NEXT_LIB}"
          mkdir -p "${XML2_NEXT_LIB}"
          XML2_NEXT_LIB="${XML2_NEXT_LIB}" XML2_USER_LIB="${XML2_USER_LIB}" LATEST="${LATEST}" Rscript -e '
            dir.create(Sys.getenv("XML2_NEXT_LIB"), showWarnings = FALSE, recursive = TRUE)
            dir.create(Sys.getenv("XML2_USER_LIB"), showWarnings = FALSE, recursive = TRUE)
            .libPaths(c(Sys.getenv("XML2_NEXT_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths()))
            remotes::install_version(
              "xml2",
              version = Sys.getenv("LATEST"),
              lib = Sys.getenv("XML2_NEXT_LIB"),
              upgrade = "never",
              quiet = TRUE
            )'

          NEXT_INSTALLED_VERSION=$(XML2_NEXT_LIB="${XML2_NEXT_LIB}" XML2_USER_LIB="${XML2_USER_LIB}" Rscript -e '.libPaths(c(Sys.getenv("XML2_NEXT_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths())); cat(as.character(packageVersion("xml2")))' | tr -d '\n' || echo "unknown")
          OUTPUT=$(XML2_NEXT_LIB="${XML2_NEXT_LIB}" XML2_USER_LIB="${XML2_USER_LIB}" Rscript - <<'RS' 2>&1
          .libPaths(c(Sys.getenv("XML2_NEXT_LIB"), Sys.getenv("XML2_USER_LIB"), .libPaths()))
          suppressPackageStartupMessages(library(xml2))
          doc <- read_xml("<root><item id='a'>arm64</item></root>")
          html <- read_html("<html><body><p>Hello</p></body></html>")
          node_text <- xml_text(xml_find_first(doc, ".//item"))
          html_text <- xml_text(xml_find_first(html, ".//p"))
          stopifnot(node_text == "arm64")
          stopifnot(html_text == "Hello")
          cat(node_text, html_text, "\n")
          RS
          )

          if [ "${NEXT_INSTALLED_VERSION}" != "unknown" ] && printf '%s\n' "${OUTPUT}" | grep -q 'arm64 Hello'; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned xml2 version ${CURRENT} already matches the latest stable release. Regression validation reinstalled the package in an isolated Arm64 R library and reconfirmed XML and HTML parsing smoke successfully." >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned xml2 version ${CURRENT} passed smoke tests in this run, and candidate release ${LATEST} also passed isolated Arm64 install plus XML and HTML parsing smoke successfully." >> "$GITHUB_OUTPUT"
            fi
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${OUTPUT}" || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned xml2 version ${CURRENT} passed smoke tests in this run, but candidate release ${LATEST} did not complete isolated Arm64 install plus XML and HTML parsing smoke successfully." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
            if job.get("name") in (f"{job_id} / {job_id}", job_id):
              print(job.get("html_url", ""))
              break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/xml2.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Xml2",
              "version": "${{ steps.version.outputs.version }}",
              "language": "R",
              "category": "Data-format"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Package existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Exact version check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional XML and HTML smoke", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xml2-test-results
          path: test-results/xml2.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Xml2 Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Package existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional XML and HTML smoke: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
