name: Test Sqoop on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-sqoop.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-sqoop.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-sqoop.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-sqoop.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-sqoop.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-sqoop.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-sqoop.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-sqoop.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-sqoop.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-sqoop.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-sqoop.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-sqoop.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-sqoop.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-sqoop.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-sqoop.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-sqoop.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-sqoop.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-sqoop.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-sqoop.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-sqoop.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-sqoop.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-sqoop.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-sqoop.outputs.timestamp }}
jobs:
  test-sqoop:
    runs-on: ubuntu-24.04-arm
    env:
      SQOOP_VERSION: "1.99.4"
      SQOOP_ARCHIVE_BASENAME: "sqoop-1.99.4-bin-hadoop200"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Sqoop'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=sqoop" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/sqoop" >> "$GITHUB_OUTPUT"
          echo "current_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Sqoop baseline
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl file"
          ROOT="/opt/sqoop-smoke/current"
          sudo mkdir -p /opt/sqoop-smoke

          download_sqoop_tarball() {
            local version="$1"
            local dest="$2"
            local filename="$3"
            local primary_url="https://downloads.apache.org/sqoop/${version}/${filename}"
            local archive_url="https://archive.apache.org/dist/sqoop/${version}/${filename}"
            if curl -fL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 900 --progress-bar -o "$dest" "$primary_url"; then
              return 0
            fi
            if curl -fL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 900 --progress-bar -o "$dest" "$archive_url"; then
              return 0
            fi
            wget -4 --tries=5 --timeout=30 --waitretry=5 -O "$dest" "$archive_url"
          }

          if ! download_sqoop_tarball "$SQOOP_VERSION" /tmp/sqoop-baseline.tar.gz "${SQOOP_ARCHIVE_BASENAME}.tar.gz"; then
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          sudo tar -xzf /tmp/sqoop-baseline.tar.gz -C /opt/sqoop-smoke
          sudo mv "/opt/sqoop-smoke/${SQOOP_ARCHIVE_BASENAME}" "$ROOT"
          sudo chmod +x "$ROOT"/bin/*

          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'show version\n' > /tmp/sqoop-show-version.script
          VERSION=$(sqoop2-shell /tmp/sqoop-show-version.script 2>&1 | grep -Eo 'Sqoop [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' | head -1 || true)

          if [ "$VERSION" = "$SQOOP_VERSION" ]; then
            echo "root=$ROOT" >> "$GITHUB_OUTPUT"
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            sqoop2-tool version || true
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=version_mismatch" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Sqoop version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "version=${{ steps.install.outputs.baseline_version || steps.metadata.outputs.current_version || 'unknown' }}" >> "$GITHUB_OUTPUT"
            echo "latest=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${{ steps.install.outputs.root }}"
          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'show version\n' > /tmp/sqoop-show-version.script
          VERSION=$(sqoop2-shell /tmp/sqoop-show-version.script 2>&1 | grep -Eo 'Sqoop [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' | head -1 || echo "unknown")
          LATEST=$(CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import urllib.request

          current = os.environ.get("CURRENT_VERSION", "")
          current_parts = tuple(int(x) for x in current.split(".")) if re.fullmatch(r"\d+\.\d+\.\d+", current) else ()
          html = urllib.request.urlopen("https://archive.apache.org/dist/sqoop/", timeout=20).read().decode("utf-8", "ignore")
          versions = sorted(
              {
                  tuple(int(x) for x in match.split("."))
                  for match in re.findall(r'href="(\d+\.\d+\.\d+)/"', html)
              }
          )
          next_versions = [version for version in versions if version > current_parts]
          print(".".join(str(x) for x in next_versions[0]) if next_versions else "unknown")
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Sqoop version: $VERSION"
          echo "Detected latest archived Sqoop release: $LATEST"

      - name: Test 1 - Check Sqoop launchers exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${{ steps.install.outputs.root }}"
          if [ -x "$ROOT/bin/sqoop2-tool" ] && [ -x "$ROOT/bin/sqoop2-shell" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${{ steps.install.outputs.root }}"
          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'show version\n' > /tmp/sqoop-show-version.script
          VERSION_OUTPUT=$(sqoop2-shell /tmp/sqoop-show-version.script 2>&1 || true)
          echo "$VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -Fq "Sqoop $SQOOP_VERSION"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check shell help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${{ steps.install.outputs.root }}"
          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'help\n' > /tmp/sqoop-help.script
          sqoop2-shell /tmp/sqoop-help.script >/tmp/sqoop-shell-help.txt 2>&1 || true
          if grep -Eqi 'Available commands|Display this help message|sqoop:' /tmp/sqoop-shell-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sqoop-shell-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check show version shell command
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${{ steps.install.outputs.root }}"
          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'show version\n' > /tmp/sqoop-show-version.script
          sqoop2-shell /tmp/sqoop-show-version.script >/tmp/sqoop-shell-version.txt 2>&1 || true
          if grep -Fq "Sqoop $SQOOP_VERSION" /tmp/sqoop-shell-version.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sqoop-shell-version.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          INSTALL_STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"

          if [ "$INSTALL_STATUS" != "success" ]; then
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but the latest archived upstream release could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          NEXT_ARCHIVE="$TMPDIR/sqoop-${LATEST}.tar.gz"
          NEXT_ROOT="$TMPDIR/sqoop-${LATEST}"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          if ! download_sqoop_tarball "$LATEST" "$NEXT_ARCHIVE" "sqoop-${LATEST}-bin-hadoop200.tar.gz"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          mkdir -p "$NEXT_ROOT"
          tar -xzf "$NEXT_ARCHIVE" -C "$TMPDIR"
          NEXT_DIST="$TMPDIR/sqoop-${LATEST}-bin-hadoop200"
          chmod +x "$NEXT_DIST"/bin/*

          export SQOOP_HOME="$NEXT_DIST"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          printf 'help\n' > /tmp/sqoop-next-help.script
          printf 'show version\n' > /tmp/sqoop-next-show-version.script
          NEXT_VERSION=$(sqoop2-shell /tmp/sqoop-next-show-version.script 2>&1 | grep -Eo 'Sqoop [0-9]+\.[0-9]+\.[0-9]+' | awk '{print $2}' | head -1 || true)

          sqoop2-shell /tmp/sqoop-next-help.script >/tmp/sqoop-next-shell-help.txt 2>&1 || true
          sqoop2-shell /tmp/sqoop-next-show-version.script >/tmp/sqoop-next-shell-version.txt 2>&1 || true
          if [ "$NEXT_VERSION" = "$LATEST" ] && \
             grep -Eqi 'Available commands|Display this help message|sqoop:' /tmp/sqoop-next-shell-help.txt && \
             grep -Fq "Sqoop $LATEST" /tmp/sqoop-next-shell-version.txt; then
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run. Regression validation downloaded archived release $LATEST, and the isolated candidate environment completed the real shell-script help and show-version paths while reporting version $NEXT_VERSION on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_VERSION"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sqoop-next-shell-help.txt || true
            cat /tmp/sqoop-next-shell-version.txt || true
            echo "next_installed_version=${NEXT_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST did not complete the expected shell-script validation path on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          INSTALL_STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"

          if [ "$INSTALL_STATUS" != "success" ]; then
            FAILED=1
            SKIPPED=5
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
            if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
              PASSED=1
              SKIPPED=4
            elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then
              FAILED=2
              SKIPPED=4
            fi
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
            echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
            echo "core_failed=1" >> "$GITHUB_OUTPUT"
            echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'failed' }}" = "skipped" ]; then
            SKIPPED=$((SKIPPED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Sqoop Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
