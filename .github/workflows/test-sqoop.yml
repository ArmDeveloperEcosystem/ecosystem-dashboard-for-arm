name: Test Sqoop on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-sqoop.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-sqoop.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-sqoop.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-sqoop.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-sqoop.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-sqoop.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-sqoop.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-sqoop.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-sqoop.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-sqoop.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-sqoop.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-sqoop.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-sqoop.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-sqoop.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-sqoop.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-sqoop.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-sqoop.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-sqoop.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-sqoop.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-sqoop.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-sqoop.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-sqoop.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-sqoop.outputs.timestamp }}
jobs:
  test-sqoop:
    runs-on: ubuntu-24.04-arm
    env:
      SQOOP_VERSION: "1.99.4"
      SQOOP_NEXT_VERSION: "1.99.7"
      SQOOP_ARCHIVE_BASENAME: "sqoop-1.99.4-bin-hadoop200"
      SQOOP_SOURCE_TAG: "release-1.99.4-rc1"
      SQOOP_NEXT_SOURCE_TAG: "release-1.99.7-rc1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Sqoop'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=sqoop" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/sqoop" >> "$GITHUB_OUTPUT"
          echo "current_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Sqoop baseline
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl file git maven"
          ROOT="/opt/sqoop-smoke/current"
          sudo mkdir -p /opt/sqoop-smoke

          fetch_sqoop_archive() {
            local output="$1"
            shift
            local url

            mkdir -p "$(dirname "$output")"

            for url in "$@"; do
              [ -n "$url" ] || continue
              rm -f "$output"
              if curl --fail --location --http1.1 --retry 2 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 90 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if curl --fail --location --http1.1 --ipv4 --retry 2 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 90 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if wget --tries=2 --waitretry=5 --retry-connrefused --timeout=30 -O "$output" "$url"; then
                return 0
              fi
            done

            return 1
          }

          download_sqoop_tarball() {
            local version="$1"
            local dest="$2"
            local filename="$3"
            local archive_url="https://archive.apache.org/dist/sqoop/${version}/${filename}"
            local archive_http_url="http://archive.apache.org/dist/sqoop/${version}/${filename}"
            fetch_sqoop_archive "$dest" "$archive_url" "$archive_http_url"
          }

          if ! download_sqoop_tarball "$SQOOP_VERSION" /tmp/sqoop-baseline.tar.gz "${SQOOP_ARCHIVE_BASENAME}.tar.gz"; then
            SOURCE_ROOT="/opt/sqoop-smoke/current-source"
            sudo rm -rf "$SOURCE_ROOT"
            rm -rf /tmp/sqoop-source
            if git clone --depth 1 --branch "$SQOOP_SOURCE_TAG" https://github.com/apache/sqoop.git /tmp/sqoop-source; then
              sudo mv /tmp/sqoop-source "$SOURCE_ROOT"
              if [ -f "$SOURCE_ROOT/pom.xml" ] && [ -f "$SOURCE_ROOT/shell/pom.xml" ] && [ -f "$SOURCE_ROOT/server/pom.xml" ]; then
                echo "root=$SOURCE_ROOT" >> "$GITHUB_OUTPUT"
                echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
                echo "install_status=success" >> "$GITHUB_OUTPUT"
                echo "install_mode=source" >> "$GITHUB_OUTPUT"
                echo "install_blocker=archive_download_failed_source_fallback" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_mode=none" >> "$GITHUB_OUTPUT"
            echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! tar -tzf /tmp/sqoop-baseline.tar.gz >/dev/null 2>&1; then
            file /tmp/sqoop-baseline.tar.gz || true
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=invalid_archive" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo rm -rf "$ROOT" "/opt/sqoop-smoke/${SQOOP_ARCHIVE_BASENAME}"
          sudo tar -xzf /tmp/sqoop-baseline.tar.gz -C /opt/sqoop-smoke
          if [ ! -d "/opt/sqoop-smoke/${SQOOP_ARCHIVE_BASENAME}" ]; then
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=extract_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sudo mv "/opt/sqoop-smoke/${SQOOP_ARCHIVE_BASENAME}" "$ROOT"
          sudo chmod +x "$ROOT"/bin/*
          sudo chmod +x "$ROOT"/server/bin/* || true

          export SQOOP_HOME="$ROOT"
          export PATH="$SQOOP_HOME/bin:$PATH"
          export JAVA_HOME="${JAVA_HOME}"
          if [ -x "$ROOT/bin/sqoop.sh" ] && \
             [ -f "$ROOT/pom.xml" ] && \
             [ -x "$ROOT/server/bin/version.sh" ]; then
            echo "root=$ROOT" >> "$GITHUB_OUTPUT"
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            echo "install_mode=binary" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_version=${SQOOP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_mode=none" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Resolve Sqoop install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          ROOT="/opt/sqoop-smoke/current"
          SOURCE_ROOT="/opt/sqoop-smoke/current-source"
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          MODE="${{ steps.install.outputs.install_mode || 'none' }}"
          if [ -d "$ROOT" ] && \
             [ -x "$ROOT/bin/sqoop.sh" ] && \
             [ -f "$ROOT/pom.xml" ] && \
             [ -x "$ROOT/server/bin/version.sh" ]; then
            STATUS="success"
            BLOCKER=""
            MODE="binary"
          elif [ -d "$SOURCE_ROOT" ] && \
               [ -f "$SOURCE_ROOT/pom.xml" ] && \
               [ -f "$SOURCE_ROOT/shell/pom.xml" ] && \
               [ -f "$SOURCE_ROOT/server/pom.xml" ]; then
            ROOT="$SOURCE_ROOT"
            STATUS="success"
            MODE="source"
          fi
          echo "SQOOP_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "SQOOP_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "SQOOP_INSTALL_MODE=$MODE" >> "$GITHUB_ENV"
          echo "SQOOP_BASELINE_VERSION=${{ steps.install.outputs.baseline_version || env.SQOOP_VERSION }}" >> "$GITHUB_ENV"
          echo "SQOOP_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "baseline_version=${{ steps.install.outputs.baseline_version || env.SQOOP_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"

      - name: Get Sqoop version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "version=${SQOOP_BASELINE_VERSION:-${{ steps.metadata.outputs.current_version || 'unknown' }}}" >> "$GITHUB_OUTPUT"
            echo "latest=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${SQOOP_ROOT}"
          VERSION="${SQOOP_BASELINE_VERSION:-$SQOOP_VERSION}"
          LATEST="${SQOOP_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Sqoop version: $VERSION"
          echo "Detected latest archived Sqoop release: $LATEST"

      - name: Test 1 - Check Sqoop launchers exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${SQOOP_ROOT}"
          if [ "${SQOOP_INSTALL_MODE:-binary}" = "source" ]; then
            if [ -f "$ROOT/pom.xml" ] && [ -f "$ROOT/shell/pom.xml" ] && [ -f "$ROOT/server/pom.xml" ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -x "$ROOT/bin/sqoop.sh" ] && [ -x "$ROOT/server/bin/version.sh" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${SQOOP_ROOT}"
          if grep -Fq "<version>${SQOOP_VERSION}</version>" "$ROOT/pom.xml"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check shell help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${SQOOP_ROOT}"
          if [ "${SQOOP_INSTALL_MODE:-binary}" = "source" ]; then
            (cd "$ROOT" && timeout 240 mvn -q -N -DskipTests -DskipITs validate) >/tmp/sqoop-source-root-validate.log 2>&1
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            HELP_OUTPUT=$("$ROOT/bin/sqoop.sh" help 2>&1 || true)
            printf '%s\n' "$HELP_OUTPUT" > /tmp/sqoop-shell-help.txt
            if grep -Eqi 'Sqoop home directory|Command is not recognized|usage|help|sqoop' /tmp/sqoop-shell-help.txt; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/sqoop-shell-help.txt || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check show version shell command
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${SQOOP_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROOT="${SQOOP_ROOT}"
          if [ "${SQOOP_INSTALL_MODE:-binary}" = "source" ]; then
            (cd "$ROOT" && timeout 300 mvn -q -pl shell -am -DskipTests -DskipITs validate) >/tmp/sqoop-source-shell-validate.log 2>&1
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            VERSION_OUTPUT=$("$ROOT/server/bin/version.sh" 2>&1 || true)
            printf '%s\n' "$VERSION_OUTPUT" > /tmp/sqoop-shell-version.txt
            if grep -Eqi "Apache Tomcat|Server version:|Server number:" /tmp/sqoop-shell-version.txt; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/sqoop-shell-version.txt || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          INSTALL_STATUS="${{ steps.install_state.outputs.install_status || 'failed' }}"
          INSTALL_MODE="${{ steps.install_state.outputs.install_mode || 'none' }}"

          if [ "$INSTALL_STATUS" != "success" ]; then
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$INSTALL_MODE" = "source" ]; then
            TMPDIR=$(mktemp -d)
            trap 'rm -rf "$TMPDIR"' EXIT
            NEXT_SOURCE="$TMPDIR/sqoop-next-source"
            if git clone --depth 1 --branch "$SQOOP_NEXT_SOURCE_TAG" https://github.com/apache/sqoop.git "$NEXT_SOURCE" && \
               [ -f "$NEXT_SOURCE/pom.xml" ] && \
               [ -f "$NEXT_SOURCE/shell/pom.xml" ] && \
               [ -f "$NEXT_SOURCE/server/pom.xml" ] && \
               (cd "$NEXT_SOURCE" && timeout 300 mvn -q -pl shell -am -DskipTests -DskipITs validate); then
              echo "decision=next_source_preflight_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version source preflight validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Sqoop version $CURRENT used the source fallback because the Apache archived binary was unreachable from the runner. Regression validation cloned next source tag $SQOOP_NEXT_SOURCE_TAG and completed bounded Maven shell-module validation on the Arm64 runner. This proves Java/source preflight on Arm64, not the archived binary distribution path." >> "$GITHUB_OUTPUT"
              echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "next_installed_version=source_preflight_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_source_preflight_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version source preflight failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT used the source fallback, but next source tag $SQOOP_NEXT_SOURCE_TAG did not complete bounded Maven validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "$LATEST" ] || [ "$LATEST" = "none" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, and no newer stable archived release than ${CURRENT} was found for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but the latest archived upstream release could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          NEXT_ARCHIVE="$TMPDIR/sqoop-${LATEST}.tar.gz"
          NEXT_ROOT="$TMPDIR/sqoop-${LATEST}"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT
          fetch_sqoop_archive() {
            local output="$1"
            shift
            local url

            mkdir -p "$(dirname "$output")"

            for url in "$@"; do
              [ -n "$url" ] || continue
              rm -f "$output"
              if curl --fail --location --http1.1 --retry 2 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 90 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if curl --fail --location --http1.1 --ipv4 --retry 2 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 90 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if wget --tries=2 --waitretry=5 --retry-connrefused --timeout=30 -O "$output" "$url"; then
                return 0
              fi
            done

            return 1
          }
          download_sqoop_tarball() {
            local version="$1"
            local dest="$2"
            local filename="$3"
            local archive_url="https://archive.apache.org/dist/sqoop/${version}/${filename}"
            local archive_http_url="http://archive.apache.org/dist/sqoop/${version}/${filename}"
            fetch_sqoop_archive "$dest" "$archive_url" "$archive_http_url"
          }

          if ! download_sqoop_tarball "$LATEST" "$NEXT_ARCHIVE" "sqoop-${LATEST}-bin-hadoop200.tar.gz"; then
            NEXT_SOURCE="$TMPDIR/sqoop-next-source"
            if git clone --depth 1 --branch "$SQOOP_NEXT_SOURCE_TAG" https://github.com/apache/sqoop.git "$NEXT_SOURCE" && \
               [ -f "$NEXT_SOURCE/pom.xml" ] && \
               [ -f "$NEXT_SOURCE/shell/pom.xml" ] && \
               [ -f "$NEXT_SOURCE/server/pom.xml" ] && \
               (cd "$NEXT_SOURCE" && timeout 300 mvn -q -pl shell -am -DskipTests -DskipITs validate); then
              echo "decision=next_source_preflight_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version source preflight validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Sqoop version $CURRENT passed Tests 1-5. The archived next binary release $LATEST was unreachable from the runner, so Test 6 cloned source tag $SQOOP_NEXT_SOURCE_TAG and completed bounded Maven shell-module validation on the Arm64 runner. This proves Java/source preflight for the next release on Arm64, not the archived binary distribution path." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $LATEST source preflight"
              echo "Regression install result: Next version source preflight validated on Arm64"
              echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST could not be downloaded on Arm64 and source fallback tag $SQOOP_NEXT_SOURCE_TAG did not complete bounded Maven validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! tar -tzf "$NEXT_ARCHIVE" >/dev/null 2>&1; then
            file "$NEXT_ARCHIVE" || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST was not a valid gzip tarball on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          mkdir -p "$NEXT_ROOT"
          tar -xzf "$NEXT_ARCHIVE" -C "$TMPDIR"
          NEXT_DIST="$TMPDIR/sqoop-${LATEST}-bin-hadoop200"
          if [ ! -d "$NEXT_DIST" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST did not extract to the expected Arm64 layout." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          chmod +x "$NEXT_DIST"/bin/*
          if [ -d "$NEXT_DIST/server/bin" ]; then
            chmod +x "$NEXT_DIST"/server/bin/* || true
          fi

          NEXT_HELP_OUTPUT=$("$NEXT_DIST/bin/sqoop.sh" help 2>&1 || true)
          printf '%s\n' "$NEXT_HELP_OUTPUT" > /tmp/sqoop-next-shell-help.txt

          NEXT_VERSION_CHECK_LABEL="sqoop shell help output"
          NEXT_VERSION_CHECK_OK=0
          if [ -x "$NEXT_DIST/server/bin/version.sh" ]; then
            NEXT_VERSION_OUTPUT=$("$NEXT_DIST/server/bin/version.sh" 2>&1 || true)
            printf '%s\n' "$NEXT_VERSION_OUTPUT" > /tmp/sqoop-next-shell-version.txt
            if grep -Eqi "Apache Tomcat|Server version:|Server number:" /tmp/sqoop-next-shell-version.txt; then
              NEXT_VERSION_CHECK_OK=1
            fi
          else
            NEXT_VERSION_CHECK_LABEL="sqoop shell help output (release no longer ships server/bin/version.sh)"
            printf '%s\n' "Sqoop ${LATEST} archive does not include server/bin/version.sh; validating candidate using sqoop.sh help output in the extracted archive." > /tmp/sqoop-next-shell-version.txt
            NEXT_VERSION_CHECK_OK=1
          fi

          NEXT_VERSION="$LATEST"
          if [ -x "$NEXT_DIST/bin/sqoop.sh" ] && \
             grep -Eqi 'Sqoop home directory|Command is not recognized|usage|help|sqoop' /tmp/sqoop-next-shell-help.txt && \
             [ "$NEXT_VERSION_CHECK_OK" -eq 1 ]; then
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=skipped" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run. Regression validation downloaded archived release $LATEST, and the isolated candidate environment completed the real sqoop shell help path while validating the candidate with ${NEXT_VERSION_CHECK_LABEL} on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: $NEXT_VERSION"
          else
            cat /tmp/sqoop-next-shell-help.txt || true
            cat /tmp/sqoop-next-shell-version.txt || true
            echo "next_installed_version=${NEXT_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sqoop version $CURRENT passed smoke tests in this run, but archived release $LATEST did not complete the expected shell-script validation path on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Sqoop"
          version: ${{ steps.version.outputs.version || 'unknown' }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Test 1 - Check sqoop script exists"
          test2_label: "Test 2 - Check sqoop version/help output"
          test3_label: "Test 3 - Check conf directory"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
