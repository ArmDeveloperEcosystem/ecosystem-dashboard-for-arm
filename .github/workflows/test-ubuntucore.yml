name: Test Ubuntu Core on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ubuntucore.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ubuntucore.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ubuntucore.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ubuntucore.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ubuntucore.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ubuntucore.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ubuntucore.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ubuntucore.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ubuntucore.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ubuntucore.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ubuntucore.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ubuntucore.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ubuntucore.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ubuntucore.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ubuntucore.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ubuntucore.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ubuntucore.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ubuntucore.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ubuntucore.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ubuntucore.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ubuntucore.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ubuntucore.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ubuntucore.outputs.timestamp }}
jobs:
  test-ubuntucore:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "20"
      BASE_PORTAL: "https://cdimage.ubuntu.com/ubuntu-core"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Ubuntu Core'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ubuntucore" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ubuntucore" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Ubuntu Core test dependencies
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl python3 xz-utils"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Resolve Ubuntu Core versions
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request

          base_url = "https://cdimage.ubuntu.com/ubuntu-core/"
          html = urllib.request.urlopen(base_url, timeout=20).read().decode()
          versions = sorted({int(v) for v in re.findall(r'href="([0-9]+)/"', html)})
          stable_versions = []
          for version in versions:
              image_name = f"ubuntu-core-{version}-arm64+raspi.img.xz"
              index_url = f"{base_url}{version}/stable/current/"
              try:
                  index = urllib.request.urlopen(index_url, timeout=20).read().decode(errors="ignore")
              except Exception:
                  continue
              if image_name in index and "SHA256SUMS" in index:
                  stable_versions.append(version)
          if not stable_versions:
              raise SystemExit("No Ubuntu Core stable Arm64 image releases were found.")
          print(stable_versions[-1])
          PY
          )
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "baseline_image=${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/SHA256SUMS" >> "$GITHUB_OUTPUT"
          echo "latest_image=${BASE_PORTAL}/${LATEST}/stable/current/ubuntu-core-${LATEST}-arm64+raspi.img.xz" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${BASE_PORTAL}/${LATEST}/stable/current/SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Baseline artifact existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsIL "${{ steps.version.outputs.baseline_image }}" >/tmp/uc20-image.head
          curl -fsIL "${{ steps.version.outputs.baseline_sha }}" >/tmp/uc20-sha.head
          if grep -q '200' /tmp/uc20-image.head && grep -q '200' /tmp/uc20-sha.head; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline index validation
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/" -o /tmp/uc20-index.html
          if grep -q "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" /tmp/uc20-index.html && \
             grep -q 'SHA256SUMS' /tmp/uc20-index.html; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Baseline checksum manifest validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o /tmp/uc20.SHA256SUMS
          if grep -q "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" /tmp/uc20.SHA256SUMS; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Baseline image integrity validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          IMG_PATH="$TMPDIR/ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz"
          SHA_PATH="$TMPDIR/SHA256SUMS"
          curl -fsSL "${{ steps.version.outputs.baseline_image }}" -o "$IMG_PATH"
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o "$SHA_PATH"
          grep "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" "$SHA_PATH" > "$TMPDIR/ubuntu-core.sha"
          (cd "$TMPDIR" && sha256sum -c ubuntu-core.sha)
          xz -t "$IMG_PATH"

          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || env.BASELINE_VERSION || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=manual_review_needed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Latest Ubuntu Core release could not be resolved automatically in this run." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT}; latest release lookup unavailable." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer Ubuntu Core release is available beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} matches latest ${LATEST}; next-version regression is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          NEXT_IMAGE="${{ steps.version.outputs.latest_image }}"
          NEXT_SHA="${{ steps.version.outputs.latest_sha }}"
          curl -fsIL "${NEXT_IMAGE}" >/tmp/uc-next-image.head
          curl -fsIL "${NEXT_SHA}" >/tmp/uc-next-sha.head
          curl -fsSL "${NEXT_SHA}" -o "$TMPDIR/SHA256SUMS"
          grep "ubuntu-core-${LATEST}-arm64+raspi.img.xz" "$TMPDIR/SHA256SUMS" > "$TMPDIR/next.sha"
          curl -fsSL --range 0-4095 "${NEXT_IMAGE}" -o "$TMPDIR/next.img.xz.part"
          export NEXT_SAMPLE_PATH="$TMPDIR/next.img.xz.part"
          python3 - <<'PY'
          import os
          from pathlib import Path
          data = Path(os.environ["NEXT_SAMPLE_PATH"]).read_bytes()
          if len(data) < 6 or data[:6] != bytes.fromhex("fd377a585a00"):
              raise SystemExit(1)
          PY

          if grep -q '200' /tmp/uc-next-image.head && grep -q '200' /tmp/uc-next-sha.head; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=validated_next_release_metadata" >> "$GITHUB_OUTPUT"
            echo "regression_result=Validated latest Ubuntu Core image artifacts and checksum metadata for the next release." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed full baseline checks; next ${LATEST} artifact presence, checksum listing, and image-header sanity checks passed." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_artifact_validation_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next Ubuntu Core artifact metadata validation failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed, but next ${LATEST} artifact or checksum validation did not pass." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ubuntu Core Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
