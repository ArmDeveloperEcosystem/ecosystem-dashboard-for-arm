name: Test Ubuntu Core on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/ubuntucore.md"
      - ".github/workflows/test-ubuntucore.yml"

jobs:
  test-ubuntucore:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "20"
      BASE_PORTAL: "https://cdimage.ubuntu.com/ubuntu-core"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ubuntucore" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ubuntucore" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Ubuntu Core test dependencies
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl python3 xz-utils
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Resolve Ubuntu Core versions
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request

          html = urllib.request.urlopen("https://cdimage.ubuntu.com/ubuntu-core/").read().decode()
          versions = sorted({int(v) for v in re.findall(r'href="([0-9]+)/"', html)})
          print(versions[-1])
          PY
          )
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "baseline_image=${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/SHA256SUMS" >> "$GITHUB_OUTPUT"
          echo "latest_image=${BASE_PORTAL}/${LATEST}/stable/current/ubuntu-core-${LATEST}-arm64+raspi.img.xz" >> "$GITHUB_OUTPUT"
          echo "latest_sha=${BASE_PORTAL}/${LATEST}/stable/current/SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Baseline artifact existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsIL "${{ steps.version.outputs.baseline_image }}" >/tmp/uc20-image.head
          curl -fsIL "${{ steps.version.outputs.baseline_sha }}" >/tmp/uc20-sha.head
          if grep -q '200' /tmp/uc20-image.head && grep -q '200' /tmp/uc20-sha.head; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline index validation
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${BASE_PORTAL}/${BASELINE_VERSION}/stable/current/" -o /tmp/uc20-index.html
          if grep -q "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" /tmp/uc20-index.html && \
             grep -q 'SHA256SUMS' /tmp/uc20-index.html; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Baseline checksum manifest validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o /tmp/uc20.SHA256SUMS
          if grep -q "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" /tmp/uc20.SHA256SUMS; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Baseline image integrity validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          IMG_PATH="$TMPDIR/ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz"
          SHA_PATH="$TMPDIR/SHA256SUMS"
          curl -fsSL "${{ steps.version.outputs.baseline_image }}" -o "$IMG_PATH"
          curl -fsSL "${{ steps.version.outputs.baseline_sha }}" -o "$SHA_PATH"
          grep "ubuntu-core-${BASELINE_VERSION}-arm64+raspi.img.xz" "$SHA_PATH" > "$TMPDIR/ubuntu-core.sha"
          (cd "$TMPDIR" && sha256sum -c ubuntu-core.sha)
          xz -t "$IMG_PATH"

          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${{ steps.version.outputs.latest || '' }}"
          NEXT_IMAGE="${{ steps.version.outputs.latest_image || '' }}"
          NEXT_SHA="${{ steps.version.outputs.latest_sha || '' }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-lookup_failed}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST:-lookup_failed}"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Ubuntu Core baseline ${CURRENT} passed the artifact and integrity checks in this run, but the next stable Ubuntu Core release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Ubuntu Core baseline ${CURRENT} passed the artifact and integrity checks in this run, but the next stable Ubuntu Core release could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT
          NEXT_IMG_PATH="$TMPDIR/ubuntu-core-${LATEST}-arm64+raspi.img.xz"
          NEXT_SHA_PATH="$TMPDIR/SHA256SUMS"

          curl -fsSL "$NEXT_IMAGE" -o "$NEXT_IMG_PATH"
          curl -fsSL "$NEXT_SHA" -o "$NEXT_SHA_PATH"
          grep "ubuntu-core-${LATEST}-arm64+raspi.img.xz" "$NEXT_SHA_PATH" > "$TMPDIR/ubuntu-core.sha"
          (cd "$TMPDIR" && sha256sum -c ubuntu-core.sha)
          xz -t "$NEXT_IMG_PATH"

          echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Ubuntu Core ${CURRENT} already matches the latest official stable arm64 plus raspi image line, and the image checksum plus xz integrity validation both passed in this run." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${LATEST}"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Ubuntu Core ${CURRENT} already matches the latest official stable arm64 plus raspi image line, and the image checksum plus xz integrity validation both passed in this run."
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Ubuntu Core baseline ${CURRENT} passed the artifact and integrity checks in this run, and the candidate Ubuntu Core ${LATEST} arm64 plus raspi image also passed checksum and xz integrity validation successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${LATEST}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Ubuntu Core baseline ${CURRENT} passed the artifact and integrity checks in this run, and the candidate Ubuntu Core ${LATEST} arm64 plus raspi image also passed checksum and xz integrity validation successfully."
          fi

          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          add_any "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          JOB_URL="${JOB_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          cat > test-results/ubuntucore.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Ubuntu Core",
              "version": "${{ steps.version.outputs.version || env.BASELINE_VERSION }}",
              "language": "Operating System",
              "category": "Operating System"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Baseline artifact existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Baseline index validation", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Baseline checksum manifest validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Baseline image integrity validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubuntucore-test-results
          path: test-results/ubuntucore.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ubuntu Core Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
