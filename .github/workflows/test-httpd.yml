name: Test Apache httpd on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-httpd.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-httpd.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-httpd.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-httpd.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-httpd.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-httpd.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-httpd.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-httpd.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-httpd.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-httpd.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-httpd.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-httpd.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-httpd.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-httpd.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-httpd.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-httpd.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-httpd.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-httpd.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-httpd.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-httpd.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-httpd.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-httpd.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-httpd.outputs.timestamp }}
jobs:
  test-httpd:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache httpd'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=httpd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/httpd" >> "$GITHUB_OUTPUT"
      - name: Install Apache httpd baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl ca-certificates file libapr1-dev libaprutil1-dev libssl-dev libpcre3-dev

          CURRENT_VERSION="2.4.32"
          WORKDIR=$(mktemp -d)
          TARBALL="$WORKDIR/httpd-${CURRENT_VERSION}.tar.bz2"
          curl -fsSL "https://archive.apache.org/dist/httpd/httpd-${CURRENT_VERSION}.tar.bz2" -o "$TARBALL"
          tar -xjf "$TARBALL" -C "$WORKDIR"
          SRC_DIR="$WORKDIR/httpd-${CURRENT_VERSION}"
          PREFIX="$WORKDIR/httpd-current"
          PCRE_CONFIG=$(command -v pcre-config || command -v pcre2-config)
          cd "$SRC_DIR"
          ./configure --prefix="$PREFIX" --with-apr=/usr/bin/apr-1-config --with-apr-util=/usr/bin/apu-1-config --with-pcre="$PCRE_CONFIG" >/tmp/httpd-configure.log 2>&1
          make -j"$(nproc)" >/tmp/httpd-make.log 2>&1
          make install >/tmp/httpd-install.log 2>&1

          sed -i 's/^Listen 80$/Listen 18080/' "$PREFIX/conf/httpd.conf"
          if ! grep -q '^ServerName 127.0.0.1$' "$PREFIX/conf/httpd.conf"; then
            printf '\nServerName 127.0.0.1\n' >> "$PREFIX/conf/httpd.conf"
          fi

          echo "HTTPD_HOME=$PREFIX" >> "$GITHUB_ENV"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get httpd version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("$HTTPD_HOME/bin/httpd" -v | awk -F'/' '/Server version/ {print $2}' | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected httpd version: $VERSION"

      - name: Test 1 - Check httpd binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "$HTTPD_HOME/bin/httpd" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Validate baseline version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$("$HTTPD_HOME/bin/httpd" -v | awk -F'/' '/Server version/ {print $2}' | awk '{print $1}')
          if [ "$VERSION" = "${{ steps.install.outputs.current_version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check config syntax
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$HTTPD_HOME/bin/httpd" -t -d "$HTTPD_HOME" -f "$HTTPD_HOME/conf/httpd.conf"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Start server and curl localhost
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          "$HTTPD_HOME/bin/httpd" -d "$HTTPD_HOME" -f "$HTTPD_HOME/conf/httpd.conf"
          cleanup() {
            "$HTTPD_HOME/bin/httpd" -k stop -d "$HTTPD_HOME" -f "$HTTPD_HOME/conf/httpd.conf" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 2
          if curl -fsS http://127.0.0.1:18080/ | grep -Eq 'It works|Apache HTTP Server'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Stop server and verify Arm64 binary
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          "$HTTPD_HOME/bin/httpd" -k stop -d "$HTTPD_HOME" -f "$HTTPD_HOME/conf/httpd.conf" >/dev/null 2>&1 || true
          if file "$HTTPD_HOME/bin/httpd" | grep -qi 'aarch64\|arm64\|ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST=$(CURRENT_VERSION="$CURRENT" python3 - <<'PY'
          import os
          import re
          import urllib.request

          current = os.environ.get("CURRENT_VERSION", "")
          current_parts = tuple(int(x) for x in current.split(".")) if re.fullmatch(r"\d+\.\d+\.\d+", current) else ()
          html = urllib.request.urlopen("https://downloads.apache.org/httpd/", timeout=20).read().decode()
          versions = sorted(
              {
                  tuple(int(x) for x in match.split("."))
                  for match in re.findall(r'httpd-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.bz2', html)
              }
          )
          next_versions = [version for version in versions if version > current_parts]
          print(".".join(str(x) for x in next_versions[0]) if next_versions else "")
          PY
          )

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from the official Apache downloads page." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from the official Apache downloads page."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run and the latest stable release is also ${LATEST}, so current stable remains validated on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          PCRE_CONFIG=$(command -v pcre-config || command -v pcre2-config)
          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/httpd-${LATEST}.tar.bz2"
          curl -fsSL "https://downloads.apache.org/httpd/httpd-${LATEST}.tar.bz2" -o "$NEXT_TAR"
          tar -xjf "$NEXT_TAR" -C "$NEXT_DIR"
          SRC_DIR="$NEXT_DIR/httpd-${LATEST}"
          PREFIX="$NEXT_DIR/httpd-next"
          cd "$SRC_DIR"
          ./configure --prefix="$PREFIX" --with-apr=/usr/bin/apr-1-config --with-apr-util=/usr/bin/apu-1-config --with-pcre="$PCRE_CONFIG" >/tmp/httpd-regression-configure.log 2>&1
          make -j"$(nproc)" >/tmp/httpd-regression-make.log 2>&1
          make install >/tmp/httpd-regression-install.log 2>&1
          sed -i 's/^Listen 80$/Listen 18081/' "$PREFIX/conf/httpd.conf"
          if ! grep -q '^ServerName 127.0.0.1$' "$PREFIX/conf/httpd.conf"; then
            printf '\nServerName 127.0.0.1\n' >> "$PREFIX/conf/httpd.conf"
          fi
          NEXT_REPORTED=$("$PREFIX/bin/httpd" -v | awk -F'/' '/Server version/ {print $2}' | awk '{print $1}')
          "$PREFIX/bin/httpd" -t -d "$PREFIX" -f "$PREFIX/conf/httpd.conf"
          "$PREFIX/bin/httpd" -d "$PREFIX" -f "$PREFIX/conf/httpd.conf"
          cleanup() {
            "$PREFIX/bin/httpd" -k stop -d "$PREFIX" -f "$PREFIX/conf/httpd.conf" >/dev/null 2>&1 || true
            rm -rf "$NEXT_DIR"
          }
          trap cleanup EXIT
          sleep 2
          if [ "$NEXT_REPORTED" = "$LATEST" ] && curl -fsS http://127.0.0.1:18081/ | grep -Eq 'It works|Apache HTTP Server' && file "$PREFIX/bin/httpd" | grep -qi 'aarch64\|arm64\|ARM aarch64'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from the official source tarball on Arm64, and the candidate server reported version ${NEXT_REPORTED} while serving localhost successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from the official source tarball on Arm64, and the candidate server reported version ${NEXT_REPORTED} while serving localhost successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 build/startup validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Apache httpd version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 build/startup validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

