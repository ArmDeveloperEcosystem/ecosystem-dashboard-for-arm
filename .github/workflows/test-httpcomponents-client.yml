name: Test Apache HttpComponents Client on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/httpcomponents-client.md'
      - '.github/workflows/test-httpcomponents-client.yml'

jobs:
  test-httpcomponents-client:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=httpcomponents-client" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/httpcomponents-client" >> "$GITHUB_OUTPUT"

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Apache HttpComponents Client
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="5.4"
          WORKDIR=$(mktemp -d)
          TARBALL="$WORKDIR/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz"
          curl -fsSL "https://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz" -o "$TARBALL"
          tar -xzf "$TARBALL" -C "$WORKDIR"
          HC_HOME=$(find "$WORKDIR" -maxdepth 2 -type d -name "httpcomponents-client-${CURRENT_VERSION}" | head -n 1)
          if [ -z "$HC_HOME" ]; then
            HC_HOME=$(dirname "$(dirname "$(find "$WORKDIR" -name 'httpclient5-*.jar' ! -name '*tests*' | head -n 1)")")
          fi
          if [ -z "$HC_HOME" ] || [ ! -d "$HC_HOME/lib" ]; then
            echo "Unable to locate extracted HttpComponents home"
            exit 1
          fi
          echo "HC_HOME=$HC_HOME" >> "$GITHUB_ENV"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get HttpComponents version
        id: version
        run: |
          set -euo pipefail
          JAR=$(find "$HC_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          VERSION=$(basename "$JAR" | sed -E 's/^httpclient5-([0-9A-Za-z.\-]+)\.jar$/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Apache HttpComponents Client version: $VERSION"

      - name: Test 1 - Check client jars exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if ls "$HC_HOME"/lib/httpclient5-*.jar "$HC_HOME"/lib/httpcore5-*.jar >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Compile Java client
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > TestHttpClient.java <<'EOF'
          import org.apache.hc.client5.http.classic.methods.HttpGet;
          import org.apache.hc.client5.http.impl.classic.CloseableHttpClient;
          import org.apache.hc.client5.http.impl.classic.CloseableHttpResponse;
          import org.apache.hc.client5.http.impl.classic.HttpClients;
          import org.apache.hc.core5.http.io.entity.EntityUtils;

          public class TestHttpClient {
            public static void main(String[] args) throws Exception {
              try (CloseableHttpClient client = HttpClients.createDefault()) {
                HttpGet request = new HttpGet(args[0]);
                try (CloseableHttpResponse response = client.execute(request)) {
                  System.out.println(response.getCode());
                  if (response.getEntity() != null) {
                    System.out.println(EntityUtils.toString(response.getEntity()).trim());
                  }
                }
              }
            }
          }
          EOF
          javac -cp "$HC_HOME/lib/*" TestHttpClient.java
          if [ -f TestHttpClient.class ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Run loopback HTTP request
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          TEST_DIR=$(mktemp -d)
          printf 'httpcomponents-ok\n' > "$TEST_DIR/index.html"
          python3 -m http.server 18181 --bind 127.0.0.1 --directory "$TEST_DIR" >/tmp/httpcomponents-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
            rm -rf "$TEST_DIR"
          }
          trap cleanup EXIT
          sleep 2
          OUTPUT=$(java -cp "$HC_HOME/lib/*:." TestHttpClient "http://127.0.0.1:18181/")
          if echo "$OUTPUT" | grep -q '^200$' && echo "$OUTPUT" | grep -q 'httpcomponents-ok'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected output:"
            echo "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check expected client classes
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          JAR=$(find "$HC_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          if jar tf "$JAR" | grep -q 'org/apache/hc/client5/http/impl/classic/HttpClients.class'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check dependency jars and Arm64 runner
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if ls "$HC_HOME"/lib/httpcore5-*.jar "$HC_HOME"/lib/httpcore5-h2-*.jar >/dev/null 2>&1 && [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          with urllib.request.urlopen("https://search.maven.org/solrsearch/select?q=g:%22org.apache.httpcomponents.client5%22+AND+a:%22httpclient5%22&rows=20&wt=json", timeout=20) as r:
              data = json.load(r)
          print(data["response"]["docs"][0]["latestVersion"])
          PY
          )

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from Maven Central." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from Maven Central."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run and the latest stable release is also ${LATEST}, so current stable remains validated on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run and the latest stable release is also ${LATEST}, so current stable remains validated on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/httpcomponents-client-${LATEST}-bin.tar.gz"
          NEXT_URL="https://downloads.apache.org/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz"
          if ! curl -fsSL "$NEXT_URL" -o "$NEXT_TAR"; then
            NEXT_URL="https://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz"
            curl -fsSL "$NEXT_URL" -o "$NEXT_TAR"
          fi
          tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
          NEXT_HOME=$(find "$NEXT_DIR" -maxdepth 2 -type d -name "httpcomponents-client-${LATEST}" | head -n 1)
          if [ -z "$NEXT_HOME" ]; then
            NEXT_HOME=$(dirname "$(dirname "$(find "$NEXT_DIR" -name 'httpclient5-*.jar' ! -name '*tests*' | head -n 1)")")
          fi
          NEXT_JAR=$(find "$NEXT_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          NEXT_REPORTED=$(basename "$NEXT_JAR" | sed -E 's/^httpclient5-([0-9A-Za-z.\-]+)\.jar$/\1/')
          javac -cp "$NEXT_HOME/lib/*" TestHttpClient.java
          TEST_DIR=$(mktemp -d)
          printf 'httpcomponents-next-ok\n' > "$TEST_DIR/index.html"
          python3 -m http.server 18182 --bind 127.0.0.1 --directory "$TEST_DIR" >/tmp/httpcomponents-regression-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
            rm -rf "$TEST_DIR" "$NEXT_DIR"
          }
          trap cleanup EXIT
          sleep 2
          OUTPUT=$(java -cp "$NEXT_HOME/lib/*:." TestHttpClient "http://127.0.0.1:18182/")
          if [ "$NEXT_REPORTED" = "$LATEST" ] && echo "$OUTPUT" | grep -q '^200$' && echo "$OUTPUT" | grep -q 'httpcomponents-next-ok'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the extracted client artifact reported version ${NEXT_REPORTED} while completing a real loopback HTTP request." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the extracted client artifact reported version ${NEXT_REPORTED} while completing a real loopback HTTP request."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 loopback validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 loopback validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/httpcomponents-client.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Apache Httpcomponents Client",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check client jars exist",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Compile Java client",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Run loopback HTTP request",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check expected client classes",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Check dependency jars and Arm64 runner",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: httpcomponents-client-test-results
          path: test-results/httpcomponents-client.json
