name: Test Apache HttpComponents Client on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-httpcomponents-client.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-httpcomponents-client.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-httpcomponents-client.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-httpcomponents-client.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-httpcomponents-client.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-httpcomponents-client.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-httpcomponents-client.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-httpcomponents-client.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-httpcomponents-client.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-httpcomponents-client.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-httpcomponents-client.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-httpcomponents-client.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-httpcomponents-client.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-httpcomponents-client.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-httpcomponents-client.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-httpcomponents-client.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-httpcomponents-client.outputs.timestamp }}
jobs:
  test-httpcomponents-client:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_VERSION: "5.4"
      HTTPCOMPONENTS_NEXT_VERSION: "5.6"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache HttpComponents Client'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=httpcomponents-client" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/httpcomponents-client" >> "$GITHUB_OUTPUT"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Apache HttpComponents Client
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          download_httpcomponents_tarball() {
            local version="$1"
            local output="$2"
            shift 2
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=45 \
            DOWNLOAD_MAX_TIME=480 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=90 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$output" "${urls[@]}"
          }
          WORKDIR=$(mktemp -d)
          TARBALL="$WORKDIR/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz"
          if ! download_httpcomponents_tarball "$CURRENT_VERSION" "$TARBALL" \
            "https://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz" \
            "http://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz" \
            "https://downloads.apache.org/httpcomponents/httpclient/binary/httpcomponents-client-${CURRENT_VERSION}-bin.tar.gz"; then
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! tar -xzf "$TARBALL" -C "$WORKDIR"; then
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HC_HOME=$(find "$WORKDIR" -maxdepth 2 -type d -name "httpcomponents-client-${CURRENT_VERSION}" | head -n 1)
          if [ -z "$HC_HOME" ]; then
            HC_HOME=$(dirname "$(dirname "$(find "$WORKDIR" -name 'httpclient5-*.jar' ! -name '*tests*' | head -n 1)")")
          fi
          if [ -z "$HC_HOME" ] || [ ! -d "$HC_HOME/lib" ]; then
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=baseline_layout_invalid" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "HC_HOME=$HC_HOME" >> "$GITHUB_ENV"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Resolve HttpComponents install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          ROOT="${HC_HOME:-}"
          if [ -n "$ROOT" ] && [ -d "$ROOT/lib" ] && find "$ROOT/lib" -name 'httpclient5-*.jar' -print -quit | grep -q .; then
            STATUS="success"
            BLOCKER=""
          fi
          echo "HC_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "HC_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"
          echo "hc_home=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Get HttpComponents version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Detected Apache HttpComponents Client version: ${CURRENT_VERSION} (baseline install unavailable)"
            exit 0
          fi
          JAR=$(find "$HC_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          VERSION=$(basename "$JAR" | sed -E 's/^httpclient5-([0-9A-Za-z.\-]+)\.jar$/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Apache HttpComponents Client version: $VERSION"

      - name: Test 1 - Check client jars exist
        id: test1
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ls "$HC_HOME"/lib/httpclient5-*.jar "$HC_HOME"/lib/httpcore5-*.jar >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Compile Java client
        id: test2
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat > TestHttpClient.java <<'EOF'
          import org.apache.hc.client5.http.classic.methods.HttpGet;
          import org.apache.hc.client5.http.impl.classic.CloseableHttpClient;
          import org.apache.hc.client5.http.impl.classic.CloseableHttpResponse;
          import org.apache.hc.client5.http.impl.classic.HttpClients;
          import org.apache.hc.core5.http.io.entity.EntityUtils;

          public class TestHttpClient {
            public static void main(String[] args) throws Exception {
              try (CloseableHttpClient client = HttpClients.createDefault()) {
                HttpGet request = new HttpGet(args[0]);
                try (CloseableHttpResponse response = client.execute(request)) {
                  System.out.println(response.getCode());
                  if (response.getEntity() != null) {
                    System.out.println(EntityUtils.toString(response.getEntity()).trim());
                  }
                }
              }
            }
          }
          EOF
          javac -cp "$HC_HOME/lib/*" TestHttpClient.java
          if [ -f TestHttpClient.class ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Run loopback HTTP request
        id: test3
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TEST_DIR=$(mktemp -d)
          printf 'httpcomponents-ok\n' > "$TEST_DIR/index.html"
          python3 -m http.server 18181 --bind 127.0.0.1 --directory "$TEST_DIR" >/tmp/httpcomponents-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
            rm -rf "$TEST_DIR"
          }
          trap cleanup EXIT
          sleep 2
          OUTPUT=$(java -cp "$HC_HOME/lib/*:." TestHttpClient "http://127.0.0.1:18181/")
          if echo "$OUTPUT" | grep -q '^200$' && echo "$OUTPUT" | grep -q 'httpcomponents-ok'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected output:"
            echo "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check expected client classes
        id: test4
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JAR=$(find "$HC_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          if jar tf "$JAR" | grep -q 'org/apache/hc/client5/http/impl/classic/HttpClients.class'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check dependency jars and Arm64 runner
        id: test5
        if: always()
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ls "$HC_HOME"/lib/httpcore5-*.jar "$HC_HOME"/lib/httpcore5-h2-*.jar >/dev/null 2>&1 && [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${HTTPCOMPONENTS_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version tested in Tests 1-5: $CURRENT"
          if [ "${HC_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} did not complete baseline installation and core Tests 1-5 cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          download_httpcomponents_tarball() {
            local version="$1"
            local output="$2"
            shift 2
            local urls=("$@")
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=45 \
            DOWNLOAD_MAX_TIME=480 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=90 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash .github/scripts/download-with-fallback.sh "$output" "${urls[@]}"
          }

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run and the latest stable release is also ${LATEST}, so current stable remains validated on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/httpcomponents-client-${LATEST}-bin.tar.gz"
          if ! download_httpcomponents_tarball "$LATEST" "$NEXT_TAR" \
            "https://dlcdn.apache.org/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz" \
            "https://downloads.apache.org/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz" \
            "https://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz" \
            "http://archive.apache.org/dist/httpcomponents/httpclient/binary/httpcomponents-client-${LATEST}-bin.tar.gz"; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from the official Apache distribution mirrors." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
          NEXT_HOME=$(find "$NEXT_DIR" -maxdepth 2 -type d -name "httpcomponents-client-${LATEST}" | head -n 1)
          if [ -z "$NEXT_HOME" ]; then
            NEXT_HOME=$(dirname "$(dirname "$(find "$NEXT_DIR" -name 'httpclient5-*.jar' ! -name '*tests*' | head -n 1)")")
          fi
          NEXT_JAR=$(find "$NEXT_HOME/lib" -name 'httpclient5-[0-9]*.jar' | head -n 1)
          NEXT_REPORTED=$(basename "$NEXT_JAR" | sed -E 's/^httpclient5-([0-9A-Za-z.\-]+)\.jar$/\1/')
          javac -cp "$NEXT_HOME/lib/*" TestHttpClient.java
          TEST_DIR=$(mktemp -d)
          printf 'httpcomponents-next-ok\n' > "$TEST_DIR/index.html"
          python3 -m http.server 18182 --bind 127.0.0.1 --directory "$TEST_DIR" >/tmp/httpcomponents-regression-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
            rm -rf "$TEST_DIR" "$NEXT_DIR"
          }
          trap cleanup EXIT
          sleep 2
          OUTPUT=$(java -cp "$NEXT_HOME/lib/*:." TestHttpClient "http://127.0.0.1:18182/")
          if [ "$NEXT_REPORTED" = "$LATEST" ] && echo "$OUTPUT" | grep -q '^200$' && echo "$OUTPUT" | grep -q 'httpcomponents-next-ok'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the extracted client artifact reported version ${NEXT_REPORTED} while completing a real loopback HTTP request." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the extracted client artifact reported version ${NEXT_REPORTED} while completing a real loopback HTTP request."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 loopback validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Apache HttpComponents Client version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the expected Arm64 loopback validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Apache HttpComponents Client"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Check client jars exist"
          test2_label: "Compile Java client"
          test3_label: "Run loopback HTTP request"
          test4_label: "Check expected client classes"
          test5_label: "Check dependency jars and Arm64 runner"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
