name: Test Ruby/Rails on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-rubyonrails.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-rubyonrails.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-rubyonrails.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-rubyonrails.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-rubyonrails.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-rubyonrails.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-rubyonrails.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-rubyonrails.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-rubyonrails.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-rubyonrails.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-rubyonrails.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-rubyonrails.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-rubyonrails.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-rubyonrails.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-rubyonrails.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-rubyonrails.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-rubyonrails.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-rubyonrails.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-rubyonrails.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-rubyonrails.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-rubyonrails.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-rubyonrails.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-rubyonrails.outputs.timestamp }}
jobs:
  test-rubyonrails:
    runs-on: ubuntu-24.04-arm
    env:
      RAILS_VERSION: "7.2.2.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Ruby/Rails'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rubyonrails" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rubyonrails" >> "$GITHUB_OUTPUT"
      - name: Install Ruby/Rails
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
          gem install rails -v "${RAILS_VERSION}" --no-document
          gem install sqlite3 --no-document
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Ruby/Rails version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(rails --version | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v rails >/dev/null 2>&1 && command -v ruby >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if rails --version | grep -q "^Rails ${RAILS_VERSION}$"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if rails new --help 2>&1 | grep -q -- '--skip-bundle'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          rails new /tmp/rails-smoke \
            --skip-bundle \
            --skip-git \
            --skip-javascript \
            --skip-hotwire \
            --skip-action-mailbox \
            --skip-action-text \
            --skip-active-storage \
            --skip-action-cable \
            --skip-test \
            --skip-system-test >/tmp/rails-functional.out 2>&1

          cd /tmp/rails-smoke
          bundle config set path vendor/bundle
          timeout 10m bundle install --jobs 2 --retry 3 >>/tmp/rails-functional.out 2>&1
          cat > app/controllers/smoke_controller.rb <<'EOF'
          class SmokeController < ActionController::Base
            def index
              render plain: "rails-arm64-ok"
            end
          end
          EOF
          cat > config/routes.rb <<'EOF'
          Rails.application.routes.draw do
            get "/smoke", to: "smoke#index"
          end
          EOF
          RAILS_PROOF=$(RAILS_ENV=test bin/rails runner 'route = Rails.application.routes.recognize_path("/smoke", method: :get); puts "#{route[:controller]}##{route[:action]}"')
          SQLITE_PROOF=$(RAILS_ENV=test bin/rails runner 'require "sqlite3"; db = SQLite3::Database.new(":memory:"); db.execute("create table smoke(message text)"); db.execute("insert into smoke values (?)", ["rails-arm64-ok"]); puts db.get_first_value("select message from smoke")')

          if [ -f config/application.rb ] && [ -x bin/rails ] && [ "$RAILS_PROOF" = "smoke#index" ] && [ "$SQLITE_PROOF" = "rails-arm64-ok" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rails-functional.out || true
            printf 'route proof: %s\nsqlite proof: %s\n' "${RAILS_PROOF:-missing}" "${SQLITE_PROOF:-missing}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ruby/Rails Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
          } >> "$GITHUB_STEP_SUMMARY"
