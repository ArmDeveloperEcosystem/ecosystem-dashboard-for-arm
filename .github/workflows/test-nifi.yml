name: Test NiFi on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/nifi.md'
      - '.github/workflows/test-nifi.yml'

jobs:
  test-nifi:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=nifi" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/nifi" >> "$GITHUB_OUTPUT"

      - name: Install NiFi
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk-headless wget unzip

          JAVA_HOME="/usr/lib/jvm/java-21-openjdk-arm64"
          if [ ! -x "${JAVA_HOME}/bin/java" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "NIFI_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"

          VERSION="2.8.0"
          wget -q "https://archive.apache.org/dist/nifi/${VERSION}/nifi-${VERSION}-bin.zip"
          unzip -q "nifi-${VERSION}-bin.zip"
          mv "nifi-${VERSION}" nifi

          if [ -x "nifi/bin/nifi.sh" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get NiFi version
        id: version
        run: |
          VERSION=$(find nifi/lib -name 'nifi-framework-api-*.jar' -printf '%f\n' | sed -E 's/^nifi-framework-api-([0-9.]+)\.jar/\1/' | head -n 1 || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Launcher Script
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -x "nifi/bin/nifi.sh" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if find nifi/lib -name 'nifi-framework-api-*.jar' | grep -q 'nifi-framework-api-2\.8\.0\.jar'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if nifi/bin/nifi.sh 2>&1 | grep -q '^Usage nifi.sh'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export JAVA_HOME="$NIFI_JAVA_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"

          trap 'nifi/bin/nifi.sh stop >/dev/null 2>&1 || true' EXIT

          nifi/bin/nifi.sh start > nifi-start.log 2>&1
          STATUS_UP=0
          for _ in $(seq 1 36); do
            nifi/bin/nifi.sh status > nifi-status.log 2>&1 || true
            ss -tulnp > nifi-ports.log || true
            if grep -q 'Status: UP' nifi-status.log || grep -Eq ':8443|:8080' nifi-ports.log || grep -q 'Generated Username' nifi/logs/nifi-app.log; then
              STATUS_UP=1
              break
            fi
            sleep 5
          done

          if [ "$STATUS_UP" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat nifi-start.log || true
            cat nifi-status.log || true
            cat nifi-ports.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          nifi/bin/nifi.sh stop > nifi-stop.log 2>&1 || true
          trap - EXIT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST=$(python3 - <<'PY'
          import re
          import urllib.request
          html = urllib.request.urlopen('https://archive.apache.org/dist/nifi/').read().decode()
          versions = sorted(
              set(re.findall(r'href="([0-9][^/]+)/"', html)),
              key=lambda s: [int(x) if x.isdigit() else x for x in re.split(r'([0-9]+)', s)]
          )
          print(versions[-1] if versions else '2.8.0')
          PY
          )
          if [ -z "$LATEST" ]; then
            LATEST="2.8.0"
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          NEXT_DIR=$(mktemp -d)
          NEXT_ZIP="$NEXT_DIR/nifi-next.zip"
          NEXT_URL="https://archive.apache.org/dist/nifi/${LATEST}/nifi-${LATEST}-bin.zip"

          if wget -q -O "$NEXT_ZIP" "$NEXT_URL"; then
            unzip -q "$NEXT_ZIP" -d "$NEXT_DIR"
            NEXT_ROOT="$NEXT_DIR/nifi-${LATEST}"
            NEXT_INSTALLED_VERSION=$(find "$NEXT_ROOT/lib" -name 'nifi-framework-api-*.jar' -printf '%f\n' | sed -E 's/^nifi-framework-api-([0-9.]+)\.jar/\1/' | head -n 1 || true)
            if [ -x "$NEXT_ROOT/bin/nifi.sh" ] && [ -n "$NEXT_INSTALLED_VERSION" ]; then
              echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
              if [ "$CURRENT" = "$LATEST" ]; then
                echo "decision=already_at_latest" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned NiFi version ${CURRENT} passed smoke tests in this run and already matches the latest Apache archive release. Regression validation re-staged version ${NEXT_INSTALLED_VERSION} on Arm64 and verified the launcher and framework metadata." >> "$GITHUB_OUTPUT"
              else
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned NiFi version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release ${LATEST} on Arm64, and the staged archive reported installed version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
              fi
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned NiFi version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not stage a usable Arm64 installation." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NiFi version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded from the Apache archive on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/nifi.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Apache NiFi",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Messaging/Comms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Launcher Script",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Metadata",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Help Output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifi-test-results
          path: test-results/nifi.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          echo "## NiFi Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Launcher Script: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> "$GITHUB_STEP_SUMMARY"
