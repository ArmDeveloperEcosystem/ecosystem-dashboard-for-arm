name: Test TDengine on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/tdengine.md"
      - ".github/workflows/test-tdengine.yml"

jobs:
  test-tdengine:
    runs-on: ubuntu-24.04-arm
    env:
      TDENGINE_VERSION: "3.3.6.9"
      TDENGINE_IMAGE: "tdengine/tdengine:3.3.6.9"
      TDENGINE_NEXT_VERSION: "3.3.6.13"
      TDENGINE_NEXT_IMAGE: "tdengine/tdengine:3.3.6.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=tdengine" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/tdengine" >> "$GITHUB_OUTPUT"
          echo "current_version=${TDENGINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install TDengine
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq curl
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || sudo service docker start || true

          ARCHES=$(sudo docker manifest inspect "${TDENGINE_IMAGE}" | jq -r '.manifests[].platform.architecture' | tr '\n' ' ')
          if ! echo "$ARCHES" | grep -qw "arm64"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo docker pull "${TDENGINE_IMAGE}"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get TDengine version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sudo docker run --rm --entrypoint taosd "${TDENGINE_IMAGE}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")
          LATEST="${TDENGINE_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "${TDENGINE_IMAGE}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker run --rm --entrypoint taosd "${TDENGINE_IMAGE}" --version 2>&1 | grep -q "${TDENGINE_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if sudo docker run --rm --entrypoint taos "${TDENGINE_IMAGE}" --help 2>&1 | grep -qiE "usage|help|Options"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          IMAGE_ARCH=$(sudo docker image inspect "${TDENGINE_IMAGE}" --format '{{.Architecture}}' 2>/dev/null || true)
          if [ "$ARCH" = "aarch64" ] && [ "${IMAGE_ARCH}" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CID=$(sudo docker run -d --rm -p 6030:6030 "${TDENGINE_IMAGE}")
          cleanup() {
            sudo docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          SUCCESS=0
          for _ in $(seq 1 30); do
            if sudo docker exec "$CID" taos -s 'select server_version()' >/tmp/tdengine-functional.log 2>&1; then
              SUCCESS=1
              break
            fi
            sleep 2
          done

          if [ "$SUCCESS" -eq 1 ] && grep -q "${TDENGINE_VERSION}" /tmp/tdengine-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/tdengine-functional.log || true
            sudo docker logs "$CID" | tail -n 60 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          CURRENT_IMAGE="${TDENGINE_IMAGE}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned TDengine version $CURRENT passed smoke tests in this run, but the next stable version could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version image pull status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_IMAGE="${TDENGINE_NEXT_IMAGE}"

          if ! sudo docker pull "$NEXT_IMAGE"; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned TDengine version $CURRENT passed smoke tests in this run, but the candidate image $NEXT_IMAGE could not be pulled successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version image pull status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION=$(sudo docker run --rm --entrypoint taosd "$NEXT_IMAGE" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          NEXT_HELP=$(sudo docker run --rm --entrypoint taos "$NEXT_IMAGE" --help 2>&1 || true)
          NEXT_ARCH=$(sudo docker image inspect "$NEXT_IMAGE" --format '{{.Architecture}}' 2>/dev/null || true)
          CID=$(sudo docker run -d --rm -p 6031:6030 "$NEXT_IMAGE")
          cleanup_candidate() {
            sudo docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup_candidate EXIT

          NEXT_SUCCESS=0
          for _ in $(seq 1 30); do
            if sudo docker exec "$CID" taos -s 'select server_version()' >/tmp/tdengine-next.log 2>&1; then
              NEXT_SUCCESS=1
              break
            fi
            sleep 2
          done

          if [ "$NEXT_VERSION" = "$LATEST" ] && \
             [ "$NEXT_ARCH" = "arm64" ] && \
             printf '%s\n' "$NEXT_HELP" | grep -qiE "usage|help|Options" && \
             [ "$NEXT_SUCCESS" -eq 1 ] && \
             grep -q "$LATEST" /tmp/tdengine-next.log; then
            echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Next version image pull status: passed"
            echo "Next version installed on Arm64: $NEXT_VERSION"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned TDengine version $CURRENT passed smoke tests in this run. Regression validation pulled candidate image $NEXT_IMAGE on Arm64, confirmed exact version $NEXT_VERSION, and completed the real server query path successfully." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/tdengine-next.log || true
            sudo docker logs "$CID" | tail -n 60 || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned TDengine version $CURRENT passed smoke tests in this run, but candidate image $NEXT_IMAGE did not complete the isolated Arm64 version/help/server-query validation path successfully." >> "$GITHUB_OUTPUT"
            echo "Next version image pull status: passed"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
              if job.get("name") in (f"{job_id} / {job_id}", job_id):
                  print(job.get("html_url", ""))
                  break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/tdengine.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "TDengine",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}" }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdengine-test-results
          path: test-results/tdengine.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## TDengine Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current (Pinned):** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}"
            echo "- **Next (Latest Stable):** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Comparison:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
