name: Test TDengine on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-tdengine.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-tdengine.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-tdengine.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-tdengine.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-tdengine.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-tdengine.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-tdengine.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-tdengine.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-tdengine.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-tdengine.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-tdengine.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-tdengine.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-tdengine.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-tdengine.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-tdengine.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-tdengine.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-tdengine.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-tdengine.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-tdengine.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-tdengine.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-tdengine.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-tdengine.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-tdengine.outputs.timestamp }}
jobs:
  test-tdengine:
    runs-on: ubuntu-24.04-arm
    env:
      TDENGINE_VERSION: "3.3.6.9"
      TDENGINE_IMAGE: "tdengine/tdengine:3.3.6.9"
      TDENGINE_NEXT_VERSION: "3.3.6.13"
      TDENGINE_NEXT_IMAGE: "tdengine/tdengine:3.3.6.13"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'TDengine'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=tdengine" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/tdengine" >> "$GITHUB_OUTPUT"
          echo "current_version=${TDENGINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install TDengine
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq curl
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || sudo service docker start || true

          ARCHES=$(sudo docker manifest inspect "${TDENGINE_IMAGE}" | jq -r '.manifests[].platform.architecture' | tr '\n' ' ')
          if ! echo "$ARCHES" | grep -qw "arm64"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo docker pull "${TDENGINE_IMAGE}"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get TDengine version
        id: version
        run: |
          set -euo pipefail
          VERSION_LOG=$(mktemp)
          CID=$(sudo docker run -d --rm "${TDENGINE_IMAGE}")
          cleanup() {
            sudo docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          VERSION=""
          for _ in $(seq 1 30); do
            if timeout 10s sudo docker exec "$CID" taos -s 'select server_version()' >"$VERSION_LOG" 2>&1; then
              VERSION=$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$VERSION_LOG" | head -1 || true)
              if [ -n "$VERSION" ]; then
                break
              fi
            fi
            sleep 2
          done

          if [ -z "$VERSION" ]; then
            cat "$VERSION_LOG" || true
            sudo docker logs "$CID" | tail -n 60 || true
            exit 1
          fi
          LATEST="${TDENGINE_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "${TDENGINE_IMAGE}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.version || 'unknown' }}" = "${TDENGINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if sudo docker run --rm --entrypoint taos "${TDENGINE_IMAGE}" --help 2>&1 | grep -qiE "usage|help|Options"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          IMAGE_ARCH=$(sudo docker image inspect "${TDENGINE_IMAGE}" --format '{{.Architecture}}' 2>/dev/null || true)
          if [ "$ARCH" = "aarch64" ] && [ "${IMAGE_ARCH}" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CID=$(sudo docker run -d --rm "${TDENGINE_IMAGE}")
          cleanup() {
            sudo docker rm -f "$CID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          SUCCESS=0
          for _ in $(seq 1 30); do
            if timeout 10s sudo docker exec "$CID" taos -s 'select server_version()' >/tmp/tdengine-functional.log 2>&1; then
              SUCCESS=1
              break
            fi
            sleep 2
          done

          if [ "$SUCCESS" -eq 1 ] && grep -q "${TDENGINE_VERSION}" /tmp/tdengine-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/tdengine-functional.log || true
            sudo docker logs "$CID" | tail -n 60 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## TDengine Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""

            echo "- **Current (Pinned):** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}"
            echo "- **Next (Latest Stable):** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Comparison:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
