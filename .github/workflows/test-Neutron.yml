name: Test Neutron on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/Neutron.md"
      - ".github/workflows/test-neutron.yml"

jobs:
  test-neutron:
    runs-on: ubuntu-24.04-arm

    env:
      NEUTRON_VERSION: "25.2.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=Neutron" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/Neutron" >> "$GITHUB_OUTPUT"

      - name: Install Neutron
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-dev build-essential libffi-dev libssl-dev file

          ROOT_DIR=$(mktemp -d)
          VENV_DIR="${ROOT_DIR}/venv"
          python3 -m venv "$VENV_DIR"
          . "${VENV_DIR}/bin/activate"
          python -m pip install -q --upgrade pip setuptools wheel
          python -m pip install -q "neutron==${NEUTRON_VERSION}"

          test -x "${VENV_DIR}/bin/neutron-server"
          test -x "${VENV_DIR}/bin/neutron-db-manage"

          echo "venv_dir=${VENV_DIR}" >> "$GITHUB_OUTPUT"
          echo "python_bin=${VENV_DIR}/bin/python" >> "$GITHUB_OUTPUT"
          echo "server_bin=${VENV_DIR}/bin/neutron-server" >> "$GITHUB_OUTPUT"
          echo "db_manage_bin=${VENV_DIR}/bin/neutron-db-manage" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Neutron version
        id: version
        run: |
          set -euo pipefail
          . "${{ steps.install.outputs.venv_dir }}/bin/activate"
          VERSION=$(python - <<'PY'
          import importlib.metadata
          print(importlib.metadata.version("neutron"))
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Neutron version: ${VERSION}"

      - name: Test 1 - Check Neutron entry points
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if { [ -x "${{ steps.install.outputs.server_bin }}" ] && [ -x "${{ steps.install.outputs.db_manage_bin }}" ]; } || \
             "${{ steps.install.outputs.python_bin }}" - <<'PY' >/tmp/neutron-import.log 2>&1
          import neutron
          print(neutron.__file__)
          PY
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l "${{ steps.install.outputs.server_bin }}" "${{ steps.install.outputs.db_manage_bin }}" || true
            cat /tmp/neutron-import.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact pinned version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv_dir }}/bin/activate"
          REPORTED=$(python - <<'PY'
          import importlib.metadata
          print(importlib.metadata.version("neutron"))
          PY
          )
          if [ "$REPORTED" = "${NEUTRON_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            python - <<'PY'
          import importlib.metadata
          print(importlib.metadata.version("neutron"))
          PY
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check neutron-server help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          {
            "${{ steps.install.outputs.server_bin }}" --help 2>&1 || \
            "${{ steps.install.outputs.python_bin }}" -m neutron.cmd.eventlet.server --help 2>&1 || true
          } >/tmp/neutron-server-help.log
          if grep -Eiq "usage:|neutron-server|options|eventlet" /tmp/neutron-server-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/neutron-server-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PYTHON_BIN=$(readlink -f "${{ steps.install.outputs.venv_dir }}/bin/python")
          if [ "$(uname -m)" = "aarch64" ] && file "$PYTHON_BIN" | grep -Eqi "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "$PYTHON_BIN" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          {
            "${{ steps.install.outputs.db_manage_bin }}" --help 2>&1 || \
            "${{ steps.install.outputs.python_bin }}" -m neutron.db.migration.cli --help 2>&1 || true
          } >/tmp/neutron-db-manage-help.log
          if grep -Eiq "usage:|neutron-db-manage|options|upgrade|revision" /tmp/neutron-db-manage-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/neutron-db-manage-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/Neutron.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Neutron",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Neutron entry points",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check exact pinned version",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check neutron-server help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Neutron-test-results
          path: test-results/Neutron.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Neutron Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Neutron entry points: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check exact pinned version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check neutron-server help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
