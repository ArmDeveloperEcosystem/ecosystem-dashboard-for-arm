name: Test Xtrabackup on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/xtrabackup.md"
      - ".github/workflows/test-xtrabackup.yml"

jobs:
  test-xtrabackup:
    runs-on: ubuntu-24.04-arm
    env:
      XTRABACKUP_VERSION: "8.0.35-33"
      XTRABACKUP_PACKAGE_VERSION: "8.0.35-33-1.noble"
      PERCONA_RELEASE_DEB: "https://repo.percona.com/apt/percona-release_latest.generic_all.deb"
      PERCONA_PACKAGES_URL: "https://repo.percona.com/pxb-80/apt/dists/noble/main/binary-arm64/Packages.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=xtrabackup" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/xtrabackup" >> "$GITHUB_OUTPUT"
          echo "current_version=${XTRABACKUP_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Xtrabackup baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release ca-certificates file python3
          curl -fsSL -o /tmp/percona-release.deb "${PERCONA_RELEASE_DEB}"
          sudo dpkg -i /tmp/percona-release.deb
          sudo percona-release setup -y pxb80 || sudo percona-release setup pxb80
          sudo apt-get update
          sudo apt-get install -y "percona-xtrabackup-80=${XTRABACKUP_PACKAGE_VERSION}"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Xtrabackup version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(
            xtrabackup --version 2>&1 | \
              sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+-[0-9]+).*/\1/p' | \
              head -1
          )
          readarray -t LATEST_INFO < <(
            CURRENT_PACKAGE_VERSION="${XTRABACKUP_PACKAGE_VERSION}" python3 - <<'PY'
          import gzip
          import os
          import re
          import urllib.request

          packages_url = "https://repo.percona.com/pxb-80/apt/dists/noble/main/binary-arm64/Packages.gz"
          text = gzip.decompress(urllib.request.urlopen(packages_url, timeout=30).read()).decode("utf-8", "replace")

          versions = []
          for block in text.split("\n\n"):
              pkg = None
              version = None
              filename = None
              for line in block.splitlines():
                  if line.startswith("Package: "):
                      pkg = line.split(": ", 1)[1]
                  elif line.startswith("Version: "):
                      version = line.split(": ", 1)[1]
                  elif line.startswith("Filename: "):
                      filename = line.split(": ", 1)[1]
              if pkg == "percona-xtrabackup-80" and version and filename:
                  versions.append((version, "https://repo.percona.com/pxb-80/apt/" + filename))

          current = os.environ["CURRENT_PACKAGE_VERSION"]
          def parse(version: str):
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)-(\d+)-(\d+)\.[A-Za-z0-9]+", version)
              if not match:
                  return ()
              return tuple(int(part) for part in match.groups())

          next_version = "unknown"
          next_url = ""
          current_parts = parse(current)
          candidates = sorted(
              ((parse(version), version, url) for version, url in versions if parse(version) and parse(version) > current_parts),
              key=lambda item: item[0],
          )
          if candidates:
              _, next_version, next_url = candidates[0]

          print(next_version)
          print(next_url)
          PY
          )
          LATEST_PACKAGE_VERSION="${LATEST_INFO[0]:-unknown}"
          LATEST_DOWNLOAD_URL="${LATEST_INFO[1]:-}"
          LATEST=$(
            printf '%s\n' "${LATEST_PACKAGE_VERSION}" | \
              sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+-[0-9]+).*/\1/p' | \
              head -1
          )
          if [ -z "${CURRENT}" ]; then
            CURRENT="unknown"
          fi
          if [ -z "${LATEST}" ]; then
            LATEST="unknown"
          fi
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_package_version=${LATEST_PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_download_url=${LATEST_DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Detected Xtrabackup version: ${CURRENT}"
          echo "Detected next stable Xtrabackup version: ${LATEST}"
          echo "Detected next arm64 package version: ${LATEST_PACKAGE_VERSION}"

      - name: Test 1 - Binary existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v xtrabackup >/dev/null 2>&1 && command -v xbstream >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT=$(
            xtrabackup --version 2>&1 | \
              sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+-[0-9]+).*/\1/p' | \
              head -1
          )
          if [ "${CURRENT}" = "${XTRABACKUP_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${XTRABACKUP_VERSION}, got ${CURRENT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help output validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          xtrabackup --help >/tmp/xtrabackup-help.txt 2>&1 || true
          if grep -Eqi "xtrabackup|usage|options" /tmp/xtrabackup-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xtrabackup-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "$(command -v xtrabackup)" | grep -Eqi "ARM aarch64|ARM64|AArch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "$(command -v xtrabackup)" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Print-defaults functional smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if xtrabackup --print-defaults >/tmp/xtrabackup-defaults.txt 2>&1 && \
             grep -qi "xtrabackup" /tmp/xtrabackup-defaults.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xtrabackup-defaults.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
              if job.get("name") in (f"{job_id} / {job_id}", job_id):
                  print(job.get("html_url", ""))
                  break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/xtrabackup.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Xtrabackup",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Binary existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Exact version check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Help output validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Print-defaults functional smoke", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xtrabackup-test-results
          path: test-results/xtrabackup.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Xtrabackup Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Binary existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Help output validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Print-defaults functional smoke: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
