name: Test Buildkite CLI on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-buildkite-cli.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-buildkite-cli.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-buildkite-cli.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-buildkite-cli.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-buildkite-cli.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-buildkite-cli.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-buildkite-cli.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-buildkite-cli.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-buildkite-cli.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-buildkite-cli.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-buildkite-cli.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-buildkite-cli.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-buildkite-cli.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-buildkite-cli.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-buildkite-cli.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-buildkite-cli.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-buildkite-cli.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-buildkite-cli.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-buildkite-cli.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-buildkite-cli.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-buildkite-cli.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-buildkite-cli.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-buildkite-cli.outputs.timestamp }}
jobs:
  test-buildkite-cli:
    runs-on: ubuntu-24.04-arm
    env:
      BUILDKITE_CLI_BASELINE_VERSION: "3.7.1"
      BUILDKITE_CLI_NEXT_VERSION: "3.8.0"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Buildkite CLI'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=buildkite-cli" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/buildkite-cli" >> "$GITHUB_OUTPUT"
      - name: Install Buildkite CLI
        id: install
        run: |
          set -euo pipefail
          echo "Installing Buildkite CLI manually..."
          
          # Dashboard-aligned aged stable baseline above the supported minimum.
          BK_VERSION="${BUILDKITE_CLI_BASELINE_VERSION}"
          echo "baseline_version=$BK_VERSION" >> "$GITHUB_OUTPUT"
          wget -q "https://github.com/buildkite/cli/releases/download/v${BK_VERSION}/bk_${BK_VERSION}_linux_arm64.tar.gz" -O bk.tar.gz
          
          tar -xzf bk.tar.gz
          chmod +x bk*/bk
          sudo mv bk*/bk /usr/local/bin/bk
          
          if command -v bk &> /dev/null; then
             echo "Buildkite CLI installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Buildkite CLI installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Buildkite CLI version
        id: version
        run: |
          set -euo pipefail
          RAW_VERSION=$(timeout 10s bk --version 2>&1 || true)
          VERSION=$(printf '%s\n' "$RAW_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Buildkite CLI version: $VERSION"
      
      - name: Test 1 - Check binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v bk &> /dev/null; then
            echo "✓ bk binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ bk binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if bk --version 2>&1 | grep -q "bk version"; then
            echo "✓ version command works"
            bk --version
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check help command
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if bk --help 2>&1 | grep -qi "Usage"; then
            echo "✓ help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Basic functional check: try to run with --version or --help and check exit code
          if bk --version > /dev/null 2>&1 || bk --help > /dev/null 2>&1; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="$(echo "${{ steps.version.outputs.version || 'unknown' }}" | tr -d '[:space:]' | sed 's/^v//')"
          if [ -z "$CURRENT" ]; then
            CURRENT="unknown"
          fi
          LATEST="${BUILDKITE_CLI_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: ${LATEST:-unknown}"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Dashboard metadata review required before Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured Buildkite CLI baseline and Test 6 candidate currently resolve to the same version. Review the dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Dashboard metadata review required before Test 6"
            echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the configured baseline and Test 6 candidate are identical. Review the dashboard-aligned baseline/candidate pair."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_TAR="/tmp/buildkite-cli-regression.tar.gz"
          NEXT_DIR=$(mktemp -d)
          NEXT_URL="https://github.com/buildkite/cli/releases/download/v${LATEST}/bk_${LATEST}_linux_arm64.tar.gz"
          if wget -q -O "$NEXT_TAR" "$NEXT_URL"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TAR" -C "$NEXT_DIR"
            NEXT_BIN=$(find "$NEXT_DIR" -type f -path '*/bk' | head -n 1)
            if [ -n "$NEXT_BIN" ]; then
              chmod +x "$NEXT_BIN"
              NEXT_INSTALLED_VERSION=$(timeout 10s "$NEXT_BIN" --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
              if [ -n "$NEXT_INSTALLED_VERSION" ] && [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                timeout 10s "$NEXT_BIN" --help >/dev/null 2>&1
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the installed binary reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the installed binary reported version ${NEXT_INSTALLED_VERSION}."
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} reported version ${NEXT_INSTALLED_VERSION:-unknown} on Arm64, which does not match the requested upgrade target." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
                echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} reported version ${NEXT_INSTALLED_VERSION:-unknown} on Arm64, which does not match the requested upgrade target."
                echo "status=failed" >> "$GITHUB_OUTPUT"
                END_TIME=$(date +%s)
                echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Arm64 binary." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Arm64 binary."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Buildkite CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          # Check binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check help command
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Buildkite CLI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check help command: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Support badge reflects Tests 1-5. Test 6 records upgrade-install readiness on Arm64." >> $GITHUB_STEP_SUMMARY
