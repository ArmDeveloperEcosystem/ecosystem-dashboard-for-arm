name: Test OpenTelemetry C++ on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/opentelemetry-cpp.md"
      - ".github/workflows/test-opentelemetry-cpp.yml"

jobs:
  test-opentelemetry-cpp:
    runs-on: ubuntu-24.04-arm
    env:
      OTEL_CPP_VERSION: "1.19.0"
      OTEL_CPP_NEXT_VERSION: "1.20.0"
      OTEL_CPP_URL: "https://github.com/open-telemetry/opentelemetry-cpp/archive/refs/tags/v1.19.0.tar.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=opentelemetry-cpp" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/opentelemetry-cpp" >> "$GITHUB_OUTPUT"

      - name: Install OpenTelemetry C++
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl ninja-build pkg-config

          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/otelcpp.tar.gz" "${OTEL_CPP_URL}"
          tar -xzf "${TMP_DIR}/otelcpp.tar.gz" -C "${TMP_DIR}"
          SRC_DIR="${TMP_DIR}/opentelemetry-cpp-${OTEL_CPP_VERSION}"
          PREFIX="${TMP_DIR}/otel-install"

          cmake -S "${SRC_DIR}" -B "${SRC_DIR}/build" -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DBUILD_TESTING=OFF \
            -DWITH_OTLP_GRPC=OFF \
            -DWITH_OTLP_HTTP=OFF \
            -DWITH_EXAMPLES=OFF \
            -DWITH_BENCHMARK=OFF
          cmake --build "${SRC_DIR}/build"
          cmake --install "${SRC_DIR}/build"

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OpenTelemetry C++ version
        id: version
        run: |
          set -euo pipefail
          LATEST="${OTEL_CPP_NEXT_VERSION}"
          echo "version=${OTEL_CPP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Header and Library Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          if [ -f "${PREFIX}/include/opentelemetry/trace/provider.h" ] && [ -f "${PREFIX}/include/opentelemetry/version.h" ] && [ -f "${PREFIX}/lib/libopentelemetry_trace.a" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          if grep -Eq '1\.19\.0' "${PREFIX}/include/opentelemetry/version.h"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          if [ -f "${PREFIX}/lib/cmake/opentelemetry-cpp/opentelemetry-cpp-config.cmake" ] || [ -f "${PREFIX}/share/cmake/opentelemetry-cpp/opentelemetry-cpp-config.cmake" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          cat > /tmp/otelcpp-smoke.cpp <<'EOF'
          #include <opentelemetry/trace/provider.h>
          #include <iostream>

          int main() {
            auto provider = opentelemetry::trace::Provider::GetTracerProvider();
            auto tracer = provider->GetTracer("arm64-smoke");
            auto span = tracer->StartSpan("demo-span");
            std::cout << (span ? "otelcpp-ok" : "otelcpp-failed") << std::endl;
            return 0;
          }
          EOF

          c++ -std=c++17 /tmp/otelcpp-smoke.cpp \
            -I"${PREFIX}/include" \
            -L"${PREFIX}/lib" \
            -lopentelemetry_trace \
            -lopentelemetry_common \
            -lopentelemetry_resources \
            -Wl,-rpath,"${PREFIX}/lib" \
            -o /tmp/otelcpp-smoke

          if /tmp/otelcpp-smoke | grep -q '^otelcpp-ok$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${OTEL_CPP_VERSION}"
          LATEST="${{ steps.version.outputs.latest || '' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenTelemetry C++ source release ${CURRENT} passed smoke tests in this run, but the next regression candidate could not be resolved from the official release API." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/otelcpp-next.tar.gz" "https://github.com/open-telemetry/opentelemetry-cpp/archive/refs/tags/v${LATEST}.tar.gz"
          tar -xzf "${TMP_DIR}/otelcpp-next.tar.gz" -C "${TMP_DIR}"
          SRC_DIR="${TMP_DIR}/opentelemetry-cpp-${LATEST}"
          PREFIX="${TMP_DIR}/otel-next-install"

          cmake -S "${SRC_DIR}" -B "${SRC_DIR}/build" -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DBUILD_TESTING=OFF \
            -DWITH_OTLP_GRPC=OFF \
            -DWITH_OTLP_HTTP=OFF \
            -DWITH_EXAMPLES=OFF \
            -DWITH_BENCHMARK=OFF
          cmake --build "${SRC_DIR}/build"
          cmake --install "${SRC_DIR}/build"

          cat > /tmp/otelcpp-next-smoke.cpp <<'EOF'
          #include <opentelemetry/trace/provider.h>
          #include <iostream>

          int main() {
            auto provider = opentelemetry::trace::Provider::GetTracerProvider();
            auto tracer = provider->GetTracer("arm64-regression");
            auto span = tracer->StartSpan("candidate-span");
            std::cout << (span ? "otelcpp-next-ok" : "otelcpp-next-failed") << std::endl;
            return 0;
          }
          EOF

          c++ -std=c++17 /tmp/otelcpp-next-smoke.cpp \
            -I"${PREFIX}/include" \
            -L"${PREFIX}/lib" \
            -lopentelemetry_trace \
            -lopentelemetry_common \
            -lopentelemetry_resources \
            -Wl,-rpath,"${PREFIX}/lib" \
            -o /tmp/otelcpp-next-smoke

          NEXT_INSTALLED_VERSION=$(python3 - "$PREFIX/include/opentelemetry/version.h" <<'PY'
          import pathlib, re, sys
          text = pathlib.Path(sys.argv[1]).read_text()
          def g(name):
              m = re.search(rf'#define\s+OPENTELEMETRY_{name}\s+(\d+)', text)
              return m.group(1) if m else None
          major, minor, patch = g("VERSION_MAJOR"), g("VERSION_MINOR"), g("VERSION_PATCH")
          print(".".join([major, minor, patch]) if all([major, minor, patch]) else "")
          PY
          )

          if [ -n "$NEXT_INSTALLED_VERSION" ] && /tmp/otelcpp-next-smoke | grep -q '^otelcpp-next-ok$'; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ] || [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned OpenTelemetry C++ release ${CURRENT} passed smoke tests in this run. Regression validation rebuilt official candidate version ${LATEST} on Arm64, installed it in an isolated prefix, and the candidate headers reported version ${NEXT_INSTALLED_VERSION} while the trace-provider smoke program compiled and ran successfully." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OpenTelemetry C++ release ${CURRENT} passed smoke tests in this run, but the candidate source release ${LATEST} did not complete a usable Arm64 build-and-smoke path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)

          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/opentelemetry-cpp.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Opentelemetry-cpp",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Header and Library Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || '' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opentelemetry-cpp-test-results
          path: test-results/opentelemetry-cpp.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          {
            echo "## OpenTelemetry C++ Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Header and Library Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "- Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "- Test 3 - Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "- Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
            echo "- Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "- Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
