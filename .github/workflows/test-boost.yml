name: Test Boost on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-boost.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-boost.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-boost.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-boost.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-boost.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-boost.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-boost.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-boost.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-boost.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-boost.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-boost.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-boost.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-boost.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-boost.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-boost.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-boost.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-boost.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-boost.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-boost.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-boost.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-boost.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-boost.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-boost.outputs.timestamp }}
jobs:
  test-boost:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Boost'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=boost" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/boost" >> "$GITHUB_OUTPUT"
      - name: Install Boost
        id: install
        run: |
          echo "Installing Boost..."
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev
          
          if [ -d "/usr/include/boost" ]; then
            echo "Boost installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Boost installation failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Boost version
        id: version
        run: |
          # Extract version from version.hpp
          if [ -f "/usr/include/boost/version.hpp" ]; then
             VERSION_LINE=$(grep "#define BOOST_LIB_VERSION" /usr/include/boost/version.hpp)
             VERSION=$(echo $VERSION_LINE | awk '{print $3}' | tr -d '"' | tr '_' '.')
             echo "version=$VERSION" >> $GITHUB_OUTPUT
             echo "Detected Boost version: $VERSION"
          else
             echo "version=unknown" >> $GITHUB_OUTPUT
             echo "Could not detect Boost version"
          fi
      
      - name: Test 1 - Check Headers
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "/usr/include/boost/version.hpp" ]; then
            echo "✓ Boost headers found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Boost headers not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          VERSION_LINE=$(grep "#define BOOST_LIB_VERSION" /usr/include/boost/version.hpp 2>&1)
          echo "$VERSION_LINE"

          if echo "$VERSION_LINE" | grep -q "BOOST_LIB_VERSION"; then
             echo "✓ Boost version metadata found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Boost version metadata not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check library availability
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if ldconfig -p | grep -q "libboost_filesystem" && ldconfig -p | grep -q "libboost_program_options"; then
             echo "✓ Boost libraries available to the linker"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Boost libraries not found in linker cache"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
             echo "✓ Running on Arm64"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Expected aarch64 runner"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Compile and run Boost examples
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation

          cat > test_boost.cpp << EOF
          #include <iostream>
          #include <boost/filesystem.hpp>
          
          int main() {
              boost::filesystem::path p("test_file.txt");
              std::cout << "Path: " << p.string() << std::endl;
              return 0;
          }
          EOF

          cat > test_options.cpp << EOF
          #include <boost/program_options.hpp>
          #include <iostream>
          
          namespace po = boost::program_options;
          
          int main(int argc, char** argv) {
              po::options_description desc("Allowed options");
              desc.add_options()
                  ("help", "produce help message")
                  ("compression", po::value<int>(), "set compression level");
              
              po::variables_map vm;
              po::store(po::parse_command_line(argc, argv, desc), vm);
              po::notify(vm);
              
              if (vm.count("help")) {
                  std::cout << desc << "\\n";
                  return 0;
              }
              return 0;
          }
          EOF

          g++ test_boost.cpp -o test_boost -lboost_filesystem -lboost_system
          g++ test_options.cpp -o test_options -lboost_program_options

          FS_OUTPUT=$(./test_boost)
          OPTIONS_OUTPUT=$(./test_options --help)
          echo "$FS_OUTPUT"
          echo "$OPTIONS_OUTPUT"

          if echo "$FS_OUTPUT" | grep -q "Path: test_file.txt" && echo "$OPTIONS_OUTPUT" | grep -q "Allowed options"; then
             echo "✓ Boost compiled and ran filesystem and program_options examples"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Boost functional validation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Headers
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check version metadata
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check library availability
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Verify architecture
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Compile and run Boost examples
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Boost Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Headers: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check version metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check library availability: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Compile and run Boost examples: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

