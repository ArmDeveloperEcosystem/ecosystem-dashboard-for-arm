name: Test Milvus on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-milvus.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-milvus.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-milvus.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-milvus.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-milvus.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-milvus.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-milvus.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-milvus.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-milvus.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-milvus.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-milvus.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-milvus.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-milvus.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-milvus.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-milvus.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-milvus.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-milvus.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-milvus.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-milvus.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-milvus.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-milvus.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-milvus.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-milvus.outputs.timestamp }}
jobs:
  test-milvus:
    runs-on: ubuntu-24.04-arm

    env:
      BASELINE_VERSION: "2.5.6"
      NEXT_VERSION: "2.5.7"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Milvus'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=milvus" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/milvus" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Milvus baseline assets
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          WORK_DIR="/tmp/milvus-${VERSION}"
          COMPOSE_PATH="${WORK_DIR}/milvus-standalone-docker-compose.yml"
          COMPOSE_URL="https://github.com/milvus-io/milvus/releases/download/v${VERSION}/milvus-standalone-docker-compose.yml"

          sudo apt-get update
          sudo apt-get install -y curl

          sudo rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          curl -fsSL "$COMPOSE_URL" -o "$COMPOSE_PATH"

          STANDALONE_IMAGE=$(grep -E '^[[:space:]]*image:[[:space:]]*milvusdb/milvus:' "$COMPOSE_PATH" | awk '{print $2}' | head -n 1)
          EXPECTED_IMAGE="milvusdb/milvus:v${VERSION}"

          if [ "$STANDALONE_IMAGE" != "$EXPECTED_IMAGE" ]; then
            echo "Expected Milvus image ${EXPECTED_IMAGE}, but compose file resolved ${STANDALONE_IMAGE}."
            exit 1
          fi

          echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "compose_path=$COMPOSE_PATH" >> "$GITHUB_OUTPUT"
          echo "work_dir=$WORK_DIR" >> "$GITHUB_OUTPUT"
          echo "standalone_image=$STANDALONE_IMAGE" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Milvus version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.baseline_version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Milvus version from official standalone image tag: $VERSION"

      - name: Test 1 - Check standalone compose asset
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${{ steps.install.outputs.compose_path }}" ] \
            && grep -q "image: milvusdb/milvus:v${{ steps.install.outputs.baseline_version }}" "${{ steps.install.outputs.compose_path }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Validate standalone compose configuration
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if DOCKER_VOLUME_DIRECTORY="${{ steps.install.outputs.work_dir }}" \
            docker compose -f "${{ steps.install.outputs.compose_path }}" config >/tmp/milvus-config.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/milvus-config.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Pull baseline standalone image and verify architecture
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.standalone_image }}"
          if DOCKER_VOLUME_DIRECTORY="${{ steps.install.outputs.work_dir }}" \
            docker compose -f "${{ steps.install.outputs.compose_path }}" pull standalone >/tmp/milvus-pull.log 2>&1 \
            && [ "$(docker image inspect "$IMAGE" --format '{{.Architecture}}')" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/milvus-pull.log || true
            docker image inspect "$IMAGE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Start baseline standalone stack and wait for health
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export COMPOSE_PROJECT_NAME="milvus-baseline-${{ github.run_id }}"
          export DOCKER_VOLUME_DIRECTORY="${{ steps.install.outputs.work_dir }}"

          docker compose -f "${{ steps.install.outputs.compose_path }}" up -d >/tmp/milvus-up.log 2>&1

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9091/healthz >/dev/null 2>&1; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done

          cat /tmp/milvus-up.log || true
          docker compose -f "${{ steps.install.outputs.compose_path }}" ps || true
          docker logs milvus-standalone || true
          echo "status=failed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Test 5 - Validate running standalone container and clean up baseline
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export COMPOSE_PROJECT_NAME="milvus-baseline-${{ github.run_id }}"
          export DOCKER_VOLUME_DIRECTORY="${{ steps.install.outputs.work_dir }}"
          IMAGE="${{ steps.install.outputs.standalone_image }}"

          cleanup() {
            docker compose -f "${{ steps.install.outputs.compose_path }}" down -v >/dev/null 2>&1 || true
            sudo rm -rf "${{ steps.install.outputs.work_dir }}"
          }
          trap cleanup EXIT

          RUN_IMAGE=$(docker inspect milvus-standalone --format '{{.Config.Image}}')
          HEALTH=$(docker inspect milvus-standalone --format '{{.State.Health.Status}}')
          HELP_OUTPUT=$(docker exec milvus-standalone /milvus/bin/milvus run --help 2>&1 || true)

          if [ "$RUN_IMAGE" = "$IMAGE" ] \
            && [ "$HEALTH" = "healthy" ] \
            && printf '%s\n' "$HELP_OUTPUT" | grep -q "milvus run"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "$HELP_OUTPUT"
            docker inspect milvus-standalone || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the latest stable upstream standalone compose release could not be resolved." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the latest stable upstream standalone compose release could not be resolved."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64 and is already the latest stable release with that path."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          WORK_DIR=$(mktemp -d)
          COMPOSE_PATH="${WORK_DIR}/milvus-standalone-docker-compose.yml"
          COMPOSE_URL="https://github.com/milvus-io/milvus/releases/download/v${LATEST}/milvus-standalone-docker-compose.yml"
          export COMPOSE_PROJECT_NAME="milvus-candidate-${{ github.run_id }}"
          export DOCKER_VOLUME_DIRECTORY="$WORK_DIR"

          cleanup() {
            docker compose -f "$COMPOSE_PATH" down -v >/dev/null 2>&1 || true
            sudo rm -rf "$WORK_DIR"
          }
          trap cleanup EXIT

          curl -fsSL "$COMPOSE_URL" -o "$COMPOSE_PATH"
          NEXT_IMAGE=$(grep -E '^[[:space:]]*image:[[:space:]]*milvusdb/milvus:' "$COMPOSE_PATH" | awk '{print $2}' | head -n 1)
          NEXT_REPORTED="${NEXT_IMAGE##*:v}"

          if [ "$NEXT_REPORTED" != "$LATEST" ]; then
            echo "next_installed_version=${NEXT_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate compose asset for ${LATEST} resolved an unexpected standalone image tag ${NEXT_IMAGE}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate compose asset for ${LATEST} resolved an unexpected standalone image tag ${NEXT_IMAGE}."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if DOCKER_VOLUME_DIRECTORY="$WORK_DIR" docker compose -f "$COMPOSE_PATH" config >/tmp/milvus-next-config.log 2>&1; then
            :
          else
            cat /tmp/milvus-next-config.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate compose configuration for ${LATEST} was not valid." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate compose configuration for ${LATEST} was not valid."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          docker compose -f "$COMPOSE_PATH" up -d >/tmp/milvus-next-up.log 2>&1

          HEALTH_OK=false
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9091/healthz >/dev/null 2>&1; then
              HEALTH_OK=true
              break
            fi
            sleep 5
          done

          NEXT_ARCH=$(docker image inspect "$NEXT_IMAGE" --format '{{.Architecture}}' || true)
          RUN_IMAGE=$(docker inspect milvus-standalone --format '{{.Config.Image}}' || true)
          HEALTH=$(docker inspect milvus-standalone --format '{{.State.Health.Status}}' || true)
          HELP_OUTPUT=$(docker exec milvus-standalone /milvus/bin/milvus run --help 2>&1 || true)

          if [ "$HEALTH_OK" = true ] \
            && [ "$NEXT_ARCH" = "arm64" ] \
            && [ "$RUN_IMAGE" = "$NEXT_IMAGE" ] \
            && [ "$HEALTH" = "healthy" ] \
            && printf '%s\n' "$HELP_OUTPUT" | grep -q "milvus run"; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64. Regression validation brought up the official standalone compose stack for candidate version ${LATEST}, the running standalone image tag resolved to ${NEXT_IMAGE}, and the health endpoint became ready on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64. Regression validation brought up the official standalone compose stack for candidate version ${LATEST}, the running standalone image tag resolved to ${NEXT_IMAGE}, and the health endpoint became ready on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/milvus-next-up.log || true
            echo "$HELP_OUTPUT"
            docker compose -f "$COMPOSE_PATH" ps || true
            docker logs milvus-standalone || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate standalone stack for ${LATEST} did not become healthy on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Milvus version ${CURRENT} passed the official standalone compose smoke path on Arm64, but the candidate standalone stack for ${LATEST} did not become healthy on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "## Milvus Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check standalone compose asset: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Validate standalone compose configuration: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Pull baseline standalone image and verify architecture: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Start baseline standalone stack and wait for health: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
