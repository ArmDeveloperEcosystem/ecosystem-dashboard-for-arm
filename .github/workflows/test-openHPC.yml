name: Test OpenHPC on Arm64

on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/openHPC.md"
      - ".github/workflows/test-openHPC.yml"

jobs:
  test-openhpc:
    runs-on: ubuntu-24.04-arm
    env:
      OPENHPC_VERSION: "v3.2.1.GA"
      OPENHPC_RELEASE_RPM: "https://repos.openhpc.community/OpenHPC/3/EL_9/aarch64/ohpc-release-3-1.el9.aarch64.rpm"
      OPENHPC_BASE_REPO: "http://repos.openhpc.community/OpenHPC/3/EL_9"
      OPENHPC_UPDATES_REPO: "http://repos.openhpc.community/OpenHPC/3/updates/EL_9"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openHPC" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openHPC" >> "$GITHUB_OUTPUT"
          echo "current_version=${OPENHPC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install OpenHPC release metadata
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl libarchive-tools python3

          WORKDIR="${RUNNER_TEMP}/openhpc"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          curl -fsSL -o "$WORKDIR/ohpc-release.rpm" "${OPENHPC_RELEASE_RPM}"
          bsdtar -xOf "$WORKDIR/ohpc-release.rpm" ./etc/yum.repos.d/OpenHPC.repo > "$WORKDIR/OpenHPC.repo"

          test -s "$WORKDIR/ohpc-release.rpm"
          test -s "$WORKDIR/OpenHPC.repo"

          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OpenHPC version
        id: version
        run: |
          set -euo pipefail
          echo "version=${OPENHPC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected OpenHPC version: ${OPENHPC_VERSION}"

      - name: Test 1 - Check release RPM download
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -s "${{ steps.install.outputs.workdir }}/ohpc-release.rpm" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check release tag exists
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if curl -fsSI "https://github.com/openhpc/ohpc/releases/tag/${OPENHPC_VERSION}" >/dev/null; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check OpenHPC repo file
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPO_FILE="${{ steps.install.outputs.workdir }}/OpenHPC.repo"
          if grep -Fq "${OPENHPC_BASE_REPO}" "$REPO_FILE" && grep -Fq "${OPENHPC_UPDATES_REPO}" "$REPO_FILE"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$REPO_FILE"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Validate Arm repo metadata
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          python3 - <<'PY'
          import gzip
          import urllib.request
          import xml.etree.ElementTree as ET

          repos = [
              "http://repos.openhpc.community/OpenHPC/3/EL_9",
              "http://repos.openhpc.community/OpenHPC/3/updates/EL_9",
          ]
          required = {"slurm-ohpc", "warewulf-ohpc", "lmod-ohpc"}
          found = set()

          for repo in repos:
              repomd = ET.fromstring(urllib.request.urlopen(f"{repo}/repodata/repomd.xml").read())
              ns = {"repo": "http://linux.duke.edu/metadata/repo"}
              primary_href = None
              if primary_href is None:
                  for data in repomd.findall(".//repo:data", ns):
                      if data.attrib.get("type") == "primary":
                          loc = data.find("repo:location", ns)
                          if loc is not None:
                              primary_href = loc.attrib.get("href")
                              break
              if primary_href is None:
                  raise SystemExit("primary metadata not found")
              raw = urllib.request.urlopen(f"{repo}/{primary_href}").read()
              if primary_href.endswith(".gz"):
                  raw = gzip.decompress(raw)
              primary = ET.fromstring(raw)
              pns = {"common": "http://linux.duke.edu/metadata/common"}
              for pkg in primary.findall(".//common:package", pns):
                  name = pkg.findtext("common:name", namespaces=pns)
                  arch = pkg.findtext("common:arch", namespaces=pns)
                  if arch == "aarch64" and name in required:
                      found.add(name)
          missing = required - found
          if missing:
              raise SystemExit(f"missing packages: {sorted(missing)}")
          print("openhpc-repodata-ok")
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/openHPC.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenHPC",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Shell",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check release RPM download", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check release tag exists", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check OpenHPC repo file", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Validate Arm repo metadata", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openHPC-test-results
          path: test-results/openHPC.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## OpenHPC Test Results"
            echo
            echo "- Version: \`${{ steps.version.outputs.version || 'unknown' }}\`"
            echo "- Status: \`${{ steps.summary.outputs.overall_status || 'failure' }}\`"
            echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}"
            echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}"
            echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- Runner: ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check release RPM download: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check release tag exists: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check OpenHPC repo file: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Validate Arm repo metadata: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
