name: Test OpenHPC on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-openhpc.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-openhpc.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-openhpc.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-openhpc.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-openhpc.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-openhpc.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-openhpc.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-openhpc.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-openhpc.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-openhpc.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-openhpc.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-openhpc.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-openhpc.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-openhpc.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-openhpc.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-openhpc.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-openhpc.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-openhpc.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-openhpc.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-openhpc.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-openhpc.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-openhpc.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-openhpc.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-openhpc.outputs.timestamp }}
jobs:
  test-openhpc:
    runs-on: ubuntu-24.04-arm
    env:
      OPENHPC_VERSION: "v3.2.1.GA"
      OPENHPC_RELEASE_RPM: "https://repos.openhpc.community/OpenHPC/3/EL_9/aarch64/ohpc-release-3-1.el9.aarch64.rpm"
      OPENHPC_BASE_REPO: "http://repos.openhpc.community/OpenHPC/3/EL_9"
      OPENHPC_UPDATES_REPO: "http://repos.openhpc.community/OpenHPC/3/updates/EL_9"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OpenHPC'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openHPC" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openHPC" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${OPENHPC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install OpenHPC release metadata
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl libarchive-tools python3"
          WORKDIR="${RUNNER_TEMP}/openhpc"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          curl -fsSL -o "$WORKDIR/ohpc-release.rpm" "${OPENHPC_RELEASE_RPM}"
          bsdtar -xOf "$WORKDIR/ohpc-release.rpm" ./etc/yum.repos.d/OpenHPC.repo > "$WORKDIR/OpenHPC.repo"

          test -s "$WORKDIR/ohpc-release.rpm"
          test -s "$WORKDIR/OpenHPC.repo"

          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OpenHPC version
        id: version
        run: |
          set -euo pipefail
          echo "version=${OPENHPC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected OpenHPC version: ${OPENHPC_VERSION}"

      - name: Test 1 - Check release RPM download
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -s "${{ steps.install.outputs.workdir }}/ohpc-release.rpm" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check release tag exists
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if curl -fsSI "https://github.com/openhpc/ohpc/releases/tag/${OPENHPC_VERSION}" >/dev/null; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check OpenHPC repo file
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPO_FILE="${{ steps.install.outputs.workdir }}/OpenHPC.repo"
          if grep -Fq "${OPENHPC_BASE_REPO}" "$REPO_FILE" && grep -Fq "${OPENHPC_UPDATES_REPO}" "$REPO_FILE"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$REPO_FILE"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Validate Arm repo metadata
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          python3 - <<'PY'
          import gzip
          import urllib.request
          import xml.etree.ElementTree as ET

          repos = [
              "http://repos.openhpc.community/OpenHPC/3/EL_9",
              "http://repos.openhpc.community/OpenHPC/3/updates/EL_9",
          ]
          required = {"slurm-ohpc", "warewulf-ohpc", "lmod-ohpc"}
          found = set()

          for repo in repos:
              repomd = ET.fromstring(urllib.request.urlopen(f"{repo}/repodata/repomd.xml").read())
              ns = {"repo": "http://linux.duke.edu/metadata/repo"}
              primary_href = None
              if primary_href is None:
                  for data in repomd.findall(".//repo:data", ns):
                      if data.attrib.get("type") == "primary":
                          loc = data.find("repo:location", ns)
                          if loc is not None:
                              primary_href = loc.attrib.get("href")
                              break
              if primary_href is None:
                  raise SystemExit("primary metadata not found")
              raw = urllib.request.urlopen(f"{repo}/{primary_href}").read()
              if primary_href.endswith(".gz"):
                  raw = gzip.decompress(raw)
              primary = ET.fromstring(raw)
              pns = {"common": "http://linux.duke.edu/metadata/common"}
              for pkg in primary.findall(".//common:package", pns):
                  name = pkg.findtext("common:name", namespaces=pns)
                  arch = pkg.findtext("common:arch", namespaces=pns)
                  if arch == "aarch64" and name in required:
                      found.add(name)
          missing = required - found
          if missing:
              raise SystemExit(f"missing packages: {sorted(missing)}")
          print("openhpc-repodata-ok")
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.OPENHPC_VERSION || 'unknown' }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export CURRENT
          NEXT="$(
            python3 - <<'PY'
          import json
          import os
          import re
          import urllib.request

          current = os.environ.get("CURRENT", "")
          m = re.fullmatch(r"v?(\d+)\.(\d+)(?:\.(\d+))?\.GA", current)
          if not m:
              print("")
              raise SystemExit(0)
          c = (
              int(m.group(1)),
              int(m.group(2)),
              int(m.group(3) or "0"),
          )

          releases = json.load(
              urllib.request.urlopen(
                  "https://api.github.com/repos/openhpc/ohpc/releases?per_page=100",
                  timeout=20,
              )
          )
          versions = []
          for rel in releases:
              if rel.get("draft") or rel.get("prerelease"):
                  continue
              tag = (rel.get("tag_name") or "").strip()
              mm = re.fullmatch(r"v?(\d+)\.(\d+)(?:\.(\d+))?\.GA", tag)
              if mm:
                  versions.append(
                      (
                          (
                              int(mm.group(1)),
                              int(mm.group(2)),
                              int(mm.group(3) or "0"),
                          ),
                          tag if tag.startswith("v") else f"v{tag}",
                      )
                  )

          versions = sorted(set(versions), key=lambda x: x[0])
          nxt = next((tag for parts, tag in versions if parts > c), "")
          print(nxt)
          PY
          )"

          LATEST="${NEXT:-$CURRENT}"

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable OpenHPC release is available beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} matches latest stable ${LATEST}; next-version regression is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_JSON="$(mktemp)"
          curl -fsSL "https://api.github.com/repos/openhpc/ohpc/releases/tags/${LATEST}" -o "$RELEASE_JSON"
          CANDIDATE_GUIDE_URL="$(
            python3 - "$RELEASE_JSON" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as f:
              rel = json.load(f)
          assets = rel.get("assets") or []
          chosen = ""
          for a in assets:
              url = (a.get("browser_download_url") or "").strip()
              name = (a.get("name") or "").strip()
              joined = f"{name} {url}".lower()
              if "aarch64" in joined and "install" in joined and url.endswith(".pdf"):
                  chosen = url
                  break
          print(chosen)
          PY
          )"

          if [ -z "$CANDIDATE_GUIDE_URL" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Resolved next OpenHPC release ${LATEST}, but no aarch64 install-guide asset was published for equivalent Arm64 repo validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if python3 - "$LATEST" <<'PY'
          import gzip
          import sys
          import urllib.request
          import xml.etree.ElementTree as ET

          latest = sys.argv[1].lstrip("v")
          version_core = latest.split(".GA", 1)[0]
          parts = version_core.split(".")
          major = int(parts[0])

          if major >= 4:
              repos = [
                  f"http://repos.openhpc.community/OpenHPC/{major}/EL_10",
                  f"http://repos.openhpc.community/OpenHPC/{major}/updates/EL_10",
              ]
          else:
              repos = [
                  f"http://repos.openhpc.community/OpenHPC/{major}/EL_9",
                  f"http://repos.openhpc.community/OpenHPC/{major}/updates/EL_9",
              ]

          required = {"slurm-ohpc", "warewulf-ohpc", "lmod-ohpc"}
          found = set()
          for repo in repos:
              repomd = ET.fromstring(urllib.request.urlopen(f"{repo}/repodata/repomd.xml", timeout=30).read())
              ns = {"repo": "http://linux.duke.edu/metadata/repo"}
              primary_href = None
              for data in repomd.findall(".//repo:data", ns):
                  if data.attrib.get("type") == "primary":
                      loc = data.find("repo:location", ns)
                      if loc is not None:
                          primary_href = loc.attrib.get("href")
                          break
              if primary_href is None:
                  continue
              raw = urllib.request.urlopen(f"{repo}/{primary_href}", timeout=30).read()
              if primary_href.endswith(".gz"):
                  raw = gzip.decompress(raw)
              primary = ET.fromstring(raw)
              pns = {"common": "http://linux.duke.edu/metadata/common"}
              for pkg in primary.findall(".//common:package", pns):
                  name = pkg.findtext("common:name", namespaces=pns)
                  arch = pkg.findtext("common:arch", namespaces=pns)
                  if arch == "aarch64" and name in required:
                      found.add(name)
          missing = required - found
          if missing:
              raise SystemExit(f"missing packages: {sorted(missing)}")
          PY
          then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed Tests 1-5, and the next newer OpenHPC release ${LATEST} published an aarch64 install guide while the matching OpenHPC repo/update channels exposed the required aarch64 package metadata." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} passed Tests 1-5, but the next newer OpenHPC release ${LATEST} did not provide equivalent Arm64 repo metadata/package coverage in the corresponding OpenHPC channels." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## OpenHPC Test Results"
            echo
            echo "- Version: \`${{ steps.version.outputs.version || 'unknown' }}\`"
            echo "- Status: \`${{ steps.summary.outputs.overall_status || 'failure' }}\`"
            echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}"
            echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}"
            echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- Runner: ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check release RPM download: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check release tag exists: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check OpenHPC repo file: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Validate Arm repo metadata: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
