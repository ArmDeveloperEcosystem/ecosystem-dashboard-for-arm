# Package Test Template
#
# This is a TEMPLATE file stored in the tests/ directory - it will not run as a workflow.
# To use it:
# 1. Copy this file to .github/workflows/test-<your-package>.yml
# 2. Replace all Java/OpenJDK placeholders with your package name (e.g., "Redis")
# 3. Replace all openjdk-17-jdk placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the appropriate trigger(s) in the 'on:' section
#
# See .github/workflows/test-nginx.yml and test-envoy.yml for real examples. Template
#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Java/OpenJDK placeholders with your package name (e.g., "Redis")
# 3. Replace all openjdk-17-jdk placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the 'push:' trigger section below (remove the workflow_dispatch if desired)
#
# See test-nginx.yml and test-envoy.yml for real examples.

name: Test Java/OpenJDK on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-java-openjdk.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-java-openjdk.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-java-openjdk.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-java-openjdk.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-java-openjdk.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-java-openjdk.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-java-openjdk.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-java-openjdk.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-java-openjdk.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-java-openjdk.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-java-openjdk.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-java-openjdk.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-java-openjdk.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-java-openjdk.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-java-openjdk.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-java-openjdk.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-java-openjdk.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-java-openjdk.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-java-openjdk.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-java-openjdk.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-java-openjdk.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-java-openjdk.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-java-openjdk.outputs.timestamp }}
jobs:
  test-java-openjdk:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Java/OpenJDK'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=java-openjdk" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/java-openjdk" >> "$GITHUB_OUTPUT"
      - name: Install Java/OpenJDK
        id: install
        run: |
          echo "Installing OpenJDK 17..."
          
          sudo apt-get update
          if sudo apt-get install -y openjdk-17-jdk; then
            echo "OpenJDK installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "OpenJDK installation failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Java/OpenJDK version
        id: version
        run: |
          # java -version outputs to stderr
          VERSION=$(java -version 2>&1 | head -n 1 | cut -d '"' -f 2 || echo "unknown")
          if [ -z "$VERSION" ]; then VERSION="unknown"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Java/OpenJDK version: $VERSION"
      
      - name: Test 1 - Check java binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v java &> /dev/null; then
            echo "✓ java binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ java binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check java version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if java -version 2>&1 | grep -q "version"; then
            echo "✓ java version command works"
            java -version
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ java version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check java help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if java --help 2>&1 | grep -qi "usage"; then
            echo "✓ java help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ java help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
 
      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Compile and run a minimal class to verify JVM works
          cat > Hello.java << EOF
          public class Hello {
              public static void main(String[] args) {
                  System.out.println("JVM OK");
              }
          }
          EOF
          if javac Hello.java && java Hello | grep -q "JVM OK"; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
 
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
 
          # Test 1
          STATUS_1="${{ steps.test1.outputs.status || 'skipped' }}"
          DURATION_1="${{ steps.test1.outputs.duration || 0 }}"
          if [ "$STATUS_1" == "passed" ]; then PASSED=$((PASSED + 1)); elif [ "$STATUS_1" == "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_1))
 
          # Test 2
          STATUS_2="${{ steps.test2.outputs.status || 'skipped' }}"
          DURATION_2="${{ steps.test2.outputs.duration || 0 }}"
          if [ "$STATUS_2" == "passed" ]; then PASSED=$((PASSED + 1)); elif [ "$STATUS_2" == "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_2))
 
          # Test 3
          STATUS_3="${{ steps.test3.outputs.status || 'skipped' }}"
          DURATION_3="${{ steps.test3.outputs.duration || 0 }}"
          if [ "$STATUS_3" == "passed" ]; then PASSED=$((PASSED + 1)); elif [ "$STATUS_3" == "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_3))
 
          # Test 4
          STATUS_4="${{ steps.test4.outputs.status || 'skipped' }}"
          DURATION_4="${{ steps.test4.outputs.duration || 0 }}"
          if [ "$STATUS_4" == "passed" ]; then PASSED=$((PASSED + 1)); elif [ "$STATUS_4" == "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_4))
 
          # Test 5
          STATUS_5="${{ steps.test5.outputs.status || 'skipped' }}"
          DURATION_5="${{ steps.test5.outputs.duration || 0 }}"
          if [ "$STATUS_5" == "passed" ]; then PASSED=$((PASSED + 1)); elif [ "$STATUS_5" == "failed" ]; then FAILED=$((FAILED + 1)); fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_5))
 
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
 
          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Java/OpenJDK Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check java binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check java version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check java help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
