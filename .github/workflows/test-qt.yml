name: Test Qt on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/qt.md"
      - ".github/workflows/test-qt.yml"

jobs:
  test-qt:
    runs-on: ubuntu-24.04-arm
    env:
      QT_PROJECT_DIR: /tmp/qt-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=qt" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/qt" >> "$GITHUB_OUTPUT"

      - name: Install Qt
        id: install
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y qt6-base-dev build-essential

          rm -rf "$QT_PROJECT_DIR"
          mkdir -p "$QT_PROJECT_DIR"
          printf '%s\n' \
            '#include <QCoreApplication>' \
            '#include <QDebug>' \
            'int main(int argc, char **argv) { QCoreApplication app(argc, argv); qDebug() << "qt-ok"; return 0; }' \
            > "$QT_PROJECT_DIR/main.cpp"
          printf '%s\n' \
            'QT += core' \
            'CONFIG += console c++17' \
            'CONFIG -= app_bundle' \
            'TEMPLATE = app' \
            'SOURCES += main.cpp' \
            > "$QT_PROJECT_DIR/qt-smoke.pro"

          if command -v qmake6 >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Qt version
        id: version
        run: |
          VERSION=$(qmake6 -query QT_VERSION 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Qt version: $VERSION"

      - name: Test 1 - Check qmake6 binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v qmake6 >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(qmake6 -query QT_VERSION 2>&1)
          echo "$VERSION_OUTPUT"
          if printf '%s\n' "$VERSION_OUTPUT" | grep -Eq '^[0-9]+\.[0-9]+'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          HELP_OUTPUT=$(qmake6 -help 2>&1 || true)
          if printf '%s\n' "$HELP_OUTPUT" | grep -qi "Usage"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "$QT_PROJECT_DIR"
          qmake6 qt-smoke.pro >/dev/null
          make -j"$(nproc)" >/dev/null
          APP_OUTPUT=$(./qt-smoke 2>&1)
          echo "$APP_OUTPUT"
          if printf '%s\n' "$APP_OUTPUT" | grep -q "qt-ok"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          for TEST_NUM in 1 2 3 4 5; do
            TEST_STATUS="${{ steps.test1.outputs.status }}"
            TEST_DURATION="${{ steps.test1.outputs.duration || 0 }}"
            case "$TEST_NUM" in
              1) TEST_STATUS="${{ steps.test1.outputs.status }}"; TEST_DURATION="${{ steps.test1.outputs.duration || 0 }}" ;;
              2) TEST_STATUS="${{ steps.test2.outputs.status }}"; TEST_DURATION="${{ steps.test2.outputs.duration || 0 }}" ;;
              3) TEST_STATUS="${{ steps.test3.outputs.status }}"; TEST_DURATION="${{ steps.test3.outputs.duration || 0 }}" ;;
              4) TEST_STATUS="${{ steps.test4.outputs.status }}"; TEST_DURATION="${{ steps.test4.outputs.duration || 0 }}" ;;
              5) TEST_STATUS="${{ steps.test5.outputs.status }}"; TEST_DURATION="${{ steps.test5.outputs.duration || 0 }}" ;;
            esac
            if [ "$TEST_STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + TEST_DURATION))
          done

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total_duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate JSON result
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/qt.json <<EOF
          {
            "package_name": "Qt",
            "package_slug": "qt",
            "run": {
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              },
              "workflow_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "version": {
              "tested": "${{ steps.version.outputs.version || 'unknown' }}"
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "total": 5,
              "details": [
                { "name": "Test 1 - Check qmake6 binary exists", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Check version output", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Check help output", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.overall_status == 'success' && 'passing' || 'failing' }}"
            }
          }
          EOF

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qt-test-results
          path: test-results/qt.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Qt Test Results"
            echo
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.total_duration }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check qmake6 binary exists: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Test 2 - Check version output: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
