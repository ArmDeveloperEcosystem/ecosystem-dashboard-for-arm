name: Test Libopus on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/libopus.md"
      - ".github/workflows/test-libopus.yml"

jobs:
  test-libopus:
    runs-on: ubuntu-24.04-arm
    env:
      LIBOPUS_VERSION: "v1.5.1"
      LIBOPUS_NEXT_VERSION: "1.5.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libopus" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libopus" >> "$GITHUB_OUTPUT"
          echo "current_version=${LIBOPUS_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Install Libopus
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config git
          rm -rf /tmp/opus
          git clone --depth 1 --branch "${LIBOPUS_VERSION}" https://github.com/xiph/opus.git /tmp/opus
          cd /tmp/opus
          ./autogen.sh
          ./configure --prefix=/tmp/opus-install
          make -j"$(nproc)"
          make install
          if [ -f /tmp/opus-install/include/opus/opus.h ] && { [ -f /tmp/opus-install/lib/libopus.so ] || [ -f /tmp/opus-install/lib/libopus.a ]; }; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Libopus version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(git -C /tmp/opus describe --tags --abbrev=0 | sed 's/^v//')
          LATEST="${LIBOPUS_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check headers and library artifacts exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f /tmp/opus-install/include/opus/opus.h ] && { [ -f /tmp/opus-install/lib/libopus.so ] || [ -f /tmp/opus-install/lib/libopus.a ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TAG_VERSION="$(git -C /tmp/opus describe --tags --abbrev=0 2>/dev/null || true)"
          if [ "${{ steps.version.outputs.version }}" = "${LIBOPUS_VERSION#v}" ] \
            || [ "${TAG_VERSION}" = "${LIBOPUS_VERSION}" ] \
            || [ "${TAG_VERSION#v}" = "${LIBOPUS_VERSION#v}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'reported=%s\ntag=%s\n' "${{ steps.version.outputs.version }}" "${TAG_VERSION}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check API surface
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if grep -q 'opus_encoder_create' /tmp/opus-install/include/opus/opus.h; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > /tmp/opus-smoke.c <<'EOF'
          #include <opus/opus.h>
          #include <stdio.h>
          int main(void) {
            int err = OPUS_OK;
            OpusEncoder *enc = opus_encoder_create(48000, 1, OPUS_APPLICATION_AUDIO, &err);
            if (err != OPUS_OK || !enc) return 1;
            puts("libopus-ok");
            opus_encoder_destroy(enc);
            return 0;
          }
          EOF
          cc -I/tmp/opus-install/include/opus /tmp/opus-smoke.c -L/tmp/opus-install/lib -lopus -o /tmp/opus-smoke
          if LD_LIBRARY_PATH=/tmp/opus-install/lib /tmp/opus-smoke | grep -q '^libopus-ok$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || '1.5.1' }}"
          LATEST="${{ steps.version.outputs.latest || '1.5.2' }}"
          REGRESSION_TAG="v${LATEST}"
          REGRESSION_SRC_DIR="/tmp/opus-regression"
          REGRESSION_PREFIX="/tmp/opus-regression-install"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          rm -rf "${REGRESSION_SRC_DIR}" "${REGRESSION_PREFIX}"
          git clone --depth 1 --branch "${REGRESSION_TAG}" https://github.com/xiph/opus.git "${REGRESSION_SRC_DIR}" >/tmp/opus-regression-clone.log 2>&1
          (
            cd "${REGRESSION_SRC_DIR}"
            ./autogen.sh >/tmp/opus-regression-build.log 2>&1
            ./configure --prefix="${REGRESSION_PREFIX}" >>/tmp/opus-regression-build.log 2>&1
            make -j"$(nproc)" >>/tmp/opus-regression-build.log 2>&1
            make install >/tmp/opus-regression-install.log 2>&1
          )

          REGRESSION_INCLUDE_DIR=$(find "${REGRESSION_PREFIX}" -type d -path '*/include/opus' | head -n 1)
          REGRESSION_INCLUDE_PARENT=$(dirname "${REGRESSION_INCLUDE_DIR}")
          REGRESSION_LIB_DIR=$(find "${REGRESSION_PREFIX}" -type f \( -name 'libopus.so' -o -name 'libopus.so.*' -o -name 'libopus.a' \) -printf '%h\n' | sort -u | head -n 1)
          NEXT_INSTALLED_VERSION=$(git -C "${REGRESSION_SRC_DIR}" describe --tags --abbrev=0 | sed 's/^v//' || true)

          cat > /tmp/opus-regression-smoke.c <<'EOF'
          #include <opus/opus.h>
          #include <stdio.h>
          int main(void) {
            int err = OPUS_OK;
            OpusEncoder *enc = opus_encoder_create(48000, 1, OPUS_APPLICATION_AUDIO, &err);
            if (err != OPUS_OK || !enc) return 1;
            puts("libopus-regression-ok");
            opus_encoder_destroy(enc);
            return 0;
          }
          EOF
          cc -I"${REGRESSION_INCLUDE_PARENT}" /tmp/opus-regression-smoke.c -L"${REGRESSION_LIB_DIR}" -Wl,-rpath,"${REGRESSION_LIB_DIR}" -lopus -o /tmp/opus-regression-smoke
          LD_LIBRARY_PATH="${REGRESSION_LIB_DIR}" /tmp/opus-regression-smoke | tee /tmp/opus-regression-functional.log

          if [ -n "${NEXT_INSTALLED_VERSION}" ] && grep -q '^libopus-regression-ok$' /tmp/opus-regression-functional.log; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Libopus baseline version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the installed artifact reported version ${NEXT_INSTALLED_VERSION}, and the isolated encoder smoke program succeeded." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            cat /tmp/opus-regression-clone.log || true
            cat /tmp/opus-regression-build.log || true
            cat /tmp/opus-regression-install.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Libopus baseline version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be rebuilt and validated successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi
          cat > test-results/libopus.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Libopus",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check headers and library artifacts exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check API surface", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libopus-test-results
          path: test-results/libopus.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Libopus Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Test Details"
            echo "1. Check headers and library artifacts exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check API surface: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
