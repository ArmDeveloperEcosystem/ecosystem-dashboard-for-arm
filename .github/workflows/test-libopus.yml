name: Test Libopus on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-libopus.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-libopus.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-libopus.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-libopus.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-libopus.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-libopus.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-libopus.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-libopus.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-libopus.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-libopus.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-libopus.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-libopus.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-libopus.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-libopus.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-libopus.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-libopus.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-libopus.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-libopus.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-libopus.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-libopus.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-libopus.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-libopus.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-libopus.outputs.timestamp }}
jobs:
  test-libopus:
    runs-on: ubuntu-24.04-arm
    env:
      LIBOPUS_VERSION: "v1.5.1"
      LIBOPUS_NEXT_VERSION: "1.5.2"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Libopus'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libopus" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libopus" >> "$GITHUB_OUTPUT"
          echo "current_version=${LIBOPUS_VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Install Libopus
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "build-essential autoconf automake libtool pkg-config git"
          rm -rf /tmp/opus
          git clone --depth 1 --branch "${LIBOPUS_VERSION}" https://github.com/xiph/opus.git /tmp/opus
          cd /tmp/opus
          MODEL_HASH="$(awk -F'\"' '/dnn\\/download_model\\.sh/ {print $2; exit}' autogen.sh || true)"
          if [ -n "${MODEL_HASH}" ]; then
            MODEL_FILE="opus_data-${MODEL_HASH}.tar.gz"
            mkdir -p dnn
            if ! DOWNLOAD_ATTEMPTS=3 \
              DOWNLOAD_CONNECT_TIMEOUT=30 \
              DOWNLOAD_MAX_TIME=300 \
              DOWNLOAD_RETRY_DELAY=5 \
              DOWNLOAD_WGET_TIMEOUT=60 \
              DOWNLOAD_WGET_WAITRETRY=5 \
              bash "$HELPER" "dnn/${MODEL_FILE}" \
                "https://media.xiph.org/opus/models/${MODEL_FILE}" \
                "http://media.xiph.org/opus/models/${MODEL_FILE}"; then
              echo "install_status=failed" >> "$GITHUB_OUTPUT"
              echo "install_blocker=model_download_failed" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if ! ./autogen.sh; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=autogen_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! ./configure --prefix=/tmp/opus-install; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=configure_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! make -j"$(nproc)"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=build_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! make install; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=install_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f /tmp/opus-install/include/opus/opus.h ] && { [ -f /tmp/opus-install/lib/libopus.so ] || [ -f /tmp/opus-install/lib/libopus.a ]; }; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Get Libopus version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "version=${LIBOPUS_VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "latest=${LIBOPUS_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(git -C /tmp/opus describe --tags --abbrev=0 | sed 's/^v//')
          LATEST="${LIBOPUS_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check headers and library artifacts exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f /tmp/opus-install/include/opus/opus.h ] && { [ -f /tmp/opus-install/lib/libopus.so ] || [ -f /tmp/opus-install/lib/libopus.a ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG_VERSION="$(git -C /tmp/opus describe --tags --abbrev=0 2>/dev/null || true)"
          if [ "${{ steps.version.outputs.version }}" = "${LIBOPUS_VERSION#v}" ] \
            || [ "${TAG_VERSION}" = "${LIBOPUS_VERSION}" ] \
            || [ "${TAG_VERSION#v}" = "${LIBOPUS_VERSION#v}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'reported=%s\ntag=%s\n' "${{ steps.version.outputs.version }}" "${TAG_VERSION}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check API surface
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if grep -q 'opus_encoder_create' /tmp/opus-install/include/opus/opus.h; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat > /tmp/opus-smoke.c <<'EOF'
          #include <opus/opus.h>
          #include <stdio.h>
          int main(void) {
            int err = OPUS_OK;
            OpusEncoder *enc = opus_encoder_create(48000, 1, OPUS_APPLICATION_AUDIO, &err);
            if (err != OPUS_OK || !enc) return 1;
            puts("libopus-ok");
            opus_encoder_destroy(enc);
            return 0;
          }
          EOF
          cc -I/tmp/opus-install/include /tmp/opus-smoke.c -L/tmp/opus-install/lib -lopus -o /tmp/opus-smoke
          LD_LIBRARY_PATH=/tmp/opus-install/lib /tmp/opus-smoke > /tmp/opus-smoke.out
          if grep -q '^libopus-ok$' /tmp/opus-smoke.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/opus-smoke.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || '1.5.1' }}"
          LATEST="${{ steps.version.outputs.latest || '1.5.2' }}"
          REGRESSION_TAG="v${LATEST}"
          REGRESSION_SRC_DIR="/tmp/opus-regression"
          REGRESSION_PREFIX="/tmp/opus-regression-install"
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ] || \
             [ "${{ steps.test1.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'skipped' }}" != "passed" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed in this run" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned libopus baseline ${CURRENT} did not complete baseline installation or core smoke validation cleanly in this run, so next-version validation was skipped on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "${REGRESSION_SRC_DIR}" "${REGRESSION_PREFIX}"
          git clone --depth 1 --branch "${REGRESSION_TAG}" https://github.com/xiph/opus.git "${REGRESSION_SRC_DIR}" >/tmp/opus-regression-clone.log 2>&1
          (
            cd "${REGRESSION_SRC_DIR}"
            MODEL_HASH="$(awk -F'\"' '/dnn\\/download_model\\.sh/ {print $2; exit}' autogen.sh || true)"
            if [ -n "${MODEL_HASH}" ]; then
              MODEL_FILE="opus_data-${MODEL_HASH}.tar.gz"
              mkdir -p dnn
              DOWNLOAD_ATTEMPTS=3 \
              DOWNLOAD_CONNECT_TIMEOUT=30 \
              DOWNLOAD_MAX_TIME=300 \
              DOWNLOAD_RETRY_DELAY=5 \
              DOWNLOAD_WGET_TIMEOUT=60 \
              DOWNLOAD_WGET_WAITRETRY=5 \
                bash "$HELPER" "dnn/${MODEL_FILE}" \
                  "https://media.xiph.org/opus/models/${MODEL_FILE}" \
                  "http://media.xiph.org/opus/models/${MODEL_FILE}"
            fi
            ./autogen.sh >/tmp/opus-regression-build.log 2>&1
            ./configure --prefix="${REGRESSION_PREFIX}" >>/tmp/opus-regression-build.log 2>&1
            make -j"$(nproc)" >>/tmp/opus-regression-build.log 2>&1
            make install >/tmp/opus-regression-install.log 2>&1
          )

          REGRESSION_INCLUDE_DIR=$(find "${REGRESSION_PREFIX}" -type d -path '*/include/opus' | head -n 1)
          REGRESSION_INCLUDE_PARENT=$(dirname "${REGRESSION_INCLUDE_DIR}")
          REGRESSION_LIB_DIR=$(find "${REGRESSION_PREFIX}" -type f \( -name 'libopus.so' -o -name 'libopus.so.*' -o -name 'libopus.a' \) -printf '%h\n' | sort -u | head -n 1)
          NEXT_INSTALLED_VERSION=$(git -C "${REGRESSION_SRC_DIR}" describe --tags --abbrev=0 | sed 's/^v//' || true)

          cat > /tmp/opus-regression-smoke.c <<'EOF'
          #include <opus/opus.h>
          #include <stdio.h>
          int main(void) {
            int err = OPUS_OK;
            OpusEncoder *enc = opus_encoder_create(48000, 1, OPUS_APPLICATION_AUDIO, &err);
            if (err != OPUS_OK || !enc) return 1;
            puts("libopus-regression-ok");
            opus_encoder_destroy(enc);
            return 0;
          }
          EOF
          cc -I"${REGRESSION_INCLUDE_PARENT}" /tmp/opus-regression-smoke.c -L"${REGRESSION_LIB_DIR}" -Wl,-rpath,"${REGRESSION_LIB_DIR}" -lopus -o /tmp/opus-regression-smoke
          LD_LIBRARY_PATH="${REGRESSION_LIB_DIR}" /tmp/opus-regression-smoke | tee /tmp/opus-regression-functional.log

          if [ -n "${NEXT_INSTALLED_VERSION}" ] && grep -q '^libopus-regression-ok$' /tmp/opus-regression-functional.log; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Libopus baseline version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the installed artifact reported version ${NEXT_INSTALLED_VERSION}, and the isolated encoder smoke program succeeded." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            cat /tmp/opus-regression-clone.log || true
            cat /tmp/opus-regression-build.log || true
            cat /tmp/opus-regression-install.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Libopus baseline version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be rebuilt and validated successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ] || \
             [ "${{ steps.test6.outputs.decision || '' }}" = "baseline_failed" ]; then
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=1" >> "$GITHUB_OUTPUT"
            echo "core_failed=1" >> "$GITHUB_OUTPUT"
            echo "duration=${{ steps.test6.outputs.duration || 0 }}" >> "$GITHUB_OUTPUT"
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Libopus Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Test Details"
            echo "1. Check headers and library artifacts exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check API surface: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
