name: Test Miniforge on Arm64
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-miniforge.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-miniforge.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-miniforge.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-miniforge.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-miniforge.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-miniforge.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-miniforge.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-miniforge.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-miniforge.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-miniforge.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-miniforge.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-miniforge.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-miniforge.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-miniforge.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-miniforge.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-miniforge.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-miniforge.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-miniforge.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-miniforge.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-miniforge.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-miniforge.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-miniforge.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-miniforge.outputs.timestamp }}
jobs:
  test-miniforge:
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Miniforge'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=miniforge" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/miniforge" >> "$GITHUB_OUTPUT"
          echo "current_version=24.11.3-0" >> "$GITHUB_OUTPUT"
          echo "next_version=24.11.3-1" >> "$GITHUB_OUTPUT"
      - name: Install Miniforge
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget
          VERSION="${{ steps.metadata.outputs.current_version }}"
          URL="https://github.com/conda-forge/miniforge/releases/download/${VERSION}/Miniforge3-${VERSION}-Linux-aarch64.sh"
          
          if wget -q -O Miniforge3-Linux-aarch64.sh "$URL"; then
             rm -rf "$HOME/miniforge3"
             bash Miniforge3-Linux-aarch64.sh -b -p "$HOME/miniforge3"
             echo "Miniforge installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Miniforge download failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Miniforge version
        id: version
        run: |
          set -euo pipefail
          export PATH="$HOME/miniforge3/bin:$PATH"
          RELEASE_VERSION="${{ steps.metadata.outputs.current_version }}"
          extract_version() {
            printf '%s\n' "$1" | tr -d '\r' | sed -n '1{s/^[^0-9]*\([0-9][0-9.]*\).*$/\1/p;}' | head -n 1 || true
          }
          if command -v conda &> /dev/null; then
             CONDA_VERSION=$(extract_version "$(conda --version 2>&1 || true)")
             MAMBA_VERSION=$(extract_version "$(mamba --version 2>&1 || true)")
          else
             CONDA_VERSION="unknown"
             MAMBA_VERSION="unknown"
          fi
          CONDA_VERSION="${CONDA_VERSION:-unknown}"
          MAMBA_VERSION="${MAMBA_VERSION:-unknown}"
          echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "conda_version=$CONDA_VERSION" >> $GITHUB_OUTPUT
          echo "mamba_version=$MAMBA_VERSION" >> $GITHUB_OUTPUT
          echo "Detected Miniforge release: $RELEASE_VERSION"
          echo "Detected bundled conda version: $CONDA_VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check conda binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          export PATH="$HOME/miniforge3/bin:$PATH"
          
          if command -v conda &> /dev/null; then
            echo "✓ conda binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ conda binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          export PATH="$HOME/miniforge3/bin:$PATH"
          
          if conda --version 2>&1 | grep -q "conda"; then
            echo "✓ version command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check info command
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          export PATH="$HOME/miniforge3/bin:$PATH"
          
          if conda info 2>&1 | grep -q "platform : linux-aarch64"; then
             echo "✓ info command works and platform is correct"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ info command failed or platform mismatch"
             conda info || true
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check list command
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          export PATH="$HOME/miniforge3/bin:$PATH"
          
          if conda list 2>&1 | grep -q "packages"; then
             echo "✓ list command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ list command failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Create test environment
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export PATH="$HOME/miniforge3/bin:$PATH"
          if conda create -n testenv -y python=3.12 >/dev/null 2>&1; then
             echo "✓ Environment creation passed"
             conda env remove -n testenv -y
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Environment creation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }
          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "$TEST6_STATUS" "${{ steps.test6.outputs.duration || 0 }}"

          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi
          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Miniforge Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check conda binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check info command: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check list command: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Create test environment: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression applicability: package-manager installed (not applicable)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
