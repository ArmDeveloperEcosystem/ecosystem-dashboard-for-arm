name: Test Rinetd on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/rinetd.md"
      - ".github/workflows/test-rinetd.yml"

jobs:
  test-rinetd:
    runs-on: ubuntu-24.04-arm
    env:
      RINETD_VERSION: "0.62.0sam"
      RINETD_NEXT_VERSION: "0.73"
      RINETD_WORKDIR: "/tmp/rinetd-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rinetd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rinetd" >> "$GITHUB_OUTPUT"
      - name: Install Rinetd baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config curl ca-certificates netcat-openbsd

          rm -rf "${RINETD_WORKDIR}"
          mkdir -p "${RINETD_WORKDIR}"
          curl -fsSL -o "${RINETD_WORKDIR}/rinetd-${RINETD_VERSION}.tar.gz" \
            "https://github.com/samhocevar/rinetd/archive/refs/tags/v${RINETD_VERSION}.tar.gz"
          tar -xzf "${RINETD_WORKDIR}/rinetd-${RINETD_VERSION}.tar.gz" -C "${RINETD_WORKDIR}"

          BASE_DIR="${RINETD_WORKDIR}/rinetd-${RINETD_VERSION}"
          cd "${BASE_DIR}"
          ./bootstrap >/dev/null
          ./configure >/dev/null
          make -j2 >/dev/null
          test -x "${BASE_DIR}/rinetd"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Rinetd version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/rinetd" --version 2>&1 | awk 'NR==1 {print $2}')
          LATEST="${RINETD_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Rinetd version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check rinetd binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if [ -x "${BASE_DIR}/rinetd" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$("${BASE_DIR}/rinetd" --version 2>&1 | awk 'NR==1 {print $2}')

          if [ "$VERSION" = "${RINETD_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_DIR}/rinetd" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if "${BASE_DIR}/rinetd" --help > /tmp/rinetd-help.txt 2>&1 && grep -Eqi "usage|conf-file|foreground|rinetd" /tmp/rinetd-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rinetd-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"

          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_DIR}/rinetd" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_DIR}/rinetd" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/rinetd-functional"
          FRONT_PORT=19090
          BACK_PORT=19091
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          CFG="${ROOT}/rinetd.conf"
          cat > "${CFG}" <<EOF_CFG
          0.0.0.0 ${FRONT_PORT} 127.0.0.1 ${BACK_PORT}
          EOF_CFG

          BACK_PID=""
          RINETD_PID=""
          cleanup() {
            if [ -n "${RINETD_PID}" ]; then
              kill "${RINETD_PID}" >/dev/null 2>&1 || true
              wait "${RINETD_PID}" >/dev/null 2>&1 || true
            fi
            if [ -n "${BACK_PID}" ]; then
              kill "${BACK_PID}" >/dev/null 2>&1 || true
              wait "${BACK_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          python3 - <<PY >/tmp/rinetd-backend.txt 2>&1 &
          import socket
          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", ${BACK_PORT}))
          server.listen(1)
          conn, _ = server.accept()
          conn.recv(1024)
          conn.sendall(b"pong-baseline\n")
          conn.close()
          server.close()
          PY
          BACK_PID=$!
          "${BASE_DIR}/rinetd" -f -c "${CFG}" >/tmp/rinetd-run.txt 2>&1 &
          RINETD_PID=$!

          READY=0
          for _ in $(seq 1 20); do
            if ! kill -0 "${RINETD_PID}" >/dev/null 2>&1; then
              break
            fi
            if ss -ltn "( sport = :${FRONT_PORT} )" 2>/dev/null | grep -q LISTEN; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "${READY}" -ne 1 ]; then
            cat /tmp/rinetd-run.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          timeout 5s bash -lc "printf 'hello\n' | nc -w 5 127.0.0.1 ${FRONT_PORT}" > "${ROOT}/out.txt"

          if grep -q "pong-baseline" "${ROOT}/out.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/rinetd-run.txt || true
            cat "${ROOT}/out.txt" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/rinetd-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/rinetd-${LATEST}.tar.gz" \
            "https://github.com/samhocevar/rinetd/archive/refs/tags/v${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/rinetd-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/rinetd-${LATEST}"
          cd "${NEXT_DIR}"
          ./bootstrap >/dev/null
          ./configure >/dev/null
          make -j2 >/dev/null

          NEXT_VERSION_OUTPUT=$("${NEXT_DIR}/rinetd" --version 2>&1 || true)
          NEXT_INSTALLED=$(printf '%s\n' "$NEXT_VERSION_OUTPUT" | grep -oE '[0-9]+\.[0-9]+(?:\.[0-9]+)?[A-Za-z0-9._-]*' | head -n 1 || true)
          if [ -z "$NEXT_INSTALLED" ] && [ -n "$NEXT_VERSION_OUTPUT" ]; then
            NEXT_INSTALLED="${LATEST}"
          fi

          ROOT="/tmp/rinetd-regression-functional"
          FRONT_PORT=19100
          BACK_PORT=19101
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}"

          CFG="${ROOT}/rinetd.conf"
          cat > "${CFG}" <<EOF_CFG
          0.0.0.0 ${FRONT_PORT} 127.0.0.1 ${BACK_PORT}
          EOF_CFG

          BACK_PID=""
          RINETD_PID=""
          cleanup() {
            if [ -n "${RINETD_PID}" ]; then
              kill "${RINETD_PID}" >/dev/null 2>&1 || true
              wait "${RINETD_PID}" >/dev/null 2>&1 || true
            fi
            if [ -n "${BACK_PID}" ]; then
              kill "${BACK_PID}" >/dev/null 2>&1 || true
              wait "${BACK_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          python3 - <<PY >/tmp/rinetd-next-backend.txt 2>&1 &
          import socket
          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", ${BACK_PORT}))
          server.listen(1)
          conn, _ = server.accept()
          conn.recv(1024)
          conn.sendall(b"pong-candidate\n")
          conn.close()
          server.close()
          PY
          BACK_PID=$!
          "${NEXT_DIR}/rinetd" -f -c "${CFG}" >/tmp/rinetd-next-run.txt 2>&1 &
          RINETD_PID=$!

          READY=0
          for _ in $(seq 1 20); do
            if ! kill -0 "${RINETD_PID}" >/dev/null 2>&1; then
              break
            fi
            if ss -ltn "( sport = :${FRONT_PORT} )" 2>/dev/null | grep -q LISTEN; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "${READY}" -ne 1 ]; then
            cat /tmp/rinetd-next-run.txt || true
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not keep the forwarding daemon alive long enough to accept Arm64 traffic." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} exited before the forwarding listener became ready on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            STATUS="failed"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
            echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          timeout 5s bash -lc "printf 'hello\n' | nc -w 5 127.0.0.1 ${FRONT_PORT}" > "${ROOT}/out.txt"

          if [ "$NEXT_INSTALLED" = "$LATEST" ] && grep -q "pong-candidate" "${ROOT}/out.txt"; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            if [ "$LATEST" = "$CURRENT" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned Rinetd version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release. Regression validation rebuilt the same release in an isolated Arm64 environment, and the candidate binary reported version ${NEXT_INSTALLED} while successfully forwarding TCP traffic."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              STATUS="failed"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Rinetd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and it successfully forwarded TCP traffic." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Rinetd version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} on Arm64, the isolated candidate binary reported version ${NEXT_INSTALLED}, and it successfully forwarded TCP traffic."
              echo "status=passed" >> "$GITHUB_OUTPUT"
              STATUS="passed"
            fi
          else
            cat /tmp/rinetd-next-run.txt || true
            cat "${ROOT}/out.txt" || true
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 rebuild-and-forward validation." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Rinetd version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 rebuild-and-forward validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'failed' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/rinetd.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Rinetd",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check rinetd binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check exact version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Current pinned version passed smoke tests; latest-stable comparison still needs review.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rinetd-test-results
          path: test-results/rinetd.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## Rinetd Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check rinetd binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
