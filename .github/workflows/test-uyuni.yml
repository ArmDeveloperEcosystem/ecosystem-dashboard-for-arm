name: Test Uyuni (Community-driven project for SUSE Multi-Linux Manager) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-uyuni.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-uyuni.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-uyuni.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-uyuni.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-uyuni.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-uyuni.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-uyuni.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-uyuni.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-uyuni.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-uyuni.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-uyuni.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-uyuni.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-uyuni.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-uyuni.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-uyuni.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-uyuni.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-uyuni.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-uyuni.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-uyuni.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-uyuni.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-uyuni.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-uyuni.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-uyuni.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-uyuni.outputs.timestamp }}
jobs:
  test-uyuni:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      UYUNI_REGISTRY_REPO: "registry.opensuse.org/uyuni/server"
      UYUNI_BASELINE_TAG: "2026.03"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Uyuni (Community-driven project for SUSE Multi-Linux Manager)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=uyuni" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/uyuni" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${UYUNI_BASELINE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Uyuni baseline image
        id: install
        run: |
          set -euo pipefail
          IMAGE="${UYUNI_REGISTRY_REPO}:${UYUNI_BASELINE_TAG}"
          echo "Pulling ${IMAGE}"
          docker pull --quiet "$IMAGE"
          docker image inspect "$IMAGE" >/dev/null
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Uyuni version
        id: version
        run: |
          set -euo pipefail
          VERSION="${UYUNI_BASELINE_TAG}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Uyuni baseline tag: $VERSION"

      - name: Test 1 - Check baseline image pulled
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if docker image inspect "${{ steps.install.outputs.image }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Verify baseline tag metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if [[ "$IMAGE" == *":${UYUNI_BASELINE_TAG}" ]]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Container smoke command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'cat /etc/os-release | grep -Eiq "(opensuse|sles|suse)"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify image architecture
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          ARCH=$(docker image inspect "$IMAGE" --format '{{.Architecture}}')
          if [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Validate Uyuni package footprint
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'rpm -qa | grep -Eiq "(uyuni|susemanager|spacewalk)"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT="${UYUNI_BASELINE_TAG}"
          TAGS_JSON=$(curl -fsSL "https://registry.opensuse.org/v2/uyuni/server/tags/list")
          NEXT=$(
            CURRENT_TAG="${CURRENT}" TAGS_JSON_PAYLOAD="${TAGS_JSON}" python3 - <<'PY'
          import json
          import os
          import re

          current = os.environ.get("CURRENT_TAG", "")
          tags = json.loads(os.environ.get("TAGS_JSON_PAYLOAD", "{}")).get("tags", [])
          stable = sorted({t for t in tags if re.fullmatch(r"\d{4}\.\d{2}", t)})

          def key(tag: str):
              year, month = tag.split(".")
              return int(year), int(month)

          try:
              current_key = key(current)
          except Exception:
              print("")
              raise SystemExit(0)

          next_tag = next((tag for tag in sorted(stable, key=key) if key(tag) > current_key), "")
          print(next_tag)
          PY
          )

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT:-$CURRENT}" >> "$GITHUB_OUTPUT"

          if [ -z "$NEXT" ]; then
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Uyuni tag available" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} is currently the latest stable tag available from the official registry." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            CANDIDATE_IMAGE="${UYUNI_REGISTRY_REPO}:${NEXT}"
            docker pull --quiet "$CANDIDATE_IMAGE"
            if docker run --rm --entrypoint /bin/sh "$CANDIDATE_IMAGE" -lc 'rpm -qa | grep -Eiq "(uyuni|susemanager|spacewalk)"'; then
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=$NEXT" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Baseline ${CURRENT} passed smoke tests and the next newer stable ${NEXT} also validated on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Baseline ${CURRENT} passed smoke tests, but candidate ${NEXT} failed package-footprint validation on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" != "passed" ]; then
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test6() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test6 "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          PASSED=$((6 - FAILED))
          if [ "$PASSED" -lt 0 ]; then PASSED=0; fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Uyuni (Community-driven project for SUSE Multi-Linux Manager) Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.summary.outputs.overall_status || 'failure' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest stable tag: ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Decision: ${{ steps.test6.outputs.decision || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Details: ${{ steps.test6.outputs.comparison || 'Regression comparison unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
