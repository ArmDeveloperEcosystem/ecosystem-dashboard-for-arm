name: Test Uyuni (Community-driven project for SUSE Multi-Linux Manager) on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/uyuni.md"
      - ".github/workflows/test-uyuni.yml"

jobs:
  test-uyuni:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      UYUNI_REGISTRY_REPO: "registry.opensuse.org/uyuni/server"
      UYUNI_BASELINE_TAG: "2026.03"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=uyuni" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/uyuni" >> "$GITHUB_OUTPUT"
          echo "current_version=${UYUNI_BASELINE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Uyuni baseline image
        id: install
        run: |
          set -euo pipefail
          IMAGE="${UYUNI_REGISTRY_REPO}:${UYUNI_BASELINE_TAG}"
          echo "Pulling ${IMAGE}"
          docker pull --quiet "$IMAGE"
          docker image inspect "$IMAGE" >/dev/null
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Uyuni version
        id: version
        run: |
          set -euo pipefail
          VERSION="${UYUNI_BASELINE_TAG}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Uyuni baseline tag: $VERSION"

      - name: Test 1 - Check baseline image pulled
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if docker image inspect "${{ steps.install.outputs.image }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Verify baseline tag metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if [[ "$IMAGE" == *":${UYUNI_BASELINE_TAG}" ]]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Container smoke command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'cat /etc/os-release | grep -Eiq "(opensuse|sles|suse)"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify image architecture
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          ARCH=$(docker image inspect "$IMAGE" --format '{{.Architecture}}')
          if [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Validate Uyuni package footprint
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          IMAGE="${{ steps.install.outputs.image }}"
          if docker run --rm --entrypoint /bin/sh "$IMAGE" -lc 'rpm -qa | grep -Eiq "(uyuni|susemanager|spacewalk)"'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${UYUNI_BASELINE_TAG}"
          TAGS_JSON=$(curl -fsSL "https://registry.opensuse.org/v2/uyuni/server/tags/list")
          LATEST=$(python3 -c 'import json,re,sys; tags=json.loads(sys.stdin.read()).get("tags", []); stable=[t for t in tags if re.fullmatch(r"\d{4}\.\d{2}", t)]; print(sorted(stable)[-1] if stable else "")' <<< "$TAGS_JSON")

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST" ] || [ "$LATEST" = "$CURRENT" ]; then
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Uyuni tag available" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} is currently the latest stable tag available from the official registry." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            CANDIDATE_IMAGE="${UYUNI_REGISTRY_REPO}:${LATEST}"
            docker pull --quiet "$CANDIDATE_IMAGE"
            if docker run --rm --entrypoint /bin/sh "$CANDIDATE_IMAGE" -lc 'rpm -qa | grep -Eiq "(uyuni|susemanager|spacewalk)"'; then
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install validated on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Baseline ${CURRENT} passed smoke tests and newer stable ${LATEST} also validated on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Baseline ${CURRENT} passed smoke tests, but candidate ${LATEST} failed package-footprint validation on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Resolve job URL
        if: always()
        id: job_url
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --paginate --jq '.jobs[] | [.name, .html_url] | @tsv' 2>/dev/null | awk -F $'\t' -v job="$JOB_ID" '$1 == job " / " job || $1 == job || $1 ~ (" / " job "$") {print $2; exit}')
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=$JOB_URL" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" != "passed" ]; then
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test6() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test6 "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          PASSED=$((6 - FAILED))
          if [ "$PASSED" -lt 0 ]; then PASSED=0; fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          cat > test-results/uyuni.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Uyuni (Community-driven project for SUSE Multi-Linux Manager)",
              "version": "${{ steps.version.outputs.version || 'unknown' }}",
              "language": "DevOps",
              "category": "DevOps"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.job_url.outputs.url }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status || 'failure' }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check baseline image pulled",
                  "status": "${{ steps.test1.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Verify baseline tag metadata",
                  "status": "${{ steps.test2.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Container smoke command",
                  "status": "${{ steps.test3.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Verify image architecture",
                  "status": "${{ steps.test4.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Validate Uyuni package footprint",
                  "status": "${{ steps.test5.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "regression_validation": {
              "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
              "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
              "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
              "decision": "${{ steps.test6.outputs.decision || 'unknown' }}",
              "result": "${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}",
              "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison unavailable' }}"
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status || 'failing' }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uyuni-test-results
          path: test-results/uyuni.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Uyuni (Community-driven project for SUSE Multi-Linux Manager) Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.summary.outputs.overall_status || 'failure' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests Passed: ${{ steps.summary.outputs.passed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests Failed: ${{ steps.summary.outputs.failed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Duration: ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest stable tag: ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Decision: ${{ steps.test6.outputs.decision || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Details: ${{ steps.test6.outputs.comparison || 'Regression comparison unavailable' }}" >> "$GITHUB_STEP_SUMMARY"
