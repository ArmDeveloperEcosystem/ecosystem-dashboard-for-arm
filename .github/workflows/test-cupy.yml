name: Test CuPy on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cupy.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cupy.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cupy.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cupy.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cupy.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cupy.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cupy.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cupy.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cupy.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cupy.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cupy.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cupy.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cupy.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cupy.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cupy.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cupy.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cupy.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cupy.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-cupy.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cupy.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cupy.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cupy.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cupy.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cupy.outputs.timestamp }}

jobs:
  test-cupy:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "9.6.0"
      PACKAGE_SLUG: "cupy"
      LANE_KIND: "gpu/specialized/manual-review"
      DOWNLOAD_URL: "https://github.com/cupy/cupy/releases"
      HOMEPAGE_URL: "https://cupy.dev/"
      OFFICIAL_DOCS: "https://docs.cupy.dev/en/stable/install.html"
      GITHUB_REPO: "cupy/cupy"
      PACKAGE_PAGE: "content/linux/opensource_packages/cupy.md"
      SOURCE_GLOBS: "cupy|cupy_backends|docs|examples|pyproject.toml"
      EVIDENCE_RE: "CuPy|NumPy|SciPy|CUDA"
      TEST5_MODE: "python"
      PYTHON_TARGETS: "cupy|cupy_backends"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'CuPy'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          # shellcheck disable=SC2129
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cupy" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/cupy" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          # shellcheck disable=SC2129
          set -euo pipefail
          write_output() {
            printf '%s\n' "$@" >> "$GITHUB_OUTPUT"
          }
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              write_output "resolved_tag=$RESOLVED_TAG"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              write_output "resolved_tag=default_branch"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              write_output "install_mode=github_source" "install_status=success"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            write_output "resolved_tag=external_artifact" "install_mode=external_artifact" "install_status=success"
            exit 0
          fi
          write_output "install_mode=unresolved" "install_status=failed"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ ! -f "$PACKAGE_PAGE" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            FOUND=0
            IFS='|' read -r -a PATTERNS <<< "$SOURCE_GLOBS"
            for PATTERN in "${PATTERNS[@]}"; do
              [ -z "$PATTERN" ] && continue
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                FOUND=1
                break
              fi
            done
            if [ "$FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline version and release alignment
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if ! grep -Fq "version_number: $BASELINE_VERSION" "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            RESOLVED="${{ steps.install.outputs.resolved_tag || '' }}"
            if [ -z "$RESOLVED" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [ "$RESOLVED" != "default_branch" ] && [ "$RESOLVED" != "$BASELINE_VERSION" ] && [ "$RESOLVED" != "v$BASELINE_VERSION" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ] || ! grep -Fq "$DOWNLOAD_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Package-specific source or docs evidence
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" = "github_source" ]; then
            if ! grep -R -I -Eiq "$EVIDENCE_RE" baseline-src 2>/dev/null; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            DOC_FOUND=0
            for PATTERN in README* docs examples; do
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                DOC_FOUND=1
                break
              fi
            done
            if [ "$DOC_FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if ! grep -Eiq "$EVIDENCE_RE" "$PACKAGE_PAGE"; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if ! grep -Fq "$HOMEPAGE_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 support gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" != "github_source" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=CuPy Arm preflight requires the package source checkout; metadata-only evidence is not treated as a smoke pass." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          [ "$(uname -m)" = "aarch64" ]
          python3 - "baseline-src" "$BASELINE_VERSION" <<'PY'
          import ast
          import compileall
          import importlib.util
          import platform
          import sys
          from pathlib import Path

          root = Path(sys.argv[1]).resolve()
          expected = sys.argv[2].lstrip("v")
          if platform.machine().lower() not in {"aarch64", "arm64"}:
              raise SystemExit(f"CuPy Arm preflight requires Arm64, got {platform.machine()}")
          required = [
              "cupy/__init__.py",
              "cupy/_version.py",
              "cupy/_environment.py",
              "cupy/cuda/runtime.py",
              "cupy_backends/cuda/api/__init__.py",
          ]
          for rel in required:
              if not (root / rel).exists():
                  raise SystemExit(f"missing CuPy source surface: {rel}")
          build_surface = next((rel for rel in ("setup.py", "pyproject.toml") if (root / rel).exists()), None)
          if build_surface is None:
              raise SystemExit("missing CuPy build surface: setup.py or pyproject.toml")
          for rel in ("cupy", "cupy_backends", "cupyx"):
              if not compileall.compile_dir(str(root / rel), quiet=1):
                  raise SystemExit(f"compileall failed for {rel}")
          for rel in ("cupy/__init__.py", "cupy/cuda/runtime.py", "cupy/_environment.py"):
              ast.parse((root / rel).read_text(encoding="utf-8"), filename=rel)

          version_spec = importlib.util.spec_from_file_location("cupy_source_version", root / "cupy/_version.py")
          version_mod = importlib.util.module_from_spec(version_spec)
          version_spec.loader.exec_module(version_mod)
          actual = getattr(version_mod, "__version__", "")
          if actual != expected:
              raise SystemExit(f"CuPy source version {actual} != expected {expected}")

          env_spec = importlib.util.spec_from_file_location("cupy_source_environment", root / "cupy/_environment.py")
          env_mod = importlib.util.module_from_spec(env_spec)
          env_spec.loader.exec_module(env_mod)
          try:
              cuda_path = env_mod.get_cuda_path()
          except Exception as exc:
              cuda_path = f"unavailable:{exc.__class__.__name__}"
          try:
              nvcc_path = env_mod.get_nvcc_path()
          except Exception as exc:
              nvcc_path = f"unavailable:{exc.__class__.__name__}"

          sys.path.insert(0, str(root))
          try:
              import cupy  # type: ignore
          except ImportError as exc:
              message = str(exc)
              allowed = (
                  "CuPy is not correctly installed",
                  "No module named 'numpy'",
                  "No module named 'cupy._core'",
                  "cannot import name '_core'",
              )
              if not any(token in message for token in allowed):
                  raise
          else:
              if getattr(cupy, "__version__", "") != expected:
                  raise SystemExit("imported CuPy version did not match source version")
          print(f"cupy-preflight-ok: version={actual} cuda_path={cuda_path} nvcc_path={nvcc_path}")
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=CuPy Arm preflight passed: compiled cupy/cupy_backends/cupyx Python sources, loaded source version and CUDA environment config, and performed a guarded import boundary check on Arm64 without claiming CUDA runtime execution." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
          limited_cpu_probe: |
            set -euo pipefail
            [ "$(uname -m)" = "aarch64" ]
            python3 - "next-src" "${LATEST_VERSION:-}" <<'PY'
            import ast
            import compileall
            import importlib.util
            import platform
            import sys
            from pathlib import Path

            root = Path(sys.argv[1]).resolve()
            expected = sys.argv[2].lstrip("v")
            if platform.machine().lower() not in {"aarch64", "arm64"}:
                raise SystemExit(f"CuPy Arm preflight requires Arm64, got {platform.machine()}")
            required = [
                "cupy/__init__.py",
                "cupy/_version.py",
                "cupy/_environment.py",
                "cupy/cuda/runtime.py",
                "cupy_backends/cuda/api/__init__.py",
            ]
            for rel in required:
                if not (root / rel).exists():
                    raise SystemExit(f"missing CuPy source surface: {rel}")
            build_surface = next((rel for rel in ("setup.py", "pyproject.toml") if (root / rel).exists()), None)
            if build_surface is None:
                raise SystemExit("missing CuPy build surface: setup.py or pyproject.toml")
            for rel in ("cupy", "cupy_backends", "cupyx"):
                if not compileall.compile_dir(str(root / rel), quiet=1):
                    raise SystemExit(f"compileall failed for {rel}")
            for rel in ("cupy/__init__.py", "cupy/cuda/runtime.py", "cupy/_environment.py"):
                ast.parse((root / rel).read_text(encoding="utf-8"), filename=rel)

            version_spec = importlib.util.spec_from_file_location("cupy_next_source_version", root / "cupy/_version.py")
            version_mod = importlib.util.module_from_spec(version_spec)
            version_spec.loader.exec_module(version_mod)
            actual = getattr(version_mod, "__version__", "")
            if expected and actual != expected:
                raise SystemExit(f"CuPy source version {actual} != expected {expected}")

            env_spec = importlib.util.spec_from_file_location("cupy_next_source_environment", root / "cupy/_environment.py")
            env_mod = importlib.util.module_from_spec(env_spec)
            env_spec.loader.exec_module(env_mod)
            try:
                cuda_path = env_mod.get_cuda_path()
            except Exception as exc:
                cuda_path = f"unavailable:{exc.__class__.__name__}"
            try:
                nvcc_path = env_mod.get_nvcc_path()
            except Exception as exc:
                nvcc_path = f"unavailable:{exc.__class__.__name__}"

            sys.path.insert(0, str(root))
            try:
                import cupy  # type: ignore
            except ImportError as exc:
                message = str(exc)
                allowed = (
                    "CuPy is not correctly installed",
                    "No module named 'numpy'",
                    "No module named 'cupy._core'",
                    "cannot import name '_core'",
                )
                if not any(token in message for token in allowed):
                    raise
            else:
                if expected and getattr(cupy, "__version__", "") != expected:
                    raise SystemExit("imported CuPy version did not match source version")
            print(f"cupy-next-preflight-ok: version={actual} cuda_path={cuda_path} nvcc_path={nvcc_path}")
            PY
          limited_cpu_description: "Test 6 limited_cpu_smoke_validated: reran the CuPy bounded Arm source preflight against the next stable candidate, compiling cupy/cupy_backends/cupyx sources, loading source version and CUDA environment config, and checking the guarded import boundary. This is CPU-side package preflight evidence only; no CUDA driver, CUDA runtime, or GPU array execution is claimed."
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          # shellcheck disable=SC2129
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          {
            echo "passed=$PASSED"
            echo "failed=$FAILED"
            echo "skipped=$SKIPPED"
            echo "duration=$DURATION"
            echo "core_failed=$CORE_FAILED"
            echo "overall_status=$OVERALL_STATUS"
            echo "badge_status=$BADGE_STATUS"
          } >> "$GITHUB_OUTPUT"
