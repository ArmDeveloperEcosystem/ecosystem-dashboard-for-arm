name: Test Chef Infra on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-chef-infra.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-chef-infra.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-chef-infra.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-chef-infra.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-chef-infra.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-chef-infra.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-chef-infra.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-chef-infra.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-chef-infra.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-chef-infra.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-chef-infra.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-chef-infra.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-chef-infra.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-chef-infra.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-chef-infra.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-chef-infra.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-chef-infra.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-chef-infra.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-chef-infra.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-chef-infra.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-chef-infra.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-chef-infra.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-chef-infra.outputs.timestamp }}
jobs:
  test-chef-infra:
    runs-on: ubuntu-24.04-arm
    env:
      CHEF_VERSION: "18.8.54"
      CHEF_NEXT_VERSION: "18.10.17"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Chef Infra'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=chef-infra" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/chef-infra" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget
      
      - name: Install Chef Infra Client
        id: install
        run: |
          set -euo pipefail
          echo "Installing Chef Infra Client..."
          CURRENT_VERSION="${CHEF_VERSION}"
          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          CHEF_DEB_URL="https://packages.chef.io/files/stable/chef/${CURRENT_VERSION}/ubuntu/24.04/chef_${CURRENT_VERSION}-1_arm64.deb"
          wget -q -O /tmp/chef-infra-client.deb "$CHEF_DEB_URL"
          sudo dpkg -i /tmp/chef-infra-client.deb >/tmp/chef-install.log 2>&1 || {
            cat /tmp/chef-install.log
            sudo apt-get install -f -y
            sudo dpkg -i /tmp/chef-infra-client.deb
          }

          if command -v chef-client >/dev/null 2>&1; then
            echo "Chef Infra Client installed successfully"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to install Chef Infra Client"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      
      - name: Get Chef version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(timeout 10s chef-client --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Chef version: $VERSION"
      
      - name: Test 1 - Check Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if which chef-client; then
            echo "✓ chef-client binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ chef-client binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Run Help
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if timeout 10s chef-client --help >/dev/null 2>&1; then
             echo "✓ chef-client help works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ chef-client help failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Ohai
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # Ohai is installed with Chef
          if which ohai && timeout 10s ohai --version >/dev/null 2>&1; then
             echo "✓ ohai binary found and works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ ohai check failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Local Mode Run
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          cat > hello.rb << 'EOF'
          file '/tmp/hello.txt' do
            content 'Hello, World!'
          end
          EOF
          
          if sudo env CHEF_LICENSE=accept-silent timeout 120s chef-apply hello.rb >/tmp/chef-apply.log 2>&1; then
             if grep -q "Hello, World!" /tmp/hello.txt; then
                echo "✓ chef-client local run successful"
                echo "status=passed" >> $GITHUB_OUTPUT
            else
                echo "✗ File content mismatch"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
            fi
          else
             echo "✗ chef-client local run failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || steps.install.outputs.baseline_version || env.CHEF_VERSION }}"
          LATEST_VERSION="${CHEF_NEXT_VERSION}"
          NEXT_INSTALLED_VERSION="not_installed"
          STATUS="failed"
          DECISION="next_install_failed"
          RESULT="Next version installation failed on Arm64"
          COMPARISON="Current pinned version ${CURRENT_VERSION} passed Tests 1-5, but next candidate ${LATEST_VERSION} did not install/report cleanly on Arm64."

          NEXT_DEB_URL="https://packages.chef.io/files/stable/chef/${LATEST_VERSION}/ubuntu/24.04/chef_${LATEST_VERSION}-1_arm64.deb"
          if wget -q -O /tmp/chef-infra-next.deb "$NEXT_DEB_URL"; then
            if sudo dpkg -i /tmp/chef-infra-next.deb >/tmp/chef-next-install.log 2>&1 || { sudo apt-get install -f -y >/tmp/chef-next-fix.log 2>&1 && sudo dpkg -i /tmp/chef-infra-next.deb >/tmp/chef-next-install-retry.log 2>&1; }; then
              NEXT_INSTALLED_VERSION=$(timeout 10s chef-client --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
              if [ "$NEXT_INSTALLED_VERSION" = "$LATEST_VERSION" ]; then
                STATUS="passed"
                DECISION="next_install_validated"
                RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned version ${CURRENT_VERSION} passed Tests 1-5 in this run. The next candidate ${LATEST_VERSION} downloaded and installed successfully on Arm64, and chef-client reported ${NEXT_INSTALLED_VERSION}."
              fi
            fi
          fi

          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          # Check Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Run Help
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check Ohai
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Local Mode Run
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Chef Infra Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Run Help: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Ohai: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Local Mode Run: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
