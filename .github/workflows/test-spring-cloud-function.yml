name: Test Spring Cloud Function on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/spring-cloud-function.md"
      - ".github/workflows/test-spring-cloud-function.yml"

jobs:
  test-spring-cloud-function:
    runs-on: ubuntu-24.04-arm
    env:
      SPRING_BOOT_VERSION: "3.2.4"
      SPRING_CLOUD_FUNCTION_VERSION: "4.1.1"
      SPRING_FUNCTION_SMOKE_DIR: ${{ github.workspace }}/spring-cloud-function-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spring-cloud-function" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spring-cloud-function" >> "$GITHUB_OUTPUT"

      - name: Install Spring Cloud Function smoke project
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y maven openjdk-21-jdk

          rm -rf "$SPRING_FUNCTION_SMOKE_DIR"
          mkdir -p "$SPRING_FUNCTION_SMOKE_DIR/src/main/java/com/example"

          cat > "$SPRING_FUNCTION_SMOKE_DIR/pom.xml" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <parent>
              <groupId>org.springframework.boot</groupId>
              <artifactId>spring-boot-starter-parent</artifactId>
              <version>${SPRING_BOOT_VERSION}</version>
              <relativePath/>
            </parent>
            <groupId>arm.smoke</groupId>
            <artifactId>spring-cloud-function-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <java.version>17</java.version>
              <spring-cloud-function.version>${SPRING_CLOUD_FUNCTION_VERSION}</spring-cloud-function.version>
            </properties>
            <dependencies>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter</artifactId>
              </dependency>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-function-context</artifactId>
                <version>${SPRING_CLOUD_FUNCTION_VERSION}</version>
              </dependency>
            </dependencies>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.codehaus.mojo</groupId>
                  <artifactId>exec-maven-plugin</artifactId>
                  <version>3.5.0</version>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF

          cat > "$SPRING_FUNCTION_SMOKE_DIR/src/main/java/com/example/App.java" <<'EOF'
          package com.example;

          import java.util.Locale;
          import java.util.function.Function;
          import org.springframework.boot.SpringApplication;
          import org.springframework.boot.autoconfigure.SpringBootApplication;
          import org.springframework.context.annotation.Bean;

          @SpringBootApplication
          public class App {
              @Bean
              Function<String, String> uppercase() {
                  return value -> value.toUpperCase(Locale.ROOT);
              }

              public static void main(String[] args) {
                  SpringApplication.run(App.class, args);
              }
          }
          EOF

          cat > "$SPRING_FUNCTION_SMOKE_DIR/src/main/java/com/example/InvokeFunction.java" <<'EOF'
          package com.example;

          import java.util.function.Function;
          import org.springframework.boot.SpringApplication;
          import org.springframework.context.ConfigurableApplicationContext;

          public class InvokeFunction {
              @SuppressWarnings("unchecked")
              public static void main(String[] args) {
                  ConfigurableApplicationContext ctx = SpringApplication.run(App.class, "--spring.main.web-application-type=none");
                  Function<String, String> fn = (Function<String, String>) ctx.getBean("uppercase");
                  System.out.println(fn.apply("arm64"));
                  ctx.close();
              }
          }
          EOF

          if [ -f "$SPRING_FUNCTION_SMOKE_DIR/pom.xml" ] && [ -f "$SPRING_FUNCTION_SMOKE_DIR/src/main/java/com/example/InvokeFunction.java" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Spring Cloud Function version
        id: version
        run: |
          echo "version=${SPRING_CLOUD_FUNCTION_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Smoke Project Files
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -f "$SPRING_FUNCTION_SMOKE_DIR/pom.xml" ] && [ -f "$SPRING_FUNCTION_SMOKE_DIR/src/main/java/com/example/App.java" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Dependency Version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$SPRING_FUNCTION_SMOKE_DIR"
          mvn -q dependency:list -DincludeArtifactIds=spring-cloud-function-context -DoutputFile=deps.txt

          if grep -q "org.springframework.cloud:spring-cloud-function-context:jar:${SPRING_CLOUD_FUNCTION_VERSION}" deps.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Build Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$SPRING_FUNCTION_SMOKE_DIR"
          mvn -q help:effective-pom -Doutput=effective-pom.xml

          if grep -q '<artifactId>spring-cloud-function-context</artifactId>' effective-pom.xml; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "$SPRING_FUNCTION_SMOKE_DIR"

          if mvn -q -DskipTests compile exec:java -Dexec.mainClass=com.example.InvokeFunction | tail -1 | grep -qx 'ARM64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/spring-cloud-function.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Spring Cloud Function",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "DevOps"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Smoke Project Files", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Dependency Version", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Build Configuration", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-cloud-function-test-results
          path: test-results/spring-cloud-function.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Spring Cloud Function Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Check Smoke Project Files: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "- Test 2 - Check Dependency Version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "- Test 3 - Check Build Configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
