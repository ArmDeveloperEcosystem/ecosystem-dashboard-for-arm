name: Test All Packages (Batch 21) on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - smoke_tests
    paths:
      - '.github/workflows/test-all-packages-batch21.yml'

jobs:

  test-shap:
    uses: ./.github/workflows/test-shap.yml

  test-slang:
    uses: ./.github/workflows/test-slang.yml

  test-sparks-rapids:
    uses: ./.github/workflows/test-sparks-rapids.yml

  test-spice-opus:
    uses: ./.github/workflows/test-spice-opus.yml

  test-stable-baseline3:
    uses: ./.github/workflows/test-stable-baseline3.yml

  test-statsforecast:
    uses: ./.github/workflows/test-statsforecast.yml

  test-statsmodels:
    uses: ./.github/workflows/test-statsmodels.yml

  test-sunshine:
    uses: ./.github/workflows/test-sunshine.yml

  test-tabPFN:
    uses: ./.github/workflows/test-tabPFN.yml

  test-tabpfn-time-series:
    uses: ./.github/workflows/test-tabpfn-time-series.yml

  test-tensorrt-llm:
    uses: ./.github/workflows/test-tensorrt-llm.yml

  test-tensorrt:
    uses: ./.github/workflows/test-tensorrt.yml

  test-tilelang:
    uses: ./.github/workflows/test-tilelang.yml

  test-triton:
    uses: ./.github/workflows/test-triton.yml

  test-turbovnc:
    uses: ./.github/workflows/test-turbovnc.yml

  test-ubuntudesktop:
    uses: ./.github/workflows/test-ubuntudesktop.yml

  test-ucx:
    uses: ./.github/workflows/test-ucx.yml

  test-vcpkg:
    uses: ./.github/workflows/test-vcpkg.yml

  test-velox:
    uses: ./.github/workflows/test-velox.yml

  test-verible:
    uses: ./.github/workflows/test-verible.yml

  test-verilator:
    uses: ./.github/workflows/test-verilator.yml

  test-veriloggen:
    uses: ./.github/workflows/test-veriloggen.yml

  test-videomass:
    uses: ./.github/workflows/test-videomass.yml

  test-vidgear:
    uses: ./.github/workflows/test-vidgear.yml

  test-warp:
    uses: ./.github/workflows/test-warp.yml

  test-wsl:
    uses: ./.github/workflows/test-wsl.yml

  test-xpra:
    uses: ./.github/workflows/test-xpra.yml

  test-xschem:
    uses: ./.github/workflows/test-xschem.yml

  test-yosys:
    uses: ./.github/workflows/test-yosys.yml

  summary:
    needs:
      [
        test-shap,
        test-slang,
        test-sparks-rapids,
        test-spice-opus,
        test-stable-baseline3,
        test-statsforecast,
        test-statsmodels,
        test-sunshine,
        test-tabPFN,
        test-tabpfn-time-series,
        test-tensorrt-llm,
        test-tensorrt,
        test-tilelang,
        test-triton,
        test-turbovnc,
        test-ubuntudesktop,
        test-ucx,
        test-vcpkg,
        test-velox,
        test-verible,
        test-verilator,
        test-veriloggen,
        test-videomass,
        test-vidgear,
        test-warp,
        test-wsl,
        test-xpra,
        test-xschem,
        test-yosys
      ]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect batch results
        id: collect
        uses: ./.github/actions/collect-batch-results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          batch_number: "21"
          batch_title: "Batch 21"

      - name: Upload batch test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch21-test-results
          path: test-results
          retention-days: 90
