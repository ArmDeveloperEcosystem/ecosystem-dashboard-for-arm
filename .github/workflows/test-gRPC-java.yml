name: Test gRPC-java on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-gRPC-java.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-gRPC-java.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-gRPC-java.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-gRPC-java.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-gRPC-java.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-gRPC-java.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-gRPC-java.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-gRPC-java.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-gRPC-java.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-gRPC-java.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-gRPC-java.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-gRPC-java.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-gRPC-java.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-gRPC-java.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-gRPC-java.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-gRPC-java.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-gRPC-java.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-gRPC-java.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-gRPC-java.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-gRPC-java.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-gRPC-java.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-gRPC-java.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-gRPC-java.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-gRPC-java.outputs.timestamp }}
jobs:
  test-gRPC-java:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'gRPC-java'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gRPC-java" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gRPC-java" >> "$GITHUB_OUTPUT"
      - name: Install gRPC-java plugin
        id: install
        run: |
          set -euo pipefail
          BASELINE_VERSION="1.55.1"
          URL="https://repo.maven.apache.org/maven2/io/grpc/protoc-gen-grpc-java/${BASELINE_VERSION}/protoc-gen-grpc-java-${BASELINE_VERSION}-linux-aarch_64.exe"

          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "protobuf-compiler default-jdk-headless"
          sudo curl -fsSL "$URL" -o /usr/local/bin/protoc-gen-grpc-java
          sudo chmod +x /usr/local/bin/protoc-gen-grpc-java

          echo "baseline_version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "binary_path=/usr/local/bin/protoc-gen-grpc-java" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get gRPC-java version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ steps.install.outputs.baseline_version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected gRPC-java plugin artifact version: $VERSION"

      - name: Test 1 - Check gRPC-java plugin exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.binary_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Verify plugin architecture
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.binary_path }}" | grep -Eqi "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "${{ steps.install.outputs.binary_path }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check protoc availability
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if protoc --version >/tmp/grpc-java-protoc.log 2>&1 && grep -q "libprotoc" /tmp/grpc-java-protoc.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/grpc-java-protoc.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Generate Java stubs from proto
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          rm -rf /tmp/grpc-java-baseline
          mkdir -p /tmp/grpc-java-baseline/out
          cat > /tmp/grpc-java-baseline/hello.proto <<'EOF'
          syntax = "proto3";
          option java_multiple_files = true;
          option java_package = "test";
          package test;
          service Greeter {
            rpc SayHello (HelloRequest) returns (HelloReply) {}
          }
          message HelloRequest {
            string name = 1;
          }
          message HelloReply {
            string message = 1;
          }
          EOF

          if protoc \
            -I /tmp/grpc-java-baseline \
            --java_out=/tmp/grpc-java-baseline/out \
            --plugin=protoc-gen-grpc-java="${{ steps.install.outputs.binary_path }}" \
            --grpc-java_out=/tmp/grpc-java-baseline/out \
            /tmp/grpc-java-baseline/hello.proto >/tmp/grpc-java-protoc-generate.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/grpc-java-protoc-generate.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Verify generated Java files
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          GRPC_FILE=$(find /tmp/grpc-java-baseline/out -type f -name 'GreeterGrpc.java' | head -n 1 || true)
          MESSAGE_FILE=$(find /tmp/grpc-java-baseline/out -type f \( -name 'HelloRequest.java' -o -name 'HelloReply.java' -o -name 'Hello.java' \) | head -n 1 || true)
          if [ -n "$GRPC_FILE" ] \
            && [ -f "$GRPC_FILE" ] \
            && grep -q "class GreeterGrpc" "$GRPC_FILE" \
            && [ -n "$MESSAGE_FILE" ] \
            && [ -f "$MESSAGE_FILE" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            find /tmp/grpc-java-baseline/out -type f | sort || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || steps.install.outputs.baseline_version || 'unknown' }}"
          NEXT_VERSION="unknown"
          NEXT_INSTALLED_VERSION="not_installed"
          STATUS="skipped"
          DECISION="next_lookup_failed"
          RESULT="Next version lookup failed on Arm64"
          COMPARISON="Could not resolve a newer stable gRPC-java plugin artifact from Maven metadata."

          export CURRENT_VERSION
          NEXT_VERSION="$(
            python3 - <<'PY'
          import re
          import os
          import urllib.request
          import xml.etree.ElementTree as ET

          current = os.environ.get("CURRENT_VERSION", "")
          md_url = "https://repo.maven.apache.org/maven2/io/grpc/protoc-gen-grpc-java/maven-metadata.xml"
          raw = urllib.request.urlopen(md_url, timeout=20).read()
          root = ET.fromstring(raw)
          versions = []
          for node in root.findall("./versioning/versions/version"):
              v = (node.text or "").strip()
              if not re.fullmatch(r"\d+\.\d+\.\d+", v):
                  continue
              versions.append(tuple(int(x) for x in v.split(".")))
          versions = sorted(set(versions))
          if not re.fullmatch(r"\d+\.\d+\.\d+", current):
              print("")
          else:
              c = tuple(int(x) for x in current.split("."))
              nxt = next(("{}.{}.{}".format(*v) for v in versions if v > c), "")
              print(nxt)
          PY
          )"

          if [ -z "$NEXT_VERSION" ]; then
            NEXT_VERSION="${CURRENT_VERSION}"
            DECISION="no_newer_stable_available"
            RESULT="No newer stable release available for Test 6"
            COMPARISON="Current pinned version ${CURRENT_VERSION} already matches the latest stable Maven artifact stream, so there is no newer stable candidate for regression install validation."
          else
            NEXT_URL="https://repo.maven.apache.org/maven2/io/grpc/protoc-gen-grpc-java/${NEXT_VERSION}/protoc-gen-grpc-java-${NEXT_VERSION}-linux-aarch_64.exe"
            if curl -fsSL "$NEXT_URL" -o /tmp/protoc-gen-grpc-java-next; then
              chmod +x /tmp/protoc-gen-grpc-java-next
              rm -rf /tmp/grpc-java-next
              mkdir -p /tmp/grpc-java-next/out
              cat > /tmp/grpc-java-next/hello.proto <<'EOF'
          syntax = "proto3";
          option java_multiple_files = true;
          option java_package = "test";
          package test;
          service Greeter {
            rpc SayHello (HelloRequest) returns (HelloReply) {}
          }
          message HelloRequest {
            string name = 1;
          }
          message HelloReply {
            string message = 1;
          }
          EOF
              if file /tmp/protoc-gen-grpc-java-next | grep -Eqi "aarch64|arm64" && \
                 protoc -I /tmp/grpc-java-next \
                   --java_out=/tmp/grpc-java-next/out \
                   --plugin=protoc-gen-grpc-java=/tmp/protoc-gen-grpc-java-next \
                   --grpc-java_out=/tmp/grpc-java-next/out \
                   /tmp/grpc-java-next/hello.proto >/tmp/grpc-java-next-generate.log 2>&1 && \
                 find /tmp/grpc-java-next/out -type f -name 'GreeterGrpc.java' | grep -q .; then
                STATUS="passed"
                DECISION="next_install_validated"
                NEXT_INSTALLED_VERSION="$NEXT_VERSION"
                RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned version ${CURRENT_VERSION} passed Tests 1-5. The next newer stable artifact ${NEXT_VERSION} downloaded and generated Java stubs on Arm64."
              else
                STATUS="failed"
                DECISION="next_install_failed"
                NEXT_INSTALLED_VERSION="$NEXT_VERSION"
                RESULT="Next version installation or generation validation failed on Arm64"
                COMPARISON="Current pinned version ${CURRENT_VERSION} passed Tests 1-5, but next candidate ${NEXT_VERSION} did not complete equivalent generation checks on Arm64."
              fi
            else
              STATUS="failed"
              DECISION="next_install_failed"
              NEXT_INSTALLED_VERSION="download_failed"
              RESULT="Next version artifact download failed on Arm64"
              COMPARISON="Current pinned version ${CURRENT_VERSION} passed Tests 1-5, but the next stable Maven artifact ${NEXT_VERSION} could not be downloaded from the Linux aarch64 artifact path."
            fi
          fi

          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            local core="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
              if [ "$core" = "core" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            else
              SKIPPED=$((SKIPPED + 1))
              if [ "$core" = "core" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}" core
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}" core
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}" core
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}" core
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}" core
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}" regression

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'skipped' }}" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## gRPC-java Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check gRPC-java plugin exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Verify plugin architecture: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check protoc availability: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Generate Java stubs from proto: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Verify generated Java files: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
