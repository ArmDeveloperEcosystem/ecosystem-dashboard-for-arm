name: Test SSDB on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ssdb.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ssdb.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ssdb.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ssdb.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ssdb.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ssdb.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ssdb.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ssdb.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ssdb.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ssdb.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ssdb.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ssdb.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ssdb.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ssdb.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ssdb.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ssdb.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ssdb.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ssdb.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ssdb.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ssdb.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ssdb.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ssdb.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ssdb.outputs.timestamp }}
jobs:
  test-ssdb:
    runs-on: ubuntu-24.04-arm
    env:
      SSDB_VERSION: "1.9.8"
      SSDB_REPO: "https://github.com/ideawu/ssdb/archive/refs/tags/1.9.8.tar.gz"
      SSDB_SRC_DIR: "/tmp/ssdb-source"
      SSDB_REPORTED_VERSION: "1.9.8"
      SSDB_NEXT_VERSION: "1.9.9"
      SSDB_NEXT_REPORTED_VERSION: "1.9.8"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'SSDB'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ssdb" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ssdb" >> "$GITHUB_OUTPUT"
      - name: Install SSDB
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "ca-certificates curl tar build-essential autoconf libsnappy-dev zlib1g-dev"
          rm -rf "${SSDB_SRC_DIR}"
          mkdir -p "${SSDB_SRC_DIR}"
          curl -fsSL "${SSDB_REPO}" -o /tmp/ssdb.tgz
          tar -xzf /tmp/ssdb.tgz -C "${SSDB_SRC_DIR}" --strip-components=1
          make -C "${SSDB_SRC_DIR}" -j"$(nproc)"
          sudo install -m 0755 "${SSDB_SRC_DIR}/ssdb-server" /usr/local/bin/ssdb-server
          command -v ssdb-server >/dev/null 2>&1
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get SSDB version
        id: version
        run: |
          set -euo pipefail
          REPORTED=$(ssdb-server -h 2>&1 | sed -n 's/^ssdb-server //p' | head -1)
          echo "version=${SSDB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "reported_version=$REPORTED" >> "$GITHUB_OUTPUT"
          echo "latest=${SSDB_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v ssdb-server >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ssdb-server -h 2>&1 | tee /tmp/ssdb-version.log
          if grep -Fq "ssdb-server ${SSDB_REPORTED_VERSION}" /tmp/ssdb-version.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ssdb-server -h 2>&1 | tee /tmp/ssdb-help.log
          if grep -qiE 'ssdb-server|config_file|ssdb\\.conf|usage' /tmp/ssdb-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          SSDB_WORK_DIR=/tmp/ssdb-work
          SSDB_CONF=/tmp/ssdb-smoke.conf
          rm -rf "$SSDB_WORK_DIR"
          mkdir -p "$SSDB_WORK_DIR"
          cp "${SSDB_SRC_DIR}/ssdb.conf" "$SSDB_CONF"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("/tmp/ssdb-smoke.conf")
          text = path.read_text()
          text = text.replace("work_dir = ./var", "work_dir = /tmp/ssdb-work")
          text = text.replace("pidfile = ./var/ssdb.pid", "pidfile = /tmp/ssdb-work/ssdb.pid")
          text = text.replace("port: 8888", "port: 18888", 1)
          path.write_text(text)
          PY
          cleanup() {
            if [ -f /tmp/ssdb-work/ssdb.pid ]; then
              kill "$(cat /tmp/ssdb-work/ssdb.pid)" >/dev/null 2>&1 || true
            fi
            pkill -f "/usr/local/bin/ssdb-server /tmp/ssdb-smoke.conf" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          /usr/local/bin/ssdb-server "$SSDB_CONF" >/tmp/ssdb-server.log 2>&1 &
          python3 - <<'PY'
          import socket
          import time

          for _ in range(20):
              try:
                  sock = socket.create_connection(("127.0.0.1", 18888), timeout=1)
                  sock.close()
                  print("ssdb-port-open")
                  break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit(1)
          PY
          if [ $? -eq 0 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ssdb-server.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_DIR=$(mktemp -d)
          NEXT_TGZ="/tmp/ssdb-regression-${LATEST}.tar.gz"
          NEXT_URL="https://github.com/ideawu/ssdb/archive/refs/tags/${LATEST}.tar.gz"

          if curl -fsSL "$NEXT_URL" -o "$NEXT_TGZ"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TGZ" -C "$NEXT_DIR" --strip-components=1
            if make -C "$NEXT_DIR" -j"$(nproc)" >/tmp/ssdb-regression-build.log 2>&1; then
              NEXT_BIN="$NEXT_DIR/ssdb-server"
              if [ -x "$NEXT_BIN" ]; then
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" -h 2>&1 | sed -n 's/^ssdb-server //p' | head -n 1 || true)
                if [ "$NEXT_INSTALLED_VERSION" = "$SSDB_NEXT_REPORTED_VERSION" ]; then
                  echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                  if [ "$LATEST" = "$CURRENT" ]; then
                    echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
                    echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
                    echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
                    echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
                    echo "status=failed" >> "$GITHUB_OUTPUT"
                  else
                    echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                    echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                    echo "comparison=Current pinned SSDB source tag ${CURRENT} passed smoke tests in this run. Regression validation built candidate source tag ${LATEST} on Arm64, and the resulting ssdb-server binary still reported upstream runtime version ${NEXT_INSTALLED_VERSION}, which is the known banner value for the 1.9.9 source tag." >> "$GITHUB_OUTPUT"
                    echo "Regression install result: Next version installed successfully on Arm64"
                    echo "status=passed" >> "$GITHUB_OUTPUT"
                  fi
                  echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                else
                  echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                  echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                  echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
                  echo "comparison=Current pinned SSDB source tag ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} built on Arm64 and the resulting ssdb-server binary reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the known upstream banner value ${SSDB_NEXT_REPORTED_VERSION} for that source tag." >> "$GITHUB_OUTPUT"
                  echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                  echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                  exit 1
                fi
              else
                echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned SSDB source tag ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not produce a usable ssdb-server binary on Arm64." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: install_failed"
                echo "Regression install result: Next version install failed on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned SSDB source tag ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} failed to build on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              cat /tmp/ssdb-regression-build.log || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned SSDB source tag ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded from the upstream source archive." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## SSDB Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Reported server version:** ${{ steps.version.outputs.reported_version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Help Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending explicit regression validation.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
