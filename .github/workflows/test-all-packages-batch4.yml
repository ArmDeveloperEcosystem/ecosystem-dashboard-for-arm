  test-cert-manager:
    uses: ./.github/workflows/test-cert-manager.yml
  
  test-python-dlpy:
    uses: ./.github/workflows/test-python-dlpy.yml
  
  test-chisel-operator:
    uses: ./.github/workflows/test-chisel-operator.yml

  test-psutil:
    uses: ./.github/workflows/test-psutil.yml
  
  test-obs:
    uses: ./.github/workflows/test-obs.yml
  
  test-jaeger:
    uses: ./.github/workflows/test-jaeger.yml
  
  test-opensearch-data-prepper:
    uses: ./.github/workflows/test-opensearch-data-prepper.yml
  
  test-ultramarine-linux:
    uses: ./.github/workflows/test-ultramarine-linux.yml
  
  test-pyzmq:
    uses: ./.github/workflows/test-pyzmq.yml
  
  test-libx264:
    uses: ./.github/workflows/test-libx264.yml
  
  test-torchtune:
    uses: ./.github/workflows/test-torchtune.yml

  summary:
    needs:
      [
        test-0xffff,
        test-openstack-masakari,
        test-spire,
        test-icu,
        test-mesh,
        test-harness-go-sdk,
        test-openblas,
        test-logzio,
        test-longhorn,
        test-netdata,
        test-ultralytics,
        test-harbor,
        test-domo-java-sdk,
        test-rinetd,
        test-tdengine,
        test-m4,
        test-groff,
        test-neuvector,
        test-kubeedge,
        test-openh264,
        test-ray,
        test-freetype,
        test-wrk,
        test-boost,
        test-llamaindex,
        test-solr,
        test-eigen,
        test-freetype2,
        test-contour,
        test-elastic-ebpf,
        test-glance,
        test-seata,
        test-cert-manager,
        test-python-dlpy,
        test-chisel-operator,
        test-psutil,
        test-obs,
        test-jaeger,
        test-opensearch-data-prepper,
        test-ultramarine-linux,
        test-pyzmq,
        test-libx264,
        test-torchtune
      ]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect batch results
        id: collect
        uses: ./.github/actions/collect-batch-results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          batch_number: "4"
          batch_title: "Batch 4"

      - name: Upload batch test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch4-test-results
          path: test-results
          retention-days: 90
