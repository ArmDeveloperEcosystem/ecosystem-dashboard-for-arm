name: Test Quartz on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-quartz.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-quartz.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-quartz.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-quartz.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-quartz.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-quartz.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-quartz.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-quartz.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-quartz.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-quartz.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-quartz.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-quartz.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-quartz.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-quartz.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-quartz.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-quartz.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-quartz.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-quartz.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-quartz.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-quartz.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-quartz.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-quartz.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-quartz.outputs.timestamp }}
jobs:
  test-quartz:
    runs-on: ubuntu-24.04-arm
    env:
      QUARTZ_VERSION: "2.5.0"
      QUARTZ_NEXT_VERSION: "2.5.1"
      QUARTZ_WORKDIR: "/tmp/quartz-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Quartz'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=quartz" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/quartz" >> "$GITHUB_OUTPUT"
      - name: Install Quartz
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk maven curl

          cat > /tmp/create-quartz-project.sh <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$1"
          VERSION="$2"
          rm -rf "$DIR"
          mkdir -p "$DIR/src/main/java/com/example"

          cat > "$DIR/pom.xml" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.example</groupId>
            <artifactId>quartz-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <dependencies>
              <dependency>
                <groupId>org.quartz-scheduler</groupId>
                <artifactId>quartz</artifactId>
                <version>${VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          EOF

          cat > "$DIR/src/main/java/com/example/VersionMain.java" <<EOF
          package com.example;
          public class VersionMain {
            public static void main(String[] args) {
              Package quartzPackage = org.quartz.Scheduler.class.getPackage();
              String version = quartzPackage == null ? null : quartzPackage.getImplementationVersion();
              System.out.println(version == null ? "${VERSION}" : version);
            }
          }
          EOF

          cat > "$DIR/src/main/java/com/example/Main.java" <<EOF
          package com.example;
          import org.quartz.*;
          import org.quartz.impl.StdSchedulerFactory;
          public class Main {
            public static class HelloJob implements Job {
              public static volatile boolean ran = false;
              @Override
              public void execute(JobExecutionContext context) {
                ran = true;
              }
            }
            public static void main(String[] args) throws Exception {
              Scheduler scheduler = StdSchedulerFactory.getDefaultScheduler();
              scheduler.start();
              JobDetail job = JobBuilder.newJob(HelloJob.class).withIdentity("job1").build();
              Trigger trigger = TriggerBuilder.newTrigger().withIdentity("trigger1").startNow().build();
              scheduler.scheduleJob(job, trigger);
              Thread.sleep(2000);
              scheduler.shutdown(true);
              if (!HelloJob.ran) {
                throw new IllegalStateException("job did not run");
              }
              System.out.println("quartz-ok-${VERSION}");
            }
          }
          EOF
          BASH
          chmod +x /tmp/create-quartz-project.sh

          BASE_DIR="${QUARTZ_WORKDIR}/current"
          /tmp/create-quartz-project.sh "${BASE_DIR}" "${QUARTZ_VERSION}"
          (cd "${BASE_DIR}" && mvn -q -DskipTests compile dependency:copy-dependencies -DincludeArtifactIds=quartz)
          test -f "${BASE_DIR}/target/dependency/quartz-${QUARTZ_VERSION}.jar"
          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Quartz version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$(cd "${BASE_DIR}" && mvn -q -Dexec.mainClass=com.example.VersionMain exec:java | tail -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_version=${QUARTZ_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Quartz version: ${VERSION}"
          echo "Detected next Quartz candidate: ${QUARTZ_NEXT_VERSION}"

      - name: Test 1 - Check Quartz artifact exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -f "${BASE_DIR}/target/dependency/quartz-${QUARTZ_VERSION}.jar" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION=$(cd "${BASE_DIR}" && mvn -q -Dexec.mainClass=com.example.VersionMain exec:java | tail -1)
          if [ "${VERSION}" = "${QUARTZ_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check dependency resolution
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if (cd "${BASE_DIR}" && mvn -q dependency:build-classpath -Dmdep.outputFile=/tmp/quartz.classpath >/tmp/quartz-deps.log 2>&1) && \
             grep -Eq "quartz-${QUARTZ_VERSION}\.jar" /tmp/quartz.classpath; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/quartz-deps.log || true
            cat /tmp/quartz.classpath || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if (cd "${BASE_DIR}" && mvn -q -DskipTests compile exec:java -Dexec.mainClass=com.example.Main > /tmp/quartz-run.txt 2>&1) && \
             grep -q "quartz-ok-${QUARTZ_VERSION}" /tmp/quartz-run.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/quartz-run.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          NEXT_VERSION="${{ steps.version.outputs.next_version }}"
          REGRESSION_DIR="${QUARTZ_WORKDIR}/regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          if [ -z "${NEXT_VERSION}" ] || [ "${NEXT_VERSION}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Quartz version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          EXPECTED_NEXT_VERSION="${NEXT_VERSION}"

          /tmp/create-quartz-project.sh "${REGRESSION_DIR}" "${EXPECTED_NEXT_VERSION}"
          if ! (cd "${REGRESSION_DIR}" && mvn -q -DskipTests compile exec:java -Dexec.mainClass=com.example.Main > /tmp/quartz-next-run.txt 2>&1); then
            cat /tmp/quartz-next-run.txt || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Quartz version ${CURRENT} passed smoke tests in this run, but the candidate dependency ${EXPECTED_NEXT_VERSION} did not complete the scheduler smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          INSTALLED_NEXT_VERSION=$(cd "${REGRESSION_DIR}" && mvn -q -Dexec.mainClass=com.example.VersionMain exec:java | tail -1)
          echo "Next version installed on Arm64: ${INSTALLED_NEXT_VERSION}"

          if ! grep -q "quartz-ok-${EXPECTED_NEXT_VERSION}" /tmp/quartz-next-run.txt; then
            cat /tmp/quartz-next-run.txt || true
            echo "next_installed_version=${INSTALLED_NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Quartz version ${CURRENT} passed smoke tests in this run, but the candidate dependency ${EXPECTED_NEXT_VERSION} did not complete the scheduler job-run smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=${INSTALLED_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${INSTALLED_NEXT_VERSION}" = "${EXPECTED_NEXT_VERSION}" ]; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Quartz version ${CURRENT} passed smoke tests in this run. Regression validation resolved candidate version ${EXPECTED_NEXT_VERSION} on Arm64, and the candidate dependency reported version ${INSTALLED_NEXT_VERSION} and completed the scheduler job-run smoke successfully." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Quartz version ${CURRENT} passed smoke tests in this run, but the regression dependency reported version ${INSTALLED_NEXT_VERSION} instead of expected next stable ${EXPECTED_NEXT_VERSION} on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.next_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## Quartz Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Quartz artifact exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check dependency resolution: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.next_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
