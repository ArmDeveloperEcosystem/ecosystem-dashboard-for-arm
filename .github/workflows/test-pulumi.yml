name: Test Pulumi on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-pulumi.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-pulumi.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-pulumi.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-pulumi.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-pulumi.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-pulumi.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-pulumi.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-pulumi.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-pulumi.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-pulumi.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-pulumi.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-pulumi.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-pulumi.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-pulumi.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-pulumi.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-pulumi.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-pulumi.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-pulumi.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-pulumi.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-pulumi.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-pulumi.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-pulumi.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-pulumi.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/pulumi.md'
      - '.github/workflows/test-pulumi.yml'

jobs:
  test-pulumi:
    runs-on: ubuntu-24.04-arm
    env:
      PULUMI_VERSION: "3.147.0"
      PULUMI_NEXT_VERSION: "3.148.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Pulumi'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=pulumi" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/pulumi" >> "$GITHUB_OUTPUT"
      - name: Install Pulumi
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar
          cd /tmp
          curl -fsSLO "https://get.pulumi.com/releases/sdk/pulumi-v${PULUMI_VERSION}-linux-arm64.tar.gz"
          tar -xzf "pulumi-v${PULUMI_VERSION}-linux-arm64.tar.gz"
          sudo mkdir -p /usr/local/pulumi
          sudo rsync -a /tmp/pulumi/ /usr/local/pulumi/
          sudo ln -sf /usr/local/pulumi/pulumi /usr/local/bin/pulumi
          command -v pulumi
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Pulumi version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(pulumi version | sed 's/^v//')
          LATEST="${PULUMI_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check pulumi binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v pulumi >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          OUTPUT=$(pulumi version 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/pulumi-version.log
          if printf '%s\n' "$OUTPUT" | grep -q "v${PULUMI_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/pulumi-version.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if pulumi --help 2>&1 | grep -q "Pulumi - Modern Infrastructure as Code"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          mkdir -p /tmp/pulumi-functional /tmp/pulumi-state
          cd /tmp/pulumi-functional
          cat > Pulumi.yaml <<'YAML'
          name: arm-smoke
          runtime: yaml
          description: Pulumi Arm smoke test
          YAML
          export PULUMI_CONFIG_PASSPHRASE=""
          pulumi login "file:///tmp/pulumi-state" >/tmp/pulumi-login.log
          pulumi stack init dev >/tmp/pulumi-stack-init.log 2>&1 || pulumi stack select dev >/tmp/pulumi-stack-select.log 2>&1
          pulumi stack ls >/tmp/pulumi-stack-ls.log
          if grep -q "dev" /tmp/pulumi-stack-ls.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/pulumi-stack-ls.log
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          NEXT_URL="https://get.pulumi.com/releases/sdk/pulumi-v${LATEST}-linux-arm64.tar.gz"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run, but the next stable version could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT
          ARCHIVE_NAME=$(basename "${NEXT_URL%%\?*}")
          ARCHIVE_PATH="$TMPDIR/$ARCHIVE_NAME"

          if curl -fsSL "$NEXT_URL" -o "$ARCHIVE_PATH"; then
            echo "Next version download status: passed"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run, but the candidate artifact $NEXT_URL could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          case "$ARCHIVE_NAME" in
            *.tar.gz|*.tgz)
              tar -xzf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.tar.xz)
              tar -xJf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.zip)
              unzip -q "$ARCHIVE_PATH" -d "$TMPDIR"
              ;;
            *)
              chmod +x "$ARCHIVE_PATH" || true
              ;;
          esac

          NEXT_BIN=$(find "$TMPDIR" -type f -path '*/pulumi/pulumi' | head -n 1)
          if [ -z "$NEXT_BIN" ]; then
            NEXT_BIN="$ARCHIVE_PATH"
          fi
          chmod +x "$NEXT_BIN" || true

          NEXT_INSTALLED_VERSION=$("$NEXT_BIN" version 2>&1 | sed 's/^v//' | awk 'NR==1{print $1}')
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run, but the candidate artifact from $NEXT_URL did not report a usable version on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: unknown"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          export PULUMI_CONFIG_PASSPHRASE=""
          export PULUMI_SKIP_UPDATE_CHECK=true
          STACK_DIR="$TMPDIR/pulumi-smoke"
          STATE_DIR="$TMPDIR/pulumi-state"
          mkdir -p "$STACK_DIR" "$STATE_DIR"
          cat > "$STACK_DIR/Pulumi.yaml" <<'YAML'
          name: arm-regression
          runtime: yaml
          description: Pulumi Arm regression validation
          YAML
          "$NEXT_BIN" login "file://$STATE_DIR" >/tmp/pulumi-regression-login.log 2>&1
          "$NEXT_BIN" --help >/tmp/pulumi-regression-help.log 2>&1
          (
            cd "$STACK_DIR"
            "$NEXT_BIN" stack init dev >/tmp/pulumi-regression-stack-init.log 2>&1 || "$NEXT_BIN" stack select dev >/tmp/pulumi-regression-stack-select.log 2>&1
            "$NEXT_BIN" stack ls >/tmp/pulumi-regression-stack-ls.log 2>&1
          )
          if ! grep -q "dev" /tmp/pulumi-regression-stack-ls.log; then
            cat /tmp/pulumi-regression-stack-ls.log || true
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run, but the candidate Arm64 binary $NEXT_INSTALLED_VERSION did not complete a real file-backend stack validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run. Regression validation downloaded the candidate Arm64 artifact from $NEXT_URL, and the candidate binary completed version, help, and real file-backend stack validation successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pulumi version $CURRENT passed smoke tests in this run, but the candidate Arm64 artifact from $NEXT_URL reported $NEXT_INSTALLED_VERSION instead of the expected latest stable version $LATEST." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          {
            echo "## Pulumi Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check pulumi binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
