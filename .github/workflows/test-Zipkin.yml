name: Test Zipkin on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-zipkin.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-zipkin.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-zipkin.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-zipkin.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-zipkin.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-zipkin.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-zipkin.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-zipkin.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-zipkin.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-zipkin.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-zipkin.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-zipkin.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-zipkin.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-zipkin.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-zipkin.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-zipkin.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-zipkin.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-zipkin.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-zipkin.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-zipkin.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-zipkin.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-zipkin.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-zipkin.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/Zipkin.md"
      - ".github/workflows/test-zipkin.yml"

jobs:
  test-zipkin:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_VERSION: "3.4.3"
      CURRENT_JAR: "/usr/local/share/java/zipkin.jar"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Zipkin'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=Zipkin" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/Zipkin" >> "$GITHUB_OUTPUT"
      - name: Install Zipkin
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jre-headless curl unzip
          sudo mkdir -p /usr/local/share/java
          curl -fsSL -o /tmp/zipkin.jar \
            "https://repo1.maven.org/maven2/io/zipkin/zipkin-server/${CURRENT_VERSION}/zipkin-server-${CURRENT_VERSION}-exec.jar"
          sudo mv /tmp/zipkin.jar "${CURRENT_JAR}"
          sudo install -m 0755 /dev/stdin /usr/local/bin/zipkin <<'EOF'
          #!/usr/bin/env bash
          exec java -jar /usr/local/share/java/zipkin.jar "$@"
          EOF
          if [ -s "${CURRENT_JAR}" ] && command -v zipkin >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Zipkin version
        id: version
        run: |
          set -euo pipefail
          VERSION="${CURRENT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Zipkin version from versioned artifact path: ${VERSION}"

      - name: Test 1 - Check JAR Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -s "${CURRENT_JAR}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Versioned Artifact Download
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -s "${CURRENT_JAR}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check JAR Readability
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if unzip -Z1 "${CURRENT_JAR}" | grep -q 'META-INF/MANIFEST.MF'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ZIPKIN_LOG=/tmp/zipkin-current.log
          rm -f "${ZIPKIN_LOG}"
          rm -f /tmp/zipkin-home.html /tmp/zipkin-health.json /tmp/zipkin-actuator-health.json
          java -jar "${CURRENT_JAR}" --server.port=9412 >"${ZIPKIN_LOG}" 2>&1 &
          ZIPKIN_PID=$!

          cleanup() {
            kill "${ZIPKIN_PID}" >/dev/null 2>&1 || true
            wait "${ZIPKIN_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9412/ >/tmp/zipkin-home.html 2>/dev/null || \
               curl -fsS http://127.0.0.1:9412/health >/tmp/zipkin-health.json 2>/dev/null || \
               curl -fsS http://127.0.0.1:9412/actuator/health >/tmp/zipkin-actuator-health.json 2>/dev/null; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "${READY}" -eq 1 ] && { grep -qi 'zipkin' /tmp/zipkin-home.html 2>/dev/null || \
               grep -qiE 'UP|ok|ready|status' /tmp/zipkin-health.json 2>/dev/null || \
               grep -qiE 'UP|ok|ready|status' /tmp/zipkin-actuator-health.json 2>/dev/null || \
               grep -qiE 'Started Zipkin|Started ZipkinServer|:: version ' "${ZIPKIN_LOG}"; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${ZIPKIN_LOG}" || true
            cat /tmp/zipkin-home.html || true
            cat /tmp/zipkin-health.json || true
            cat /tmp/zipkin-actuator-health.json || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          NEXT_PID=""
          NEXT_JAR=""
          cleanup_next() {
            if [ -n "${NEXT_PID}" ]; then
              kill "${NEXT_PID}" >/dev/null 2>&1 || true
              wait "${NEXT_PID}" >/dev/null 2>&1 || true
            fi
            if [ -n "${NEXT_JAR}" ] && [ -f "${NEXT_JAR}" ]; then
              rm -f "${NEXT_JAR}"
            fi
          }
          trap cleanup_next EXIT
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"

          LATEST=$(CURRENT="${CURRENT}" python3 - <<'PY'
          import re
          import urllib.request
          import xml.etree.ElementTree as ET
          import os

          current = os.environ.get("CURRENT", "")
          current_parts = tuple(int(x) for x in current.split(".")) if re.fullmatch(r"\d+\.\d+\.\d+", current) else ()
          xml = urllib.request.urlopen("https://repo1.maven.org/maven2/io/zipkin/zipkin-server/maven-metadata.xml").read()
          root = ET.fromstring(xml)
          versions = []
          for node in root.findall(".//version"):
              value = (node.text or "").strip()
              if re.fullmatch(r"\d+\.\d+\.\d+", value):
                  versions.append(tuple(int(x) for x in value.split(".")))
          next_versions = sorted(set(v for v in versions if v > current_parts))
          print(".".join(str(x) for x in next_versions[0]) if next_versions else "")
          PY
          )

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"

          if [ -z "${LATEST}" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but the next candidate version could not be resolved from Maven Central metadata." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but the next candidate version could not be resolved from Maven Central metadata."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Zipkin version ${CURRENT} passed smoke tests in this run and already matches the latest stable executable JAR release from Maven Central."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_JAR=$(mktemp /tmp/zipkin-next-XXXXXX.jar)
          if curl -fsSL -o "${NEXT_JAR}" \
            "https://repo1.maven.org/maven2/io/zipkin/zipkin-server/${LATEST}/zipkin-server-${LATEST}-exec.jar"; then
            NEXT_LOG=/tmp/zipkin-next.log
            rm -f "${NEXT_LOG}"
            java -jar "${NEXT_JAR}" --server.port=9512 >"${NEXT_LOG}" 2>&1 &
            NEXT_PID=$!

            READY=0
            for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:9512/ >/dev/null 2>&1; then
                READY=1
                break
              fi
              sleep 2
            done

            NEXT_INSTALLED_VERSION=$(sed -n 's/^:: version \([^ ]*\) ::.*$/\1/p' "${NEXT_LOG}" | head -1 || true)
            if [ "${READY}" -eq 1 ] && [ -n "${NEXT_INSTALLED_VERSION}" ] && [ "${NEXT_INSTALLED_VERSION}" = "${LATEST}" ]; then
              echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Zipkin version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate executable JAR ${LATEST} on Arm64, started it on an isolated port, and the startup banner reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Zipkin version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate executable JAR ${LATEST} on Arm64, started it on an isolated port, and the startup banner reported version ${NEXT_INSTALLED_VERSION}."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but candidate JAR ${LATEST} did not reach a healthy startup on Arm64 or did not report the expected version in the startup banner." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but candidate JAR ${LATEST} did not reach a healthy startup on Arm64 or did not report the expected version in the startup banner."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but candidate executable JAR ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Zipkin version ${CURRENT} passed smoke tests in this run, but candidate executable JAR ${LATEST} could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            REGRESSION_RESULT="Regression validation result unavailable"
          fi
          echo "## Zipkin Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check JAR Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Versioned Artifact Download: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check JAR Readability: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
