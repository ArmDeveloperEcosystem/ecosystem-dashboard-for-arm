name: Test Redis on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/redis.md"
      - ".github/workflows/test-redis.yml"

jobs:
  test-redis:
    runs-on: ubuntu-24.04-arm
    env:
      REDIS_VERSION: "7.2.9"
      REDIS_NEXT_VERSION: "7.2.10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=redis" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/redis" >> "$GITHUB_OUTPUT"
      - name: Install Redis
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl tcl pkg-config file

          WORK_DIR=$(mktemp -d)
          ARCHIVE="${WORK_DIR}/redis-${REDIS_VERSION}.tar.gz"
          curl -fsSL "https://download.redis.io/releases/redis-${REDIS_VERSION}.tar.gz" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE" -C "$WORK_DIR"

          SRC_DIR="${WORK_DIR}/redis-${REDIS_VERSION}"
          make -C "$SRC_DIR" -j"$(nproc)"

          sudo install -m 0755 "$SRC_DIR/src/redis-server" /usr/local/bin/redis-server
          sudo install -m 0755 "$SRC_DIR/src/redis-cli" /usr/local/bin/redis-cli
          sudo install -m 0755 "$SRC_DIR/src/redis-benchmark" /usr/local/bin/redis-benchmark

          echo "baseline_version=${REDIS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "binary_path=/usr/local/bin/redis-server" >> "$GITHUB_OUTPUT"
          echo "cli_path=/usr/local/bin/redis-cli" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Redis version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(redis-server --version 2>&1 | sed -n 's/.*v=\([^ ]*\).*/\1/p' | head -n 1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Redis version: $VERSION"

      - name: Test 1 - Check Redis binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v redis-server >/dev/null 2>&1 \
            && command -v redis-cli >/dev/null 2>&1 \
            && command -v redis-benchmark >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Redis version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_version }}"
          REPORTED="${{ steps.version.outputs.version }}"
          if [ "$REPORTED" = "$EXPECTED" ] \
            && redis-server --version 2>&1 | grep -q "Redis server"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            redis-server --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Redis CLI help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if redis-cli --help 2>&1 | grep -q '^Usage: redis-cli'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            redis-cli --help || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] \
            && file "${{ steps.install.outputs.binary_path }}" | grep -Eqi 'aarch64|arm64' \
            && file "${{ steps.install.outputs.cli_path }}" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.binary_path }}" || true
            file "${{ steps.install.outputs.cli_path }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          DATA_DIR=$(mktemp -d)
          LOG_FILE=$(mktemp)
          PID_FILE="${DATA_DIR}/redis.pid"

          cleanup() {
            if [ -f "$PID_FILE" ]; then
              kill "$(cat "$PID_FILE")" 2>/dev/null || true
              wait "$(cat "$PID_FILE")" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          redis-server \
            --port 6380 \
            --bind 127.0.0.1 \
            --save "" \
            --appendonly no \
            --dir "$DATA_DIR" \
            --daemonize yes \
            --pidfile "$PID_FILE" \
            >"$LOG_FILE" 2>&1

          READY=0
          for _ in $(seq 1 30); do
            if redis-cli -p 6380 ping >/tmp/redis-ping.txt 2>/tmp/redis-ping.err; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "$READY" -ne 1 ]; then
            cat "$LOG_FILE" || true
            cat /tmp/redis-ping.err || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          redis-cli -p 6380 set arm64 ok >/tmp/redis-set.txt 2>/tmp/redis-set.err
          redis-cli -p 6380 get arm64 >/tmp/redis-get.txt 2>/tmp/redis-get.err

          if grep -qx 'PONG' /tmp/redis-ping.txt \
            && grep -qx 'ok' /tmp/redis-get.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$LOG_FILE" || true
            cat /tmp/redis-set.txt || true
            cat /tmp/redis-set.err || true
            cat /tmp/redis-get.txt || true
            cat /tmp/redis-get.err || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${REDIS_NEXT_VERSION}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_DIR=$(mktemp -d)
          NEXT_ARCHIVE="${NEXT_DIR}/redis-${LATEST}.tar.gz"
          curl -fsSL "https://download.redis.io/releases/redis-${LATEST}.tar.gz" -o "$NEXT_ARCHIVE"
          tar -xzf "$NEXT_ARCHIVE" -C "$NEXT_DIR"
          NEXT_SRC="${NEXT_DIR}/redis-${LATEST}"
          make -C "$NEXT_SRC" -j"$(nproc)"

          NEXT_SERVER="${NEXT_SRC}/src/redis-server"
          NEXT_CLI="${NEXT_SRC}/src/redis-cli"
          NEXT_REPORTED=$("$NEXT_SERVER" --version 2>&1 | sed -n 's/.*v=\([^ ]*\).*/\1/p' | head -n 1 || true)

          DATA_DIR=$(mktemp -d)
          LOG_FILE=$(mktemp)
          PID_FILE="${DATA_DIR}/redis.pid"

          cleanup() {
            if [ -f "$PID_FILE" ]; then
              kill "$(cat "$PID_FILE")" 2>/dev/null || true
              wait "$(cat "$PID_FILE")" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          "$NEXT_SERVER" \
            --port 6381 \
            --bind 127.0.0.1 \
            --save "" \
            --appendonly no \
            --dir "$DATA_DIR" \
            --daemonize yes \
            --pidfile "$PID_FILE" \
            >"$LOG_FILE" 2>&1

          READY=0
          for _ in $(seq 1 30); do
            if "$NEXT_CLI" -p 6381 ping >/tmp/redis-next-ping.txt 2>/tmp/redis-next-ping.err; then
              READY=1
              break
            fi
            sleep 1
          done

          VALUE=""
          if [ "$READY" -eq 1 ]; then
            "$NEXT_CLI" -p 6381 set arm64-next ok >/tmp/redis-next-set.txt 2>/tmp/redis-next-set.err
            VALUE=$("$NEXT_CLI" -p 6381 get arm64-next 2>/tmp/redis-next-get.err || true)
          fi

          if [ "$NEXT_REPORTED" = "$LATEST" ] \
            && file "$NEXT_SERVER" | grep -Eqi 'aarch64|arm64' \
            && file "$NEXT_CLI" | grep -Eqi 'aarch64|arm64' \
            && [ "$READY" -eq 1 ] \
            && [ "$VALUE" = "ok" ]; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Redis version ${CURRENT} passed smoke tests in this run. Regression validation built the next stable Arm64 source release ${LATEST}, and the candidate redis-server/redis-cli binaries reported version ${NEXT_REPORTED} while a real ping plus set/get smoke test succeeded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Redis version ${CURRENT} passed smoke tests in this run. Regression validation built the next stable Arm64 source release ${LATEST}, and the candidate redis-server/redis-cli binaries reported version ${NEXT_REPORTED} while a real ping plus set/get smoke test succeeded on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$NEXT_SERVER" --version || true
            file "$NEXT_SERVER" || true
            file "$NEXT_CLI" || true
            cat "$LOG_FILE" || true
            cat /tmp/redis-next-ping.err || true
            cat /tmp/redis-next-set.err || true
            cat /tmp/redis-next-get.err || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Redis version ${CURRENT} passed smoke tests in this run, but the candidate source release ${LATEST} did not validate as a usable Arm64 install." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Redis version ${CURRENT} passed smoke tests in this run, but the candidate source release ${LATEST} did not validate as a usable Arm64 install."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)

          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results

          cat > test-results/redis.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Redis",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Databases - noSQL"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Redis binaries exist",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Redis version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Redis CLI help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-test-results
          path: test-results/redis.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}"
          echo "## Redis Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Redis binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Redis version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Redis CLI help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Support badge is based on Tests 1-5:** yes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Support badge reflects Tests 1-5. Test 6 records upgrade-install readiness on Arm64." >> "$GITHUB_STEP_SUMMARY"
