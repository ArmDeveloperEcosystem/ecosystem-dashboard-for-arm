name: Test Picasso.js on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/picassoJS.md'
      - '.github/workflows/test-picassoJS.yml'

jobs:
  test-picassojs:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=picassoJS" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/picassoJS" >> "$GITHUB_OUTPUT"
      - name: Install Picasso.js
        id: install
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          cd "${WORKDIR}"
          npm init -y >/dev/null 2>&1
          npm install picasso.js
          echo "workdir=${WORKDIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Picasso.js version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('${{ steps.install.outputs.workdir }}/node_modules/picasso.js/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check package installation
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -d "${{ steps.install.outputs.workdir }}/node_modules/picasso.js" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if node -p "require('${{ steps.install.outputs.workdir }}/node_modules/picasso.js/package.json').version" | grep -Eq '^[0-9]'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check npm dependency resolution
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"
          if npm ls picasso.js --depth=0 >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if node - <<'JS' | grep -q '^picasso-ok$'
          const picasso = require('${{ steps.install.outputs.workdir }}/node_modules/picasso.js');
          if (typeof picasso.chart !== 'function') process.exit(1);
          console.log('picasso-ok');
          JS
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Resolve job URL
        if: always()
        id: job_url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=""
          if command -v gh >/dev/null 2>&1; then
            JOB_URL=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID\" or (.name | endswith(\" / $JOB_ID\"))) | .html_url" | head -n 1)
          fi
          if [ -z "$JOB_URL" ] && command -v python3 >/dev/null 2>&1; then
            JOB_URL=$(JOB_ID="$JOB_ID" python3 -c 'import json, os, urllib.request; repo=os.environ["GITHUB_REPOSITORY"]; run_id=os.environ["GITHUB_RUN_ID"]; token=os.environ["GH_TOKEN"]; job_id=os.environ["JOB_ID"]; req=urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"}); data=json.load(urllib.request.urlopen(req, timeout=30)); print(next((j.get("html_url", "") for j in data.get("jobs", []) if j.get("name", "") == job_id or j.get("name", "").endswith(f" / {job_id}")), ""))')
          fi
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=$JOB_URL" >> "$GITHUB_OUTPUT"

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/picassoJS.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Picasso.js",
              "version": "${{ steps.version.outputs.version }}",
              "language": "JavaScript",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.job_url.outputs.url }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check package installation", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version metadata", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check npm dependency resolution", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: picassoJS-test-results
          path: test-results/picassoJS.json
          retention-days: 10
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Picasso.js Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check package installation: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version metadata: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check npm dependency resolution: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
