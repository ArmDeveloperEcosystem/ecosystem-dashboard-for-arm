name: Test gVisor on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/gVisor.md"
      - ".github/workflows/test-gvisor.yml"

jobs:
  test-gVisor:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=gVisor" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/gVisor" >> "$GITHUB_OUTPUT"

      - name: Install gVisor
        id: install
        run: |
          set -euo pipefail
          BASELINE_TAG="release-20250127.0"
          BASELINE_STORAGE="${BASELINE_TAG#release-}"
          BASE_URL="https://storage.googleapis.com/gvisor/releases/release/${BASELINE_STORAGE}/aarch64"

          rm -f /tmp/runsc /tmp/runsc.sha512
          curl -fsSL "${BASE_URL}/runsc" -o /tmp/runsc
          curl -fsSL "${BASE_URL}/runsc.sha512" -o /tmp/runsc.sha512
          (cd /tmp && sha512sum -c runsc.sha512)
          sudo install -m 0755 /tmp/runsc /usr/local/bin/runsc

          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
          echo "storage_tag=$BASELINE_STORAGE" >> "$GITHUB_OUTPUT"
          echo "binary_path=/usr/local/bin/runsc" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get gVisor version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(runsc --version 2>&1 | awk '/runsc version/ {print $3}' | head -n 1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected gVisor version: $VERSION"

      - name: Test 1 - Check runsc binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v runsc >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check runsc version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_tag }}"
          REPORTED="${{ steps.version.outputs.version }}"
          if [ "$REPORTED" = "$EXPECTED" ] && runsc --version 2>&1 | grep -q "runsc version"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            runsc --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check runsc help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if runsc --help >/tmp/runsc-help.log 2>&1 && grep -qi "usage" /tmp/runsc-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/runsc-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.binary_path }}" | grep -Eqi "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "${{ steps.install.outputs.binary_path }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Validate runsc command path
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          LIST_OUTPUT=$(runsc list --help 2>&1 || true)
          if grep -qi "^list \\[flags\\]" <<<"$LIST_OUTPUT" && grep -qi "output format" <<<"$LIST_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$LIST_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST_TAG="release-20250203.0"

          LATEST_STORAGE="${LATEST_TAG#release-}"
          echo "latest_version=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST_TAG"

          NEXT_DIR=$(mktemp -d)
          NEXT_BASE="https://storage.googleapis.com/gvisor/releases/release/${LATEST_STORAGE}/aarch64"
          NEXT_BIN="${NEXT_DIR}/runsc"
          NEXT_SHA="${NEXT_DIR}/runsc.sha512"
          curl -fsSL "${NEXT_BASE}/runsc" -o "$NEXT_BIN"
          curl -fsSL "${NEXT_BASE}/runsc.sha512" -o "$NEXT_SHA"
          (cd "$NEXT_DIR" && sha512sum -c "$(basename "$NEXT_SHA")")
          chmod +x "$NEXT_BIN"

          NEXT_REPORTED=$("$NEXT_BIN" --version 2>&1 | awk '/runsc version/ {print $3}' | head -n 1 || true)
          NEXT_HELP=$("$NEXT_BIN" --help 2>&1 || true)
          NEXT_LIST=$("$NEXT_BIN" list --help 2>&1 || true)

          if [ "$NEXT_REPORTED" = "$LATEST_TAG" ] \
            && grep -qi "usage" <<<"$NEXT_HELP" \
            && grep -qi "^list \\[flags\\]" <<<"$NEXT_LIST" \
            && grep -qi "output format" <<<"$NEXT_LIST" \
            && file "$NEXT_BIN" | grep -Eqi "aarch64|arm64"; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned gVisor version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release ${LATEST_TAG} for Arm64, and the staged runsc binary reported version ${NEXT_REPORTED} while successfully passing help and list subcommand validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned gVisor version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release ${LATEST_TAG} for Arm64, and the staged runsc binary reported version ${NEXT_REPORTED} while successfully passing help and list subcommand validation on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$NEXT_BIN" --version || true
            printf '%s\n' "$NEXT_HELP" || true
            printf '%s\n' "$NEXT_LIST" || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned gVisor version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST_TAG} did not validate as a usable Arm64 runsc install." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned gVisor version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST_TAG} did not validate as a usable Arm64 runsc install."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/gVisor.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "GVisor",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check runsc binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check runsc version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check runsc help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Verify architecture",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Validate runsc command path",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gVisor-test-results
          path: test-results/gVisor.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## gVisor Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check runsc binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check runsc version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check runsc help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Validate runsc command path: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
