name: Test Sysget on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/sysget.md"
      - ".github/workflows/test-sysget.yml"

jobs:
  test-sysget:
    runs-on: ubuntu-24.04-arm
    env:
      SYSGET_VERSION: "2.2"
      SYSGET_NEXT_VERSION: "2.3"
      SYSGET_REPO: "https://github.com/cvengler/sysget.git"
      SYSGET_WORKROOT: "/tmp/sysget-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=sysget" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/sysget" >> "$GITHUB_OUTPUT"
          echo "current_version=${SYSGET_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Sysget baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git g++ make ca-certificates file

          ROOT="${SYSGET_WORKROOT}/current"
          CONF="${SYSGET_WORKROOT}/sysget.conf"
          rm -rf "${SYSGET_WORKROOT}"
          mkdir -p "${SYSGET_WORKROOT}"

          git clone --depth 1 --branch "v${SYSGET_VERSION}" "${SYSGET_REPO}" "${ROOT}"
          if [ -f "${ROOT}/Makefile" ]; then
            cd "${ROOT}"
            make clean >/dev/null 2>&1 || true
            make
            BIN="${ROOT}/sysget"
          elif [ -f "${ROOT}/makefile" ]; then
            cd "${ROOT}"
            make -f makefile clean >/dev/null 2>&1 || true
            make -f makefile
            BIN="${ROOT}/sysget"
          elif [ -f "${ROOT}/src/makefile" ]; then
            cd "${ROOT}/src"
            make clean >/dev/null 2>&1 || true
            make prog >/dev/null 2>&1 || make
            mv sysget.o "${ROOT}/sysget"
            BIN="${ROOT}/sysget"
          else
            echo "Unsupported Sysget source layout"
            exit 1
          fi
          printf 'apt\n' > "${CONF}"
          VERSION=$(git -C "${ROOT}" describe --tags --exact-match | sed 's/^v//')

          if [ "${VERSION}" = "${SYSGET_VERSION}" ]; then
            echo "root=${ROOT}" >> "$GITHUB_OUTPUT"
            echo "conf=${CONF}" >> "$GITHUB_OUTPUT"
            echo "bin=${BIN}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            git -C "${ROOT}" describe --tags --exact-match || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Sysget version
        id: version
        run: |
          set -euo pipefail
          ROOT="${{ steps.install.outputs.root }}"
          VERSION=$(git -C "${ROOT}" describe --tags --exact-match | sed 's/^v//')
          LATEST_TAG="v${SYSGET_NEXT_VERSION}"
          LATEST="${LATEST_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected Sysget version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST_TAG}"

      - name: Test 1 - Check sysget binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(git -C "${{ steps.install.outputs.root }}" describe --tags --exact-match 2>&1 || true)
          echo "${OUTPUT}"
          if printf '%s\n' "${OUTPUT}" | grep -Fxq "v${SYSGET_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SYSGET_CONFIG_PATH="${{ steps.install.outputs.conf }}" "${{ steps.install.outputs.bin }}" help >/tmp/sysget-help.txt 2>&1
          if grep -Fq "Help of sysget" /tmp/sysget-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sysget-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.bin }}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${{ steps.install.outputs.bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(LANG=C.UTF-8 SYSGET_CONFIG_PATH="${{ steps.install.outputs.conf }}" "${{ steps.install.outputs.bin }}" search bash 2>&1 || true)
          printf '%s\n' "${OUTPUT}" | head -n 20
          if printf '%s\n' "${OUTPUT}" | grep -Eq 'Full Text Search|bash'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          NEXT_DIR="${SYSGET_WORKROOT}/regression"
          NEXT_CONF="${SYSGET_WORKROOT}/sysget-next.conf"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sysget version ${CURRENT} passed the real Arm64 source-build smoke in this run, but the latest stable upstream release could not be resolved for isolated regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${NEXT_DIR}"
          git clone --depth 1 --branch "${LATEST_TAG}" "${SYSGET_REPO}" "${NEXT_DIR}"
          if [ -f "${NEXT_DIR}/Makefile" ]; then
            cd "${NEXT_DIR}"
            make clean >/dev/null 2>&1 || true
            make
            NEXT_BIN="${NEXT_DIR}/sysget"
          elif [ -f "${NEXT_DIR}/makefile" ]; then
            cd "${NEXT_DIR}"
            make -f makefile clean >/dev/null 2>&1 || true
            make -f makefile
            NEXT_BIN="${NEXT_DIR}/sysget"
          elif [ -f "${NEXT_DIR}/src/makefile" ]; then
            cd "${NEXT_DIR}/src"
            make clean >/dev/null 2>&1 || true
            make prog >/dev/null 2>&1 || make
            mv sysget.o "${NEXT_DIR}/sysget"
            NEXT_BIN="${NEXT_DIR}/sysget"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sysget version ${CURRENT} passed the real Arm64 source-build smoke in this run, but candidate version ${LATEST} uses an unsupported source layout for the current workflow." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          printf 'apt\n' > "${NEXT_CONF}"

          NEXT_VERSION=$(git -C "${NEXT_DIR}" describe --tags --exact-match | sed 's/^v//')
          NEXT_HELP=$(SYSGET_CONFIG_PATH="${NEXT_CONF}" "${NEXT_BIN}" help 2>&1 || true)
          NEXT_SEARCH=$(LANG=C.UTF-8 SYSGET_CONFIG_PATH="${NEXT_CONF}" "${NEXT_BIN}" search bash 2>&1 || true)

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             file "${NEXT_BIN}" | grep -qi "ARM aarch64" && \
             printf '%s\n' "${NEXT_HELP}" | grep -Fq "Help of sysget" && \
             printf '%s\n' "${NEXT_SEARCH}" | grep -Eq 'Full Text Search|bash'; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Sysget version ${CURRENT} passed the real Arm64 source-build smoke in this run. Regression validation rebuilt candidate version ${LATEST} from source and confirmed the isolated Arm64 help and package-search paths successfully." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            printf '%s\n' "${NEXT_HELP}" | head -n 20 || true
            printf '%s\n' "${NEXT_SEARCH}" | head -n 20 || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Sysget version ${CURRENT} passed the real Arm64 source-build smoke in this run, but candidate version ${LATEST} did not complete the isolated source-build validation path successfully." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
              if job.get("name") in (f"{job_id} / {job_id}", job_id):
                  print(job.get("html_url", ""))
                  break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/sysget.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Sysget",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check sysget binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check exact version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sysget-test-results
          path: test-results/sysget.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Sysget Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check sysget binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
