name: Test Cilium on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/cilium.md'
      - '.github/workflows/test-cilium.yml'

jobs:
  test-cilium:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "package_slug=cilium" >> $GITHUB_OUTPUT
          echo "dashboard_link=/opensource_packages/cilium" >> $GITHUB_OUTPUT
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar wget
      
      - name: Install Cilium CLI
        id: install
        run: |
          set -euo pipefail
          echo "Installing Cilium CLI..."
          CURRENT_VERSION="0.18.9"
          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          CLI_ARCH="arm64"
          CILIUM_TAG="v${CURRENT_VERSION}"
          curl -L --fail --remote-name-all "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_TAG}/cilium-linux-${CLI_ARCH}.tar.gz"{,.sha256sum}
          sha256sum --check "cilium-linux-${CLI_ARCH}.tar.gz.sha256sum"
          sudo tar xzf "cilium-linux-${CLI_ARCH}.tar.gz" -C /usr/local/bin
          rm -f "cilium-linux-${CLI_ARCH}.tar.gz" "cilium-linux-${CLI_ARCH}.tar.gz.sha256sum"
          if command -v cilium >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      
      - name: Get Cilium version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(timeout 10s cilium version --client 2>&1 | grep -Eo 'v?[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//' || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.install.outputs.baseline_version || 'unknown' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Cilium version: $VERSION"
      
      - name: Test 1 - Check Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if which cilium; then
            echo "✓ cilium binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ cilium binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Run Help
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if timeout 10s cilium help >/dev/null 2>&1; then
             echo "✓ cilium help works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cilium help failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check Client Version
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if timeout 10s cilium version --client >/dev/null 2>&1; then
             echo "✓ cilium client version check passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cilium client version check failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check Completion
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if timeout 10s cilium completion bash > /dev/null; then
             echo "✓ cilium completion generation works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ cilium completion failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT      
      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST=$(GH_TOKEN=${{ github.token }} gh api repos/cilium/cilium-cli/releases/latest --jq .tag_name 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$LATEST" ]; then
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the latest stable candidate could not be resolved." >> "$GITHUB_OUTPUT"
            echo "=== Regression Validation (Next Version Install) ==="
            echo "Current version tested in Tests 1-5: $CURRENT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the latest stable candidate could not be resolved."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run and already matches the latest stable Cilium CLI Arm64 release."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            NEXT_DIR=$(mktemp -d)
            NEXT_TAG="v${LATEST}"
            NEXT_TGZ="${NEXT_DIR}/cilium-next.tar.gz"
            NEXT_SHA="${NEXT_DIR}/cilium-next.tar.gz.sha256sum"
            if curl -fsSL -o "$NEXT_TGZ" "https://github.com/cilium/cilium-cli/releases/download/${NEXT_TAG}/cilium-linux-arm64.tar.gz" && \
               curl -fsSL -o "$NEXT_SHA" "https://github.com/cilium/cilium-cli/releases/download/${NEXT_TAG}/cilium-linux-arm64.tar.gz.sha256sum"; then
              (cd "$NEXT_DIR" && sha256sum --check "$(basename "$NEXT_SHA")")
              tar -xzf "$NEXT_TGZ" -C "$NEXT_DIR"
              NEXT_INSTALLED=$(timeout 10s "$NEXT_DIR/cilium" version --client 2>&1 | grep -Eo 'v?[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//' || true)
              if [ -n "$NEXT_INSTALLED" ] && [ "$NEXT_INSTALLED" = "$LATEST" ]; then
                echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate binary reported version ${NEXT_INSTALLED}." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: $NEXT_INSTALLED"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "Details: Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate binary reported version ${NEXT_INSTALLED}."
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=${NEXT_INSTALLED:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not report the expected version on Arm64." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "Details: Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not report the expected version on Arm64."
                echo "status=failed" >> "$GITHUB_OUTPUT"
                END_TIME=$(date +%s)
                echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Cilium CLI version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          # Check Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Run Help
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check Client Version
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check Completion
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))


          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))


          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT

          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}"
          fi
          mkdir -p test-results
          
          cat > test-results/cilium.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Cilium",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Binary",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Run Help",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Client Version",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check Completion",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                
                },
                {
                  "name": "Test 5 - Architecture Verification",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/cilium.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cilium-test-results
          path: test-results/cilium.json
          retention-days: 90
      
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi
          echo "## Cilium Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Run Help: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Client Version: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Check Completion: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY



