name: Test Postman on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/postman.md'
      - '.github/workflows/test-postman.yml'

jobs:
  test-postman:
    runs-on: ubuntu-24.04-arm
    env:
      POSTMAN_VERSION: "11.71.7"
      POSTMAN_ROOT: "/opt/postman-smoke/Postman/app"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=postman" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/postman" >> "$GITHUB_OUTPUT"

      - name: Install Postman
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl xvfb libsecret-1-0

          curl -fsSL "https://dl.pstmn.io/download/version/${POSTMAN_VERSION}/linux_arm64" -o /tmp/postman.tar.gz
          sudo rm -rf /opt/postman-smoke
          sudo mkdir -p /opt/postman-smoke
          sudo tar -xzf /tmp/postman.tar.gz -C /opt/postman-smoke
          sudo ln -sf "${POSTMAN_ROOT}/Postman" /usr/local/bin/postman

          if [ -x "${POSTMAN_ROOT}/Postman" ] && [ -f "${POSTMAN_ROOT}/resources/app/package.json" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Postman version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          with open("/opt/postman-smoke/Postman/app/resources/app/package.json") as f:
              print(json.load(f)["version"])
          PY
          )
          LATEST=$(snap info postman 2>/dev/null | awk '/latest\/stable:/ {print $2; exit}' || true)
          if [ -z "$LATEST" ]; then
            LATEST="not_yet_checked"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check postman binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v postman >/dev/null 2>&1 && [ -x "${POSTMAN_ROOT}/Postman" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version signal
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          timeout 20 xvfb-run -a "${POSTMAN_ROOT}/Postman" --version --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/version.log" 2>&1 || true
          if grep -q "Booting Postman ${POSTMAN_VERSION}" "${WORKDIR}/version.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${WORKDIR}/version.log"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          timeout 20 xvfb-run -a "${POSTMAN_ROOT}/Postman" --help --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/config.log" 2>&1 || true
          if grep -q "Booting Postman ${POSTMAN_VERSION}" "${WORKDIR}/config.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${WORKDIR}/config.log"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          timeout 25 xvfb-run -a "${POSTMAN_ROOT}/Postman" --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/functional.log" 2>&1 || true
          if grep -q "windowManager: First requester booted successfully." "${WORKDIR}/functional.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            tail -80 "${WORKDIR}/functional.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          if [ "$LATEST" = "not_yet_checked" ]; then
            DECISION="manual_review_needed"
            COMPARISON="Current pinned Postman version ${CURRENT} was smoke-tested in this run. Latest-stable validation still needs an explicit follow-up check."
          elif [ "$LATEST" = "$CURRENT" ]; then
            DECISION="already_current"
            COMPARISON="Current pinned Postman version ${CURRENT} matches the latest stable channel and was smoke-tested successfully on Arm64 in this run."
          else
            DECISION="upgrade_candidate_available"
            COMPARISON="Current pinned Postman version ${CURRENT} passed smoke tests in this run. Latest stable ${LATEST} is available for a future explicit upgrade validation."
          fi
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/postman.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Postman",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Electron",
              "category": "Content mgmt platforms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check postman binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version signal", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-test-results
          path: test-results/postman.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Postman Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Current vs Next"
            echo "- Current pinned version: ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- Latest checked: ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
            echo "- Decision: ${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
            echo "- Comparison: ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check postman binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version signal: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
