name: Test Postman on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-postman.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-postman.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-postman.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-postman.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-postman.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-postman.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-postman.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-postman.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-postman.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-postman.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-postman.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-postman.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-postman.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-postman.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-postman.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-postman.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-postman.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-postman.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-postman.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-postman.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-postman.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-postman.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-postman.outputs.timestamp }}
jobs:
  test-postman:
    runs-on: ubuntu-24.04-arm
    env:
      POSTMAN_VERSION: "11.71.7"
      POSTMAN_ROOT: /opt/postman-smoke/Postman/app

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Postman'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=postman" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/postman" >> "$GITHUB_OUTPUT"
          echo "current_version=${POSTMAN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Postman
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl xvfb libsecret-1-0 python3"
          curl -fsSL "https://dl.pstmn.io/download/version/${POSTMAN_VERSION}/linux_arm64" -o /tmp/postman.tar.gz
          sudo rm -rf /opt/postman-smoke
          sudo mkdir -p /opt/postman-smoke
          sudo tar -xzf /tmp/postman.tar.gz -C /opt/postman-smoke
          sudo ln -sf "${POSTMAN_ROOT}/Postman" /usr/local/bin/postman

          if [ -x "${POSTMAN_ROOT}/Postman" ] && [ -f "${POSTMAN_ROOT}/resources/app/package.json" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Postman version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          with open("/opt/postman-smoke/Postman/app/resources/app/package.json", encoding="utf-8") as f:
              print(json.load(f)["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check binary existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v postman >/dev/null 2>&1 && [ -x "${POSTMAN_ROOT}/Postman" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION=$(python3 - <<'PY'
          import json
          with open("/opt/postman-smoke/Postman/app/resources/app/package.json", encoding="utf-8") as f:
              print(json.load(f)["version"])
          PY
          )
          if [ "$VERSION" = "${POSTMAN_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check boot log version signal
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          trap 'rm -rf "$WORKDIR" >/dev/null 2>&1 || true' EXIT
          timeout 20 xvfb-run -a "${POSTMAN_ROOT}/Postman" --version --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/version.log" 2>&1 || true
          if grep -q "Booting Postman ${POSTMAN_VERSION}" "${WORKDIR}/version.log" \
            || grep -q "${POSTMAN_VERSION}" "${WORKDIR}/version.log" \
            || grep -q "windowManager: First requester booted successfully." "${WORKDIR}/version.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "${WORKDIR}/version.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          trap 'rm -rf "$WORKDIR" >/dev/null 2>&1 || true' EXIT
          timeout 25 xvfb-run -a "${POSTMAN_ROOT}/Postman" --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/functional.log" 2>&1 || true
          if grep -q "windowManager: First requester booted successfully." "${WORKDIR}/functional.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            tail -80 "${WORKDIR}/functional.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR" >/dev/null 2>&1 || true' EXIT
          NEXT_ARCHIVE="$TMP_DIR/postman-latest.tar.gz"
          if ! curl -fsSL "https://dl.pstmn.io/download/latest/linux_arm64" -o "$NEXT_ARCHIVE"; then
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Postman version $CURRENT passed smoke tests in this run, but the latest Arm64 Postman tarball could not be downloaded for install validation." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: unknown"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          tar -xzf "$NEXT_ARCHIVE" -C "$TMP_DIR"
          NEXT_ROOT="$TMP_DIR/Postman/app"
          NEXT_INSTALLED_VERSION=$(python3 - <<PY
          import json
          with open("${TMP_DIR}/Postman/app/resources/app/package.json", encoding="utf-8") as f:
              print(json.load(f)["version"])
          PY
          )
          echo "latest_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $NEXT_INSTALLED_VERSION"

          WORKDIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR" "$WORKDIR" >/dev/null 2>&1 || true' EXIT
          timeout 25 xvfb-run -a "${NEXT_ROOT}/Postman" --disable-gpu --no-sandbox --user-data-dir="${WORKDIR}/userdata" >"${WORKDIR}/functional.log" 2>&1 || true
          if ! grep -q "windowManager: First requester booted successfully." "${WORKDIR}/functional.log"; then
            tail -80 "${WORKDIR}/functional.log" || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Postman version $CURRENT passed smoke tests in this run, but the latest Arm64 candidate ${NEXT_INSTALLED_VERSION:-unknown} did not complete a real bounded startup validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Postman version $CURRENT passed smoke tests in this run. Regression validation downloaded the latest Arm64 tarball, extracted candidate version $NEXT_INSTALLED_VERSION, and confirmed a real bounded startup on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "summary_requires_failure=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Finalize package result
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.overall_status || 'failure' }}" != "success" ]; then
            exit 1
          fi
