name: Test Hardware Abstraction Layer (HAL) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-hal.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-hal.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-hal.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-hal.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-hal.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-hal.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-hal.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-hal.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-hal.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-hal.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-hal.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-hal.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-hal.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-hal.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-hal.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-hal.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-hal.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-hal.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-hal.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-hal.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-hal.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-hal.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-hal.outputs.timestamp }}
jobs:
  test-hal:
    runs-on: ubuntu-24.04-arm

    env:
      BASELINE_VERSION: "4.4.0"
      NEXT_VERSION: "4.4.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Hardware Abstraction Layer (HAL)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=hal" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/hal" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Hardware Abstraction Layer (HAL)
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          SRC_DIR="$RUNNER_TEMP/hal-current"
          TAR="$RUNNER_TEMP/hal-${VERSION}.tar.gz"

          wget -q "https://github.com/emsec/hal/archive/refs/tags/v${VERSION}.tar.gz" -O "$TAR"
          rm -rf "$SRC_DIR"
          tar -xzf "$TAR" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/hal-${VERSION}" "$SRC_DIR"

          cd "$SRC_DIR"
          ./install_dependencies.sh
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_ALL_PLUGINS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCUMENTATION=OFF \
            -DPL_GUI=OFF \
            -DPACKAGE_DEB=OFF
          ninja -C build hal

          if [ -x "$SRC_DIR/build/bin/hal" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
            echo "$SRC_DIR/build/bin" >> "$GITHUB_PATH"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Hardware Abstraction Layer (HAL) version
        id: version
        run: |
          set -euo pipefail
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          VERSION=$("$HAL_BIN" --version 2>&1 | head -n 1 | sed 's/^v//' || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.metadata.outputs.current_version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check hal binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          if [ -x "$HAL_BIN" ] && command -v hal >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check HAL version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          EXPECTED="v${{ steps.metadata.outputs.current_version }}"
          REPORTED=$("$HAL_BIN" --version | head -n 1)
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "$HAL_BIN" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check HAL help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          OUTPUT=$("$HAL_BIN" --help 2>&1 || true)
          if grep -qi "cli options" <<< "$OUTPUT" && grep -qi "generic options" <<< "$OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check built ARM64 executable
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          if file "$HAL_BIN" | grep -qiE "arm aarch64|aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$HAL_BIN" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check runtime libraries and architecture
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HAL_BIN="${{ steps.install.outputs.source_dir }}/build/bin/hal"
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] && \
             ldd "$HAL_BIN" >/tmp/hal-ldd.txt 2>&1 && \
             grep -q "=> " /tmp/hal-ldd.txt && \
             ! grep -q "not found" /tmp/hal-ldd.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/hal-ldd.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          if [ -z "$LATEST" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HAL version ${CURRENT} passed smoke tests in this run, but the latest stable HAL release tag could not be resolved from GitHub Releases." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned HAL version ${CURRENT} passed smoke tests in this run, but the latest stable HAL release tag could not be resolved from GitHub Releases."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned HAL version ${CURRENT} passed smoke tests in this run and already matches the latest stable release tag published upstream."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR="$RUNNER_TEMP/hal-next"
          NEXT_TAR="$RUNNER_TEMP/hal-${LATEST}.tar.gz"
          rm -rf "$NEXT_DIR"
          wget -q "https://github.com/emsec/hal/archive/refs/tags/v${LATEST}.tar.gz" -O "$NEXT_TAR"
          tar -xzf "$NEXT_TAR" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/hal-${LATEST}" "$NEXT_DIR"
          cd "$NEXT_DIR"
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_ALL_PLUGINS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCUMENTATION=OFF \
            -DPL_GUI=OFF \
            -DPACKAGE_DEB=OFF
          ninja -C build hal

          NEXT_BIN="$NEXT_DIR/build/bin/hal"
          REPORTED=$("$NEXT_BIN" --version | head -n 1 | sed 's/^v//')
          HELP_OUTPUT=$("$NEXT_BIN" --help 2>&1 || true)
          if [ "$REPORTED" = "$LATEST" ] && grep -qi "cli options" <<< "$HELP_OUTPUT"; then
            echo "next_installed_version=$REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HAL version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from source on Arm64, and the resulting binary reported version v${REPORTED} with the expected CLI help output." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned HAL version ${CURRENT} passed smoke tests in this run. Regression validation built candidate version ${LATEST} from source on Arm64, and the resulting binary reported version v${REPORTED} with the expected CLI help output."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned HAL version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not build into a binary that reported the expected version/help output on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned HAL version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not build into a binary that reported the expected version/help output on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Generate job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Hardware Abstraction Layer (HAL) Test Results

          - **Version:** ${{ steps.version.outputs.version }}
          - **Status:** ${{ steps.summary.outputs.overall_status }}
          - **Tests Passed:** ${{ steps.summary.outputs.passed }}
          - **Tests Failed:** ${{ steps.summary.outputs.failed }}
          - **Duration:** ${{ steps.summary.outputs.duration }}s
          - **Runner:** ubuntu-24.04 (arm64)

          ### Test Details

          1. Test 1 - Check hal binary exists: ${{ steps.test1.outputs.status || 'failed' }}
          2. Test 2 - Check HAL version output: ${{ steps.test2.outputs.status || 'failed' }}
          3. Test 3 - Check HAL help output: ${{ steps.test3.outputs.status || 'failed' }}
          4. Test 4 - Check built ARM64 executable: ${{ steps.test4.outputs.status || 'failed' }}
          5. Test 5 - Check runtime libraries and architecture: ${{ steps.test5.outputs.status || 'failed' }}
          6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}

          ### Regression Validation (Next Version Install)

          - **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          - **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}
          - **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          - **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          - **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
          EOF
