name: Test Submarine on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/submarine.md"
      - ".github/workflows/test-submarine.yml"

jobs:
  test-submarine:
    runs-on: ubuntu-24.04-arm
    container:
      image: registry.fedoraproject.org/fedora-minimal:41
    env:
      SUBMARINE_VERSION: "0.4.0"
      SUBMARINE_NEXT_VERSION: "0.4.1"
      SUBMARINE_REPO: "https://github.com/FyraLabs/submarine.git"
      SUBMARINE_WORKROOT: "/tmp/submarine-smoke"
      SUBMARINE_VENV: "/tmp/submarine-smoke/venv"

    steps:
      - name: Bootstrap checkout prerequisites
        run: |
          set -euo pipefail
          dnf5 install -y git tar gzip findutils ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=submarine" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/submarine" >> "$GITHUB_OUTPUT"
          echo "current_version=${SUBMARINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Submarine baseline
        id: install
        run: |
          set -euo pipefail
          dnf5 update -y
          dnf5 install -y git make gcc ccache awk patch flex bison elfutils-devel parted vboot-utils golang xz bc tar openssl-devel python3-pip uboot-tools gzip file findutils util-linux dtc

          export PATH="$PATH:$HOME/go/bin"
          BASE_DIR="${SUBMARINE_WORKROOT}/current"
          rm -rf "${SUBMARINE_WORKROOT}"
          mkdir -p "${SUBMARINE_WORKROOT}"
          python3 -m venv "${SUBMARINE_VENV}"
          "${SUBMARINE_VENV}/bin/pip" install --upgrade pip
          # depthcharge-tools still imports pkg_resources on Fedora 41 / Python 3.13.
          "${SUBMARINE_VENV}/bin/pip" install "setuptools<81" depthcharge-tools
          echo "${SUBMARINE_VENV}/bin" >> "$GITHUB_PATH"
          git clone --depth 1 --branch "v${SUBMARINE_VERSION}" --recurse-submodules "${SUBMARINE_REPO}" "${BASE_DIR}"
          git config --global --add safe.directory "${BASE_DIR}"

          UROOT_COMMIT=$(git -C "${BASE_DIR}" rev-parse HEAD:u-root)
          go install github.com/u-root/u-root@"${UROOT_COMMIT}"

          make -C "${BASE_DIR}" -j"$(nproc)" arm64

          test -f "${BASE_DIR}/images/submarine-a64.bin"
          test -f "${BASE_DIR}/images/submarine-a64.kpart"
          test -f "${BASE_DIR}/build/bzImage.a64"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Submarine version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          CURRENT=$(git -C "${BASE_DIR}" describe --tags --exact-match | sed 's/^v//')
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${SUBMARINE_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Submarine version: ${CURRENT}"
          echo "Detected latest stable release: ${SUBMARINE_NEXT_VERSION}"

      - name: Test 1 - Check build artifacts exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -f "${BASE_DIR}/images/submarine-a64.bin" ] && \
             [ -f "${BASE_DIR}/images/submarine-a64.kpart" ] && \
             [ -f "${BASE_DIR}/build/bzImage.a64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version provenance
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          TAG=$(git -C "${BASE_DIR}" describe --tags --exact-match | sed 's/^v//')
          if [ "${TAG}" = "${SUBMARINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${SUBMARINE_VERSION}, got ${TAG}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check build usage output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          make -C "${BASE_DIR}" usage > /tmp/submarine-usage.txt 2>&1
          if grep -Eq 'x86_64|arm64' /tmp/submarine-usage.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/submarine-usage.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ "$(uname -m)" = "aarch64" ] && \
             gzip -cd "${BASE_DIR}/build/bzImage.a64" | file - | grep -Eqi 'ARM aarch64|ARM64|AArch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            gzip -cd "${BASE_DIR}/build/bzImage.a64" | file - || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional image validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          parted -s "${BASE_DIR}/images/submarine-a64.bin" unit s print > /tmp/submarine-parted.txt 2>&1
          IMAGE_SIZE=$(stat -c%s "${BASE_DIR}/images/submarine-a64.bin")
          if grep -q "Partition Table: gpt" /tmp/submarine-parted.txt && \
             grep -Eq '^ 1|^1 ' /tmp/submarine-parted.txt && \
             [ "${IMAGE_SIZE}" -gt 50000000 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/submarine-parted.txt || true
            echo "Image size: ${IMAGE_SIZE}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export PATH="${SUBMARINE_VENV}/bin:$PATH:$HOME/go/bin"
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          NEXT_DIR="${SUBMARINE_WORKROOT}/regression"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Submarine version ${CURRENT} completed the real Arm64 boot-image build path in this run, but the latest stable upstream tag could not be resolved for isolated regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${NEXT_DIR}"
          git clone --depth 1 --branch "v${LATEST}" --recurse-submodules "${SUBMARINE_REPO}" "${NEXT_DIR}"
          git config --global --add safe.directory "${NEXT_DIR}"
          UROOT_COMMIT=$(git -C "${NEXT_DIR}" rev-parse HEAD:u-root)
          go install github.com/u-root/u-root@"${UROOT_COMMIT}"
          make -C "${NEXT_DIR}" -j"$(nproc)" arm64
          NEXT_VERSION=$(git -C "${NEXT_DIR}" describe --tags --exact-match | sed 's/^v//')
          parted -s "${NEXT_DIR}/images/submarine-a64.bin" unit s print > /tmp/submarine-next-parted.txt 2>&1
          NEXT_IMAGE_SIZE=$(stat -c%s "${NEXT_DIR}/images/submarine-a64.bin")
          NEXT_KERNEL_DESC=$(gzip -cd "${NEXT_DIR}/build/bzImage.a64" | file -)
          NEXT_GPT_OK=0
          if grep -q "Partition Table: gpt" /tmp/submarine-next-parted.txt; then
            NEXT_GPT_OK=1
          fi
          NEXT_ARTIFACTS_OK=0
          if [ -f "${NEXT_DIR}/images/submarine-a64.bin" ] && [ -f "${NEXT_DIR}/images/submarine-a64.kpart" ]; then
            NEXT_ARTIFACTS_OK=1
          fi

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             [ "${NEXT_ARTIFACTS_OK}" -eq 1 ] && \
             printf '%s\n' "${NEXT_KERNEL_DESC}" | grep -Eqi 'ARM aarch64|ARM64|AArch64' && \
             [ "${NEXT_IMAGE_SIZE}" -gt 50000000 ]; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Pending regression install validation" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Submarine version ${CURRENT} already matches the newest public stable Submarine release found by this workflow. Tests 1-5 validate the real Arm64 image-build path, but the dashboard anchor is already too recent to leave a clean aged baseline above it, so this package needs metadata or policy review before claiming a genuine Test 6 upgrade step." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              STATUS="failed"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Submarine version ${CURRENT} completed the real Arm64 boot-image build path in this run. Regression validation rebuilt candidate version ${LATEST} from a fresh isolated clone and reconfirmed the Arm64 image-generation path successfully." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
              STATUS="passed"
            fi
          else
            cat /tmp/submarine-next-parted.txt || true
            echo "${NEXT_KERNEL_DESC:-kernel-description-unavailable}" || true
            echo "Next image size: ${NEXT_IMAGE_SIZE:-unknown}" || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Submarine version ${CURRENT} completed the real Arm64 boot-image build path in this run, but candidate version ${LATEST} did not rebuild into a valid Arm64 image artifact set." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            STATUS="failed"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
            if job.get("name") in (f"{job_id} / {job_id}", job_id):
              print(job.get("html_url", ""))
              break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/submarine.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Submarine",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Mixed",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check build artifacts exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check version provenance", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check build usage output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional image validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submarine-test-results
          path: test-results/submarine.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Submarine Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check build artifacts exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version provenance: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check build usage output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional image validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
