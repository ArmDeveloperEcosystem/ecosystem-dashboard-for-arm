name: Test Sendbird UIKit on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-sendbird-uikit.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-sendbird-uikit.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-sendbird-uikit.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-sendbird-uikit.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-sendbird-uikit.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-sendbird-uikit.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-sendbird-uikit.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-sendbird-uikit.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-sendbird-uikit.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-sendbird-uikit.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-sendbird-uikit.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-sendbird-uikit.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-sendbird-uikit.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-sendbird-uikit.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-sendbird-uikit.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-sendbird-uikit.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-sendbird-uikit.outputs.timestamp }}
jobs:
  test-sendbird-uikit:
    runs-on: ubuntu-24.04-arm
    env:
      SENDBIRD_UIKIT_VERSION: "3.0.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Sendbird UIKit'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=sendbird-uikit" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/sendbird-uikit" >> "$GITHUB_OUTPUT"
      - name: Install Sendbird UIKit
        id: install
        run: |
          set -euo pipefail
          rm -rf /tmp/sendbird-uikit-smoke
          mkdir -p /tmp/sendbird-uikit-smoke
          cd /tmp/sendbird-uikit-smoke
          npm init -y >/dev/null 2>&1
          npm install --no-fund --no-audit react@18 react-dom@18 jsdom@22 "@sendbird/uikit-react@${SENDBIRD_UIKIT_VERSION}"
          if [ -f node_modules/@sendbird/uikit-react/package.json ]; then
            echo "package_dir=/tmp/sendbird-uikit-smoke" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Sendbird UIKit version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('/tmp/sendbird-uikit-smoke/node_modules/@sendbird/uikit-react/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Package Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f /tmp/sendbird-uikit-smoke/node_modules/@sendbird/uikit-react/package.json ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(node -p "require('/tmp/sendbird-uikit-smoke/node_modules/@sendbird/uikit-react/package.json').version")
          if [ "$VERSION" = "$SENDBIRD_UIKIT_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected $SENDBIRD_UIKIT_VERSION but got $VERSION"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Dependency Tree Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd /tmp/sendbird-uikit-smoke
          npm ls @sendbird/uikit-react 2>&1 | tee /tmp/sendbird-uikit-ls.log
          if grep -Fq "@sendbird/uikit-react" /tmp/sendbird-uikit-ls.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd /tmp/sendbird-uikit-smoke
          node - <<'EOF' > /tmp/sendbird-uikit-functional.log 2>&1
          const { JSDOM } = require("jsdom");
          const React = require("react");
          const { renderToString } = require("react-dom/server");
          const dom = new JSDOM("<!doctype html><html><body></body></html>", { url: "http://localhost/" });
          global.window = dom.window;
          global.document = dom.window.document;
          global.navigator = dom.window.navigator;
          global.Element = dom.window.Element;
          global.HTMLElement = dom.window.HTMLElement;
          global.Node = dom.window.Node;
          global.Text = dom.window.Text;
          const ui = require("@sendbird/uikit-react");
          const Provider = ui.SendBirdProvider || ui.SendbirdProvider;
          if (typeof Provider !== "function") process.exit(1);
          const html = renderToString(
            React.createElement(Provider, { appId: "app", userId: "user" }, React.createElement("div", null, "arm64"))
          );
          if (!html.includes("arm64")) process.exit(1);
          console.log("sendbird-render-ok");
          EOF
          if grep -Fxq "sendbird-render-ok" /tmp/sendbird-uikit-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sendbird-uikit-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          npm view @sendbird/uikit-react versions --json > /tmp/sendbird-uikit-versions.json
          NEXT=$(CURRENT="$CURRENT" node <<'NODE'
          const fs = require('fs');
          const current = process.env.CURRENT;
          const versions = JSON.parse(fs.readFileSync('/tmp/sendbird-uikit-versions.json', 'utf8'))
            .filter((v) => /^\d+\.\d+\.\d+$/.test(v))
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          process.stdout.write(versions.find((v) => v.localeCompare(current, undefined, { numeric: true }) > 0) || '');
          NODE
          )
          if [ -z "$NEXT" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Sendbird UIKit version is available from npm" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Sendbird UIKit $CURRENT rendered a provider subtree; npm did not report a newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          NEXT_DIR=$(mktemp -d)
          cd "$NEXT_DIR"
          npm init -y >/dev/null 2>&1
          npm install --no-fund --no-audit react@18 react-dom@18 jsdom@22 "@sendbird/uikit-react@${NEXT}"
          INSTALLED=$(node -p "require('@sendbird/uikit-react/package.json').version")
          if node <<'EOF' > /tmp/sendbird-uikit-next-functional.log 2>&1
          const { JSDOM } = require("jsdom");
          const React = require("react");
          const { renderToString } = require("react-dom/server");
          const dom = new JSDOM("<!doctype html><html><body></body></html>", { url: "http://localhost/" });
          global.window = dom.window;
          global.document = dom.window.document;
          global.navigator = dom.window.navigator;
          global.Element = dom.window.Element;
          global.HTMLElement = dom.window.HTMLElement;
          global.Node = dom.window.Node;
          global.Text = dom.window.Text;
          const ui = require("@sendbird/uikit-react");
          const Provider = ui.SendBirdProvider || ui.SendbirdProvider;
          if (typeof Provider !== "function") process.exit(1);
          const html = renderToString(
            React.createElement(Provider, { appId: "app", userId: "user" }, React.createElement("div", null, "arm64"))
          );
          if (!html.includes("arm64")) process.exit(1);
          console.log("sendbird-next-ok");
          EOF
          then
            NODE_SMOKE_STATUS=passed
          else
            NODE_SMOKE_STATUS=failed
          fi
          if [ "$INSTALLED" = "$NEXT" ] && [ "$NODE_SMOKE_STATUS" = "passed" ] && grep -Fxq "sendbird-next-ok" /tmp/sendbird-uikit-next-functional.log; then
            echo "next_installed_version=$INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed and rendered successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Sendbird UIKit $CURRENT rendered a provider subtree. Test 6 installed candidate $INSTALLED and repeated the bounded React render on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/sendbird-uikit-next-functional.log || true
            echo "next_installed_version=${INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version render smoke failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Sendbird UIKit $CURRENT passed, but candidate $NEXT did not complete the same React render smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi
