name: Test MLRun on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-mlrun.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-mlrun.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-mlrun.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-mlrun.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-mlrun.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-mlrun.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-mlrun.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-mlrun.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-mlrun.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-mlrun.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-mlrun.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-mlrun.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-mlrun.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-mlrun.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-mlrun.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-mlrun.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-mlrun.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-mlrun.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-mlrun.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-mlrun.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-mlrun.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-mlrun.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-mlrun.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/mlrun.md'
      - '.github/workflows/test-mlrun.yml'

jobs:
  test-mlrun:
    runs-on: ubuntu-24.04-arm
    env:
      MLRUN_VERSION: "1.5.2"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'MLRun'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mlrun" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mlrun" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLRun baseline
        id: install
        run: |
          set -euo pipefail
          python -m venv venv
          . venv/bin/activate
          python -m pip install -q --upgrade pip "setuptools<81" wheel
          python -m pip install -q --no-build-isolation "mlrun==${MLRUN_VERSION}"

          INSTALLED_VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )

          if [ -x "venv/bin/mlrun" ] && [ "$INSTALLED_VERSION" = "${MLRUN_VERSION}" ]; then
            echo "venv=$PWD/venv" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            . venv/bin/activate
            python -m pip show mlrun || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get MLRun version
        id: version
        run: |
          set -euo pipefail
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected MLRun version: $VERSION"

      - name: Test 1 - Check mlrun CLI exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.venv }}/bin/mlrun" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact package version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )
          if [ "$VERSION" = "${MLRUN_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            python -m pip show mlrun || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          if mlrun --help >/tmp/mlrun-help.txt 2>&1 && grep -Eqi 'Usage:|Commands:|mlrun' /tmp/mlrun-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mlrun-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(python - <<'PY'
          import platform
          print(platform.machine())
          PY
          )
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          if mlrun project --help >/tmp/mlrun-project-help.txt 2>&1 && grep -Eqi 'Usage:|Commands:' /tmp/mlrun-project-help.txt; then
            python - <<'PY' >/tmp/mlrun-import.txt
          import mlrun
          from importlib import metadata
          assert mlrun.__version__ == metadata.version("mlrun")
          print(mlrun.__version__)
          PY
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mlrun-project-help.txt || true
            cat /tmp/mlrun-import.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## MLRun Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Test Details"
            echo "1. Check mlrun CLI exists: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Check exact package version: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Check help command: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
