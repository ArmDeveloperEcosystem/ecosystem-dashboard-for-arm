name: Test MLRun on Arm64

on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/mlrun.md'
      - '.github/workflows/test-mlrun.yml'

jobs:
  test-mlrun:
    runs-on: ubuntu-24.04-arm
    env:
      MLRUN_VERSION: "1.5.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mlrun" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mlrun" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLRun baseline
        id: install
        run: |
          set -euo pipefail
          python -m venv venv
          . venv/bin/activate
          python -m pip install -q --upgrade pip setuptools wheel
          python -m pip install -q "mlrun==${MLRUN_VERSION}"

          INSTALLED_VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )

          if [ -x "venv/bin/mlrun" ] && [ "$INSTALLED_VERSION" = "${MLRUN_VERSION}" ]; then
            echo "venv=$PWD/venv" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            . venv/bin/activate
            python -m pip show mlrun || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get MLRun version
        id: version
        run: |
          set -euo pipefail
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected MLRun version: $VERSION"

      - name: Test 1 - Check mlrun CLI exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.venv }}/bin/mlrun" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact package version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION=$(python - <<'PY'
          from importlib import metadata
          print(metadata.version("mlrun"))
          PY
          )
          if [ "$VERSION" = "${MLRUN_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            python -m pip show mlrun || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          if mlrun --help >/tmp/mlrun-help.txt 2>&1 && grep -Eqi 'Usage:|Commands:|mlrun' /tmp/mlrun-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mlrun-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(python - <<'PY'
          import platform
          print(platform.machine())
          PY
          )
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          if mlrun project --help >/tmp/mlrun-project-help.txt 2>&1 && grep -Eqi 'Usage:|Commands:' /tmp/mlrun-project-help.txt; then
            python - <<'PY' >/tmp/mlrun-import.txt
          import mlrun
          from importlib import metadata
          assert mlrun.__version__ == metadata.version("mlrun")
          print(mlrun.__version__)
          PY
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/mlrun-project-help.txt || true
            cat /tmp/mlrun-import.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" ${{ steps.test1.outputs.duration || 0 }}
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" ${{ steps.test2.outputs.duration || 0 }}
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" ${{ steps.test3.outputs.duration || 0 }}
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" ${{ steps.test4.outputs.duration || 0 }}
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" ${{ steps.test5.outputs.duration || 0 }}

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/mlrun.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "MLRun",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "AI/ML"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check mlrun CLI exists",
                  "status": "${{ steps.test1.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check exact package version",
                  "status": "${{ steps.test2.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check help command",
                  "status": "${{ steps.test3.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlrun-test-results
          path: test-results/mlrun.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## MLRun Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Test Details"
            echo "1. Check mlrun CLI exists: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Check exact package version: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Check help command: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
