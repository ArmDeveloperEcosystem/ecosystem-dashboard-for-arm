name: Test Microsoft Playwright on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-playwright.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-playwright.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-playwright.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-playwright.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-playwright.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-playwright.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-playwright.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-playwright.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-playwright.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-playwright.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-playwright.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-playwright.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-playwright.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-playwright.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-playwright.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-playwright.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-playwright.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-playwright.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-playwright.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-playwright.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-playwright.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-playwright.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-playwright.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-playwright.outputs.timestamp }}

jobs:
  test-playwright:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.17.0"
      PACKAGE_SLUG: "playwright"
      LANE_KIND: "github release / source-build-or-tarball"
      DOWNLOAD_URL: "https://github.com/microsoft/playwright/releases"
      HOMEPAGE_URL: "https://playwright.dev/"
      OFFICIAL_DOCS: "https://playwright.dev/docs/intro"
      GITHUB_REPO: "microsoft/playwright"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Microsoft Playwright'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=playwright" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/playwright" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates nodejs npm"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          set -euo pipefail
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --filter=blob:none --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"
            else
              git clone --filter=blob:none --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=default_branch" >> "$GITHUB_OUTPUT"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              echo "install_mode=github_source" >> "$GITHUB_OUTPUT"
              echo "install_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            echo "resolved_tag=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_mode=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "install_mode=unresolved" >> "$GITHUB_OUTPUT"
          echo "install_status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Define package-specific expectations
        id: expectations
        run: |
          set -euo pipefail
          CONTENT_PAGE="content/linux/opensource_packages/${PACKAGE_SLUG}.md"
          echo "content_page=$CONTENT_PAGE" >> "$GITHUB_OUTPUT"
          case "$PACKAGE_SLUG" in
            ngspice)
              echo "source_markers=ANALYSES|DEVICES|src|README|man" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README|README.adms|README.tcl|src" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README" >> "$GITHUB_OUTPUT"
              echo "identity_expect=ngspice" >> "$GITHUB_OUTPUT"
              echo "external_expect=ngspice" >> "$GITHUB_OUTPUT"
              ;;
            nvidia-container-toolkit)
              echo "source_markers=cmd/nvidia-ctk|cmd/nvidia-container-runtime|go.mod|pkg" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|cmd/nvidia-container-runtime|CHANGELOG.md|go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_kind=go_module" >> "$GITHUB_OUTPUT"
              echo "identity_target=go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_expect=github.com/NVIDIA/nvidia-container-toolkit" >> "$GITHUB_OUTPUT"
              echo "external_expect=nvidia-container-toolkit|NVIDIA Container Toolkit" >> "$GITHUB_OUTPUT"
              ;;
            nvidia-gpu-driver-container)
              echo "source_markers=base|Makefile|README.md|centos7|vgpu" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|base|azurelinux|centos7" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=driver container" >> "$GITHUB_OUTPUT"
              echo "external_expect=gpu driver container|NVIDIA driver" >> "$GITHUB_OUTPUT"
              ;;
            nvidia-gpu-operator)
              echo "source_markers=deployments/gpu-operator|go.mod|PROJECT|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|deployments/gpu-operator/Chart.yaml|tests|go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_kind=chart_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=deployments/gpu-operator/Chart.yaml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=gpu-operator" >> "$GITHUB_OUTPUT"
              echo "external_expect=gpu-operator|GPU Operator" >> "$GITHUB_OUTPUT"
              ;;
            nvimagecodec)
              echo "source_markers=CMakeLists.txt|README.md|example|cmake" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|CMakeLists.txt|example" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=nvImageCodec" >> "$GITHUB_OUTPUT"
              echo "external_expect=nvImageCodec|nvimgcodec" >> "$GITHUB_OUTPUT"
              ;;
            nvsentinel)
              echo "source_markers=distros/kubernetes/nvsentinel|api|commons|Makefile" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|distros/kubernetes/nvsentinel/Chart.yaml|preflight-checks|health-monitors" >> "$GITHUB_OUTPUT"
              echo "identity_kind=chart_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=distros/kubernetes/nvsentinel/Chart.yaml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=nvsentinel" >> "$GITHUB_OUTPUT"
              echo "external_expect=nvsentinel" >> "$GITHUB_OUTPUT"
              ;;
            nvshmem)
              echo "source_markers=CMakeLists.txt|README.md|examples|cmake_config" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|examples|CMakeLists.txt|nvshmem4py" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=NVSHMEM" >> "$GITHUB_OUTPUT"
              echo "external_expect=NVSHMEM|nvshmem" >> "$GITHUB_OUTPUT"
              ;;
            nx-cugraph)
              echo "source_markers=_nx_cugraph|pyproject.toml|VERSION|README.md|benchmarks" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|pyproject.toml|_nx_cugraph/VERSION|VERSION" >> "$GITHUB_OUTPUT"
              echo "identity_kind=toml_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=nx-cugraph" >> "$GITHUB_OUTPUT"
              echo "external_expect=nx-cugraph|cugraph" >> "$GITHUB_OUTPUT"
              ;;
            ocm)
              echo "source_markers=go.mod|api|README.md|VERSION" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|api|VERSION|cmds" >> "$GITHUB_OUTPUT"
              echo "identity_kind=go_module" >> "$GITHUB_OUTPUT"
              echo "identity_target=go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_expect=ocm.software/ocm" >> "$GITHUB_OUTPUT"
              echo "external_expect=Open Component Model|open component model|OCM" >> "$GITHUB_OUTPUT"
              ;;
            ollama)
              echo "source_markers=go.mod|README.md|app|docs|CMakeLists.txt" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|docs|app|go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=ollama run" >> "$GITHUB_OUTPUT"
              echo "external_expect=ollama" >> "$GITHUB_OUTPUT"
              ;;
            openfpgaloader)
              echo "source_markers=CMakeLists.txt|src|scripts|70-openfpgaloader.rules|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|doc|CMakeLists.txt|scripts" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=CMakeLists.txt" >> "$GITHUB_OUTPUT"
              echo "identity_expect=openFPGALoader" >> "$GITHUB_OUTPUT"
              echo "external_expect=openFPGALoader|openfpgaloader" >> "$GITHUB_OUTPUT"
              ;;
            openlane)
              echo "source_markers=Makefile|configuration|dependencies|scripts/tcl_commands|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|configuration|dependencies|scripts/tcl_commands" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=OpenLane" >> "$GITHUB_OUTPUT"
              echo "external_expect=OpenLane|openlane" >> "$GITHUB_OUTPUT"
              ;;
            opennow)
              echo "source_markers=package.json|opennow-stable/package.json|README.md|opennow-stable" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|package.json|opennow-stable/package.json|opennow-stable" >> "$GITHUB_OUTPUT"
              echo "identity_kind=package_json_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=opennow-stable/package.json" >> "$GITHUB_OUTPUT"
              echo "identity_expect=opennow-stable" >> "$GITHUB_OUTPUT"
              echo "external_expect=OpenNOW|opennow" >> "$GITHUB_OUTPUT"
              ;;
            ord-provider-server)
              echo "source_markers=package.json|src|Dockerfile|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|package.json|Dockerfile|src" >> "$GITHUB_OUTPUT"
              echo "identity_kind=package_json_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=package.json" >> "$GITHUB_OUTPUT"
              echo "identity_expect=@open-resource-discovery/provider-server" >> "$GITHUB_OUTPUT"
              echo "external_expect=provider-server|open-resource-discovery" >> "$GITHUB_OUTPUT"
              ;;
            oregano)
              echo "source_markers=README.md|docs|data|builddeps.sh" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|data|docs" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=oregano" >> "$GITHUB_OUTPUT"
              echo "external_expect=oregano" >> "$GITHUB_OUTPUT"
              ;;
            osmo)
              echo "source_markers=BUILD|BUILD_AND_TEST.md|CHANGELOG.md|DEV.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=BUILD_AND_TEST.md|CHANGELOG.md|DEV.md|BUILD" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=BUILD_AND_TEST.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=OSMO" >> "$GITHUB_OUTPUT"
              echo "external_expect=OSMO|osmo" >> "$GITHUB_OUTPUT"
              ;;
            owncast)
              echo "source_markers=go.mod|web/package.json|README.md|Dockerfile|web" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|web/package.json|go.mod|Dockerfile" >> "$GITHUB_OUTPUT"
              echo "identity_kind=go_module" >> "$GITHUB_OUTPUT"
              echo "identity_target=go.mod" >> "$GITHUB_OUTPUT"
              echo "identity_expect=github.com/owncast/owncast" >> "$GITHUB_OUTPUT"
              echo "external_expect=owncast" >> "$GITHUB_OUTPUT"
              ;;
            pcb-rnd)
              echo "source_markers=external_metadata" >> "$GITHUB_OUTPUT"
              echo "doc_markers=external_metadata" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README" >> "$GITHUB_OUTPUT"
              echo "identity_expect=pcb-rnd" >> "$GITHUB_OUTPUT"
              echo "external_expect=pcb-rnd|pcb rnd" >> "$GITHUB_OUTPUT"
              ;;
            physics-nemo)
              echo "source_markers=pyproject.toml|README.md|examples|Dockerfile" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|pyproject.toml|examples|Dockerfile" >> "$GITHUB_OUTPUT"
              echo "identity_kind=toml_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=nvidia-physicsnemo" >> "$GITHUB_OUTPUT"
              echo "external_expect=PhysicsNeMo|physicsnemo" >> "$GITHUB_OUTPUT"
              ;;
            playit)
              echo "source_markers=Cargo.toml|packages/agent_cli/Cargo.toml|README.md|Dockerfile|packages" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|packages/agent_cli/Cargo.toml|Dockerfile" >> "$GITHUB_OUTPUT"
              echo "identity_kind=cargo_package" >> "$GITHUB_OUTPUT"
              echo "identity_target=packages/agent_cli/Cargo.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=playit-cli" >> "$GITHUB_OUTPUT"
              echo "external_expect=playit" >> "$GITHUB_OUTPUT"
              ;;
            playwright)
              echo "source_markers=package.json|packages/playwright-core|README.md|utils" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|packages/playwright-core/README.md|package.json" >> "$GITHUB_OUTPUT"
              echo "identity_kind=package_json_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=package.json" >> "$GITHUB_OUTPUT"
              echo "identity_expect=playwright-internal" >> "$GITHUB_OUTPUT"
              echo "external_expect=playwright" >> "$GITHUB_OUTPUT"
              ;;
            prophet)
              echo "source_markers=python/pyproject.toml|python/setup.py|R|docs|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|python/pyproject.toml|python/setup.py|docs" >> "$GITHUB_OUTPUT"
              echo "identity_kind=toml_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=python/pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=prophet" >> "$GITHUB_OUTPUT"
              echo "external_expect=prophet" >> "$GITHUB_OUTPUT"
              ;;
            qflow)
              echo "source_markers=configure|VERSION|src|scripts|tech|README" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README|VERSION|scripts|tech" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README" >> "$GITHUB_OUTPUT"
              echo "identity_expect=qflow" >> "$GITHUB_OUTPUT"
              echo "external_expect=qflow" >> "$GITHUB_OUTPUT"
              ;;
            qrouter)
              echo "source_markers=configure|VERSION|README|console.tcl" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README|VERSION|console.tcl" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README" >> "$GITHUB_OUTPUT"
              echo "identity_expect=Qrouter|qrouter" >> "$GITHUB_OUTPUT"
              echo "external_expect=Qrouter|qrouter" >> "$GITHUB_OUTPUT"
              ;;
            raft)
              echo "source_markers=VERSION|cpp|python/libraft|README.md|pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|python/libraft|cpp|VERSION" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=RAFT" >> "$GITHUB_OUTPUT"
              echo "external_expect=RAFT|raft" >> "$GITHUB_OUTPUT"
              ;;
            ragflow)
              echo "source_markers=pyproject.toml|web/package.json|helm/Chart.yaml|Dockerfile|agent" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|pyproject.toml|web/package.json|helm/Chart.yaml" >> "$GITHUB_OUTPUT"
              echo "identity_kind=toml_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=ragflow" >> "$GITHUB_OUTPUT"
              echo "external_expect=RAGFlow|ragflow" >> "$GITHUB_OUTPUT"
              ;;
            rav1e)
              echo "source_markers=Cargo.toml|README.md|doc|ivf|tools" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|doc/README.md|Cargo.toml" >> "$GITHUB_OUTPUT"
              echo "identity_kind=cargo_package" >> "$GITHUB_OUTPUT"
              echo "identity_target=Cargo.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=rav1e" >> "$GITHUB_OUTPUT"
              echo "external_expect=rav1e" >> "$GITHUB_OUTPUT"
              ;;
            resiliency-extension)
              echo "source_markers=pyproject.toml|services|docs|examples|README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md|pyproject.toml|docs|examples" >> "$GITHUB_OUTPUT"
              echo "identity_kind=toml_name" >> "$GITHUB_OUTPUT"
              echo "identity_target=pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "identity_expect=nvidia-resiliency-ext" >> "$GITHUB_OUTPUT"
              echo "external_expect=resiliency|nvidia-resiliency-ext" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "source_markers=README.md" >> "$GITHUB_OUTPUT"
              echo "doc_markers=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_kind=grep_file" >> "$GITHUB_OUTPUT"
              echo "identity_target=README.md" >> "$GITHUB_OUTPUT"
              echo "identity_expect=$PACKAGE_SLUG" >> "$GITHUB_OUTPUT"
              echo "external_expect=$PACKAGE_SLUG" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Test 1 - Check package-specific baseline markers
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          SOURCE_MARKERS="${{ steps.expectations.outputs.source_markers }}"
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=Baseline source or external metadata could not be acquired." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$SOURCE_MARKERS"
            for marker in "${MARKERS[@]}"; do
              if [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            if [ "$FOUND" -ge 2 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Found package-specific baseline markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected at least two package-specific markers from: $SOURCE_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "download=$DOWNLOAD_URL" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external baseline metadata for the published source links." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External baseline metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check published package metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ -f "$CONTENT_PAGE" ]
          grep -Fx "download_url: $DOWNLOAD_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    version_number: $BASELINE_VERSION" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    homepage_url: $HOMEPAGE_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "        official_docs: $OFFICIAL_DOCS" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Validated the checked-in package page against the workflow baseline, homepage, and docs metadata." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check package-specific docs and manifests
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          DOC_MARKERS="${{ steps.expectations.outputs.doc_markers }}"
          IDENTITY_TARGET="${{ steps.expectations.outputs.identity_target }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND=0
            HITS=""
            IFS='|' read -r -a MARKERS <<< "$DOC_MARKERS"
            for marker in "${MARKERS[@]}"; do
              if [ -e "$marker" ]; then
                FOUND=$((FOUND + 1))
                if [ -z "$HITS" ]; then
                  HITS="$marker"
                else
                  HITS="$HITS, $marker"
                fi
              fi
            done
            [ -e "$IDENTITY_TARGET" ]
            if [ "$FOUND" -ge 1 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Validated package-specific documentation or manifest markers: $HITS" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=Expected at least one package-specific documentation marker from: $DOC_MARKERS" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          elif [ -f baseline-external/metadata.txt ]; then
            grep -Fx "docs=$OFFICIAL_DOCS" baseline-external/metadata.txt >/dev/null
            grep -Fx "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt >/dev/null
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Validated external documentation and homepage metadata for the baseline package." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=External documentation metadata was not emitted." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify Arm64 runner and lane assumptions
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ "$(uname -m)" = "aarch64" ]
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          if echo "$LANE_KIND" | grep -Eiq 'gpu|specialized|manual-review'; then
            echo "note=Validated Arm64 support metadata on a generic Arm runner; deeper runtime checks for this lane still require the package-specific environment: $LANE_KIND." >> "$GITHUB_OUTPUT"
          else
            echo "note=Validated Arm64 runner architecture and published Arm support metadata." >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          IDENTITY_KIND="${{ steps.expectations.outputs.identity_kind }}"
          IDENTITY_TARGET="${{ steps.expectations.outputs.identity_target }}"
          IDENTITY_EXPECT="${{ steps.expectations.outputs.identity_expect }}"
          EXTERNAL_EXPECT="${{ steps.expectations.outputs.external_expect }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            test -f package.json
            node -e "const p=require('./package.json'); if (!String(p.name || '').includes('playwright')) throw new Error('unexpected package name')"
            node -p "process.arch" | grep -Eq 'arm64|aarch64'
            SMOKE_DIR="$(mktemp -d)"
            cd "$SMOKE_DIR"
            npm init -y >/dev/null 2>&1
            npm install --no-audit --no-fund "@playwright/test@${BASELINE_VERSION}" >/tmp/playwright-npm-install.log 2>&1
            npx playwright --version | grep -Eiq 'Version|playwright|[0-9]'
            npx playwright install --with-deps chromium >/tmp/playwright-browser-install.log 2>&1
            cat > smoke.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          test('local Arm64 browser smoke', async ({ page }) => {
            await page.setContent('<main id="arm">Playwright Arm smoke</main>');
            await expect(page.locator('#arm')).toHaveText('Playwright Arm smoke');
          });
          EOF
            npx playwright test smoke.spec.js --project=chromium >/tmp/playwright-test.log 2>&1
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Installed Playwright on the Arm64 runner and executed a real headless Chromium DOM assertion." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=failed" >> "$GITHUB_OUTPUT"
          echo "note=Package-specific Arm smoke requires a source checkout for ${PACKAGE_SLUG}; install mode '$MODE' was not usable, so this workflow fails instead of reporting green." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
          limited_cpu_probe: |
            test -f next-src/package.json
            test -d next-src/packages/playwright-core
            python3 - <<'PY'
            import json
            from pathlib import Path
            package = json.loads(Path("next-src/package.json").read_text(encoding="utf-8"))
            core_package = json.loads(Path("next-src/packages/playwright-core/package.json").read_text(encoding="utf-8"))
            assert package["name"] in ("playwright", "playwright-internal")
            assert core_package["name"] == "playwright-core"
            PY
          limited_cpu_description: "A bounded Arm64 CPU-side source probe validated the next Playwright candidate checkout and package metadata. This does not install browser dependencies or run browser tests."

      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Create test summary
        if: always()
        uses: ./.github/actions/write-package-job-summary
        with:
          package_name: 'Microsoft Playwright'
          version: ${{ steps.version.outputs.version || 'unknown' }}
          overall_status: ${{ steps.summary.outputs.overall_status || 'unknown' }}
          tests_passed: ${{ steps.summary.outputs.passed || '0' }}
          tests_failed: ${{ steps.summary.outputs.failed || '0' }}
          tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
          duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test6_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}
