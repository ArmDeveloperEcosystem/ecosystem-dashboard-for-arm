name: Test Ipvsadm on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-ipvsadm.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-ipvsadm.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-ipvsadm.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-ipvsadm.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-ipvsadm.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-ipvsadm.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-ipvsadm.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-ipvsadm.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-ipvsadm.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-ipvsadm.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-ipvsadm.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-ipvsadm.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-ipvsadm.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-ipvsadm.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-ipvsadm.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-ipvsadm.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-ipvsadm.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-ipvsadm.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-ipvsadm.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-ipvsadm.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-ipvsadm.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-ipvsadm.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-ipvsadm.outputs.timestamp }}
jobs:
  test-ipvsadm:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Ipvsadm'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ipvsadm" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ipvsadm" >> "$GITHUB_OUTPUT"
      - name: Install Ipvsadm
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ipvsadm
          IPVSADM_BIN="$(command -v ipvsadm || true)"
          if [ -z "$IPVSADM_BIN" ] && [ -x /usr/sbin/ipvsadm ]; then
            IPVSADM_BIN="/usr/sbin/ipvsadm"
          fi
          echo "ipvsadm_bin=${IPVSADM_BIN}" >> "$GITHUB_OUTPUT"

          if [ -n "$IPVSADM_BIN" ] && [ -x "$IPVSADM_BIN" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Ipvsadm version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(dpkg-query -W -f='${Version}\n' ipvsadm 2>/dev/null | head -n 1 | tr -d '\r\n')
          if [ -z "${VERSION}" ]; then
            VERSION=$(sudo "${{ steps.install.outputs.ipvsadm_bin }}" --version 2>&1 | sed -n '1s/.*[Vv][Ee][Rr][Ss][Ii][Oo][Nn] \([0-9.]\+\).*/\1/p;1s/.*ipvsadm v\([0-9.]\+\).*/\1/p' | head -n 1 | tr -d '\r\n')
          fi
          if [ -z "${VERSION}" ]; then
            echo "Unable to determine installed ipvsadm version"
            sudo "${{ steps.install.outputs.ipvsadm_bin }}" --version 2>&1 || true
            dpkg-query -W -f='${Package} ${Version}\n' ipvsadm || true
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -n "${{ steps.install.outputs.ipvsadm_bin }}" ] && [ -x "${{ steps.install.outputs.ipvsadm_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if dpkg-query -W -f='${Version}\n' ipvsadm 2>/dev/null | grep -Eq '[0-9]' \
            || sudo "${{ steps.install.outputs.ipvsadm_bin }}" --version 2>&1 | grep -Eiq 'ipvsadm v|version [0-9]'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          sudo "${{ steps.install.outputs.ipvsadm_bin }}" --help > /tmp/ipvsadm-help.txt 2>&1 || true
          if grep -Eiq 'ipvsadm|virtual server|usage' /tmp/ipvsadm-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ipvsadm-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          sudo modprobe ip_vs >/dev/null 2>&1 || true
          sudo "${{ steps.install.outputs.ipvsadm_bin }}" -L -n > /tmp/ipvsadm-list.txt

          if grep -q 'IP Virtual Server version' /tmp/ipvsadm-list.txt && \
             grep -q '^Prot LocalAddress:Port Scheduler Flags' /tmp/ipvsadm-list.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/ipvsadm-list.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ipvsadm Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "- Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "- Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
