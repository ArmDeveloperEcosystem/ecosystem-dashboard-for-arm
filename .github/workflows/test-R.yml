name: Test R on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-r.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-r.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-r.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-r.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-r.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-r.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-r.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-r.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-r.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-r.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-r.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-r.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-r.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-r.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-r.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-r.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-r.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-r.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-r.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-r.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-r.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-r.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-r.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/R.md"
      - ".github/workflows/test-R.yml"

jobs:
  test-r:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_R_VERSION: "4.4.2"
      CURRENT_R_MAJOR: "4"
      NEXT_R_VERSION: "4.4.3"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'R'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=R" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/R" >> "$GITHUB_OUTPUT"
      - name: Install R
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            curl \
            xz-utils \
            libblas-dev \
            libbz2-dev \
            libcairo2-dev \
            libcurl4-openssl-dev \
            libicu-dev \
            libjpeg-dev \
            liblapack-dev \
            liblzma-dev \
            libpcre2-dev \
            libpng-dev \
            libreadline-dev \
            libtiff5-dev \
            libx11-dev \
            libxt-dev \
            zlib1g-dev

          BUILD_ROOT=$(mktemp -d /tmp/r-current-XXXXXX)
          trap 'rm -rf "${BUILD_ROOT}"' EXIT
          PREFIX="/opt/r-${CURRENT_R_VERSION}"
          TARBALL="${BUILD_ROOT}/R-${CURRENT_R_VERSION}.tar.gz"

          curl -fsSL -o "${TARBALL}" "https://cran.r-project.org/src/base/R-${CURRENT_R_MAJOR}/R-${CURRENT_R_VERSION}.tar.gz"
          tar -xf "${TARBALL}" -C "${BUILD_ROOT}"
          cd "${BUILD_ROOT}/R-${CURRENT_R_VERSION}"

          timeout 30m ./configure --prefix="${PREFIX}" --with-x=no --without-recommended-packages
          timeout 40m make -j"$(nproc)"
          sudo rm -rf "${PREFIX}"
          sudo make install

          echo "${PREFIX}/bin" >> "$GITHUB_PATH"
          export PATH="${PREFIX}/bin:$PATH"

          if command -v R >/dev/null 2>&1 && command -v Rscript >/dev/null 2>&1 && R --version 2>&1 | grep -q "${CURRENT_R_VERSION}"; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get R version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(R --version 2>&1 | sed -n 's/^R version \([0-9.]*\).*/\1/p' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${CURRENT_R_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected R version: ${VERSION}"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v R >/dev/null 2>&1 && command -v Rscript >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if R --version 2>&1 | grep -q '^R version '; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if R --help 2>&1 | grep -q '^Usage: R'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat >/tmp/r-smoke.R <<'EOF'
          x <- sum(1:8)
          y <- 6
          cat(x + y, "\n")
          EOF
          Rscript /tmp/r-smoke.R >/tmp/r-out.txt
          if grep -Eq '^42[[:space:]]*$' /tmp/r-out.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/r-out.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"

          R_MAJOR=$(printf '%s\n' "${CURRENT}" | cut -d. -f1)
          if [ -z "${R_MAJOR}" ] || [ "${R_MAJOR}" = "unknown" ]; then
            R_MAJOR="${CURRENT_R_MAJOR}"
          fi

          LATEST="${NEXT_R_VERSION}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"

          if [ -z "${LATEST}" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run, but the next stable source release could not be resolved from CRAN." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but the next stable source release could not be resolved from CRAN."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured R Tests 1-5 baseline ${CURRENT} matches the configured Test 6 candidate ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned release so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Workflow metadata review required"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but the configured Test 6 candidate is not newer than the baseline."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            curl \
            xz-utils \
            libbz2-dev \
            libcairo2-dev \
            libcurl4-openssl-dev \
            libicu-dev \
            libjpeg-dev \
            liblapack-dev \
            liblzma-dev \
            libpcre2-dev \
            libpng-dev \
            libreadline-dev \
            libtiff5-dev \
            libx11-dev \
            libxt-dev \
            zlib1g-dev

          BUILD_ROOT=$(mktemp -d /tmp/r-next-XXXXXX)
          trap 'rm -rf "${BUILD_ROOT}"' EXIT
          TARBALL="${BUILD_ROOT}/R-${LATEST}.tar.gz"
          PREFIX="${BUILD_ROOT}/install"

          NEXT_R_MAJOR=$(printf '%s\n' "${LATEST}" | cut -d. -f1)
          if [ -z "${NEXT_R_MAJOR}" ] || [ "${NEXT_R_MAJOR}" = "unknown" ]; then
            NEXT_R_MAJOR="${R_MAJOR}"
          fi

          curl -fsSL -o "${TARBALL}" "https://cran.r-project.org/src/base/R-${NEXT_R_MAJOR}/R-${LATEST}.tar.gz"
          tar -xf "${TARBALL}" -C "${BUILD_ROOT}"
          cd "${BUILD_ROOT}/R-${LATEST}"

          if ! timeout 30m ./configure --prefix="${PREFIX}" --with-x=no --without-recommended-packages >/tmp/r-next-configure.log 2>&1; then
            tail -100 /tmp/r-next-configure.log || true
            echo "next_installed_version=configure_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while configuring candidate source release ${LATEST} on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: configure_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while configuring candidate source release ${LATEST} on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! timeout 45m make -j2 >/tmp/r-next-make.log 2>&1; then
            tail -100 /tmp/r-next-make.log || true
            echo "next_installed_version=build_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while building candidate source release ${LATEST} on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: build_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while building candidate source release ${LATEST} on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! timeout 15m make install >/tmp/r-next-install.log 2>&1; then
            tail -100 /tmp/r-next-install.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while installing candidate source release ${LATEST} on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but regression validation failed while installing candidate source release ${LATEST} on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_INSTALLED_VERSION=$("${PREFIX}/bin/R" --version 2>&1 | sed -n 's/^R version \([0-9.]*\).*/\1/p' | head -1 || true)
          if [ -n "${NEXT_INSTALLED_VERSION}" ] && [ "${NEXT_INSTALLED_VERSION}" = "${LATEST}" ]; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run. Regression validation built and installed candidate source release ${LATEST} on Arm64, and the isolated binary reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run. Regression validation built and installed candidate source release ${LATEST} on Arm64, and the isolated binary reported version ${NEXT_INSTALLED_VERSION}."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned R version ${CURRENT} passed smoke tests in this run, but candidate source release ${LATEST} built on Arm64 and reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned R version ${CURRENT} passed smoke tests in this run, but candidate source release ${LATEST} built on Arm64 and reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            REGRESSION_RESULT="Regression validation result unavailable"
          fi
          echo "## R Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
