name: Test Valkey on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-valkey.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-valkey.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-valkey.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-valkey.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-valkey.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-valkey.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-valkey.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-valkey.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-valkey.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-valkey.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-valkey.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-valkey.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-valkey.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-valkey.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-valkey.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-valkey.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-valkey.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-valkey.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-valkey.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-valkey.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-valkey.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-valkey.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-valkey.outputs.timestamp }}
jobs:
  test-valkey:
    runs-on: ubuntu-24.04-arm
    env:
      VALKEY_VERSION: "8.0.2"
      VALKEY_NEXT_VERSION: "8.0.3"
      VALKEY_PORT: "6391"
      REGRESSION_PORT: "6392"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Valkey'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=valkey" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/valkey" >> "$GITHUB_OUTPUT"
          echo "current_version=${VALKEY_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Valkey
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl git pkg-config python3 tcl
          rm -rf /tmp/valkey-baseline
          git clone --depth 1 --branch "${VALKEY_VERSION}" https://github.com/valkey-io/valkey.git /tmp/valkey-baseline
          cd /tmp/valkey-baseline
          make -j"$(nproc)" BUILD_TLS=no
          sudo install -m 0755 src/valkey-server /usr/local/bin/valkey-server
          sudo install -m 0755 src/valkey-cli /usr/local/bin/valkey-cli
          if command -v valkey-server >/dev/null 2>&1 && command -v valkey-cli >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Valkey version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(valkey-server --version 2>&1 | grep -Eo 'v=[0-9]+\.[0-9]+\.[0-9]+' | cut -d= -f2 | head -1 || echo "unknown")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${VALKEY_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Valkey binaries exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v valkey-server >/dev/null 2>&1 && command -v valkey-cli >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if valkey-server --version 2>&1 | grep -q "Valkey server v=${VALKEY_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          valkey-server --help >/tmp/valkey-help.txt 2>&1 || true
          if grep -q '^Usage:' /tmp/valkey-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/valkey-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          valkey-server --daemonize yes --port "${VALKEY_PORT}" --save '' --appendonly no >/tmp/valkey-start.log 2>&1
          cleanup() {
            valkey-cli -p "${VALKEY_PORT}" shutdown >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 20); do
            if valkey-cli -p "${VALKEY_PORT}" ping 2>/dev/null | grep -q '^PONG$'; then
              break
            fi
            sleep 1
          done

          valkey-cli -p "${VALKEY_PORT}" set smoke hello-arm64 >/dev/null
          valkey-cli -p "${VALKEY_PORT}" get smoke >/tmp/valkey-get.txt
          if grep -q '^hello-arm64$' /tmp/valkey-get.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/valkey-start.log || true
            cat /tmp/valkey-get.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          valkey-cli -p "${VALKEY_PORT}" shutdown >/dev/null 2>&1 || true
          trap - EXIT
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.VALKEY_VERSION }}"
          LATEST="${{ steps.version.outputs.latest || '' }}"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-lookup_failed}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST:-lookup_failed}"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, but the latest stable Valkey release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, but the latest stable Valkey release could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned Valkey baseline ${CURRENT} already matches the latest stable upstream release ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Pinned Valkey baseline ${CURRENT} already matches the latest stable upstream release ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            valkey-cli -p "${REGRESSION_PORT}" shutdown >/dev/null 2>&1 || true
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          git clone --depth 1 --branch "${LATEST}" https://github.com/valkey-io/valkey.git "$TMPDIR/valkey-next"
          make -C "$TMPDIR/valkey-next" -j"$(nproc)" BUILD_TLS=no >/tmp/valkey-next-build.log 2>&1
          NEXT_SERVER="$TMPDIR/valkey-next/src/valkey-server"
          NEXT_CLI="$TMPDIR/valkey-next/src/valkey-cli"
          NEXT_INSTALLED_VERSION=$("$NEXT_SERVER" --version 2>&1 | grep -Eo 'v=[0-9]+\.[0-9]+\.[0-9]+' | cut -d= -f2 | head -1 || true)

          "$NEXT_SERVER" --daemonize yes --port "${REGRESSION_PORT}" --save '' --appendonly no --bind 127.0.0.1 >/tmp/valkey-next-start.log 2>&1
          for _ in $(seq 1 20); do
            if "$NEXT_CLI" -p "${REGRESSION_PORT}" ping 2>/dev/null | grep -q '^PONG$'; then
              break
            fi
            sleep 1
          done

          "$NEXT_CLI" -p "${REGRESSION_PORT}" set regression hello-next >/dev/null
          "$NEXT_CLI" -p "${REGRESSION_PORT}" get regression >/tmp/valkey-next-get.txt

          if [ "$NEXT_INSTALLED_VERSION" != "$LATEST" ] || ! grep -q '^hello-next$' /tmp/valkey-next-get.txt; then
            cat /tmp/valkey-next-build.log || true
            cat /tmp/valkey-next-start.log || true
            cat /tmp/valkey-next-get.txt || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, but the candidate ${LATEST} build or server validation failed on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, but the candidate ${LATEST} build or server validation failed on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
          echo "comparison=Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, and candidate ${LATEST} also built and completed the real server SET and GET smoke successfully." >> "$GITHUB_OUTPUT"
          echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
          echo "Regression install result: Next version installed successfully on Arm64"
          echo "Details: Baseline Valkey ${CURRENT} passed the Arm64 source-build and server smoke in this run, and candidate ${LATEST} also built and completed the real server SET and GET smoke successfully."

          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_any_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_any_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Valkey Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Valkey binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Pinned current version passed smoke tests.' }}" >> "$GITHUB_STEP_SUMMARY"
