name: Test Monkey HTTP Server on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/monkey.md"
      - ".github/workflows/test-monkey.yml"

jobs:
  test-monkey:
    runs-on: ubuntu-24.04-arm
    env:
      MONKEY_VERSION: "1.8.3"
      MONKEY_NEXT_VERSION: "1.8.4"
      MONKEY_HOME: /opt/monkey-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=monkey" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/monkey" >> "$GITHUB_OUTPUT"

      - name: Install Monkey HTTP Server
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl tar

          curl -fsSL -o /tmp/monkey.tar.gz "https://github.com/monkey/monkey/archive/refs/tags/v${MONKEY_VERSION}.tar.gz"
          sudo rm -rf "${MONKEY_HOME}"
          sudo tar -xzf /tmp/monkey.tar.gz -C /opt
          sudo mv "/opt/monkey-${MONKEY_VERSION}" "${MONKEY_HOME}"

          cd "${MONKEY_HOME}"
          ./configure --malloc-libc --disable-plugins=auth >/tmp/monkey-configure.log 2>&1
          OLDROOT='/home/niedbalski/go/src/github.com/calyptia/monkey'
          find . -type f \( -name 'Makefile' -o -path './CMakeFiles/*' -o -name 'cmake_install.cmake' -o -name '*.cmake' \) -print0 | \
            xargs -0 sed -i "s#${OLDROOT}#${MONKEY_HOME}#g; s#/snap/cmake/858/bin/cmake#/usr/bin/cmake#g; s#/snap/cmake/858/bin/ccmake#/usr/bin/ccmake#g"
          make -j"$(nproc)" CFLAGS="-fcommon" >/tmp/monkey-build.log 2>&1

          if [ -x "${MONKEY_HOME}/bin/monkey" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/monkey-configure.log || true
            cat /tmp/monkey-build.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Monkey version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${MONKEY_HOME}/bin/monkey" -v 2>&1 | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
          NEXT_VERSION="${MONKEY_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${MONKEY_HOME}/bin/monkey" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${MONKEY_HOME}/bin/monkey" -v 2>&1 | grep -q "v${MONKEY_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${MONKEY_HOME}/bin/monkey" -h 2>&1 | grep -qi "Usage"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONF_DIR=$(mktemp -d)
          WWW_DIR=$(mktemp -d)
          LOG_DIR=$(mktemp -d)
          mkdir -p "${CONF_DIR}/sites"
          printf '<!DOCTYPE html><html><body>hello monkey</body></html>\n' > "${WWW_DIR}/index.html"
          cp "${MONKEY_HOME}/conf/monkey.mime" "${CONF_DIR}/monkey.mime"
          cp "${MONKEY_HOME}/conf/plugins.load" "${CONF_DIR}/plugins.load"
          cat > "${CONF_DIR}/monkey.conf" <<EOF
          [SERVER]
              Listen 127.0.0.1:2001
              Workers 1
              Timeout 15
              PidFile ${CONF_DIR}/monkey.pid
              UserDir public_html
              Indexfile index.html
              HideVersion Off
              Resume On
              User nobody
              KeepAlive On
              KeepAliveTimeout 5
              MaxKeepAliveRequest 1000
              MaxRequestSize 32
              SymLink Off
              DefaultMimeType text/plain
              FDT On
              OverCapacity Resist
          EOF
          cat > "${CONF_DIR}/sites/default" <<EOF
          [HOST]
              ServerName 127.0.0.1
              DocumentRoot ${WWW_DIR}
          [LOGGER]
              AccessLog ${LOG_DIR}/access.log
              ErrorLog ${LOG_DIR}/error.log
          [ERROR_PAGES]
              404 404.html
          [HANDLERS]
          EOF
          "${MONKEY_HOME}/bin/monkey" -c "${CONF_DIR}" >/tmp/monkey-runtime.log 2>&1 &
          MONKEY_PID=$!
          cleanup() {
            kill "${MONKEY_PID}" >/dev/null 2>&1 || true
            rm -rf "${CONF_DIR}" "${WWW_DIR}" "${LOG_DIR}"
          }
          trap cleanup EXIT
          for _ in $(seq 1 15); do
            if ss -ltn | grep -q '127.0.0.1:2001'; then
              break
            fi
            sleep 1
          done

          CURL_OUTPUT=$(curl -sv --max-time 3 http://127.0.0.1:2001/ 2>&1 || true)
          if ss -ltn | grep -q '127.0.0.1:2001' && echo "$CURL_OUTPUT" | grep -q 'Connected to 127.0.0.1'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/monkey-runtime.log || true
            printf '%s\n' "$CURL_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${MONKEY_VERSION}"
          NEXT_VERSION="${{ steps.version.outputs.next_version }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${NEXT_VERSION}"

          if [ -z "${NEXT_VERSION}" ] || [ "${NEXT_VERSION}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Monkey source tag is available for Arm64 regression validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Monkey release ${CURRENT} passed smoke tests in this run, but no newer public stable source tag was found to validate as a true Arm64 upgrade candidate." >> "$GITHUB_OUTPUT"
            echo "Regression install result: No newer stable Monkey source tag is available for Arm64 regression validation"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "${CURRENT}" = "${NEXT_VERSION}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_ROOT=$(mktemp -d)
          NEXT_HOME="${NEXT_ROOT}/monkey-${NEXT_VERSION}"
          NEXT_TGZ="/tmp/monkey-regression-${NEXT_VERSION}.tar.gz"
          NEXT_URL="https://github.com/monkey/monkey/archive/refs/tags/v${NEXT_VERSION}.tar.gz"

          if curl -fsSL -o "$NEXT_TGZ" "$NEXT_URL"; then
            echo "Next version download status: passed"
            tar -xzf "$NEXT_TGZ" -C "$NEXT_ROOT"
            cd "$NEXT_HOME"
            ./configure --malloc-libc --disable-plugins=auth >/tmp/monkey-regression-configure.log 2>&1
            OLDROOT='/home/niedbalski/go/src/github.com/calyptia/monkey'
            find . -type f \( -name 'Makefile' -o -path './CMakeFiles/*' -o -name 'cmake_install.cmake' -o -name '*.cmake' \) -print0 | \
              xargs -0 sed -i "s#${OLDROOT}#${NEXT_HOME}#g; s#/snap/cmake/858/bin/cmake#/usr/bin/cmake#g; s#/snap/cmake/858/bin/ccmake#/usr/bin/ccmake#g"
            make -j"$(nproc)" CFLAGS="-fcommon" >/tmp/monkey-regression-build.log 2>&1
            NEXT_BIN="${NEXT_HOME}/bin/monkey"
            if [ -x "$NEXT_BIN" ]; then
              NEXT_INSTALLED_VERSION=$("$NEXT_BIN" -v 2>&1 | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | sed 's/^v//' || true)
              if [ "$NEXT_INSTALLED_VERSION" = "$NEXT_VERSION" ]; then
                echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Monkey release ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${NEXT_VERSION} on Arm64, and the resulting monkey binary reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "status=passed" >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
              else
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Monkey release ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} built on Arm64 and the resulting monkey binary reported version ${NEXT_INSTALLED_VERSION:-unknown}, which does not match the requested upgrade target." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Monkey release ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} did not produce a usable monkey binary on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              cat /tmp/monkey-regression-configure.log || true
              cat /tmp/monkey-regression-build.log || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Monkey release ${CURRENT} passed smoke tests in this run, but the regression candidate ${NEXT_VERSION} could not be downloaded from the upstream source tarball." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable Monkey source tag is available for Arm64 regression validation"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.next_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          CORE_FAILED=0
          if [ "${{ steps.test1.outputs.status }}" != "passed" ]; then CORE_FAILED=$((CORE_FAILED + 1)); fi
          if [ "${{ steps.test2.outputs.status }}" != "passed" ]; then CORE_FAILED=$((CORE_FAILED + 1)); fi
          if [ "${{ steps.test3.outputs.status }}" != "passed" ]; then CORE_FAILED=$((CORE_FAILED + 1)); fi
          if [ "${{ steps.test4.outputs.status }}" != "passed" ]; then CORE_FAILED=$((CORE_FAILED + 1)); fi
          if [ "${{ steps.test5.outputs.status }}" != "passed" ]; then CORE_FAILED=$((CORE_FAILED + 1)); fi

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/monkey.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Monkey",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Help Output Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          COMPARISON="${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          {
            echo "## Monkey Arm64 Smoke Test Summary"
            echo ""
            echo "- Version tested: \`${{ steps.version.outputs.version }}\`"
            echo "- Overall status: \`${{ steps.summary.outputs.overall_status }}\`"
            echo ""
            echo "| Test | Status | Duration (s) |"
            echo "| --- | --- | ---: |"
            echo "| Test 1 - Binary Existence | ${{ steps.test1.outputs.status || 'skipped' }} | ${{ steps.test1.outputs.duration || 0 }} |"
            echo "| Test 2 - Version Check | ${{ steps.test2.outputs.status || 'skipped' }} | ${{ steps.test2.outputs.duration || 0 }} |"
            echo "| Test 3 - Help Output Validation | ${{ steps.test3.outputs.status || 'skipped' }} | ${{ steps.test3.outputs.duration || 0 }} |"
            echo "| Test 4 - Architecture Verification | ${{ steps.test4.outputs.status || 'skipped' }} | ${{ steps.test4.outputs.duration || 0 }} |"
            echo "| Test 5 - Functional Validation | ${{ steps.test5.outputs.status || 'skipped' }} | ${{ steps.test5.outputs.duration || 0 }} |"
            echo "| Test 6 - Regression Validation | ${{ steps.test6.outputs.status || 'skipped' }} | ${{ steps.test6.outputs.duration || 0 }} |"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo ""
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.next_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "- **Details:** ${COMPARISON}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monkey-test-result
          path: test-results/monkey.json
