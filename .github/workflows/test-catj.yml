name: Test Catj on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-catj.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-catj.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-catj.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-catj.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-catj.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-catj.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-catj.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-catj.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-catj.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-catj.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-catj.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-catj.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-catj.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-catj.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-catj.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-catj.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-catj.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-catj.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-catj.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-catj.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-catj.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-catj.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-catj.outputs.timestamp }}
jobs:
  test-catj:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Catj'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=catj" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/catj" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Catj
        id: install
        run: |
          echo "Installing Catj via npm..."
          npm install -g npm@latest
          npm cache clean --force
          if npm install -g catj --verbose; then
             echo "Catj installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Failed to install Catj"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Catj version
        id: version
        run: |
          # Use npm list to get the version reliably, as catj --version might have syntax errors
          VERSION=$(npm list -g catj --depth=0 | grep catj | cut -d@ -f2 || echo "unknown")
          if [ -z "$VERSION" ]; then VERSION="unknown"; fi
          # Clean up any potential garbage
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g' | tr -d '\r\n')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Catj version: $VERSION"
      
      - name: Test 1 - Check Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          
          STATUS="failed"
          if which catj; then
            echo "✓ catj binary found"
            STATUS="passed"
          else
            echo "✗ catj binary not found"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 2 - Run Help
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          
          STATUS="failed"
          if catj --help; then
             echo "✓ catj help works"
             STATUS="passed"
          else
             echo "✗ catj help failed"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 3 - Process JSON File
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          # Create a simple JSON file
          echo '{"name": "test", "value": 123}' > test.json
          
          # Run catj on it
          if catj test.json | grep -q "name"; then
             echo "✓ catj processed JSON successfully"
             STATUS="passed"
          else
             echo "✗ catj failed to process JSON"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 4 - Check Nested JSON
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          echo '{"a": {"b": "c"}}' > nested.json
          
          if catj nested.json | grep -q "b"; then
             echo "✓ catj processed nested JSON"
             STATUS="passed"
          else
             echo "✗ catj failed on nested JSON"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi      

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Test 1 - Check Binary
          STATUS_1="${{ steps.test1.outputs.status }}"
          DURATION_1="${{ steps.test1.outputs.duration }}"
          if [[ -z "$STATUS_1" ]]; then STATUS_1="skipped"; fi
          if [[ -z "$DURATION_1" ]]; then DURATION_1=0; fi

          if [ "$STATUS_1" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_1" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_1))

          # Test 2 - Run Help
          STATUS_2="${{ steps.test2.outputs.status }}"
          DURATION_2="${{ steps.test2.outputs.duration }}"
          if [[ -z "$STATUS_2" ]]; then STATUS_2="skipped"; fi
          if [[ -z "$DURATION_2" ]]; then DURATION_2=0; fi

          if [ "$STATUS_2" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_2" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_2))

          # Test 3 - Process JSON File
          STATUS_3="${{ steps.test3.outputs.status }}"
          DURATION_3="${{ steps.test3.outputs.duration }}"
          if [[ -z "$STATUS_3" ]]; then STATUS_3="skipped"; fi
          if [[ -z "$DURATION_3" ]]; then DURATION_3=0; fi

          if [ "$STATUS_3" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_3" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_3))

          # Test 4 - Check Nested JSON
          STATUS_4="${{ steps.test4.outputs.status }}"
          DURATION_4="${{ steps.test4.outputs.duration }}"
          if [[ -z "$STATUS_4" ]]; then STATUS_4="skipped"; fi
          if [[ -z "$DURATION_4" ]]; then DURATION_4=0; fi

          if [ "$STATUS_4" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_4" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_4))

          # Test 5 - Architecture Verification
          STATUS_5="${{ steps.test5.outputs.status }}"
          DURATION_5="${{ steps.test5.outputs.duration }}"
          if [[ -z "$STATUS_5" ]]; then STATUS_5="skipped"; fi
          if [[ -z "$DURATION_5" ]]; then DURATION_5=0; fi

          if [ "$STATUS_5" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_5" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_5))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Catj Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Run Help: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Process JSON File: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Check Nested JSON: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          

