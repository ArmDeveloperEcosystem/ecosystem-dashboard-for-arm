name: Test Vsftpd on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-vsftpd.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-vsftpd.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-vsftpd.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-vsftpd.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-vsftpd.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-vsftpd.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-vsftpd.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-vsftpd.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-vsftpd.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-vsftpd.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-vsftpd.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-vsftpd.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-vsftpd.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-vsftpd.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-vsftpd.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-vsftpd.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-vsftpd.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-vsftpd.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-vsftpd.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-vsftpd.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-vsftpd.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-vsftpd.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-vsftpd.outputs.timestamp }}
jobs:
  test-vsftpd:
    runs-on: ubuntu-24.04-arm
    env:
      CURRENT_BASELINE_VERSION: "3.0.5"
      VSFTPD_DOWNLOAD_BASE: "https://security.appspot.com/downloads"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Vsftpd'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=vsftpd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/vsftpd" >> "$GITHUB_OUTPUT"
      - name: Install Vsftpd
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y vsftpd curl build-essential libcap-dev libpam0g-dev libssl-dev ca-certificates
          sudo mkdir -p /usr/share/empty
          sudo mkdir -p /var/run/vsftpd/empty
          if [ -x /usr/sbin/vsftpd ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Vsftpd version
        id: version
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(dpkg-query -W -f='${Version}' vsftpd)
          UPSTREAM_VERSION=$(printf '%s\n' "$PACKAGE_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          LATEST=$(
            python3 - <<'PY'
          import re
          import urllib.request
          import gzip

          response = urllib.request.urlopen("https://security.appspot.com/vsftpd.html", timeout=30)
          raw = response.read()
          if response.headers.get("Content-Encoding") == "gzip" or raw[:2] == b"\x1f\x8b":
              raw = gzip.decompress(raw)
          html = raw.decode("utf-8", "replace")
          versions = sorted(
              {
                  tuple(int(part) for part in match.split("."))
                  for match in re.findall(r"vsftpd-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz", html)
              }
          )
          print(".".join(str(x) for x in versions[-1]) if versions else "unknown")
          PY
          )
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x /usr/sbin/vsftpd ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Package Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.upstream_version }}" = "$CURRENT_BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Startup Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo systemctl start vsftpd || sudo service vsftpd start

          READY=0
          for _ in $(seq 1 20); do
            if ss -tln | grep -q ':21 '; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "$READY" -eq 1 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo systemctl status vsftpd --no-pager || sudo service vsftpd status || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo systemctl start vsftpd || sudo service vsftpd start

          if python3 - <<'PY'
          import socket
          import time

          for _ in range(20):
              try:
                  sock = socket.create_connection(("127.0.0.1", 21), timeout=1)
                  banner = sock.recv(1024).decode("utf-8", "replace")
                  sock.close()
                  print(banner.strip())
                  if banner.startswith("220 "):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit(1)
          PY
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo systemctl status vsftpd --no-pager || sudo service vsftpd status || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_PACKAGE_VERSION="${{ steps.version.outputs.version }}"
          CURRENT_UPSTREAM_VERSION="${{ steps.version.outputs.upstream_version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT_PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT_PACKAGE_VERSION"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup unavailable for Arm64 validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run, but the public upstream release page did not expose a newer stable tarball list that this workflow could resolve for an Arm64 Test 6 upgrade check." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT_UPSTREAM_VERSION" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT_UPSTREAM_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable upstream release is available for Arm64 validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run, and the public upstream release list currently stops at ${CURRENT_UPSTREAM_VERSION}. There is no newer stable source release to validate in Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_TGZ="/tmp/vsftpd-${LATEST}.tar.gz"
          NEXT_URL="${VSFTPD_DOWNLOAD_BASE}/vsftpd-${LATEST}.tar.gz"
          rm -f /tmp/vsftpd-build.log /tmp/vsftpd-run.log /tmp/vsftpd-curl.txt /tmp/vsftpd-body.txt

          if ! curl -fsSL "$NEXT_URL" -o "$NEXT_TGZ"; then
            echo "next_installed_version=download_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run, but the official candidate tarball ${NEXT_URL} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          tar -xzf "$NEXT_TGZ" -C "$NEXT_DIR" --strip-components=1

          NEXT_DIR="$NEXT_DIR" python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["NEXT_DIR"]) / "vsf_findlibs.sh"
          text = path.read_text()
          text = text.replace(
              '  locate_library /lib/x86_64-linux-gnu/libpam.so.0 && echo "-lpam";\n',
              '  locate_library /lib/x86_64-linux-gnu/libpam.so.0 && echo "-lpam";\n'
              '  locate_library /lib/aarch64-linux-gnu/libpam.so.0 && echo "-lpam";\n'
              '  locate_library /usr/lib/aarch64-linux-gnu/libpam.so && echo "-lpam";\n',
          )
          text = text.replace(
              'locate_library /lib64/libcap.so && echo "-lcap";\n',
              'locate_library /lib64/libcap.so && echo "-lcap";\n'
              'locate_library /lib/aarch64-linux-gnu/libcap.so.2 && echo "-lcap";\n'
              'locate_library /usr/lib/aarch64-linux-gnu/libcap.so && echo "-lcap";\n',
          )
          path.write_text(text)
          PY
          chmod +x "$NEXT_DIR/vsf_findlibs.sh"

          if ! make -C "$NEXT_DIR" >/tmp/vsftpd-build.log 2>&1; then
            cat /tmp/vsftpd-build.log || true
            echo "next_installed_version=build_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run, but the official source candidate ${LATEST} failed to build on Arm64 until completion." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION=$(grep -E '^#define VSF_VERSION ' "$NEXT_DIR/vsftpver.h" | awk -F'"' '{print $2}')
          echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          file "$NEXT_DIR/vsftpd" >/tmp/vsftpd-file.txt
          ldd "$NEXT_DIR/vsftpd" >/tmp/vsftpd-ldd.txt

          if grep -Eq 'ARM aarch64|ARM64|aarch64' /tmp/vsftpd-file.txt && \
             ! grep -q 'not found' /tmp/vsftpd-ldd.txt && \
             [ "$NEXT_VERSION" = "$LATEST" ]; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run. Regression validation downloaded official source candidate ${LATEST}, patched the arm64 library lookup in vsf_findlibs.sh, rebuilt it successfully, and confirmed the resulting aarch64 binary links cleanly with no missing dependencies on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/vsftpd-file.txt || true
            cat /tmp/vsftpd-ldd.txt || true
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current packaged vsftpd version ${CURRENT_PACKAGE_VERSION} passed smoke tests in this run, but the official source candidate ${LATEST} did not complete the expected Arm64 build plus linked-binary validation path." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              next_lookup_failed)
                REGRESSION_RESULT="Next version lookup unavailable for Arm64 validation"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable upstream release is available for Arm64 validation"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable upstream release is available for Arm64 validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            check_test "passed" "${{ steps.test6.outputs.duration || 0 }}"
          elif [ "$TEST6_STATUS" = "failed" ]; then
            check_test "failed" "${{ steps.test6.outputs.duration || 0 }}"
          else
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable upstream release is available for Arm64 validation"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Vsftpd Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Package Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Configuration Startup Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
