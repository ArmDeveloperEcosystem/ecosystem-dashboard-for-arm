name: Test Fluentd on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-fluentd.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-fluentd.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-fluentd.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-fluentd.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-fluentd.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-fluentd.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-fluentd.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-fluentd.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-fluentd.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-fluentd.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-fluentd.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-fluentd.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-fluentd.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-fluentd.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-fluentd.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-fluentd.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-fluentd.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-fluentd.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-fluentd.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-fluentd.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-fluentd.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-fluentd.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-fluentd.outputs.timestamp }}
jobs:
  test-fluentd:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Fluentd'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=fluentd" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/fluentd" >> "$GITHUB_OUTPUT"
          echo "baseline_version=1.19.2" >> "$GITHUB_OUTPUT"
      - name: Install Fluentd
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "ruby-full ruby-dev build-essential"
          BASELINE_VERSION="${{ steps.metadata.outputs.baseline_version }}"
          sudo gem install fluentd -v "$BASELINE_VERSION" --no-document
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Fluentd version
        id: version
        run: |
          set -euo pipefail
          RAW_VERSION=$(fluentd --version 2>&1 || true)
          VERSION=$(printf '%s\n' "$RAW_VERSION" | grep -oP 'fluentd \K[0-9.]+' | head -n 1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.metadata.outputs.baseline_version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Fluentd version: $VERSION"

      - name: Test 1 - Check fluentd binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v fluentd >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check fluentd version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.version.outputs.version }}"
          if fluentd --version 2>&1 | grep -q "fluentd ${EXPECTED}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            fluentd --version || true
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check fluentd help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if fluentd --help 2>&1 | grep -qiE 'usage|options|help'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Dry-run configuration
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cat > fluent.conf <<'EOF'
          <source>
            @type forward
            port 24224
          </source>
          <match **>
            @type stdout
          </match>
          EOF
          if fluentd --dry-run -c fluent.conf >/tmp/fluentd-dry-run.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            cat /tmp/fluentd-dry-run.log || true
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Ruby API and architecture validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if ruby -e 'require "fluent/version"; puts Fluent::VERSION' | grep -qx "${{ steps.version.outputs.version }}" && [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            local core="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}" yes
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}" yes
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}" yes
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}" yes
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}" yes
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ $CORE_FAILED -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Fluentd Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check fluentd binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check fluentd version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check fluentd help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Dry-run configuration: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Ruby API and architecture validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
