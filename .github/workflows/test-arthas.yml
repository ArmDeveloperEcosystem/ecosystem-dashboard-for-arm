name: Test Arthas on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/arthas.md'
      - '.github/workflows/test-arthas.yml'

jobs:
  test-arthas:
    runs-on: ubuntu-24.04-arm
    env:
      ARTHAS_VERSION: "4.0.5"
      ARTHAS_NEXT_VERSION: "4.1.0"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=arthas" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/arthas" >> "$GITHUB_OUTPUT"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install Arthas
        id: install
        run: |
          set -euo pipefail
          echo "Installing Arthas..."
          BASELINE_VERSION="${ARTHAS_VERSION}"
          BASELINE_TAG="arthas-all-${BASELINE_VERSION}"
          curl -fsSLo arthas-bin.zip "https://github.com/alibaba/arthas/releases/download/${BASELINE_TAG}/arthas-bin.zip"
          unzip -q arthas-bin.zip -d arthas-current

          echo "baseline_version=${BASELINE_VERSION}" >> $GITHUB_OUTPUT
          echo "baseline_tag=${BASELINE_TAG}" >> $GITHUB_OUTPUT
          echo "baseline_home=$PWD/arthas-current" >> $GITHUB_OUTPUT
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get Arthas version
        id: version
        run: |
          VERSION=$(unzip -p "${{ steps.install.outputs.baseline_home }}/arthas-core.jar" META-INF/MANIFEST.MF | awk -F': ' '/^Implementation-Version:/ {print $2; exit}' | tr -d '\r')
          
          if [ -z "$VERSION" ]; then 
             echo "Could not detect version from extracted manifest"
             VERSION="${{ steps.install.outputs.baseline_version }}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Arthas version: $VERSION"
      
      - name: Test 1 - Check Boot Jar Execution
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if java -jar "${{ steps.install.outputs.baseline_home }}/arthas-boot.jar" --help | grep -q "arthas-boot"; then
            echo "✓ arthas-boot executes"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ arthas-boot execution failed"
            java -jar "${{ steps.install.outputs.baseline_home }}/arthas-boot.jar" --help
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Start Dummy Java Process
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # Create a long running java process
          cat > TestApp.java << EOF
          public class TestApp {
              public static void main(String[] args) throws InterruptedException {
                  System.out.println("TestApp started");
                  while (true) {
                      Thread.sleep(1000);
                  }
              }
          }
          EOF
          
          javac TestApp.java
          java TestApp > testapp.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          
          sleep 2
          
          if ps -p $APP_PID > /dev/null; then
             echo "✓ dummy java process running"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ dummy java process failed to start"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Attach Arthas (Dry Run)
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # We can't easily interact with the TUI in CI, but we can try to list processes
          # or just verify it can see the PID.
          # arthas-boot tries to attach.
          
          # Just checking if we can run it with --select
          # Note: Attaching might fail in some CI environments due to ptrace permissions,
          # but we can try to run it and check output.
          
          # Using --help as a proxy for functionality if attach is restricted
          if java -jar "${{ steps.install.outputs.baseline_home }}/arthas-boot.jar" --help | grep -q "Usage"; then
             echo "✓ arthas help works (proxy for functionality)"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ arthas help failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Cleanup
        if: always()
        run: |
          if [ ! -z "$APP_PID" ]; then
            kill $APP_PID || true
          fi

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          echo "Performing generic functional check..."
          
          # Since we installed arthas-boot.jar, we should check if we can execute it
          if java -jar "${{ steps.install.outputs.baseline_home }}/arthas-boot.jar" --help > /dev/null 2>&1; then
            echo "✓ arthas-boot.jar is executable"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ arthas-boot.jar failed to execute"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          NEXT_VERSION="${ARTHAS_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ -z "$NEXT_VERSION" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "=== Regression Validation (Next Version Install) ==="
            echo "Current version tested in Tests 1-5: $CURRENT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $NEXT_VERSION"

          REGRESSION_LOG="/tmp/arthas-regression.log"
          NEXT_DIR=$(mktemp -d)
          NEXT_TAG="arthas-all-${NEXT_VERSION}"
          NEXT_ZIP="$NEXT_DIR/arthas-bin.zip"
          if curl -fsSLo "$NEXT_ZIP" "https://github.com/alibaba/arthas/releases/download/${NEXT_TAG}/arthas-bin.zip"; then
            unzip -q "$NEXT_ZIP" -d "$NEXT_DIR/extracted"
            NEXT_HOME="$NEXT_DIR/extracted"
            NEXT_BOOT="$NEXT_HOME/arthas-boot.jar"
            NEXT_CORE="$NEXT_HOME/arthas-core.jar"
            NEXT_INSTALLED_VERSION=$(unzip -p "$NEXT_CORE" META-INF/MANIFEST.MF | awk -F': ' '/^Implementation-Version:/ {print $2; exit}' | tr -d '\r' || true)
            if [ -n "$NEXT_INSTALLED_VERSION" ] && [ "$NEXT_INSTALLED_VERSION" = "$NEXT_VERSION" ] && \
               java -jar "$NEXT_BOOT" --help >"$REGRESSION_LOG" 2>&1; then
              echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Arthas version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the versioned release asset ${NEXT_TAG} on Arm64, the extracted manifest reported ${NEXT_INSTALLED_VERSION}, and the candidate help path completed successfully." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Arthas version ${CURRENT} passed smoke tests in this run. Regression validation downloaded the versioned release asset ${NEXT_TAG} on Arm64, the extracted manifest reported ${NEXT_INSTALLED_VERSION}, and the candidate help path completed successfully."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=${NEXT_INSTALLED_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the versioned release asset ${NEXT_TAG} did not validate cleanly on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-install_failed}"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the versioned release asset ${NEXT_TAG} did not validate cleanly on Arm64."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              cat "$REGRESSION_LOG" || true
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the versioned release asset ${NEXT_TAG} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Arthas version ${CURRENT} passed smoke tests in this run, but the versioned release asset ${NEXT_TAG} could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          TEST6_DURATION=${{ steps.test6.outputs.duration || 0 }}
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + TEST6_DURATION))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" != "passed" ]; then
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          # Fetch the direct job URL for deep-linking
          JOB_ID="${{ github.job }}"
          # Using GH_TOKEN to find the exact job URL. 
          # Reusable workflows are often named "JobID / JobID" or just "JobID"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          
          # Fallback if URL calculation fails
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          export JOB_URL
          export RUN_ID="${{ github.run_id }}"
          export RUN_TIMESTAMP="${{ steps.metadata.outputs.timestamp }}"
          export OVERALL_STATUS="${{ steps.summary.outputs.overall_status }}"
          export PASSED_COUNT="${{ steps.summary.outputs.passed }}"
          export FAILED_COUNT="${{ steps.summary.outputs.failed }}"
          export TOTAL_DURATION="${{ steps.summary.outputs.duration || 0 }}"
          export DASHBOARD_LINK="${{ steps.metadata.outputs.dashboard_link }}"
          export BADGE_STATUS="${{ steps.summary.outputs.badge_status }}"
          export PACKAGE_SLUG="${{ steps.metadata.outputs.package_slug }}"
          export VERSION="${{ steps.version.outputs.version || '' }}"
          export TEST1_STATUS="${{ steps.test1.outputs.status || 'skipped' }}"
          export TEST1_DURATION="${{ steps.test1.outputs.duration || 0 }}"
          export TEST2_STATUS="${{ steps.test2.outputs.status || 'skipped' }}"
          export TEST2_DURATION="${{ steps.test2.outputs.duration || 0 }}"
          export TEST3_STATUS="${{ steps.test3.outputs.status || 'skipped' }}"
          export TEST3_DURATION="${{ steps.test3.outputs.duration || 0 }}"
          export TEST4_STATUS="${{ steps.test4.outputs.status || 'skipped' }}"
          export TEST4_DURATION="${{ steps.test4.outputs.duration || 0 }}"
          export TEST5_STATUS="${{ steps.test5.outputs.status || 'skipped' }}"
          export TEST5_DURATION="${{ steps.test5.outputs.duration || 0 }}"
          export TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          export TEST6_DURATION="${{ steps.test6.outputs.duration || 0 }}"
          export CURRENT_VERSION="${{ steps.test6.outputs.current_version || steps.version.outputs.version || '' }}"
          export LATEST_VERSION="${{ steps.test6.outputs.latest_version || '' }}"
          export NEXT_INSTALLED_VERSION="${{ steps.test6.outputs.next_installed_version || '' }}"
          export TEST6_DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          export TEST6_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          export TEST6_COMPARISON="${{ steps.test6.outputs.comparison || '' }}"

          python3 - <<'PY'
          import json
          import os

          def as_int(name):
              return int(os.environ.get(name, "0") or "0")

          data = {
              "schema_version": "1.0",
              "package": {
                  "name": "Arthas",
                  "version": os.environ.get("VERSION", ""),
                  "language": "Java",
                  "category": "Diagnostic Tool",
              },
              "run": {
                  "id": os.environ["RUN_ID"],
                  "url": os.environ["JOB_URL"],
                  "timestamp": os.environ["RUN_TIMESTAMP"],
                  "status": os.environ["OVERALL_STATUS"],
                  "runner": {"os": "ubuntu-24.04", "arch": "arm64"},
              },
              "tests": {
                  "passed": as_int("PASSED_COUNT"),
                  "failed": as_int("FAILED_COUNT"),
                  "skipped": 0,
                  "duration_seconds": as_int("TOTAL_DURATION"),
                  "details": [
                      {"name": "Check Boot Jar Execution", "status": os.environ["TEST1_STATUS"], "duration_seconds": as_int("TEST1_DURATION")},
                      {"name": "Start Dummy Java Process", "status": os.environ["TEST2_STATUS"], "duration_seconds": as_int("TEST2_DURATION")},
                      {"name": "Attach Arthas (Dry Run)", "status": os.environ["TEST3_STATUS"], "duration_seconds": as_int("TEST3_DURATION")},
                      {"name": "Architecture Verification", "status": os.environ["TEST4_STATUS"], "duration_seconds": as_int("TEST4_DURATION")},
                      {"name": "Functional Validation", "status": os.environ["TEST5_STATUS"], "duration_seconds": as_int("TEST5_DURATION")},
                      {
                          "name": "Test 6 - Regression Validation",
                          "status": os.environ["TEST6_STATUS"],
                          "duration_seconds": as_int("TEST6_DURATION"),
                          "current_version": os.environ.get("CURRENT_VERSION", ""),
                          "latest_version": os.environ.get("LATEST_VERSION", ""),
                          "next_installed_version": os.environ.get("NEXT_INSTALLED_VERSION", ""),
                          "decision": os.environ.get("TEST6_DECISION", "manual_review_needed"),
                          "regression_result": os.environ.get("TEST6_RESULT", ""),
                          "comparison": os.environ.get("TEST6_COMPARISON", ""),
                      },
                  ],
              },
              "metadata": {
                  "dashboard_link": os.environ["DASHBOARD_LINK"],
                  "badge_status": os.environ["BADGE_STATUS"],
                  "package_slug": os.environ["PACKAGE_SLUG"],
              },
          }

          with open("test-results/arthas.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh, indent=2)
              fh.write("\n")
          PY
          
          echo "Generated test results:"
          cat test-results/arthas.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arthas-test-results
          path: test-results/arthas.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression comparison summary unavailable.' }}"
          echo "## Arthas Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Boot Jar Execution: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Start Dummy Java Process: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Attach Arthas (Dry Run): ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Support badge is based on Tests 1-5:** yes" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY
