name: Test Apache Atlas on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-atlas.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-atlas.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-atlas.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-atlas.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-atlas.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-atlas.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-atlas.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-atlas.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-atlas.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-atlas.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-atlas.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-atlas.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-atlas.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-atlas.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-atlas.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-atlas.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-atlas.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-atlas.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-atlas.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-atlas.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-atlas.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-atlas.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-atlas.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-atlas.outputs.timestamp }}
jobs:
  test-atlas:
    runs-on: ubuntu-24.04-arm
    env:
      ATLAS_BASELINE_VERSION: "2.3.0"
      ATLAS_NEXT_VERSION: "2.4.0"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache Atlas'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=atlas" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/atlas" >> "$GITHUB_OUTPUT"
      - name: Install Java and Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      
      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven
      
      - name: Download Apache Atlas Source
        id: install
        run: |
          echo "Downloading Apache Atlas Source..."

          wget "https://archive.apache.org/dist/atlas/${ATLAS_BASELINE_VERSION}/apache-atlas-${ATLAS_BASELINE_VERSION}-sources.tar.gz"
          tar -xzf "apache-atlas-${ATLAS_BASELINE_VERSION}-sources.tar.gz"
          
          # Set ATLAS_HOME to source dir
          echo "ATLAS_HOME=$PWD/apache-atlas-sources-${ATLAS_BASELINE_VERSION}" >> $GITHUB_ENV
          
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get Atlas version
        id: version
        run: |
          VERSION="${ATLAS_BASELINE_VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Atlas version: $VERSION"
      
      - name: Test 1 - Check Source Files
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -f "$ATLAS_HOME/pom.xml" ]; then
            echo "✓ pom.xml found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ pom.xml not found"
            ls -R $ATLAS_HOME || true
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Maven Version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if mvn -v; then
             echo "✓ maven installed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ maven not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Validate Build (Maven)
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd $ATLAS_HOME
          # Run a quick validation to ensure project structure is correct
          # We skip full install as it takes too long for smoke tests
          # Run a quick validation on the 'common' module to avoid flaky dependencies in other modules (like sqoop)
          if mvn clean validate -pl common -am -DskipTests; then
             echo "✓ maven validate passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ maven validate failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check Distro Module
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -d "$ATLAS_HOME/distro" ]; then
             echo "✓ distro module found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ distro module not found"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.ATLAS_BASELINE_VERSION }}"
          LATEST="${ATLAS_NEXT_VERSION}"
          NEXT_DIR="/tmp/atlas-next-src"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured baseline (${CURRENT}) matches configured next candidate (${LATEST}); repin baseline to an older release for a genuine Test 6 upgrade validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          mkdir -p "$NEXT_DIR"
          if ! wget -q "https://archive.apache.org/dist/atlas/${LATEST}/apache-atlas-${LATEST}-sources.tar.gz" -O /tmp/atlas-next.tar.gz; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Could not download Apache Atlas ${LATEST} source archive from the Apache release archive." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          tar -xzf /tmp/atlas-next.tar.gz -C "$NEXT_DIR" --strip-components=1
          if (cd "$NEXT_DIR" && mvn clean validate -pl common -am -DskipTests >/tmp/atlas-next-validate.log 2>&1); then
            echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Apache Atlas ${CURRENT} passed Tests 1-5. Regression validation downloaded ${LATEST} source and passed Maven validate on Arm64 for the same module path used by baseline checks." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/atlas-next-validate.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Apache Atlas ${CURRENT} passed Tests 1-5, but candidate ${LATEST} failed Maven validate on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"
          echo "Next version installed on Arm64: $LATEST"
          echo "Regression install result: Next version installed successfully on Arm64"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable Apache Atlas release is available for Arm64 validation"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Source Files
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check Maven Version
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Validate Build (Maven)
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check Distro Module
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          # Regression Validation
          if [ "$TEST6_STATUS" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "${{ steps.test1.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" == "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
              REGRESSION_RESULT="Regression validation passed"
            else
              REGRESSION_RESULT="Regression validation failed"
            fi
          fi
          echo "## Apache Atlas Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Source Files: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Maven Version: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Validate Build (Maven): ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Check Distro Module: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Support badge status reflects Tests 1-5. Test 6 reports next-version install readiness separately." >> $GITHUB_STEP_SUMMARY
