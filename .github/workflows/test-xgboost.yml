name: Test XGBoost on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-xgboost.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-xgboost.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-xgboost.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-xgboost.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-xgboost.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-xgboost.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-xgboost.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-xgboost.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-xgboost.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-xgboost.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-xgboost.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-xgboost.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-xgboost.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-xgboost.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-xgboost.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-xgboost.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-xgboost.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-xgboost.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-xgboost.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-xgboost.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-xgboost.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-xgboost.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-xgboost.outputs.timestamp }}
jobs:
  test-xgboost:
    runs-on: ubuntu-24.04-arm
    env:
      XGBOOST_VERSION: "1.6.2"
      XGBOOST_WORKROOT: "/tmp/xgboost-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'XGBoost'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=xgboost" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/xgboost" >> "$GITHUB_OUTPUT"
          echo "current_version=${XGBOOST_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install XGBoost baseline
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "python3-venv file"
          rm -rf "${XGBOOST_WORKROOT}"
          mkdir -p "${XGBOOST_WORKROOT}"
          python3 -m venv "${XGBOOST_WORKROOT}/current-venv"
          "${XGBOOST_WORKROOT}/current-venv/bin/pip" install --upgrade pip "setuptools<81" wheel
          "${XGBOOST_WORKROOT}/current-venv/bin/pip" install "numpy<2"
          "${XGBOOST_WORKROOT}/current-venv/bin/pip" install "xgboost==${XGBOOST_VERSION}"
          echo "venv_path=${XGBOOST_WORKROOT}/current-venv" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get XGBoost version
        id: version
        run: |
          set -euo pipefail
          VENV="${{ steps.install.outputs.venv_path }}"
          VERSION=$("${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          print(xgb.__version__)
          PY
          )
          LATEST=$(
            python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(urllib.request.urlopen("https://pypi.org/pypi/xgboost/json", timeout=20))
          print(data["info"]["version"])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Module import validation
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          assert hasattr(xgb, "DMatrix")
          assert hasattr(xgb, "train")
          print("XGBOOST_IMPORT_OK", xgb.__version__)
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          VERSION=$("${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          print(xgb.__version__)
          PY
          )
          if [ "${VERSION}" = "${XGBOOST_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${XGBOOST_VERSION}, got ${VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - API surface validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY' > /tmp/xgboost-api.log
          import xgboost as xgb
          print("DMATRIX", xgb.DMatrix.__name__)
          print("BOOSTER", xgb.Booster.__name__)
          print("TRAIN", callable(xgb.train))
          PY
          if grep -Fq "DMATRIX DMatrix" /tmp/xgboost-api.log && grep -Fq "TRAIN True" /tmp/xgboost-api.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xgboost-api.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          LIB_PATH=$("${VENV}/bin/python" - <<'PY'
          import pathlib
          import xgboost
          libs = list(pathlib.Path(xgboost.__file__).parent.rglob("libxgboost.so"))
          print(libs[0] if libs else "")
          PY
          )
          if [ "$(uname -m)" = "aarch64" ] && [ -n "${LIB_PATH}" ] && file "${LIB_PATH}" | grep -Eqi 'ARM aarch64|ARM64|AArch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Shared library path: ${LIB_PATH}"
            [ -n "${LIB_PATH}" ] && file "${LIB_PATH}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional training smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY' > /tmp/xgboost-functional.log
          import numpy as np
          import xgboost as xgb

          X = np.array([[1.0], [2.0], [3.0], [4.0]], dtype=float)
          y = np.array([0.0, 0.0, 1.0, 1.0], dtype=float)
          dtrain = xgb.DMatrix(X, label=y)
          booster = xgb.train(
              {"objective": "binary:logistic", "max_depth": 2, "eta": 1, "verbosity": 0},
              dtrain,
              num_boost_round=2,
          )
          pred = float(booster.predict(dtrain)[0])
          print("TRAIN_OK", xgb.__version__, pred)
          PY
          if grep -Fq "TRAIN_OK" /tmp/xgboost-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xgboost-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## XGBoost Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Module import validation: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. API surface validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional training smoke: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
