name: Test XGBoost on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/xgboost.md"
      - ".github/workflows/test-xgboost.yml"

jobs:
  test-xgboost:
    runs-on: ubuntu-24.04-arm
    env:
      XGBOOST_VERSION: "1.6.2"
      XGBOOST_WORKROOT: "/tmp/xgboost-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=xgboost" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/xgboost" >> "$GITHUB_OUTPUT"
          echo "current_version=${XGBOOST_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install XGBoost baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-venv file
          rm -rf "${XGBOOST_WORKROOT}"
          mkdir -p "${XGBOOST_WORKROOT}"
          python3 -m venv "${XGBOOST_WORKROOT}/current-venv"
          "${XGBOOST_WORKROOT}/current-venv/bin/pip" install --upgrade pip
          "${XGBOOST_WORKROOT}/current-venv/bin/pip" install "xgboost==${XGBOOST_VERSION}"
          echo "venv_path=${XGBOOST_WORKROOT}/current-venv" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get XGBoost version
        id: version
        run: |
          set -euo pipefail
          VENV="${{ steps.install.outputs.venv_path }}"
          VERSION=$("${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          print(xgb.__version__)
          PY
          )
          LATEST=$(
            python3 - <<'PY'
          import json
          import urllib.request

          data = json.load(urllib.request.urlopen("https://pypi.org/pypi/xgboost/json", timeout=20))
          print(data["info"]["version"])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Module import validation
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          assert hasattr(xgb, "DMatrix")
          assert hasattr(xgb, "train")
          print("XGBOOST_IMPORT_OK", xgb.__version__)
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          VERSION=$("${VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          print(xgb.__version__)
          PY
          )
          if [ "${VERSION}" = "${XGBOOST_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${XGBOOST_VERSION}, got ${VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - API surface validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY' > /tmp/xgboost-api.log
          import xgboost as xgb
          print("DMATRIX", xgb.DMatrix.__name__)
          print("BOOSTER", xgb.Booster.__name__)
          print("TRAIN", callable(xgb.train))
          PY
          if grep -Fq "DMATRIX DMatrix" /tmp/xgboost-api.log && grep -Fq "TRAIN True" /tmp/xgboost-api.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xgboost-api.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          LIB_PATH=$("${VENV}/bin/python" - <<'PY'
          import pathlib
          import xgboost
          libs = list(pathlib.Path(xgboost.__file__).parent.rglob("libxgboost.so"))
          print(libs[0] if libs else "")
          PY
          )
          if [ "$(uname -m)" = "aarch64" ] && [ -n "${LIB_PATH}" ] && file "${LIB_PATH}" | grep -Eqi 'ARM aarch64|ARM64|AArch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Shared library path: ${LIB_PATH}"
            [ -n "${LIB_PATH}" ] && file "${LIB_PATH}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional training smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv_path }}"
          "${VENV}/bin/python" - <<'PY' > /tmp/xgboost-functional.log
          import numpy as np
          import xgboost as xgb

          X = np.array([[1.0], [2.0], [3.0], [4.0]], dtype=float)
          y = np.array([0.0, 0.0, 1.0, 1.0], dtype=float)
          dtrain = xgb.DMatrix(X, label=y)
          booster = xgb.train(
              {"objective": "binary:logistic", "max_depth": 2, "eta": 1, "verbosity": 0},
              dtrain,
              num_boost_round=2,
          )
          pred = float(booster.predict(dtrain)[0])
          print("TRAIN_OK", xgb.__version__, pred)
          PY
          if grep -Fq "TRAIN_OK" /tmp/xgboost-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xgboost-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          NEXT_VENV="${XGBOOST_WORKROOT}/regression-venv"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ] || [ "${LATEST}" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned XGBoost version ${CURRENT} passed smoke tests in this run, but the latest stable PyPI release could not be resolved for isolated Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${NEXT_VENV}"
          python3 -m venv "${NEXT_VENV}"
          "${NEXT_VENV}/bin/pip" install --upgrade pip
          "${NEXT_VENV}/bin/pip" install "xgboost==${LATEST}"
          NEXT_INSTALLED_VERSION=$("${NEXT_VENV}/bin/python" - <<'PY'
          import xgboost as xgb
          print(xgb.__version__)
          PY
          )
          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"

          "${NEXT_VENV}/bin/python" - <<'PY' > /tmp/xgboost-next.log
          import numpy as np
          import xgboost as xgb

          X = np.array([[1.0], [2.0], [3.0], [4.0]], dtype=float)
          y = np.array([0.0, 0.0, 1.0, 1.0], dtype=float)
          dtrain = xgb.DMatrix(X, label=y)
          booster = xgb.train(
              {"objective": "binary:logistic", "max_depth": 2, "eta": 1, "verbosity": 0},
              dtrain,
              num_boost_round=2,
          )
          pred = float(booster.predict(dtrain)[0])
          print("TRAIN_OK", xgb.__version__, pred)
          PY

          if grep -Fq "TRAIN_OK" /tmp/xgboost-next.log; then
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned XGBoost version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${NEXT_INSTALLED_VERSION} into an isolated Arm64 virtualenv and reran the real training smoke successfully." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/xgboost-next.log || true
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned XGBoost version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the isolated training smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
            if job.get("name") in (f"{job_id} / {job_id}", job_id):
              print(job.get("html_url", ""))
              break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/xgboost.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "XGBoost",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "Machine learning"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Module import validation", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Exact version check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "API surface validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional training smoke", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-test-results
          path: test-results/xgboost.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## XGBoost Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Module import validation: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. API surface validation: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional training smoke: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
