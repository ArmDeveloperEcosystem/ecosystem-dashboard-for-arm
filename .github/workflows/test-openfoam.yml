name: Test OpenFOAM on Arm64
on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-openfoam.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-openfoam.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-openfoam.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-openfoam.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-openfoam.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-openfoam.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-openfoam.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-openfoam.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-openfoam.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-openfoam.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-openfoam.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-openfoam.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-openfoam.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-openfoam.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-openfoam.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-openfoam.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-openfoam.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-openfoam.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-openfoam.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-openfoam.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-openfoam.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-openfoam.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-openfoam.outputs.timestamp }}
jobs:
  test-openfoam:
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OpenFOAM'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openfoam" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openfoam" >> "$GITHUB_OUTPUT"
      - name: Install OpenFOAM
        id: install
        run: |
          set -euo pipefail
          echo "Installing OpenFOAM..."
          
          # Install prerequisites and openfoam
          sudo apt-get update
          
          # Try installing from standard repositories first
          if sudo apt-get install -y openfoam; then
             echo "OpenFOAM installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
             BASHRC_PATH=$(
               find /usr/lib /opt /usr/share \
                 \( -path '*/openfoam*/etc/bashrc' -o -path '*/OpenFOAM*/etc/bashrc' \) \
                 2>/dev/null | head -n 1 || true
             )
             echo "bashrc_path=$BASHRC_PATH" >> $GITHUB_OUTPUT
          else
             echo "OpenFOAM installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get OpenFOAM version
        id: version
        run: |
          set -euo pipefail
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
          }
          VERSION="$(dpkg-query -W -f='${Version}\n' openfoam 2>/dev/null | head -n 1 || true)"
          if [ -z "$VERSION" ]; then
             ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
             VERSION="$([ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help 2>&1 | sed -n 's/.*\(OpenFOAM[^ ]*\).*/\1/p' | head -n 1 || true)"
          fi
          if [ -z "$VERSION" ]; then
             VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected OpenFOAM version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check icoFoam binary
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ICOFOAM_BIN="$(command -v icoFoam 2>/dev/null || true)"

          if [ -n "$ICOFOAM_BIN" ] && [ -x "$ICOFOAM_BIN" ]; then
            echo "✓ icoFoam binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ icoFoam binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check blockMesh binary
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BLOCKMESH_BIN="$(command -v blockMesh 2>/dev/null || true)"

          if [ -n "$BLOCKMESH_BIN" ] && [ -x "$BLOCKMESH_BIN" ]; then
            echo "✓ blockMesh binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ blockMesh binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run Help Command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASHRC_PATH="${{ steps.install.outputs.bashrc_path }}"
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
            return 0
          }
          if [ -n "$BASHRC_PATH" ] && [ -f "$BASHRC_PATH" ]; then
            # shellcheck disable=SC1090
            set +u
            source "$BASHRC_PATH"
            set -u
          fi
          FOAM_VERSION_BIN="$(find_openfoam_bin foamVersion)"
          ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
          BLOCKMESH_BIN="$(find_openfoam_bin blockMesh)"

          OUTPUT=$({
            [ -n "$FOAM_VERSION_BIN" ] && "$FOAM_VERSION_BIN" 2>&1 || true
            [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help 2>&1 || true
            [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" --help 2>&1 || true
            [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" -help 2>&1 || true
          } || true)
          printf '%s\n' "$OUTPUT" > /tmp/openfoam-help.log
          if [ -n "$OUTPUT" ] && printf '%s\n' "$OUTPUT" | grep -Ei -q "OpenFOAM|icoFoam|blockMesh|usage|solver|case|version"; then
             echo "✓ Help command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             cat /tmp/openfoam-help.log || true
             echo "✗ Help command failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ICOFOAM_BIN="$(command -v icoFoam 2>/dev/null || true)"
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] && [ -n "$ICOFOAM_BIN" ] && file "$ICOFOAM_BIN" | grep -qiE 'aarch64|arm64'; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            [ -n "$ICOFOAM_BIN" ] && file "$ICOFOAM_BIN" || true
            echo "✗ OpenFOAM install is not exposing an ARM64 icoFoam binary ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASHRC_PATH="${{ steps.install.outputs.bashrc_path }}"
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
            return 0
          }
          if [ -n "$BASHRC_PATH" ] && [ -f "$BASHRC_PATH" ]; then
            # shellcheck disable=SC1090
            set +u
            source "$BASHRC_PATH"
            set -u
          fi
          FOAM_VERSION_BIN="$(find_openfoam_bin foamVersion)"
          ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
          BLOCKMESH_BIN="$(find_openfoam_bin blockMesh)"
          FOAMEXEC_BIN="$(find_openfoam_bin foamExec)"
          : > /tmp/openfoam-functional.log
          # Basic functional check: use real OpenFOAM entry points, not a nonexistent openfoam wrapper
          if { [ -n "$FOAM_VERSION_BIN" ] && "$FOAM_VERSION_BIN" > /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" --help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" -help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" --help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$FOAMEXEC_BIN" ] && "$FOAMEXEC_BIN" -help >> /tmp/openfoam-functional.log 2>&1; }; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          elif grep -Ei -q "icoFoam|blockMesh|OpenFOAM|usage|solver|case|version" /tmp/openfoam-functional.log; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            cat /tmp/openfoam-functional.log || true
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check icoFoam binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check blockMesh binary
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run Help Command
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## OpenFOAM Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check icoFoam binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check blockMesh binary: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Run Help Command: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
