name: Test OpenFOAM on Arm64
on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/openfoam.md'
      - '.github/workflows/test-openfoam.yml'
jobs:
  test-openfoam:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openfoam" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openfoam" >> "$GITHUB_OUTPUT"
      - name: Install OpenFOAM
        id: install
        run: |
          set -euo pipefail
          echo "Installing OpenFOAM..."
          
          # Install prerequisites and openfoam
          sudo apt-get update
          
          # Try installing from standard repositories first
          if sudo apt-get install -y openfoam; then
             echo "OpenFOAM installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
             BASHRC_PATH=$(
               find /usr/lib /opt /usr/share \
                 \( -path '*/openfoam*/etc/bashrc' -o -path '*/OpenFOAM*/etc/bashrc' \) \
                 2>/dev/null | head -n 1 || true
             )
             echo "bashrc_path=$BASHRC_PATH" >> $GITHUB_OUTPUT
          else
             echo "OpenFOAM installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get OpenFOAM version
        id: version
        run: |
          set -euo pipefail
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
          }
          VERSION="$(dpkg-query -W -f='${Version}\n' openfoam 2>/dev/null | head -n 1 || true)"
          if [ -z "$VERSION" ]; then
             ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
             VERSION="$([ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help 2>&1 | sed -n 's/.*\(OpenFOAM[^ ]*\).*/\1/p' | head -n 1 || true)"
          fi
          if [ -z "$VERSION" ]; then
             VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected OpenFOAM version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check icoFoam binary
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ICOFOAM_BIN="$(command -v icoFoam 2>/dev/null || true)"

          if [ -n "$ICOFOAM_BIN" ] && [ -x "$ICOFOAM_BIN" ]; then
            echo "✓ icoFoam binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ icoFoam binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check blockMesh binary
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BLOCKMESH_BIN="$(command -v blockMesh 2>/dev/null || true)"

          if [ -n "$BLOCKMESH_BIN" ] && [ -x "$BLOCKMESH_BIN" ]; then
            echo "✓ blockMesh binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ blockMesh binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run Help Command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
            return 0
          }
          FOAM_VERSION_BIN="$(find_openfoam_bin foamVersion)"
          ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
          BLOCKMESH_BIN="$(find_openfoam_bin blockMesh)"

          OUTPUT=$({
            [ -n "$FOAM_VERSION_BIN" ] && "$FOAM_VERSION_BIN" 2>&1 || true
            [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help 2>&1 || true
            [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" --help 2>&1 || true
            [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" -help 2>&1 || true
          } || true)
          printf '%s\n' "$OUTPUT" > /tmp/openfoam-help.log
          if [ -n "$OUTPUT" ] && printf '%s\n' "$OUTPUT" | grep -Ei -q "OpenFOAM|icoFoam|blockMesh|usage|solver|case|version"; then
             echo "✓ Help command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             cat /tmp/openfoam-help.log || true
             echo "✗ Help command failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ICOFOAM_BIN="$(command -v icoFoam 2>/dev/null || true)"
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] && [ -n "$ICOFOAM_BIN" ] && file "$ICOFOAM_BIN" | grep -qiE 'aarch64|arm64'; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            [ -n "$ICOFOAM_BIN" ] && file "$ICOFOAM_BIN" || true
            echo "✗ OpenFOAM install is not exposing an ARM64 icoFoam binary ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          find_openfoam_bin() {
            command -v "$1" 2>/dev/null || true
            return 0
          }
          FOAM_VERSION_BIN="$(find_openfoam_bin foamVersion)"
          ICOFOAM_BIN="$(find_openfoam_bin icoFoam)"
          BLOCKMESH_BIN="$(find_openfoam_bin blockMesh)"
          FOAMEXEC_BIN="$(find_openfoam_bin foamExec)"
          : > /tmp/openfoam-functional.log
          # Basic functional check: use real OpenFOAM entry points, not a nonexistent openfoam wrapper
          if { [ -n "$FOAM_VERSION_BIN" ] && "$FOAM_VERSION_BIN" > /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" -help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$ICOFOAM_BIN" ] && "$ICOFOAM_BIN" --help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" -help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$BLOCKMESH_BIN" ] && "$BLOCKMESH_BIN" --help >> /tmp/openfoam-functional.log 2>&1; } || \
             { [ -n "$FOAMEXEC_BIN" ] && "$FOAMEXEC_BIN" -help >> /tmp/openfoam-functional.log 2>&1; }; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          elif grep -Ei -q "icoFoam|blockMesh|OpenFOAM|usage|solver|case|version" /tmp/openfoam-functional.log; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            cat /tmp/openfoam-functional.log || true
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check icoFoam binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check blockMesh binary
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run Help Command
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/openfoam.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "OpenFOAM",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check icoFoam binary",
                  "status": "${{ steps.test1.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check blockMesh binary",
                  "status": "${{ steps.test2.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Run Help Command",
                  "status": "${{ steps.test3.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "package_slug": "${{ steps.metadata.outputs.package_slug }}"
            }
          }
          EOF
      # ============================================================
      # STANDARD STEPS - Usually don't need to modify below here
      # ============================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfoam-test-results
          path: test-results/openfoam.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## OpenFOAM Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check icoFoam binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check blockMesh binary: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Run Help Command: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
