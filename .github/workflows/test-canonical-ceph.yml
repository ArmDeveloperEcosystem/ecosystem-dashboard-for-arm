name: Test Canonical Ceph on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-canonical-ceph.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-canonical-ceph.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-canonical-ceph.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-canonical-ceph.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-canonical-ceph.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-canonical-ceph.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-canonical-ceph.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-canonical-ceph.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-canonical-ceph.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-canonical-ceph.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-canonical-ceph.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-canonical-ceph.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-canonical-ceph.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-canonical-ceph.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-canonical-ceph.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-canonical-ceph.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-canonical-ceph.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-canonical-ceph.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-canonical-ceph.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-canonical-ceph.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-canonical-ceph.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-canonical-ceph.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-canonical-ceph.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-canonical-ceph.outputs.timestamp }}

jobs:
  test-canonical-ceph:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "Jewel (10.2.x)"
      PACKAGE_SLUG: "canonical-ceph"
      LANE_KIND: "ubuntu-package-client"
      DOWNLOAD_URL: "https://ubuntu.com/ceph/install"
      HOMEPAGE_URL: "https://ubuntu.com/ceph"
      OFFICIAL_DOCS: "https://ubuntu.com/ceph/docs"
      GITHUB_REPO: ""

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Canonical Ceph'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          # shellcheck disable=SC2129
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=canonical-ceph" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/canonical-ceph" >> "$GITHUB_OUTPUT"

      - name: Install Canonical Ceph client package
        id: install_ceph_packages
        continue-on-error: true
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates ceph-common"
          quiet: "true"

      - name: Capture installed Canonical Ceph client baseline
        id: install
        run: |
          set -euo pipefail
          # shellcheck disable=SC2129
          rm -rf baseline-runtime
          mkdir -p baseline-runtime

          emit_install_failure() {
            local reason="$1"
            {
              echo "install_mode=ubuntu_package"
              echo "install_status=failed"
              echo "failure_reason=$reason"
            } >> "$GITHUB_OUTPUT"
          }

          INSTALL_OUTCOME="${{ steps.install_ceph_packages.outcome || 'failure' }}"
          if [ "$INSTALL_OUTCOME" != "success" ]; then
            emit_install_failure "apt install ceph-common did not complete successfully on the Ubuntu Arm64 runner."
            exit 0
          fi

          MISSING=""
          for cmd in ceph rados ceph-authtool; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              MISSING="${MISSING:+$MISSING, }$cmd"
            fi
          done

          if [ -n "$MISSING" ]; then
            emit_install_failure "ceph-common installed, but expected commands were missing: $MISSING."
            exit 0
          fi

          PKG_VERSION="$(dpkg-query -W -f='${Version}' ceph-common 2>/dev/null || true)"
          PKG_ARCH="$(dpkg-query -W -f='${Architecture}' ceph-common 2>/dev/null || true)"
          CEPH_VERSION_OUTPUT="$(ceph --version 2>&1 || true)"
          if [ -z "$PKG_VERSION" ] || ! printf '%s\n' "$CEPH_VERSION_OUTPUT" | grep -Eiq 'ceph version|ceph'; then
            emit_install_failure "ceph-common package was present, but ceph --version did not produce recognizable Ceph output."
            exit 0
          fi

          printf 'package=ceph-common\nversion=%s\narchitecture=%s\nceph_version=%s\n' \
            "$PKG_VERSION" "$PKG_ARCH" "$CEPH_VERSION_OUTPUT" > baseline-runtime/metadata.txt

          {
            echo "resolved_tag=ubuntu_ceph_common"
            echo "install_mode=ubuntu_package"
            echo "install_status=success"
            echo "installed_version=$PKG_VERSION"
            echo "installed_architecture=$PKG_ARCH"
            echo "ceph_version_output=$CEPH_VERSION_OUTPUT"
          } >> "$GITHUB_OUTPUT"

      - name: Get baseline version
        id: version
        run: |
          VERSION="${{ steps.install.outputs.installed_version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION="$BASELINE_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Canonical Ceph client package version: $VERSION"
          echo "Supported minimum version from dashboard metadata: $BASELINE_VERSION"

      - name: Define package-specific expectations
        id: expectations
        uses: ./.github/actions/derive-package-source-expectations
        with:
          package_slug: ${{ env.PACKAGE_SLUG }}

      - name: Test 1 - Install Canonical Ceph client package
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=${{ steps.install.outputs.failure_reason || 'ceph-common was not installed successfully on the Ubuntu Arm64 runner.' }}" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if dpkg-query -s ceph-common 2>/dev/null | grep -Fq "Status: install ok installed" && [ -f baseline-runtime/metadata.txt ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Installed ceph-common on the Ubuntu Arm64 runner and captured package metadata." >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=ceph-common package metadata was not available after install." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Validate dashboard metadata and supported baseline
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ -f "$CONTENT_PAGE" ]
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          grep -Fx "download_url: $DOWNLOAD_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "    homepage_url: $HOMEPAGE_URL" "$CONTENT_PAGE" >/dev/null
          grep -Fx "        official_docs: $OFFICIAL_DOCS" "$CONTENT_PAGE" >/dev/null
          grep -F "version_number: $BASELINE_VERSION" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Validated dashboard metadata, supported-minimum version, homepage, and docs alignment." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Verify Ceph client commands and package files
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MISSING=""
          for cmd in ceph rados ceph-authtool; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              MISSING="${MISSING:+$MISSING, }$cmd"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=Expected Ceph client commands were missing after install: $MISSING." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          dpkg -L ceph-common | grep -E '/(ceph|rados|ceph-authtool)$' >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Verified ceph, rados, and ceph-authtool commands from the installed ceph-common package." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify Arm64 runner and package architecture
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CONTENT_PAGE="${{ steps.expectations.outputs.content_page }}"
          [ "$(uname -m)" = "aarch64" ]
          [ "$(dpkg --print-architecture)" = "arm64" ]
          PKG_ARCH="$(dpkg-query -W -f='${Architecture}' ceph-common 2>/dev/null || true)"
          case "$PKG_ARCH" in
            arm64|all) ;;
            *)
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "note=ceph-common package architecture was '$PKG_ARCH', expected arm64 or all on the Arm64 runner." >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac
          grep -Fx "works_on_arm: true" "$CONTENT_PAGE" >/dev/null
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Verified Ubuntu Arm64 runner architecture and installed ceph-common package architecture: $PKG_ARCH." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run bounded Ceph client smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CEPH_VERSION="$(ceph --version 2>&1)"
          RADOS_VERSION="$(rados --version 2>&1)"
          CEPH_HELP="$(ceph --help 2>&1 || true)"
          AUTHTOOL_HELP="$(ceph-authtool --help 2>&1 || true)"

          if ! printf '%s\n' "$CEPH_VERSION" | grep -Eiq 'ceph version|ceph'; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=ceph --version did not produce recognizable Ceph output." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! printf '%s\n' "$RADOS_VERSION" | grep -Eiq 'ceph version|rados'; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=rados --version did not produce recognizable Ceph/RADOS output." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          printf '%s\n' "$CEPH_HELP" | grep -Eiq 'usage|commands|ceph'
          printf '%s\n' "$AUTHTOOL_HELP" | grep -Eiq 'ceph-authtool|usage|cap'
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=Executed ceph --version, rados --version, ceph --help, and ceph-authtool --help on Ubuntu Arm64." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          # shellcheck disable=SC2129
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.installed_version || env.BASELINE_VERSION }}"
          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            END_TIME=$(date +%s)
            {
              echo "current_version=$CURRENT"
              echo "latest_version=unknown"
              echo "next_installed_version=not_installed"
              echo "decision=baseline_failed"
              echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed."
              echo "comparison=Baseline Ceph client smoke failed, so package-manager regression classification is not trustworthy for this run."
              echo "status=skipped"
              echo "duration=$((END_TIME - START_TIME))"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CANDIDATE="$(apt-cache policy ceph-common | awk '/Candidate:/ {print $2; exit}' || true)"
          if [ -z "$CANDIDATE" ] || [ "$CANDIDATE" = "(none)" ]; then
            CANDIDATE="$CURRENT"
          fi
          apt-get -s install --only-upgrade ceph-common >/tmp/ceph-common-upgrade-plan.txt 2>&1 || true
          END_TIME=$(date +%s)
          {
            echo "current_version=$CURRENT"
            echo "latest_version=$CANDIDATE"
            echo "next_installed_version=$CURRENT"
            echo "decision=not_applicable_package_manager"
            echo "regression_result=Ubuntu package-manager candidate installed and executed on Arm64"
            echo "comparison=Tests 1-5 installed the Ubuntu ceph-common package on the Arm64 runner and executed Ceph client commands successfully. For this package-manager lane, the Ubuntu repository candidate (${CANDIDATE}) is the validated install source, so Test 6 does not select an external next-version archive."
            echo "status=skipped"
            echo "duration=$((END_TIME - START_TIME))"
          } >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          # shellcheck disable=SC2129
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          {
            echo "passed=$PASSED"
            echo "failed=$FAILED"
            echo "skipped=$SKIPPED"
            echo "duration=$DURATION"
            echo "core_failed=$CORE_FAILED"
            echo "overall_status=$OVERALL_STATUS"
            echo "badge_status=$BADGE_STATUS"
          } >> "$GITHUB_OUTPUT"

      - name: Create test summary
        if: always()
        uses: ./.github/actions/write-package-job-summary
        with:
          package_name: 'Canonical Ceph'
          version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          overall_status: ${{ steps.summary.outputs.overall_status || 'unknown' }}
          tests_passed: ${{ steps.summary.outputs.passed || '0' }}
          tests_failed: ${{ steps.summary.outputs.failed || '0' }}
          tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
          duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
          test1_label: 'Test 1 - Install Canonical Ceph client package'
          test2_label: 'Test 2 - Validate dashboard metadata and supported baseline'
          test3_label: 'Test 3 - Verify Ceph client commands and package files'
          test4_label: 'Test 4 - Verify Arm64 runner and package architecture'
          test5_label: 'Test 5 - Run bounded Ceph client smoke'
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test6_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BASELINE_VERSION }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
