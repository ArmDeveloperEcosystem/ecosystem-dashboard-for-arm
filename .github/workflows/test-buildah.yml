name: Test Buildah on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version: { description: Output contract version, value: "${{ jobs.test-buildah.outputs.contract_version }}" }
      package_slug: { description: Canonical package slug, value: "${{ jobs.test-buildah.outputs.package_slug }}" }
      package_name: { description: Display package name, value: "${{ jobs.test-buildah.outputs.package_name }}" }
      package_version: { description: Baseline version tested in this run, value: "${{ jobs.test-buildah.outputs.package_version }}" }
      run_status: { description: Overall package run status, value: "${{ jobs.test-buildah.outputs.run_status }}" }
      badge_status: { description: Badge status derived from core baseline checks, value: "${{ jobs.test-buildah.outputs.badge_status }}" }
      core_failed: { description: Number of failed baseline core checks, value: "${{ jobs.test-buildah.outputs.core_failed }}" }
      tests_passed: { description: Count of passed tests, value: "${{ jobs.test-buildah.outputs.tests_passed }}" }
      tests_failed: { description: Count of failed tests, value: "${{ jobs.test-buildah.outputs.tests_failed }}" }
      tests_skipped: { description: Count of skipped tests, value: "${{ jobs.test-buildah.outputs.tests_skipped }}" }
      duration_seconds: { description: Total duration across tests, value: "${{ jobs.test-buildah.outputs.duration_seconds }}" }
      regression_status: { description: Regression test status, value: "${{ jobs.test-buildah.outputs.regression_status }}" }
      regression_decision: { description: Regression decision label, value: "${{ jobs.test-buildah.outputs.regression_decision }}" }
      regression_result: { description: Human readable regression result, value: "${{ jobs.test-buildah.outputs.regression_result }}" }
      regression_comparison: { description: Regression comparison note, value: "${{ jobs.test-buildah.outputs.regression_comparison }}" }
      regression_current_version: { description: Baseline version used for regression comparison, value: "${{ jobs.test-buildah.outputs.regression_current_version }}" }
      regression_latest_version: { description: Next candidate version selected for regression validation, value: "${{ jobs.test-buildah.outputs.regression_latest_version }}" }
      regression_next_installed_version: { description: Candidate version reported by installed next artifact, value: "${{ jobs.test-buildah.outputs.regression_next_installed_version }}" }
      regression_policy: { description: Regression applicability policy, value: "${{ jobs.test-buildah.outputs.regression_policy }}" }
      run_id: { description: GitHub run id, value: "${{ jobs.test-buildah.outputs.run_id }}" }
      run_attempt: { description: GitHub run attempt, value: "${{ jobs.test-buildah.outputs.run_attempt }}" }
      job_name: { description: GitHub job identifier, value: "${{ jobs.test-buildah.outputs.job_name }}" }
      dashboard_link: { description: Dashboard route for this package, value: "${{ jobs.test-buildah.outputs.dashboard_link }}" }
      timestamp: { description: UTC timestamp for this package run, value: "${{ jobs.test-buildah.outputs.timestamp }}" }

jobs:
  test-buildah:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: buildah
      package_name: Buildah
      package_version: ${{ steps.smoke.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.smoke.outputs.test6_status || 'skipped' }}
      regression_decision: ${{ steps.smoke.outputs.regression_decision || 'not_configured' }}
      regression_result: ${{ steps.smoke.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.smoke.outputs.regression_details || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.smoke.outputs.regression_current_version || steps.smoke.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.smoke.outputs.regression_latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.smoke.outputs.regression_next_installed_version || 'not_installed' }}
      regression_policy: applicable
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: /opensource_packages/buildah
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
      - id: metadata
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: smoke
        uses: ./.github/actions/run-missing-package-smoke
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          package_slug: buildah
          package_name: Buildah
          kind: tool-image
          baseline_version: 1.40.0
          candidate_version: latest
          baseline_image: quay.io/buildah/stable:v1.40.0
          candidate_image: quay.io/buildah/stable:latest
          command_name: buildah
      - name: "Test 1 - Validate baseline image manifest and pull"
        if: ${{ always() && (steps.smoke.outputs.test1_status == 'passed' || steps.smoke.outputs.test1_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test1_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 2 - Inspect pulled baseline image"
        if: ${{ always() && (steps.smoke.outputs.test2_status == 'passed' || steps.smoke.outputs.test2_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test2_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 3 - Check Buildah version"
        if: ${{ always() && (steps.smoke.outputs.test3_status == 'passed' || steps.smoke.outputs.test3_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test3_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 4 - Check Buildah help output"
        if: ${{ always() && (steps.smoke.outputs.test4_status == 'passed' || steps.smoke.outputs.test4_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test4_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 5 - Run bounded Buildah functional smoke"
        if: ${{ always() && (steps.smoke.outputs.test5_status == 'passed' || steps.smoke.outputs.test5_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test5_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - name: "Test 6 - Regression Validation"
        if: ${{ always() && (steps.smoke.outputs.test6_status == 'passed' || steps.smoke.outputs.test6_status == 'failed') }}
        shell: bash
        run: |
          status="${{ steps.smoke.outputs.test6_status }}"
          echo "Smoke output status: ${status}"
          if [ "${status}" = "failed" ]; then exit 1; fi
      - id: summary
        if: always()
        uses: ./.github/actions/emit-package-result
        with:
          package_slug: buildah
          package_name: Buildah
          version: ${{ steps.smoke.outputs.version || 'unknown' }}
          install_status: ${{ steps.smoke.outputs.install_status || 'failed' }}
          test1_label: "Validate baseline image manifest and pull"
          test2_label: "Inspect pulled baseline image"
          test3_label: "Check Buildah version"
          test4_label: "Check Buildah help output"
          test5_label: "Run bounded Buildah functional smoke"
          test1_status: ${{ steps.smoke.outputs.test1_status || 'skipped' }}
          test2_status: ${{ steps.smoke.outputs.test2_status || 'skipped' }}
          test3_status: ${{ steps.smoke.outputs.test3_status || 'skipped' }}
          test4_status: ${{ steps.smoke.outputs.test4_status || 'skipped' }}
          test5_status: ${{ steps.smoke.outputs.test5_status || 'skipped' }}
          test6_status: ${{ steps.smoke.outputs.test6_status || 'skipped' }}
          test1_duration: ${{ steps.smoke.outputs.test1_duration || 0 }}
          test2_duration: ${{ steps.smoke.outputs.test2_duration || 0 }}
          test3_duration: ${{ steps.smoke.outputs.test3_duration || 0 }}
          test4_duration: ${{ steps.smoke.outputs.test4_duration || 0 }}
          test5_duration: ${{ steps.smoke.outputs.test5_duration || 0 }}
          test6_duration: ${{ steps.smoke.outputs.test6_duration || 0 }}
          regression_decision: ${{ steps.smoke.outputs.regression_decision || 'not_configured' }}
          regression_current_version: ${{ steps.smoke.outputs.regression_current_version || steps.smoke.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.smoke.outputs.regression_latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.smoke.outputs.regression_next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.smoke.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.smoke.outputs.regression_details || 'Regression comparison summary unavailable.' }}
      - if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
