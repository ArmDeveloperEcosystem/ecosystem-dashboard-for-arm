name: Test Spring Cloud Sleuth on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-spring-cloud-sleuth.outputs.timestamp }}
jobs:
  test-spring-cloud-sleuth:
    runs-on: ubuntu-24.04-arm
    env:
      SLEUTH_VERSION: "3.1.5"
      SLEUTH_NEXT_VERSION: "3.1.11"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Spring Cloud Sleuth'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spring-cloud-sleuth" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spring-cloud-sleuth" >> "$GITHUB_OUTPUT"
      - name: Install Prerequisites (Java and Maven)
        id: install
        run: |
          set -euo pipefail
          echo "Installing Java and Maven..."
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-17-jdk-headless maven"
          if mvn -version >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      
      - name: Get Spring Cloud Sleuth version
        id: version
        run: |
          set -euo pipefail
          VERSION="${SLEUTH_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $VERSION"
      
      - name: Test 1 - Create Maven Project
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mkdir -p /tmp/sleuth-smoke/src/main/java/smoke /tmp/sleuth-smoke/src/test/java/smoke
          cat >/tmp/sleuth-smoke/pom.xml <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>smoke</groupId>
            <artifactId>sleuth-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <java.version>17</java.version>
              <spring-boot.version>2.7.18</spring-boot.version>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <dependencyManagement>
              <dependencies>
                <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-dependencies</artifactId>
                  <version>\${spring-boot.version}</version>
                  <type>pom</type>
                  <scope>import</scope>
                </dependency>
              </dependencies>
            </dependencyManagement>
            <dependencies>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-web</artifactId>
              </dependency>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-starter-sleuth</artifactId>
                <version>${SLEUTH_VERSION}</version>
              </dependency>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-test</artifactId>
                <scope>test</scope>
              </dependency>
            </dependencies>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-compiler-plugin</artifactId>
                  <version>3.12.1</version>
                  <configuration>
                    <release>17</release>
                  </configuration>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF
          cat >/tmp/sleuth-smoke/src/main/java/smoke/SleuthSmokeApplication.java <<'EOF'
          package smoke;

          import org.springframework.boot.SpringApplication;
          import org.springframework.boot.autoconfigure.SpringBootApplication;
          import org.springframework.web.bind.annotation.GetMapping;
          import org.springframework.web.bind.annotation.RestController;

          @SpringBootApplication
          @RestController
          public class SleuthSmokeApplication {
            public static void main(String[] args) {
              SpringApplication.run(SleuthSmokeApplication.class, args);
            }

            @GetMapping("/smoke")
            String smoke() {
              return "sleuth-ok";
            }
          }
          EOF
          cat >/tmp/sleuth-smoke/src/test/java/smoke/SleuthSmokeTest.java <<'EOF'
          package smoke;

          import org.junit.jupiter.api.Test;
          import org.springframework.beans.factory.annotation.Autowired;
          import org.springframework.boot.test.context.SpringBootTest;
          import org.springframework.boot.test.web.client.TestRestTemplate;
          import org.springframework.boot.web.server.LocalServerPort;
          import org.springframework.cloud.sleuth.Span;
          import org.springframework.cloud.sleuth.Tracer;

          import static org.assertj.core.api.Assertions.assertThat;

          @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)
          class SleuthSmokeTest {
            @LocalServerPort
            int port;

            @Autowired
            Tracer tracer;

            @Autowired
            TestRestTemplate restTemplate;

            @Test
            void createsSpanAndServesLocalRoute() {
              Span span = tracer.nextSpan().name("arm64-smoke").start();
              try (Tracer.SpanInScope scope = tracer.withSpan(span)) {
                assertThat(tracer.currentSpan()).isNotNull();
                assertThat(restTemplate.getForObject("http://127.0.0.1:" + port + "/smoke", String.class))
                  .isEqualTo("sleuth-ok");
              } finally {
                span.end();
              }
            }
          }
          EOF
          test -f /tmp/sleuth-smoke/pom.xml
          test -f /tmp/sleuth-smoke/src/test/java/smoke/SleuthSmokeTest.java
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 2 - Resolve Dependencies
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/sleuth-smoke
          if mvn -B -q dependency:resolve -DincludeArtifactIds=spring-cloud-starter-sleuth; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 3 - Compile Spring tiny app and unit test
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/sleuth-smoke
          if mvn -B -q test-compile; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation - Spring app unit test
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd /tmp/sleuth-smoke
          if mvn -B -q test; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${SLEUTH_NEXT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Workflow metadata review required" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured Spring Cloud Sleuth baseline ${CURRENT} matches the Test 6 candidate ${LATEST}; repin baseline older than the candidate to validate an upgrade." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          NEXT_PROJECT=$(mktemp -d)
          cp -R /tmp/sleuth-smoke/. "$NEXT_PROJECT/"
          SLEUTH_VERSION="${SLEUTH_VERSION}" LATEST="${LATEST}" perl -0pi -e 'BEGIN { $from = "<version>$ENV{SLEUTH_VERSION}</version>"; $to = "<version>$ENV{LATEST}</version>"; } s/\Q$from\E/$to/ or die "starter version not replaced\n";' "$NEXT_PROJECT/pom.xml"
          if (cd "$NEXT_PROJECT" && mvn -B -q test); then
            echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed and ran successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current Spring Cloud Sleuth ${CURRENT} completed a tiny Spring route and tracer unit test. Test 6 installed starter ${LATEST} in a copied smoke project and ran the same Maven unit test on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install/runtime failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current Spring Cloud Sleuth ${CURRENT} passed baseline smoke tests, but starter ${LATEST} did not complete the same Maven unit test on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Create Maven Project
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Resolve Dependencies
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Compile Spring tiny app and unit test
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Spring Cloud Sleuth Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Create Maven Project: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Resolve Dependencies: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Compile Spring tiny app and unit test: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation - Spring app unit test: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> $GITHUB_STEP_SUMMARY
