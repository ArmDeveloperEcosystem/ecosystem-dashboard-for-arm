name: Test ManipulaPy on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-manipulapy.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-manipulapy.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-manipulapy.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-manipulapy.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-manipulapy.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-manipulapy.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-manipulapy.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-manipulapy.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-manipulapy.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-manipulapy.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-manipulapy.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-manipulapy.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-manipulapy.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-manipulapy.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-manipulapy.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-manipulapy.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-manipulapy.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-manipulapy.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-manipulapy.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-manipulapy.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-manipulapy.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-manipulapy.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-manipulapy.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-manipulapy.outputs.timestamp }}

jobs:
  test-manipulapy:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.0.0"
      DIST_NAME: "manipulapy"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'ManipulaPy'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=manipulapy" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/manipulapy" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install baseline package
        id: install
        run: |
          set -euo pipefail
          python -m venv .venv-current
          . .venv-current/bin/activate
          python -m pip install --upgrade pip packaging >/dev/null
          python -m pip install "$DIST_NAME==$BASELINE_VERSION"
          python - <<'PY2'
          import importlib.metadata as im, json, os
          dist_name = os.environ['DIST_NAME']
          top_levels = []
          version = im.version(dist_name)
          for dist in im.distributions():
              name = (dist.metadata.get('Name') or '').strip()
              if name.lower() == dist_name.lower():
                  txt = dist.read_text('top_level.txt')
                  if txt:
                      top_levels = [x.strip() for x in txt.splitlines() if x.strip()]
                  break
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"install_status=success\n")
              fh.write(f"baseline_version={version}\n")
              fh.write("top_levels_json=" + json.dumps(top_levels) + "\n")
          PY2

      - name: Get package version
        id: version
        run: |
          set -euo pipefail
          . .venv-current/bin/activate
          VERSION=$(python - <<'PY2'
          import importlib.metadata as im, os
          print(im.version(os.environ['DIST_NAME']))
          PY2
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Test 1 - Package installed
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          . .venv-current/bin/activate
          if python -m pip show "$DIST_NAME" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version metadata matches baseline
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          . .venv-current/bin/activate
          VERSION=$(python - <<'PY2'
          import importlib.metadata as im, os
          print(im.version(os.environ['DIST_NAME']))
          PY2
          )
          if [ "$VERSION" = "$BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Installed files metadata
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          . .venv-current/bin/activate
          if python - <<'PY2'
          import importlib.metadata as im, os
          files = list(im.files(os.environ['DIST_NAME']) or [])
          raise SystemExit(0 if files else 1)
          PY2
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        env:
          TOP_LEVELS_JSON: ${{ steps.install.outputs.top_levels_json || '[]' }}
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . .venv-current/bin/activate
          if python - <<'PY2'
          import json, os, importlib, importlib.metadata as im
          top_levels = json.loads(os.environ.get('TOP_LEVELS_JSON', '[]'))
          if top_levels:
              imported = False
              for mod in top_levels:
                  try:
                      importlib.import_module(mod)
                      imported = True
                      break
                  except Exception:
                      continue
              raise SystemExit(0 if imported else 1)
          files = list(im.files(os.environ['DIST_NAME']) or [])
          raise SystemExit(0 if files else 1)
          PY2
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . .venv-current/bin/activate
          CURRENT="${CURRENT_VERSION}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          LATEST=$(python - <<'PY2'
          import json, os, urllib.request
          from packaging.version import Version, InvalidVersion
          dist = os.environ['DIST_NAME']
          current = os.environ['CURRENT_VERSION']
          def is_stable(v: str) -> bool:
              s = v.lower()
              return not any(x in s for x in ['a','b','rc','dev','post'])
          try:
              current_v = Version(current)
          except InvalidVersion:
              print('lookup_failed')
              raise SystemExit(0)
          try:
              with urllib.request.urlopen(f'https://pypi.org/pypi/{dist}/json', timeout=30) as r:
                  data = json.load(r)
          except Exception:
              print('lookup_failed')
              raise SystemExit(0)
          versions = []
          for v in data.get('releases', {}).keys():
              try:
                  vv = Version(v)
              except InvalidVersion:
                  continue
              if is_stable(v) and vv > current_v:
                  versions.append(vv)
          print(str(sorted(versions)[0]) if versions else '')
          PY2
          )
          if [ "$LATEST" = "lookup_failed" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned package version $CURRENT passed smoke tests in this run, but the next PyPI regression candidate could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ -z "$LATEST" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release is available for Arm64 validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Configured baseline version $CURRENT already matches the newest stable PyPI release available for this package." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          python -m venv .venv-next
          . .venv-next/bin/activate
          python -m pip install --upgrade pip packaging >/dev/null
          if python -m pip install "$DIST_NAME==$LATEST" >/dev/null 2>&1; then
            NEXT_VERSION=$(python - <<'PY2'
            import importlib.metadata as im, os
            print(im.version(os.environ['DIST_NAME']))
            PY2
            )
            echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            if [ "$NEXT_VERSION" = "$LATEST" ]; then
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned package version $CURRENT passed smoke tests in this run, and the newer stable PyPI candidate $LATEST installed successfully on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned package version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST did not report the expected installed version on Arm64." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned package version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST could not be installed on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Cleanup
        if: always()
        run: |
          rm -rf .venv-current .venv-next || true
