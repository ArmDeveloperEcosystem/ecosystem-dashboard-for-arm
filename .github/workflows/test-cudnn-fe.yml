name: Test CuDNN FrontEnd (FE) on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cudnn-fe.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cudnn-fe.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cudnn-fe.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cudnn-fe.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cudnn-fe.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cudnn-fe.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cudnn-fe.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cudnn-fe.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cudnn-fe.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cudnn-fe.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cudnn-fe.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cudnn-fe.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cudnn-fe.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cudnn-fe.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cudnn-fe.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cudnn-fe.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cudnn-fe.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cudnn-fe.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-cudnn-fe.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cudnn-fe.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cudnn-fe.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cudnn-fe.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cudnn-fe.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cudnn-fe.outputs.timestamp }}

jobs:
  test-cudnn-fe:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.13.0"
      PACKAGE_SLUG: "cudnn-fe"
      LANE_KIND: "gpu/specialized/manual-review"
      DOWNLOAD_URL: "https://pypi.org/project/nvidia-cudnn-frontend/#history"
      HOMEPAGE_URL: "https://github.com/NVIDIA/cudnn-frontend"
      OFFICIAL_DOCS: "https://github.com/NVIDIA/cudnn-frontend#installation"
      GITHUB_REPO: "NVIDIA/cudnn-frontend"
      PACKAGE_PAGE: "content/linux/opensource_packages/cudnn-fe.md"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'CuDNN FrontEnd (FE)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          # shellcheck disable=SC2129
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cudnn-fe" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/cudnn-fe" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates g++"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          # shellcheck disable=SC2129
          set -euo pipefail
          write_output() {
            printf '%s\n' "$@" >> "$GITHUB_OUTPUT"
          }
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              write_output "resolved_tag=$RESOLVED_TAG"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              write_output "resolved_tag=default_branch"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              write_output "install_mode=github_source" "install_status=success"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            write_output "resolved_tag=external_artifact" "install_mode=external_artifact" "install_status=success"
            exit 0
          fi
          write_output "install_mode=unresolved" "install_status=failed"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ ! -f "$PACKAGE_PAGE" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline version and release alignment
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if ! grep -Fq "version_number: $BASELINE_VERSION" "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            RESOLVED="${{ steps.install.outputs.resolved_tag || '' }}"
            if [ -z "$RESOLVED" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [ "$RESOLVED" != "default_branch" ] && [ "$RESOLVED" != "$BASELINE_VERSION" ] && [ "$RESOLVED" != "v$BASELINE_VERSION" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ] || ! grep -Fq "$DOWNLOAD_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Package-specific source or docs evidence
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            FOUND_PATH=""
            for candidate in include/cudnn_frontend.h include/cudnn_frontend_version.h include/cudnn_frontend samples test/python python/cudnn pyproject.toml; do
              if [ -e "$candidate" ]; then
                FOUND_PATH="$candidate"
                break
              fi
            done
            if [ -n "$FOUND_PATH" ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "manifest=$FOUND_PATH" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ -f baseline-external/metadata.txt ]; then
              grep -Eq '^docs=https?://' baseline-external/metadata.txt
              grep -Eq '^homepage=https?://' baseline-external/metadata.txt
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "manifest=external-metadata-doc-links" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" != "github_source" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "note=cuDNN Frontend Arm preflight requires the package source checkout; metadata-only evidence is not treated as a smoke pass." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ROOT="baseline-src"
          [ "$(uname -m)" = "aarch64" ]
          [ -f "$ROOT/include/cudnn_frontend.h" ]
          [ -f "$ROOT/include/cudnn_frontend_version.h" ]
          [ -d "$ROOT/python/cudnn" ]
          grep -Fq '#include <cudnn.h>' "$ROOT/include/cudnn_frontend.h"
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT
          cat > "$TMPDIR/cudnn_frontend_version_probe.cpp" <<'CPP'
          #include <cudnn_frontend_version.h>
          #ifndef CUDNN_FRONTEND_VERSION
          #error CUDNN_FRONTEND_VERSION missing
          #endif
          int main() { return CUDNN_FRONTEND_VERSION >= 0 ? 0 : 1; }
          CPP
          g++ -std=c++17 -I"$ROOT/include" -fsyntax-only "$TMPDIR/cudnn_frontend_version_probe.cpp"
          python3 - "$ROOT" "$BASELINE_VERSION" <<'PY'
          import compileall
          import re
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          expected = sys.argv[2].lstrip("v")
          header = (root / "include/cudnn_frontend_version.h").read_text(encoding="utf-8")
          values = {}
          for name in ("MAJOR", "MINOR", "PATCH"):
              match = re.search(rf"#define\s+CUDNN_FRONTEND_{name}_VERSION\s+([0-9]+)", header)
              if not match:
                  raise SystemExit(f"missing cuDNN Frontend {name} version macro")
              values[name] = match.group(1)
          actual = ".".join(values[name] for name in ("MAJOR", "MINOR", "PATCH"))
          if actual != expected:
              raise SystemExit(f"cuDNN Frontend header version {actual} != expected {expected}")
          if not compileall.compile_dir(str(root / "python/cudnn"), quiet=1):
              raise SystemExit("compileall failed for python/cudnn")
          print(f"cudnn-frontend-preflight-ok: header version {actual} and Python sources compiled")
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=cuDNN Frontend Arm preflight passed: compiled the package version header, verified the cuDNN aggregate header boundary, and compiled python/cudnn sources on Arm64; no cuDNN library or GPU execution is claimed." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
          limited_cpu_probe: |
            set -euo pipefail
            ROOT="next-src"
            [ "$(uname -m)" = "aarch64" ]
            [ -f "$ROOT/include/cudnn_frontend.h" ]
            [ -f "$ROOT/include/cudnn_frontend_version.h" ]
            [ -d "$ROOT/python/cudnn" ]
            grep -Fq '#include <cudnn.h>' "$ROOT/include/cudnn_frontend.h"
            TMPDIR="$(mktemp -d)"
            trap 'rm -rf "$TMPDIR"' EXIT
            cat > "$TMPDIR/cudnn_frontend_version_probe.cpp" <<'CPP'
            #include <cudnn_frontend_version.h>
            #ifndef CUDNN_FRONTEND_VERSION
            #error CUDNN_FRONTEND_VERSION missing
            #endif
            int main() { return CUDNN_FRONTEND_VERSION >= 0 ? 0 : 1; }
            CPP
            g++ -std=c++17 -I"$ROOT/include" -fsyntax-only "$TMPDIR/cudnn_frontend_version_probe.cpp"
            python3 - "$ROOT" "${LATEST_VERSION:-}" <<'PY'
            import compileall
            import re
            import sys
            from pathlib import Path

            root = Path(sys.argv[1])
            expected = sys.argv[2].lstrip("v")
            header = (root / "include/cudnn_frontend_version.h").read_text(encoding="utf-8")
            values = {}
            for name in ("MAJOR", "MINOR", "PATCH"):
                match = re.search(rf"#define\s+CUDNN_FRONTEND_{name}_VERSION\s+([0-9]+)", header)
                if not match:
                    raise SystemExit(f"missing cuDNN Frontend {name} version macro")
                values[name] = match.group(1)
            actual = ".".join(values[name] for name in ("MAJOR", "MINOR", "PATCH"))
            if expected and actual != expected:
                raise SystemExit(f"cuDNN Frontend header version {actual} != expected {expected}")
            if not compileall.compile_dir(str(root / "python/cudnn"), quiet=1):
                raise SystemExit("compileall failed for python/cudnn")
            print(f"cudnn-frontend-next-preflight-ok: header version {actual} and Python sources compiled")
            PY
          limited_cpu_description: "Test 6 limited_cpu_smoke_validated: reran the cuDNN Frontend bounded Arm preflight against the next stable source candidate, compiling the package version header and python/cudnn sources while verifying the aggregate header's cuDNN runtime boundary. This is CPU-side package preflight evidence only; no cuDNN library load or GPU execution is claimed."
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          # shellcheck disable=SC2129
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          {
            echo "passed=$PASSED"
            echo "failed=$FAILED"
            echo "skipped=$SKIPPED"
            echo "duration=$DURATION"
            echo "core_failed=$CORE_FAILED"
            echo "overall_status=$OVERALL_STATUS"
            echo "badge_status=$BADGE_STATUS"
          } >> "$GITHUB_OUTPUT"
