name: Test Qdrant on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/qdrant.md'
      - '.github/workflows/test-qdrant.yml'

jobs:
  test-qdrant:
    runs-on: ubuntu-24.04-arm
    env:
      QDRANT_VERSION: "1.17.0"
      QDRANT_IMAGE: "qdrant/qdrant:v1.17.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=qdrant" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/qdrant" >> "$GITHUB_OUTPUT"

      - name: Install Qdrant
        id: install
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          sudo systemctl enable --now docker >/dev/null 2>&1 || true
          sudo docker pull --platform linux/arm64 "${QDRANT_IMAGE}"
          sudo docker image inspect "${QDRANT_IMAGE}" >/dev/null
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Qdrant version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://api.github.com/repos/qdrant/qdrant/releases/latest", timeout=20))
          print(str(data["tag_name"]).lstrip("v"))
          PY
          )
          echo "version=${QDRANT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Qdrant image exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "${QDRANT_IMAGE}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version endpoint
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cleanup() {
            sudo docker rm -f qdrant-version-test >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sudo docker rm -f qdrant-version-test >/dev/null 2>&1 || true
          sudo docker run -d --name qdrant-version-test -p 6333:6333 "${QDRANT_IMAGE}" >/dev/null
          VERSION=""
          for _ in $(seq 1 30); do
            if VERSION=$(curl -fsS http://127.0.0.1:6333/ | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])' 2>/dev/null); then
              break
            fi
            sleep 2
          done
          if [ "$VERSION" = "${QDRANT_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker logs qdrant-version-test || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check container configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker run --rm --entrypoint sh "${QDRANT_IMAGE}" -lc 'test -f /qdrant/config/production.yaml && grep -q "^service:" /qdrant/config/production.yaml'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cleanup() {
            sudo docker rm -f qdrant-functional-test >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sudo docker rm -f qdrant-functional-test >/dev/null 2>&1 || true
          sudo docker run -d --name qdrant-functional-test -p 6333:6333 "${QDRANT_IMAGE}" >/dev/null
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6333/collections >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS -X PUT http://127.0.0.1:6333/collections/arm_ci \
            -H 'Content-Type: application/json' \
            -d '{"vectors":{"size":4,"distance":"Cosine"}}' >/tmp/qdrant-create.json
          curl -fsS http://127.0.0.1:6333/collections/arm_ci >/tmp/qdrant-collection.json
          python3 - <<'PY'
          import json
          created = json.load(open('/tmp/qdrant-create.json'))
          collection = json.load(open('/tmp/qdrant-collection.json'))
          assert created["status"] == "ok"
          assert collection["result"]["config"]["params"]["vectors"]["size"] == 4
          print("qdrant-functional-ok")
          PY
          if [ $? -eq 0 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker logs qdrant-functional-test || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=already_current" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Qdrant version ${CURRENT} matches the latest stable upstream release ${LATEST}, so the workflow is already testing the newest stable Arm64 baseline." >> "$GITHUB_OUTPUT"
          else
            echo "decision=hold_current_until_regression_run" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Qdrant version ${CURRENT} was smoke-tested in this run. The newer stable upstream candidate ${LATEST} still needs an explicit side-by-side regression run before the pin is moved forward." >> "$GITHUB_OUTPUT"
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/qdrant.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Qdrant",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Rust",
              "category": "AI/ML"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Qdrant image exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version endpoint", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check container configuration", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qdrant-test-results
          path: test-results/qdrant.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Qdrant Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Current vs Next"
            echo "- Current pinned version: ${{ steps.test6.outputs.current_version || 'unknown' }}"
            echo "- Latest checked: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- Decision: ${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
            echo "- Comparison: ${{ steps.test6.outputs.comparison || 'Pending explicit regression validation.' }}"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check Qdrant image exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check version endpoint: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check container configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
