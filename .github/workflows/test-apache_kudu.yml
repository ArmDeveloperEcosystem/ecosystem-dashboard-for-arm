#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Apache Kudu placeholders with your package name (e.g., "Redis")
# 3. Replace all apache_kudu placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
