name: Test Apache Kudu on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-apache_kudu.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-apache_kudu.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-apache_kudu.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-apache_kudu.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-apache_kudu.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-apache_kudu.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-apache_kudu.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-apache_kudu.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-apache_kudu.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-apache_kudu.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-apache_kudu.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-apache_kudu.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-apache_kudu.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-apache_kudu.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-apache_kudu.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-apache_kudu.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-apache_kudu.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-apache_kudu.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-apache_kudu.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-apache_kudu.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-apache_kudu.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-apache_kudu.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-apache_kudu.outputs.timestamp }}
jobs:
  test-apache_kudu:
    runs-on: ubuntu-24.04-arm
    env:
      KUDU_BASELINE_VERSION: "1.17.0"
      KUDU_NEXT_VERSION: "1.17.1"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache Kudu'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=apache_kudu" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/apache_kudu" >> "$GITHUB_OUTPUT"
      - name: Install Apache Kudu (Source Check)
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "git g++ file"
          echo "Cloning Apache Kudu repository..."
          git clone --branch "${KUDU_BASELINE_VERSION}" --depth 1 https://github.com/apache/kudu.git
          
          if [ -d "kudu" ]; then
            echo "Apache Kudu source cloned successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "Apache Kudu source clone failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Apache Kudu version
        id: version
        run: |
          cd kudu
          VERSION=$(git describe --tags --always | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Apache Kudu version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check README
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd kudu
          
          if [ -f "README.adoc" ] || [ -f "README.md" ]; then
            echo "✓ README found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ README not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Build Files
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd kudu
          
          if [ -f "CMakeLists.txt" ]; then
            echo "✓ CMakeLists.txt found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ CMakeLists.txt not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Source Structure
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd kudu
          
          if [ -d "src" ] && [ -d "src/kudu" ]; then
            echo "✓ Source directory structure valid"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Source directory structure invalid"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Compile and Run Arm64 Atomic Probe
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd kudu

          cat > /tmp/kudu-arm64-atomic-smoke.cc <<'EOF_CPP'
          #include <cstdint>
          #include <iostream>
          #include "kudu/gutil/atomicops.h"

          int main() {
            volatile base::subtle::Atomic64 value = 41;
            base::subtle::MemoryBarrier();
            base::subtle::Atomic64 result = base::subtle::NoBarrier_AtomicIncrement(&value, 1);
            std::cout << result << std::endl;
            return result == 42 ? 0 : 1;
          }
          EOF_CPP

          g++ -std=c++17 -Isrc /tmp/kudu-arm64-atomic-smoke.cc -o /tmp/kudu-arm64-atomic-smoke
          OUTPUT=$(/tmp/kudu-arm64-atomic-smoke)

          if [ "$OUTPUT" = "42" ] && file /tmp/kudu-arm64-atomic-smoke | grep -qiE 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file /tmp/kudu-arm64-atomic-smoke || true
            echo "Arm64 atomic smoke output: ${OUTPUT:-<empty>}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${KUDU_BASELINE_VERSION}"
          LATEST_VERSION="${KUDU_NEXT_VERSION}"
          NEXT_INSTALLED_VERSION="not_installed"
          DECISION="next_install_failed"
          REGRESSION_RESULT="Next version install failed on Arm64"
          COMPARISON=""

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${LATEST_VERSION}"

          WORKDIR=$(mktemp -d)
          git clone --branch "${LATEST_VERSION}" --depth 1 https://github.com/apache/kudu.git "${WORKDIR}/kudu-next"

          if [ -f "${WORKDIR}/kudu-next/README.adoc" ] || [ -f "${WORKDIR}/kudu-next/README.md" ]; then
            cat > /tmp/kudu-next-arm64-atomic-smoke.cc <<'EOF_CPP'
          #include <cstdint>
          #include <iostream>
          #include "kudu/gutil/atomicops.h"

          int main() {
            volatile base::subtle::Atomic64 value = 41;
            base::subtle::MemoryBarrier();
            base::subtle::Atomic64 result = base::subtle::NoBarrier_AtomicIncrement(&value, 1);
            std::cout << result << std::endl;
            return result == 42 ? 0 : 1;
          }
          EOF_CPP
            if [ -f "${WORKDIR}/kudu-next/CMakeLists.txt" ] && [ -d "${WORKDIR}/kudu-next/src/kudu" ] && \
               g++ -std=c++17 -I"${WORKDIR}/kudu-next/src" /tmp/kudu-next-arm64-atomic-smoke.cc -o /tmp/kudu-next-arm64-atomic-smoke && \
               [ "$(/tmp/kudu-next-arm64-atomic-smoke)" = "42" ] && \
               file /tmp/kudu-next-arm64-atomic-smoke | grep -qiE 'aarch64|arm64'; then
              NEXT_INSTALLED_VERSION="${LATEST_VERSION}"
              DECISION="next_install_validated"
              REGRESSION_RESULT="Next version installed successfully on Arm64"
              COMPARISON="Apache Kudu baseline ${CURRENT_VERSION} compiled and ran an Arm64 atomic operations probe. Regression validation cloned candidate ${LATEST_VERSION} on Arm64 and compiled/ran the same Kudu atomic probe successfully."
              echo "status=passed" >> $GITHUB_OUTPUT
            else
              COMPARISON="Apache Kudu candidate ${LATEST_VERSION} cloned on Arm64 but did not preserve the expected source layout or failed the Arm64 atomic compile/run probe."
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            COMPARISON="Apache Kudu candidate ${LATEST_VERSION} cloned on Arm64 but did not expose the expected README content in the source tree."
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "latest_version=${LATEST_VERSION}" >> $GITHUB_OUTPUT
          echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> $GITHUB_OUTPUT
          echo "decision=${DECISION}" >> $GITHUB_OUTPUT
          echo "regression_result=${REGRESSION_RESULT}" >> $GITHUB_OUTPUT
          echo "comparison=${COMPARISON}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || 'n/a' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'n/a' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'n/a' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'n/a' }}"
          
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          
          # Check README
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          
          # Check Build Files
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          
          # Check Source Structure
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          
          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          
          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT
          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT
          
          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi

          if [ $CORE_FAILED -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Apache Kudu Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check README: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Build Files: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Source Structure: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version:** ${{ steps.test6.outputs.current_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version:** ${{ steps.test6.outputs.latest_version || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next installed version:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.test6.outputs.regression_result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
