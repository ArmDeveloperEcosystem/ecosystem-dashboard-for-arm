name: Test EMQX on Arm64

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/emqx.md'
      - '.github/workflows/test-emqx.yml'

jobs:
  test-emqx:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=emqx" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/emqx" >> "$GITHUB_OUTPUT"

      - name: Install EMQX
        id: install
        run: |
          set -euo pipefail
          EMQX_VERSION="5.8.3"
          EMQX_URL="https://www.emqx.com/en/downloads/broker/v${EMQX_VERSION}/emqx-${EMQX_VERSION}-ubuntu24.04-arm64.tar.gz"
          EMQX_HOME="$GITHUB_WORKSPACE/emqx"

          rm -rf "$EMQX_HOME" emqx.tar.gz
          curl -fLsS -o emqx.tar.gz "$EMQX_URL"
          mkdir -p "$EMQX_HOME"
          tar -xzf emqx.tar.gz -C "$EMQX_HOME"

          if [ ! -x "$EMQX_HOME/bin/emqx" ] || [ ! -x "$EMQX_HOME/bin/emqx_ctl" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "EMQX_VERSION=$EMQX_VERSION" >> "$GITHUB_ENV"
          echo "EMQX_HOME=$EMQX_HOME" >> "$GITHUB_ENV"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get EMQX version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(awk -F '[{},"]+' '/{release,/{print $4; exit}' "$EMQX_HOME/releases/emqx.rel")
          if [ -z "$VERSION" ]; then
            VERSION="$EMQX_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Broker Binaries
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -x "$EMQX_HOME/bin/emqx" ] && [ -x "$EMQX_HOME/bin/emqx_ctl" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if awk -F '[{},"]+' '/{release,/{print $4; exit}' "$EMQX_HOME/releases/emqx.rel" | grep -q "^${EMQX_VERSION}$"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Configuration Layout
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -f "$EMQX_HOME/etc/emqx.conf" ] && [ -f "$EMQX_HOME/etc/base.hocon" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -R "$EMQX_HOME/etc" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          cleanup() {
            "$EMQX_HOME/bin/emqx" stop >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          "$EMQX_HOME/bin/emqx" start > emqx-start.log 2>&1 || true

          STATUS=""
          for _ in $(seq 1 20); do
            STATUS=$("$EMQX_HOME/bin/emqx" ctl status 2>&1 || true)
            if echo "$STATUS" | grep -q "${EMQX_VERSION} is started"; then
              break
            fi
            sleep 2
          done

          if echo "$STATUS" | grep -q "${EMQX_VERSION} is started"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat emqx-start.log || true
            echo "$STATUS"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cleanup
          trap - EXIT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || '5.8.3' }}"
          LATEST_VERSION=$(GH_TOKEN=${{ github.token }} gh api repos/emqx/emqx/releases --jq 'map(select(.prerelease == false and .draft == false and (.tag_name | test("^v5\\.[0-9]+\\.[0-9]+$"))))[0].tag_name' 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="5.8.9"
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "next_installed_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=already_at_latest" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned EMQX version ${CURRENT_VERSION} passed smoke tests in this run and already matches the latest stable open-source Arm64 tarball." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_HOME="$GITHUB_WORKSPACE/emqx-regression"
          NEXT_TAR="$GITHUB_WORKSPACE/emqx-regression.tar.gz"
          NEXT_URL="https://www.emqx.com/en/downloads/broker/v${LATEST_VERSION}/emqx-${LATEST_VERSION}-ubuntu24.04-arm64.tar.gz"
          rm -rf "$NEXT_HOME" "$NEXT_TAR"

          if curl -fLsS -o "$NEXT_TAR" "$NEXT_URL"; then
            mkdir -p "$NEXT_HOME"
            tar -xzf "$NEXT_TAR" -C "$NEXT_HOME"
            if [ -x "$NEXT_HOME/bin/emqx" ] && [ -f "$NEXT_HOME/releases/emqx.rel" ]; then
              NEXT_INSTALLED_VERSION=$(awk -F '[{},"]+' '/{release,/{print $4; exit}' "$NEXT_HOME/releases/emqx.rel" || true)
              if [ -n "$NEXT_INSTALLED_VERSION" ]; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned EMQX version ${CURRENT_VERSION} passed smoke tests in this run. Regression validation installed candidate version ${LATEST_VERSION} on Arm64, and the extracted tarball reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned EMQX version ${CURRENT_VERSION} passed smoke tests in this run, but the candidate ${LATEST_VERSION} did not report a usable installed version on Arm64." >> "$GITHUB_OUTPUT"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned EMQX version ${CURRENT_VERSION} passed smoke tests in this run, but the candidate ${LATEST_VERSION} did not extract a usable Arm64 installation." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned EMQX version ${CURRENT_VERSION} passed smoke tests in this run, but the candidate ${LATEST_VERSION} could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/emqx.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "EMQX",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Erlang",
              "category": "Messaging/Comms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check Broker Binaries",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check Version Output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check Configuration Layout",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emqx-test-results
          path: test-results/emqx.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## EMQX Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Broker Binaries: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Configuration Layout: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> "$GITHUB_STEP_SUMMARY"
