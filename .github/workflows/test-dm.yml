name: Test Data Model (DM) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-dm.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-dm.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-dm.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-dm.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-dm.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-dm.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-dm.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-dm.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-dm.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-dm.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-dm.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-dm.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-dm.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-dm.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-dm.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-dm.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-dm.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-dm.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-dm.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-dm.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-dm.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-dm.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-dm.outputs.timestamp }}
jobs:
  test-dm:
    runs-on: ubuntu-24.04-arm
    env:
      DM_VERSION: "1.0.11"
      DM_NEXT_VERSION: "1.0.12"
      DM_LIB: "/tmp/dm-r-lib"
      DM_NEXT_LIB: "/tmp/dm-r-lib-next"
      DM_USER_LIB: "/tmp/dm-r-user-lib"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Data Model (DM)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=dm" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/dm" >> "$GITHUB_OUTPUT"
      - name: Install DM
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y r-base build-essential libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev

          rm -rf "${DM_LIB}" "${DM_NEXT_LIB}" "${DM_USER_LIB}"
          mkdir -p "${DM_LIB}" "${DM_NEXT_LIB}" "${DM_USER_LIB}"

          Rscript -e '.libPaths(c(Sys.getenv("DM_USER_LIB"), .libPaths())); install.packages("remotes", repos = "https://cloud.r-project.org", lib = Sys.getenv("DM_USER_LIB"))'
          Rscript - <<'RS'
          dir.create(Sys.getenv("DM_LIB"), showWarnings = FALSE, recursive = TRUE)
          dir.create(Sys.getenv("DM_USER_LIB"), showWarnings = FALSE, recursive = TRUE)
          .libPaths(c(Sys.getenv("DM_LIB"), Sys.getenv("DM_USER_LIB"), .libPaths()))
          remotes::install_url(
            url = sprintf("https://github.com/cynkra/dm/archive/refs/tags/v%s.tar.gz", Sys.getenv("DM_VERSION")),
            lib = Sys.getenv("DM_LIB"),
            upgrade = "never",
            quiet = TRUE,
            dependencies = c("Depends", "Imports")
          )
          RS

          if [ -f "${DM_LIB}/dm/DESCRIPTION" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get DM version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(Rscript -e '.libPaths(c(Sys.getenv("DM_LIB"), Sys.getenv("DM_USER_LIB"), .libPaths())); cat(as.character(packageVersion("dm")))' | tr -d '\n' || echo "unknown")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected DM version: ${VERSION}"

      - name: Test 1 - Package existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "${DM_LIB}/dm/DESCRIPTION" ] && command -v Rscript >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Exact version check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(Rscript -e '.libPaths(c(Sys.getenv("DM_LIB"), Sys.getenv("DM_USER_LIB"), .libPaths())); cat(as.character(packageVersion("dm")))' | tr -d '\n')
          if [ "${VERSION_OUTPUT}" = "${DM_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${VERSION_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          HELP_OUTPUT=$(Rscript -e '.libPaths(c(Sys.getenv("DM_LIB"), Sys.getenv("DM_USER_LIB"), .libPaths())); library(help = "dm")' 2>&1)
          if printf '%s\n' "${HELP_OUTPUT}" | grep -qi "Information on package"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${HELP_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          OUTPUT=$(Rscript - <<'RS'
          .libPaths(c(Sys.getenv("DM_LIB"), Sys.getenv("DM_USER_LIB"), .libPaths()))
          suppressPackageStartupMessages(library(dm))
          obj <- dm::dm(iris = iris, mtcars = mtcars)
          stopifnot(inherits(obj, "dm"))
          cat("dm_ok\n")
          RS
          )
          if printf '%s\n' "${OUTPUT}" | grep -q "dm_ok"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Data Model (DM) Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Package existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Exact version check: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
