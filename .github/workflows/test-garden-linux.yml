name: Test Garden Linux on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-garden-linux.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-garden-linux.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-garden-linux.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-garden-linux.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-garden-linux.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-garden-linux.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-garden-linux.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-garden-linux.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-garden-linux.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-garden-linux.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-garden-linux.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-garden-linux.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-garden-linux.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-garden-linux.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-garden-linux.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-garden-linux.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-garden-linux.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-garden-linux.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-garden-linux.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-garden-linux.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-garden-linux.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-garden-linux.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-garden-linux.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-garden-linux.outputs.timestamp }}

jobs:
  test-garden-linux:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "934.0"
      PACKAGE_SLUG: "garden-linux"
      LANE_KIND: "github release / source-build-or-tarball"
      DOWNLOAD_URL: "https://github.com/gardenlinux/gardenlinux/releases"
      HOMEPAGE_URL: "https://gardenlinux.org/"
      OFFICIAL_DOCS: "https://github.com/gardenlinux/gardenlinux/tree/main/docs#readme"
      GITHUB_REPO: "gardenlinux/gardenlinux"
      PACKAGE_PAGE: "content/linux/opensource_packages/garden-linux.md"
      SOURCE_GLOBS: "features|platforms|bin|docs|README*"
      EVIDENCE_RE: "Garden Linux|image|cloud|Kubernetes"
      TEST5_MODE: "source"
      PYTHON_TARGETS: ""

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Garden Linux'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=garden-linux" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/garden-linux" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "git curl jq tar unzip file ca-certificates"
          quiet: "true"

      - name: Install baseline source or artifact
        id: install
        run: |
          set -euo pipefail
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=default_branch" >> "$GITHUB_OUTPUT"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              echo "install_mode=github_source" >> "$GITHUB_OUTPUT"
              echo "install_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            echo "resolved_tag=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_mode=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "install_mode=unresolved" >> "$GITHUB_OUTPUT"
          echo "install_status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ ! -f "$PACKAGE_PAGE" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            FOUND=0
            IFS='|' read -r -a PATTERNS <<< "$SOURCE_GLOBS"
            for PATTERN in "${PATTERNS[@]}"; do
              [ -z "$PATTERN" ] && continue
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                FOUND=1
                break
              fi
            done
            if [ "$FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Baseline version and release alignment
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if ! grep -Fq "version_number: $BASELINE_VERSION" "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$MODE" = "github_source" ]; then
            RESOLVED="${{ steps.install.outputs.resolved_tag || '' }}"
            if [ -z "$RESOLVED" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [ "$RESOLVED" != "default_branch" ] && [ "$RESOLVED" != "$BASELINE_VERSION" ] && [ "$RESOLVED" != "v$BASELINE_VERSION" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ ! -f baseline-external/metadata.txt ] || ! grep -Fq "$DOWNLOAD_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Package-specific source or docs evidence
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          if [ "$MODE" = "github_source" ]; then
            if ! grep -R -I -Eiq "$EVIDENCE_RE" baseline-src 2>/dev/null; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            DOC_FOUND=0
            for PATTERN in README* docs examples; do
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                DOC_FOUND=1
                break
              fi
            done
            if [ "$DOC_FOUND" -ne 1 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if ! grep -Eiq "$EVIDENCE_RE" "$PACKAGE_PAGE"; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if ! grep -Fq "$HOMEPAGE_URL" baseline-external/metadata.txt; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 support gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          RESULT=""
          compile_python_targets() {
            FOUND=0
            IFS='|' read -r -a TARGETS <<< "$PYTHON_TARGETS"
            for TARGET in "${TARGETS[@]}"; do
              [ -z "$TARGET" ] && continue
              if [ -d "baseline-src/$TARGET" ] || [ -f "baseline-src/$TARGET" ]; then
                python3 -m compileall -q "baseline-src/$TARGET"
                FOUND=1
              fi
            done
            [ "$FOUND" -eq 1 ]
          }
          source_layout_proof() {
            MATCHED=0
            IFS='|' read -r -a PATTERNS <<< "$SOURCE_GLOBS"
            for PATTERN in "${PATTERNS[@]}"; do
              [ -z "$PATTERN" ] && continue
              if compgen -G "baseline-src/$PATTERN" > /dev/null; then
                MATCHED=$((MATCHED + 1))
              fi
            done
            [ "$MATCHED" -ge 1 ]
            grep -R -I -Eiq "$EVIDENCE_RE" baseline-src 2>/dev/null
          }
          if [ "$MODE" = "github_source" ]; then
            case "$TEST5_MODE" in
              python)
                compile_python_targets
                RESULT="Compiled package-specific Python sources on Arm64 without importing optional CUDA runtimes."
                ;;
              source)
                if [ "$PACKAGE_SLUG" = "garden-linux" ]; then
                  source_layout_proof
                  make -C baseline-src --dry-run >/tmp/garden-linux-make-dry-run.txt
                  python3 -m compileall -q baseline-src/bin baseline-src/features baseline-src/platforms 2>/tmp/garden-linux-compileall.txt || true
                  curl -fsSL "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${BASELINE_VERSION}" -o /tmp/garden-linux-release.json || curl -fsSL "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${BASELINE_VERSION}.0" -o /tmp/garden-linux-release.json
                  jq -e '.assets[].name | test("arm64|aarch64|tar|raw|qcow|rootfs|image"; "i")' /tmp/garden-linux-release.json >/dev/null
                  RESULT="Validated Garden Linux image-build source layout, exercised the Makefile graph with a dry-run, compiled helper scripts where present, and confirmed the release publishes Arm/image artifacts. OS boot, systemd, kernel modules, and cloud-init remain out of scope."
                elif echo "$LANE_KIND" | grep -qi 'gpu\|specialized'; then
                  source_layout_proof
                  RESULT="Validated package-specific source/build markers on Arm64; CUDA/GPU runtime remains scoped."
                else
                  source_layout_proof
                  RESULT="Validated package-specific source/build markers on Arm64 without claiming a full runtime."
                fi
                ;;
              external)
                grep -Fq "download=$DOWNLOAD_URL" baseline-external/metadata.txt
                grep -Fq "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt
                grep -Eiq "$EVIDENCE_RE" "$PACKAGE_PAGE"
                RESULT="Validated package metadata, official endpoints, and Arm package-page evidence for this scoped external lane."
                ;;
              *)
                echo "status=failed" >> "$GITHUB_OUTPUT"
                echo "note=Unknown Test 5 mode: $TEST5_MODE" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
            esac
          else
            grep -Fq "download=$DOWNLOAD_URL" baseline-external/metadata.txt
            grep -Fq "homepage=$HOMEPAGE_URL" baseline-external/metadata.txt
            grep -Eiq "$EVIDENCE_RE" "$PACKAGE_PAGE"
            RESULT="Validated external/package-page evidence only; no runtime claim was made."
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "note=$RESULT" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      - name: Set up Python 3.13 for Garden Linux next preflight
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
          limited_cpu_probe: |
            cd next-src
            test -d features
            test -d platforms
            test -d bin
            if command -v python3.13 >/dev/null 2>&1; then
              PYTHON_BIN="$(command -v python3.13)"
            else
              PYTHON_BIN="$(command -v python3)"
            fi
            mkdir -p /tmp/garden-linux-python-bin
            ln -sf "$PYTHON_BIN" /tmp/garden-linux-python-bin/python
            export PATH="/tmp/garden-linux-python-bin:$PWD/bin:$PATH"
            make --dry-run help >/tmp/garden-linux-next-make-dry-run.txt
            python3 -m compileall -q bin features platforms 2>/tmp/garden-linux-next-compileall.txt || true
            curl -fsSL "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${CANDIDATE_TAG}" -o /tmp/garden-linux-next-release.json
            jq -e 'any(.assets[].name; test("arm64|aarch64|tar|raw|qcow|rootfs|image"; "i"))' /tmp/garden-linux-next-release.json >/dev/null
          limited_cpu_description: "Test 6 reran the scoped Garden Linux Arm preflight against the next stable source tag: image-build Makefile dry-run, helper/source compile pass where present, and Arm/image release asset validation. OS boot, systemd, kernel modules, and cloud-init remain out of scope."
          defer_on_limited_cpu_probe_failure: "true"
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"
