name: Test Predixy on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-predixy.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-predixy.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-predixy.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-predixy.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-predixy.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-predixy.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-predixy.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-predixy.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-predixy.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-predixy.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-predixy.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-predixy.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-predixy.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-predixy.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-predixy.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-predixy.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-predixy.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-predixy.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-predixy.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-predixy.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-predixy.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-predixy.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-predixy.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/predixy.md"
      - ".github/workflows/test-predixy.yml"

jobs:
  test-predixy:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Predixy'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=predixy" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/predixy" >> "$GITHUB_OUTPUT"
          echo "current_version=7.0.1" >> "$GITHUB_OUTPUT"
      - name: Install Predixy
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git build-essential libssl-dev pkg-config redis-server redis-tools
          cd /tmp
          rm -rf predixy
          git clone --depth 1 --branch "${{ steps.metadata.outputs.current_version }}" https://github.com/joyieldInc/predixy.git
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/predixy/src/String.h')
          text = p.read_text()
          if '#include <ctime>' not in text:
            p.write_text(text.replace('#include <string>\n', '#include <string>\n#include <ctime>\n'))
          PY
          cd /tmp/predixy
          make
          install -m 0755 src/predixy /usr/local/bin/predixy
          if command -v predixy >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Predixy version
        id: version
        run: |
          echo "version=${{ steps.metadata.outputs.current_version }}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ steps.metadata.outputs.current_version }}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v predixy >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if predixy -v 2>&1 | grep -q 'predixy-'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if predixy -h >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat > /tmp/redis6379.conf <<'EOF'
          port 6379
          bind 127.0.0.1
          save ""
          appendonly no
          protected-mode no
          EOF
          redis-server /tmp/redis6379.conf --daemonize yes
          predixy /tmp/predixy/conf/predixy.conf >/tmp/predixy.log 2>&1 &
          PID=$!
          sleep 2
          if redis-cli -p 7617 info | grep -q '^# Server'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            kill $PID || true
            redis-cli -p 6379 shutdown nosave >/dev/null 2>&1 || true
            exit 1
          fi
          kill $PID || true
          redis-cli -p 6379 shutdown nosave >/dev/null 2>&1 || true
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || steps.metadata.outputs.current_version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: ${LATEST:-unknown}"

          if [ -z "${LATEST:-}" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Predixy release tag $CURRENT passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"; redis-cli -p 6379 shutdown nosave >/dev/null 2>&1 || true' EXIT
          git clone --depth 1 --branch "$LATEST" https://github.com/joyieldInc/predixy.git "$TMP_DIR/predixy" >/tmp/predixy-regression-clone.log 2>&1
          python3 - <<'PY'
          from pathlib import Path
          p = Path("'$TMP_DIR'/predixy/src/String.h".replace("'$TMP_DIR'", Path("$TMP_DIR").as_posix()))
          text = p.read_text()
          if '#include <ctime>' not in text:
              p.write_text(text.replace('#include <string>\n', '#include <string>\n#include <ctime>\n'))
          PY
          make -C "$TMP_DIR/predixy" -j2 >/tmp/predixy-regression-build.log 2>&1
          NEXT_BIN="$TMP_DIR/predixy/src/predixy"
          NEXT_INSTALLED_VERSION=$("$NEXT_BIN" -v 2>&1 | sed -n 's/.*predixy-\([0-9.]\+\).*/\1/p' | head -n 1)
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Predixy release tag $CURRENT passed smoke tests in this run, but the candidate release tag $LATEST did not report a usable embedded version on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: unknown"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cat > /tmp/redis6379.conf <<'EOF'
          port 6379
          bind 127.0.0.1
          save ""
          appendonly no
          protected-mode no
          EOF
          redis-server /tmp/redis6379.conf --daemonize yes
          "$NEXT_BIN" "$TMP_DIR/predixy/conf/predixy.conf" >/tmp/predixy-regression.log 2>&1 &
          PID=$!
          sleep 2
          if ! redis-cli -p 7617 info >/tmp/predixy-regression-info.log 2>&1 || ! grep -q '^# Server' /tmp/predixy-regression-info.log; then
            cat /tmp/predixy-regression.log || true
            cat /tmp/predixy-regression-info.log || true
            kill "$PID" >/dev/null 2>&1 || true
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Predixy release tag $CURRENT passed smoke tests in this run, but the candidate release tag $LATEST did not pass the Redis proxy smoke path on Arm64. The built binary self-reported version $NEXT_INSTALLED_VERSION." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          kill "$PID" >/dev/null 2>&1 || true
          redis-cli -p 6379 shutdown nosave >/dev/null 2>&1 || true

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ] || [ "$CURRENT" = "$NEXT_INSTALLED_VERSION" ]; then
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Predixy release tag $CURRENT already matches the newest public stable Predixy release. Tests 1-5 validate the real Arm64 source build and Redis proxy smoke path, but there is no newer stable upstream candidate for a genuine Test 6 upgrade check." >> "$GITHUB_OUTPUT"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Predixy release tag $CURRENT passed smoke tests in this run. Regression validation rebuilt candidate release tag $LATEST on Arm64, and the resulting binary self-reported version $NEXT_INSTALLED_VERSION while passing the Redis proxy smoke path. Upstream release tags and embedded binary version strings do not currently match for Predixy." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
          fi
          {
            echo "## Predixy Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.metadata.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Predixy tag 7.0.1 still prints the internal runtime banner predixy-1.0.5; this workflow tracks the release tag for version alignment and the runtime banner for execution proof.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
