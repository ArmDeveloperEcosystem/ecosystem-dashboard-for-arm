name: Test Android-Cuttlefish on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cuttlefish.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cuttlefish.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cuttlefish.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cuttlefish.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cuttlefish.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cuttlefish.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cuttlefish.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cuttlefish.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cuttlefish.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cuttlefish.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cuttlefish.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cuttlefish.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cuttlefish.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cuttlefish.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cuttlefish.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-cuttlefish.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cuttlefish.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cuttlefish.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cuttlefish.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cuttlefish.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cuttlefish.outputs.timestamp }}
jobs:
  test-cuttlefish:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      BASELINE_VERSION: "1.26.0"
      NEXT_VERSION: "1.27.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Android-Cuttlefish'
      package_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BASELINE_VERSION }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'not_applicable' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cuttlefish" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cuttlefish" >> "$GITHUB_OUTPUT"
      - name: Register official Cuttlefish apt repository
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://us-apt.pkg.dev/doc/repo-signing-key.gpg \
            | sudo gpg --dearmor -o /etc/apt/keyrings/android-cuttlefish.gpg
          printf 'deb [signed-by=/etc/apt/keyrings/android-cuttlefish.gpg] https://us-apt.pkg.dev/projects/android-cuttlefish-artifacts android-cuttlefish main\n' \
            | sudo tee /etc/apt/sources.list.d/android-cuttlefish.list >/dev/null

      - name: Install baseline Cuttlefish packages
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get clean
          sudo rm -rf /var/cache/apt/archives/*
          sudo apt-get update
          sudo apt-get install -y \
            bridge-utils \
            curl \
            dnsmasq-base \
            f2fs-tools \
            net-tools \
            qemu-user-static

          for pkg in cuttlefish-base cuttlefish-user cuttlefish-orchestration; do
            if ! apt-cache madison "$pkg" | awk -v want="$BASELINE_VERSION" '$3 == want { found=1 } END { exit(found ? 0 : 1) }'; then
              echo "Baseline package ${pkg}=${BASELINE_VERSION} is not available in the official Android Cuttlefish arm64 apt repository."
              echo "install_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          done

          sudo apt-get install -y \
            "cuttlefish-base=${BASELINE_VERSION}" \
            "cuttlefish-user=${BASELINE_VERSION}" \
            "cuttlefish-orchestration=${BASELINE_VERSION}"

          if [ -x /usr/lib/cuttlefish-common/bin/cvd ] && command -v cvd >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Android-Cuttlefish versions
        id: version
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(dpkg-query -W -f='${Version}' cuttlefish-base)

          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=not_applicable" >> "$GITHUB_OUTPUT"
          echo "Detected Android-Cuttlefish baseline version: $CURRENT_VERSION"
          echo "Detected regression applicability: package manager installed"

      - name: Test 1 - Check cvd binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if command -v cvd >/dev/null 2>&1 && [ -x /usr/lib/cuttlefish-common/bin/cvd ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Installed Package Version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          INSTALLED_VERSION=$(dpkg-query -W -f='${Version}' cuttlefish-base)

          if [ "$INSTALLED_VERSION" = "${BASELINE_VERSION}" ] && [ "$INSTALLED_VERSION" = "${{ steps.version.outputs.version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check cvd help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if cvd help >/tmp/cvd-help.txt 2>&1 && grep -Eqi 'usage: cvd|Cuttlefish Virtual Device' /tmp/cvd-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/cvd-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Host Resource Files
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -x /etc/init.d/cuttlefish-host-resources ] \
            && [ -f /lib/udev/rules.d/60-cuttlefish-base.rules ] \
            && [ -f /etc/modules-load.d/cuttlefish-common.conf ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l /etc/init.d/cuttlefish-host-resources /lib/udev/rules.d/60-cuttlefish-base.rules /etc/modules-load.d/cuttlefish-common.conf 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ] && file /usr/lib/cuttlefish-common/bin/cvd | grep -Eqi 'ARM aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file /usr/lib/cuttlefish-common/bin/cvd || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression applicability
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable because Cuttlefish was installed from the official Android Cuttlefish arm64 apt repository." >> "$GITHUB_OUTPUT"
          echo "comparison=Tests 1-5 validated the official Android Cuttlefish arm64 apt packages at version ${CURRENT_VERSION}. Under the production package-manager policy, Test 6 is intentionally skipped rather than forcing a next-version upgrade in the same workflow." >> "$GITHUB_OUTPUT"
          echo "regression_policy=package_manager_installed" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            local core=$3
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            else
              SKIPPED=$((SKIPPED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" yes
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" yes
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" yes
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" yes
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" yes
          check_test "$TEST6_STATUS" "${{ steps.test6.outputs.duration || 0 }}" no

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ] || [ "$PASSED" -eq 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable release available for Test 6"
                ;;
              baseline_failed)
                REGRESSION_RESULT="Regression validation skipped because one or more baseline tests (1-5) failed."
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Android-Cuttlefish Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ steps.version.outputs.version || env.BASELINE_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Skipped:** ${{ steps.summary.outputs.skipped || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Debian Package Artifact: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Installed Package Version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Capability Query Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Host Resource Files: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BASELINE_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
