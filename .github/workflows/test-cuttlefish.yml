name: Test Android-Cuttlefish on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cuttlefish.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cuttlefish.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cuttlefish.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cuttlefish.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cuttlefish.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cuttlefish.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cuttlefish.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cuttlefish.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cuttlefish.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cuttlefish.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cuttlefish.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cuttlefish.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cuttlefish.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cuttlefish.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cuttlefish.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cuttlefish.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-cuttlefish.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cuttlefish.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cuttlefish.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cuttlefish.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cuttlefish.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cuttlefish.outputs.timestamp }}
jobs:
  test-cuttlefish:
    runs-on: ubuntu-24.04-arm
    # Cuttlefish source packaging is a large Bazel-backed Debian build on Arm64.
    # Give both the baseline build and a possible Test 6 candidate build enough room.
    timeout-minutes: 180
    env:
      BASELINE_VERSION: "1.12.0"
      NEXT_VERSION: "1.13.0"
      BAZELISK_VERSION: "v1.19.0"
      USE_BAZEL_VERSION: "8.4.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Android-Cuttlefish'
      package_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || env.BASELINE_VERSION }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cuttlefish" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cuttlefish" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            devscripts \
            equivs \
            config-package-dev \
            debhelper-compat \
            golang-go \
            curl \
            bridge-utils \
            dnsmasq-base \
            f2fs-tools \
            net-tools \
            qemu-user-static
          if ! command -v java >/dev/null 2>&1; then
            sudo apt-get install -y openjdk-21-jdk-headless
          fi
          sudo curl -fsSL "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-arm64" -o /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel
          # dpkg-buildpackage sanitizes PATH; keep bazel visible in /usr/bin as well.
          sudo ln -sf /usr/local/bin/bazel /usr/bin/bazel
          echo "Configured USE_BAZEL_VERSION=${USE_BAZEL_VERSION}"
          bazel --version

      - name: Build and install baseline Cuttlefish package
        id: install
        run: |
          set -euo pipefail
          BASELINE_TAG="v${BASELINE_VERSION}"
          BUILD_ROOT=$(mktemp -d)
          git clone --depth 1 --branch "$BASELINE_TAG" https://github.com/google/android-cuttlefish.git "$BUILD_ROOT/src"
          pushd "$BUILD_ROOT/src/base"
          perl -0pi -e 's/libtinfo5,/libtinfo6 | libtinfo5,/g' debian/control
          sudo apt-get install -y \
            build-essential \
            cmake \
            config-package-dev \
            debhelper-compat \
            libaom-dev \
            libclang-dev \
            libcurl4-openssl-dev \
            libfmt-dev \
            libgflags-dev \
            libgoogle-glog-dev \
            libgtest-dev \
            libjsoncpp-dev \
            liblzma-dev \
            libopus-dev \
            libprotobuf-c-dev \
            libprotobuf-dev \
            libsrtp2-dev \
            libssl-dev \
            libtinfo6 \
            libxml2-dev \
            libz3-dev \
            nasm \
            pkgconf \
            protobuf-compiler \
            uuid-dev \
            xxd
          pushd "$BUILD_ROOT/src/base/cvd"
          bazel build //:build_compilation_mode_txt
          popd
          timeout 5400 env PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" dpkg-buildpackage -uc -us -b
          popd

          BASELINE_DEB=$(find "$BUILD_ROOT/src" -maxdepth 1 -name 'cuttlefish-base_*_arm64.deb' | head -n 1)
          if [ -z "$BASELINE_DEB" ]; then
            echo "No Arm64 cuttlefish-base package was built for ${BASELINE_TAG}."
            exit 1
          fi

          sudo dpkg -i "$BASELINE_DEB" || sudo apt-get -f install -y

          echo "install_status=success" >> "$GITHUB_OUTPUT"
          echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
          echo "baseline_deb=$BASELINE_DEB" >> "$GITHUB_OUTPUT"

      - name: Get Android-Cuttlefish versions
        id: version
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(dpkg-query -W -f='${Version}' cuttlefish-base)

          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Android-Cuttlefish baseline version: $CURRENT_VERSION"
          echo "Detected Android-Cuttlefish next version: ${NEXT_VERSION}"

      - name: Test 1 - Check Debian Package Artifact
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -f "${{ steps.install.outputs.baseline_deb }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Installed Package Version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          INSTALLED_VERSION=$(dpkg-query -W -f='${Version}' cuttlefish-base)

          if [ "$INSTALLED_VERSION" = "${{ steps.version.outputs.version }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Capability Query Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          OUTPUT=$(python3 /usr/lib/cuttlefish-common/bin/capability_query.py | sort)

          if printf '%s\n' "$OUTPUT" | grep -qx 'capability_check' \
            && printf '%s\n' "$OUTPUT" | grep -qx 'qemu_cli' \
            && printf '%s\n' "$OUTPUT" | grep -qx 'vsock'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Host Resource Files
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ -x /etc/init.d/cuttlefish-host-resources ] \
            && [ -f /lib/udev/rules.d/60-cuttlefish-base.rules ] \
            && [ -f /etc/modules-load.d/cuttlefish-common.conf ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l /etc/init.d/cuttlefish-host-resources /lib/udev/rules.d/60-cuttlefish-base.rules /etc/modules-load.d/cuttlefish-common.conf 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          LATEST_VERSION="${{ steps.version.outputs.latest }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT_VERSION:-${BASELINE_VERSION}}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT_VERSION"
          echo "Next version targeted for install validation: $LATEST_VERSION"

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            DETAILS="Current pinned Android-Cuttlefish package ${CURRENT_VERSION} already matches the latest stable release. The configured Arm64 package install and capability query both succeeded."
            echo "next_installed_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Android-Cuttlefish version ${CURRENT_VERSION} already matches the newest stable upstream release visible in the tested public source path, so there is no newer Arm64 candidate to validate in Test 6." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT_VERSION"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "Details: ${DETAILS}"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_TAG="v${LATEST_VERSION}"
          NEXT_BUILD_ROOT=$(mktemp -d)
          git clone --depth 1 --branch "$NEXT_TAG" https://github.com/google/android-cuttlefish.git "$NEXT_BUILD_ROOT/src"
          pushd "$NEXT_BUILD_ROOT/src/base"
          perl -0pi -e 's/libtinfo5,/libtinfo6 | libtinfo5,/g' debian/control
          sudo apt-get install -y \
            build-essential \
            cmake \
            config-package-dev \
            debhelper-compat \
            libaom-dev \
            libclang-dev \
            libcurl4-openssl-dev \
            libfmt-dev \
            libgflags-dev \
            libgoogle-glog-dev \
            libgtest-dev \
            libjsoncpp-dev \
            liblzma-dev \
            libopus-dev \
            libprotobuf-c-dev \
            libprotobuf-dev \
            libsrtp2-dev \
            libssl-dev \
            libtinfo6 \
            libxml2-dev \
            libz3-dev \
            nasm \
            pkgconf \
            protobuf-compiler \
            uuid-dev \
            xxd
          pushd "$NEXT_BUILD_ROOT/src/base/cvd"
          bazel build //:build_compilation_mode_txt
          popd
          if ! timeout 5400 env PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" dpkg-buildpackage -uc -us -b; then
            DETAILS="Current pinned Android-Cuttlefish package ${CURRENT_VERSION} passed smoke tests in this run, but the next stable release ${LATEST_VERSION} did not build into an Arm64 Debian package on ubuntu-24.04-arm."
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: ${DETAILS}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          popd

          NEXT_DEB=$(find "$NEXT_BUILD_ROOT/src" -maxdepth 1 -name 'cuttlefish-base_*_arm64.deb' | head -n 1)
          if [ -z "$NEXT_DEB" ]; then
            DETAILS="Current pinned Android-Cuttlefish package ${CURRENT_VERSION} passed smoke tests in this run, but the next stable release ${LATEST_VERSION} did not produce a cuttlefish-base Arm64 Debian package."
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: ${DETAILS}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo dpkg -i "$NEXT_DEB" || sudo apt-get -f install -y
          NEXT_INSTALLED_VERSION=$(dpkg-query -W -f='${Version}' cuttlefish-base 2>/dev/null || true)
          CAPS=$(python3 /usr/lib/cuttlefish-common/bin/capability_query.py | sort | tr '\n' ' ')
          echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"

          if [ -z "$NEXT_INSTALLED_VERSION" ] || [ "$NEXT_INSTALLED_VERSION" != "$LATEST_VERSION" ]; then
            DETAILS="Current pinned Android-Cuttlefish package ${CURRENT_VERSION} passed smoke tests in this run, but the candidate Debian package reported installed version ${NEXT_INSTALLED_VERSION:-unknown} instead of ${LATEST_VERSION}."
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed but reported a version mismatch on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
            echo "Regression install result: Next version installed but reported a version mismatch on Arm64"
            echo "Details: ${DETAILS}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          DETAILS="Current pinned Android-Cuttlefish package ${CURRENT_VERSION} passed smoke tests in this run. Regression validation built and installed the next stable Arm64 Debian package ${LATEST_VERSION}, and the configured package still reported capabilities: ${CAPS}."
          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
          echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
          echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
          echo "Regression install result: Next version installed successfully on Arm64"
          echo "Details: ${DETAILS}"
          echo "status=passed" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            local core=$3
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            else
              SKIPPED=$((SKIPPED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" yes
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" yes
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" yes
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" yes
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" yes
          check_test "$TEST6_STATUS" "${{ steps.test6.outputs.duration || 0 }}" no

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ] || [ "$PASSED" -eq 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable release available for Test 6"
                ;;
              baseline_failed)
                REGRESSION_RESULT="Regression validation skipped because one or more baseline tests (1-5) failed."
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Android-Cuttlefish Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
