name: Test Rqlite on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/rqlite.md"
      - ".github/workflows/test-rqlite.yml"

jobs:
  test-rqlite:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "8.36.17"
      RQLITE_NEXT_VERSION: "8.36.18"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=rqlite" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/rqlite" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Rqlite baseline binaries
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates jq file
          WORKDIR=$(mktemp -d)
          URL="https://github.com/rqlite/rqlite/releases/download/v${BASELINE_VERSION}/rqlite-v${BASELINE_VERSION}-linux-arm64.tar.gz"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "$URL" -o "$WORKDIR/rqlite.tar.gz"
          tar -xzf "$WORKDIR/rqlite.tar.gz" -C "$WORKDIR"
          SOURCE_DIR=$(find "$WORKDIR" -maxdepth 1 -type d -name "rqlite-v${BASELINE_VERSION}-linux-arm64")
          RQLITE_BIN="$SOURCE_DIR/rqlite"
          RQLITED_BIN="$SOURCE_DIR/rqlited"
          if [ ! -x "$RQLITE_BIN" ] || [ ! -x "$RQLITED_BIN" ]; then
            echo "Failed to locate usable rqlite/rqlited binaries in $SOURCE_DIR" >&2
            exit 1
          fi
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "source_dir=$SOURCE_DIR" >> "$GITHUB_OUTPUT"
          echo "rqlite_bin=$RQLITE_BIN" >> "$GITHUB_OUTPUT"
          echo "rqlited_bin=$RQLITED_BIN" >> "$GITHUB_OUTPUT"

      - name: Get Rqlite versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="$("${{ steps.install.outputs.rqlite_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          LATEST="${RQLITE_NEXT_VERSION}"
          echo "version=${CURRENT:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: ${CURRENT:-$BASELINE_VERSION}"
          echo "Detected latest version: ${LATEST:-$BASELINE_VERSION}"

      - name: Test 1 - Check rqlite binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.rqlite_bin }}" ] && [ -x "${{ steps.install.outputs.rqlited_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${BASELINE_VERSION}"
          RQLITE_VERSION="$("${{ steps.install.outputs.rqlite_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          RQLITED_VERSION="$("${{ steps.install.outputs.rqlited_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          if [ "$RQLITE_VERSION" = "$EXPECTED" ] && [ "$RQLITED_VERSION" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.rqlite_bin }}" --version || true
            "${{ steps.install.outputs.rqlited_bin }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          "${{ steps.install.outputs.rqlite_bin }}" --help > /tmp/rqlite-help.txt 2>&1 || true
          "${{ steps.install.outputs.rqlited_bin }}" --help > /tmp/rqlited-help.txt 2>&1 || true
          if grep -qiE 'usage|usage of|rqlite|command' /tmp/rqlite-help.txt; then
            if grep -qiE 'usage|usage of|rqlited|raft|join|node|command' /tmp/rqlited-help.txt; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/rqlited-help.txt || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            cat /tmp/rqlite-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          is_arm_binary() {
            local path="$1"
            if file "$path" | grep -Eiq 'ARM aarch64|ARM64|aarch64'; then
              return 0
            fi
            if command -v readelf >/dev/null 2>&1 && readelf -h "$path" | grep -qi 'AArch64'; then
              return 0
            fi
            return 1
          }
          if is_arm_binary "${{ steps.install.outputs.rqlite_bin }}" && is_arm_binary "${{ steps.install.outputs.rqlited_bin }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.rqlite_bin }}" || true
            file "${{ steps.install.outputs.rqlited_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          DATA_DIR="$WORKDIR/data"
          LOG_FILE="$WORKDIR/rqlited.log"
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" 2>/dev/null || true
              wait "$PID" 2>/dev/null || true
            fi
            rm -rf "$WORKDIR"
          }
          trap cleanup EXIT

          "${{ steps.install.outputs.rqlited_bin }}" -node-id 1 -http-addr 127.0.0.1:4001 -raft-addr 127.0.0.1:4002 "$DATA_DIR" >"$LOG_FILE" 2>&1 &
          PID=$!

          READY=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4001/status >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "$READY" != "1" ]; then
            cat "$LOG_FILE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          EXECUTE_RESULT=""
          for _ in $(seq 1 60); do
            EXECUTE_RESULT=$(
              curl -sS -XPOST "http://127.0.0.1:4001/db/execute?pretty" \
                -H "Content-Type: application/json" \
                -d '["CREATE TABLE IF NOT EXISTS smoke (id integer not null primary key, value text)", "INSERT INTO smoke(value) VALUES(\"arm64-baseline\")"]' || true
            )
            if echo "$EXECUTE_RESULT" | grep -q '"error"'; then
              if echo "$EXECUTE_RESULT" | grep -q 'store not open'; then
                sleep 1
                continue
              fi
              echo "$EXECUTE_RESULT"
              cat "$LOG_FILE" || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            break
          done

          RESULT=""
          for _ in $(seq 1 30); do
            RESULT=$(
              curl -sS -XPOST "http://127.0.0.1:4001/db/query?pretty" \
                -H "Content-Type: application/json" \
                -d '["SELECT value FROM smoke ORDER BY id DESC LIMIT 1"]' || true
            )
            if echo "$RESULT" | grep -q '"arm64-baseline"'; then
              break
            fi
            if echo "$RESULT" | grep -q 'store not open'; then
              sleep 1
              continue
            fi
            sleep 1
          done

          if echo "$RESULT" | grep -q '"arm64-baseline"'; then
            echo "note=Single-node rqlited booted successfully and served create/insert/query over the HTTP API on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "$RESULT"
            cat "$LOG_FILE" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release is available for regression validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, and no newer stable upstream release is available above that baseline for an Arm64 Test 6 install check." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: No newer stable release is available for regression validation"
            echo "Details: Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, and no newer stable upstream release is available above that baseline for an Arm64 Test 6 install check."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release is available for regression validation" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, and no newer stable upstream release is available above that baseline for an Arm64 Test 6 install check." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: No newer stable release is available for regression validation"
            echo "Details: Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, and no newer stable upstream release is available above that baseline for an Arm64 Test 6 install check."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_ROOT=$(mktemp -d)
          NEXT_TAR="$NEXT_ROOT/rqlite.tar.gz"
          NEXT_URL="https://github.com/rqlite/rqlite/releases/download/v${LATEST}/rqlite-v${LATEST}-linux-arm64.tar.gz"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "$NEXT_URL" -o "$NEXT_TAR"
          tar -xzf "$NEXT_TAR" -C "$NEXT_ROOT"
          NEXT_SOURCE=$(find "$NEXT_ROOT" -maxdepth 1 -type d -name "rqlite-v${LATEST}-linux-arm64")
          NEXT_RQLITE="$NEXT_SOURCE/rqlite"
          NEXT_RQLITED="$NEXT_SOURCE/rqlited"

          if [ ! -x "$NEXT_RQLITE" ] || [ ! -x "$NEXT_RQLITED" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not extract usable Arm64 binaries." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not extract usable Arm64 binaries."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_ROOT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_REPORTED="$("$NEXT_RQLITE" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1 || true)"
          is_arm_binary() {
            local path="$1"
            if file "$path" | grep -Eiq 'ARM aarch64|ARM64|aarch64'; then
              return 0
            fi
            if command -v readelf >/dev/null 2>&1 && readelf -h "$path" | grep -qi 'AArch64'; then
              return 0
            fi
            return 1
          }
          if ! is_arm_binary "$NEXT_RQLITE"; then
            NEXT_REPORTED="${NEXT_REPORTED:-arch_mismatch}"
          fi

          WORKDIR=$(mktemp -d)
          DATA_DIR="$WORKDIR/data"
          LOG_FILE="$WORKDIR/rqlited.log"
          cleanup() {
            if [ -n "${PID:-}" ]; then
              kill "$PID" 2>/dev/null || true
              wait "$PID" 2>/dev/null || true
            fi
            rm -rf "$WORKDIR" "$NEXT_ROOT"
          }
          trap cleanup EXIT

          "$NEXT_RQLITED" -node-id 1 -http-addr 127.0.0.1:4101 -raft-addr 127.0.0.1:4102 "$DATA_DIR" >"$LOG_FILE" 2>&1 &
          PID=$!

          READY=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4101/status >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 1
          done

          RESULT=""
          if [ "$READY" = "1" ]; then
            for _ in $(seq 1 60); do
              EXECUTE_RESULT=$(
                curl -sS -XPOST "http://127.0.0.1:4101/db/execute?pretty" \
                  -H "Content-Type: application/json" \
                  -d '["CREATE TABLE IF NOT EXISTS smoke (id integer not null primary key, value text)", "INSERT INTO smoke(value) VALUES(\"arm64-candidate\")"]' || true
              )
              if echo "$EXECUTE_RESULT" | grep -q '"error"'; then
                if echo "$EXECUTE_RESULT" | grep -q 'store not open'; then
                  sleep 1
                  continue
                fi
                break
              fi
              break
            done
            for _ in $(seq 1 30); do
              RESULT=$(
                curl -sS -XPOST "http://127.0.0.1:4101/db/query?pretty" \
                  -H "Content-Type: application/json" \
                  -d '["SELECT value FROM smoke ORDER BY id DESC LIMIT 1"]' || true
              )
              if echo "$RESULT" | grep -q '"arm64-candidate"'; then
                break
              fi
              if echo "$RESULT" | grep -q 'store not open'; then
                sleep 1
                continue
              fi
              sleep 1
            done
          fi

          if [ "$NEXT_REPORTED" = "$LATEST" ] && [ "$READY" = "1" ] && echo "$RESULT" | grep -q '"arm64-candidate"'; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rqlite version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, the candidate binaries reported the expected version, and the isolated rqlited instance completed a create/insert/query HTTP smoke successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Rqlite version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, the candidate binaries reported the expected version, and the isolated rqlited instance completed a create/insert/query HTTP smoke successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            [ -n "$RESULT" ] && echo "$RESULT" || true
            cat "$LOG_FILE" || true
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete isolated Arm64 startup and query validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Rqlite version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete isolated Arm64 startup and query validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/rqlite.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Rqlite",
              "version": "${{ steps.version.outputs.version || 'unknown' }}",
              "language": "Go",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Check rqlite binaries exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Check version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}, "note": "${{ steps.test5.outputs.note || '' }}" },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rqlite-test-results
          path: test-results/rqlite.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Rqlite Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
