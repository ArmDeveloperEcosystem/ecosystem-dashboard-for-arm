name: Test Ironic on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/ironic.md"
      - ".github/workflows/test-ironic.yml"

permissions:
  contents: read
  actions: read

jobs:
  test-ironic:
    runs-on: ubuntu-24.04-arm
    env:
      IRONIC_VERSION: "9.1.6"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=ironic" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/ironic" >> "$GITHUB_OUTPUT"

      - name: Install Ironic
        id: install
        run: |
          set -euo pipefail
          BASE_VENV="$(mktemp -d)/ironic-baseline"
          python3 -m venv "$BASE_VENV"
          . "$BASE_VENV/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --only-binary=:all: --no-deps "ironic==${IRONIC_VERSION}"
          echo "venv=$BASE_VENV" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Ironic version
        id: version
        run: |
          set -euo pipefail
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION="$(python - <<'PY'
          import importlib.metadata as m
          print(m.version("ironic"))
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Ironic version: ${VERSION}"

      - name: Test 1 - Wheel install and entry points
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV="${{ steps.install.outputs.venv }}"

          if [ -x "${VENV}/bin/ironic-api" ] && \
             [ -x "${VENV}/bin/ironic-conductor" ] && \
             [ -x "${VENV}/bin/ironic-dbsync" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version metadata exact match
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          VERSION="$(python - <<'PY'
          import importlib.metadata as m
          print(m.version("ironic"))
          PY
          )"

          if [ "$VERSION" = "${IRONIC_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Top-level package import
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"
          python - <<'PY'
          import ironic
          print(ironic.__file__)
          PY
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Installed package metadata
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          . "${{ steps.install.outputs.venv }}/bin/activate"

          METADATA_OUTPUT="$(python - <<'PY'
          import importlib.metadata as m
          from pathlib import Path

          dist = m.distribution("ironic")
          root = Path(dist.locate_file(""))
          dist_info = sorted(root.glob("ironic-*.dist-info"))
          print(f"NAME={dist.metadata.get('Name', '')}")
          print(f"VERSION={dist.version}")
          print(f"DIST_INFO={'present' if dist_info else 'missing'}")
          PY
          )"
          METADATA_NAME="$(printf '%s\n' "$METADATA_OUTPUT" | awk -F= '$1=="NAME"{print $2}')"
          METADATA_VERSION="$(printf '%s\n' "$METADATA_OUTPUT" | awk -F= '$1=="VERSION"{print $2}')"
          DIST_INFO_STATUS="$(printf '%s\n' "$METADATA_OUTPUT" | awk -F= '$1=="DIST_INFO"{print $2}')"

          if [ "$METADATA_VERSION" = "${IRONIC_VERSION}" ] && \
             [ "${DIST_INFO_STATUS}" = "present" ] && \
             printf '%s\n' "$METADATA_NAME" | grep -Eqi '^(ironic|openstack-ironic)$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$METADATA_OUTPUT" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:$JOB_ID"
          fi

          cat > test-results/ironic.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Ironic",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Wheel install and entry points", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version metadata exact match", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Top-level package import", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Installed package metadata", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ironic-test-results
          path: test-results/ironic.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Ironic Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Wheel install and entry points: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Test 2 - Version metadata exact match: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Test 3 - Top-level package import: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Test 5 - Installed package metadata: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
