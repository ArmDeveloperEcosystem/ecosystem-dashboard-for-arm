name: Test All Packages (Batch 1) on Arm64

on:
  workflow_dispatch:
  workflow_call:

jobs:

  test-nginx:
    uses: ./.github/workflows/test-nginx.yml

  test-envoy:
    uses: ./.github/workflows/test-envoy.yml

  test-kafka:
    uses: ./.github/workflows/test-kafka.yml

  test-memcached:
    uses: ./.github/workflows/test-memcached.yml

  test-mongodb:
    uses: ./.github/workflows/test-mongodb.yml

  test-mysql:
    uses: ./.github/workflows/test-mysql.yml

  test-spark:
    uses: ./.github/workflows/test-spark.yml

  test-postgres:
    uses: ./.github/workflows/test-postgres.yml

  test-ceph:
    uses: ./.github/workflows/test-ceph.yml

  test-cassandra:
    uses: ./.github/workflows/test-cassandra.yml

  test-rocksdb:
    uses: ./.github/workflows/test-rocksdb.yml

  test-abyss:
    uses: ./.github/workflows/test-abyss.yml

  test-accumulo:
    uses: ./.github/workflows/test-accumulo.yml

  test-acl:
    uses: ./.github/workflows/test-acl.yml

  test-activemq:
    uses: ./.github/workflows/test-activemq.yml

  test-adoptopenjdk:
    uses: ./.github/workflows/test-adoptopenjdk.yml

  test-aerospike:
    uses: ./.github/workflows/test-aerospike.yml

  test-ace:
    uses: ./.github/workflows/test-ace.yml

  test-akka:
    uses: ./.github/workflows/test-akka.yml

  test-alfresco:
    uses: ./.github/workflows/test-alfresco.yml

  test-alluxio:
    uses: ./.github/workflows/test-alluxio.yml

  test-almalinux:
    uses: ./.github/workflows/test-almalinux.yml

  test-anda:
    uses: ./.github/workflows/test-anda.yml

  test-cuttlefish:
    uses: ./.github/workflows/test-cuttlefish.yml

  test-angularcli:
    uses: ./.github/workflows/test-angularcli.yml

  test-apisix:
    uses: ./.github/workflows/test-apisix.yml

  test-apache-arrow:
    uses: ./.github/workflows/test-apache-arrow.yml

  test-atlas:
    uses: ./.github/workflows/test-atlas.yml

  test-couchdb:
    uses: ./.github/workflows/test-couchdb.yml

  test-freemarker:
    uses: ./.github/workflows/test-freemarker.yml

  test-httpd:
    uses: ./.github/workflows/test-httpd.yml

  test-nifi:
    uses: ./.github/workflows/test-nifi.yml

  test-apr:
    uses: ./.github/workflows/test-apr.yml

  test-pulsar:
    uses: ./.github/workflows/test-pulsar.yml

  test-anolis-os:
    uses: ./.github/workflows/test-anolis-os.yml

  test-ansible:
    uses: ./.github/workflows/test-ansible.yml

  test-antlr4:
    uses: ./.github/workflows/test-antlr4.yml

  test-airflow:
    uses: ./.github/workflows/test-airflow.yml

  test-albumentations:
    uses: ./.github/workflows/test-albumentations.yml

  test-amaranth:
    uses: ./.github/workflows/test-amaranth.yml

  test-amazon-vpc-cni-k8s:
    uses: ./.github/workflows/test-amazon-vpc-cni-k8s.yml

  test-ampere-ai-text-to-sql:
    uses: ./.github/workflows/test-ampere-ai-text-to-sql.yml

  test-ampere-optimised-ollama:
    uses: ./.github/workflows/test-ampere-optimised-ollama.yml

  test-ampere-optimized-llama:
    uses: ./.github/workflows/test-ampere-optimized-llama.yml

  test-ampere-optimized-onnx:
    uses: ./.github/workflows/test-ampere-optimized-onnx.yml

  test-ampere-optimized-pytorch:
    uses: ./.github/workflows/test-ampere-optimized-pytorch.yml

  summary:
    needs:
      [
        test-nginx,
        test-envoy,
        test-kafka,
        test-memcached,
        test-mongodb,
        test-mysql,
        test-spark,
        test-postgres,
        test-ceph,
        test-cassandra,
        test-rocksdb,
        test-abyss,
        test-accumulo,
        test-acl,
        test-activemq,
        test-adoptopenjdk,
        test-aerospike,
        test-ace,
        test-akka,
        test-alfresco,
        test-alluxio,
        test-almalinux,
        test-anda,
        test-cuttlefish,
        test-angularcli,
        test-apisix,
        test-apache-arrow,
        test-atlas,
        test-couchdb,
        test-freemarker,
        test-httpd,
        test-nifi,
        test-apr,
        test-pulsar,
        test-anolis-os,
        test-ansible,
        test-antlr4,
        test-airflow,
        test-albumentations,
        test-amaranth,
        test-amazon-vpc-cni-k8s,
        test-ampere-ai-text-to-sql,
        test-ampere-optimised-ollama,
        test-ampere-optimized-llama,
        test-ampere-optimized-onnx,
        test-ampere-optimized-pytorch
      ]
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect batch results
        id: collect
        uses: ./.github/actions/collect-batch-results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          batch_number: "1"
          batch_title: "Batch 1"

      - name: Upload batch test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch1-test-results
          path: test-results
          retention-days: 90
