name: Test Spring Cloud Gateway on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/spring-cloud-gateway.md"
      - ".github/workflows/test-spring-cloud-gateway.yml"

jobs:
  test-spring-cloud-gateway:
    runs-on: ubuntu-24.04-arm
    env:
      SPRING_CLOUD_GATEWAY_VERSION: "4.3.3"
      GATEWAY_WORKDIR: /tmp/scg-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spring-cloud-gateway" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spring-cloud-gateway" >> "$GITHUB_OUTPUT"
      - name: Install Spring Cloud Gateway
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y maven python3

          rm -rf "$GATEWAY_WORKDIR"
          mkdir -p "$GATEWAY_WORKDIR/src/main/java/com/example"

          cat > "$GATEWAY_WORKDIR/pom.xml" <<'EOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <parent>
              <groupId>org.springframework.boot</groupId>
              <artifactId>spring-boot-starter-parent</artifactId>
              <version>3.5.0</version>
              <relativePath/>
            </parent>
            <groupId>com.example</groupId>
            <artifactId>scg-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <java.version>21</java.version>
            </properties>
            <dependencies>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-starter-gateway-server-webflux</artifactId>
                <version>${env.SPRING_CLOUD_GATEWAY_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          EOF

          cat > "$GATEWAY_WORKDIR/src/main/java/com/example/Application.java" <<'EOF'
          package com.example;
          import org.springframework.boot.SpringApplication;
          import org.springframework.boot.autoconfigure.SpringBootApplication;
          import org.springframework.cloud.gateway.route.RouteLocator;
          import org.springframework.cloud.gateway.route.builder.RouteLocatorBuilder;
          import org.springframework.context.annotation.Bean;
          @SpringBootApplication
          public class Application {
            public static void main(String[] args) {
              SpringApplication.run(Application.class, args);
            }
            @Bean
            RouteLocator routes(RouteLocatorBuilder builder) {
              return builder.routes()
                .route("backend", r -> r.path("/hello/**")
                  .filters(f -> f.stripPrefix(1))
                  .uri("http://127.0.0.1:18080"))
                .build();
            }
          }
          EOF

          cat > "$GATEWAY_WORKDIR/src/main/java/com/example/VersionMain.java" <<'EOF'
          package com.example;
          import org.springframework.cloud.gateway.route.builder.RouteLocatorBuilder;
          public class VersionMain {
            public static void main(String[] args) {
              System.out.println(RouteLocatorBuilder.class.getPackage().getImplementationVersion());
            }
          }
          EOF

          cd "$GATEWAY_WORKDIR"
          mvn -q -DskipTests compile

          if [ -f "$HOME/.m2/repository/org/springframework/cloud/spring-cloud-gateway-server-webflux/${SPRING_CLOUD_GATEWAY_VERSION}/spring-cloud-gateway-server-webflux-${SPRING_CLOUD_GATEWAY_VERSION}.jar" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Spring Cloud Gateway version
        id: version
        run: |
          echo "version=${SPRING_CLOUD_GATEWAY_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "$HOME/.m2/repository/org/springframework/cloud/spring-cloud-gateway-server-webflux/${SPRING_CLOUD_GATEWAY_VERSION}/spring-cloud-gateway-server-webflux-${SPRING_CLOUD_GATEWAY_VERSION}.jar" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          STARTER_JAR="$HOME/.m2/repository/org/springframework/cloud/spring-cloud-starter-gateway-server-webflux/${SPRING_CLOUD_GATEWAY_VERSION}/spring-cloud-starter-gateway-server-webflux-${SPRING_CLOUD_GATEWAY_VERSION}.jar"
          SERVER_JAR="$HOME/.m2/repository/org/springframework/cloud/spring-cloud-gateway-server-webflux/${SPRING_CLOUD_GATEWAY_VERSION}/spring-cloud-gateway-server-webflux-${SPRING_CLOUD_GATEWAY_VERSION}.jar"
          RESOLVED_VERSION=""
          if [ -f "${STARTER_JAR}" ]; then
            RESOLVED_VERSION=$(basename "$(dirname "${STARTER_JAR}")")
          elif [ -f "${SERVER_JAR}" ]; then
            RESOLVED_VERSION=$(basename "$(dirname "${SERVER_JAR}")")
          fi
          if [ "${RESOLVED_VERSION}" = "${SPRING_CLOUD_GATEWAY_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${SPRING_CLOUD_GATEWAY_VERSION}, got ${RESOLVED_VERSION:-missing}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "$GATEWAY_WORKDIR"
          mvn -q help:effective-pom -Doutput=/tmp/scg-effective-pom.xml >/tmp/scg-effective-pom.log 2>&1 || true
          mvn -q dependency:tree -Dincludes=org.springframework.cloud:spring-cloud-gateway-server-webflux >/tmp/scg-dependency-tree.log 2>&1 || true
          if { grep -q "<artifactId>spring-cloud-starter-gateway-server-webflux</artifactId>" /tmp/scg-effective-pom.xml 2>/dev/null || \
               grep -q "<artifactId>spring-cloud-gateway-server-webflux</artifactId>" /tmp/scg-effective-pom.xml 2>/dev/null || \
               grep -q "<artifactId>spring-cloud-starter-gateway-server-webflux</artifactId>" pom.xml || \
               grep -q "<artifactId>spring-cloud-gateway-server-webflux</artifactId>" pom.xml || \
               grep -q "spring-cloud-gateway-server-webflux" /tmp/scg-dependency-tree.log || \
               grep -q "spring-cloud-starter-gateway-server-webflux" /tmp/scg-dependency-tree.log; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scg-effective-pom.log || true
            cat /tmp/scg-effective-pom.xml || true
            cat /tmp/scg-dependency-tree.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mkdir -p /tmp/scg-backend
          printf 'gateway-ok\n' > /tmp/scg-backend/index.html
          python3 -m http.server 18080 --directory /tmp/scg-backend >/tmp/scg-backend.log 2>&1 &
          BACK_PID=$!
          cd "$GATEWAY_WORKDIR"
          mvn -q spring-boot:run >/tmp/scg-run.log 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" "$BACK_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          SUCCESS=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/hello/index.html >/tmp/scg-response.txt 2>/dev/null; then
              SUCCESS=1
              break
            fi
            sleep 2
          done

          if [ "$SUCCESS" -eq 1 ] && grep -q "gateway-ok" /tmp/scg-response.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scg-run.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/spring-cloud-gateway.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Spring Cloud Gateway",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Artifact Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-cloud-gateway-test-results
          path: test-results/spring-cloud-gateway.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Spring Cloud Gateway Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
