name: Global Test Summary (All Batches)

concurrency:
  group: global-summary
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      start_time:
        description: "UTC timestamp captured by the orchestrator before dispatching batches"
        required: true
        default: ""
      triggering_batch:
        description: "Name of the workflow that triggered this summary (optional)"
        required: false
        default: ""

jobs:
  global-summary:
    name: Generate Global Summary
    runs-on: ubuntu-24.04-arm
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest branch state
        run: |
          echo "Pulling latest branch state..."
          for i in {1..10}; do
            if git pull --rebase origin "${{ github.ref_name }}"; then
              echo "✅ Successfully pulled latest branch state"
              exit 0
            fi
            echo "❌ Pull failed, retrying in 5s... (Attempt $i/10)"
            sleep 5
          done
          echo "⚠️ Failed to pull latest branch state after 10 attempts. Proceeding with local checkout."

      - name: Download batch artifacts
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
          START_TIME: ${{ inputs.start_time }}
        run: |
          if [ -z "$START_TIME" ]; then
            echo "❌ Error: start_time input is required to locate the correct batch runs."
            exit 1
          fi

          mkdir -p downloaded-results
          DOWNLOADED_BATCHES=0

          for i in {1..19}; do
            WORKFLOW="test-all-packages-batch${i}.yml"
            ARTIFACT="batch${i}-test-results"
            DEST="downloaded-results/batch${i}"
            mkdir -p "$DEST"

            RUN_ID=$(gh run list \
              --workflow "$WORKFLOW" \
              --branch "${{ github.ref_name }}" \
              --json databaseId,createdAt \
              --limit 50 \
              --jq ".[] | select(.createdAt >= \"$START_TIME\") | .databaseId" | head -n 1)

            if [ -z "$RUN_ID" ]; then
              echo "⚠️ Warning: Could not find a batch run for $WORKFLOW after $START_TIME."
              continue
            fi

            echo "📥 Downloading $ARTIFACT from run $RUN_ID..."
            if gh run download "$RUN_ID" -n "$ARTIFACT" -D "$DEST"; then
              DOWNLOADED_BATCHES=$((DOWNLOADED_BATCHES + 1))
            else
              echo "⚠️ Warning: Failed to download $ARTIFACT from run $RUN_ID."
            fi
          done

          echo "downloaded_batches=$DOWNLOADED_BATCHES" >> $GITHUB_OUTPUT

      - name: Build canonical package map
        id: canonical
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          package_map = {}
          for md_path in sorted(Path("content/opensource_packages").glob("*.md")):
              if md_path.name == "_index.md":
                  continue
              package_map[md_path.stem.lower()] = md_path.stem

          Path(".summary-package-map.json").write_text(json.dumps(package_map, indent=2, sort_keys=True) + "\n")
          print(f"Built canonical package map for {len(package_map)} package pages.")
          PY

      - name: Assemble canonical staged test results
        id: assemble
        run: |
          python3 - <<'PY'
          import json
          import shutil
          from pathlib import Path

          package_map = json.loads(Path(".summary-package-map.json").read_text())
          stage_root = Path(".summary-staging")
          stage_data = stage_root / "data-test-results"

          if stage_root.exists():
              shutil.rmtree(stage_root)
          stage_data.mkdir(parents=True, exist_ok=True)

          existing_dir = Path("data/test-results")
          downloaded_dir = Path("downloaded-results")

          counters = {
              "malformed": 0,
              "seeded": 0,
              "overlay": 0,
          }

          def canonical_slug(raw_slug: str, fallback_stem: str) -> str:
              for candidate in (raw_slug, fallback_stem):
                  if candidate:
                      value = str(candidate).strip()
                      if value:
                          return package_map.get(value.lower(), value)
              return fallback_stem

          def write_canonical(source_path: Path, overlay: bool) -> None:
              try:
                  payload = json.loads(source_path.read_text())
              except Exception:
                  print(f"⚠️ Skipping malformed result artifact: {source_path}")
                  counters["malformed"] += 1
                  return

              metadata = payload.setdefault("metadata", {})
              canonical = canonical_slug(metadata.get("package_slug"), source_path.stem)
              metadata["package_slug"] = canonical
              target_path = stage_data / f"{canonical}.json"
              target_path.write_text(json.dumps(payload, indent=2) + "\n")

              if overlay:
                  counters["overlay"] += 1
              else:
                  counters["seeded"] += 1

          for source in sorted(existing_dir.glob("*.json")):
              write_canonical(source, overlay=False)

          for source in sorted(downloaded_dir.rglob("*.json")):
              write_canonical(source, overlay=True)

          final_count = len(list(stage_data.glob("*.json")))
          metrics = Path(".summary-staging/assemble-metrics.env")
          metrics.write_text(
              "\n".join(
                  [
                      f"json_count={final_count}",
                      f"malformed_count={counters['malformed']}",
                      f"seeded_count={counters['seeded']}",
                      f"overlay_count={counters['overlay']}",
                  ]
              )
              + "\n"
          )

          print(
              f"Prepared {final_count} canonical staged result files "
              f"({counters['seeded']} seeded from saved results, {counters['overlay']} overlaid from fresh batch artifacts)."
          )
          PY

          cat .summary-staging/assemble-metrics.env >> "$GITHUB_OUTPUT"
          source .summary-staging/assemble-metrics.env
          echo "✅ Prepared ${json_count:-0} canonical staged result files."

      - name: Normalize staged result URLs to exact job links
        if: always() && steps.assemble.outputs.json_count != '0'
        id: normalize
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          data_dir = Path(".summary-staging/data-test-results")
          job_cache = {}
          updated = 0
          unresolved = []
          duplicate_url_map = {}
          weak_urls = []

          def normalize_runner(runner):
              if isinstance(runner, dict):
                  return runner

              if not isinstance(runner, str):
                  return runner

              value = runner.strip()
              lowered = value.lower()
              known_suffixes = [
                  ("-arm64", "arm64"),
                  ("-aarch64", "arm64"),
                  ("-amd64", "amd64"),
                  ("-x86_64", "amd64"),
                  ("-arm", "arm64"),
              ]

              for suffix, arch in known_suffixes:
                  if lowered.endswith(suffix):
                      os_value = value[: -len(suffix)]
                      if os_value:
                          return {"os": os_value, "arch": arch}

              return {"os": value, "arch": "unknown"}

          def load_jobs(run_id: str):
              if run_id in job_cache:
                  return job_cache[run_id]
              try:
                  raw = subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run_id}/jobs?per_page=100",
                      ],
                      text=True,
                  )
                  jobs = json.loads(raw).get("jobs", [])
              except Exception:
                  jobs = []
              job_cache[run_id] = jobs
              return jobs

          def resolve_job_url(run_id: str, package_slug: str, fallback_url: str) -> str:
              jobs = load_jobs(run_id)
              if not jobs:
                  return fallback_url

              slug = (package_slug or "").strip()
              slug_candidates = {
                  slug,
                  slug.lower(),
                  slug.replace("_", "-"),
                  slug.replace("-", "_"),
                  slug.lower().replace("_", "-"),
                  slug.lower().replace("-", "_"),
              }
              expected_job_ids = {f"test-{candidate}".lower() for candidate in slug_candidates if candidate}

              for job in jobs:
                  name = (job.get("name") or "").strip()
                  if not name:
                      continue
                  parts = [part.strip().lower() for part in name.split("/")]
                  if "summary" in parts:
                      continue
                  if any(part in expected_job_ids for part in parts):
                      html_url = (job.get("html_url") or "").strip()
                      if html_url:
                          return html_url

              return fallback_url

          for json_path in sorted(list(data_dir.glob("*.json"))):
              try:
                  payload = json.loads(json_path.read_text())
              except Exception:
                  weak_urls.append((json_path.name, "malformed_json", "malformed_json"))
                  continue

              package_slug = (
                  str((payload.get("metadata") or {}).get("package_slug") or "").strip()
                  or json_path.stem
              )
              payload.setdefault("metadata", {})["package_slug"] = package_slug
              run = payload.get("run") or {}
              schema_changed = False
              legacy_workflow_url = str(run.get("workflow_url") or "").strip()
              run_id = str(run.get("id") or "").strip()
              if not run_id and legacy_workflow_url:
                  match = re.search(r"/actions/runs/(\d+)", legacy_workflow_url)
                  if match:
                      run_id = match.group(1)
                      payload.setdefault("run", {})["id"] = run_id
                      schema_changed = True

              current_url = str(run.get("url") or "").strip()
              if not current_url and legacy_workflow_url:
                  current_url = legacy_workflow_url

              if legacy_workflow_url:
                  payload.setdefault("run", {}).pop("workflow_url", None)
                  schema_changed = True

              runner_value = run.get("runner")
              normalized_runner = normalize_runner(runner_value)
              runner_changed = normalized_runner != runner_value

              if runner_changed:
                  payload["run"]["runner"] = normalized_runner

              if not run_id:
                  weak_urls.append((json_path.name, "missing_run_id", current_url or "missing_run_id"))
                  if runner_changed or schema_changed:
                      json_path.write_text(json.dumps(payload, indent=2) + "\n")
                      updated += 1
                  continue

              exact_url = resolve_job_url(run_id, package_slug, current_url)
              if exact_url != current_url or runner_changed or schema_changed:
                  payload["run"]["url"] = exact_url
                  json_path.write_text(json.dumps(payload, indent=2) + "\n")
                  updated += 1

              final_url = str((payload.get("run") or {}).get("url") or "").strip()
              if re.search(r"/actions/runs/\d+/job/\d+$", final_url):
                  duplicate_url_map.setdefault(final_url, []).append(json_path.stem)
              else:
                  weak_urls.append((json_path.name, run_id, final_url or "missing_url"))
                  unresolved.append(f"{json_path.name}\t{run_id}\t{package_slug}")

          duplicate_clusters = {
              url: slugs for url, slugs in duplicate_url_map.items() if len(slugs) > 1
          }

          metrics = Path(".summary-staging/normalize-metrics.env")
          metrics.write_text(
              "\n".join(
                  [
                      f"normalized_count={updated}",
                      f"weak_url_count={len(weak_urls)}",
                      f"duplicate_url_count={len(duplicate_clusters)}",
                      f"unresolved_count={len(unresolved)}",
                  ]
              )
              + "\n"
          )

          print(f"Normalized {updated} result URLs to exact job links.")
          if weak_urls:
              print("Weak or unresolved result URLs:")
              for name, run_id, url in weak_urls[:50]:
                  print(f" - {name}\t{run_id}\t{url}")
          if duplicate_clusters:
              print("Duplicate exact job URLs detected:")
              for url, slugs in list(duplicate_clusters.items())[:50]:
                  print(f" - {url} => {', '.join(sorted(slugs))}")
          if unresolved:
              print("Unable to resolve exact job links for:")
              for name in unresolved[:50]:
                  print(f" - {name}")

          if weak_urls or duplicate_clusters:
              raise SystemExit(1)
          PY

          cat .summary-staging/normalize-metrics.env >> "$GITHUB_OUTPUT"

      - name: Materialize canonical test results
        if: always() && steps.assemble.outputs.json_count != '0' && steps.normalize.outcome == 'success'
        run: |
          rm -rf test-results
          mkdir -p test-results data/test-results

          find data/test-results -maxdepth 1 -name '*.json' -delete

          for json_file in .summary-staging/data-test-results/*.json; do
            [ -f "$json_file" ] || continue
            base=$(basename "$json_file" .json)
            cp "$json_file" "data/test-results/${base}.json"
            mkdir -p "test-results/${base}-test-results"
            cp "$json_file" "test-results/${base}-test-results/${base}.json"
          done

          python3 - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("data/test-results")
          index_payload = {}

          for json_path in sorted(data_dir.glob("*.json")):
              try:
                  index_payload[json_path.stem] = json.loads(json_path.read_text())
              except Exception:
                  continue

          Path("data/test-results-index.json").write_text(
              json.dumps(index_payload, indent=2, sort_keys=True) + "\n"
          )
          print(f"Wrote canonical test-results index for {len(index_payload)} packages.")
          PY

      - name: Generate global summary
        run: |
          echo "# 📊 Global Package Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch artifacts downloaded | ${{ steps.download.outputs.downloaded_batches || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON result files assembled | ${{ steps.assemble.outputs.json_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Malformed JSON artifacts skipped | ${{ steps.assemble.outputs.malformed_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=0
          PASS=0
          FAIL=0
          MALFORMED=0
          FAIL_LIST=""
          PASS_LIST=""
          REGRESSION_TOTAL=0
          REGRESSION_PASS=0
          REGRESSION_FAIL=0
          REGRESSION_LIST=""

          for result_dir in test-results/*/; do
            for json_file in "$result_dir"*.json; do
              [ -f "$json_file" ] || continue

              SLUG=$(basename "$json_file" .json)
              if [ ! -f "content/opensource_packages/${SLUG}.md" ]; then
                continue
              fi

              TOTAL=$((TOTAL + 1))

              if ! jq empty "$json_file" >/dev/null 2>&1; then
                MALFORMED=$((MALFORMED + 1))
                FAIL=$((FAIL + 1))
                FAIL_LIST="${FAIL_LIST}| ⚠️ ${SLUG} | malformed | invalid JSON artifact skipped |"$'\n'
                continue
              fi

              NAME=$(jq -r '.package.name' "$json_file")
              VERSION=$(jq -r '.package.version' "$json_file")
              VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g' | cut -c 1-40)
              [ "${#VERSION}" -gt 39 ] && VERSION="${VERSION}..."

              STATUS=$(jq -r '.run.status' "$json_file")
              PASSED_COUNT=$(jq -r '.tests.passed' "$json_file")
              FAILED_COUNT=$(jq -r '.tests.failed' "$json_file")
              SKIPPED_COUNT=$(jq -r '.tests.skipped // 0' "$json_file")
              TOTAL_TESTS=$((PASSED_COUNT + FAILED_COUNT + SKIPPED_COUNT))
              REGRESSION_ENTRY=$(jq -c '.tests.details[]? | select(.name == "Test 6 - Regression Validation" or .name == "Regression Validation")' "$json_file" | head -n 1)

              if [ "$STATUS" = "success" ]; then
                PASS=$((PASS + 1))
                PASS_LIST="${PASS_LIST}| ✅ $NAME | $VERSION | $PASSED_COUNT/$TOTAL_TESTS passed |"$'\n'
              else
                FAIL=$((FAIL + 1))
                FAIL_LIST="${FAIL_LIST}| ❌ $NAME | $VERSION | $PASSED_COUNT/$TOTAL_TESTS passed ($FAILED_COUNT failed) |"$'\n'
              fi

              if [ -n "$REGRESSION_ENTRY" ]; then
                REGRESSION_TOTAL=$((REGRESSION_TOTAL + 1))
                REG_STATUS=$(echo "$REGRESSION_ENTRY" | jq -r '.status // "unknown"')
                CURRENT_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.current_version // .baseline_version // .current // ""')
                LATEST_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.latest_version // .next_version // .candidate_version // ""')
                NEXT_INSTALLED_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.next_installed_version // .installed_next_version // .next_reported_version // ""' || true)
                DECISION=$(echo "$REGRESSION_ENTRY" | jq -r '.decision // "unspecified"')
                REGRESSION_RESULT=$(echo "$REGRESSION_ENTRY" | jq -r '.regression_result // ""')
                COMPARISON=$(echo "$REGRESSION_ENTRY" | jq -r '.comparison // .note // ""' | tr '\n' ' ' | sed 's/|/\\|/g')

                if [ "$REG_STATUS" = "passed" ]; then
                  REGRESSION_PASS=$((REGRESSION_PASS + 1))
                else
                  REGRESSION_FAIL=$((REGRESSION_FAIL + 1))
                fi

                [ -z "$CURRENT_VERSION" ] && CURRENT_VERSION="n/a"
                [ -z "$LATEST_VERSION" ] && LATEST_VERSION="n/a"
                [ -z "$NEXT_INSTALLED_VERSION" ] && NEXT_INSTALLED_VERSION="n/a"
                if [ -z "$REGRESSION_RESULT" ]; then
                  case "$DECISION" in
                    next_install_validated)
                      REGRESSION_RESULT="Next version installed successfully on Arm64"
                      ;;
                    next_install_failed)
                      REGRESSION_RESULT="Next version install failed on Arm64"
                      ;;
                    current_is_latest_stable)
                      REGRESSION_RESULT="Current stable version already validated on Arm64"
                      ;;
                    manual_review_needed)
                      REGRESSION_RESULT="Pending regression install validation"
                      ;;
                    *)
                      if [ "$REG_STATUS" = "passed" ]; then
                        REGRESSION_RESULT="Regression validation passed"
                      else
                        REGRESSION_RESULT="Regression validation failed"
                      fi
                      ;;
                  esac
                fi
                REGRESSION_RESULT=$(echo "$REGRESSION_RESULT" | sed 's/|/\\|/g')
                [ -z "$COMPARISON" ] && COMPARISON="No regression note recorded."

                REGRESSION_LIST="${REGRESSION_LIST}| ${NAME} | ${CURRENT_VERSION} | ${LATEST_VERSION} | ${NEXT_INSTALLED_VERSION} | ${REGRESSION_RESULT} | ${COMPARISON} |"$'\n'
              fi
            done
          done

          echo "## Summary Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Packages** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | $PASS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | $FAIL ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Malformed Results** | $MALFORMED ⚠️ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Packages With Regression Validation** | $REGRESSION_TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Validation Passed** | $REGRESSION_PASS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Validation Failed** | $REGRESSION_FAIL ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $REGRESSION_TOTAL -gt 0 ]; then
            echo "## 🔁 Regression Validation Snapshot" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Current Tested | Next Candidate | Next Installed | Regression Result | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$REGRESSION_LIST" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $FAIL -gt 0 ]; then
            echo "## ❌ Failed Packages ($FAIL)" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Version | Details |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$FAIL_LIST" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $PASS -gt 0 ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary><b>✅ Passing Packages ($PASS) - Click to expand</b></summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Version | Details |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$PASS_LIST" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $TOTAL -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Warning:** No test results found. Check whether the batch artifacts completed and uploaded successfully." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit aggregated test results
        if: always() && steps.assemble.outputs.json_count != '0'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A data/test-results

          if ! git diff --staged --quiet; then
            git commit -m "Update aggregated test results [skip ci]"

            PUSH_SUCCESS=false
            for i in {1..10}; do
              if git pull --rebase origin "${{ github.ref_name }}"; then
                if git push origin HEAD:${{ github.ref_name }}; then
                  echo "✅ Successfully pushed aggregated test results"
                  PUSH_SUCCESS=true
                  break
                fi
              else
                echo "⚠️ Pull with rebase failed; aborting and retrying..."
                git rebase --abort || true
              fi
              sleep $((i * 5))
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "❌ Error: Failed to push aggregated test results after 10 attempts."
              exit 1
            fi
          else
            echo "No aggregated test-result changes to commit"
          fi
