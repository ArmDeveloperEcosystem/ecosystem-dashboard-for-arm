name: Global Test Summary (All Batches)

concurrency:
  group: global-summary
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      start_time:
        description: "UTC timestamp captured by the orchestrator before dispatching batches"
        required: true
        default: ""
      triggering_batch:
        description: "Name of the workflow that triggered this summary (optional)"
        required: false
        default: ""

jobs:
  global-summary:
    name: Generate Global Summary
    runs-on: ubuntu-24.04-arm
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest branch state
        run: |
          echo "Pulling latest branch state..."
          for i in {1..10}; do
            if git pull --rebase origin "${{ github.ref_name }}"; then
              echo "✅ Successfully pulled latest branch state"
              exit 0
            fi
            echo "❌ Pull failed, retrying in 5s... (Attempt $i/10)"
            sleep 5
          done
          echo "⚠️ Failed to pull latest branch state after 10 attempts. Proceeding with local checkout."

      - name: Download batch artifacts
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
          START_TIME: ${{ inputs.start_time }}
        run: |
          if [ -z "$START_TIME" ]; then
            echo "❌ Error: start_time input is required to locate the correct batch runs."
            exit 1
          fi

          mkdir -p downloaded-results
          DOWNLOADED_BATCHES=0

          for i in {1..19}; do
            WORKFLOW="test-all-packages-batch${i}.yml"
            ARTIFACT="batch${i}-test-results"
            DEST="downloaded-results/batch${i}"
            mkdir -p "$DEST"

            RUN_ID=$(gh run list \
              --workflow "$WORKFLOW" \
              --branch "${{ github.ref_name }}" \
              --json databaseId,createdAt \
              --limit 50 \
              --jq ".[] | select(.createdAt >= \"$START_TIME\") | .databaseId" | head -n 1)

            if [ -z "$RUN_ID" ]; then
              echo "⚠️ Warning: Could not find a batch run for $WORKFLOW after $START_TIME."
              continue
            fi

            echo "📥 Downloading $ARTIFACT from run $RUN_ID..."
            if gh run download "$RUN_ID" -n "$ARTIFACT" -D "$DEST"; then
              DOWNLOADED_BATCHES=$((DOWNLOADED_BATCHES + 1))
            else
              echo "⚠️ Warning: Failed to download $ARTIFACT from run $RUN_ID."
            fi
          done

          echo "downloaded_batches=$DOWNLOADED_BATCHES" >> $GITHUB_OUTPUT

      - name: Build test-results structure from batch artifacts
        id: assemble
        run: |
          mkdir -p test-results data/test-results

          JSON_COUNT=0
          MALFORMED_COUNT=0
          while IFS= read -r -d '' json_file; do
            if ! jq empty "$json_file" >/dev/null 2>&1; then
              echo "⚠️ Skipping malformed result artifact: $json_file"
              MALFORMED_COUNT=$((MALFORMED_COUNT + 1))
              continue
            fi
            base=$(basename "$json_file" .json)
            mkdir -p "test-results/${base}-test-results"
            cp "$json_file" "test-results/${base}-test-results/${base}.json"
            cp "$json_file" "data/test-results/${base}.json"
            JSON_COUNT=$((JSON_COUNT + 1))
          done < <(find downloaded-results -name '*.json' -print0)

          echo "json_count=$JSON_COUNT" >> $GITHUB_OUTPUT
          echo "malformed_count=$MALFORMED_COUNT" >> $GITHUB_OUTPUT
          echo "✅ Prepared $JSON_COUNT valid test result files from ${{ steps.download.outputs.downloaded_batches || '0' }} batch artifacts."

      - name: Normalize result URLs to exact job links
        if: always() && steps.assemble.outputs.json_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          data_dir = Path("data/test-results")
          cache = {}
          updated = 0
          unresolved = []

          def resolve_job_url(run_id: str, fallback_url: str) -> str:
              if run_id in cache:
                  return cache[run_id]

              try:
                  raw = subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{run_id}/jobs",
                      ],
                      text=True,
                  )
                  jobs = json.loads(raw).get("jobs", [])
              except Exception:
                  cache[run_id] = fallback_url
                  return fallback_url

              for job in jobs:
                  if (job.get("name") or "").strip().lower() == "summary":
                      continue
                  html_url = (job.get("html_url") or "").strip()
                  if html_url:
                      cache[run_id] = html_url
                      return html_url

              cache[run_id] = fallback_url
              return fallback_url

          for json_path in sorted(data_dir.glob("*.json")):
              try:
                  payload = json.loads(json_path.read_text())
              except Exception:
                  continue

              run = payload.get("run") or {}
              run_id = str(run.get("id") or "").strip()
              current_url = str(run.get("url") or "").strip()

              if not run_id or "/job/" in current_url:
                  continue

              exact_url = resolve_job_url(run_id, current_url)
              if exact_url != current_url:
                  payload["run"]["url"] = exact_url
                  rendered = json.dumps(payload, indent=2) + "\n"
                  json_path.write_text(rendered)

                  mirror = Path("test-results") / f"{json_path.stem}-test-results" / json_path.name
                  if mirror.exists():
                      mirror.write_text(rendered)
                  updated += 1
              else:
                  unresolved.append(json_path.name)

          print(f"Normalized {updated} result URLs to exact job links.")
          if unresolved:
              print("Unable to resolve exact job links for:")
              for name in unresolved[:50]:
                  print(f" - {name}")
          PY

      - name: Generate global summary
        run: |
          echo "# 📊 Global Package Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch artifacts downloaded | ${{ steps.download.outputs.downloaded_batches || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON result files assembled | ${{ steps.assemble.outputs.json_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Malformed JSON artifacts skipped | ${{ steps.assemble.outputs.malformed_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=0
          PASS=0
          FAIL=0
          MALFORMED=0
          FAIL_LIST=""
          PASS_LIST=""
          REGRESSION_TOTAL=0
          REGRESSION_PASS=0
          REGRESSION_FAIL=0
          REGRESSION_LIST=""

          for result_dir in test-results/*/; do
            for json_file in "$result_dir"*.json; do
              [ -f "$json_file" ] || continue

              SLUG=$(basename "$json_file" .json)
              if [ ! -f "content/opensource_packages/${SLUG}.md" ]; then
                continue
              fi

              TOTAL=$((TOTAL + 1))

              if ! jq empty "$json_file" >/dev/null 2>&1; then
                MALFORMED=$((MALFORMED + 1))
                FAIL=$((FAIL + 1))
                FAIL_LIST="${FAIL_LIST}| ⚠️ ${SLUG} | malformed | invalid JSON artifact skipped |"$'\n'
                continue
              fi

              NAME=$(jq -r '.package.name' "$json_file")
              VERSION=$(jq -r '.package.version' "$json_file")
              VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g' | cut -c 1-40)
              [ "${#VERSION}" -gt 39 ] && VERSION="${VERSION}..."

              STATUS=$(jq -r '.run.status' "$json_file")
              PASSED_COUNT=$(jq -r '.tests.passed' "$json_file")
              FAILED_COUNT=$(jq -r '.tests.failed' "$json_file")
              SKIPPED_COUNT=$(jq -r '.tests.skipped // 0' "$json_file")
              TOTAL_TESTS=$((PASSED_COUNT + FAILED_COUNT + SKIPPED_COUNT))
              REGRESSION_ENTRY=$(jq -c '.tests.details[]? | select(.name == "Test 6 - Regression Validation" or .name == "Regression Validation")' "$json_file" | head -n 1)

              if [ "$STATUS" = "success" ]; then
                PASS=$((PASS + 1))
                PASS_LIST="${PASS_LIST}| ✅ $NAME | $VERSION | $PASSED_COUNT/$TOTAL_TESTS passed |"$'\n'
              else
                FAIL=$((FAIL + 1))
                FAIL_LIST="${FAIL_LIST}| ❌ $NAME | $VERSION | $PASSED_COUNT/$TOTAL_TESTS passed ($FAILED_COUNT failed) |"$'\n'
              fi

              if [ -n "$REGRESSION_ENTRY" ]; then
                REGRESSION_TOTAL=$((REGRESSION_TOTAL + 1))
                REG_STATUS=$(echo "$REGRESSION_ENTRY" | jq -r '.status // "unknown"')
                CURRENT_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.current_version // .baseline_version // .current // ""')
                LATEST_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.latest_version // .next_version // .candidate_version // ""')
                NEXT_INSTALLED_VERSION=$(echo "$REGRESSION_ENTRY" | jq -r '.next_installed_version // .installed_next_version // .next_reported_version // ""')
                DECISION=$(echo "$REGRESSION_ENTRY" | jq -r '.decision // "unspecified"')
                COMPARISON=$(echo "$REGRESSION_ENTRY" | jq -r '.comparison // .note // ""' | tr '\n' ' ' | sed 's/|/\\|/g')

                if [ "$REG_STATUS" = "passed" ]; then
                  REGRESSION_PASS=$((REGRESSION_PASS + 1))
                else
                  REGRESSION_FAIL=$((REGRESSION_FAIL + 1))
                fi

                [ -z "$CURRENT_VERSION" ] && CURRENT_VERSION="n/a"
                [ -z "$LATEST_VERSION" ] && LATEST_VERSION="n/a"
                [ -z "$NEXT_INSTALLED_VERSION" ] && NEXT_INSTALLED_VERSION="n/a"
                [ -z "$COMPARISON" ] && COMPARISON="No regression note recorded."

                REGRESSION_LIST="${REGRESSION_LIST}| ${NAME} | ${CURRENT_VERSION} | ${LATEST_VERSION} | ${NEXT_INSTALLED_VERSION} | ${REG_STATUS} | ${DECISION} | ${COMPARISON} |"$'\n'
              fi
            done
          done

          echo "## Summary Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Packages** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | $PASS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | $FAIL ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Malformed Results** | $MALFORMED ⚠️ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Packages With Regression Validation** | $REGRESSION_TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Validation Passed** | $REGRESSION_PASS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Validation Failed** | $REGRESSION_FAIL ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $REGRESSION_TOTAL -gt 0 ]; then
            echo "## 🔁 Regression Validation Snapshot" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Current Tested | Next Candidate | Next Installed | Regression Status | Decision | Notes |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$REGRESSION_LIST" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $FAIL -gt 0 ]; then
            echo "## ❌ Failed Packages ($FAIL)" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Version | Details |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$FAIL_LIST" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $PASS -gt 0 ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary><b>✅ Passing Packages ($PASS) - Click to expand</b></summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Version | Details |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo -e "$PASS_LIST" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $TOTAL -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Warning:** No test results found. Check whether the batch artifacts completed and uploaded successfully." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit aggregated test results
        if: always() && steps.assemble.outputs.json_count != '0'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add data/test-results/*.json

          if ! git diff --staged --quiet; then
            git commit -m "Update aggregated test results [skip ci]"

            PUSH_SUCCESS=false
            for i in {1..10}; do
              if git pull --rebase origin "${{ github.ref_name }}"; then
                if git push origin HEAD:${{ github.ref_name }}; then
                  echo "✅ Successfully pushed aggregated test results"
                  PUSH_SUCCESS=true
                  break
                fi
              else
                echo "⚠️ Pull with rebase failed; aborting and retrying..."
                git rebase --abort || true
              fi
              sleep $((i * 5))
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "❌ Error: Failed to push aggregated test results after 10 attempts."
              exit 1
            fi
          else
            echo "No aggregated test-result changes to commit"
          fi
