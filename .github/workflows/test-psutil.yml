name: Test Psutil on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-psutil.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-psutil.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-psutil.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-psutil.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-psutil.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-psutil.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-psutil.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-psutil.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-psutil.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-psutil.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-psutil.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-psutil.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-psutil.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-psutil.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-psutil.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-psutil.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-psutil.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-psutil.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-psutil.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-psutil.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-psutil.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-psutil.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-psutil.outputs.timestamp }}
jobs:
  test-psutil:
    runs-on: ubuntu-24.04-arm
    env:
      PSUTIL_VENV: ${{ github.workspace }}/.psutil-venv
      PSUTIL_VERSION: "6.0.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Psutil'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=psutil" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/psutil" >> "$GITHUB_OUTPUT"
      - name: Install Psutil
        id: install
        run: |
          echo "Installing Psutil..."
          python3 -m venv "$PSUTIL_VENV"
          "$PSUTIL_VENV/bin/pip" install --upgrade pip
          "$PSUTIL_VENV/bin/pip" install "psutil==${PSUTIL_VERSION}"

          if [ -x "$PSUTIL_VENV/bin/python" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Psutil version
        id: version
        run: |
          VERSION=$("$PSUTIL_VENV/bin/python" -c 'import importlib.metadata; print(importlib.metadata.version("psutil"))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Psutil version: $VERSION"

      - name: Test 1 - Check psutil module import
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$PSUTIL_VENV/bin/python" -c "import psutil" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version via python
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$PSUTIL_VENV/bin/python" -c "import importlib.metadata; print(importlib.metadata.version('psutil'))" 2>&1 | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check pip show
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$PSUTIL_VENV/bin/pip" show psutil | grep -q '^Name: psutil'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "$PSUTIL_VENV/bin/python" - <<'PY'
          import psutil
          print(psutil.cpu_count())
          print(psutil.virtual_memory().total > 0)
          assert psutil.cpu_count() is not None
          assert psutil.virtual_memory().total > 0
          PY
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          NEXT=$("$PSUTIL_VENV/bin/python" - <<'PY'
          import json
          import os
          import re
          import urllib.request

          current = tuple(int(part) for part in os.environ["CURRENT_VERSION"].split(".")[:3])
          with urllib.request.urlopen("https://pypi.org/pypi/psutil/json", timeout=30) as response:
              releases = json.load(response)["releases"]
          candidates = []
          for version in releases:
              if re.fullmatch(r"\d+\.\d+\.\d+", version):
                  parts = tuple(int(part) for part in version.split("."))
                  if parts > current:
                      candidates.append((parts, version))
          print(sorted(candidates)[0][1] if candidates else "")
          PY
          )
          if [ -z "$NEXT" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable psutil version is available from PyPI" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline psutil $CURRENT passed functional CPU and memory probes; PyPI did not report a newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          NEXT_VENV="$RUNNER_TEMP/psutil-next-venv"
          python3 -m venv "$NEXT_VENV"
          "$NEXT_VENV/bin/pip" install --upgrade pip
          "$NEXT_VENV/bin/pip" install "psutil==${NEXT}"
          INSTALLED=$("$NEXT_VENV/bin/python" -c 'import importlib.metadata; print(importlib.metadata.version("psutil"))')
          if [ "$INSTALLED" = "$NEXT" ] && "$NEXT_VENV/bin/python" - <<'PY'
          import psutil
          assert psutil.cpu_count() is not None
          assert psutil.virtual_memory().total > 0
          print("psutil-next-ok")
          PY
          then
            echo "next_installed_version=$INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed and ran successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline psutil $CURRENT passed CPU and memory probes. Test 6 installed candidate $INSTALLED from PyPI and ran the same functional probe on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install/run failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline psutil $CURRENT passed, but candidate $NEXT did not complete the same functional probe on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.version || '0.0.0' }}

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Psutil Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check psutil module import: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version via python: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check pip show: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
