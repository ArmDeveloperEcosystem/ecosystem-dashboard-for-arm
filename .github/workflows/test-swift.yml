name: Test Swift (Arm64) on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/swift.md"
      - ".github/workflows/test-swift.yml"

jobs:
  test-swift:
    runs-on: ubuntu-24.04-arm
    env:
      SWIFT_VERSION: "6.0.3"
      SWIFT_WORKROOT: "/tmp/swift-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=swift" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/swift" >> "$GITHUB_OUTPUT"
          echo "current_version=${SWIFT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Swift
        id: install
        run: |
          set -euo pipefail
          VERSION="${SWIFT_VERSION}"
          ROOT="${SWIFT_WORKROOT}/current"
          ARCHIVE="${SWIFT_WORKROOT}/swift-${VERSION}.tar.gz"
          URL="https://download.swift.org/swift-${VERSION}-release/ubuntu2404-aarch64/swift-${VERSION}-RELEASE/swift-${VERSION}-RELEASE-ubuntu24.04-aarch64.tar.gz"

          sudo apt-get update
          sudo apt-get install -y curl clang libicu-dev libpython3.12 libxml2 libncurses6 libsqlite3-0 libcurl4-openssl-dev libedit2 libz3-4 tzdata zlib1g binutils xz-utils file ca-certificates

          rm -rf "${SWIFT_WORKROOT}"
          mkdir -p "${SWIFT_WORKROOT}"
          curl -fL --retry 5 --retry-all-errors --retry-delay 2 "${URL}" -o "${ARCHIVE}"
          mkdir -p "${ROOT}"
          tar -xzf "${ARCHIVE}" -C "${ROOT}" --strip-components=1

          SWIFT_BIN="${ROOT}/usr/bin/swift"
          SWIFTC_BIN="${ROOT}/usr/bin/swiftc"
          VERSION_OUTPUT=$("${SWIFT_BIN}" --version 2>&1 || true)

          if [ -x "${SWIFT_BIN}" ] && [ -x "${SWIFTC_BIN}" ] && printf '%s\n' "${VERSION_OUTPUT}" | grep -Fq "Swift version ${VERSION}"; then
            echo "root=${ROOT}" >> "$GITHUB_OUTPUT"
            echo "swift_bin=${SWIFT_BIN}" >> "$GITHUB_OUTPUT"
            echo "swiftc_bin=${SWIFTC_BIN}" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${VERSION_OUTPUT}" || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Swift version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.swift_bin }}" --version | awk '/Swift version/{print $3; exit}')
          LATEST=$(python3 - <<'PY'
          import json
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/swiftlang/swift/releases?per_page=10",
              headers={"User-Agent": "github-actions"},
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for release in data:
              if release.get("draft") or release.get("prerelease"):
                  continue
              tag = str(release.get("tag_name", "")).strip()
              if tag.startswith("swift-") and tag.endswith("-RELEASE"):
                  print(tag[len("swift-") : -len("-RELEASE")])
                  break
          else:
              print("unknown")
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Swift binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.swift_bin }}" ] && [ -x "${{ steps.install.outputs.swiftc_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Swift version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${SWIFT_VERSION}"
          REPORTED=$("${{ steps.install.outputs.swift_bin }}" --version | awk '/Swift version/{print $3; exit}')
          if [ "${REPORTED}" = "${EXPECTED}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.swift_bin }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Swift help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          "${{ steps.install.outputs.swift_bin }}" --help > /tmp/swift-help.txt 2>&1
          if grep -qiE 'usage:|overview:|subcommands:' /tmp/swift-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/swift-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file -L "${{ steps.install.outputs.swift_bin }}" | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file -L "${{ steps.install.outputs.swift_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat > /tmp/hello.swift <<'EOF'
          print("Hello, Arm Swift!")
          EOF
          "${{ steps.install.outputs.swiftc_bin }}" /tmp/hello.swift -o /tmp/hello-swift
          if /tmp/hello-swift | grep -q "Hello, Arm Swift!"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          NEXT_ROOT="${SWIFT_WORKROOT}/regression"
          NEXT_ARCHIVE="${SWIFT_WORKROOT}/swift-${LATEST}.tar.gz"
          NEXT_URL="https://download.swift.org/swift-${LATEST}-release/ubuntu2404-aarch64/swift-${LATEST}-RELEASE/swift-${LATEST}-RELEASE-ubuntu24.04-aarch64.tar.gz"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run, but the latest stable upstream release could not be resolved for isolated regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run and already matches the latest stable upstream release."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "${NEXT_ROOT}"
          curl -fL --retry 5 --retry-all-errors --retry-delay 2 "${NEXT_URL}" -o "${NEXT_ARCHIVE}"
          mkdir -p "${NEXT_ROOT}"
          tar -xzf "${NEXT_ARCHIVE}" -C "${NEXT_ROOT}" --strip-components=1

          NEXT_SWIFT="${NEXT_ROOT}/usr/bin/swift"
          NEXT_SWIFTC="${NEXT_ROOT}/usr/bin/swiftc"
          NEXT_VERSION=$("${NEXT_SWIFT}" --version | awk '/Swift version/{print $3; exit}')
          cat > /tmp/hello-next.swift <<'EOF'
          print("Hello, Arm Swift!")
          EOF
          "${NEXT_SWIFTC}" /tmp/hello-next.swift -o /tmp/hello-next-swift

          if [ -x "${NEXT_SWIFT}" ] && \
             [ -x "${NEXT_SWIFTC}" ] && \
             [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             file -L "${NEXT_SWIFT}" | grep -qiE 'arm aarch64|aarch64' && \
             /tmp/hello-next-swift | grep -q "Hello, Arm Swift!"; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate toolchain compiled and ran a Swift program successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate toolchain compiled and ran a Swift program successfully."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run, but candidate version ${LATEST} did not complete the expected Arm64 toolchain validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Swift version ${CURRENT} passed the real Arm64 compile-and-run smoke in this run, but candidate version ${LATEST} did not complete the expected Arm64 toolchain validation path."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:${JOB_ID}"
          fi

          cat > test-results/swift.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Swift (Arm64)",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Swift",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Swift binaries exist",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Swift version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Swift help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-results
          path: test-results/swift.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Swift (Arm64) Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Swift binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Swift version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Swift help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
