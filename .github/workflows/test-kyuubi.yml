name: Test Kyuubi on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/kyuubi.md"
      - ".github/workflows/test-kyuubi.yml"

jobs:
  test-kyuubi:
    runs-on: ubuntu-24.04-arm
    env:
      KYUUBI_VERSION: "1.11.0"
      KYUUBI_RELEASE: "1.11.0"
      KYUUBI_DIR: /tmp/kyuubi-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=kyuubi" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/kyuubi" >> "$GITHUB_OUTPUT"

      - name: Install Kyuubi
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl openjdk-17-jre-headless tar
          rm -rf "${KYUUBI_DIR}"
          mkdir -p "${KYUUBI_DIR}"
          cd "${KYUUBI_DIR}"
          curl -fsSLO "https://downloads.apache.org/kyuubi/kyuubi-${KYUUBI_RELEASE}/apache-kyuubi-${KYUUBI_RELEASE}-bin.tgz"
          tar -xzf "apache-kyuubi-${KYUUBI_RELEASE}-bin.tgz"

          if [ -x "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin/bin/kyuubi" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Kyuubi version
        id: version
        run: |
          echo "version=${KYUUBI_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Kyuubi binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin/bin/kyuubi" ] && \
             [ -x "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin/bin/kyuubi-ctl" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Kyuubi release version mapping
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -d "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin" ] && \
             [ -f "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin.tgz" ] && \
             tar -tzf "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin.tgz" | head -n 1 | grep -q "apache-kyuubi-${KYUUBI_RELEASE}-bin/"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Kyuubi help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          HELP_OUTPUT=$("${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin/bin/kyuubi" --help 2>&1)
          if printf '%s\n' "${HELP_OUTPUT}" | grep -q "Usage: bin/kyuubi command" && \
             printf '%s\n' "${HELP_OUTPUT}" | grep -q "start"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "${HELP_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${KYUUBI_DIR}/apache-kyuubi-${KYUUBI_RELEASE}-bin"
          timeout 30s bin/kyuubi start 2>&1 | tee /tmp/kyuubi-start.log || true
          STATUS_OUTPUT=$(timeout 10s bin/kyuubi status 2>&1 || true)
          if printf '%s\n' "${STATUS_OUTPUT}" | grep -q "Kyuubi is running" && \
             ls pid/*.pid >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/kyuubi-start.log
            printf '%s\n' "${STATUS_OUTPUT}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          timeout 15s bin/kyuubi stop >/dev/null 2>&1 || true
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          LATEST_VERSION=$(python3 -c 'from urllib.request import urlopen; import re; html = urlopen("https://downloads.apache.org/kyuubi/", timeout=20).read().decode("utf-8", "ignore"); versions = sorted(set(re.findall(r"kyuubi-([0-9]+\\.[0-9]+\\.[0-9]+)/", html))); print(versions[-1] if versions else "not_yet_checked")')
          if [ "${LATEST_VERSION}" = "${KYUUBI_VERSION}" ]; then
            DECISION="pinned_is_latest"
            COMPARISON="Current pinned Kyuubi release ${KYUUBI_VERSION} was smoke-tested in this run and it already matches the latest stable upstream release."
          else
            DECISION="hold_current_until_regression_run"
            COMPARISON="Current pinned Kyuubi release ${KYUUBI_VERSION} was smoke-tested in this run. A newer upstream candidate ${LATEST_VERSION} exists but was not automatically daemon-tested in this run, so the version should stay pinned until an explicit regression comparison is completed."
          fi
          echo "current_version=${KYUUBI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/kyuubi.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Kyuubi",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Scala",
              "category": "Containers and Orchestration"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Kyuubi binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Kyuubi release version mapping", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Kyuubi help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF_JSON

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kyuubi-test-results
          path: test-results/kyuubi.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Kyuubi Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current pinned version:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest stable candidate:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Comparison:** ${{ steps.test6.outputs.comparison || 'Current pinned version was smoke-tested in this run.' }}" >> "$GITHUB_STEP_SUMMARY"
