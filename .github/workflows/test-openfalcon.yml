name: Test Open-falcon on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-openfalcon.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-openfalcon.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-openfalcon.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-openfalcon.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-openfalcon.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-openfalcon.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-openfalcon.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-openfalcon.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-openfalcon.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-openfalcon.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-openfalcon.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-openfalcon.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-openfalcon.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-openfalcon.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-openfalcon.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-openfalcon.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-openfalcon.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-openfalcon.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-openfalcon.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-openfalcon.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-openfalcon.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-openfalcon.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-openfalcon.outputs.timestamp }}
jobs:
  test-openfalcon:
    runs-on: ubuntu-24.04-arm
    env:
      OPENFALCON_VERSION: "0.2.1"
      OPENFALCON_NEXT_VERSION: "0.3"
      OPENFALCON_REPO: "https://github.com/open-falcon/falcon-plus.git"
      OPENFALCON_WORKROOT: "/tmp/openfalcon-smoke"
      OPENFALCON_MODULE_DIRS: "agent aggregator graph hbs judge nodata transfer gateway api alarm"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Open-falcon'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=openfalcon" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/openfalcon" >> "$GITHUB_OUTPUT"
          echo "current_version=${OPENFALCON_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Open-falcon
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make git golang-go ca-certificates curl file

          rm -rf "${OPENFALCON_WORKROOT}"
          GOPATH_DIR="${OPENFALCON_WORKROOT}/gopath"
          BASE_DIR="${GOPATH_DIR}/src/github.com/open-falcon/falcon-plus"
          mkdir -p "${GOPATH_DIR}/src/github.com/open-falcon"

          git clone --depth 1 --branch "v${OPENFALCON_VERSION}" "${OPENFALCON_REPO}" "${BASE_DIR}"
          for module in ${OPENFALCON_MODULE_DIRS}; do
            mkdir -p "${BASE_DIR}/bin/${module}"
          done

          cd "${BASE_DIR}"
          GO111MODULE=off GOPATH="${GOPATH_DIR}" make all

          test -x "${BASE_DIR}/open-falcon"
          test -x "${BASE_DIR}/bin/agent/falcon-agent"

          echo "gopath_dir=${GOPATH_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Open-falcon version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION_FILE=$(tr -d '[:space:]' < "${BASE_DIR}/VERSION" || true)
          VERSION_CMD=$("${BASE_DIR}/open-falcon" -v 2>&1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1 || true)
          VERSION="${VERSION_CMD:-$VERSION_FILE}"
          if [ -z "$VERSION" ]; then
            VERSION="${OPENFALCON_VERSION}"
          fi
          LATEST="${OPENFALCON_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Open-falcon version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check Open-falcon binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          for bin in \
            "${BASE_DIR}/open-falcon" \
            "${BASE_DIR}/bin/agent/falcon-agent" \
            "${BASE_DIR}/bin/graph/falcon-graph" \
            "${BASE_DIR}/bin/transfer/falcon-transfer" \
            "${BASE_DIR}/bin/api/falcon-api"; do
            if [ ! -x "$bin" ]; then
              echo "Missing expected binary: $bin"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          done
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          VERSION_FILE=$(tr -d '[:space:]' < "${BASE_DIR}/VERSION" || true)
          VERSION_CMD=$("${BASE_DIR}/open-falcon" -v 2>&1 | tee /tmp/openfalcon-version.txt | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1 || true)
          DETECTED="${VERSION_CMD:-$VERSION_FILE}"
          if [ "${VERSION_FILE}" = "${OPENFALCON_VERSION}" ] && [ "${DETECTED}" = "${OPENFALCON_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openfalcon-version.txt || true
            echo "VERSION file: ${VERSION_FILE}"
            echo "Detected version: ${DETECTED}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check wrapper help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          timeout 20 "${BASE_DIR}/open-falcon" --help > /tmp/openfalcon-help.txt 2>&1 || \
            timeout 20 "${BASE_DIR}/open-falcon" > /tmp/openfalcon-help.txt 2>&1 || true
          if grep -Eq 'Usage:|start|stop|monitor|reload' /tmp/openfalcon-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openfalcon-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ "$(uname -m)" = "aarch64" ] && \
             file "${BASE_DIR}/open-falcon" | grep -qi "ARM aarch64" && \
             file "${BASE_DIR}/bin/agent/falcon-agent" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_DIR}/open-falcon" || true
            file "${BASE_DIR}/bin/agent/falcon-agent" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional dispatcher validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          timeout 20 "${BASE_DIR}/open-falcon" > /tmp/openfalcon-functional.txt 2>&1 || true
          if grep -Eq 'Usage:|start|stop|check|monitor|reload' /tmp/openfalcon-functional.txt && \
             [ -f "${BASE_DIR}/VERSION" ] && \
             [ -x "${BASE_DIR}/bin/judge/falcon-judge" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openfalcon-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_ROOT="/tmp/openfalcon-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run, but the latest stable source release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run, but the latest stable source release could not be resolved for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run and already matches the latest stable source release on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_ROOT}"
          REGRESSION_GOPATH="${REGRESSION_ROOT}/gopath"
          NEXT_DIR="${REGRESSION_GOPATH}/src/github.com/open-falcon/falcon-plus"
          mkdir -p "${REGRESSION_GOPATH}/src/github.com/open-falcon"
          git clone --depth 1 --branch "v${LATEST}" "${OPENFALCON_REPO}" "${NEXT_DIR}"
          for module in ${OPENFALCON_MODULE_DIRS}; do
            mkdir -p "${NEXT_DIR}/bin/${module}"
          done
          cd "${NEXT_DIR}"
          GO111MODULE=off GOPATH="${REGRESSION_GOPATH}" make all

          NEXT_FILE=$(tr -d '[:space:]' < "${NEXT_DIR}/VERSION" || true)
          NEXT_CMD=$("${NEXT_DIR}/open-falcon" -v 2>&1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n 1 || true)
          NEXT_VERSION="${NEXT_CMD:-$NEXT_FILE}"
          timeout 20 "${NEXT_DIR}/open-falcon" > /tmp/openfalcon-next-functional.txt 2>&1 || true

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             [ -x "${NEXT_DIR}/bin/agent/falcon-agent" ] && \
             [ -x "${NEXT_DIR}/bin/graph/falcon-graph" ] && \
             file "${NEXT_DIR}/open-falcon" | grep -qi "ARM aarch64" && \
             grep -Eq 'Usage:|start|stop|check|monitor|reload' /tmp/openfalcon-next-functional.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the wrapper reported version ${NEXT_VERSION}, and the generated dispatcher plus module binaries were usable on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the wrapper reported version ${NEXT_VERSION}, and the generated dispatcher plus module binaries were usable on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/openfalcon-next-functional.txt || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not rebuild into a usable Arm64 wrapper and module set." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Open-falcon version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not rebuild into a usable Arm64 wrapper and module set."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Open-falcon Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Open-falcon binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check wrapper help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional dispatcher validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
