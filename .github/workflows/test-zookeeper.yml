name: Test Zookeeper on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/zookeeper.md"
      - ".github/workflows/test-zookeeper.yml"

jobs:
  test-zookeeper:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=zookeeper" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/zookeeper" >> "$GITHUB_OUTPUT"
      - name: Install Zookeeper
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zookeeperd netcat-openbsd
          if [ -x /usr/share/zookeeper/bin/zkServer.sh ] && [ -x /usr/share/zookeeper/bin/zkCli.sh ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Zookeeper version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(/usr/share/zookeeper/bin/zkServer.sh version 2>&1 | sed -n 's/.*zookeeper-[0-9]\+\.[0-9]\+\.[0-9]\+\s\+\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p' | head -n 1 | tr -d ' ')
          if [ -z "$VERSION" ]; then
            VERSION=$(dpkg-query -W -f='${Version}' zookeeperd | cut -d- -f1)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x /usr/share/zookeeper/bin/zkServer.sh ] && [ -x /usr/share/zookeeper/bin/zkCli.sh ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if /usr/share/zookeeper/bin/zkServer.sh version 2>&1 | grep -q 'ZooKeeper'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if /usr/share/zookeeper/bin/zkCli.sh -help 2>&1 | tee /tmp/zk-help.log | grep -Eqi 'ZooKeeper|usage:.*zkCli|Connecting to localhost'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/zk-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ZK_SMOKE_ROOT=$(mktemp -d)
          ZK_PORT=22181
          ZK_CFG="$ZK_SMOKE_ROOT/zoo.cfg"
          cat > "$ZK_CFG" <<EOF_CFG
          tickTime=2000
          dataDir=$ZK_SMOKE_ROOT/data
          clientPort=$ZK_PORT
          admin.enableServer=false
          standaloneEnabled=true
          4lw.commands.whitelist=ruok,stat,mntr
          EOF_CFG
          mkdir -p "$ZK_SMOKE_ROOT/data"
          ZK_LOG="$ZK_SMOKE_ROOT/zookeeper.log"
          cleanup() {
            if [ -n "${ZK_PID:-}" ] && kill -0 "$ZK_PID" >/dev/null 2>&1; then
              kill "$ZK_PID" >/dev/null 2>&1 || true
              wait "$ZK_PID" >/dev/null 2>&1 || true
            fi
            rm -rf "$ZK_SMOKE_ROOT"
          }
          trap cleanup EXIT
          sudo /usr/share/zookeeper/bin/zkServer.sh start-foreground "$ZK_CFG" >"$ZK_LOG" 2>&1 &
          ZK_PID=$!
          READY=0
          for _ in $(seq 1 30); do
            if ! kill -0 "$ZK_PID" >/dev/null 2>&1; then
              break
            fi
            if printf 'ruok\n' | nc 127.0.0.1 "$ZK_PORT" 2>/dev/null | grep -q '^imok$'; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            cat "$ZK_LOG" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! printf 'ls /\nquit\n' | /usr/share/zookeeper/bin/zkCli.sh -server "127.0.0.1:$ZK_PORT" 2>/dev/null | grep -q 'zookeeper'; then
            cat "$ZK_LOG" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          cat > test-results/zookeeper.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Zookeeper",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Databases - Big-data"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Binary Existence", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Version Output", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Help Output or Configuration", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zookeeper-test-results
          path: test-results/zookeeper.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Zookeeper Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "- Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "- Test 3 - Check Help Output or Configuration: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
