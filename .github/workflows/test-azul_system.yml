# 7. Update package metadata in the JSON generation step
# 8. Uncomment the appropriate trigger(s) in the 'on:' section
#
# See .github/workflows/test-nginx.yml and test-envoy.yml for real examples. Template
#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Zulu OpenJDK (Azul Systems) placeholders with your package name (e.g., "Redis")
# 3. Replace all azul_system placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the 'push:' trigger section below (remove the workflow_dispatch if desired)
#
# See test-nginx.yml and test-envoy.yml for real examples.

name: Test Zulu OpenJDK (Azul Systems) on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-azul_system.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-azul_system.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-azul_system.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-azul_system.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-azul_system.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-azul_system.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-azul_system.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-azul_system.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-azul_system.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-azul_system.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-azul_system.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-azul_system.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-azul_system.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-azul_system.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-azul_system.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-azul_system.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-azul_system.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-azul_system.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-azul_system.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-azul_system.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-azul_system.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-azul_system.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-azul_system.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-azul_system.outputs.timestamp }}
jobs:
  test-azul_system:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Zulu OpenJDK (Azul Systems)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=azul_system" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/azul_system" >> "$GITHUB_OUTPUT"
      - name: Install Zulu OpenJDK (Azul Systems)
        id: install
        run: |
          echo "Installing Zulu OpenJDK (Azul Systems)..."
          
          # Direct download of Zulu 17 LTS for ARM64
          # Using a specific version to ensure stability.
          URL="https://cdn.azul.com/zulu/bin/zulu17.46.19-ca-jdk17.0.9-linux_aarch64.tar.gz"
          
          echo "Downloading from $URL..."
          curl -L -o zulu.tar.gz "$URL"
          
          if file zulu.tar.gz | grep -q "gzip compressed data"; then
            mkdir -p zulu
            tar -xzf zulu.tar.gz -C zulu --strip-components=1
            
            # Install to /usr/local/bin/azul_system (symlink java)
            # MUST use symlink (not cp) so java can find ../lib/libjli.so
            sudo ln -sf "$PWD/zulu/bin/java" /usr/local/bin/azul_system
            
            # Also valid to just use JAVA_HOME but the test expects a binary name on path
            
            echo "Zulu OpenJDK installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Failed to download Zulu OpenJDK"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Zulu OpenJDK (Azul Systems) version
        id: version
        run: |
          # Java usually prints version to stderr
          # Try -version and handle potential output variations
          VERSION=$(azul_system -version 2>&1 | grep -oP '(?<=version ")[0-9._]+' | head -1 || echo "unknown")
          if [ "$VERSION" == "unknown" ]; then
             VERSION=$(azul_system -version 2>&1 | grep -oP '[0-9.]+' | head -1 || echo "unknown")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Zulu OpenJDK (Azul Systems) version: $VERSION"

      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check azul_system binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"

          if command -v azul_system &> /dev/null; then
            echo "✓ azul_system binary found"
            STATUS="passed"
          else
            echo "✗ azul_system binary not found"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 2 - Check azul_system version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"

          # Java usually prints version to stderr
          # Capture both stdout and stderr for the check
          OUTPUT=$(azul_system -version 2>&1)
          if echo "$OUTPUT" | grep -qi "version\|openjdk\|zulu"; then
            echo "✓ azul_system version command works"
            echo "$OUTPUT" | head -n 3
            STATUS="passed"
          else
            echo "✗ azul_system version command failed"
            echo "Output was: $OUTPUT"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 3 - Check azul_system help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"

          # Java prints help to stderr/stdout. Try both -help and -?
          # Capture output to variable first to avoid pipe exit code masking
          OUTPUT_HELP=$(azul_system -help 2>&1 || true)
          OUTPUT_Q=$(azul_system -? 2>&1 || true)
          
          if echo "$OUTPUT_HELP" | grep -qi "usage\|options" || echo "$OUTPUT_Q" | grep -qi "usage\|options"; then
            echo "✓ azul_system help command works"
            STATUS="passed"
          else
            echo "✗ azul_system help command failed"
            echo "Help Output: $OUTPUT_HELP"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"

          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            STATUS="passed"
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"

          # Basic functional check: try to run with -version or -help and check exit code
          # Java -version actually exits with 0, but just in case, we are permissive
          if azul_system -version > /dev/null 2>&1 || azul_system -help > /dev/null 2>&1; then
            echo "✓ Basic functional check passed"
            STATUS="passed"
          else
            echo "✗ Basic functional check failed"
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          read -r LATEST_NAME LATEST_VERSION LATEST_URL <<EOF
          $(
            python3 - <<'PY'
            import json
            import urllib.parse
            import urllib.request

            base = "https://api.azul.com/metadata/v1/zulu/packages/"
            params = {
                "java_version": "17",
                "os": "linux",
                "arch": "arm",
                "archive_type": "tar.gz",
                "java_package_type": "jdk",
                "release_status": "ga",
                "availability_types": "ca",
                "latest": "true",
            }
            url = base + "?" + urllib.parse.urlencode(params)
            with urllib.request.urlopen(url, timeout=30) as response:
                data = json.load(response)

            chosen = None
            for item in data:
                name = item.get("name", "")
                if "linux_aarch64" not in name:
                    continue
                if "-ca-jdk" not in name:
                    continue
                if any(token in name for token in ("crac", "musl", "-fx-", "aarch32")):
                    continue
                chosen = item
                break

            if not chosen:
                print()
            else:
                version = ".".join(str(part) for part in chosen.get("java_version", []))
                print(chosen["name"], version, chosen["download_url"])
            PY
          )
          EOF
          if [ -z "${LATEST_NAME:-}" ] || [ -z "${LATEST_VERSION:-}" ] || [ -z "${LATEST_URL:-}" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the next regression candidate could not be resolved automatically from Azul metadata." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the next regression candidate could not be resolved automatically from Azul metadata."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST_VERSION"
          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/zulu-next.tar.gz"
          if curl -fsSL -o "$NEXT_TAR" "$LATEST_URL"; then
            echo "Next version download status: passed"
            mkdir -p "$NEXT_DIR/zulu"
            tar -xzf "$NEXT_TAR" -C "$NEXT_DIR/zulu" --strip-components=1
            NEXT_BIN="$NEXT_DIR/zulu/bin/java"
            if [ -x "$NEXT_BIN" ]; then
              NEXT_INSTALLED_VERSION=$("$NEXT_BIN" -version 2>&1 | grep -oP '(?<=version ")[0-9._]+' | head -1 || true)
              if [ -z "$NEXT_INSTALLED_VERSION" ]; then
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" -version 2>&1 | grep -oE '[0-9]+(\.[0-9]+)+' | head -1 || true)
              fi
              if [ -n "$NEXT_INSTALLED_VERSION" ] && [ "$NEXT_INSTALLED_VERSION" = "$LATEST_VERSION" ]; then
                echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run. Regression validation installed candidate version $LATEST_VERSION on Arm64, and the downloaded JDK reported version $NEXT_INSTALLED_VERSION." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "Details: Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run. Regression validation installed candidate version $LATEST_VERSION on Arm64, and the downloaded JDK reported version $NEXT_INSTALLED_VERSION."
                echo "status=passed" >> "$GITHUB_OUTPUT"
              else
                echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
                echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION reported version ${NEXT_INSTALLED_VERSION:-unknown} after installation on Arm64." >> "$GITHUB_OUTPUT"
                echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
                echo "Regression install result: Next version install failed on Arm64"
                echo "Details: Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION reported version ${NEXT_INSTALLED_VERSION:-unknown} after installation on Arm64."
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION did not extract a usable Arm64 java binary." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: install_failed"
              echo "Regression install result: Next version install failed on Arm64"
              echo "Details: Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION did not extract a usable Arm64 java binary."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Zulu OpenJDK version $CURRENT passed smoke tests in this run, but the regression candidate $LATEST_VERSION could not be downloaded on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check azul_system binary exists
          STATUS_1="${{ steps.test1.outputs.status || 'skipped' }}"
          DURATION_1="${{ steps.test1.outputs.duration || 0 }}"

          if [ "$STATUS_1" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_1" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_1))

          # Check azul_system version command
          STATUS_2="${{ steps.test2.outputs.status || 'skipped' }}"
          DURATION_2="${{ steps.test2.outputs.duration || 0 }}"

          if [ "$STATUS_2" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_2" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_2))

          # Check azul_system help output
          STATUS_3="${{ steps.test3.outputs.status || 'skipped' }}"
          DURATION_3="${{ steps.test3.outputs.duration || 0 }}"

          if [ "$STATUS_3" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_3" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_3))

          # Architecture Verification
          STATUS_4="${{ steps.test4.outputs.status || 'skipped' }}"
          DURATION_4="${{ steps.test4.outputs.duration || 0 }}"

          if [ "$STATUS_4" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_4" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_4))

          # Functional Validation
          STATUS_5="${{ steps.test5.outputs.status || 'skipped' }}"
          DURATION_5="${{ steps.test5.outputs.duration || 0 }}"

          if [ "$STATUS_5" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$STATUS_5" != "skipped" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + DURATION_5))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "$STATUS_1" == "passed" ] && \
             [ "$STATUS_2" == "passed" ] && \
             [ "$STATUS_3" == "passed" ] && \
             [ "$STATUS_4" == "passed" ] && \
             [ "$STATUS_5" == "passed" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
              REGRESSION_RESULT="Regression validation passed"
            else
              REGRESSION_RESULT="Regression validation failed"
            fi
          fi
          echo "## Zulu OpenJDK (Azul Systems) Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check azul_system binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check azul_system version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check azul_system help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
