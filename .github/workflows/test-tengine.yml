name: Test Tengine on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/tengine.md"
      - ".github/workflows/test-tengine.yml"

jobs:
  test-tengine:
    runs-on: ubuntu-24.04-arm
    env:
      TENGINE_VERSION: "3.0.0"
      TENGINE_NEXT_VERSION: "3.1.0"
      TENGINE_URL: "https://github.com/alibaba/tengine/archive/refs/tags/3.0.0.tar.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=tengine" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/tengine" >> "$GITHUB_OUTPUT"
          echo "current_version=${TENGINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Tengine
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl libpcre3-dev zlib1g-dev libssl-dev

          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/tengine.tar.gz" "${TENGINE_URL}"
          tar -xzf "${TMP_DIR}/tengine.tar.gz" -C "${TMP_DIR}"
          SRC_DIR="${TMP_DIR}/tengine-${TENGINE_VERSION}"
          PREFIX="${TMP_DIR}/tengine-install"

          cd "${SRC_DIR}"
          ./configure --prefix="${PREFIX}"
          make -j"$(nproc)"
          make install

          sed -i 's/listen       80;/listen       8080;/' "${PREFIX}/conf/nginx.conf"

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Tengine version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.prefix }}/sbin/nginx" -v 2>&1 | sed -n 's/^Tengine version: Tengine\///p' | head -1 | xargs || echo "unknown")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${TENGINE_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          if [ -x "${PREFIX}/sbin/nginx" ] && [ -f "${PREFIX}/conf/nginx.conf" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if "${{ steps.install.outputs.prefix }}/sbin/nginx" -v 2>&1 | grep -q "Tengine/${TENGINE_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if "${{ steps.install.outputs.prefix }}/sbin/nginx" -p "${{ steps.install.outputs.prefix }}" -c conf/nginx.conf -t 2>&1 | grep -q "syntax is ok"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ] && file "${{ steps.install.outputs.prefix }}/sbin/nginx" | grep -qi 'ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PREFIX="${{ steps.install.outputs.prefix }}"

          echo "tengine-ok" > "${PREFIX}/html/index.html"
          "${PREFIX}/sbin/nginx" -p "${PREFIX}" -c conf/nginx.conf

          cleanup() {
            "${PREFIX}/sbin/nginx" -p "${PREFIX}" -s quit >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080 >/tmp/tengine.out 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if grep -q 'tengine-ok' /tmp/tengine.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/tengine.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          NEXT_WORKROOT=$(mktemp -d)
          NEXT_PREFIX="${NEXT_WORKROOT}/tengine-install"
          trap 'rm -rf "${NEXT_WORKROOT}"' EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Tengine version ${CURRENT} passed the real Arm64 build and HTTP smoke in this run, but the latest stable upstream release could not be resolved for isolated regression validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo "${NEXT_WORKROOT}/tengine.tar.gz" \
            "https://github.com/alibaba/tengine/archive/refs/tags/${LATEST}.tar.gz"
          tar -xzf "${NEXT_WORKROOT}/tengine.tar.gz" -C "${NEXT_WORKROOT}"
          cd "${NEXT_WORKROOT}/tengine-${LATEST}"
          ./configure --prefix="${NEXT_PREFIX}"
          make -j"$(nproc)"
          make install
          sed -i 's/listen       80;/listen       8080;/' "${NEXT_PREFIX}/conf/nginx.conf"

          NEXT_VERSION=$("${NEXT_PREFIX}/sbin/nginx" -v 2>&1 | sed -n 's/^Tengine version: Tengine\///p' | head -1 | xargs || true)
          echo "tengine-next" > "${NEXT_PREFIX}/html/index.html"
          "${NEXT_PREFIX}/sbin/nginx" -p "${NEXT_PREFIX}" -c conf/nginx.conf
          cleanup_candidate() {
            "${NEXT_PREFIX}/sbin/nginx" -p "${NEXT_PREFIX}" -s quit >/dev/null 2>&1 || true
          }
          trap cleanup_candidate EXIT

          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080 >/tmp/tengine-next.out 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && \
             file "${NEXT_PREFIX}/sbin/nginx" | grep -qi 'ARM aarch64' && \
             "${NEXT_PREFIX}/sbin/nginx" -p "${NEXT_PREFIX}" -c conf/nginx.conf -t 2>&1 | grep -q "syntax is ok" && \
             grep -q 'tengine-next' /tmp/tengine-next.out; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Tengine version ${CURRENT} passed the real Arm64 build and HTTP smoke in this run. Regression validation rebuilt candidate version ${LATEST} from the official source tarball and confirmed the isolated config and HTTP response paths successfully." >> "$GITHUB_OUTPUT"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
          else
            cat /tmp/tengine-next.out || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Tengine version ${CURRENT} passed the real Arm64 build and HTTP smoke in this run, but candidate version ${LATEST} did not complete the isolated validation path successfully." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_URL=$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          job_id = os.environ["GITHUB_JOB"]
          token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions",
              },
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          for job in data.get("jobs", []):
              if job.get("name") in (f"{job_id} / {job_id}", job_id):
                  print(job.get("html_url", ""))
                  break
          PY
          )
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          cat > test-results/tengine.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Tengine",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tengine-test-results
          path: test-results/tengine.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Tengine Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- Current (Pinned): ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version }}"
            echo "- Next (Latest Stable): ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- Comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
