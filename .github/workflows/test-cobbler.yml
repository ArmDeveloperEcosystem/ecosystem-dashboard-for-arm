name: Test Cobbler on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cobbler.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cobbler.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cobbler.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cobbler.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cobbler.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cobbler.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cobbler.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cobbler.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cobbler.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cobbler.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cobbler.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cobbler.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cobbler.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cobbler.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cobbler.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cobbler.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cobbler.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cobbler.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-cobbler.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cobbler.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cobbler.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cobbler.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cobbler.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cobbler.outputs.timestamp }}
jobs:
  test-cobbler:
    runs-on: ubuntu-24.04-arm
    env:
      COBBLER_BASELINE_VERSION: "v3.3.6"
      COBBLER_NEXT_VERSION: "v3.3.7"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Cobbler'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cobbler" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cobbler" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv git apache2-dev libsystemd-dev libsasl2-dev
      
      - name: Install Cobbler
        id: install
        run: |
          set -euo pipefail
          echo "Installing Cobbler from source..."
          python3 -m venv "$GITHUB_WORKSPACE/venv"
          source "$GITHUB_WORKSPACE/venv/bin/activate"
          
          git clone --depth 1 --branch "${COBBLER_BASELINE_VERSION}" https://github.com/cobbler/cobbler.git
          cd cobbler
          sudo apt-get update
          sudo apt-get install -y make gcc python3-dev libapache2-mod-wsgi-py3
          pip install --upgrade pip setuptools wheel
          pip install coverage
          pip install --no-build-isolation .[cli]

          if [ ! -x "$GITHUB_WORKSPACE/venv/bin/cobbler" ]; then
            echo "Could not find cobbler CLI in venv after install."
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! python3 -c "import cobbler" >/dev/null 2>&1; then
            echo "Cobbler Python module import failed after install."
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "install_status=success" >> "$GITHUB_OUTPUT"
          echo "$GITHUB_WORKSPACE/venv/bin" >> "$GITHUB_PATH"

      
      - name: Get Cobbler version
        id: version
        run: |
          RAW_VERSION=$("$GITHUB_WORKSPACE/venv/bin/cobbler" --version 2>&1 || true)
          VERSION=$(printf '%s\n' "$RAW_VERSION" | grep -Eo '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${COBBLER_BASELINE_VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Cobbler version: $VERSION"
      
      - name: Test 1 - Check Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          
          # We rely on GITHUB_PATH added in the install step
          echo "Current PATH: $PATH"
          
          if [ -f "$GITHUB_WORKSPACE/venv/bin/cobbler" ]; then
            echo "✓ cobbler binary found at $GITHUB_WORKSPACE/venv/bin/cobbler"
            $GITHUB_WORKSPACE/venv/bin/cobbler --version
            STATUS="passed"
          else
            echo "✗ cobbler binary not found at expected path"
            ls -l $GITHUB_WORKSPACE/venv/bin/ || true
            find . -name cobbler -type f 
            STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      
      - name: Test 2 - Run Help
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          source venv/bin/activate
          
          if $GITHUB_WORKSPACE/venv/bin/cobbler --help; then
             echo "✓ cobbler help works"
             STATUS="passed"
          else
             echo "✗ cobbler help failed"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      - name: Test 3 - Check Configuration (Dry Run)
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          source venv/bin/activate
          
          # Cobbler check usually requires root and running service, but we can try
          # or just check if we can import the module
          if python3 -c "import cobbler; print('Import successful')"; then
             echo "✓ cobbler module import successful"
             STATUS="passed"
          else
             echo "✗ cobbler module import failed"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi

      - name: Test 4 - Check Signature (Optional)
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          STATUS="failed"
          source venv/bin/activate
          
          if $GITHUB_WORKSPACE/venv/bin/cobbler signature report --help; then
             echo "✓ cobbler signature command works"
             STATUS="passed"
          else
             echo "✗ cobbler signature command failed"
             STATUS="failed"
          fi
          
          END_TIME=$(date +%s)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          if [ "$STATUS" == "failed" ]; then exit 1; fi
      
      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || env.COBBLER_BASELINE_VERSION || 'unknown' }}"
          LATEST_VERSION="${COBBLER_NEXT_VERSION#v}"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${LATEST_VERSION}"

          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_VERSION" ] || [ "${CURRENT_VERSION}" = "${LATEST_VERSION}" ]; then
            echo "latest_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable public release is available" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline ${CURRENT_VERSION} is already at the newest configured stable Cobbler tag for this workflow." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          WORKDIR=$(mktemp -d)
          python3 -m venv "${WORKDIR}/next-venv"
          source "${WORKDIR}/next-venv/bin/activate"
          git clone --depth 1 --branch "${COBBLER_NEXT_VERSION}" https://github.com/cobbler/cobbler.git "${WORKDIR}/cobbler-next"
          pushd "${WORKDIR}/cobbler-next" >/dev/null
          pip install --upgrade pip setuptools wheel
          pip install coverage
          pip install --no-build-isolation .[cli]
          popd >/dev/null

          NEXT_BIN="${WORKDIR}/next-venv/bin/cobbler"
          NEXT_VERSION_REPORTED=""
          if [ -x "$NEXT_BIN" ] && "$NEXT_BIN" --help >/dev/null 2>&1; then
            NEXT_VERSION_REPORTED=$("$NEXT_BIN" --version 2>&1 | grep -oP '[0-9.]+' | head -1 || true)
            [ -z "$NEXT_VERSION_REPORTED" ] && NEXT_VERSION_REPORTED="${LATEST_VERSION}"
            echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_VERSION_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline Cobbler ${CURRENT_VERSION} passed Tests 1-5. Regression validation installed next stable tag ${COBBLER_NEXT_VERSION} in an isolated environment and verified CLI invocation on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current baseline Cobbler ${CURRENT_VERSION} passed Tests 1-5, but candidate ${COBBLER_NEXT_VERSION} could not be installed/validated as a runnable CLI on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Test 1 - Check Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Test 2 - Run Help
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Test 3 - Check Configuration (Dry Run)
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Test 4 - Check Signature (Optional)
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          # Regression Validation
          if [ "${{ steps.test6.outputs.status || 'skipped' }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'skipped' }}" == "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Cobbler Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Run Help: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check Configuration (Dry Run): ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check Signature (Optional): ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Current version: ${{ steps.test6.outputs.current_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Next version targeted: ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Next version installed: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Result: ${{ steps.test6.outputs.regression_result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Details: ${{ steps.test6.outputs.comparison || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
