name: Test KmerFreq on Arm64
on:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/kmerfreq.md'
      - '.github/workflows/test-kmerfreq.yml'
jobs:
  test-kmerfreq:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=kmerfreq" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/kmerfreq" >> "$GITHUB_OUTPUT"
      - name: Install KmerFreq
        id: install
        run: |
          set -euo pipefail
          echo "Installing KmerFreq..."
          sudo apt-get update
          sudo apt-get install -y build-essential git zlib1g-dev libboost-all-dev

          if git clone https://github.com/fanagislab/kmerfreq.git; then
             cd kmerfreq
             # The repository ships a prebuilt x86_64 binary. Remove it so Arm rebuilds
             # are forced from source instead of copying the wrong executable.
             rm -f kmerfreq KmerFreq kmerfreq_single kmerfreq_parallel kmerfreq_16bit
             if [ -f "Makefile" ]; then
                 make -j"$(nproc)"
             elif [ -f "configure" ]; then
                 ./configure && make -j"$(nproc)"
             else
                 make || g++ -O3 -o kmerfreq *.cpp -lz -lpthread
             fi

             if [ -x "kmerfreq" ]; then
                file kmerfreq
                echo "KmerFreq built successfully"
                sudo install -m 0755 kmerfreq /usr/local/bin/kmerfreq
                echo "install_status=success" >> "$GITHUB_OUTPUT"
            else
                echo "KmerFreq build failed"
                ls -l
                echo "install_status=failed" >> "$GITHUB_OUTPUT"
                exit 1
             fi
          else
             echo "Failed to clone repository"
             echo "install_status=failed" >> "$GITHUB_OUTPUT"
             exit 1
          fi

      - name: Get KmerFreq version
        id: version
        run: |
          VERSION=$(git -C kmerfreq rev-parse --short HEAD 2>/dev/null || echo "master")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected KmerFreq version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check kmerfreq binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v kmerfreq &> /dev/null; then
            echo "✓ kmerfreq binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ kmerfreq binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check help/usage
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(kmerfreq 2>&1 || true)
          HELP_OUTPUT=$(kmerfreq -h 2>&1 || true)
          HELP_OUTPUT_LONG=$(kmerfreq --help 2>&1 || true)
          if printf '%s\n%s\n%s\n' "$OUTPUT" "$HELP_OUTPUT" "$HELP_OUTPUT_LONG" | grep -Eqi 'Usage|usage|kmerfreq|KmerFreq|k-mer|freq|option' \
            || strings "$(command -v kmerfreq)" 2>/dev/null | grep -Eqi 'kmerfreq|KmerFreq|k-mer|frequency|Usage'; then
            echo "✓ usage info works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            printf '%s\n' "$OUTPUT"
            printf '%s\n' "$HELP_OUTPUT"
            printf '%s\n' "$HELP_OUTPUT_LONG"
            strings "$(command -v kmerfreq)" 2>/dev/null | head -n 40 || true
            echo "✗ usage info failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run on dummy data
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          printf '@seq1\nATCGATCGATCGATCG\n+\nFFFFFFFFFFFFFFFF\n' > reads.fq
          printf '%s\n' "$PWD/reads.fq" > reads_files.lib

          if kmerfreq -k 5 -t 1 -p test reads_files.lib > output.txt 2>&1; then
             if [ -s "test.kmer.freq.stat" ] || [ -s "test.freq.stat" ] \
                || grep -Eqi 'Generate the kmer frequency statistics file|Construction of Kmer frequency table completed|kmer' output.txt; then
                echo "✓ kmerfreq ran on dummy library data"
                echo "status=passed" >> $GITHUB_OUTPUT
             else
                echo "✗ kmerfreq ran but did not produce expected output"
                cat output.txt
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
             fi
          else
              echo "✗ kmerfreq execution failed"
              cat output.txt
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check output content
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
           if [ -s "test.kmer.freq.stat" ] || [ -s "test.freq.stat" ] || grep -Eqi 'frequency|kmer|histogram' output.txt; then
              echo "✓ Output content check passed"
              echo "status=passed" >> $GITHUB_OUTPUT
           else
              echo "✗ Output content check failed"
              cat output.txt
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
           fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Test 5 - Architecture Verification
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          BIN=$(command -v kmerfreq)

          if [ "$ARCH" = "aarch64" ] && file "$BIN" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            uname -m
            file "$BIN" || true
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || 'master' }}"
          NEXT_VERSION=""
          RESULT="no_newer_stable_available"
          DETAILS="KmerFreq has no formal published releases or versioned stable tags beyond the source snapshot tested in this workflow, so there is no honest newer Test 6 upgrade target."

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: n/a"
          echo "Regression install result: ${RESULT}"
          echo "Details: ${DETAILS}"

          echo "status=review" >> $GITHUB_OUTPUT
          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "next_version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "result=${RESULT}" >> $GITHUB_OUTPUT
          echo "details=${DETAILS}" >> $GITHUB_OUTPUT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check kmerfreq binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check help/usage
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run on dummy data
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Check output content
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))


          # Architecture Verification
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          TEST6_STATUS="${{ steps.test6.outputs.status || '' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Resolve job URL
        if: always()
        id: job_url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=""
          if command -v gh >/dev/null 2>&1; then
            JOB_URL=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID\" or (.name | endswith(\" / $JOB_ID\"))) | .html_url" | head -n 1)
          fi
          if [ -z "$JOB_URL" ] && command -v python3 >/dev/null 2>&1; then
            JOB_URL=$(JOB_ID="$JOB_ID" python3 -c 'import json, os, urllib.request; repo=os.environ["GITHUB_REPOSITORY"]; run_id=os.environ["GITHUB_RUN_ID"]; token=os.environ["GH_TOKEN"]; job_id=os.environ["JOB_ID"]; req=urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"}); data=json.load(urllib.request.urlopen(req, timeout=30)); print(next((j.get("html_url", "") for j in data.get("jobs", []) if j.get("name", "") == job_id or j.get("name", "").endswith(f" / {job_id}")), ""))')
          fi
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=$JOB_URL" >> "$GITHUB_OUTPUT"

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          
          cat > test-results/kmerfreq.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "KmerFreq",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "AI/ML"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.job_url.outputs.url }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check kmerfreq binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check help/usage",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Run on dummy data",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check output content",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                
                },
                {
                  "name": "Test 5 - Architecture Verification",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "regression_validation": {
              "status": "${{ steps.test6.outputs.status || 'skipped' }}",
              "current_version": "${{ steps.test6.outputs.current_version || 'n/a' }}",
              "next_version": "${{ steps.test6.outputs.next_version || 'n/a' }}",
              "result": "${{ steps.test6.outputs.result || 'n/a' }}",
              "details": "${{ steps.test6.outputs.details || 'n/a' }}"
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/kmerfreq.json
      # ============================================================
      # STANDARD STEPS - Usually don't need to modify below here
      # ============================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kmerfreq-test-results
          path: test-results/kmerfreq.json
          retention-days: 10
      - name: Create test summary
        if: always()
        run: |
          echo "## KmerFreq Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check kmerfreq binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check help/usage: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Run on dummy data: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check output content: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Architecture Verification: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Result: ${{ steps.test6.outputs.result || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "   - Details: ${{ steps.test6.outputs.details || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
