name: Test PMDK (Persistent Memory Development Kit) on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/pmdk.md"
      - ".github/workflows/test-pmdk.yml"

jobs:
  test-pmdk:
    runs-on: ubuntu-24.04-arm
    env:
      PMDK_VERSION: "2.1.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=pmdk" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/pmdk" >> "$GITHUB_OUTPUT"
          echo "current_version=${PMDK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build PMDK baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libndctl-dev libdaxctl-dev libnuma-dev libudev-dev libelf-dev autoconf automake libtool curl ca-certificates

          BUILD_DIR="${RUNNER_TEMP}/pmdk-${PMDK_VERSION}"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          curl -fsSLO "https://github.com/pmem/pmdk/releases/download/${PMDK_VERSION}/pmdk-${PMDK_VERSION}.tar.gz"
          tar -xzf "pmdk-${PMDK_VERSION}.tar.gz"
          mv "pmdk-${PMDK_VERSION}" source
          cd source

          PMEMOBJ_IGNORE_DIRTY_SHUTDOWN=y \
          PMEMOBJ_IGNORE_BAD_BLOCKS=y \
          make -j2 NDCTL_ENABLE=n DOC=n BUILD_EXAMPLES=n

          test -x src/tools/pmempool/pmempool
          echo "build_root=$BUILD_DIR/source" >> "$GITHUB_OUTPUT"
          echo "lib_path=$BUILD_DIR/source/src/nondebug:$BUILD_DIR/source/src/debug" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get PMDK version
        id: version
        run: |
          set -euo pipefail
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          LIB_PATH="${{ steps.install.outputs.lib_path }}"
          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://api.github.com/repos/pmem/pmdk/releases/latest", timeout=20))
          print(data["tag_name"])
          PY
          )
          VERSION=$(LD_LIBRARY_PATH="$LIB_PATH" "$BUILD_ROOT/src/tools/pmempool/pmempool" --help | awk '/^pmempool / {print $2; exit}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected PMDK version: $VERSION"
          echo "Latest stable release: $LATEST"

      - name: Test 1 - Check pmempool utility exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"

          if [ -x "$BUILD_ROOT/src/tools/pmempool/pmempool" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact release version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          LIB_PATH="${{ steps.install.outputs.lib_path }}"
          VERSION=$(LD_LIBRARY_PATH="$LIB_PATH" "$BUILD_ROOT/src/tools/pmempool/pmempool" --help | awk '/^pmempool / {print $2; exit}')

          if [ "$VERSION" = "${PMDK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check pmempool help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          LIB_PATH="${{ steps.install.outputs.lib_path }}"

          if LD_LIBRARY_PATH="$LIB_PATH" "$BUILD_ROOT/src/tools/pmempool/pmempool" --help 2>&1 | grep -q '^usage: pmempool'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_ROOT="${{ steps.install.outputs.build_root }}"
          LIB_PATH="${{ steps.install.outputs.lib_path }}"

          if LD_LIBRARY_PATH="$LIB_PATH" "$BUILD_ROOT/src/tools/pmempool/pmempool" info --help 2>&1 | grep -q 'print information'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${PMDK_VERSION}"
          LATEST_VERSION="${{ steps.version.outputs.latest }}"
          NEXT_INSTALLED="not_installed"
          DECISION=""
          REGRESSION_RESULT=""
          COMPARISON=""
          STATUS="failed"

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            DECISION="current_is_latest_stable"
            REGRESSION_RESULT="Current stable version already validated on Arm64"
            COMPARISON="Current pinned PMDK version ${CURRENT_VERSION} already matches the latest stable upstream release, so there is no newer version to install in Test 6."
            STATUS="passed"
          else
            NEXT_ROOT="${RUNNER_TEMP}/pmdk-${LATEST_VERSION}-next"
            rm -rf "$NEXT_ROOT"
            mkdir -p "$NEXT_ROOT"
            cd "$NEXT_ROOT"
            curl -fsSLO "https://github.com/pmem/pmdk/releases/download/${LATEST_VERSION}/pmdk-${LATEST_VERSION}.tar.gz"
            tar -xzf "pmdk-${LATEST_VERSION}.tar.gz"
            mv "pmdk-${LATEST_VERSION}" source
            cd source

            if PMEMOBJ_IGNORE_DIRTY_SHUTDOWN=y \
               PMEMOBJ_IGNORE_BAD_BLOCKS=y \
               make -j2 NDCTL_ENABLE=n DOC=n BUILD_EXAMPLES=n >/tmp/pmdk-next-build.log 2>&1; then
              NEXT_LIB="$NEXT_ROOT/source/src/nondebug:$NEXT_ROOT/source/src/debug"
              NEXT_INSTALLED=$(LD_LIBRARY_PATH="$NEXT_LIB" "$NEXT_ROOT/source/src/tools/pmempool/pmempool" --help | awk '/^pmempool / {print $2; exit}')

              if [ "$NEXT_INSTALLED" = "$LATEST_VERSION" ] && \
                 LD_LIBRARY_PATH="$NEXT_LIB" "$NEXT_ROOT/source/src/tools/pmempool/pmempool" info --help >/tmp/pmdk-next-help.log 2>&1; then
                DECISION="next_install_validated"
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned PMDK version ${CURRENT_VERSION} passed smoke tests in this run. Regression validation built candidate ${LATEST_VERSION} on Arm64, and pmempool reported version ${NEXT_INSTALLED}."
                STATUS="passed"
              else
                cat /tmp/pmdk-next-help.log || true
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned PMDK version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} did not complete the pmempool validation path on Arm64."
                STATUS="failed"
              fi
            else
              cat /tmp/pmdk-next-build.log || true
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned PMDK version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} could not be built on Arm64."
              STATUS="failed"
            fi
          fi

          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT_VERSION}"
          echo "Next version targeted for install validation: ${LATEST_VERSION}"
          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${COMPARISON}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/pmdk.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "PMDK (Persistent Memory Development Kit)",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check pmempool utility exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check exact release version",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check pmempool help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmdk-test-results
          path: test-results/pmdk.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## PMDK Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check pmempool utility exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact release version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check pmempool help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
