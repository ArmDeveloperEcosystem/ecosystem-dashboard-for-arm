name: Test FastDFS on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/fastdfs.md"
      - ".github/workflows/test-fastdfs.yml"

jobs:
  test-fastdfs:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: V6.12.4
      NEXT_VERSION: V6.13.0
      FASTDFS_REPO: https://github.com/happyfish100/fastdfs.git
      LIBFASTCOMMON_REPO: https://github.com/happyfish100/libfastcommon.git
      LIBFASTCOMMON_TAG: V1.0.75
      LIBSERVERFRAME_REPO: https://github.com/happyfish100/libserverframe.git
      LIBSERVERFRAME_TAG: V1.2.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=fastdfs" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/fastdfs" >> "$GITHUB_OUTPUT"
      - name: Install baseline FastDFS
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git gcc make libpcre3-dev zlib1g-dev libssl-dev

          rm -rf libfastcommon libserverframe fastdfs
          git clone --depth 1 --branch "${LIBFASTCOMMON_TAG}" "${LIBFASTCOMMON_REPO}" libfastcommon
          (
            cd libfastcommon
            ./make.sh clean || true
            ./make.sh
            sudo ./make.sh install
          )
          sudo ldconfig

          git clone --depth 1 --branch "${LIBSERVERFRAME_TAG}" "${LIBSERVERFRAME_REPO}" libserverframe
          (
            cd libserverframe
            ./make.sh clean || true
            ./make.sh
            sudo ./make.sh install
          )
          sudo ldconfig

          git clone --depth 1 --branch "${BASELINE_VERSION}" "${FASTDFS_REPO}" fastdfs
          (
            cd fastdfs
            ./make.sh clean || true
            ./make.sh
            sudo ./make.sh install
          )
          sudo ldconfig

          sudo mkdir -p /etc/fdfs
          find fastdfs/conf -maxdepth 1 -type f \( -name '*.sample' -o -name '*.conf' \) -exec sudo cp {} /etc/fdfs/ \;

          if command -v fdfs_trackerd >/dev/null 2>&1 && command -v fdfs_storaged >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get pinned versions
        id: version
        run: |
          echo "version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected FastDFS baseline: ${BASELINE_VERSION}"
          echo "Detected FastDFS next version: ${NEXT_VERSION}"

      - name: Test 1 - Check fdfs_trackerd binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v fdfs_trackerd >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check fdfs_storaged binary exists
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v fdfs_storaged >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check version output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:/usr/lib:/usr/lib64 fdfs_trackerd -v 2>&1 || true)
          echo "$VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -qi "FastDFS"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          TRACKER_BIN=$(command -v fdfs_trackerd)
          if [ "$(uname -m)" = "aarch64" ] && file "$TRACKER_BIN" | grep -qiE 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$TRACKER_BIN" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          MONITOR_OUTPUT=$(LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:/usr/lib:/usr/lib64 fdfs_monitor 2>&1 || true)
          echo "$MONITOR_OUTPUT"
          if ls /etc/fdfs/*.sample >/dev/null 2>&1 && echo "$MONITOR_OUTPUT" | grep -qiE 'usage|tracker|storage'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${BASELINE_VERSION}"
          LATEST="${NEXT_VERSION}"
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          git clone --depth 1 --branch "${NEXT_VERSION}" "${FASTDFS_REPO}" "$TMPDIR/fastdfs-next"
          (
            cd "$TMPDIR/fastdfs-next"
            ./make.sh clean || true
            ./make.sh
            DESTDIR="$TMPDIR/root" ./make.sh install
          )

          NEXT_TRACKER=$(find "$TMPDIR/root" -type f -name fdfs_trackerd | head -n 1)
          NEXT_MONITOR=$(find "$TMPDIR/root" -type f -name fdfs_monitor | head -n 1)
          NEXT_CONF=$(find "$TMPDIR/root" -type f -name tracker.conf.sample | head -n 1)
          NEXT_LIB_DIRS=$(find "$TMPDIR/root" -type d \( -path '*/lib' -o -path '*/lib64' \) | paste -sd: -)

          VERSION_OUTPUT=$(LD_LIBRARY_PATH="${NEXT_LIB_DIRS:-/usr/local/lib:/usr/local/lib64:/usr/lib:/usr/lib64}" "$NEXT_TRACKER" -v 2>&1 || true)
          MONITOR_OUTPUT=$(LD_LIBRARY_PATH="${NEXT_LIB_DIRS:-/usr/local/lib:/usr/local/lib64:/usr/lib:/usr/lib64}" "$NEXT_MONITOR" 2>&1 || true)
          echo "$VERSION_OUTPUT"
          echo "$MONITOR_OUTPUT"

          if [ -n "$NEXT_TRACKER" ] && [ -n "$NEXT_MONITOR" ] && [ -n "$NEXT_CONF" ] && \
             file "$NEXT_TRACKER" | grep -qiE 'aarch64|arm64' && \
             echo "$VERSION_OUTPUT" | grep -qi 'FastDFS'; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=FastDFS baseline ${CURRENT} built successfully with libfastcommon and installed the tracker and storage binaries on Arm64, and candidate ${LATEST} also built, installed into an isolated root, and exposed the expected tracker binary, monitor tool, and sample configuration files." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            [ -n "$NEXT_TRACKER" ] && file "$NEXT_TRACKER" || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=FastDFS candidate ${LATEST} failed to preserve the expected isolated build, tracker binary, or configuration footprint on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_regression() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_regression "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          JOB_URL="${JOB_URL:-${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"

          cat > test-results/fastdfs.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "FastDFS",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Storage"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check fdfs_trackerd binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check fdfs_storaged binary exists", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check version output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}", "latest_version": "${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastdfs-test-results
          path: test-results/fastdfs.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## FastDFS Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check fdfs_trackerd binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check fdfs_storaged binary exists: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check version output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.BASELINE_VERSION }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || env.NEXT_VERSION }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
