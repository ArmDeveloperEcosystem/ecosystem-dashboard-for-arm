name: Test FreeCAD on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-freecad.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-freecad.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-freecad.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-freecad.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-freecad.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-freecad.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-freecad.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-freecad.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-freecad.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-freecad.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-freecad.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-freecad.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-freecad.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-freecad.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-freecad.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-freecad.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-freecad.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-freecad.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-freecad.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-freecad.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-freecad.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-freecad.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-freecad.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-freecad.outputs.timestamp }}

jobs:
  test-freecad:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.1.1"
      PACKAGE_SLUG: "freecad"
      LANE_KIND: "official Arm64 AppImage / CPU headless runtime"
      DOWNLOAD_URL: "https://github.com/FreeCAD/FreeCAD/releases"
      HOMEPAGE_URL: "https://www.freecad.org/index.php"
      OFFICIAL_DOCS: "https://wiki.freecad.org/Getting_started#Installing"
      GITHUB_REPO: "FreeCAD/FreeCAD"
      PACKAGE_PAGE: "content/linux/opensource_packages/freecad.md"
      APPIMAGE_NAME: "FreeCAD_1.1.1-Linux-aarch64-py311.AppImage"
      APPIMAGE_URL: "https://github.com/FreeCAD/FreeCAD/releases/download/1.1.1/FreeCAD_1.1.1-Linux-aarch64-py311.AppImage"
      APPIMAGE_SHA256_URL: "https://github.com/FreeCAD/FreeCAD/releases/download/1.1.1/FreeCAD_1.1.1-Linux-aarch64-py311.AppImage-SHA256.txt"
      COMMAND_CANDIDATES: "FreeCADCmd freecadcmd"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'FreeCAD'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "official_binary_current_latest"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=freecad" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/freecad" >> "$GITHUB_OUTPUT"

      - name: Bootstrap baseline dependencies
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "curl ca-certificates file"
          quiet: "true"

      - name: Use official FreeCAD Arm64 AppImage
        run: |
          set -euo pipefail
          echo "Using the official stable Linux aarch64 AppImage for a deterministic headless FreeCADCmd smoke test."

      - name: Download and extract FreeCAD AppImage
        id: install
        run: |
          set -euo pipefail
          WORKDIR="$RUNNER_TEMP/freecad-appimage"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 \
            "$APPIMAGE_URL" -o "$WORKDIR/$APPIMAGE_NAME"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 120 \
            "$APPIMAGE_SHA256_URL" -o "$WORKDIR/$APPIMAGE_NAME.sha256"
          (cd "$WORKDIR" && sha256sum -c "$APPIMAGE_NAME.sha256")

          chmod +x "$WORKDIR/$APPIMAGE_NAME"
          if ! file "$WORKDIR/$APPIMAGE_NAME" | grep -Eq 'aarch64|ARM aarch64'; then
            file "$WORKDIR/$APPIMAGE_NAME"
            echo "install_mode=official_appimage" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          (
            cd "$WORKDIR"
            "./$APPIMAGE_NAME" --appimage-extract >/tmp/freecad-appimage-extract.log 2>&1
          )

          APPDIR="$WORKDIR/squashfs-root"
          COMMAND_PATH=""
          COMMAND_PATH=$(find "$APPDIR" -type f \( -name FreeCADCmd -o -name freecadcmd \) -perm -111 2>/dev/null | head -1 || true)
          if [ -z "$COMMAND_PATH" ]; then
            find "$APPDIR" -maxdepth 4 -type f | sort | grep -Ei 'freecad|AppRun' || true
            cat /tmp/freecad-appimage-extract.log || true
            echo "install_mode=official_appimage" >> "$GITHUB_OUTPUT"
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "appimage_path=$WORKDIR/$APPIMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "appdir=$APPDIR" >> "$GITHUB_OUTPUT"
          echo "command_path=$COMMAND_PATH" >> "$GITHUB_OUTPUT"
          echo "install_mode=official_appimage" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get baseline version
        id: version
        run: |
          set -euo pipefail
          export APPDIR="${{ steps.install.outputs.appdir }}"
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/aarch64-linux-gnu:$APPDIR/usr/lib/freecad/lib:${LD_LIBRARY_PATH:-}"
          VERSION=$("${{ steps.install.outputs.command_path }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -1 || true)
          [ -n "$VERSION" ] || VERSION="unknown"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected FreeCAD version: $VERSION"

      - name: Test 1 - Baseline package evidence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMMAND_PATH="${{ steps.install.outputs.command_path || '' }}"
          test "${{ steps.install.outputs.install_status || 'failed' }}" = "success"
          test -n "$COMMAND_PATH"
          test -x "$COMMAND_PATH"
          test -d "${{ steps.install.outputs.appdir }}"
          test -s "${{ steps.install.outputs.appimage_path }}"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Installed runtime version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION="${{ steps.version.outputs.version || 'unknown' }}"
          test "$VERSION" != "unknown"
          export APPDIR="${{ steps.install.outputs.appdir }}"
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/aarch64-linux-gnu:$APPDIR/usr/lib/freecad/lib:${LD_LIBRARY_PATH:-}"
          file "${{ steps.install.outputs.appimage_path }}" | grep -Eq 'aarch64|ARM aarch64'
          "${{ steps.install.outputs.command_path }}" --version 2>&1 | grep -F "$VERSION"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - FreeCADCmd imports modeling modules
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMMAND_PATH="${{ steps.install.outputs.command_path }}"
          export APPDIR="${{ steps.install.outputs.appdir }}"
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/aarch64-linux-gnu:$APPDIR/usr/lib/freecad/lib:${LD_LIBRARY_PATH:-}"
          cat > /tmp/freecad-import-smoke.py <<'PY'
          import FreeCAD
          import Part
          doc = FreeCAD.newDocument("ImportSmoke")
          box = Part.makeBox(1, 2, 3)
          assert round(box.Volume, 6) == 6
          assert doc.Name == "ImportSmoke"
          PY
          "$COMMAND_PATH" /tmp/freecad-import-smoke.py
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Arm64 support gate
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "$(dpkg --print-architecture)" != "arm64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          file "${{ steps.install.outputs.appimage_path }}" | grep -Eq 'aarch64|ARM aarch64'
          if ! grep -q '^works_on_arm: true' "$PACKAGE_PAGE"; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Bounded package-specific smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMMAND_PATH="${{ steps.install.outputs.command_path }}"
          export APPDIR="${{ steps.install.outputs.appdir }}"
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/aarch64-linux-gnu:$APPDIR/usr/lib/freecad/lib:${LD_LIBRARY_PATH:-}"
          cat > /tmp/freecad-export-smoke.py <<'PY'
          import os
          import FreeCAD
          import Part
          doc = FreeCAD.newDocument("ExportSmoke")
          box = Part.makeBox(10, 20, 30)
          Part.show(box)
          doc.recompute()
          Part.export([box], "/tmp/freecad-smoke.step")
          box.exportStl("/tmp/freecad-smoke.stl")
          for path in ("/tmp/freecad-smoke.step", "/tmp/freecad-smoke.stl"):
              assert os.path.getsize(path) > 0, path
          PY
          "$COMMAND_PATH" /tmp/freecad-export-smoke.py
          test -s /tmp/freecad-smoke.step
          test -s /tmp/freecad-smoke.stl
          echo "note=Created a box with FreeCADCmd and exported STEP/STL on the Arm64 runner." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
          echo "regression_result=No newer stable FreeCAD Arm64 AppImage is available beyond the version validated in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=Tests 1-5 download and run the official stable Linux aarch64 AppImage. The current stable release is the latest stable Arm64 AppImage, so there is no newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"
