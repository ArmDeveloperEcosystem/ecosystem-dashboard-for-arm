name: Test Cloudevents-Java on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/cloudevents-java.md'
      - '.github/workflows/test-cloudevents-java.yml'

jobs:
  test-cloudevents-java:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cloudevents-java" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cloudevents-java" >> "$GITHUB_OUTPUT"
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven
      
      - name: Create Maven Project
        id: install
        run: |
          echo "Creating Maven project..."
          mvn archetype:generate -DgroupId=com.example -DartifactId=ce-test -DarchetypeArtifactId=maven-archetype-quickstart -DinteractiveMode=false -Djava.net.preferIPv4Stack=true
          
          cd ce-test
          
          python3 - <<'PY'
          from pathlib import Path

          pom = Path("pom.xml")
          text = pom.read_text()

          if "<properties>" in text:
              text = text.replace(
                  "<properties>",
                  "<properties><maven.compiler.source>1.8</maven.compiler.source><maven.compiler.target>1.8</maven.compiler.target>",
                  1,
              )
          else:
              text = text.replace(
                  "<version>1.0-SNAPSHOT</version>",
                  "<version>1.0-SNAPSHOT</version><properties><maven.compiler.source>1.8</maven.compiler.source><maven.compiler.target>1.8</maven.compiler.target></properties>",
                  1,
              )

          text = text.replace(
              "</dependencies>",
              "<dependency><groupId>io.cloudevents</groupId><artifactId>cloudevents-core</artifactId><version>2.5.0</version></dependency></dependencies>",
              1,
          )

          pom.write_text(text)
          PY
          
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get Cloudevents-Java version
        id: version
        run: |
          # We are using 2.5.0 in the test
          VERSION="2.5.0"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Cloudevents-Java version: $VERSION"
      
      - name: Test 1 - Check Maven and Java binaries
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if command -v mvn > /dev/null 2>&1 && command -v java > /dev/null 2>&1; then
             echo "✓ Maven and Java binaries found"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Maven or Java binary missing"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check dependency version in pom
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd ce-test
          
          if grep -q "<artifactId>cloudevents-core</artifactId>" pom.xml && grep -q "<version>2.5.0</version>" pom.xml; then
             echo "✓ CloudEvents dependency version declared in pom.xml"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ CloudEvents dependency declaration missing from pom.xml"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check dependency tree
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd ce-test
          
          if mvn dependency:tree | grep -q "io.cloudevents:cloudevents-core"; then
             echo "✓ CloudEvents dependency found in Maven dependency tree"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ CloudEvents dependency missing in Maven dependency tree"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
             echo "✓ Running on Arm64"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Expected aarch64 runner"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Build and run CloudEvent example
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          # Functional Validation
          cd ce-test/src/main/java/com/example

          cat > App.java << EOF
          package com.example;
          
          import io.cloudevents.CloudEvent;
          import io.cloudevents.core.builder.CloudEventBuilder;
          import java.net.URI;
          import java.util.UUID;
          
          public class App {
              public static void main(String[] args) {
                  CloudEvent event = CloudEventBuilder.v1()
                      .withId(UUID.randomUUID().toString())
                      .withType("example.demo")
                      .withSource(URI.create("http://example.com"))
                      .withData("application/json", "{}".getBytes())
                      .build();
                  
                  System.out.println(event.getType());
                  System.out.println(event.getSource());
              }
          }
          EOF

          cd ../../../../
          if mvn -q -DskipTests compile dependency:build-classpath -Dmdep.outputFile=cp.txt >/tmp/cloudevents-java-functional.log 2>&1; then
             CLASSPATH="target/classes:$(cat cp.txt)"
             if OUTPUT=$(java -cp "$CLASSPATH" com.example.App 2>>/tmp/cloudevents-java-functional.log); then
                printf '%s\n' "$OUTPUT" > /tmp/cloudevents-java-output.log
                cat /tmp/cloudevents-java-output.log
                if grep -q "example.demo" /tmp/cloudevents-java-output.log && grep -q "http://example.com" /tmp/cloudevents-java-output.log; then
                   echo "✓ CloudEvents Java built and ran an event example"
                   echo "status=passed" >> $GITHUB_OUTPUT
                else
                   cat /tmp/cloudevents-java-output.log || true
                   echo "✗ CloudEvents Java functional validation produced unexpected output"
                   echo "status=failed" >> $GITHUB_OUTPUT
                   exit 1
                fi
             else
                cat /tmp/cloudevents-java-functional.log || true
                echo "✗ CloudEvents Java runtime execution failed"
                echo "status=failed" >> $GITHUB_OUTPUT
                exit 1
             fi
          else
             cat /tmp/cloudevents-java-functional.log || true
             echo "✗ CloudEvents Java compile/classpath generation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Maven and Java binaries
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check dependency version in pom
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check dependency tree
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Verify architecture
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Build and run CloudEvent example
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          
          cat > test-results/cloudevents-java.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Cloudevents-Java",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Messaging/Comms"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Maven and Java binaries",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check dependency version in pom",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check dependency tree",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Verify architecture",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Build and run CloudEvent example",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/cloudevents-java.json
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudevents-java-test-results
          path: test-results/cloudevents-java.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Cloudevents-Java Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Maven and Java binaries: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check dependency version in pom: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check dependency tree: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Build and run CloudEvent example: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
