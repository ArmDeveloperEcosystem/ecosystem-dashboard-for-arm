name: Test Groovy and Grails on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/groovy_grails.md"
      - ".github/workflows/test-groovy_grails.yml"

jobs:
  test-groovy-grails:
    runs-on: ubuntu-24.04-arm
    env:
      NEXT_GROOVY_VERSION: "5.0.0"
      NEXT_GRAILS_VERSION: "7.0.0"
      NEXT_GRAILS_URL: "https://github.com/apache/grails-core/releases/download/v7.0.0/grails-7.0.0.zip"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=groovy_grails" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/groovy_grails" >> "$GITHUB_OUTPUT"
          echo "current_groovy_version=4.0.30" >> "$GITHUB_OUTPUT"
          echo "current_grails_version=6.2.3" >> "$GITHUB_OUTPUT"
      - name: Install Groovy and Grails
        id: install
        run: |
          set -euo pipefail
          GROOVY_VERSION="${{ steps.metadata.outputs.current_groovy_version }}"
          GRAILS_VERSION="${{ steps.metadata.outputs.current_grails_version }}"

          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk unzip wget perl

          sudo rm -rf /opt/groovy /opt/grails
          sudo mkdir -p /opt/groovy /opt/grails

          wget -q "https://downloads.apache.org/groovy/${GROOVY_VERSION}/distribution/apache-groovy-binary-${GROOVY_VERSION}.zip" -O /tmp/groovy-current.zip
          wget -q "https://github.com/apache/grails-core/releases/download/v${GRAILS_VERSION}/grails-${GRAILS_VERSION}.zip" -O /tmp/grails-current.zip

          sudo unzip -q /tmp/groovy-current.zip -d /opt/groovy
          sudo unzip -q /tmp/grails-current.zip -d /opt/grails

          GROOVY_HOME=$(find /opt/groovy -maxdepth 1 -type d -name "groovy-*" | head -n 1)
          GRAILS_HOME=$(find /opt/grails -maxdepth 1 -type d -name "grails-*" | head -n 1)

          if [ -z "$GROOVY_HOME" ] || [ -z "$GRAILS_HOME" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-arm64" >> "$GITHUB_ENV"
          echo "GROOVY_HOME=$GROOVY_HOME" >> "$GITHUB_ENV"
          echo "GRAILS_HOME=$GRAILS_HOME" >> "$GITHUB_ENV"
          echo "$GROOVY_HOME/bin" >> "$GITHUB_PATH"
          echo "$GRAILS_HOME/bin" >> "$GITHUB_PATH"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get installed versions
        id: version
        run: |
          set -euo pipefail
          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }

          GROOVY_VERSION=$(groovy --version | sed -n 's/.*Version: \([^ ]*\).*/\1/p')
          GRAILS_VERSION=$(grails --version 2>&1 | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)

          echo "groovy_version=$GROOVY_VERSION" >> "$GITHUB_OUTPUT"
          echo "grails_version=$GRAILS_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=Groovy ${GROOVY_VERSION} / Grails ${GRAILS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Groovy binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "$GROOVY_HOME/bin/groovy" ] && command -v groovy >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Grails binary exists
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "$GRAILS_HOME/bin/grails" ] && command -v grails >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Groovy version output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_groovy_version }}"
          REPORTED=$(groovy --version | sed -n 's/.*Version: \([^ ]*\).*/\1/p')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            groovy --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Grails version output
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }
          EXPECTED="${{ steps.metadata.outputs.current_grails_version }}"
          REPORTED=$(grails --version 2>&1 | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            grails --version 2>&1 | strip_ansi || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          cat > /tmp/groovy-grails-hello.groovy <<'EOF'
          println "Hello from Groovy"
          EOF

          if [ "$(groovy /tmp/groovy-grails-hello.groovy)" != "Hello from Groovy" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! timeout 180s grails help create-app >/tmp/groovy-grails-help.txt 2>&1; then
            cat /tmp/groovy-grails-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! grep -q "create-app" /tmp/groovy-grails-help.txt; then
            cat /tmp/groovy-grails-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -f /tmp/groovy-grails-hello.groovy
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="Groovy ${{ steps.version.outputs.groovy_version }} / Grails ${{ steps.version.outputs.grails_version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST_GROOVY="${NEXT_GROOVY_VERSION}"
          LATEST_GRAILS="${NEXT_GRAILS_VERSION}"
          LATEST_GRAILS_URL="${NEXT_GRAILS_URL}"

          if [ -z "$LATEST_GROOVY" ] || [ -z "$LATEST_GRAILS" ] || [ -z "$LATEST_GRAILS_URL" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the latest stable Groovy or Grails release could not be resolved from the official upstream endpoints." >> "$GITHUB_OUTPUT"
            echo "Next version targeted for install validation: lookup_failed"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the latest stable Groovy or Grails release could not be resolved from the official upstream endpoints."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          LATEST="Groovy ${LATEST_GROOVY} / Grails ${LATEST_GRAILS}"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run and the official latest stable releases are unchanged, so current stable remains validated on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR=$(mktemp -d)
          wget -q "https://downloads.apache.org/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" -O "$NEXT_DIR/groovy-next.zip"
          wget -q "$LATEST_GRAILS_URL" -O "$NEXT_DIR/grails-next.zip"

          unzip -q "$NEXT_DIR/groovy-next.zip" -d "$NEXT_DIR/groovy"
          unzip -q "$NEXT_DIR/grails-next.zip" -d "$NEXT_DIR/grails"

          NEXT_GROOVY_HOME=$(find "$NEXT_DIR/groovy" -maxdepth 1 -type d -name "groovy-*" | head -n 1)
          NEXT_GRAILS_HOME=$(find "$NEXT_DIR/grails" -maxdepth 1 -type d \( -name "grails-*" -o -name "apache-grails-*" \) | head -n 1)

          if [ -z "$NEXT_GROOVY_HOME" ] || [ -z "$NEXT_GRAILS_HOME" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate archives did not extract usable Groovy and Grails homes on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate archives did not extract usable Groovy and Grails homes on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }

          NEXT_GROOVY_REPORTED=$("$NEXT_GROOVY_HOME/bin/groovy" --version | sed -n 's/.*Version: \([^ ]*\).*/\1/p')
          NEXT_GRAILS_REPORTED=$("$NEXT_GRAILS_HOME/bin/grails" --version 2>&1 | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)

          cat > "$NEXT_DIR/hello.groovy" <<'EOF'
          println "Hello from Groovy"
          EOF

          if [ "$NEXT_GROOVY_REPORTED" = "$LATEST_GROOVY" ] && \
             [ "$NEXT_GRAILS_REPORTED" = "$LATEST_GRAILS" ] && \
             [ "$("$NEXT_GROOVY_HOME/bin/groovy" "$NEXT_DIR/hello.groovy")" = "Hello from Groovy" ] && \
             timeout 180s "$NEXT_GRAILS_HOME/bin/grails" help create-app >/tmp/groovy-grails-help-next.txt 2>&1 && \
             grep -q "create-app" /tmp/groovy-grails-help-next.txt; then
            NEXT_INSTALLED="Groovy ${NEXT_GROOVY_REPORTED} / Grails ${NEXT_GRAILS_REPORTED}"
            echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run. Regression validation installed candidate versions Groovy ${LATEST_GROOVY} and Grails ${LATEST_GRAILS} on Arm64, and both candidates reported the expected versions while the Groovy script and Grails create-app help path succeeded." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run. Regression validation installed candidate versions Groovy ${LATEST_GROOVY} and Grails ${LATEST_GRAILS} on Arm64, and both candidates reported the expected versions while the Groovy script and Grails create-app help path succeeded."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/groovy-grails-help-next.txt || true
            echo "next_installed_version=Groovy ${NEXT_GROOVY_REPORTED:-unknown} / Grails ${NEXT_GRAILS_REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy/Grails combination did not report the expected versions or complete the expected help/script checks on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: Groovy ${NEXT_GROOVY_REPORTED:-unknown} / Grails ${NEXT_GRAILS_REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy/Grails combination did not report the expected versions or complete the expected help/script checks on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/groovy_grails.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Groovy/Grails",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Groovy",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Groovy binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Grails binary exists",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Groovy version output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check Grails version output",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: groovy_grails-test-results
          path: test-results/groovy_grails.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Groovy/Grails Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Groovy binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Grails binary exists: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Groovy version output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Grails version output: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
