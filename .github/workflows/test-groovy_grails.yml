name: Test Groovy and Grails on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-groovy-grails.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-groovy-grails.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-groovy-grails.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-groovy-grails.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-groovy-grails.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-groovy-grails.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-groovy-grails.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-groovy-grails.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-groovy-grails.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-groovy-grails.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-groovy-grails.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-groovy-grails.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-groovy-grails.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-groovy-grails.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-groovy-grails.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-groovy-grails.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-groovy-grails.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-groovy-grails.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-groovy-grails.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-groovy-grails.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-groovy-grails.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-groovy-grails.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-groovy-grails.outputs.timestamp }}
jobs:
  test-groovy-grails:
    runs-on: ubuntu-24.04-arm
    env:
      NEXT_GROOVY_VERSION: "5.0.0"
      NEXT_GRAILS_VERSION: "7.0.0"
      NEXT_GROOVY_URL: "https://archive.apache.org/dist/groovy/5.0.0/distribution/apache-groovy-binary-5.0.0.zip"
      NEXT_GRAILS_URL: "https://github.com/apache/grails-core/releases/download/v7.0.0/apache-grails-7.0.0-bin.zip"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Groovy and Grails'
      package_version: ${{ steps.version.outputs.version || format('Groovy {0} / Grails {1}', steps.metadata.outputs.current_groovy_version, steps.metadata.outputs.current_grails_version) }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || format('Groovy {0} / Grails {1}', steps.metadata.outputs.current_groovy_version, steps.metadata.outputs.current_grails_version) }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || format('Groovy {0} / Grails {1}', env.NEXT_GROOVY_VERSION, env.NEXT_GRAILS_VERSION) }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=groovy_grails" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/groovy_grails" >> "$GITHUB_OUTPUT"
          echo "current_groovy_version=4.0.30" >> "$GITHUB_OUTPUT"
          echo "current_grails_version=6.2.3" >> "$GITHUB_OUTPUT"
      - name: Install Groovy and Grails
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          GROOVY_VERSION="${{ steps.metadata.outputs.current_groovy_version }}"
          GRAILS_VERSION="${{ steps.metadata.outputs.current_grails_version }}"

          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "openjdk-21-jdk unzip wget perl"
          sudo rm -rf /opt/groovy /opt/grails
          sudo mkdir -p /opt/groovy /opt/grails

          download_with_fallback() {
            local dest="$1"
            shift
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=450 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=30 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh" "$dest" "$@"
          }

          if ! download_with_fallback \
            /tmp/groovy-current.zip \
            "https://dlcdn.apache.org/groovy/${GROOVY_VERSION}/distribution/apache-groovy-binary-${GROOVY_VERSION}.zip" \
            "https://downloads.apache.org/groovy/${GROOVY_VERSION}/distribution/apache-groovy-binary-${GROOVY_VERSION}.zip" \
            "https://archive.apache.org/dist/groovy/${GROOVY_VERSION}/distribution/apache-groovy-binary-${GROOVY_VERSION}.zip" \
            "http://archive.apache.org/dist/groovy/${GROOVY_VERSION}/distribution/apache-groovy-binary-${GROOVY_VERSION}.zip"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=groovy_download_failed" >> "$GITHUB_OUTPUT"
            echo "GROOVY_GRAILS_INSTALL_STATUS=failed" >> "$GITHUB_ENV"
            echo "GROOVY_GRAILS_INSTALL_BLOCKER=groovy_download_failed" >> "$GITHUB_ENV"
            echo "GROOVY_HOME=" >> "$GITHUB_ENV"
            echo "GRAILS_HOME=" >> "$GITHUB_ENV"
            exit 0
          fi
          if ! download_with_fallback \
            /tmp/grails-current.zip \
            "https://github.com/apache/grails-core/releases/download/v${GRAILS_VERSION}/grails-${GRAILS_VERSION}.zip"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=grails_download_failed" >> "$GITHUB_OUTPUT"
            echo "GROOVY_GRAILS_INSTALL_STATUS=failed" >> "$GITHUB_ENV"
            echo "GROOVY_GRAILS_INSTALL_BLOCKER=grails_download_failed" >> "$GITHUB_ENV"
            echo "GROOVY_HOME=" >> "$GITHUB_ENV"
            echo "GRAILS_HOME=" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! sudo unzip -q /tmp/groovy-current.zip -d /opt/groovy; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=groovy_extract_failed" >> "$GITHUB_OUTPUT"
            echo "GROOVY_GRAILS_INSTALL_STATUS=failed" >> "$GITHUB_ENV"
            echo "GROOVY_GRAILS_INSTALL_BLOCKER=groovy_extract_failed" >> "$GITHUB_ENV"
            echo "GROOVY_HOME=" >> "$GITHUB_ENV"
            echo "GRAILS_HOME=" >> "$GITHUB_ENV"
            exit 0
          fi
          if ! sudo unzip -q /tmp/grails-current.zip -d /opt/grails; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=grails_extract_failed" >> "$GITHUB_OUTPUT"
            echo "GROOVY_GRAILS_INSTALL_STATUS=failed" >> "$GITHUB_ENV"
            echo "GROOVY_GRAILS_INSTALL_BLOCKER=grails_extract_failed" >> "$GITHUB_ENV"
            echo "GROOVY_HOME=" >> "$GITHUB_ENV"
            echo "GRAILS_HOME=" >> "$GITHUB_ENV"
            exit 0
          fi

          GROOVY_HOME=$(find /opt/groovy -maxdepth 1 -type d -name "groovy-*" -print -quit || true)
          GRAILS_HOME=$(find /opt/grails -maxdepth 1 -type d \( -name "grails-*" -o -name "apache-grails-*" \) -print -quit || true)

          if [ -z "$GROOVY_HOME" ] || [ -z "$GRAILS_HOME" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=home_not_found" >> "$GITHUB_OUTPUT"
            echo "GROOVY_GRAILS_INSTALL_STATUS=failed" >> "$GITHUB_ENV"
            echo "GROOVY_GRAILS_INSTALL_BLOCKER=home_not_found" >> "$GITHUB_ENV"
            echo "GROOVY_HOME=" >> "$GITHUB_ENV"
            echo "GRAILS_HOME=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-arm64" >> "$GITHUB_ENV"
          echo "GROOVY_GRAILS_INSTALL_STATUS=success" >> "$GITHUB_ENV"
          echo "GROOVY_GRAILS_INSTALL_BLOCKER=" >> "$GITHUB_ENV"
          echo "GROOVY_HOME=$GROOVY_HOME" >> "$GITHUB_ENV"
          echo "GRAILS_HOME=$GRAILS_HOME" >> "$GITHUB_ENV"
          echo "$GROOVY_HOME/bin" >> "$GITHUB_PATH"
          echo "$GRAILS_HOME/bin" >> "$GITHUB_PATH"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get installed versions
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "groovy_version=unknown" >> "$GITHUB_OUTPUT"
            echo "grails_version=unknown" >> "$GITHUB_OUTPUT"
            echo "version=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }

          GROOVY_VERSION=$(groovy --version | sed -n 's/.*Version: \([^ ]*\).*/\1/p')
          GRAILS_VERSION=$(grails --version 2>&1 | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)

          echo "groovy_version=$GROOVY_VERSION" >> "$GITHUB_OUTPUT"
          echo "grails_version=$GRAILS_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=Groovy ${GROOVY_VERSION} / Grails ${GRAILS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Groovy binary exists
        id: test1
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -x "$GROOVY_HOME/bin/groovy" ] && command -v groovy >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Grails binary exists
        id: test2
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -x "$GRAILS_HOME/bin/grails" ] && command -v grails >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Groovy version output
        id: test3
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXPECTED="${{ steps.metadata.outputs.current_groovy_version }}"
          REPORTED=$(groovy --version | sed -n 's/.*Version: \([^ ]*\).*/\1/p')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            groovy --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Grails version output
        id: test4
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }
          EXPECTED="${{ steps.metadata.outputs.current_grails_version }}"
          REPORTED=$(grails --version 2>&1 | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            grails --version 2>&1 | strip_ansi || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > /tmp/groovy-grails-hello.groovy <<'EOF'
          println "Hello from Groovy"
          EOF

          if [ "$(groovy /tmp/groovy-grails-hello.groovy)" != "Hello from Groovy" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! timeout 180s grails help create-app >/tmp/groovy-grails-help.txt 2>&1; then
            cat /tmp/groovy-grails-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! grep -q "create-app" /tmp/groovy-grails-help.txt; then
            cat /tmp/groovy-grails-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$(uname -m)" != "aarch64" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -f /tmp/groovy-grails-hello.groovy
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -f /tmp/groovy-grails-hello.groovy
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="Groovy ${{ steps.version.outputs.groovy_version }} / Grails ${{ steps.version.outputs.grails_version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST_GROOVY="${NEXT_GROOVY_VERSION}"
          LATEST_GRAILS="${NEXT_GRAILS_VERSION}"
          LATEST_GROOVY_URL="${NEXT_GROOVY_URL}"
          LATEST_GRAILS_URL="${NEXT_GRAILS_URL}"

          download_with_fallback() {
            local dest="$1"
            shift
            DOWNLOAD_ATTEMPTS=3 \
            DOWNLOAD_CONNECT_TIMEOUT=30 \
            DOWNLOAD_MAX_TIME=600 \
            DOWNLOAD_RETRY_DELAY=5 \
            DOWNLOAD_WGET_TIMEOUT=60 \
            DOWNLOAD_WGET_WAITRETRY=5 \
              bash "$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh" "$dest" "$@"
          }

          fail_regression() {
            local installed="$1"
            local decision="$2"
            local result="$3"
            local details="$4"
            echo "next_installed_version=$installed" >> "$GITHUB_OUTPUT"
            echo "decision=$decision" >> "$GITHUB_OUTPUT"
            echo "regression_result=$result" >> "$GITHUB_OUTPUT"
            echo "comparison=$details" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $installed"
            echo "Regression install result: $result"
            echo "Details: $details"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "${NEXT_DIR:-}"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          }

          if [ -z "$LATEST_GROOVY" ] || [ -z "$LATEST_GRAILS" ] || [ -z "$LATEST_GROOVY_URL" ] || [ -z "$LATEST_GRAILS_URL" ]; then
            echo "latest_version=lookup_failed" >> "$GITHUB_OUTPUT"
            fail_regression \
              "lookup_failed" \
              "next_lookup_failed" \
              "Next version lookup failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the latest stable Groovy or Grails release could not be resolved from the official upstream endpoints."
          fi

          LATEST="Groovy ${LATEST_GROOVY} / Grails ${LATEST_GRAILS}"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "${GROOVY_GRAILS_INSTALL_STATUS:-failed}" != "success" ] || \
             [ "${{ steps.test1.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'skipped' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'skipped' }}" != "passed" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because baseline install or core smoke checks failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} did not complete baseline acquisition or core smoke validation cleanly in this run, so next-version validation was not attempted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            fail_regression \
              "$CURRENT" \
              "metadata_review_required" \
              "Tests 1-5 baseline must be older than the latest stable release" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run and the official latest stable releases are unchanged, so current stable remains validated on Arm64."
          fi

          NEXT_DIR=$(mktemp -d)
          if ! download_with_fallback \
            "$NEXT_DIR/groovy-next.zip" \
            "https://dlcdn.apache.org/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
            "https://downloads.apache.org/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
            "https://archive.apache.org/dist/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
            "http://archive.apache.org/dist/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip"; then
            fail_regression \
              "download_failed" \
              "next_download_failed" \
              "Next version download failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy archive for ${LATEST_GROOVY} could not be downloaded from the official upstream location."
          fi
          if ! download_with_fallback "$NEXT_DIR/grails-next.zip" "$LATEST_GRAILS_URL"; then
            fail_regression \
              "download_failed" \
              "next_download_failed" \
              "Next version download failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Grails archive for ${LATEST_GRAILS} could not be downloaded from the official upstream location."
          fi

          if ! unzip -q "$NEXT_DIR/groovy-next.zip" -d "$NEXT_DIR/groovy"; then
            fail_regression \
              "extract_failed" \
              "next_extract_failed" \
              "Next version extract failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy archive for ${LATEST_GROOVY} could not be extracted on Arm64."
          fi
          if ! unzip -q "$NEXT_DIR/grails-next.zip" -d "$NEXT_DIR/grails"; then
            fail_regression \
              "extract_failed" \
              "next_extract_failed" \
              "Next version extract failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Grails archive for ${LATEST_GRAILS} could not be extracted on Arm64."
          fi

          NEXT_GROOVY_HOME=$(find "$NEXT_DIR/groovy" -maxdepth 1 -type d -name "groovy-*" -print -quit || true)
          NEXT_GRAILS_HOME=$(find "$NEXT_DIR/grails" -maxdepth 1 -type d \( -name "grails-*" -o -name "apache-grails-*" \) -print -quit || true)

          if [ -z "$NEXT_GROOVY_HOME" ] || [ -z "$NEXT_GRAILS_HOME" ]; then
            fail_regression \
              "install_failed" \
              "next_install_failed" \
              "Next version install failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate archives did not extract usable Groovy and Grails homes on Arm64."
          fi

          strip_ansi() {
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g'
          }

          export GROOVY_HOME="$NEXT_GROOVY_HOME"
          export GRAILS_HOME="$NEXT_GRAILS_HOME"
          export PATH="$GROOVY_HOME/bin:$GRAILS_HOME/bin:$PATH"

          NEXT_GROOVY_RAW=$(groovy --version 2>&1 || true)
          NEXT_GRAILS_RAW=$(grails --version 2>&1 || true)
          NEXT_GROOVY_REPORTED=$(printf '%s\n' "$NEXT_GROOVY_RAW" | sed -n 's/.*Version: \([^ ]*\).*/\1/p' | head -n 1)
          NEXT_GRAILS_REPORTED=$(printf '%s\n' "$NEXT_GRAILS_RAW" | strip_ansi | sed -n 's/.*Grails Version: \([0-9][0-9A-Za-z._-]*\).*/\1/p' | head -n 1)

          # Retry once when candidate runtime looks corrupted/transiently incomplete.
          if [ -z "$NEXT_GROOVY_REPORTED" ] && printf '%s\n' "$NEXT_GROOVY_RAW" | grep -q "GroovyStarter"; then
            rm -rf "$NEXT_DIR/groovy"
            mkdir -p "$NEXT_DIR/groovy"
            if download_with_fallback \
              "$NEXT_DIR/groovy-next-retry.zip" \
              "https://dlcdn.apache.org/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
              "https://downloads.apache.org/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
              "https://archive.apache.org/dist/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip" \
              "http://archive.apache.org/dist/groovy/${LATEST_GROOVY}/distribution/apache-groovy-binary-${LATEST_GROOVY}.zip"; then
              if unzip -q "$NEXT_DIR/groovy-next-retry.zip" -d "$NEXT_DIR/groovy"; then
                NEXT_GROOVY_HOME=$(find "$NEXT_DIR/groovy" -maxdepth 1 -type d -name "groovy-*" -print -quit || true)
                if [ -n "$NEXT_GROOVY_HOME" ]; then
                  export GROOVY_HOME="$NEXT_GROOVY_HOME"
                  export PATH="$GROOVY_HOME/bin:$GRAILS_HOME/bin:$PATH"
                  NEXT_GROOVY_RAW=$(groovy --version 2>&1 || true)
                  NEXT_GROOVY_REPORTED=$(printf '%s\n' "$NEXT_GROOVY_RAW" | sed -n 's/.*Version: \([^ ]*\).*/\1/p' | head -n 1)
                fi
              fi
            fi
          fi

          if [ -z "$NEXT_GROOVY_REPORTED" ] || [ -z "$NEXT_GRAILS_REPORTED" ]; then
            printf '%s\n' "$NEXT_GROOVY_RAW" || true
            printf '%s\n' "$NEXT_GRAILS_RAW" | strip_ansi || true
            fail_regression \
              "install_failed" \
              "next_install_failed" \
              "Next version install failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy/Grails version commands did not return parseable version values on Arm64."
          fi

          cat > "$NEXT_DIR/hello.groovy" <<'EOF'
          println "Hello from Groovy"
          EOF

          GROOVY_HELLO_OUTPUT=$(groovy "$NEXT_DIR/hello.groovy" 2>/tmp/groovy-grails-script-next.txt || true)
          set +e
          timeout 180s grails help create-app >/tmp/groovy-grails-help-next.txt 2>&1
          GRAILS_HELP_RC=$?
          set -e

          if [ "$NEXT_GROOVY_REPORTED" = "$LATEST_GROOVY" ] && \
             [ "$NEXT_GRAILS_REPORTED" = "$LATEST_GRAILS" ] && \
             [ "$GROOVY_HELLO_OUTPUT" = "Hello from Groovy" ] && \
             [ "${GRAILS_HELP_RC}" -eq 0 ] && \
             grep -q "create-app" /tmp/groovy-grails-help-next.txt; then
            NEXT_INSTALLED="Groovy ${NEXT_GROOVY_REPORTED} / Grails ${NEXT_GRAILS_REPORTED}"
            echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run. Regression validation installed candidate versions Groovy ${LATEST_GROOVY} and Grails ${LATEST_GRAILS} on Arm64, and both candidates reported the expected versions while the Groovy script and Grails create-app help path succeeded." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run. Regression validation installed candidate versions Groovy ${LATEST_GROOVY} and Grails ${LATEST_GRAILS} on Arm64, and both candidates reported the expected versions while the Groovy script and Grails create-app help path succeeded."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/groovy-grails-help-next.txt || true
            cat /tmp/groovy-grails-script-next.txt || true
            fail_regression \
              "Groovy ${NEXT_GROOVY_REPORTED:-unknown} / Grails ${NEXT_GRAILS_REPORTED:-unknown}" \
              "next_install_failed" \
              "Next version install failed on Arm64" \
              "Current pinned Groovy/Grails baseline ${CURRENT} passed smoke tests in this run, but the candidate Groovy/Grails combination did not report the expected versions or complete the expected help/script checks on Arm64."
          fi

          rm -rf "$NEXT_DIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          normalize_status() {
            case "${1:-}" in
              passed|failed|skipped) echo "${1:-}" ;;
              success) echo "passed" ;;
              cancelled|canceled|failure|timed_out|action_required) echo "failed" ;;
              *) echo "skipped" ;;
            esac
          }
          INSTALL_STATUS="${{ steps.install.outputs.install_status || env.GROOVY_GRAILS_INSTALL_STATUS || 'failed' }}"
          TEST1_STATUS="$(normalize_status "${{ steps.test1.outputs.status || steps.test1.conclusion || '' }}")"
          TEST2_STATUS="$(normalize_status "${{ steps.test2.outputs.status || steps.test2.conclusion || '' }}")"
          TEST3_STATUS="$(normalize_status "${{ steps.test3.outputs.status || steps.test3.conclusion || '' }}")"
          TEST4_STATUS="$(normalize_status "${{ steps.test4.outputs.status || steps.test4.conclusion || '' }}")"
          TEST5_STATUS="$(normalize_status "${{ steps.test5.outputs.status || steps.test5.conclusion || '' }}")"
          TEST6_STATUS="$(normalize_status "${{ steps.test6.outputs.status || steps.test6.conclusion || 'skipped' }}")"
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ] || [ -z "$status" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "$TEST1_STATUS" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "$TEST2_STATUS" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "$TEST3_STATUS" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "$TEST4_STATUS" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "$TEST5_STATUS" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "$INSTALL_STATUS" != "success" ] || [ "${{ steps.test6.outputs.decision || '' }}" = "baseline_failed" ]; then
            PASSED=0
            FAILED=1
            SKIPPED=5
            CORE_FAILED=1
          elif [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "skipped" ]; then
            SKIPPED=$((SKIPPED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Groovy/Grails Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Groovy binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Grails binary exists: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Groovy version output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Grails version output: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.overall_status || 'failure' }}" != "success" ]; then
            exit 1
          fi
