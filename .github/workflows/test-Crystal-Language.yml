#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Crystal Language placeholders with your package name (e.g., "Redis")
# 3. Replace all crystal-language placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the 'push:' trigger section below (remove the workflow_dispatch if desired)
#
# See test-nginx.yml and test-envoy.yml for real examples.

name: Test Crystal Language on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/crystal-language.md'
      - '.github/workflows/test-Crystal-Language.yml'

jobs:
  test-crystal-language:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "package_slug=Crystal-Language" >> $GITHUB_OUTPUT
          echo "dashboard_link=/opensource_packages/Crystal-Language" >> $GITHUB_OUTPUT
      
      # ============================================================
      # CUSTOMIZE THIS: Install your package
      # ============================================================
      - name: Install Crystal Language
        id: install
        run: |
          echo "Installing Crystal Language..."
          
          # Install using 84codes repository for better ARM64 support
          curl -s https://packagecloud.io/install/repositories/84codes/crystal/script.deb.sh | sudo bash
          
          sudo apt-get install -y crystal && echo "install_status=success" >> $GITHUB_OUTPUT || { echo "install_status=failed" >> $GITHUB_OUTPUT; echo "Package crystal not found"; exit 1; }
          
          # Verify installation
          if command -v crystal &> /dev/null; then
            echo "Crystal Language installed successfully"
          else
            echo "Crystal Language installation failed"
            exit 1
          fi
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Crystal Language version
        id: version
        run: |
          # Adjust this command based on how your package reports version
          VERSION=$(crystal --version 2>&1 | grep -oP '[0-9.]+' | head -1 || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Crystal Language version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check crystal-language binary exists
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ "${{ steps.install.outputs.install_status }}" == "skipped" ]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if command -v crystal &> /dev/null; then
            echo "✓ crystal-language binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ crystal-language binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check crystal-language version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ "${{ steps.install.outputs.install_status }}" == "skipped" ]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if crystal --version 2>&1 | grep -q "version\|[0-9]"; then
            echo "✓ crystal-language version command works"
            crystal --version
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ crystal-language version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check crystal-language help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ "${{ steps.install.outputs.install_status }}" == "skipped" ]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if crystal --help 2>&1 | grep -qi "usage\|help\|options"; then
            echo "✓ crystal-language help command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ crystal-language help command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ "${{ steps.install.outputs.install_status }}" == "skipped" ]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Basic functional check: try to run with --version or --help and check exit code
          if crystal --version > /dev/null 2>&1 || crystal --help > /dev/null 2>&1; then
            echo "✓ Basic functional check passed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Basic functional check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT="$(echo "${{ steps.version.outputs.version || 'unknown' }}" | tr -d '[:space:]' | sed 's/^v//')"
          LATEST_RAW=$(GH_TOKEN=${{ github.token }} gh api repos/crystal-lang/crystal/releases/latest --jq .tag_name 2>/dev/null || true)
          LATEST_TAG=$(echo "$LATEST_RAW" | tr -d '[:space:]')
          LATEST="${LATEST_TAG#v}"
          NEXT_INSTALLED="not_installed"
          DECISION="next_lookup_failed"
          REGRESSION_RESULT="Next version install failed on Arm64"
          COMPARISON="Current pinned Crystal Language version ${CURRENT} passed smoke tests in this run, but the next regression candidate version could not be resolved automatically."
          STATUS="failed"

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            NEXT_INSTALLED="lookup_failed"
          elif [ "$CURRENT" = "$LATEST" ]; then
            NEXT_INSTALLED="$CURRENT"
            DECISION="current_is_latest_stable"
            REGRESSION_RESULT="Current stable version already validated on Arm64"
            COMPARISON="Current pinned Crystal Language version ${CURRENT} already matches the latest stable upstream Arm64 release, so there is no newer version to install in Test 6."
            STATUS="passed"
          else
            NEXT_DIR=$(mktemp -d /tmp/crystal-next-XXXXXX)
            NEXT_TARBALL="$NEXT_DIR/crystal.tar.gz"
            PRIMARY_ASSET="crystal-${LATEST}-1-linux-aarch64.tar.gz"
            FALLBACK_ASSET="crystal-${LATEST}-1-linux-aarch64-bundled.tar.gz"
            ASSET_NAME=""

            if GH_TOKEN=${{ github.token }} gh api repos/crystal-lang/crystal/releases/latest --jq '.assets[]?.name' | grep -Fxq "$PRIMARY_ASSET"; then
              ASSET_NAME="$PRIMARY_ASSET"
            elif GH_TOKEN=${{ github.token }} gh api repos/crystal-lang/crystal/releases/latest --jq '.assets[]?.name' | grep -Fxq "$FALLBACK_ASSET"; then
              ASSET_NAME="$FALLBACK_ASSET"
            fi

            if [ -n "$ASSET_NAME" ] && curl -fsSL -o "$NEXT_TARBALL" "https://github.com/crystal-lang/crystal/releases/download/${LATEST_TAG}/${ASSET_NAME}"; then
              tar -xzf "$NEXT_TARBALL" -C "$NEXT_DIR"
              NEXT_BIN=$(find "$NEXT_DIR" -type f -path '*/bin/crystal' | head -1)
              if [ -n "$NEXT_BIN" ] && [ -f "$NEXT_BIN" ]; then
                chmod +x "$NEXT_BIN"
                NEXT_INSTALLED_VERSION=$("$NEXT_BIN" --version 2>&1 | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
                if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
                  NEXT_INSTALLED="$NEXT_INSTALLED_VERSION"
                  DECISION="next_install_validated"
                  REGRESSION_RESULT="Next version installed successfully on Arm64"
                  COMPARISON="Current pinned Crystal Language version ${CURRENT} passed smoke tests in this run. Regression validation downloaded candidate release ${LATEST} for Arm64, and the extracted crystal binary reported version ${NEXT_INSTALLED_VERSION}."
                  STATUS="passed"
                else
                  NEXT_INSTALLED="${NEXT_INSTALLED_VERSION:-unknown}"
                  DECISION="next_install_failed"
                  REGRESSION_RESULT="Next version installed but reported a version mismatch on Arm64"
                  COMPARISON="Current pinned Crystal Language version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} extracted on Arm64 and reported version ${NEXT_INSTALLED} instead of the expected ${LATEST}."
                fi
              else
                NEXT_INSTALLED="install_failed"
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned Crystal Language version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} did not extract a usable Arm64 crystal binary."
              fi
            else
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned Crystal Language version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} could not be downloaded for Arm64."
            fi
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=$NEXT_INSTALLED" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "regression_result=$REGRESSION_RESULT" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"
          echo "Next version installed on Arm64: $NEXT_INSTALLED"
          echo "Regression install result: $REGRESSION_RESULT"
          echo "Details: $COMPARISON"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi


      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check crystal-language binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check crystal-language version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check crystal-language help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))


          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          
          cat > test-results/Crystal-Language.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Crystal Language",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Languages and Frameworks",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check crystal-language binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check crystal-language version command",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check crystal-language help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/Crystal-Language.json
      
      # ============================================================
      # STANDARD STEPS - Usually don't need to modify below here
      # ============================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crystal-language-test-results
          path: test-results/Crystal-Language.json
          retention-days: 90
      
      - name: Create test summary
        if: always()
        run: |
          echo "## Crystal Language Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check crystal-language binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check crystal-language version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check crystal-language help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Validation (Next Version Install)" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY





