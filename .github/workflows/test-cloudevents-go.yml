name: Test Cloudevents-Go on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cloudevents-go.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cloudevents-go.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cloudevents-go.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cloudevents-go.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cloudevents-go.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cloudevents-go.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cloudevents-go.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cloudevents-go.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cloudevents-go.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cloudevents-go.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cloudevents-go.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cloudevents-go.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cloudevents-go.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cloudevents-go.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cloudevents-go.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cloudevents-go.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cloudevents-go.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cloudevents-go.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cloudevents-go.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cloudevents-go.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cloudevents-go.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cloudevents-go.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cloudevents-go.outputs.timestamp }}
jobs:
  test-cloudevents-go:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Cloudevents-Go'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cloudevents-go" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cloudevents-go" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "golang"
      - name: Install Cloudevents-Go
        id: install
        run: |
          echo "Creating Go module..."
          mkdir test-ce
          cd test-ce
          go mod init test-ce
          
          echo "Getting Cloudevents SDK..."
          if go get github.com/cloudevents/sdk-go/v2; then
             echo "Cloudevents-Go installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Failed to install Cloudevents-Go"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Cloudevents-Go version
        id: version
        run: |
          cd test-ce
          VERSION=$(go list -m github.com/cloudevents/sdk-go/v2 | awk '{print $2}' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Cloudevents-Go version: $VERSION"
      
      - name: Test 1 - Check module dependency
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd test-ce
          
          if [ -f "go.mod" ] && grep -q "github.com/cloudevents/sdk-go/v2" go.mod; then
             echo "✓ go.mod contains the CloudEvents dependency"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ go.mod is missing the CloudEvents dependency"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check installed version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd test-ce
          
          VERSION=$(go list -m github.com/cloudevents/sdk-go/v2 | awk '{print $2}' 2>&1)
          echo "$VERSION"

          if echo "$VERSION" | grep -Eq '^v?[0-9]'; then
             echo "✓ CloudEvents Go version resolved"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ CloudEvents Go version lookup failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Render package docs
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd test-ce
          
          if go doc github.com/cloudevents/sdk-go/v2 > /dev/null 2>&1; then
             echo "✓ CloudEvents Go documentation rendered"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ CloudEvents Go documentation render failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
             echo "✓ Running on Arm64"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Expected aarch64 runner"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Create, validate, build, and run an event
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation
          cd test-ce

          cat > main.go << EOF
          package main

          import (
              "fmt"
              "time"

              cloudevents "github.com/cloudevents/sdk-go/v2"
          )

          func main() {
              event := cloudevents.NewEvent()
              event.SetID("example-uuid-32943bac6fea")
              event.SetSource("example/uri")
              event.SetType("example.type")
              if err := event.SetData(cloudevents.ApplicationJSON, map[string]string{"hello": "world"}); err != nil {
                  panic(err)
              }
              event.SetTime(time.Now())

              if err := event.Validate(); err != nil {
                  panic(err)
              }

              fmt.Println(event.Type())
              fmt.Println(event.Source())
          }
          EOF

          go build -o app main.go
          OUTPUT=$(./app)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "example.type" && echo "$OUTPUT" | grep -q "example/uri"; then
             echo "✓ CloudEvents Go created, validated, built, and ran an event"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ CloudEvents Go functional validation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check module dependency
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check installed version
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Render package docs
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Verify architecture
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Create, validate, build, and run an event
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Cloudevents-Go Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Create Event: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Validate Event: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Module: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Build Binary: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

