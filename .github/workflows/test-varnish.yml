name: Test Varnish on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/varnish.md"
      - ".github/workflows/test-varnish.yml"

jobs:
  test-varnish:
    runs-on: ubuntu-24.04-arm
    env:
      VARNISH_IMAGE: "varnish:7.7.2"
      CURRENT_BASELINE_VERSION: "7.7.2"
      VARNISH_NEXT_VERSION: "7.7.3"
      VARNISH_NEXT_IMAGE: "varnish:7.7.3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=varnish" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/varnish" >> "$GITHUB_OUTPUT"

      - name: Install Varnish container image
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || sudo service docker start || true
          sudo docker pull "$VARNISH_IMAGE"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Varnish version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(
            sudo docker run --rm --entrypoint sh "$VARNISH_IMAGE" -lc \
              "/usr/sbin/varnishd -V 2>&1 | grep -oE 'varnish-[0-9]+(\\.[0-9]+)+' | head -1 | sed 's/^varnish-//'"
          )
          LATEST="${VARNISH_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Image Availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker image inspect "$VARNISH_IMAGE" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VERSION=$(
            sudo docker run --rm --entrypoint sh "$VARNISH_IMAGE" -lc \
              "/usr/sbin/varnishd -V 2>&1 | grep -oE 'varnish-[0-9]+(\\.[0-9]+)+' | head -1 | sed 's/^varnish-//'"
          )

          if [ "$VERSION" = "$CURRENT_BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if sudo docker run --rm --entrypoint sh "$VARNISH_IMAGE" -lc "varnishlog -h >/dev/null"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          IMAGE_ARCH=$(sudo docker image inspect --format '{{.Architecture}}' "$VARNISH_IMAGE")

          if [ "$ARCH" = "aarch64" ] && [ "$IMAGE_ARCH" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          rm -f /tmp/default.vcl /tmp/varnish.log /tmp/backend.log /tmp/varnish-body.txt
          mkdir -p /tmp/varnish-backend
          printf 'varnish-ok\n' > /tmp/varnish-backend/index.html
          nohup python3 -m http.server 18100 --directory /tmp/varnish-backend >/tmp/backend.log 2>&1 &
          BACKEND_PID=$!

          cleanup() {
            kill "$BACKEND_PID" >/dev/null 2>&1 || true
            sudo docker rm -f varnish-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          cat > /tmp/default.vcl <<'EOF'
          vcl 4.1;
          backend default {
            .host = "127.0.0.1";
            .port = "18100";
          }
          EOF

          sudo docker run --rm --name varnish-smoke --network host \
            -v /tmp/default.vcl:/etc/varnish/default.vcl:ro \
            --entrypoint sh "$VARNISH_IMAGE" \
            -lc "/usr/sbin/varnishd -F -a 127.0.0.1:6081 -f /etc/varnish/default.vcl -s malloc,128m" \
            >/tmp/varnish.log 2>&1 &

          OK=0
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:6081 >/tmp/varnish-body.txt 2>/dev/null; then
              OK=1
              break
            fi
            sleep 1
          done

          sudo docker run --rm --network host \
            -v /tmp/default.vcl:/etc/varnish/default.vcl:ro \
            --entrypoint sh "$VARNISH_IMAGE" \
            -lc "/usr/sbin/varnishd -C -f /etc/varnish/default.vcl >/dev/null"

          if [ "$OK" -eq 1 ] && grep -q 'varnish-ok' /tmp/varnish-body.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/backend.log || true
            cat /tmp/varnish.log || true
            cat /tmp/varnish-body.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.CURRENT_BASELINE_VERSION }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Varnish image ${CURRENT} passed smoke tests in this run, but the latest stable Arm64 image tag could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_IMAGE="${VARNISH_NEXT_IMAGE}"
          rm -f /tmp/default-next.vcl /tmp/varnish-next.log /tmp/backend-next.log /tmp/varnish-next-body.txt
          mkdir -p /tmp/varnish-backend-next
          printf 'varnish-next-ok\n' > /tmp/varnish-backend-next/index.html
          nohup python3 -m http.server 18101 --directory /tmp/varnish-backend-next >/tmp/backend-next.log 2>&1 &
          BACKEND_PID=$!

          cleanup() {
            kill "$BACKEND_PID" >/dev/null 2>&1 || true
            sudo docker rm -f varnish-next >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          cat > /tmp/default-next.vcl <<'EOF'
          vcl 4.1;
          backend default {
            .host = "127.0.0.1";
            .port = "18101";
          }
          EOF

          if ! sudo docker pull "$NEXT_IMAGE" >/tmp/varnish-next-pull.log 2>&1; then
            cat /tmp/varnish-next-pull.log || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Varnish image ${CURRENT} passed smoke tests in this run, but the candidate image ${NEXT_IMAGE} could not be pulled successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION=$(
            sudo docker run --rm --entrypoint sh "$NEXT_IMAGE" -lc \
              "/usr/sbin/varnishd -V 2>&1 | grep -oE 'varnish-[0-9]+(\\.[0-9]+)+' | head -1 | sed 's/^varnish-//'"
          )
          echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          sudo docker run --rm --name varnish-next --network host \
            -v /tmp/default-next.vcl:/etc/varnish/default.vcl:ro \
            --entrypoint sh "$NEXT_IMAGE" \
            -lc "/usr/sbin/varnishd -F -a 127.0.0.1:6082 -f /etc/varnish/default.vcl -s malloc,128m" \
            >/tmp/varnish-next.log 2>&1 &

          OK=0
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:6082 >/tmp/varnish-next-body.txt 2>/dev/null; then
              OK=1
              break
            fi
            sleep 1
          done

          if ! sudo docker run --rm --network host \
            -v /tmp/default-next.vcl:/etc/varnish/default.vcl:ro \
            --entrypoint sh "$NEXT_IMAGE" \
            -lc "/usr/sbin/varnishd -C -f /etc/varnish/default.vcl >/dev/null"; then
            OK=0
          fi

          if sudo docker run --rm --entrypoint sh "$NEXT_IMAGE" -lc "varnishlog -h >/dev/null" >/tmp/varnish-next-help.log 2>&1 && \
             [ "$OK" -eq 1 ] && \
             grep -q 'varnish-next-ok' /tmp/varnish-next-body.txt; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Varnish image ${CURRENT} passed smoke tests in this run. Regression validation pulled candidate image ${NEXT_IMAGE}, confirmed version ${NEXT_VERSION}, and completed real config-compile plus backend proxy smoke successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/varnish-next.log || true
            cat /tmp/varnish-next-help.log || true
            cat /tmp/backend-next.log || true
            cat /tmp/varnish-next-body.txt || true
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Varnish image ${CURRENT} passed smoke tests in this run, but the candidate image ${NEXT_IMAGE} did not complete the expected Arm64 version, help, config-compile, and backend proxy validation path." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/varnish.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Varnish",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Web Server"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Image Availability", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Help Output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || '' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: varnish-test-results
          path: test-results/varnish.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Varnish Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Image Availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
