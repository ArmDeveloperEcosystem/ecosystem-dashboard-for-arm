name: Test Dapr Serverless on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-dapr_serverless.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-dapr_serverless.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-dapr_serverless.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-dapr_serverless.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-dapr_serverless.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-dapr_serverless.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-dapr_serverless.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-dapr_serverless.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-dapr_serverless.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-dapr_serverless.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-dapr_serverless.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-dapr_serverless.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-dapr_serverless.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-dapr_serverless.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-dapr_serverless.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-dapr_serverless.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-dapr_serverless.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-dapr_serverless.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-dapr_serverless.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-dapr_serverless.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-dapr_serverless.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-dapr_serverless.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-dapr_serverless.outputs.timestamp }}
jobs:
  test-dapr_serverless:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.16.0"
      DAPR_SERVERLESS_NEXT_VERSION: "1.16.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Dapr Serverless'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=dapr_serverless" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/dapr_serverless" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

      - name: Install baseline Dapr Serverless sample images
        id: install
        run: |
          set -euo pipefail
          BASELINE_TAG="${BASELINE_VERSION}"
          sudo docker pull "dapriosamples/hello-k8s-node:${BASELINE_TAG}"
          sudo docker pull "dapriosamples/hello-k8s-python:${BASELINE_TAG}"
          echo "baseline_tag=${BASELINE_TAG}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Dapr Serverless versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="${{ steps.install.outputs.baseline_tag }}"
          LATEST="${DAPR_SERVERLESS_NEXT_VERSION}"

          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Dapr Serverless baseline version: $CURRENT"
          echo "Detected Dapr Serverless latest version: $LATEST"

      - name: Test 1 - Check Node sample image availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Python sample image availability
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check pulled image architecture
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          NODE_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" --format '{{.Os}} {{.Architecture}}')
          PY_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" --format '{{.Os}} {{.Architecture}}')

          if [ "$NODE_ARCH" = "linux arm64" ] && [ "$PY_ARCH" = "linux arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'Node image: %s\nPython image: %s\n' "$NODE_ARCH" "$PY_ARCH"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Node sample runtime
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo docker rm -f dapr-node-sample >/dev/null 2>&1 || true
          trap 'sudo docker rm -f dapr-node-sample >/dev/null 2>&1 || true' EXIT
          sudo docker run -d --name dapr-node-sample -p 18080:3000 "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" >/dev/null

          HTTP_CODE=""
          for _ in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /tmp/dapr-node-body.txt -w '%{http_code}' http://127.0.0.1:18080 || true)
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 1
          done

          if [ "$HTTP_CODE" != "000" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker logs --tail 50 dapr-node-sample || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Python sample execution
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PY_VERSION=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" --version 2>&1)
          APP_EXISTS=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" -c 'import os; print(os.path.exists("app.py"))')

          if printf '%s\n' "$PY_VERSION" | grep -q '^Python ' && [ "$APP_EXISTS" = "True" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'Python probe: %s\napp.py exists: %s\n' "$PY_VERSION" "$APP_EXISTS"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Dapr Serverless sample images currently do not expose a newer common stable Arm64 tag beyond ${CURRENT} for both hello-k8s-node and hello-k8s-python. Baseline smoke coverage exists, but there is no honest newer Test 6 candidate to claim in this workflow yet." >> "$GITHUB_OUTPUT"
            echo "Details: Public common Arm64 sample tags stop at ${CURRENT}."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sudo docker pull "dapriosamples/hello-k8s-node:${LATEST}" >/dev/null
          sudo docker pull "dapriosamples/hello-k8s-python:${LATEST}" >/dev/null

          NODE_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-node:${LATEST}" --format '{{.Os}} {{.Architecture}}')
          PY_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-python:${LATEST}" --format '{{.Os}} {{.Architecture}}')
          PY_VERSION=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${LATEST}" --version 2>&1)
          APP_EXISTS=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${LATEST}" -c 'import os; print(os.path.exists("app.py"))')

          sudo docker rm -f dapr-node-regression >/dev/null 2>&1 || true
          trap 'sudo docker rm -f dapr-node-regression >/dev/null 2>&1 || true' EXIT
          sudo docker run -d --name dapr-node-regression -p 18082:3000 "dapriosamples/hello-k8s-node:${LATEST}" >/dev/null

          HTTP_CODE=""
          for _ in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /tmp/dapr-node-regression.txt -w '%{http_code}' http://127.0.0.1:18082 || true)
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 1
          done

          echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$NODE_ARCH" != "linux arm64" ] || [ "$PY_ARCH" != "linux arm64" ] || [ "$HTTP_CODE" = "000" ] || ! printf '%s\n' "$PY_VERSION" | grep -q '^Python ' || [ "$APP_EXISTS" != "True" ]; then
            DETAILS="Current pinned Dapr Serverless sample version ${CURRENT} passed smoke tests in this run, but the candidate sample images ${LATEST} did not complete the full Arm64 validation path (node architecture: ${NODE_ARCH}, python architecture: ${PY_ARCH}, node HTTP code: ${HTTP_CODE}, python probe: ${PY_VERSION}, app.py exists: ${APP_EXISTS})."
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${LATEST}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: ${DETAILS}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          DETAILS="Current pinned Dapr Serverless sample version ${CURRENT} passed smoke tests in this run. Regression validation re-pulled the next stable common image tag ${LATEST}, confirmed both sample images resolved to Arm64, observed the node sample respond over HTTP, and confirmed the Python sample executed its interpreter with app.py present."
          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
          echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
          echo "Regression install result: Next version installed successfully on Arm64"
          echo "status=passed" >> "$GITHUB_OUTPUT"

          echo "Next version installed on Arm64: ${LATEST}"
          echo "Details: ${DETAILS}"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            local core=$3
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" yes
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" yes
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" yes
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" yes
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" yes
          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "${{ steps.test6.outputs.status || 'failed' }}" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Dapr Serverless Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Node sample image availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Python sample image availability: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check pulled image architecture: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Node sample runtime: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check Python sample execution: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
