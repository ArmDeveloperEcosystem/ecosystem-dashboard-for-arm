name: Test Dapr Serverless on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/dapr_serverless.md'
      - '.github/workflows/test-dapr_serverless.yml'

jobs:
  test-dapr_serverless:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.16.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=dapr_serverless" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/dapr_serverless" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

      - name: Install baseline Dapr Serverless sample images
        id: install
        run: |
          set -euo pipefail
          BASELINE_TAG="${BASELINE_VERSION}"
          sudo docker pull "dapriosamples/hello-k8s-node:${BASELINE_TAG}"
          sudo docker pull "dapriosamples/hello-k8s-python:${BASELINE_TAG}"
          echo "baseline_tag=${BASELINE_TAG}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Dapr Serverless versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="${{ steps.install.outputs.baseline_tag }}"
          LATEST=$(python3 - <<'PY'
          import json, re, urllib.request

          def get_tags(repo):
              url = f'https://hub.docker.com/v2/namespaces/dapriosamples/repositories/{repo}/tags?page_size=100'
              tags = []
              while url:
                  data = json.load(urllib.request.urlopen(url))
                  tags.extend(r['name'] for r in data.get('results', []))
                  url = data.get('next')
              return tags

          def stable(repo):
              return {t for t in get_tags(repo) if re.fullmatch(r'[0-9]+\.[0-9]+\.[0-9]+', t)}

          common = sorted(
              stable('hello-k8s-node') & stable('hello-k8s-python'),
              key=lambda s: tuple(map(int, s.split('.')))
          )
          print(common[-1] if common else '')
          PY
          )
          if [ -z "$LATEST" ]; then
            LATEST="$CURRENT"
          fi

          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected Dapr Serverless baseline version: $CURRENT"
          echo "Detected Dapr Serverless latest version: $LATEST"

      - name: Test 1 - Check Node sample image availability
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Python sample image availability
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if sudo docker image inspect "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check pulled image architecture
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          NODE_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" --format '{{.Os}} {{.Architecture}}')
          PY_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" --format '{{.Os}} {{.Architecture}}')

          if [ "$NODE_ARCH" = "linux arm64" ] && [ "$PY_ARCH" = "linux arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'Node image: %s\nPython image: %s\n' "$NODE_ARCH" "$PY_ARCH"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Node sample runtime
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          sudo docker rm -f dapr-node-sample >/dev/null 2>&1 || true
          trap 'sudo docker rm -f dapr-node-sample >/dev/null 2>&1 || true' EXIT
          sudo docker run -d --name dapr-node-sample -p 18080:3000 "dapriosamples/hello-k8s-node:${{ steps.version.outputs.version }}" >/dev/null

          HTTP_CODE=""
          for _ in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /tmp/dapr-node-body.txt -w '%{http_code}' http://127.0.0.1:18080 || true)
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 1
          done

          if [ "$HTTP_CODE" != "000" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            sudo docker logs --tail 50 dapr-node-sample || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check Python sample execution
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PY_VERSION=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" --version 2>&1)
          APP_EXISTS=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${{ steps.version.outputs.version }}" -c 'import os; print(os.path.exists("app.py"))')

          if printf '%s\n' "$PY_VERSION" | grep -q '^Python ' && [ "$APP_EXISTS" = "True" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'Python probe: %s\napp.py exists: %s\n' "$PY_VERSION" "$APP_EXISTS"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          sudo docker pull "dapriosamples/hello-k8s-node:${LATEST}" >/dev/null
          sudo docker pull "dapriosamples/hello-k8s-python:${LATEST}" >/dev/null

          NODE_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-node:${LATEST}" --format '{{.Os}} {{.Architecture}}')
          PY_ARCH=$(sudo docker image inspect "dapriosamples/hello-k8s-python:${LATEST}" --format '{{.Os}} {{.Architecture}}')
          PY_VERSION=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${LATEST}" --version 2>&1)
          APP_EXISTS=$(sudo docker run --rm --entrypoint python "dapriosamples/hello-k8s-python:${LATEST}" -c 'import os; print(os.path.exists("app.py"))')

          sudo docker rm -f dapr-node-regression >/dev/null 2>&1 || true
          trap 'sudo docker rm -f dapr-node-regression >/dev/null 2>&1 || true' EXIT
          sudo docker run -d --name dapr-node-regression -p 18082:3000 "dapriosamples/hello-k8s-node:${LATEST}" >/dev/null

          HTTP_CODE=""
          for _ in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /tmp/dapr-node-regression.txt -w '%{http_code}' http://127.0.0.1:18082 || true)
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 1
          done

          echo "next_installed_version=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$NODE_ARCH" != "linux arm64" ] || [ "$PY_ARCH" != "linux arm64" ] || [ "$HTTP_CODE" = "000" ] || ! printf '%s\n' "$PY_VERSION" | grep -q '^Python ' || [ "$APP_EXISTS" != "True" ]; then
            DETAILS="Current pinned Dapr Serverless sample version ${CURRENT} passed smoke tests in this run, but the candidate sample images ${LATEST} did not complete the full Arm64 validation path (node architecture: ${NODE_ARCH}, python architecture: ${PY_ARCH}, node HTTP code: ${HTTP_CODE}, python probe: ${PY_VERSION}, app.py exists: ${APP_EXISTS})."
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${LATEST}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: ${DETAILS}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            DETAILS="Current pinned Dapr Serverless sample version ${CURRENT} already matches the latest stable common image tag. Regression validation re-pulled both Arm64 sample images, confirmed their architectures, observed the node sample respond over HTTP, and confirmed the Python sample executed its interpreter with app.py present."
            echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            DETAILS="Current pinned Dapr Serverless sample version ${CURRENT} passed smoke tests in this run. Regression validation re-pulled the next stable common image tag ${LATEST}, confirmed both sample images resolved to Arm64, observed the node sample respond over HTTP, and confirmed the Python sample executed its interpreter with app.py present."
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=${DETAILS}" >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${LATEST}"
          echo "Details: ${DETAILS}"
          echo "status=passed" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            local core=$3
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$core" = "yes" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}" yes
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}" yes
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}" yes
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}" yes
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}" yes
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}" no

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}"
          fi

          mkdir -p test-results

          cat > test-results/dapr_serverless.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Dapr Serverless",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Serverless",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check Node sample image availability",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check Python sample image availability",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check pulled image architecture",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Check Node sample runtime",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Check Python sample execution",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || '' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}"
                }
              ]
            },
            "metadata": {
              "package_slug": "${{ steps.metadata.outputs.package_slug }}",
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dapr-serverless-test-results
          path: test-results/dapr_serverless.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || 'manual_review_needed' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              baseline_matches_latest_stable|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
            esac
          fi

          echo "## Dapr Serverless Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check Node sample image availability: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check Python sample image availability: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check pulled image architecture: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check Node sample runtime: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Check Python sample execution: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
