name: Test Reveal.js on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-reveal.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-reveal.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-reveal.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-reveal.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-reveal.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-reveal.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-reveal.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-reveal.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-reveal.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-reveal.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-reveal.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-reveal.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-reveal.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-reveal.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-reveal.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-reveal.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-reveal.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-reveal.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-reveal.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-reveal.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-reveal.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-reveal.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-reveal.outputs.timestamp }}
jobs:
  test-reveal:
    runs-on: ubuntu-24.04-arm
    env:
      REVEAL_VERSION: "5.2.1"
      REVEAL_WORKDIR: /tmp/reveal-smoke

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Reveal.js'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=reveal" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/reveal" >> "$GITHUB_OUTPUT"
      - name: Install Reveal.js
        id: install
        run: |
          set -euo pipefail
          rm -rf "$REVEAL_WORKDIR"
          mkdir -p "$REVEAL_WORKDIR"
          cd "$REVEAL_WORKDIR"
          npm init -y >/dev/null 2>&1
          npm install reveal.js@"${REVEAL_VERSION}" jsdom@22

          if [ -f "$REVEAL_WORKDIR/node_modules/reveal.js/package.json" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Reveal.js version
        id: version
        run: |
          set -euo pipefail
          cd "$REVEAL_WORKDIR"
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/reveal.js/package.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "$REVEAL_WORKDIR/node_modules/reveal.js/dist/reveal.js" ] && [ -f "$REVEAL_WORKDIR/node_modules/reveal.js/package.json" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$REVEAL_WORKDIR"
          if node -p "JSON.parse(require('fs').readFileSync('node_modules/reveal.js/package.json', 'utf8')).version" | grep -qx "${REVEAL_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$REVEAL_WORKDIR"
          if node -e "const pkg=JSON.parse(require('fs').readFileSync('node_modules/reveal.js/package.json', 'utf8')); if(pkg.name!=='reveal.js'){process.exit(1)} console.log(pkg.description)" >/tmp/reveal-config.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/reveal-config.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "$REVEAL_WORKDIR"
          node <<'EOF' >/tmp/reveal-functional.log 2>&1
          const { JSDOM } = require('jsdom');
          const dom = new JSDOM('<!doctype html><html><body><div class="reveal"><div class="slides"><section>hi</section></div></div></body></html>', { url: 'http://localhost/' });
          global.window = dom.window;
          global.document = dom.window.document;
          global.navigator = dom.window.navigator;
          global.Element = dom.window.Element;
          global.HTMLElement = dom.window.HTMLElement;
          global.Node = dom.window.Node;
          global.Text = dom.window.Text;
          global.CustomEvent = dom.window.CustomEvent;
          global.location = dom.window.location;
          global.getComputedStyle = dom.window.getComputedStyle.bind(dom.window);
          global.MutationObserver = dom.window.MutationObserver;
          global.DOMParser = dom.window.DOMParser;
          global.requestAnimationFrame = cb => setTimeout(cb, 0);
          global.cancelAnimationFrame = id => clearTimeout(id);
          const revealModule = require('reveal.js');
          const Reveal = revealModule.default || revealModule;
          const deck = new Reveal(document.querySelector('.reveal'));
          if (typeof Reveal !== 'function' || typeof deck.initialize !== 'function') {
            process.exit(1);
          }
          console.log('reveal-ok');
          EOF
          if grep -q "reveal-ok" /tmp/reveal-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/reveal-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          npm view reveal.js versions --json > /tmp/reveal-versions.json
          NEXT=$(CURRENT="$CURRENT" node <<'NODE'
          const fs = require('fs');
          const current = process.env.CURRENT;
          const versions = JSON.parse(fs.readFileSync('/tmp/reveal-versions.json', 'utf8'))
            .filter((v) => /^\d+\.\d+\.\d+$/.test(v))
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          process.stdout.write(versions.find((v) => v.localeCompare(current, undefined, { numeric: true }) > 0) || '');
          NODE
          )
          if [ -z "$NEXT" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Reveal.js version is available from npm" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Reveal.js $CURRENT instantiated a deck in jsdom; npm did not report a newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          NEXT_DIR=$(mktemp -d)
          cd "$NEXT_DIR"
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund "reveal.js@${NEXT}" jsdom@22
          INSTALLED=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/reveal.js/package.json', 'utf8')).version")
          if node <<'EOF' >/tmp/reveal-next-functional.log 2>&1
          const { JSDOM } = require('jsdom');
          const dom = new JSDOM('<!doctype html><html><body><div class="reveal"><div class="slides"><section>hi</section></div></div></body></html>', { url: 'http://localhost/' });
          global.window = dom.window;
          global.document = dom.window.document;
          global.navigator = dom.window.navigator;
          global.Element = dom.window.Element;
          global.HTMLElement = dom.window.HTMLElement;
          global.Node = dom.window.Node;
          global.Text = dom.window.Text;
          global.CustomEvent = dom.window.CustomEvent;
          global.location = dom.window.location;
          global.getComputedStyle = dom.window.getComputedStyle.bind(dom.window);
          global.MutationObserver = dom.window.MutationObserver;
          global.DOMParser = dom.window.DOMParser;
          global.requestAnimationFrame = cb => setTimeout(cb, 0);
          global.cancelAnimationFrame = id => clearTimeout(id);
          const revealModule = require('reveal.js');
          const Reveal = revealModule.default || revealModule;
          const deck = new Reveal(document.querySelector('.reveal'));
          if (typeof Reveal !== 'function' || typeof deck.initialize !== 'function') process.exit(1);
          console.log('reveal-next-ok');
          EOF
          then
            NODE_SMOKE_STATUS=passed
          else
            NODE_SMOKE_STATUS=failed
          fi
          if [ "$INSTALLED" = "$NEXT" ] && [ "$NODE_SMOKE_STATUS" = "passed" ] && grep -q "reveal-next-ok" /tmp/reveal-next-functional.log; then
            echo "next_installed_version=$INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed and rendered successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Reveal.js $CURRENT instantiated a deck in jsdom. Test 6 installed candidate $INSTALLED and repeated the bounded render smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/reveal-next-functional.log || true
            echo "next_installed_version=${INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version render smoke failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Reveal.js $CURRENT passed, but candidate $NEXT did not complete the same jsdom deck smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test6.outputs.status || 'skipped' }}" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Reveal.js Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Artifact Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
