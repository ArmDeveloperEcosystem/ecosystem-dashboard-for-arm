name: Test CP2K on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-cp2k.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-cp2k.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-cp2k.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-cp2k.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-cp2k.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-cp2k.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-cp2k.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-cp2k.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-cp2k.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-cp2k.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-cp2k.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-cp2k.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-cp2k.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-cp2k.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-cp2k.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-cp2k.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-cp2k.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-cp2k.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-cp2k.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-cp2k.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-cp2k.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-cp2k.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-cp2k.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-cp2k.outputs.timestamp }}

jobs:
  test-cp2k:
    runs-on: ubuntu-24.04-arm
    env:
      CP2K_VERSION: "2023.1"
      CP2K_NEXT_VERSION: "2023.2"
      CP2K_REPO: "https://github.com/cp2k/cp2k"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'CP2K'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=CP2K" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/CP2K" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${CP2K_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CP2K baseline from source
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            ca-certificates \
            git \
            build-essential \
            gfortran \
            python3 \
            pkg-config \
            libopenblas-dev \
            liblapack-dev

          WORKDIR="${RUNNER_TEMP}/cp2k-${CP2K_VERSION}"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          curl -fsSL \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            -o cp2k.tar.gz \
            "https://github.com/cp2k/cp2k/archive/refs/tags/v${CP2K_VERSION}.tar.gz"
          tar -xzf cp2k.tar.gz
          mv "cp2k-${CP2K_VERSION}" source

          cd source/tools/toolchain
          sudo ./install_requirements.sh ubuntu:24.04
          ./install_cp2k_toolchain.sh \
            --install-all \
            --with-gcc=system \
            --with-openblas=system \
            --target-cpu=generic
          ./scripts/generate_arch_files.sh

          cd ../..
          ln -sf "$WORKDIR/source/tools/toolchain/install/arch/local.ssmp" "$WORKDIR/source/arch/local.ssmp"
          source "$WORKDIR/source/tools/toolchain/install/setup"
          make -j"$(nproc)" -C "$WORKDIR/source" ARCH=local VERSION=ssmp

          test -x "$WORKDIR/source/exe/local/cp2k.ssmp"

          echo "build_root=$WORKDIR/source" >> "$GITHUB_OUTPUT"
          echo "binary_path=$WORKDIR/source/exe/local/cp2k.ssmp" >> "$GITHUB_OUTPUT"
          echo "setup_script=$WORKDIR/source/tools/toolchain/install/setup" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get CP2K version
        id: version
        run: |
          set -euo pipefail
          SETUP_SCRIPT="${{ steps.install.outputs.setup_script }}"
          BINARY="${{ steps.install.outputs.binary_path }}"
          source "$SETUP_SCRIPT"

          VERSION="$("$BINARY" --version 2>&1 | grep -Eo '[0-9]{4}\.[0-9]+' | head -1 || true)"
          if [ -z "$VERSION" ]; then
            VERSION="${CP2K_VERSION}"
          fi

          NEXT="$(git ls-remote --tags --refs "${CP2K_REPO}" \
            | awk -F/ '{print $3}' \
            | sed 's/^v//' \
            | grep -E '^[0-9]{4}\.[0-9]+$' \
            | sort -V \
            | awk -v current="${CP2K_VERSION}" '
                $0 == current { found=1; next }
                found { print; exit }
              ' || true)"
          if [ -z "$NEXT" ]; then
            NEXT="${CP2K_NEXT_VERSION}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Detected CP2K version: $VERSION"
          echo "Next release candidate for Test 6: $NEXT"

      - name: Test 1 - Check cp2k binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.binary_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact release version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.setup_script }}"
          VERSION="$("${{ steps.install.outputs.binary_path }}" --version 2>&1 | grep -Eo '[0-9]{4}\.[0-9]+' | head -1 || true)"

          if [ "$VERSION" = "${CP2K_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf 'Expected version %s but detected %s\n' "${CP2K_VERSION}" "${VERSION:-unknown}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check cp2k help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.setup_script }}"
          if "${{ steps.install.outputs.binary_path }}" --help 2>&1 | grep -Eiq 'usage|cp2k|options'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Verify binary is Arm64
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if file "${{ steps.install.outputs.binary_path }}" | grep -Eiq 'aarch64|ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.binary_path }}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.setup_script }}"
          if "${{ steps.install.outputs.binary_path }}" --version >/dev/null 2>&1 && \
             "${{ steps.install.outputs.binary_path }}" --help >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT_VERSION="${CP2K_VERSION}"
          LATEST_VERSION="${{ steps.version.outputs.latest }}"
          NEXT_INSTALLED="not_installed"
          DECISION=""
          REGRESSION_RESULT=""
          COMPARISON=""
          STATUS="failed"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LATEST_VERSION}" ] || [ "${LATEST_VERSION}" = "${CURRENT_VERSION}" ]; then
            NEXT_INSTALLED="not_applicable"
            DECISION="no_newer_stable_available"
            REGRESSION_RESULT="No newer stable release available for Test 6"
            COMPARISON="Current pinned CP2K version ${CURRENT_VERSION} already matches the newest public stable CP2K release available in the tested source lane. Tests 1-5 validate the real Arm64 source-build path, but there is no newer stable upstream candidate for a genuine Test 6 upgrade check."
            STATUS="skipped"
          else
            NEXT_ROOT="${RUNNER_TEMP}/cp2k-${LATEST_VERSION}-next"
            rm -rf "$NEXT_ROOT"
            mkdir -p "$NEXT_ROOT"
            cd "$NEXT_ROOT"
            curl -fsSL \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              -o cp2k.tar.gz \
              "https://github.com/cp2k/cp2k/archive/refs/tags/v${LATEST_VERSION}.tar.gz"
            tar -xzf cp2k.tar.gz
            mv "cp2k-${LATEST_VERSION}" source

            ln -sf "${{ steps.install.outputs.build_root }}/tools/toolchain/install/arch/local.ssmp" "$NEXT_ROOT/source/arch/local.ssmp"
            source "${{ steps.install.outputs.setup_script }}"

            if make -j"$(nproc)" -C "$NEXT_ROOT/source" ARCH=local VERSION=ssmp >/tmp/cp2k-next-build.log 2>&1; then
              NEXT_BINARY="$NEXT_ROOT/source/exe/local/cp2k.ssmp"
              NEXT_INSTALLED="$("$NEXT_BINARY" --version 2>&1 | grep -Eo '[0-9]{4}\.[0-9]+' | head -1 || true)"

              if [ "$NEXT_INSTALLED" = "$LATEST_VERSION" ] && \
                 "$NEXT_BINARY" --help >/tmp/cp2k-next-help.log 2>&1; then
                DECISION="next_install_validated"
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                COMPARISON="Current pinned CP2K version ${CURRENT_VERSION} passed smoke tests in this run. Regression validation built candidate ${LATEST_VERSION} on Arm64, and cp2k reported version ${NEXT_INSTALLED}."
                STATUS="passed"
              else
                cat /tmp/cp2k-next-help.log || true
                DECISION="next_install_failed"
                REGRESSION_RESULT="Next version install failed on Arm64"
                COMPARISON="Current pinned CP2K version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} did not complete the cp2k validation path on Arm64."
                STATUS="failed"
              fi
            else
              cat /tmp/cp2k-next-build.log || true
              NEXT_INSTALLED="install_failed"
              DECISION="next_install_failed"
              REGRESSION_RESULT="Next version install failed on Arm64"
              COMPARISON="Current pinned CP2K version ${CURRENT_VERSION} passed smoke tests in this run, but the regression candidate ${LATEST_VERSION} could not be built on Arm64."
              STATUS="failed"
            fi
          fi

          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "regression_result=${REGRESSION_RESULT}" >> "$GITHUB_OUTPUT"
          echo "comparison=${COMPARISON}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" = "failed" ]; then
            exit 1
          fi

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Build) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for build validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version built on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          CORE_FAILED=0
          for status in \
            "${{ steps.test1.outputs.status || 'skipped' }}" \
            "${{ steps.test2.outputs.status || 'skipped' }}" \
            "${{ steps.test3.outputs.status || 'skipped' }}" \
            "${{ steps.test4.outputs.status || 'skipped' }}" \
            "${{ steps.test5.outputs.status || 'skipped' }}"; do
            if [ "$status" != "passed" ]; then
              CORE_FAILED=1
              break
            fi
          done
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## CP2K Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check cp2k binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check exact release version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check cp2k help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Verify binary is Arm64: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Build)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for build validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version built on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
