name: Test Seata on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-seata.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-seata.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-seata.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-seata.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-seata.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-seata.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-seata.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-seata.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-seata.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-seata.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-seata.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-seata.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-seata.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-seata.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-seata.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-seata.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-seata.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-seata.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-seata.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-seata.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-seata.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-seata.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-seata.outputs.timestamp }}
jobs:
  test-seata:
    runs-on: ubuntu-24.04-arm
    env:
      SEATA_VERSION: "2.2.0"
      SEATA_NEXT_VERSION: "2.3.0"
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Seata'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=seata" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/seata" >> "$GITHUB_OUTPUT"
          echo "current_version=${SEATA_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Seata
        id: install
        continue-on-error: true
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "default-jre wget curl tar"
          fetch_archive() {
            local output="$1"
            shift
            local url

            mkdir -p "$(dirname "$output")"

            for url in "$@"; do
              [ -n "$url" ] || continue
              rm -f "$output"
              if curl --fail --location --http1.1 --retry 4 --retry-all-errors --retry-delay 5 --connect-timeout 60 --max-time 600 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if curl --fail --location --http1.1 --ipv4 --retry 3 --retry-all-errors --retry-delay 5 --connect-timeout 60 --max-time 600 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if wget --tries=4 --waitretry=5 --retry-connrefused --timeout=60 -O "$output" "$url"; then
                return 0
              fi
            done

            return 1
          }
          download_seata() {
            local version="$1"
            local output="$2"
            local urls=()
            case "$version" in
              2.*)
                urls+=("https://archive.apache.org/dist/incubator/seata/${version}/apache-seata-${version}-incubating-bin.tar.gz")
                urls+=("http://archive.apache.org/dist/incubator/seata/${version}/apache-seata-${version}-incubating-bin.tar.gz")
                ;;
              *)
                urls+=("https://github.com/apache/incubator-seata/releases/download/v${version}/seata-server-${version}.tar.gz")
                ;;
            esac
            fetch_archive "$output" "${urls[@]}"
          }

          VERSION="${SEATA_VERSION}"

          rm -rf /opt/seata seata.tar.gz apache-seata-* seata
          if ! download_seata "$VERSION" seata.tar.gz; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=download_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! tar --warning=no-unknown-keyword -xzf seata.tar.gz; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=extract_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXTRACTED_SCRIPT=$(find . -type f -path '*/bin/seata-server.sh' | head -n 1)
          if [ -z "$EXTRACTED_SCRIPT" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=layout_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXTRACTED_DIR=$(dirname "$(dirname "$EXTRACTED_SCRIPT")")
          sudo mv "$EXTRACTED_DIR" /opt/seata
          sudo ln -sf /opt/seata/bin/seata-server.sh /usr/local/bin/seata-server

          if [ -f "/opt/seata/bin/seata-server.sh" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            echo "install_blocker=none" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            echo "install_blocker=layout_missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Resolve Seata install state
        id: install_state
        if: always()
        run: |
          set -euo pipefail
          STATUS="${{ steps.install.outputs.install_status || steps.install.conclusion || 'failed' }}"
          BLOCKER="${{ steps.install.outputs.install_blocker || '' }}"
          if [ -f "/opt/seata/bin/seata-server.sh" ] && [ -d "/opt/seata/conf" ]; then
            STATUS="success"
            BLOCKER="none"
          fi
          echo "SEATA_INSTALL_STATUS=$STATUS" >> "$GITHUB_ENV"
          echo "SEATA_INSTALL_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
          echo "install_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "install_blocker=$BLOCKER" >> "$GITHUB_OUTPUT"

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Seata version
        id: version
        if: always()
        run: |
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" = "success" ] && [ -f "/opt/seata/bin/seata-server.sh" ]; then
             VERSION="${SEATA_VERSION}"
          else
             VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Seata version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check Seata Script
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "/opt/seata/bin/seata-server.sh" ]; then
            echo "✓ Seata script found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Seata script not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check Java dependency
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if java -version 2>&1 | grep -q "version"; then
            echo "✓ Java installed"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Java not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Seata Config
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -d "/opt/seata/conf" ]; then
            echo "✓ Seata conf dir exists"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Seata conf dir missing"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check for lib directory and jar files
          if [ -d "/opt/seata/lib" ] && ls /opt/seata/lib/seata-server*.jar >/dev/null 2>&1; then
             echo "✓ Seata libs found"
             echo "status=passed" >> $GITHUB_OUTPUT
          elif [ -f "/opt/seata/bin/seata-server.sh" ]; then
             echo "✓ Seata script present (skipping execution to avoid blocking)"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Seata validation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          fetch_archive() {
            local output="$1"
            shift
            local url

            mkdir -p "$(dirname "$output")"

            for url in "$@"; do
              [ -n "$url" ] || continue
              rm -f "$output"
              if curl --fail --location --http1.1 --retry 4 --retry-all-errors --retry-delay 5 --connect-timeout 60 --max-time 600 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if curl --fail --location --http1.1 --ipv4 --retry 3 --retry-all-errors --retry-delay 5 --connect-timeout 60 --max-time 600 -o "$output" "$url"; then
                return 0
              fi
              rm -f "$output"
              if wget --tries=4 --waitretry=5 --retry-connrefused --timeout=60 -O "$output" "$url"; then
                return 0
              fi
            done

            return 1
          }
          download_seata() {
            local version="$1"
            local output="$2"
            local urls=()

            case "$version" in
              2.*)
                urls+=("https://archive.apache.org/dist/incubator/seata/${version}/apache-seata-${version}-incubating-bin.tar.gz")
                urls+=("http://archive.apache.org/dist/incubator/seata/${version}/apache-seata-${version}-incubating-bin.tar.gz")
                ;;
              *)
                urls+=("https://github.com/apache/incubator-seata/releases/download/v${version}/seata-server-${version}.tar.gz")
                ;;
            esac
            fetch_archive "$output" "${urls[@]}"
          }

          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          NEXT="${SEATA_NEXT_VERSION}"
          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)

          if [ "${{ steps.install_state.outputs.install_status || 'failed' }}" != "success" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation deferred because the baseline Seata install failed in this run" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Seata version $CURRENT could not complete baseline install in this run, so next-version regression validation was not attempted." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf /tmp/seata-next /tmp/seata-next.tar.gz
          mkdir -p /tmp/seata-next
          if ! download_seata "$NEXT" /tmp/seata-next.tar.gz; then
            END_TIME=$(date +%s)
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version download failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Seata version $CURRENT passed smoke tests in this run, but the regression candidate $NEXT could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! tar --warning=no-unknown-keyword -xzf /tmp/seata-next.tar.gz -C /tmp/seata-next; then
            END_TIME=$(date +%s)
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version archive extraction failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Seata version $CURRENT passed smoke tests in this run, but the regression candidate $NEXT archive could not be extracted on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_SCRIPT=$(find /tmp/seata-next -type f -path '*/bin/seata-server.sh' | head -n 1)
          NEXT_CONF=$(find /tmp/seata-next -type d -path '*/conf' | head -n 1)
          NEXT_LIB=$(find /tmp/seata-next -type d -path '*/lib' | head -n 1)
          END_TIME=$(date +%s)

          if [ -n "$NEXT_SCRIPT" ] && [ -n "$NEXT_CONF" ] && { [ -n "$NEXT_LIB" ] || [ -f "$NEXT_SCRIPT" ]; }; then
            echo "next_installed_version=$NEXT" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Seata version $CURRENT passed smoke tests in this run, and regression candidate $NEXT exposes the expected Seata runtime layout on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install layout failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Seata version $CURRENT passed smoke tests in this run, but the regression candidate $NEXT did not expose the expected Seata runtime layout on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_name: "Seata"
          version: ${{ steps.version.outputs.version }}
          install_status: ${{ steps.install_state.outputs.install_status || steps.install.outputs.install_status || 'success' }}
          test1_label: "Check Seata Script"
          test2_label: "Check Java dependency"
          test3_label: "Check Seata Config"
          test4_label: "Test 4 - Architecture Verification"
          test5_label: "Test 5 - Functional Validation"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Finalize workflow status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
