name: Test Squid on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-squid.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-squid.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-squid.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-squid.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-squid.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-squid.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-squid.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-squid.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-squid.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-squid.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-squid.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-squid.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-squid.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-squid.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-squid.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-squid.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-squid.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-squid.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-squid.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-squid.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-squid.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-squid.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-squid.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/squid.md"
      - ".github/workflows/test-squid.yml"

jobs:
  test-squid:
    runs-on: ubuntu-24.04-arm
    env:
      SQUID_VERSION: "6.13"
      SQUID_NEXT_VERSION: "6.14"
      SQUID_NEXT_TAG: "SQUID_6_14"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Squid'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=squid" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/squid" >> "$GITHUB_OUTPUT"
          echo "current_version=${SQUID_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Squid baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y squid curl file

          INSTALLED_VERSION=$(squid --version 2>&1 | sed -n 's/^Squid Cache: Version //p' | head -1)
          if [ "$INSTALLED_VERSION" = "$SQUID_VERSION" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Expected Squid version $SQUID_VERSION but found ${INSTALLED_VERSION:-unknown}" >&2
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Squid version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(squid --version 2>&1 | sed -n 's/^Squid Cache: Version //p' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${SQUID_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${SQUID_NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected Squid version: $VERSION"
          echo "Detected next stable Squid release: ${SQUID_NEXT_VERSION} (${SQUID_NEXT_TAG})"

      - name: Test 1 - Check squid binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v squid >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(squid --version 2>&1 || true)
          echo "$VERSION_OUTPUT"
          if echo "$VERSION_OUTPUT" | grep -Fq "Squid Cache: Version $SQUID_VERSION"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check system configuration parse
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if squid -k parse >/tmp/squid-parse.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/squid-parse.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check custom configuration parse
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          mkdir -p "$TMPDIR/cache" "$TMPDIR/logs"
          cat > "$TMPDIR/squid.conf" <<EOF
          visible_hostname squid-smoke
          pid_filename $TMPDIR/squid.pid
          coredump_dir $TMPDIR
          cache_log stdio:$TMPDIR/logs/cache.log
          access_log stdio:$TMPDIR/logs/access.log
          cache_store_log stdio:$TMPDIR/logs/store.log
          cache_dir ufs $TMPDIR/cache 16 16 256
          http_port 3129
          acl all src all
          http_access allow all
          EOF
          if squid -k parse -f "$TMPDIR/squid.conf" >/tmp/squid-custom-parse.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/squid-custom-parse.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          LATEST_TAG="${{ steps.version.outputs.latest_tag || '' }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST_TAG" ] || [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Squid version $CURRENT passed smoke tests in this run, but the latest stable upstream release could not be resolved for Arm64 regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          NEXT_ARCHIVE="$TMPDIR/squid-${LATEST}.tar.gz"
          NEXT_ROOT="$TMPDIR/squid-${LATEST_TAG}"
          NEXT_PREFIX="$TMPDIR/install"
          NEXT_CONF_DIR="$TMPDIR/runtime"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            perl \
            libcppunit-dev \
            libexpat1-dev \
            libltdl-dev \
            libssl-dev \
            libxml2-dev \
            libpcre3-dev \
            zlib1g-dev \
            file

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL \
            "https://codeload.github.com/squid-cache/squid/tar.gz/refs/tags/${LATEST_TAG}" \
            -o "$NEXT_ARCHIVE"
          tar -xzf "$NEXT_ARCHIVE" -C "$TMPDIR"
          cd "$NEXT_ROOT"
          ./bootstrap.sh >/tmp/squid-next-bootstrap.txt 2>&1
          ./configure --prefix="$NEXT_PREFIX" --disable-arch-native >/tmp/squid-next-configure.txt 2>&1
          make -j2 >/tmp/squid-next-make.txt 2>&1

          NEXT_BIN="$NEXT_ROOT/src/squid"
          NEXT_VERSION_RAW=$("$NEXT_BIN" -v 2>&1 | sed -n 's/^Squid Cache: Version //p' | head -1 || true)
          NEXT_VERSION=$(printf '%s\n' "$NEXT_VERSION_RAW" | sed 's/-VCS$//')
          mkdir -p "$NEXT_CONF_DIR/cache" "$NEXT_CONF_DIR/logs"
          cat > "$NEXT_CONF_DIR/squid.conf" <<EOF
          visible_hostname squid-next
          pid_filename $NEXT_CONF_DIR/squid.pid
          coredump_dir $NEXT_CONF_DIR
          cache_log stdio:$NEXT_CONF_DIR/logs/cache.log
          access_log stdio:$NEXT_CONF_DIR/logs/access.log
          cache_store_log stdio:$NEXT_CONF_DIR/logs/store.log
          cache_dir ufs $NEXT_CONF_DIR/cache 16 16 256
          http_port 3130
          acl all src all
          http_access allow all
          EOF

          if [ -x "$NEXT_BIN" ] && \
             [ "$NEXT_VERSION" = "$LATEST" ] && \
             "$NEXT_BIN" -k parse -f "$NEXT_CONF_DIR/squid.conf" >/tmp/squid-next-parse.txt 2>&1 && \
             file "$NEXT_BIN" | grep -Eqi 'aarch64|arm64|ARM aarch64'; then
            echo "next_installed_version=${NEXT_VERSION_RAW}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Squid version $CURRENT passed smoke tests in this run. Regression validation rebuilt candidate release $LATEST from upstream source tag $LATEST_TAG on Arm64, and the resulting binary reported version $NEXT_VERSION while passing custom configuration parsing." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/squid-next-bootstrap.txt || true
            cat /tmp/squid-next-configure.txt || true
            cat /tmp/squid-next-make.txt || true
            cat /tmp/squid-next-parse.txt || true
            file "$NEXT_BIN" || true
            echo "next_installed_version=${NEXT_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Squid version $CURRENT passed smoke tests in this run, but candidate release $LATEST did not complete a clean Arm64 source-build and configuration-parse validation path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Squid Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
