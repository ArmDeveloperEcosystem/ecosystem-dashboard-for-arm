name: Test PSMC (Pairwise Sequentially Markovian Coalescent) on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-psmc.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-psmc.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-psmc.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-psmc.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-psmc.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-psmc.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-psmc.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-psmc.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-psmc.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-psmc.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-psmc.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-psmc.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-psmc.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-psmc.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-psmc.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-psmc.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-psmc.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-psmc.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-psmc.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-psmc.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-psmc.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-psmc.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-psmc.outputs.timestamp }}
jobs:
  test-psmc:
    runs-on: ubuntu-24.04-arm
    env:
      PSMC_VERSION: "0.6.5"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'PSMC (Pairwise Sequentially Markovian Coalescent)'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=psmc" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/psmc" >> "$GITHUB_OUTPUT"
          echo "current_version=${PSMC_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install PSMC
        id: install
        run: |
          set -euo pipefail
          VERSION="${PSMC_VERSION}"
          WORKDIR="/tmp/psmc-current"

          sudo apt-get update
          sudo apt-get install -y build-essential make curl ca-certificates

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          curl -fsSL "https://github.com/lh3/psmc/archive/refs/tags/${VERSION}.tar.gz" -o "$WORKDIR/psmc.tar.gz"
          tar -xzf "$WORKDIR/psmc.tar.gz" -C "$WORKDIR"
          BASE_DIR=$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d -name "psmc-*" | head -n 1)

          make -C "$BASE_DIR" -j2 >/dev/null
          make -C "$BASE_DIR/utils" -j2 >/dev/null

          if [ ! -x "$BASE_DIR/psmc" ] || [ ! -x "$BASE_DIR/utils/fq2psmcfa" ] || [ ! -x "$BASE_DIR/utils/splitfa" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "base_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get PSMC version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          EMBEDDED=$(sed -n 's/^#define PSMC_VERSION "\(.*\)"/\1/p' "$BASE_DIR/cli.c" | head -n 1)
          LATEST="${PSMC_VERSION}"
          echo "version=${PSMC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "embedded_version=${EMBEDDED}" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Artifact Existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ -x "$BASE_DIR/psmc" ] && [ -x "$BASE_DIR/utils/fq2psmcfa" ] && [ -x "$BASE_DIR/utils/splitfa" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Metadata Check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EMBEDDED="${{ steps.version.outputs.embedded_version }}"
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          if printf '%s\n' "$EMBEDDED" | grep -q "^${EXPECTED}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Embedded version: $EMBEDDED"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          HELP_OUTPUT=$("$BASE_DIR/psmc" 2>&1 || true)
          if printf '%s\n' "$HELP_OUTPUT" | grep -Eqi "usage:|psmc"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$HELP_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          if [ "$(uname -m)" = "aarch64" ] && file "$BASE_DIR/psmc" | grep -qiE "ARM aarch64|aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m || true
            file "$BASE_DIR/psmc" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_DIR="${{ steps.install.outputs.base_dir }}"
          ROOT="/tmp/psmc-functional"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          python3 - <<'PY' > "$ROOT/sample.psmcfa"
          print('>chr1')
          print('T' * 400)
          PY
          "$BASE_DIR/utils/splitfa" "$ROOT/sample.psmcfa" > "$ROOT/split.psmcfa"
          "$BASE_DIR/psmc" -N2 -t1 -r1 -p '2+1' -o "$ROOT/out.psmc" "$ROOT/sample.psmcfa" >/tmp/psmc-functional.out 2>&1
          if grep -q '^>' "$ROOT/split.psmcfa" && grep -q '^CC' "$ROOT/out.psmc"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/psmc-functional.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=PSMC's public stable release line currently stops at ${CURRENT}. Baseline Arm64 smoke coverage exists, but there is no newer public stable release to use as a credible Test 6 upgrade candidate." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned PSMC version $CURRENT passed smoke tests in this run, but the latest stable release could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          ROOT="/tmp/psmc-regression"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          curl -fsSL "https://github.com/lh3/psmc/archive/refs/tags/${LATEST}.tar.gz" -o "$ROOT/psmc.tar.gz"
          tar -xzf "$ROOT/psmc.tar.gz" -C "$ROOT"
          NEXT_DIR=$(find "$ROOT" -mindepth 1 -maxdepth 1 -type d -name "psmc-*" | head -n 1)
          make -C "$NEXT_DIR" -j2 >/dev/null
          make -C "$NEXT_DIR/utils" -j2 >/dev/null

          EMBEDDED=$(sed -n 's/^#define PSMC_VERSION "\(.*\)"/\1/p' "$NEXT_DIR/cli.c" | head -n 1)
          NEXT_CANONICAL=$(printf '%s\n' "$EMBEDDED" | sed 's/-.*//')

          python3 - <<'PY' > "$ROOT/sample.psmcfa"
          print('>chr1')
          print('T' * 400)
          PY
          "$NEXT_DIR/utils/splitfa" "$ROOT/sample.psmcfa" > "$ROOT/split.psmcfa"
          "$NEXT_DIR/psmc" -N2 -t1 -r1 -p '2+1' -o "$ROOT/out.psmc" "$ROOT/sample.psmcfa" >/tmp/psmc-regression.out 2>&1

          if [ -x "$NEXT_DIR/psmc" ] && [ "$NEXT_CANONICAL" = "$LATEST" ] && grep -q '^>' "$ROOT/split.psmcfa" && grep -q '^CC' "$ROOT/out.psmc"; then
            echo "next_installed_version=$NEXT_CANONICAL" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned PSMC version $CURRENT passed smoke tests in this run. Regression validation rebuilt candidate version $LATEST on Arm64 and completed a real splitfa plus psmc inference smoke path. The embedded source metadata reported $EMBEDDED." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_CANONICAL"
          else
            cat /tmp/psmc-regression.out || true
            echo "next_installed_version=${NEXT_CANONICAL:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned PSMC version $CURRENT passed smoke tests in this run, but the candidate release $LATEST did not complete a usable Arm64 rebuild plus splitfa/psmc smoke path." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_CANONICAL:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

