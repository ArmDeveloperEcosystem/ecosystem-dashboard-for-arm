#
# This is a TEMPLATE file - it will not run automatically.
# To use it:
# 1. Copy this file to test-<your-package>.yml
# 2. Replace all Enigma.js placeholders with your package name (e.g., "Redis")
# 3. Replace all enigmajs placeholders with your package slug (lowercase, e.g., "redis")
# 4. Update the install commands for your package
# 5. Update the version detection command
# 6. Add/modify/remove test steps as needed
# 7. Update package metadata in the JSON generation step
# 8. Uncomment the 'push:' trigger section below (remove the workflow_dispatch if desired)
#
# See test-nginx.yml and test-envoy.yml for real examples.

name: Test Enigma.js on Arm64

# This is a TEMPLATE - it has no triggers and will not run.
# When you copy this file, uncomment the appropriate triggers below:
on:
  # workflow_dispatch:  # Uncomment for manual testing
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-enigmajs.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-enigmajs.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-enigmajs.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-enigmajs.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-enigmajs.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-enigmajs.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-enigmajs.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-enigmajs.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-enigmajs.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-enigmajs.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-enigmajs.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-enigmajs.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-enigmajs.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-enigmajs.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-enigmajs.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-enigmajs.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-enigmajs.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-enigmajs.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-enigmajs.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-enigmajs.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-enigmajs.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-enigmajs.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-enigmajs.outputs.timestamp }}
jobs:
  test-enigmajs:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Enigma.js'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=enigmaJS" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/enigmaJS" >> "$GITHUB_OUTPUT"
      - name: Install Enigma.js
        id: install
        run: |
          set -euo pipefail
          echo "Installing pinned Enigma.js baseline..."
          
          # Initialize a new npm project
          npm init -y >/dev/null 2>&1
          
          # Install enigma.js and ws (WebSocket dependency)
          if npm install --no-audit --no-fund enigma.js@1.0.0 ws@8; then
             echo "Enigma.js installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Enigma.js installation failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Enigma.js version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('enigma.js/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Enigma.js version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check node_modules existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -d "node_modules/enigma.js" ]; then
            echo "✓ node_modules/enigma.js found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ node_modules/enigma.js not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check package.json dependency
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if grep -q "enigma.js" package.json; then
            echo "✓ enigma.js found in package.json"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ enigma.js not found in package.json"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check ws dependency
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if [ -d "node_modules/ws" ]; then
            echo "✓ node_modules/ws found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ node_modules/ws not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 4 - Require enigma.js in Node script
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          # Create a simple script to require the library
          cat > test_enigma.js << EOF
          try {
            const enigma = require('enigma.js');
            console.log('Successfully required enigma.js');
            process.exit(0);
          } catch (e) {
            console.error(e);
            process.exit(1);
          }
          EOF
          
          if node test_enigma.js; then
             echo "✓ enigma.js require test passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ enigma.js require test failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 5 - Check Schema instantiation (basic usage)
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          node > /tmp/enigma-runtime.log <<'NODE'
          const enigma = require('enigma.js');
          const session = enigma.create({
            schema: { structs: { Global: { name: 'Global', functions: [], properties: [] } } },
            url: 'ws://127.0.0.1:65535/app/engineData',
            createSocket: () => ({ on() {}, send() {}, close() {} }),
          });
          if (!session || typeof session.open !== 'function' || typeof session.close !== 'function') {
            process.exit(1);
          }
          console.log('enigma-runtime-ok');
          NODE
          if grep -qx 'enigma-runtime-ok' /tmp/enigma-runtime.log; then
             echo "✓ enigma.js basic usage test passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             cat /tmp/enigma-runtime.log || true
             echo "✗ enigma.js basic usage test failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          npm view enigma.js versions --json > /tmp/enigma-versions.json
          NEXT=$(CURRENT="$CURRENT" node <<'NODE'
          const fs = require('fs');
          const current = process.env.CURRENT.replace(/^v/, '');
          const versions = JSON.parse(fs.readFileSync('/tmp/enigma-versions.json', 'utf8'))
            .filter((v) => /^\d+\.\d+\.\d+$/.test(v))
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          process.stdout.write(versions.find((v) => v.localeCompare(current, undefined, { numeric: true }) > 0) || '');
          NODE
          )

          if [ -z "$NEXT" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Enigma.js version is available from npm" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Enigma.js $CURRENT passed runtime smoke tests; npm did not report a newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          NEXT_DIR=$(mktemp -d)
          cd "$NEXT_DIR"
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund "enigma.js@${NEXT}" ws@8
          INSTALLED=$(node -p "require('enigma.js/package.json').version")
          node <<'NODE' > /tmp/enigma-next-runtime.log
          const enigma = require('enigma.js');
          const session = enigma.create({
            schema: { structs: { Global: { name: 'Global', functions: [], properties: [] } } },
            url: 'ws://127.0.0.1:65535/app/engineData',
            createSocket: () => ({ on() {}, send() {}, close() {} }),
          });
          if (!session || typeof session.open !== 'function') process.exit(1);
          console.log('enigma-next-ok');
          NODE
          if [ "$INSTALLED" = "$NEXT" ] && grep -qx 'enigma-next-ok' /tmp/enigma-next-runtime.log; then
            echo "next_installed_version=$INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Enigma.js $CURRENT passed runtime smoke tests. Test 6 installed candidate $INSTALLED from npm and constructed an Enigma session on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/enigma-next-runtime.log || true
            echo "next_installed_version=${INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Enigma.js $CURRENT passed, but candidate $NEXT did not complete the same runtime smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check node_modules existence
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check package.json dependency
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check ws dependency
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Require enigma.js in Node script
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Check Schema instantiation (basic usage)
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Enigma.js Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check enigmajs binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check enigmajs version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check enigmajs help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
