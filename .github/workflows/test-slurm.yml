name: Test Slurm on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/slurm.md"
      - ".github/workflows/test-slurm.yml"

jobs:
  test-slurm:
    runs-on: ubuntu-24.04-arm
    env:
      SLURM_VERSION: "25.05.7"
      SLURM_WORKDIR: "/tmp/slurm-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=slurm" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/slurm" >> "$GITHUB_OUTPUT"

      - name: Install Slurm baseline from official source
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libjson-c-dev \
            libmunge-dev \
            libpam0g-dev \
            libssl-dev \
            libyaml-dev \
            pkg-config

          rm -rf "${SLURM_WORKDIR}"
          mkdir -p "${SLURM_WORKDIR}"
          curl -fsSL -o "${SLURM_WORKDIR}/slurm-${SLURM_VERSION}.tar.bz2" \
            "https://download.schedmd.com/slurm/slurm-${SLURM_VERSION}.tar.bz2"
          tar -xjf "${SLURM_WORKDIR}/slurm-${SLURM_VERSION}.tar.bz2" -C "${SLURM_WORKDIR}"

          BASE_DIR="${SLURM_WORKDIR}/slurm-${SLURM_VERSION}"
          cd "${BASE_DIR}"
          ./configure \
            --prefix="${SLURM_WORKDIR}/install-${SLURM_VERSION}" \
            --sysconfdir="${SLURM_WORKDIR}/install-${SLURM_VERSION}/etc" \
            >/tmp/slurm-configure-baseline.log 2>&1
          make -j2 >/tmp/slurm-make-baseline.log 2>&1

          BASE_BIN="${BASE_DIR}/src/srun/.libs/srun"
          BASE_LIB_DIR="$(dirname "$(find "${BASE_DIR}" -type f \( -name 'libslurmfull.so' -o -name 'libslurmfull.so.*' \) | head -1)")"
          test -x "${BASE_BIN}"
          test -n "${BASE_LIB_DIR}"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_bin=${BASE_BIN}" >> "$GITHUB_OUTPUT"
          echo "base_lib_dir=${BASE_LIB_DIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Slurm versions
        id: version
        run: |
          set -euo pipefail
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          export LD_LIBRARY_PATH="${{ steps.install.outputs.base_lib_dir }}:${LD_LIBRARY_PATH:-}"
          VERSION="$("${BASE_BIN}" --version 2>&1 | sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | head -1)"
          LATEST="$(
            python3 - <<'PY'
          import re
          import urllib.request

          html = urllib.request.urlopen(
              "https://download.schedmd.com/slurm/",
              timeout=20,
          ).read().decode("utf-8", "ignore")
          matches = re.findall(r"slurm-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.bz2", html)
          latest = max(matches, key=lambda value: tuple(map(int, value.split("."))))
          print(latest)
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Slurm version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check srun binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ -x "${BASE_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          export LD_LIBRARY_PATH="${{ steps.install.outputs.base_lib_dir }}:${LD_LIBRARY_PATH:-}"
          VERSION="$("${BASE_BIN}" --version 2>&1 | sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | head -1)"

          if [ "${VERSION}" = "${SLURM_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_BIN}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          export LD_LIBRARY_PATH="${{ steps.install.outputs.base_lib_dir }}:${LD_LIBRARY_PATH:-}"

          if "${BASE_BIN}" --help >/tmp/slurm-help.txt 2>&1 && grep -Eqi "usage|srun|options" /tmp/slurm-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/slurm-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_BIN}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file "${BASE_BIN}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          export LD_LIBRARY_PATH="${{ steps.install.outputs.base_lib_dir }}:${LD_LIBRARY_PATH:-}"

          timeout 10s "${BASE_BIN}" -n1 /bin/true >/tmp/slurm-functional.txt 2>&1 || true
          if grep -Eqi "Unable to establish configuration source|resolve_ctls_from_dns_srv|fetch_config|configuration source|Could not establish a configuration source" /tmp/slurm-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/slurm-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/slurm-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the latest stable source tarball could not be resolved from the official SchedMD archive for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the latest stable source tarball could not be resolved from the official SchedMD archive for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fsSL -o "${REGRESSION_WORKDIR}/slurm-${LATEST}.tar.bz2" \
            "https://download.schedmd.com/slurm/slurm-${LATEST}.tar.bz2"
          tar -xjf "${REGRESSION_WORKDIR}/slurm-${LATEST}.tar.bz2" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/slurm-${LATEST}"
          cd "${NEXT_DIR}"
          ./configure \
            --prefix="${REGRESSION_WORKDIR}/install-${LATEST}" \
            --sysconfdir="${REGRESSION_WORKDIR}/install-${LATEST}/etc" \
            >/tmp/slurm-configure-next.log 2>&1
          make -j2 >/tmp/slurm-make-next.log 2>&1

          NEXT_BIN="${NEXT_DIR}/src/srun/.libs/srun"
          NEXT_LIB_DIR="$(dirname "$(find "${NEXT_DIR}" -type f \( -name 'libslurmfull.so' -o -name 'libslurmfull.so.*' \) | head -1)")"
          if [ ! -x "${NEXT_BIN}" ] || [ -z "${NEXT_LIB_DIR}" ] || ! file "${NEXT_BIN}" | grep -qi "ARM aarch64"; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate build from the official SchedMD source tarball did not produce a working Arm64 srun binary." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate build from the official SchedMD source tarball did not produce a working Arm64 srun binary."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          export LD_LIBRARY_PATH="${NEXT_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          NEXT_VERSION="$("${NEXT_BIN}" --version 2>&1 | sed -nE 's/.*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | head -1)"
          if [ -z "${NEXT_VERSION}" ]; then
            NEXT_VERSION="${LATEST}"
          fi
          if ! "${NEXT_BIN}" --help >/tmp/slurm-next-help.txt 2>&1 || ! grep -Eqi "usage|srun|options" /tmp/slurm-next-help.txt; then
            cat /tmp/slurm-next-help.txt || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate Arm64 srun binary failed the help-output smoke." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate Arm64 srun binary failed the help-output smoke."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          timeout 10s "${NEXT_BIN}" -n1 /bin/true >/tmp/slurm-next-functional.txt 2>&1 || true
          if ! grep -Eqi "Unable to establish configuration source|resolve_ctls_from_dns_srv|fetch_config|configuration source|Could not establish a configuration source" /tmp/slurm-next-functional.txt; then
            cat /tmp/slurm-next-functional.txt || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate Arm64 srun binary failed the bounded runtime smoke." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Slurm version ${CURRENT} passed smoke tests in this run, but the candidate Arm64 srun binary failed the bounded runtime smoke."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Slurm version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt and executed the candidate official Slurm source ${LATEST} successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "${JOB_URL}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          cat > test-results/slurm.json <<EOF_JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Slurm",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check srun binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check exact version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF_JSON

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          {
            echo "## Slurm Test Results"
            echo ""
            echo "- Pinned version: \`${{ steps.version.outputs.version }}\`"
            echo "- Latest upstream: \`${{ steps.version.outputs.latest }}\`"
            echo "- Overall status: \`${{ steps.summary.outputs.overall_status || 'failure' }}\`"
            echo ""
            echo "| Test | Status | Duration (s) |"
            echo "| --- | --- | ---: |"
            echo "| Test 1 - Check srun binary exists | ${{ steps.test1.outputs.status || 'skipped' }} | ${{ steps.test1.outputs.duration || 0 }} |"
            echo "| Test 2 - Check exact version output | ${{ steps.test2.outputs.status || 'skipped' }} | ${{ steps.test2.outputs.duration || 0 }} |"
            echo "| Test 3 - Check help output | ${{ steps.test3.outputs.status || 'skipped' }} | ${{ steps.test3.outputs.duration || 0 }} |"
            echo "| Test 4 - Architecture verification | ${{ steps.test4.outputs.status || 'skipped' }} | ${{ steps.test4.outputs.duration || 0 }} |"
            echo "| Test 5 - Functional validation | ${{ steps.test5.outputs.status || 'skipped' }} | ${{ steps.test5.outputs.duration || 0 }} |"
            echo "| Test 6 - Regression Validation | ${{ steps.test6.outputs.status || 'skipped' }} | ${{ steps.test6.outputs.duration || 0 }} |"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- Current pinned version: \`${{ steps.test6.outputs.current_version || steps.version.outputs.version }}\`"
            echo "- Next version targeted for install validation: \`${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}\`"
            echo "- Next version installed on Arm64: \`${{ steps.test6.outputs.next_installed_version || 'not_installed' }}\`"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "- Comparison: ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slurm-test-results
          path: test-results/slurm.json
          retention-days: 90
