name: Test Jetty on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-jetty.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-jetty.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-jetty.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-jetty.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-jetty.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-jetty.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-jetty.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-jetty.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-jetty.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-jetty.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-jetty.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-jetty.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-jetty.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-jetty.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-jetty.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-jetty.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-jetty.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-jetty.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-jetty.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-jetty.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-jetty.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-jetty.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-jetty.outputs.timestamp }}
jobs:
  test-jetty:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Jetty'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=jetty" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/jetty" >> "$GITHUB_OUTPUT"
      - name: Install Jetty
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jetty9 curl openjdk-17-jre-headless
          if [ -f /usr/share/jetty9/start.jar ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Jetty version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(java -jar /usr/share/jetty9/start.jar --version 2>&1 | awk '/jetty9-/{print $1; exit}' | sed 's/jetty9-//')
          if [ -z "$VERSION" ]; then
            VERSION=$(dpkg-query -W -f='${Version}' jetty9 | cut -d- -f1)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f /usr/share/jetty9/start.jar ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(java -jar /usr/share/jetty9/start.jar --version 2>&1 || true)
          PACKAGE_VERSION=$(dpkg-query -W -f='${Version}' jetty9 2>/dev/null | cut -d- -f1 || true)
          REPORTED=$(printf '%s\n' "$OUTPUT" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/jetty-version.log
          if { [ -n "$REPORTED" ] && { [ "$REPORTED" = "${{ steps.version.outputs.version }}" ] || [ "$REPORTED" = "$PACKAGE_VERSION" ]; }; } \
            || { [ -n "$PACKAGE_VERSION" ] && printf '%s\n' "$OUTPUT" | grep -Eqi 'jetty|jetty9-|start\.jar'; } \
            || { [ -n "$PACKAGE_VERSION" ] && [ -n "$OUTPUT" ]; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/jetty-version.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(java -jar /usr/share/jetty9/start.jar --help 2>&1 || true)
          printf '%s\n' "$OUTPUT" > /tmp/jetty-help.log
          if printf '%s\n' "$OUTPUT" | grep -Eqi 'Usage:|start\.jar|Jetty|--module'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/jetty-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          pushd /usr/share/jetty9 >/dev/null
          nohup java -jar start.jar jetty.http.port=18080 >/tmp/jetty18080.log 2>&1 &
          JETTY_PID=$!
          READY=0
          for _ in $(seq 1 30); do
            if curl -sS http://127.0.0.1:18080/ >/tmp/jetty18080-body.txt 2>/dev/null; then
              READY=1
              break
            fi
            sleep 2
          done
          if kill -0 "$JETTY_PID" 2>/dev/null; then
            kill "$JETTY_PID"
            wait "$JETTY_PID" || true
          fi
          popd >/dev/null
          if [ "$READY" -eq 1 ] && { grep -Eq 'Jetty|404|Error' /tmp/jetty18080-body.txt || grep -Eq 'Started oejs|Started ServerConnector|Started @' /tmp/jetty18080.log; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/jetty18080.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          }
          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Jetty Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
            echo ""
            echo "### Test Results"
            echo "- Test 1 - Check Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "- Test 2 - Check Version Output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "- Test 3 - Check Help Output or Configuration: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "- Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "- Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
