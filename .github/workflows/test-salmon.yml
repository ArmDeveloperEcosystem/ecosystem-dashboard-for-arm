name: Test Salmon on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/salmon.md"
      - ".github/workflows/test-salmon.yml"

jobs:
  test-salmon:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.11.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=salmon" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/salmon" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Salmon baseline from official source tag
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config git curl ca-certificates file \
            zlib1g-dev libbz2-dev liblzma-dev libcurl4-openssl-dev libtbb-dev libjemalloc-dev \
            autoconf automake libtool python3 python3-pip

          if ! cmake --version | awk 'NR==1 {split($3,v,"."); exit !((v[1] > 3) || (v[1] == 3 && v[2] >= 24))}'; then
            python3 -m pip install --user "cmake>=3.24,<4"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi

          ROOT=$(mktemp -d)
          SRC_DIR="$ROOT/salmon-src"
          BUILD_DIR="$ROOT/build"
          INSTALL_DIR="$ROOT/install"

          git clone --depth 1 --branch "v${BASELINE_VERSION}" https://github.com/COMBINE-lab/salmon "$SRC_DIR"
          cd "$SRC_DIR"
          git submodule update --init --recursive

          cmake -S "$SRC_DIR" -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$BUILD_DIR" --target salmon -j2
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_DIR"

          SALMON_BIN="$INSTALL_DIR/bin/salmon"
          if [ ! -x "$SALMON_BIN" ]; then
            SALMON_BIN=$(find "$BUILD_DIR" -type f -name salmon | head -n1)
          fi

          if [ -z "${SALMON_BIN:-}" ] || [ ! -x "$SALMON_BIN" ]; then
            echo "Failed to locate usable Salmon binary after source build" >&2
            exit 1
          fi

          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "salmon_bin=$SALMON_BIN" >> "$GITHUB_OUTPUT"

      - name: Get Salmon versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="$("${{ steps.install.outputs.salmon_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          LATEST="$(
            python3 - <<'PY'
          import json, urllib.request
          req = urllib.request.Request(
              "https://api.github.com/repos/COMBINE-lab/salmon/releases/latest",
              headers={"Accept": "application/vnd.github+json", "User-Agent": "codex"},
          )
          data = json.load(urllib.request.urlopen(req, timeout=20))
          print((data.get("tag_name") or "").lstrip("v"))
          PY
          )"
          echo "version=${CURRENT:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: ${CURRENT:-$BASELINE_VERSION}"
          echo "Detected latest version: ${LATEST:-$BASELINE_VERSION}"

      - name: Test 1 - Check salmon binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.salmon_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPORTED="$("${{ steps.install.outputs.salmon_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          if [ "$REPORTED" = "$BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.salmon_bin }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.salmon_bin }}" --help 2>&1 | grep -qiE 'Usage|Commands|Options'; then
            if "${{ steps.install.outputs.salmon_bin }}" quant --help 2>&1 | grep -qiE 'quant|--index|-i'; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if file "${{ steps.install.outputs.salmon_bin }}" | grep -q "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.salmon_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR"
          }
          trap cleanup EXIT

          cat > "$WORKDIR/transcripts.fa" <<'EOF'
          >tx1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          >tx2
          TTGGAATTCCGGAATTCCGGAATTCCGGAATTCCGGAATT
          EOF

          cat > "$WORKDIR/reads.fq" <<'EOF'
          @r1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          +
          IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII
          EOF

          "${{ steps.install.outputs.salmon_bin }}" index -t "$WORKDIR/transcripts.fa" -i "$WORKDIR/index" -k 15 >/dev/null 2>&1
          "${{ steps.install.outputs.salmon_bin }}" quant -i "$WORKDIR/index" -l A -r "$WORKDIR/reads.fq" -o "$WORKDIR/quant" --threads 1 --minAssignedFrags 1 >/dev/null 2>&1

          if [ -f "$WORKDIR/quant/quant.sf" ] && grep -q '^Name' "$WORKDIR/quant/quant.sf"; then
            echo "note=Source-built Salmon completed a real tiny transcriptome index plus single-end quantification smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from GitHub." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from GitHub."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=Current stable version already validated on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Salmon version ${CURRENT} passed smoke tests in this run and already matches the latest upstream stable release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Current stable version already validated on Arm64"
            echo "Details: Current pinned Salmon version ${CURRENT} passed smoke tests in this run and already matches the latest upstream stable release."
            echo "status=passed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_ROOT=$(mktemp -d)
          NEXT_SRC="$NEXT_ROOT/salmon-src"
          NEXT_BUILD="$NEXT_ROOT/build"
          NEXT_INSTALL="$NEXT_ROOT/install"
          git clone --depth 1 --branch "v${LATEST}" https://github.com/COMBINE-lab/salmon "$NEXT_SRC"
          cd "$NEXT_SRC"
          git submodule update --init --recursive
          cmake -S "$NEXT_SRC" -B "$NEXT_BUILD" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$NEXT_BUILD" --target salmon -j2
          cmake --install "$NEXT_BUILD" --prefix "$NEXT_INSTALL"
          NEXT_BIN="$NEXT_INSTALL/bin/salmon"

          if [ ! -x "$NEXT_BIN" ]; then
            NEXT_BIN=$(find "$NEXT_BUILD" -type f -name salmon | head -n1)
          fi

          if [ ! -x "$NEXT_BIN" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not produce a usable Arm64 Salmon binary from the official upstream source tag." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not produce a usable Arm64 Salmon binary from the official upstream source tag."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_ROOT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_REPORTED="$("$NEXT_BIN" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1 || true)"

          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR" "$NEXT_ROOT"
          }
          trap cleanup EXIT

          cat > "$WORKDIR/transcripts.fa" <<'EOF'
          >tx1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          >tx2
          TTGGAATTCCGGAATTCCGGAATTCCGGAATTCCGGAATT
          EOF

          cat > "$WORKDIR/reads.fq" <<'EOF'
          @r1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          +
          IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII
          EOF

          RESULT=0
          if ! file "$NEXT_BIN" | grep -q "ARM aarch64"; then
            RESULT=1
          fi

          if [ "$RESULT" -eq 0 ]; then
            "$NEXT_BIN" index -t "$WORKDIR/transcripts.fa" -i "$WORKDIR/index" -k 15 >/dev/null 2>&1 || RESULT=1
          fi

          if [ "$RESULT" -eq 0 ]; then
            "$NEXT_BIN" quant -i "$WORKDIR/index" -l A -r "$WORKDIR/reads.fq" -o "$WORKDIR/quant" --threads 1 --minAssignedFrags 1 >/dev/null 2>&1 || RESULT=1
          fi

          if [ "$RESULT" -eq 0 ] && [ "$NEXT_REPORTED" = "$LATEST" ] && [ -f "$WORKDIR/quant/quant.sf" ] && grep -q '^Name' "$WORKDIR/quant/quant.sf"; then
            echo "next_installed_version=$NEXT_REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Salmon version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate source tag ${LATEST} on Arm64, the candidate binary reported the expected version, and it completed the same tiny transcriptome index plus quantification smoke successfully on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Salmon version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate source tag ${LATEST} on Arm64, the candidate binary reported the expected version, and it completed the same tiny transcriptome index plus quantification smoke successfully on Arm64."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_REPORTED:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the Arm64 source-build plus tiny quantification smoke successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_REPORTED:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not complete the Arm64 source-build plus tiny quantification smoke successfully."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/salmon.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Salmon",
              "version": "${{ steps.version.outputs.version || 'unknown' }}",
              "language": "AI/ML",
              "category": "AI/ML"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Check salmon binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Check version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}, "note": "${{ steps.test5.outputs.note || '' }}" },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salmon-test-results
          path: test-results/salmon.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Salmon Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check salmon binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
