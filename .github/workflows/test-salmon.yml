name: Test Salmon on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-salmon.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-salmon.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-salmon.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-salmon.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-salmon.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-salmon.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-salmon.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-salmon.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-salmon.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-salmon.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-salmon.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-salmon.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-salmon.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-salmon.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-salmon.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-salmon.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-salmon.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-salmon.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy for this workflow
        value: ${{ jobs.test-salmon.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-salmon.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-salmon.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-salmon.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-salmon.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-salmon.outputs.timestamp }}
jobs:
  test-salmon:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "1.10.1"
      SALMON_NEXT_VERSION: "1.11.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Salmon'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=salmon" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/salmon" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Salmon baseline from official source tag
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config git curl ca-certificates file \
            zlib1g-dev libbz2-dev liblzma-dev libcurl4-openssl-dev libtbb-dev libjemalloc-dev \
            autoconf automake libtool python3 python3-pip libboost-all-dev

          if ! cmake --version | awk 'NR==1 {split($3,v,"."); exit !((v[1] > 3) || (v[1] == 3 && v[2] >= 24))}'; then
            python3 -m pip install --user "cmake>=3.24,<4"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi

          ROOT=$(mktemp -d)
          SRC_DIR="$ROOT/salmon-src"
          BUILD_DIR="$ROOT/build"
          INSTALL_DIR="$ROOT/install"

          git clone --depth 1 --branch "v${BASELINE_VERSION}" https://github.com/COMBINE-lab/salmon "$SRC_DIR"
          cd "$SRC_DIR"
          git submodule update --init --recursive
          if ! grep -q '^#include <cstdint>$' "$SRC_DIR/include/SalmonConfig.hpp"; then
            sed -i '1i#include <cstdint>' "$SRC_DIR/include/SalmonConfig.hpp"
          fi
          if ! grep -q '^#include <cstdint>$' "$SRC_DIR/include/SalmonExceptions.hpp"; then
            sed -i '1i#include <cstdint>' "$SRC_DIR/include/SalmonExceptions.hpp"
          fi

          cmake -S "$SRC_DIR" -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$BUILD_DIR" --target salmon -j2
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_DIR"

          SALMON_BIN="$INSTALL_DIR/bin/salmon"
          if [ ! -x "$SALMON_BIN" ]; then
            SALMON_BIN=$(find "$BUILD_DIR" -type f -name salmon | head -n1)
          fi

          if [ -z "${SALMON_BIN:-}" ] || [ ! -x "$SALMON_BIN" ]; then
            echo "Failed to locate usable Salmon binary after source build" >&2
            exit 1
          fi

          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
          echo "install_dir=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "salmon_bin=$SALMON_BIN" >> "$GITHUB_OUTPUT"

      - name: Get Salmon versions
        id: version
        run: |
          set -euo pipefail
          CURRENT="$("${{ steps.install.outputs.salmon_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          LATEST="${SALMON_NEXT_VERSION}"
          echo "version=${CURRENT:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST:-$BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: ${CURRENT:-$BASELINE_VERSION}"
          echo "Detected latest version: ${LATEST:-$BASELINE_VERSION}"

      - name: Test 1 - Check salmon binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.salmon_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          REPORTED="$("${{ steps.install.outputs.salmon_bin }}" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1)"
          if [ "$REPORTED" = "$BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.salmon_bin }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.salmon_bin }}" --help 2>&1 | grep -qiE 'Usage|Commands|Options'; then
            if "${{ steps.install.outputs.salmon_bin }}" quant --help 2>&1 | grep -qiE 'quant|--index|-i'; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if file "${{ steps.install.outputs.salmon_bin }}" | grep -q "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.salmon_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR"
          }
          trap cleanup EXIT

          cat > "$WORKDIR/transcripts.fa" <<'EOF'
          >tx1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          >tx2
          TTGGAATTCCGGAATTCCGGAATTCCGGAATTCCGGAATT
          EOF

          cat > "$WORKDIR/reads.fq" <<'EOF'
          @r1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          +
          IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII
          EOF

          "${{ steps.install.outputs.salmon_bin }}" index -t "$WORKDIR/transcripts.fa" -i "$WORKDIR/index" -k 15 >/dev/null 2>&1
          "${{ steps.install.outputs.salmon_bin }}" quant -i "$WORKDIR/index" -l A -r "$WORKDIR/reads.fq" -o "$WORKDIR/quant" --threads 1 --minAssignedFrags 1 >/dev/null 2>&1

          if [ -f "$WORKDIR/quant/quant.sf" ] && grep -q '^Name' "$WORKDIR/quant/quant.sf"; then
            echo "note=Source-built Salmon completed a real tiny transcriptome index plus single-end quantification smoke on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        if: always()
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.BASELINE_VERSION }}"
          LATEST="${{ steps.version.outputs.latest || env.SALMON_NEXT_VERSION }}"

          emit_result() {
            local status="$1"
            local decision="$2"
            local regression_result="$3"
            local comparison="$4"
            local next_installed="$5"
            echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=$next_installed" >> "$GITHUB_OUTPUT"
            echo "decision=$decision" >> "$GITHUB_OUTPUT"
            echo "regression_result=$regression_result" >> "$GITHUB_OUTPUT"
            echo "comparison=$comparison" >> "$GITHUB_OUTPUT"
            echo "status=$status" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $next_installed"
            echo "Regression install result: $regression_result"
            echo "Details: $comparison"
          }

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            emit_result "skipped" "baseline_failed" \
              "Regression validation skipped because one or more baseline tests (1-5) failed." \
              "Current pinned Salmon version ${CURRENT} did not complete baseline smoke validation in this run, so next-version regression install validation was skipped." \
              "not_installed"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$LATEST" ]; then
            emit_result "failed" "next_lookup_failed" \
              "Next version lookup failed on Arm64" \
              "Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from GitHub." \
              "lookup_failed"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            emit_result "failed" "metadata_review_required" \
              "Tests 1-5 baseline must be older than the latest stable release" \
              "Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." \
              "$CURRENT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_ROOT=$(mktemp -d)
          NEXT_SRC="$NEXT_ROOT/salmon-src"
          NEXT_BUILD="$NEXT_ROOT/build"
          NEXT_INSTALL="$NEXT_ROOT/install"
          NEXT_BIN=""
          NEXT_INSTALL_MODE="official_aarch64_asset"
          NEXT_ASSET_URL="https://github.com/COMBINE-lab/salmon/releases/download/v${LATEST}/salmon-linux-aarch64.tar.gz"
          NEXT_ASSET_TARBALL="${NEXT_ROOT}/salmon-next-aarch64.tar.gz"

          ASSET_OK=1
          if ! curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -o "${NEXT_ASSET_TARBALL}" "${NEXT_ASSET_URL}"; then
            ASSET_OK=0
          fi
          if [ "${ASSET_OK}" -eq 1 ] && ! tar -xzf "${NEXT_ASSET_TARBALL}" -C "${NEXT_ROOT}"; then
            ASSET_OK=0
          fi
          if [ "${ASSET_OK}" -eq 1 ]; then
            NEXT_BIN="$(find "${NEXT_ROOT}" -type f -name salmon -perm -111 | head -n1 || true)"
            if [ -z "${NEXT_BIN}" ] || [ ! -x "${NEXT_BIN}" ]; then
              ASSET_OK=0
            fi
          fi

          if [ "${ASSET_OK}" -ne 1 ]; then
            NEXT_INSTALL_MODE="source_build_fallback"
            BUILD_OK=1
            if ! git clone --depth 1 --branch "v${LATEST}" https://github.com/COMBINE-lab/salmon "$NEXT_SRC"; then
              BUILD_OK=0
            fi
            if [ "$BUILD_OK" -eq 1 ]; then
              cd "$NEXT_SRC"
              git submodule update --init --recursive || BUILD_OK=0
            fi
            if [ "$BUILD_OK" -eq 1 ]; then
              for header in "$NEXT_SRC/include/SalmonConfig.hpp" "$NEXT_SRC/include/SalmonExceptions.hpp"; do
                if [ -f "$header" ] && ! grep -q '^#include <cstdint>$' "$header"; then
                  sed -i '1i#include <cstdint>' "$header" || BUILD_OK=0
                fi
              done
            fi
            if [ "$BUILD_OK" -eq 1 ]; then
              cmake -S "$NEXT_SRC" -B "$NEXT_BUILD" -DCMAKE_BUILD_TYPE=Release || BUILD_OK=0
            fi
            if [ "$BUILD_OK" -eq 1 ]; then
              cmake --build "$NEXT_BUILD" --target salmon -j2 || BUILD_OK=0
            fi
            if [ "$BUILD_OK" -eq 1 ]; then
              cmake --install "$NEXT_BUILD" --prefix "$NEXT_INSTALL" || BUILD_OK=0
            fi
            NEXT_BIN="$NEXT_INSTALL/bin/salmon"
            if [ "$BUILD_OK" -eq 1 ] && [ ! -x "$NEXT_BIN" ]; then
              NEXT_BIN=$(find "$NEXT_BUILD" -type f -name salmon | head -n1 || true)
            fi
            if [ "$BUILD_OK" -ne 1 ] || [ -z "${NEXT_BIN:-}" ] || [ ! -x "$NEXT_BIN" ]; then
              rm -rf "$NEXT_ROOT"
              emit_result "failed" "next_install_failed" \
                "Next version install failed on Arm64" \
                "Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} failed both official Arm64 release-asset install and fallback source-build validation." \
                "install_failed"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          NEXT_REPORTED="$("$NEXT_BIN" --version 2>&1 | grep -Eo '[0-9]+([.][0-9]+)+' | head -n1 || true)"

          WORKDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$WORKDIR" "$NEXT_ROOT"
          }
          trap cleanup EXIT

          cat > "$WORKDIR/transcripts.fa" <<'EOF'
          >tx1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          >tx2
          TTGGAATTCCGGAATTCCGGAATTCCGGAATTCCGGAATT
          EOF

          cat > "$WORKDIR/reads.fq" <<'EOF'
          @r1
          ACGTACGTACGTACGTACGTACGTACGTACGTACGTACGT
          +
          IIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIII
          EOF

          RESULT=0
          if ! file "$NEXT_BIN" | grep -q "ARM aarch64"; then
            RESULT=1
          fi

          if [ "$RESULT" -eq 0 ]; then
            "$NEXT_BIN" index -t "$WORKDIR/transcripts.fa" -i "$WORKDIR/index" -k 15 >/dev/null 2>&1 || RESULT=1
          fi

          if [ "$RESULT" -eq 0 ]; then
            "$NEXT_BIN" quant -i "$WORKDIR/index" -l A -r "$WORKDIR/reads.fq" -o "$WORKDIR/quant" --threads 1 --minAssignedFrags 1 >/dev/null 2>&1 || RESULT=1
          fi

          if [ "$RESULT" -eq 0 ] && [ "$NEXT_REPORTED" = "$LATEST" ] && [ -f "$WORKDIR/quant/quant.sf" ] && grep -q '^Name' "$WORKDIR/quant/quant.sf"; then
            emit_result "passed" "next_install_validated" \
              "Next version installed successfully on Arm64" \
              "Current pinned Salmon version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate ${LATEST} via ${NEXT_INSTALL_MODE}, the candidate binary reported the expected version, and it completed the same tiny transcriptome index plus quantification smoke successfully on Arm64." \
              "$NEXT_REPORTED"
          else
            emit_result "failed" "next_install_failed" \
              "Next version install failed on Arm64" \
              "Current pinned Salmon version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} installed via ${NEXT_INSTALL_MODE} did not complete the Arm64 tiny quantification smoke successfully." \
              "${NEXT_REPORTED:-install_failed}"
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          exit 0

          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$TEST6_STATUS" = "failed" ]; then
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Salmon Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
