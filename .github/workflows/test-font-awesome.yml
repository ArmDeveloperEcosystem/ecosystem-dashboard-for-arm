name: Test Font Awesome on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-font-awesome.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-font-awesome.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-font-awesome.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-font-awesome.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-font-awesome.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-font-awesome.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-font-awesome.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-font-awesome.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-font-awesome.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-font-awesome.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-font-awesome.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-font-awesome.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-font-awesome.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-font-awesome.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-font-awesome.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-font-awesome.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-font-awesome.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-font-awesome.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-font-awesome.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-font-awesome.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-font-awesome.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-font-awesome.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-font-awesome.outputs.timestamp }}

jobs:
  test-font-awesome:
    runs-on: ubuntu-24.04-arm
    env:
      FONT_AWESOME_VERSION: "5.1.0"
      FONT_AWESOME_WORKDIR: /tmp/font-awesome-smoke

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Font Awesome'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=font-awesome" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/font-awesome" >> "$GITHUB_OUTPUT"

      - name: Install Font Awesome baseline
        id: install
        run: |
          set -euo pipefail
          rm -rf "$FONT_AWESOME_WORKDIR"
          mkdir -p "$FONT_AWESOME_WORKDIR"
          cd "$FONT_AWESOME_WORKDIR"
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund "@fortawesome/fontawesome-free@${FONT_AWESOME_VERSION}" fontkit@2
          echo "workdir=$FONT_AWESOME_WORKDIR" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Font Awesome version
        id: version
        run: |
          set -euo pipefail
          cd "${{ steps.install.outputs.workdir }}"
          VERSION=$(node -p "require('@fortawesome/fontawesome-free/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Package installed
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"
          if npm ls @fortawesome/fontawesome-free --depth=0 >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version is pinned
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"
          VERSION=$(node -p "require('@fortawesome/fontawesome-free/package.json').version")
          if [ "$VERSION" = "$FONT_AWESOME_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected $FONT_AWESOME_VERSION but got $VERSION"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - CSS and webfont assets exist
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BASE="${{ steps.install.outputs.workdir }}/node_modules/@fortawesome/fontawesome-free"
          CSS_FILE=$(find "$BASE/css" -name '*.css' | head -n 1 || true)
          FONT_FILE=$(find "$BASE/webfonts" -name 'fa-solid-*.ttf' | head -n 1 || true)
          if [ -n "$CSS_FILE" ] && [ -n "$FONT_FILE" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            find "$BASE" -maxdepth 3 -type f | sort | head -50 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && [ "$(node -p 'process.arch')" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            node -p 'process.arch'
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Parse webfont with font engine
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"
          CSS_FILE=$(find node_modules/@fortawesome/fontawesome-free/css -name '*.css' | head -n 1)
          FONT_FILE=$(find node_modules/@fortawesome/fontawesome-free/webfonts -name 'fa-solid-*.ttf' | head -n 1)
          export CSS_FILE FONT_FILE
          node <<'NODE' > /tmp/font-awesome-functional.log
          const fontkit = require('fontkit');
          const font = fontkit.openSync(process.env.FONT_FILE);
          const css = require('fs').readFileSync(process.env.CSS_FILE, 'utf8');
          if (!/Font Awesome/.test(font.fullName) || font.numGlyphs < 100 || !css.includes('.fa-')) {
            process.exit(1);
          }
          console.log('font-awesome-font-ok');
          NODE
          if grep -qx 'font-awesome-font-ok' /tmp/font-awesome-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/font-awesome-functional.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          npm view @fortawesome/fontawesome-free versions --json > /tmp/font-awesome-versions.json
          NEXT=$(CURRENT="$CURRENT" node <<'NODE'
          const fs = require('fs');
          const current = process.env.CURRENT;
          const versions = JSON.parse(fs.readFileSync('/tmp/font-awesome-versions.json', 'utf8'))
            .filter((v) => /^\d+\.\d+\.\d+$/.test(v))
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          process.stdout.write(versions.find((v) => v.localeCompare(current, undefined, { numeric: true }) > 0) || '');
          NODE
          )
          if [ -z "$NEXT" ]; then
            echo "latest_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
            echo "decision=current_is_latest_stable" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Font Awesome version is available from npm" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Font Awesome $CURRENT parsed successfully; npm did not report a newer stable candidate for Test 6." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "latest_version=$NEXT" >> "$GITHUB_OUTPUT"
          NEXT_DIR=$(mktemp -d)
          cd "$NEXT_DIR"
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund "@fortawesome/fontawesome-free@${NEXT}" fontkit@2
          INSTALLED=$(node -p "require('@fortawesome/fontawesome-free/package.json').version")
          FONT=$(find node_modules/@fortawesome/fontawesome-free/webfonts -name 'fa-solid-*.ttf' | head -n 1)
          FONT_PATH="$FONT" node <<'NODE' > /tmp/font-awesome-next-functional.log
          const fontkit = require('fontkit');
          const font = fontkit.openSync(process.env.FONT_PATH);
          if (!/Font Awesome/.test(font.fullName) || font.numGlyphs < 100) process.exit(1);
          console.log('font-awesome-next-ok');
          NODE
          if [ "$INSTALLED" = "$NEXT" ] && grep -qx 'font-awesome-next-ok' /tmp/font-awesome-next-functional.log; then
            echo "next_installed_version=$INSTALLED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Font Awesome $CURRENT parsed successfully. Test 6 installed candidate $INSTALLED and parsed the solid webfont on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/font-awesome-next-functional.log || true
            echo "next_installed_version=${INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline Font Awesome $CURRENT passed, but candidate $NEXT did not complete the same webfont parse on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          SKIPPED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            local core="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$status" = "skipped" ]; then
              SKIPPED=$((SKIPPED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$core" = "core" ]; then
                CORE_FAILED=$((CORE_FAILED + 1))
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}" core
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}" core
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}" core
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}" core
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}" core
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}" regression

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'skipped' }}" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Font Awesome Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status || 'failure' }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed || 0 }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed || 0 }}"
            echo "- **Tests Skipped:** ${{ steps.summary.outputs.skipped || 0 }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Package installed: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Version is pinned: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. CSS and webfont assets exist: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Parse webfont with font engine: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation"
            echo "- **Current:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Candidate:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Candidate installed:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
