name: Test Clang on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-clang.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-clang.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-clang.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-clang.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-clang.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-clang.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-clang.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-clang.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-clang.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-clang.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-clang.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-clang.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-clang.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-clang.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-clang.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-clang.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-clang.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-clang.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-clang.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-clang.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-clang.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-clang.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-clang.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/clang.md'
      - '.github/workflows/test-clang.yml'

jobs:
  test-clang:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Clang'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=clang" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/clang" >> "$GITHUB_OUTPUT"
      - name: Install Dependencies
        run: |
          sudo apt-get update
          if sudo apt-get install -y clang; then
             echo "Clang installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Failed to install Clang"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi
      
      - name: Get Clang version
        id: version
        run: |
          # Robustly extract version number by finding the field after "version"
          VERSION=$(clang --version | head -n 1 | awk '/version/ {for(i=1;i<=NF;i++) if($i=="version") print $(i+1)}' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Clang version: $VERSION"
      
      - name: Test 1 - Check Binary
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if which clang; then
            echo "✓ clang binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ clang binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if clang --version 2>&1 | grep -q "clang version"; then
             echo "✓ clang version output works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ clang version output failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          if clang --help > /dev/null 2>&1; then
             echo "✓ clang help output works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ clang help output failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Verify architecture
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          ARCH=$(uname -m)
          echo "Detected architecture: $ARCH"

          if [ "$ARCH" = "aarch64" ]; then
             echo "✓ Running on Arm64"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ Expected aarch64 runner"
             echo "status=failed" >> $GITHUB_OUTPUT
             END_TIME=$(date +%s)
             echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
             exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Compile and run C and C++ programs
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Functional Validation

          cat > hello.c << EOF
          #include <stdio.h>
          int main(void) {
              printf("Hello from Clang!\n");
              return 0;
          }
          EOF

          cat > hello.cpp << EOF
          #include <iostream>
          int main() {
              std::cout << "Hello C++" << std::endl;
              return 0;
          }
          EOF

          clang hello.c -o hello
          clang++ hello.cpp -o hello_cpp

          C_OUTPUT=$(./hello)
          CPP_OUTPUT=$(./hello_cpp)
          echo "$C_OUTPUT"
          echo "$CPP_OUTPUT"

          if echo "$C_OUTPUT" | grep -q "Hello from Clang!" && echo "$CPP_OUTPUT" | grep -q "Hello C++"; then
             echo "✓ clang compiled and ran C and C++ programs"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ clang functional validation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check Binary
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Verify architecture
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Compile and run C and C++ programs
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Clang Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify architecture: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Compile and run C and C++ programs: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
