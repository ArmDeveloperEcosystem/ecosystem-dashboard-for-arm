name: Test Samba on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-samba.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-samba.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-samba.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-samba.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-samba.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-samba.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-samba.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-samba.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-samba.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-samba.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-samba.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-samba.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-samba.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-samba.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-samba.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-samba.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-samba.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-samba.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-samba.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-samba.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-samba.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-samba.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-samba.outputs.timestamp }}
jobs:
  test-samba:
    runs-on: ubuntu-24.04-arm
    env:
      SAMBA_VERSION: "4.23.6"
      SAMBA_WORKDIR: "/tmp/samba-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Samba'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=samba" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/samba" >> "$GITHUB_OUTPUT"
      - name: Install Samba baseline from official stable source
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            curl \
            file \
            flex \
            bison \
            libacl1-dev \
            libarchive-dev \
            libattr1-dev \
            libblkid-dev \
            libbsd-dev \
            libcap-dev \
            libdbus-1-dev \
            libgnutls28-dev \
            libjansson-dev \
            libkrb5-dev \
            libldap2-dev \
            liblmdb-dev \
            libpam0g-dev \
            libparse-yapp-perl \
            libpopt-dev \
            libreadline-dev \
            libtirpc-dev \
            libtool \
            perl \
            pkg-config \
            python3 \
            zlib1g-dev

          rm -rf "${SAMBA_WORKDIR}"
          mkdir -p "${SAMBA_WORKDIR}"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 -o "${SAMBA_WORKDIR}/samba-${SAMBA_VERSION}.tar.gz" \
            "https://download.samba.org/pub/samba/stable/samba-${SAMBA_VERSION}.tar.gz"
          tar -xzf "${SAMBA_WORKDIR}/samba-${SAMBA_VERSION}.tar.gz" -C "${SAMBA_WORKDIR}"

          BASE_DIR="${SAMBA_WORKDIR}/samba-${SAMBA_VERSION}"
          cd "${BASE_DIR}"
          if ! ./configure --without-ad-dc >/tmp/samba-configure-baseline.log 2>&1; then
            cat /tmp/samba-configure-baseline.log || true
            exit 1
          fi
          if ! make -j2 bin/smbclient >/tmp/samba-make-baseline.log 2>&1; then
            cat /tmp/samba-make-baseline.log || true
            if ! make -j2 >/tmp/samba-make-baseline.log 2>&1; then
              cat /tmp/samba-make-baseline.log || true
              exit 1
            fi
          fi

          BASE_BIN="${BASE_DIR}/bin/smbclient"
          if [ ! -x "${BASE_BIN}" ] && [ -x "${BASE_DIR}/source3/bin/smbclient" ]; then
            BASE_BIN="${BASE_DIR}/source3/bin/smbclient"
          fi
          test -x "${BASE_BIN}"

          echo "base_dir=${BASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_bin=${BASE_BIN}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Samba versions
        id: version
        run: |
          set -euo pipefail
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | awk 'NR==1 {print $2}')
          LATEST="$(
            CURRENT_VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import urllib.request

          html = urllib.request.urlopen(
              "https://download.samba.org/pub/samba/stable/",
              timeout=20,
          ).read().decode("utf-8", "ignore")
          current = os.environ.get("CURRENT_VERSION", "")
          current_parts = tuple(map(int, current.split("."))) if re.fullmatch(r"\d+\.\d+\.\d+", current) else ()
          versions = sorted(
              {
                  tuple(map(int, match.split(".")))
                  for match in re.findall(r"samba-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz", html)
              }
          )
          next_versions = [version for version in versions if version > current_parts]
          print(".".join(map(str, next_versions[0])) if next_versions else "")
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Samba version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check smbclient binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if [ -x "${BASE_BIN}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          VERSION=$("${BASE_BIN}" --version 2>&1 | awk 'NR==1 {print $2}')

          if [ "${VERSION}" = "${SAMBA_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${BASE_BIN}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          if "${BASE_BIN}" --help >/tmp/samba-help.txt 2>&1 && grep -Eqi "usage|smbclient|options" /tmp/samba-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/samba-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          BASE_REAL_BIN="$(readlink -f "${BASE_BIN}" || echo "${BASE_BIN}")"

          if [ "$(uname -m)" = "aarch64" ] && file -L "${BASE_REAL_BIN}" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            file -L "${BASE_REAL_BIN}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"

          timeout 20s "${BASE_BIN}" -L localhost -N >/tmp/samba-functional.txt 2>&1 || true
          if grep -Eqi "NT_STATUS|Connection to localhost failed|Unable to connect|do_connect" /tmp/samba-functional.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/samba-functional.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/samba-regression"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Samba version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from the official Samba stable archive for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Samba version ${CURRENT} passed smoke tests in this run, but the latest stable release could not be resolved from the official Samba stable archive for Arm64 install validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 20 --max-time 900 -o "${REGRESSION_WORKDIR}/samba-${LATEST}.tar.gz" \
            "https://download.samba.org/pub/samba/stable/samba-${LATEST}.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/samba-${LATEST}.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_DIR="${REGRESSION_WORKDIR}/samba-${LATEST}"
          cd "${NEXT_DIR}"
          if ! ./configure --without-ad-dc >/tmp/samba-configure-next.log 2>&1; then
            cat /tmp/samba-configure-next.log || true
            exit 1
          fi
          if ! make -j2 bin/smbclient >/tmp/samba-make-next.log 2>&1; then
            cat /tmp/samba-make-next.log || true
            if ! make -j2 >/tmp/samba-make-next.log 2>&1; then
              cat /tmp/samba-make-next.log || true
              exit 1
            fi
          fi

          NEXT_BIN="${NEXT_DIR}/bin/smbclient"
          if [ ! -x "${NEXT_BIN}" ] && [ -x "${NEXT_DIR}/source3/bin/smbclient" ]; then
            NEXT_BIN="${NEXT_DIR}/source3/bin/smbclient"
          fi
          test -x "${NEXT_BIN}"
          NEXT_VERSION=$("${NEXT_BIN}" --version 2>&1 | awk 'NR==1 {print $2}' || true)

          timeout 20s "${NEXT_BIN}" -L localhost -N >/tmp/samba-next-functional.txt 2>&1 || true

          if [ "${NEXT_VERSION}" = "${LATEST}" ] && grep -Eqi "NT_STATUS|Connection to localhost failed|Unable to connect|do_connect" /tmp/samba-next-functional.txt; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${CURRENT}" = "${LATEST}" ]; then
              echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned Samba version ${CURRENT} passed smoke tests in this run and already matches the latest stable upstream release. Regression validation rebuilt the same release in an isolated Arm64 environment, the candidate binary reported version ${NEXT_VERSION}, and the bounded localhost client-connection smoke completed successfully."
              echo "status=skipped" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Samba version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the candidate binary reported version ${NEXT_VERSION}, and the bounded localhost client-connection smoke completed successfully." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Samba version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the candidate binary reported version ${NEXT_VERSION}, and the bounded localhost client-connection smoke completed successfully."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            echo "Next version installed on Arm64: ${NEXT_VERSION}"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/samba-next-functional.txt || true
            echo "next_installed_version=${NEXT_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Samba version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build and bounded client smoke." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_VERSION:-not_installed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Samba version ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not complete the expected Arm64 source-build and bounded client smoke."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "${status}" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "core_failed=${CORE_FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Samba Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check smbclient binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check exact version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
