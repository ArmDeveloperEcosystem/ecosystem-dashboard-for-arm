name: Test RocksDBjni on Arm64
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/rocksdbjni.md'
      - '.github/workflows/test-rocksdbjni.yml'

jobs:
  test-rocksdbjni:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "package_slug=rocksdbjni" >> $GITHUB_OUTPUT
          echo "dashboard_link=/opensource_packages/rocksdbjni" >> $GITHUB_OUTPUT
      
      - name: Install RocksDBjni
        id: install
        run: |
          echo "Installing RocksDBjni..."

          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk-headless maven

          ROCKSDBJNI_VERSION="10.5.1"
          PROJECT_DIR=/tmp/rocksdbjni-smoke
          rm -rf "$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR/src/main/java"

          cat > "$PROJECT_DIR/pom.xml" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>smoke</groupId>
            <artifactId>rocksdbjni-smoke</artifactId>
            <version>1.0.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <dependencies>
              <dependency>
                <groupId>org.rocksdb</groupId>
                <artifactId>rocksdbjni</artifactId>
                <version>${ROCKSDBJNI_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          EOF

          cat > "$PROJECT_DIR/src/main/java/VersionMain.java" <<'EOF'
          import org.rocksdb.RocksDB;
          public class VersionMain {
            public static void main(String[] args) {
              RocksDB.loadLibrary();
              System.out.println(RocksDB.rocksdbVersion());
            }
          }
          EOF

          cat > "$PROJECT_DIR/src/main/java/Main.java" <<'EOF'
          import org.rocksdb.Options;
          import org.rocksdb.RocksDB;
          public class Main {
            public static void main(String[] args) throws Exception {
              RocksDB.loadLibrary();
              try (Options options = new Options().setCreateIfMissing(true);
                   RocksDB db = RocksDB.open(options, "/tmp/rocksdbjni-db")) {
                db.put("arm64".getBytes(), "ok".getBytes());
                System.out.println(new String(db.get("arm64".getBytes())));
              }
            }
          }
          EOF

          if mvn -q -f "$PROJECT_DIR/pom.xml" dependency:resolve >/dev/null 2>&1; then
            echo "RocksDBjni installed successfully"
            echo "install_status=success" >> $GITHUB_OUTPUT
          else
            echo "RocksDBjni installation failed"
            echo "install_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get RocksDBjni version
        id: version
        run: |
          VERSION=$(mvn -q -f /tmp/rocksdbjni-smoke/pom.xml compile exec:java -Dexec.mainClass=VersionMain 2>/dev/null | tail -n 1 || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected RocksDBjni version: $VERSION"
      
      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================
      
      - name: Test 1 - Check RocksDBjni jar and Arm64 native library
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          JAR=$(find ~/.m2/repository/org/rocksdb/rocksdbjni -path '*/10.5.1/rocksdbjni-10.5.1.jar' | head -n 1)
          if [ -n "$JAR" ] && unzip -l "$JAR" | grep -q 'librocksdbjni-linux-aarch64.so'; then
            echo "✓ RocksDBjni jar contains Arm64 native library"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ RocksDBjni jar or Arm64 native library not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 2 - Check RocksDBjni version output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if mvn -q -f /tmp/rocksdbjni-smoke/pom.xml compile exec:java -Dexec.mainClass=VersionMain >/tmp/rocksdbjni-version.log 2>&1 && grep -qx '10.5.1' /tmp/rocksdbjni-version.log; then
            echo "✓ RocksDBjni version query works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            cat /tmp/rocksdbjni-version.log || true
            echo "✗ RocksDBjni version query failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      - name: Test 3 - Check Maven dependency resolution
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if mvn -q -f /tmp/rocksdbjni-smoke/pom.xml dependency:build-classpath -Dmdep.outputFile=/tmp/rocksdbjni.classpath >/dev/null 2>&1 && grep -q 'rocksdbjni-10.5.1.jar' /tmp/rocksdbjni.classpath; then
            echo "✓ Maven resolved the RocksDBjni classpath"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Maven failed to resolve the RocksDBjni classpath"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      
      # Add more tests as needed (test4, test5, etc.)
      # Examples:
      # - Run a simple command
      # - Check configuration files
      # - Start/stop a service
      # - Test basic functionality
      
      # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      # ============================================================
      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if mvn -q -f /tmp/rocksdbjni-smoke/pom.xml compile exec:java -Dexec.mainClass=Main >/tmp/rocksdbjni-main.log 2>&1 && grep -qx 'ok' /tmp/rocksdbjni-main.log; then
            echo "✓ RocksDBjni completed a real put/get round trip"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            cat /tmp/rocksdbjni-main.log || true
            echo "✗ RocksDBjni functional validation failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST_VERSION=$(python3 - <<'PY'
          import urllib.request, xml.etree.ElementTree as ET
          xml = urllib.request.urlopen("https://repo1.maven.org/maven2/org/rocksdb/rocksdbjni/maven-metadata.xml").read()
          root = ET.fromstring(xml)
          versions = [v.text for v in root.findall(".//version")]
          print(versions[-1])
          PY
          )

          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            DECISION="already_at_latest"
            COMPARISON="Current pinned version matches the latest stable Maven Central release and passed the smoke tests on Arm64."
          else
            DECISION="manual_review_needed"
            COMPARISON="Current pinned version passed the smoke tests on Arm64. The latest stable upstream release differs and still needs an explicit upgrade regression run before any version bump."
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "comparison=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "note=$COMPARISON" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Check rocksdbjni binary exists
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Check rocksdbjni version command
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Check rocksdbjni help output
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          # Regression Validation
          if [ "${{ steps.test6.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))


          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          
          cat > test-results/rocksdbjni.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "RocksDBjni",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Database",
              "category": "Database"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Check RocksDBjni jar and Arm64 native library",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Check RocksDBjni version output",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Check Maven dependency resolution",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Architecture Verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Functional Validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF
          
          echo "Generated test results:"
          cat test-results/rocksdbjni.json
      
      # ============================================================
      # STANDARD STEPS - Usually don't need to modify below here
      # ============================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rocksdbjni-test-results
          path: test-results/rocksdbjni.json
          retention-days: 90
      
      - name: Create test summary
        if: always()
        run: |
          echo "## RocksDBjni Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Check RocksDBjni jar and Arm64 native library: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Check RocksDBjni version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Check Maven dependency resolution: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current vs Next" >> $GITHUB_STEP_SUMMARY
          echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> $GITHUB_STEP_SUMMARY


