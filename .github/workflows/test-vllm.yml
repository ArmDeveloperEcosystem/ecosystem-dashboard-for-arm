name: Test vLLM on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-vllm.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-vllm.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-vllm.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-vllm.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-vllm.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-vllm.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-vllm.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-vllm.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-vllm.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-vllm.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-vllm.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-vllm.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-vllm.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-vllm.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-vllm.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-vllm.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-vllm.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-vllm.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-vllm.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-vllm.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-vllm.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-vllm.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-vllm.outputs.timestamp }}
jobs:
  test-vllm:
    runs-on: ubuntu-24.04-arm
    env:
      VLLM_VERSION: "0.10.2"
      VLLM_WORKDIR: "/tmp/vllm-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'vLLM'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=vllm" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/vllm" >> "$GITHUB_OUTPUT"
          echo "current_version=${VLLM_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install vLLM baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y python3-venv python3-pip file

          rm -rf "${VLLM_WORKDIR}"
          mkdir -p "${VLLM_WORKDIR}"
          python3 -m venv "${VLLM_WORKDIR}/venv"
          source "${VLLM_WORKDIR}/venv/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "vllm==${VLLM_VERSION}"

          if python -c "import vllm; print(vllm.__version__)" >/tmp/vllm-install.log 2>&1; then
            echo "venv=${VLLM_WORKDIR}/venv" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/vllm-install.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get vLLM version
        id: version
        run: |
          set -euo pipefail
          source "${{ steps.install.outputs.venv }}/bin/activate"

          VERSION=$(python -c "import importlib.metadata as md; print(md.version('vllm'))")
          LATEST="$(
            python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://pypi.org/pypi/vllm/json", timeout=20) as response:
              data = json.load(response)
          print(data["info"]["version"])
          PY
          )"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected vLLM version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check vLLM import
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.venv }}/bin/activate"

          if python -c "import vllm; print(vllm.__version__)" >/tmp/vllm-import.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/vllm-import.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact version metadata
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.venv }}/bin/activate"

          VERSION=$(python -c "import importlib.metadata as md; print(md.version('vllm'))")
          if [ "${VERSION}" = "${VLLM_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "Expected ${VLLM_VERSION}, got ${VERSION}"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check wheel metadata is aarch64
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.venv }}/bin/activate"

          if python - <<'PY'
          import pathlib
          import sysconfig

          purelib = pathlib.Path(sysconfig.get_paths()["purelib"])
          wheel = next(purelib.glob("vllm-*.dist-info/WHEEL"))
          text = wheel.read_text(encoding="utf-8")
          print(text)
          assert "aarch64" in text.lower()
          PY
          then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          source "${{ steps.install.outputs.venv }}/bin/activate"

          if python - <<PY
          import importlib.metadata as md
          import pkgutil
          import vllm
          from vllm.version import __version__

          assert md.version("vllm") == "${VLLM_VERSION}"
          assert __version__ == "${VLLM_VERSION}"
          assert pkgutil.find_loader("vllm.entrypoints.cli.main") is not None
          print(vllm.__file__)
          print("vllm-ok")
          PY
          then
            echo "note=Baseline Arm64 wheel installed successfully and passed metadata plus import validation on a CPU-only host." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_non_core_test() {
            local status="$1"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))
          check_non_core_test "${{ steps.test6.outputs.status || 'skipped' }}"
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## vLLM Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check vLLM import: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check exact version metadata: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check wheel metadata is aarch64: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
