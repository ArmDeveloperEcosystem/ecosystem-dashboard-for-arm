name: Test Hawking on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-hawking.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-hawking.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-hawking.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-hawking.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-hawking.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-hawking.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-hawking.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-hawking.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-hawking.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-hawking.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-hawking.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-hawking.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-hawking.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-hawking.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-hawking.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-hawking.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-hawking.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-hawking.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-hawking.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-hawking.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-hawking.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-hawking.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-hawking.outputs.timestamp }}
jobs:
  test-hawking:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Hawking'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=hawking" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/hawking" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl jq maven tar wget

      - name: Install Hawking baseline source
        id: install
        run: |
          set -euo pipefail
          CURRENT_VERSION="0.1.9"
          JDK_URL="https://github.com/adoptium/temurin8-binaries/releases/download/jdk8u482-b08/OpenJDK8U-jdk_aarch64_linux_hotspot_8u482b08.tar.gz"
          WORKDIR=$(mktemp -d)

          rm -rf temurin8 temurin8.tar.gz hawking-source
          wget -q "$JDK_URL" -O temurin8.tar.gz
          mkdir -p temurin8
          tar -xzf temurin8.tar.gz -C temurin8 --strip-components=1

          curl -fsSL "https://github.com/zoho/hawking/archive/refs/tags/${CURRENT_VERSION}.tar.gz" -o "$WORKDIR/hawking-${CURRENT_VERSION}.tar.gz"
          tar -xzf "$WORKDIR/hawking-${CURRENT_VERSION}.tar.gz" -C "$WORKDIR"
          mv "$WORKDIR/hawking-${CURRENT_VERSION}" hawking-source

          echo "JAVA_HOME=$PWD/temurin8" >> "$GITHUB_ENV"
          echo "$PWD/temurin8/bin" >> "$GITHUB_PATH"
          echo "baseline_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          export JAVA_HOME="$PWD/temurin8"
          export PATH="$JAVA_HOME/bin:$PATH"
          cd hawking-source
          mvn -q -Dgpg.skip=true -DskipTests clean install >/tmp/hawking-baseline-build.log 2>&1

          if find target -maxdepth 1 -name 'hawking-*.jar' | grep -q 'hawking-'; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            tail -n 80 /tmp/hawking-baseline-build.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Hawking version
        id: version
        working-directory: hawking-source
        run: |
          set -euo pipefail
          export JAVA_HOME="$GITHUB_WORKSPACE/temurin8"
          export PATH="$JAVA_HOME/bin:$PATH"
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Hawking version: $VERSION"

      - name: Test 1 - Check jar existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if find hawking-source/target -maxdepth 1 -name "hawking-${{ steps.version.outputs.version }}.jar" | grep -q 'hawking-'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check project version output
        id: test2
        continue-on-error: true
        working-directory: hawking-source
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export JAVA_HOME="$GITHUB_WORKSPACE/temurin8"
          export PATH="$JAVA_HOME/bin:$PATH"

          if mvn help:evaluate -Dexpression=project.version -q -DforceStdout | tail -n 1 | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check configuration asset
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if jar tf "hawking-source/target/hawking-${{ steps.version.outputs.version }}.jar" | grep -q '^conf/hawking.props$'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        working-directory: hawking-source
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export JAVA_HOME="$GITHUB_WORKSPACE/temurin8"
          export PATH="$JAVA_HOME/bin:$PATH"

          mvn -q -DincludeScope=runtime dependency:build-classpath -Dmdep.outputFile=/tmp/hawking.cp >/tmp/hawking-classpath.log 2>&1
          CP="target/classes:$(cat /tmp/hawking.cp)"

          if java -cp "$CP" com.zoho.hawking.HawkingDemo >/tmp/hawking-demo.txt 2>&1 && \
            grep -q 'Text : on December 20' /tmp/hawking-demo.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/hawking-demo.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          export JAVA_HOME="$GITHUB_WORKSPACE/temurin8"
          export PATH="$JAVA_HOME/bin:$PATH"

          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST_TAG=$(GH_TOKEN="${{ github.token }}" gh api "repos/zoho/hawking/tags?per_page=100" --jq '.[].name' | grep -E '^[0-9]+\\.[0-9]+\\.[0-9]+$' | sort -V | tail -n 1 || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.2.0"
          fi

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST_TAG"

          if [ "$LATEST_TAG" = "$CURRENT" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Current pinned Hawking release ${CURRENT} passed the Maven build and demo smoke on Arm64, and no newer upstream source tag is currently published."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_WORKDIR=$(mktemp -d)
          curl -fsSL "https://github.com/zoho/hawking/archive/refs/tags/${LATEST_TAG}.tar.gz" -o "$NEXT_WORKDIR/hawking-${LATEST_TAG}.tar.gz"
          tar -xzf "$NEXT_WORKDIR/hawking-${LATEST_TAG}.tar.gz" -C "$NEXT_WORKDIR"
          NEXT_SRC="$NEXT_WORKDIR/hawking-${LATEST_TAG}"

          mvn -q -f "$NEXT_SRC/pom.xml" -Dgpg.skip=true -DskipTests clean install >/tmp/hawking-next-build.log 2>&1
          NEXT_VERSION=$(mvn -f "$NEXT_SRC/pom.xml" help:evaluate -Dexpression=project.version -q -DforceStdout | tail -n 1 || true)
          mvn -q -f "$NEXT_SRC/pom.xml" -DincludeScope=runtime dependency:build-classpath -Dmdep.outputFile="$NEXT_WORKDIR/hawking.cp" >/tmp/hawking-next-classpath.log 2>&1
          NEXT_CP="$NEXT_SRC/target/classes:$(cat "$NEXT_WORKDIR/hawking.cp")"

          if [ -n "$NEXT_VERSION" ] \
            && find "$NEXT_SRC/target" -maxdepth 1 -name "hawking-${NEXT_VERSION}.jar" | grep -q 'hawking-' \
            && java -cp "$NEXT_CP" com.zoho.hawking.HawkingDemo >"$NEXT_WORKDIR/hawking-demo.txt" 2>&1 \
            && grep -q 'Text : on December 20' "$NEXT_WORKDIR/hawking-demo.txt"; then
            echo "next_installed_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hawking release ${CURRENT} passed the Maven build and demo smoke on Arm64. Regression validation built upstream source tag ${LATEST_TAG}, and the candidate project reported version ${NEXT_VERSION} while successfully running HawkingDemo on Arm64. Upstream still publishes ${CURRENT} as the latest release, so Test 6 validates the newer source tag path explicitly." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Hawking release ${CURRENT} passed the Maven build and demo smoke on Arm64. Regression validation built upstream source tag ${LATEST_TAG}, and the candidate project reported version ${NEXT_VERSION} while successfully running HawkingDemo on Arm64. Upstream still publishes ${CURRENT} as the latest release, so Test 6 validates the newer source tag path explicitly."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            tail -n 80 /tmp/hawking-next-build.log || true
            cat "$NEXT_WORKDIR/hawking-demo.txt" || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Hawking release ${CURRENT} passed the Maven build and demo smoke on Arm64, but the newer upstream source tag ${LATEST_TAG} did not complete the same isolated build-and-demo validation on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Hawking release ${CURRENT} passed the Maven build and demo smoke on Arm64, but the newer upstream source tag ${LATEST_TAG} did not complete the same isolated build-and-demo validation on Arm64."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "${{ steps.test6.outputs.decision || '' }}" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Regression validation status unavailable"
                ;;
            esac
          fi

          echo "## Hawking Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check jar existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check project version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check configuration asset: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
