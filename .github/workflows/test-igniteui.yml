name: Test Ignite UI on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-igniteui.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-igniteui.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-igniteui.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-igniteui.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-igniteui.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-igniteui.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-igniteui.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-igniteui.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-igniteui.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-igniteui.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-igniteui.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-igniteui.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-igniteui.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-igniteui.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-igniteui.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-igniteui.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-igniteui.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-igniteui.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-igniteui.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-igniteui.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-igniteui.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-igniteui.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-igniteui.outputs.timestamp }}
jobs:
  test-igniteui:
    runs-on: ubuntu-24.04-arm
    env:
      IGNITEUI_VERSION: "25.1.3"
      IGNITEUI_WORKDIR: "/tmp/igniteui-smoke"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Ignite UI'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=igniteui" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/igniteui" >> "$GITHUB_OUTPUT"
      - name: Install Ignite UI
        id: install
        run: |
          set -euo pipefail
          rm -rf "${IGNITEUI_WORKDIR}"
          mkdir -p "${IGNITEUI_WORKDIR}"
          cd "${IGNITEUI_WORKDIR}"
          npm pack "ignite-ui@${IGNITEUI_VERSION}" >/tmp/igniteui-pack.log
          PKG=$(tail -n 1 /tmp/igniteui-pack.log)
          tar -xzf "$PKG"
          test -f "${IGNITEUI_WORKDIR}/package/package.json"
          echo "package_dir=${IGNITEUI_WORKDIR}/package" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Ignite UI version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('${IGNITEUI_WORKDIR}/package/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${IGNITEUI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Ignite UI version: $VERSION"

      - name: Test 1 - Artifact existence
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${IGNITEUI_WORKDIR}/package/package.json" ] \
            && [ -f "${IGNITEUI_WORKDIR}/package/js/infragistics.core-lite.js" ] \
            && [ -f "${IGNITEUI_WORKDIR}/package/js/infragistics.lob-lite.js" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            find "${IGNITEUI_WORKDIR}/package" -maxdepth 2 -type f | head -n 50 || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version check
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION=$(node -p "require('${IGNITEUI_WORKDIR}/package/package.json').version")
          if [ "$VERSION" = "${IGNITEUI_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            node -p "require('${IGNITEUI_WORKDIR}/package/package.json')"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Package metadata validation
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          node - <<'NODE' > /tmp/igniteui-meta.log
          const pkg = require(process.env.IGNITEUI_WORKDIR + '/package/package.json');
          if (
            pkg.name === 'ignite-ui' &&
            pkg.version === process.env.IGNITEUI_VERSION &&
            typeof pkg.license === 'string'
          ) {
            console.log('ignite-ui-meta-ok');
          } else {
            process.exit(1);
          }
          NODE
          if grep -Fq 'ignite-ui-meta-ok' /tmp/igniteui-meta.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/igniteui-meta.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && [ "$(node -p 'process.arch')" = "arm64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            uname -m
            node -p 'process.arch'
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          node - <<'NODE' > /tmp/igniteui-functional.log
          const fs = require('fs');
          const base = process.env.IGNITEUI_WORKDIR + '/package';
          const checks = [
            'README.md',
            'bower.json',
            'css/structure/infragistics.css',
            'js/infragistics.core-lite.js',
            'js/infragistics.lob-lite.js'
          ];
          if (checks.every((path) => fs.existsSync(`${base}/${path}`))) {
            console.log('ignite-ui-assets-ok');
          } else {
            process.exit(1);
          }
          NODE
          if grep -Fq 'ignite-ui-assets-ok' /tmp/igniteui-functional.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || env.IGNITEUI_VERSION }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=Ignite UI is installed in Tests 1-5 via npm, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: not_applicable"
          echo "Next version installed on Arm64: not_applicable"
          echo "Regression install result: Regression validation not applicable because the tested package is installed via package manager"
          echo "Details: Ignite UI is installed through npm, so this workflow stops at Tests 1-5 under the current regression policy."
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              not_applicable_package_manager)
                REGRESSION_RESULT="Regression validation not applicable: tested package installed via package manager in Tests 1-5"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
