name: Test Logstash on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-logstash.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-logstash.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-logstash.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-logstash.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-logstash.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-logstash.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-logstash.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-logstash.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-logstash.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-logstash.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-logstash.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-logstash.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-logstash.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-logstash.outputs.regression_result }}
      regression_policy:
        description: Regression policy classification for publish pipeline
        value: ${{ jobs.test-logstash.outputs.regression_policy }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-logstash.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-logstash.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-logstash.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-logstash.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-logstash.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-logstash.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-logstash.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-logstash.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-logstash.outputs.timestamp }}
jobs:
  test-logstash:
    runs-on: ubuntu-24.04-arm

    env:
      BASELINE_VERSION: "8.19.12"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Logstash'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_policy: ${{ steps.test6.outputs.regression_policy || steps.metadata.outputs.regression_policy || 'applicable' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=logstash" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/logstash" >> "$GITHUB_OUTPUT"
          echo "regression_policy=applicable" >> "$GITHUB_OUTPUT"
          echo "current_version=${BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Logstash
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          DEB_PATH="/tmp/logstash-${VERSION}-arm64.deb"
          ROOT_DIR="/tmp/logstash-${VERSION}-root"
          SETTINGS_DIR="/tmp/logstash-settings-${VERSION}"
          DATA_DIR="/tmp/logstash-data-${VERSION}"
          PIPELINE_PATH="/tmp/logstash-${VERSION}.conf"
          URL="https://artifacts.elastic.co/downloads/logstash/logstash-${VERSION}-arm64.deb"

          sudo apt-get update
          sudo apt-get install -y curl file

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "$URL" -o "$DEB_PATH"
          rm -rf "$ROOT_DIR" "$SETTINGS_DIR" "$DATA_DIR"
          mkdir -p "$ROOT_DIR" "$DATA_DIR"
          dpkg-deb -x "$DEB_PATH" "$ROOT_DIR"

          LOGSTASH_HOME="${ROOT_DIR}/usr/share/logstash"
          BINARY_PATH="${LOGSTASH_HOME}/bin/logstash"
          cp -a "${ROOT_DIR}/etc/logstash" "$SETTINGS_DIR"
          printf '%s\n' 'input { stdin { } } output { stdout { codec => rubydebug } }' > "$PIPELINE_PATH"

          echo "baseline_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "root_dir=$ROOT_DIR" >> "$GITHUB_OUTPUT"
          echo "home_dir=$LOGSTASH_HOME" >> "$GITHUB_OUTPUT"
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          echo "settings_dir=$SETTINGS_DIR" >> "$GITHUB_OUTPUT"
          echo "data_dir=$DATA_DIR" >> "$GITHUB_OUTPUT"
          echo "pipeline_path=$PIPELINE_PATH" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Logstash version
        id: version
        run: |
          set -euo pipefail
          VERSION_OUTPUT=$("${{ steps.install.outputs.binary_path }}" --version 2>&1 | tee /tmp/logstash-version.log || true)
          VERSION=$(printf '%s\n' "$VERSION_OUTPUT" | sed -nE '/[Ll]ogstash/ s/.*[Ll]ogstash[[:space:]]+([0-9]+(\.[0-9]+){2}).*/\1/p' | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Logstash version: $VERSION"

      - name: Test 1 - Check Logstash binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.binary_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Logstash version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.install.outputs.baseline_version }}"
          REPORTED="${{ steps.version.outputs.version }}"
          if [ "$REPORTED" = "$EXPECTED" ] && grep -Eiq '[Ll]ogstash|Elastic' /tmp/logstash-version.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/logstash-version.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Logstash help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.binary_path }}" --help >/tmp/logstash-help.log 2>&1 \
            && grep -Eiq 'Usage|Options|[Ll]ogstash' /tmp/logstash-help.log; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/logstash-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check Logstash config test
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if timeout 180 "${{ steps.install.outputs.binary_path }}" \
            --path.settings "${{ steps.install.outputs.settings_dir }}" \
            --path.data "${{ steps.install.outputs.data_dir }}" \
            -f "${{ steps.install.outputs.pipeline_path }}" \
            --config.test_and_exit >/tmp/logstash-config.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/logstash-config.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check package architecture
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          PACKAGE_ARCH=$(dpkg-deb -f "${{ steps.install.outputs.deb_path }}" Architecture)
          if [ "$(uname -m)" = "aarch64" ] && [ "$PACKAGE_ARCH" = "arm64" ]; then
            if [ -x "${{ steps.install.outputs.home_dir }}/jdk/bin/java" ]; then
              file "${{ steps.install.outputs.home_dir }}/jdk/bin/java" | grep -Eqi "aarch64|arm64"
            fi
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            dpkg-deb -f "${{ steps.install.outputs.deb_path }}" Architecture || true
            uname -m || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        run: |
          set -euo pipefail
          echo "regression_policy=${{ steps.metadata.outputs.regression_policy || 'applicable' }}" >> "$GITHUB_OUTPUT"
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version || steps.install.outputs.baseline_version || env.BASELINE_VERSION }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_VERSION=$(python3 - "${CURRENT_VERSION}" <<'PY'
          import json
          import re
          import sys
          import urllib.request

          current = (sys.argv[1] or "").strip()
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", current):
              print("")
              raise SystemExit(0)

          payload = urllib.request.urlopen("https://artifacts-api.elastic.co/v1/versions", timeout=30).read().decode("utf-8")
          doc = json.loads(payload)
          versions = [
              value
              for value in doc.get("versions", [])
              if isinstance(value, str) and re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", value)
          ]

          def key(v: str):
              return tuple(int(part) for part in v.split("."))

          current_key = key(current)
          candidates = sorted({v for v in versions if key(v) > current_key}, key=key)
          print(candidates[0] if candidates else "")
          PY
          )

          if [ -z "${NEXT_VERSION}" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable Logstash release is available beyond the tested baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Tests 1-5 validated baseline Logstash ${CURRENT_VERSION}; no higher stable candidate is currently published in the upstream version stream." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DEB="/tmp/logstash-${NEXT_VERSION}-arm64.deb"
          NEXT_ROOT="/tmp/logstash-next-${NEXT_VERSION}-root"
          NEXT_SETTINGS="/tmp/logstash-next-settings-${NEXT_VERSION}"
          NEXT_DATA="/tmp/logstash-next-data-${NEXT_VERSION}"
          NEXT_PIPELINE="/tmp/logstash-next-${NEXT_VERSION}.conf"
          NEXT_URL="https://artifacts.elastic.co/downloads/logstash/logstash-${NEXT_VERSION}-arm64.deb"

          rm -rf "${NEXT_ROOT}" "${NEXT_SETTINGS}" "${NEXT_DATA}"
          mkdir -p "${NEXT_ROOT}" "${NEXT_DATA}"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "${NEXT_URL}" -o "${NEXT_DEB}"
          dpkg-deb -x "${NEXT_DEB}" "${NEXT_ROOT}"
          NEXT_BINARY="${NEXT_ROOT}/usr/share/logstash/bin/logstash"
          cp -a "${NEXT_ROOT}/etc/logstash" "${NEXT_SETTINGS}"
          printf '%s\n' 'input { stdin { } } output { stdout { codec => rubydebug } }' > "${NEXT_PIPELINE}"

          if [ ! -x "${NEXT_BINARY}" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next-version Logstash binary was not installable on Arm64." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT_VERSION} passed, but candidate ${NEXT_VERSION} did not produce a usable Logstash binary after package extraction." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_VERSION_OUTPUT=$("${NEXT_BINARY}" --version 2>&1 | tee /tmp/logstash-next-version.log || true)
          NEXT_REPORTED=$(printf '%s\n' "${NEXT_VERSION_OUTPUT}" | sed -nE '/[Ll]ogstash/ s/.*[Ll]ogstash[[:space:]]+([0-9]+(\.[0-9]+){2}).*/\1/p' | head -n 1)
          if [ -z "${NEXT_REPORTED}" ]; then
            NEXT_REPORTED="not_installed"
          fi
          NEXT_ARCH=$(dpkg-deb -f "${NEXT_DEB}" Architecture || echo "unknown")

          if [ "${NEXT_REPORTED}" != "${NEXT_VERSION}" ] || [ "${NEXT_ARCH}" != "arm64" ]; then
            cat /tmp/logstash-next-version.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next-version Logstash install/version validation failed on Arm64." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT_VERSION} passed, but candidate ${NEXT_VERSION} reported version ${NEXT_REPORTED} with package arch ${NEXT_ARCH}." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! "${NEXT_BINARY}" --help >/tmp/logstash-next-help.log 2>&1 || ! grep -Eiq 'Usage|Options|[Ll]ogstash' /tmp/logstash-next-help.log; then
            cat /tmp/logstash-next-help.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next-version Logstash help/config validation failed on Arm64." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT_VERSION} passed, but candidate ${NEXT_VERSION} did not pass help-output validation." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! timeout 180 "${NEXT_BINARY}" \
            --path.settings "${NEXT_SETTINGS}" \
            --path.data "${NEXT_DATA}" \
            -f "${NEXT_PIPELINE}" \
            --config.test_and_exit >/tmp/logstash-next-config.log 2>&1; then
            cat /tmp/logstash-next-config.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next-version Logstash config validation failed on Arm64." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT_VERSION} passed, but candidate ${NEXT_VERSION} failed --config.test_and_exit in the same validation pattern." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${NEXT_REPORTED}" >> "$GITHUB_OUTPUT"
          echo "regression_result=Next stable Logstash candidate installed and validated successfully on Arm64." >> "$GITHUB_OUTPUT"
          echo "comparison=Baseline ${CURRENT_VERSION} passed tests 1-5, and candidate ${NEXT_VERSION} passed install, version, help, architecture, and config validation in Test 6." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          for TEST in 1 2 3 4 5; do
            STATUS="${{ steps.test1.outputs.status }}"
            DURATION="${{ steps.test1.outputs.duration || 0 }}"
            case "$TEST" in
              1) STATUS="${{ steps.test1.outputs.status || 'failed' }}"; DURATION="${{ steps.test1.outputs.duration || 0 }}" ;;
              2) STATUS="${{ steps.test2.outputs.status || 'failed' }}"; DURATION="${{ steps.test2.outputs.duration || 0 }}" ;;
              3) STATUS="${{ steps.test3.outputs.status || 'failed' }}"; DURATION="${{ steps.test3.outputs.duration || 0 }}" ;;
              4) STATUS="${{ steps.test4.outputs.status || 'failed' }}"; DURATION="${{ steps.test4.outputs.duration || 0 }}" ;;
              5) STATUS="${{ steps.test5.outputs.status || 'failed' }}"; DURATION="${{ steps.test5.outputs.duration || 0 }}" ;;
            esac

            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + DURATION))
          done

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Logstash Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check Logstash binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check Logstash version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check Logstash help output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Check Logstash config test: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Check package architecture: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
