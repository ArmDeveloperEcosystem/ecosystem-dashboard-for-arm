name: Test Mesos on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/mesos.md"
      - ".github/workflows/test-mesos.yml"

jobs:
  test-mesos:
    runs-on: ubuntu-24.04-arm
    env:
      MESOS_BASELINE_VERSION: "1.10.0"
      MESOS_ARCHIVE_ROOT: "https://archive.apache.org/dist/mesos"
      MESOS_WORKROOT: "/tmp/mesos-smoke"
      MESOS_CONFIGURE_ARGS: "--disable-python --disable-java --disable-optimize --disable-werror"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=mesos" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/mesos" >> "$GITHUB_OUTPUT"
          echo "current_version=${MESOS_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Mesos build dependencies and baseline source
        id: install
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            curl \
            tar \
            pkg-config \
            python3 \
            python3-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libapr1-dev \
            libsvn-dev \
            libssl-dev \
            zlib1g-dev \
            libevent-dev \
            libtool \
            autoconf \
            automake \
            libunwind-dev \
            ca-certificates

          rm -rf "${MESOS_WORKROOT}"
          mkdir -p "${MESOS_WORKROOT}/baseline"

          build_mesos() {
            local version="$1"
            local outdir="$2"
            local archive="${outdir}/mesos-${version}.tar.gz"
            local srcdir="${outdir}/mesos-${version}"

            curl -fsSL -o "${archive}" "${MESOS_ARCHIVE_ROOT}/${version}/mesos-${version}.tar.gz"
            tar -xzf "${archive}" -C "${outdir}"

            cd "${srcdir}"
            if ! ./configure ${MESOS_CONFIGURE_ARGS} > "/tmp/mesos-${version}-configure.log" 2>&1; then
              cat "/tmp/mesos-${version}-configure.log" || true
              return 1
            fi
            if ! make -j2 > "/tmp/mesos-${version}-build.log" 2>&1; then
              cat "/tmp/mesos-${version}-build.log" || true
              return 1
            fi

            if [ ! -x "${srcdir}/src/mesos-master" ] || [ ! -x "${srcdir}/src/mesos-agent" ]; then
              cat "/tmp/mesos-${version}-configure.log" || true
              cat "/tmp/mesos-${version}-build.log" || true
              return 1
            fi

            printf '%s\n' "${srcdir}"
          }

          BASELINE_SOURCE_DIR=$(build_mesos "${MESOS_BASELINE_VERSION}" "${MESOS_WORKROOT}/baseline")

          echo "baseline_source_dir=${BASELINE_SOURCE_DIR}" >> "$GITHUB_OUTPUT"
          echo "baseline_master=${BASELINE_SOURCE_DIR}/src/mesos-master" >> "$GITHUB_OUTPUT"
          echo "baseline_agent=${BASELINE_SOURCE_DIR}/src/mesos-agent" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Mesos version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.baseline_master }}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          LATEST=$(
            python3 - <<'PY'
          import re
          import urllib.request

          html = urllib.request.urlopen("https://archive.apache.org/dist/mesos/", timeout=20).read().decode("utf-8", "ignore")
          versions = sorted(
              set(re.findall(r'href="([0-9]+\.[0-9]+\.[0-9]+)/"', html)),
              key=lambda s: tuple(map(int, s.split(".")))
          )
          print(versions[-1] if versions else "")
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Mesos version: ${VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check built binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if [ -x "${{ steps.install.outputs.baseline_master }}" ] && [ -x "${{ steps.install.outputs.baseline_agent }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check mesos-master version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          MASTER_VERSION=$("${{ steps.install.outputs.baseline_master }}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ "${MASTER_VERSION}" = "${MESOS_BASELINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.baseline_master }}" --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check mesos-master help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          if "${{ steps.install.outputs.baseline_master }}" --help 2>&1 | grep -Eqi 'usage|options|flags'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.baseline_master }}" --help || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Check mesos-agent version and help
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)

          AGENT_VERSION=$("${{ steps.install.outputs.baseline_agent }}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ "${AGENT_VERSION}" = "${MESOS_BASELINE_VERSION}" ] && \
            "${{ steps.install.outputs.baseline_agent }}" --help 2>&1 | grep -Eqi 'usage|options|flags'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            "${{ steps.install.outputs.baseline_agent }}" --version || true
            "${{ steps.install.outputs.baseline_agent }}" --help || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${MESOS_BASELINE_VERSION}"
          LATEST="${{ steps.version.outputs.latest }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "${LATEST}" ]; then
            echo "next_installed_version=lookup_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Mesos release ${CURRENT} passed smoke tests in this run, but the latest official Apache archive release could not be resolved automatically for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: lookup_failed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR="${MESOS_WORKROOT}/candidate"
          rm -rf "${NEXT_DIR}"
          mkdir -p "${NEXT_DIR}"

          build_mesos() {
            local version="$1"
            local outdir="$2"
            local archive="${outdir}/mesos-${version}.tar.gz"
            local srcdir="${outdir}/mesos-${version}"

            curl -fsSL -o "${archive}" "${MESOS_ARCHIVE_ROOT}/${version}/mesos-${version}.tar.gz"
            tar -xzf "${archive}" -C "${outdir}"

            cd "${srcdir}"
            if ! ./configure ${MESOS_CONFIGURE_ARGS} > "/tmp/mesos-${version}-configure.log" 2>&1; then
              return 1
            fi
            if ! make -j2 > "/tmp/mesos-${version}-build.log" 2>&1; then
              return 1
            fi

            if [ ! -x "${srcdir}/src/mesos-master" ] || [ ! -x "${srcdir}/src/mesos-agent" ]; then
              return 1
            fi

            printf '%s\n' "${srcdir}"
          }

          if NEXT_SOURCE_DIR=$(build_mesos "${LATEST}" "${NEXT_DIR}"); then
            NEXT_MASTER="${NEXT_SOURCE_DIR}/src/mesos-master"
            NEXT_AGENT="${NEXT_SOURCE_DIR}/src/mesos-agent"
            NEXT_MASTER_VERSION=$("${NEXT_MASTER}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            NEXT_AGENT_VERSION=$("${NEXT_AGENT}" --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)

            if [ "${NEXT_MASTER_VERSION}" = "${LATEST}" ] && [ "${NEXT_AGENT_VERSION}" = "${LATEST}" ] && \
              "${NEXT_MASTER}" --help 2>&1 | grep -Eqi 'usage|options|flags' && \
              "${NEXT_AGENT}" --help 2>&1 | grep -Eqi 'usage|options|flags'; then
              echo "next_installed_version=${NEXT_MASTER_VERSION}" >> "$GITHUB_OUTPUT"
              if [ "${CURRENT}" = "${LATEST}" ]; then
                echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
                echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
                echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
                echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
                echo "status=failed" >> "$GITHUB_OUTPUT"
              else
                echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
                echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
                echo "comparison=Current pinned Mesos release ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, and both mesos-master and mesos-agent reported version ${NEXT_MASTER_VERSION}." >> "$GITHUB_OUTPUT"
                echo "Regression install result: Next version installed successfully on Arm64"
                echo "status=passed" >> "$GITHUB_OUTPUT"
              fi
              echo "Next version installed on Arm64: ${NEXT_MASTER_VERSION}"
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "next_installed_version=${NEXT_MASTER_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Mesos release ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} did not produce matching usable mesos-master and mesos-agent binaries on Arm64." >> "$GITHUB_OUTPUT"
              echo "Next version installed on Arm64: ${NEXT_MASTER_VERSION:-unknown}"
              echo "Regression install result: Next version install failed on Arm64"
              "${NEXT_MASTER}" --version || true
              "${NEXT_AGENT}" --version || true
              "${NEXT_MASTER}" --help || true
              "${NEXT_AGENT}" --help || true
              echo "status=failed" >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            cat "/tmp/mesos-${LATEST}-configure.log" || true
            cat "/tmp/mesos-${LATEST}-build.log" || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Mesos release ${CURRENT} passed smoke tests in this run, but the candidate version ${LATEST} could not be built into usable mesos-master and mesos-agent binaries on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/mesos.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Mesos",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check built binaries exist", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check mesos-master version", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check mesos-master help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Check mesos-agent version and help", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesos-test-results
          path: test-results/mesos.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Mesos Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check built binaries exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check mesos-master version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check mesos-master help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Check mesos-agent version and help: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
