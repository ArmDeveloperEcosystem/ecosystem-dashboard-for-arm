name: Test Relion on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/relion.md"
      - ".github/workflows/test-relion.yml"

jobs:
  test-relion:
    runs-on: ubuntu-24.04-arm
    env:
      RELION_VERSION: "3.1.0"
      RELION_WORKDIR: "/tmp/relion-smoke"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=relion" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/relion" >> "$GITHUB_OUTPUT"

      - name: Install Relion baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update
          sudo -E apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            ca-certificates \
            libfftw3-dev \
            libtiff-dev \
            libpng-dev \
            libjpeg-dev \
            zlib1g-dev \
            libeigen3-dev \
            libxml2-dev \
            libsqlite3-dev \
            libx11-dev \
            libxft-dev \
            libxext-dev \
            libxrender-dev \
            libxinerama-dev \
            libcairo2-dev \
            openmpi-bin \
            libopenmpi-dev \
            file

          rm -rf "${RELION_WORKDIR}"
          mkdir -p "${RELION_WORKDIR}"
          wget -q "https://github.com/3dem/relion/archive/refs/tags/${RELION_VERSION}.tar.gz" \
            -O "${RELION_WORKDIR}/relion.tar.gz"
          tar -xzf "${RELION_WORKDIR}/relion.tar.gz" -C "${RELION_WORKDIR}"
          SRC_DIR=$(find "${RELION_WORKDIR}" -maxdepth 1 -mindepth 1 -type d -name 'relion-*' | head -n 1)
          BUILD_DIR="${SRC_DIR}/build"
          mkdir -p "${BUILD_DIR}"
          cd "${BUILD_DIR}"
          cmake .. -DGUI=OFF -DCUDA=OFF >/tmp/relion-cmake.log 2>&1
          cmake --build . --target image_handler -j2 >/tmp/relion-build.log 2>&1
          BASE_BIN=$(find "${BUILD_DIR}" -type f -name 'relion_image_handler' | head -n 1)
          test -n "${BASE_BIN}"
          test -x "${BASE_BIN}"

          echo "src_dir=${SRC_DIR}" >> "$GITHUB_OUTPUT"
          echo "build_dir=${BUILD_DIR}" >> "$GITHUB_OUTPUT"
          echo "base_bin=${BASE_BIN}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Relion version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json
          import re
          import urllib.request

          def key(tag):
              m = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", tag)
              if not m:
                  return (-1, -1, -1)
              return tuple(int(x) for x in m.groups())

          with urllib.request.urlopen("https://api.github.com/repos/3dem/relion/releases?per_page=20", timeout=20) as response:
              releases = json.load(response)

          tags = [
              str(rel["tag_name"])
              for rel in releases
              if not rel.get("draft")
              and not rel.get("prerelease")
              and re.fullmatch(r"\d+\.\d+\.\d+", str(rel["tag_name"]))
          ]
          print(sorted(tags, key=key)[-1] if tags else "unknown")
          PY
          )
          echo "version=${RELION_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Detected Relion source tag: ${RELION_VERSION}"
          echo "Detected latest stable release: ${LATEST}"

      - name: Test 1 - Check Relion binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.base_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Relion help output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          OUTPUT=$("${BASE_BIN}" --help 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "RELION:"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Relion CLI options
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          OUTPUT=$("${BASE_BIN}" --help 2>&1 || true)
          if echo "$OUTPUT" | grep -q -- "--i" && \
             echo "$OUTPUT" | grep -q -- "--o" && \
             echo "$OUTPUT" | grep -q -- "--multiply_constant"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "$OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          if [ "$(uname -m)" = "aarch64" ] && file "${BASE_BIN}" | grep -Eqi 'aarch64|arm64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${BASE_BIN}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          BUILD_DIR="${{ steps.install.outputs.build_dir }}"
          BASE_BIN="${{ steps.install.outputs.base_bin }}"
          ldd "${BASE_BIN}" >/tmp/relion-ldd.txt 2>&1
          if grep -q "GUI:BOOL=OFF" "${BUILD_DIR}/CMakeCache.txt" && \
             grep -q "CUDA:BOOL=OFF" "${BUILD_DIR}/CMakeCache.txt" && \
             ! grep -q "not found" /tmp/relion-ldd.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/relion-ldd.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_WORKDIR="/tmp/relion-regression"
          NEXT_INSTALLED="not_installed"
          STATUS="failed"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run, but the latest stable upstream release could not be resolved for candidate build validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run, but the latest stable upstream release could not be resolved for candidate build validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${REGRESSION_WORKDIR}"
          mkdir -p "${REGRESSION_WORKDIR}"
          wget -q "https://github.com/3dem/relion/archive/refs/tags/${LATEST}.tar.gz" \
            -O "${REGRESSION_WORKDIR}/relion.tar.gz"
          tar -xzf "${REGRESSION_WORKDIR}/relion.tar.gz" -C "${REGRESSION_WORKDIR}"
          NEXT_SRC=$(find "${REGRESSION_WORKDIR}" -maxdepth 1 -mindepth 1 -type d -name 'relion-*' | head -n 1)
          NEXT_BUILD="${NEXT_SRC}/build"
          mkdir -p "${NEXT_BUILD}"
          cd "${NEXT_BUILD}"
          cmake .. -DGUI=OFF -DCUDA=OFF >/tmp/relion-next-cmake.log 2>&1
          cmake --build . --target image_handler -j2 >/tmp/relion-next-build.log 2>&1
          NEXT_BIN=$(find "${NEXT_BUILD}" -type f -name 'relion_image_handler' | head -n 1)
          test -n "${NEXT_BIN}"
          test -x "${NEXT_BIN}"
          NEXT_OUTPUT=$("${NEXT_BIN}" --help 2>&1 || true)
          NEXT_INSTALLED="${LATEST}"
          ldd "${NEXT_BIN}" >/tmp/relion-next-ldd.txt 2>&1

          if file "${NEXT_BIN}" | grep -Eqi 'aarch64|arm64' && \
             echo "${NEXT_OUTPUT}" | grep -q "RELION:" && \
             echo "${NEXT_OUTPUT}" | grep -q -- "--multiply_constant" && \
             grep -q "GUI:BOOL=OFF" "${NEXT_BUILD}/CMakeCache.txt" && \
             grep -q "CUDA:BOOL=OFF" "${NEXT_BUILD}/CMakeCache.txt" && \
             ! grep -q "not found" /tmp/relion-next-ldd.txt; then
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "decision=baseline_matches_latest_stable" >> "$GITHUB_OUTPUT"
              echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
              echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
              echo "Details: Current pinned Relion source tag ${CURRENT} already matches the latest stable upstream release. Regression validation rebuilt the same CPU-only Arm64 source tag with GUI and CUDA disabled, then executed the resulting relion_image_handler binary successfully."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            else
              echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run. Regression validation rebuilt candidate source tag ${LATEST} with GUI and CUDA disabled, then executed the resulting relion_image_handler binary successfully on Arm64." >> "$GITHUB_OUTPUT"
              echo "Regression install result: Next version installed successfully on Arm64"
              echo "Details: Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run. Regression validation rebuilt candidate source tag ${LATEST} with GUI and CUDA disabled, then executed the resulting relion_image_handler binary successfully on Arm64."
              echo "status=passed" >> "$GITHUB_OUTPUT"
            fi
            STATUS="passed"
          else
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run, but candidate source tag ${LATEST} did not complete the expected Arm64 build-and-launch checks." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Relion source tag ${CURRENT} passed CPU-only Arm64 source-build validation in this run, but candidate source tag ${LATEST} did not complete the expected Arm64 build-and-launch checks."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Next version installed on Arm64: ${NEXT_INSTALLED}"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "passed" ]; then
            exit 1
          fi

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          mkdir -p test-results
          cat > test-results/relion.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Relion",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "HPC"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed || 0 }},
              "failed": ${{ steps.summary.outputs.failed || 0 }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Relion binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Relion help output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Relion CLI options", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}",
              "core_failed": ${{ steps.summary.outputs.core_failed || 0 }}
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relion-test-results
          path: test-results/relion.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## Relion Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
