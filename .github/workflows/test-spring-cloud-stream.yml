name: Test Spring Cloud Stream on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-spring-cloud-stream.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-spring-cloud-stream.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-spring-cloud-stream.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-spring-cloud-stream.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-spring-cloud-stream.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-spring-cloud-stream.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-spring-cloud-stream.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-spring-cloud-stream.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-spring-cloud-stream.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-spring-cloud-stream.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-spring-cloud-stream.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-spring-cloud-stream.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-spring-cloud-stream.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-spring-cloud-stream.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-spring-cloud-stream.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-spring-cloud-stream.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-spring-cloud-stream.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/spring-cloud-stream.md"
      - ".github/workflows/test-spring-cloud-stream.yml"

jobs:
  test-spring-cloud-stream:
    runs-on: ubuntu-24.04-arm
    env:
      SPRING_BOOT_VERSION: "3.2.4"
      SPRING_CLOUD_VERSION: "2023.0.1"
      SPRING_CLOUD_STREAM_VERSION: "4.1.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Spring Cloud Stream'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spring-cloud-stream" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spring-cloud-stream" >> "$GITHUB_OUTPUT"
      - name: Install Spring Cloud Stream smoke project
        id: install
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          mkdir -p "${WORKDIR}/src/main/java/com/example" "${WORKDIR}/src/test/java/com/example"

          cat > "${WORKDIR}/pom.xml" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.example</groupId>
            <artifactId>spring-cloud-stream-smoke</artifactId>
            <version>1.0.0</version>
            <parent>
              <groupId>org.springframework.boot</groupId>
              <artifactId>spring-boot-starter-parent</artifactId>
              <version>${SPRING_BOOT_VERSION}</version>
              <relativePath/>
            </parent>
            <properties>
              <java.version>17</java.version>
              <spring-cloud.version>${SPRING_CLOUD_VERSION}</spring-cloud.version>
            </properties>
            <dependencyManagement>
              <dependencies>
                <dependency>
                  <groupId>org.springframework.cloud</groupId>
                  <artifactId>spring-cloud-dependencies</artifactId>
                  <version>\${spring-cloud.version}</version>
                  <type>pom</type>
                  <scope>import</scope>
                </dependency>
              </dependencies>
            </dependencyManagement>
            <dependencies>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter</artifactId>
              </dependency>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-stream</artifactId>
              </dependency>
              <dependency>
                <groupId>org.springframework.cloud</groupId>
                <artifactId>spring-cloud-stream-test-binder</artifactId>
                <scope>test</scope>
              </dependency>
              <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-test</artifactId>
                <scope>test</scope>
              </dependency>
            </dependencies>
          </project>
          EOF

          cat > "${WORKDIR}/src/main/java/com/example/StreamSmokeApplication.java" <<'EOF'
          package com.example;

          import java.util.function.Function;
          import org.springframework.boot.autoconfigure.SpringBootApplication;
          import org.springframework.context.annotation.Bean;

          @SpringBootApplication
          public class StreamSmokeApplication {
            @Bean
            Function<String, String> uppercase() {
              return value -> value.toUpperCase();
            }
          }
          EOF

          cat > "${WORKDIR}/src/test/java/com/example/StreamSmokeTest.java" <<'EOF'
          package com.example;

          import static org.assertj.core.api.Assertions.assertThat;

          import org.junit.jupiter.api.Test;
          import org.springframework.beans.factory.annotation.Autowired;
          import org.springframework.boot.test.context.SpringBootTest;
          import org.springframework.cloud.stream.binder.test.InputDestination;
          import org.springframework.cloud.stream.binder.test.OutputDestination;
          import org.springframework.messaging.Message;
          import org.springframework.messaging.support.GenericMessage;

          @SpringBootTest(classes = StreamSmokeApplication.class)
          class StreamSmokeTest {
            @Autowired
            InputDestination input;

            @Autowired
            OutputDestination output;

            @Test
            void uppercaseFlowWorks() {
              input.send(new GenericMessage<>("arm64".getBytes()), "uppercase-in-0");
              Message<byte[]> reply = output.receive(5000, "uppercase-out-0");
              assertThat(reply).isNotNull();
              assertThat(new String(reply.getPayload())).isEqualTo("ARM64");
            }
          }
          EOF

          echo "workdir=${WORKDIR}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Get Spring Cloud Stream version
        id: version
        run: |
          set -euo pipefail
          cd "${{ steps.install.outputs.workdir }}"
          mvn -q dependency:list -DincludeArtifactIds=spring-cloud-stream -DoutputFile=/tmp/scs-deps.txt >/dev/null
          VERSION=$(awk -F: '/spring-cloud-stream:jar/ {print $4; exit}' /tmp/scs-deps.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if command -v java >/dev/null 2>&1 && command -v mvn >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          if [ "${{ steps.version.outputs.version }}" = "${SPRING_CLOUD_STREAM_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output or Configuration
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"

          mvn -q help:effective-pom -Doutput=/tmp/scs-effective-pom.xml >/dev/null

          if grep -q 'spring-cloud-stream' /tmp/scs-effective-pom.xml && grep -q "${SPRING_CLOUD_VERSION}" /tmp/scs-effective-pom.xml; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)

          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd "${{ steps.install.outputs.workdir }}"

          mvn -q -Dtest=StreamSmokeTest test >/tmp/scs-functional.out 2>&1

          if grep -q 'Started StreamSmokeTest' /tmp/scs-functional.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/scs-functional.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Spring Cloud Stream Test Summary"
            echo ""
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Passed: ${{ steps.summary.outputs.passed }}"
            echo "- Failed: ${{ steps.summary.outputs.failed }}"
            echo "- Overall Status: ${{ steps.summary.outputs.overall_status }}"
          } >> "$GITHUB_STEP_SUMMARY"
