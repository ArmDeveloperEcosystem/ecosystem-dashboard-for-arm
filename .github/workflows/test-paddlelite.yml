name: Test Paddle-Lite on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-paddlelite.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-paddlelite.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-paddlelite.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-paddlelite.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-paddlelite.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-paddlelite.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-paddlelite.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-paddlelite.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-paddlelite.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-paddlelite.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-paddlelite.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-paddlelite.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-paddlelite.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-paddlelite.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-paddlelite.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-paddlelite.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-paddlelite.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-paddlelite.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-paddlelite.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-paddlelite.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-paddlelite.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-paddlelite.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-paddlelite.outputs.timestamp }}
jobs:
  test-paddlelite:
    runs-on: ubuntu-24.04-arm
    env:
      PADDLE_LITE_VERSION: "2.11"
      PADDLE_LITE_NEXT_VERSION: "2.12"
      PADDLE_LITE_ASSET_NAME: "inference_lite_lib.armlinux.armv8.gcc.tar.gz"
      PADDLE_LITE_INSTALL_ROOT: /opt/paddlelite-smoke
      PADDLE_LITE_WORKDIR: /tmp/paddlelite-smoke
      PADDLE_LITE_REGRESSION_ROOT: /tmp/paddlelite-regression

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Paddle-Lite'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=paddlelite" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/paddlelite" >> "$GITHUB_OUTPUT"
      - name: Install Paddle-Lite baseline
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl tar g++ file"
          sudo rm -rf "${PADDLE_LITE_INSTALL_ROOT}"
          sudo mkdir -p "${PADDLE_LITE_INSTALL_ROOT}"
          rm -rf "${PADDLE_LITE_WORKDIR}"
          mkdir -p "${PADDLE_LITE_WORKDIR}"

          curl -fsSL -o "${PADDLE_LITE_WORKDIR}/paddlelite-${PADDLE_LITE_VERSION}.tar.gz" \
            "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v${PADDLE_LITE_VERSION}/${PADDLE_LITE_ASSET_NAME}"
          tar -xzf "${PADDLE_LITE_WORKDIR}/paddlelite-${PADDLE_LITE_VERSION}.tar.gz" -C "${PADDLE_LITE_WORKDIR}"
          sudo cp -R "${PADDLE_LITE_WORKDIR}/inference_lite_lib.armlinux.armv8.gcc" "${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}"

          if [ -f "${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/include/paddle_api.h" ] && \
             [ -f "${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/lib/libpaddle_light_api_shared.so" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Paddle-Lite version
        id: version
        run: |
          set -euo pipefail
          echo "version=${PADDLE_LITE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${PADDLE_LITE_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Paddle-Lite version: ${PADDLE_LITE_VERSION}"
          echo "Detected next stable Paddle-Lite release with Arm64 asset: ${PADDLE_LITE_NEXT_VERSION}"

      - name: Test 1 - Check headers exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f "${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/include/paddle_api.h" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Arm64 shared library exists
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          LIB="${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/lib/libpaddle_light_api_shared.so"
          file "$LIB"
          if file "$LIB" | grep -qi "ARM aarch64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Compile smoke program
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SMOKE_DIR="${PADDLE_LITE_WORKDIR}/baseline-smoke"
          mkdir -p "${SMOKE_DIR}"
          cat > "${SMOKE_DIR}/paddlelite_smoke.cc" <<'EOF'
          #include <iostream>
          #include "paddle_api.h"

          int main() {
            paddle::lite_api::MobileConfig config;
            config.set_model_from_file("/tmp/paddle-lite.nb");
            std::cout << "Paddle-Lite config path: " << config.lite_model_file() << std::endl;
            return 0;
          }
          EOF

          g++ -std=c++17 \
            "${SMOKE_DIR}/paddlelite_smoke.cc" \
            -I"${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/include" \
            -L"${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/lib" \
            -Wl,-rpath,"${PADDLE_LITE_INSTALL_ROOT}/v${PADDLE_LITE_VERSION}/cxx/lib" \
            -lpaddle_light_api_shared -ldl \
            -o "${SMOKE_DIR}/paddlelite_smoke"

          if [ -x "${SMOKE_DIR}/paddlelite_smoke" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$("${PADDLE_LITE_WORKDIR}/baseline-smoke/paddlelite_smoke" 2>&1)
          echo "$OUTPUT"
          if printf '%s\n' "$OUTPUT" | grep -q "Paddle-Lite config path: /tmp/paddle-lite.nb"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${PADDLE_LITE_VERSION}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "null" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Paddle-Lite version ${CURRENT} passed smoke tests in this run, but the latest stable release with a Linux Arm64 GCC asset could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "${PADDLE_LITE_REGRESSION_ROOT}"
          mkdir -p "${PADDLE_LITE_REGRESSION_ROOT}"

          curl -fsSL -o "${PADDLE_LITE_REGRESSION_ROOT}/paddlelite-${LATEST}.tar.gz" \
            "https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v${LATEST}/${PADDLE_LITE_ASSET_NAME}"
          tar -xzf "${PADDLE_LITE_REGRESSION_ROOT}/paddlelite-${LATEST}.tar.gz" -C "${PADDLE_LITE_REGRESSION_ROOT}"

          NEXT_ROOT="${PADDLE_LITE_REGRESSION_ROOT}/inference_lite_lib.armlinux.armv8.gcc"
          NEXT_LIB="${NEXT_ROOT}/cxx/lib/libpaddle_light_api_shared.so"
          if ! file "$NEXT_LIB" | grep -qi "ARM aarch64"; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Paddle-Lite version ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not provide a usable Linux Arm64 shared library artifact." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          cat > "${PADDLE_LITE_REGRESSION_ROOT}/paddlelite_smoke.cc" <<'EOF'
          #include <iostream>
          #include "paddle_api.h"

          int main() {
            paddle::lite_api::MobileConfig config;
            config.set_model_from_file("/tmp/paddle-lite.nb");
            std::cout << "Paddle-Lite config path: " << config.lite_model_file() << std::endl;
            return 0;
          }
          EOF

          g++ -std=c++17 \
            "${PADDLE_LITE_REGRESSION_ROOT}/paddlelite_smoke.cc" \
            -I"${NEXT_ROOT}/cxx/include" \
            -L"${NEXT_ROOT}/cxx/lib" \
            -Wl,-rpath,"${NEXT_ROOT}/cxx/lib" \
            -lpaddle_light_api_shared -ldl \
            -o "${PADDLE_LITE_REGRESSION_ROOT}/paddlelite_smoke"

          NEXT_OUTPUT=$("${PADDLE_LITE_REGRESSION_ROOT}/paddlelite_smoke" 2>&1)
          echo "$NEXT_OUTPUT"

          if printf '%s\n' "$NEXT_OUTPUT" | grep -q "Paddle-Lite config path: /tmp/paddle-lite.nb"; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Paddle-Lite release ${CURRENT} passed smoke tests in this run. Regression validation installed the official Linux Arm64 archive for candidate release ${LATEST}, verified the shared library is AArch64, and compiled plus ran a real C++ smoke program against the candidate library. Paddle-Lite does not expose a standalone Linux version banner for this archive, so the installed version is tracked from the validated release asset." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Paddle-Lite release ${CURRENT} passed smoke tests in this run, but the candidate release ${LATEST} did not complete a usable Linux Arm64 compile-and-run validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Paddle-Lite Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check headers exist: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check Arm64 shared library exists: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Compile smoke program: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
