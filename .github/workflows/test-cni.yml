name: Test CNI on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/cni.md'
      - '.github/workflows/test-cni.yml'

jobs:
  test-cni:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_PLUGIN_VERSION: "v1.9.0"
      BASELINE_CNI_VERSION: "v1.3.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=cni" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/cni" >> "$GITHUB_OUTPUT"

      - name: Install CNI
        id: install
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar git iproute2

          GO_VERSION=$(curl -fsSL https://go.dev/VERSION?m=text | head -n 1)
          curl -fsSL -o go.tar.gz "https://go.dev/dl/${GO_VERSION}.linux-arm64.tar.gz"
          rm -rf "$HOME/go-toolchain"
          mkdir -p "$HOME/go-toolchain"
          tar -xzf go.tar.gz -C "$HOME/go-toolchain"

          echo "$HOME/go-toolchain/go/bin" >> "$GITHUB_PATH"
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"

          curl -fsSL -o cni-plugins.tgz "https://github.com/containernetworking/plugins/releases/download/${BASELINE_PLUGIN_VERSION}/cni-plugins-linux-arm64-${BASELINE_PLUGIN_VERSION}.tgz"
          mkdir -p cni-plugins
          tar -xzf cni-plugins.tgz -C cni-plugins

          export PATH="$HOME/go-toolchain/go/bin:$PATH"
          GOBIN="$HOME/go/bin" go install "github.com/containernetworking/cni/cnitool@${BASELINE_CNI_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

          if [ -x "cni-plugins/bridge" ] && [ -x "$HOME/go/bin/cnitool" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get CNI versions
        id: version
        run: |
          VERSION=$(./cni-plugins/bridge -version 2>&1 | awk '{print $5}' | head -n 1 || echo "unknown")
          LATEST_PLUGIN=$(curl -fsSL https://api.github.com/repos/containernetworking/plugins/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')
          LATEST_CNI=$(curl -fsSL https://api.github.com/repos/containernetworking/cni/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_plugin=$LATEST_PLUGIN" >> "$GITHUB_OUTPUT"
          echo "latest_cni=$LATEST_CNI" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "cni-plugins/bridge" ] && [ -x "cni-plugins/host-local" ] && command -v cnitool >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          BRIDGE_VERSION_OUTPUT=$(./cni-plugins/bridge -version 2>&1)
          if grep -q "^CNI bridge plugin ${{ env.BASELINE_PLUGIN_VERSION }}" <<< "$BRIDGE_VERSION_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$BRIDGE_VERSION_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Or Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          CNITOOL_OUTPUT=$(cnitool 2>&1 || true)
          if grep -q '^cnitool:' <<< "$CNITOOL_OUTPUT"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$CNITOOL_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)

          mkdir -p netdir
          cat > netdir/10-mynet.conf <<'EOF'
          {
            "cniVersion": "1.0.0",
            "name": "mynet",
            "type": "bridge",
            "bridge": "cni0",
            "isGateway": true,
            "ipMasq": true,
            "ipam": {
              "type": "host-local",
              "subnet": "10.22.0.0/16"
            }
          }
          EOF

          sudo ip netns delete cni-smoke 2>/dev/null || true
          sudo ip netns add cni-smoke
          trap 'sudo --preserve-env=NETCONFPATH,CNI_PATH "$HOME/go/bin/cnitool" del mynet /run/netns/cni-smoke >/dev/null 2>&1 || true; sudo ip netns delete cni-smoke >/dev/null 2>&1 || true' EXIT

          export NETCONFPATH="$PWD/netdir"
          export CNI_PATH="$PWD/cni-plugins"
          sudo --preserve-env=NETCONFPATH,CNI_PATH "$HOME/go/bin/cnitool" add mynet /run/netns/cni-smoke > cni-add.txt 2>&1
          sudo ip netns exec cni-smoke ip addr show > cni-addr.txt

          if grep -q '10\.22\.0\.2/16' cni-addr.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat cni-add.txt || true
            cat cni-addr.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          sudo --preserve-env=NETCONFPATH,CNI_PATH "$HOME/go/bin/cnitool" del mynet /run/netns/cni-smoke > cni-del.txt 2>&1 || true
          sudo ip netns delete cni-smoke >/dev/null 2>&1 || true
          trap - EXIT

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.latest_plugin }}" = "${BASELINE_PLUGIN_VERSION}" ] && \
             [ "${{ steps.version.outputs.latest_cni }}" = "${BASELINE_CNI_VERSION}" ]; then
            echo "decision=at_latest" >> "$GITHUB_OUTPUT"
            echo "note=Pinned CNI plugin and cnitool versions already match the latest stable releases." >> "$GITHUB_OUTPUT"
          else
            echo "decision=manual_review_needed" >> "$GITHUB_OUTPUT"
            echo "note=Newer stable CNI plugin or cnitool release exists and should be regression-checked before bumping." >> "$GITHUB_OUTPUT"
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status=$1
            local duration=$2
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + $duration))
          }

          check_test "${{ steps.test1.outputs.status }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results

          cat > test-results/cni.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Container Network Interface",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Networking"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${{ github.job }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                { "name": "Test 1 - Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }} },
                { "name": "Test 2 - Version Check", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }} },
                { "name": "Test 3 - Help Or Configuration Validation", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }} },
                { "name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }} },
                { "name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }} },
                { "name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }} }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cni-test-results
          path: test-results/cni.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## CNI Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned plugin version:** ${{ env.BASELINE_PLUGIN_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned cnitool version:** ${{ env.BASELINE_CNI_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest plugin checked:** ${{ steps.version.outputs.latest_plugin }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest cnitool checked:** ${{ steps.version.outputs.latest_cni }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Go toolchain used:** ${{ steps.install.outputs.go_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression decision:** ${{ steps.test6.outputs.decision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression note:** ${{ steps.test6.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upgrade candidate checked:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision || 'manual_review_needed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Pinned current version passed smoke tests. Upgrade-candidate validation is still pending.' }}" >> "$GITHUB_STEP_SUMMARY"
