name: Test VictoriaMetrics on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-victoriametrics.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-victoriametrics.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-victoriametrics.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-victoriametrics.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-victoriametrics.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-victoriametrics.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-victoriametrics.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-victoriametrics.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-victoriametrics.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-victoriametrics.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-victoriametrics.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-victoriametrics.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-victoriametrics.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-victoriametrics.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-victoriametrics.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-victoriametrics.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-victoriametrics.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-victoriametrics.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-victoriametrics.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-victoriametrics.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-victoriametrics.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-victoriametrics.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-victoriametrics.outputs.timestamp }}
jobs:
  test-victoriametrics:
    runs-on: ubuntu-24.04-arm
    env:
      VICTORIAMETRICS_VERSION: "1.137.0"
      VICTORIAMETRICS_NEXT_VERSION: "1.138.0"
      VICTORIAMETRICS_HOME: /opt/victoriametrics-smoke

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'VictoriaMetrics'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=victoriametrics" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/victoriametrics" >> "$GITHUB_OUTPUT"
          echo "current_version=${VICTORIAMETRICS_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install VictoriaMetrics
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget tar curl

          URL="https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v${VICTORIAMETRICS_VERSION}/victoria-metrics-linux-arm64-v${VICTORIAMETRICS_VERSION}.tar.gz"
          wget -q -O /tmp/victoriametrics.tgz "$URL"

          sudo rm -rf "$VICTORIAMETRICS_HOME"
          sudo mkdir -p "$VICTORIAMETRICS_HOME"
          sudo tar -xzf /tmp/victoriametrics.tgz -C "$VICTORIAMETRICS_HOME"
          sudo chmod +x "$VICTORIAMETRICS_HOME/victoria-metrics-prod"
          sudo ln -sf "$VICTORIAMETRICS_HOME/victoria-metrics-prod" /usr/local/bin/victoria-metrics

          if command -v victoria-metrics >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get VictoriaMetrics version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(victoria-metrics --version 2>&1 | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//' || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${VICTORIAMETRICS_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v victoria-metrics >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if victoria-metrics --version 2>&1 | grep -q "v${VICTORIAMETRICS_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Configuration Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if victoria-metrics -help 2>&1 | grep -q "time series database"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          victoria-metrics -storageDataPath=/tmp/victoriametrics-data -httpListenAddr=127.0.0.1:8428 >/tmp/victoriametrics.log 2>&1 &
          VM_PID=$!
          cleanup() {
            kill "$VM_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          SUCCESS=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8428/health >/tmp/victoriametrics-health.txt 2>/dev/null; then
              SUCCESS=1
              break
            fi
            sleep 1
          done

          if [ "$SUCCESS" -eq 1 ] && grep -q '^OK$' /tmp/victoriametrics-health.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/victoriametrics.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          NEXT_URL="https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v${LATEST}/victoria-metrics-linux-arm64-v${LATEST}.tar.gz"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned VictoriaMetrics version $CURRENT passed smoke tests in this run, but the next stable version could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          NEXT_PID=""
          cleanup() {
            if [ -n "$NEXT_PID" ]; then
              kill "$NEXT_PID" >/dev/null 2>&1 || true
            fi
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT
          ARCHIVE_NAME=$(basename "${NEXT_URL%%\?*}")
          ARCHIVE_PATH="$TMPDIR/$ARCHIVE_NAME"

          if curl -fsSL "$NEXT_URL" -o "$ARCHIVE_PATH"; then
            echo "Next version download status: passed"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned VictoriaMetrics version $CURRENT passed smoke tests in this run, but the candidate artifact $NEXT_URL could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          case "$ARCHIVE_NAME" in
            *.tar.gz|*.tgz)
              tar -xzf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.tar.xz)
              tar -xJf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.zip)
              unzip -q "$ARCHIVE_PATH" -d "$TMPDIR"
              ;;
            *)
              chmod +x "$ARCHIVE_PATH" || true
              ;;
          esac

          NEXT_BINARY=$(find "$TMPDIR" -type f -name 'victoria-metrics-prod' | head -n 1)
          if [ -z "$NEXT_BINARY" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned VictoriaMetrics version $CURRENT passed smoke tests in this run, but the candidate Arm64 archive from $NEXT_URL did not expose the expected victoria-metrics-prod binary." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          chmod +x "$NEXT_BINARY"
          NEXT_INSTALLED_VERSION=$("$NEXT_BINARY" --version 2>&1 | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//' || true)
          NEXT_INSTALLED_VERSION="${NEXT_INSTALLED_VERSION:-$LATEST}"

          "$NEXT_BINARY" -storageDataPath="$TMPDIR/vmdata" -httpListenAddr=127.0.0.1:18428 >/tmp/victoriametrics-next.log 2>&1 &
          NEXT_PID=$!
          NEXT_OK=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18428/health >/tmp/victoriametrics-next-health.txt 2>/dev/null && \
               grep -q '^OK$' /tmp/victoriametrics-next-health.txt; then
              NEXT_OK=1
              break
            fi
            sleep 1
          done

          if [ "$NEXT_OK" -ne 1 ]; then
            cat /tmp/victoriametrics-next.log || true
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned VictoriaMetrics version $CURRENT passed smoke tests in this run, but candidate ${LATEST} failed the isolated Arm64 health-check startup validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned VictoriaMetrics version $CURRENT passed smoke tests in this run. Regression validation downloaded the candidate ${LATEST} Arm64 artifact from $NEXT_URL and the isolated startup plus health-check validation also passed successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          add_core() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_any() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          add_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          add_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          add_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          add_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          add_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          add_any "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ] && [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## VictoriaMetrics Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Configuration Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || env.VICTORIAMETRICS_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Pending regression install validation' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'No regression comparison recorded.' }}" >> "$GITHUB_STEP_SUMMARY"
