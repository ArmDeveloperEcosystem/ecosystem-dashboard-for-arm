name: Test NATS on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-nats.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-nats.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-nats.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-nats.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-nats.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-nats.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-nats.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-nats.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-nats.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-nats.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-nats.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-nats.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-nats.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-nats.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-nats.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-nats.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-nats.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-nats.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-nats.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-nats.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-nats.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-nats.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-nats.outputs.timestamp }}
jobs:
  test-nats:
    runs-on: ubuntu-24.04-arm
    env:
      SERVER_VERSION: "2.10.26"
      SERVER_NEXT_VERSION: "2.10.27"
      CLI_VERSION: "0.2.0"
      CLI_NEXT_VERSION: "0.2.1"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'NATS'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=nats" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/nats" >> "$GITHUB_OUTPUT"
          echo "current_version=${SERVER_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install NATS
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "curl unzip file"
          ROOT="$HOME/nats-smoke"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          cd "$ROOT"

          curl -fsSL -o nats-server.tgz "https://github.com/nats-io/nats-server/releases/download/v${SERVER_VERSION}/nats-server-v${SERVER_VERSION}-linux-arm64.tar.gz"
          tar -xzf nats-server.tgz
          install -m 0755 "nats-server-v${SERVER_VERSION}-linux-arm64/nats-server" "$ROOT/nats-server"

          curl -fsSL -o natscli.zip "https://github.com/nats-io/natscli/releases/download/v${CLI_VERSION}/nats-${CLI_VERSION}-linux-arm64.zip"
          python3 - <<'PY'
          import zipfile
          zipfile.ZipFile("natscli.zip").extractall(".")
          PY
          chmod +x "nats-${CLI_VERSION}-linux-arm64/nats"
          install -m 0755 "nats-${CLI_VERSION}-linux-arm64/nats" "$ROOT/nats"

          echo "install_root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get NATS version
        id: version
        run: |
          set -euo pipefail
          VERSION=$("${{ steps.install.outputs.install_root }}/nats-server" --version | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${SERVER_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_cli=${CLI_NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.install_root }}/nats-server" ] && [ -x "${{ steps.install.outputs.install_root }}/nats" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.install_root }}/nats-server" --version 2>&1 | grep -Fq "v${SERVER_VERSION}" && \
             "${{ steps.install.outputs.install_root }}/nats" --version 2>&1 | grep -Fq "${CLI_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if "${{ steps.install.outputs.install_root }}/nats" --help 2>&1 | grep -qi '^usage:'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file "${{ steps.install.outputs.install_root }}/nats-server" | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          "${{ steps.install.outputs.install_root }}/nats-server" -js -p 4222 >"$HOME/nats-smoke/nats-server.log" 2>&1 &
          NATS_PID=$!
          cleanup() {
            kill "$NATS_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 2
          "${{ steps.install.outputs.install_root }}/nats" --server nats://127.0.0.1:4222 sub smoke.test --count 1 >"$HOME/nats-smoke/sub.txt" 2>&1 &
          SUB_PID=$!
          sleep 1
          "${{ steps.install.outputs.install_root }}/nats" --server nats://127.0.0.1:4222 pub smoke.test hello-arm64 >"$HOME/nats-smoke/pub.txt" 2>&1
          wait "$SUB_PID"
          if grep -q 'hello-arm64' "$HOME/nats-smoke/sub.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$HOME/nats-smoke/nats-server.log" || true
            cat "$HOME/nats-smoke/sub.txt" || true
            cat "$HOME/nats-smoke/pub.txt" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          LATEST_CLI="${{ steps.version.outputs.latest_cli || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ -z "$LATEST_CLI" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST_CLI" = "unknown" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NATS server version $CURRENT and CLI version ${CLI_VERSION} passed smoke tests in this run, but the explicit next Arm64 server or CLI version could not be resolved for regression validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "Details: Current pinned NATS server version $CURRENT and CLI version ${CLI_VERSION} passed smoke tests in this run, but the explicit next Arm64 server or CLI version could not be resolved for regression validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ] || [ "${CLI_VERSION}" = "${LATEST_CLI}" ]; then
            echo "next_installed_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned NATS baseline already matches the latest stable server or CLI release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 pair." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $CURRENT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "Details: Pinned NATS baseline already matches the latest stable server or CLI release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 pair."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TMPDIR=$(mktemp -d)
          SERVER_TGZ="$TMPDIR/nats-server.tgz"
          CLI_ZIP="$TMPDIR/natscli.zip"
          curl -fsSL -o "$SERVER_TGZ" "https://github.com/nats-io/nats-server/releases/download/v${LATEST}/nats-server-v${LATEST}-linux-arm64.tar.gz"
          tar -xzf "$SERVER_TGZ" -C "$TMPDIR"
          curl -fsSL -o "$CLI_ZIP" "https://github.com/nats-io/natscli/releases/download/v${LATEST_CLI}/nats-${LATEST_CLI}-linux-arm64.zip"
          python3 - <<PY
          import zipfile
          zipfile.ZipFile("$CLI_ZIP").extractall("$TMPDIR")
          PY
          NEXT_SERVER=$(find "$TMPDIR" -type f -name nats-server | head -n 1)
          NEXT_CLI=$(find "$TMPDIR" -type f -path '*nats-*linux-arm64/nats' | head -n 1)
          chmod +x "$NEXT_SERVER" "$NEXT_CLI"
          NEXT_INSTALLED_VERSION=$("$NEXT_SERVER" --version 2>&1 | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          NEXT_CLI_VERSION=$("$NEXT_CLI" --version 2>&1 | head -n 1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)

          if file "$NEXT_SERVER" | grep -qiE 'arm aarch64|aarch64' && [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ] && [ "$NEXT_CLI_VERSION" = "$LATEST_CLI" ]; then
            echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NATS server version $CURRENT and CLI version ${CLI_VERSION} passed smoke tests in this run. Regression validation then verified the newer stable Arm64 server ${LATEST} and CLI ${LATEST_CLI} successfully." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned NATS server version $CURRENT and CLI version ${CLI_VERSION} passed smoke tests in this run. Regression validation re-downloaded the newer Arm64 server ${LATEST} and CLI ${LATEST_CLI}, and the staged binaries reported exact versions ${NEXT_INSTALLED_VERSION} and ${NEXT_CLI_VERSION}."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-install_failed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned NATS server version $CURRENT passed smoke tests in this run, but the latest Arm64 server or CLI artifact failed version or architecture validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-install_failed}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned NATS server version $CURRENT passed smoke tests in this run, but the latest Arm64 server or CLI artifact failed version or architecture validation."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                REGRESSION_RESULT="Regression validation failed"
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable' }}"
          echo "## NATS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
