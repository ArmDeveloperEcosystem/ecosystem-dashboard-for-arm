name: Test OceanBase on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-oceanbase.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-oceanbase.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-oceanbase.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-oceanbase.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-oceanbase.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-oceanbase.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-oceanbase.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-oceanbase.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-oceanbase.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-oceanbase.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-oceanbase.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-oceanbase.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-oceanbase.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-oceanbase.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-oceanbase.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-oceanbase.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-oceanbase.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-oceanbase.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-oceanbase.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-oceanbase.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-oceanbase.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-oceanbase.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-oceanbase.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/oceanbase.md"
      - ".github/workflows/test-oceanbase.yml"

jobs:
  test-oceanbase:
    runs-on: ubuntu-24.04-arm
    env:
      OCEANBASE_BASELINE_TAG: "v4.2.5_CE_BP1"
      OCEANBASE_BASELINE_VERSION: "4.2.5.1"
      OCEANBASE_BASELINE_ASSET: "oceanbase-ce-4.2.5.1-101000092024120918.nonlse.el8.aarch64.rpm"
      OCEANBASE_NEXT_TAG: "v4.2.5_CE_BP2"
      OCEANBASE_NEXT_VERSION: "4.2.5.2"
      OCEANBASE_NEXT_ASSET: "oceanbase-ce-4.2.5.2-102000062025012010.nonlse.el8.aarch64.rpm"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'OceanBase'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=oceanbase" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/oceanbase" >> "$GITHUB_OUTPUT"
          echo "current_version=${OCEANBASE_BASELINE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install OceanBase baseline
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl rpm2cpio cpio libaio1t64 file

          STAGE_DIR=$(mktemp -d)
          COMPAT_DIR=$(mktemp -d)
          AIO_LIB=$(ldconfig -p | awk '/libaio.so.1t64/ {print $NF; exit}')
          if [ -z "$AIO_LIB" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ln -s "$AIO_LIB" "${COMPAT_DIR}/libaio.so.1"

          curl -fsSL -o "${STAGE_DIR}/oceanbase.rpm" "https://github.com/oceanbase/oceanbase/releases/download/${OCEANBASE_BASELINE_TAG}/${OCEANBASE_BASELINE_ASSET}"
          (
            cd "$STAGE_DIR"
            rpm2cpio oceanbase.rpm | cpio -idmv >/tmp/oceanbase-install.log 2>&1
          )

          OBSERVER_BIN=$(find "$STAGE_DIR" -type f -name observer | head -n 1)
          if [ -z "$OBSERVER_BIN" ] || [ ! -x "$OBSERVER_BIN" ]; then
            cat /tmp/oceanbase-install.log || true
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "compat_dir=$COMPAT_DIR" >> "$GITHUB_OUTPUT"
          echo "observer_bin=$OBSERVER_BIN" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get OceanBase version
        id: version
        run: |
          set -euo pipefail
          COMPAT_DIR="${{ steps.install.outputs.compat_dir }}"
          OBSERVER_BIN="${{ steps.install.outputs.observer_bin }}"
          VERSION=$(LD_LIBRARY_PATH="${COMPAT_DIR}:${LD_LIBRARY_PATH:-}" "$OBSERVER_BIN" -V 2>&1 | sed -n 's/^observer (OceanBase_CE \([0-9.]*\)).*/\1/p' | head -n 1 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${OCEANBASE_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${OCEANBASE_NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_asset=${OCEANBASE_NEXT_ASSET}" >> "$GITHUB_OUTPUT"
          echo "latest_url=https://github.com/oceanbase/oceanbase/releases/download/${OCEANBASE_NEXT_TAG}/${OCEANBASE_NEXT_ASSET}" >> "$GITHUB_OUTPUT"
          echo "Detected OceanBase version: $VERSION"

      - name: Test 1 - Check observer binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "${{ steps.install.outputs.observer_bin }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check exact baseline version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.version }}" = "${OCEANBASE_BASELINE_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check binary architecture
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if file "${{ steps.install.outputs.observer_bin }}" | grep -q 'ARM aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${{ steps.install.outputs.observer_bin }}" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Check runtime dependencies
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMPAT_DIR="${{ steps.install.outputs.compat_dir }}"
          if LD_LIBRARY_PATH="${COMPAT_DIR}:${LD_LIBRARY_PATH:-}" ldd "${{ steps.install.outputs.observer_bin }}" | tee /tmp/oceanbase-ldd.log | grep -q 'not found'; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMPAT_DIR="${{ steps.install.outputs.compat_dir }}"
          OBSERVER_BIN="${{ steps.install.outputs.observer_bin }}"
          if LD_LIBRARY_PATH="${COMPAT_DIR}:${LD_LIBRARY_PATH:-}" "$OBSERVER_BIN" -V 2>&1 | grep -q "OceanBase_CE ${OCEANBASE_BASELINE_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST_TAG="${{ steps.version.outputs.latest_tag || '' }}"
          LATEST="${{ steps.version.outputs.latest || '' }}"
          LATEST_ASSET="${{ steps.version.outputs.latest_asset || '' }}"
          LATEST_URL="${{ steps.version.outputs.latest_url || '' }}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST:-unknown}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: ${LATEST:-unknown}"

          if [ -z "$LATEST_TAG" ] || [ -z "$LATEST" ] || [ -z "$LATEST_ASSET" ] || [ -z "$LATEST_URL" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OceanBase version ${CURRENT} passed smoke tests in this run, but the latest official Arm64 RPM candidate could not be resolved for install validation." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          NEXT_DIR=$(mktemp -d)
          NEXT_COMPAT_DIR=$(mktemp -d)
          trap 'rm -rf "$NEXT_DIR" "$NEXT_COMPAT_DIR"' EXIT
          AIO_LIB=$(ldconfig -p | awk '/libaio.so.1t64/ {print $NF; exit}')
          ln -s "$AIO_LIB" "${NEXT_COMPAT_DIR}/libaio.so.1"

          curl -fsSL -o "${NEXT_DIR}/oceanbase.rpm" "$LATEST_URL"
          (
            cd "$NEXT_DIR"
            rpm2cpio oceanbase.rpm | cpio -idmv >/tmp/oceanbase-regression.log 2>&1
          )
          NEXT_OBSERVER=$(find "$NEXT_DIR" -type f -name observer | head -n 1)
          NEXT_INSTALLED_VERSION=$(LD_LIBRARY_PATH="${NEXT_COMPAT_DIR}:${LD_LIBRARY_PATH:-}" "$NEXT_OBSERVER" -V 2>&1 | sed -n 's/^observer (OceanBase_CE \([0-9.]*\)).*/\1/p' | head -n 1 | tr -d '\r')

          if [ -z "$NEXT_OBSERVER" ] || [ ! -x "$NEXT_OBSERVER" ] || [ -z "$NEXT_INSTALLED_VERSION" ] || LD_LIBRARY_PATH="${NEXT_COMPAT_DIR}:${LD_LIBRARY_PATH:-}" ldd "$NEXT_OBSERVER" | grep -q 'not found'; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OceanBase version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST_TAG} did not stage a usable Arm64 observer binary." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned baseline already matches the latest stable upstream release. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Tests 1-5 baseline must be older than the latest stable release"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          elif [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]; then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OceanBase version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate ${LATEST_TAG} on Arm64, and the staged observer binary reported version ${NEXT_INSTALLED_VERSION}." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned OceanBase version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST_TAG} reported version ${NEXT_INSTALLED_VERSION} instead of the expected latest stable version ${LATEST} on Arm64." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## OceanBase Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Check observer binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Check exact baseline version: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Check binary architecture: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Check runtime dependencies: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
