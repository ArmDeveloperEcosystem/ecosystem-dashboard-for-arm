name: Test SPDK on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/spdk.md"
      - ".github/workflows/test-spdk.yml"

jobs:
  test-spdk:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      actions: read
    env:
      SPDK_VERSION: "v22.09"
      SPDK_NEXT_VERSION: "v23.01"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=spdk" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/spdk" >> "$GITHUB_OUTPUT"
          echo "current_version=${SPDK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        id: deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libcunit1-dev \
            git \
            libaio-dev \
            libfuse3-dev \
            libibverbs-dev \
            libiscsi-dev \
            libjson-c-dev \
            libnuma-dev \
            librdmacm-dev \
            libssl-dev \
            liburing-dev \
            libuuid1 \
            meson \
            nasm \
            ninja-build \
            pciutils \
            pkg-config \
            python3-pyelftools \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            uuid-dev
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Install SPDK from source
        id: install
        run: |
          set -euo pipefail
          BASE_DIR="${RUNNER_TEMP}/spdk-baseline"
          rm -rf "$BASE_DIR"
          git clone --depth 1 --branch "${SPDK_VERSION}" --recurse-submodules https://github.com/spdk/spdk.git "$BASE_DIR"
          cd "$BASE_DIR"
          ./configure --disable-tests
          make -j"$(nproc)"

          if [ ! -x "$BASE_DIR/build/bin/spdk_tgt" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "source_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"
          echo "spdk_bin=$BASE_DIR/build/bin/spdk_tgt" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get SPDK version
        id: version
        run: |
          set -euo pipefail
          BASE_DIR="${{ steps.install.outputs.source_dir }}"
          VERSION=$(git -C "$BASE_DIR" describe --tags --exact-match 2>/dev/null || git -C "$BASE_DIR" describe --tags --always)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=${SPDK_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected SPDK version: $VERSION"
          echo "Next stable target: ${SPDK_NEXT_VERSION}"

      - name: Test 1 - Check SPDK binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SPDK_BIN="${{ steps.install.outputs.spdk_bin }}"
          if [ -x "$SPDK_BIN" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check source tag version
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "${{ steps.version.outputs.version }}" = "${SPDK_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check SPDK help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SPDK_BIN="${{ steps.install.outputs.spdk_bin }}"
          if "$SPDK_BIN" --help 2>&1 | grep -qiE "usage|reactor mask|memory channels"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SPDK_BIN="${{ steps.install.outputs.spdk_bin }}"
          if file "$SPDK_BIN" | grep -qiE "aarch64|arm64"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            file "$SPDK_BIN"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Prepare hugepages for SPDK runtime validation
        id: hugepages
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HUGE_DIR="/mnt/spdk-hugepages"
          sudo mkdir -p "$HUGE_DIR"
          if ! mountpoint -q "$HUGE_DIR"; then
            sudo mount -t hugetlbfs -o mode=1777 none "$HUGE_DIR"
          fi
          sudo chmod 1777 "$HUGE_DIR"
          if [ -w /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages ]; then
            echo 64 | sudo tee /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages >/dev/null
          else
            echo 64 | sudo tee /proc/sys/vm/nr_hugepages >/dev/null
          fi
          FREE_HUGEPAGES="$(cat /sys/kernel/mm/hugepages/hugepages-2048kB/free_hugepages 2>/dev/null || echo 0)"
          if [ "${FREE_HUGEPAGES}" -le 0 ]; then
            echo "huge_dir=$HUGE_DIR" >> "$GITHUB_OUTPUT"
            echo "free_hugepages=0" >> "$GITHUB_OUTPUT"
            echo "duration=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_OUTPUT"
            echo "Unable to reserve hugepages for SPDK runtime validation."
            exit 1
          fi
          echo "huge_dir=$HUGE_DIR" >> "$GITHUB_OUTPUT"
          echo "free_hugepages=${FREE_HUGEPAGES}" >> "$GITHUB_OUTPUT"
          echo "duration=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          SPDK_DIR="${{ steps.install.outputs.source_dir }}"
          SPDK_BIN="${{ steps.install.outputs.spdk_bin }}"
          HUGE_DIR="${{ steps.hugepages.outputs.huge_dir }}"
          cd "$SPDK_DIR"
          # Real bounded startup using runner-provisioned hugepages and no PCI probing.
          if timeout 10s "$SPDK_BIN" -u -m 0x1 -s 64 --huge-dir "$HUGE_DIR" >/tmp/spdk_tgt_baseline.log 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            RC=$?
            if [ "$RC" -eq 124 ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              tail -n 80 /tmp/spdk_tgt_baseline.log || true
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          CANDIDATE_VERSION="${SPDK_NEXT_VERSION}"
          HUGE_DIR="${{ steps.hugepages.outputs.huge_dir }}"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${CANDIDATE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" = "$CANDIDATE_VERSION" ]; then
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline version already equals the latest stable candidate for this workflow." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_DIR="${RUNNER_TEMP}/spdk-candidate"
          rm -rf "$NEXT_DIR"
          git clone --depth 1 --branch "$CANDIDATE_VERSION" --recurse-submodules https://github.com/spdk/spdk.git "$NEXT_DIR"
          cd "$NEXT_DIR"
          ./configure --disable-tests
          make -j"$(nproc)"

          NEXT_BIN="$NEXT_DIR/build/bin/spdk_tgt"
          if [ ! -x "$NEXT_BIN" ]; then
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Candidate source build did not produce build/bin/spdk_tgt on Arm64." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! "$NEXT_BIN" --help 2>&1 | grep -qiE "usage|reactor mask|memory channels"; then
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "comparison=Candidate spdk_tgt did not return expected help output on Arm64." >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if timeout 10s "$NEXT_BIN" -u -m 0x1 -s 64 --huge-dir "$HUGE_DIR" >/tmp/spdk_tgt_candidate.log 2>&1; then
            :
          else
            RC=$?
            if [ "$RC" -ne 124 ]; then
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              tail -n 80 /tmp/spdk_tgt_candidate.log || true
              echo "comparison=Candidate spdk_tgt could not complete bounded runtime startup on Arm64." >> "$GITHUB_OUTPUT"
              END_TIME=$(date +%s)
              echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

          echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=${CANDIDATE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          echo "comparison=Baseline ${CURRENT_VERSION} and candidate ${CANDIDATE_VERSION} both built from upstream source and passed Arm64 smoke checks." >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          set -euo pipefail
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release)
                REGRESSION_RESULT="Current stable version already validated on Arm64"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "skipped" ]; then
                  REGRESSION_RESULT="Regression validation skipped"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0

          check_core_test() {
            local test_status="${1:-skipped}"
            local test_duration="${2:-0}"
            if [ "$test_status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + test_duration))
          }

          check_test6() {
            local test_status="${1:-skipped}"
            local test_duration="${2:-0}"
            case "$test_status" in
              passed)
                PASSED=$((PASSED + 1))
                ;;
              failed)
                FAILED=$((FAILED + 1))
                ;;
              skipped)
                ;;
              *)
                FAILED=$((FAILED + 1))
                ;;
            esac
            TOTAL_DURATION=$((TOTAL_DURATION + test_duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test6 "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results

          JOB_NAME="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --paginate --jq '.jobs[] | [.name, .html_url] | @tsv' 2>/dev/null | awk -F '\t' -v job="$JOB_NAME" '$1 == job " / " job || $1 == job || $1 ~ (" / " job "$") { print $2; exit }' || true)
          if [ -z "${JOB_URL:-}" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          cat > test-results/spdk.json << EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "SPDK",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Storage"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {
                  "name": "Test 1 - Check SPDK binary exists",
                  "status": "${{ steps.test1.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}
                },
                {
                  "name": "Test 2 - Check source tag version",
                  "status": "${{ steps.test2.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}
                },
                {
                  "name": "Test 3 - Check SPDK help output",
                  "status": "${{ steps.test3.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}
                },
                {
                  "name": "Test 4 - Architecture verification",
                  "status": "${{ steps.test4.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}
                },
                {
                  "name": "Test 5 - Functional validation",
                  "status": "${{ steps.test5.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}
                },
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'skipped' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spdk-test-results
          path: test-results/spdk.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          set -euo pipefail
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          case "$DECISION" in
            next_install_validated|safe_to_upgrade)
              REGRESSION_RESULT="Next version installed successfully on Arm64"
              ;;
            next_install_failed|next_lookup_failed)
              REGRESSION_RESULT="Next version install failed on Arm64"
              ;;
            no_newer_stable_available|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release)
              REGRESSION_RESULT="Current stable version already validated on Arm64"
              ;;
            *)
              if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                REGRESSION_RESULT="Regression validation passed"
              elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "skipped" ]; then
                REGRESSION_RESULT="Regression validation skipped"
              else
                REGRESSION_RESULT="Regression validation failed"
              fi
              ;;
          esac

          {
            echo "## SPDK Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Test 1 - Check SPDK binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Test 2 - Check source tag version: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Test 3 - Check SPDK help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Test 4 - Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Test 5 - Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'not_yet_checked' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${REGRESSION_RESULT}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
