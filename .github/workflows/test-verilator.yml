name: Test Verilator on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-verilator.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-verilator.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-verilator.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-verilator.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-verilator.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-verilator.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-verilator.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-verilator.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-verilator.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-verilator.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-verilator.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-verilator.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-verilator.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-verilator.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-verilator.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-verilator.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-verilator.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-verilator.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-verilator.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-verilator.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-verilator.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-verilator.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-verilator.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-verilator.outputs.timestamp }}

jobs:
  test-verilator:
    runs-on: ubuntu-24.04-arm
    env:
      BASELINE_VERSION: "3.856"
      PACKAGE_SLUG: "verilator"
      LANE_KIND: "github release / source-build-or-tarball"
      DOWNLOAD_URL: "https://github.com/verilator/verilator/tags"
      HOMEPAGE_URL: "https://verilator.org/"
      OFFICIAL_DOCS: "https://verilator.org/guide/latest/install.html#git-install"
      GITHUB_REPO: "verilator/verilator"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Verilator'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "applicable"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=verilator" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/linux/opensource_packages/verilator" >> "$GITHUB_OUTPUT"

      - name: Install baseline source or artifact
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update >/dev/null
          sudo apt-get install -y git curl jq tar unzip file ca-certificates >/dev/null
          rm -rf baseline-src baseline-external
          mkdir -p baseline-src baseline-external
          if [ -n "$GITHUB_REPO" ]; then
            RESOLVED_TAG=""
            for CANDIDATE in "$BASELINE_VERSION" "v$BASELINE_VERSION"; do
              if git ls-remote --tags --refs "https://github.com/$GITHUB_REPO.git" "refs/tags/$CANDIDATE" | grep -q .; then
                RESOLVED_TAG="$CANDIDATE"
                break
              fi
            done
            if [ -n "$RESOLVED_TAG" ]; then
              git clone --depth 1 --branch "$RESOLVED_TAG" "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"
            else
              git clone --depth 1 "https://github.com/$GITHUB_REPO.git" baseline-src >/dev/null 2>&1 || true
              echo "resolved_tag=default_branch" >> "$GITHUB_OUTPUT"
            fi
            if [ -d baseline-src/.git ] || [ -f baseline-src/README.md ] || [ -n "$(find baseline-src -mindepth 1 -maxdepth 2 -print -quit 2>/dev/null)" ]; then
              echo "install_mode=github_source" >> "$GITHUB_OUTPUT"
              echo "install_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if curl -fsLI "$DOWNLOAD_URL" >/dev/null 2>&1 || curl -fsLI "$HOMEPAGE_URL" >/dev/null 2>&1; then
            printf 'download=%s\nhomepage=%s\ndocs=%s\n' "$DOWNLOAD_URL" "$HOMEPAGE_URL" "$OFFICIAL_DOCS" > baseline-external/metadata.txt
            echo "resolved_tag=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_mode=external_artifact" >> "$GITHUB_OUTPUT"
            echo "install_status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "install_mode=unresolved" >> "$GITHUB_OUTPUT"
          echo "install_status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Get baseline version
        id: version
        run: |
          echo "version=$BASELINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected baseline version: $BASELINE_VERSION"

      - name: Test 1 - Check baseline acquisition
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "${{ steps.install.outputs.install_status || 'failed' }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version evidence
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -n "$BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check package-specific source markers
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          PKG="${{ steps.metadata.outputs.package_slug }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            MARKERS=""
            case "$PKG" in
              shap) MARKERS="shap/__init__.py,setup.py,pyproject.toml" ;;
              sparks-rapids) MARKERS="README.md,pom.xml,build.gradle" ;;
              spice-opus) MARKERS="configure.ac,src,README" ;;
              sunshine) MARKERS="CMakeLists.txt,src,README.md" ;;
              tabpfn|tabpfn-time-series) MARKERS="pyproject.toml,setup.py,README.md" ;;
              tensorrt-llm) MARKERS="README.md,examples,cpp" ;;
              tensorrt) MARKERS="README.md,samples,python" ;;
              tilelang) MARKERS="pyproject.toml,setup.py,README.md" ;;
              turbovnc) MARKERS="CMakeLists.txt,README.txt,java" ;;
              ubuntudesktop) MARKERS="README.md,docs,debian" ;;
              ucx) MARKERS="configure.ac,CMakeLists.txt,README.md" ;;
              vcpkg) MARKERS="bootstrap-vcpkg.sh,ports,README.md" ;;
              velox) MARKERS="CMakeLists.txt,velox,README.md" ;;
              verible) MARKERS="WORKSPACE.bazel,verible,README.md" ;;
              verilator) MARKERS="configure.ac,src,README.rst" ;;
              veriloggen) MARKERS="setup.py,veriloggen,README.md" ;;
              vidgear) MARKERS="setup.py,vidgear,README.md" ;;
              warp) MARKERS="pyproject.toml,setup.py,README.md" ;;
              wsl) MARKERS="README.md,docs,src" ;;
              xpra) MARKERS="setup.py,xpra,README.md" ;;
              xschem) MARKERS="xschem.c,Makefile,README.md" ;;
              yosys) MARKERS="Makefile,kernel,README.md" ;;
              *) MARKERS="README.md,LICENSE" ;;
            esac

            FOUND_MARKER=""
            IFS=',' read -r -a marker_list <<< "$MARKERS"
            for marker in "${marker_list[@]}"; do
              marker_trimmed="$(echo "$marker" | xargs)"
              if [ -e "$marker_trimmed" ]; then
                FOUND_MARKER="$marker_trimmed"
                break
              fi
              CANDIDATE=$(find . -maxdepth 4 -name "$marker_trimmed" -print -quit 2>/dev/null || true)
              if [ -n "$CANDIDATE" ]; then
                FOUND_MARKER="${CANDIDATE#./}"
                break
              fi
            done

            if [ -n "$FOUND_MARKER" ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "manifest=$FOUND_MARKER" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "manifest=missing-package-marker" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            if [ -f baseline-external/metadata.txt ]; then
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "manifest=external-metadata" >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Run package-specific bounded smoke
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          MODE="${{ steps.install.outputs.install_mode || '' }}"
          PKG="${{ steps.metadata.outputs.package_slug }}"
          if [ "$MODE" = "github_source" ]; then
            cd baseline-src
            RESULT=""
            MANIFEST="${{ steps.test3.outputs.manifest || '' }}"

            case "$PKG" in
              shap|tabpfn|tabpfn-time-series|veriloggen|vidgear|warp|xpra)
                PY_FILE=$(find . -maxdepth 5 -type f -name '*.py' ! -path '*/tests/*' ! -path '*/.venv/*' -print -quit 2>/dev/null || true)
                [ -n "$PY_FILE" ]
                python3 -m py_compile "$PY_FILE"
                RESULT="python-py_compile:${PY_FILE#./}"
                ;;
              vcpkg)
                [ -f bootstrap-vcpkg.sh ] || [ -f ./scripts/bootstrap.sh ]
                if [ -f bootstrap-vcpkg.sh ]; then bash -n bootstrap-vcpkg.sh; fi
                RESULT="vcpkg-bootstrap-script-check"
                ;;
              verilator|yosys|xschem|spice-opus|ucx)
                if [ -f Makefile ]; then
                  make -n >/dev/null
                  RESULT="make-dry-run"
                elif [ -f configure.ac ]; then
                  grep -Eq 'AC_INIT\(' configure.ac
                  RESULT="autotools-configure-ac"
                else
                  [ -n "$MANIFEST" ]
                  RESULT="source-marker-smoke:${MANIFEST}"
                fi
                ;;
              sunshine|turbovnc|velox|tilelang|tensorrt|tensorrt-llm)
                if [ -f CMakeLists.txt ]; then
                  grep -Eiq 'project\s*\(|add_(library|executable)\s*\(' CMakeLists.txt
                  RESULT="cmake-project-smoke"
                elif [ -n "$MANIFEST" ]; then
                  RESULT="source-marker-smoke:${MANIFEST}"
                else
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                  echo "note=No safe bounded smoke command found for C/C++ package layout." >> "$GITHUB_OUTPUT"
                  exit 1
                fi
                ;;
              sparks-rapids|wsl|ubuntudesktop|verible)
                [ -n "$MANIFEST" ]
                RESULT="repo-structure-smoke:${MANIFEST}"
                ;;
              *)
                if [ -n "$MANIFEST" ]; then
                  RESULT="source-marker-smoke:${MANIFEST}"
                else
                  echo "status=failed" >> "$GITHUB_OUTPUT"
                  echo "note=No bounded smoke command could be selected from the baseline source layout." >> "$GITHUB_OUTPUT"
                  exit 1
                fi
                ;;
            esac

            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "note=Executed package-specific bounded smoke: $RESULT" >> "$GITHUB_OUTPUT"
          else
            if [ -f baseline-external/metadata.txt ]; then
              grep -Eq '^download=https?://' baseline-external/metadata.txt
              grep -Eq '^homepage=https?://' baseline-external/metadata.txt
              echo "status=passed" >> "$GITHUB_OUTPUT"
              echo "note=Validated external artifact metadata and source discovery links for the pinned baseline." >> "$GITHUB_OUTPUT"
            else
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        uses: ./.github/actions/generic-source-regression-check
        with:
          baseline_version: ${{ steps.version.outputs.version || env.BASELINE_VERSION }}
          github_repo: ${{ env.GITHUB_REPO }}
          lane_kind: ${{ env.LANE_KIND }}
      - name: Calculate test summary
        id: summary
        if: always()
        run: |
          T1="${{ steps.test1.outputs.status || '' }}"
          T2="${{ steps.test2.outputs.status || '' }}"
          T3="${{ steps.test3.outputs.status || '' }}"
          T4="${{ steps.test4.outputs.status || '' }}"
          T5="${{ steps.test5.outputs.status || '' }}"
          T6="${{ steps.test6.outputs.status || '' }}"
          D1="${{ steps.test1.outputs.duration || '0' }}"
          D2="${{ steps.test2.outputs.duration || '0' }}"
          D3="${{ steps.test3.outputs.duration || '0' }}"
          D4="${{ steps.test4.outputs.duration || '0' }}"
          D5="${{ steps.test5.outputs.duration || '0' }}"
          D6="${{ steps.test6.outputs.duration || '0' }}"
          PASSED=0
          FAILED=0
          SKIPPED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5" "$T6"; do
            if [ "$STATUS" = "passed" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$STATUS" = "failed" ]; then
              FAILED=$((FAILED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
            fi
          done
          DURATION=$((D1 + D2 + D3 + D4 + D5 + D6))
          CORE_FAILED=0
          for STATUS in "$T1" "$T2" "$T3" "$T4" "$T5"; do
            if [ "$STATUS" = "failed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          done
          if [ $FAILED -eq 0 ] && [ $PASSED -gt 0 ]; then
            OVERALL_STATUS="success"
            BADGE_STATUS="passing"
          else
            OVERALL_STATUS="failure"
            BADGE_STATUS="failing"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "overall_status=$OVERALL_STATUS" >> "$GITHUB_OUTPUT"
          echo "badge_status=$BADGE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Create test summary
        if: always()
        uses: ./.github/actions/write-package-job-summary
        with:
          package_name: 'Verilator'
          version: ${{ steps.version.outputs.version || 'unknown' }}
          overall_status: ${{ steps.summary.outputs.overall_status || 'unknown' }}
          tests_passed: ${{ steps.summary.outputs.passed || '0' }}
          tests_failed: ${{ steps.summary.outputs.failed || '0' }}
          tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
          duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test6_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}
