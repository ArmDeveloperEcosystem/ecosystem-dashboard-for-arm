name: Test Verilator on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-verilator.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-verilator.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-verilator.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-verilator.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-verilator.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-verilator.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-verilator.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-verilator.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-verilator.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-verilator.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-verilator.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-verilator.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-verilator.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-verilator.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-verilator.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-verilator.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-verilator.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-verilator.outputs.regression_next_installed_version }}
      regression_policy:
        description: Regression applicability policy classification
        value: ${{ jobs.test-verilator.outputs.regression_policy }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-verilator.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-verilator.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-verilator.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-verilator.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-verilator.outputs.timestamp }}

jobs:
  test-verilator:
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: "Verilator"
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      regression_policy: "package_manager_installed"
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          {
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "package_slug=verilator"
            echo "dashboard_link=/linux/opensource_packages/verilator"
          } >> "$GITHUB_OUTPUT"

      - name: Install Verilator from apt
        uses: ./.github/actions/apt-bootstrap
        with:
          packages: "verilator perl-doc"
          quiet: "true"

      - name: Verify Verilator install
        id: install
        run: |
          set -euo pipefail
          command -v verilator >/dev/null
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Verilator version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(verilator --version 2>&1 | grep -oE '[0-9]+([.][0-9]+)+' | head -n 1 || true)"
          if [ -z "$VERSION" ]; then
            VERSION="$(dpkg-query -W -f='${Version}' verilator)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Verilator version: $VERSION"

      - name: Test 1 - Check verilator binary
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if command -v verilator >/dev/null; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check verilator version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if verilator --version 2>&1 | grep -Eiq "Verilator|[0-9]"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check verilator help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          verilator --help >/tmp/verilator-help.txt 2>&1 || true
          if grep -Eiq "Usage|Verilator|verilator" /tmp/verilator-help.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/verilator-help.txt
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Lint a minimal Verilog module
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cat >/tmp/verilator-smoke.v <<'EOF'
          module top(input clk, input rst_n, output reg done);
            always @(posedge clk or negedge rst_n) begin
              if (!rst_n) done <= 1'b0;
              else done <= 1'b1;
            end
          endmodule
          EOF
          if verilator --lint-only /tmp/verilator-smoke.v; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Preprocess a minimal Verilog module
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if verilator -E /tmp/verilator-smoke.v >/tmp/verilator-preprocessed.v 2>&1 && grep -Fq "module top" /tmp/verilator-preprocessed.v; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/verilator-preprocessed.v || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          {
            echo "current_version=$CURRENT"
            echo "latest_version=not_applicable"
            echo "next_installed_version=not_applicable"
            echo "decision=not_applicable_package_manager"
            echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5"
            echo "comparison=The tested package is installed via apt in Tests 1-5, so version-to-version regression validation is not shown under the current policy."
            echo "status=skipped"
            echo "duration=0"
          } >> "$GITHUB_OUTPUT"

      - name: Emit package result
        if: always()
        id: summary
        uses: ./.github/actions/emit-package-result
        with:
          package_slug: "verilator"
          package_name: "Verilator"
          version: ${{ steps.version.outputs.version || 'unknown' }}
          install_status: ${{ steps.install.outputs.install_status || 'failed' }}
          test1_label: "Test 1 - Check verilator binary"
          test2_label: "Test 2 - Check verilator version command"
          test3_label: "Test 3 - Check verilator help output"
          test4_label: "Test 4 - Lint a minimal Verilog module"
          test5_label: "Test 5 - Preprocess a minimal Verilog module"
          test1_status: ${{ steps.test1.outputs.status || 'skipped' }}
          test2_status: ${{ steps.test2.outputs.status || 'skipped' }}
          test3_status: ${{ steps.test3.outputs.status || 'skipped' }}
          test4_status: ${{ steps.test4.outputs.status || 'skipped' }}
          test5_status: ${{ steps.test5.outputs.status || 'skipped' }}
          test6_status: ${{ steps.test6.outputs.status || 'skipped' }}
          test1_duration: ${{ steps.test1.outputs.duration || 0 }}
          test2_duration: ${{ steps.test2.outputs.duration || 0 }}
          test3_duration: ${{ steps.test3.outputs.duration || 0 }}
          test4_duration: ${{ steps.test4.outputs.duration || 0 }}
          test5_duration: ${{ steps.test5.outputs.duration || 0 }}
          test6_duration: ${{ steps.test6.outputs.duration || 0 }}
          regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
          regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
          regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
          regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
          regression_result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}
          regression_details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}

      - name: Enforce failure status
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.should_fail }}" = "1" ]; then
            exit 1
          fi
