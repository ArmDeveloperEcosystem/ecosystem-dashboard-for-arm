name: Test Golang on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-golang.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-golang.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-golang.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-golang.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-golang.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-golang.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-golang.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-golang.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-golang.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-golang.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-golang.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-golang.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-golang.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-golang.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-golang.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-golang.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-golang.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-golang.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-golang.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-golang.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-golang.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-golang.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-golang.outputs.timestamp }}
jobs:
  test-golang:
    runs-on: ubuntu-24.04-arm

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Golang'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=golang" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/golang" >> "$GITHUB_OUTPUT"
          echo "current_version=1.24.1" >> "$GITHUB_OUTPUT"
      - name: Install Golang
        id: install
        run: |
          set -euo pipefail
          VERSION="${{ steps.metadata.outputs.current_version }}"
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"
          export DOWNLOAD_ATTEMPTS=2 DOWNLOAD_CONNECT_TIMEOUT=30 DOWNLOAD_MAX_TIME=300 WGET_TIMEOUT=60
          if ! bash "$HELPER" /tmp/go-current.tar.gz \
            "https://go.dev/dl/go${VERSION}.linux-arm64.tar.gz" \
            "https://dl.google.com/go/go${VERSION}.linux-arm64.tar.gz"; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go-current.tar.gz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          if [ -x /usr/local/go/bin/go ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Golang version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(/usr/local/go/bin/go version | awk '{print $3}' | sed 's/^go//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check go binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x /usr/local/go/bin/go ] && command -v go >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check go version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(go version | awk '{print $3}' | sed 's/^go//')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            go version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check go env arm64 output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(go env GOARCH)" = "arm64" ] && [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            go env GOARCH || true
            uname -m || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Run simple Go program
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cat > "$WORKDIR/hello.go" <<'EOF'
          package main

          import "fmt"

          func main() {
            fmt.Println("Hello, Arm!")
          }
          EOF
          if (cd "$WORKDIR" && go run hello.go | grep -q "Hello, Arm!"); then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$WORKDIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          rm -rf "$WORKDIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Build simple Go program
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          WORKDIR=$(mktemp -d)
          cat > "$WORKDIR/hello.go" <<'EOF'
          package main

          import "fmt"

          func main() {
            fmt.Println("Hello, Arm!")
          }
          EOF
          if (cd "$WORKDIR" && go build -o hello hello.go && ./hello | grep -q "Hello, Arm!" && file hello | grep -qiE 'arm aarch64|aarch64'); then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$WORKDIR/hello" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$WORKDIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          rm -rf "$WORKDIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"

          LATEST="1.24.2"

          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Next version targeted for install validation: $LATEST"

          NEXT_DIR=$(mktemp -d)
          NEXT_TAR="$NEXT_DIR/go-regression.tar.gz"
          HELPER="$GITHUB_WORKSPACE/.github/scripts/download-with-fallback.sh"
          export DOWNLOAD_ATTEMPTS=2 DOWNLOAD_CONNECT_TIMEOUT=30 DOWNLOAD_MAX_TIME=300 WGET_TIMEOUT=60
          if ! bash "$HELPER" "$NEXT_TAR" \
            "https://go.dev/dl/go${LATEST}.linux-arm64.tar.gz" \
            "https://dl.google.com/go/go${LATEST}.linux-arm64.tar.gz"; then
            echo "next_installed_version=download_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from the official Go distribution hosts." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: download_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} could not be downloaded from the official Go distribution hosts."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          mkdir -p "$NEXT_DIR/root"
          tar -C "$NEXT_DIR/root" -xzf "$NEXT_TAR"
          NEXT_GO="$NEXT_DIR/root/go/bin/go"

          if [ ! -x "$NEXT_GO" ]; then
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not extract a usable Arm64 toolchain." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: install_failed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not extract a usable Arm64 toolchain."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          REPORTED=$("$NEXT_GO" version | awk '{print $3}' | sed 's/^go//')
          CANDIDATE_ARCH=$("$NEXT_GO" env GOARCH)
          cat > "$NEXT_DIR/go-next-smoke.go" <<'GO'
          package main

          import (
              "fmt"
              "runtime"
          )

          func main() {
              fmt.Printf("go-next-ok %s\n", runtime.GOARCH)
          }
          GO
          RUNTIME_OUTPUT=$("$NEXT_GO" run "$NEXT_DIR/go-next-smoke.go")
          if [ "$REPORTED" = "$LATEST" ] && [ "$CANDIDATE_ARCH" = "arm64" ] && [ "$RUNTIME_OUTPUT" = "go-next-ok arm64" ]; then
            echo "next_installed_version=$REPORTED" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Go version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate toolchain reported version ${REPORTED} with GOARCH=${CANDIDATE_ARCH} after compiling and running a Go program." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $REPORTED"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "Details: Current pinned Go version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} on Arm64, and the candidate toolchain reported version ${REPORTED} with GOARCH=${CANDIDATE_ARCH} after compiling and running a Go program."
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${REPORTED:-unknown}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not report the expected version/architecture or failed the compile/run smoke on Arm64. Runtime output: ${RUNTIME_OUTPUT:-<empty>}." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${REPORTED:-unknown}"
            echo "Regression install result: Next version install failed on Arm64"
            echo "Details: Current pinned Go version ${CURRENT} passed smoke tests in this run, but candidate version ${LATEST} did not report the expected version/architecture or failed the compile/run smoke on Arm64. Runtime output: ${RUNTIME_OUTPUT:-<empty>}."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            rm -rf "$NEXT_DIR"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"

          if [ "$CORE_FAILED" -eq 0 ] && [ "$TEST6_STATUS" != "failed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Golang Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check go binary exists: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check go version output: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check go env arm64 output: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Run simple Go program: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Build simple Go program: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
