name: Test New Relic on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/new-relic.md"
      - ".github/workflows/test-new-relic.yml"

jobs:
  test-new-relic:
    runs-on: ubuntu-24.04-arm
    env:
      NEW_RELIC_VERSION: "1.72.8"
      NEW_RELIC_TARBALL: "newrelic-infra_linux_1.72.8_arm64.tar.gz"
      NEW_RELIC_URL: "https://github.com/newrelic/infrastructure-agent/releases/download/1.72.8/newrelic-infra_linux_1.72.8_arm64.tar.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=new-relic" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/new-relic" >> "$GITHUB_OUTPUT"

      - name: Install New Relic
        id: install
        run: |
          set -euo pipefail
          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/${NEW_RELIC_TARBALL}" "${NEW_RELIC_URL}"
          tar -xzf "${TMP_DIR}/${NEW_RELIC_TARBALL}" -C "${TMP_DIR}"
          sudo install -m 0755 "${TMP_DIR}/newrelic-infra/usr/bin/newrelic-infra" /usr/local/bin/newrelic-infra
          if command -v newrelic-infra >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get New Relic version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("https://api.github.com/repos/newrelic/infrastructure-agent/releases/latest", timeout=20))
          print(data["tag_name"])
          PY
          )
          echo "version=${NEW_RELIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v newrelic-infra >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if newrelic-infra --version 2>&1 | grep -q "New Relic Infrastructure Agent version: ${NEW_RELIC_VERSION}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if newrelic-infra --help 2>&1 | grep -q "Usage of"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if newrelic-infra -validate 2>&1 | grep -Eiq "validate|config|license"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          DECISION="hold_current"
          NOTE="Pinned infrastructure-agent tarball remains the validated Arm64 baseline pending an explicit upgrade run."
          if [ "${{ steps.version.outputs.latest }}" = "${NEW_RELIC_VERSION}" ]; then
            DECISION="current_is_latest_stable"
            NOTE="Pinned New Relic infrastructure-agent already matches the latest stable upstream release."
          fi
          echo "current_version=${NEW_RELIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${{ steps.version.outputs.latest }}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "comparison=Current pinned release ${NEW_RELIC_VERSION} was downloaded from the official Arm64 tarball, its version output was validated, help output was validated, and the agent was executed in config-validation mode on Arm64. Latest stable upstream release ${{ steps.version.outputs.latest }} was checked before any version bump decision." >> "$GITHUB_OUTPUT"
          echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
          echo "status=passed" >> "$GITHUB_OUTPUT"
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'skipped' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'skipped' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'skipped' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'skipped' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'skipped' }}" "${{ steps.test5.outputs.duration || 0 }}"
          check_test "${{ steps.test6.outputs.status || 'skipped' }}" "${{ steps.test6.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.test1.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test2.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test3.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test4.outputs.status }}" = "passed" ] && \
             [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/new-relic.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "New Relic",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Go",
              "category": "Monitoring/Observability"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Binary Existence", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check Version Output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check Help Output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: new-relic-test-results
          path: test-results/new-relic.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          echo "## New Relic Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 1 - Check Binary Existence:** ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 2 - Check Version Output:** ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 3 - Check Help Output:** ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 4 - Architecture Verification:** ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 5 - Functional Validation:** ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Current vs Next" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current (Pinned):** ${{ steps.test6.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next (Latest Stable):** ${{ steps.test6.outputs.latest_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Decision:** ${{ steps.test6.outputs.decision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Comparison:** ${{ steps.test6.outputs.comparison }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Note:** ${{ steps.test6.outputs.note }}" >> "$GITHUB_STEP_SUMMARY"
