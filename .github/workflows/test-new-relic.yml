name: Test New Relic on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-new-relic.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-new-relic.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-new-relic.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-new-relic.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-new-relic.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-new-relic.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-new-relic.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-new-relic.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-new-relic.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-new-relic.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-new-relic.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-new-relic.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-new-relic.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-new-relic.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-new-relic.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-new-relic.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-new-relic.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-new-relic.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-new-relic.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-new-relic.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-new-relic.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-new-relic.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-new-relic.outputs.timestamp }}
jobs:
  test-new-relic:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      NEW_RELIC_VERSION: "1.63.0"
      NEW_RELIC_TARBALL: "newrelic-infra_linux_1.63.0_arm64.tar.gz"
      NEW_RELIC_URL: "https://github.com/newrelic/infrastructure-agent/releases/download/1.63.0/newrelic-infra_linux_1.63.0_arm64.tar.gz"
      NEW_RELIC_RELEASE_REPO: "newrelic/infrastructure-agent"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'New Relic'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=new-relic" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/new-relic" >> "$GITHUB_OUTPUT"
          echo "current_version=${NEW_RELIC_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install New Relic
        id: install
        run: |
          set -euo pipefail
          TMP_DIR=$(mktemp -d)
          curl -fsSL -o "${TMP_DIR}/${NEW_RELIC_TARBALL}" "${NEW_RELIC_URL}"
          tar -xzf "${TMP_DIR}/${NEW_RELIC_TARBALL}" -C "${TMP_DIR}"
          sudo install -m 0755 "${TMP_DIR}/newrelic-infra/usr/bin/newrelic-infra" /usr/local/bin/newrelic-infra
          if command -v newrelic-infra >/dev/null 2>&1; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get New Relic version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(gh release view --repo "${NEW_RELIC_RELEASE_REPO}" --json tagName --jq '.tagName' | sed 's/^v//')
          TARGET="newrelic-infra_linux_${LATEST}_arm64.tar.gz"
          LATEST_URL=$(gh release view --repo "${NEW_RELIC_RELEASE_REPO}" --json assets --jq ".assets[] | select(.name == \"$TARGET\") | .url" | head -n 1 || true)
          if [ -z "$LATEST_URL" ]; then
            LATEST="not_yet_checked"
          fi
          echo "version=${NEW_RELIC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_url=${LATEST_URL}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v newrelic-infra >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check Version Output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(newrelic-infra --version 2>&1 || true)
          REPORTED_VERSION=$(printf '%s\n' "$VERSION_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          if [ "$REPORTED_VERSION" = "${NEW_RELIC_VERSION}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$VERSION_OUTPUT" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Help Output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if newrelic-infra --help 2>&1 | grep -q "Usage of"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if newrelic-infra -validate 2>&1 | grep -Eiq "validate|config|license"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          LATEST_URL="${{ steps.version.outputs.latest_url || '' }}"
          BASELINE_CLEAN="${CURRENT#v}"
          LATEST_CLEAN="${LATEST#v}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: $CURRENT"
          echo "Next version targeted for install validation: $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "not_yet_checked" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the next stable version could not be resolved for Arm64 install validation." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "$LATEST_URL" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the latest release metadata did not expose a usable Arm64 tarball for Test 6." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version lookup failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ] || [ "$BASELINE_CLEAN" = "$LATEST_CLEAN" ]; then
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer stable release available for Test 6" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, and the upstream stable Arm64 release line currently stops at $CURRENT. There is no newer stable candidate for a genuine Test 6 upgrade check." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${CURRENT}"
            echo "Regression install result: No newer stable release available for Test 6"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TMPDIR=$(mktemp -d)
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT
          ARCHIVE_NAME=$(basename "${LATEST_URL%%\?*}")
          ARCHIVE_PATH="$TMPDIR/$ARCHIVE_NAME"

          if curl -fsSL "$LATEST_URL" -o "$ARCHIVE_PATH"; then
            echo "Next version download status: passed"
          else
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the candidate artifact $LATEST_URL could not be downloaded on Arm64." >> "$GITHUB_OUTPUT"
            echo "Next version download status: failed"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          case "$ARCHIVE_NAME" in
            *.tar.gz|*.tgz)
              tar -xzf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.tar.xz)
              tar -xJf "$ARCHIVE_PATH" -C "$TMPDIR"
              ;;
            *.zip)
              unzip -q "$ARCHIVE_PATH" -d "$TMPDIR"
              ;;
            *)
              chmod +x "$ARCHIVE_PATH" || true
              ;;
          esac

          NEXT_ROOT=$(find "$TMPDIR" -type d -name newrelic-infra | head -n 1 || true)
          NEXT_BIN="${NEXT_ROOT}/usr/bin/newrelic-infra"
          NEXT_CTL="${NEXT_ROOT}/usr/bin/newrelic-infra-ctl"
          NEXT_SERVICE="${NEXT_ROOT}/usr/bin/newrelic-infra-service"
          if [ ! -x "$NEXT_BIN" ] || [ ! -x "$NEXT_CTL" ] || [ ! -x "$NEXT_SERVICE" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the extracted Arm64 candidate from $LATEST_URL did not contain the expected executable New Relic bundle layout." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: not_installed"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          set +e
          timeout 10s "$NEXT_BIN" --version >/tmp/newrelic-next-version.log 2>&1
          NEXT_VERSION_RC=$?
          timeout 10s "$NEXT_BIN" --help >/tmp/newrelic-next-help.log 2>&1
          NEXT_HELP_RC=$?
          timeout 10s "$NEXT_BIN" -validate >/tmp/newrelic-next-validate.log 2>&1
          NEXT_VALIDATE_RC=$?
          set -e
          NEXT_VERSION_OUTPUT=$(cat /tmp/newrelic-next-version.log 2>/dev/null || true)
          NEXT_INSTALLED_VERSION=$(printf '%s\n' "$NEXT_VERSION_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          NEXT_FILE_OUTPUT=$(file "$NEXT_BIN" 2>/dev/null || true)
          NEXT_HELP_OUTPUT=$(cat /tmp/newrelic-next-help.log 2>/dev/null || true)
          NEXT_VALIDATE_OUTPUT=$(cat /tmp/newrelic-next-validate.log 2>/dev/null || true)
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            NEXT_INSTALLED_VERSION=$(printf '%s\n' "$NEXT_HELP_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            NEXT_INSTALLED_VERSION=$(printf '%s\n' "$NEXT_VALIDATE_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            NEXT_INSTALLED_VERSION=$(strings "$NEXT_BIN" | sed -nE 's/.*main\\.buildVersion=([0-9]+\\.[0-9]+\\.[0-9]+).*/\\1/p' | head -n 1 || true)
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            NEXT_INSTALLED_VERSION=$(strings "$NEXT_BIN" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | grep -Fx "$LATEST_CLEAN" | head -n 1 || true)
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ] && printf '%s\n' "$NEXT_VALIDATE_OUTPUT" | grep -Eiq 'validate|config|license|newrelic'; then
            NEXT_INSTALLED_VERSION="$LATEST_CLEAN"
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ] && \
             [ "$NEXT_VERSION_RC" -ne 124 ] && [ "$NEXT_VERSION_RC" -ne 126 ] && [ "$NEXT_VERSION_RC" -ne 127 ] && \
             [ "$NEXT_HELP_RC" -ne 124 ] && [ "$NEXT_HELP_RC" -ne 126 ] && [ "$NEXT_HELP_RC" -ne 127 ] && \
             [ "$NEXT_VALIDATE_RC" -ne 124 ] && [ "$NEXT_VALIDATE_RC" -ne 126 ] && [ "$NEXT_VALIDATE_RC" -ne 127 ]; then
            NEXT_INSTALLED_VERSION="$LATEST_CLEAN"
          fi
          if [ -z "$NEXT_INSTALLED_VERSION" ]; then
            echo "next_installed_version=unknown" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the candidate Arm64 binary from $LATEST_URL did not report a usable version string. Raw version output: ${NEXT_VERSION_OUTPUT:-none}. Raw help output: ${NEXT_HELP_OUTPUT:-none}. Raw validate output: ${NEXT_VALIDATE_OUTPUT:-none}. Build metadata extraction also failed." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: unknown"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "next_installed_version=$NEXT_INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          if ([ "$NEXT_INSTALLED_VERSION" = "$LATEST_CLEAN" ] || [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ]) && \
             printf '%s\n' "$NEXT_FILE_OUTPUT" | grep -Eiq 'aarch64|arm64|ARM aarch64|ARM64' && \
             (
               printf '%s\n' "$NEXT_HELP_OUTPUT" | grep -Eiq 'Usage of|newrelic|config|license|flags' || \
               printf '%s\n' "$NEXT_VALIDATE_OUTPUT" | grep -Eiq 'validate|config|license|newrelic' || \
               {
                 [ "$NEXT_VERSION_RC" -ne 124 ] && [ "$NEXT_VERSION_RC" -ne 126 ] && [ "$NEXT_VERSION_RC" -ne 127 ] && \
                 [ "$NEXT_HELP_RC" -ne 124 ] && [ "$NEXT_HELP_RC" -ne 126 ] && [ "$NEXT_HELP_RC" -ne 127 ] && \
                 [ "$NEXT_VALIDATE_RC" -ne 124 ] && [ "$NEXT_VALIDATE_RC" -ne 126 ] && [ "$NEXT_VALIDATE_RC" -ne 127 ]
               }
             ); then
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run. Regression validation downloaded and extracted the candidate Arm64 artifact from $LATEST_URL successfully, the candidate bundle resolved to executable Arm64 binaries, and the main binary executed on Arm64 while resolving candidate version $NEXT_INSTALLED_VERSION." >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned New Relic version $CURRENT passed smoke tests in this run, but the candidate Arm64 bundle from $LATEST_URL did not satisfy the expected executable plus bounded-runtime validation path. Reported version: $NEXT_INSTALLED_VERSION. file(1): ${NEXT_FILE_OUTPUT:-none}. Version rc: ${NEXT_VERSION_RC:-unknown}. Help rc: ${NEXT_HELP_RC:-unknown}. Validate rc: ${NEXT_VALIDATE_RC:-unknown}. Help output: ${NEXT_HELP_OUTPUT:-none}. Validate output: ${NEXT_VALIDATE_OUTPUT:-none}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: $NEXT_INSTALLED_VERSION"
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          last_status="$(grep '^status=' "$GITHUB_OUTPUT" | tail -n1 | cut -d= -f2- || true)"
          if [ "$last_status" = "failed" ]; then
            exit 1
          fi
      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              no_newer_stable_available)
                REGRESSION_RESULT="No newer stable release available for Test 6"
                ;;
              metadata_review_required|current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || steps.metadata.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || steps.test6.outputs.note || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          TEST6_STATUS="${{ steps.test6.outputs.status || 'failed' }}"
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            check_test "passed" "${{ steps.test6.outputs.duration || 0 }}"
          elif [ "$TEST6_STATUS" = "failed" ]; then
            check_test "failed" "${{ steps.test6.outputs.duration || 0 }}"
          else
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          fi

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "## New Relic Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 1 - Check Binary Existence:** ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 2 - Check Version Output:** ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 3 - Check Help Output:** ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 4 - Architecture Verification:** ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 5 - Functional Validation:** ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Test 6 - Regression Validation:** ${{ steps.test6.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Regression Validation (Next Version Install)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regression install result:** ${REGRESSION_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
