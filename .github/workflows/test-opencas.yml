name: Test Open CAS on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/opencas.md"
      - ".github/workflows/test-opencas.yml"

permissions:
  contents: read
  actions: read

jobs:
  test-opencas:
    runs-on: ubuntu-24.04-arm
    env:
      OPENCAS_VERSION: "24.9"
      OPENCAS_URL: "https://github.com/Open-CAS/open-cas-linux/releases/download/v24.9/open-cas-linux-24.09.0.0900.release.tar.gz"
      OPENCAS_NEXT_VERSION: "25.03"
      OPENCAS_NEXT_URL: "https://github.com/Open-CAS/open-cas-linux/releases/download/v25.03/open-cas-linux-25.03.0.0963.release.tar.gz"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=opencas" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/opencas" >> "$GITHUB_OUTPUT"

      - name: Install Open CAS baseline
        id: install
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          WORKDIR="$(mktemp -d)"
          sudo apt-get update
          sudo apt-get install -y build-essential curl file python3-pip python3-yaml

          curl -fsSL -o "$WORKDIR/opencas.tgz" "${OPENCAS_URL}"
          tar -xzf "$WORKDIR/opencas.tgz" -C "$WORKDIR"
          SRC_DIR="$(find "$WORKDIR" -maxdepth 1 -type d -name 'open-cas-linux-*' | head -n1)"

          cd "$SRC_DIR"
          python3 -m pip install --break-system-packages -r requirements.txt
          ./configure >/tmp/opencas-configure-baseline.log 2>&1
          make -C casadm -j2 >/tmp/opencas-casadm-baseline.log 2>&1
          make -C utils -j2 >/tmp/opencas-utils-baseline.log 2>&1
          sudo make -C casadm install >/tmp/opencas-casadm-install-baseline.log 2>&1
          sudo make -C utils install >/tmp/opencas-utils-install-baseline.log 2>&1

          echo "source_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"
          echo "baseline_version=${OPENCAS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Open CAS version
        id: version
        run: |
          set -euo pipefail
          OUTPUT="$(sudo /sbin/casadm --version 2>&1 || true)"
          VERSION="$(printf '%s\n' "$OUTPUT" | grep -oE '[0-9]{2}\.[0-9]{2}(\.[0-9]+\.[0-9]+)?' | head -n1 || true)"
          if [ -z "$VERSION" ] && [ -f /var/lib/opencas/cas_version ]; then
            VERSION="$(cat /var/lib/opencas/cas_version || true)"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="${OPENCAS_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Open CAS version: ${VERSION}"

      - name: Test 1 - Check Open CAS binaries exist
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x /sbin/casadm ] && [ -x /sbin/casctl ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l /sbin/casadm /sbin/casctl 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT="$(sudo /sbin/casadm --version 2>&1 || true)"
          if printf '%s\n' "$OUTPUT" | grep -Eq '24\.09|24\.9'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          ADM_HELP="$(sudo /sbin/casadm --help 2>&1 || true)"
          CTL_HELP="$(sudo /sbin/casctl --help 2>&1 || true)"
          if printf '%s\n' "$ADM_HELP" | grep -Eqi 'casadm|version|usage|help' && \
             printf '%s\n' "$CTL_HELP" | grep -Eqi 'casctl|usage|help'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$ADM_HELP" || true
            printf '%s\n' "$CTL_HELP" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file /sbin/casadm | grep -Eqi 'ARM aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file /sbin/casadm || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -f /etc/opencas/opencas.conf ] && \
             [ -f /var/lib/opencas/cas_version ] && \
             sudo /sbin/casctl --help >/tmp/opencas-casctl-help.txt 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            ls -l /etc/opencas /var/lib/opencas 2>/dev/null || true
            cat /tmp/opencas-casctl-help.txt || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.install.outputs.baseline_version }}"
          LATEST="${OPENCAS_NEXT_VERSION}"
          WORKDIR="$(mktemp -d)"

          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          curl -fsSL -o "$WORKDIR/opencas-next.tgz" "${OPENCAS_NEXT_URL}"
          tar -xzf "$WORKDIR/opencas-next.tgz" -C "$WORKDIR"
          NEXT_DIR="$(find "$WORKDIR" -maxdepth 1 -type d -name 'open-cas-linux-*' | head -n1)"

          cd "$NEXT_DIR"
          python3 -m pip install --break-system-packages -r requirements.txt
          ./configure >/tmp/opencas-configure-next.log 2>&1
          make -C casadm -j2 >/tmp/opencas-casadm-next.log 2>&1
          make -C utils -j2 >/tmp/opencas-utils-next.log 2>&1
          sudo make -C casadm install >/tmp/opencas-casadm-install-next.log 2>&1
          sudo make -C utils install >/tmp/opencas-utils-install-next.log 2>&1

          NEXT_OUTPUT="$(sudo /sbin/casadm --version 2>&1 || true)"
          NEXT_VERSION="$(printf '%s\n' "$NEXT_OUTPUT" | grep -oE '[0-9]{2}\.[0-9]+(\.[0-9]+\.[0-9]+)?' | head -n1 || true)"
          if [ -z "$NEXT_VERSION" ]; then
            NEXT_VERSION="${LATEST}"
          fi

          if printf '%s\n' "$NEXT_OUTPUT" | grep -Eq '25\.03' && \
             sudo /sbin/casctl --help >/tmp/opencas-next-help.txt 2>&1 && \
             file /sbin/casadm | grep -Eqi 'ARM aarch64|aarch64'; then
            echo "next_installed_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Open CAS CLI ${CURRENT} passed smoke tests in this run. Regression validation built and installed candidate ${LATEST}, and the Arm64 casadm/casctl utilities reported the expected next-version metadata." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NEXT_OUTPUT" || true
            cat /tmp/opencas-next-help.txt || true
            echo "next_installed_version=install_failed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Open CAS CLI ${CURRENT} passed smoke tests in this run, but candidate ${LATEST} did not complete the expected Arm64 CLI install validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          CORE_FAILED=0
          REGRESSION_FAILED=0

          check_test() {
            local status="$1"
            local duration="$2"
            local kind="$3"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              if [ "$kind" = "core" ]; then
                CORE_FAILED=1
              else
                REGRESSION_FAILED=1
              fi
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}" "core"
          check_test "${{ steps.test6.outputs.status || 'failed' }}" "${{ steps.test6.outputs.duration || 0 }}" "regression"

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "duration=${TOTAL_DURATION}" >> "$GITHUB_OUTPUT"

          if [ "${CORE_FAILED}" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "${CORE_FAILED}" -eq 0 ] && [ "${REGRESSION_FAILED}" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:$JOB_ID"
          fi

          cat > test-results/opencas.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Open CAS",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Storage",
              "category": "Storage"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check Open CAS binaries exist", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check version command", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check help output", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {
                  "name": "Test 6 - Regression Validation",
                  "status": "${{ steps.test6.outputs.status || 'failed' }}",
                  "duration_seconds": ${{ steps.test6.outputs.duration || 0 }},
                  "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}",
                  "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}",
                  "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}",
                  "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}",
                  "comparison": "${{ steps.test6.outputs.comparison || '' }}",
                  "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"
                }
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: opencas-test-results
          path: test-results/opencas.json
          retention-days: 10

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Open CAS Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo
            echo "### Test Details"
            echo "1. Test 1 - Check Open CAS binaries exist: ${{ steps.test1.outputs.status || 'failed' }}"
            echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'failed' }}"
            echo "3. Test 3 - Check help output: ${{ steps.test3.outputs.status || 'failed' }}"
            echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'failed' }}"
            echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'failed' }}"
            echo "6. Test 6 - Regression Validation: ${{ steps.test6.outputs.status || 'failed' }}"
            echo
            echo "### Regression Validation"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression validation result unavailable' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
