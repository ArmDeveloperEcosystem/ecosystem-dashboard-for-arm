name: Test Apache Velocity on Arm64

on:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-velocity.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-velocity.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-velocity.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-velocity.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-velocity.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-velocity.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-velocity.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-velocity.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-velocity.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-velocity.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-velocity.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-velocity.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-velocity.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-velocity.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-velocity.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-velocity.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-velocity.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-velocity.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-velocity.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-velocity.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-velocity.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-velocity.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-velocity.outputs.timestamp }}
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/velocity.md'
      - '.github/workflows/test-velocity.yml'

jobs:
  test-velocity:
    runs-on: ubuntu-24.04-arm
    
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Apache Velocity'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=velocity" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/velocity" >> "$GITHUB_OUTPUT"
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install Maven
        run: sudo apt-get install -y maven
      
      - name: Create Velocity Test Project
        id: install
        run: |
          echo "Creating Velocity test project..."
          
          mvn archetype:generate \
            -DgroupId=com.example.velocity \
            -DartifactId=velocity-test \
            -DarchetypeArtifactId=maven-archetype-quickstart \
            -DinteractiveMode=false
          
          cd velocity-test
          
          # Overwrite pom.xml to ensure correct compiler version and dependencies
          cat > pom.xml << EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/maven-v4_0_0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.example.velocity</groupId>
            <artifactId>velocity-test</artifactId>
            <packaging>jar</packaging>
            <version>1.0-SNAPSHOT</version>
            <name>velocity-test</name>
            <url>http://maven.apache.org</url>
            <properties>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
              <maven.compiler.source>1.8</maven.compiler.source>
              <maven.compiler.target>1.8</maven.compiler.target>
            </properties>
            <dependencies>
              <dependency>
                <groupId>junit</groupId>
                <artifactId>junit</artifactId>
                <version>3.8.1</version>
                <scope>test</scope>
              </dependency>
              <dependency>
                <groupId>org.apache.velocity</groupId>
                <artifactId>velocity-engine-core</artifactId>
                <version>2.3</version>
              </dependency>
              <dependency>
                <groupId>org.slf4j</groupId>
                <artifactId>slf4j-simple</artifactId>
                <version>1.7.36</version>
              </dependency>
            </dependencies>
          </project>
          EOF
            
          echo "install_status=success" >> $GITHUB_OUTPUT
      
      - name: Get Velocity version
        id: version
        run: |
          VERSION="2.3"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Velocity version: $VERSION"
      
      - name: Test 1 - Create Template Test Class
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd velocity-test/src/main/java/com/example/velocity
          
          cat > VelocityTest.java << EOF
          package com.example.velocity;
          
          import org.apache.velocity.VelocityContext;
          import org.apache.velocity.app.VelocityEngine;
          import java.io.StringWriter;
          import java.util.Properties;
          
          public class VelocityTest {
              public static void main(String[] args) {
                  // 1. Initialize Velocity Engine
                  VelocityEngine velocityEngine = new VelocityEngine();
                  Properties p = new Properties();
                  p.setProperty("resource.loader", "class");
                  p.setProperty("class.resource.loader.class", "org.apache.velocity.runtime.resource.loader.ClasspathResourceLoader");
                  velocityEngine.init(p);
                  
                  // 2. Initialize Context
                  VelocityContext context = new VelocityContext();
                  context.put("name", "Arm64");
                  context.put("project", "Velocity");
                  
                  // 3. Render Template
                  StringWriter writer = new StringWriter();
                  String template = "Hello \$name! Welcome to Apache \$project.";
                  
                  velocityEngine.evaluate(context, writer, "test", template);
                  
                  String result = writer.toString();
                  System.out.println("Result: " + result);
                  
                  if ("Hello Arm64! Welcome to Apache Velocity.".equals(result)) {
                      System.exit(0);
                  } else {
                      System.err.println("Unexpected result");
                      System.exit(1);
                  }
              }
          }
          EOF
          
          if [ -f "VelocityTest.java" ]; then
             echo "✓ test class created"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ test class creation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Compile Project
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd velocity-test
          if mvn compile; then
             echo "✓ project compiled"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ project compilation failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Run Template Test
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          cd velocity-test
          if mvn exec:java -Dexec.mainClass="com.example.velocity.VelocityTest"; then
             echo "✓ template test passed"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ template test failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      
      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          
          echo "Checking system architecture..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "✓ System architecture is ARM64 ($ARCH)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ System architecture is NOT ARM64 ($ARCH)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          # Velocity is a library, so we verify that the Maven build produced the expected class files
          if [ -f "velocity-test/target/classes/com/example/velocity/VelocityTest.class" ]; then
            echo "✓ Build artifacts (VelocityTest.class) verified"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ Build artifacts not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          # Create Template Test Class
          if [ "${{ steps.test1.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          # Compile Project
          if [ "${{ steps.test2.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          # Run Template Test
          if [ "${{ steps.test3.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          # Architecture Verification
          if [ "${{ steps.test4.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          # Functional Validation
          if [ "${{ steps.test5.outputs.status }}" == "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ $FAILED -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            echo "badge_status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Apache Velocity Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Create Template Test Class: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Compile Project: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Run Template Test: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY

