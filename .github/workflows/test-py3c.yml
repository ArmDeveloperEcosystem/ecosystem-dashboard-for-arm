name: Test Py3c on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/py3c.md"
      - ".github/workflows/test-py3c.yml"

jobs:
  test-py3c:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=py3c" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/py3c" >> "$GITHUB_OUTPUT"
      - name: Install Py3c
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-venv build-essential
          python3 -m venv venv
          VENV_DIR="$PWD/venv"
          VENV_PY="${VENV_DIR}/bin/python"
          "${VENV_PY}" -m pip install --upgrade pip
          "${VENV_PY}" -m pip install py3c
          readarray -t PY3C_PATHS < <("${VENV_PY}" - <<'PY'
          import pathlib
          import sys
          root = pathlib.Path(sys.prefix)
          header = next(root.rglob("py3c.h"), None)
          if header is None:
              raise SystemExit("py3c.h not found in virtual environment")
          include_dir = header.parent
          include_root = include_dir.parent if include_dir.name == "py3c" else include_dir
          print(header)
          print(include_dir)
          print(include_root)
          PY
          )
          HEADER_PATH="${PY3C_PATHS[0]:-}"
          INCLUDE_DIR="${PY3C_PATHS[1]:-}"
          INCLUDE_ROOT="${PY3C_PATHS[2]:-}"
          if [ -z "$HEADER_PATH" ] || [ -z "$INCLUDE_DIR" ] || [ -z "$INCLUDE_ROOT" ]; then
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "venv_dir=${VENV_DIR}" >> "$GITHUB_OUTPUT"
          echo "header_path=${HEADER_PATH}" >> "$GITHUB_OUTPUT"
          echo "include_dir=${INCLUDE_DIR}" >> "$GITHUB_OUTPUT"
          echo "include_root=${INCLUDE_ROOT}" >> "$GITHUB_OUTPUT"
          echo "${VENV_DIR}/bin" >> "$GITHUB_PATH"
          if [ -f "$HEADER_PATH" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Py3c version
        id: version
        run: |
          set -euo pipefail
          VENV_PY="${{ steps.install.outputs.venv_dir }}/bin/python"
          VERSION=$("${VENV_PY}" -c "import importlib.metadata as md; print(md.version('py3c'))")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check header files exist
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "${{ steps.install.outputs.header_path }}" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check package version
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          VENV_PY="${{ steps.install.outputs.venv_dir }}/bin/python"
          if "${VENV_PY}" -c "import importlib.metadata as md; print(md.version('py3c'))" | grep -Fxq "${{ steps.version.outputs.version }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check API surface
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if grep -q 'Py_LIMITED_API' "${{ steps.install.outputs.header_path }}"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VENV_PY="${{ steps.install.outputs.venv_dir }}/bin/python"
          cat > /tmp/py3c-smoke.c <<'EOF'
          #include <Python.h>
          #include <py3c/py3c.h>
          #include <stdio.h>
          int main(void) { puts("py3c-ok"); return 0; }
          EOF
          PYTHON_INCLUDE=$("${VENV_PY}" - <<'PY'
          import sysconfig
          print(sysconfig.get_path("include"))
          PY
          )
          cc /tmp/py3c-smoke.c -I"${PYTHON_INCLUDE}" -I"${{ steps.install.outputs.include_root }}" -o /tmp/py3c-smoke
          /tmp/py3c-smoke > /tmp/py3c-smoke.out
          if grep -q '^py3c-ok$' /tmp/py3c-smoke.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/py3c-smoke.out || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?query=job:${JOB_ID}"
          fi
          mkdir -p test-results
          cat > test-results/py3c.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Py3c",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C",
              "category": "Miscellaneous"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check header files exist", "status": "${{ steps.test1.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check package version", "status": "${{ steps.test2.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check API surface", "status": "${{ steps.test3.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'failed' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: py3c-test-results
          path: test-results/py3c.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Py3c Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
