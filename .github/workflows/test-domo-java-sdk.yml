name: Test Domo-java-sdk on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-domo-java-sdk.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-domo-java-sdk.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-domo-java-sdk.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-domo-java-sdk.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-domo-java-sdk.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-domo-java-sdk.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-domo-java-sdk.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-domo-java-sdk.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-domo-java-sdk.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-domo-java-sdk.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-domo-java-sdk.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-domo-java-sdk.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-domo-java-sdk.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-domo-java-sdk.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-domo-java-sdk.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-domo-java-sdk.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-domo-java-sdk.outputs.timestamp }}
jobs:
  test-domo-java-sdk:
    runs-on: ubuntu-24.04-arm
    env:
      DOMO_SDK_VERSION: "v0.2.0"
      DOMO_SDK_NEXT_VERSION: "v0.3.0"
      DOMO_SMOKE_DIR: ${{ github.workspace }}/domo-java-sdk-smoke

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Domo-java-sdk'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=domo-java-sdk" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/domo-java-sdk" >> "$GITHUB_OUTPUT"
      - name: Install Domo-java-sdk consumer smoke project
        id: install
        run: |
          echo "Installing Domo-java-sdk consumer smoke project..."
          sudo apt-get update
          sudo apt-get install -y maven default-jdk

          rm -rf "$DOMO_SMOKE_DIR"
          mkdir -p "$DOMO_SMOKE_DIR/src/main/java/smoke"

          cat > "$DOMO_SMOKE_DIR/pom.xml" <<XML
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>arm.smoke</groupId>
            <artifactId>domo-consumer</artifactId>
            <version>1.0.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <repositories>
              <repository>
                <id>jitpack.io</id>
                <url>https://jitpack.io</url>
              </repository>
            </repositories>
            <dependencies>
              <dependency>
                <groupId>com.github.domoinc.domo-java-sdk</groupId>
                <artifactId>domo-java-sdk-all</artifactId>
                <version>${DOMO_SDK_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          XML

          cat > "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" <<'JAVA'
          package smoke;

          import com.domo.sdk.DomoClient;
          import com.domo.sdk.request.Config;
          import com.domo.sdk.request.Scope;

          public class DomoSmoke {
              public static void main(String[] args) {
                  Config config = Config.with()
                          .clientId("id")
                          .clientSecret("secret")
                          .apiHost("api.domo.com")
                          .useHttps(true)
                          .scope(Scope.USER, Scope.DATA)
                          .build();
                  DomoClient client = DomoClient.create(config);
                  System.out.println(config.getClass().getName());
                  System.out.println(client.getClass().getName());
              }
          }
          JAVA

          if [ -f "$DOMO_SMOKE_DIR/pom.xml" ] && [ -f "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Domo-java-sdk version
        id: version
        run: |
          echo "version=${DOMO_SDK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Domo-java-sdk version: ${DOMO_SDK_VERSION}"

      - name: Test 1 - Check smoke project files
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "$DOMO_SMOKE_DIR/pom.xml" ] && [ -f "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check dependency resolution
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q dependency:build-classpath -Dmdep.outputFile=cp.txt
          if grep -q "domo-java-sdk-all-${DOMO_SDK_VERSION}" cp.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Maven project configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q help:effective-pom -Doutput=effective-pom.xml
          if grep -q 'jitpack.io' effective-pom.xml && grep -q 'domo-java-sdk-all' effective-pom.xml; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q -DskipTests package
          java -cp target/classes:$(cat cp.txt) smoke.DomoSmoke | tee /tmp/domo-smoke.out
          if grep -q 'com.domo.sdk.DomoClient' /tmp/domo-smoke.out && grep -q 'com.domo.sdk.request.Config' /tmp/domo-smoke.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"


      - name: Regression applicability - package manager installed
        id: test6
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "next_installed_version=not_applicable" >> "$GITHUB_OUTPUT"
          echo "decision=not_applicable_package_manager" >> "$GITHUB_OUTPUT"
          echo "regression_result=Regression validation not applicable: tested package installed via package manager in Tests 1-5" >> "$GITHUB_OUTPUT"
          echo "comparison=The tested package is installed via a package manager in Tests 1-5, so version-to-version regression validation is not shown under the current policy." >> "$GITHUB_OUTPUT"
          echo "status=skipped" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ $CORE_FAILED -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Domo-java-sdk Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check smoke project files: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check dependency resolution: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Maven project configuration: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
