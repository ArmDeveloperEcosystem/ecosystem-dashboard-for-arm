name: Test Domo-java-sdk on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - 'content/opensource_packages/domo-java-sdk.md'
      - '.github/workflows/test-domo-java-sdk.yml'

jobs:
  test-domo-java-sdk:
    runs-on: ubuntu-24.04-arm
    env:
      DOMO_SDK_VERSION: "v0.2.0"
      DOMO_SDK_NEXT_VERSION: "v0.3.0"
      DOMO_SMOKE_DIR: ${{ github.workspace }}/domo-java-sdk-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=domo-java-sdk" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/domo-java-sdk" >> "$GITHUB_OUTPUT"
      - name: Install Domo-java-sdk consumer smoke project
        id: install
        run: |
          echo "Installing Domo-java-sdk consumer smoke project..."
          sudo apt-get update
          sudo apt-get install -y maven default-jdk

          rm -rf "$DOMO_SMOKE_DIR"
          mkdir -p "$DOMO_SMOKE_DIR/src/main/java/smoke"

          cat > "$DOMO_SMOKE_DIR/pom.xml" <<XML
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>arm.smoke</groupId>
            <artifactId>domo-consumer</artifactId>
            <version>1.0.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <repositories>
              <repository>
                <id>jitpack.io</id>
                <url>https://jitpack.io</url>
              </repository>
            </repositories>
            <dependencies>
              <dependency>
                <groupId>com.github.domoinc.domo-java-sdk</groupId>
                <artifactId>domo-java-sdk-all</artifactId>
                <version>${DOMO_SDK_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          XML

          cat > "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" <<'JAVA'
          package smoke;

          import com.domo.sdk.DomoClient;
          import com.domo.sdk.request.Config;
          import com.domo.sdk.request.Scope;

          public class DomoSmoke {
              public static void main(String[] args) {
                  Config config = Config.with()
                          .clientId("id")
                          .clientSecret("secret")
                          .apiHost("api.domo.com")
                          .useHttps(true)
                          .scope(Scope.USER, Scope.DATA)
                          .build();
                  DomoClient client = DomoClient.create(config);
                  System.out.println(config.getClass().getName());
                  System.out.println(client.getClass().getName());
              }
          }
          JAVA

          if [ -f "$DOMO_SMOKE_DIR/pom.xml" ] && [ -f "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Domo-java-sdk version
        id: version
        run: |
          echo "version=${DOMO_SDK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Domo-java-sdk version: ${DOMO_SDK_VERSION}"

      - name: Test 1 - Check smoke project files
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -f "$DOMO_SMOKE_DIR/pom.xml" ] && [ -f "$DOMO_SMOKE_DIR/src/main/java/smoke/DomoSmoke.java" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check dependency resolution
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q dependency:build-classpath -Dmdep.outputFile=cp.txt
          if grep -q "domo-java-sdk-all-${DOMO_SDK_VERSION}" cp.txt; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check Maven project configuration
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q help:effective-pom -Doutput=effective-pom.xml
          if grep -q 'jitpack.io' effective-pom.xml && grep -q 'domo-java-sdk-all' effective-pom.xml; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          cd "$DOMO_SMOKE_DIR"
          mvn -q -DskipTests package
          java -cp target/classes:$(cat cp.txt) smoke.DomoSmoke | tee /tmp/domo-smoke.out
          if grep -q 'com.domo.sdk.DomoClient' /tmp/domo-smoke.out && grep -q 'com.domo.sdk.request.Config' /tmp/domo-smoke.out; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          if [ "${{ steps.test1.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test1.outputs.duration || 0 }}))

          if [ "${{ steps.test2.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test2.outputs.duration || 0 }}))

          if [ "${{ steps.test3.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test3.outputs.duration || 0 }}))

          if [ "${{ steps.test4.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test4.outputs.duration || 0 }}))

          if [ "${{ steps.test5.outputs.status }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            CORE_FAILED=$((CORE_FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test5.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"

          if [ $CORE_FAILED -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ $CORE_FAILED -ne 0 ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN=${{ github.token }} gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          mkdir -p test-results
          cat > test-results/domo-java-sdk.json <<JSON
          {
            "schema_version": "1.0",
            "package": {
              "name": "Domo-java-sdk",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Java",
              "category": "Languages and Frameworks"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check smoke project files", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check dependency resolution", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check Maven project configuration", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          JSON
          cat test-results/domo-java-sdk.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domo-java-sdk-test-results
          path: test-results/domo-java-sdk.json
          retention-days: 90
      - name: Create test summary
        if: always()
        run: |
          echo "## Domo-java-sdk Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Check smoke project files: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Check dependency resolution: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Check Maven project configuration: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
