name: Test Minikube on Arm64
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-minikube.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-minikube.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-minikube.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-minikube.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-minikube.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-minikube.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-minikube.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-minikube.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-minikube.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-minikube.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-minikube.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-minikube.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-minikube.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-minikube.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-minikube.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-minikube.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-minikube.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-minikube.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-minikube.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-minikube.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-minikube.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-minikube.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-minikube.outputs.timestamp }}
jobs:
  test-minikube:
    runs-on: ubuntu-24.04-arm
    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Minikube'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=minikube" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/minikube" >> "$GITHUB_OUTPUT"
          echo "current_version=v1.34.0" >> "$GITHUB_OUTPUT"
          echo "next_version=v1.35.0" >> "$GITHUB_OUTPUT"
      - name: Install Minikube
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl conntrack
          VERSION="${{ steps.metadata.outputs.current_version }}"
          URL="https://storage.googleapis.com/minikube/releases/${VERSION}/minikube-linux-arm64"
          
          if curl -LO $URL; then
             sudo install minikube-linux-arm64 /usr/local/bin/minikube
             echo "Minikube installed successfully"
             echo "install_status=success" >> $GITHUB_OUTPUT
          else
             echo "Minikube download failed"
             echo "install_status=failed" >> $GITHUB_OUTPUT
             exit 1
          fi

      # ============================================================
      # CUSTOMIZE THIS: Get the package version
      # ============================================================
      - name: Get Minikube version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(minikube version --short 2>&1 | awk '{print $NF}' || echo "unknown")
          VERSION=$(echo "$VERSION" | sed 's/[",]//g' | tr -d '\\' | sed 's/\x1b\[[0-9;]*m//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Minikube version: $VERSION"

      # ============================================================
      # ADD YOUR TESTS BELOW
      # Each test should:
      # 1. Have a unique id (test1, test2, etc.)
      # 2. Track start/end time for duration
      # 3. Set status=passed or status=failed
      # 4. Exit 1 on failure
      # ============================================================

      - name: Test 1 - Check minikube binary
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if command -v minikube >/dev/null 2>&1 && file "$(command -v minikube)" | grep -qiE 'arm aarch64|aarch64'; then
            echo "✓ minikube binary found"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ minikube binary not found"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 2 - Check version command
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          EXPECTED="${{ steps.metadata.outputs.current_version }}"
          REPORTED=$(minikube version --short 2>&1 | awk '{print $NF}')
          if [ "$REPORTED" = "$EXPECTED" ]; then
            echo "✓ version command works"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "✗ version command failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 3 - Check help command
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          if minikube help 2>&1 | grep -qiE "Usage|minikube"; then
             echo "✓ help command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ help command failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 4 - Check config command
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          
          # View config (should be empty but command should work)
          if minikube config view 2>&1; then
             echo "✓ config view command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ config view command failed"
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 5 - Check completion command
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          COMPLETION_OUTPUT="$(minikube completion bash 2>&1 || true)"
          if [ -n "$COMPLETION_OUTPUT" ] \
            && printf '%s\n' "$COMPLETION_OUTPUT" | grep -qiE '__start_minikube|complete -o|bash completion'; then
             echo "✓ completion command works"
             echo "status=passed" >> $GITHUB_OUTPUT
          else
             echo "✗ completion command failed"
             printf '%s\n' "$COMPLETION_OUTPUT" | sed -n '1,20p' || true
             echo "status=failed" >> $GITHUB_OUTPUT
             exit 1
            fi
          
          # Architecture Verification
          ARCH=$(uname -m)
          if [ "$ARCH" != "aarch64" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      - name: Test 6 - Regression Validation
        id: test6
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          LATEST="${{ steps.metadata.outputs.next_version || 'unknown' }}"

          if [ "${{ steps.test1.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test2.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test3.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test4.outputs.status || 'failed' }}" != "passed" ] || \
             [ "${{ steps.test5.outputs.status || 'failed' }}" != "passed" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=baseline_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Regression validation skipped because one or more baseline tests (1-5) failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline tests failed, so next-version validation is not trustworthy for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LATEST}" ] || [ "${LATEST}" = "unknown" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=unknown" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=manual_review_needed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next Minikube candidate version is not configured in metadata." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT}; next-version target unavailable in workflow metadata." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "decision=no_newer_stable_available" >> "$GITHUB_OUTPUT"
            echo "regression_result=No newer Minikube target is configured beyond baseline." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} matches next target ${LATEST}; next-version regression is not applicable for this run." >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT_BIN="${RUNNER_TEMP}/minikube-next"
          NEXT_URL="https://storage.googleapis.com/minikube/releases/${LATEST}/minikube-linux-arm64"
          curl -fsSL --retry 5 --retry-delay 2 "${NEXT_URL}" -o "${NEXT_BIN}"
          chmod +x "${NEXT_BIN}"
          NEXT_INSTALLED=$("${NEXT_BIN}" version --short 2>&1 | awk '{print $NF}' | tr -d '",')

          if [ -z "${NEXT_INSTALLED}" ] || [ "${NEXT_INSTALLED}" != "${LATEST}" ]; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_INSTALLED:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_or_version_mismatch" >> "$GITHUB_OUTPUT"
            echo "regression_result=Failed to install and verify the selected next Minikube release." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT}; attempted next ${LATEST}; observed ${NEXT_INSTALLED:-not_installed}." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          "${NEXT_BIN}" help >/tmp/minikube-next-help.log 2>&1
          "${NEXT_BIN}" config view >/tmp/minikube-next-config.log 2>&1
          "${NEXT_BIN}" completion bash >/tmp/minikube-next-completion.log 2>&1 || true

          if [ -s /tmp/minikube-next-completion.log ] \
            && grep -qiE "__start_minikube|complete -o|bash completion" /tmp/minikube-next-completion.log; then
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=validated_next_release" >> "$GITHUB_OUTPUT"
            echo "regression_result=Validated baseline Minikube against the configured next release with install and CLI smoke checks." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT} and next ${LATEST} both passed smoke validation; no regression observed in this workflow scope." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "next_installed_version=${NEXT_INSTALLED}" >> "$GITHUB_OUTPUT"
            echo "decision=next_regression_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next-version Minikube smoke checks failed." >> "$GITHUB_OUTPUT"
            echo "comparison=Baseline ${CURRENT}; next ${LATEST} installed, but one or more CLI checks failed." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

            # ============================================================
      # UPDATE THIS: Calculate summary based on your number of tests
      # Add/remove test result checks to match your tests above
      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0
          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }
          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          echo "core_failed=$CORE_FAILED" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$TOTAL_DURATION" >> $GITHUB_OUTPUT

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
          fi
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> $GITHUB_OUTPUT
          else
            echo "badge_status=failing" >> $GITHUB_OUTPUT
          fi
          if [ "$CORE_FAILED" -ne 0 ]; then
            exit 1
          fi
      - name: Create test summary
        if: always()
        run: |
          echo "## Minikube Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Details" >> $GITHUB_STEP_SUMMARY
          echo "1. Test 1 - Check minikube binary: ${{ steps.test1.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Test 2 - Check version command: ${{ steps.test2.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "3. Test 3 - Check help command: ${{ steps.test3.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "4. Test 4 - Check config command: ${{ steps.test4.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "5. Test 5 - Check completion command: ${{ steps.test5.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
