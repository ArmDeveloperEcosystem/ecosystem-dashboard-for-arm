name: Test Pants on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/pants.md"
      - ".github/workflows/test-pants.yml"

jobs:
  test-pants:
    runs-on: ubuntu-24.04-arm
    env:
      PANTS_BASELINE_VERSION: "2.24.1"
      PANTS_NEXT_VERSION: "2.24.2"
      SCIE_PANTS_VERSION: "0.12.5"
      PANTS_BIN_DIR: /opt/pants-smoke/bin
      PANTS_PROJECT_DIR: /tmp/pants-smoke-project
      PANTS_REGRESSION_BIN_DIR: /opt/pants-smoke-regression/bin
      PANTS_REGRESSION_PROJECT_DIR: /tmp/pants-smoke-regression-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=pants" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/pants" >> "$GITHUB_OUTPUT"

      - name: Install Pants
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-venv python3-pip

          curl -fsSL https://static.pantsbuild.org/setup/get-pants.sh -o /tmp/get-pants.sh
          sudo mkdir -p "$PANTS_BIN_DIR"
          sudo bash /tmp/get-pants.sh -d "$PANTS_BIN_DIR" -V "$SCIE_PANTS_VERSION"
          echo "$PANTS_BIN_DIR" >> "$GITHUB_PATH"

          rm -rf "$PANTS_PROJECT_DIR"
          mkdir -p "$PANTS_PROJECT_DIR/src/python/demo"
          printf '%s\n' \
            '[GLOBAL]' \
            "pants_version = \"${PANTS_BASELINE_VERSION}\"" \
            'backend_packages = ["pants.backend.python"]' \
            > "$PANTS_PROJECT_DIR/pants.toml"
          printf '%s\n' 'print("hello from pants")' > "$PANTS_PROJECT_DIR/src/python/demo/app.py"
          printf '%s\n' 'python_sources()' > "$PANTS_PROJECT_DIR/src/python/demo/BUILD"

          if [ -x "$PANTS_BIN_DIR/pants" ]; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get Pants version
        id: version
        run: |
          set -euo pipefail
          VERSION_OUTPUT=$(
            cd "$PANTS_PROJECT_DIR"
            env PANTS_VERSION="$PANTS_BASELINE_VERSION" "$PANTS_BIN_DIR/pants" --version 2>&1
          )
          VERSION=$(printf '%s\n' "$VERSION_OUTPUT" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | tail -1 || true)
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "latest=${PANTS_NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected Pants version: ${VERSION:-unknown}"
          echo "Detected next stable Pants release: ${PANTS_NEXT_VERSION}"

      - name: Test 1 - Check Pants binary exists
        id: test1
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ -x "$PANTS_BIN_DIR/pants" ] && command -v pants >/dev/null 2>&1; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          VERSION_OUTPUT=$(
            cd "$PANTS_PROJECT_DIR"
            env PANTS_VERSION="$PANTS_BASELINE_VERSION" "$PANTS_BIN_DIR/pants" --version 2>&1
          )
          ACTUAL_VERSION=$(printf '%s\n' "$VERSION_OUTPUT" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | tail -1 || true)
          echo "$VERSION_OUTPUT"
          if [ "$ACTUAL_VERSION" = "$PANTS_BASELINE_VERSION" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check help output
        id: test3
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          HELP_OUTPUT=$(
            cd "$PANTS_PROJECT_DIR"
            env PANTS_VERSION="$PANTS_BASELINE_VERSION" "$PANTS_BIN_DIR/pants" help goals 2>&1
          )
          if printf '%s\n' "$HELP_OUTPUT" | grep -qi "list"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          LIST_OUTPUT=$(
            cd "$PANTS_PROJECT_DIR"
            env PANTS_VERSION="$PANTS_BASELINE_VERSION" "$PANTS_BIN_DIR/pants" list src/python/demo:: 2>&1
          )
          echo "$LIST_OUTPUT"
          if printf '%s\n' "$LIST_OUTPUT" | grep -q "src/python/demo/app.py"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${PANTS_BASELINE_VERSION}"
          LATEST="${{ steps.version.outputs.latest || 'unknown' }}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST" ] || [ "$LATEST" = "unknown" ] || [ "$LATEST" = "null" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_lookup_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version lookup failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pants version ${CURRENT} passed smoke tests in this run, but the latest stable upstream release could not be resolved automatically." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=metadata_review_required" >> "$GITHUB_OUTPUT"
            echo "regression_result=Tests 1-5 baseline must be older than the latest stable release" >> "$GITHUB_OUTPUT"
            echo "comparison=Pinned Pants baseline ${CURRENT} already matches the latest stable upstream release ${LATEST}. Repin Tests 1-5 to an older dashboard-aligned baseline so Test 6 validates a newer Arm64 release." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          curl -fsSL https://static.pantsbuild.org/setup/get-pants.sh -o /tmp/get-pants-regression.sh
          sudo rm -rf "$PANTS_REGRESSION_BIN_DIR"
          sudo mkdir -p "$PANTS_REGRESSION_BIN_DIR"
          sudo bash /tmp/get-pants-regression.sh -d "$PANTS_REGRESSION_BIN_DIR" -V "$SCIE_PANTS_VERSION"

          rm -rf "$PANTS_REGRESSION_PROJECT_DIR"
          mkdir -p "$PANTS_REGRESSION_PROJECT_DIR/src/python/demo"
          printf '%s\n' \
            '[GLOBAL]' \
            "pants_version = \"${LATEST}\"" \
            'backend_packages = ["pants.backend.python"]' \
            > "$PANTS_REGRESSION_PROJECT_DIR/pants.toml"
          printf '%s\n' 'print("hello from pants regression")' > "$PANTS_REGRESSION_PROJECT_DIR/src/python/demo/app.py"
          printf '%s\n' 'python_sources()' > "$PANTS_REGRESSION_PROJECT_DIR/src/python/demo/BUILD"

          NEXT_VERSION_OUTPUT=$(
            cd "$PANTS_REGRESSION_PROJECT_DIR"
            env PANTS_VERSION="$LATEST" "$PANTS_REGRESSION_BIN_DIR/pants" --version 2>&1
          )
          NEXT_INSTALLED_VERSION=$(printf '%s\n' "$NEXT_VERSION_OUTPUT" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | tail -1 || true)
          LIST_OUTPUT=$(
            cd "$PANTS_REGRESSION_PROJECT_DIR"
            env PANTS_VERSION="$LATEST" "$PANTS_REGRESSION_BIN_DIR/pants" list src/python/demo:: 2>&1
          )

          echo "$NEXT_VERSION_OUTPUT"
          echo "$LIST_OUTPUT"
          if [ "$NEXT_INSTALLED_VERSION" = "$LATEST" ] && printf '%s\n' "$LIST_OUTPUT" | grep -q "src/python/demo/app.py"; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pants version ${CURRENT} passed smoke tests in this run. Regression validation installed candidate version ${LATEST} into an isolated Arm64 directory, the candidate binary reported version ${NEXT_INSTALLED_VERSION}, and a real target listing succeeded." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED_VERSION:-not_installed}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Current pinned Pants version ${CURRENT} passed smoke tests in this run, but the isolated candidate install did not report the expected version or complete a usable target listing on Arm64." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0

          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"

          if [ "${{ steps.test6.outputs.status || 'failed' }}" = "passed" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CORE_FAILED" -ne 0 ] || [ "${{ steps.test6.outputs.status || 'failed' }}" != "passed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi

          cat > test-results/pants.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "Pants",
              "version": "${{ steps.version.outputs.version }}",
              "language": "Python",
              "category": "Build Tool"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "$JOB_URL",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Check Pants binary exists", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Check version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Check help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Architecture verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Functional validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}", "latest_version": "${{ steps.test6.outputs.latest_version || 'unknown' }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || 'not_installed' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-test-results
          path: test-results/pants.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## Pants Test Results"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo "- **Runner:** ubuntu-24.04 (arm64)"
            echo ""
            echo "### Test Details"
            echo "1. Check Pants binary exists: ${{ steps.test1.outputs.status || 'skipped' }}"
            echo "2. Check version output: ${{ steps.test2.outputs.status || 'skipped' }}"
            echo "3. Check help output: ${{ steps.test3.outputs.status || 'skipped' }}"
            echo "4. Architecture verification: ${{ steps.test4.outputs.status || 'skipped' }}"
            echo "5. Functional validation: ${{ steps.test5.outputs.status || 'skipped' }}"
            echo "6. Regression Validation: ${{ steps.test6.outputs.status || 'skipped' }}"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || 'unknown' }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
