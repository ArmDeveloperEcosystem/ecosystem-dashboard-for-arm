name: Test libx265 on Arm64

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
      - smoke_tests
    paths:
      - "content/opensource_packages/libx265.md"
      - ".github/workflows/test-libx265.yml"

jobs:
  test-libx265:
    runs-on: ubuntu-24.04-arm
    env:
      LIBX265_BASELINE: "3.6"
      LIBX265_NEXT_VERSION: "4.0"
      LIBX265_REPO: "https://bitbucket.org/multicoreware/x265_git.git"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=libx265" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/libx265" >> "$GITHUB_OUTPUT"
          echo "current_version=${LIBX265_BASELINE}" >> "$GITHUB_OUTPUT"

      - name: Install libx265
        id: install
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build build-essential pkg-config python3
          rm -rf /tmp/libx265-base /tmp/libx265-base-build
          git clone --depth 1 --branch "${LIBX265_BASELINE}" "${LIBX265_REPO}" /tmp/libx265-base
          cmake -S /tmp/libx265-base/source -B /tmp/libx265-base-build -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_SHARED=ON
          cmake --build /tmp/libx265-base-build
          sudo cmake --install /tmp/libx265-base-build
          sudo ldconfig
          if command -v x265 >/dev/null 2>&1 && [ -f /usr/local/include/x265.h ] && pkg-config --exists x265; then
            echo "install_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "install_status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Get libx265 version
        id: version
        run: |
          set -euo pipefail
          extract_x265_version() {
            local bin="$1"
            "$bin" --version 2>&1 | awk '{
              for (i = 1; i <= NF; ++i) {
                if ($i == "version" && i < NF) {
                  print $(i + 1)
                  exit
                }
              }
            }' | cut -d+ -f1
          }
          VERSION=$(extract_x265_version x265 || true)
          if [ -z "$VERSION" ]; then
            VERSION="${LIBX265_BASELINE}"
          fi
          LATEST="${LIBX265_NEXT_VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Check x265 binary and headers
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if command -v x265 >/dev/null 2>&1 && [ -f /usr/local/include/x265.h ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Check x265 version output
        id: test2
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          extract_x265_version() {
            local bin="$1"
            "$bin" --version 2>&1 | awk '{
              for (i = 1; i <= NF; ++i) {
                if ($i == "version" && i < NF) {
                  print $(i + 1)
                  exit
                }
              }
            }' | cut -d+ -f1 | sed 's/^v//'
          }
          VERSION=$(extract_x265_version x265 || true)
          if [ "$VERSION" = "${LIBX265_BASELINE}" ] || x265 --version 2>&1 | grep -Eq "(^|[^0-9])${LIBX265_BASELINE//./\\.}([^0-9]|$)"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            x265 --version || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Check x265 help output
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if x265 --help 2>&1 | grep -Eqi "Syntax: x265|x265 \[options\]|HEVC encoder"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          REAL_BIN=$(readlink -f "$(command -v x265)")
          if [ "$(uname -m)" = "aarch64" ] && { file "${REAL_BIN}" | grep -Eqi 'aarch64|arm64|ARM aarch64' || readelf -h "${REAL_BIN}" 2>/dev/null | grep -Eq 'Machine:[[:space:]]*AArch64'; }; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "${REAL_BIN}" || true
            readelf -h "${REAL_BIN}" 2>/dev/null || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          python3 - <<'PY'
          from pathlib import Path
          width = 64
          height = 64
          y_plane = bytes([(x + y) % 256 for y in range(height) for x in range(width)])
          u_plane = bytes([128]) * ((width // 2) * (height // 2))
          v_plane = bytes([128]) * ((width // 2) * (height // 2))
          Path("/tmp/x265-input.yuv").write_bytes(y_plane + u_plane + v_plane)
          PY
          if x265 --input /tmp/x265-input.yuv --input-res 64x64 --input-csp i420 --fps 1 --frames 1 -o /tmp/x265-output.hevc > /tmp/x265.log 2>&1 && [ -s /tmp/x265-output.hevc ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/x265.log || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || steps.metadata.outputs.current_version }}"
          LATEST="${{ steps.version.outputs.latest }}"
          REGRESSION_SRC_DIR="/tmp/libx265-regression"
          REGRESSION_BUILD_DIR="/tmp/libx265-regression-build"
          REGRESSION_PREFIX="/tmp/libx265-regression-prefix"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${CURRENT}"
          echo "Next version targeted for install validation: ${LATEST}"

          rm -rf "${REGRESSION_SRC_DIR}" "${REGRESSION_BUILD_DIR}" "${REGRESSION_PREFIX}"
          git clone --depth 1 --branch "${LATEST}" "${LIBX265_REPO}" "${REGRESSION_SRC_DIR}"
          cmake -S "${REGRESSION_SRC_DIR}/source" -B "${REGRESSION_BUILD_DIR}" -GNinja -DCMAKE_INSTALL_PREFIX="${REGRESSION_PREFIX}" -DENABLE_SHARED=ON
          cmake --build "${REGRESSION_BUILD_DIR}"
          cmake --install "${REGRESSION_BUILD_DIR}"
          extract_x265_version() {
            local bin="$1"
            "$bin" --version 2>&1 | awk '{
              for (i = 1; i <= NF; ++i) {
                if ($i == "version" && i < NF) {
                  print $(i + 1)
                  exit
                }
              }
            }' | cut -d+ -f1
          }
          NEXT_INSTALLED_VERSION=$(extract_x265_version "${REGRESSION_BUILD_DIR}/x265" || true)
          if [ -z "${NEXT_INSTALLED_VERSION}" ]; then
            NEXT_INSTALLED_VERSION="unknown"
          fi
          python3 - <<'PY'
          from pathlib import Path
          width = 64
          height = 64
          y_plane = bytes([(x + y) % 256 for y in range(height) for x in range(width)])
          u_plane = bytes([128]) * ((width // 2) * (height // 2))
          v_plane = bytes([128]) * ((width // 2) * (height // 2))
          Path("/tmp/x265-next-input.yuv").write_bytes(y_plane + u_plane + v_plane)
          PY
          if [ "${NEXT_INSTALLED_VERSION}" = "${LATEST}" ] && "${REGRESSION_BUILD_DIR}/x265" --input /tmp/x265-next-input.yuv --input-res 64x64 --input-csp i420 --fps 1 --frames 1 -o /tmp/x265-next-output.hevc > /tmp/x265-next.log 2>&1 && [ -s /tmp/x265-next-output.hevc ]; then
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Next version installed on Arm64: ${NEXT_INSTALLED_VERSION}"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=libx265 baseline version ${CURRENT} passed smoke tests in this run. Regression validation rebuilt candidate version ${LATEST} on Arm64, the installed encoder reported version ${NEXT_INSTALLED_VERSION}, and the isolated HEVC encode smoke succeeded." >> "$GITHUB_OUTPUT"
            echo "Regression install result: Next version installed successfully on Arm64"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "next_installed_version=${NEXT_INSTALLED_VERSION}" >> "$GITHUB_OUTPUT"
            if [ "${NEXT_INSTALLED_VERSION}" != "${LATEST}" ]; then
              "${REGRESSION_BUILD_DIR}/x265" --version || true
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=libx265 baseline version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} built an encoder that reported version ${NEXT_INSTALLED_VERSION} instead of the expected ${LATEST} on Arm64." >> "$GITHUB_OUTPUT"
            else
              cat /tmp/x265-next.log || true
              echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
              echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
              echo "comparison=libx265 baseline version ${CURRENT} passed smoke tests in this run, but the regression candidate ${LATEST} failed the same Arm64 build-and-encode path." >> "$GITHUB_OUTPUT"
            fi
            echo "Regression install result: Next version install failed on Arm64"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Show regression validation details
        if: always()
        run: |
          DECISION="${{ steps.test6.outputs.decision || 'manual_review_needed' }}"
          REGRESSION_RESULT="${{ steps.test6.outputs.regression_result || '' }}"
          if [ -z "$REGRESSION_RESULT" ]; then
            case "$DECISION" in
              next_install_validated|safe_to_upgrade)
                REGRESSION_RESULT="Next version installed successfully on Arm64"
                ;;
              next_install_failed|next_lookup_failed)
                REGRESSION_RESULT="Next version install failed on Arm64"
                ;;
              current_is_latest_stable|pinned_is_latest|already_current|already_at_latest|at_latest|current_is_latest|current_is_latest_validated_release|current_is_latest_validated_3_2_x|pinned_latest_eol)
                REGRESSION_RESULT="Tests 1-5 baseline must be older than the latest stable release"
                ;;
              hold_current|hold_current_until_regression_run|hold_current_arm_dependency_gap|metadata_review_required|upgrade_candidate_available|manual_review_needed|manual_review_needed_for_product_upgrade|keep_current)
                REGRESSION_RESULT="Pending regression install validation"
                ;;
              *)
                if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
                  REGRESSION_RESULT="Regression validation passed"
                else
                  REGRESSION_RESULT="Regression validation failed"
                fi
                ;;
            esac
          fi

          echo "=== Regression Validation (Next Version Install) ==="
          echo "Current version tested in Tests 1-5: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || steps.metadata.outputs.current_version || 'unknown' }}"
          echo "Next version targeted for install validation: ${{ steps.test6.outputs.latest_version || 'unknown' }}"
          echo "Next version installed on Arm64: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
          echo "Regression install result: ${REGRESSION_RESULT}"
          echo "Details: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          set -euo pipefail
          PASSED=0
          FAILED=0
          CORE_FAILED=0
          TOTAL_DURATION=0
          check_core_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }
          check_core_test "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core_test "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core_test "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core_test "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core_test "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          TEST6_STATUS="${{ steps.test6.outputs.status || 'skipped' }}"
          if [ "$TEST6_STATUS" = "passed" ]; then
            PASSED=$((PASSED + 1))
          elif [ "$TEST6_STATUS" = "failed" ]; then
            FAILED=$((FAILED + 1))
          fi
          TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"
          if [ "$CORE_FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi
          if [ "$CORE_FAILED" -ne 0 ] || [ "$TEST6_STATUS" = "failed" ]; then
            exit 1
          fi

      - name: Generate test results JSON
        if: always()
        run: |
          set -euo pipefail
          mkdir -p test-results
          JOB_ID="${{ github.job }}"
          JOB_URL=$(GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --jq ".jobs[] | select(.name == \"$JOB_ID / $JOB_ID\" or .name == \"$JOB_ID\") | .html_url" | head -n 1)
          if [ -z "$JOB_URL" ]; then
            JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true&query=job:$JOB_ID"
          fi
          cat > test-results/libx265.json <<EOF
          {
            "schema_version": "1.0",
            "package": {
              "name": "libx265",
              "version": "${{ steps.version.outputs.version }}",
              "language": "C++",
              "category": "Video"
            },
            "run": {
              "id": "${{ github.run_id }}",
              "url": "${JOB_URL}",
              "timestamp": "${{ steps.metadata.outputs.timestamp }}",
              "status": "${{ steps.summary.outputs.overall_status }}",
              "runner": {
                "os": "ubuntu-24.04",
                "arch": "arm64"
              }
            },
            "tests": {
              "passed": ${{ steps.summary.outputs.passed }},
              "failed": ${{ steps.summary.outputs.failed }},
              "skipped": 0,
              "duration_seconds": ${{ steps.summary.outputs.duration || 0 }},
              "details": [
                {"name": "Test 1 - Check x265 binary and headers", "status": "${{ steps.test1.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test1.outputs.duration || 0 }}},
                {"name": "Test 2 - Check x265 version output", "status": "${{ steps.test2.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test2.outputs.duration || 0 }}},
                {"name": "Test 3 - Check x265 help output", "status": "${{ steps.test3.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test3.outputs.duration || 0 }}},
                {"name": "Test 4 - Architecture Verification", "status": "${{ steps.test4.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test4.outputs.duration || 0 }}},
                {"name": "Test 5 - Functional Validation", "status": "${{ steps.test5.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test5.outputs.duration || 0 }}},
                {"name": "Test 6 - Regression Validation", "status": "${{ steps.test6.outputs.status || 'skipped' }}", "duration_seconds": ${{ steps.test6.outputs.duration || 0 }}, "current_version": "${{ steps.test6.outputs.current_version || steps.metadata.outputs.current_version }}", "latest_version": "${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}", "next_installed_version": "${{ steps.test6.outputs.next_installed_version || '' }}", "decision": "${{ steps.test6.outputs.decision || 'manual_review_needed' }}", "comparison": "${{ steps.test6.outputs.comparison || '' }}", "regression_result": "${{ steps.test6.outputs.regression_result || '' }}"}
              ]
            },
            "metadata": {
              "dashboard_link": "${{ steps.metadata.outputs.dashboard_link }}",
              "badge_status": "${{ steps.summary.outputs.badge_status }}"
            }
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libx265-test-results
          path: test-results/libx265.json
          retention-days: 90

      - name: Create test summary
        if: always()
        run: |
          {
            echo "## libx265 Test Results"
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Status:** ${{ steps.summary.outputs.overall_status }}"
            echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}"
            echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}"
            echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s"
            echo ""
            echo "### Regression Validation (Next Version Install)"
            echo "- **Current version tested in Tests 1-5:** ${{ steps.test6.outputs.current_version || steps.metadata.outputs.current_version }}"
            echo "- **Next version targeted for install validation:** ${{ steps.test6.outputs.latest_version || steps.version.outputs.latest }}"
            echo "- **Next version installed on Arm64:** ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}"
            echo "- **Regression install result:** ${{ steps.test6.outputs.regression_result || 'Regression result unavailable.' }}"
            echo "- **Details:** ${{ steps.test6.outputs.comparison || 'Current pinned version was smoke-tested in this run.' }}"
          } >> "$GITHUB_STEP_SUMMARY"
