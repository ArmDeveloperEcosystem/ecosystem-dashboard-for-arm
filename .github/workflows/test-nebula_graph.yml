name: Test Nebula Graph Console on Arm64

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      contract_version:
        description: Output contract version
        value: ${{ jobs.test-nebula_graph.outputs.contract_version }}
      package_slug:
        description: Canonical package slug
        value: ${{ jobs.test-nebula_graph.outputs.package_slug }}
      package_name:
        description: Display package name
        value: ${{ jobs.test-nebula_graph.outputs.package_name }}
      package_version:
        description: Baseline version tested in this run
        value: ${{ jobs.test-nebula_graph.outputs.package_version }}
      run_status:
        description: Overall package run status
        value: ${{ jobs.test-nebula_graph.outputs.run_status }}
      badge_status:
        description: Badge status derived from core baseline checks
        value: ${{ jobs.test-nebula_graph.outputs.badge_status }}
      core_failed:
        description: Number of failed baseline core checks (Tests 1-5)
        value: ${{ jobs.test-nebula_graph.outputs.core_failed }}
      tests_passed:
        description: Count of passed tests
        value: ${{ jobs.test-nebula_graph.outputs.tests_passed }}
      tests_failed:
        description: Count of failed tests
        value: ${{ jobs.test-nebula_graph.outputs.tests_failed }}
      tests_skipped:
        description: Count of skipped tests
        value: ${{ jobs.test-nebula_graph.outputs.tests_skipped }}
      duration_seconds:
        description: Total duration across tests
        value: ${{ jobs.test-nebula_graph.outputs.duration_seconds }}
      regression_status:
        description: Regression test status
        value: ${{ jobs.test-nebula_graph.outputs.regression_status }}
      regression_decision:
        description: Regression decision label
        value: ${{ jobs.test-nebula_graph.outputs.regression_decision }}
      regression_result:
        description: Human readable regression result
        value: ${{ jobs.test-nebula_graph.outputs.regression_result }}
      regression_comparison:
        description: Regression comparison note
        value: ${{ jobs.test-nebula_graph.outputs.regression_comparison }}
      regression_current_version:
        description: Baseline version used for regression comparison
        value: ${{ jobs.test-nebula_graph.outputs.regression_current_version }}
      regression_latest_version:
        description: Next candidate version selected for regression validation
        value: ${{ jobs.test-nebula_graph.outputs.regression_latest_version }}
      regression_next_installed_version:
        description: Candidate version reported by installed next artifact
        value: ${{ jobs.test-nebula_graph.outputs.regression_next_installed_version }}
      run_id:
        description: GitHub run id
        value: ${{ jobs.test-nebula_graph.outputs.run_id }}
      run_attempt:
        description: GitHub run attempt
        value: ${{ jobs.test-nebula_graph.outputs.run_attempt }}
      job_name:
        description: GitHub job identifier
        value: ${{ jobs.test-nebula_graph.outputs.job_name }}
      dashboard_link:
        description: Dashboard route for this package
        value: ${{ jobs.test-nebula_graph.outputs.dashboard_link }}
      timestamp:
        description: UTC timestamp for this package run
        value: ${{ jobs.test-nebula_graph.outputs.timestamp }}
jobs:
  test-nebula_graph:
    runs-on: ubuntu-24.04-arm
    env:
      NEBULA_VERSION: "3.6.0"
      NEBULA_NEXT_VERSION: "3.8.0"

    outputs:
      contract_version: "2.0"
      package_slug: ${{ steps.metadata.outputs.package_slug }}
      package_name: 'Nebula Graph Console'
      package_version: ${{ steps.version.outputs.version || 'unknown' }}
      run_status: ${{ steps.summary.outputs.overall_status || 'failure' }}
      badge_status: ${{ steps.summary.outputs.badge_status || 'failing' }}
      core_failed: ${{ steps.summary.outputs.core_failed || '0' }}
      tests_passed: ${{ steps.summary.outputs.passed || '0' }}
      tests_failed: ${{ steps.summary.outputs.failed || '0' }}
      tests_skipped: ${{ steps.summary.outputs.skipped || '0' }}
      duration_seconds: ${{ steps.summary.outputs.duration || '0' }}
      regression_status: ${{ steps.test6.outputs.status || 'skipped' }}
      regression_decision: ${{ steps.test6.outputs.decision || 'not_configured' }}
      regression_result: ${{ steps.test6.outputs.regression_result || '' }}
      regression_comparison: ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}
      regression_current_version: ${{ steps.test6.outputs.current_version || steps.version.outputs.version || 'unknown' }}
      regression_latest_version: ${{ steps.test6.outputs.latest_version || 'unknown' }}
      regression_next_installed_version: ${{ steps.test6.outputs.next_installed_version || 'not_installed' }}
      run_id: ${{ github.run_id }}
      run_attempt: ${{ github.run_attempt }}
      job_name: ${{ github.job }}
      dashboard_link: ${{ steps.metadata.outputs.dashboard_link }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set test metadata
        id: metadata
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "package_slug=nebula_graph" >> "$GITHUB_OUTPUT"
          echo "dashboard_link=/opensource_packages/nebula_graph" >> "$GITHUB_OUTPUT"
          echo "current_version=${NEBULA_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Nebula Console
        id: install
        run: |
          set -euo pipefail
          bash .github/actions/apt-bootstrap/bootstrap.sh --packages "wget file"
          ROOT="$HOME/nebula-console-smoke"
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          cd "$ROOT"
          URL="https://github.com/vesoft-inc/nebula-console/releases/download/v${NEBULA_VERSION}/nebula-console-linux-arm64-v${NEBULA_VERSION}"
          DOWNLOAD_PATH="$ROOT/nebula-console.download"
          curl -fsSL --retry 3 "$URL" -o "$DOWNLOAD_PATH"
          chmod +x "$DOWNLOAD_PATH"
          install -m 0755 "$DOWNLOAD_PATH" "$ROOT/nebula-console"
          sudo install -m 0755 "$DOWNLOAD_PATH" /usr/local/bin/nebula-console
          echo "install_root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "asset_url=$URL" >> "$GITHUB_OUTPUT"
          echo "asset_version=v${NEBULA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "install_status=success" >> "$GITHUB_OUTPUT"

      - name: Get Nebula Console version
        id: version
        run: |
          set -euo pipefail
          if nebula-console -h >"$HOME/nebula-console-version-help.txt" 2>&1 && grep -Fq "Usage of" "$HOME/nebula-console-version-help.txt"; then
            VERSION="v${NEBULA_VERSION}"
          else
            VERSION="unknown"
          fi
          LATEST_TAG="v${NEBULA_NEXT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Test 1 - Binary Existence
        id: test1
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ -x /usr/local/bin/nebula-console ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 2 - Release Mapping Check
        id: test2
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          nebula-console -h >"$HOME/nebula-console-test2-help.txt" 2>&1 || true
          if [ "${{ steps.version.outputs.version }}" = "v${NEBULA_VERSION}" ] && \
             grep -Fq "Usage of" "$HOME/nebula-console-test2-help.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$HOME/nebula-console-test2-help.txt" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 3 - Help Output Validation
        id: test3
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          nebula-console -h >"$HOME/nebula-console-help.txt" 2>&1 || true
          if grep -Fq "Usage of" "$HOME/nebula-console-help.txt" && \
             grep -Fq -- "-addr" "$HOME/nebula-console-help.txt"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$HOME/nebula-console-help.txt" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 4 - Architecture Verification
        id: test4
        continue-on-error: true
        run: |
          START_TIME=$(date +%s)
          if [ "$(uname -m)" = "aarch64" ] && file /usr/local/bin/nebula-console | grep -qiE 'arm aarch64|aarch64'; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 5 - Functional Validation
        id: test5
        continue-on-error: true
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          OUTPUT=$(timeout 10s nebula-console -addr 127.0.0.1 -port 9669 -u root -p nebula -e "SHOW HOSTS;" 2>&1 || true)
          printf '%s\n' "$OUTPUT" > "$HOME/nebula-console-functional.log"
          if grep -Eqi 'Failed to initialize the connection pool|connection refused|dial tcp|Address: 127.0.0.1' "$HOME/nebula-console-functional.log"; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            cat "$HOME/nebula-console-functional.log" || true
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Test 6 - Regression Validation
        id: test6
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CURRENT="${{ steps.version.outputs.version || 'unknown' }}"
          LATEST="v${NEBULA_NEXT_VERSION}"
          NEXT_DIR=$(mktemp -d)
          trap 'rm -rf "$NEXT_DIR"' EXIT

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST}" >> "$GITHUB_OUTPUT"

          NEXT_URL="https://github.com/vesoft-inc/nebula-console/releases/download/${LATEST}/nebula-console-linux-arm64-${LATEST}"
          curl -fsSL --retry 3 "$NEXT_URL" -o "$NEXT_DIR/nebula-console"
          chmod +x "$NEXT_DIR/nebula-console"

          HELP_OUTPUT=$("$NEXT_DIR/nebula-console" -h 2>&1 || true)
          CONNECT_OUTPUT=$(timeout 10s "$NEXT_DIR/nebula-console" -addr 127.0.0.1 -port 9669 -u root -p nebula -e "SHOW HOSTS;" 2>&1 || true)
          printf '%s\n' "$HELP_OUTPUT" > "$NEXT_DIR/help.log"
          printf '%s\n' "$CONNECT_OUTPUT" > "$NEXT_DIR/connect.log"

          if file "$NEXT_DIR/nebula-console" | grep -qiE 'arm aarch64|aarch64' && \
             grep -Fq "Usage of" "$NEXT_DIR/help.log" && \
             grep -Eqi 'Failed to initialize the connection pool|connection refused|dial tcp|Address: 127.0.0.1' "$NEXT_DIR/connect.log"; then
            echo "next_installed_version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_validated" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version installed successfully on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Nebula Console baseline ${CURRENT} passed Arm64 binary, help, and bounded local connection-failure probes. Candidate ${LATEST} downloaded as a Linux/Arm64 binary and passed the same help and bounded local client behavior checks." >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            file "$NEXT_DIR/nebula-console" || true
            cat "$NEXT_DIR/help.log" || true
            cat "$NEXT_DIR/connect.log" || true
            echo "next_installed_version=not_installed" >> "$GITHUB_OUTPUT"
            echo "decision=next_install_failed" >> "$GITHUB_OUTPUT"
            echo "regression_result=Next version install failed on Arm64" >> "$GITHUB_OUTPUT"
            echo "comparison=Nebula Console candidate ${LATEST} did not pass Arm64 binary/help/local client validation." >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            END_TIME=$(date +%s)
            echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Calculate test summary
        if: always()
        id: summary
        run: |
          CORE_FAILED=0
          PASSED=0
          FAILED=0
          TOTAL_DURATION=0

          check_test() {
            local status="$1"
            local duration="$2"
            if [ "$status" = "passed" ]; then
              PASSED=$((PASSED + 1))
            else
              FAILED=$((FAILED + 1))
            fi
            TOTAL_DURATION=$((TOTAL_DURATION + duration))
          }

          check_core() {
            local status="$1"
            local duration="$2"
            check_test "$status" "$duration"
            if [ "$status" != "passed" ]; then
              CORE_FAILED=$((CORE_FAILED + 1))
            fi
          }

          check_core "${{ steps.test1.outputs.status || 'failed' }}" "${{ steps.test1.outputs.duration || 0 }}"
          check_core "${{ steps.test2.outputs.status || 'failed' }}" "${{ steps.test2.outputs.duration || 0 }}"
          check_core "${{ steps.test3.outputs.status || 'failed' }}" "${{ steps.test3.outputs.duration || 0 }}"
          check_core "${{ steps.test4.outputs.status || 'failed' }}" "${{ steps.test4.outputs.duration || 0 }}"
          check_core "${{ steps.test5.outputs.status || 'failed' }}" "${{ steps.test5.outputs.duration || 0 }}"
          if [ "${{ steps.test6.outputs.status || 'skipped' }}" = "passed" ]; then
            check_test "passed" "${{ steps.test6.outputs.duration || 0 }}"
          elif [ "${{ steps.test6.outputs.status || 'skipped' }}" = "failed" ]; then
            check_test "failed" "${{ steps.test6.outputs.duration || 0 }}"
          else
            TOTAL_DURATION=$((TOTAL_DURATION + ${{ steps.test6.outputs.duration || 0 }}))
          fi

          echo "core_failed=$CORE_FAILED" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "duration=$TOTAL_DURATION" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -eq 0 ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "badge_status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "badge_status=failing" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Create test summary
        if: always()
        run: |
          echo "## Nebula Graph Console Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ steps.summary.outputs.overall_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Passed:** ${{ steps.summary.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests Failed:** ${{ steps.summary.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${{ steps.summary.outputs.duration || 0 }}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** ubuntu-24.04 (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Test Details" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test 1 - Binary Existence: ${{ steps.test1.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Test 2 - Version Check: ${{ steps.test2.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Test 3 - Help Output Validation: ${{ steps.test3.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Test 4 - Architecture Verification: ${{ steps.test4.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Test 5 - Functional Validation: ${{ steps.test5.outputs.status || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Regression applicability: package-manager installed (not applicable)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ steps.test6.outputs.comparison || 'Regression comparison summary unavailable.' }}" >> "$GITHUB_STEP_SUMMARY"
